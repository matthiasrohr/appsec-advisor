$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-advisor/schemas/threat-model.output.schema.yaml
title: threat-model.yaml — external machine-readable export
description: |
  Final output contract for `$OUTPUT_DIR/threat-model.yaml`. This is the
  structured export that downstream consumers (CI/CD, DefectDojo, SonarQube,
  sibling threat models via cross-repo discovery) depend on. Schema drift
  breaks integrations silently — producers MUST validate against this file.

  Extensibility: the schema allows additional properties at the top level
  and inside every major list item so future fields (run_statistics,
  cross_repo_dependencies, triage_flags, …) can be added without breaking
  consumers. Remove `additionalProperties: true` hints to tighten.

type: object
additionalProperties: true

required:
  - meta
  - components
  - assets
  - attack_surface
  - trust_boundaries
  - security_controls
  - threats
  - mitigations

properties:

  meta:
    type: object
    additionalProperties: true
    required: [schema_version, project, generated, mode, model]
    properties:
      schema_version:
        const: 1
      project:
        type: string
      generated:
        type: string
        description: ISO-8601 timestamp
      analysis_duration_seconds:
        type: [integer, "null"]
        minimum: 0
      mode:
        type: string
        enum: [full, incremental]
      analyst:
        type: string
      model:
        type: string
      compliance_scope:
        type: array
        items: { type: string }
      asset_classification:
        type: [string, "null"]
      repo_url:
        type: [string, "null"]
      team_owner:
        type: [string, "null"]
      git:
        type: [object, "null"]
        additionalProperties: true
        properties:
          commit_sha: { type: string }
          branch:     { type: string }
      id_counters:
        type: [object, "null"]
        additionalProperties: true
        properties:
          next_threat_id:
            type: string
            pattern: "^T-\\d{3,}$"
          next_mitigation_id:
            type: string
            pattern: "^M-\\d{3,}$"
      accepted_risks:
        # Team-provided risks from `docs/known-threats.yaml` with `status: accepted`.
        # Phase 1 extracts these and the orchestrator emits them here during
        # Phase 11 yaml composition. The deterministic §10 fragment generator
        # (`scripts/pregenerate_fragments.py → gen_out_of_scope`) renders them
        # as an "Accepted Risks (Team-Provided)" sub-section in §10 Out of Scope.
        # Without this list the accepted entries would silently disappear from
        # the report (STRIDE skips them; QA Check 5 excludes them by design).
        type: [array, "null"]
        items:
          type: object
          additionalProperties: true
          required: [id, title, severity, justification]
          properties:
            id:            { type: string, minLength: 1 }
            title:         { type: string, minLength: 1 }
            stride:        { type: [string, "null"] }
            component:     { type: [string, "null"], description: "Canonical component id when mappable; original alias preserved here for trace." }
            severity:
              type: string
              enum: [Critical, High, Medium, Low, Informational]
            justification: { type: string, minLength: 1, description: "Verbatim `accepted_risk` field from known-threats.yaml." }
            evidence:      { type: [string, "null"] }
            pentest_ref:   { type: [string, "null"] }

  changelog:
    # Append-only history of assessment runs, newest first.
    # Shape is pinned by agents/phases/phase-group-finalization.md
    # §"Changelog Entry Composition" and consumed by:
    #   * templates/fragments/changelog.md.j2 (markdown rendering)
    #   * scripts/render_completion_summary.py (console Change Summary)
    #   * scripts/baseline_state.py (carry-forward / id counter refresh)
    type: array
    items:
      type: object
      additionalProperties: true
      required: [version, date, mode]
      properties:
        version:
          type: integer
          minimum: 1
        date:
          type: string
        mode:
          type: string
          enum: [full, incremental]
        # Per-run parametrization (added 2026-05). Lets the changelog table
        # show how each historical run was configured (depth + reasoning
        # tier + raw invocation). Optional for backward-compat with pre-2026-05
        # baselines; new runs always emit them.
        assessment_depth:
          type: [string, "null"]
          enum: [quick, standard, thorough, null]
        reasoning_model:
          type: [string, "null"]
          description: |
            Reasoning tier label resolved by `--reasoning-model`
            (e.g. `haiku-economy`, `opus-cheap`, `opus`, `sonnet`).
        invocation:
          type: [string, "null"]
          description: |
            Raw command-line arguments captured by the skill before parsing
            (e.g. `--quick --sarif`). Empty string when no args were passed.
        plugin_version:
          type: [string, "null"]
        analysis_version:
          type: [integer, "null"]
        baseline_sha:
          type: [string, "null"]
          description: |
            Commit SHA of the prior run's threat model. `null` on the
            very first assessment (no prior state to diff against).
        current_sha:
          type: [string, "null"]
        changed_files:
          type: [integer, "null"]
          minimum: 0
        changed_lines:
          # Code-churn magnitude from `git diff --shortstat baseline..HEAD`.
          # Optional — populated when a baseline commit is available. The
          # rendered changelog bullet shows `(+<insertions>/-<deletions> lines)`
          # alongside the file count so reviewers see scope at a glance.
          type: [object, "null"]
          additionalProperties: false
          properties:
            insertions: { type: integer, minimum: 0 }
            deletions:  { type: integer, minimum: 0 }
        reanalyzed_components:
          type: array
          items: { type: string }
        carried_forward_components:
          type: array
          items: { type: string }
        low_risk_skipped_components:
          type: array
          items: { type: string }
        added:
          type: object
          additionalProperties: true
          properties:
            threats:
              type: array
              items:
                type: string
                pattern: "^T-\\d{3,}$"
            components:
              type: array
              items: { type: string }
            attack_surface:
              type: array
              items: { type: string }
        changed:
          type: object
          additionalProperties: true
          properties:
            threats:
              type: array
              items:
                type: string
                pattern: "^T-\\d{3,}$"
            notes_by_id:
              type: object
              additionalProperties: { type: string }
              propertyNames:
                pattern: "^T-\\d{3,}$"
        resolved:
          type: object
          additionalProperties: true
          properties:
            threats:
              type: array
              items:
                type: string
                pattern: "^T-\\d{3,}$"
            reason_by_id:
              type: object
              additionalProperties: { type: string }
              propertyNames:
                pattern: "^T-\\d{3,}$"
        note:
          type: [string, "null"]

  components:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [id, name]
      properties:
        id:          { type: string, minLength: 1 }
        name:        { type: string, minLength: 1 }
        description: { type: [string, "null"] }
        paths:
          type: array
          items: { type: string }
        complexity:
          type: string
          enum: [simple, moderate, complex]
        tier:
          type: string
          enum: [client, application, data]

  tier_root_causes:
    # Per-tier architectural root causes (terse bullet items) consumed by the
    # `Security Posture at a Glance` Tier Drill-Down table. Optional — when
    # absent the renderer emits the heatmap without root-cause rows.
    # Size-capped to keep the heatmap diagram readable: ≤80 chars per item,
    # ≤5 items per tier. Phase 9/10b authors this; the schema enforces the
    # caps so the LLM cannot inflate the diagram.
    type: [object, "null"]
    additionalProperties: false
    properties:
      edge:
        type: array
        maxItems: 5
        items: { type: string, maxLength: 80 }
      server:
        type: array
        maxItems: 5
        items: { type: string, maxLength: 80 }
      data:
        type: array
        maxItems: 5
        items: { type: string, maxLength: 80 }

  assets:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [name, classification]
      properties:
        name:           { type: string, minLength: 1 }
        classification:
          type: string
          enum: [Public, Internal, Confidential, Restricted]
        description:    { type: [string, "null"] }

  attack_surface:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [entry_point, protocol]
      properties:
        entry_point:   { type: string, minLength: 1 }
        protocol:      { type: string }
        auth_required: { type: [boolean, "null"] }
        notes:         { type: [string, "null"] }

  trust_boundaries:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [name]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: [string, "null"] }

  security_controls:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [domain, control, effectiveness]
      properties:
        domain:         { type: string }
        control:        { type: string }
        # `kind` remains backward-compatible for lean control inventories.
        # v2 no longer treats `mechanism` as "must become a 7.3.N Flow"; the
        # rendered §7 architecture groups controls by category and may render
        # mechanisms, primitives, lifecycle controls, and surfaces as peer
        # subcontrols under the relevant category.
        # Optional for backward compatibility — when absent, the pregenerator
        # falls back to canonicalising via architectural-controls.yaml `kind`
        # field (or treats the row as `primitive` if no canonical match).
        kind:
          type: string
          enum: [mechanism, primitive, cross-cutting, lifecycle, surface, summary, not_applicable]
        section:       { type: [string, "null"] }
        section_title: { type: [string, "null"] }
        verdict:       { type: [string, "null"] }
        main_reason:   { type: [string, "null"] }
        controls_covered:
          type: array
          items: { type: string }
        implemented_controls:
          type: array
          items: { type: string }
        assessment: { type: [string, "null"] }
        implementation: { type: [string, "null"] }
        effectiveness:
          type: string
          enum: [Adequate, Partial, Weak, Unsafe, Missing]
        linked_threats:
          type: array
          items:
            type: string
        subcontrols:
          type: array
          items:
            type: object
            additionalProperties: true
            required: [title]
            properties:
              title: { type: string, minLength: 1 }
              type:
                type: string
                enum: [flow, primitive, lifecycle, surface, summary, not_applicable]
              implementation: { type: [string, "null"] }
              assessment: { type: [string, "null"] }
              evidence:
                type: array
                items:
                  type: object
                  additionalProperties: true
              sequence_diagram: { type: [string, "null"] }
              code_excerpt: { type: [string, "null"] }
              relevant_findings:
                type: array
                items: { type: string }
              no_dedicated_finding: { type: boolean }

  security_architecture:
    type: object
    additionalProperties: true
    properties:
      schema:
        type: string
        enum: [v1, v2]
      sections:
        type: array
        items:
          type: object
          additionalProperties: true
          required: [title]
          properties:
            title: { type: string, minLength: 1 }
            verdict: { type: [string, "null"] }
            main_reason: { type: [string, "null"] }
            controls_covered:
              type: array
              items: { type: string }
            implemented_controls:
              type: array
              items: { type: string }
            assessment: { type: [string, "null"] }
            subcontrols:
              type: array
              items:
                type: object
                additionalProperties: true
                required: [title]
                properties:
                  title: { type: string, minLength: 1 }
                  type:
                    type: string
                    enum: [flow, primitive, lifecycle, surface, summary, not_applicable]
                  assessment: { type: [string, "null"] }
                  relevant_findings:
                    type: array
                    items: { type: string }
            pattern: "^T-\\d{3,}$"

  threats:
    type: array
    items:
      type: object
      additionalProperties: true
      required:
        - id
        - component
        - stride
        - title
        - scenario
        - likelihood
        - impact
        - risk
      properties:
        id:
          type: string
          pattern: "^T-\\d{3,}$"
        component:   { type: string }
        stride:
          type: string
          enum:
            - Spoofing
            - Tampering
            - Repudiation
            - Information Disclosure
            - Denial of Service
            - Elevation of Privilege
        title:
          # Canonical title stored verbatim in yaml. The renderer transforms
          # this into the short xref form documented below before emitting.
          # AGENTS.md §4a cross-reference invariant depends on this field.
          #
          # Storage format (yaml):
          #     "<Weakness class> (<file[:line]>)"               canonical
          # Optional sibling field `affected_parameter` carries the input
          # parameter name when one applies.
          #
          # RENDERED form for cross-references (M3.13 — emitted by
          # _shorten_title_for_xref in compose_threat_model.py):
          #     "<Weakness class> in file <path> (param \"<name>\")"   with param
          #     "<Weakness class> in file <path>"                      no param
          #     "<Weakness class> in <path>"                           directory path
          #     "<Weakness class>"                                     cross-cutting
          #
          # Examples (storage → rendered):
          #     "SQL Injection (routes/login.ts:34)" + param="email"
          #       → "SQL Injection in file routes/login.ts (param \"email\")"
          #     "Hardcoded Cryptographic Key (lib/insecurity.ts:23)"
          #       → "Hardcoded Cryptographic Key in file lib/insecurity.ts"
          #     "Insecure Token Storage (frontend/src/app/Services)"
          #       → "Insecure Token Storage in frontend/src/app/Services"
          #
          # Rules:
          #   - <Weakness class> = library-agnostic CWE-canonical noun phrase.
          #     Examples: "SQL Injection", "Cross-Site Scripting", "Insecure
          #     Direct Object Reference". NEVER include library versions
          #     ("express-jwt@0.1.3"), payloads ("UNION-based"), or code
          #     options ("noent:true") in the weakness class.
          #   - <affected_parameter> = the request/URL/cookie/header parameter
          #     or input field name carrying the attacker-controlled value
          #     (e.g. "email", "q", "id", "X-Forwarded-For"). Optional but
          #     RECOMMENDED for injection / authz / IDOR / XSS / SSRF /
          #     open-redirect findings. Omit ONLY when the finding has no
          #     single attacker-controlled parameter (e.g. hardcoded key,
          #     missing CSP, outdated dependency).
          #   - <file[:line]> = repo-relative path; line number optional but
          #     RECOMMENDED. Always inside the trailing parenthesis.
          #   - The 80-char ceiling keeps table columns scannable. Trim the
          #     parameter or path basename if you run over.
          #
          # bad_title_substrings (2026-05) — substrings that MUST NOT appear
          # anywhere in the title string. The JSON-Schema layer can only
          # enforce the regex `pattern`; the deterministic validator in
          # scripts/qa_checks.py (`title_substring_blocklist` check) reads
          # this list and fails the run when any substring matches:
          #     "@0.", "@1.", "@2.", "@3.", "@4."   (library@version form)
          #     "alg:none", "noent:true", "package-lock=false"
          #     "bypassSecurityTrustHtml", "crypto.createHash"
          #     "eval(", "models.sequelize.query", "app.use("
          #     "(CVE-"
          # The regex below tightens the pattern so common offenders
          # (`@`, ` — `, leading backticks, `:` outside the trailing
          # parens) hard-fail at JSON-Schema time too.
          type: string
          minLength: 10
          maxLength: 80
          pattern: "^[A-Z][^()@`]+?(?:\\s*\\([^()]+\\))?$"
          not:
            anyOf:
              - { pattern: "@\\d" }
              - { pattern: "alg:none" }
              - { pattern: "noent:true" }
              - { pattern: "bypassSecurityTrustHtml" }
              - { pattern: "crypto\\.createHash" }
              - { pattern: "\\(CVE-" }
              - { pattern: "package-lock=false" }
              - { pattern: "models\\.sequelize\\.query" }
        affected_parameter:
          # Structured form of the parameter referenced inside the title's
          # parens. When present, the renderer reads this field for short-
          # title cells and falls back to parsing the title only when this
          # is absent. Encouraged but not strictly required by the schema.
          type: [string, "null"]
          maxLength: 40
        scenario:
          type: string
          minLength: 10
        evidence_summary:
          # One-sentence prose claim describing WHAT the snippet in
          # `evidence[]` demonstrates. Distinct from `scenario` (attack
          # narrative). Rendered in §8 Threat Register as the
          # `**Evidence:**` line above the collapsible code excerpt.
          # Optional — composer synthesises a CWE-class-based fallback
          # when absent, but operator-authored prose is preferred for
          # Critical/High findings.
          type: [string, "null"]
          minLength: 20
        evidence_prose:
          # Legacy alias for `evidence_summary`. Preserved so older
          # threat-model.yaml files load against the current schema.
          type: [string, "null"]
        impact_description:
          # One-sentence concrete consequence statement. Rendered as the
          # `**Impact:**` line in §8 Threat Register. Optional — composer
          # falls back to the last sentence of `scenario` when absent.
          # Always rendered for Critical/High; deduped against `scenario`
          # only at Medium/Low.
          type: [string, "null"]
          minLength: 20
        impact_summary:
          # Legacy alias for `impact_description`.
          type: [string, "null"]
        likelihood:
          type: string
          enum: [Critical, High, Medium, Low, Informational]
        impact:
          type: string
          enum: [Critical, High, Medium, Low, Informational]
        risk:
          type: string
          enum: [Critical, High, Medium, Low, Informational]
        # ---- Actor Layer fields (actors.md §10) — additive, optional ----
        actor_ids:
          # Stable ACT-* IDs of actors who can exploit this threat. Empty list
          # means no plausible actor from the component's slice produced this
          # finding; composer renders [obsolete-actor] marker when a previously
          # tagged threat lands here in a re-run.
          type: array
          items:
            type: string
            pattern: "^ACT-[A-Z]-\\d+$"
        primary_actor:
          # Single ACT-* ID — argmax actor_adjusted_likelihood with
          # lexicographic tiebreak (reach-equivalence override per actors.md §10).
          type: [string, "null"]
          pattern: "^ACT-[A-Z]-\\d+$"
        base_likelihood:
          # Numeric mapping of `likelihood` enum (Critical=1.0…Informational=0.2).
          type: [number, "null"]
          minimum: 0.0
          maximum: 1.0
        actor_adjusted_likelihood:
          # base_likelihood × primary_actor.severity_modulation[threat_category_id];
          # multiplier constrained to [0.5, 1.5] by the plugin schema.
          type: [number, "null"]
          minimum: 0.0
          maximum: 1.5
        _status:
          # Stable-ID lifecycle marker (actors.md §10 Fall 3): "dormant" when a
          # finding's structurally-required actor was disabled — preserved for
          # review instead of removed.
          type: [string, "null"]
          enum: [active, dormant, null]
        cwe:
          type: [string, "null"]
          pattern: "^CWE-\\d+$"
        evidence:
          type: array
          items:
            type: object
            additionalProperties: true
            required: [file]
            properties:
              file: { type: string }
              line: { type: [integer, "null"] }
        controls_in_place:
          type: [string, "null"]
        mitigation_ids:
          type: array
          items:
            type: string
            pattern: "^M-\\d{3,}$"
        violated_requirements:
          type: array
          items: { type: string }
        triage_flags:
          type: array
        evidence_check:
          # Verification status of the cited evidence. See
          # schemas/threats-merged.schema.yaml and
          # agents/appsec-evidence-verifier.md for the full state
          # machine. Renderers may surface this as a small marker in
          # the Threat Register row.
          type: [string, "null"]
          enum: [verified, verified-prior, refuted, ambiguous, unchecked, null]
        evidence_flags:
          # Parallel to triage_flags. Populated by the
          # appsec-evidence-verifier sub-agent. Opaque to the schema.
          type: array
        controls_absent_evidence:
          # Mirrors the .threats-merged.json field; see that schema for
          # detail. Carries the absence-grep proof that justifies a
          # "control X is missing" finding.
          type: [array, "null"]
        prior_finding_ref:
          type: [string, "null"]
          description: >
            ID from docs/known-threats.yaml that this threat was raised against.
            Set by STRIDE analyzers when the KNOWN_THREATS_INDEX signals a
            pre-existing finding; preserved through merge/finalize.
        remediation_reference:
          type: [string, "null"]
          description: >
            Optional direct URL (CWE entry, OWASP cheat-sheet, internal blueprint)
            for the threat. Consumed by `scripts/export_sarif.py` as the SARIF
            `rule.helpUri`. When null, the exporter falls back to the first
            non-null `mitigations[m].reference` reachable via `mitigation_ids`.
        source:
          type: string
          enum:
            - stride
            - requirements-compliance
            - architectural-anti-pattern
            - known-vuln
            - dep-scan
            - coverage-gap
            - known-threats
            - architecture-coverage
            - threat-hypothesis
            - config-scan
            # M-3: Implementation-defect — see threats-merged.schema.yaml.
            - configuration-defect
        rule_id:
          # Stable trace key for source in {architecture-coverage,
          # threat-hypothesis}. Format ARCH-<TOKEN>-NNN. See
          # data/architecture-coverage-rules.yaml.
          type: [string, "null"]
          pattern: "^ARCH-[A-Z]+-[0-9]{3}$"
        hypothesis_id:
          # Trace back to threat_hypotheses[] when a hypothesis was
          # promoted (proof_state=confirmed).
          type: [string, "null"]
          pattern: "^ARCH-HYP-[A-Z]+-[0-9]{3}$"
        architectural_theme:
          type: [string, "null"]
          enum:
            - Separation
            - SecretManagement
            - DefenseInDepth
            - InputValidation
            - Authorization
            - Authentication
            - NetworkSegmentation
            - DataProtection
            - AuditLogging
            - SupplyChain
            - SecureDefaults
            - LeastPrivilege
            - InsecureDesign
            - AttackSurfaceDesign
            - SessionDesign
            - null
        generic_threat_title:
          type: [string, "null"]
          minLength: 5
          maxLength: 120
        cvss_v4:
          # Optional CVSS v4.0 score. Only present for threats whose CWE is
          # on the eligibility list (data/cvss-eligible-cwes.yaml)
          # and that carry concrete code-level evidence — typically
          # source=dep-scan, source=known-vuln, or source=stride for
          # injection/auth-bypass-class CWEs with file:line evidence.
          # Threats sourced from architectural-anti-pattern,
          # requirements-compliance, coverage-gap, architecture-coverage,
          # or threat-hypothesis MUST NOT carry a CVSS vector — design,
          # policy, and architecture-coverage gaps cannot be honestly
          # scored on the CVSS Base metrics.
          oneOf:
            - type: "null"
            - type: object
              required: [vector, base_score, severity, source]
              additionalProperties: false
              properties:
                vector:
                  type: string
                  pattern: "^CVSS:4\\.0(/[A-Z]+:[A-Z0-9]+)+$"
                base_score:
                  type: number
                  minimum: 0.0
                  maximum: 10.0
                severity:
                  type: string
                  enum: [None, Low, Medium, High, Critical]
                source:
                  type: string
                  enum: [stride-analyzer, dep-scan, nvd, osv, known-vuln, manual]
                version_fallback:
                  type: [string, "null"]
                  enum: ["3.1", null]

  mitigations:
    # Canonical field names: `title` (NOT `mitigation_title`) and
    # `threat_ids` (NOT `addresses`). The STRIDE intermediate at
    # `.stride-*.json` uses `mitigation_title` inside each threat's
    # `remediation` block — that is intermediate-only. When the
    # orchestrator consolidates per-threat remediations into the final
    # `mitigations[]` register, it MUST rename the field to `title`.
    # See agents/phases/phase-group-threats.md → "Build Mitigation
    # Register" → "Canonical yaml shape" for the worked example.
    type: array
    items:
      type: object
      additionalProperties: true
      required: [id, title, threat_ids, priority]
      properties:
        id:
          type: string
          pattern: "^M-\\d{3,}$"
        title:
          type: string
          minLength: 1
        threat_ids:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"
        priority:
          type: string
          enum: [P1, P2, P3, P4]
        severity:
          type: string
          enum: [Critical, High, Medium, Low, Informational]
        effort:
          type: string
          enum: [Low, Medium, High]
        kind:
          # M-RCA-2026-05: classify mitigations by the action they require.
          #   fix          — concrete code/config change (default — preserves
          #                  pre-2026-05 behaviour). Renders as 🔧 in §9.
          #   review       — manual code review by a developer familiar with
          #                  the affected file. Emitted automatically for
          #                  findings with `evidence_check ∈ {ambiguous,
          #                  refuted}` or with no other M-NNN linkage.
          #                  Renders as 🔍 in §9.
          #   investigate  — architectural / process-level review at the
          #                  component or theme level. Emitted for
          #                  source ∈ {architectural-anti-pattern,
          #                  coverage-gap} where no source-to-sink evidence
          #                  exists. Renders as 🧭 in §9.
          #   accept_risk  — explicitly-accepted residual risk, mirroring
          #                  meta.accepted_risks[]. Renders as 🛈 in §9.
          # The Top Findings table phrases the action per-kind: "Apply
          # M-001" for fix, "Review at routes/x.ts" for review, "Investigate
          # <pattern>" for investigate, "Accepted" for accept_risk.
          type: string
          enum: [fix, review, investigate, accept_risk]
        review_target:
          # Optional only when kind = review. Source-tree file (or
          # file:line) the reviewer should focus on. The composer uses
          # this to render the per-kind action label in §1 Top Findings.
          type: [string, "null"]
        review_reason:
          # Optional only when kind = review. One-line rationale so the
          # reviewer knows WHY this is a review and not a fix (e.g.
          # "evidence-verifier returned ambiguous").
          type: [string, "null"]
        steps:
          type: array
          items: { type: string }
        code_example:
          type: [string, "null"]
        verification:
          type: [string, "null"]
        reference:
          type: [string, "null"]
        fulfills_requirements:
          type: array
          items: { type: string }

  critical_findings:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [threat_id, summary]
      properties:
        threat_id:
          type: string
          pattern: "^T-\\d{3,}$"
        mitigation_id:
          type: [string, "null"]
          pattern: "^M-\\d{3,}$"
        summary:
          type: string

  # Optional blocks documented in CLAUDE.md but not always present.
  run_statistics:
    type: [object, "null"]
    additionalProperties: true

  cross_repo_dependencies:
    type: [array, "null"]
    items:
      type: object
      additionalProperties: true

  meta_findings:
    # M-4: Cross-cutting architectural meta-findings — aggregated process
    # gaps that span multiple individual threats. Examples: "Insufficient
    # Patch Management" derived from ≥2 dep-scan findings; "Insufficient
    # Secret Management" derived from ≥2 configuration-defect findings.
    #
    # Meta-findings DO NOT use T-NNN ids (T-NNN is a contiguous sequence
    # asserted by validate_intermediate._check_t_id_sequence). They carry
    # their own MF-NNN prefix and link back to the underlying T-NNN list
    # via `derived_from`. Renders in §7 as "Architectural Process Gaps"
    # callouts and in §9 Mitigation Register as a separate block.
    type: [array, "null"]
    items:
      type: object
      additionalProperties: true
      required: [id, title, category, derived_from, summary]
      properties:
        id:
          type: string
          pattern: "^MF-\\d{3,}$"
        title:
          type: string
          minLength: 1
          maxLength: 100
        category:
          # The process-gap classification. Extend cautiously — every entry
          # here must be a stable architectural concept, not a one-off.
          type: string
          enum:
            - Insufficient Patch Management
            - Insufficient Secret Management
            - Insufficient Configuration Hardening
        summary:
          type: string
          minLength: 1
        derived_from:
          # T-NNN ids of the underlying findings that triggered this
          # meta-finding. The renderer uses this for back-links.
          type: array
          minItems: 2
          items:
            type: string
            pattern: "^T-\\d{3,}$"
        severity:
          type: string
          enum: [Critical, High, Medium, Low, Informational]
        recommended_mitigation_id:
          # Optional pointer to a mitigations[] entry that addresses this
          # process gap (e.g. "establish dependency-update SLA").
          type: [string, "null"]
          pattern: "^M-\\d{3,}$"

  threat_hypotheses:
    # Persisted from $OUTPUT_DIR/.architecture-coverage.json by Phase 11.
    # Renders in Section 7.2 as "Threat Hypotheses Requiring Validation".
    # MUST NOT appear in Section 8 Threat Register, MUST NOT carry a
    # T-NNN / F-NNN id, MUST NOT carry CVSS, MUST NOT be Critical.
    # Promotion path: hypothesis_id stays here; the promoted threat lives
    # in threats[] with source=threat-hypothesis and hypothesis_id pointing
    # back to this list. See schemas/architecture-coverage.schema.json.
    type: [array, "null"]
    items:
      type: object
      additionalProperties: true
      required:
        - id
        - source_hypothesis_id
        - rule_id
        - title
        - threat_category_id
        - cwe
        - proof_state
        - confidence
      properties:
        id:
          type: string
          pattern: "^HYP-\\d{3,}$"
        source_hypothesis_id:
          type: string
          pattern: "^ARCH-HYP-[A-Z]+-[0-9]{3}$"
        rule_id:
          type: string
          pattern: "^ARCH-[A-Z]+-[0-9]{3}$"
        title:
          type: string
        architectural_theme:
          type: [string, "null"]
          enum:
            - Separation
            - SecretManagement
            - DefenseInDepth
            - InputValidation
            - Authorization
            - Authentication
            - NetworkSegmentation
            - DataProtection
            - AuditLogging
            - SupplyChain
            - SecureDefaults
            - LeastPrivilege
            - InsecureDesign
            - AttackSurfaceDesign
            - SessionDesign
            - null
        generic_threat_title:
          type: [string, "null"]
          minLength: 5
          maxLength: 120
        threat_category_id:
          type: string
          pattern: "^TH-[0-9]{2}$"
        stride:
          type: string
          enum: [Spoofing, Tampering, Repudiation, InformationDisclosure, DenialOfService, ElevationOfPrivilege]
        cwe:
          type: string
          pattern: "^CWE-\\d+$"
        component_id:
          type: [string, "null"]
        domain:
          type: [string, "null"]
        surface:
          type: [string, "null"]
        proof_state:
          type: string
          enum: [control-derived, evidence-backed, confirmed]
        confidence:
          type: string
          enum: [low, medium, high]
        linked_control_ids:
          type: array
          items:
            type: string
            pattern: "^SC-\\d{3,}$"
        linked_threat_ids:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"
        promoted_threat_id:
          # Set when proof_state=confirmed AND a corresponding threats[]
          # entry was created with source=threat-hypothesis.
          type: [string, "null"]
          pattern: "^T-\\d{3,}$"
        evidence:
          type: array
          items:
            type: object
            required: [file, line, signal]
            properties:
              file: { type: string }
              line: { type: integer }
              signal: { type: string }
        validation_objective:
          # Renderer prints this as the "Validation" column of Section 7.2.
          type: string
