$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-advisor/schemas/threat-model.output.schema.yaml
title: threat-model.yaml — external machine-readable export
description: |
  Final output contract for `$OUTPUT_DIR/threat-model.yaml`. This is the
  structured export that downstream consumers (CI/CD, DefectDojo, SonarQube,
  sibling threat models via cross-repo discovery) depend on. Schema drift
  breaks integrations silently — producers MUST validate against this file.

  Extensibility: the schema allows additional properties at the top level
  and inside every major list item so future fields (run_statistics,
  cross_repo_dependencies, triage_flags, …) can be added without breaking
  consumers. Remove `additionalProperties: true` hints to tighten.

type: object
additionalProperties: true

required:
  - meta
  - components
  - assets
  - attack_surface
  - trust_boundaries
  - security_controls
  - threats
  - mitigations

properties:

  meta:
    type: object
    additionalProperties: true
    required: [schema_version, project, generated, mode, model]
    properties:
      schema_version:
        const: 1
      project:
        type: string
      generated:
        type: string
        description: ISO-8601 timestamp
      analysis_duration_seconds:
        type: [integer, "null"]
        minimum: 0
      mode:
        type: string
        enum: [full, incremental]
      analyst:
        type: string
      model:
        type: string
      compliance_scope:
        type: array
        items: { type: string }
      asset_classification:
        type: [string, "null"]
      repo_url:
        type: [string, "null"]
      team_owner:
        type: [string, "null"]
      git:
        type: [object, "null"]
        additionalProperties: true
        properties:
          commit_sha: { type: string }
          branch:     { type: string }
      id_counters:
        type: [object, "null"]
        additionalProperties: true
        properties:
          next_threat_id:
            type: string
            pattern: "^T-\\d{3,}$"
          next_mitigation_id:
            type: string
            pattern: "^M-\\d{3,}$"
      accepted_risks:
        # Team-provided risks from `docs/known-threats.yaml` with `status: accepted`.
        # Phase 1 extracts these and the orchestrator emits them here during
        # Phase 11 yaml composition. The deterministic §10 fragment generator
        # (`scripts/pregenerate_fragments.py → gen_out_of_scope`) renders them
        # as an "Accepted Risks (Team-Provided)" sub-section in §10 Out of Scope.
        # Without this list the accepted entries would silently disappear from
        # the report (STRIDE skips them; QA Check 5 excludes them by design).
        type: [array, "null"]
        items:
          type: object
          additionalProperties: true
          required: [id, title, severity, justification]
          properties:
            id:            { type: string, minLength: 1 }
            title:         { type: string, minLength: 1 }
            stride:        { type: [string, "null"] }
            component:     { type: [string, "null"], description: "Canonical component id when mappable; original alias preserved here for trace." }
            severity:
              type: string
              enum: [Critical, High, Medium, Low]
            justification: { type: string, minLength: 1, description: "Verbatim `accepted_risk` field from known-threats.yaml." }
            evidence:      { type: [string, "null"] }
            pentest_ref:   { type: [string, "null"] }

  changelog:
    # Append-only history of assessment runs, newest first.
    # Shape is pinned by agents/phases/phase-group-finalization.md
    # §"Changelog Entry Composition" and consumed by:
    #   * templates/fragments/changelog.md.j2 (markdown rendering)
    #   * scripts/render_completion_summary.py (console Change Summary)
    #   * scripts/baseline_state.py (carry-forward / id counter refresh)
    type: array
    items:
      type: object
      additionalProperties: true
      required: [version, date, mode]
      properties:
        version:
          type: integer
          minimum: 1
        date:
          type: string
        mode:
          type: string
          enum: [full, incremental]
        # Per-run parametrization (added 2026-05). Lets the changelog table
        # show how each historical run was configured (depth + reasoning
        # tier + raw invocation). Optional for backward-compat with pre-2026-05
        # baselines; new runs always emit them.
        assessment_depth:
          type: [string, "null"]
          enum: [quick, standard, thorough, null]
        reasoning_model:
          type: [string, "null"]
          description: |
            Reasoning tier label resolved by `--reasoning-model`
            (e.g. `haiku-economy`, `opus-cheap`, `opus`, `sonnet`).
        invocation:
          type: [string, "null"]
          description: |
            Raw command-line arguments captured by the skill before parsing
            (e.g. `--quick --sarif`). Empty string when no args were passed.
        plugin_version:
          type: [string, "null"]
        analysis_version:
          type: [integer, "null"]
        baseline_sha:
          type: [string, "null"]
          description: |
            Commit SHA of the prior run's threat model. `null` on the
            very first assessment (no prior state to diff against).
        current_sha:
          type: [string, "null"]
        changed_files:
          type: [integer, "null"]
          minimum: 0
        changed_lines:
          # Code-churn magnitude from `git diff --shortstat baseline..HEAD`.
          # Optional — populated when a baseline commit is available. The
          # rendered changelog bullet shows `(+<insertions>/-<deletions> lines)`
          # alongside the file count so reviewers see scope at a glance.
          type: [object, "null"]
          additionalProperties: false
          properties:
            insertions: { type: integer, minimum: 0 }
            deletions:  { type: integer, minimum: 0 }
        reanalyzed_components:
          type: array
          items: { type: string }
        carried_forward_components:
          type: array
          items: { type: string }
        low_risk_skipped_components:
          type: array
          items: { type: string }
        added:
          type: object
          additionalProperties: true
          properties:
            threats:
              type: array
              items:
                type: string
                pattern: "^T-\\d{3,}$"
            components:
              type: array
              items: { type: string }
            attack_surface:
              type: array
              items: { type: string }
        changed:
          type: object
          additionalProperties: true
          properties:
            threats:
              type: array
              items:
                type: string
                pattern: "^T-\\d{3,}$"
            notes_by_id:
              type: object
              additionalProperties: { type: string }
              propertyNames:
                pattern: "^T-\\d{3,}$"
        resolved:
          type: object
          additionalProperties: true
          properties:
            threats:
              type: array
              items:
                type: string
                pattern: "^T-\\d{3,}$"
            reason_by_id:
              type: object
              additionalProperties: { type: string }
              propertyNames:
                pattern: "^T-\\d{3,}$"
        note:
          type: [string, "null"]

  components:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [id, name]
      properties:
        id:          { type: string, minLength: 1 }
        name:        { type: string, minLength: 1 }
        description: { type: [string, "null"] }
        paths:
          type: array
          items: { type: string }
        complexity:
          type: string
          enum: [simple, moderate, complex]
        tier:
          type: string
          enum: [client, application, data]

  tier_root_causes:
    # Per-tier architectural root causes (terse bullet items) consumed by the
    # `Security Posture at a Glance` Tier Drill-Down table. Optional — when
    # absent the renderer emits the heatmap without root-cause rows.
    # Size-capped to keep the heatmap diagram readable: ≤80 chars per item,
    # ≤5 items per tier. Phase 9/10b authors this; the schema enforces the
    # caps so the LLM cannot inflate the diagram.
    type: [object, "null"]
    additionalProperties: false
    properties:
      edge:
        type: array
        maxItems: 5
        items: { type: string, maxLength: 80 }
      server:
        type: array
        maxItems: 5
        items: { type: string, maxLength: 80 }
      data:
        type: array
        maxItems: 5
        items: { type: string, maxLength: 80 }

  assets:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [name, classification]
      properties:
        name:           { type: string, minLength: 1 }
        classification:
          type: string
          enum: [Public, Internal, Confidential, Restricted]
        description:    { type: [string, "null"] }

  attack_surface:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [entry_point, protocol]
      properties:
        entry_point:   { type: string, minLength: 1 }
        protocol:      { type: string }
        auth_required: { type: [boolean, "null"] }
        notes:         { type: [string, "null"] }

  trust_boundaries:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [name]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: [string, "null"] }

  security_controls:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [domain, control, effectiveness]
      properties:
        domain:         { type: string }
        control:        { type: string }
        # `kind` discriminates how the control participates in the §7.3
        # rendering pipeline:
        #   mechanism    — earns its own `#### 7.3.N <name> Flow` sub-block.
        #                  Examples: Password Login, OAuth, mTLS, Webhook HMAC,
        #                  AWS IAM Role Assumption, Kubernetes ServiceAccount.
        #   primitive    — appears only in the §7.3 overview controls table,
        #                  never as a Flow sub-block. Examples: Password
        #                  Hashing, JWT Signature Verification, Rate Limiting,
        #                  Session Token Revocation.
        #   cross-cutting — applies across multiple domains; renders in
        #                   §7.13 (Secret Management) or §7.14 (Defense-in-
        #                   Depth) rather than under any one IAM/AuthZ block.
        # Optional for backward compatibility — when absent, the pregenerator
        # falls back to canonicalising via architectural-controls.yaml `kind`
        # field (or treats the row as `primitive` if no canonical match).
        kind:
          type: string
          enum: [mechanism, primitive, cross-cutting]
        implementation: { type: [string, "null"] }
        effectiveness:
          type: string
          enum: [Adequate, Partial, Weak, Missing]
        linked_threats:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"

  threats:
    type: array
    items:
      type: object
      additionalProperties: true
      required:
        - id
        - component
        - stride
        - title
        - scenario
        - likelihood
        - impact
        - risk
      properties:
        id:
          type: string
          pattern: "^T-\\d{3,}$"
        component:   { type: string }
        stride:
          type: string
          enum:
            - Spoofing
            - Tampering
            - Repudiation
            - Information Disclosure
            - Denial of Service
            - Elevation of Privilege
        title:
          # Short action-noun label used wherever the T-NNN / F-NNN id is
          # cross-referenced ([T-001](#t-001) — <title>). Must be MUST be
          # carried over verbatim from .threats-merged.json[].title (which
          # in turn comes from the STRIDE analyzer). The cross-reference
          # labelling invariant in AGENTS.md §4a depends on this field.
          type: string
          minLength: 10
          maxLength: 100
        scenario:
          type: string
          minLength: 10
        likelihood:
          type: string
          enum: [Critical, High, Medium, Low]
        impact:
          type: string
          enum: [Critical, High, Medium, Low]
        risk:
          type: string
          enum: [Critical, High, Medium, Low]
        cwe:
          type: [string, "null"]
          pattern: "^CWE-\\d+$"
        evidence:
          type: array
          items:
            type: object
            additionalProperties: true
            required: [file]
            properties:
              file: { type: string }
              line: { type: [integer, "null"] }
        controls_in_place:
          type: [string, "null"]
        mitigation_ids:
          type: array
          items:
            type: string
            pattern: "^M-\\d{3,}$"
        violated_requirements:
          type: array
          items: { type: string }
        triage_flags:
          type: array
        prior_finding_ref:
          type: [string, "null"]
          description: >
            ID from docs/known-threats.yaml that this threat was raised against.
            Set by STRIDE analyzers when the KNOWN_THREATS_INDEX signals a
            pre-existing finding; preserved through merge/finalize.
        source:
          type: string
          enum:
            - stride
            - requirements-compliance
            - architectural-anti-pattern
            - known-vuln
            - dep-scan
            - coverage-gap
            - known-threats
        cvss_v4:
          # Optional CVSS v4.0 score. Only present for threats whose CWE is
          # on the eligibility list (data/cvss-eligible-cwes.yaml)
          # and that carry concrete code-level evidence — typically
          # source=dep-scan, source=known-vuln, or source=stride for
          # injection/auth-bypass-class CWEs with file:line evidence.
          # Threats sourced from architectural-anti-pattern,
          # requirements-compliance, or coverage-gap MUST NOT carry a CVSS
          # vector — design and policy gaps cannot be honestly scored on
          # the CVSS Base metrics.
          oneOf:
            - type: "null"
            - type: object
              required: [vector, base_score, severity, source]
              additionalProperties: false
              properties:
                vector:
                  type: string
                  pattern: "^CVSS:4\\.0(/[A-Z]+:[A-Z0-9]+)+$"
                base_score:
                  type: number
                  minimum: 0.0
                  maximum: 10.0
                severity:
                  type: string
                  enum: [None, Low, Medium, High, Critical]
                source:
                  type: string
                  enum: [stride-analyzer, dep-scan, nvd, osv, known-vuln, manual]
                version_fallback:
                  type: [string, "null"]
                  enum: ["3.1", null]

  mitigations:
    # Canonical field names: `title` (NOT `mitigation_title`) and
    # `threat_ids` (NOT `addresses`). The STRIDE intermediate at
    # `.stride-*.json` uses `mitigation_title` inside each threat's
    # `remediation` block — that is intermediate-only. When the
    # orchestrator consolidates per-threat remediations into the final
    # `mitigations[]` register, it MUST rename the field to `title`.
    # See agents/phases/phase-group-threats.md → "Build Mitigation
    # Register" → "Canonical yaml shape" for the worked example.
    type: array
    items:
      type: object
      additionalProperties: true
      required: [id, title, threat_ids, priority]
      properties:
        id:
          type: string
          pattern: "^M-\\d{3,}$"
        title:
          type: string
          minLength: 1
        threat_ids:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"
        priority:
          type: string
          enum: [P1, P2, P3, P4]
        severity:
          type: string
          enum: [Critical, High, Medium, Low]
        effort:
          type: string
          enum: [Low, Medium, High]
        steps:
          type: array
          items: { type: string }
        code_example:
          type: [string, "null"]
        verification:
          type: [string, "null"]
        reference:
          type: [string, "null"]
        fulfills_requirements:
          type: array
          items: { type: string }

  critical_findings:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [threat_id, summary]
      properties:
        threat_id:
          type: string
          pattern: "^T-\\d{3,}$"
        mitigation_id:
          type: [string, "null"]
          pattern: "^M-\\d{3,}$"
        summary:
          type: string

  # Optional blocks documented in CLAUDE.md but not always present.
  run_statistics:
    type: [object, "null"]
    additionalProperties: true

  cross_repo_dependencies:
    type: [array, "null"]
    items:
      type: object
      additionalProperties: true
