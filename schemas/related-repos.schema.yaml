$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-advisor/schemas/related-repos.schema.yaml
title: Related repositories input (docs/related-repos.yaml)
description: |
  Optional file that teams place at `docs/related-repos.yaml` in the
  analyzed repository. Read by `appsec-context-resolver` during Phase 1
  to load interface-relevant threats from dependency services into the
  STRIDE analysis context.

  Each entry declares one related repository — a service this repo depends
  on or integrates with. The resolver fetches the dependency's
  `threat-model.yaml` (locally or via HTTP) and extracts open findings at
  the declared interface, injecting them as `CROSS_REPO_CONTEXT` into the
  STRIDE analyzers that handle the corresponding boundary components.

  Filesystem-sibling auto-discovery (scanning the parent workspace
  directory) is a separate, secondary mechanism used only for "TM missing"
  warnings — it does NOT trigger a deep-read. Deep-reads only happen for
  repos explicitly listed here.

type: object
required: [related]
additionalProperties: false

properties:

  related:
    type: array
    minItems: 1
    maxItems: 16
    items:
      type: object
      required: [name, threat_model]
      additionalProperties: false
      properties:

        name:
          type: string
          minLength: 1
          description: >
            Human-readable name for the dependency (used in context output
            and report annotations). Typically the repository or service name.
          examples:
            - auth-service
            - payment-gateway

        threat_model:
          type: string
          minLength: 1
          description: >
            Path or URL to the dependency's threat-model.yaml.
            Accepts:
              - Relative path from REPO_ROOT  (e.g. "../auth-service/docs/security/threat-model.yaml")
              - Absolute local path            (e.g. "/home/user/repos/auth-service/docs/security/threat-model.yaml")
              - HTTP/HTTPS URL                 (e.g. "https://gitlab.internal/auth-service/-/raw/main/docs/security/threat-model.yaml")
          examples:
            - ../auth-service/docs/security/threat-model.yaml
            - https://gitlab.internal/auth-service/-/raw/main/docs/security/threat-model.yaml

        interface:
          type: [string, "null"]
          description: >
            Human-readable description of the boundary endpoint between
            this repo and the dependency. Used for two substring matches:

              (1) Loader matches this string against the dependency's
                  `attack_surface[].entry_point`. When a match is found,
                  protocol, auth_required, handling components and their
                  security_controls are lifted out as `upstream_properties`
                  on the register entry — this is how cross-repo
                  architecture (data flow + boundary controls) becomes
                  visible to STRIDE.

              (2) Slicer matches this string against the analyzed repo's
                  component name, description, declared interfaces and
                  trust boundaries to decide which local component should
                  receive the cross-repo context.

            This field does **not** filter the imported Critical/High
            findings — those come from the dependency's TM regardless of
            `interface:` (see the `components:` field for finding
            filtering by upstream component name).

            Prefer precise interface strings (HTTP method + path, RPC
            service + method, SDK import string, topic name) so both
            substring matches land deterministically.
          examples:
            - POST /api/v1/payments
            - gRPC PaymentService.Charge
            - SDK import (npm @company/payments)
            - WebSocket /ws/notifications

        components:
          type: array
          items:
            type: string
            minLength: 1
          description: >
            Optional list of component names in the dependency's threat model
            to filter findings from. When omitted, findings from all
            components at the declared interface are included.
            Names must match component names as they appear in the
            dependency's threat-model.yaml components[].name field.
          examples:
            - - AuthController
              - TokenService

        expected_auth:
          type: string
          minLength: 1
          description: >
            Optional declaration of the authentication mechanism this repo
            expects the dependency to enforce at the declared interface.
            Compared deterministically against the dependency's
            `attack_surface[].auth_required` / inferred auth signal in
            `load_related_repos.py`; mismatches surface as
            `expectation_mismatch.auth` in the cross-repo register and are
            treated by the STRIDE analyzer as a HIGH-likelihood Spoofing
            or Elevation-of-Privilege hypothesis.
          examples:
            - JWT
            - mTLS
            - api-key
            - session-cookie

        expected_validation:
          type: string
          minLength: 1
          description: >
            Optional declaration of the input-validation regime this repo
            expects the dependency to enforce at the declared interface.
            Compared deterministically against controls extracted from the
            dependency's `security_controls[]`; absence of a matching
            control surfaces as `expectation_mismatch.validation` and is
            treated by the STRIDE analyzer as a Tampering / Information-
            Disclosure hypothesis the consumer must defend against in
            depth.
          examples:
            - schema
            - allow-list
            - sanitization
            - none-required

        auth_env:
          type: string
          minLength: 1
          pattern: '^[A-Z][A-Z0-9_]*$'
          description: >
            Optional name of an environment variable whose value supplies the
            authentication header for the HTTP/HTTPS fetch of this entry's
            threat_model. The variable's value is sent verbatim — either as
            "Header-Name: value" or as a bare value (which is then used as the
            Authorization header).

            Use one auth_env per entry so different upstream SCM instances can
            have different tokens. When omitted, the global
            RELATED_REPOS_AUTH_HEADER env var is used as a fallback. When both
            are unset, the fetch is unauthenticated.

            Only the name is recorded in the loader output — the value is
            never serialised.
          examples:
            - GITLAB_INTERNAL_TOKEN
            - GITHUB_VENDOR_TOKEN
