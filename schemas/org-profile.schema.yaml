$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://appsec-advisor/schemas/org-profile.schema.yaml"
title: AppSec Advisor Org Profile
description: |
  Versioned org profile contract. Org profiles let a company package
  defaults, presets, requirements source, optional markdown LLM context,
  and skill toggles together with the plugin without forking core files.
  Profiles are validated and resolved before Stage 1 of any scan — they
  never inject agent instructions and never replace renderer / QA /
  schema pipelines.

type: object
additionalProperties: false
required:
  - api_version
  - organization
  - compatibility
  - default_preset
  - presets

properties:
  api_version:
    type: string
    enum:
      - appsec-advisor.org-profile/v1
      - appsec-advisor.org-profile/v2

  organization:
    type: object
    additionalProperties: false
    required: [id, name, profile_version]
    properties:
      id:
        type: string
        pattern: "^[a-z0-9][a-z0-9_-]{1,62}$"
      name:
        type: string
        minLength: 1
        maxLength: 120
      profile_version:
        type: string
        minLength: 1
        maxLength: 40
      owner:
        type: string
        maxLength: 120

  compatibility:
    type: object
    additionalProperties: false
    required: [core]
    properties:
      core:
        type: string
        minLength: 1
        maxLength: 80

  policy:
    type: object
    additionalProperties: false
    description: |
      Org-wide run policy. Applies across every preset.
    properties:
      disable_opus:
        type: boolean
        description: |
          When true, every Opus model selection in any preset or run is
          downgraded to Sonnet, regardless of CLI flags (cost/compliance
          ceiling). OR-combined with the CLI flag --no-opus and the env
          var APPSEC_DISABLE_OPUS — any source can enable it, none can
          disable it for a given run.

  default_preset:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]{1,62}$"

  requirements:
    type: object
    additionalProperties: false
    properties:
      source:
        type: object
        additionalProperties: false
        properties:
          requirements_yaml_url:
            type: ["string", "null"]
          human_source_url:
            type: ["string", "null"]
            format: uri
          label:
            type: string
            maxLength: 120
          cache:
            type: boolean
          fail_mode:
            enum: [fail_closed, cache_fallback, disabled_on_fail]
      create_threat_model:
        type: object
        additionalProperties: false
        properties:
          default_active:
            type: boolean
          quick_default_active:
            type: boolean
      standalone_audit:
        type: object
        additionalProperties: false
        properties:
          enabled:
            type: boolean

  llm_context:
    type: object
    additionalProperties: false
    properties:
      documents:
        type: array
        maxItems: 20
        items:
          type: object
          additionalProperties: false
          required: [id, path, purpose]
          properties:
            id:
              type: string
              pattern: "^[a-z0-9][a-z0-9_-]{1,62}$"
            path:
              type: string
              maxLength: 240
            purpose:
              enum:
                - organization_background
                - worst_case_scenarios
                - business_context
                - data_context
                - company_background
                - identity_ecosystem
                - platform_ecosystem
                - trust_zones
                - data_classification
                - security_operations
                - other
            max_bytes:
              type: integer
              minimum: 1024
              maximum: 200000

  security_coach:
    type: object
    additionalProperties: false
    properties:
      enabled_by_default:
        type: boolean
      max_requirements_per_topic:
        type: integer
        minimum: 0
        maximum: 10

  skill_toggles:
    type: object
    additionalProperties:
      oneOf:
        - type: boolean
        - type: object
          additionalProperties: false
          required: [enabled]
          properties:
            enabled:
              type: boolean
            reason:
              type: string
              maxLength: 240

  actors:
    type: object
    additionalProperties: false
    description: |
      Actor-layer configuration for this org profile (api_version v2+).
      v1 profiles are treated as if actors: {inherit_defaults: true, disable: [], add: []}.
    properties:
      inherit_defaults:
        type: boolean
        default: true
        description: >
          Whether to activate the plugin's 9 default actor classes (ACT-D-*).
          Set false only for regulated environments needing a fully controlled
          actor stack — the tool will report coverage gaps vs. default classes.
      disable:
        type: array
        items:
          type: string
          pattern: "^ACT-(D|E|R|X)-[0-9]{1,4}$"
        description: >
          Actor IDs to deactivate. Each deactivated default actor is logged in
          run-issues.json. Enterprise-disable is terminal — repo layer cannot re-enable.
      add:
        type: string
        default: "actors/*.yaml"
        description: >
          Glob (relative to profile directory) for additional actor definition files.
          Each file contains a top-level `actors:` array of actor objects.

  presets:
    type: object
    minProperties: 1
    additionalProperties:
      $ref: "#/$defs/preset"

  abuse_cases:
    type: object
    additionalProperties: false
    description: |
      Controls which abuse-case scenarios (AC-NNN) are evaluated against the
      repository. The plugin standard library
      (data/abuse-cases/default-library.yaml) is activated unless
      inherit_defaults is false; org-specific cases are loaded from the glob in
      `add` (relative to the profile directory) and validated against
      schemas/abuse-cases.schema.yaml.
    properties:
      inherit_defaults:
        type: boolean
        default: true
      disable:
        type: array
        items:
          type: string
          pattern: "^(AC-T|AC|ORG-AC)-[0-9]{3,}$"
      add:
        type: string
        default: "abuse-cases/*.yaml"

$defs:
  preset:
    type: object
    additionalProperties: false
    required: [base_mode]
    properties:
      base_mode:
        enum: [quick, standard, thorough]
      target:
        $ref: "#/$defs/target"
      outputs:
        $ref: "#/$defs/outputs"
      scan:
        $ref: "#/$defs/scan"
      requirements:
        $ref: "#/$defs/preset_requirements"
      context:
        $ref: "#/$defs/preset_context"
      quality:
        $ref: "#/$defs/quality"
      verification:
        $ref: "#/$defs/verification"
      guardrails:
        $ref: "#/$defs/guardrails"

  target:
    type: object
    additionalProperties: false
    properties:
      repo:
        enum: [current, cli_required, profile_default]
      repo_path:
        type: ["string", "null"]
        maxLength: 240
      output_dir:
        type: ["string", "null"]
        maxLength: 240

  outputs:
    type: object
    additionalProperties: false
    properties:
      yaml:
        type: boolean
      sarif:
        type: boolean
      pdf:
        type: boolean
      pentest_tasks:
        type: boolean
      pentest_format:
        enum: [generic, strix]
      pentest_target:
        type: ["string", "null"]
        format: uri

  scan:
    type: object
    additionalProperties: false
    properties:
      incremental:
        enum: ["auto", true, false]
      scan_manifest:
        type: boolean

  preset_requirements:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean

  preset_context:
    type: object
    additionalProperties: false
    properties:
      document_ids:
        type: array
        maxItems: 20
        items:
          type: string
          pattern: "^[a-z0-9][a-z0-9_-]{1,62}$"

  quality:
    type: object
    additionalProperties: false
    properties:
      qa_review:
        enum: [auto, enabled, disabled]
      architecture_enrichment:
        enum: [auto, enabled, disabled]
      architect_review:
        enum: [auto, enabled, disabled]
      attack_walkthroughs:
        enum: [auto, enabled, disabled]

  verification:
    type: object
    additionalProperties: false
    properties:
      evidence_recheck:
        enum: [sampled, full]
      generate_pentest_verification_tasks:
        type: boolean

  guardrails:
    type: object
    additionalProperties: false
    properties:
      max_wall_time:
        type: ["string", "null"]
        pattern: "^[0-9]+(s|m|h)?$"
      max_cost_usd:
        type: ["number", "null"]
        minimum: 0
      max_resumes:
        type: integer
        minimum: 0
        maximum: 10
      tracing:
        type: boolean
      verbose_report:
        type: boolean
