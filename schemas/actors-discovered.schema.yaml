$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://appsec-advisor/schemas/actors-discovered.schema.yaml"
title: Actor Discovery Output
description: |
  Contract for the Phase-2.7 LLM actor-discovery sidecar. Discovery actors
  describe a distinct attacker access or authority position. Attack techniques,
  system features, tools, and benign personas are not actor classes.

type: object
additionalProperties: false
required:
  - schema_version
  - discovery_cache_key
  - generated_at
  - confirmed_relevant
  - proposed_additional
  - inputs_questioned
  - coverage_rationale

properties:
  schema_version:
    const: 1
  discovery_cache_key:
    type: string
    minLength: 1
  generated_at:
    type: string
    minLength: 1
  confirmed_relevant:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, label, relevance_evidence, confidence]
      properties:
        id:
          type: string
          pattern: "^ACT-(D|E|R)-[0-9]{1,4}$"
        label:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        relevance_evidence:
          type: string
          minLength: 10
        confidence:
          type: string
          enum: [high, medium, low]
  proposed_additional:
    type: array
    maxItems: 5
    items:
      $ref: "#/$defs/discovery_actor"
  inputs_questioned:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, label, reason, recommendation]
      properties:
        id:
          type: string
          pattern: "^ACT-(D|E|R)-[0-9]{1,4}$"
        label:
          type: string
          pattern: "^[a-z][a-z0-9-]{1,62}$"
        reason:
          type: string
          minLength: 10
        recommendation:
          const: review_for_disable
  coverage_rationale:
    type: string

$defs:
  discovery_actor:
    type: object
    additionalProperties: false
    required:
      - id
      - label
      - access
      - trust_positions
      - distinct_trust_positions
      - distinct_trust_position_evidence
      - capabilities
      - motivation
      - rationale
      - confidence
      - discovery_method
    properties:
      id:
        type: string
        pattern: "^ACT-X-[0-9]{1,4}$"
      label:
        type: string
        pattern: "^[a-z][a-z0-9-]{1,62}$"
      access:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          minLength: 2
      trust_positions:
        type: array
        minItems: 1
        uniqueItems: true
        description: |
          Stable trust positions held by the actor, separate from deployment
          zones in `access`.
        items:
          type: string
          pattern: "^[a-z][a-z0-9-]*-(reach|credential|authority|control|possession|membership)$"
      distinct_trust_positions:
        type: array
        minItems: 1
        uniqueItems: true
        description: |
          Trust positions present in `trust_positions` that no active static
          actor already has.
        items:
          type: string
          pattern: "^[a-z][a-z0-9-]*-(reach|credential|authority|control|possession|membership)$"
      distinct_trust_position_evidence:
        type: string
        minLength: 20
      capabilities:
        type: object
        additionalProperties: false
        required: [sophistication, tooling, dwell_time, surface_reach]
        properties:
          sophistication:
            type: string
            enum: [high, medium, low]
          tooling:
            type: array
            items:
              type: string
          dwell_time:
            type: string
            enum: [short, weeks, months]
          surface_reach:
            type: array
            minItems: 1
            items:
              type: string
              enum: [local, lateral, persistent, internet]
      motivation:
        type: string
        enum: [financial, disruption, espionage, curiosity, accidental]
      rationale:
        type: string
        minLength: 20
      confidence:
        const: high
      discovery_method:
        type: string
        enum: [heuristic-section-A, heuristic-bypass]
