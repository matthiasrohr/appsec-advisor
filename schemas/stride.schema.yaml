$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-advisor/schemas/stride.schema.yaml
title: Per-component STRIDE analysis result
description: |
  Output written by `appsec-stride-analyzer` to
  `$OUTPUT_DIR/.stride-<component-id>.json`. One file per analyzed
  component. Phase 9 of the orchestrator merges all stride files into
  `.threats-merged.json` after assigning global T-NNN IDs.

type: object
if:
  required: [parse_error]
then:
  $ref: "#/$defs/errorStub"
else:
  $ref: "#/$defs/normal"

$defs:

  stride_category:
    type: string
    enum:
      - Spoofing
      - Tampering
      - Repudiation
      - Information Disclosure
      - Denial of Service
      - Elevation of Privilege

  likelihood:
    type: string
    enum: [High, Medium, Low]

  impact:
    type: string
    enum: [Critical, High, Medium, Low]

  risk:
    type: string
    enum: [Critical, High, Medium, Low]

  cvss_v4:
    # Optional CVSS v4.0 score block. Only permitted when the threat's CWE
    # is on the eligibility list (data/cvss-eligible-cwes.yaml) AND
    # concrete file:line evidence exists. See validate_intermediate.py for
    # the eligibility post-check that enforces this rule across sources.
    type: object
    required: [vector, base_score, severity, source]
    additionalProperties: false
    properties:
      vector:
        type: string
        # CVSS 4.0 base vector: AV/AC/AT/PR/UI + VC/VI/VA + SC/SI/SA at minimum.
        # Further supplemental/environmental metrics are allowed after the
        # base metrics but not required.
        pattern: "^CVSS:4\\.0(/[A-Z]+:[A-Z0-9]+)+$"
      base_score:
        type: number
        minimum: 0.0
        maximum: 10.0
      severity:
        type: string
        enum: [None, Low, Medium, High, Critical]
      source:
        type: string
        enum: [stride-analyzer, dep-scan, nvd, osv, known-vuln, manual]
      version_fallback:
        # Set to "3.1" when the upstream advisory only carries CVSS v3.1 and
        # we did not recompute a v4 vector; vector/base_score/severity in
        # that case reflect the v3.1 values. Consumers MUST check this flag
        # before comparing scores across threats.
        type: [string, "null"]
        enum: ["3.1", null]

  errorStub:
    type: object
    required: [parse_error, threats]
    properties:
      parse_error: { type: string }
      threats:
        type: array
        maxItems: 0

  normal:
    type: object
    required: [component_id, component_name, analyzed_at, threats]
    properties:

      component_id:   { type: string, minLength: 1 }
      component_name: { type: string, minLength: 1 }
      analyzed_at:    { type: string }
      # Write-first stub bookkeeping (appsec-stride-analyzer.md "Write-first
      # guarantee"): present while a component is mid-enumeration, cleared on
      # the final write. Declared so the early stub validates and a future
      # additionalProperties:false tightening will not silently break it.
      started_at:     { type: [string, "null"] }
      partial:        { type: boolean }
      skipped_categories:
        type: array
        items: { $ref: "#/$defs/stride_category" }
      compliance_scope_applied:
        type: array
        items: { type: string }

      resolved_prior_findings:
        # Incremental re-scan only. Prior findings this re-scan affirmatively
        # confirmed FIXED (disposition #2 in appsec-stride-analyzer.md
        # "prior-finding disposition"). The deterministic reconciler in
        # build_threat_model_yaml.py uses this to mark them resolved instead
        # of carrying them forward. Advisory: when omitted, the reconciler
        # conservatively carries unconfirmed priors at shallower depth.
        type: array
        items:
          type: object
          required: [prior_id, reason]
          additionalProperties: false
          properties:
            prior_id: { type: string }
            cwe:      { type: [string, "null"] }
            title:    { type: [string, "null"] }
            reason:   { type: string, maxLength: 200 }

      threats:
        type: array
        items:
          type: object
          required: [local_id, stride, scenario, likelihood, impact, risk]
          properties:
            local_id:   { type: string }
            stride:     { $ref: "#/$defs/stride_category" }
            scenario:
              type: string
              # JSONSchema cannot check "stripped length >= 10"; Python
              # post-check in validate_intermediate.py enforces that.
              minLength: 10
            likelihood: { $ref: "#/$defs/likelihood" }
            impact:     { $ref: "#/$defs/impact" }
            risk:       { $ref: "#/$defs/risk" }
            controls_in_place:
              type: [string, "null"]
            mitigation_title:
              type: [string, "null"]
            remediation:
              type: [object, "null"]
              properties:
                effort:
                  type: string
                  enum: [Low, Medium, High]
                steps:
                  type: array
                  items: { type: string }
                code_example: { type: string }
                reference:    { type: string }
            evidence:
              type: [object, "null"]
              properties:
                file: { type: string }
                line: { type: [integer, "null"], minimum: 0 }
            prior_finding_ref:
              type: [string, "null"]
            evidence_check:
              # Status of the evidence-verification pass. The STRIDE
              # analyzer sets `verified-prior` when it re-read the cited
              # evidence file for a prior-finding-derived threat (per the
              # mandatory verification target rule in
              # appsec-stride-analyzer.md). Fresh threats start as
              # `unchecked`; the appsec-evidence-verifier sub-agent
              # (Phase 10b pre-step) updates them to `verified`,
              # `refuted`, or `ambiguous` after re-reading the cited
              # file:line. See appsec-evidence-verifier.md for semantics.
              # `carried-unverified-shallower-depth` — the analyzer carried a
              # prior finding it could not re-confirm because the current scan
              # is shallower than the baseline (see "prior-finding disposition").
              type: [string, "null"]
              enum: [verified, verified-prior, refuted, ambiguous, unchecked,
                     carried-unverified-shallower-depth, null]
            controls_absent_evidence:
              # Records the absence-grep that supports the "control X is
              # not present" claim used to justify this threat. Written
              # by the STRIDE analyzer when a verification grep returned
              # zero hits. qa_checks.py replays the grep deterministically
              # and flags drift. Omitted when the threat is not absence-
              # based (e.g. positive evidence of vulnerable code).
              type: [array, "null"]
              items:
                type: object
                required: [pattern, search_paths, hit_count]
                properties:
                  pattern:
                    type: string
                    minLength: 1
                  search_paths:
                    type: array
                    items: { type: string }
                  hit_count:
                    type: integer
                    minimum: 0
                  searched_at:
                    type: [string, "null"]
            cvss_v4:
              # Optional — see $defs/cvss_v4. Eligibility is enforced by
              # the Python post-check, not by the structural schema.
              oneOf:
                - type: "null"
                - $ref: "#/$defs/cvss_v4"
