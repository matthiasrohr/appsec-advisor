$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-advisor/schemas/threats-merged.schema.yaml
title: Merged threat list with global T-NNN IDs
description: |
  Output written by the orchestrator in Phase 9 to
  `$OUTPUT_DIR/.threats-merged.json`. Canonical source for diagram
  annotation, YAML and SARIF export, and the changelog writer. Phase 10b
  (triage validator) may annotate each threat with a `triage_flags` array.

type: object
required: [version, generated_at, threats]
properties:

  version:
    const: 1

  generated_at:
    type: string

  resolved_prior_findings:
    # Incremental re-scan only. Union of every analyzed component's
    # `resolved_prior_findings[]` (stride.schema.yaml) — prior findings the
    # re-scan affirmatively confirmed FIXED. Consumed by the deterministic
    # reconciler in build_threat_model_yaml.py to resolve (vs carry) a dropped
    # prior threat. Optional; absent on full/first runs.
    type: array
    items:
      type: object
      required: [prior_id, reason]
      properties:
        prior_id:     { type: string }
        component_id: { type: [string, "null"] }
        cwe:          { type: [string, "null"] }
        title:        { type: [string, "null"] }
        reason:       { type: string }

  threats:
    type: array
    items:
      type: object
      required:
        - t_id
        - component_id
        - component_name
        - stride
        - risk
        - likelihood
        - impact
        - title
        - cwe
        - evidence
        - source
        - architectural_violation
      properties:
        t_id:
          type: string
          pattern: "^T-\\d{3,}$"
        component_id:   { type: string, minLength: 1 }
        component_name: { type: string, minLength: 1 }
        stride:
          type: string
          enum:
            - Spoofing
            - Tampering
            - Repudiation
            - Information Disclosure
            - Denial of Service
            - Elevation of Privilege
        risk:
          type: string
          enum: [Critical, High, Medium, Low]
        likelihood:
          type: string
          # Note: the merged file widens the allowed likelihood set to match
          # `risk` levels (Critical/High/Medium/Low) rather than the narrower
          # High/Medium/Low used in `.stride-*.json`. This is intentional —
          # merged rows aggregate severity semantics.
          enum: [Critical, High, Medium, Low]
        impact:
          type: string
          enum: [Critical, High, Medium, Low]
        title:
          type: string
          minLength: 1
        cwe:
          type: string
          pattern: "^CWE-\\d+$"
        evidence:
          type: [object, "null"]
          required: [file, line]
          properties:
            file: { type: string }
            line: { type: [integer, "null"] }
        # A lossless merger stores every affected location here. The primary
        # evidence remains the report anchor; instances retain the additional
        # scenario/provenance needed for incremental diffs and audit.
        instances:
          type: array
          items:
            type: object
            required: [file, line]
            properties:
              file: { type: string }
              line: { type: [integer, "null"] }
              severity: { type: [string, "null"] }
              snippet: { type: [string, "null"] }
              scenario: { type: [string, "null"] }
              source_ref: { type: [string, "null"] }
        affected_files:
          type: array
          items: { type: string }
        instance_count:
          type: integer
          minimum: 1
        merged_from:
          type: array
          items: { type: string }
        source:
          type: string
          enum:
            - stride
            - requirements-compliance
            - architectural-anti-pattern
            - known-vuln
            - coverage-gap
            - architecture-coverage
            - threat-hypothesis
            - config-scan
            # Static source-auth scanner output (source_auth_scanner.py →
            # AUTHZ-001..008). Ingested by merge_threats.py:443 with file/line
            # evidence. Lock-step with _shared_sources.CODE_LEVEL_SOURCES and
            # threat-model.output.schema.yaml.
            - source-scan
            # M-3: Implementation-defect threats that originate from an
            # otherwise-sound architecture. Examples: hardcoded secret in
            # source, mis-configured TLS, weak cookie flags. Distinct from
            # `stride` (architectural reasoning) so downstream consumers
            # can group them under "Insufficient Configuration / Secret
            # Management" meta findings instead of degrading architectural
            # ratings.
            - configuration-defect
            # NOTE: `dep-scan` was removed in 2026-05. Supply-chain posture
            # is surfaced as §7.11 control rows (emit_sca_practice.py) and
            # meta-findings (emit_known_bad_libs.py + sca-practice), not as
            # per-CVE threats. Persisted threats from prior runs with
            # `source: dep-scan` are no longer valid — see CHANGELOG for
            # the migration path.
        architectural_violation:
          type: boolean
        requirement_id:
          # Only present for threats sourced from requirements-compliance or
          # architectural-anti-pattern. Carries the requirement ID from
          # Phase 8b so downstream consumers (audit-security-requirements) can
          # look up T-IDs by requirement without re-parsing the Markdown.
          # NOTE: architecture-coverage / threat-hypothesis sources MUST NOT
          # carry a synthetic requirement_id — use `rule_id` instead.
          type: string
        rule_id:
          # Stable trace key for source in {architecture-coverage,
          # threat-hypothesis}. Format: ARCH-<TOKEN>-<NNN>.
          # Lets the renderer / pentest tasks / QA gates link a merged
          # threat back to .architecture-coverage.json rules_evaluated[].
          type: string
          pattern: "^ARCH-[A-Z]+-[0-9]{3}$"
        hypothesis_id:
          # Stable trace key for source=threat-hypothesis. Format:
          # ARCH-HYP-<TOKEN>-<NNN>. Only set when a hypothesis was
          # promoted to a threat (proof_state=confirmed).
          type: string
          pattern: "^ARCH-HYP-[A-Z]+-[0-9]{3}$"
        architectural_theme:
          type: string
          enum:
            - Separation
            - SecretManagement
            - DefenseInDepth
            - InputValidation
            - Authorization
            - Authentication
            - NetworkSegmentation
            - DataProtection
            - AuditLogging
            - SupplyChain
            - SecureDefaults
            - LeastPrivilege
            - InsecureDesign
            - AttackSurfaceDesign
            - SessionDesign
        generic_threat_title:
          type: string
          minLength: 5
          maxLength: 120
        triage_flags:
          # Annotated by Phase 10b. Opaque to the schema — individual flag
          # objects are documented in triage-validator.
          type: array
        evidence_check:
          # Set by the appsec-evidence-verifier sub-agent (Phase 10b
          # pre-step). The STRIDE analyzer may set `verified-prior` for
          # threats derived from prior findings whose evidence file was
          # re-read at analysis time. Fresh threats start as `unchecked`
          # and become `verified`, `refuted`, or `ambiguous` after the
          # verifier reads the cited file:line. Triage may use this field
          # in effective_severity decisions (a refuted finding is not
          # elevated by compound-chain membership).
          # `carried-unverified-shallower-depth` — set by the deterministic
          # incremental reconciler (build_threat_model_yaml.py) or the analyzer
          # at reduced depth on a prior threat carried forward because the
          # current scan was too shallow to re-confirm it. Triage must NOT
          # elevate it; QA must NOT demand fresh evidence for it.
          type: [string, "null"]
          enum: [verified, verified-prior, refuted, ambiguous, unchecked,
                 carried-unverified-shallower-depth, null]
        evidence_tier:
          # P1 (weakness-class evidence model): the evidence BASIS of the
          # threat — distinct from `evidence_check` (verification state); do
          # NOT overload the two. `confirmed-exploitable` = proven sink,
          # CVSS-eligible, appears as a weakness instances[] entry;
          # `insecure-practice` = definite bad-practice site, exploit chain
          # unproven, no CVSS, folded as the weakness's practice_evidence[].
          # Default (applied by merge_threats.py): confirmed-exploitable when a
          # sink is proven, else insecure-practice.
          type: [string, "null"]
          enum: [confirmed-exploitable, insecure-practice, null]
        evidence_flags:
          # Annotated by the appsec-evidence-verifier. Parallel to
          # triage_flags. Each entry carries a flag_id (EV-NNN),
          # verdict reason, and the file:line excerpt the verifier
          # consulted. Schema mirrors triage_flags — opaque here,
          # documented in appsec-evidence-verifier.md.
          type: array
        controls_absent_evidence:
          # Passed through from .stride-*.json. Records the absence-grep
          # that supports a "control X is not present" claim. qa_checks.py
          # re-runs each grep deterministically during the pre-pass and
          # flags drift via evidence_integrity.issues. See stride.schema.
          type: [array, "null"]
        cvss_v4:
          # Optional CVSS v4.0 score. Eligibility (which threats may carry
          # this field) is enforced as a post-check in
          # validate_intermediate.py against
          # data/cvss-eligible-cwes.yaml; the structural shape is
          # defined here.
          oneOf:
            - type: "null"
            - type: object
              required: [vector, base_score, severity, source]
              additionalProperties: false
              properties:
                vector:
                  type: string
                  pattern: "^CVSS:4\\.0(/[A-Z]+:[A-Z0-9]+)+$"
                base_score:
                  type: number
                  minimum: 0.0
                  maximum: 10.0
                severity:
                  type: string
                  enum: [None, Low, Medium, High, Critical]
                source:
                  type: string
                  # `dep-scan` removed 2026-05 (no in-tree SCA producer);
                  # `nvd` / `osv` / `known-vuln` retained for externally
                  # ingested advisories where a CVSS vector is supplied
                  # by the upstream advisory.
                  enum: [stride-analyzer, nvd, osv, known-vuln, manual]
                version_fallback:
                  type: [string, "null"]
                  enum: ["3.1", null]

  weaknesses:
    # P1 (weakness-class evidence model) — the unified register's PARENT rows.
    # Produced by the merge_threats.py reconciler: grouping key
    # (weakness_class × scope), with the weakness as the heading and confirmed
    # threats folded in as instances[] (proposal §4a/§4d-bis). Arch-coverage
    # design signals (formerly threat_hypotheses[]) collapse into the matching
    # weakness's statement + observable_backing.absent_control_signal[] instead
    # of being emitted as peers. Optional (absent on legacy/first runs).
    #
    # IDs use the W-NNN prefix — NEVER T-NNN: a weakness is never CVSS-scored
    # and MUST stay out of the T-NNN contiguous sequence that
    # validate_intermediate asserts (mirrors MF-NNN meta-findings).
    type: [array, "null"]
    items:
      type: object
      additionalProperties: true
      required:
        - id
        - weakness_class
        - kind
        - title
        - statement
        - severity
        - severity_basis
        - observable_backing
      properties:
        id:
          type: string
          pattern: "^W-\\d{3,}$"
        weakness_class:
          # A data/weakness-classes.yaml cluster id.
          type: string
          enum: [injection, broken_auth, missing_authz, weak_crypto,
                 server_side_exposure, output_xss_csp, sensitive_disclosure,
                 dos, outdated_deps, _unmapped]
        mechanism_id:
          # Stable mechanism-level grouping key. Unlike weakness_class (a CWE
          # reporting family), this identifies the observable architectural
          # control gap that owns this register row.
          type: [string, "null"]
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        kind:
          # design = a central control is observably ABSENT (no single sink);
          # implementation = a specific non-best-practice pattern in code.
          type: string
          enum: [design, implementation]
        title:
          # Short reader-facing title; technical detail belongs in statement.
          type: string
          minLength: 1
          maxLength: 80
        statement:
          # Observable structural fact, never speculation (proposal §0).
          type: string
          minLength: 1
        severity:
          type: string
          enum: [Critical, High, Medium, Low]
        severity_basis:
          # confirmed = linked confirmed finding(s);
          # observed-practice = concrete unsafe pattern, no confirmed exploit;
          # design-risk = absent central control, no CVSS.
          type: string
          enum: [confirmed, observed-practice, design-risk]
        implementation_strategy:
          # Populated in P2 (recon inventory + misuse layer).
          type: [string, "null"]
          enum: [none, home-grown, standard-misused, standard-vetted, null]
        observable_backing:
          # REQUIRED — at least one of the arrays MUST be non-empty, else the
          # weakness is NOT emitted (proposal §0 emission rule / I2). The
          # non-empty invariant is a Python post-check (qa_checks I2 guard),
          # not structurally expressible here.
          type: object
          additionalProperties: true
          properties:
            absent_control_signal:
              # design backing: controls_absent_evidence / positive_signals
              # proving the central control is absent.
              type: array
            practice_evidence:
              # implementation backing: file:line of non-best-practice sites.
              type: array
              items:
                type: object
                properties:
                  file: { type: string }
                  line: { type: [integer, "null"] }
        affected_components:
          # kind:design weaknesses are app-wide; the spread is listed here.
          type: array
          items: { type: string }
        instances:
          # Type-A confirmed-exploitable findings folded under this weakness.
          # Each keeps its own T-/F-NNN id, file:line, CVSS and POC hint.
          type: array
          items:
            type: object
            required: [id]
            properties:
              id:
                type: string
                pattern: "^[TF]-\\d{3,}$"
              file: { type: string }
              line: { type: [integer, "null"] }
              basis:
                type: string
                enum: [confirmed-exploitable]
              poc_hint: { type: [string, "null"] }

# Additional invariants enforced by Python post-checks in
# validate_intermediate.py (not expressible in Draft 2020-12):
#   - t_id values are unique within threats[]
#   - t_id values form a contiguous sequence starting at T-001
#   - cvss_v4 eligibility per source/cwe/evidence (see cvss-eligible-cwes.yaml):
#       * source == known-vuln                     → cvss_v4 REQUIRED
#         (externally ingested advisory; advisory supplies the vector)
#       * source == stride + cwe in eligibility list + evidence.line set
#                                                  → cvss_v4 ALLOWED
#       * otherwise                                → cvss_v4 FORBIDDEN
#         (note: dep-scan was removed 2026-05; the supply-chain frame
#         now lives in meta_findings[], which is not eligible for CVSS)
#         (this explicitly includes architecture-coverage and
#         threat-hypothesis — design/architectural gaps cannot be
#         honestly scored on CVSS Base metrics)
#   - cvss_v4.severity must be consistent with risk band (max 1 level off)
#   - requirement_id is only allowed when source in
#       {requirements-compliance, architectural-anti-pattern}
#       and MUST match the id from the Phase 8b violations index
#   - rule_id is only allowed when source in
#       {architecture-coverage, threat-hypothesis}; its presence on any
#       other source is a validation error
#   - hypothesis_id is only allowed when source == threat-hypothesis and
#       requires proof_state evidence in .architecture-coverage.json
#   - effective_severity for source in {architecture-coverage,
#       threat-hypothesis} MUST NOT be Critical individually
#       (per critical-criteria.yaml severity caps and arch.md §Severity-Policy)
