    description: "Plugin reads from and writes to the local filesystem (source repo, OUTPUT_DIR, log files). No authentication between plugin processes."

  - name: "Claude Code Tool API"
    description: "Boundary between the Claude Code host process and hook scripts. Hooks receive JSON over stdin; no message authentication."

  - name: "Anthropic API"
    description: "Source code and prompts cross from local environment to Anthropic's inference API over TLS. No data residency guarantees enforced by the plugin."

  - name: "External REST Context Endpoint"
    description: "Optional external service providing organizational context. URL is operator-configured; no origin restriction at runtime."

  - name: "Shell Environment"
    description: "run-headless.sh executes in the invoker's shell; eval expands CLAUDE_CMD, crossing the boundary from string data to executable code."

