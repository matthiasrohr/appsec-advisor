# sections-contract.yaml — declarative structure of threat-model.md
#
# This file is the SINGLE SOURCE OF TRUTH for the shape of the rendered
# Markdown report. The renderer (`scripts/compose_threat_model.py`) reads it
# and emits `threat-model.md` deterministically from:
#
#   * `threat-model.yaml`            → threats, mitigations, components,
#                                       security_controls, meta (canonical)
#   * `.triage-flags.json`           → triage ranking (v2+)
#   * `.fragments/<section-id>.json` → LLM-authored data fragments for
#                                       sections that need prose (verdict,
#                                       architecture-assessment themes,
#                                       critical-attack-chain, …)
#   * `.fragments/<section-id>.md`   → LLM-authored raw-markdown fragments
#                                       for the few sections that are pure
#                                       prose (system-overview, assets,
#                                       out-of-scope)
#
# The LLM NEVER writes `threat-model.md` directly. This eliminates the
# structural-drift failure mode observed when the composer invented a
# non-canonical Management Summary layout.
#
# Validation:
#   * Every section listed in `document.order` must be rendered (or
#     conditionally skipped per `condition`).
#   * For sections with `fragment_type: data`, the fragment is validated
#     against the JSON Schema in `schemas/fragments/<fragment>.schema.json`
#     before rendering — a schema violation aborts the run.
#   * For sections with `fragment_type: markdown`, the fragment is inlined
#     verbatim after checking that it begins with the declared `heading`.
#   * For sections with `fragment_type: hybrid`, the renderer combines a
#     deterministic computed block with one schema-validated data fragment.
#   * For sections with `fragment_type: computed`, the renderer derives
#     the content from `threat-model.yaml` + triage output — no LLM
#     fragment is consulted at all.
#
# Contract stability: structural changes (renaming a section, adding a
# required column) are breaking changes. Bump `contract_version` and
# record in CHANGELOG.

contract_version: 4   # v4 adds §1.5 identified_actors (actors.md §14)

# ---------------------------------------------------------------------------
# Document-wide settings
# ---------------------------------------------------------------------------

document:
  # Rendered as `# {{ title }}` at the top of the file.
  title_template: "Threat Model — {{ project.name }}"

  # Sections are rendered in this order. Each id must appear in the
  # `sections:` map below. `condition` is evaluated against a small
  # context dict (`critical_count`, `high_count`, `check_requirements`,
  # `verbose_report`, `has_out_of_scope`, …); missing context keys mean
  # "condition false".
  order:
    - infobox
    - changelog
    - { id: quick_mode_notice, condition: "is_quick_depth" }
    - toc
    - management_summary
    # Note: Critical Attack Chain content is rendered as `### 3.1 Attack Chain
    # Overview` inside §3, NOT as a standalone unnumbered section. The reference
    # layout integrates the chain diagram with the per-finding walkthroughs.
    - system_overview
    - { id: identified_actors, condition: "has_resolved_actors" }
    - architecture_diagrams
    # §3 Attack Walkthroughs — conditional on `not skip_attack_walkthroughs`.
    # `--quick` sets `skip_attack_walkthroughs=true` in `.skill-config.json`
    # which causes the composer to drop §3 entirely (heading, body, TOC entry,
    # quick-mode-notice bullet, §8 intro back-link). The composer's
    # `is_skipped_section_id` / `_compute_toc_entries` paths read this flag
    # via `eval_context["skip_attack_walkthroughs"]`. Standard / thorough
    # depths leave it `false` and §3 renders normally.
    - { id: attack_walkthroughs, condition: "not skip_attack_walkthroughs" }
    - assets
    - attack_surface
    # §6 Use Cases removed (2026-05) — value-vs-noise tradeoff. The numbering
    # gap (§5 → §7) is intentional and accepted; full renumbering would
    # require coordinated edits across composer regexes, QA pattern checks,
    # pregenerator scaffolds, and every §7.x reference in the agent prompts.
    #
    # §7 carries a `render_security_architecture` condition (true by default).
    # Set to False at compose-time when current depth is `quick` AND no rich
    # prior §7 from a standard/thorough run is preservable. Quick mode then
    # skips §7 in both body and TOC; a subsequent standard run re-introduces
    # the full per-domain analysis on the same repo.
    - { id: security_architecture, condition: "render_security_architecture" }
    # When §7 is suppressed at quick depth, the document jumps from §5
    # straight to §8 without explanation. The placeholder below renders
    # a single italic line so the reader sees the numbering gap is
    # deliberate. Active only when §7 is suppressed.
    - { id: skipped_sections_placeholder, condition: "not render_security_architecture" }
    - { id: requirements_compliance, condition: "check_requirements" }
    - threat_register
    - mitigation_register
    - out_of_scope
    - appendix_run_statistics        # always — verbose flag only gates token/cost detail
    - { id: composition_notes, condition: "compose_warned" }  # M2.14 — only when prior compose warned
    # M3.3 — `run_issues` is no longer rendered into threat-model.md. The
    # observability data still lives in $OUTPUT_DIR/.run-issues.json
    # (written by aggregate_run_issues.py) and the terminal completion
    # summary still surfaces a `-- Run Issues --` block. Inlining the
    # appendix into the persisted document was noisy in PR diffs and
    # mixed run-meta with the threat content. To re-enable the appendix
    # add `- { id: run_issues, condition: "run_warned" }` here and to
    # the `full` document set below; the renderer remains in compose.
    - appendix_vektor_taxonomy

  # Inter-section separator. Rendered between every two consecutive
  # sections. Infobox, changelog, toc share the same separator.
  section_separator: "\n\n---\n\n"

  # ---------------------------------------------------------------------------
  # Document sets — named section orderings for partial renders.
  #
  # "full" is the canonical threat model (uses `order` above).
  # "architecture" is the early-render Architecture Model produced at the end
  # of Phase 8, before STRIDE data exists. The renderer selects this set when
  # invoked with `--document architecture`; unknown sections are skipped
  # non-fatally (strict=False) so the render succeeds with partial fragments.
  # ---------------------------------------------------------------------------
  document_sets:
    full:
      title_template: "Threat Model - {{ project.name }}"
      output_file: "threat-model.md"
      order:
        - infobox
        - changelog
        - { id: quick_mode_notice, condition: "is_quick_depth" }
        - toc
        - management_summary
        - system_overview
        - architecture_diagrams
        # §3 conditional on `not skip_attack_walkthroughs` — see main `order:` block.
        - { id: attack_walkthroughs, condition: "not skip_attack_walkthroughs" }
        - assets
        - attack_surface
        # §6 Use Cases removed (2026-05); see comment in main `order:` above.
        - { id: security_architecture, condition: "render_security_architecture" }
        # Italic placeholder explaining the §5 -> §8 numbering gap when
        # §6 is permanently gone AND §7 is suppressed at quick depth.
        - { id: skipped_sections_placeholder, condition: "not render_security_architecture" }
        - { id: requirements_compliance, condition: "check_requirements" }
        - threat_register
        - mitigation_register
        - out_of_scope
        - appendix_run_statistics
        - { id: composition_notes, condition: "compose_warned" }
        # M3.3 - run_issues removed; see comment on the same line in the
        # main `order:` block above for re-enable instructions.
        - appendix_vektor_taxonomy

    architecture:
      title_template: "Architecture Model — {{ project.name }}"
      output_file: "analysis-model.md"
      preamble: |
        > **Architecture Model** — early snapshot produced after Phase 8 (Security Controls),
        > before STRIDE threat enumeration. Sections requiring threat data are omitted.
        > See `threat-model.md` for the complete assessment.
      order:
        - infobox
        - toc
        - system_overview
        - architecture_diagrams
        # §3 conditional on `not skip_attack_walkthroughs` — see main `order:` block.
        - { id: attack_walkthroughs, condition: "not skip_attack_walkthroughs" }
        - assets
        - attack_surface
        # §6 Use Cases removed (2026-05); see comment in `order:` above.
        - { id: security_architecture, condition: "render_security_architecture" }
        - { id: requirements_compliance, condition: "check_requirements" }

  # Metadata fields validated before rendering starts. Missing required
  # fields abort the run; optional fields are rendered only when present.
  metadata_fields:
    required:
      - project.name
      - project.version
      - project.repository
      - project.license
      - meta.generated
      - meta.git.commit_sha
    optional:
      - project.description
      - project.homepage
      - project.author
      - project.runtime
      - project.tags

# ---------------------------------------------------------------------------
# Severity taxonomy — referenced by multiple sections for consistent emoji
# ---------------------------------------------------------------------------

severity_taxonomy:
  critical: { emoji: "🔴", label: "Critical", color: "#dc2626" }
  high:     { emoji: "🟠", label: "High",     color: "#e67700" }
  medium:   { emoji: "🟡", label: "Medium",   color: "#ffd43b" }
  low:      { emoji: "🟢", label: "Low",      color: "#2f9e44" }
  info:     { emoji: "⚪", label: "Info",     color: "#868e96" }
  # Aliases used by verdict/architecture-assessment fragments (traffic-light cue).
  red:      { emoji: "🔴", label: "",         color: "#dc2626" }
  yellow:   { emoji: "🟡", label: "",         color: "#f59e0b" }
  green:    { emoji: "🟢", label: "",         color: "#2f9e44" }

effectiveness_taxonomy:
  adequate: { emoji: "✅", label: "Adequate", rank: 0 }
  partial:  { emoji: "⚠️", label: "Partial",  rank: 1 }
  weak:     { emoji: "🔶", label: "Weak",     rank: 2 }
  missing:  { emoji: "❌", label: "Missing",  rank: 3 }

# ---------------------------------------------------------------------------
# Per-section contracts
# ---------------------------------------------------------------------------
#
# Each section declares:
#   heading:          rendered heading line (supports `{{ }}` substitution)
#   heading_numbered: whether the heading starts with "## N." (true/false)
#   anchor:           explicit anchor id (overrides heading-derived id)
#   fragment_type:    "computed" | "data" | "hybrid" | "markdown" | "template"
#     computed  — renderer derives content from yaml+triage; no fragment
#     data      — renderer reads <section>.json, validates schema, fills template
#     hybrid    — renderer combines deterministic content with a validated fragment
#     markdown  — renderer inlines <section>.md verbatim (prose-only sections)
#     template  — renderer emits a fixed template with simple substitutions
#   fragment:         relative path under `.fragments/` dir (only for data/markdown)
#   schema:           relative path under `schemas/fragments/` (only for data)
#   template:         relative path under `templates/fragments/` (only for data)
#   required_subsections, forbidden_subsections, forbidden_patterns: enforcement
#   tables:           per-table column + row rules
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Centralized vocabulary — shared across pregenerator, renderer, and qa_checks
# so a single edit here updates every consumer. Before this block existed,
# verdict icons drifted between `🔴 Missing / 🟠 Weak / 🟡 Partial / 🟢 Adequate`
# (pregenerator output) and `❌ Missing / ⚠️ Partial / 🔶 Weak / ✅ Adequate`
# (threat-analyst-prompt + ms-template). The canonical form below uses the
# reference-style 🔴/🟠/🟡/🟢 set because it provides four distinct hue steps
# (severity-graded) instead of three icons + one checkmark.
# ---------------------------------------------------------------------------
verdict_icons:
  adequate:        "🟢 Adequate"
  partial:         "🟡 Partial"
  weak:            "🟠 Weak"
  unsafe:          "🔴 Unsafe"
  missing:         "🔴 Missing"
  not_applicable:  "—"

sections:

  # -------------------------------------------------------------------------
  # A. Front matter
  # -------------------------------------------------------------------------

  infobox:
    heading: null                                  # no heading — infobox is a blockquote table
    fragment_type: template
    template: "infobox.md.j2"
    data_source: "threat-model.yaml#project"       # renderer reads project dict
    required_fields: [name, version, repository, license]
    optional_fields: [description, homepage, author, runtime, tags]

  changelog:
    heading: "## Changelog"
    heading_numbered: false
    fragment_type: template
    # `render_style` selects the template:
    #   * "table"   (default) → one row per version, compact
    #   * "bullets"           → legacy per-version H3 with delta bullets
    # The choice is centralised here so the renderer does not need to know
    # about the template layout. The composer reads `render_style` and picks
    # the matching file; unknown values fall back to the legacy bullets.
    render_style: table
    template: "changelog-table.md.j2"
    data_source: "threat-model.yaml#changelog"
    conditional: "len(changelog) > 0"

  # Quick-mode transparency banner. Rendered between Changelog and TOC
  # when the assessment ran at `quick` depth. Lists what is materially
  # reduced (no code examples in mitigations, max 2 threats per STRIDE
  # category, max 3 components, no QA, no architect review, no per-finding
  # sequence diagrams) so the reader knows the report is intentionally
  # narrower than a standard/thorough run.
  quick_mode_notice:
    heading: ""                                     # no heading — pure callout box
    heading_numbered: false
    fragment_type: computed                         # rendered inline by compose
    conditional: "is_quick_depth"

  toc:
    heading: "## Table of Contents"
    heading_numbered: false
    fragment_type: computed                         # always derived from `document.order`
    # The renderer emits one `1. Management Summary` line per non-skipped
    # entry in `document.order`, with sub-bullets for declared subsections.

  # -------------------------------------------------------------------------
  # B. Management Summary — THE section that the LLM most often drifted on
  # -------------------------------------------------------------------------

  management_summary:
    heading: "## Management Summary"
    heading_numbered: false                         # ⚠ enforced — no "## 1. …"
    anchor: "management-summary"
    fragment_type: computed                         # renderer composes from sub-sections below
    required_subsections:
      - verdict
      - security_posture_at_a_glance
      - top_findings
      - architecture_assessment
      - mitigations
      - operational_strengths
    optional_subsections:
      - { id: requirements_compliance_ms, condition: "check_requirements" }
      - { id: triage_notes,               condition: "triage_has_warnings" }
    forbidden_subsection_patterns:                  # regexes; match = QA-strip
      - "^\\d+\\.\\d+\\s+"                          # numbered prefixes "1.1 …"
      - "^\\d+\\.\\s+"                              # numbered prefixes "1. …"
      - "^Risk Distribution$"
      - "^STRIDE Coverage$"
      - "^Executive Overview$"
      - "^Immediate Actions( Required.*)?$"
      - "^Top Threats( by Risk)?$"
      - "^Top Critical Findings$"
      - "^Key Strengths$"
      - "^Follow-up Actions$"
      - "^Overall Security Rating$"
      - "^⚠ Worst Case Scenarios$"

  # -- MS sub-sections ------------------------------------------------------

  verdict:
    heading: "### Verdict"
    heading_numbered: false
    fragment_type: data
    fragment: "ms-verdict.json"
    schema:   "verdict.schema.json"
    template: "verdict.md.j2"
    required_elements:
      - severity_emoji                              # must open with 🟢/🟡/🔴
      - red_blockquote                              # must contain the red HTML blockquote
      - finding_refs                                # ≥2 F-NNN or T-NNN refs in blockquote

  # Security Posture at a Glance — architecture heatmap showing where the
  # Critical findings concentrate and which attack paths connect them.
  #
  # Contract version 2 (2026-04): the section moved from arrowless
  # heatmap + Top-Attack-Paths-table to an arrow-driven 4-column
  # diagram + per-attack-class narrative bullets. The diagram is
  # computed from threat-model.yaml + the three taxonomies
  # (data/attack-class-taxonomy.yaml, business-impact-taxonomy.yaml,
  # posture-actor-labels.yaml). The narrative bullets below the
  # diagram come from an LLM-authored fragment validated against
  # schemas/fragments/security-posture-attack-paths.schema.json.
  #
  # Conditional: skip the section entirely when there are no
  # Critical/High findings (a green-status threat model does not need a
  # hero diagram).
  security_posture_at_a_glance:
    heading: "### Security Posture at a Glance"
    heading_numbered: false
    # `hybrid` = renderer composes a deterministic block (the diagram +
    # the threat-actor intro paragraph) AND consumes one LLM fragment
    # (`.fragments/security-posture-attack-paths.json`) for the seven
    # numbered attack-class bullets that follow. Both halves are bound
    # to schemas / templates listed below.
    fragment_type: hybrid
    fragment: ".fragments/security-posture-attack-paths.json"
    schema:   "security-posture-attack-paths.schema.json"
    template: "security-posture-diagram.md.j2"
    template_attack_paths: "security-posture-attack-paths.md.j2"
    # Minimum findings before the diagram renders — below this threshold
    # the hero diagram adds more noise than signal.
    min_high_or_critical: 3
    # Severity floor for findings shown in the tier severity counters.
    # Low-severity findings are tracked in §8 but omitted from the
    # heatmap (intro paragraph mentions this explicitly).
    tier_severity_floor: medium
    # Layout invariants — enforced by `qa_checks.py
    # check_security_posture_structure`. Each invariant ID is referenced
    # in the QA repair-plan when violated, so adding/removing/renaming
    # an entry here changes the QA gate semantics.
    # Categories:
    #   D = Diagram structure (Mermaid block)
    #   E = Edge structure (attack arrows + consequence arrows + alignment)
    #   C = Card / node label structure
    #   F = Column population
    #   G = Glyph consistency
    #   N = Narrative section below the diagram (intro + actor bullets + attack-paths)
    #   B = Per-attack-class bullet structure
    #   L = Linking format
    invariants:
      - { id: D1, rule: "mermaid block declares ELK renderer via `%%{init: {\"flowchart\": {\"defaultRenderer\": \"elk\"}} }%%` directive" }
      - { id: D2, rule: "mermaid block opens with `flowchart LR`" }
      - { id: D3, rule: "exactly 3 top-level subgraphs in order: ACTORS, TIERS, IMPACT" }
      - { id: D4, rule: "subgraph titles are intentionally empty (`[\" \"]`) — column headers are emitted as the FIRST node of each subgraph (HDR_A, HDR_T, HDR_I)" }
      - { id: D5, rule: "every subgraph carries `direction TB`" }
      - { id: D6, rule: "no nested sub-subgraphs (flat one-level subgraphs only)" }
      - { id: E1, rule: "exactly 3 invisible alignment edges: HDR_A --- HDR_T, HDR_T --- HDR_I, plus per-component alignment as needed" }
      - { id: E2, rule: "1–7 attack arrows present, all `==>` solid red, with numbered glyph labels ①–⑦ in declaration order without gaps" }
      - { id: E3, rule: "1–6 consequence arrows present, all `-.->` dashed grey, terminating at IMPACT nodes" }
      - { id: E4, rule: "linkStyle declarations exist for: alignment edges (transparent), attack arrows (#b71c1c), consequence arrows (#6b7280 dashed)" }
      - { id: C1, rule: "every node label has ≤ 6 `<br/>` tags (≤ 7 visual lines)" }
      - { id: C2, rule: "tier node labels include: bold tier name, root-causes line prefixed with ⚠, components line, severity-counts line (🔴 / 🟠 / 🟡 / ⚠ — Low explicitly excluded)" }
      - { id: C3, rule: "HTML emphasis tags <b> and <i> ARE allowed in node labels (contract v2 reverses contract v1's C3)" }
      - { id: F1, rule: "ACTORS column has 1–6 cards: 1 column header (HDR_A) + 1–5 actor cards" }
      - { id: F2, rule: "TIERS column has 1–4 cards: 1 column header (HDR_T) + 1–3 tier cards (Client / Application / Data)" }
      - { id: F3, rule: "IMPACT column has 1–5 cards: 1 column header (HDR_I) + 1–4 business-impact cards" }
      - { id: G1, rule: "each glyph ①–⑦ appears at most once on attack-arrow labels" }
      - { id: G2, rule: "glyph order on attack arrows is ① ② … without gaps" }
      - { id: G3, rule: "every glyph used in the diagram appears in exactly one attack-class bullet header below" }
      - { id: N1, rule: "directly after the ```mermaid``` close-fence, an intro paragraph beginning `**Threat actors.**` introduces the actors" }
      - { id: N2, rule: "two threat-actor bullets follow (one per visible actor card), each as a top-level `- **Actor Name**` bullet" }
      - { id: N3, rule: "after the actor bullets, a section header `**Attack paths (numbered arrows in the diagram):**` introduces the per-class list" }
      - { id: N4, rule: "1–7 attack-class bullets follow, one per non-empty class in attack_paths fragment, glyphs match diagram arrow labels" }
      - { id: B1, rule: "each attack-class bullet header is `- **<glyph> <Class Title>** (<Actor> → <Target>) — <generic class description>`" }
      - { id: B2, rule: "each attack-class bullet has a `Findings:` sub-bullet list with ≥1 F-NNN entry; sub-bullets follow the form `[F-NNN](#f-nnn) — Title`" }
      - { id: B3, rule: "each attack-class bullet ends with `Impact:` line (single line, comma-separated outcome names from data/business-impact-taxonomy.yaml)" }
      - { id: B5, rule: "if attack_chains is non-empty: `Attack chain:` sub-bullet list, each entry `[Chain N](#chain-N) — Title`" }
      - { id: L1, rule: "every F-NNN reference inside a Findings sub-bullet is a markdown link `[F-NNN](#f-nnn) — Title`" }
      - { id: L3, rule: "every chain reference inside an Attack-chain sub-bullet is a markdown link `[Chain N](#chain-N)` resolving to a `<a id=\"chain-N\">` anchor in §3.1" }

  top_findings:
    heading: "### Top Findings"
    heading_numbered: false
    fragment_type: computed                         # 100% derived from threat-model.yaml + triage
    data_source: "triage#ranking.views.top_findings.findings_ranked"
    fallback_sort:                                  # when triage absent or v1
      - "effective_severity:desc"
      - "breach_distance:asc"
      - "cvss:desc"
      - "id:asc"
    filter: "effective_severity in [Critical, High]"
    table:
      columns:
        - { key: rank,        header: "#",                   width: narrow,  required: true }
        - { key: criticality, header: "Criticality",         render: severity_badge, required: true }
        - { key: path,        header: "Path",                render: path_glyph,     required: true }
        - { key: finding,     header: "Finding",             render: finding_ref,    required: true }
        - { key: component,   header: "Component",           render: component_ref,  required: true }
        - { key: mitigations, header: "Primary Mitigations", render: mitigation_list, required: true }
      rows:
        # 2026-05 user-request (second iteration): cap Top Findings at 5
        # so the Management Summary stays a true scan-first surface. §8
        # Threat Register is the canonical full catalogue. min: 3 keeps
        # small assessments from rendering an empty / 1-row tabelle.
        min: 3
        max: 5
    footer_template: |
      {% if total_qualifying > rendered_count %}
      _+{{ total_qualifying - rendered_count }} additional ≥High findings — see [§8 Threat Register](#8-threat-register)._
      {% endif %}

      _Legend: 🔴 Critical (directly exploitable, major impact) · 🟠 High (significant impact; exploit requires preconditions or chained step). **Path** glyphs ①–⑦ link to the matching attack-path bullet in [Security Posture at a Glance](#security-posture-at-a-glance)._

  architecture_assessment:
    heading: "### Architecture Assessment"
    heading_numbered: false
    fragment_type: data
    fragment: "ms-architecture-assessment.json"
    schema:   "architecture-assessment.schema.json"
    template: "architecture-assessment.md.j2"
    table:
      columns:
        - { key: defect,       header: "Defect",       render: bold_text,     required: true }
        - { key: description,  header: "Description",  render: plain_text,    required: true }
        - { key: key_findings, header: "Key Findings", render: finding_list,  required: true }
      rows:
        min: 3
        max: 6

  mitigations:
    heading: "### Mitigations"
    heading_numbered: false
    fragment_type: computed                         # derived from threat-model.yaml mitigations[]
    sub_tables:
      - id: prioritized_mitigations
        heading: "#### Prioritized Mitigations"
        filter: "addresses_any_severity in [Critical, High]"
        sort: [effort_rank:asc, addressed_count:desc]
        intro: "The mitigations below address the Critical and High findings in the Top Findings table and must be completed before any production deployment. Entries are ordered by effort (lowest first), then by number of threats addressed (highest first)."
      - id: followup_mitigations
        heading: "#### Follow-up Mitigations"
        filter: "addresses_any_severity in [Medium, Low] OR (addresses_any_severity == High AND id NOT IN prioritized_mitigations)"
        sort: [effort_rank:asc, addressed_count:desc]
        intro: "The mitigations below address the remaining High/Medium findings not covered above and should be scheduled within the current or next sprint. Same ordering rule applies (effort ascending, findings-addressed descending)."
    table:
      # Post-2026-05 — Top Mitigations is a single central table sub-grouped
      # by component via divider rows. The Component column is dropped from
      # the data rows because the divider row carries the bucket label.
      columns:
        - { key: priority,   header: "Priority",   render: priority_badge,    required: true, enum: [P1, P2] }
        - { key: mitigation, header: "Mitigation", render: mitigation_id,     required: true }
        - { key: addresses,  header: "Addresses",  render: finding_list,      required: true }
        - { key: effort,     header: "Effort",     render: effort_badge,      required: true, enum: [Low, Medium, High] }
      rows:
        # 2026-05 user-request (second iteration): cap Top Mitigations
        # at 5 (was 10). Overflow falls through to §9 Mitigation Register
        # which carries the full P1/P2/P3 catalogue with `Why` / `How` /
        # verification detail. The §1 surface keeps only the highest-
        # leverage P1 entries.
        min: 3
        max: 5

  operational_strengths:
    heading: "### Operational Strengths"
    heading_numbered: false
    fragment_type: computed                         # derived from yaml security_controls[]
    filter: "effectiveness in [adequate, partial, weak] AND show_in_strengths_by_default"
    sort: [effectiveness_rank:asc, cluster_definition_order:asc]
    # M3.10 — categorical cluster layout. Fine-grained controls are
    # grouped via data/strength-clusters.yaml into broad strength
    # clusters (Hardened HTTP Stack, Authentication & Session Management,
    # …). Each row aggregates its constituent controls' implementations.
    # The legacy 5-column schema (Architectural Control / Implementation /
    # Effectiveness / Gap / Mitigates) is retired — the new schema below
    # is the contract.
    table:
      columns:
        - { key: label,           header: "Strength",        render: bold_text,           required: true }
        - { key: what_in_place,   header: "What's in Place", render: plain_text,          required: true }
        - { key: effectiveness,   header: "Effectiveness",   render: effectiveness_badge, required: true }
        - { key: gap,             header: "Gap",             render: plain_text,          required: false }
        - { key: mitigates,       header: "Mitigates",       render: finding_list,        required: false }
      rows:
        min: 1
        max: 8
        truncation_footnote: "_+{overflow_count} additional control(s) catalogued in [Section 7](#7-security-architecture)._"
    intro_conditional:
      condition: "verdict_severity in [yellow, red]"
      template: "Despite the {{ intentionally_vulnerable_or_deficient }} design, the project implements several security-relevant controls. None fully mitigate a Critical finding, but each narrows part of the attack surface. This table is a filtered view of [Section 7](#7-security-architecture) — rows with effectiveness ≥ Weak."
    footer_template: "**Bottom line:** {{ bottom_line }}"

  # -------------------------------------------------------------------------
  # C. Numbered body sections — prose-heavy, fragment-as-markdown
  # -------------------------------------------------------------------------

  system_overview:
    heading: "## 1. System Overview"
    heading_numbered: true
    fragment_type: markdown
    fragment: "system-overview.md"
    # No schema — pure prose. Renderer validates that first line matches heading.

  # §1.5 Identified Actors — table of resolved ACT-* actors with layer,
  # status, finding counts, and per-component relevance (actors.md §14).
  # `computed` because the renderer derives the table from threat-model.yaml
  # + .actors-resolved.json — no LLM fragment is consulted.
  # Conditional via `has_resolved_actors`: skipped on legacy runs without
  # `.actors-resolved.json` (pre-Phase 2.7 caches) so the section gracefully
  # disappears instead of failing the contract.
  identified_actors:
    heading: "## 1.5 Identified Actors"
    heading_numbered: false   # half-step numbering — not part of §1→§2 sequence
    fragment_type: computed
    # No fragment file. No required_subsections — sub-headings are renderer-emitted
    # and depend on whether proposed / disabled / dormant actors exist this run.

  architecture_diagrams:
    heading: "## 2. Architecture Diagrams"
    heading_numbered: true
    fragment_type: markdown
    fragment: "architecture-diagrams.md"
    # Reference layout has exactly these four subsections, in this order.
    # "Security Architecture Assessment" was removed — its content is now in §7.
    # "Data Flow Matrix" and "Trust Boundaries" are NOT canonical §2 sub-sections.
    required_subsections:
      - { level: 3, title: "2.1 System Context" }
      - { level: 3, title: "2.2 Container Architecture" }
      - { level: 3, title: "2.3 Components" }
      - { level: 3, title: "2.4 Technology Architecture" }
    # These §2.x sub-section titles are forbidden — their content lives in §7.
    forbidden_subsection_patterns:
      - "^2\\.5 Security Architecture Assessment"
      - "^2\\.\\d+ Data Flow Matrix"
      - "^2\\.\\d+ Trust Boundaries"
    required_patterns:
      - '```mermaid'                                # at least one Mermaid block

    # ---------------------------------------------------------------------
    # Diagram compactness — Single-Source-of-Truth (post-2026-05).
    # ---------------------------------------------------------------------
    # The §2.3 Components and §2.4 Technology Architecture diagrams in
    # earlier runs grew wide and unreadable: 5 subgraphs side-by-side, 10+
    # nodes, 80–120-char labels carrying tech name + version + defect-list.
    # That extra detail belongs in the §2.4.1–§2.4.4 layer tables and in
    # §7/§8 — not in the diagram label. The rules below pin a compact
    # 4-tier layout (orientation: top-down) and are consumed by:
    #
    #   * scripts/pregenerate_fragments.py — generates scaffolds that
    #     obey the limits by construction.
    #   * scripts/compose_threat_model.py — when `skip_phase11_enrichment`
    #     is true, the Phase-11 LLM is forbidden from re-authoring the
    #     listed sub-sections (Pre-Gen output is canonical).
    #   * scripts/qa_checks.py — `check_diagram_compactness` parses every
    #     Mermaid block in §2, counts subgraphs / nodes / label-lines,
    #     verifies the required classDef block is present, and runs the
    #     threat-traceability cross-check. Violations raise a repair-plan
    #     action that the Re-Render Loop consumes.
    #
    # The contract is the SoT — never duplicate a limit in code. If a limit
    # needs to change, edit it here.
    diagram_compactness:
      # Fix (1): §2.2 Container Architecture was previously unvalidated,
      # leading to minimal 3-box diagrams with no port labels and no auth
      # middleware named as a distinct unit. These rules ensure the diagram
      # carries protocol+port edge labels and names the auth middleware box
      # when one exists (detected via the presence of express-jwt / similar
      # tokens in the recon summary).
      "2.2 Container Architecture":
        layout_keyword: "flowchart TB"
        max_subgraphs: 4
        max_nodes_total: 8
        max_label_lines: 3
        max_label_chars_per_line: 60
        # Every edge in §2.2 must carry a label that names the protocol.
        # A bare `-->` without a label is forbidden — it hides whether
        # traffic is HTTP, HTTPS, an ORM call, a file I/O path, etc.
        require_edge_labels: true
        # §2.2 is authored by pregenerate_fragments.py and may be enriched
        # by the Phase-11 renderer when ENRICH_ARCH_FRAGMENTS=true.
        # Unlike §2.3/§2.4 the Phase-11 LLM IS allowed to enrich §2.2
        # (it adds port numbers and names the auth middleware box).
        skip_phase11_enrichment: false

      "2.3 Components":
        # Mandatory mermaid declaration line — `graph LR` is forbidden
        # because horizontal layout pushes the diagram beyond viewport
        # width on every viewer we tested.
        layout_keyword: "flowchart TD"
        max_subgraphs: 4
        max_nodes_total: 8
        max_label_lines: 3
        max_label_chars_per_line: 60
        # The four canonical tier-subgraphs. The pre-generator emits them
        # in this exact id/title pair; qa_checks rejects deviation.
        required_subgraphs:
          - { id: "EXT",    title: "Untrusted Zone - Internet" }
          - { id: "CLIENT", title: "Client Tier" }
          - { id: "APP",    title: "Application Tier" }
          - { id: "DATA",   title: "Data Tier" }
        # Audit actor convention — verbatim color values. The classDef block
        # MUST appear at the bottom of the mermaid block (after edges).
        required_classdefs:
          legit:    "fill:#e8f1ea,stroke:#2e7d32,color:#1b5e20,stroke-width:1.5px"
          threat:   "fill:#f3dada,stroke:#b71c1c,color:#7f0000,stroke-width:2px"
          external: "fill:#f2f2f2,stroke:#424242,color:#212121,stroke-width:1.5px"
          risk:     "fill:#fef2f2,stroke:#991b1b,color:#111,stroke-width:2.5px"
        # Edge convention — inverted from the heatmap (which uses solid =
        # attack, dashed = consequence). In §2.3 the question is "who
        # talks legitimately to whom?", so legit data flow is the visual
        # default (solid green) and intrusion vectors are the deviation
        # (dashed red).
        edge_convention:
          legit:  { arrow: "-->",   linkstyle: "stroke:#2e7d32,stroke-width:1.5px" }
          attack: { arrow: "-.->",  linkstyle: "stroke:#b71c1c,stroke-width:2.5px,stroke-dasharray:6 4" }
        # When a tier holds ≥2 components, render the first as the main
        # node and append the rest as `<br/>+ C-NN <name>` bullets in the
        # same node label. Keeps the diagram at ≤4 subgraphs even for
        # microservice-style decompositions.
        sub_component_aggregation: "bullet_list_in_parent_label"
        # Bidirectional traceability — every T-NNN cited in a node label
        # or edge label MUST resolve to a §8 Threat Register entry; every
        # Critical/High threat from §8 MUST appear EITHER in this diagram
        # (node or edge label) OR in a §2.4.x Layer table row. This
        # closes the "diagram simplification dropped a Critical finding"
        # gap.
        require_threat_traceability: true
        # The Phase-11 enrichment LLM has historically rewritten this
        # block into 5-subgraph / 10-node forms. Lock the Pre-Gen output
        # as canonical for §2.3.
        skip_phase11_enrichment: true

      "2.4 Technology Architecture":
        layout_keyword: "flowchart TD"
        max_subgraphs: 4
        # Raised from 6 → 10 post-2026-05-05: the heuristic tech-stack
        # detection (sequelize / sqlite / marsdb / socket.io / docker /
        # github / etc.) routinely surfaces 7-9 distinct technologies in
        # mature web stacks. A 6-node ceiling forced the diagram to
        # collapse onto generic placeholders ("Application Server",
        # "Data Layer") and lose the per-tech identity that auditors
        # actually need.
        max_nodes_total: 10
        max_label_lines: 2
        max_label_chars_per_line: 60
        required_subgraphs:
          - { id: "CLIENT", title: "Client Tier" }
          - { id: "APP",    title: "Application Tier" }
          - { id: "DATA",   title: "Data Tier" }
        # The 4th subgraph is OPTIONAL when the assessment includes
        # cross-cutting infra (Docker, public source repo). Pre-Gen emits
        # it when those facts exist in `threat-model.yaml`.
        optional_subgraphs:
          - { id: "INFRA", title: "Cross-Cutting" }
        required_classdefs:
          risk: "fill:#fef2f2,stroke:#991b1b,color:#111,stroke-width:2.5px"
          ok:   "fill:#e8f1ea,stroke:#2e7d32,color:#1b5e20,stroke-width:1.5px"
        # §2.4 has no attack-vector edges (it's a tech-stack overview, not
        # a data-flow diagram). Only legit data flow + supply-chain edges.
        edge_convention:
          legit:        { arrow: "-->",  linkstyle: "stroke:#424242,stroke-width:1.5px" }
          supply_chain: { arrow: "-.->", linkstyle: "stroke:#9e9e9e,stroke-width:1px,stroke-dasharray:3 3" }
        # Detail tables §2.4.1–§2.4.4 were removed 2026-05 per user request:
        # they duplicated the §2.3 component table and the §8 Threat Register
        # without adding new signal. §2.4 now keeps only the technology-stack
        # mermaid + 1-paragraph intro.
        require_layer_tables: false
        # Threat traceability is enforced at §2.3 (the canonical surface).
        # Re-requiring it at §2.4 historically forced the renderer to repeat
        # the same T-NNN list, which the LLM repair path materialised as the
        # "Threat IDs in scope:" blockquote — that block is removed.
        require_threat_traceability: false
        skip_phase11_enrichment: true

  attack_walkthroughs:
    heading: "## 3. Attack Walkthroughs"
    heading_numbered: true
    fragment_type: markdown
    fragment: "attack-walkthroughs.md"
    # §3.1 is ALWAYS "Attack Chain Overview". It MUST contain ONE `graph LR`
    # block PER attack chain — NOT a single mega-graph with subgraphs. Each
    # chain is headed `#### Chain N — <name>` and followed by one `graph LR`
    # block + one `**Key takeaway:**` sentence.
    #
    # BANNED: a single `graph TD` or `graph LR` that uses `subgraph` clusters
    # to merge all chains into one diagram. These are horizontal, unreadably
    # wide, and cannot be navigated on a standard screen. The QA reviewer
    # flags any §3.1 graph with > 8 nodes as a readability defect and raises
    # a repair-plan entry. See §7.4 Diagram readability checks in the QA agent.
    #
    # From §3.2 onwards, one numbered sub-section per Critical finding with a
    # `sequenceDiagram` showing `alt Current state` / `else After mitigation`.
    required_subsections:
      - { level: 3, title_pattern: "^3\\.1 Attack Chain Overview" }
    # The §3.1 subsection requirement, the per-Critical sequenceDiagrams,
    # and the chain-overview `graph LR` pattern check ALL apply only when
    # walkthroughs are actually being authored. At quick depth
    # SKIP_ATTACK_WALKTHROUGHS=true and the §3 body is reduced to a one-
    # line notice with no §3.1 heading - the user gains nothing from a
    # heading whose only body is "see §8 Threat Register".
    required_subsections_condition: "not skip_attack_walkthroughs"
    # required_patterns and per_critical_subsection apply only when
    # SKIP_ATTACK_WALKTHROUGHS is not set. When that flag is true, the
    # fragment contains only a skip notice — no Mermaid diagrams are expected.
    # qa_checks.py and check_inline_shortcut.py read .skill-config.json to
    # determine whether to enforce these patterns.
    required_patterns:
      - "sequenceDiagram"                           # per-Critical walkthrough
      - '```mermaid\s*\n\s*graph LR'               # §3.1 chain-overview MUST use graph LR
    required_patterns_condition: "not skip_attack_walkthroughs"
    per_critical_subsection: true                   # §3.2+ = one per Critical finding
    per_critical_subsection_condition: "not skip_attack_walkthroughs"

    # ---------------------------------------------------------------------
    # Walkthrough quality — guard against trivial-stub renderings (added
    # 2026-05 after a Stage-2 re-render produced 3 stub chains of the form
    # `attacker --> threat --> "Privileged access"`, defeating the point of
    # §3). Consumed by qa_checks.py:
    #
    #   * check_walkthrough_coverage — one §3.x sub-section per Critical
    #     threat in `threat-model.yaml`. When N Criticals exist, exactly
    #     N H3 blocks must appear in §3 (excluding §3.1). Repair plan
    #     enumerates each missing T-NNN by id + title.
    #
    #   * check_walkthrough_depth — per §3.x walkthrough body:
    #       - sequenceDiagram block MUST carry `alt Current state` and
    #         `else After mitigation` (or the legacy `else After M-NNN`)
    #         when `require_alt_else_block` is true.
    #       - body line count (between the `### 3.x` heading and the next
    #         H3 / H2) must be ≥ `min_body_lines`. Stub renderings score
    #         < 10 lines; a real walkthrough is 25+.
    #     §3.1 chain overview blocks additionally must carry ≥
    #     `min_chain_overview_nodes_per_block` distinct nodes. This is
    #     stricter than the existing `max_nodes_per_block` (which is the
    #     upper bound).
    # ---------------------------------------------------------------------
    walkthrough_depth:
      # Per §3.x walkthrough (skipped for §3.1 — that block is governed by
      # chain_compactness above).
      #
      # 2026-05 iteration 3: shrunk back to ~5 lines after reader feedback
      # that the 70-100 line walkthroughs drowned the actual attack story
      # in boilerplate (Detection Signals / Cross-references / Prereqs were
      # mostly padding). Walkthroughs are now short and concise: a brief
      # intro, the attack steps, and a focused sequence diagram. Detection
      # Signals / Business Impact / Cross-references are dropped (§8 row
      # already carries the same data).
      min_body_lines: 5
      require_alt_else_block: false
      # §3.1 Attack Chain Overview chains — minimum non-trivial size.
      # The chain_compactness block above caps the UPPER bound at 6 nodes;
      # this is the LOWER bound. Together they pin the corridor.
      min_chain_overview_nodes_per_block: 4
      # Per-§3.x section structure — every walkthrough MUST carry these
      # labelled-form blocks in this order. Consumed by
      # `qa_checks.py:check_walkthrough_structure`.
      #
      # 2026-05 iteration 3: reduced from 8 → 3. Attacker Profile (folded
      # into the intro sentence), Prerequisites (mostly boilerplate),
      # Business Impact / Detection Signals (already covered in §8 row),
      # and Cross-references (the §8 Threat Register row holds them) are
      # all dropped.
      required_labelled_sections:
        - "Attack Steps"
        - "Sequence Diagram"
        - "Defense in Depth"
      # The labelled-form sections must be **bold-headed** (`**Title**`),
      # not `####` H4 headings — `####` are reserved for §3.1 Chain blocks.
      labelled_section_format: bold
      # Renderer must replace every `<!-- WALKTHROUGH_FILL: ... -->` placeholder
      # before composing. A surviving placeholder is a contract violation.
      forbidden_placeholders:
        - "WALKTHROUGH_FILL"
      # Each chain block under §3.1 must carry a `**Key takeaway:**` line
      # after its `graph LR` block.
      require_chain_key_takeaway: true
      # Each chain block under §3.1 must be headed by `#### Chain N — <name>`
      # (NOT a flat `- Chain N` bullet, NOT a level-3 heading).
      require_chain_subsection_heading: true
    per_critical_subsection_condition: "not skip_attack_walkthroughs"

    # ---------------------------------------------------------------------
    # §3.1 Attack Chain compactness — Single-Source-of-Truth (post-2026-05-05).
    # ---------------------------------------------------------------------
    # Same SoT pattern as §2.x diagram_compactness (sections.architecture_
    # diagrams.diagram_compactness above) but tailored to §3.1's MULTI-
    # block structure: each attack chain is its own `graph LR` block under
    # a `#### Chain N — <name>` heading. The constraints below are
    # consumed by:
    #
    #   * scripts/qa_checks.py:check_chain_compactness — parses every
    #     `graph LR` block under §3.1, validates count + node count
    #     per block + classDef + threat-traceability per chain.
    #   * Phase-11 LLM authoring: chains stay narrative + repo-specific,
    #     so `skip_phase11_enrichment: false` (the LLM still authors).
    #
    # The contract is the SoT — never re-implement these limits in code.
    chain_compactness:
      "3.1 Attack Chain Overview":
        # Each chain block must use `graph LR` (sequence reads left→right).
        layout_keyword: "graph LR"
        # `graph TD` and any other layout keyword are forbidden under §3.1
        # because vertical chain layouts break the read pattern.
        forbidden_layout_keywords:
          - "graph TD"
          - "graph TB"
          - "flowchart TD"
          - "flowchart TB"
        # Hard cap on the number of chains. >5 chains usually means the
        # author tried to enumerate every Critical finding individually —
        # those belong as standalone walkthroughs in §3.2+, not as
        # chain-overview entries. Top-5 most impactful chains is the
        # design intent.
        max_blocks: 5
        # Per-chain node count. 6 covers entry-point + 2-3 finding nodes
        # + impact node + (optional) intermediate stage. Anything more is
        # a sign the chain is actually two chains spliced together.
        max_nodes_per_block: 6
        # No subgraph clusters allowed under §3.1 — each chain MUST be
        # its own clean `graph LR` block. Subgraph-merged mega-graphs
        # (the historic anti-pattern) are explicitly forbidden.
        max_subgraphs_per_block: 0
        # Label limits — chain nodes are typically `T-NNN <short title>`
        # or `<entry point name>` or `<impact label>`; one line of ~70
        # chars is plenty.
        max_label_lines: 1
        max_label_chars_per_line: 70
        # Audit palette — verbatim. `risk` for finding nodes, `impact`
        # for the chain's terminal business-impact node.
        required_classdefs:
          risk:   "fill:#f3dada,stroke:#b71c1c,color:#7f0000,stroke-width:2px"
          impact: "fill:#0f172a,stroke:#000,color:#fff,stroke-width:2px"
        # Per-block threat traceability: every chain must contain at
        # least one T-NNN reference whose §8 entry exists. Chains
        # without any threat reference aren't attack chains — they're
        # generic data-flow diagrams that belong in §2.x.
        require_threat_per_block: true
        # Phase-11 authoring stays enabled — chains carry repo-specific
        # narrative ("RSA private key in lib/insecurity.ts:25 leaks to
        # GitHub clone") that cannot be derived from the yaml alone.
        skip_phase11_enrichment: false

  assets:
    heading: "## 4. Assets"
    heading_numbered: true
    fragment_type: markdown
    fragment: "assets.md"
    required_patterns:
      - "\\| Asset \\|"                             # must contain an Asset table

  attack_surface:
    heading: "## 5. Attack Surface"
    heading_numbered: true
    fragment_type: markdown
    fragment: "attack-surface.md"
    required_subsections:
      - { level: 3, title_pattern: "^5\\.1 Unauthenticated Entry Points" }
      - { level: 3, title_pattern: "^5\\.2 Authenticated Entry Points" }

  # §6 Use Cases removed (2026-05). The numbering gap (§5 → §7) is
  # intentional. Re-introduction would require: (1) re-adding this section
  # block, (2) restoring `use_cases` to all `order:` lists above,
  # (3) reinstating `gen_use_cases` in scripts/pregenerate_fragments.py,
  # (4) restoring `use_cases` in scripts/compose_threat_model.py
  # FRAGMENT_PATHS / dispatcher / has_use_cases condition.

  skipped_sections_placeholder:
    heading: ""           # no heading; the body is a single italic line.
    heading_numbered: false
    fragment_type: computed
    # Renderer: _render_skipped_sections_placeholder.
    # Active only when §7 is suppressed (quick depth without a rich prior
    # §7 to preserve). Emits one italic explanation line so the §5 -> §8
    # numbering jump is visible to the reader as intentional.

  security_architecture:
    heading: "## 7. Security Architecture"
    heading_numbered: true
    fragment_type: markdown
    fragment: "security-architecture.md"
    # M6 (2026-05) — The v1 15-section layout (7.1 Overview, 7.2 Key
    # Architectural Risks, 7.3 Identity & Access Management, …) was retired
    # when schema_v2 became the single source of truth for §7. Both
    # `compose_threat_model.py:_section_required_subs` and
    # `qa_checks.py:_resolve_section_overlay` already prefer
    # `schema_v2.required_subsections` over a section-level
    # `required_subsections` when both exist (see the explicit overlay at
    # compose_threat_model.py:1427-1431 and qa_checks.py:287-289). Removing
    # the top-level v1 list ensures there is exactly one authoritative
    # subsection set — drift between the two was the 2026-05 failure mode
    # that allowed legacy fragments to claim contract pass while the
    # rendered §7 used v2 anchors.

    # §7 clarity guards — enforced by dedicated runtime checks in
    # scripts/qa_checks.py rather than as YAML patterns, because the
    # generic contract pattern matcher does not currently scan the
    # rendered §7 body. The relevant checks (added 2026-05) are:
    #
    #   * `section7_narrative_placeholders` (M2) — fails when any
    #     `<!-- NARRATIVE_PLACEHOLDER ... -->` token survives in §7.
    #   * `section7_h4_positive_intro` (M7) — fails when an H4 control
    #     block lacks a ≥25-word positive intro paragraph before
    #     `**Security assessment**`, opens with `No `/`Missing`/…, or
    #     when the bare `#### Controls To Confirm` fallback H4 from the
    #     legacy pregenerator survives (it cannot satisfy the intro rule).
    #   * `section7_fence_intro_sentence` (M8) — fails when a code or
    #     Mermaid fence in §7 is not preceded by one introducing sentence
    #     ending in `:`.
    #   * `section7_finding_link_duplicate` (M5c) — fails when a finding
    #     bullet under §7 carries the finding title twice.
    #
    # See `docs/security/.section7-gap-analysis.md` for the rationale.
    # §7.3 Identity & Access Management MUST be enriched with a per-auth-method
    # breakdown. For every authentication flow used by the application (e.g.
    # password login, OAuth, TOTP/2FA, SSO), §7.3 needs a #### sub-block with
    # its own sequenceDiagram. The renderer's post-processor scans the §7.3
    # body for these #### blocks; missing mermaid in §7.3 is flagged.
    domain_required_patterns:
      "7.3 Identity & Access Management":
        - "sequenceDiagram"                         # at least one auth flow diagram
        - "####\\s"                                 # at least one ####  auth-method block
    # Structured per-domain rules — extend beyond simple regex patterns.
    # Each rule is a dict with a `rule:` discriminator; rules are enforced by
    # qa_checks.py (post-render gate) and feed into the repair-plan loop.
    # The grammar is additive — sections without a `domain_required_rules`
    # key continue to work exactly as before.
    domain_required_rules:
      "7.3 Identity & Access Management":
        - rule: "auth_method_decomposition"
          # For every row in the §7.3 controls table's `Control` column, the
          # rendered section MUST contain a matching `#### <method name>`
          # subsection with its own `sequenceDiagram` block AND a bold
          # `**Findings in this flow:**` trailer.  T-IDs cited in the trailer
          # MUST be a subset of the row's `Linked Threats` cell (bidirectional
          # consistency — prevents per-method risk visibility from being lost
          # when multiple auth methods are collapsed into one flow diagram).
          #
          # match_style:
          #   token-subset  (default) — the row's lowercased alphanumeric token
          #                 set must be a subset of some heading's token set.
          #                 Example: row "Google OAuth" ⊆ heading
          #                 "Google OAuth 2.0 Flow"  → match.
          #   exact         — method name and heading must match verbatim.
          #
          # synonyms:
          #   Optional list of `{ row: "...", heading: "..." }` overrides for
          #   cases where token-subset matching is not sufficient (e.g. when
          #   the table row uses an abbreviation that does not appear in the
          #   rendered heading).  Matching via synonyms is tried before the
          #   configured `match_style`.
          #
          # enforcement:
          #   error    — violations flow into `report.issues`, counted against
          #              the QA gate, and emit repair-plan actions that the
          #              Re-Render Loop consumes (hard contract enforcement).
          #   warning  (default until the accompanying agent-prompt update
          #              ships) — violations flow into `report.warnings`,
          #              surfaced in the summary for authors but do NOT drive
          #              the Re-Render Loop. Exists as a migration path so
          #              pre-existing threat models do not hard-fail the
          #              moment this rule is declared in the contract.
          table_column: "Control"
          heading_level: 4
          trailer_label: "Findings in this flow"
          # `heading_pattern` (optional) — when set, every matching #### block
          # must obey this regex. Groups are informational. Used to require
          # `#### 7.3.N <name> Flow` numbering so the auth-method blocks are
          # discoverable from the TOC.
          heading_pattern: '^7\.3\.\d+\s+.+\s+Flow$'
          # `required_trailers` (optional) — list of bold labels that every
          # matching #### block must carry, in any order. Each trailer must
          # appear on its own line as `**<label>:**`. The list is additive
          # to the legacy `trailer_label` field; both are checked.
          required_trailers:
            - "Risk assessment"
            - "Findings in this flow"
          # `required_body_elements` (optional) — list of substrings that
          # must appear anywhere in the block body. Used to require a
          # sequenceDiagram and a controls table per flow.
          required_body_elements:
            - "sequenceDiagram"
            # Fix (3): §7.3.N flow sub-sections historically opened directly
            # with a ```mermaid fence, giving readers no orientation before
            # the timing diagram. The `intro_before_diagram` token is a
            # sentinel checked by _run_auth_structural_checks via a
            # dedicated code path (not a simple substring match) — it
            # verifies that at least one non-empty prose line appears
            # between the #### heading and the first ```mermaid fence.
            - "intro_before_diagram"
          match_style: "token-subset"
          synonyms:
            - { row: "Password Login", heading: "7.3.1 Password Login Flow" }
            - { row: "User Registration", heading: "7.3.2 User Registration Flow" }
          # Enforcement upgraded from "warning" to "error" post-2026-05.
          # The previous warning-only mode let the LLM ship §7.3 with only
          # 1–2 attack-shaped sub-blocks (e.g. "alg:none Bypass Flow")
          # while leaving Password Login, OAuth, TOTP, etc. completely
          # undocumented. Auth-method decomposition is the WHOLE POINT
          # of §7.3 — a missing decomposition is a release blocker, not
          # a soft warning.
          enforcement: "error"
          # Block patterns that describe ATTACKS rather than AUTH METHODS.
          # The LLM has historically emitted "alg:none Bypass Flow",
          # "JWT Forgery Flow", "Session Hijack Flow" as §7.3.N headings —
          # those are exploitation paths and belong in §3 Attack
          # Walkthroughs, not in the §7.3 auth-method inventory. Headings
          # matching any of these patterns are flagged as contract
          # violations during the QA gate.
          forbidden_heading_patterns:
            # Attack-shaped headings — these describe exploits, not auth methods.
            # An attack walkthrough belongs in §3 Attack Walkthroughs, not §7.3.
            - "(?i)\\bbypass\\b"
            - "(?i)\\bforgery\\b"
            - "(?i)\\bhijack\\b"
            - "(?i)\\battack\\b"
            - "(?i)\\bexploit\\b"
            - "(?i)alg[:=]none"
            # Token-format-only headings (no mechanism context). A token format
            # is a transport detail, not a way identity is established. The
            # 2026-04-27 juice-shop run shipped "JWT RS256 Signing Flow" in
            # place of "Password Login Flow" / "OAuth Flow" — same regression
            # this list of patterns prevents recurring.
            - "^7\\.\\d+\\.\\d+\\s+JWT(\\s+(RS|HS|ES|PS)\\d{3})?(\\s+(Signing|Issuance|Validation|Verification))?\\s+Flow\\s*$"
            - "^7\\.\\d+\\.\\d+\\s+(PASETO|SAML\\s+Token)(\\s+\\w+)?\\s+Flow\\s*$"
            - "^7\\.\\d+\\.\\d+\\s+Bearer\\s+Token\\s+Flow\\s*$"
            # Primitive-only headings — these are building blocks (hashing,
            # signature verification, rate limiting, session revocation,
            # token storage). They live in the §7.3 controls table only.
            - "(?i)^7\\.\\d+\\.\\d+\\s+Password\\s+Hashing\\s+Flow\\s*$"
            - "(?i)^7\\.\\d+\\.\\d+\\s+(Signature\\s+Verification|Signature\\s+Check)\\s+Flow\\s*$"
            - "(?i)^7\\.\\d+\\.\\d+\\s+(Rate[\\s-]?Limiting|Rate[\\s-]?Limit|Throttling|Account\\s+Lockout)\\s+Flow\\s*$"
            - "(?i)^7\\.\\d+\\.\\d+\\s+Session\\s+Revocation\\s+Flow\\s*$"
            - "(?i)^7\\.\\d+\\.\\d+\\s+Cookie(\\s+Flag)?(\\s+\\w+)?\\s+Flow\\s*$"
            - "(?i)^7\\.\\d+\\.\\d+\\s+Token\\s+(Storage|Blocklist|Blacklist)\\s+Flow\\s*$"
          # `method_whitelist` (optional, Sprint 2B / M3.5) — only Control
          # rows whose name (or a synonym) tokenises to a SUPERSET of one
          # of the whitelisted method tokens are considered actual auth
          # methods that warrant a dedicated #### Flow sub-section. Other
          # rows in §7.3 (e.g. "Password Hashing", "Login Rate Limiting",
          # "express-jwt middleware") are implementation details / cross-
          # cutting controls and stay in the controls table only — no
          # sequence diagram is demanded.
          #
          # Without this filter the checker emits a warning per non-method
          # control row (5 of 11 warnings on the 2026-04-27 juice-shop run
          # were of this kind), which dilutes the signal and confuses the
          # repair plan.
          #
          # Matching: the row's lowercased token set must contain ALL
          # tokens of any whitelist entry. Multi-word entries match only
          # when every token is present; single-word entries match any
          # row that mentions them. Empty list = legacy behaviour (every
          # row is a method, no filtering).
          method_whitelist:
            # User-facing web auth mechanisms
            - "password login"
            - "oauth"
            - "oidc"
            - "openid"
            - "saml"
            - "sso"
            - "totp"
            - "2fa"
            - "mfa"
            - "passkey"
            - "webauthn"
            - "password reset"
            - "change password"
            - "session"
            - "magic link"
            - "magic-link"
            - "passwordless"
            # Service-to-service / cloud-IAM mechanisms (post-2026-05).
            # Mirrors the IAM mechanism list in architectural-controls.yaml —
            # any new entry there with `kind: mechanism` should be reflected
            # here so the §7.3.N heading validator accepts it.
            - "mtls"
            - "mutual tls"
            - "client certificate"
            - "client cert"
            - "webhook"
            - "hmac"
            - "api key"
            - "api-key"
            - "bearer token"
            - "iam role"
            - "assume role"
            - "service account"
            - "managed identity"
            - "workload identity"
            - "irsa"
            - "spiffe"
            - "spire"
            - "service mesh"
            - "anonymous"
            - "no auth"
            # Token-format alias retained for transitional backward compat —
            # `forbidden_heading_patterns` above still hard-fails plain
            # "JWT RS256 Signing Flow" headings, so listing "jwt" here only
            # admits headings like "JWT-Bearer Service Authentication Flow"
            # that combine the token format WITH a real mechanism token.
            - "jwt"
            # Account creation mechanisms
            - "user registration"

        # Fix (5): Recon-to-IAM bridge rule.
        # When the recon summary contains TOTP/2FA signals (totpSecret,
        # routes/2fa, otplib, authenticator), the §7.3 control table MUST
        # contain at least one row whose name matches a 2FA/TOTP whitelist
        # token. Without this rule the gate only fires when TOTP already
        # appears in the table — the original miss (routes/2fa.ts found by
        # recon but never surfaced in .security-controls.json) would
        # silently pass the contract again.
        # Implementation: qa_checks.py check_recon_iam_bridge() reads
        # .recon-summary.md from the output-dir, checks for 2fa_patterns,
        # and cross-validates against the §7.3 control table.
        - rule: "recon_iam_bridge"
          recon_signal_patterns:
            - "totpSecret"
            - "routes/2fa"
            - "otplib"
            - "/rest/2fa"
            - "totp_token_required"
          required_iam_tokens:
            - "totp"
            - "2fa"
            - "mfa"
          enforcement: "error"

      # Fix (7): Dense "Where it falls short." paragraphs.
      # When a domain's `**Where it falls short.**` block contains ≥3
      # distinct [F-NNN] / [T-NNN] references in a single paragraph
      # (no intervening blank line), the block MUST use a bullet list.
      # Prose paragraphs mixing 3+ unrelated findings violate prose-style
      # Rule 4 ("enumerations of three or more items become bullet lists").
      # Enforced for every §7.X domain that uses the three-bold-label pattern.
      "all_domains":
        - rule: "falls_short_bullet_threshold"
          # Minimum number of [F/T-NNN] refs in a single paragraph of the
          # `**Where it falls short.**` block before a bullet list is required.
          min_refs_before_bullet: 3
          enforcement: "warning"
          # Note: "warning" not "error" because the QA agent can auto-repair
          # by reformatting the paragraph as bullets. Hard-fail would block
          # runs where the agent hasn't yet had a turn to fix it.

        - rule: "paragraph_density_threshold"
          # M-6: Generalises the bullet rule to every §7.x narrative paragraph
          # (not just `**Where it falls short.**` blocks). Catches the case
          # where the LLM ships a wall-of-text in e.g. §7.13 Secret Management
          # that lists 3+ secrets, threat refs, and mitigations in one block.
          # Counts [F-NNN], [T-NNN], and [M-NNN] refs; table lines and code
          # fences are stripped before counting so register-style tables and
          # examples do not falsely fire. Falls-short blocks are skipped
          # because falls_short_bullet_threshold owns them.
          min_refs_before_bullet: 3
          enforcement: "warning"

        # arch3.md §7 enforcement (2026-05).
        # The three rules below are declarative markers — the actual
        # detection lives in qa_checks.py:check_finding_range_homogeneous,
        # check_dependency_cross_ref, and check_na_against_recon. The
        # rules are listed here so operators inspecting the contract see
        # the full §7 quality surface in one place, and so future
        # adjustments (e.g. promotion to `enforcement: error`) can be
        # made by changing this file rather than the checker code.

        - rule: "finding_range_homogeneous"
          # Flag `[F-NNN]..[F-MMM]` range citations in §7 prose when the
          # spanned findings belong to different primary weakness
          # clusters (per data/weakness-classes.yaml). The 2026-05
          # juice-shop run cited the four XSS findings as "F-016..F-021"
          # but F-019 (Session/Storage) and F-020 (Headers) are NOT XSS.
          # A range citation is only correct when every F-ID in the span
          # shares the same cluster.
          enforcement: "warning"

        - rule: "dependency_cross_ref"
          # Findings whose cluster=outdated_deps or whose title/excerpt
          # names a known vulnerable library token (express-jwt, notevil,
          # libxmljs2, sanitize-html, etc.) MUST be referenced in §7.11
          # Operations Runtime and Supply Chain Controls. Since 2026-05
          # the in-tree `dep-scan` source is gone — supply-chain posture
          # flows via emit_sca_practice.py + emit_known_bad_libs.py to
          # meta_findings[]; this cross-ref rule catches non-MF
          # dep-relevant findings that still need to surface in §7.11.
          enforcement: "warning"

        - rule: "na_against_recon"
          # `_Not applicable_` claims in §7 sub-sections (WebSocket,
          # AI/LLM, Real-time, …) must be consistent with the recon
          # inventory in .recon-summary.md. The 2026-05 juice-shop run
          # shipped "§7.8 Real-time / WebSocket — Not applicable" while
          # Socket.IO is declared in package.json and
          # lib/startup/registerWebsocketEvents.ts exists. When recon
          # evidence is present, the §7 sub-section must either map a
          # finding to the domain or state "present, no findings mapped"
          # explicitly — not claim N/A.
          enforcement: "warning"

    # ------------------------------------------------------------------
    # Schema v2 — current 13-section §7 control-category architecture.
    # When a run resolves `security_schema = v2`, the renderer,
    # pre-generator, composer, and qa_checks consult this block instead of
    # the legacy v1 `required_subsections` / `required_subsection_patterns`
    # above. The v1 block is preserved verbatim so existing threat-models
    # can still be checked with APPSEC_SECURITY_SCHEMA=v1.
    #
    # v2 deliberately groups related controls into architecture-level
    # categories instead of exposing implementation IDs or finding columns in
    # the overview table. Findings are listed only inside the affected
    # control's subsection.
    # ------------------------------------------------------------------
    schema_v2:
      required_subsections:
        - { level: 3, title: "7.1 Security Control Overview" }
        - { level: 3, title: "7.2 Identity and Authentication Controls" }
        - { level: 3, title: "7.3 Session and Token Controls" }
        - { level: 3, title: "7.4 Authorization Controls" }
        - { level: 3, title: "7.5 Query Construction and Data Access Controls" }
        - { level: 3, title: "7.6 Input Boundary Validation Controls" }
        - { level: 3, title: "7.7 Output Encoding and Rendering Controls" }
        - { level: 3, title: "7.8 Browser and Cross-Origin Controls" }
        - { level: 3, title: "7.9 Cryptography Secrets and Data Protection" }
        - { level: 3, title: "7.10 File Parser and Outbound Request Controls" }
        - { level: 3, title: "7.11 Operations Runtime and Supply Chain Controls" }
        - { level: 3, title: "7.12 Real-time and Not Applicable Controls" }
        - { level: 3, title: "7.13 Defense-in-Depth Summary" }

      # Canonical finding → §7.x mapping. Each entry routes findings by
      # CWE (preferred), cluster_id (from weakness-classes.yaml), or
      # explicit category (when set on the threat). The renderer uses
      # this to know where to PRIMARILY list a finding; cross-references
      # in other sections are still allowed but the primary listing is
      # deterministic. qa_checks.py:check_v2_finding_mapping enforces it.
      finding_routing:
        "7.2 Identity and Authentication Controls":
          cwes: [CWE-287, CWE-307, CWE-294, CWE-345, CWE-347, CWE-620, CWE-640, CWE-916]
          clusters: [broken_auth]
        "7.3 Session and Token Controls":
          cwes: [CWE-922, CWE-384, CWE-613, CWE-1004]
          clusters: []
        "7.4 Authorization Controls":
          cwes: [CWE-285, CWE-639, CWE-269, CWE-862, CWE-863, CWE-732, CWE-352, CWE-602, CWE-915]
          clusters: [missing_authz]
        "7.5 Query Construction and Data Access Controls":
          cwes: [CWE-89, CWE-943]
          clusters: []
        "7.6 Input Boundary Validation Controls":
          cwes: [CWE-20, CWE-1284, CWE-1287, CWE-400]
          clusters: []
        "7.7 Output Encoding and Rendering Controls":
          cwes: [CWE-79, CWE-80, CWE-87, CWE-116]
          clusters: [output_xss_csp]
        "7.8 Browser and Cross-Origin Controls":
          cwes: [CWE-1021, CWE-942, CWE-693, CWE-358, CWE-352]
          clusters: []
        "7.9 Cryptography Secrets and Data Protection":
          cwes: [CWE-321, CWE-798, CWE-327, CWE-326, CWE-329, CWE-330, CWE-312, CWE-538, CWE-759]
          clusters: [weak_crypto]
        "7.10 File Parser and Outbound Request Controls":
          cwes: [CWE-611, CWE-22, CWE-23, CWE-409, CWE-776, CWE-94, CWE-95, CWE-918, CWE-601, CWE-441, CWE-548, CWE-552, CWE-749, CWE-200]
          clusters: [server_side_exposure]
        "7.11 Operations Runtime and Supply Chain Controls":
          cwes: [CWE-117, CWE-223, CWE-209, CWE-532, CWE-778, CWE-1104, CWE-1395, CWE-937, CWE-829, CWE-250, CWE-732, CWE-15, CWE-260]
          clusters: [outdated_deps]
          library_token_match: true
        "7.12 Real-time and Not Applicable Controls":
          cwes: []
          clusters: []
          recon_triggers: ["socket.io", "websocket"]

      cross_cutting:
        - "7.13 Defense-in-Depth Summary"

      domain_required_patterns: {}

      domain_required_rules:
        "7.2 Identity and Authentication Controls":
          - rule: "recon_iam_bridge"
            section_title: "7.2 Identity and Authentication Controls"
            recon_signal_patterns:
              - "totpSecret"
              - "routes/2fa"
              - "otplib"
              - "/rest/2fa"
              - "totp_token_required"
            required_iam_tokens:
              - "totp"
              - "2fa"
              - "mfa"
            enforcement: "error"
          # R1 — auth_method_decomposition (ported from v1).
          # §7.2 must decompose into one #### per discovered auth mechanism
          # (User Registration, Password-Based Login, OAuth/OIDC, SAML SSO,
          # TOTP Enrollment/Verification, JWT Issuance/Verification, Password
          # Reset, Password Change, mTLS, Webhook HMAC, …). Headings using
          # token-format-only names (`JWT-RS256`, `PASETO`) or vulnerability-
          # class names (`Authentication bypass prevention`, `JWT library`)
          # are contract violations — they describe transport details or
          # exploits, not authentication mechanisms.
          - rule: "auth_method_decomposition"
            table_column: "Controls covered"
            heading_level: 4
            required_trailers:
              - "Security assessment"
              - "Relevant findings"
            required_body_elements:
              - "intro_before_security_assessment"
            method_whitelist:
              # User-facing web auth mechanisms (mirror of
              # `architectural-controls.yaml::kind: mechanism`)
              - "user registration"
              - "password login"
              - "password-based login"
              - "password reset"
              - "password change"
              - "change password"
              - "oauth"
              - "oidc"
              - "openid"
              - "saml"
              - "sso"
              - "totp"
              - "2fa"
              - "mfa"
              - "passkey"
              - "webauthn"
              - "magic link"
              - "magic-link"
              - "passwordless"
              - "session cookie"
              - "session"
              # Standard JWT operations (Reference §7.2 uses these as ####)
              - "jwt issuance"
              - "jwt verification"
              - "protected route"
              # Service-to-service / cloud-IAM
              - "mtls"
              - "mutual tls"
              - "client cert"
              - "client certificate"
              - "webhook hmac"
              - "webhook signature"
              - "api key"
              - "bearer token"
              - "cloud iam"
              - "service account"
              - "service-mesh"
              - "spiffe"
              - "anonymous access"
              - "no authentication"
            forbidden_heading_patterns:
              # Token-format-only headings — describe transport, not mechanism.
              - "(?i)^#?#?#?#?\\s*jwt[\\s\\-]*(rs|hs|es|ps)\\d{3}\\s*$"
              - "(?i)^#?#?#?#?\\s*jwt[\\s\\-]*(rs|hs|es|ps)\\d{3}\\s+(signing|signing flow)\\s*$"
              - "(?i)^#?#?#?#?\\s*paseto\\s*$"
              # Library-name-only headings — name the mechanism, not the lib.
              - "(?i)^#?#?#?#?\\s*jwt library\\s*$"
              - "(?i)^#?#?#?#?\\s*express-jwt\\s*$"
              - "(?i)^#?#?#?#?\\s*jsonwebtoken\\s*$"
              # Vulnerability-class headings — describe exploits, not controls.
              # Belong in §3 Attack Walkthroughs, not §7.2.
              - "(?i)^#?#?#?#?\\s*authentication bypass( prevention)?\\s*$"
              - "(?i)^#?#?#?#?\\s*credential storage\\s*$"
              - "(?i)^#?#?#?#?\\s*password hashing\\s*$"   # primitive, not mechanism
              - "(?i)\\b(bypass flow|forgery flow|hijack flow|attack flow|exploit flow)\\b"
              - "(?i)alg[:=]none"
            enforcement: "error"
        "all_control_sections":
          - rule: "control_subsection_coverage"
            section_titles:
              - "7.2 Identity and Authentication Controls"
              - "7.3 Session and Token Controls"
              - "7.4 Authorization Controls"
              - "7.5 Query Construction and Data Access Controls"
              - "7.6 Input Boundary Validation Controls"
              - "7.7 Output Encoding and Rendering Controls"
              - "7.8 Browser and Cross-Origin Controls"
              - "7.9 Cryptography Secrets and Data Protection"
              - "7.10 File Parser and Outbound Request Controls"
              - "7.11 Operations Runtime and Supply Chain Controls"
              - "7.12 Real-time and Not Applicable Controls"
            controls_covered_label: "Controls covered"
            heading_level: 4
            required_subsection_labels:
              - "Security assessment"
              - "Relevant findings"
            enforcement: "error"
          - rule: "relevant_findings_bullet_list"
            section_titles:
              - "7.2 Identity and Authentication Controls"
              - "7.3 Session and Token Controls"
              - "7.4 Authorization Controls"
              - "7.5 Query Construction and Data Access Controls"
              - "7.6 Input Boundary Validation Controls"
              - "7.7 Output Encoding and Rendering Controls"
              - "7.8 Browser and Cross-Origin Controls"
              - "7.9 Cryptography Secrets and Data Protection"
              - "7.10 File Parser and Outbound Request Controls"
              - "7.11 Operations Runtime and Supply Chain Controls"
              - "7.12 Real-time and Not Applicable Controls"
            heading_level: 4
            label: "Relevant findings"
            enforcement: "error"
        "all_domains":
          - rule: "falls_short_bullet_threshold"
            min_refs_before_bullet: 3
            enforcement: "warning"
          - rule: "paragraph_density_threshold"
            min_refs_before_bullet: 3
            enforcement: "warning"
          - rule: "finding_range_homogeneous"
            enforcement: "warning"
          - rule: "dependency_cross_ref"
            section_title: "7.11 Operations Runtime and Supply Chain Controls"
            enforcement: "warning"
          - rule: "na_against_recon"
            section_title: "7.12 Real-time and Not Applicable Controls"
            enforcement: "warning"
        # R7 — §7.13 is prose-only. Markdown tables are a contract violation
        # because they invite speculative perimeter-absence claims and break
        # the reference-style "two-paragraph cross-cutting summary" shape.
        "7.13 Defense-in-Depth Summary":
          - rule: "forbidden_constructs"
            forbidden_constructs:
              - "markdown_table"
            enforcement: "error"
          # Patch-management posture derivation (since 2026-05). When the
          # three §7.11 SCA-practice control rows are present (Automated
          # SCA scanning / Automated dependency updates / Lockfile
          # hygiene), §7.13 MUST surface a single "patch management
          # posture" line whose effectiveness is the worst (lowest
          # ranking) of the three control rows. Order:
          #   Adequate > Partial > Missing > Weak
          # Rationale: the converging-signals frame (sca.md §1.5)
          # treats patch-management as a single architectural property —
          # one derived rating across process + outcome indicators is
          # the user-facing summary, not three independent rows.
          - rule: "patch_management_derived_rating"
            controls:
              - "Automated SCA scanning"
              - "Automated dependency updates"
              - "Lockfile hygiene"
            aggregation: "worst-of"
            severity_order:
              # Worst → best (worst-of-three picks the leftmost present)
              - Missing
              - Weak
              - Partial
              - Adequate
            enforcement: "warning"

      # Per-section semantic constraints — used by qa_checks v2.
      # `forbidden_categories`: a finding routed elsewhere by this map
      # MUST NOT be primary-listed here. Surfaces the "F-010 under XSS"
      # mis-categorisation arch3.md §4 calls out.
      forbidden_categories:
        "7.7 Output Encoding and Rendering Controls":
          forbidden_cwes: [CWE-942, CWE-1021, CWE-922]
        "7.5 Query Construction and Data Access Controls":
          forbidden_cwes: [CWE-620]

    note: |
      Section 6 is intentionally absent — it was the former Trust Boundaries
      section; the gap preserves external links from prior runs.

  requirements_compliance:
    heading: "## 7b. Requirements Compliance"
    heading_numbered: true
    anchor: "7b-requirements-compliance"
    fragment_type: markdown
    fragment: "requirements-compliance.md"

  # -------------------------------------------------------------------------
  # E. Threat Register — 100% computed from yaml
  # -------------------------------------------------------------------------

  threat_register:
    heading: "## 8. Threat Register"
    heading_numbered: true
    fragment_type: computed
    data_source: "threat-model.yaml#threats"
    # Reference §8 layout is category-grouped (TH-NN taxonomy), NOT severity-split.
    # Each severity tier gets its own letter so all sub-sections have unique
    # anchors (right-side TOC outline panels showed four indistinguishable
    # `#8b-…` entries in contract v1).
    # - 8.A "Categories at a glance"   : one row per active TH, impact-weighted
    header_template: |
      **Risk Distribution:** {{ risk_dist_line }}

      **STRIDE Coverage:** {{ stride_line }}
    sub_sections: []
    # Schema for the flat finding table.
    #
    # History:
    #  * Pre-2026-05 had 9 columns (ID, Finding, Threat Category, Component,
    #    Criticality, CVSS, Vektor, Mitigation, References). CVSS was
    #    always empty and the four ID-only columns crowded the prose out
    #    of the Finding cell.
    #  * 2026-05 R-5 folded Threat Category / Component / Mitigation /
    #    References inline inside Finding (Story Card layout in
    #    `_build_finding_cell` in `compose_threat_model.py`).
    #  * 2026-05 R-6 swapped the trailing Vektor column for a Component
    #    column so the table groups visually by where the finding lives;
    #    Vektor moved inside the Story Card as a labelled field.
    finding_table:
      columns:
        - { key: id,          header: "ID",          render: finding_anchor }
        - { key: finding,     header: "Finding",     render: story_card }
        - { key: component,   header: "Component",   render: component_ref }
        - { key: criticality, header: "Criticality", render: severity_badge }

  # -------------------------------------------------------------------------
  # F. Mitigation Register — 100% computed from yaml
  # -------------------------------------------------------------------------

  mitigation_register:
    heading: "## 9. Mitigation Register"
    heading_numbered: true
    fragment_type: computed
    data_source: "threat-model.yaml#mitigations"
    sub_tables:
      - { id: p1, heading: "### P1 — Immediate",     filter: "priority == P1", sort: [id:asc] }
      - { id: p2, heading: "### P2 — This Sprint",   filter: "priority == P2", sort: [id:asc] }
      - { id: p3, heading: "### P3 — Next Quarter",  filter: "priority == P3", sort: [id:asc] }
      - { id: p4, heading: "### P4 — Backlog",       filter: "priority == P4", sort: [id:asc] }

  # -------------------------------------------------------------------------
  # G. Back matter
  # -------------------------------------------------------------------------

  out_of_scope:
    heading: "## 10. Out of Scope"
    heading_numbered: true
    fragment_type: markdown
    fragment: "out-of-scope.md"

  appendix_run_statistics:
    heading: "## Appendix: Run Statistics"
    heading_numbered: false
    anchor: "appendix-run-statistics"
    fragment_type: computed
    data_source: "threat-model.yaml#meta.run_statistics"

  appendix_vektor_taxonomy:
    heading: "## Appendix A — Vektor Taxonomy"
    heading_numbered: false
    anchor: "appendix-a-vektor-taxonomy"
    fragment_type: computed
    data_source: "data/breach-vector-taxonomy.yaml"

  # M2.14 — Sprint 6 observability appendix. Conditional: only emitted when
  # the prior compose run reported soft warnings, section retries, or the
  # skill-level auto-retry loop fired (compose_warned condition in the
  # eval_context). Reads from $OUTPUT_DIR/.compose-stats.json (written by
  # _write_compose_stats() in the prior compose iteration) plus
  # .inline-shortcut-retry-count and .qa-status.json for skill-level signals.
  # Goal: persist composition-pipeline health in the canonical artefact
  # itself so users (and PR reviewers) can see what happened during render
  # without having to read .agent-run.log.
  composition_notes:
    heading: "## Appendix: Composition Notes"
    heading_numbered: false
    anchor: "appendix-composition-notes"
    fragment_type: computed
    data_source: ".compose-stats.json + .inline-shortcut-retry-count + .qa-status.json"

  # M2.15 — Sprint 7 observability appendix. Conditional: only emitted when
  # M3.3 — the `run_issues` section is no longer rendered into
  # threat-model.md. The aggregator still writes
  # $OUTPUT_DIR/.run-issues.json (observability data) and the terminal
  # completion summary still surfaces a `-- Run Issues --` block, but
  # the persisted document stays focused on threat content. To re-enable:
  # add the section def below, register `_render_run_issues` in the
  # section-handler dict in scripts/compose_threat_model.py (the
  # function body is preserved), and reinstate the document.order entry
  # `{ id: run_issues, condition: "run_warned" }`.

# ---------------------------------------------------------------------------
# Renderer invariants — checked automatically after rendering
# ---------------------------------------------------------------------------

invariants:
  # Every section listed in `document.order` (minus skipped-by-condition)
  # must produce at least one heading in the final markdown.
  all_sections_rendered: true

  # Section order in the output must match `document.order`.
  section_order_matches_contract: true

  # No forbidden subsection patterns appear under any section's heading.
  no_forbidden_subsections: true

  # Cross-ref integrity: every [T-NNN](#t-nnn) / [M-NNN](#m-nnn) / [C-NN](#c-nn)
  # / [F-NNN](#f-nnn) link resolves to an anchor defined in the document.
  cross_refs_resolve: true

  # Determinism: rendering the same fragments/yaml twice produces byte-identical output.
  render_is_deterministic: true
