# known-bad-libs.yaml
#
# Curated track-record list of dependencies whose architectural choice
# warrants review regardless of which specific CVE is currently outstanding.
# Consumed by scripts/emit_known_bad_libs.py and routed to §7.11 as
# MF-NNN architectural meta-findings (NOT CVE-shaped threats — this file
# is intentionally NOT a vulnerability feed).
#
# Difference from a CVE scan:
#   CVE feed:   "libxmljs2@0.30 has CVE-2023-XYZ Critical severity"
#   This file:  "Repo includes libxmljs2 — multiple unfixed XXE CVEs since
#               2022, no active maintainer. The architectural choice to
#               depend on this parser warrants review."
#
# Curation rules:
#   - Entries are framed by track-record (decade-stable), not current CVE.
#   - Match by (ecosystem, package) tuple — names collide across ecosystems
#     (npm `request` ≠ python `requests`).
#   - No version comparison — the architectural choice is the signal,
#     not the version pin.
#   - Remove entries when libraries get rehabilitated (rare but happens,
#     e.g. colors.js post-2022 fix). Quarterly review cadence.
#
# Severity is capped by asset_tier in emit_known_bad_libs.py via
# data/sca-practice-severity.yaml. The `severity` field here is the
# pre-cap base — for high-impact categories like
# unfixed_critical_cve / historical_supply_chain_compromise it should be
# High by default.

version: 1

# Categories — used by §7.11 rendering and downstream filtering. New
# categories should be added intentionally with a documented rationale.
categories:
  - abandoned_with_known_cves
  - deprecated_abandoned
  - unfixed_critical_cve
  - historical_supply_chain_compromise
  - protestware_incident
  - sandboxed_deprecated

known_bad:

  # ===== npm (12 entries) =====

  - ecosystem: npm
    package: request
    reason: deprecated since 2020-02 (npm advisory deprecation), no security fixes; HTTP library still pulled transitively across the ecosystem
    category: deprecated_abandoned
    severity: Medium

  - ecosystem: npm
    package: node-serialize
    reason: CVE-2017-5941 unsafe deserialization RCE — never patched, package still on npm
    category: unfixed_critical_cve
    severity: Critical

  - ecosystem: npm
    package: event-stream
    reason: 2018 backdoor incident (flatmap-stream supply-chain compromise) — historical precedent for trust review of transitive dependencies
    category: historical_supply_chain_compromise
    severity: Medium

  - ecosystem: npm
    package: colors
    reason: 2022 protestware incident — maintainer intentionally introduced infinite-loop sabotage; rehabilitated but warrants supply-chain review
    category: protestware_incident
    severity: Medium

  - ecosystem: npm
    package: faker
    reason: 2022 protestware — maintainer wiped package; forks (`@faker-js/faker`) exist but the unscoped `faker` name still ships compromised artefact
    category: protestware_incident
    severity: Medium

  - ecosystem: npm
    package: libxmljs2
    reason: multiple unfixed XXE CVEs since 2022; native libxml2 bindings without active security maintenance
    category: abandoned_with_known_cves
    severity: High

  - ecosystem: npm
    package: ua-parser-js
    reason: 2021 supply-chain compromise (malicious versions published via account takeover); historical precedent for trust review
    category: historical_supply_chain_compromise
    severity: Medium

  - ecosystem: npm
    package: notevil
    reason: known-broken JavaScript sandbox — should never be used as a security boundary; multiple escape CVEs
    category: sandboxed_deprecated
    severity: High

  - ecosystem: npm
    package: safe-eval
    reason: known-broken JavaScript sandbox — multiple documented escapes, the name is misleading
    category: sandboxed_deprecated
    severity: High

  - ecosystem: npm
    package: vm2
    reason: 2023 sandbox-escape CVE chain (CVE-2023-37466 et al.); maintainer announced project unmaintained
    category: sandboxed_deprecated
    severity: High

  - ecosystem: npm
    package: js-yaml
    reason: legacy versions (<3.13.0) allow code execution via unsafe-load default; pin or migrate to safe-load explicit usage
    category: abandoned_with_known_cves
    severity: Medium

  - ecosystem: npm
    package: jsonwebtoken
    reason: legacy versions (<9.0.0) allow algorithm-confusion attacks (CVE-2022-23529); pin >= 9 or migrate to jose
    category: abandoned_with_known_cves
    severity: High

  # ===== python (10 entries) =====

  - ecosystem: pip
    package: PyYAML
    reason: legacy yaml.load() default is unsafe (arbitrary code execution); pin >= 5.1 AND audit call sites for safe_load
    category: abandoned_with_known_cves
    severity: High

  - ecosystem: pip
    package: pycrypto
    reason: deprecated, replaced by pycryptodome; pycrypto last release 2013, accumulated unpatched CVEs
    category: deprecated_abandoned
    severity: High

  - ecosystem: pip
    package: nose
    reason: deprecated since 2015, no maintenance; migrate to pytest or nose2
    category: deprecated_abandoned
    severity: Low

  - ecosystem: pip
    package: paramiko
    reason: pre-2.10.1 versions vulnerable to RSA key-confusion (CVE-2022-24302); ensure pin reflects the fix
    category: abandoned_with_known_cves
    severity: Medium

  - ecosystem: pip
    package: ctx
    reason: 2022 supply-chain compromise (account takeover, malicious release); historical precedent for pin review
    category: historical_supply_chain_compromise
    severity: Medium

  - ecosystem: pip
    package: jinja2
    reason: legacy versions (<3.1.3) have sandbox bypass / XSS issues; ensure pin reflects fixes
    category: abandoned_with_known_cves
    severity: Medium

  - ecosystem: pip
    package: m2crypto
    reason: largely abandoned; recommended replacement is cryptography
    category: deprecated_abandoned
    severity: Medium

  - ecosystem: pip
    package: pickle
    reason: not a third-party package per se, but pickle.loads on untrusted input is RCE-equivalent — surface for review when seen in deps
    category: sandboxed_deprecated
    severity: High

  - ecosystem: pip
    package: mktemp
    reason: deprecated stdlib alternative, but third-party shims exist; race-condition surface
    category: deprecated_abandoned
    severity: Low

  - ecosystem: pip
    package: pyOpenSSL
    reason: maintainer announced soft-deprecation in 2023; migrate to cryptography native APIs where possible
    category: deprecated_abandoned
    severity: Low

  # ===== go (3 entries) =====

  - ecosystem: go
    package: github.com/dgrijalva/jwt-go
    reason: archived 2021, multiple unpatched CVEs (CVE-2020-26160 etc.); migrate to github.com/golang-jwt/jwt
    category: abandoned_with_known_cves
    severity: High

  - ecosystem: go
    package: gopkg.in/yaml.v2
    reason: superseded by yaml.v3; v2 has known panic/DOS issues in untrusted-input paths
    category: deprecated_abandoned
    severity: Low

  - ecosystem: go
    package: github.com/satori/go.uuid
    reason: archived; potential race-condition issue (CVE-2021-3538) never patched in this fork — use github.com/google/uuid or github.com/gofrs/uuid
    category: abandoned_with_known_cves
    severity: Medium

  # ===== maven (3 entries) =====

  - ecosystem: maven
    package: org.apache.struts:struts2-core
    reason: Struts2 has a long history of RCE CVEs (Equifax CVE-2017-5638 et al.); architectural choice warrants review even with patches applied
    category: abandoned_with_known_cves
    severity: High

  - ecosystem: maven
    package: log4j:log4j
    reason: Log4j 1.x EOL since 2015; multiple unpatched issues — migrate to log4j2 (with CVE-2021-44228 mitigations) or logback
    category: deprecated_abandoned
    severity: High

  - ecosystem: maven
    package: commons-collections:commons-collections
    reason: legacy versions (<3.2.2) vulnerable to gadget-chain deserialisation (Foxglove 2015); architectural review even when pinned
    category: abandoned_with_known_cves
    severity: Medium

  # ===== ruby (1 entry) =====

  - ecosystem: gem
    package: strong_password
    reason: 2019 supply-chain compromise — malicious release v0.0.7; historical precedent
    category: historical_supply_chain_compromise
    severity: Medium

  # ===== php (1 entry) =====

  - ecosystem: composer
    package: phpunit/phpunit
    reason: legacy versions (<5.6.3) allow PHP code execution via PHPUnit eval-stdin.php in production; not for prod deploy
    category: abandoned_with_known_cves
    severity: Medium

# Curation log — surface why entries were added/removed for future review.
# Quarterly review should walk this log and re-validate each entry against
# current maintenance status.
curation_log:
  - date: 2026-05-28
    action: "initial 30-entry seed list (npm 12, pip 10, go 3, maven 3, gem 1, composer 1)"
