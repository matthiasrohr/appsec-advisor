# consolidation-groups.yaml — declarative finding-consolidation catalog.
#
# Collapses N findings that are manifestations of ONE shared mechanism/object
# (one JWT verifier, one route-registry, one dependabot.yml, one WebSocket
# channel) into a single systemic finding carrying `instances[]`. The security
# judgment "which code sites are the same object" lives HERE, not in a heuristic.
#
# A finding consolidates only if it matches a group below. No match → it stays a
# separate finding (per_instance default). IDOR (CWE-639) is consolidated
# cross-component (see the idor-object-authz group): broken object-level
# authorization is ONE systemic control gap, and listing every vulnerable route
# as a separate Critical buried the signal under ~17 near-identical findings.
# Each route is preserved as an `instances[]` entry on the single survivor.
#
# XSS (CWE-79/80) policy (revised 2026-06-25): XSS sinks in DIFFERENT components
# stay distinct (different objects, different fixes), but multiple XSS sinks in
# the SAME component are now consolidated by the xss-per-component group below —
# they share one root cause (that component doesn't encode output / bypasses the
# framework sanitizer) and one fix. This matches the Opus/thorough merger's own
# behavior; every sink is preserved as an `instances[]` entry so no detail is
# lost. (Earlier revisions kept ALL XSS separate; that buried 4–5 near-identical
# client-side XSS findings per SPA component.)
#
# Matching: a threat joins the FIRST group whose `match_any` has an entry where
# ALL present predicates hold. Predicates (all optional, AND within one entry):
#   cwe:              list of CWE-NNN; threat.cwe must be one of them
#   title_pattern:    Python regex; must search-match threat.title
#   file_glob:        list of globs; threat.evidence.file must match one
#   source_check_id:  list; threat.source_check_id (scanner AUTHZ-NNN) must match
#   config_check_id:  list; threat.config_check_id (config-scan) must match
#
# scope: per-component (default) buckets per component_id; cross-component merges
#        across components (use for shared infra like a JWT helper).
# split_by: extra threat-dict field names to add to the bucket key — the escape
#        hatch for the severity-zone / distinct-flow exceptions (a field that is
#        absent on the threat is a no-op).
# title: the consolidated survivor's title (replaces per-file titles).

groups:
  - id: jwt-verification
    title: "Insecure JWT Verification"
    scope: cross-component          # the JWT helper is shared infra
    match_any:
      - cwe: [CWE-347, CWE-287, CWE-345]
        title_pattern: '(?i)\b(jwt|algorithm|signature|verif\w*|decode)\b'
      - source_check_id: [AUTHZ-005, AUTHZ-006, AUTHZ-007, AUTHZ-103, AUTHZ-201]

  - id: missing-route-auth
    title: "Sensitive Routes Registered Without Authentication Middleware"
    scope: per-component
    match_any:
      - source_check_id: [AUTHZ-008]

  - id: dependabot-ecosystems
    title: "Dependabot Ecosystem Coverage Incomplete"
    scope: per-component
    match_any:
      - title_pattern: '(?i)dependabot'
        file_glob: ['**/dependabot.yml', '**/dependabot.yaml']

  - id: npm-install-scripts
    title: "Untrusted npm Install/Postinstall Scripts Enabled"
    scope: per-component
    match_any:
      - cwe: [CWE-506]

  - id: unauth-websocket-channel
    title: "Unauthenticated WebSocket Channel"
    scope: per-component
    match_any:
      - cwe: [CWE-306, CWE-862, CWE-284]
        file_glob: ['**/registerWebsocketEvents.*', '**/* websocket*.*', '**/*socket*.*']

  - id: idor-object-authz
    title: "Insecure Direct Object Reference"
    scope: cross-component          # broken object-level authz is one control gap
    match_any:
      - cwe: [CWE-639]

  # --- New rules (2026-06-25) ---
  #
  # missing-audit-logging: CWE-778 / CWE-223 findings are consistently one
  # systemic gap — "no centralized security event logging." Separate findings
  # per event type (auth, upload, b2b, challenge) share a single fix (add an
  # audit-log middleware / SIEM drain) and a single owner. Cross-component
  # because the missing infrastructure is shared.
  - id: missing-audit-logging
    title: "Missing Security Event Logging"
    scope: cross-component
    match_any:
      - cwe: [CWE-778, CWE-223]

  # xss-per-component: XSS sinks in DIFFERENT components are deliberately kept
  # separate (a React/Angular component and a server-side template are distinct
  # objects with distinct fixes). Within the SAME component, multiple unescaped
  # output paths share one root cause (missing sanitization library call) and
  # one fix. per-component scope handles this without merging across the trust
  # boundary.
  - id: xss-per-component
    title: "Cross-Site Scripting (XSS)"
    scope: per-component
    match_any:
      - cwe: [CWE-79, CWE-80]

  # ci-workflow-supply-chain: GitHub Actions / CI pipeline supply-chain findings
  # (unpinned third-party action SHAs, non-deterministic installs in CI) target
  # the same workflow file(s) and have the same fix (pin to commit SHA, lock npm
  # versions). Scoped per-component so a repo with multiple CI systems keeps them
  # separate. Note: evidence.file is often empty in practice for CI findings
  # (the STRIDE analyzer records the filename in the title tail, not evidence.file),
  # so matching by title_pattern is the reliable predicate here.
  - id: ci-workflow-supply-chain
    title: "CI/CD Workflow Supply-Chain Risk"
    scope: per-component
    match_any:
      - cwe: [CWE-829, CWE-1357]
        title_pattern: '(?i)\b(github.action|action.pin|sha.pin|commit.sha|non.deterministic)\b'
      - cwe: [CWE-829, CWE-1357]
        title_pattern: '(?i)\b(workflow|ci\.yml|ci\/cd|pipeline)\b.*\b(inject|pin|supply|install)\b'

  # absent-dependency-tooling: "no lockfile", "Renovate not present",
  # "Dependabot npm ecosystem not configured" are three symptoms of ONE missing
  # control: automated dependency tracking. They share a single remediation
  # (add lockfile + enable Dependabot/Renovate) and a single owner (platform
  # team). Guarded by title_pattern so Docker/Actions pinning (also CWE-1104)
  # stays in ci-workflow-supply-chain above.
  - id: absent-dependency-tooling
    title: "Automated Dependency Tracking Not Configured"
    scope: cross-component
    match_any:
      - cwe: [CWE-1104, CWE-937]
        title_pattern: '(?i)\b(lock.?file|package.lock|renovate|dependabot|sca|dependency.review|dependency.track|supply.chain.gate)\b'
      - cwe: [CWE-1104, CWE-937]
        title_pattern: '(?i)\babsent\b.{0,40}\b(repository|repo|project)\b'

  # --- Injection family (2026-07-02) ---
  #
  # Same rationale as xss-per-component: multiple sinks of the SAME injection
  # class in the SAME component share one root cause (that component builds a
  # dangerous string / call from unneutralized untrusted input) and one fix
  # (parameterize / use a safe API / validate + canonicalize). Listing every
  # sink as its own Critical buries the signal — a data seeder or a route file
  # with a dozen interpolated queries rendered a dozen near-identical findings
  # and §3 walkthroughs. Every sink is preserved as an `instances[]` entry.
  #
  # ONE GROUP PER CLASS, NOT a shared "injection" group: SQLi, XXE, SSRF,
  # command injection and path traversal are DISTINCT objects with DISTINCT
  # fixes, so a component that has both SQLi and XXE must keep them as two
  # findings — a single merged bucket (per-component scope collapses all
  # matches for one group into one survivor) would wrongly fuse them.
  #
  # per-component (not cross-component): a raw-SQL sink in the API tier and one
  # in a background worker are different code owned by different teams; only
  # co-located sinks share the one fix. Pure-CWE match (no title_pattern) is
  # deliberate and mirrors idor-object-authz / xss-per-component — these CWEs
  # are class-specific enough that the code number alone is the right key.
  - id: sql-injection-per-component
    title: "SQL Injection"
    scope: per-component
    match_any:
      - cwe: [CWE-89]

  - id: xxe-per-component
    title: "XML External Entity (XXE) Injection"
    scope: per-component
    match_any:
      - cwe: [CWE-611]

  - id: ssrf-per-component
    title: "Server-Side Request Forgery (SSRF)"
    scope: per-component
    match_any:
      - cwe: [CWE-918]

  - id: command-injection-per-component
    title: "OS Command Injection"
    scope: per-component
    match_any:
      - cwe: [CWE-78]

  - id: path-traversal-per-component
    title: "Path Traversal"
    scope: per-component
    match_any:
      - cwe: [CWE-22]
