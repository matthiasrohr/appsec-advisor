# posture-actor-labels.yaml — display labels for the ACTORS column of
# the **Security Posture at a Glance** heatmap. These labels intentionally
# differ from the canonical vektor names in `breach-vector-taxonomy.yaml`
# (used by §8 Threat Register and Appendix A) because the at-a-glance
# audience benefits from a slightly more verbose, persona-flavoured
# rendering.
#
# Consumed by:
#   - scripts/compose_threat_model.py (renders one Mermaid actor card
#     per non-empty actor present in the threat register; reads
#     `default_subtitle` to fill the second line of the card)
#   - schemas/fragments/security-posture-attack-paths.schema.json (the
#     `actor` field on each attack-class entry is enum-validated against
#     the keys below)
#
# Slug semantics: each key MUST exist as a vektor id in
# breach-vector-taxonomy.yaml. The renderer uses the vektor id from a
# threat record to look up the actor card here.
#
# Extension contract: additive only. Renaming a key breaks the cross-
# reference with the breach-vector taxonomy.

schema_version: 1

actors:
  internet-anon:
    label: "Anonymous Internet Attacker"
    default_subtitle: "no account; registers in seconds when needed"
    role: attacker
    diagram_position: bottom    # below the victim, so XSS/CSRF arrows
                                # at the top stay short
    severity_class: actorAnon
    fa_icon: "fa:fa-user-secret"

  internet-user:
    label: "Authenticated Internet Attacker"
    default_subtitle: "owns a regular account; logged in"
    role: attacker
    diagram_position: bottom
    severity_class: actorAnon
    # Per demo.md: every attacker actor shares fa:fa-user-secret. The
    # spy icon reads as "adversary" at a glance; account state and
    # privilege level are conveyed by the label text. Differentiating
    # attacker icons (user vs user-shield vs book) dilutes the visual
    # signal — the reader has to interpret each icon individually rather
    # than seeing "all spies on one side, one customer on the other".
    fa_icon: "fa:fa-user-secret"

  internet-priv-user:
    label: "Privileged User"
    default_subtitle: "elevated rights inside the application"
    role: attacker
    diagram_position: bottom
    severity_class: actorAnon
    fa_icon: "fa:fa-user-secret"

  build-time:
    label: "Supply-Chain / Build Attacker"
    default_subtitle: "compromises a dependency or build pipeline"
    role: attacker
    diagram_position: bottom
    severity_class: actorAnon
    # Build-time attacker keeps fa:fa-code-branch because the supply-
    # chain context is meaningfully different from a runtime adversary
    # (the threat surface is the dependency tree, not the production
    # endpoint). Demo.md uses fa:fa-code-branch for the same context
    # (public GitHub repository as an entry vector).
    fa_icon: "fa:fa-code-branch"

  repo-read:
    label: "Repository Reader"
    default_subtitle: "anyone with read access to the source repository"
    role: attacker
    diagram_position: bottom
    severity_class: actorAnon
    fa_icon: "fa:fa-user-secret"

  victim-required:
    label: "Shop User"
    default_subtitle: "legitimate customer; victim of XSS / CSRF"
    role: victim
    diagram_position: top       # placed above the attacker so the
                                # reverse arrows from the Client Tier
                                # are short and route over the top edge
    severity_class: actorShopUser
    # Generic fa:fa-user per demo.md — the customer-vs-attacker contrast
    # is carried by the icon-pair (user vs user-secret), not by domain-
    # specific glyphs like fa:fa-shopping-cart. The label "Shop User"
    # already encodes the customer role.
    fa_icon: "fa:fa-user"

# Default order in the ACTORS subgraph (top → bottom). The renderer
# follows this order for actors present in the threat register; absent
# actors are skipped without leaving a gap.
order:
  - victim-required
  - internet-anon
  - internet-user
  - internet-priv-user
  - build-time
  - repo-read
