# OWASP Top 10 (2025) → CWE mapping.
#
# Used by scripts/coverage_checks.py (Phase 9 Coverage Check A) to detect
# OWASP categories that have zero threats after STRIDE merge. A missing
# category produces a coverage-gap threat so downstream consumers see that
# the category was considered and found absent — not silently overlooked.
#
# Edition: OWASP Top 10:2025 (8th installment), published at
# https://owasp.org/Top10/2025/. Key deltas vs 2021:
#   * SSRF (CWE-918) is rolled into A01 Broken Access Control (no standalone
#     SSRF category any more).
#   * A03 is now "Software Supply Chain Failures" (expansion of 2021 A06
#     Vulnerable & Outdated Components) — official 6-CWE list.
#   * A10 "Mishandling of Exceptional Conditions" is NEW — official 24-CWE list.
#   * Categories were re-lettered (old A02 crypto → A04, old A03 injection →
#     A05, old A04 insecure-design → A06, old A05 misconfig → A02, old A06 →
#     A03). A01/A07/A08/A09 keep their letters.
# CWE lists for the changed categories (A01 SSRF add, A03, A10) come from the
# official 2025 category pages; carried-over categories reuse the stable
# official CWE sets they had in 2021. Keep the lists narrow: only add CWEs that
# OWASP officially maps. Over-broad lists cause false-positive "already covered"
# matches for categories that aren't actually represented in the threat register.
#
# Schema version — bump alongside migration.
version: 2

categories:
  - id: "A01:2025"
    name: "Broken Access Control"
    stride: "Elevation of Privilege"
    default_risk: "High"
    cwes: [22, 23, 35, 36, 59, 61, 65, 200, 201, 219, 264, 275, 276, 281, 282,
