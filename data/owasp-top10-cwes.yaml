# OWASP Top 10 (2021) → CWE mapping.
#
# Used by scripts/coverage_checks.py (Phase 9 Coverage Check A) to detect
# OWASP categories that have zero threats after STRIDE merge. A missing
# category produces a coverage-gap threat so downstream consumers see that
# the category was considered and found absent — not silently overlooked.
#
# CWE lists follow the official OWASP 2021 mapping published at
# https://owasp.org/Top10/A00_2021_Introduction/. Keep the lists narrow:
# only add CWEs that OWASP officially maps. Over-broad lists cause
# false-positive "already covered" matches for categories that aren't
# actually represented in the threat register.
#
# Schema version — bump alongside migration.
version: 1

categories:
