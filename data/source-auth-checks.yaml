    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '(?i)\b(Path\.GetFullPath|Path\.GetFileName|StartsWith)\b'
    severity_if_violated: High
    cwe: CWE-22
    finding_type: FT-060
    breach_vector: "Internet Anon"
    rationale: "A request-controlled path with `../` can read/write arbitrary files."
    remediation: "Canonicalize (Path.GetFullPath) and assert the result stays within an allowed base directory."

  # ===================================================================
  # Multi-stack tuning (implplan Phase B) — PHP injection sinks.
  # ===================================================================

  - id: INJ-PHP-001
    name: "SQL injection via interpolated/concatenated query — PHP"
    description: >
      A mysqli_query / PDO ->query / Laravel DB::select built with a request
      superglobal or `. $var` concatenation instead of a bound parameter.
    file_patterns: ["**/*.php"]
    exclude_file_patterns: ["**/tests/**", "**/*Test.php", "**/vendor/**"]
    pattern: '(?is)(?:mysqli_query|->query|->exec|DB::(?:select|statement|raw)|pg_query)\s*\([^)]*(?:\$_(?:GET|POST|REQUEST|COOKIE)|["''\x60][^"''\x60]*["''\x60]\s*\.\s*\$)'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-89
    finding_type: FT-001
    breach_vector: "Internet Anon"
    rationale: "Interpolated/concatenated request data in SQL lets an attacker alter the query."
    remediation: "Use prepared statements (PDO bindParam / mysqli placeholders / Eloquent bindings)."

  - id: INJ-PHP-002
    name: "Command injection — PHP"
    description: >
      `system` / `exec` / `shell_exec` / `passthru` / `popen` invoked with a
      request superglobal or `. $var` concatenation.
    file_patterns: ["**/*.php"]
    exclude_file_patterns: ["**/tests/**", "**/*Test.php", "**/vendor/**"]
    pattern: '(?is)(?:system|exec|shell_exec|passthru|popen|proc_open)\s*\([^)]*(?:\$_(?:GET|POST|REQUEST|COOKIE)|["''][^"'']*["'']\s*\.\s*\$)'
    counter_scope: line
    counter_patterns:
      - '(?i)\b(escapeshellarg|escapeshellcmd)\b'
    severity_if_violated: High
    cwe: CWE-78
    finding_type: FT-003
    breach_vector: "Internet Anon"
    rationale: "A shell command built from request data yields arbitrary command execution."
    remediation: "Avoid the shell; if unavoidable, escapeshellarg every dynamic argument."

  - id: INJ-PHP-003
    name: "SSRF — outbound request to a request-controlled URL — PHP"
    description: >
      curl_setopt(CURLOPT_URL, …) or file_get_contents fetching a URL built from a
      request superglobal or `. $var` concatenation.
    file_patterns: ["**/*.php"]
    exclude_file_patterns: ["**/tests/**", "**/*Test.php", "**/vendor/**"]
    pattern: '(?is)(?:curl_setopt\s*\([^)]*CURLOPT_URL[^)]*(?:\$_|\.\s*\$)|file_get_contents\s*\(\s*(?:\$_(?:GET|POST|REQUEST)|["'']https?://))'
    counter_scope: window
    counter_window: 2
    counter_patterns:
      - '(?i)\b(allowlist|allowed_hosts|parse_url)\b'
    severity_if_violated: High
    cwe: CWE-918
    finding_type: FT-070
    breach_vector: "Internet Anon"
    rationale: "A request-controlled outbound URL lets an attacker reach internal services / cloud metadata."
    remediation: "Allow-list the host/scheme; never build the target URL from unvalidated request data."

  - id: INJ-PHP-004
    name: "Path traversal / file inclusion from request input — PHP"
    description: >
      fopen / readfile / include / require / file_get_contents built from a
      request superglobal or `. $var` concatenation, enabling `../` traversal or
      remote/local file inclusion.
    file_patterns: ["**/*.php"]
    exclude_file_patterns: ["**/tests/**", "**/*Test.php", "**/vendor/**"]
    pattern: '(?is)(?:fopen|readfile|include|include_once|require|require_once|file_get_contents)\s*\(?\s*[^;)]*(?:\$_(?:GET|POST|REQUEST|COOKIE)|["''][^"'']*["'']\s*\.\s*\$)'
    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '(?i)\b(basename|realpath|in_array)\b'
    severity_if_violated: High
    cwe: CWE-22
    finding_type: FT-060
    breach_vector: "Internet Anon"
    rationale: "A request-controlled path enables `../` traversal or file inclusion (LFI/RFI)."
    remediation: "Allow-list the file, use basename(), and resolve+verify the path stays within an allowed base."

  # ===================================================================
  # Multi-stack tuning (implplan Phase B) — Ruby / Rails injection sinks.
  # ===================================================================

  - id: INJ-RB-001
    name: "SQL injection via string interpolation — Ruby/Rails"
    description: >
      An ActiveRecord where / find_by_sql / execute built with a `#{}`
      interpolation or `+` concatenation instead of a bound parameter.
    file_patterns: ["**/*.rb"]
    exclude_file_patterns: ["**/spec/**", "**/test/**", "**/*_spec.rb", "**/*_test.rb", "**/vendor/**"]
    pattern: '(?is)(?:\.where|\.find_by_sql|\.execute|\.select_all|\.select_value|\.pluck)\s*\(\s*["''][^\n]*?(?:#\{|["'']\s*\+)'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-89
    finding_type: FT-001
    breach_vector: "Internet Anon"
    rationale: "Interpolated request data in SQL lets an attacker alter the query."
    remediation: "Use bound parameters: where('name = ?', name) or the hash form where(name: name)."

  - id: INJ-RB-002
    name: "Command injection — Ruby"
    description: >
      A shell invocation (system / exec / backticks / IO.popen / Open3) built
      with a `#{}` interpolation or `+` concatenation.
    file_patterns: ["**/*.rb"]
    exclude_file_patterns: ["**/spec/**", "**/test/**", "**/*_spec.rb", "**/*_test.rb", "**/vendor/**"]
    pattern: '(?is)(?:\bsystem\s*\(|\bexec\s*\(|IO\.popen\s*\(|Open3\.\w+\s*\()[^)]*(?:#\{|\+)|\x60[^\x60]*#\{'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-78
    finding_type: FT-003
    breach_vector: "Internet Anon"
    rationale: "A shell command built from request data yields arbitrary command execution."
    remediation: "Pass an argv array to system(cmd, *args); never interpolate request data into a shell string."

  - id: INJ-RB-003
    name: "SSRF — outbound request to an interpolated URL — Ruby"
    description: >
      Net::HTTP / HTTParty / RestClient / URI.open called with a `#{}` or `+`
      URL built from dynamic (often request) data.
    file_patterns: ["**/*.rb"]
    exclude_file_patterns: ["**/spec/**", "**/test/**", "**/*_spec.rb", "**/*_test.rb", "**/vendor/**"]
    pattern: '(?is)(?:Net::HTTP\.(?:get|post|get_response)|HTTParty\.\w+|RestClient\.\w+|URI\.open|URI\.parse)\s*\([^)]*(?:#\{|\+)'
    counter_scope: window
    counter_window: 2
    counter_patterns:
      - '(?i)\b(allowlist|allowed_hosts)\b'
    severity_if_violated: High
    cwe: CWE-918
    finding_type: FT-070
    breach_vector: "Internet Anon"
    rationale: "A request-controlled outbound URL lets an attacker reach internal services / cloud metadata."
    remediation: "Allow-list the host/scheme; never build the target URL from unvalidated request data."

  - id: INJ-RB-004
    name: "Path traversal — filesystem access from an interpolated path — Ruby"
    description: >
      File.read / File.open / IO.read / send_file built with a `#{}` or `+` path
      and no canonicalization, letting `../` escape the intended directory.
    file_patterns: ["**/*.rb"]
    exclude_file_patterns: ["**/spec/**", "**/test/**", "**/*_spec.rb", "**/*_test.rb", "**/vendor/**"]
    pattern: '(?is)(?:File\.(?:read|open|new|binread)|IO\.read|send_file)\s*\([^)]*(?:#\{|\+)'
    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '(?i)\b(File\.basename|File\.expand_path|start_with\?)\b'
    severity_if_violated: High
    cwe: CWE-22
    finding_type: FT-060
    breach_vector: "Internet Anon"
    rationale: "A request-controlled path with `../` can read/write arbitrary files."
    remediation: "Use File.basename and File.expand_path; assert the result stays within an allowed base directory."

  # ===================================================================
  # Multi-stack tuning (implplan Phase C) — Android (Kotlin/Java) mobile sinks.
  # Android-specific APIs; complements the recon Android-manifest signals.
  # ===================================================================

  - id: MOBILE-AND-001
    name: "SQL injection in local SQLite — Android"
    description: >
      `SQLiteDatabase.rawQuery` / `execSQL` built by concatenation feeds
      attacker-influenced input (deep link, IPC, synced data) into a local query.
    file_patterns: ["**/*.kt", "**/*.java"]
    exclude_file_patterns: ["**/test/**", "**/androidTest/**", "**/*Test.*", "**/build/**"]
    pattern: '\.(?:rawQuery|execSQL)\s*\([^)]*\+'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: Medium
    cwe: CWE-89
    finding_type: FT-001
    breach_vector: "Physical / Local"
    rationale: "Concatenated input in a local SQL query can corrupt or exfiltrate on-device data."
    remediation: "Use the selectionArgs / bind-argument overloads; never concatenate into the SQL string."

  - id: MOBILE-AND-002
    name: "Secret stored in plaintext SharedPreferences — Android"
    description: >
      A token/password/secret written to (non-encrypted) SharedPreferences is
      readable on a rooted or backed-up device. EncryptedSharedPreferences is the
      safe alternative and is suppressed.
    file_patterns: ["**/*.kt", "**/*.java"]
    exclude_file_patterns: ["**/test/**", "**/androidTest/**", "**/*Test.*", "**/build/**"]
    pattern: '(?is)\.putString\s*\(\s*["''][^"'']*(?i:token|password|secret|refresh|jwt|api[_-]?key|credential)'
    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '\bEncryptedSharedPreferences\b'
    severity_if_violated: Medium
    cwe: CWE-922
    finding_type: FT-090
    breach_vector: "Physical / Local"
    rationale: "Secrets in plaintext preferences are recoverable via device backup, root, or forensic access."
    remediation: "Store secrets in EncryptedSharedPreferences or the Android Keystore, never plain SharedPreferences."

  - id: MOBILE-AND-003
    name: "Insecure WebView JavaScript bridge — Android"
    description: >
      `addJavascriptInterface` exposes native methods to page JavaScript; combined
      with remote/attacker content it enables RCE (pre-API-17) or data theft.
    file_patterns: ["**/*.kt", "**/*.java"]
    exclude_file_patterns: ["**/test/**", "**/androidTest/**", "**/*Test.*", "**/build/**"]
    pattern: '\.addJavascriptInterface\s*\('
    counter_scope: line
    counter_patterns: []
    severity_if_violated: Medium
    cwe: CWE-749
    finding_type: FT-175
    breach_vector: "Network MITM"
    rationale: "A JS bridge reachable from untrusted web content can invoke native code / exfiltrate data."
    remediation: "Avoid the bridge for untrusted content; restrict to https app-owned pages and @JavascriptInterface-annotated methods on API 17+."
