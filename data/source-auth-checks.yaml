# source-auth-checks.yaml — deterministic source-code authorization + injection checks
#
# Used by `scripts/source_auth_scanner.py`. Each check targets a specific
# privilege-escalation / broken-access-control pattern in source code
# (Node/Express + TypeScript for AUTHZ-001..008; Python and Java for the
# AUTHZ-1xx/2xx mass-assignment + JWT checks) and emits a finding when the
# pattern matches AND no counter-pattern is found within the configured window.
#
# Designed to complement (not replace) the LLM-driven Phase-9 STRIDE
# analyzer: these patterns have very low false-positive rates and produce
# reproducible per-file, per-line findings the LLM would otherwise either
# miss entirely or collapse into a single generic-bucket entry.
#
# Check structure:
#   id                       — AUTHZ-NNN stable identifier
#   name                     — short check name (becomes finding title)
#   description              — 1-2 sentence why-it-matters
#   file_patterns            — list of globs to scan
#   exclude_file_patterns    — list of globs to skip (tests, fixtures, ...)
#   pattern                  — primary regex (must match for finding)
#   counter_window           — lines AFTER match to scan for counter-pattern
#                              (0 = same line only; default 5)
#   counter_scope            — line | window | call (default: window)
#                              `line`  : only the matched line
#                              `window`: match_line .. match_line + counter_window
#                              `call`  : match_line until balanced close-paren
#                                        or counter_window lines (whichever first)
#   counter_patterns         — list of regexes; ANY match suppresses the finding
#   severity_if_violated     — Critical | High | Medium | Low
#   cwe                      — primary CWE
#   finding_type             — FT-NNN from finding-types.yaml
#   breach_vector            — Internet Anon | Internet User | Internet Priv User | Victim-Required
#   rationale                — 1-2 sentences for scenario field
#   remediation              — short fix text (becomes mitigation_title_hint)

schema_version: 1

checks:

  # ===================================================================
  # AUTHZ-001 — BFLA (Broken Function-Level Authorization)
  # Attacker-controlled owner-key in WHERE/filter clauses lets one user
  # query, modify, or destroy another user's resources by submitting a
  # different UserId/ownerId in the request body.
  # ===================================================================
  - id: AUTHZ-001
    name: "Broken authorization — attacker-controlled owner ID in resource query"
    description: >
      A WHERE/filter clause binds an ownership column to a value from
      req.body / req.query / req.params instead of the authenticated
      session identity. Any logged-in user can pass a different ID and
      reach another tenant's data.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: '\b(UserId|userId|user_id|ownerId|owner_id|tenantId|tenant_id|accountId|account_id|customerId|customer_id|orgId|org_id|workspaceId|workspace_id)\s*:\s*req\.(body|query|params)\.[A-Za-z_][A-Za-z0-9_]*'
    counter_scope: window
    counter_window: 10
    counter_patterns:
      - 'req\.user\.(id|userId|sub|_id|UserId)'
      - 'req\.session\.user'
      - 'req\.auth\.(sub|userId|user|uid)'
      - 'res\.locals\.user'
      - 'getCurrentUser\s*\('
      - 'requireOwnership|ensureOwner|assertOwnership|verifyOwner'
    severity_if_violated: Critical
    cwe: CWE-639
    finding_type: FT-040
    breach_vector: "Internet User"
    rationale: >
      Server-side authorization MUST derive the resource owner from the
      authenticated session (req.user / req.session / req.auth), never
      from attacker-controlled request data. Trusting req.body.UserId
      etc. enables horizontal privilege escalation across all
      authenticated tenants.
    remediation: "Replace req.body.UserId/userId/ownerId with req.user.id (or equivalent session-derived identity) in every WHERE/filter clause."

  # ===================================================================
  # AUTHZ-002 — IDOR (Insecure Direct Object Reference)
  # Resource lookup by primary key from URL parameter without an
  # ownership/role gate in the same call.
  # ===================================================================
  - id: AUTHZ-002
    name: "IDOR — resource lookup by URL parameter without ownership filter"
    description: >
      An ORM call (findOne / findByPk / findById / findUnique /
      findFirst / update / destroy / delete / remove) is parameterized
      with req.params.X but the same WHERE/filter clause does not
      restrict the result to the calling user's owned records.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    # ORM mutation/read by raw param. Match across up to ~200 chars after
    # the call to capture short multi-arg invocations.
    pattern: '\.(findOne|findByPk|findById|findUnique|findFirst|update|destroy|delete|deleteOne|updateOne|deleteMany|updateMany|remove|save)\s*\([^)]{0,200}?req\.params\.[A-Za-z_][A-Za-z0-9_]*'
    counter_scope: window
    counter_window: 5
    counter_patterns:
      - '\b(UserId|userId|user_id|ownerId|owner_id|tenantId|tenant_id|accountId|customerId)\s*:'
      - 'isAuthorized\s*\(\s*[''"]admin'
      - 'requireRole\s*\('
      - 'ensureAdmin\s*\(|requireAdmin\s*\(|isAdmin\s*\(\s*\)'
      - 'requireOwnership|ensureOwner|assertOwnership|verifyOwner'
    severity_if_violated: High
    cwe: CWE-639
    finding_type: FT-040
    breach_vector: "Internet User"
    rationale: >
      Any authenticated user can substitute another user's resource ID
      in the URL and read or modify the target record because the query
      filter has no ownership clause. Admin-only routes are excluded
      via the counter-pattern allowlist.
    remediation: "Add an owner column to the WHERE clause (UserId: req.user.id) or wrap the route in an ensureOwnership/requireRole middleware."

  # ===================================================================
  # AUTHZ-003 — Mass assignment of privileged fields
  # Direct references to req.body.{role,isAdmin,permissions,...} accept
  # role-elevating data without server-side stripping or allowlisting.
  # ===================================================================
  - id: AUTHZ-003
    name: "Mass assignment — privileged field accepted from request body"
    description: >
      The handler reads or persists a privileged attribute (role /
      isAdmin / permissions / scope / privileges / roleId / tenantId)
      directly from req.body. Without an allowlist filter the client
      can self-elevate by including the field in the JSON payload.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: 'req\.body\.(role|isAdmin|is_admin|isStaff|is_staff|isSuperuser|is_superuser|admin|administrator|permissions?|privileges?|scopes?|roleId|role_id|userType|user_type)\b'
    counter_scope: window
    counter_window: 8
    counter_patterns:
      - 'delete\s+req\.body\.(role|isAdmin|permissions|scope|admin)'
      - '_\.(pick|omit)\s*\(\s*req\.body'
      - 'allowedFields\s*[:=]\s*\['
      - 'sanitize\s*\(\s*req\.body'
      - '(joi|Joi|yup|z|zod|Schema|validator|class-validator)\b[^;]{0,60}\.(validate|parse|safeParse|validateAsync)\s*\('
      - 'stripPrivileged|stripUnsafe|filterBody'
    severity_if_violated: Critical
    cwe: CWE-915
    finding_type: FT-041
    breach_vector: "Internet User"
    rationale: >
      Server code that consumes req.body.role / req.body.isAdmin / etc.
      without an explicit allowlist trusts the client to behave. An
      attacker simply adds {"role":"admin"} to their request to escalate.
    remediation: "Apply an allowlist filter (Joi/Zod/yup schema, _.pick, or explicit field copy) before passing the body to any model, and strip privilege fields before persistence."

  # ===================================================================
  # AUTHZ-004 — Whole-body mass assignment to ORM
  # Passing req.body as-is to Model.create / .update / .build / .insert
  # bypasses any field allowlist if no schema validator runs first.
  # ===================================================================
  - id: AUTHZ-004
    name: "Mass assignment — request body passed unfiltered to ORM create/update"
    description: >
      The full req.body object is forwarded into an ORM persistence
      call without a preceding allowlist/schema filter. Any extra field
      the client sends becomes a database column write.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: '\.(create|update|build|insert|insertMany|insertOne|save|bulkCreate)\s*\(\s*req\.body\s*[,)]'
    counter_scope: window
    counter_window: 10
    counter_patterns:
      - '_\.(pick|omit)\s*\(\s*req\.body'
      - 'allowedFields\s*[:=]\s*\['
      - 'sanitize\s*\(\s*req\.body'
      - '(joi|Joi|yup|z|zod|Schema|validator|class-validator)\b[^;]{0,60}\.(validate|parse|safeParse|validateAsync)\s*\('
      - 'stripPrivileged|stripUnsafe|filterBody|pickAllowed'
    severity_if_violated: High
    cwe: CWE-915
    finding_type: FT-041
    breach_vector: "Internet User"
    rationale: >
      ORM models that auto-map attribute names to columns (Sequelize,
      Mongoose, Prisma with spread, TypeORM with merge) accept every
      key in req.body. Without an allowlist the client controls
      arbitrary columns including role / status / verified flags.
    remediation: "Replace Model.create(req.body) with an explicit field-by-field assignment, a Joi/Zod schema, or _.pick(req.body, allowedFields)."

  # ===================================================================
  # AUTHZ-005 — JWT verify call missing algorithms allowlist
  # Without explicit `algorithms: [...]` the library will accept whatever
  # alg the token declares — including HS256-when-key-is-RSA-pubkey
  # (the algorithm confusion class).
  # ===================================================================
  - id: AUTHZ-005
    name: "JWT verify call missing algorithms allowlist (algorithm confusion)"
    description: >
      `jwt.verify(token, key)` is called without an `algorithms:` option.
      Pre-9.x jsonwebtoken accepted the alg field from the token header
      itself, enabling the classic RSA-public-key-as-HMAC-secret
      algorithm-confusion attack and alg:none bypasses.
    file_patterns:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: '\bjwt\.verify\s*\('
    counter_scope: call
    counter_window: 6
    counter_patterns:
      - 'algorithms\s*:\s*\['
    severity_if_violated: Critical
    cwe: CWE-347
    finding_type: FT-030
    breach_vector: "Internet Anon"
    rationale: >
      Without an explicit algorithm allowlist, attackers can forge
      tokens with alg:none (older lib versions) or use the public key
      as an HMAC secret to mint valid signatures.
    remediation: "Always pass `algorithms: ['RS256']` (or the project's chosen alg) as the third argument's options object to jwt.verify."

  # ===================================================================
  # AUTHZ-006 — JWT decode used without subsequent verify
  # `jwt.decode` / `jws.decode` reads the payload WITHOUT verifying the
  # signature. Authorization decisions based on decoded-only tokens
  # accept any forged token.
  # ===================================================================
  - id: AUTHZ-006
    name: "JWT decode used without signature verification"
    description: >
      `jwt.decode(token)` or `jws.decode(token)` only base64-decodes the
      payload — it performs NO signature check. Using decoded claims to
      drive authorization is equivalent to trusting the client.
    file_patterns:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: '\b(jwt|jws|jsonwebtoken)\.decode\s*\('
    counter_scope: window
    counter_window: 40   # function-body approximation
    counter_patterns:
      - '\bjwt\.verify\s*\('
      - 'jsonwebtoken\.verify\s*\('
      - 'jws\.verify\s*\('
      - 'expressJwt\s*\('
    severity_if_violated: High
    cwe: CWE-345
    finding_type: FT-030
    breach_vector: "Internet Anon"
    rationale: >
      Decode-only flows let an attacker construct a token with any
      claims (admin, sub=victim, scope=*) — no key material required.
    remediation: "Replace `.decode(token)` with `.verify(token, key, { algorithms: [...] })` and gate authorization on the verified payload only."

  # ===================================================================
  # AUTHZ-007 — express-jwt middleware missing algorithms
  # Same algorithm-confusion risk as AUTHZ-005, on the middleware side.
  # ===================================================================
  - id: AUTHZ-007
    name: "express-jwt middleware missing algorithms allowlist"
    description: >
      `expressJwt({...})` is configured without an `algorithms:` field.
      Pre-6.x express-jwt then accepts the alg field from the token,
      enabling algorithm confusion. Modern versions throw at startup
      when omitted — but bundled-with-old-version repos still ship the
      vulnerable path.
    file_patterns:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: '\bexpressJwt\s*\(\s*\{'
    counter_scope: call
    counter_window: 12
    counter_patterns:
      - 'algorithms\s*:\s*\['
    severity_if_violated: High
    cwe: CWE-347
    finding_type: FT-030
    breach_vector: "Internet Anon"
    rationale: >
      The middleware is the gate for every authenticated route — a
      mis-configured expressJwt undermines the entire authorization
      surface.
    remediation: "Add `algorithms: ['RS256']` (or matching) to the expressJwt() options object."

  # ===================================================================
  # AUTHZ-008 — Sensitive REST route registered without auth middleware
  # State-changing methods on sensitive resource paths without
  # isAuthorized / requireAuth / passport.authenticate in the chain.
  # ===================================================================
  - id: AUTHZ-008
    name: "Sensitive REST route registered without authentication middleware"
    description: >
      A POST/PUT/DELETE/PATCH handler is registered on a sensitive
      resource path (Users, Admin, Orders, Payments, Cards, Addresses,
      Wallets, Billing, Keys, Tokens, Settings, Profile) without an
      authentication middleware in the same route registration line.
    file_patterns:
      - "**/server.ts"
      - "**/server.js"
      - "**/app.ts"
      - "**/app.js"
      - "**/index.ts"
      - "**/index.js"
      - "**/router.ts"
      - "**/router.js"
      - "**/routes/**/*.ts"
      - "**/routes/**/*.js"
      - "**/router/**/*.ts"
      - "**/router/**/*.js"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
      - "**/frontend/**"
      - "**/client/**"
    # State-changing call on a sensitive path. Case-insensitive on
    # resource segment to catch /api/Users vs /api/users.
    pattern: '(?i)\bapp\.(post|put|delete|patch)\s*\(\s*[''"]/?(?:api|rest|v[0-9]+)?/?[a-z0-9_/-]*?(users?|admin|orders?|payments?|cards?|addresses|wallets?|billing|keys?|tokens?|settings?|profile)s?\b'
    counter_scope: line
    counter_window: 0
    counter_patterns:
      - 'isAuthorized|isAuthenticated|requireAuth|denyAll|requireRole|ensureAdmin|authMiddleware|passport\.authenticate|verifyToken|jwtAuth|verifyJWT|csrf|protect\s*\(|requireUser'
    severity_if_violated: High
    cwe: CWE-862
    finding_type: FT-042
    breach_vector: "Internet Anon"
    rationale: >
      State-changing operations on sensitive resources MUST require a
      proven session. A registration line that lacks any auth marker
      either trusts the URL itself or relies on a downstream check that
      the static signature cannot prove exists.
    remediation: "Add an explicit auth middleware (isAuthorized() / passport.authenticate() / requireAuth) to the route registration, or mark the route intentionally public via app.get(...) for read-only access only."

  # ===================================================================
  # Multi-language checks (Python, Java) — mass assignment + JWT.
  # BOLA/IDOR and missing-route-auth for non-Node stacks are covered
  # deterministically by route_inventory.py + the architecture-coverage
  # ARCH-BOLA-001 / ARCH-AUTHN-001 hypotheses (multi-framework). These
  # checks add the patterns the route inventory cannot see: privileged
  # mass-assignment and unverified token handling.
  # ===================================================================

  # ----- Python -----------------------------------------------------
  # AUTHZ-101 — Mass assignment of a privileged field from the request
  # body (Django / DRF / Flask / FastAPI). request.data['role'] etc.
  - id: AUTHZ-101
    name: "Mass assignment — privileged field accepted from request body (Python)"
    description: >
      A handler reads a privileged attribute (role / is_staff /
      is_superuser / permissions / groups) directly from request.data /
      request.POST / request.json. Without a serializer allowlist the
      client self-elevates by adding the field to the payload.
    file_patterns:
      - "**/*.py"
    exclude_file_patterns:
      - "**/test_*.py"
      - "**/*_test.py"
      - "**/tests/**"
      - "**/conftest.py"
      - "**/migrations/**"
      - "**/.venv/**"
      - "**/venv/**"
      - "**/site-packages/**"
      - "**/settings*.py"
    pattern: 'request\.(?:data|POST|json|query_params)(?:\.get\(\s*|\s*\[\s*)[''"](role|is_staff|is_superuser|is_admin|is_active|permissions?|groups?|scopes?|user_type|account_type)[''"]'
    counter_scope: window
    counter_window: 8
    counter_patterns:
      - 'serializer\.(is_valid|validated_data|save)'
      - 'read_only_fields'
      - '\bfields\s*=\s*[\[(]'
      - 'request\.user\.is_(staff|superuser|admin)'
    severity_if_violated: Critical
    cwe: CWE-915
    finding_type: FT-041
    breach_vector: "Internet User"
    rationale: >
      Server code that consumes request.data['role'] / ['is_staff'] etc.
      without a serializer allowlist trusts the client. An attacker adds
      {"is_staff": true} to the request to escalate.
    remediation: "Bind request data through a DRF serializer (or explicit allowlist) with role/is_staff marked read_only; never copy privilege fields from the raw request."

  # AUTHZ-102 — Whole-body mass assignment to a Python ORM via **spread.
  - id: AUTHZ-102
    name: "Mass assignment — request body spread into ORM create/update (Python)"
    description: >
      request.data / request.POST is splat-expanded (**) into a Django /
      SQLAlchemy model constructor or .objects.create / update_or_create
      without a preceding allowlist. Every client-supplied key becomes a
      column write.
    file_patterns:
      - "**/*.py"
    exclude_file_patterns:
      - "**/test_*.py"
      - "**/*_test.py"
      - "**/tests/**"
      - "**/conftest.py"
      - "**/migrations/**"
      - "**/.venv/**"
      - "**/venv/**"
      - "**/site-packages/**"
    pattern: '\.(objects\.(?:create|update_or_create|get_or_create)|create|update)\(\s*\*\*\s*request\.(data|POST|json|query_params)'
    counter_scope: window
    counter_window: 6
    counter_patterns:
      - 'serializer\.(is_valid|validated_data|save)'
      - 'validated_data'
      - 'pydantic|BaseModel'
    severity_if_violated: High
    cwe: CWE-915
    finding_type: FT-041
    breach_vector: "Internet User"
    rationale: >
      Model(**request.data) / Model.objects.create(**request.data) maps
      every request key to a column, including is_staff / is_superuser /
      owner_id, unless an allowlist (serializer.validated_data) runs first.
    remediation: "Construct the model from serializer.validated_data (DRF) or an explicit field allowlist, never from **request.data."

  # AUTHZ-103 — PyJWT decode without an algorithms allowlist.
  - id: AUTHZ-103
    name: "JWT decode missing algorithms allowlist (Python / PyJWT)"
    description: >
      `jwt.decode(token, key)` is called without an `algorithms=` argument,
      or with `options={"verify_signature": False}`. Either accepts a
      forged token (algorithm confusion / unsigned).
    file_patterns:
      - "**/*.py"
    exclude_file_patterns:
      - "**/test_*.py"
      - "**/*_test.py"
      - "**/tests/**"
      - "**/conftest.py"
      - "**/.venv/**"
      - "**/venv/**"
      - "**/site-packages/**"
    pattern: '\bjwt\.decode\s*\('
    counter_scope: call
    counter_window: 6
    counter_patterns:
      - 'algorithms\s*='
    severity_if_violated: Critical
    cwe: CWE-347
    finding_type: FT-030
    breach_vector: "Internet Anon"
    rationale: >
      PyJWT before 2.0 defaulted to accepting the token's own alg header;
      without an explicit algorithms allowlist an attacker forges tokens
      (alg:none, or RSA-pubkey-as-HMAC-secret).
    remediation: "Always pass algorithms=['RS256'] (or the project's alg) to jwt.decode and never set verify_signature False on an auth path."

  # ----- Java / Spring ----------------------------------------------
  # AUTHZ-201 — jjwt parser that reads an UNSIGNED JWT (parseClaimsJwt /
  # parsePlaintextJwt) — no signature verification at all.
  - id: AUTHZ-201
    name: "JWT parsed without signature verification (Java / jjwt)"
    description: >
      jjwt's `parseClaimsJwt` / `parsePlaintextJwt` (note: no trailing
      's') parse an UNSIGNED token and perform no signature check. Driving
      authorization off those claims trusts any forged token. The signed
      variants are `parseClaimsJws` / `parseSignedClaims`.
    file_patterns:
      - "**/*.java"
      - "**/*.kt"
    exclude_file_patterns:
      - "**/test/**"
      - "**/*Test.java"
      - "**/*Tests.java"
      - "**/target/**"
      - "**/build/**"
    pattern: '\.(parseClaimsJwt|parsePlaintextJwt)\s*\('
    counter_scope: line
    counter_window: 0
    counter_patterns: []
    severity_if_violated: Critical
    cwe: CWE-347
    finding_type: FT-030
    breach_vector: "Internet Anon"
    rationale: >
      parseClaimsJwt accepts an unsigned token: an attacker mints arbitrary
      claims (sub, roles, scope) with no key. Only the *Jws / parseSignedClaims
      variants verify the signature.
    remediation: "Replace parseClaimsJwt/parsePlaintextJwt with parseClaimsJws/parseSignedClaims and a configured signing key; reject unsigned tokens."

  # ===================================================================
  # Injection family (INJ-NNN) — deterministic source-code injection sinks.
  # These complement the auth checks above: SQL injection, OS command
  # injection, and SSRF have very low false-positive signatures when the
  # untrusted value reaches the sink through a template literal / direct
  # request field, so they produce reproducible per-line findings the LLM
  # would otherwise emit only by chance. Node/Express + TypeScript scope.
  # ===================================================================

  # INJ-001 — SQL injection via string-interpolated query
  - id: INJ-001
    name: "SQL injection — request data interpolated into a SQL string"
    description: >
      A SQL statement is built as a template literal that interpolates a
      value (typically req.body / req.query / req.params) directly into the
      query text instead of using a parameterized / bound placeholder.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
      - "**/frontend/**"
      - "**/client/**"
    # Backtick template literal carrying a real SQL statement AND a ${...}
    # interpolation. We require full clause STRUCTURE (SELECT..FROM /
    # INSERT..INTO / UPDATE..SET / DELETE..FROM), not a lone DML verb: the
    # bare-keyword form matched ordinary English in log/error strings
    # (`logger.error(`Could not bulk insert X: ${e}`)`, `soft delete for the
    # user ${id}`) and produced Critical false positives on any codebase that
    # logs around inserts/updates/deletes. Parameterized queries (placeholders
    # outside the SQL string) do not interpolate inside the backtick, so they
    # do not match.
    pattern: '(?is)`[^`]*(?:\bSELECT\b[^`]*\bFROM\b|\bINSERT\b[^`]*\bINTO\b|\bUPDATE\b[^`]*\bSET\b|\bDELETE\b[^`]*\bFROM\b)[^`]*\$\{[^}]*\}'
    counter_scope: line
    counter_window: 0
    counter_patterns: []
    severity_if_violated: Critical
    cwe: CWE-89
    finding_type: FT-001
    breach_vector: "Internet Anon"
    rationale: >
      Interpolating request-controlled text into a SQL statement lets an
      attacker alter the query — exfiltrating or modifying arbitrary rows,
      bypassing authentication, or escalating to full database control.
    remediation: "Use parameterized / bound queries (placeholders + a values array, or an ORM's safe query builder); never interpolate request data into the SQL string."

  # INJ-002 — OS command injection via interpolated child_process exec
  - id: INJ-002
    name: "Command injection — request data interpolated into a shell command"
    description: >
      child_process exec / execSync is invoked with a template literal that
      interpolates request-controlled data into the shell command line.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
      - "**/frontend/**"
      - "**/client/**"
    # exec(`…${…}`) — the interpolating shell form. execFile/execFileSync
    # (argv array, no shell) do not match `exec\s*\(`.
    pattern: '(?is)\b(?:child_process\.)?(?:exec|execSync)\s*\(\s*`[^`]*\$\{[^}]*\}'
    counter_scope: line
    counter_window: 0
    counter_patterns: []
    severity_if_violated: Critical
    cwe: CWE-78
    finding_type: FT-003
    breach_vector: "Internet Anon"
    rationale: >
      Interpolating request data into a shell command lets an attacker chain
      arbitrary OS commands (`; rm -rf`, backticks, `$( )`), yielding remote
      code execution on the server.
    remediation: "Use execFile / spawn with an argument array (no shell), or strictly validate and allowlist the input; never build a shell string from request data."

  # INJ-003 — SSRF via request-controlled outbound URL
  - id: INJ-003
    name: "SSRF — outbound request to a request-controlled URL"
    description: >
      An outbound HTTP call (fetch / axios / got / http.get) is made directly
      to a URL taken from req.body / req.query / req.params with no allowlist.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
      - "**/frontend/**"
      - "**/client/**"
    pattern: '(?is)\b(?:fetch|axios(?:\.\w+)?|got|superagent|http\.get|https\.get|request)\s*\(\s*req\.(?:body|query|params)\b'
    counter_scope: line
    counter_window: 0
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-918
    finding_type: FT-070
    breach_vector: "Internet Anon"
    rationale: >
      Fetching an attacker-supplied URL server-side lets the attacker reach
      internal services, cloud metadata endpoints, or the loopback interface
      — pivoting past the network perimeter the application sits behind.
    remediation: "Validate the URL against a strict allowlist of hosts/schemes, resolve and block private/link-local ranges, and disable redirects to internal targets."

  - id: INJ-004
    name: "Path traversal — filesystem access from request input"
    description: >
      A filesystem call (fs.readFile / createReadStream / sendFile / path.join)
      is built from req.body / req.query / req.params with no canonicalization,
      letting `../` sequences escape the intended directory.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: '(?is)\b(?:fs\.(?:readFile|readFileSync|createReadStream|readdir\w*)|res\.sendFile|res\.download|path\.(?:join|resolve))\s*\([^)]*\breq\.(?:body|query|params)\b'
    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '(?i)\b(path\.basename|sanitize|normalize\w*|allowlist|whitelist|isAbsolute)\b'
    severity_if_violated: High
    cwe: CWE-22
    finding_type: FT-060
    breach_vector: "Internet Anon"
    rationale: >
      A request-controlled path with `../` can read arbitrary files
      (/etc/passwd, source, secrets) or write outside the intended root.
    remediation: "Resolve the path, assert it stays within an allowed base directory (path.resolve + startsWith), and use path.basename on user input."

  - id: INJ-005
    name: "XXE — XML parsed with external entities enabled"
    description: >
      An XML parser is configured to resolve external entities (noent/external
      general entities), allowing an attacker's DOCTYPE to read local files or
      trigger SSRF via entity expansion.
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
    exclude_file_patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/__mocks__/**"
      - "**/fixtures/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
    pattern: "(?is)(noent\\s*:\\s*true|noEnt\\s*:\\s*true|resolveExternals\\s*:\\s*true|externalEntities\\s*:\\s*true|libxmljs\\.parseXml\\w*\\([^)]*noent)"
    counter_scope: line
    counter_window: 0
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-611
    finding_type: FT-004
    breach_vector: "Internet Anon"
    rationale: >
      External-entity resolution turns XML input into a file-read / SSRF
      primitive (classic `file:///etc/passwd` and internal-URL fetches).
    remediation: "Disable DTD / external-entity processing (noent:false, resolveExternals:false) or use a parser that rejects DOCTYPE."

  # ===================================================================
  # Multi-stack tuning (implplan Phase A) — Java + Python injection sinks.
  # Same CWEs as INJ-001/002 so they fold via consolidation-groups
  # (sql-injection / command-injection -per-component). Node patterns do
  # not match these languages.
  # ===================================================================

  - id: INJ-JAVA-001
    name: "SQL injection via string-concatenated query — Java"
    description: >
      A JDBC/JPA query built by concatenating (`+`) request-derived data into a
      SQL string (createQuery / createNativeQuery / prepareStatement /
      executeQuery) instead of a bound parameter.
    file_patterns: ["**/*.java"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*Test.java", "**/*Tests.java", "**/target/**", "**/build/**"]
    pattern: '(?is)\.(createQuery|createNativeQuery|prepareStatement|executeQuery|executeUpdate|execute)\s*\(\s*"[^"]*\b(?:SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)\b[^"]*"\s*\+'
    counter_scope: window
    counter_window: 2
    counter_patterns:
      - '\.setParameter\(|\bPreparedStatement\b[^\n]*\?'
    severity_if_violated: High
    cwe: CWE-89
    finding_type: FT-001
    breach_vector: "Internet Anon"
    rationale: >
      Concatenated request data in a SQL string lets an attacker alter the query
      (auth bypass, data exfiltration, UNION reads).
    remediation: "Use bound parameters (setParameter / ? placeholders / Spring Data derived queries); never concatenate request data into SQL."

  - id: INJ-JAVA-002
    name: "Command injection — Java"
    description: >
      `Runtime.getRuntime().exec(...)` or `new ProcessBuilder(...)` invoked with a
      concatenated / request-derived argument runs an attacker-influenced command.
    file_patterns: ["**/*.java"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*Test.java", "**/*Tests.java", "**/target/**", "**/build/**"]
    pattern: '(?:Runtime\.getRuntime\(\)\.exec|new\s+ProcessBuilder)\s*\([^)]*\+'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-78
    finding_type: FT-003
    breach_vector: "Internet Anon"
    rationale: "Request data concatenated into a shell/exec argument yields arbitrary command execution."
    remediation: "Avoid the shell; pass a fixed argv array with validated, allow-listed arguments."

  - id: INJ-PY-001
    name: "SQL injection via string-formatted query — Python"
    description: >
      A DB cursor / ORM raw query built with an f-string, `%`, `+`, or `.format()`
      of request data (cursor.execute / .raw / .extra) instead of a bound
      parameter. The safe `execute("… %s", (val,))` placeholder form does NOT
      match (the `%` there is inside the literal).
    file_patterns: ["**/*.py"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*_test.py", "**/test_*.py", "**/migrations/**",
       "**/.venv/**", "**/venv/**"]
    pattern: '(?is)\.(execute|executemany|raw|extra)\s*\(\s*(?:f["'']|["''][^"'']*["'']\s*(?:%|\+|\.format\s*\())'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-89
    finding_type: FT-001
    breach_vector: "Internet Anon"
    rationale: >
      f-string / % / + / .format interpolation of request data into SQL lets an
      attacker rewrite the query.
    remediation: "Use parameterized queries: cursor.execute(sql, params) with %s / :name placeholders; never interpolate."

  - id: INJ-PY-002
    name: "Command injection — Python"
    description: >
      `os.system` / `os.popen` / `subprocess(..., shell=True)` invoked with
      request-derived input runs an attacker-influenced shell command.
    file_patterns: ["**/*.py"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*_test.py", "**/test_*.py", "**/.venv/**", "**/venv/**"]
    pattern: '(?is)os\.system\s*\(|os\.popen\s*\(|subprocess\.(?:call|run|Popen|check_output|check_call)\s*\([^)]*shell\s*=\s*True'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-78
    finding_type: FT-003
    breach_vector: "Internet Anon"
    rationale: "A shell command built from request data yields arbitrary command execution."
    remediation: "Use subprocess with a fixed argv list and shell=False; validate/allow-list any dynamic argument."

  - id: INJ-JAVA-003
    name: "SSRF — outbound request to a concatenated URL — Java"
    description: >
      A RestTemplate / WebClient / URL.openConnection call whose target URL is
      built by concatenation (`+`), i.e. from dynamic (often request) data.
    file_patterns: ["**/*.java"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*Test.java", "**/*Tests.java", "**/target/**", "**/build/**"]
    pattern: '(?:\.(?:getForObject|getForEntity|exchange|execute)|new\s+URL|\.openConnection)\s*\([^)]*\+'
    counter_scope: window
    counter_window: 2
    counter_patterns:
      - '(?i)\b(allowlist|whitelist|isAllowed|URI\.create\("https?://[a-z])'
    severity_if_violated: High
    cwe: CWE-918
    finding_type: FT-070
    breach_vector: "Internet Anon"
    rationale: "A request-controlled outbound URL lets an attacker reach internal services / cloud metadata."
    remediation: "Allow-list the host/scheme; never build the target URL from unvalidated request data."

  - id: INJ-JAVA-004
    name: "Path traversal — filesystem access from a concatenated path — Java"
    description: >
      A File / Paths.get / FileInputStream built by concatenation (`+`) with no
      canonicalization, letting `../` escape the intended directory.
    file_patterns: ["**/*.java"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*Test.java", "**/*Tests.java", "**/target/**", "**/build/**"]
    pattern: '(?:new\s+File|Paths\.get|new\s+FileInputStream|new\s+FileReader)\s*\([^)]*\+'
    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '(?i)\b(getCanonicalPath|normalize|startsWith|FilenameUtils)\b'
    severity_if_violated: High
    cwe: CWE-22
    finding_type: FT-060
    breach_vector: "Internet Anon"
    rationale: "A request-controlled path with `../` can read/write arbitrary files."
    remediation: "Resolve + canonicalize the path and assert it stays within an allowed base directory."

  - id: INJ-PY-003
    name: "SSRF — outbound request to a formatted URL — Python"
    description: >
      requests.* / urlopen called with an f-string or concatenated URL, i.e.
      built from dynamic (often request) data.
    file_patterns: ["**/*.py"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*_test.py", "**/test_*.py", "**/.venv/**", "**/venv/**"]
    pattern: '(?is)(?:requests\.(?:get|post|put|delete|head|request)|urlopen|urllib\.request\.urlopen)\s*\(\s*(?:f["'']|["''][^"'']*["'']\s*(?:%|\+|\.format\s*\()|[A-Za-z_][\w.]*\s*\+)'
    counter_scope: window
    counter_window: 2
    counter_patterns:
      - '(?i)\b(allowlist|whitelist|is_allowed|urlparse)\b'
    severity_if_violated: High
    cwe: CWE-918
    finding_type: FT-070
    breach_vector: "Internet Anon"
    rationale: "A request-controlled outbound URL lets an attacker reach internal services / cloud metadata."
    remediation: "Allow-list the host/scheme; never build the target URL from unvalidated request data."

  - id: INJ-PY-004
    name: "Path traversal — filesystem access from a formatted path — Python"
    description: >
      open() / os.path.join / Path() built with an f-string or concatenation and
      no canonicalization, letting `../` escape the intended directory.
    file_patterns: ["**/*.py"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*_test.py", "**/test_*.py", "**/.venv/**", "**/venv/**"]
    pattern: '(?is)(?:open|os\.path\.join|Path)\s*\(\s*(?:f["''][^"'']*\{|[A-Za-z_][\w.]*\s*\+|["''][^"'']*["'']\s*\+)'
    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '(?i)\b(basename|safe_join|abspath|realpath|startswith|secure_filename)\b'
    severity_if_violated: High
    cwe: CWE-22
    finding_type: FT-060
    breach_vector: "Internet Anon"
    rationale: "A request-controlled path with `../` can read/write arbitrary files."
    remediation: "Canonicalize (os.path.realpath) and assert the result stays within an allowed base directory."

