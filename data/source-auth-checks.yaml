    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-89
    finding_type: FT-001
    breach_vector: "Internet Anon"
    rationale: "Formatted/concatenated request data in SQL lets an attacker alter the query."
    remediation: "Use bind parameters ($1 / ? placeholders) with the args variadic; never Sprintf into SQL."

