# architectural-controls.yaml — canonical control vocabulary for AppSec reports
#
# Used by: appsec-stride-analyzer (match detected controls to canonical names),
# appsec-threat-merger (dedup identically-named controls across components),
# phase-group-threats.md / phase-group-finalization.md (render Operational
# Strengths + Section 6 with consistent terminology).
#
# Each entry:
#   name                — canonical, tech-agnostic architectural control name
#   aliases             — alternative names the analyzer may encounter
#                         (library names, synonyms, STRIDE-analyzer phrasings)
#   domain              — one of IAM / AuthZ / DataProt / InputVal /
#                         FrontendSec / Audit / Infra / SupplyChain / RealTime /
#                         AI / SessionMgmt — for grouping in Section 6
#   default_references  — default ASVS/NIST/CWE refs when analyzer provides none
#
# Extend additively. Never rename a canonical `name`; add new aliases instead.

schema_version: 1

effectiveness_scale:
  adequate: "✅"
  partial:  "⚠️"
  weak:     "🔶"
  missing:  "❌"

domains:
  IAM:          "Identity & Access Management"
  AuthZ:        "Authorization"
  DataProt:     "Data Protection"
  InputVal:     "Input Validation & Output Encoding"
  FrontendSec:  "Frontend Security"
  Audit:        "Audit & Logging"
  Infra:        "Infrastructure"
  SupplyChain:  "Dependency & Supply Chain"
  RealTime:     "Real-time / WebSocket"
  AI:           "AI / LLM"
  SessionMgmt:  "Session Management"

controls:
  # ---------- IAM ----------
  #
  # Each IAM entry carries a `kind:` discriminator used by §6 rendering:
  #   mechanism    — an end-to-end way identity is established (Password
  #                  Login, OAuth, mTLS, AWS IAM Role, Webhook HMAC, …).
  #                  In v2, appears as a concrete H4 subcontrol under the
  #                  relevant §6 control-category section.
  #   primitive    — a building block used INSIDE a mechanism (Password
  #                  Hashing, JWT Signature Verification, Rate Limiting).
  #                  In v2, remains a subcontrol or supporting assessment,
  #                  not a standalone auth flow.
  #   cross-cutting — applies across multiple domains (Secret Management,
  #                  Defense-in-Depth). Renders into the matching v2
  #                  control-category section or §6.13 summary.
  #
  # The discriminator prevents token formats (e.g. "JWT") and primitives
  # from replacing the real authentication mechanism in the §6 control
  # inventory.

  - name: "Multi-Factor Enrollment (TOTP)"
    # Name aliases AND concrete library / code / route signals so recon maps a
    # detected TOTP setup onto this mechanism even when it was never named
    # (hand-rolled otplib route, no "MFA" string).
    aliases: ["TOTP Enrollment", "MFA Enrollment", "2FA Enrollment",
              "Authenticator Setup", "Multi-Factor Authentication",
              # library / code / route signals
              "otplib", "speakeasy", "otpauth", "node-2fa", "@otplib",
              "authenticator.generateSecret", "generateSecret", "totpSecret",
              "totp_setup_secret", "/2fa/setup", "routes/2fa", "2fa.ts",
              "qrcode", "otpauth://"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-308]
      owasp_asvs: V2.1
      nist_sp_800_53: IA-2

  - name: "Multi-Factor Verification (TOTP)"
    aliases: ["TOTP Verification", "MFA Verification", "2FA Verification",
              "Second-Factor Verification", MFA, 2FA, TOTP,
              "Two-Factor Authentication", "Second-Factor Authentication",
              # library / code / route signals
              "otplib", "speakeasy", "authenticator.check", "authenticator.verify",
              "verifyTOTP", "totpToken", "totp_token_required", "/2fa/verify",
              "/rest/2fa", "routes/2fa", "2fa.ts"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-308]
      owasp_asvs: V2.1
      nist_sp_800_53: IA-2

  - name: "Password Hashing"
    aliases: ["Password Storage", bcrypt, argon2, scrypt, "Password Hash"]
    domain: IAM
    kind: primitive
    default_references:
      cwe: [CWE-916, CWE-327]
      owasp_asvs: V2.4
      nist_sp_800_53: IA-5

  - name: "Authentication Rate Limiting"
    aliases: ["Login Throttling", "Brute-Force Protection", "Account Lockout", rate-limit, express-rate-limit]
    domain: IAM
    kind: primitive
    default_references:
      cwe: [CWE-307]
      owasp_asvs: V2.2
      nist_sp_800_53: IA-5

  # Session token lifecycle (§6.3) — Sign → Validate → Store → Revoke → Expire.
  # The legacy `JWT Issuance` / `JWT Verification` / `JWT Verification and
  # Protected Route Middleware` / `Token Storage` / `Token Expiry` /
  # `Token Revocation` headings all moved to these lifecycle-aware names as of
  # 2026-05. Old headings live on as aliases so the merger continues to match
  # them. JWT is named here as the in-this-codebase token format — the canonical
  # name describes the FUNCTION (sign / validate / store / revoke / expire)
  # and the parenthetical the IMPLEMENTATION.

  - name: "Session Token Signing (JWT Based)"
    aliases: ["JWT Issuance", "Token Signing", "JWT Sign", "issueAuthToken",
              "jwt.sign", "Session Establishment"]
    domain: SessionMgmt
    kind: primitive
    default_references:
      cwe: [CWE-321, CWE-798, CWE-347]
      owasp_asvs: V3.5
      nist_sp_800_53: SC-12

  - name: "Session Token Validation (JWT Based)"
    aliases: ["JWT Verification", "JWT Verification and Protected Route Middleware",
              "JWT Signature Verification", "JWT Validation", "Token Signature Check",
              "JWT Authentication", "Per-Request Authentication", jws, express-jwt]
    domain: SessionMgmt
    kind: primitive
    default_references:
      cwe: [CWE-347, CWE-290]
      owasp_asvs: V3.5
      nist_sp_800_53: IA-5

  - name: "Session Token Storage (Browser localStorage)"
    aliases: ["Token Storage", "JWT in localStorage", "Browser Token Storage",
              "Client-Side Session Storage", "Session Token Storage (Cookie)",
              "Session Token Storage"]
    domain: SessionMgmt
    kind: primitive
    default_references:
      cwe: [CWE-922, CWE-1004]
      owasp_asvs: V3.4
      nist_sp_800_53: AC-12

  - name: "Session Token Revocation"
    aliases: ["JWT Revocation", "Token Blocklist", "Token Blacklist",
              "Session Invalidation", "Token Revocation"]
    domain: SessionMgmt
    kind: primitive
    default_references:
      cwe: [CWE-613]
      owasp_asvs: V3.3
      nist_sp_800_53: AC-12

  - name: "Session Token Expiry"
    aliases: ["Token Expiry", "JWT Expiry", "Token Lifetime", "Session Timeout",
              "expiresIn", "exp claim"]
    domain: SessionMgmt
    kind: primitive
    default_references:
      cwe: [CWE-613]
      owasp_asvs: V3.3
      nist_sp_800_53: AC-12

  - name: "Secret Management"
    aliases: [Vault, "AWS Secrets Manager", "KMS", "Secret Store", "Key Management"]
    domain: IAM
    kind: cross-cutting
    default_references:
      cwe: [CWE-321, CWE-798]
      owasp_asvs: V6.4
      nist_sp_800_53: SC-12

  - name: "Social Login Adapter (OAuth / OIDC)"
    # Name aliases AND concrete library / import / route signals so recon and
    # the stride-analyzer reliably map a detected OAuth integration onto this
    # canonical mechanism (previously only name-level aliases existed, so OAuth
    # was missed whenever recon had not already named it. Mirrors the
    # library-level detection the SAML entry
    # below already carries.
    aliases: ["Federated Identity / OAuth", "OAuth Login Adapter", "OAuth Adapter",
              "OAuth 2.0", "OIDC", "OpenID Connect", SSO,
              "OAuth Sign-In", "OIDC Sign-In", "Social Login", "Google Login",
              "Sign in with Google", "Login with Google",
              # library / package signals (Node, Python, .NET, Java, SPA)
              "passport-oauth2", "passport-google-oauth", "passport-google-oauth20",
              "passport-github", "passport-facebook", "passport-azure-ad",
              "openid-client", "simple-oauth2", "grant", "@node-oauth",
              "next-auth", "@auth/core", "react-oauth", "angularx-social-login",
              "google-auth-library", "googleapis OAuth2", "authlib", "msal",
              "spring-security-oauth2", "django-allauth", "omniauth",
              # route / flow signals
              "/auth/google", "/oauth/callback", "/oauth2/callback",
              "authorization_code", "response_type=code", "openid profile email",
              # SPA / hand-rolled front-end OAuth signals — a client-side
              # redirect flow with NO backend OAuth library (frontend-only
              # Google-login case: frontend/src/app/oauth/oauth.component.ts
              # reads the implicit-grant access_token and calls the local login
              # with `oauth: true`). Backend-library signals above never match
              # this shape, so OAuth was silently missed (2026-06-02).
              "oauth.component", "oauthLogin", "/oauth", "oauth: true",
              "access_token", "response_type=token", "implicit grant"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-522]
      owasp_asvs: V2.1

  - name: "SAML Authentication"
    aliases: ["SAML 2.0", "SAML SSO", "SP-Initiated SAML", "IdP-Initiated SAML",
              "passport-saml", "node-saml", "python3-saml", "spring-security-saml2",
              "AssertionConsumerService", "SAMLResponse"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-347]
      owasp_asvs: V2.8
    notes: |
      SAML 2.0 federated identity. The Service Provider receives a signed
      XML assertion from the IdP at the AssertionConsumerService endpoint
      and verifies the XML-DSig signature on the assertion. The pre-generator
      (scripts/pregenerate_fragments.py) already renders a canonical
      SP/IdP/ACS sequence diagram when `saml` appears in the control name or
      implementation string. Threat-class is distinct from OAuth/OIDC —
      XML Signature Wrapping (XSW1-8), comment-truncation, and RelayState
      open-redirect are SAML-specific failure modes and belong under TH-02.

  # IAM mechanisms beyond the user-facing web auth set. These are the entries
  # the §6.3 per-mechanism decomposition relies on for backend services,
  # serverless apps, mesh-internal services, and webhook receivers.

  - name: "User Registration"
    aliases: ["Account Creation", "Sign-up", "Local Registration", "passport-local register", "POST /api/Users"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-915]
      owasp_asvs: V2.7
    notes: |
      Account-lifecycle mechanism. Surfaces mass-assignment risk (role
      field), enumeration risk via differential error messages, and
      registration-without-verification risk. Reference §6.2 lists it
      as a dedicated #### sub-block separate from Password Login because
      the credential-creation step has its own threat model.

  - name: "Password-Based Login"
    aliases: ["Password Login", "Username/Password Login", "Form Login",
              "Local Login", "passport-local"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-521]
      owasp_asvs: V2.1

  - name: "Password Reset"
    aliases: ["Password Reset Flow", "Forgot Password", "Account Recovery",
              "Reset Token Flow"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-640, CWE-287]
      owasp_asvs: V2.5

  - name: "Password Change"
    aliases: ["Change Password", "Update Password", "POST /api/users/change-password", "GET /rest/user/change-password"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-620, CWE-287]
      owasp_asvs: V2.7
    notes: |
      Credential-lifecycle mechanism distinct from Password Reset.
      Requires authenticated session; the dominant defect class is
      missing current-password reauthentication (CWE-620) and credential
      transport in URL/query string (GET-with-password anti-pattern).

  - name: "Passkey / WebAuthn"
    aliases: [WebAuthn, Passkey, FIDO2, "navigator.credentials", "@simplewebauthn"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287]
      owasp_asvs: V2.7

  - name: "Magic-Link Sign-In"
    aliases: [Passwordless, "Magic Link", "Email Login Token"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287]
      owasp_asvs: V2.1

  - name: "API Key / Bearer Token Authentication"
    aliases: ["API Key", "Bearer Token", "x-api-key", "Authorization: Bearer", "Static Token Auth"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-798]
      owasp_asvs: V2.1
    notes: "Bearer token issued by an external system or stored statically; distinct from JWT-bearer signed by this service."

  - name: "Mutual TLS (mTLS) Authentication"
    aliases: [mTLS, "Mutual TLS", "Client Certificate Authentication", "X.509 Client Auth", "PeerAuthentication"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-295, CWE-287]
      owasp_asvs: V2.8
    notes: "Service-to-service identity established via X.509 client certificates. Often enforced by a service mesh (Istio, Linkerd) or an ingress proxy."

  - name: "Webhook HMAC Verification"
    aliases: ["Webhook Signature", "X-Hub-Signature", "Stripe Signature", "Signed Webhook", "HMAC Signature"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-345, CWE-347]
      owasp_asvs: V2.6
    notes: "Inbound webhook authenticity verified via HMAC over the payload using a pre-shared secret. Replay protection (timestamp + nonce) is a separate concern."

  - name: "Cloud IAM Role Assumption"
    aliases: ["AWS IAM Role", "AWS STS AssumeRole", "Lambda Execution Role", "GCP Service Account", "Azure Managed Identity", "Workload Identity Federation", SigV4, "GOOGLE_APPLICATION_CREDENTIALS"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-269, CWE-287]
      owasp_asvs: V2.10
    notes: "Cloud-native machine identity. The application authenticates to cloud APIs via short-lived credentials issued by the platform's IAM (AWS STS / GCP IAM / Azure AD)."

  - name: "Kubernetes ServiceAccount Authentication"
    aliases: ["K8s ServiceAccount", "ServiceAccount Token", IRSA, "Workload Identity (GKE)", "Pod Identity", "automountServiceAccountToken"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-269]
      owasp_asvs: V2.10
    notes: "Kubernetes-native pod identity. Token is mounted into the pod and presented to the API server or downstream services."

  - name: "Service-Mesh Identity (SPIFFE/SPIRE)"
    aliases: [SPIFFE, SPIRE, "SVID Certificate", "Istio RequestAuthentication", "Linkerd Identity", "Consul Connect"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-287, CWE-295]
      owasp_asvs: V2.8

  - name: "Anonymous Access (No Authentication)"
    aliases: ["No Auth", "Public Endpoint", "Unauthenticated Route"]
    domain: IAM
    kind: mechanism
    default_references:
      cwe: [CWE-306]
      owasp_asvs: V2.10
    notes: "Explicit negative-finding row when public/unauthenticated routes exist by design or by oversight. Recorded as a mechanism so §6.3 can document the implicit identity model (e.g. 'requests are processed without authentication; downstream relies on network ACLs')."

  # ---------- Authorization ----------
  - name: "Role-Based Access Control"
    aliases: [RBAC, "Admin Role Enforcement", "Role Check"]
    domain: AuthZ
    default_references:
      cwe: [CWE-285, CWE-862]
      owasp_asvs: V4.1
      nist_sp_800_53: AC-3

  - name: "Object-Level Authorization"
    aliases: ["IDOR Prevention", "Ownership Check", "Row-Level Security"]
    domain: AuthZ
    default_references:
      cwe: [CWE-639, CWE-284]
      owasp_asvs: V4.2

  - name: "Explicit Deny Baseline"
    aliases: ["denyAll", "Default Deny", "Zero-Trust Baseline"]
    domain: AuthZ
    default_references:
      cwe: [CWE-862]
      owasp_asvs: V4.1

  - name: "Step-Up Authentication"
    aliases: ["Re-authentication", "Sudo Mode", "Recent-Auth Check",
              "Sensitive Action Confirmation", "Transaction Authorization"]
    domain: AuthZ
    default_references:
      owasp_asvs: V3.4
      nist_sp_800_63: "AAL2"
    notes: |
      Sensitive operations (password change, MFA enrolment, payment,
      data export, role change) require a fresh authentication factor
      within a short window — typically a re-prompt for password, a
      WebAuthn challenge, or an OOB confirmation. Renders only when
      the recon scanner detects matching code (no auto-injected ❌
      row for codebases that lack the concept). Not flagged as a
      defect by absence alone; only when a sensitive flow exists AND
      step-up is missing.

  # ---------- Data Protection ----------
  - name: "Transport Layer Security"
    aliases: [TLS, HTTPS, SSL, "Transport Encryption"]
    domain: DataProt
    default_references:
      cwe: [CWE-319]
      owasp_asvs: V9.1
      nist_sp_800_53: SC-8

  - name: "TLS Certificate Management"
    aliases: ["Certificate Rotation", "Cert Management", mTLS]
    domain: DataProt
    default_references:
      owasp_asvs: V9.1

  - name: "Data at Rest Encryption"
    aliases: ["At-Rest Encryption", "Database Encryption", "Disk Encryption"]
    domain: DataProt
    default_references:
      cwe: [CWE-311]
      owasp_asvs: V6.2

  - name: "Client-Side Storage Safety"
    aliases: ["Cookie SameSite", "HttpOnly Cookies", "localStorage Avoidance"]
    domain: DataProt
    default_references:
      cwe: [CWE-922, CWE-1004]
      owasp_asvs: V3.4

  # ---------- Input Validation & Output Encoding ----------
  - name: "Parameterized Database Access"
    aliases: ["Prepared Statements", "Parameterized Queries", "ORM", Sequelize, SQLAlchemy, "TypeORM"]
    domain: InputVal
    default_references:
      cwe: [CWE-89, CWE-943]
      owasp_asvs: V5.3

  - name: "Input Schema Validation"
    aliases: ["Input Validation", "Schema Validation", zod, joi, ajv, pydantic]
    domain: InputVal
    default_references:
      cwe: [CWE-20]
      owasp_asvs: V5.1

  - name: "Output Encoding"
    aliases: ["HTML Sanitization", sanitize-html, "DOMPurify", "Template Escaping", "Auto-Escape"]
    domain: InputVal
    default_references:
      cwe: [CWE-79]
      owasp_asvs: V5.2

  - name: "Mass-Assignment Prevention"
    aliases: ["Field Allowlist", "Strong Parameters", "attributes: allowlist"]
    domain: InputVal
    default_references:
      cwe: [CWE-915]
      owasp_asvs: V5.1

  - name: "Sandbox Isolation"
    aliases: ["Expression Sandbox", "VM Isolation", "Process Isolation"]
    domain: InputVal
    default_references:
      cwe: [CWE-94, CWE-502]
      owasp_asvs: V5.5

  # ---------- Frontend Security ----------
  - name: "HTTP Security Headers"
    aliases: [Helmet, "Response Headers", "Security Headers"]
    domain: FrontendSec
    # HTTP response-header hardening (helmet, X-Frame-Options, X-Content-
    # Type-Options, Referrer-Policy, Permissions-Policy, HSTS, etc.) is
    # baseline expected hygiene, not a genuine architectural strength.
    # Excluded from the Management Summary's `### Operational Strengths`
    # by default — the strengths table is reserved for system-level
    # architectural decisions (centralised auth, parameterised data access
    # layer, KMS-backed key management, mesh mTLS, isolation boundaries,
    # …). Per-row override is still possible by setting
    # `show_in_strengths_by_default: true` on the security_controls[]
    # entry, but that should be exceptional and require an authored gap
    # statement that names the architectural significance.
    excluded_from_strengths: true
    default_references:
      cwe: [CWE-693]
      owasp_asvs: V14.4

  - name: "Content Security Policy"
    aliases: [CSP, "Content-Security-Policy"]
    domain: FrontendSec
    default_references:
      cwe: [CWE-79, CWE-693]
      owasp_asvs: V14.4

  - name: "CORS Policy"
    aliases: ["Cross-Origin Resource Sharing", "Access-Control-Allow-Origin"]
    domain: FrontendSec
    default_references:
      cwe: [CWE-942, CWE-346]
      owasp_asvs: V14.5

  - name: "CSRF Protection"
    aliases: ["Anti-CSRF Token", csurf, "Double-Submit Cookie", "SameSite Cookie"]
    domain: FrontendSec
    default_references:
      cwe: [CWE-352]
      owasp_asvs: V4.2

  - name: "Open Redirect Prevention"
    aliases: ["Redirect Allowlist", "URL Validation"]
    domain: FrontendSec
    default_references:
      cwe: [CWE-601]
      owasp_asvs: V5.1

  # ---------- Audit & Logging ----------
  - name: "Request Access Logging"
    aliases: [morgan, "HTTP Logging", "Access Log", "Apache Log Format"]
    domain: Audit
    default_references:
      cwe: [CWE-778]
      owasp_asvs: V7.1

  - name: "Security Event Logging"
    aliases: ["Auth Event Log", "Structured Audit Log", "Security Log", "SIEM Feed"]
    domain: Audit
    default_references:
      cwe: [CWE-778]
      owasp_asvs: V7.2

  - name: "Log Forwarding / SIEM Integration"
    aliases: [SIEM, "Log Shipping", fluentd, logstash, splunk]
    domain: Audit
    default_references:
      cwe: [CWE-778]
      owasp_asvs: V7.3

  - name: "Production Error Handler"
    aliases: ["Error Sanitization", "Stack Trace Suppression", "Production Error Page"]
    domain: Audit
    default_references:
      cwe: [CWE-209]
      owasp_asvs: V7.4

  # ---------- Infrastructure ----------
  - name: "Container Runtime Hardening (Distroless)"
    aliases: ["Container Hardening", Distroless, "Minimal Image",
              "Non-root User", "Read-only Filesystem"]
    domain: Infra
    default_references:
      cwe: [CWE-250]
      owasp_asvs: V14.1

  - name: "Web Application Firewall"
    aliases: [WAF, "ModSecurity", "AWS WAF", "Cloudflare WAF"]
    domain: Infra
    default_references:
      owasp_asvs: V14.1

  - name: "Network Segmentation"
    aliases: ["Private Subnet", "Egress Policy", "Ingress Policy", "VPC"]
    domain: Infra
    default_references:
      cwe: [CWE-918]

  - name: "API Rate Limiting"
    aliases: ["Request Throttling", "API Gateway Rate Limit"]
    domain: Infra
    default_references:
      cwe: [CWE-400, CWE-307]
      owasp_asvs: V11.1

  # ---------- Supply Chain ----------
  - name: "Dependency Vulnerability Scanning"
    aliases: [SCA, "npm audit", "pip audit", Dependabot, Snyk, "Software Composition Analysis"]
    domain: SupplyChain
    default_references:
      cwe: [CWE-1104]
      owasp_asvs: V14.2

  - name: "Container Image Signing"
    aliases: [cosign, "Sigstore", "Notary", SLSA]
    domain: SupplyChain
    default_references:
      cwe: [CWE-829, CWE-347]

  - name: "Base Image Pinning"
    aliases: ["Image Digest Pin", SHA256-pin, "Reproducible Builds"]
    domain: SupplyChain
    default_references:
      cwe: [CWE-1104]

  - name: "Lockfile Integrity"
    aliases: ["package-lock.json", "pnpm-lock.yaml", "poetry.lock", "npm ci", "--ignore-scripts"]
    domain: SupplyChain
    default_references:
      cwe: [CWE-506]

  # ---------- Real-time ----------
  - name: "WebSocket Authentication"
    aliases: ["WS Auth", "Socket.IO Auth", "WebSocket Origin Validation"]
    domain: RealTime
    default_references:
      cwe: [CWE-306, CWE-346]
      owasp_asvs: V13.4

  # ---------- AI / LLM ----------
  - name: "LLM Training Data Integrity"
    aliases: ["Training Data Validation", "Model Source Verification", "Training URL Allowlist"]
    domain: AI
    default_references:
      cwe: [CWE-1357]
    notes: "Maps to OWASP LLM03 Supply Chain / LLM04 Data and Model Poisoning."

  - name: "LLM Output Filtering"
    aliases: ["Prompt Output Sanitization", "PII Redaction"]
    domain: AI
    default_references:
      cwe: [CWE-200]
    notes: "Maps to OWASP LLM05 Improper Output Handling."
