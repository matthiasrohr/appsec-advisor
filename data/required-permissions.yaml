# Permissions required for /appsec-advisor:create-threat-model to run without
# prompts in an INTERACTIVE Claude Code session. Consumed by
# /appsec-advisor:check-permissions (scripts/check_permissions.py).
#
# What this list is — and is NOT
# ──────────────────────────────
# This is a PROMPT-SUPPRESSION allow-list, not a security boundary.
#   • Its only job is to stop Claude Code from prompting on each Read/Write/
#     Edit/Bash tool call during an interactive run.
#   • The unattended path (scripts/run-headless.sh) launches with
#     `--permission-mode bypassPermissions` and does NOT consult settings.json
#     at all. None of these entries take effect there.
#   • Because the plugin requires Bash(*) (see the shell entry below), an agent
#     can read/write any path via the shell (cat/cp/curl). The path-scoped
#     Read/Write/Edit entries therefore provide NO containment — they only
#     channel tool-mediated file ops so they don't prompt. Do not treat the
#     ${REPO_ROOT}/${OUTPUT_DIR} scoping as a sandbox.
#
# Where the actual security boundary lives
# ────────────────────────────────────────
# Containment is enforced in code, not by this allow-list:
#   • scripts/preflight_untrusted.py  — rejects repo-owned hooks/settings and
#     out-of-repo symlinks before an untrusted scan (run-headless.sh
#     --trust-mode untrusted)
#   • scripts/_path_guard.py          — blocks symlink escapes during file reads
#   • scripts/_url_guard.py           — SSRF / cloud-metadata defence on fetches
#   • scripts/postscan_secret_check.py — fails the run on leaked secret values
# For real isolation, run against a throwaway git worktree (see below) or in a
# container.
#
# Bash entry: command-prefix scoping is a Claude Code limitation — per-command
# entries like Bash(git:*) match only the FIRST TOKEN of a simple command, so
# compound commands / pipelines / VAR=$(...) chains still prompt. A single
# Bash(*) is the only way to keep an interactive run prompt-free. It is wide
# open by design; the guards above are what bound the blast radius.
#
# Placeholders expanded at check-time:
#   ${OUTPUT_DIR}   — from --output-dir / $OUTPUT_DIR / <repo>/docs/security
#   ${REPO_ROOT}    — from --repo-root  / $REPO_ROOT  / current working dir
#   ${PLUGIN_ROOT}  — from --plugin-root / auto-detected plugin directory
#
# Sandbox recommendation
# ──────────────────────
# For additional isolation, run the scan against a git worktree copy of the repo:
#   git worktree add /tmp/scan-<repo> HEAD
#   /appsec-advisor:create-threat-model --repo /tmp/scan-<repo>
# This limits any unexpected writes to the temporary worktree.

version: 1

required:

  # --- File access — scoped to target repo, output dir, and plugin only ---
  - entry: "Read(${REPO_ROOT}/**)"
    reason: "agents read all files in the scanned repo (recon, STRIDE evidence, context)"
    category: file

  - entry: "Read(${PLUGIN_ROOT}/**)"
    reason: "agents and scripts read plugin data files (schemas, templates, CWE taxonomy, etc.)"
    category: file

  - entry: "Write(${OUTPUT_DIR}/**)"
    reason: "compose_threat_model.py, fragment writers, annotators all write under OUTPUT_DIR"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/**)"
    reason: "QA re-render loop edits threat-model.md and fragment files in place"
    category: file

  - entry: "Edit(${REPO_ROOT}/.gitignore)"
    reason: "publish-threat-model skill patches .gitignore with negation exceptions for published files"
    category: file

  # Dotfiles written directly by sub-agents (Write tool) inside OUTPUT_DIR.
  # Claude Code's ** glob does NOT match dotfiles (names starting with '.'),
  # so Write/Edit(${OUTPUT_DIR}/**) is insufficient — each dotfile must be listed
  # with an explicit path. The check_permissions.py _rule_covers() logic accepts
  # an exact path entry as satisfying a required exact-path entry.
  - entry: "Write(${OUTPUT_DIR}/.threat-modeling-context.md)"
