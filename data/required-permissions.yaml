  - entry: "Edit(${OUTPUT_DIR}/.threat-modeling-context.md)"
    reason: "QA and architect agents edit this file in place; ** glob does not cover dotfiles"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.recon-summary.md)"
    reason: "QA agent edits this file in place; ** glob does not cover dotfiles"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.prior-findings-index.json)"
    reason: "QA agent edits this file in place; ** glob does not cover dotfiles"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.qa-prepass.json)"
    reason: "QA agent may annotate or refresh deterministic pre-pass summary on fallback paths"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.architect-review.md)"
    reason: "architect-reviewer agent edits this file in place; ** glob does not cover dotfiles"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.architect-repair-plan.json)"
    reason: "architect-reviewer agent edits this file in place; ** glob does not cover dotfiles"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.architect-status.json)"
    reason: "architect-reviewer agent edits this file in place; ** glob does not cover dotfiles"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.merge-decisions.json)"
    reason: "threat-merger agent edits this file in place; ** glob does not cover dotfiles"
    category: file

