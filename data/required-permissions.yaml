    category: file

  - entry: "Write(${OUTPUT_DIR}/.architecture-coverage.json)"
    reason: "architecture_coverage_checks.py writes this file in Phase 2.6; ** glob does not cover dotfiles"
    category: file

  - entry: "Write(${OUTPUT_DIR}/.arch-coverage-threats.json)"
