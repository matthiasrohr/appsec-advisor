# Permissions required for /appsec-advisor:create-threat-model to run without
# prompts in an INTERACTIVE Claude Code session. Consumed by
# /appsec-advisor:check-permissions (scripts/check_permissions.py).
#
# What this list is — and is NOT
# ──────────────────────────────
# This is a PROMPT-SUPPRESSION allow-list, not a security boundary.
#   • Its only job is to stop Claude Code from prompting on each Read/Write/
#     Edit/Bash tool call during an interactive run.
#   • The unattended path (scripts/run-headless.sh) launches with
#     `--permission-mode bypassPermissions` and does NOT consult settings.json
#     at all. None of these entries take effect there.
#   • Because the plugin requires Bash(*) (see the shell entry below), an agent
#     can read/write any path via the shell (cat/cp/curl). The path-scoped
#     Read/Write/Edit entries therefore provide NO containment — they only
#     channel tool-mediated file ops so they don't prompt. Do not treat the
#     ${REPO_ROOT}/${OUTPUT_DIR} scoping as a sandbox.
#
# Where the actual security boundary lives
# ────────────────────────────────────────
# Containment is enforced in code, not by this allow-list:
#   • scripts/preflight_untrusted.py  — rejects repo-owned hooks/settings and
#     out-of-repo symlinks before an untrusted scan (run-headless.sh
#     --trust-mode untrusted)
#   • scripts/_path_guard.py          — blocks symlink escapes during file reads
#   • scripts/_url_guard.py           — SSRF / cloud-metadata defence on fetches
#   • scripts/postscan_secret_check.py — fails the run on leaked secret values
#   • scripts/redact_known_secrets.py  — exact-value redaction of source-found
#     secrets across all artifacts (prose included); fails closed on residual
# For real isolation, run against a throwaway git worktree (see below) or in a
# container.
#
# Bash entry: command-prefix scoping is a Claude Code limitation — per-command
# entries like Bash(git:*) match only the FIRST TOKEN of a simple command, so
# compound commands / pipelines / VAR=$(...) chains still prompt. A single
# Bash(*) is the only way to keep an interactive run prompt-free. It is wide
# open by design; the guards above are what bound the blast radius.
#
# Placeholders expanded at check-time:
#   ${OUTPUT_DIR}   — from --output-dir / $OUTPUT_DIR / <repo>/docs/security
#   ${REPO_ROOT}    — from --repo-root  / $REPO_ROOT  / current working dir
#   ${PLUGIN_ROOT}  — from --plugin-root / auto-detected plugin directory
#   ${HOME}         — the user's home dir (Path.home()); session-transcript reads
#
# Sandbox recommendation
# ──────────────────────
# For additional isolation, run the scan against a git worktree copy of the repo:
#   git worktree add /tmp/scan-<repo> HEAD
#   /appsec-advisor:create-threat-model --repo /tmp/scan-<repo>
# This limits any unexpected writes to the temporary worktree.

version: 1

required:

  # --- File access — scoped to target repo, output dir, and plugin only ---
  - entry: "Read(${REPO_ROOT}/**)"
    reason: "agents read all files in the scanned repo (recon, STRIDE evidence, context)"
    category: file

  - entry: "Read(${PLUGIN_ROOT}/**)"
    reason: "agents and scripts read plugin data files (schemas, templates, CWE taxonomy, etc.)"
    category: file

  - entry: "Read(${HOME}/.claude/projects/**)"
    reason: "scripts/detect_session_model.py reads the host CC session transcript to resolve the session model for routing transparency (fail-safe, read-only)"
    category: file

  - entry: "Read(${OUTPUT_DIR}/**)"
    reason: "agents re-read non-dotfile artifacts and subdirectory sidecars under OUTPUT_DIR"
    category: file

  - entry: "Read(${OUTPUT_DIR}/.*)"
    reason: "agents re-read direct dotfile sidecars under OUTPUT_DIR (.recon-summary.md, .threat-modeling-context.md, .stride-*.json, etc.); Claude Code's /** glob does NOT match direct dotfile children"
    category: file

  - entry: "Write(${OUTPUT_DIR}/**)"
    reason: "compose_threat_model.py, fragment writers, annotators all write under OUTPUT_DIR (non-dotfile paths and dot-subdirectory files like .fragments/*.md)"
    category: file

  - entry: "Write(${OUTPUT_DIR}/.*)"
    reason: "agents write direct dotfile sidecars (.recon-summary.md, .threat-modeling-context.md, .stride-*.json, .components.json, etc.); Claude Code's /** glob does NOT match direct dotfile children"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/**)"
    reason: "QA re-render loop edits threat-model.md and fragment files in place"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/.*)"
    reason: "repair loops edit direct dotfile sidecars; Claude Code's /** glob does NOT match direct dotfile children"
    category: file

  - entry: "Edit(${REPO_ROOT}/.gitignore)"
    reason: "publish-threat-model skill patches .gitignore with negation exceptions for published files"
    category: file

  - entry: "Edit(${PLUGIN_ROOT}/**)"
    reason: "fix-run-issues skill applies edit_file actions to plugin agent/config files via the Edit tool (targets resolved relative to $CLAUDE_PLUGIN_ROOT)"
    category: file

  - entry: "Read(${REPO_ROOT}/.eval-out/**)"
    reason: "eval-threat-model harness + appsec-eval-judge read the brief and judge/verify sidecars under the default eval output dir"
    category: file

  - entry: "Write(${REPO_ROOT}/.eval-out/**)"
    reason: "eval_threat_model.py and appsec-eval-judge write the brief, candidate/verdict sidecars, and EVAL-REVIEW.md under the default eval output dir"
    category: file

  - entry: "Write(${REPO_ROOT}/.appsec-triage/**)"
    reason: "review-threat-model skill writes the user's triage sidecar (triage.yaml) and remediation-plan.md under a repo-root namespace kept separate from OUTPUT_DIR so pipeline cleanup / diagnostic-bundle never touch it (reads are covered by Read(${REPO_ROOT}/**))"
    category: file

  # NOTE: The plugin writes ~30 dot-prefixed sidecar files and dot-directories
  # under OUTPUT_DIR (.recon-summary.md, .assets.json, .dispatch-context/**,
  # .qa-status.json, etc.). Claude Code's /** glob does NOT match dot-prefixed
  # direct children of a directory (e.g. "Write(/tmp/**)" does NOT suppress the
  # prompt for "Write(/tmp/.sidecar.json)"). The /.*  entries above cover those
  # direct dotfile children. Dot-subdirectory files (e.g. .fragments/foo.md,
  # .dispatch-context/<id>/x.json) ARE covered by /** because they have
  # non-dotfile path components below the dot-dir. New direct-child dotfile
  # sidecars do NOT need their own per-file entries — the /.*  entries cover them.

  # --- Shell — one entry covers all commands without per-command maintenance ---
  #
  # Why Bash(*) instead of per-command entries:
  #   Claude Code's Bash allow-list matches only the FIRST TOKEN of a simple command.
  #   Any compound command (VAR=$(cmd) && ..., cmd1 | cmd2, for/if blocks, etc.)
  #   does NOT match Bash(cmd:*) and will always prompt the user. The plugin uses
  #   dozens of compound shell constructs (phase-epoch arithmetic, dep-scan
  #   background launch, lock/mkdir sequences, etc.) that cannot be broken apart
  #   without introducing extra Bash turns. A single Bash(*) is the only way to
  #   achieve fully prompt-free interactive runs.
  #   NOTE: Bash(*) is unrestricted shell access and subsumes all file access, so
  #   the path-scoped file entries above are prompt-suppression only, not a
  #   containment boundary. Real containment lives in the guard scripts — see the
  #   header comment at the top of this file.
  - entry: "Bash(*)"
    reason: "all shell commands used by agents, deterministic orchestration_controller.py invocations, mitigation-quality gates, scripts, and phase-group files; per-command entries cannot cover compound commands and variable-assignment chains — see comment above"
    category: shell
