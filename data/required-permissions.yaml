    category: file

  - entry: "Write(${OUTPUT_DIR}/.architect-review.md)"
    reason: "architect-reviewer agent writes this file via Write tool; ** glob does not cover dotfiles"
    category: file

  - entry: "Write(${OUTPUT_DIR}/.architect-repair-plan.json)"
    reason: "architect-reviewer agent writes this file via Write tool; ** glob does not cover dotfiles"
    category: file

  - entry: "Write(${OUTPUT_DIR}/.architect-status.json)"
