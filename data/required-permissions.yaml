# Permissions required for /appsec-advisor:create-threat-model to run without
# prompts. Consumed by /appsec-advisor:check-permissions (scripts/check_permissions.py).
#
# Security model
# ──────────────
# File tool permissions (Read/Write/Edit) ARE path-scoped:
#   • Read(${REPO_ROOT}/**)   — agents read files in the target repo only
#   • Read(${PLUGIN_ROOT}/**) — agents/scripts read plugin data/schemas/templates
#   • Write/Edit(${OUTPUT_DIR}/**) — all output goes to docs/security/ only
#
# Bash tool permissions are command-prefix scoped only (Claude Code limitation —
# there is no path restriction on shell execution). A single Bash(*) entry covers
# all shell commands unconditionally. Per-command entries like Bash(git:*) only
# cover the FIRST TOKEN of a simple command — any compound command, pipeline, or
# shell built-in with a variable assignment as the first token will not match and
# will still prompt. The only way to guarantee prompt-free compound commands is
# Bash(*). This is safe here because the real security boundary is the Read/Write/
# Edit path restrictions, not shell command whitelisting.
#
# Placeholders expanded at check-time:
#   ${OUTPUT_DIR}   — from --output-dir / $OUTPUT_DIR / <repo>/docs/security
#   ${REPO_ROOT}    — from --repo-root  / $REPO_ROOT  / current working dir
#   ${PLUGIN_ROOT}  — from --plugin-root / auto-detected plugin directory
#
# Sandbox recommendation
# ──────────────────────
# For additional isolation, run the scan against a git worktree copy of the repo:
#   git worktree add /tmp/scan-<repo> HEAD
#   /appsec-advisor:create-threat-model --repo /tmp/scan-<repo>
# This limits any unexpected writes to the temporary worktree.

version: 1

required:

  # --- File access — scoped to target repo, output dir, and plugin only ---
  - entry: "Read(${REPO_ROOT}/**)"
    reason: "agents read all files in the scanned repo (recon, STRIDE evidence, context)"
    category: file

  - entry: "Read(${PLUGIN_ROOT}/**)"
    reason: "agents and scripts read plugin data files (schemas, templates, CWE taxonomy, etc.)"
    category: file

  - entry: "Write(${OUTPUT_DIR}/**)"
    reason: "compose_threat_model.py, fragment writers, annotators all write under OUTPUT_DIR"
    category: file

  - entry: "Edit(${OUTPUT_DIR}/**)"
    reason: "QA re-render loop edits threat-model.md and fragment files in place"
    category: file

  - entry: "Edit(${REPO_ROOT}/.gitignore)"
    reason: "publish-threat-model skill patches .gitignore with negation exceptions for published files"
    category: file

  # --- Shell — one entry covers all commands without per-command maintenance ---
  #
  # Why Bash(*) instead of per-command entries:
  #   Claude Code's Bash allow-list matches only the FIRST TOKEN of a simple command.
  #   Any compound command (VAR=$(cmd) && ..., cmd1 | cmd2, for/if blocks, etc.)
  #   does NOT match Bash(cmd:*) and will always prompt the user. The plugin uses
  #   dozens of compound shell constructs (phase-epoch arithmetic, dep-scan
  #   background launch, lock/mkdir sequences, etc.) that cannot be broken apart
  #   without introducing extra Bash turns. A single Bash(*) is the only way to
  #   achieve fully prompt-free runs. The real security boundary is the Read/Write/
  #   Edit path restrictions above — not shell command whitelisting.
  - entry: "Bash(*)"
    reason: "all shell commands used by agents, scripts, and phase-group files; per-command entries cannot cover compound commands and variable-assignment chains — see comment above"
    category: shell
