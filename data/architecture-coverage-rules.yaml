# architecture-coverage-rules.yaml — rule catalog for scripts/architecture_coverage_checks.py
#
# Two rule families:
#   * hard_rules         — 5 high-confidence rules (arch.md §Erste Lieferung)
#                          may emit anti_pattern_candidates or strong control
#                          assessments; severity capped per critical-criteria.yaml.
#   * hypothesis_rules   — 4 conservative threat-hypothesis rules
#                          (arch.md §Threat-Hypothesis-Regeln).
#                          MUST default to emit_hypothesis_only; promotion to
#                          a hard candidate requires source-to-sink evidence
#                          (proof_state=confirmed).
#
# Field reference (per rule):
#   id                       — ARCH-<TOKEN>-<NNN> (validated against schema regex)
#   title                    — short human label
#   architectural_theme      — enum value from architecture-coverage.schema.json
#                              (SessionDesign, SecureDefaults, Authentication, ...).
#                              Drives cluster grouping in Section 8 of the report.
#   generic_threat_title     — concise general-threat wording used as the finding
#                              title for `source=architecture-coverage` /
#                              `source=threat-hypothesis` threats.
#   control                  — control name (matches architectural-controls.yaml when possible)
#   domain                   — one of IAM / AuthZ / DataProt / InputVal / FrontendSec /
#                              Audit / Infra / SupplyChain / RealTime / AI / SessionMgmt
#   cwe                      — primary CWE (CWE-NNN)
#   threat_category_id       — TH-NN (matches threat-category-taxonomy.yaml)
#   stride                   — STRIDE letter
#   preconditions            — gates that must hold for `applies: true`.
#                              Each precondition: {kind, source, signal}.
#   positive_signals         — regex / file-pattern signals proving the weakness
#   exculpatory_signals      — regex / file-pattern signals refuting the weakness
#                              (e.g. presence of a framework guard near the sink)
#   severity_cap             — hard cap per arch.md §Severity-Policy
#                              (CORS High, JWT High, etc.). NEVER Critical here.
#   output                   — default decision verb (engine may downgrade)
#                              hard rules:     control_only | anti_pattern_candidate
#                              hypothesis:     hypothesis_only | control_and_hypothesis
#
# Engine semantics:
#   - "always evaluate" means rules_evaluated[] contains an entry for every
#     rule, even when applies=false. skip_reason explains why.
#   - "unknown is not absent" gate: a precondition with status=unknown MUST NOT
#     trigger a missing/anti_pattern verdict on its own.
#   - Hard candidates require confidence=high AND positive_signals (not just
#     absence of an exculpatory signal).

version: 1

hard_rules:

  - id: ARCH-COOKIE-001
    title: "Insecure cookie / session hardening"
    architectural_theme: SessionDesign
    generic_threat_title: "Session token theft through weak cookie hardening"
    control: "Session Cookie Hardening"
    domain: SessionMgmt
    cwe: CWE-1004           # Sensitive Cookie Without HttpOnly
    threat_category_id: TH-10
    stride: InformationDisclosure
    preconditions:
      - kind: code_signal
        description: "Set-Cookie or session middleware usage observed."
        any_pattern:
          - "(?i)set[- ]cookie"
          - "(?i)\\bcookieSession\\b"
          - "(?i)\\bexpress[- ]session\\b"
          - "(?i)\\bsession\\s*\\("
          - "(?i)cookie\\s*:\\s*\\{"
          - "(?i)\\bSESSION_COOKIE_(SECURE|HTTPONLY|SAMESITE)\\b"
          - "(?i)res\\.cookie\\s*\\("
    positive_signals:
      any_pattern:
        - "(?i)res\\.cookie\\s*\\([^)]*httpOnly\\s*:\\s*false"
        - "(?i)res\\.cookie\\s*\\([^)]*secure\\s*:\\s*false"
        - "(?i)cookie\\s*:\\s*\\{[^}]*httpOnly\\s*:\\s*false"
        - "(?i)cookie\\s*:\\s*\\{[^}]*secure\\s*:\\s*false"
        - "(?i)SESSION_COOKIE_SECURE\\s*=\\s*False"
        - "(?i)SESSION_COOKIE_HTTPONLY\\s*=\\s*False"
        - "(?i)SESSION_COOKIE_SAMESITE\\s*=\\s*['\"]?None['\"]?"
        - "(?i)sameSite\\s*:\\s*['\"]None['\"]"
    exculpatory_signals:
      any_pattern:
        - "(?i)httpOnly\\s*:\\s*true.*secure\\s*:\\s*true"
        - "(?i)SESSION_COOKIE_SECURE\\s*=\\s*True"
    severity_cap: Medium
    output: control_assessment
    review_intent: >
      Detect session cookie configurations that omit HttpOnly / Secure / SameSite hardening — a JS payload or MITM gateway can then steal the session token.
    finding_when:
      - "res.cookie() / cookie middleware called with httpOnly:false or secure:false explicitly"
      - "Python SESSION_COOKIE_SECURE / _HTTPONLY set to False"
      - "sameSite:'None' set without a paired secure:true on the same options object"
    not_a_finding_when:
      - "A framework default sets all three flags true and the rule's exculpatory pattern matches"
      - "Cookie is short-lived non-auth telemetry only (e.g. analytics ack)"
    required_evidence: >
      Concrete res.cookie / session middleware call with httpOnly or secure set to false; or a SESSION_COOKIE_* constant assignment with the offending value.
    severity_reason: >
      Capped at Medium — exploitation requires either a co-resident XSS sink or a TLS-stripping position; either lifts the impact independently and would register as its own Critical.
    reviewer_note: >
      Confirm the cookie carries session/auth data (not just preference state) before enabling by default; otherwise Adequate.

  - id: ARCH-CORS-001
    title: "CORS wildcard origin combined with credentials"
    architectural_theme: SecureDefaults
    generic_threat_title: "Cross-origin request abuse through permissive CORS"
    control: "CORS Policy"
    domain: FrontendSec
    cwe: CWE-942
    threat_category_id: TH-15
    stride: Tampering
    preconditions:
      - kind: code_signal
        description: "CORS configuration observed."
        any_pattern:
          - "(?i)Access-Control-Allow-Origin"
          - "(?i)\\bcors\\s*\\("
          - "(?i)\\bCORS\\s*\\("
          - "(?i)origin\\s*[:=]\\s*['\"]?\\*['\"]?"
    positive_signals:
      requires_cooccurrence_window: 8
      any_pattern:
        - "(?i)origin\\s*[:=]\\s*['\"]?\\*['\"]?"
        - "(?i)Access-Control-Allow-Origin\\s*:\\s*\\*"
      cooccurrence_pattern:
        - "(?i)credentials\\s*[:=]\\s*['\"]?true['\"]?"
        - "(?i)Access-Control-Allow-Credentials\\s*:\\s*true"
        - "(?i)withCredentials\\s*[:=]\\s*true"
        - "(?i)supportsCredentials\\s*[:=]\\s*true"
    exculpatory_signals:
      any_pattern:
        - "(?i)origin\\s*[:=]\\s*\\[?\\s*['\"]https?://[^*]+['\"]"
    severity_cap: High
    output: anti_pattern_candidate
    review_intent: >
      Detect CORS policies that combine wildcard origin with credential headers — a malicious page can then read authenticated responses.
    finding_when:
      - "Access-Control-Allow-Origin: * AND Access-Control-Allow-Credentials: true on same response"
      - "cors({ origin: true, credentials: true }) — reflects every Origin"
      - "Origin echo without an allowlist gate followed by credentials:true"
    not_a_finding_when:
      - "Public read-only API with no cookies/credentials in flight"
      - "Allowlisted origins (closed set, no wildcard, no Origin echo)"
    required_evidence: >
      Server response or middleware config showing both wildcard/echo origin AND credentials:true on the same code path.
    severity_reason: >
      Capped at High — single misconfig grants any origin authenticated read access; chains with any session-cookie reach Critical.
    reviewer_note: >
      Verify whether the credential-bearing endpoints are exposed; pure Bearer-token APIs are safe even with wildcard origin.

  - id: ARCH-JWT-001
    title: "Weak JWT algorithm / missing algorithm whitelist"
    architectural_theme: Authentication
    generic_threat_title: "Account impersonation through weak JWT verification"
    control: "JWT Algorithm Whitelist"
    domain: IAM
    cwe: CWE-347
    threat_category_id: TH-02
    stride: Spoofing
    preconditions:
      - kind: code_signal
        description: "JWT library or verification call observed."
        any_pattern:
          - "(?i)\\bjsonwebtoken\\b"
          - "(?i)\\bjose\\b"
          - "(?i)\\bjwt\\.(verify|decode|sign)\\("
          - "(?i)\\bPyJWT\\b"
          - "(?i)\\bjwt\\.decode\\("
          - "(?i)\\bSignedJwt\\b"
    positive_signals:
      any_pattern:
        - "(?i)algorithm[s]?\\s*[:=]\\s*['\"]none['\"]"
        - "(?i)\\balg\\s*[:=]\\s*['\"]none['\"]"
        - "(?i)jwt\\.verify\\s*\\([^)]+\\)\\s*[;)]"
        - "(?i)jwt\\.decode\\s*\\([^)]+verify\\s*=\\s*False"
        - "(?i)verify_signature\\s*[:=]\\s*False"
    exculpatory_signals:
      any_pattern:
        - "(?i)algorithms\\s*[:=]\\s*\\[\\s*['\"](RS|ES|PS)\\d{3}['\"]"
        - "(?i)algorithm\\s*[:=]\\s*['\"](RS|ES|PS|HS)\\d{3}['\"]"
    severity_cap: High
    output: control_assessment
    review_intent: >
      Detect JWT verification that accepts the `alg:none` family or that uses a weak shared secret — bypasses signature checks entirely.
    finding_when:
      - "jwt.verify / jws.verify called WITHOUT an explicit algorithms allowlist"
      - "Secret length <= 32 chars for HS256/384/512"
      - "Verification key publicly served from /encryptionkeys/, /.well-known/, or similar"
    not_a_finding_when:
      - "Algorithms allowlist explicitly pins RS256/ES256 etc."
      - "Public key is rotated and served from a managed JWKS endpoint with kid"
    required_evidence: >
      verify() callsite without algorithms option, or HMAC secret literal with length below threshold.
    severity_reason: >
      Capped at High — alg confusion / weak secret independently sufficient for session forgery; chains with admin-role role-check reach Critical.
    reviewer_note: >
      If algorithm is pinned to RS256/ES256 and key material is non-public, this is Adequate; record the kid rotation cadence.

  - id: ARCH-TLS-001
    title: "Cleartext transport or disabled DB-TLS"
    architectural_theme: DataProtection
    generic_threat_title: "Data disclosure through cleartext transport"
    control: "Transport Encryption"
    domain: DataProt
    cwe: CWE-319
    threat_category_id: TH-03
    stride: InformationDisclosure
    preconditions:
      - kind: code_signal
        description: "DSN, service client, or transport configuration observed."
        any_pattern:
          - "(?i)(jdbc|postgres|postgresql|mysql|mongodb|amqp|redis|http)://"
          - "(?i)sslmode\\s*="
          - "(?i)\\bssl\\s*[:=]\\s*(true|false|require|disable)"
          - "(?i)\\btls\\b\\s*[:=]"
    positive_signals:
      any_pattern:
        - "(?i)sslmode\\s*=\\s*disable"
        - "(?i)ssl\\s*[:=]\\s*false"
        - "(?i)rejectUnauthorized\\s*:\\s*false"
        - "(?i)tlsAllowInvalidCertificates\\s*[:=]\\s*true"
        - "(?i)tls\\s*[:=]\\s*false"
        - "(?i)(?<![a-z])http://(?!localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\[::1\\])"
    exculpatory_signals:
      any_pattern:
        - "(?i)sslmode\\s*=\\s*(require|verify-(ca|full))"
        - "(?i)tls\\s*[:=]\\s*true"
    severity_cap: High
    output: anti_pattern_candidate
    review_intent: >
      Detect runtime configuration that disables TLS verification or downgrades cipher suites.
    finding_when:
      - "NODE_TLS_REJECT_UNAUTHORIZED set to '0' in env or process.env"
      - "rejectUnauthorized:false on tls/https client options"
      - "ssl:{ rejectUnauthorized: false } on database client"
    not_a_finding_when:
      - "Test-only files (path matches **/test/**, **/__tests__/**)"
      - "Self-signed cert with custom CA bundle pinned explicitly"
    required_evidence: >
      Concrete env var assignment or option-object literal disabling TLS verification.
    severity_reason: >
      Capped at High — eavesdropping requires either a MITM position or DNS-poisoning; lifts to Critical only when combined with a known sensitive payload class.
    reviewer_note: >
      Confirm scope (prod-only vs local-dev). The env var alone is the highest signal; rejectUnauthorized:false in code is typically test-only.

  - id: ARCH-MGMT-001
    title: "Management / debug / metrics endpoint exposed without authn/authz signal"
    architectural_theme: Authorization
    generic_threat_title: "Privilege abuse through inconsistent authorization"
    control: "Management Endpoint Protection"
    domain: AuthZ
    cwe: CWE-862
    threat_category_id: TH-09
    stride: ElevationOfPrivilege
    preconditions:
      - kind: route_inventory_signal
        description: "Route inventory contains an entry with management_surface=true."
        require_route_signal: management_surface
      - kind: any_of_signals
        description: "Cat 11 (exposed_routes) match present OR management route in inventory."
        any_of:
          - source: route_inventory
            signal: management_surface
          - source: recon_cat
            cat: 11
    positive_signals:
      route_requires:
        management_surface: true
        authn_signal_in: ["absent"]
        authz_signal_in: ["absent"]
      forbidden_route_signals:
        authn_signal: ["unknown", "inherited_unknown", "present", "middleware_present", "decorator_present"]
    exculpatory_signals:
      any_pattern:
        - "(?i)(127\\.0\\.0\\.1|localhost|\\[::1\\])"
        - "(?i)bind[- _]?address\\s*[:=]\\s*['\"]?127\\.0\\.0\\.1"
        - "(?i)NODE_ENV\\s*===?\\s*['\"]test['\"]"
    severity_cap: High
    output: control_assessment
    review_intent: >
      Detect management/admin endpoints that bypass the standard authentication middleware or expose privileged operations.
    finding_when:
      - "Route handlers mounted under /admin, /internal, /actuator without an auth middleware in the chain"
      - "Endpoint takes an `?admin=true` or similar override parameter"
      - "JSON 200 response on unauthenticated probe to /admin/* in attack_surface[]"
    not_a_finding_when:
      - "Endpoint behind an IP allowlist matching the org's bastion CIDR (verified)"
      - "Behind a service-mesh sidecar that enforces mTLS before the request reaches the app"
    required_evidence: >
      Route definition or middleware chain showing the management surface without an auth gate, OR a 200 response on a probe to the surface from an unauthenticated context.
    severity_reason: >
      Capped at High — direct admin endpoint access is usually one step from full takeover; Critical reserved for cases where the same surface owns the JWT signing key or DB.
    reviewer_note: >
      Check whether the management surface is internet-exposed (attack_surface[].auth_required=false) or only reachable on a private network.

hypothesis_rules:

  - id: ARCH-XSS-001
    title: "XSS exposure from weak output encoding"
    architectural_theme: InputValidation
    generic_threat_title: "Cross-site scripting through missing centralized output encoding"
    hypothesis_id_prefix: ARCH-HYP-XSS
    control: "Output Encoding / Templating Autoescape"
    domain: FrontendSec
    cwe: CWE-79
    threat_category_id: TH-11
    stride: Tampering
    weak_or_missing_controls:
      - "Template Autoescape"
      - "Output Encoding"
      - "Content Security Policy"
    preconditions:
      - kind: code_signal
        description: "Browser-rendered template, DOM sink, or HTML construction observed."
        any_pattern:
          - "(?i)\\.innerHTML\\s*="
          - "(?i)document\\.write\\s*\\("
          - "(?i)dangerouslySetInnerHTML"
          - "(?i)\\bv-html\\b"
          - "(?i)\\bbypassSecurityTrustHtml\\b"
          - "(?i)\\{\\{\\{.*\\}\\}\\}"
          - "(?i)\\{\\!.*\\!\\}"
          - "(?i)autoescape\\s*[:=]\\s*(false|off|None)"
          - "(?i)escape\\s*=\\s*False"
    positive_signals:
      any_pattern:
        - "(?i)\\.innerHTML\\s*=\\s*[A-Za-z_].*(req\\.|request\\.|params\\.|query\\.|body\\.|input)"
        - "(?i)dangerouslySetInnerHTML\\s*:\\s*\\{\\s*__html\\s*:"
        - "(?i)bypassSecurityTrustHtml\\s*\\("
        - "(?i)autoescape\\s*[:=]\\s*(false|off|None)"
    exculpatory_signals:
      any_pattern:
        - "(?i)\\bDOMPurify\\.sanitize\\b"
        - "(?i)\\bescapeHtml\\b\\s*\\("
        - "(?i)autoescape\\s*[:=]\\s*(true|on)"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: HTML-context output exists without consistent contextual escaping. Promotes to a finding only with source-to-sink evidence (user input → HTML rendering).
    finding_when:
      - "innerHTML / bypassSecurityTrustHtml / dangerouslySetInnerHTML observed near a user-input source"
      - "Server-side template engine in raw-output mode with user data interpolated"
      - "Markdown rendering with raw HTML allowed AND user-submitted content as input"
    not_a_finding_when:
      - "Output is fully escaped by the framework default and the bypass is gated by an allowlist"
      - "Sink is internal-only (admin-only data path)"
    required_evidence: >
      A reachability trace from user-controlled input to the HTML sink, or a single line where both appear within the same statement.
    severity_reason: >
      Capped at High — XSS is per-victim impact and rarely takes over the app on its own; Critical only when paired with admin-role hijacking.
    reviewer_note: >
      Confirm `confidence=high` requires positive_signals + a user-controlled input near the sink; absence of an exculpatory escape is NOT sufficient to promote.

  - id: ARCH-SQLI-001
    title: "SQL injection exposure from ad-hoc SQL construction"
    architectural_theme: InputValidation
    generic_threat_title: "Injection through missing centralized input validation"
    hypothesis_id_prefix: ARCH-HYP-SQLI
    control: "Parameterized Database Access"
    domain: InputVal
    cwe: CWE-89
    threat_category_id: TH-01
    stride: Tampering
    weak_or_missing_controls:
      - "Parameterized Queries"
      - "ORM / Repository Layer"
    preconditions:
      - kind: code_signal
        description: "SQL keyword + query execution call observed."
        any_pattern:
          - "(?i)\\b(SELECT|INSERT|UPDATE|DELETE)\\b[^;]{0,200}\\b(FROM|INTO|SET|WHERE)\\b"
          - "(?i)\\.query\\s*\\("
          - "(?i)\\.execute\\s*\\("
          - "(?i)\\braw\\(\\s*['\"`]"
          - "(?i)cursor\\.execute\\s*\\("
    positive_signals:
      any_pattern:
        - "(?i)['\"`]\\s*\\+\\s*[A-Za-z_][A-Za-z0-9_.]*\\.(?:body|params|query|headers|cookies|request|req)\\b"
        - "(?i)\\$\\{[^}]*\\.(?:body|params|query|headers|req|request)\\."
        - "(?i)f['\"]\\s*(?:SELECT|INSERT|UPDATE|DELETE)[^'\"]*\\{[^}]+\\}"
        - "(?i)\\.format\\s*\\([^)]*\\b(?:req|request|params|query|body)\\."
    exculpatory_signals:
      any_pattern:
        - "(?i)\\bprepare\\s*\\("
        - "(?i)\\bparameteriz"
        - "(?i)\\b(sequelize|prisma|typeorm|sqlalchemy|knex|mongoose)\\b"
        - "(?i)\\bWHERE\\b[^']*\\?\\s*['\"]?\\s*,\\s*\\["
        - "(?i)\\$\\d+[^A-Za-z0-9_]"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: SQL constructed via string concatenation against user input. Promotes to a finding only with source-to-sink evidence.
    finding_when:
      - "Raw SQL with `${...}` / `+ req.X` interpolation in the same statement"
      - "ORM `.query(rawSql)` call with concatenated user input"
      - "stored-procedure parameter built via `'%s' % user_input`"
    not_a_finding_when:
      - "Parameterised query with placeholders + replacements / bind vars"
      - "Input is a numeric ID parsed via Number()/int() before interpolation"
    required_evidence: >
      Single line showing the concatenation/interpolation with a user-controlled fragment, OR a recent change-set turning a parameterised call into a raw one.
    severity_reason: >
      Capped at High — exploitation requires a reachable endpoint; reaches Critical only with a verified injection PoC against an unauthenticated route.
    reviewer_note: >
      Confirm Sequelize models.sequelize.query / pg client.query / sqlite3 db.exec callsites are not behind a known sanitiser.

  - id: ARCH-AUTHZ-001
    title: "Broken Access Control exposure from inconsistent AuthZ"
    architectural_theme: Authorization
    generic_threat_title: "Privilege abuse through inconsistent authorization"
    hypothesis_id_prefix: ARCH-HYP-AUTHZ
    control: "Centralised Authorization Policy"
    domain: AuthZ
    cwe: CWE-862
    threat_category_id: TH-06
    stride: ElevationOfPrivilege
    weak_or_missing_controls:
      - "Centralised AuthZ Policy"
      - "Role / Scope Enforcement"
      - "Ownership Check"
    preconditions:
      - kind: route_inventory_signal
        description: "At least one authenticated or sensitive route exists in the inventory."
        require_any_route_with:
          authn_signal_in: ["present", "middleware_present", "decorator_present"]
    positive_signals:
      inventory_pattern:
        sensitive_methods: ["DELETE", "PUT", "PATCH"]
        require_authz_signal_in: ["absent", "unknown"]
        min_routes: 1
      any_pattern:
        - "(?i)if\\s*\\(\\s*user\\.role\\s*===?\\s*['\"]admin['\"]"
        - "(?i)client[- ]?only\\s+guard"
        - "(?i)hideIfUnauthorized"
    exculpatory_signals:
      any_pattern:
        - "(?i)\\b(casbin|oso|opa|cancancan|pundit|@PreAuthorize|requireRole|hasPermission)\\b"
        - "(?i)PolicyDecisionPoint"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: a route handler depends on caller-supplied identifiers without constraining on req.user.id / tenantId — IDOR pattern.
    finding_when:
      - "Resource lookup WHERE clause references req.params.id / req.query.id WITHOUT a co-clause on user/owner"
      - "Auto-API (finale/sequelize-restful) endpoints with mass-assignment that include role/permission fields"
      - "Update/delete endpoints that take the resource id from the URL without verifying ownership"
    not_a_finding_when:
      - "Tenant-aware ORM hook injects tenantId on every query (verified by reading the hook)"
      - "Endpoint is admin-only and the role check is enforced upstream"
    required_evidence: >
      Handler showing the missing ownership predicate, or auto-API config with `role` in the writable field list.
    severity_reason: >
      Capped at High — IDOR is single-resource scope; Critical only when the resource itself is a privilege grant (role:admin) or a cross-tenant secret.
    reviewer_note: >
      Trace the route's middleware chain to ensure no upstream authorize() narrows the query.

  - id: ARCH-INPUT-001
    title: "Broken input validation exposure"
    architectural_theme: InputValidation
    generic_threat_title: "Injection through missing centralized input validation"
    hypothesis_id_prefix: ARCH-HYP-INPUT
    control: "Schema / Allowlist Input Validation"
    domain: InputVal
    cwe: CWE-20
    threat_category_id: TH-01
    stride: Tampering
    weak_or_missing_controls:
      - "Schema Validation"
      - "Allowlist Validation"
    preconditions:
      - kind: code_signal
        description: "External payload entry into parsers/queries/files/deserializers."
        any_pattern:
          - "(?i)JSON\\.parse\\s*\\("
          - "(?i)yaml\\.load\\s*\\("
          - "(?i)pickle\\.loads?\\s*\\("
          - "(?i)\\beval\\s*\\("
          - "(?i)exec\\s*\\("
          - "(?i)readFile(Sync)?\\s*\\("
          - "(?i)\\bopen\\s*\\("
    positive_signals:
      any_pattern:
        - "(?i)\\.replace\\s*\\(\\s*/.*/g?\\s*,"
        - "(?i)\\.trim\\s*\\(\\s*\\)"
        - "(?i)\\bblacklist\\b"
        - "(?i)blocklist\\s*[:=]"
        - "(?i)\\bdeny[_ ]?list\\b"
    exculpatory_signals:
      any_pattern:
        - "(?i)\\b(zod|joi|yup|ajv|pydantic|marshmallow|valibot)\\b"
        - "(?i)allowlist\\s*[:=]"
        - "(?i)JSON\\s+Schema"
    severity_cap: High
    output: control_and_hypothesis
    review_intent: >
      Hypothesis: external input flows into a high-impact sink (eval, exec, fs.readFileSync, fetch, deserialise) without normalisation.
    finding_when:
      - "eval()/Function() called with a value derivable from req/process.env/file content"
      - "child_process.exec / execSync invoked with a string composed from user input"
      - "yaml.load (unsafe) / pickle.loads / deserialize on user-controlled bytes"
    not_a_finding_when:
      - "Input passes through a validated schema (zod/joi/pydantic) before the sink"
      - "Sandboxed sink (vm.runInNewContext with timeout AND no network) on a single-use payload"
    required_evidence: >
      Source-to-sink trace OR a single line where the sink and an unsanitised input reference appear together.
    severity_reason: >
      Capped at High — confirmed RCE primitives jump to Critical on their own and are captured by code-level STRIDE rules, not by this hypothesis-tier rule.
    reviewer_note: >
      Hypothesis stays at proof_state=control-derived until a real trace is produced; do not promote on absence of an exculpatory schema.
