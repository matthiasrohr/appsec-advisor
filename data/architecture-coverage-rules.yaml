# architecture-coverage-rules.yaml — rule catalog for scripts/architecture_coverage_checks.py
#
# Two rule families:
#   * hard_rules         — 5 high-confidence rules (arch.md §Erste Lieferung)
#                          may emit anti_pattern_candidates or strong control
#                          assessments; severity capped per critical-criteria.yaml.
#   * hypothesis_rules   — 7 conservative threat-hypothesis rules
#                          (arch.md §Threat-Hypothesis-Regeln).
#                          MUST default to emit_hypothesis_only; promotion to
#                          a hard candidate requires source-to-sink evidence
#                          (proof_state=confirmed).
#
# Field reference (per rule):
#   id                       — ARCH-<TOKEN>-<NNN> (validated against schema regex)
#   title                    — short human label
#   architectural_theme      — enum value from architecture-coverage.schema.json
#                              (SessionDesign, SecureDefaults, Authentication, ...).
#                              Drives cluster grouping in Section 8 of the report.
#   generic_threat_title     — concise general-threat wording used as the finding
#                              title for `source=architecture-coverage` /
#                              `source=threat-hypothesis` threats.
#   control                  — control name (matches architectural-controls.yaml when possible)
#   domain                   — one of IAM / AuthZ / DataProt / InputVal / FrontendSec /
#                              Audit / Infra / SupplyChain / RealTime / AI / SessionMgmt
#   cwe                      — primary CWE (CWE-NNN)
#   threat_category_id       — TH-NN (matches threat-category-taxonomy.yaml)
#   stride                   — STRIDE letter
#   preconditions            — gates that must hold for `applies: true`.
#                              Each precondition: {kind, source, signal}.
#   positive_signals         — regex / file-pattern signals proving the weakness
#   exculpatory_signals      — regex / file-pattern signals refuting the weakness
#                              (e.g. presence of a framework guard near the sink)
#   severity_cap             — hard cap per arch.md §Severity-Policy
#                              (CORS High, JWT High, etc.). NEVER Critical here.
#   output                   — default decision verb (engine may downgrade)
#                              hard rules:     control_only | anti_pattern_candidate
#                              hypothesis:     hypothesis_only | control_and_hypothesis
#
# Engine semantics:
#   - "always evaluate" means rules_evaluated[] contains an entry for every
#     rule, even when applies=false. skip_reason explains why.
#   - "unknown is not absent" gate: a precondition with status=unknown MUST NOT
#     trigger a missing/anti_pattern verdict on its own.
#   - Hard candidates require confidence=high AND positive_signals (not just
#     absence of an exculpatory signal).

version: 1

hard_rules:

  - id: ARCH-XSS-002
    title: "Stored XSS through persisted untrusted HTML"
    architectural_theme: InputValidation
    generic_threat_title: "Stored cross-site scripting through persisted untrusted HTML"
    control: "Output Encoding / HTML Sanitization"
    weakness_mechanism: persisted-untrusted-html-rendering
    domain: FrontendSec
    cwe: CWE-79
    threat_category_id: TH-11
    stride: Tampering
    weak_or_missing_controls:
      - "Context-aware HTML Sanitization"
      - "Output Encoding"
    preconditions: []
    positive_signals: {}
    exculpatory_signals:
      any_pattern: []
    severity_cap: High
    output: anti_pattern_candidate
    review_intent: >
      Confirm only direct, statically traceable persistence of a request field
      followed by an unsafe HTML sink for the same stored property. Generic DOM
      sinks remain ARCH-XSS-001 hypotheses.
    finding_when:
      - "A request field is mapped directly into a create/insert/save/update persistence call"
      - "An unsafe HTML sink later renders that exact persisted model property without a sanitizer on the sink line"
    not_a_finding_when:
      - "The value reaches only an escaped framework interpolation or a sanitizer call"
      - "The source-to-storage mapping uses variable indirection or an external API contract that the deterministic check cannot prove"
    required_evidence: >
      Two source locations: the direct request-field persistence mapping and
      the matching unsafe HTML-rendering sink.
    severity_reason: >
      High because every viewer of the stored record can execute attacker
      markup; chained account takeover remains evaluated separately.
    reviewer_note: >
      Do not weaken the direct model-and-field requirement. Data flows with
      variable indirection or API serialization are resolved by STRIDE review,
      not this rule.

  - id: ARCH-COOKIE-001
    title: "Insecure cookie / session hardening"
    architectural_theme: SessionDesign
    generic_threat_title: "Session token theft through weak cookie hardening"
    control: "Session Cookie Hardening"
    domain: SessionMgmt
    cwe: CWE-1004           # Sensitive Cookie Without HttpOnly
    threat_category_id: TH-10
    stride: InformationDisclosure
    preconditions:
      - kind: code_signal
        description: "Set-Cookie or session middleware usage observed."
        any_pattern:
          - "(?i)set[- ]cookie"
          - "(?i)\\bcookieSession\\b"
          - "(?i)\\bexpress[- ]session\\b"
          - "(?i)\\bsession\\s*\\("
          - "(?i)cookie\\s*:\\s*\\{"
          - "(?i)\\bSESSION_COOKIE_(SECURE|HTTPONLY|SAMESITE)\\b"
          - "(?i)res\\.cookie\\s*\\("
    positive_signals:
      any_pattern:
        - "(?i)res\\.cookie\\s*\\([^)]*httpOnly\\s*:\\s*false"
        - "(?i)res\\.cookie\\s*\\([^)]*secure\\s*:\\s*false"
        - "(?i)cookie\\s*:\\s*\\{[^}]*httpOnly\\s*:\\s*false"
        - "(?i)cookie\\s*:\\s*\\{[^}]*secure\\s*:\\s*false"
        - "(?i)SESSION_COOKIE_SECURE\\s*=\\s*False"
        - "(?i)SESSION_COOKIE_HTTPONLY\\s*=\\s*False"
        - "(?i)SESSION_COOKIE_SAMESITE\\s*=\\s*['\"]?None['\"]?"
        - "(?i)sameSite\\s*:\\s*['\"]None['\"]"
    exculpatory_signals:
      any_pattern:
        - "(?i)httpOnly\\s*:\\s*true.*secure\\s*:\\s*true"
        - "(?i)SESSION_COOKIE_SECURE\\s*=\\s*True"
    severity_cap: Medium
    output: control_assessment
    review_intent: >
      Detect session cookie configurations that omit HttpOnly / Secure / SameSite hardening — a JS payload or MITM gateway can then steal the session token.
    finding_when:
      - "res.cookie() / cookie middleware called with httpOnly:false or secure:false explicitly"
      - "Python SESSION_COOKIE_SECURE / _HTTPONLY set to False"
      - "sameSite:'None' set without a paired secure:true on the same options object"
    not_a_finding_when:
      - "A framework default sets all three flags true and the rule's exculpatory pattern matches"
      - "Cookie is short-lived non-auth telemetry only (e.g. analytics ack)"
    required_evidence: >
      Concrete res.cookie / session middleware call with httpOnly or secure set to false; or a SESSION_COOKIE_* constant assignment with the offending value.
    severity_reason: >
      Capped at Medium — exploitation requires either a co-resident XSS sink or a TLS-stripping position; either lifts the impact independently and would register as its own Critical.
    reviewer_note: >
      Confirm the cookie carries session/auth data (not just preference state) before enabling by default; otherwise Adequate.

  - id: ARCH-CORS-001
    title: "CORS wildcard origin combined with credentials"
    architectural_theme: SecureDefaults
    generic_threat_title: "Cross-origin request abuse through permissive CORS"
    control: "CORS Policy"
    domain: FrontendSec
    cwe: CWE-942
    threat_category_id: TH-15
    stride: Tampering
    preconditions:
      - kind: code_signal
        description: "CORS configuration observed."
        any_pattern:
          - "(?i)Access-Control-Allow-Origin"
          - "(?i)\\bcors\\s*\\("
          - "(?i)\\bCORS\\s*\\("
          - "(?i)origin\\s*[:=]\\s*['\"]?\\*['\"]?"
    positive_signals:
      requires_cooccurrence_window: 8
      any_pattern:
        - "(?i)origin\\s*[:=]\\s*['\"]?\\*['\"]?"
        - "(?i)Access-Control-Allow-Origin\\s*:\\s*\\*"
      cooccurrence_pattern:
        - "(?i)credentials\\s*[:=]\\s*['\"]?true['\"]?"
        - "(?i)Access-Control-Allow-Credentials\\s*:\\s*true"
        - "(?i)withCredentials\\s*[:=]\\s*true"
        - "(?i)supportsCredentials\\s*[:=]\\s*true"
    exculpatory_signals:
      any_pattern:
        - "(?i)origin\\s*[:=]\\s*\\[?\\s*['\"]https?://[^*]+['\"]"
    severity_cap: High
    output: anti_pattern_candidate
    review_intent: >
      Detect CORS policies that combine wildcard origin with credential headers — a malicious page can then read authenticated responses.
    finding_when:
      - "Access-Control-Allow-Origin: * AND Access-Control-Allow-Credentials: true on same response"
      - "cors({ origin: true, credentials: true }) — reflects every Origin"
      - "Origin echo without an allowlist gate followed by credentials:true"
    not_a_finding_when:
      - "Public read-only API with no cookies/credentials in flight"
      - "Allowlisted origins (closed set, no wildcard, no Origin echo)"
    required_evidence: >
      Server response or middleware config showing both wildcard/echo origin AND credentials:true on the same code path.
    severity_reason: >
      Capped at High — single misconfig grants any origin authenticated read access; chains with any session-cookie reach Critical.
    reviewer_note: >
      Verify whether the credential-bearing endpoints are exposed; pure Bearer-token APIs are safe even with wildcard origin.

  - id: ARCH-JWT-001
    title: "Weak JWT algorithm / missing algorithm whitelist"
    architectural_theme: Authentication
    generic_threat_title: "Account impersonation through weak JWT verification"
    control: "JWT Algorithm Whitelist"
    domain: IAM
    cwe: CWE-347
    threat_category_id: TH-02
    stride: Spoofing
    preconditions:
      - kind: code_signal
        description: "JWT library or verification call observed."
        any_pattern:
          - "(?i)\\bjsonwebtoken\\b"
          - "(?i)\\bjose\\b"
          - "(?i)\\bjwt\\.(verify|decode|sign)\\("
          - "(?i)\\bPyJWT\\b"
          - "(?i)\\bjwt\\.decode\\("
          - "(?i)\\bSignedJwt\\b"
    positive_signals:
      any_pattern:
        - "(?i)algorithm[s]?\\s*[:=]\\s*['\"]none['\"]"
        - "(?i)\\balg\\s*[:=]\\s*['\"]none['\"]"
        - "(?i)jwt\\.verify\\s*\\([^)]+\\)\\s*[;)]"
        - "(?i)jwt\\.decode\\s*\\([^)]+verify\\s*=\\s*False"
        - "(?i)verify_signature\\s*[:=]\\s*False"
    exculpatory_signals:
      any_pattern:
        - "(?i)algorithms\\s*[:=]\\s*\\[\\s*['\"](RS|ES|PS)\\d{3}['\"]"
        - "(?i)algorithm\\s*[:=]\\s*['\"](RS|ES|PS|HS)\\d{3}['\"]"
    severity_cap: High
    output: control_assessment
    review_intent: >
      Detect JWT verification that accepts the `alg:none` family or that uses a weak shared secret — bypasses signature checks entirely.
    finding_when:
      - "jwt.verify / jws.verify called WITHOUT an explicit algorithms allowlist"
      - "Secret length <= 32 chars for HS256/384/512"
      - "Verification key publicly served from /encryptionkeys/, /.well-known/, or similar"
    not_a_finding_when:
      - "Algorithms allowlist explicitly pins RS256/ES256 etc."
      - "Public key is rotated and served from a managed JWKS endpoint with kid"
    required_evidence: >
      verify() callsite without algorithms option, or HMAC secret literal with length below threshold.
    severity_reason: >
      Capped at High — alg confusion / weak secret independently sufficient for session forgery; chains with admin-role role-check reach Critical.
    reviewer_note: >
      If algorithm is pinned to RS256/ES256 and key material is non-public, this is Adequate; record the kid rotation cadence.

  - id: ARCH-TLS-001
    title: "Cleartext transport or disabled DB-TLS"
    architectural_theme: DataProtection
    generic_threat_title: "Data disclosure through cleartext transport"
    control: "Transport Encryption"
    domain: DataProt
    cwe: CWE-319
    threat_category_id: TH-03
    stride: InformationDisclosure
    preconditions:
      - kind: code_signal
        description: "DSN, service client, or transport configuration observed."
        any_pattern:
          - "(?i)(jdbc|postgres|postgresql|mysql|mongodb|amqp|redis|http)://"
          - "(?i)sslmode\\s*="
          - "(?i)\\bssl\\s*[:=]\\s*(true|false|require|disable)"
          - "(?i)\\btls\\b\\s*[:=]"
    positive_signals:
      any_pattern:
        - "(?i)sslmode\\s*=\\s*disable"
        - "(?i)ssl\\s*[:=]\\s*false"
        - "(?i)rejectUnauthorized\\s*:\\s*false"
        - "(?i)tlsAllowInvalidCertificates\\s*[:=]\\s*true"
        - "(?i)tls\\s*[:=]\\s*false"
        - "(?i)(?<![a-z])http://(?!localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0|\\[::1\\])"
    exculpatory_signals:
      any_pattern:
        - "(?i)sslmode\\s*=\\s*(require|verify-(ca|full))"
        - "(?i)tls\\s*[:=]\\s*true"
    severity_cap: High
    output: anti_pattern_candidate
    review_intent: >
      Detect runtime configuration that disables TLS verification or downgrades cipher suites.
    finding_when:
      - "NODE_TLS_REJECT_UNAUTHORIZED set to '0' in env or process.env"
      - "rejectUnauthorized:false on tls/https client options"
      - "ssl:{ rejectUnauthorized: false } on database client"
    not_a_finding_when:
      - "Test-only files (path matches **/test/**, **/__tests__/**)"
      - "Self-signed cert with custom CA bundle pinned explicitly"
    required_evidence: >
      Concrete env var assignment or option-object literal disabling TLS verification.
    severity_reason: >
      Capped at High — eavesdropping requires either a MITM position or DNS-poisoning; lifts to Critical only when combined with a known sensitive payload class.
    reviewer_note: >
      Confirm scope (prod-only vs local-dev). The env var alone is the highest signal; rejectUnauthorized:false in code is typically test-only.

  - id: ARCH-MGMT-001
    title: "Management / debug / metrics endpoint exposed without authn/authz signal"
    architectural_theme: Authorization
    generic_threat_title: "Privilege abuse through inconsistent authorization"
    control: "Management Endpoint Protection"
    domain: AuthZ
    cwe: CWE-862
    threat_category_id: TH-09
    stride: ElevationOfPrivilege
    preconditions:
      - kind: route_inventory_signal
        description: "Route inventory contains an entry with management_surface=true."
        require_route_signal: management_surface
      - kind: any_of_signals
        description: "Cat 11 (exposed_routes) match present OR management route in inventory."
        any_of:
          - source: route_inventory
            signal: management_surface
          - source: recon_cat
            cat: 11
    positive_signals:
      route_requires:
        management_surface: true
        authn_signal_in: ["absent"]
        authz_signal_in: ["absent"]
      forbidden_route_signals:
        authn_signal: ["unknown", "inherited_unknown", "present", "middleware_present", "decorator_present"]
    exculpatory_signals:
      any_pattern:
        - "(?i)(127\\.0\\.0\\.1|localhost|\\[::1\\])"
        - "(?i)bind[- _]?address\\s*[:=]\\s*['\"]?127\\.0\\.0\\.1"
        - "(?i)NODE_ENV\\s*===?\\s*['\"]test['\"]"
    severity_cap: High
    output: control_assessment
    review_intent: >
      Detect management/admin endpoints that bypass the standard authentication middleware or expose privileged operations.
    finding_when:
      - "Route handlers mounted under /admin, /internal, /actuator without an auth middleware in the chain"
      - "Endpoint takes an `?admin=true` or similar override parameter"
      - "JSON 200 response on unauthenticated probe to /admin/* in attack_surface[]"
    not_a_finding_when:
      - "Endpoint behind an IP allowlist matching the org's bastion CIDR (verified)"
      - "Behind a service-mesh sidecar that enforces mTLS before the request reaches the app"
    required_evidence: >
      Route definition or middleware chain showing the management surface without an auth gate, OR a 200 response on a probe to the surface from an unauthenticated context.
    severity_reason: >
      Capped at High — direct admin endpoint access is usually one step from full takeover; Critical reserved for cases where the same surface owns the JWT signing key or DB.
    reviewer_note: >
      Check whether the management surface is internet-exposed (attack_surface[].auth_required=false) or only reachable on a private network.

hypothesis_rules:

  # Thorough-only: the dedicated scanner inventories explicit named database
  # clients. It never treats a shared config reference as a confirmed finding
  # unless a matching high-privilege grant is visible in the assessed repo.
  - id: ARCH-DBSEP-001
    title: "Privileged and unprivileged database clients lack verified principal separation"
    architectural_theme: LeastPrivilege
    generic_threat_title: "Privilege escalation through shared database principals"
    hypothesis_id_prefix: ARCH-HYP-DBSEP
    control: "Database Principal Separation"
    weakness_mechanism: shared-database-principal
    domain: AuthZ
    cwe: CWE-284
    threat_category_id: TH-06
    stride: ElevationOfPrivilege
    weak_or_missing_controls:
      - "Separate Database Principals"
      - "Least-Privilege Database Grants"
      - "Row-Level Security"
    preconditions: []
    positive_signals:
      any_pattern: []
    exculpatory_signals:
      any_pattern: []
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Thorough-only assessment: privileged and unprivileged database clients
      must not share a principal that has broad database privileges. A shared
      environment or secret reference remains a review hypothesis when grants
      are external or otherwise not visible in the repository.
    finding_when:
      - "Named privileged and unprivileged database clients use the same literal principal"
      - "A visible GRANT ALL PRIVILEGES, SUPERUSER, or BYPASSRLS attribute matches that principal"
    not_a_finding_when:
      - "Clients use distinct principals"
      - "The principal's effective database grants are not visible in the repository"
    required_evidence: >
      The two client definitions plus a visible high-privilege grant or role
      attribute for their shared literal principal. Do not emit credential
      values, connection strings, or secret contents.
    severity_reason: >
      High only after the shared principal and elevated database privilege are
      both directly evidenced; external grants and opaque secret references are
      hypotheses, not confirmed vulnerabilities.
    reviewer_note: >
      Verify that the privileged client reaches an administrative workflow and
      that the unprivileged client serves ordinary application traffic. Review
      managed database grants separately when they are not represented in code,
      migrations, or infrastructure-as-code.

  - id: ARCH-XSS-001
    title: "XSS exposure from weak output encoding"
    architectural_theme: InputValidation
    generic_threat_title: "Cross-site scripting through missing centralized output encoding"
    hypothesis_id_prefix: ARCH-HYP-XSS
    control: "Output Encoding / Templating Autoescape"
    weakness_mechanism: frontend-output-encoding
    domain: FrontendSec
    cwe: CWE-79
    threat_category_id: TH-11
    stride: Tampering
    weak_or_missing_controls:
      - "Template Autoescape"
      - "Output Encoding"
      - "Content Security Policy"
    preconditions:
      - kind: code_signal
        description: "Browser-rendered template, DOM sink, or HTML construction observed."
        any_pattern:
          - "(?i)\\.innerHTML\\s*="
          - "(?i)document\\.write\\s*\\("
          - "(?i)dangerouslySetInnerHTML"
          - "(?i)\\bv-html\\b"
          - "(?i)\\bbypassSecurityTrustHtml\\b"
          - "(?i)\\{\\{\\{.*\\}\\}\\}"
          - "(?i)\\{\\!.*\\!\\}"
          - "(?i)autoescape\\s*[:=]\\s*(false|off|None)"
          - "(?i)escape\\s*=\\s*False"
    positive_signals:
      any_pattern:
        - "(?i)\\.innerHTML\\s*=\\s*[A-Za-z_].*(req\\.|request\\.|params\\.|query\\.|body\\.|input)"
        - "(?i)dangerouslySetInnerHTML\\s*:\\s*\\{\\s*__html\\s*:"
        - "(?i)bypassSecurityTrustHtml\\s*\\("
        - "(?i)autoescape\\s*[:=]\\s*(false|off|None)"
    exculpatory_signals:
      any_pattern:
        - "(?i)\\bDOMPurify\\.sanitize\\b"
        - "(?i)\\bescapeHtml\\b\\s*\\("
        - "(?i)autoescape\\s*[:=]\\s*(true|on)"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: HTML-context output exists without consistent contextual escaping. Promotes to a finding only with source-to-sink evidence (user input → HTML rendering).
    finding_when:
      - "innerHTML / bypassSecurityTrustHtml / dangerouslySetInnerHTML observed near a user-input source"
      - "Server-side template engine in raw-output mode with user data interpolated"
      - "Markdown rendering with raw HTML allowed AND user-submitted content as input"
    not_a_finding_when:
      - "Output is fully escaped by the framework default and the bypass is gated by an allowlist"
      - "Sink is internal-only (admin-only data path)"
    required_evidence: >
      A reachability trace from user-controlled input to the HTML sink, or a single line where both appear within the same statement.
    severity_reason: >
      Capped at High — XSS is per-victim impact and rarely takes over the app on its own; Critical only when paired with admin-role hijacking.
    reviewer_note: >
      Confirm `confidence=high` requires positive_signals + a user-controlled input near the sink; absence of an exculpatory escape is NOT sufficient to promote.

  - id: ARCH-SQLI-001
    title: "SQL injection exposure from ad-hoc SQL construction"
    architectural_theme: InputValidation
    generic_threat_title: "Injection through missing centralized input validation"
    hypothesis_id_prefix: ARCH-HYP-SQLI
    control: "Parameterized Database Access"
    weakness_mechanism: database-query-concatenation
    domain: InputVal
    cwe: CWE-89
    threat_category_id: TH-01
    stride: Tampering
    weak_or_missing_controls:
      - "Parameterized Queries"
      - "ORM / Repository Layer"
    preconditions:
      - kind: code_signal
        description: "SQL keyword + query execution call observed."
        any_pattern:
          - "(?i)\\b(SELECT|INSERT|UPDATE|DELETE)\\b[^;]{0,200}\\b(FROM|INTO|SET|WHERE)\\b"
          - "(?i)\\.query\\s*\\("
          - "(?i)\\.execute\\s*\\("
          - "(?i)\\braw\\(\\s*['\"`]"
          - "(?i)cursor\\.execute\\s*\\("
    positive_signals:
      any_pattern:
        - "(?i)['\"`]\\s*\\+\\s*[A-Za-z_][A-Za-z0-9_.]*\\.(?:body|params|query|headers|cookies|request|req)\\b"
        - "(?i)\\$\\{[^}]*\\.(?:body|params|query|headers|req|request)\\."
        - "(?i)f['\"]\\s*(?:SELECT|INSERT|UPDATE|DELETE)[^'\"]*\\{[^}]+\\}"
        - "(?i)\\.format\\s*\\([^)]*\\b(?:req|request|params|query|body)\\."
    exculpatory_signals:
      any_pattern:
        - "(?i)\\bprepare\\s*\\("
        - "(?i)\\bparameteriz"
        - "(?i)\\b(sequelize|prisma|typeorm|sqlalchemy|knex|mongoose)\\b"
        - "(?i)\\bWHERE\\b[^']*\\?\\s*['\"]?\\s*,\\s*\\["
        - "(?i)\\$\\d+[^A-Za-z0-9_]"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: SQL constructed via string concatenation against user input. Promotes to a finding only with source-to-sink evidence.
    finding_when:
      - "Raw SQL with `${...}` / `+ req.X` interpolation in the same statement"
      - "ORM `.query(rawSql)` call with concatenated user input"
      - "stored-procedure parameter built via `'%s' % user_input`"
    not_a_finding_when:
      - "Parameterised query with placeholders + replacements / bind vars"
      - "Input is a numeric ID parsed via Number()/int() before interpolation"
    required_evidence: >
      Single line showing the concatenation/interpolation with a user-controlled fragment, OR a recent change-set turning a parameterised call into a raw one.
    severity_reason: >
      Capped at High — exploitation requires a reachable endpoint; reaches Critical only with a verified injection PoC against an unauthenticated route.
    reviewer_note: >
      Confirm Sequelize models.sequelize.query / pg client.query / sqlite3 db.exec callsites are not behind a known sanitiser.

  - id: ARCH-AUTHZ-001
    title: "Broken Access Control exposure from inconsistent AuthZ"
    architectural_theme: Authorization
    generic_threat_title: "Privilege abuse through inconsistent authorization"
    hypothesis_id_prefix: ARCH-HYP-AUTHZ
    control: "Centralised Authorization Policy"
    weakness_mechanism: route-by-route-authorization
    domain: AuthZ
    cwe: CWE-862
    threat_category_id: TH-06
    stride: ElevationOfPrivilege
    weak_or_missing_controls:
      - "Centralised AuthZ Policy"
      - "Role / Scope Enforcement"
      - "Ownership Check"
    preconditions:
      - kind: route_inventory_signal
        description: "At least one authenticated or sensitive route exists in the inventory."
        require_any_route_with:
          authn_signal_in: ["present", "middleware_present", "decorator_present"]
    positive_signals:
      inventory_pattern:
        sensitive_methods: ["DELETE", "PUT", "PATCH"]
        require_authz_signal_in: ["absent", "unknown"]
        min_routes: 1
      any_pattern:
        - "(?i)if\\s*\\(\\s*user\\.role\\s*===?\\s*['\"]admin['\"]"
        - "(?i)client[- ]?only\\s+guard"
        - "(?i)hideIfUnauthorized"
    exculpatory_signals:
      any_pattern:
        - "(?i)\\b(casbin|oso|opa|cancancan|pundit|@PreAuthorize|requireRole|hasPermission)\\b"
        - "(?i)PolicyDecisionPoint"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: a route handler depends on caller-supplied identifiers without constraining on req.user.id / tenantId — IDOR pattern.
    finding_when:
      - "Resource lookup WHERE clause references req.params.id / req.query.id WITHOUT a co-clause on user/owner"
      - "Auto-API (finale/sequelize-restful) endpoints with mass-assignment that include role/permission fields"
      - "Update/delete endpoints that take the resource id from the URL without verifying ownership"
    not_a_finding_when:
      - "Tenant-aware ORM hook injects tenantId on every query (verified by reading the hook)"
      - "Endpoint is admin-only and the role check is enforced upstream"
    required_evidence: >
      Handler showing the missing ownership predicate, or auto-API config with `role` in the writable field list.
    severity_reason: >
      Capped at High — IDOR is single-resource scope; Critical only when the resource itself is a privilege grant (role:admin) or a cross-tenant secret.
    reviewer_note: >
      Trace the route's middleware chain to ensure no upstream authorize() narrows the query.

  - id: ARCH-AUTHN-001
    title: "State-changing route or GraphQL operation without an authentication gate"
    architectural_theme: Authentication
    generic_threat_title: "Unauthenticated access to a privileged operation"
    hypothesis_id_prefix: ARCH-HYP-AUTHN
    control: "Route Authentication"
    # Map this design signal to a weakness-phrased mechanism so the Weakness
    # Register title reads as a weakness ("Endpoints are reachable without enforced
    # authentication"), not the bare control name "Route Authentication" (2026-07-14).
    weakness_mechanism: missing-endpoint-authentication
    domain: IAM
    cwe: CWE-306
    threat_category_id: TH-06
    stride: ElevationOfPrivilege
    weak_or_missing_controls:
      - "Route Authentication Middleware"
      - "Server-Side Session Enforcement"
    preconditions:
      - kind: route_inventory_signal
        description: "Route inventory exists with per-route auth signals."
    positive_signals:
      # Consumes route_inventory.py's missing_auth_suspect flag (state-changing
      # or management route, authn=unknown, not public-by-design). Previously
      # computed but unconsumed — dead signal.
      inventory_pattern:
        route_flag: missing_auth_suspect
        min_routes: 1
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: a POST/PUT/DELETE/PATCH, admin/management route, or sensitive GraphQL Mutation/Subscription/object lookup is registered with no authentication middleware/directive in scope — verify the chain is not gated upstream by a centrally-mounted guard the static scan could not see.
    finding_when:
      - "Route registration line or GraphQL operation carries no auth marker AND no upstream app.use mount / schema directive protects it"
      - "Management/debug/metrics endpoint reachable without a session"
    not_a_finding_when:
      - "An upstream app.use('/prefix', authMiddleware) protects the route (read the mount)"
      - "Endpoint is unauthenticated by design (login, register, captcha, health, webhook)"
    required_evidence: >
      Route registration line or GraphQL operation plus the absence of a protecting middleware mount / schema directive.
    severity_reason: >
      Capped at High — a missing-auth suspect is a hypothesis; confirmation requires showing no upstream guard exists.
    reviewer_note: >
      Trace the path prefix back to server bootstrap, or the GraphQL schema/resolver guard chain; a single app.use guard can cover the whole router.

  - id: ARCH-BOLA-001
    title: "Authenticated object-addressing route or GraphQL operation without an authorization gate (BOLA/IDOR surface)"
    architectural_theme: Authorization
    generic_threat_title: "Broken object-level authorization (BOLA/IDOR)"
    hypothesis_id_prefix: ARCH-HYP-BOLA
    control: "Object-Level Ownership Check"
    domain: AuthZ
    cwe: CWE-639
    threat_category_id: TH-06
    stride: ElevationOfPrivilege
    weak_or_missing_controls:
      - "Object-Level Ownership Check"
      - "Tenant Scoping"
    preconditions:
      - kind: route_inventory_signal
        description: "Route inventory exists with per-route auth signals."
    positive_signals:
      # Consumes route_inventory.py's missing_authz_suspect flag (authenticated,
      # object-addressing route or GraphQL operation — path/arguments carry an
      # id — with no detected role/ownership gate). The canonical BOLA/IDOR
      # primitive.
      inventory_pattern:
        route_flag: missing_authz_suspect
        min_routes: 1
    exculpatory_signals:
      any_pattern:
        - "(?i)\\b(casbin|oso|opa|cancancan|pundit|@PreAuthorize|requireRole|hasPermission)\\b"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: a logged-in user can read or mutate another tenant's record by swapping the resource id in the URL or GraphQL arguments, because the handler resolves the object by id without constraining on req.user / owner / tenant.
    finding_when:
      - "GET/PUT/DELETE/PATCH on /resource/:id or GraphQL Query/Mutation with an id argument where the lookup WHERE clause lacks an owner/tenant co-clause"
      - "Update/delete endpoints that take the resource id from the URL without verifying ownership"
    not_a_finding_when:
      - "A tenant-aware ORM hook injects tenantId/ownerId on every query (verified by reading the hook)"
      - "The object is non-owned reference data (public catalog) the route legitimately exposes to any authenticated user"
    required_evidence: >
      Handler showing the object resolved by URL id with no ownership predicate.
    severity_reason: >
      Capped at High — IDOR is single-resource scope; Critical only when the resource is itself a privilege grant or a cross-tenant secret.
    reviewer_note: >
      Read the handler's query: confirm there is no req.user.id / tenantId co-clause and no upstream ownership middleware.

  - id: ARCH-INPUT-001
    title: "Broken input validation exposure"
    architectural_theme: InputValidation
    generic_threat_title: "Injection through missing centralized input validation"
    hypothesis_id_prefix: ARCH-HYP-INPUT
    control: "Schema / Allowlist Input Validation"
    domain: InputVal
    cwe: CWE-20
    threat_category_id: TH-01
    stride: Tampering
    weak_or_missing_controls:
      - "Schema Validation"
      - "Allowlist Validation"
    preconditions:
      - kind: code_signal
        description: "External payload entry into parsers/queries/files/deserializers."
        any_pattern:
          - "(?i)JSON\\.parse\\s*\\("
          - "(?i)yaml\\.load\\s*\\("
          - "(?i)pickle\\.loads?\\s*\\("
          - "(?i)\\beval\\s*\\("
          - "(?i)exec\\s*\\("
          - "(?i)readFile(Sync)?\\s*\\("
          - "(?i)\\bopen\\s*\\("
    positive_signals:
      any_pattern:
        - "(?i)\\.replace\\s*\\(\\s*/.*/g?\\s*,"
        - "(?i)\\.trim\\s*\\(\\s*\\)"
        - "(?i)\\bblacklist\\b"
        - "(?i)blocklist\\s*[:=]"
        - "(?i)\\bdeny[_ ]?list\\b"
    exculpatory_signals:
      any_pattern:
        - "(?i)\\b(zod|joi|yup|ajv|pydantic|marshmallow|valibot)\\b"
        - "(?i)allowlist\\s*[:=]"
        - "(?i)JSON\\s+Schema"
    severity_cap: High
    output: control_and_hypothesis
    review_intent: >
      Hypothesis: external input flows into a high-impact sink (eval, exec, fs.readFileSync, fetch, deserialise) without normalisation.
    finding_when:
      - "eval()/Function() called with a value derivable from req/process.env/file content"
      - "child_process.exec / execSync invoked with a string composed from user input"
      - "yaml.load (unsafe) / pickle.loads / deserialize on user-controlled bytes"
    not_a_finding_when:
      - "Input passes through a validated schema (zod/joi/pydantic) before the sink"
      - "Sandboxed sink (vm.runInNewContext with timeout AND no network) on a single-use payload"
    required_evidence: >
      Source-to-sink trace OR a single line where the sink and an unsanitised input reference appear together.
    severity_reason: >
      Capped at High — confirmed RCE primitives jump to Critical on their own and are captured by code-level STRIDE rules, not by this hypothesis-tier rule.
    reviewer_note: >
      Hypothesis stays at proof_state=control-derived until a real trace is produced; do not promote on absence of an exculpatory schema.

  # ARCH-SUPPLY-001 (2026-07-14): supply-chain integrity of the build pipeline.
  # Third-party GitHub Actions pinned to a mutable tag/branch (@v3, @main) instead
  # of an immutable commit SHA let a retagged or compromised upstream run with the
  # pipeline's token and secret scope. Scoped to THIRD-PARTY owners via negative
  # lookahead (not actions/ or github/) so the ubiquitous first-party @vN pattern
  # does not dominate the signal — the real risk is a mutable third-party action
  # with secret access (juice-shop: calibreapp/image-actions@main). Emits the
  # design signal that materialises the "Build pipeline trusts mutable third-party
  # references" weakness (mechanism build-pipeline-mutable-refs → outdated_deps).
  - id: ARCH-SUPPLY-001
    title: "CI/CD workflow trusts third-party actions pinned to mutable references"
    architectural_theme: SupplyChain
    generic_threat_title: "Supply-chain compromise via a mutable build dependency"
    hypothesis_id_prefix: ARCH-HYP-SUPPLY
    control: "Third-Party Action Pinning"
    weakness_mechanism: build-pipeline-mutable-refs
    domain: SupplyChain
    cwe: CWE-829
    threat_category_id: TH-14
    stride: Tampering
    weak_or_missing_controls:
      - "Commit-SHA Action Pinning"
      - "Dependency Provenance Verification"
    preconditions:
      - kind: code_signal
        description: "A workflow step invokes an external GitHub Action."
        any_pattern:
          - "(?i)\\buses:\\s*[\\w.-]+/[\\w./-]+@"
    positive_signals:
      any_pattern:
        # A THIRD-PARTY action (not actions/ or github/) pinned to a mutable ref:
        # a version tag (v3, 1.2.3), latest, or a branch (main/master/develop/…).
        - "(?i)\\buses:\\s*(?!actions/|github/)[\\w.-]+/[\\w./-]+@(?:v?\\d+(?:\\.\\d+)*|latest|main|master|develop|release[\\w.-]*)\\b"
    exculpatory_signals:
      any_pattern:
        # Pinned to a full 40-character commit SHA — the recommended immutable pin.
        - "(?i)\\buses:\\s*[\\w.-]+/[\\w./-]+@[0-9a-f]{40}\\b"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: a workflow resolves a third-party action to a mutable tag or branch instead of an immutable commit SHA, so a retagged or compromised upstream executes with the pipeline's privileges and secrets.
    finding_when:
      - "`uses:` references a third-party action by tag (vN) or branch instead of a 40-char commit SHA"
      - "A build/release job with secret access depends on a mutable third-party ref"
    not_a_finding_when:
      - "The action is pinned to a full 40-character commit SHA"
      - "The action is first-party (actions/*, github/*) and covered by the platform's own release process"
    required_evidence: >
      The `uses:` line showing a mutable @ref (tag/branch) on a third-party action, plus the absence of SHA pinning for that action.
    severity_reason: >
      Capped at High — exploitation requires the upstream action to be compromised or retagged; blast radius is the pipeline's token/secret scope.
    reviewer_note: >
      Confirm the action is third-party (not actions/* or github/*) and that the job it runs in can read repository or org secrets; a mutable ref in a secretless lint job is lower risk.

  # ARCH-SECRET-001 (2026-07-14): insecure secret handling. Cryptographic keys,
  # credentials and other high-entropy secrets committed as literals in source
  # (rather than resolved from a managed store at runtime) hand every reader of the
  # repo reusable signing material. Emits the design signal that materialises the
  # "Secrets are committed to source instead of a managed store" weakness
  # (mechanism secrets-committed-to-source → secret_management cluster); the
  # confirmed hardcoded-key/credential findings (CWE-321/798) attach as evidence.
  - id: ARCH-SECRET-001
    title: "High-entropy secrets committed to source instead of a managed store"
    architectural_theme: SecretManagement
    generic_threat_title: "Reusable secret exposed directly in source code"
    hypothesis_id_prefix: ARCH-HYP-SECRET
    control: "Managed Secret Storage"
    weakness_mechanism: secrets-committed-to-source
    domain: DataProt
    cwe: CWE-798
    threat_category_id: TH-02
    stride: InformationDisclosure
    weak_or_missing_controls:
      - "Managed Secret Store"
      - "Runtime Secret Injection"
    preconditions:
      - kind: code_signal
        description: "A secret-shaped identifier or embedded key material appears in source."
        any_pattern:
          - "(?i)-----BEGIN [A-Z ]*PRIVATE KEY-----"
          - "(?i)\\b(private[_ ]?key|secret[_ ]?key|hmac|api[_ ]?key|passphrase|mnemonic|master[_ ]?key)\\b\\s*[:=]"
    positive_signals:
      any_pattern:
        # A literal secret value in source: a PEM private-key block, or a
        # secret-named identifier assigned a long string/base64 literal.
        - "(?i)-----BEGIN [A-Z ]*PRIVATE KEY-----"
        - "(?i)\\b(private[_ ]?key|secret[_ ]?key|hmac|api[_ ]?key|passphrase|mnemonic|master[_ ]?key)\\b\\s*[:=]\\s*['\"`][^'\"`\\n]{12,}['\"`]"
    exculpatory_signals:
      any_pattern:
        - "(?i)process\\.env\\."
        - "(?i)\\b(vault|secretsmanager|secret[_ ]?manager|getsecret|readsecret|keyvault|ssm)\\b"
        - "(?i)require\\(\\s*['\"]dotenv"
    severity_cap: High
    output: hypothesis_only
    review_intent: >
      Hypothesis: a cryptographic key, credential, or other secret is embedded as a literal in source instead of being injected from a managed secret store at runtime.
    finding_when:
      - "A PEM private-key block or long secret literal is assigned to a secret-named identifier in source"
      - "A credential/API key/HMAC secret is hardcoded rather than read from env/secret store"
    not_a_finding_when:
      - "The value is read from process.env / a secret manager / an injected config"
      - "The literal is a public key, a documented test fixture excluded from production, or a non-secret constant"
    required_evidence: >
      The source line embedding the secret literal, plus the absence of a runtime secret-resolution path for that value.
    severity_reason: >
      Capped at High — impact depends on what the secret protects; a signing key enabling token forgery reaches Critical only with a confirmed exploitation path.
    reviewer_note: >
      Distinguish real secrets (private keys, HMAC/signing material, live credentials) from public keys and test fixtures; confirm the value is used in production code paths.
