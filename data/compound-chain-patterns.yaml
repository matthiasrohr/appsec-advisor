# compound-chain-patterns.yaml — recognised multi-finding attack chains.
#
# Used by the triage-validator (Step 6) to detect when findings combine into
# a higher-severity architectural exposure, and to classify each member as
# either a KEYSTONE (direct exploit vector) or a CONTRIBUTOR (amplifier that
# makes the keystone easier/harder to detect/faster but is not itself the
# exploit).
#
# Severity elevation rule:
#   - keystone findings     → effective_severity = chain.severity
#   - contributor findings  → effective_severity = max(raw, contributor_cap)
#                             (contributor_cap defined in severity-caps.yaml,
#                              default High — contributors never rise to Critical
#                              via chain elevation alone)
#
# Each chain MUST declare:
#   id                     — stable CC-NN identifier
#   name                   — short human-readable name
#   description            — 1-3 sentences
#   severity               — chain-level severity (Critical / High)
#   severity_justification — why this chain deserves the asserted severity
#                            (R5 requirement)
#   breach_distance        — distance of the keystone entry
#   roles                  — keystone and contributor CWE groups
#   mitigates_by_breaking  — mitigations that break the chain
#   narrative_template     — markdown template rendered into §8.C

schema_version: 2     # bumped from 1 in R1 to add roles + severity_justification

chains:
  - id: CC-01
    name: Stored XSS → Session Theft via localStorage JWT
    description: >
      Stored or reflected XSS combined with JWT stored in browser localStorage
      yields instant session-takeover. Any user viewing the XSS-infected
      content has their token exfiltrated. Missing CSP and PII-in-localStorage
      amplify the leak but do not by themselves create the chain — they are
      contributors.
    severity: Critical
    severity_justification: >
      A stored XSS payload (keystone) CAN exfiltrate the session token in a
      single request — the attack is one-step, requires no additional attacker
      privilege, and affects every user who views the infected content. This
      is distinct from the contributors (missing CSP, PII in localStorage)
      which amplify the damage but do not individually realise it.
    breach_distance: 2
    roles:
      keystone:
        cwe_any: [CWE-79]              # XSS itself is the direct exploit vector
        title_any: []
      contributor:
        cwe_any: [CWE-922, CWE-693]    # JWT in localStorage + missing CSP = amplifiers
        title_any: []
    mitigates_by_breaking:
      - "Move JWT from localStorage to HttpOnly cookie (removes chain by severing exfil target)"
      - "Implement Content Security Policy (reduces chain viability)"
      - "Remove DomSanitizer.bypassSecurityTrustHtml calls (removes the keystone)"
    narrative_template: |
      **Keystone:** Stored/reflected XSS payloads ({{XSS_MEMBERS}}) inject
      attacker-controlled script into a rendered page. A single payload is
      sufficient to execute arbitrary JavaScript in every visitor's browser.

      **Contributors (amplifiers, not individually Critical):** The JWT is
      stored in `localStorage` ({{STORAGE_MEMBERS}}) — the XSS payload can read
      and exfiltrate it with no CSP to block the outbound request
      ({{CSP_MEMBERS}}). Fixing any ONE of the three layers reduces the chain's
      severity; fixing all three closes it.

  - id: CC-02
    name: Hardcoded Crypto Key → Offline Token Forgery
    description: >
      A signing key committed to a public source repository combined with a
      bypassable signature-verification path lets any attacker with repo read
      forge tokens offline.
    severity: Critical
    severity_justification: >
      The keystone is the presence of the RSA private key in public source —
      this alone enables JWT forgery for any claim. The signature-verification
      bypass (alg:none) is a redundant attack path: with the hardcoded key the
      attacker does not need alg:none, and vice versa. Both are keystones
      because either alone realises the chain.
    breach_distance: 1
    roles:
      keystone:
        cwe_any: [CWE-321, CWE-798, CWE-347, CWE-290]
        title_any: ["hardcoded", "alg:none", "signature verification"]
      contributor:
        cwe_any: []
        # Explicit empty — every member of this chain is a keystone
        title_any: []
    mitigates_by_breaking:
      - "Rotate hardcoded secrets and load from env vars (removes CWE-321 keystone)"
      - "Pin JWT algorithm and upgrade verification library (removes CWE-347 keystone)"
    narrative_template: |
      **Keystone (either realises the chain alone):** The signing key baked
      into `{{KEY_FILE}}` ({{KEY_MEMBERS}}) is recoverable by any attacker
      reading the repository. The signature-verification path ({{VERIFY_MEMBERS}})
      accepts `alg:none`, a second independent bypass. Either keystone alone
      yields JWT forgery for any identity, including admin.

  - id: CC-03
    name: SQL Injection → Credential Dump → Offline Hash Cracking
    description: >
      SQL injection on an unauthenticated endpoint combined with weak
      password-storage hashes yields a one-step credential harvest. The chain
      bypasses login-side rate limiting entirely because no login happens —
      the attacker extracts and cracks offline.
    severity: Critical
    severity_justification: >
      The keystone is the SQL injection itself — it is directly exploitable
      against an unauthenticated endpoint and yields immediate DB dump. The
      weak password hashing (CWE-916) converts the dump into plaintext
      credentials in minutes on commodity hardware. The SQLi alone is already
      Critical; the hashing weakness is a severity amplifier that reduces
      time-to-impact from hours-of-offline-work to minutes.
    breach_distance: 1
    roles:
      keystone:
        cwe_any: [CWE-89, CWE-943]     # SQL / NoSQL injection is the direct breach
        title_any: []
      contributor:
        cwe_any: [CWE-916, CWE-327, CWE-326]   # weak password hash = amplifier
        title_any: []
    mitigates_by_breaking:
      - "Parameterize raw SQL queries (removes keystone, closes chain)"
      - "Migrate password hashing to bcrypt / argon2 (neutralises contributor)"
    narrative_template: |
      **Keystone:** Unauthenticated SQL injection ({{SQLI_MEMBERS}}) dumps the
      user credential table in a single request.

      **Contributor:** Weak password hashing ({{HASH_MEMBERS}}) reduces brute
      force to minutes on commodity GPUs. Without the hashing weakness the
      chain still succeeds (SQLi alone is Critical) but recovery of plaintext
      passwords takes longer. Fixing only the hashing does NOT close the chain.

  - id: CC-04
    name: SSRF → Cloud Metadata Service
    description: >
      SSRF combined with deployment on a cloud provider exposing a metadata
      service (AWS IMDS, GCP/Azure equivalents) makes the SSRF a direct path
      to IAM credentials.
    severity: Critical
    severity_justification: >
      The SSRF is the keystone — without it, no outbound request is possible.
      Critical severity is conditional on cloud deployment: on-prem deployments
      with no metadata service have the SSRF but not the chain. The chain
      severity therefore describes the *realised* Critical case; in cloud-less
      deployments the raw SSRF severity (High) applies.
    breach_distance: 2
    roles:
      keystone:
        cwe_any: [CWE-918]
        title_any: []
      contributor:
        cwe_any: []
        title_any: []
    mitigates_by_breaking:
      - "Add URL allowlist for server-side fetches (removes keystone)"
      - "Block RFC-1918 and metadata-service IPs at egress (breaks chain even with SSRF)"
    narrative_template: |
      **Keystone:** Server-side URL fetches ({{SSRF_MEMBERS}}) accept attacker-
      controlled destinations without scheme/host allowlist. On cloud-hosted
      deployments the attacker targets `http://169.254.169.254/` (AWS),
      `metadata.google.internal` (GCP), or the Azure IMDS endpoint to retrieve
      IAM credentials with the workload's role. Exploit viability depends on
      runtime environment.

  - id: CC-05
    name: Unauthenticated Management Plane → Reconnaissance
    description: >
      Multiple operational endpoints (directory listing, log exposure,
      Prometheus metrics, unauthenticated WS upgrade) co-located with the user
      API give the attacker a reconnaissance picture — internal routes,
      running versions, partial log content, challenge state.
    severity: High            # DOWNGRADED from Critical (architect review W-03)
    severity_justification: >
      Reconnaissance alone is not Critical. The chain is High because each
      member yields a distinct category of passive information (filenames,
      stack traces, runtime metrics, log snippets) and together they paint a
      complete architectural picture that enables SUBSEQUENT targeted attacks.
      The chain becomes Critical only when a specific listed artifact contains
      a high-value secret (e.g. .env in /ftp with database URL) — which would
      be a separate finding under TH-03 Cryptographic Failures, not under
      this chain.
    breach_distance: 1
    roles:
      keystone:
        cwe_any: []                                     # no member is a direct breach
        title_any: []
      contributor:
        cwe_any: [CWE-306, CWE-548, CWE-532, CWE-778]
        title_any: []
    mitigates_by_breaking:
      - "Authenticate /ftp and /support/logs (removes CWE-548 / CWE-532)"
      - "Restrict /metrics to internal networks (removes CWE-306 instance)"
      - "Authenticate `Socket.IO` WS upgrade (removes CWE-306 instance)"
    narrative_template: |
      **Reconnaissance amplifier** (High, not Critical): Multiple management
      endpoints ({{MEMBERS}}) are anonymously reachable on the same listener
      as the user API. Each yields a distinct reconnaissance category
      (filesystem listing, runtime metrics, application logs, challenge state).
      The value for an attacker is targeting precision for subsequent exploits,
      not direct data extraction. Fix the unauthenticated-reachability gap at
      deployment level (reverse-proxy path rules) or at application level
      (add auth middleware).

  - id: CC-06
    name: Mass Assignment → Self-Promotion to Admin
    description: >
      Registration endpoints that accept arbitrary `req.body` fields combined
      with missing server-side admin-role guards yield admin-takeover in a
      single anonymous request.
    severity: Critical
    severity_justification: >
      Mass assignment alone creates a privilege-escalation vector (user can
      self-assign privileged fields). When combined with missing admin-role
      enforcement on subsequent endpoints, the escalation becomes full admin
      takeover via one POST to /api/Users. Both findings are keystones because
      either alone is Critical in this architecture.
    breach_distance: 1
    roles:
      keystone:
        cwe_any: [CWE-915, CWE-285, CWE-862, CWE-863]
        title_any: []
      contributor:
        cwe_any: []
        title_any: []
    mitigates_by_breaking:
      - "Field allowlist on User.create() (removes CWE-915 keystone)"
      - "Server-side admin role enforcement (removes CWE-285/CWE-862 keystone)"
    narrative_template: |
      **Keystone (each alone realises the chain):** The registration endpoint
      ({{MA_MEMBERS}}) accepts a `role` field in the request body. The missing
      server-side admin-role guard on privileged routes ({{AUTHZ_MEMBERS}})
      means a user with `role: admin` in their JWT is accepted — no further
      validation. A single anonymous POST to create a user with `role=admin`
      yields full admin access. Fix either keystone to close the chain.
