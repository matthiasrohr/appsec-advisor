# cwe-taxonomy.yaml — curated CWE taxonomy for AppSec reports
#
# Used by: appsec-stride-analyzer, appsec-threat-merger, appsec-qa-reviewer,
# phase-group-threats.md (rendering rule for classification tags).
#
# For each CWE we record:
#   title              — human-readable short title
#   url                — canonical MITRE URL
#   pillar             — CWE-1000 Research Concepts pillar (null when the CWE IS a pillar)
#   canonical_parent   — narrower CWE class this inherits from (when different from pillar)
#   owasp_top10_2021   — mapping to OWASP Top 10 2021 category (A01–A10)
#   owasp_asvs         — chapter in OWASP ASVS v4.x
#   cwe_top25_2024     — rank in CWE Top 25 2024 (null when not in Top 25)
#
# Research Concepts pillars (CWE-1000):
#   CWE-284  Improper Access Control
#   CWE-664  Improper Control of a Resource Through its Lifetime
#   CWE-682  Incorrect Calculation
#   CWE-691  Insufficient Control Flow Management
#   CWE-693  Protection Mechanism Failure
#   CWE-697  Incorrect Comparison
#   CWE-703  Improper Check or Handling of Exceptional Conditions
#   CWE-707  Improper Neutralization
#   CWE-710  Improper Adherence to Coding Standards
#
# Extend this file additively — never delete an entry, never change an id.

