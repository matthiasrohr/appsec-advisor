# finding-types.yaml — pragmatic vulnerability-type labels for findings.
#
# This is a fine-grained sub-categorization of findings, sitting BETWEEN the
# broad OWASP/STRIDE category (TH-NN) and the concrete finding instance (F-NNN).
#
# Used by:
#   - appsec-stride-analyzer: assigns finding_type when emitting a finding
#   - appsec-triage-validator Step 6: falls back to CWE-based auto-assignment
#   - phase-group-threats.md "Top Findings" table: renders the Type column
#   - phase-group-finalization.md §8.B: optionally groups findings by type
#
# Assignment rule (first match wins):
#   1. Match finding's primary CWE against `cwe_any`
#   2. If ambiguous (CWE maps to multiple types), match `title_hints` against
#      finding.title / scenario (case-insensitive substring)
#   3. If still no match, use `default_by_category[parent_category]`
#   4. If still no match, emit finding_type = "Other (uncategorized)"
#
# Labels are pragmatic / colloquial — they do NOT need to match OWASP
# terminology exactly. The goal is that executives and engineers recognise
# the label without clicking. "SQL Injection" > "Improper Neutralization of
# Special Elements in an SQL Command" for MS readability.

schema_version: 1

finding_types:
