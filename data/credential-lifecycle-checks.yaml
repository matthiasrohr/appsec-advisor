# credential-lifecycle-checks.yaml — high-confidence local-password rules
#
# Runs through scripts/source_auth_scanner.py alongside the authz and crypto
# catalogs. These checks deliberately cover only source patterns whose unsafe
# semantics are visible at the match site. They do not infer that a reset token
# lacks expiry or single-use semantics: that needs data-flow analysis and stays
# with the evidence-grounded STRIDE review. Predictable reset values are already
# covered by the CRYPTO-002 / CRYPTO-JAVA-002 / CRYPTO-PY-002 RNG checks.

checks:
  # ===================================================================
  # AUTHN-001 — Security questions as the password-recovery verifier.
  # ===================================================================
  - id: AUTHN-001
    name: "Password reset accepts a security-question answer"
    description: >
      A password-recovery path uses a knowledge-based security question as its
      verifier. Such answers are frequently guessable, discoverable, or reused
      and must not be the sole factor that authorizes a credential reset.
    file_patterns: ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx", "**/*.mjs", "**/*.cjs", "**/*.py", "**/*.java"]
    exclude_file_patterns:
      ["**/*.test.*", "**/*.spec.*", "**/test/**", "**/tests/**", "**/__tests__/**",
       "**/__mocks__/**", "**/fixtures/**", "**/node_modules/**", "**/dist/**",
       "**/build/**", "**/coverage/**", "**/target/**"]
    pattern: '(?i)\b(?:security[_-]?(?:question|answer)|(?:question|answer)[_-]?security)\b'
    counter_scope: window
    counter_window: 12
    required_context_patterns:
      - '(?i)\b(?:reset(?:[_-]?password)?|forgot[_-]?password|recover(?:y)?|new[_-]?password|setPassword)\b'
    counter_patterns:
      # A verified out-of-band or possession factor in the same short recovery
      # branch means the question is not the sole reset verifier.
      - '(?i)\b(?:reset[_-]?token|one[_-]?time[_-]?token|email[_-]?(?:verif|confirm)|mfa|totp|webauthn)\b'
    severity_if_violated: High
    cwe: CWE-640
    finding_type: FT-031
    breach_vector: "Internet Anon"
    rationale: >
      An attacker who can research or guess the answer can satisfy the recovery
      check and take over the account without the original credential.
    remediation: "Replace security-question recovery with a CSPRNG reset token delivered through a verified out-of-band channel; expire it quickly and invalidate it after one use."

  # ===================================================================
  # AUTHN-002 — Literal password minimum below eight characters.
  # ===================================================================
  - id: AUTHN-002
    name: "Password policy permits credentials shorter than eight characters"
    description: >
      Registration or password-change code accepts a password below the
      eight-character minimum. This intentionally narrow rule only matches a
      literal threshold; configurable or external policy engines remain for the
      STRIDE review rather than being guessed from their names.
    file_patterns: ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx", "**/*.mjs", "**/*.cjs", "**/*.py", "**/*.java"]
    exclude_file_patterns:
      ["**/*.test.*", "**/*.spec.*", "**/test/**", "**/tests/**", "**/__tests__/**",
       "**/__mocks__/**", "**/fixtures/**", "**/node_modules/**", "**/dist/**",
       "**/build/**", "**/coverage/**", "**/target/**"]
    pattern: '(?i)(?:\b(?:new[_-]?password|password|passphrase|credential)[A-Za-z0-9_]*\s*(?:\.length(?:\(\))?)\s*(?:<\s*[0-7]\b|<=\s*[0-6]\b)|\blen\(\s*(?:new[_-]?password|password|passphrase|credential)[A-Za-z0-9_]*\s*\)\s*(?:<\s*[0-7]\b|<=\s*[0-6]\b))'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: Medium
    cwe: CWE-521
    finding_type: FT-034
    breach_vector: "Internet Anon"
    rationale: >
      Short passwords reduce the cost of online guessing and offline cracking
      after a credential-store compromise.
    remediation: "Require at least eight characters in the local password policy and pair it with breached-password screening and login rate limiting."
