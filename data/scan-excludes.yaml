# Single source of truth for scan exclusions across recon-scanner,
# stride-analyzer, and security_relevance_filter.py.
#
# Consumers:
#   - scripts/scan_excludes.py (Python loader; whitelist-wins logic)
#   - agents/appsec-recon-scanner.md  (glob used in Step 3 Grep calls)
#   - agents/appsec-stride-analyzer.md (glob used for component source reads)
#   - scripts/security_relevance_filter.py (incremental mode file classification)
#
# Schema contract:
#   always_include wins over every other rule. This is how AsciiDoc source
#   docs, ADRs, and API contracts survive the otherwise-aggressive excludes
#   on docs/ and similar directories.
#
# Bump version on breaking schema changes.
version: 1

# ---------------------------------------------------------------------------
# Per-file byte cap. Files larger than this are skipped by every scan stage
# that enumerates files in deterministic Python (recon_patterns,
# route_inventory). Application source is almost always small; a file past
# this size is overwhelmingly a data blob, bundle, snapshot, or generated
# artifact — not code worth analysing — and reading it only burns tokens and
# wall-clock. Skipped files are reported on stderr and in the recon JSON
# (skipped_oversize / skipped_oversize_count).
#
# Override per run without editing this file via the APPSEC_MAX_FILE_BYTES
# env var (takes precedence over this value). Set to 0 to disable the cap.
max_file_bytes: 1000000   # 1 MB

# ---------------------------------------------------------------------------
# Directory names excluded from all scans (match any path segment).
# ---------------------------------------------------------------------------
directories:
  # Package managers / build outputs
  - node_modules
  - bower_components   # legacy Bower vendored deps (recon already hard-excludes)
  - jspm_packages      # legacy JSPM vendored deps
  - vendor
  - dist
  - build
  - _build             # Elixir / Sphinx / dune build output
  - target
  - out
  - .output            # Nuxt 3 build output
  - obj                # .NET intermediate output
  - coverage
  - htmlcov            # Python coverage HTML report
  - .nyc_output        # JS Istanbul / nyc coverage data
  - playwright-report  # Playwright HTML report output
  - test-results       # Playwright / generic test-run output
  - allure-results     # Allure raw test results
  - allure-report      # Allure generated HTML report
  - .next
  - .nuxt
  - .angular           # Angular 13+ build cache
  - .svelte-kit        # SvelteKit generated output
  - .turbo             # Turborepo cache
  - .parcel-cache      # Parcel bundler cache
  - .serverless        # Serverless Framework build artefacts
  - __pycache__

  # Python virtualenvs and caches
  - .venv
  - venv
  - .tox
  - .nox
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
  - .pyre
  - .hypothesis
  - .ipynb_checkpoints

  # Java / Gradle / Kotlin build caches
  - .gradle

  # JS package-manager / framework caches
  - .yarn              # Yarn 2+ (Berry) PnP cache — can be very large
  - .npm               # npm cache
  - .pnpm-store        # pnpm global/local store
  - .vite              # Vite cache

  # iOS / CocoaPods / macOS build
  - Pods
  - DerivedData        # Xcode build output
  - Carthage           # Carthage vendored frameworks

  # Mobile / cross-platform build caches
  - .expo              # Expo / React Native build cache
  - .dart_tool         # Dart / Flutter generated
  - .pub-cache         # Dart pub package cache
  - elm-stuff          # Elm vendored deps + build cache

  # IaC tool caches. Source IaC directories such as k8s/, helm/, terraform/,
  # and ansible/ are not excluded, but generated provider/build caches are.
  - .terraform         # Terraform provider plugin cache (large binaries)
  - .terragrunt-cache  # Terragrunt generated module cache
  - .aws-sam           # AWS SAM build output
  - cdk.out            # AWS CDK synth output
  - .sst               # SST build/runtime cache

  # C / C++ build trees
  - CMakeFiles         # CMake intermediate build artefacts
  - bazel-bin
  - bazel-out
  - bazel-testlogs

  # Editor local-history (duplicate file snapshots, no live source)
  - .history

  # VCS / IDE
  - .git
  - .idea              # IntelliJ / JetBrains workspace config
  - .vscode            # VS Code workspace settings (not .claude/ — that IS scanned)
  - .vs                # Visual Studio

  # Test directories. __tests__/__mocks__ were already excluded historically;
  # tests, test, e2e, cypress, playwright, benchmarks, benches are additions.
  - __tests__
  - __mocks__
  - tests
  - test
  - e2e
  - cypress
  - playwright
  - benchmarks
  - benches
  - fixtures
  - __fixtures__
  - testdata
  - mocks

  # Demo / example code. Framework snippets, intentionally vulnerable demos,
  # and pre-baked secrets here produce false positives in Cat 12 / Cat 28.
  - examples
  - storybook
  - .storybook

  # Refactoring Safety Net diffs — code-snapshot tooling found in some
  # training/CTF repos. Contains copies of source files, not live application
  # code; scanning produces high-volume duplicate findings.
  - rsn

  # Screenshot / UI assets — no application logic.
  - screenshots

  # i18n — message catalogs, no application logic
  - translations
  - i18n
  - locales

  # Third-party / vendored dependencies beyond vendor/
  - third_party

  # Runtime artifacts
  - .cache
  - .appsec-cache   # plugin's own cache — avoid self-reference scan
  - tmp

  # Generated docs sites (build output of Hugo/Jekyll/Antora/Sphinx etc.)
  - apidocs
  - typedoc
  - jsdoc
  - _site
  - .docusaurus
  - .vercel
  - .netlify

  # Training-challenge support artefacts (deliberately-vulnerable apps such
  # as CTF / OWASP training projects). Contains intentional false positives
  # (hardcoded credentials as challenge answers, exploit snippets as
  # coding-challenge solutions) that would pollute Cat 12 / Cat 16 findings.
  - codefixes

# ---------------------------------------------------------------------------
# Path prefixes excluded (relative to REPO_ROOT, not matched as any segment).
# ---------------------------------------------------------------------------
path_prefixes:
  - docs/security/               # plugin output — never re-analyze own output
  - docs/images/                 # diagram/screenshot assets
  - docs/site/                   # generated docs site output
  - .github/ISSUE_TEMPLATE/
  - .github/ISSUE_TEMPLATE.md
  - .github/PULL_REQUEST_TEMPLATE/
  - .github/PULL_REQUEST_TEMPLATE.md
  - .github/pull_request_template.md
  - data/static/codefixes/       # coding-challenge fix snippets (training apps)
                                 # (intentional exploits / answers — high false-positive rate)
  - data/static/i18n/            # i18n message catalogs — no application logic
  - frontend/src/assets/i18n/    # Angular i18n bundles — no application logic

# ---------------------------------------------------------------------------
# File patterns excluded regardless of directory (matched by basename).
# ---------------------------------------------------------------------------
file_patterns:
  # Minified / bundled
  - "*.min.js"
  - "*.min.css"
  - "*.bundle.js"
  - "*.chunk.js"
  - "*.map"

  # Vendored / copied JavaScript libraries (not installed via package manager).
  # Matches version-suffixed filenames (jquery-3.7.1.js, bootstrap-5.3.0.js)
  # and well-known library basenames that are never application source.
  # Does NOT cover lib/ as a directory to avoid excluding app code like
  # lib/insecurity.ts — use directory-level excludes for that only when safe.
  - "jquery.js"
  - "jquery-*.js"
  - "jquery.*.js"
  - "jquery.css"
  - "jquery-*.css"
  - "jquery.*.css"
  - "bootstrap.js"
  - "bootstrap-*.js"
  - "bootstrap.*.js"
  - "bootstrap.css"
  - "bootstrap-*.css"
  - "bootstrap.*.css"
  - "lodash.js"
  - "lodash-*.js"
  - "lodash.*.js"
  - "moment.js"
  - "moment-*.js"
  - "moment.*.js"
  - "underscore.js"
  - "underscore-*.js"
  - "underscore.*.js"
  - "backbone.js"
  - "backbone-*.js"
  - "backbone.*.js"
  - "angular.js"            # AngularJS (legacy) vendored copies
  - "angular-*.js"
  - "angular.*.js"
  - "react.js"              # vendored React copies outside node_modules
  - "react-*.js"
  - "react.*.js"
  - "react-dom.js"
  - "react-dom-*.js"
  - "react-dom.*.js"
  - "vue.js"
  - "vue-*.js"
  - "vue.*.js"
  - "three.js"
  - "three-*.js"
  - "three.*.js"
  - "d3.js"
  - "d3-*.js"
  - "d3.*.js"
  - "chart.js"
  - "Chart.js"
  - "chart-*.js"
  - "chart.*.js"
  - "highcharts.js"
  - "highcharts-*.js"
  - "highcharts.*.js"
  - "datatables.js"
  - "datatables-*.js"
  - "datatables.*.js"
  - "select2.js"
  - "select2-*.js"
  - "select2.*.js"
  - "tinymce.js"
  - "tinymce-*.js"
  - "tinymce.*.js"
  - "ckeditor.js"
  - "ckeditor-*.js"
  - "ckeditor.*.js"
  - "ace.js"                # Ace editor
  - "ace-*.js"
  - "ace.*.js"
  - "codemirror.js"
  - "codemirror-*.js"
  - "codemirror.*.js"
  - "socket.io.js"
  - "socket.io-*.js"
  - "socket.io.*.js"

  # Binary / compiled
  - "*.class"
  - "*.pyc"
  - "*.pyo"
  - "*.wasm"
  - "*.dll"
  - "*.so"
  - "*.dylib"
  - "*.exe"
  - "*.o"                # native object files
  - "*.a"                # native static libraries
  - "*.obj"              # Windows object files
  - "*.lib"              # Windows static libraries
  - "*.framework"        # iOS/macOS binary frameworks

  # Java / JVM archives (built artifacts, never source)
  - "*.jar"
  - "*.war"
  - "*.ear"

  # Generic archives
  - "*.zip"
  - "*.tar"
  - "*.tar.gz"
  - "*.tgz"
  - "*.gz"
  - "*.bz2"
  - "*.xz"
  - "*.7z"

  # Media
  - "*.png"
  - "*.jpg"
  - "*.jpeg"
  - "*.gif"
  - "*.svg"
  - "*.ico"
  - "*.webp"
  - "*.avif"
  - "*.bmp"
  - "*.tiff"
  - "*.tif"
  - "*.psd"
  - "*.woff"
  - "*.woff2"
  - "*.ttf"
  - "*.otf"
  - "*.eot"
  - "*.mp3"
  - "*.mp4"
  - "*.webm"
  - "*.mov"
  - "*.avi"
  - "*.wav"
  - "*.ogg"
  - "*.flac"
  - "*.log"

  # Documents (no application logic)
  - "*.pdf"

  # Packaged / installable binaries (compiled artefacts, never source)
  - "*.whl"              # Python wheel
  - "*.egg"
  - "*.nupkg"            # NuGet package
  - "*.apk"              # Android
  - "*.aab"
  - "*.ipa"              # iOS
  - "*.dmg"              # macOS image
  - "*.deb"
  - "*.rpm"
  - "*.node"             # native Node addon
  - "*.pdb"              # debug symbols

  # Test files. JS/TS use the .test./.spec. dot convention; Go/Python/Ruby/
  # Java/Kotlin/C#/PHP use suffix or PascalCase conventions and frequently
  # COLOCATE tests next to source — so the test-directory excludes miss them.
  # SCAN_TEST_FILES opt-in re-includes every pattern here.
  - "*.test.js"
  - "*.test.ts"
  - "*.test.jsx"
  - "*.test.tsx"
  - "*.spec.js"
  - "*.spec.ts"
  - "*.spec.jsx"
  - "*.spec.tsx"
  - "*_test.go"            # Go convention (was wrongly "*.test.go" — matched nothing)
  - "test_*.py"           # pytest / unittest
  - "*_test.py"           # pytest / unittest
  - "conftest.py"         # pytest fixtures / config
  - "*_spec.rb"           # RSpec (was wrongly "*.spec.rb" — matched nothing)
  - "*_test.rb"           # minitest
  - "*Test.java"          # JUnit
  - "*Tests.java"
  - "*IT.java"            # integration tests (Failsafe)
  - "*Test.kt"            # Kotlin (JUnit)
  - "*Tests.kt"
  - "*Test.cs"            # xUnit / NUnit / MSTest
  - "*Tests.cs"
  - "*Test.php"           # PHPUnit
  - "*.snap"

  # Coverage / test report output files (generated; no source).
  - "lcov.info"
  - "*.lcov"
  - "coverage.xml"        # Cobertura/pytest-cov XML
  - "cobertura.xml"
  - "clover.xml"          # PHPUnit/Clover

  # Lockfiles — exact dependency pins. Bodies carry no signal beyond the
  # manifest (recon Step 2 reads only existence). Dependency CHANGES are still
  # caught by the recon fingerprint (baseline_state.MANIFEST_NAMES), which does
  # NOT consult is_excluded — so excluding the body is regression-free and also
  # stops false incremental triggers from substrings inside the lockfile.
  # `*.lock` covers yarn.lock, Cargo.lock, Gemfile.lock, poetry.lock,
  # Pipfile.lock, composer.lock, mix.lock, uv.lock, pubspec.lock, flake.lock.
  - "*.lock"
  - "package-lock.json"
  - "npm-shrinkwrap.json"
  - "pnpm-lock.yaml"
  - "packages.lock.json"  # .NET
  - "gradle.lockfile"     # Gradle (not a *.lock basename)

  # Type declarations — no runtime behavior
  - "*.d.ts"

  # Auto-generated. The authoritative SOURCE (.proto / schema) is whitelisted
  # in always_include; these are mechanical codegen outputs with no logic.
  - "*.pb.go"
  - "*.pb.js"
  - "*.pb.ts"
  - "*.pb.java"
  - "*.pb.kt"
  - "*.pb.rb"
  - "*.pb.cc"             # C++ protobuf
  - "*.pb.h"
  - "*_pb2.py"            # Python protobuf
  - "*_pb2_grpc.py"       # Python gRPC stubs
  - "*_pb.ts"
  - "*_pb.js"
  - "*.generated.ts"
  - "*.generated.js"
  - "*.generated.go"
  - "*.generated.cs"
  - "*.g.cs"              # C# source-generator output
  - "*.designer.cs"       # C# designer (WinForms/WPF) generated
  - "*.g.dart"            # Dart build_runner codegen
  - "*.freezed.dart"      # Dart freezed codegen

  # Story / fixture / mock files
  - "*.stories.js"
  - "*.stories.ts"
  - "*.stories.jsx"
  - "*.stories.tsx"
  - "*.stories.mdx"
  - "*.fixture.js"
  - "*.fixture.ts"
  - "*.fixture.jsx"
  - "*.fixture.tsx"
  - "*.mock.js"
  - "*.mock.ts"
  - "*.mock.jsx"
  - "*.mock.tsx"

# ---------------------------------------------------------------------------
# Always-include overrides — these WIN over every other rule.
#
# Three categories survive exclusion:
#   1. Source documentation and machine-readable contracts (AsciiDoc, ADRs,
#      OpenAPI/proto/GraphQL schemas) — attack-surface signals.
#   2. Manifests, Dockerfiles, env files — security-relevant metadata that
#      can legitimately appear inside otherwise-excluded directories (a
#      Dockerfile inside examples/, a package.json inside third_party/).
#   3. Secrets/crypto files by extension (.env, .pem, .key, .crt) — must
#      NEVER be overlooked, regardless of location.
#
# Rationale for category 2+3: the scan-excludes list is coarse by design
# (directory-level). A fine-grained security signal like a Dockerfile or
# a committed .env trumps the coarse exclude.
# ---------------------------------------------------------------------------
always_include:

  # File-extension-based whitelist (matched by basename).
  file_patterns:
    # --- Source documentation ---
    - "*.adoc"
    - "*.asciidoc"

    # --- Machine-readable API contracts (attack surface!) ---
    - "openapi.yaml"
    - "openapi.yml"
    - "openapi.json"
    - "swagger.yaml"
    - "swagger.yml"
    - "swagger.json"
    - "*.proto"
    - "schema.graphql"
    - "*.graphql"
    - "*.gql"
    - "*.graphqls"
    - "*.thrift"

    # --- Manifests & build descriptors (always-relevant names) ---
    - "package.json"
    - "requirements.txt"
    - "Pipfile"
    - "pyproject.toml"
    - "go.mod"
    - "go.sum"
    - "Cargo.toml"
    - "pom.xml"
    - "build.gradle"
    - "build.gradle.kts"
    - "composer.json"
    - "Gemfile"
    - "mix.exs"
    - ".npmrc"
    - ".yarnrc"
    - ".yarnrc.yml"
    - "pnpm-workspace.yaml"
    - "bunfig.toml"
    - ".pypirc"
    - "pip.conf"
    - "uv.toml"

    # --- Container / orchestration definitions ---
    - "Dockerfile"
    - "Dockerfile.*"
    - "*.Dockerfile"
    - "Containerfile"
    - "docker-compose.yml"
    - "docker-compose.yaml"
    - "compose.yml"
    - "compose.yaml"
    - ".dockerignore"

    # --- CI / CD pipeline descriptors (Cat 14, 27 supply-chain surface) ---
    - ".gitlab-ci.yml"
    - ".gitlab-ci.yaml"
    - "Jenkinsfile"
    - "Jenkinsfile.*"
    - "*.Jenkinsfile"
    - "azure-pipelines.yml"
    - "azure-pipelines.yaml"
    - ".travis.yml"
    - "bitbucket-pipelines.yml"
    - ".drone.yml"
    - ".woodpecker.yml"
    - ".woodpecker.yaml"
    - "cloudbuild.yaml"          # Google Cloud Build
    - "action.yml"
    - "action.yaml"
    - "CODEOWNERS"

    # --- Dependency / update tooling ---
    - "renovate.json"
    - "renovate.json5"
    - ".renovaterc"
    - ".renovaterc.json"

    # --- Pre-commit / git hooks (local CI surface) ---
    - ".pre-commit-config.yaml"
    - ".pre-commit-config.yml"

    # --- Secret / crypto material — never overlook ---
    - ".env"
    - ".env.*"
    - "*.pem"
    - "*.key"
    - "*.crt"
    - "*.p12"
    - "*.jks"

  # Path-prefix-based whitelist — these directories always count as source
  # even when their parent is a directory that would otherwise be excluded.
  path_prefixes:
    - docs/adr/
    - docs/decisions/

    # Dependency update config (Cat 14, 27 supply-chain surface).
    - .github/dependabot.yml
    - .github/dependabot.yaml

# ---------------------------------------------------------------------------
# Opt-in scan targets — excluded by default, included when the given env
# variable or flag is truthy at dispatch time.
# ---------------------------------------------------------------------------
opt_in:

  # Existing flag (see agents/appsec-recon-scanner.md Step 3).
  # Teams that put security-relevant code in test utilities (custom auth
  # helpers, contract-test fixtures with real API shapes) enable this.
  SCAN_TEST_FILES:
    description: "Include test files and fixtures in the scan"
    directories:
      - tests
      - test
      - __tests__
      - __mocks__
      - fixtures
      - __fixtures__
      - testdata
      - mocks
      - e2e
      - cypress
      - playwright
      - benchmarks
      - benches
    file_patterns:
      - "*.test.js"
      - "*.test.ts"
      - "*.test.jsx"
      - "*.test.tsx"
      - "*.spec.js"
      - "*.spec.ts"
      - "*.spec.jsx"
      - "*.spec.tsx"
      - "*.d.ts"
      # Colocated test conventions (mirror the file_patterns excludes above)
      - "*_test.go"
      - "test_*.py"
      - "*_test.py"
      - "conftest.py"
      - "*_spec.rb"
      - "*_test.rb"
      - "*Test.java"
      - "*Tests.java"
      - "*IT.java"
      - "*Test.kt"
      - "*Tests.kt"
      - "*Test.cs"
      - "*Tests.cs"
      - "*Test.php"
      - "*.fixture.js"
      - "*.fixture.ts"
      - "*.fixture.jsx"
      - "*.fixture.tsx"
      - "*.mock.js"
      - "*.mock.ts"
      - "*.mock.jsx"
      - "*.mock.tsx"

  # New (Sprint 1 Item E.3) — QA reviewer Check 2 Pass 2c.
  # Not a scan directory override; documented here so the flag surface is
  # discoverable from one file.
  QA_SCAN_REPO:
    description: "Enable QA Check 2 Pass 2c proactive repo basename scan"
