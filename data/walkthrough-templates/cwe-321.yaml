cwe: CWE-321
category: hardcoded_key
human_label: "Hardcoded cryptographic key in source"

attacker_profile_overrides:
  repo-read: |
    An attacker with read access to the public source repository (clone, blob view, or git history) extracts the cryptographic key from version control. No application-level access is required for the extraction step. The extracted key is then used to forge signatures or decrypt traffic against the live application.

sequence_diagram: |
  ```mermaid
  sequenceDiagram
      autonumber
      actor Attacker
      participant Repo
      participant App
      Note over Repo: Public repository
      Note over App: {component} — {file}:{line}
      Attacker->>Repo: Clone or browse — extract private key from {file} line {line}
      Attacker->>Attacker: Sign forged token / signature with the extracted key
      Attacker->>App: Submit forged artefact in normal authentication flow
      App-->>Attacker: Request accepted as authentic — signature validates
  ```

detection_signals:
  - "Pre-commit secret scanner (gitleaks, trufflehog) flagging key material near `{file}`"
  - "GitHub Secret Scanning push-protection alert on the affected file path"
  - "Repository search results for `BEGIN.*PRIVATE KEY`, `PRIVATE_KEY_BASE64`, or known key prefixes"
  - "Audit log entries showing tokens / signatures generated outside the trusted issuer for `{component}`"

attack_steps_template:
  - "Clone the public repository and locate the cryptographic key at `{file}:{line}`"
  - "Extract the key material directly from source (no application-level access needed)"
  - "Use the extracted key to forge a token / signature / encrypted blob accepted by `{component}`"
