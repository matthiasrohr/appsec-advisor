cwe: CWE-916
category: weak_jwt_validation
human_label: "Insufficient verification of JWT / signature algorithm"

sequence_diagram: |
  ```mermaid
  sequenceDiagram
      autonumber
      actor Attacker
      participant Forge as "Local JWT tool"
      participant App as "{component} ({file}:{line})"
      participant Verifier as "JWT verifier"

      alt Current state
          Attacker->>Forge: Craft JWT with header `alg=none` and admin claims
          Forge-->>Attacker: Unsigned token ready for replay
          Attacker->>App: {endpoint_guess} with the unsigned token in `Authorization`
          App->>Verifier: Validate token without pinning the signing algorithm
          Verifier-->>App: Token treated as valid because the signature step is skipped
          App-->>Attacker: 200 OK — request authorised under forged admin identity
      else After {mitigation_primary}
          Attacker->>App: Same unsigned token
          App->>Verifier: Validate with an explicit `algorithms` allow-list
          Verifier-->>App: Algorithm `none` rejected
          App-->>Attacker: 401 Unauthorized — signature required
      end
  ```

detection_signals:
  - "Library-audit flag on JWT-verify call sites at `{file}` not pinning `algorithms: ['RS256'|'HS256'|...]`"
  - "Audit-log entries showing tokens with `alg` set to `none`, `None`, or mixed-case variants"
  - "Diff between the documented signing algorithm and the algorithms accepted at runtime"
  - "Static-analysis flag on `jsonwebtoken.verify(token)` without the explicit `algorithms` option in `{component}`"
