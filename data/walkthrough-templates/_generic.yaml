cwe: GENERIC
category: generic
human_label: "Generic weakness — fallback template"

# Generic fallback used when no CWE-specific template exists. Renders a
# structurally-valid sequence diagram + three SIEM-style detection bullets so
# the contract checks pass even for unmapped CWE classes. Quality is bounded
# (intentionally generic) — add a CWE-specific template when a new class
# starts showing up on real runs.

sequence_diagram: |
  ```mermaid
  sequenceDiagram
      autonumber
      actor Attacker
      participant App
      Note over App: {component} — {file}:{line}
      Attacker->>App: Crafted request exercising the weakness at {file} line {line}
      App->>App: Vulnerable branch executes without the missing control
      App-->>Attacker: Response confirms the weakness — {cwe}
  ```

detection_signals:
  - "Static-analysis rule for {cwe} flagging `{file}` in CI pre-merge"
  - "Application logs at `{component}` showing the input pattern associated with the weakness"
  - "Anomalous response code or payload-size distribution on the affected endpoint"
