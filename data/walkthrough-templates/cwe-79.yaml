cwe: CWE-79
category: xss
human_label: "Cross-Site Scripting via sanitizer bypass or missing encoding"

sequence_diagram: |
  ```mermaid
  sequenceDiagram
      autonumber
      actor Attacker
      actor Victim
      participant App
      Note over App: {component} — {file}:{line}
      Attacker->>App: {endpoint_guess} with HTML payload — onerror handler exfiltrates cookies
      Victim->>App: Loads page rendering the stored / reflected payload
      App-->>Victim: HTML contains the unescaped attacker payload — script executes
      Victim->>Attacker: Outbound request leaks session cookie / token
  ```

detection_signals:
  - "WAF or response-inspection alerts on `<script`, `onerror=`, `javascript:` patterns near `{file}`"
  - "Content-Security-Policy violation reports referencing `{component}`"
  - "Static-analysis flag on output-rendering call sites in `{file}` missing context-aware encoding"
  - "Anomalous outbound traffic from authenticated user sessions (cookie exfiltration to non-allow-listed domains)"
