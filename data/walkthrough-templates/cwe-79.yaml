cwe: CWE-79
category: xss
human_label: "Cross-Site Scripting via sanitizer bypass or missing encoding"

sequence_diagram: |
  ```mermaid
  sequenceDiagram
      autonumber
      actor Attacker
      actor Victim
      participant App as "{component} ({file}:{line})"
      participant Store as "Data store / response"
      participant Browser as "Victim browser"

      alt Current state
          Attacker->>App: {endpoint_guess} with HTML payload carrying an onerror handler that exfiltrates cookies
          App->>Store: Store / echo payload without contextual output encoding
          Victim->>App: Loads the page that renders the stored / reflected payload
          App-->>Browser: HTML contains the unescaped attacker payload
          Browser->>Browser: Renders the DOM and triggers the embedded onerror handler
          Browser->>Attacker: Outbound request exfiltrates the session cookie / token
      else After {mitigation_primary}
          Attacker->>App: Same payload
          App->>App: Sanitizer / output encoder neutralises script vectors
          App-->>Browser: HTML renders the payload as literal text
          Browser-->>Victim: Page displays the attacker text without script execution
      end
  ```

detection_signals:
  - "WAF or response-inspection alerts on `<script`, `onerror=`, `javascript:` patterns near `{file}`"
  - "Content-Security-Policy violation reports referencing `{component}`"
  - "Static-analysis flag on output-rendering call sites in `{file}` missing context-aware encoding"
  - "Anomalous outbound traffic from authenticated user sessions (cookie exfiltration to non-allow-listed domains)"
