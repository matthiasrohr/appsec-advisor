cwe: CWE-89
category: sql_injection
human_label: "SQL Injection via raw query construction"

sequence_diagram: |
  ```mermaid
  sequenceDiagram
      autonumber
      actor Attacker
      participant API
      participant DB
      Note over API: {component} — {file}:{line}
      Note over DB: Database
      Attacker->>API: {endpoint_guess} with classical OR 1=1 payload
      API->>DB: SQL built by string interpolation — payload becomes query
      DB-->>API: First matching row regardless of intended predicate
      API-->>Attacker: 200 OK with authenticated session / leaked rows
  ```

detection_signals:
  - "Application-side SQL parse errors (`SQLITE_ERROR`, `syntax error near`) on the affected endpoint"
  - "Slow-query log entries containing `UNION SELECT`, `OR 1=1`, or stacked statements against `{component}`"
  - "Raw `sequelize.query()` / `db.raw()` call sites at `{file}` flagged by a static-analysis pre-commit hook"
  - "WAF body-inspection flagging classical SQLi payloads in POST bodies to endpoints under `{component}`"

attack_steps_template:
  - "Find the request parameter that reaches the raw query at `{file}:{line}`"
  - "Submit an SQL meta-character payload (e.g. `' OR 1=1 --`) in that parameter"
  - "Read the response: the injected predicate returns the first row, granting access or leaking data"
