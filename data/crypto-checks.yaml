  # --- iOS (Swift / Objective-C) crypto (multi-stack Phase C — mobile) ---
  - id: CRYPTO-SWIFT-001
    name: "Broken hash primitive (MD5/SHA-1) — iOS"
    description: >
      CommonCrypto `CC_MD5`/`CC_SHA1` or CryptoKit `Insecure.MD5`/`Insecure.SHA1`
