    severity_if_violated: Medium
    cwe: CWE-328
    finding_type: FT-172
    breach_vector: "Internet Anon"
    rationale: "MD5/SHA-1 are collision-broken; unsafe for passwords or integrity of untrusted data."
    remediation: "Use Digest::SHA256+ for integrity and bcrypt (has_secure_password) for credentials."

  - id: CRYPTO-RB-002
    name: "Non-cryptographic RNG for a secret/token — Ruby"
    description: >
      `rand()` / `Random.rand` for a token/secret/OTP is predictable;
      `SecureRandom` is the safe alternative.
    file_patterns: ["**/*.rb"]
