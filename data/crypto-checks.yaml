    file_patterns: ["**/*.swift", "**/*.m"]
    exclude_file_patterns: ["**/*Tests.swift", "**/*Test.m", "**/Pods/**"]
    pattern: '\bCC_(?:MD5|SHA1)\s*\(|Insecure\.(?:MD5|SHA1)\b'
    counter_scope: window
    counter_window: 3
    counter_patterns:
      - '(?i)\b(etag|cache[_-]?key|checksum|dedup\w*|fingerprint|content[_-]?hash)'
    severity_if_violated: Medium
    cwe: CWE-328
    finding_type: FT-172
    breach_vector: "Physical / Local"
    rationale: "MD5/SHA-1 are collision-broken; unsafe for passwords or integrity of untrusted data."
    remediation: "Use SHA-256+ (CryptoKit SHA256) for integrity and a KDF for credentials."

  - id: CRYPTO-SWIFT-002
    name: "Non-cryptographic RNG for a secret/token — iOS"
    description: >
      `random()` / `rand()` / `drand48()` for a token/secret is predictable;
      `arc4random` / `SecRandomCopyBytes` are the safe alternatives and are
      suppressed.
    file_patterns: ["**/*.swift", "**/*.m"]
    exclude_file_patterns: ["**/*Tests.swift", "**/*Test.m", "**/Pods/**"]
    pattern: '(?i)\b(token|secret|api[_-]?key|otp|nonce|session[_-]?id|reset[_-]?token|salt)\b[^\n]{0,60}\b(?:rand|random|drand48)\s*\('
    counter_scope: line
    counter_patterns:
      - '\b(arc4random|SecRandomCopyBytes)\b'
    severity_if_violated: High
    cwe: CWE-330
    finding_type: FT-173
    breach_vector: "Physical / Local"
    rationale: "A predictable token/secret lets an attacker guess session ids, reset links, or OTPs."
    remediation: "Use SecRandomCopyBytes (or arc4random_buf) for any security value."

  # --- Flutter / Dart crypto (multi-stack Phase C — mobile) ---
  - id: CRYPTO-DART-001
    name: "Broken hash primitive (MD5/SHA-1) — Dart"
    description: "`md5.convert` / `sha1.convert` (package:crypto) used as a security hash."
    file_patterns: ["**/*.dart"]
    exclude_file_patterns: ["**/test/**", "**/*_test.dart", "**/.dart_tool/**"]
    pattern: '\b(?:md5|sha1)\.convert\s*\('
    counter_scope: window
    counter_window: 2
    counter_patterns:
      - '(?i)\b(etag|cache[_-]?key|checksum|dedup\w*|fingerprint|content[_-]?hash)'
    severity_if_violated: Medium
    cwe: CWE-328
    finding_type: FT-172
    breach_vector: "Physical / Local"
    rationale: "MD5/SHA-1 are collision-broken; unsafe for passwords or integrity of untrusted data."
    remediation: "Use sha256 for integrity and a password KDF for credentials."

  - id: CRYPTO-DART-002
    name: "Non-cryptographic RNG for a secret/token — Dart"
    description: "`Random()` (dart:math) for a token/secret is predictable; use `Random.secure()`."
    file_patterns: ["**/*.dart"]
    exclude_file_patterns: ["**/test/**", "**/*_test.dart", "**/.dart_tool/**"]
    pattern: '(?i)\b(token|secret|api[_-]?key|otp|nonce|session[_-]?id|reset[_-]?token|salt)\b[^\n]{0,60}\bRandom\s*\(\s*\)'
    counter_scope: line
    counter_patterns:
      - 'Random\.secure'
    severity_if_violated: High
    cwe: CWE-330
    finding_type: FT-173
    breach_vector: "Physical / Local"
    rationale: "A predictable token/secret lets an attacker guess session ids, reset links, or OTPs."
    remediation: "Use Random.secure() for any security value."

  - id: CRYPTO-HOMEGROWN-XOR
    name: "Hand-rolled XOR / repeating-key cipher"
    description: >
      A byte or char is XORed against a key array indexed modulo its length
      (`data[i] ^ key[i % key.length]`) — the signature of a home-grown
      repeating-key stream cipher. It is trivially reversible (known-plaintext or
      frequency analysis), usually paired with a hardcoded key, and provides no
      integrity. Language-agnostic: the same shape appears in Java/Kotlin/C#/Go/
      JS/TS/Python/Ruby/PHP. This is NOT a substitute for an authenticated cipher.
    file_patterns:
      ["**/*.java", "**/*.kt", "**/*.cs", "**/*.go", "**/*.js", "**/*.ts", "**/*.py", "**/*.rb", "**/*.php", "**/*.scala"]
    exclude_file_patterns:
      ["**/test/**", "**/tests/**", "**/*Test.*", "**/*Tests.*", "**/*_test.*", "**/*.test.*", "**/target/**", "**/build/**", "**/dist/**", "**/node_modules/**"]
    pattern: '\^\s*[A-Za-z_]\w*\s*\[[^\]\n]{0,40}%'
    counter_scope: line
    counter_patterns: []
    severity_if_violated: High
    cwe: CWE-327
    finding_type: FT-174
    breach_vector: "Internet Anon"
    rationale: >
      A reversible home-grown cipher protecting tokens, passwords, or exported
      data can be broken without the key, disclosing every protected value.
    remediation: "Use an authenticated cipher (AES-GCM) from a vetted library; never a hand-rolled XOR."
