name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          pip install -r scripts/requirements.txt
          pip install ruff==0.11.13

      - name: Lint (ruff)
        run: ruff check scripts/ tests/ hooks/

      - name: Format check (ruff)
        run: ruff format --check scripts/ tests/ hooks/

      - name: Validate plugin config
        run: python3 scripts/validate_config.py .

      - name: Fragment-registry drift (advisory)
        run: python3 scripts/check_fragment_registry.py
        continue-on-error: true

      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing
