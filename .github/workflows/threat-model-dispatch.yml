name: Threat Model (Preset)

# Manually dispatched, preset-driven headless threat-model run against an
# external target repository. One dispatch == one preset == one job.
# Presets live in .github/threat-model-presets.json (single source of truth);
# `target` x `depth` selects one whole, and nothing overrides a preset field.
#
# The branch to run is GitHub's own "Use workflow from" selector — there is no
# plugin_ref input, because both dev and main carry this workflow.
#
# Auth: subscription billing via the CLAUDE_CODE_OAUTH_TOKEN secret
# (`claude setup-token`). ANTHROPIC_API_KEY is deliberately NOT set — it would
# take precedence and switch billing to per-token.

on:
  workflow_dispatch:
    inputs:
      # A preset key is exactly `<target>-<depth>`, so these two dropdowns ARE
      # the preset — asking for the slug and then for a depth override made the
      # same dimension answerable twice, and the two answers could disagree.
      # (They did: an override changed `depth` alone while output_path, budget
      # and reasoning model stayed on the preset's, so a "thorough" run got a
      # quick run's budget and overwrote the quick run's output.)
      #
      # The resolve step crosses these options and hard-fails if the product
      # and threat-model-presets.json disagree, so adding a target or depth to
      # one without the other is loud, never silent.
      target:
        description: "Repository to scan"
        type: choice
        required: true
        options:
          - juice-shop
          - spring
          - python
          - ai
      depth:
        description: "Assessment depth (also selects budget and reasoning model)"
        type: choice
        required: true
        default: quick
        options: [quick, standard, thorough]
      repair:
        description: "If this run fails: triage the plugin failure, fix it, and open a PR"
        type: boolean
        required: false
        default: false
      repair_run_id:
        description: "Repair-only: run id of an earlier failed run. Set this and NO scan happens - the agent works off that run's artifacts."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  security-events: write   # optional SARIF upload (cross-repo; see note below)

concurrency:
  # Never run the same preset twice at once (shared output dir semantics).
  # A repair-only dispatch scans nothing, so it gets its own group per target run.
  group: threat-model-${{ inputs.repair_run_id != '' && format('repair-{0}', inputs.repair_run_id) || format('{0}-{1}', inputs.target, inputs.depth) }}
  cancel-in-progress: false

jobs:
  threat-model:
    # Repair-only dispatch scans nothing.
    if: inputs.repair_run_id == ''
    runs-on: ubuntu-latest
    timeout-minutes: 180   # job notbremse; --max-duration is the per-run cap
    steps:
      # 0) Auth preflight. The token is not consumed until step 7, so without
      #    this the run spends a target checkout, an npm install and the
      #    permission setup before dying on an auth error from inside
      #    run-headless.sh. Fail here instead, with the fix in the message.
      - name: Preflight — subscription auth
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::secret CLAUDE_CODE_OAUTH_TOKEN is not set — the scan cannot authenticate. Create one with 'claude setup-token', then 'gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo ${{ github.repository }}'."
            exit 1
          fi
          echo "subscription token present"

      # 1) Plugin (this repo) — the branch you dispatched from.
      - name: Checkout appsec-advisor (plugin)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}
          path: .

      # 2) Resolve the preset into step outputs. Nothing is overridden here: a
      #    preset is applied whole or not at all, so depth always travels with
      #    the budget, output path and reasoning model that were chosen for it.
      - name: Resolve preset
        id: preset
        env:
          TARGET: ${{ inputs.target }}
          DEPTH: ${{ inputs.depth }}
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import json, os, sys
          import yaml

          target, depth = os.environ["TARGET"], os.environ["DEPTH"]
          presets = json.load(open(".github/threat-model-presets.json"))
          keys = {k for k in presets if not k.startswith("_")}

          # Drift guard: the dropdowns are the offered set, presets.json is the
          # implemented set. A dropdown cannot be filled at run time, so read
          # the options back out of this very file rather than mirroring them.
          # PyYAML maps the `on:` key to True.
          wf = yaml.safe_load(open(".github/workflows/threat-model-dispatch.yml"))
          trigger = wf.get("on") or wf[True]
          inputs_ = trigger["workflow_dispatch"]["inputs"]
          offered = {
              f"{t}-{d}"
              for t in inputs_["target"]["options"]
              for d in inputs_["depth"]["options"]
          }
          if offered != keys:
              missing = sorted(offered - keys)
              extra = sorted(keys - offered)
              if missing:
                  print(f"::error::dropdowns offer presets that do not exist: {', '.join(missing)}")
              if extra:
                  print(f"::error::threat-model-presets.json has presets no dropdown offers: {', '.join(extra)}")
              print("::error::the `target` x `depth` options and "
                    ".github/threat-model-presets.json must stay in sync")
              sys.exit(1)

          use_case = f"{target}-{depth}"
          p = presets[use_case]
          mode = p["mode"]
          assert p["assessment_depth"] == depth, (
              f"preset '{use_case}' declares depth '{p['assessment_depth']}'"
          )

          out = {
              "use_case": use_case,
              "target_repo": p["target_repo"],
              "target_ref": p.get("target_ref", "") or "",
              "mode": mode,
              "depth": depth,
              "reasoning_model": p.get("reasoning_model", ""),
              "session_model": p.get("session_model", ""),
              "requirements": "true" if p.get("requirements") else "false",
              "sarif": "true" if p.get("sarif") else "false",
              "output_path": p["output_path"],
              "max_duration_sec": str(p.get("max_duration_sec", "")),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              for k, v in out.items():
                  fh.write(f"{k}={v}\n")
          print(f"Resolved '{use_case}': repo={out['target_repo']}@{out['target_ref'] or 'default'} "
                f"mode={mode} depth={depth} reasoning={out['reasoning_model']} session={out['session_model']}")
          PY

      # 3) Target repo (external, untrusted) — into ./target.
      - name: Checkout target repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ steps.preset.outputs.target_repo }}
          ref: ${{ steps.preset.outputs.target_ref }}
          path: target
          persist-credentials: false

      # 4) Sanitize the untrusted checkout: strip repo-owned Claude Code / IDE
      #    config that the host tool would load before the plugin runs. These are
      #    exactly the injection vectors preflight_untrusted.py refuses on — remove
      #    them so the untrusted preflight passes, and flag any escaping symlinks.
      - name: Sanitize untrusted checkout
        run: |
          set -euo pipefail
          rm -rf  target/.claude
          rm -f   target/.vscode/tasks.json
          rm -f   target/.devcontainer/devcontainer.json
          echo "Stripped repo-owned .claude / IDE task config from ./target"
          # Escaping symlinks are not auto-removed (would change scan scope); the
          # untrusted preflight will abort on them. Surface any for triage:
          esc=$(find target -type l -printf '%p -> %l\n' 2>/dev/null || true)
          [ -n "$esc" ] && { echo "::warning::symlinks present in target (untrusted preflight may reject):"; echo "$esc"; } || echo "no symlinks in target"

      - name: Install toolchain
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2   # latest 2.x: fixes + API/model compat, no surprise major bump
          python3 -m pip install --quiet pyyaml jsonschema
          claude --version

      # 5) Write required CC permissions to USER scope (~/.claude/settings.json)
      #    — NOT into ./target (that would trip the untrusted preflight).
      - name: Write permissions (user scope)
        run: make setup-target REPO="$PWD/target" SCOPE=user

      # 6) Publish the effective (user-scope) permission allow-list for review.
      #    check_permissions.py writes absolute, checkout/temp-specific paths, so
      #    a byte-comparable baseline is impractical — this step is informational:
      #    it redacts the volatile path prefixes and surfaces the tool/command
      #    shape in the job summary + artifact so the blast radius stays reviewable.
      - name: Publish effective permissions
        run: |
          python3 - <<'PY'
          import json, os, re, pathlib

          settings = pathlib.Path.home() / ".claude" / "settings.json"
          perms = {}
          if settings.is_file():
              perms = (json.loads(settings.read_text()) or {}).get("permissions", {}) or {}

          ws   = os.environ.get("GITHUB_WORKSPACE", "")
          tmp  = os.environ.get("RUNNER_TEMP", "")
          home = str(pathlib.Path.home())

          def redact(s: str) -> str:
              for pat, rep in ((ws, "<workspace>"), (tmp, "<tmp>"), (home, "<home>")):
                  if pat:
                      s = s.replace(pat, rep)
              return re.sub(r"/tmp/[^/]+", "<tmp>", s)

          eff = {k: sorted(redact(x) for x in (perms.get(k) or [])) for k in ("allow", "ask", "deny")}
          txt = json.dumps(eff, indent=2, sort_keys=True) + "\n"
          pathlib.Path("effective-permissions.json").write_text(txt)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as fh:
                  fh.write("### Effective permissions (user scope; volatile paths redacted)\n\n```json\n" + txt + "```\n")
          print(f"allow={len(eff['allow'])} ask={len(eff['ask'])} deny={len(eff['deny'])}")
          PY

      # 7) The scan. Untrusted mode + economy defaults from the preset.
      - name: Run threat model
        env:
          # Subscription billing. Do NOT add ANTHROPIC_API_KEY (would override).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          OUT="$PWD/${{ steps.preset.outputs.output_path }}"
          mkdir -p "$OUT"

          MODE_FLAG=""
          case "${{ steps.preset.outputs.mode }}" in
            full)        MODE_FLAG="--full" ;;
            incremental) MODE_FLAG="--incremental" ;;
            dry-run)     MODE_FLAG="--dry-run" ;;
            *) echo "::error::unknown mode '${{ steps.preset.outputs.mode }}'"; exit 1 ;;
          esac

          ARGS=( --repo "$PWD/target" --output "$OUT"
                 --assessment-depth "${{ steps.preset.outputs.depth }}"
                 --trust-mode untrusted
                 $MODE_FLAG )
          [ -n "${{ steps.preset.outputs.session_model }}" ]   && ARGS+=( --model "${{ steps.preset.outputs.session_model }}" )
          [ -n "${{ steps.preset.outputs.reasoning_model }}" ] && ARGS+=( --reasoning-model "${{ steps.preset.outputs.reasoning_model }}" )
          [ -n "${{ steps.preset.outputs.max_duration_sec }}" ] && ARGS+=( --max-duration "${{ steps.preset.outputs.max_duration_sec }}" )
          [ "${{ steps.preset.outputs.sarif }}" = "true" ]        && ARGS+=( --sarif )
          [ "${{ steps.preset.outputs.requirements }}" = "true" ] && ARGS+=( --requirements )

          echo "run-headless.sh ${ARGS[*]}"
          ./scripts/run-headless.sh "${ARGS[@]}"

          cp -f effective-permissions.json "$OUT/" 2>/dev/null || true

      # 8) Publish the report (md / yaml / sarif / run log / permissions).
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: threat-model-${{ steps.preset.outputs.use_case }}
          path: ${{ steps.preset.outputs.output_path }}/
          # The run's diagnostic state is dot-prefixed (.run-issues.json,
          # .agent-run.log, .appsec-trace.log, ...) and upload-artifact has
          # excluded hidden files by default since v4.4. Without this the
          # artifact holds the report but no evidence of why a run failed —
          # which is what `fix-run-issues` and the repair job both read.
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 90

      # 9) Optional: surface findings in this repo's Code scanning tab.
      #    NOTE: SARIF URIs point at ./target files that don't exist in this repo,
      #    so alerts list but source links won't resolve. Non-fatal.
      #    Only on a green scan: a failed run has no SARIF to upload, and
      #    always() turned every failure into a second, misleading "Path does
      #    not exist" error on top of the real one.
      - name: Upload SARIF to Code Scanning
        if: ${{ success() && steps.preset.outputs.sarif == 'true' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          sarif_file: ${{ steps.preset.outputs.output_path }}/threat-model.sarif.json
          category: threat-model-${{ steps.preset.outputs.use_case }}

  # Repair a failed run. There is no oracle here — the run is red exactly when
  # the pipeline broke — so every failure is producer-side by definition and the
  # exit-code classification the fixture workflow needs does not apply.
  #
  # The artifacts of THIS workflow derive from scanning an untrusted external
  # repository, so the shared repair workflow treats them as a pointer to where
  # a defect is, never as instructions, and gates the resulting change on an
  # in-repo regression test. See .github/workflows/repair-agent.yml.
  repair:
    needs: threat-model
    if: >-
      always() &&
      (inputs.repair_run_id != '' ||
       (inputs.repair && needs.threat-model.result == 'failure'))
    permissions:
      contents: write        # push the repair branch
      pull-requests: write   # open the PR
    uses: ./.github/workflows/repair-agent.yml
    with:
      run_id: ${{ inputs.repair_run_id != '' && inputs.repair_run_id || github.run_id }}
      artifact_pattern: threat-model-*
      plugin_ref: ${{ github.ref_name }}
    secrets: inherit
