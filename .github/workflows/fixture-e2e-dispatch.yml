name: Fixture E2E (Dispatch)

# Manually dispatched fixture E2E: run the threat-model pipeline against one or
# all fixtures from matthiasrohr/appsec-advisor-fixtures and verify each report
# against that fixture's out-of-repo oracle.
#
# Deliberately separate from threat-model-dispatch.yml. That workflow scans a
# real external app (insecure-spring-app, juice-shop, ...) untrusted and produces
# a report; this one runs our own trusted fixtures and asserts recall against an
# oracle. Different inputs, different pass criterion, no shared preset file.
#
# Fixture selection: the `fixture` input is a dropdown, so GitHub cannot fill it
# from the fixtures repo at run time. The `options:` block below is the single
# place the list is written down - the resolve job reads it back out of this file
# and hard-fails when it drifts from what <fixture-root>/repos contains, so
# adding a fixture to matthiasrohr/appsec-advisor-fixtures without updating the
# dropdown is loud, never silent. Paths and driver are still DERIVED from the
# checkout, not enumerated.
#
# Repair mode: `repair: true` (or `repair_run_id` for an earlier run) hands a
# run to .github/workflows/repair-agent.yml, shared with
# threat-model-dispatch.yml. The subject is a run that PASSED (exit 0) while
# recording errors or auto-recovering from them - a green report resting on a
# runtime workaround, with the producer defect still in place. A run that broke
# is not offered: it never produced the diagnosis the agent works from. Nor is
# an oracle recall miss (exit 4) - whether the plugin or the oracle is wrong is
# not machine-decidable.
#
# Auth: subscription billing via the CLAUDE_CODE_OAUTH_TOKEN secret
# (`claude setup-token`). ANTHROPIC_API_KEY is deliberately NOT set — it would
# take precedence and switch billing to per-token.

on:
  workflow_dispatch:
    inputs:
      fixture:
        description: "Fixture to run ('all' = every single-repo fixture, ~9 scans)"
        type: choice
        required: true
        # No `default:` — GitHub preselects the first option, so the first
        # option must be the cheap one. `all` sat here and fans out ~9 full
        # scans; a dispatch whose dropdown was never touched (or whose
        # selection did not register) silently spent the lot. `all` now has to
        # be chosen deliberately, from the bottom of the list.
        #
        # This is also the only place the fixture list is written down. The
        # resolve job reads these options back and fails the run if they and
        # repos/ disagree; it filters `all` by value, not by position.
        options:
          - spring-boot-threat-fixture
          - python-threat-fixture
          - rust-threat-fixture
          - go-threat-fixture
          - node-typescript-threat-fixture
          - python-langchain-llm-threat-fixture
          - aws-terraform-threat-fixture
          - npm-supply-chain-threat-fixture
          - fifty-service-threat-fixture
          - cross-repo-threat-fixture
          - all
      depth:
        description: "Assessment depth"
        type: choice
        required: true
        default: quick
        options: [quick, standard, thorough]
      # No plugin_ref input: the branch to run is GitHub's own "Use workflow
      # from" selector. Both dev and main carry this workflow, so any branch
      # you can dispatch from is a branch whose plugin code gets checked out.
      # fixtures_ref has no such selector — it lives in another repository.
      fixtures_ref:
        description: "appsec-advisor-fixtures ref to test against (blank = default branch)"
        type: string
        required: false
        default: ""
      repair:
        description: "If this run finishes but auto-recovered from errors: fix those at the producer and open a PR"
        type: boolean
        required: false
        default: false
      repair_run_id:
        description: "Repair-only: run id of an earlier run. Set this and NO fixtures are scanned - the agent works off that run's artifacts."
        type: string
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  # Never run the same fixture/depth combination twice at once (shared output dir).
  # A repair-only dispatch scans nothing, so it gets its own group per target run
  # rather than colliding with a live scan of the same fixture/depth.
  group: fixture-e2e-${{ inputs.repair_run_id != '' && format('repair-{0}', inputs.repair_run_id) || format('{0}-{1}', inputs.fixture, inputs.depth) }}
  cancel-in-progress: false

jobs:
  # Discover the fixtures to run and turn them into a matrix. Driver and paths
  # are derived from the checkout, not hand-maintained: a fixture whose repos/
  # entry contains a consumer-api/ subdirectory is a cross-repo fixture.
  resolve:
    # Repair-only dispatch scans nothing.
    if: inputs.repair_run_id == ''
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      # Auth preflight. Every matrix job consumes the same token, so check it
      # once here: `fixture: all` otherwise fans out ten jobs that each redo a
      # checkout and an npm install only to die on the same auth error.
      - name: Preflight — subscription auth
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          tok="${CLAUDE_CODE_OAUTH_TOKEN:-}"
          if [ -z "$tok" ]; then
            echo "::error::secret CLAUDE_CODE_OAUTH_TOKEN is not set — the fixtures cannot authenticate. Create one with 'claude setup-token', then 'gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo ${{ github.repository }}'."
            exit 1
          fi
          # Subscription billing needs the OAuth token from `claude setup-token`
          # (sk-ant-oat...), not an API key (sk-ant-api...). The secret box takes
          # either, so the mistake otherwise surfaces as a bare "401 Invalid
          # bearer token" minutes into the run. Classify by prefix — never echo a
          # credential, not even masked.
          case "$tok" in
            sk-ant-oat*) shape=oauth ;;
            sk-ant-api*) shape=api-key ;;
            sk-ant-*)    shape=other-anthropic-credential ;;
            *)           shape=unrecognised ;;
          esac
          if [ "$shape" != oauth ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN holds a '$shape', not a subscription OAuth token — it must start with 'sk-ant-oat'. Run 'claude setup-token'. An API key belongs in ANTHROPIC_API_KEY and would switch billing to per-token, which this workflow deliberately avoids."
            exit 1
          fi
          if [ "${#tok}" -lt 40 ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN looks truncated (${#tok} characters) — re-run 'claude setup-token' and copy the whole value."
            exit 1
          fi
          echo "subscription OAuth token present (sk-ant-oat…, ${#tok} chars)"

      - name: Checkout appsec-advisor (plugin)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout appsec-advisor-fixtures
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: matthiasrohr/appsec-advisor-fixtures
          ref: ${{ inputs.fixtures_ref }}
          path: fixtures
          persist-credentials: false

      # The shape check cannot tell a well-formed token from an accepted one.
      # Settle it HERE, in resolve, rather than in the matrix: a rejected token
      # would otherwise be discovered independently by every fanned-out job,
      # each after its own checkout and npm install. One install here is the
      # cheaper trade the moment more than one fixture is selected.
      - name: Verify the token is accepted
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -uo pipefail
          npm install -g @anthropic-ai/claude-code@2 >/dev/null 2>&1
          out=$(claude -p "Reply with the single word: ok" --output-format text 2>&1)
          rc=$?
          if [ "$rc" -ne 0 ] || printf '%s' "$out" | grep -qiE '401|invalid bearer|not authenticated'; then
            echo "::error::the token is well-formed but Anthropic rejected it (claude exit $rc). Re-run 'claude setup-token' and update the CLAUDE_CODE_OAUTH_TOKEN secret; a token can be revoked or belong to a different account."
            printf '%s\n' "$out" | head -5
            exit 1
          fi
          echo "subscription auth accepted"

      - name: Discover fixtures
        id: discover
        env:
          FIXTURE: ${{ inputs.fixture }}
          DEPTH: ${{ inputs.depth }}
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import json, os, sys
          import yaml
          from pathlib import Path

          requested = os.environ["FIXTURE"].strip()
          depth = os.environ["DEPTH"]

          presets = json.load(open(".github/fixture-presets.json"))
          budget = presets["defaults"][depth]["max_duration_sec"]
          overrides = presets.get("overrides", {})

          # The dropdown is the single source of truth for which fixtures are
          # offered; read it back out of this very file rather than mirroring
          # the list somewhere a second time. PyYAML maps the `on:` key to True.
          wf = yaml.safe_load(open(".github/workflows/fixture-e2e-dispatch.yml"))
          trigger = wf.get("on") or wf[True]
          offered = [o for o in trigger["workflow_dispatch"]["inputs"]["fixture"]["options"] if o != "all"]

          repos = Path("fixtures/repos")
          if not repos.is_dir():
              print("::error::fixtures checkout has no repos/ directory")
              sys.exit(1)

          available = sorted(d.name for d in repos.iterdir() if d.is_dir())

          def layout(name):
              """Classify a fixture from its shape on disk — never a hand-kept list.

              A fixture directory holding only sub-repositories and no files of
              its own is a multi-repo fixture. Of those, only the consumer-api
              shape has a driver: scripts/e2e_cross_repo_fixture.sh hardwires
              FIXTURE_NAME/CONSUMER_NAME, so it cannot identify the entry point
              of any other multi-repo layout. Those are 'unsupported' — not
              broken, just waiting for a driver.
              """
              d = repos / name
              if (d / "consumer-api").is_dir():
                  return "cross-repo"
              if not any(p.is_file() for p in d.iterdir()):
                  return "unsupported"
              return "single"

          runnable = [f for f in available if layout(f) != "unsupported"]
          unsupported = [f for f in available if layout(f) == "unsupported"]
          for f in unsupported:
              print(f"::notice::'{f}' is a multi-repo fixture with no driver yet "
                    "(only the consumer-api layout is supported) — skipping it")

          # Drift guard: a dropdown cannot be filled at run time, so it can go
          # stale against the fixtures repo. Fail loudly instead of leaving a
          # fixture silently unselectable. Fixtures with no driver are neither
          # offered nor required — the notice above is the signal for those.
          new = [f for f in runnable if f not in offered]
          stale = [f for f in offered if f not in available]
          if new or stale:
              if new:
                  print(f"::error::fixtures repo has fixtures the dropdown does not offer: {', '.join(new)}")
              if stale:
                  print(f"::error::dropdown offers fixtures that no longer exist in repos/: {', '.join(stale)}")
              print("::error::update the `fixture` input options in "
                    ".github/workflows/fixture-e2e-dispatch.yml")
              sys.exit(1)

          if requested == "all":
              # Mirrors tests/e2e/run-fixture-suite.sh: single-repo fixtures only.
              selected = [f for f in available if layout(f) == "single"]
          elif requested in unsupported:
              print(f"::error::fixture '{requested}' is a multi-repo fixture with no driver. "
                    "scripts/e2e_cross_repo_fixture.sh only handles the consumer-api layout.")
              sys.exit(1)
          elif requested in available:
              selected = [requested]
          else:
              print(f"::error::fixture '{requested}' not found under repos/. Available: {', '.join(runnable)} (or 'all')")
              sys.exit(1)

          entries = []
          for fixture in selected:
              cross = layout(fixture) == "cross-repo"
              entries.append({
                  "fixture": fixture,
                  "driver": "cross-repo" if cross else "single",
                  "depth": depth,
                  "max_duration_sec": str(
                      overrides.get(fixture, {}).get(depth, {}).get("max_duration_sec", budget)
                  ),
                  "scan_repo": f"fixtures/repos/{fixture}/consumer-api" if cross else f"fixtures/repos/{fixture}",
                  "output_dir": f"fixtures/outputs/{fixture}-e2e",
              })

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write("matrix=" + json.dumps(entries) + "\n")
          print(f"depth={depth} jobs={len(entries)}")
          for e in entries:
              print(f"  - {e['fixture']} ({e['driver']}, {e['max_duration_sec']}s) -> {e['scan_repo']}")
          PY

  fixture-e2e:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 180   # job notbremse; --max-duration is the per-run cap
    strategy:
      fail-fast: false
      # One subscription token serves the whole matrix — keep concurrent Claude
      # sessions low so `fixture: all` does not trip rate limits.
      max-parallel: 2
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.matrix) }}
    steps:
      # 1) Plugin (this repo) — the branch you dispatched from.
      - name: Checkout appsec-advisor (plugin)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}
          path: .

      # 2) Fixture suite (repos/, oracles/, outputs/) — into ./fixtures.
      #    The oracle must stay outside the scanned repo; the drivers enforce it.
      - name: Checkout appsec-advisor-fixtures
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: matthiasrohr/appsec-advisor-fixtures
          ref: ${{ inputs.fixtures_ref }}
          path: fixtures
          persist-credentials: false

      - name: Install toolchain
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2   # latest 2.x: fixes + API/model compat, no surprise major bump
          python3 -m pip install --quiet pyyaml jsonschema
          claude --version

      # 3) Write required CC permissions to USER scope (~/.claude/settings.json).
      #    OUTPUT is passed because the fixture output dir lives under ./fixtures,
      #    not under the plugin checkout.
      - name: Write permissions (user scope)
        run: |
          make setup-target \
            REPO="$PWD/${{ matrix.scan_repo }}" \
            OUTPUT="$PWD/${{ matrix.output_dir }}" \
            SCOPE=user

      # 4) The run: pipeline + oracle verification. Exit codes are distinct
      #    (1 preflight, 2 pipeline, 3 missing artifacts, 4 oracle) and the
      #    repair job keys off exactly that: 1/2/3 are plugin failures it may
      #    fix, 4 is an oracle recall miss it only reports.
      #
      #    The driver is allowed to fail here; the exit code is recorded into the
      #    output dir (so it ships with the artifact) and re-raised afterwards.
      #    --clean-output wipes that dir first, hence the tee to RUNNER_TEMP.
      - name: Run fixture E2E
        env:
          # Subscription billing. Do NOT add ANTHROPIC_API_KEY (would override).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FIXTURE: ${{ matrix.fixture }}
          DEPTH: ${{ matrix.depth }}
          DRIVER: ${{ matrix.driver }}
        run: |
          set -uo pipefail
          rc=0
          case "${{ matrix.driver }}" in
            single)
              ./scripts/e2e_fixture.sh \
                --fixture "${{ matrix.fixture }}" \
                --fixture-root "$PWD/fixtures" \
                --depth "${{ matrix.depth }}" \
                --max-duration "${{ matrix.max_duration_sec }}" \
                --clean-output 2>&1 | tee "$RUNNER_TEMP/console.log" || rc=${PIPESTATUS[0]}
              ;;
            cross-repo)
              ./scripts/e2e_cross_repo_fixture.sh \
                --fixture-root "$PWD/fixtures" \
                --depth "${{ matrix.depth }}" \
                --max-duration "${{ matrix.max_duration_sec }}" \
                --clean-output 2>&1 | tee "$RUNNER_TEMP/console.log" || rc=${PIPESTATUS[0]}
              ;;
            *)
              echo "::error::unknown driver '${{ matrix.driver }}'"; exit 1 ;;
          esac

          out="$PWD/${{ matrix.output_dir }}"
          mkdir -p "$out"
          cp "$RUNNER_TEMP/console.log" "$out/e2e-console.log" 2>/dev/null || true
          python3 - "$out/e2e-result.json" "$rc" <<'PY'
          import json, os, sys
          path, rc = sys.argv[1], int(sys.argv[2])
          kinds = {0: "pass", 1: "preflight", 2: "pipeline", 3: "missing_artifacts", 4: "oracle"}
          json.dump({
              "fixture": os.environ["FIXTURE"],
              "depth": os.environ["DEPTH"],
              "driver": os.environ["DRIVER"],
              "exit_code": rc,
              "failure_kind": kinds.get(rc, "unknown"),
              # 1/2/3 are producer-side; 4 is a recall miss, not machine-decidable.
              "repairable": rc in (1, 2, 3),
          }, open(path, "w"), indent=2)
          PY
          exit "$rc"

      # 5) Publish the generated report (md / yaml / sarif / run log) so an
      #    oracle failure is triageable without a local rerun. `always()` is the
      #    point: the interesting case is the failing one.
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          # Must be unique per matrix job.
          name: fixture-e2e-${{ matrix.fixture }}-${{ matrix.depth }}
          path: ${{ matrix.output_dir }}/
          # The entire diagnostic state of a run is dot-prefixed (.run-issues.json,
          # .agent-run.log, .appsec-trace.log, .appsec-checkpoint, ...) and
          # upload-artifact has excluded hidden files by default since v4.4.
          # Without this the artifact holds the report but not a single line of
          # evidence for why the run failed — and both `fix-run-issues` locally
          # and the repair job below read exactly those files.
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 30

  # Repair: triage a failed run, fix the producer, verify, open a PR.
  #
  # Two entry points, both landing here:
  #   a) same run   - dispatch with repair: true; runs only if fixture-e2e failed
  #   b) after the fact - dispatch with repair_run_id: <id of an earlier red run>
  #      Nothing is scanned; the agent works off that run's artifacts (30d
  #      retention). This is the answer to "I dispatched with repair: false".
  repair:
    needs: fixture-e2e
    # Deliberately NOT gated on failure. A run that broke never produced the
    # diagnosis the agent works from; the repair subject is a run that finished
    # green while quietly retrying and auto-repairing its way there. The
    # eligibility decision lives in one place — the triage step of
    # repair-agent.yml — because it needs the artifacts to make it. A matrix
    # where some fixtures qualify and others do not is therefore handled per
    # fixture, not by this job-level condition.
    if: >-
      always() &&
      (inputs.repair_run_id != '' || inputs.repair)
    permissions:
      contents: write        # push the repair branch
      pull-requests: write   # open the PR
    uses: ./.github/workflows/repair-agent.yml
    with:
      run_id: ${{ inputs.repair_run_id != '' && inputs.repair_run_id || github.run_id }}
      artifact_pattern: fixture-e2e-*
      plugin_ref: ${{ github.ref_name }}
    secrets: inherit
