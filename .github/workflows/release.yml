name: release

# Fires when a v* tag is pushed (the release act in the GitFlow model:
# dev → main merge, then tag main). Re-runs the full gate on the exact
# tagged commit, asserts version/tag/changelog consistency, then publishes
# a GitHub release. Pre-releases (alpha/beta/rc tags) are marked --prerelease.

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          pip install -r scripts/requirements.txt
          pip install ruff==0.11.13

      - name: Release gate (check + version/tag/changelog)
        run: make release-check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          prerelease=""
          case "$version" in
            *a*|*b*|*rc*|*-*) prerelease="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "See CHANGELOG.md for the full list of changes." \
            $prerelease
