- local_id: container-infra-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-506
  title: Supply Chain Code Execution via Unguarded npm Lifecycle Hooks (Dockerfile:4)
  affected_parameter: null
  scenario: '`Dockerfile:4` runs `npm install --production` without `--ignore-scripts`. Any dependency (or transitive dependency) that includes a `preinstall`, `install`, or `postinstall` lifecycle hook executes arbitrary shell commands inside the build container. With no `package-lock.json` (SC-002 violation), the resolved dependency graph is non-deterministic across builds — a dependency-confusion attack or a malicious version bump can inject a hook that exfiltrates build secrets, adds backdoor binaries to the image layer, or overwrites `server.js` before `COPY . .` is applied. The attacker targets the package registry namespace, not the running container.'
  evidence_summary: '`Dockerfile:4` calls `npm install --production` with no `--ignore-scripts` flag, and no `package-lock.json` is present in the repository to pin the resolved version graph.'
  impact_description: Attacker-controlled code runs inside the build environment and is baked into the published container image, affecting every downstream deployment.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: npm install uses `--production` to exclude devDependencies. No lockfile, no `--ignore-scripts`, no SCA scanner.
  mitigation_title: Add --ignore-scripts to npm install and commit a package-lock.json in Dockerfile
  remediation:
    effort: Low
    steps:
    - Change `Dockerfile:4` to `RUN npm ci --omit=dev --ignore-scripts` (requires a committed `package-lock.json`).
    - Commit `package-lock.json` to the repository and add a CI step that fails the build when the lockfile is out of sync (`npm ci` exits non-zero when it is).
    - Add a `.npmrc` with `ignore-scripts=true` as defense-in-depth so `npm install` invocations elsewhere also skip hooks.
    code_example: '# Dockerfile

      FROM node:20-alpine@sha256:<digest>

      WORKDIR /app

      COPY package.json package-lock.json ./

      RUN npm ci --omit=dev --ignore-scripts

      COPY . .

      EXPOSE 3000

      CMD ["node", "server.js"]'
    reference: CWE-506
  evidence:
  - file: Dockerfile
    line: 4
  evidence_check: verified
