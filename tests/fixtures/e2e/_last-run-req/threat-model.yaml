- local_id: express-app-006
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: No Rate Limiting on Any HTTP Endpoint (package.json)
  affected_parameter: null
  scenario: The application has no rate-limiting middleware (AC-003 FAIL — no `express-rate-limit` or equivalent in package.json). An attacker or automated scanner can send an unbounded number of requests per second to any endpoint. Combined with the absence of authentication, routes that perform database queries via Sequelize can be hammered to exhaust database connection pool limits or saturate the Node.js event loop. A single-threaded Node.js process with no request queue limits will degrade for all users once the event loop is saturated.
  evidence_summary: package.json contains no rate-limiting package; requirements violation AC-003 confirms absence.
  impact_description: Attacker can render the application unavailable by flooding endpoints with requests, exhausting the DB connection pool or CPU.
