- local_id: container-infra-002
  threat_category_id: TH-14
  additional_categories: []
  stride: Spoofing
  cwe: CWE-1104
  title: Mutable Base Image Tag Allows Undetected Image Substitution (Dockerfile:1)
  affected_parameter: null
  scenario: '`Dockerfile:1` specifies `FROM node:20-alpine` using a mutable floating tag. Docker Hub resolves this tag at build time to whatever image is currently published under that name. If the upstream `node:20-alpine` image is compromised, rotated, or poisoned via a registry supply-chain attack, the next `docker build` silently adopts the malicious image without any digest mismatch error. This satisfies the IF-007 FAIL from requirements-violations: no SHA256 digest pins the expected manifest. An attacker with registry write access (or a compromised Docker Hub account) can substitute the base image and execute code in every new build.'
  evidence_summary: '`Dockerfile:1` uses `FROM node:20-alpine` with no `@sha256:` digest, making the base image layer non-deterministic and unverifiable.'
  impact_description: A malicious base image is incorporated into the production container image without detection, providing persistent code execution in all deployments built after the substitution.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None — no digest pinning, no image signing (Cosign/Notary) configured.
  mitigation_title: Pin base image to immutable SHA256 digest in Dockerfile
  remediation:
    effort: Low
    steps:
    - Replace `FROM node:20-alpine` with `FROM node:20-alpine@sha256:<current-digest>` — obtain via `docker buildx imagetools inspect node:20-alpine`.
    - Add a Renovate or Dependabot `docker` datasource configuration to open PRs when a new Node 20 LTS Alpine image digest is published, keeping the pin current.
    - Optionally verify image signatures with `cosign verify node:20-alpine@sha256:<digest>` in CI before the build step.
    code_example: '# Dockerfile

      FROM node:20-alpine@sha256:a8560b36e8aeef2b3d6571aa5b7a4e0b1c5f6da1c2a3e4f5b6c7d8e9f0a1b2c3'
    reference: IF-007
  evidence:
  - file: Dockerfile
    line: 1
  evidence_check: verified
  controls_absent_evidence: []
