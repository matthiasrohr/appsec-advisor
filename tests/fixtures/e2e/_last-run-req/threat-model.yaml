- local_id: express-app-004
  threat_category_id: TH-16
  additional_categories: []
  stride: Repudiation
  cwe: CWE-778
  title: No Security Event Logging All Operations Leave Zero Forensic Tra… (package.json)
  affected_parameter: null
  scenario: The application has no logging library in its dependencies (LM-001 FAIL — no morgan, winston, or pino). Express's built-in error handling writes nothing structured. Authentication failures, data modifications, and access control violations are never recorded. After a breach, security teams have no request log, no audit trail, and no timeline to reconstruct the attack. Combined with missing authentication, an attacker operates in complete darkness from the defender's perspective.
  evidence_summary: package.json lists no logging dependency; requirements violation LM-001 confirms absence.
  impact_description: Breach investigation is impossible; attackers can exfiltrate data or escalate privilege with no evidence left behind.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None
  mitigation_title: Integrate structured request and security-event logging via pino or winston
  remediation:
    effort: Low
    steps:
    - Add `pino` and `pino-http` to dependencies; mount `app.use(pinoHttp())` as the first middleware to capture every request, response status, latency, and caller IP.
    - Log security events (auth failures, permission denials, input validation rejections) at `warn` or `error` level with actor identity, action, resource, and timestamp.
    - Ship logs to an append-only sink (stdout captured by container runtime → forwarded to a SIEM) so they cannot be tampered with from within the application.
    code_example: '```js

      const pino = require(''pino'');

      const pinoHttp = require(''pino-http'');

      const logger = pino({ level: ''info'' });

      app.use(pinoHttp({ logger }));

      // Security event example:

      logger.warn({ actor: req.user?.id, action: ''login_failure'', ip: req.ip }, ''Auth failed'');

      ```'
    reference: '[LM-001]'
