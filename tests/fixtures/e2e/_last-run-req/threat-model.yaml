- local_id: container-infra-003
  threat_category_id: TH-17
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-200
  title: Build Context Leaks Sensitive Files Into Image Layer (Dockerfile:5)
  affected_parameter: null
  scenario: '`Dockerfile:5` runs `COPY . .`, which copies the entire build context (the directory where `docker build` is invoked) into `/app`. No `.dockerignore` file exists in the repository. If the developer''s working directory contains `.env`, `.env.local`, private key files (`*.pem`, `id_rsa`), or AWS/GCP credential files, these are baked into the image layer. Even if the files are removed in a later `RUN` instruction, they remain recoverable from the layer history via `docker image save` or a registry pull. Any user with `docker pull` access to the registry can read the secrets by inspecting the layer tarball.'
  evidence_summary: No `.dockerignore` exists and `Dockerfile:5` copies the entire build context, exposing any local credential or configuration file present at build time as a permanent image layer.
  impact_description: Secrets embedded in the image layer are recoverable by any party with registry read access, including CI runners, all developers, and external attackers if the registry is public.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no .dockerignore, no multi-stage build to separate build and runtime contexts.
  mitigation_title: Add .dockerignore to exclude sensitive files from the Docker build context
  remediation:
    effort: Low
    steps:
    - 'Create a `.dockerignore` file at the repository root excluding: `.env*`, `*.pem`, `*.key`, `.git/`, `node_modules/`, and any credential files.'
    - Convert to a multi-stage build so build-time secrets never touch the final image layer — use `--mount=type=secret` (BuildKit) to inject secrets at build time without persisting them.
    - Audit existing published images for leaked secrets using `docker history --no-trunc <image>` and revoke any credentials found.
    code_example: '# .dockerignore

      .env

      .env.*

      *.pem

      *.key

      .git

      node_modules

      .npmrc'
    reference: CWE-200
  evidence:
