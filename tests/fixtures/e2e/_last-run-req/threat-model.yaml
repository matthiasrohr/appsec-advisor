- local_id: express-app-008
  threat_category_id: TH-14
  additional_categories:
  - TH-03
  stride: Tampering
  cwe: CWE-346
  title: Absent CORS Policy Allows Cross Origin State Changing Requests (package.json)
  affected_parameter: null
  scenario: The application has no CORS configuration (WEB-003 FAIL — no `cors` package in dependencies). Express by default does not set any `Access-Control-Allow-Origin` header, which means browsers will block cross-origin reads — but the absence of an explicit restrictive policy leaves the door open for server-side misconfigurations or future additions of wildcard CORS. More critically, pre-flight-exempt simple requests (GET, POST with `application/x-www-form-urlencoded`) are sent by the browser without a pre-flight check and can modify state. Without a defined allowlist, any origin can trigger these.
  evidence_summary: package.json lists no `cors` package; requirements violation WEB-003 confirms absence of CORS configuration.
  impact_description: Malicious third-party sites can issue simple cross-origin requests to state-changing endpoints; future wildcard CORS misconfiguration would fully open the API to cross-origin credential theft.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None
  mitigation_title: Configure restrictive CORS allowlist via the cors middleware
  remediation:
    effort: Low
    steps:
    - 'Install `cors` and configure it with an explicit `origin` allowlist from environment variables: `app.use(cors({ origin: process.env.ALLOWED_ORIGINS?.split('',''), credentials: true }))`.'
    - 'Never set `origin: ''*''` when `credentials: true` — browsers block it and it is unsafe.'
    - Restrict `methods` to only the HTTP verbs each endpoint actually uses.
    code_example: "```js\nconst cors = require('cors');\napp.use(cors({\n  origin: process.env.ALLOWED_ORIGINS.split(','),\n  methods: ['GET','POST','PUT','DELETE'],\n  credentials: true\n}));\n```"
    reference: '[WEB-003]'
  evidence:
  - file: package.json
    line: 5
  evidence_check: verified
  controls_absent_evidence:
  - pattern: '"cors"'
    search_paths:
    - package.json
    hit_count: 0
