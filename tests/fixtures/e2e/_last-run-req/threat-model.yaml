- local_id: express-app-005
  threat_category_id: TH-03
  additional_categories:
  - TH-17
  stride: Information Disclosure
  cwe: CWE-319
  title: Plaintext HTTP Exposure on Port 3000 No TLS (Dockerfile)
  affected_parameter: null
  scenario: The Dockerfile exposes port 3000 and starts the server with `node server.js` with no TLS termination in the application layer and no reference to an HTTPS proxy or load balancer. Requirements violations DP-006 and WEB-005 confirm that no TLS is configured. All HTTP traffic between clients and the container — including credentials, session tokens, and any sensitive data — is transmitted in cleartext and can be intercepted by any on-path observer (ISP, network switch, cloud MITM).
  evidence_summary: Dockerfile `EXPOSE 3000` with `CMD ["node", "server.js"]` and no TLS-related package in package.json.
  impact_description: Credentials and session tokens are exposed to passive network eavesdropping; HSTS cannot be enforced without HTTPS.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None
  mitigation_title: Terminate TLS at the container ingress or reverse proxy
  remediation:
    effort: Medium
    steps:
    - 'Place a TLS-terminating reverse proxy (nginx, Caddy, or AWS ALB) in front of the Express container; configure it to redirect HTTP→HTTPS and set `Strict-Transport-Security: max-age=31536000; includeSubDomains`.'
    - Alternatively, add the `https` Node.js built-in with a certificate (Let's Encrypt via `greenlock-express`) directly to server.js and update the Dockerfile to `EXPOSE 443`.
    - 'Ensure `helmet()` is added so the HSTS header is sent on every response: `app.use(helmet.hsts({ maxAge: 31536000 }))`.'
    code_example: null
    reference: '[DP-006]'
