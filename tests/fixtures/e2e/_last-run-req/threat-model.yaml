- local_id: express-app-003
  threat_category_id: TH-15
  additional_categories: []
  stride: Tampering
  cwe: CWE-352
  title: No CSRF Protection on State Changing Endpoints (package.json)
  affected_parameter: null
  scenario: The application ships with no CSRF protection (WEB-001 FAIL — no `csurf` or equivalent). Any state-changing POST/PUT/DELETE endpoint can be triggered by a third-party page via a forged form or AJAX request. Because there is also no SameSite cookie policy (no session library) and no CORS restriction, a malicious page visited by an authenticated user (once authentication is added) can issue cross-origin state-changing requests that the browser will relay with any ambient credentials.
  evidence_summary: package.json contains no anti-CSRF library; requirements violation WEB-001 confirms absence.
  impact_description: Attacker-controlled third-party page can silently perform any write operation on behalf of a logged-in user.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None
  mitigation_title: Add CSRF token middleware to all state-changing Express routes
  remediation:
    effort: Medium
    steps:
    - Install `csrf` (replacement for deprecated `csurf`) and generate a per-session token; embed it in forms and validate it on every POST/PUT/PATCH/DELETE handler.
    - Set `SameSite=Strict` on session cookies to provide defense-in-depth against cross-origin request forgery.
    - 'For API-only endpoints that use `Authorization: Bearer` headers (not cookies), CSRF is mitigated by the custom header itself — document this as the mitigation for those routes and skip token checks.'
    code_example: null
    reference: '[WEB-001]'
  evidence:
