- local_id: express-app-002
  threat_category_id: TH-05
  additional_categories:
  - TH-01
  stride: Tampering
  cwe: CWE-1321
  title: Prototype Pollution via lodash _.merge on Untrusted Input (package.json)
  affected_parameter: null
  scenario: 'lodash version 4.17.10 is vulnerable to prototype pollution via `_.merge` (CVE-2019-10744, CVSS 9.8) and `_.zipObjectDeep` (CVE-2020-8203). When attacker-controlled JSON such as `{"__proto__": {"isAdmin": true}}` is passed to any code path that calls `_.merge(target, userInput)`, `Object.prototype` is modified globally for the Node.js process lifetime. All subsequently created plain objects inherit the injected property, silently bypassing authorization checks that test `obj.isAdmin` or similar role flags. In a server that also lacks input validation (IV-001 FAIL) and authentication (AC-004 FAIL), every HTTP request body is a direct injection vector.'
  evidence_summary: package.json pins lodash at 4.17.10, which is below the patched floor of 4.17.21 for both CVEs.
  impact_description: Attacker can escalate to administrator-equivalent access or crash the Node.js process by corrupting shared prototype state.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no input validation library present; no lodash version pin above 4.17.21.
  mitigation_title: Upgrade lodash to >=4.17.21 and validate object-merge inputs
  remediation:
    effort: Low
    steps:
    - Upgrade lodash to `^4.17.21` in package.json immediately; run `npm install` to regenerate lockfile.
    - Add input validation with `zod` or `joi` on all request body handlers that feed object-merge operations; reject payloads containing `__proto__`, `constructor`, or `prototype` keys.
    - Replace `_.merge` with `Object.assign` or structured-clone where deep merge of untrusted data is required — these do not walk prototype chains.
    - Enable `--frozen-lockfile` (npm ci) in the Docker build to prevent silent dependency upgrades.
    code_example: "```js\n// Sanitize before any merge\nfunction sanitize(obj) {\n  const banned = ['__proto__', 'constructor', 'prototype'];\n  return JSON.parse(JSON.stringify(obj, (k, v) =>\n    banned.includes(k) ? undefined : v));\n}\nconst safe = sanitize(req.body);\n_.merge(target, safe);\n```"
    reference: '[SC-002]'
  evidence:
  - file: package.json
    line: 7
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  component_name: Express Application
  source: stride
