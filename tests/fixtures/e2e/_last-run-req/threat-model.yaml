threats:
- local_id: express-app-001
  threat_category_id: TH-09
  additional_categories:
  - TH-13
  stride: Spoofing
  cwe: CWE-306
  title: Missing Authentication on All HTTP Endpoints (package.json)
  affected_parameter: null
  scenario: The Express application declares no authentication library (no passport, jsonwebtoken, express-session, or equivalent) in package.json. Every HTTP endpoint on port 3000 is reachable by any caller without identity verification. An unauthenticated attacker can invoke administrative operations, read other users' data, or modify records by sending direct HTTP requests — no credentials required. The trust boundary between Public Internet and the container is entirely uncontrolled.
  evidence_summary: package.json lists only express, sequelize, and lodash — no authentication or session management package is present.
  impact_description: Any caller on the network can perform any operation the application supports, effectively making every user an administrator.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None
  mitigation_title: Add authentication middleware to all Express routes
  remediation:
    effort: High
    steps:
    - Add `passport` + `passport-jwt` (or `jsonwebtoken` with a custom middleware) to package.json dependencies.
    - Create an `authenticate` middleware that validates the JWT on every request and attaches `req.user`; mount it globally via `app.use(authenticate)` before route registration.
    - 'For session-based flows add `express-session` with a strong secret from environment variables and set `cookie: { httpOnly: true, secure: true, sameSite: ''strict'' }`.'
    - Return HTTP 401 on missing/invalid credentials and HTTP 403 on insufficient privilege.
    code_example: "```js\nconst jwt = require('jsonwebtoken');\nfunction authenticate(req, res, next) {\n  const token = req.headers.authorization?.split(' ')[1];\n  if (!token) return res.status(401).json({ error: 'Unauthorized' });\n  try {\n    req.user = jwt.verify(token, process.env.JWT_SECRET, { algorithms: ['RS256'] });\n    next();\n  } catch { res.status(401).json({ error: 'Invalid token' }); }\n}\napp.use(authenticate);\n```"
    reference: '[AC-004]'
  evidence:
  - file: package.json
    line: 6
  evidence_check: verified
  controls_absent_evidence:
  - pattern: passport|jsonwebtoken|express-session|cookie-session
    search_paths:
