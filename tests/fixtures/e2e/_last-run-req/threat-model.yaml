- local_id: express-app-007
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-862
  title: No Role Based Access Control on Any Route (package.json)
  affected_parameter: null
  scenario: The application has no RBAC library and no authorization middleware in its dependency list (AC-002 FAIL). Even if authentication is added, there is no mechanism to prevent a low-privilege authenticated user from accessing administrative endpoints, executing privileged database operations, or reading records belonging to other users. Because server.js is absent from the repo, the absence of authorization guards cannot be confirmed at the code level — but no enabler library exists at all, making any route-level authorization impossible.
  evidence_summary: package.json contains no authorization library (no `casl`, `accesscontrol`, `rbac`, or framework-level guard package).
  impact_description: Any authenticated user (once authentication is added) can access all application functions regardless of assigned role.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None
  mitigation_title: Implement role-based authorization middleware on all protected Express routes
  remediation:
    effort: High
    steps:
    - Add `casl` or a custom `requireRole(role)` middleware to package.json; define a permission matrix mapping roles to allowed actions/resources.
    - Mount `requireRole('admin')` on administrative endpoints and `requireOwnership(req.user.id, resource.ownerId)` on user-scoped data routes.
    - Return HTTP 403 with no details when the caller lacks the required role; never leak which roles exist in error messages.
    - Add integration tests that verify a low-privilege token receives 403 on each admin endpoint.
    code_example: "```js\nfunction requireRole(...roles) {\n  return (req, res, next) => {\n    if (!req.user || !roles.includes(req.user.role))\n      return res.status(403).json({ error: 'Forbidden' });\n    next();\n  };\n}\napp.delete('/admin/users/:id', authenticate, requireRole('admin'), handler);\n```"
    reference: '[AC-002]'
  evidence:
  - file: package.json
    line: 5
  evidence_check: verified
  controls_absent_evidence:
