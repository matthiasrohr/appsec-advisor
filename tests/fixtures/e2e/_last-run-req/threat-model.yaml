- local_id: container-infra-005
  threat_category_id: TH-14
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: No Resource Limits Defined Container Can Exhaust Host Resources (Dockerfile)
  affected_parameter: null
  scenario: The `Dockerfile` defines no memory or CPU limits. No `ulimit` instructions are present, and there is no `docker-compose.yml` to enforce `deploy.resources.limits`. A single runaway request handler (e.g., a regex catastrophe, an infinite loop introduced by a supply-chain compromise, or a legitimate flood of requests) can consume all available host memory and CPU, causing the host and any co-located containers to become unresponsive. Because the process runs as root (see container-infra-004), even a `fork()` bomb would not be constrained by per-user process limits.
  evidence_summary: '`Dockerfile` contains no `ulimit` or resource-limit directive; no `docker-compose.yml` was found in the repository to apply runtime constraints.'
  impact_description: A single compromised or misbehaving container instance can render the entire host and co-located services unavailable.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None defined at the image level. Runtime enforcement depends entirely on undocumented deployment configuration.
  mitigation_title: Define memory and CPU resource limits in docker-compose.yml or container runtime configuration
  remediation:
    effort: Low
    steps:
    - Add a `docker-compose.yml` (or update deployment manifests) with `deploy.resources.limits.memory` and `deploy.resources.limits.cpus` set to values appropriate for the application's load profile.
    - Set `--memory-swap` equal to `--memory` to prevent swap exhaustion.
    - Add a health check (`HEALTHCHECK` in the Dockerfile) so the orchestrator can restart the container if it becomes unresponsive.
    code_example: "# docker-compose.yml\nservices:\n  app:\n    build: .\n    ports:\n      - \"3000:3000\"\n    deploy:\n      resources:\n        limits:\n          cpus: '0.50'\n          memory: 256M"
    reference: CWE-400
  evidence:
  - file: Dockerfile
    line: 6
  evidence_check: verified
  controls_absent_evidence:
  - pattern: ulimit\|memory\|cpus\|resources
    search_paths:
    - Dockerfile
    hit_count: 0
