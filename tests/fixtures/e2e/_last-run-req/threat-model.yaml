- local_id: container-infra-004
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-269
  title: Container Process Runs as Root Without USER Directive (Dockerfile)
  affected_parameter: null
  scenario: 'The `Dockerfile` contains no `USER` directive, so the Node.js process started by `CMD ["node", "server.js"]` runs as UID 0 (root) inside the container. This violates requirement IF-002. If an attacker achieves code execution through an application vulnerability (e.g., RCE via `eval()` or path traversal), they operate as root within the container. Root inside a default Docker container has near-full access to the container filesystem and can attempt container escape via kernel exploits, mounted volume abuse, or misconfigured `--privileged` flags added at runtime. The IF-002 FAIL evidence confirms: "Container runs as UID 0."'
  evidence_summary: '`Dockerfile` has no `USER` instruction before `CMD`, confirmed by direct inspection; the requirements-violations index records this as IF-002 FAIL.'
  impact_description: Post-exploitation pivot from application RCE to container root, maximising the blast radius of any code execution vulnerability and enabling container escape attempts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Docker namespace isolation provides partial containment. No additional security profiles (AppArmor, seccomp) are defined in the Dockerfile.
  mitigation_title: Add USER directive to run container process as non-root in Dockerfile
  remediation:
    effort: Low
    steps:
    - Add `RUN addgroup -S appgroup && adduser -S appuser -G appgroup` (Alpine syntax) to the Dockerfile before the `COPY` instructions.
    - Add `USER appuser` before the final `CMD` instruction so the Node.js process starts as a non-root user.
    - Verify the application can bind port 3000 as a non-root user (ports > 1024 require no special capability on Linux); if a privileged port is needed, use `setcap cap_net_bind_service` on the node binary instead of running as root.
    code_example: '# Dockerfile

      FROM node:20-alpine

      WORKDIR /app

      RUN addgroup -S appgroup && adduser -S appuser -G appgroup

      COPY package.json package-lock.json ./

      RUN npm ci --omit=dev --ignore-scripts

      COPY --chown=appuser:appgroup . .

      USER appuser

      EXPOSE 3000

      CMD ["node", "server.js"]'
    reference: IF-002
  evidence:
  - file: Dockerfile
    line: 7
  evidence_check: verified-prior
  controls_absent_evidence:
  - pattern: USER\s+
    search_paths:
    - Dockerfile
    hit_count: 0
