  stride: Information Disclosure
  cwe: CWE-598
  title: OAuth Access Token Exposed in URL Fragment — app.routing.ts:262
  affected_parameter: access_token
  scenario: 'The OAuth Implicit Flow (confirmed at login.component.ts:134 with `response_type=token`) causes Google to redirect
    back with the `access_token` in the URL fragment: `https://juice-shop.example/#access_token=ya29.xxx&token_type=Bearer`.
    The `oauthMatcher` at app.routing.ts:262 explicitly checks `path.includes(''#access_token='')` to trigger the OAuth callback
    handler. The access token in the URL fragment leaks through: (1) browser history — the token URL is stored in the browser''s
    History API; (2) HTTP Referer headers if the user navigates to a third-party resource on the same page; (3) server logs
    if any redirects occur. The token remains valid for its lifetime even after the OAuth session is closed.'
  evidence_summary: The `oauthMatcher` function checks `window.location.href.includes('#access_token=')`, confirming the OAuth
    flow delivers tokens in the URL fragment via the Implicit Flow pattern.
  impact_description: The OAuth access token leaks into browser history and potentially server logs, allowing passive attackers
    or malicious browser extensions to steal a valid Google access token.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — Implicit Flow is the configured grant type.
  mitigation_title: Eliminate token-in-fragment by migrating to Authorization Code Flow with PKCE
  remediation:
    effort: Medium
    steps:
    - Migrate from `response_type=token` to `response_type=code` as described in angular-spa-001 remediation.
    - The Authorization Code callback delivers a `code` parameter in the query string (not fragment), which is exchanged server-side
      for tokens — tokens never appear in the URL.
    - Ensure the BFF/backend exchange endpoint strips the `code` from the redirect URL immediately after use.
    code_example: null
    reference: CWE-598
