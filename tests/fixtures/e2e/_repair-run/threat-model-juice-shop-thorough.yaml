  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:24
  affected_parameter: socket connection
  scenario: 'Any internet-facing client can open a Socket.IO connection to ws://host:3000/socket.io/ without presenting any
    credential. The `io.on(''connection'', ...)` handler at line 24 applies no authentication middleware, JWT check, or session
    validation before processing the socket. An unauthenticated attacker can connect and (1) receive all pending `challenge
    solved` notifications buffered in-memory, (2) send `notification received` messages to delete others'' notifications,
    and (3) trigger challenge-verification handlers. The Socket.IO CORS option at line 20 (`origin: ''http://localhost:4200''`)
    only governs XHR polling CORS headers; native WebSocket upgrades bypass this restriction entirely in browsers that support
    the WS protocol directly.'
  evidence_summary: '`io.on(''connection'', (socket: any) => { ... })` at line 24 executes all message handlers with no preceding
    authentication check or middleware.'
  impact_description: Any external actor gains full access to real-time server state and all message handlers, indistinguishable
    from an authenticated session.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Socket.IO CORS option restricts `Access-Control-Allow-Origin` to localhost:4200 for XHR polling; no equivalent
    guard exists for native WebSocket upgrade connections.
  mitigation_title: Add authentication middleware to Socket.IO connection handler in registerWebsocketEvents.ts
  remediation:
    effort: Medium
    steps:
    - 'Implement a Socket.IO `io.use()` middleware that reads the JWT from the `auth` handshake parameter or `Authorization`
      header: `io.use((socket, next) => { const token = socket.handshake.auth.token; verify(token, secret, (err, decoded)
      => { if (err) return next(new Error(''Unauthorized'')); socket.data.user = decoded; next(); }); })`.'
    - 'Reject unauthenticated connections before the `connection` event fires; ensure the client sends the Bearer token in
      the Socket.IO handshake `auth` object: `io(''ws://host:3000'', { auth: { token: localStorage.getItem(''token'') } })`.'
    - Scope per-message handlers (`notification received`, `verifyLocalXssChallenge`, etc.) to check `socket.data.user` before
