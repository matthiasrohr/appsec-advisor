  stride: Information Disclosure
  cwe: CWE-200
  title: Unauthenticated Public Exposure of Encryption Key Directory — server.ts:277
  affected_parameter: null
  scenario: 'server.ts:277-278 registers `app.use(''/encryptionkeys'', serveIndex(''encryptionkeys'', { icons: true, view:
    ''details'' }))` and `app.use(''/encryptionkeys/:file'', serveKeyFiles())` with no authentication middleware. The directory
    contains `jwt.pub` (the RSA-2048 public key used to verify JWT tokens) and `premium.key` (used for premium membership
    entitlement). The RSA private key is hardcoded in lib/insecurity.ts:23 as a multiline string literal. An attacker who
    retrieves `jwt.pub` can confirm the exact key used for JWT verification, and in combination with the hardcoded private
    key (also available via source code access), can forge arbitrary JWT tokens for any user identity or role. The `premium.key`
    exposure allows bypassing premium content gates.'
  evidence_summary: server.ts:277 mounts serveIndex on /encryptionkeys with no isAuthorized() middleware; routes/keyServer.ts:10-18
    confirms files are served from the directory by filename without any auth check.
  impact_description: Exposure of jwt.pub combined with the hardcoded private key (lib/insecurity.ts:23) enables JWT forgery,
    allowing impersonation of any user. Exposure of premium.key enables premium content bypass.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: routes/keyServer.ts:13 rejects filenames containing '/'. No other access control is applied.
  mitigation_title: Restrict /encryptionkeys route to authenticated admin users and remove the private key from source code
  remediation:
    effort: Medium
    steps:
    - Add `security.isAuthorized()` and `security.isAdmin()` middleware before the /encryptionkeys route registration in server.ts:277.
    - Remove the hardcoded RSA private key from lib/insecurity.ts:23 and load it from an environment variable or a secrets
      manager (e.g. `process.env.JWT_PRIVATE_KEY` or a mounted Kubernetes secret).
    - Move jwt.pub out of the publicly accessible filesystem or restrict its access to internal services only.
    - Rotate the RSA key pair after remediation since the private key is exposed in the repository.
    code_example: "// server.ts — add auth before encryptionkeys mount\napp.use('/encryptionkeys', security.isAuthorized(),\
      \ security.isAdmin(),\n  serveIndexMiddleware, serveIndex('encryptionkeys', { icons: true, view: 'details' }))\napp.use('/encryptionkeys/:file',\
      \ security.isAuthorized(), security.isAdmin(), serveKeyFiles())"
    reference: CWE-200
