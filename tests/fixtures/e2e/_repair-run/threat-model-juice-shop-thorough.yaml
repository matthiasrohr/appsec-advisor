  title: MD5 Password Hashing — lib/insecurity.ts:43
  affected_parameter: password
  scenario: All user passwords are hashed with MD5 (`crypto.createHash('md5')` at lib/insecurity.ts:43). MD5 is a fast, unsalted
    hash with multi-billion-per-second GPU cracking speeds and massive publicly available rainbow tables (e.g., CrackStation).
    An attacker who obtains the `Users` table via SQL injection (auth-001) or a direct DB breach can crack all user passwords
    within minutes to hours for common passwords, and recover the admin password `admin123` (verified by the hardcoded challenge
    check at routes/login.ts:60) trivially. The same hash function is used to verify passwords in the 2FA setup/disable flow
    (routes/2fa.ts:113).
  evidence_summary: '`security.hash()` at lib/insecurity.ts:43 calls `crypto.createHash(''md5'')` with no salt — used in every
    password compare path including login (routes/login.ts:34) and 2FA (routes/2fa.ts:113).'
  impact_description: DB breach yields plaintext passwords for virtually all users within hours, enabling mass account takeover
    and credential reuse attacks against external services.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — MD5 is used as the sole password storage mechanism with no salt.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2 with appropriate cost factor
  remediation:
    effort: Medium
    steps:
    - Replace `security.hash()` with `bcrypt.hash(password, 12)` for storage and `bcrypt.compare(inputPassword, storedHash)`
      for verification.
    - 'Run a one-time migration: on each successful login, if the stored hash is MD5 format (32 hex chars), re-hash the verified
      password with bcrypt and update the record.'
    - Update the `UserModel` password field length from 64 to 60 characters to accommodate bcrypt hashes.
    - Audit all callers of `security.hash()` — routes/login.ts:34, routes/2fa.ts:113 — to use the new bcrypt comparison.
    code_example: 'import bcrypt from ''bcrypt''

