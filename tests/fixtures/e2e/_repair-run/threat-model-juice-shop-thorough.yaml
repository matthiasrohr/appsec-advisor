  affected_parameter: null
  scenario: 'The RSA private key used to sign all application JWTs is embedded verbatim in lib/insecurity.ts at line 23. The
    public GitHub repository makes this key available to anyone. An attacker reads the private key from the source, crafts
    a JWT payload with `role: ''admin''` and any target `email`, signs it with the known private key using RS256, and submits
    it as a Bearer token. All role checks in `isAuthorized()`, `isAccounting()`, and `isDeluxe()` verify against the matching
    public key (`lib/insecurity.ts:54`) — they will accept this forged token. The attacker gains admin-level access to the
    entire application for any 6-hour window they choose.'
  evidence_summary: A full RSA private key (1024-bit) is hardcoded as a string literal at lib/insecurity.ts:23 and used in
    `security.authorize()` at line 56 to sign all session JWTs.
  impact_description: Any party with read access to the source repository can forge valid admin JWTs, completely bypassing
    all authentication and authorization controls.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the key is in a public repository and is used for all JWT signing.
  mitigation_title: Remove hardcoded private key and load from environment secret or secrets manager
  remediation:
    effort: Medium
    steps:
    - 'Generate a new 2048-bit RSA key pair: `openssl genrsa -out jwt.pem 2048 && openssl rsa -in jwt.pem -pubout -out jwt.pub`.'
    - 'Store the private key in an environment variable (`JWT_PRIVATE_KEY`) or a secrets manager (e.g., AWS Secrets Manager,
      HashiCorp Vault). Load it at startup: `const privateKey = process.env.JWT_PRIVATE_KEY ?? fs.readFileSync(''encryptionkeys/jwt.pem'',
      ''utf8'')`.'
    - Rotate the key immediately — all existing JWTs signed with the old key must be invalidated (clear `authenticatedUsers.tokenMap`).
    - Add `encryptionkeys/` to `.gitignore` to prevent future commits of key material.
    code_example: null
    reference: CWE-321
