assets:
- id: A-001
  name: User Credentials (email + MD5 password hash)
  classification: Confidential
  description: All registered user email addresses and MD5-hashed passwords stored in SQLite Users table. MD5 provides no
    practical protection — precomputed rainbow tables can reverse most hashes in seconds. Also includes TOTP secrets for 2FA-enrolled
    users.
  linked_threats:
  - T-003
  - T-004
  - T-008
  - T-015
  - T-020
  - T-021
  - T-022
  - T-036
  - T-043
  - T-050
  - T-053
- id: A-002
  name: RSA Private Key (JWT signing key)
  classification: Restricted
  description: 1024-bit RSA private key hardcoded at lib/insecurity.ts:23. Used to sign all JWTs. Committed to public GitHub
    repository — permanently compromised. Any party who has read the source code can forge valid admin tokens.
  linked_threats:
  - T-003
  - T-005
  - T-006
  - T-014
  - T-022
  - T-028
  - T-030
  - T-032
  - T-035
  - T-036
  - T-040
  - T-041
  - T-049
- id: A-003
  name: Active JWT Session Tokens
  classification: Confidential
  description: 6-hour RS256-signed JWTs stored in the client-side localStorage and tracked server-side in the authenticatedUsers
    in-memory map. Tokens encode user ID, role, and basket ID. Forgeable due to committed private key.
  linked_threats:
  - T-001
  - T-002
  - T-003
  - T-005
  - T-014
  - T-028
  - T-030
  - T-035
  - T-040
  - T-041
  - T-049
- id: A-004
  name: Customer Order History and Basket Contents
  classification: Confidential
  description: SQLite tables for Orders, Baskets, BasketItems including order line items, prices, addresses, and payment card
    last-four digits. Subject to IDOR attacks via missing authorization on order-history and basket endpoints.
  linked_threats:
  - T-004
  - T-007
  - T-008
  - T-020
  - T-021
  - T-030
  - T-051
  - T-052
  - T-053
  - T-055
  - T-065
- id: A-005
  name: User Profile Data (addresses, payment cards, memories)
  classification: Confidential
  description: Personal data including delivery addresses, stored payment card references, profile images, and user-created
    memories. Accessible via IDOR-vulnerable address/payment APIs and served without proper authorization checks.
  linked_threats:
  - T-004
  - T-007
  - T-008
  - T-020
  - T-021
  - T-030
  - T-051
  - T-052
  - T-053
  - T-059
  - T-065
- id: A-006
  name: Uploaded Files (profile images, XML, YAML submissions)
  classification: Internal
  description: User-uploaded files stored in uploads/. Includes profile images (SSRF via URL upload), and XML/YAML files processed
    by the fileUpload handler with XXE enabled. Files served back without strict content-type enforcement.
  linked_threats:
  - T-010
  - T-011
  - T-012
  - T-014
  - T-039
  - T-046
  - T-057
  - T-059
- id: A-007
  name: FTP Directory (public download area)
  classification: Internal
  description: The ftp/ directory served with serve-index directory listing at /ftp. Contains legal.md (removed), acquisition
    files, and a quarantine subdirectory. Path traversal in quarantine server may expose non-public files.
  linked_threats:
  - T-014
  - T-035
  - T-038
  - T-040
  - T-041
  - T-051
  - T-052
- id: A-008
  name: Encryption Keys Directory (jwt.pub, premium.key)
  classification: Restricted
  description: The encryptionkeys/ directory served publicly via keyServer.ts. Contains jwt.pub (RSA public key) and premium.key.
    Serving these files publicly exposes the public key for offline JWT analysis.
  linked_threats:
  - T-003
  - T-005
  - T-014
  - T-028
  - T-030
  - T-035
  - T-038
  - T-040
  - T-041
- id: A-009
  name: Application Configuration and Version Information
  classification: Internal
  description: Unauthenticated endpoints /rest/admin/application-configuration and /rest/admin/application-version expose
    detailed runtime configuration including feature flags, domain name, challenge status, and deployed version. Useful for
    targeted exploitation.
  linked_threats: []
- id: A-010
  name: Access Logs
  classification: Internal
  description: Morgan combined-format access logs written to logs/. Served via logfileServer.ts with user-supplied filename
    parameter. Path traversal in the log server could expose other filesystem contents.
  linked_threats:
  - T-035
  - T-038
  - T-040
  - T-041
  - T-051
  - T-052
- id: A-011
  name: Challenge Solution State
  classification: Internal
  description: In-memory and database-backed challenge completion flags tracking which OWASP vulnerabilities have been solved.
    Can be manipulated via continue-code endpoints that lack authentication.
  linked_threats: []
- id: A-012
  name: Prometheus Metrics Endpoint
  classification: Internal
  description: Unauthenticated /metrics endpoint exposing Express application internals including request counts, response
    times, endpoint mapping, and runtime behavior — useful for reconnaissance.
  linked_threats: []
