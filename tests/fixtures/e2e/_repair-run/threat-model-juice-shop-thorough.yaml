  stride: Tampering
  cwe: CWE-829
  title: Disabled Lockfile Enforcement Allows Dependency Substitution — .npmrc:1
  affected_parameter: null
  scenario: '`.npmrc` contains `package-lock=false`, which instructs npm to skip writing and reading `package-lock.json`.
    When `npm install` runs in CI (e.g. `ci.yml:85`, `ci.yml:125`, `ci.yml:211`), npm resolves dependency versions fresh from
    the registry each time, without a pinned lockfile to enforce reproducibility. A dependency that publishes a malicious
    patch version within the declared semver range (e.g. `*`, `^x.y.z`, `~x.y.z`) is silently installed on the next CI run.
    Because `postinstall` hooks execute during the same `npm install` (see `package.json:88`), the injected version runs arbitrary
    code in the CI runner with access to all environment secrets. This attack pattern (dependency confusion / version squatting)
    requires no write access to the repo — only a published package in the npm registry satisfying the version range.'
  evidence_summary: '`.npmrc:1` sets `package-lock=false`, disabling lockfile generation and reproducible installs across
    all CI jobs that call `npm install` without `--ignore-scripts`.'
  impact_description: A malicious transitive dependency published to npm within an existing semver range executes arbitrary
    code during CI builds, with access to `DOCKERHUB_TOKEN`, `HEROKU_API_KEY`, `CYPRESS_RECORD_KEY`, and `GITHUB_TOKEN`.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The `lint` and `lint-fixer` jobs use `--ignore-scripts`, preventing hook execution in those specific
    jobs. No lockfile pins are enforced for the test, e2e, or docker publish jobs.
  mitigation_title: Remove package-lock=false from .npmrc and commit a lockfile for CI
  remediation:
    effort: Medium
    steps:
    - Remove the `package-lock=false` line from `.npmrc`. Run `npm install` locally to generate `package-lock.json`, commit
      it, and push.
    - Update all CI jobs that run `npm install` without `--ignore-scripts` (`ci.yml:85`, `ci.yml:125`, `ci.yml:211`, `release.yml:41`)
      to use `npm ci` instead of `npm install`. `npm ci` enforces the lockfile and fails if `package-lock.json` is absent
      or inconsistent, giving deterministic dependency resolution on every build.
    code_example: "# .github/workflows/ci.yml — replace npm install with npm ci in all test jobs\n- name: \"Install application\"\
      \n  run: npm ci    # fails if package-lock.json is missing or out of date"
    reference: CWE-829
  evidence:
