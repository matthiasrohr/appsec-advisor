trust_boundaries:
- id: tb-1
  name: Public Internet / Browser Boundary
  description: The boundary between untrusted external actors (anonymous users, authenticated customers, attackers, B2B clients)
    and the Juice Shop application. All HTTP traffic crosses this boundary on port 3000.
  from: external
  to: express-backend
  enforcement: Express middleware stack (cors, helmet partial, express-jwt, rate-limit on subset). No network-layer perimeter
    control configured in source.
  weaknesses:
  - wildcard CORS
  - alg:none JWT bypass
  - 21 unauthenticated endpoints
  - no rate limit on /rest/user/login
- id: tb-2
  name: Browser / Angular SPA Boundary
  description: The boundary between the browser DOM and the Angular SPA frontend. XSS payloads can cross this boundary and
    access localStorage JWT tokens.
  from: external
  to: angular-spa
  enforcement: Angular DOM sanitization (partial); sanitize-html 1.4.2 (outdated, bypassable); helmet XSS filter disabled.
  weaknesses:
  - outdated sanitize-html
  - localStorage JWT storage
  - no CSP
  - XSS filter disabled
- id: tb-3
  name: Application / Data Layer Boundary
  description: The boundary between Express route handlers and the SQLite database / filesystem. In-process, with no network
    segment or DB-level access control.
  from: express-backend
  to: data-layer
  enforcement: Sequelize ORM (bypassed via raw() in auth paths). No DB-level user permissions — single SQLite file with no
    auth.
  weaknesses:
  - raw SQL queries in login.ts and search.ts
  - no DB-level access control
  - Sequelize raw() escape bypass
- id: tb-4
  name: Application / File System Boundary
  description: The boundary between the Node.js process and the local filesystem containing user uploads, encryption keys,
    FTP files, and logs.
  from: express-backend
  to: file-upload-service
  enforcement: Application-level path checks (keyServer checks for /); no OS-level mandatory access control. UID 65532 provides
    container-level isolation only.
  weaknesses:
  - path traversal in logfileServer / quarantineServer
  - serve-index on ftp/ (directory listing)
  - encryptionkeys/ served publicly
- id: tb-5
  name: B2B API JWT Boundary
  description: The boundary enforcing machine-to-machine authentication for the B2B order API at /b2b/v2. JWT bearer token
    required, but private key is public.
  from: external
  to: b2b-api
  enforcement: express-jwt isAuthorized() at server.ts:423. RS256 verification using publicKey — but private key is hardcoded
    in source at lib/insecurity.ts:23.
  weaknesses:
  - private key in source enables token forgery
  - notevil sandbox escapable via prototype pollution
  - vm.runInContext RCE
- id: tb-6
  name: Container / Host Boundary
  description: Docker container boundary isolating the Node.js process from the host OS. Distroless image with UID 65532 provides
    strong isolation at the OS level.
  from: express-backend
  to: external
  enforcement: Docker container with distroless gcr.io/distroless/nodejs24-debian13 image, non-root UID 65532. No --privileged
    flag.
  weaknesses:
  - base images tag-pinned without digest
  - npm install --unsafe-perm in build stage
  - no cosign signing on release images
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Unsafe
  evidence: routes/login.ts:34 — raw SQL with string interpolation; lib/insecurity.ts:43 — MD5 hash with no salt
  notes: 'Two compounding failures: (1) the login query is injectable via email field, bypassing the password check entirely;
    (2) when the query does evaluate, the stored hash is unsalted MD5 which is trivially reversible via rainbow tables. No
    bcrypt, argon2, or scrypt.'
- domain: Session and Token Controls
  control: Session Token Issuance (JWT Based)
  effectiveness: Unsafe
  evidence: lib/insecurity.ts:23 (hardcoded RSA private key), lib/insecurity.ts:54 (express-jwt@0.1.3 no algorithms allowlist),
    lib/insecurity.ts:56 (1024-bit RSA key)
  notes: 'Three compounding failures: (1) private key committed to public source repository; (2) express-jwt@0.1.3 has no
    algorithms parameter, enabling alg:none bypass; (3) 1024-bit key is below NIST minimum of 2048-bit.'
  audit_flags:
  - control_name_canonicalised
  - control_domain_reclassified_from_Identity and Authentication
- domain: Identity and Authentication Controls
  control: TOTP / 2FA
  effectiveness: Partial
  evidence: routes/2fa.ts — TOTP implementation present
  notes: TOTP is implemented and enforced when enabled for a user account, but it is optional and the underlying JWT forgery
    bypass makes 2FA irrelevant for attacker-minted tokens.
  audit_flags:
  - control_domain_suffix_normalised
- domain: Identity and Authentication Controls
  control: OAuth / Social Login
  effectiveness: Partial
  evidence: Referenced in challenge data and Angular OAuth service; standard library flow
  notes: OAuth2 social login is present for Google accounts but relies on the same JWT infrastructure with the compromised
    private key.
  audit_flags:
  - control_domain_suffix_normalised
- domain: Identity and Authentication
  control: Anonymous Access Controls
  effectiveness: Weak
  evidence: server.ts — 21 endpoints with missing_auth_suspect=true including admin endpoints
  notes: 21 endpoints that should require authentication do not. Includes /rest/admin/application-configuration, /rest/user/data-export,
    and file upload endpoints.
- domain: Session and Token Controls
  control: JWT Session Lifecycle
  effectiveness: Unsafe
  evidence: lib/insecurity.ts:72 (in-memory tokenMap), lib/insecurity.ts:56 (6h expiry), lib/insecurity.ts:23 (hardcoded key)
  notes: Tokens are stored in localStorage (XSS-accessible). Server-side session is an in-memory map with no persistence or
    logout mechanism. The 6-hour expiry is the only session bound, but forged tokens can carry arbitrary expiry.
- domain: Session and Token Controls
  control: CSRF Protection
  effectiveness: Missing
  evidence: No CSRF middleware found in server.ts; no SameSite cookie attribute set
  notes: No CSRF token or SameSite cookie protection. The app uses Authorization header JWT (not cookies) for most endpoints
    so the practical CSRF risk is reduced, but the cookie-based endpoints (profile) remain vulnerable.
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  evidence: lib/insecurity.ts:54 (isAuthorized middleware); 18 routes with missing_authz_suspect; routes/address.ts IDOR pattern
  notes: JWT carries role claim (admin/customer) and isAuthorized() verifies token presence, but object-level authorization
    (IDOR) is missing across address, order, basket, payment, wallet, and memory endpoints. Any authenticated user can access
    any other user's objects.
- domain: Query Construction and Data Access Controls
  control: SQL Query Parameterization
  effectiveness: Unsafe
  evidence: routes/login.ts:34 — string interpolation; routes/search.ts:23 — LIKE injection; models use Sequelize ORM but
    raw() bypassed
  notes: Two confirmed raw SQL injection points. The ORM is available and used for most queries, but the security-critical
    paths (login, search) bypass it with raw string interpolation.
- domain: Input Boundary Validation Controls
  control: Input Validation and Sanitization
  effectiveness: Weak
  evidence: sanitize-html@1.4.2 (outdated), no global validation middleware, routes/userProfile.ts:62 (eval on input)
  notes: Sanitization is inconsistent and point-in-time. sanitize-html@1.4.2 has known bypass CVEs. No global input schema
    validation middleware (joi/zod/express-validator absent). eval() on user input in userProfile.ts is a direct code injection
    vector.
- domain: Output Encoding and Rendering Controls
  control: XSS Prevention
  effectiveness: Unsafe
  evidence: server.ts:187 (XSS filter commented out); routes/userProfile.ts:88 (user-controlled CSP header); Angular template
    rendering (partial protection)
  notes: Helmet's xssFilter is intentionally disabled. User-supplied profile image URL is injected into a Content-Security-Policy
    response header without sanitization, enabling stored XSS via CSP header injection. Angular provides some client-side
    protection but server-side is absent.
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Weak
  evidence: server.ts:181-182 — app.options('*', cors()) + app.use(cors()) with no origin allowlist
  notes: Wildcard CORS allows any origin to make credentialed cross-origin requests. Combined with the missing CSRF protection,
    this enables CSRF-equivalent attacks from any web page.
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy
  effectiveness: Missing
  evidence: helmet.contentSecurityPolicy not called in server.ts; only per-response dynamic CSP in userProfile.ts
  notes: No application-wide CSP is set. The per-user CSP header in userProfile.ts is user-controlled and intentionally injectable
    (challenge design). No nonce-based script execution protection.
- domain: Cryptography Secrets and Data Protection
  control: Secrets Management
  effectiveness: Unsafe
  evidence: lib/insecurity.ts:23 (RSA private key), lib/insecurity.ts:44 (HMAC key), server.ts:289 (cookie secret), routes/login.ts:61-66
    (hardcoded credentials)
  notes: 'Four distinct secrets hardcoded in source: RSA private key, HMAC key, cookie parser secret, and multiple user plaintext
    credentials. All are committed to a public repository. No secrets management system (Vault, AWS Secrets Manager, environment
    variables) is used.'
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing Algorithm
  effectiveness: Unsafe
  evidence: lib/insecurity.ts:43 — crypto.createHash('md5').update(data).digest('hex')
  notes: MD5 with no salt is used for all password hashing. MD5 is collision-prone, has no cost factor, and precomputed rainbow
    tables can reverse most common passwords in milliseconds.
- domain: File Parser and Outbound Request Controls
  control: XML Processing (XXE Prevention)
  effectiveness: Unsafe
  evidence: 'routes/fileUpload.ts:83 — libxmljs2.parseXml(data, { noent: true })'
  notes: 'External entity resolution is explicitly enabled (noent: true). This allows XXE attacks that can read arbitrary
    files from the container filesystem, perform SSRF to internal network addresses, or cause denial of service.'
- domain: File Parser and Outbound Request Controls
  control: SSRF Prevention
  effectiveness: Missing
  evidence: routes/profileImageUrlUpload.ts:24 — fetch(req.body.imageUrl) with no allowlist
  notes: The profile image URL endpoint fetches arbitrary URLs provided by the user without any allowlist, blocklist, or DNS
    rebinding protection. Enables SSRF to internal network resources and metadata endpoints.
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Management
  effectiveness: Unsafe
  evidence: .npmrc sets package-lock=false; express-jwt@0.1.3 and jsonwebtoken@0.4.0 are critically outdated; no Dependabot
  notes: No lockfile and no automated dependency update tooling. Two critically outdated packages with known CVEs are pinned
    at ancient versions. npm install --unsafe-perm in Dockerfile runs postinstall scripts as root during build.
- domain: Operations Runtime and Supply Chain Controls
  control: Container Security
  effectiveness: Partial
  evidence: Dockerfile — distroless image, UID 65532; CFG-001 (unpinned tags), CFG-004 (--unsafe-perm)
  notes: 'Runtime posture is good (distroless, non-root). Build-time posture is weak: base images are tag-pinned without digest,
    enabling supply-chain attacks via image mutation. npm install --unsafe-perm allows malicious postinstall scripts to run
    as root during build.'
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Pipeline Security
  effectiveness: Weak
  evidence: .github/workflows/ci.yml (no permissions block), CodeQL SAST present but action refs unpinned
  notes: GitHub Actions workflows lack permissions restrictions (inherits write-all GITHUB_TOKEN). Action refs use mutable
    tags rather than SHA pinning. CodeQL SAST scanning is present and provides meaningful value. No release signing or SBOM
    provenance attestation in CI.
- domain: Operations Runtime and Supply Chain Controls
  control: Audit Logging
  effectiveness: Partial
  evidence: server.ts:338 — morgan combined format to access log file
  notes: HTTP access logging via morgan covers all requests. No structured security event log (authentication failures, authorization
    denials, admin actions). No log integrity protection. Logs served via unauthenticated logfileServer endpoint with path
    traversal risk.
- domain: Real-time and Not Applicable Controls
