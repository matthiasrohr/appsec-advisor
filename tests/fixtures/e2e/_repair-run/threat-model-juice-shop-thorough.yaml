  title: UNION SQL Injection — routes/search.ts:23
  affected_parameter: q
  scenario: 'The search route at routes/search.ts:23 concatenates req.query.q directly into a SELECT statement: `SELECT *
    FROM Products WHERE ((name LIKE ''%${criteria}%'' OR description LIKE ''%${criteria}%'') AND deletedAt IS NULL) ORDER
    BY name`. An attacker sends GET /rest/products/search?q='')) UNION SELECT sql,2,3,4,5,6,7,8,9 FROM sqlite_master-- to
    extract the full database schema. A follow-up UNION SELECT id,email,password,role,4,5,6,7,8 FROM Users dumps all user
    credentials (MD5 hashes) and role assignments. The response is returned as JSON in the normal products array. The search
    input is truncated to 200 characters but this is sufficient for the UNION payload.'
  evidence_summary: sequelize.query() is called at line 23 with criteria interpolated from req.query.q into a LIKE clause,
    with no parameterization or prepared statement.
  impact_description: An attacker can exfiltrate all user credentials, email addresses, roles, and the complete database schema
    from the SQLite database.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input length is capped at 200 characters (line 22), which does not prevent SQL injection.
  mitigation_title: Parameterize the product search query using Sequelize ORM LIKE operators
  remediation:
    effort: Low
    steps:
    - 'Replace the raw sequelize.query() call in routes/search.ts:23 with `ProductModel.findAll({ where: { [Op.or]: [{ name:
      { [Op.like]: `%${criteria}%` } }, { description: { [Op.like]: `%${criteria}%` } }], deletedAt: null }, order: [[''name'',
      ''ASC'']] })` using Sequelize''s Op.like which generates parameterized LIKE clauses.'
    - 'Import Op from sequelize: `import { Op } from ''sequelize''`.'
    - Add test coverage verifying that UNION-based payloads return empty results instead of data.
    code_example: "// routes/search.ts — replacement for line 23\nimport { Op } from 'sequelize'\nconst products = await ProductModel.findAll({\n\
      \  where: {\n    [Op.and]: [\n      { deletedAt: null },\n      { [Op.or]: [\n        { name: { [Op.like]: `%${criteria}%`\
      \ } },\n        { description: { [Op.like]: `%${criteria}%` } }\n      ]}\n    ]\n  },\n  order: [['name', 'ASC']]\n\
      })"
    reference: CWE-89
