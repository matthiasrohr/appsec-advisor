  stride: Information Disclosure
  cwe: CWE-918
  title: Server-Side Request Forgery — routes/profileImageUrlUpload.ts:24
  affected_parameter: imageUrl
  scenario: '`routes/profileImageUrlUpload.ts:24` calls `fetch(url)` where `url = req.body.imageUrl` with no scheme or host
    validation. An authenticated user submits `imageUrl=http://169.254.169.254/latest/meta-data/iam/security-credentials/`
    to probe the AWS instance metadata service. The response body is written to `frontend/dist/frontend/assets/public/images/uploads/${loggedInUser.data.id}.jpg`
    and then served publicly. The attacker reads the file at `GET /assets/public/images/uploads/<id>.jpg` and obtains the
    IAM credentials. Any internal service reachable by the Node.js process is similarly accessible.'
  evidence_summary: '`routes/profileImageUrlUpload.ts:24` calls `fetch(url)` with `url` taken directly from `req.body.imageUrl`
    — no allowlist, no scheme check, no host validation.'
  impact_description: Attacker reads cloud metadata credentials, internal service APIs, or localhost admin interfaces not
    intended for external access.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Attacker must be authenticated. The challenge detection at line 20 checks for `/solve/challenges/server-side`
    in the URL but does not block arbitrary URLs.
  mitigation_title: Validate imageUrl against an allowlisted scheme and hostname before fetching in profileImageUrlUpload.ts
  remediation:
    effort: Low
    steps:
    - Parse `req.body.imageUrl` with `new URL(url)` and reject any scheme other than `https:` and any hostname not on an explicit
      allowlist of known CDN/image hosts.
    - Block loopback, link-local (169.254.x.x), and private IP ranges (10.x, 172.16-31.x, 192.168.x.x) using a DNS-rebinding-safe
      check after resolution.
    - Alternatively, accept only `data:image/...` base64 URLs for profile images and avoid outbound HTTP fetches entirely.
    code_example: '// routes/profileImageUrlUpload.ts — before fetch

      const parsed = new URL(req.body.imageUrl)

      if (![''https:''].includes(parsed.protocol)) throw new Error(''Only HTTPS URLs allowed'')

      const ALLOWED_HOSTS = new Set([''cdn.example.com'', ''i.imgur.com''])

      if (!ALLOWED_HOSTS.has(parsed.hostname)) throw new Error(''Host not allowlisted'')'
    reference: CWE-918
