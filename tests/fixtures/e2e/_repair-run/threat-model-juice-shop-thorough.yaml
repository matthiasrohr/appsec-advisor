- local_id: auth-006
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Stored in localStorage — request.interceptor.ts:13
  affected_parameter: token
  scenario: The Angular `RequestInterceptor` at request.interceptor.ts:13 reads the JWT from `localStorage` and attaches it
    to every outbound HTTP request. `localStorage` is accessible to all JavaScript executing in the same origin. Any successful
    XSS attack (stored, reflected, or DOM-based) on the Juice Shop domain can call `localStorage.getItem('token')` and exfiltrate
    the JWT to an attacker-controlled server. Since the token encodes the user's full profile (email, role, basket ID) and
    is valid for 6 hours, the attacker has a full session for that window without the user's knowledge. Multiple components
    (navbar, oauth, two-factor-auth-enter) also write to localStorage.
  evidence_summary: '`localStorage.getItem(''token'')` at request.interceptor.ts:13 is the token retrieval path; `localStorage.setItem(''token'',
    ...)` occurs in at least 3 other Angular components — token is never stored in an httpOnly cookie.'
  impact_description: Any XSS vulnerability on the same origin results in full session theft and persistent account access
    for the JWT's 6-hour lifetime.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no httpOnly cookie is used; no Content Security Policy is enforced to limit XSS impact.
  mitigation_title: Move JWT from localStorage to httpOnly Secure SameSite=Strict cookie via a Backend-for-Frontend pattern
  remediation:
    effort: High
    steps:
    - 'Issue the JWT as a `Set-Cookie: token=<jwt>; HttpOnly; Secure; SameSite=Strict; Path=/` response header from the login
      endpoint instead of returning it in the JSON body.'
    - Remove all `localStorage.setItem('token', ...)` and `localStorage.getItem('token')` calls from Angular components.
    - Update `RequestInterceptor` to remove the `Authorization` header injection — the browser will automatically send the
      httpOnly cookie.
    - Add a CSRF token mechanism (e.g., double-submit cookie pattern or `csurf` middleware) since cookie-based auth requires
      CSRF protection on state-changing requests.
    code_example: null
    reference: CWE-922
