  stride: Elevation of Privilege
  cwe: CWE-308
  title: Two-Factor Authentication Disable — routes/2fa.ts:158
  affected_parameter: password
  scenario: 'The 2FA disable handler at routes/2fa.ts:158 verifies the user''s password with `user.password !== security.hash(password)`
    — where `security.hash()` is MD5 (lib/insecurity.ts:43). An attacker who obtains the MD5 password hash (e.g., via the
    SQL injection at auth-001, or from the `/rest/user/authentication-details` endpoint accessible to admin users) can compute
    a preimage using rainbow tables (CrackStation, hashcat) or trivially crack `admin123` (32-char MD5: `0192023a7bbd73250516f069df18b500`).
    With the preimage in hand, the attacker submits the cleartext password to disable 2FA, then completes account takeover
    without needing the TOTP token.'
  evidence_summary: routes/2fa.ts:158 calls `security.hash(password)` which maps to `crypto.createHash('md5')` at lib/insecurity.ts:43
    — weak hash used to gate 2FA disable operation.
  impact_description: Attacker who knows a user's MD5 hash (trivially obtained via SQLi) can disable 2FA on their account,
    eliminating the second authentication factor before completing takeover.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 2FA token required for initial login; disable requires password confirmation (but using MD5).
  mitigation_title: Migrate 2FA password confirmation to use bcrypt comparison consistent with auth-005 fix
  remediation:
    effort: Low
    steps:
    - After implementing bcrypt in auth-005, update routes/2fa.ts setup() and disable() to use `await bcrypt.compare(password,
      user.password)` instead of `user.password !== security.hash(password)`.
    - Consider requiring the current TOTP token in addition to the password when disabling 2FA — defense in depth against
      credential-only attacks.
    - Add rate limiting to the 2FA disable endpoint.
    code_example: '// Safe comparison after bcrypt migration

      const passwordValid = await bcrypt.compare(password, user.password)

      if (!passwordValid) throw new Error(''Password does not match'')'
    reference: CWE-308
