- local_id: angular-spa-001
  threat_category_id: TH-10
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-522
  title: OAuth Implicit Flow Without State or PKCE — login.component.ts:134
  affected_parameter: response_type, state
  scenario: 'The Google OAuth redirect at login.component.ts:134 uses `response_type=token` (Implicit Flow) and constructs
    the authorization URL with no `state` parameter: `${oauthProviderUrl}?client_id=${this.clientId}&response_type=token&scope=email&redirect_uri=${this.redirectUri}`.
    With no `state` value, the OAuth callback cannot be bound to the originating session, enabling CSRF-style attacks where
    an attacker initiates an OAuth flow, replaces the `code` step, and forces the victim''s browser to authenticate with the
    attacker''s access token (token injection). The Implicit Flow itself causes the `access_token` to appear in the URL fragment,
    as confirmed by `app.routing.ts:262` which matches `#access_token=` in the URL. Since no PKCE code_challenge is generated,
    public-client impersonation is trivially possible.'
  evidence_summary: '`googleLogin()` calls `location.replace()` with a hardcoded `response_type=token` and no `state` parameter,
    triggering the OAuth Implicit Flow.'
  impact_description: An attacker can inject an attacker-controlled OAuth token into the victim's session (token injection
    / CSRF via OAuth), gaining authenticated access as the victim.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None
  mitigation_title: Replace OAuth Implicit Flow with Authorization Code Flow with PKCE and state validation
  remediation:
    effort: Medium
    steps:
    - Switch `response_type` from `token` to `code` in the Google OAuth redirect URL at login.component.ts:134.
    - Generate a cryptographically random `state` value (use `crypto.getRandomValues`), store it in `sessionStorage`, and
      append it to the authorization URL. On callback, verify the returned `state` matches before proceeding.
    - 'Implement PKCE: generate a `code_verifier` (random 43–128 char string), compute `code_challenge = BASE64URL(SHA256(code_verifier))`,
      and include `code_challenge_method=S256&code_challenge=<challenge>` in the authorization URL.'
    - Handle the callback server-side (or via a dedicated BFF endpoint) to exchange the code for tokens using the `code_verifier`,
      keeping the access token off the browser URL.
    code_example: "// Generate state + PKCE verifier before redirect\nconst state = crypto.randomUUID();\nsessionStorage.setItem('oauth_state',\
      \ state);\nconst verifier = generateCodeVerifier(); // 43-128 random chars\nsessionStorage.setItem('pkce_verifier',\
      \ verifier);\nconst challenge = await generateCodeChallenge(verifier); // SHA-256 + base64url\nwindow.location.replace(\n\
      \  `${oauthProviderUrl}?client_id=${clientId}&response_type=code&scope=email` +\n  `&redirect_uri=${redirectUri}&state=${state}&code_challenge_method=S256&code_challenge=${challenge}`\n\
      );"
    reference: CWE-522
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 134
  evidence_check: verified
