  cwe: CWE-943
  title: NoSQL Injection with multi:true Enables — routes/updateProductReviews.ts:18
  affected_parameter: id
  scenario: 'The updateProductReviews handler calls `db.reviewsCollection.update({ _id: req.body.id }, { $set: { message:
    req.body.message } }, { multi: true })`. When `req.body.id` is supplied as a MarsDB query operator object (e.g. `{ $gt:
    '''' }`) rather than a string ID, the filter matches all documents in the collection. Combined with `multi: true`, this
    updates every review''s message field to the attacker-controlled value, effectively defacing all product reviews simultaneously.
    No ownership check is enforced in the update filter — the `user` variable (line 16) is read but only used to trigger challenge
    detection, not to scope the update.'
  evidence_summary: routes/updateProductReviews.ts:18 uses req.body.id directly as a MarsDB filter with multi:true at line
    20, and no UserId/author constraint is added to the filter.
  impact_description: An attacker can overwrite the message field of all product reviews in the MarsDB in-memory store, or
    update a review they did not author (forged review), corrupting review data for all products.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: JWT authentication is required to reach this endpoint (express-jwt middleware applied globally), but
    ownership of the specific review is not verified.
  mitigation_title: Add author ownership constraint to the MarsDB update filter and disable multi:true
  remediation:
    effort: Low
    steps:
    - 'Change the update filter to `{ _id: req.body.id, author: user.data.email }` so only the authenticated user''s own review
      can be updated.'
    - 'Remove `{ multi: true }` from the update options — single-document updates should never use multi.'
    - Validate that req.body.id is a string type before passing it to the MarsDB filter to prevent operator injection.
    code_example: "// routes/updateProductReviews.ts\ndb.reviewsCollection.update(\n  { _id: String(req.body.id), author:\
      \ user.data.email },  // ownership check\n  { $set: { message: req.body.message } },\n  { multi: false }  // never bulk-update\n\
      )"
    reference: CWE-943
