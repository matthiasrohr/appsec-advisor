  title: Client-Side Route Guards Bypassable Without Server — app.guard.ts:17
  affected_parameter: canActivate
  scenario: 'Angular''s `LoginGuard.canActivate()` at app.guard.ts:17-24 checks only `localStorage.getItem(''token'')` truthiness,
    and `AdminGuard.canActivate()` at line 52-59 decodes the JWT with `jwtDecode` and inspects the `role` claim client-side.
    These guards control navigation to `/administration` and `/accounting` but can be bypassed using browser devtools or by
    manipulating the Angular router programmatically: `(1) AngularRouter.navigate([''/administration''])` triggered from the
