  title: Missing Security Audit Log — server.ts:338
  affected_parameter: null
  scenario: '`server.ts:338` configures `morgan(''combined'')` which logs HTTP request lines to `logs/access.log.%DATE%`.
    No structured security event log records authentication outcomes, JWT rejections, admin actions, or data mutations. An
    attacker who exploits the SQLi login bypass, forges a JWT, or dumps the database via search SQLi produces no security
    alert. The `morgan` log captures the HTTP 200 response but not the attacker''s identity or what was returned. Because
    the access log is also served unauthenticated at `/support/logs/` (server.ts:281), an attacker can review it to understand
    their own footprint and clean their traces by correlating requests.'
  evidence_summary: '`server.ts:338` installs only HTTP access logging; no structured security-event sink records authentication
    events, JWT issuance, role changes, or admin endpoint hits.'
  impact_description: Post-incident forensics cannot reconstruct which accounts were compromised, when JWT forgery occurred,
    or which data was exfiltrated.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: HTTP access log via morgan (captures method/path/status only).
  mitigation_title: Add a structured security event log for authentication and admin actions
  remediation:
    effort: Medium
    steps:
    - Emit a structured JSON security event on every login attempt (success and failure), JWT rejection by `express-jwt`,
      admin endpoint hit, and data-export request — include actor IP, user ID, outcome, and timestamp.
    - 'Write security events to a separate append-only log sink (e.g. a separate file stream via `winston` with `maxFiles:
      0`) — distinct from the HTTP access log.'
    - 'Protect the log endpoint: remove unauthenticated access at `/support/logs/` (server.ts:281) or restrict to accounting/admin
      role.'
    code_example: "// lib/securityLogger.ts\nimport winston from 'winston'\nexport const seclog = winston.createLogger({\n\
      \  format: winston.format.json(),\n  transports: [new winston.transports.File({ filename: 'logs/security.log' })]\n\
      })\n// usage in routes/login.ts after auth:\nseclog.info({ event:'login', outcome:'success', userId: user.data.id, ip:\
      \ req.ip })"
