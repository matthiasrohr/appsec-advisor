  stride: Information Disclosure
  cwe: CWE-321
  title: Hardcoded Ethereum Wallet Mnemonic Exposes Wallet — routes/checkKeys.ts:10
  affected_parameter: privateKey (req.body.privateKey)
  scenario: The Ethereum wallet mnemonic `'purpose betray marriage blame crunch monitor spin slide donate sport lift clutch'`
    is hardcoded at routes/checkKeys.ts:10. Anyone with access to the repository can derive the HD wallet's private key using
    `HDNodeWallet.fromPhrase(mnemonic).privateKey` and take full control of any assets held at the derived address. The `POST
    /rest/web3/submitKey` endpoint (server.ts:638) accepts a private key guess and compares it directly against this derived
    key — the comparison logic at checkKeys.ts:18 (`req.body.privateKey === privateKey`) also leaks timing information about
    the key value to brute-forcers, though the committed mnemonic makes that moot.
  evidence_summary: routes/checkKeys.ts line 10 hard-codes the BIP-39 mnemonic string; the derived private key is computed
    from it at runtime and compared in plaintext at line 18.
  impact_description: Any repository reader can derive and exfiltrate the Ethereum wallet private key, enabling theft of all
    ETH and ERC-20/ERC-721 tokens held at the wallet address.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — mnemonic is plaintext in source
  mitigation_title: Move Ethereum wallet mnemonic to an environment variable and remove it from source
  remediation:
    effort: Low
    steps:
    - Remove the hardcoded mnemonic string from routes/checkKeys.ts and load it from `process.env.ETH_WALLET_MNEMONIC`.
    - Rotate the Ethereum wallet immediately — generate a new mnemonic and transfer any assets to the new address; treat the
      committed mnemonic as permanently compromised.
    - Add `ETH_WALLET_MNEMONIC` to `.env.example` with a placeholder and to `.gitignore` / secrets scanning rules to prevent
      future commits.
    - 'Replace the timing-unsafe direct string comparison (`=== privateKey`) with a constant-time comparison to prevent key
      oracle attacks: `crypto.timingSafeEqual(Buffer.from(req.body.privateKey), Buffer.from(privateKey))`.'
    code_example: "```typescript\n// routes/checkKeys.ts — AFTER fix\nconst mnemonic = process.env.ETH_WALLET_MNEMONIC\n \
      \ ?? (() => { throw new Error('ETH_WALLET_MNEMONIC not set') })()\nconst mnemonicWallet = HDNodeWallet.fromPhrase(mnemonic)\n\
      const privateKey = mnemonicWallet.privateKey\n// ... constant-time comparison:\nimport crypto from 'node:crypto'\nconst\
      \ isMatch = req.body.privateKey?.length === privateKey.length &&\n  crypto.timingSafeEqual(Buffer.from(req.body.privateKey),\
      \ Buffer.from(privateKey))\n```"
    reference: CWE-321
