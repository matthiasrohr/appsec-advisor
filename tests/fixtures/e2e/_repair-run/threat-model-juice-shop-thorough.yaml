  stride: Elevation of Privilege
  cwe: CWE-94
  title: JavaScript Sandbox Escape — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: An attacker with a valid (or forged) B2B JWT submits a crafted JavaScript expression as `orderLinesData` that
    exploits the notevil AST-evaluator's known sandbox escape vectors. Because `notevil` is not hardened against adversarial
    inputs, a sufficiently crafted payload can break out of the `vm.createContext` sandbox and execute arbitrary code as the
    Node.js process. This achieves full server-side RCE — reading environment secrets, pivoting to internal services, or installing
    persistence. The notevil library ships with `@ts-expect-error FIXME` in the import comment, indicating the maintainers
    are aware it lacks proper type safety and RCE-safety guarantees.
  evidence_summary: 'Line 23 of routes/b2bOrder.ts calls `vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout:
    2000 })` where `orderLinesData` is the unsanitised request body field, and `safeEval` is the `notevil` library''s `eval`
    function — a known incomplete sandbox.'
  impact_description: Full server-side code execution as the Node.js process user, enabling credential theft, lateral movement
    to internal services, and persistent backdoor installation.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: 2000ms vm execution timeout; notevil AST-based expression evaluator (partial sandbox, not RCE-safe)
  mitigation_title: Replace notevil/vm sandbox with server-side JSON schema validation of orderLinesData
  remediation:
    effort: Medium
    steps:
    - Remove the `notevil` import and `vm.runInContext` call from routes/b2bOrder.ts entirely — do not use any JavaScript
      expression evaluator for business-logic input.
    - Define an explicit JSON schema (using `zod` or `joi`) for the expected order line structure and validate `body.orderLinesData`
      against it before processing.
    - If dynamic expressions are genuinely required by the B2B API contract, isolate evaluation in a dedicated sandboxed child
      process (Node.js `--experimental-vm-modules` with a dedicated worker_thread) with no access to the parent process scope,
      and enforce strict input size limits.
    - Add an integration test that submits a known notevil sandbox-escape payload and asserts a 400/422 response, not code
      execution.
    code_example: "```typescript\nimport { z } from 'zod'\n\nconst OrderLineSchema = z.object({\n  productId: z.number().int().positive(),\n\
      \  quantity: z.number().int().positive().max(1000),\n  unitPrice: z.number().positive()\n})\nconst OrderSchema = z.object({\n\
      \  cid: z.string(),\n  orderLinesData: z.array(OrderLineSchema)\n})\n\n// In handler:\nconst parsed = OrderSchema.safeParse(req.body)\n\
      if (!parsed.success) return res.status(422).json({ error: parsed.error.flatten() })\n```"
    reference: CWE-94
