    whose server-side enforcement is inconsistent or absent.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Server-side API authorization should independently enforce permissions, but the guard bypass exposes
    admin UI surface.
  mitigation_title: Add server-side session validation endpoint called by guards before route activation
  remediation:
    effort: Medium
    steps:
    - Add a `/rest/user/whoami` or session-check API call in `LoginGuard.canActivate()` that returns 401 on invalid/expired
      tokens, blocking navigation on server-confirmed failure.
