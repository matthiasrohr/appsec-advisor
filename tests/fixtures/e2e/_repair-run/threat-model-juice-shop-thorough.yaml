- local_id: angular-spa-002
  threat_category_id: TH-10
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-798
  title: OAuth Derived Password from Email Enables Credential — oauth.component.ts:30
  affected_parameter: password
  scenario: 'After Google OAuth login, `oauth.component.ts:30` computes the user''s local password as `btoa(profile.email.split('''').reverse().join(''''))`
    and passes it to `userService.save()` and then `userService.login()` at line 46 with the same derivation. Any attacker
    who knows a target user''s email address (which Google profiles expose) can independently compute this password and authenticate
    via the standard `/rest/user/login` endpoint with `{ email: victim@email, password: btoa(victim@email.split('''').reverse().join(''''))
    }`, bypassing Google OAuth entirely. When the target account is an admin, this becomes a complete privilege escalation.'
  evidence_summary: '`btoa(profile.email.split('''').reverse().join(''''))` is used as both the registration password and
    the login credential, making the password deterministically derivable from publicly-known email address.'
  impact_description: Any attacker knowing a victim's email address can compute their password and authenticate as that user
    without OAuth interaction, including admin accounts.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the computation is deterministic and public.
  mitigation_title: 'Eliminate derived passwords: link OAuth accounts via provider sub claim without creating a parallel password
    credential'
  remediation:
    effort: High
    steps:
    - Remove the password derivation from `oauth.component.ts` lines 30 and 46. OAuth-linked accounts must not have a usable
      local password.
    - 'At the server (`routes/login.ts`), when `oauth: true` is passed, validate the Google `access_token` server-side using
      Google''s token info endpoint, then issue a Juice Shop JWT directly without a password check.'
    - Mark OAuth-only accounts in the `Users` table with a NULL password and reject any direct password-based login attempt
      for those accounts.
    - Rotate any accounts whose passwords were derived this way (likely all `googlemail`/`gmail` accounts in the seeded DB).
    code_example: "// oauth.component.ts — REMOVE lines 30–31 and 46\n// Instead, send the access_token to a dedicated server\
      \ endpoint:\nthis.userService.oauthLoginWithToken(profile.access_token).subscribe({\n  next: (authentication) => {\n\
      \    localStorage.setItem('token', authentication.token);\n    // ...\n  }\n});"
    reference: CWE-798
  evidence:
  - file: frontend/src/app/oauth/oauth.component.ts
    line: 30
