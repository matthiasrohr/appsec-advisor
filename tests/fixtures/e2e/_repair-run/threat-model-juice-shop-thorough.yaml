  title: Unpinned GitHub Action Tag Reference — codeql-analysis.yml:23
  affected_parameter: null
  scenario: '`codeql-analysis.yml:23`, `codeql-analysis.yml:34`, and `codeql-analysis.yml:36` reference `github/codeql-action/init@v3`,
    `autobuild@v3`, and `analyze@v3` via mutable tag references. The `@v3` tag is a pointer the upstream maintainer can move
    to any commit at any time. An attacker who compromises the `github/codeql-action` repository (via a maintainer account,
    a malicious PR merged through a weak review process, or a tag-pointer rewrite) can redirect `@v3` to a malicious commit.
    On the next CI run, the pipeline executes that code with `permissions: security-events: write`, `actions: read`, and `contents:
    read` — enough to suppress findings, exfiltrate `GITHUB_TOKEN`, or persist a backdoor in the security-events feed. All
    three actions run on every `push` and `pull_request`, including from public forks.'
  evidence_summary: '`github/codeql-action/init@v3`, `autobuild@v3`, and `analyze@v3` at lines 23, 34, and 36 use mutable
    `@v3` tag references instead of commit SHA pins.'
  impact_description: A compromised `@v3` tag allows arbitrary code execution in the CI runner with repository token privileges,
    enabling secret exfiltration, suppression of security findings, or artifact tampering.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: All other third-party actions in the same workflow files are SHA-pinned. The CodeQL action steps are
    the specific outlier.
  mitigation_title: Pin all github/codeql-action steps to commit SHA in codeql-analysis.yml
  remediation:
    effort: Low
    steps:
    - 'For each `uses: github/codeql-action/*@v3` step in `.github/workflows/codeql-analysis.yml`, replace the tag reference
      with the full 40-character commit SHA of the current `v3` tag tip, e.g. `uses: github/codeql-action/init@<sha> # v3.27.0`.'
