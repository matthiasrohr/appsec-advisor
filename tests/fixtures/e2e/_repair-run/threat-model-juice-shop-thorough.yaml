    the `SOLUTIONS_WEBHOOK` secret is passed as a plain environment variable to the Cypress e2e job (`ci.yml:223`); if any
    test''s stdout or exception output contains the webhook URL, GitHub''s log masking (which is exact-string-match) may not
    cover URL-encoded or partially printed forms.'
