  title: Unauthenticated Admin Endpoints — server.ts:604
  affected_parameter: null
  scenario: '`server.ts:604-605` registers `GET /rest/admin/application-version` and `GET /rest/admin/application-configuration`
    without any `security.isAuthorized()` middleware before the handlers. These endpoints expose the full application configuration
    object (returned by `retrieveAppConfiguration()`) and the running version string to unauthenticated callers. The configuration
    object includes challenge-solving flags, customization parameters, and potentially any config values that include secrets
    or internal hostnames depending on the runtime config file. Additionally, `GET /rest/chatbot/status` and `POST /rest/chatbot/respond`
    (server.ts:629-630) have no auth guard, exposing the chatbot interaction surface unauthenticated.'
