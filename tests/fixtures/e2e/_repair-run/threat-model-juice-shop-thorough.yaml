  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:54
  affected_parameter: null
  scenario: 'The application uses express-jwt version 0.1.3 (package.json line 167) and jsonwebtoken version 0.4.0 (line 189).
    These are pre-CVE-2015-9235 versions that do not enforce the expected algorithm and accept tokens with `alg: ''none''`
    in the header, treating the empty signature as valid. An attacker takes any valid JWT, changes the `alg` header to `none`,
    strips the signature, and submits the token. The `isAuthorized()` middleware at lib/insecurity.ts:54 (`expressJwt({ secret:
    publicKey })`) accepts it. The attacker can also forge RS256→HS256 algorithm confusion: use the RSA public key as the
    HMAC secret to sign a modified HS256 token that passes verification.'
  evidence_summary: 'lib/insecurity.ts:54 configures `expressJwt({ secret: publicKey })` using express-jwt@0.1.3 — a version
    with confirmed alg:none and algorithm-confusion vulnerabilities.'
  impact_description: Unauthenticated attacker bypasses JWT verification, accessing any endpoint protected by `security.isAuthorized()`
    middleware.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the algorithm is not pinned in the expressJwt configuration.
  mitigation_title: Upgrade express-jwt and jsonwebtoken to current versions with explicit algorithm pinning
  remediation:
    effort: Medium
    steps:
    - 'Upgrade `express-jwt` to >= 8.4.1 and `jsonwebtoken` to >= 9.0.2: `npm install express-jwt@latest jsonwebtoken@latest`.'
    - 'Pin the expected algorithm explicitly: `expressJwt({ secret: publicKey, algorithms: [''RS256''] })` — this rejects
      tokens with any other algorithm including `none`.'
    - Audit all `jwt.verify()` and `jws.verify()` call sites to ensure `algorithms` is always specified.
    code_example: "// Safe configuration — pins algorithm, rejects alg:none\nexport const isAuthorized = () =>\n  expressJwt({\
      \ secret: publicKey, algorithms: ['RS256'] })"
    reference: CWE-347
