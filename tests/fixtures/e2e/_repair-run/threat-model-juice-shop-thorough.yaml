    the action is archived and should be replaced eventually. The action repository is archived, meaning it receives no
    security updates, bug fixes, or maintenance. While the SHA pin prevents tag-pointer attacks, the pinned code itself may
    contain vulnerabilities that will never be patched. This action runs in the release pipeline — the most privileged context
    in the repo (triggered by `push` to `v*` tags, producing artifacts uploaded to GitHub Releases and Docker images tagged
    with the version string). If the archived action''s code has a vulnerability (e.g. insecure handling of the tag output,
    log injection via specially crafted tag names), it can be exploited to corrupt the release artifact naming or inject malicious
    content into `GITHUB_ENV`. The `TODO` comment acknowledges the risk without a remediation timeline.'
