- local_id: auth-001
  threat_category_id: TH-01
  additional_categories:
  - TH-05
  stride: Spoofing
  cwe: CWE-89
  title: SQL Injection Authentication Bypass — routes/login.ts:34
  affected_parameter: email
  scenario: 'The login handler at routes/login.ts:34 constructs a raw SQL query via string interpolation: `SELECT * FROM Users
    WHERE email = ''${req.body.email}'' AND password = ''${security.hash(req.body.password)}''`. An unauthenticated attacker
    submits `'' OR ''1''=''1''--` as the email parameter. The injected clause short-circuits the WHERE condition, matching
    all rows. The application authenticates the attacker as the first returned user (typically admin). No prepared statements
    or ORM parameterization are used. This is a direct, Internet-exploitable authentication bypass requiring no credentials.'
  evidence_summary: Raw string interpolation of `req.body.email` and `req.body.password` into a Sequelize `query()` call at
    line 34 of routes/login.ts — no bind parameters, no escaping.
  impact_description: Unauthenticated attacker gains a valid JWT as any application user, including admin, with full role
    privileges for 6 hours.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no input validation, no parameterization, no WAF in front of this endpoint.
  mitigation_title: Replace raw SQL in login handler with parameterized Sequelize query
  remediation:
    effort: Low
    steps:
    - 'Replace `models.sequelize.query(\`SELECT * FROM Users WHERE email = ''${req.body.email}''...\`)` with `UserModel.findOne({
      where: { email: req.body.email, password: security.hash(req.body.password), deletedAt: null } })` using Sequelize ORM
      methods.'
    - Validate and sanitize `req.body.email` with a strict email schema (e.g., `zod` — `z.string().email()`) before it reaches
      any query.
    - Add a per-IP rate limit to POST /rest/user/login (e.g., `express-rate-limit` at 10 attempts per 15 minutes) using a
      trusted server-side IP, not X-Forwarded-For.
    code_example: "// Safe replacement using Sequelize ORM\nconst user = await UserModel.findOne({\n  where: {\n    email:\
      \ req.body.email,\n    password: security.hash(req.body.password),\n    deletedAt: null\n  }\n})"
