  stride: Tampering
  cwe: CWE-611
  title: XXE — routes/fileUpload.ts:83
  affected_parameter: uploaded XML file body
  scenario: 'At fileUpload.ts:83, uploaded XML is parsed with `libxml.parseXml(data, { noblanks: true, noent: true, nocdata:
    true })` — the `noent: true` option instructs libxmljs2 to resolve external entity references declared in the DOCTYPE.
    An attacker submitting an XML file containing `<!DOCTYPE foo [ <!ENTITY xxe SYSTEM "file:///etc/passwd"> ]><root>&xxe;</root>`
    causes the server to read the local file and embed its contents in `xmlString`. The resolved string is then appended verbatim
    into the HTTP 410 error response at line 87: `''B2B customer complaints via file upload have been deprecated for security
    reasons: '' + utils.trunc(xmlString, 400)`. Because the /file-upload endpoint requires no authentication (finding file-upload-service-001),
    any internet-facing attacker can perform this attack without credentials.'
  evidence_summary: 'fileUpload.ts:83 calls `libxml.parseXml(data, { noent: true })` — the `noent` flag is the direct enabler
    of external entity resolution; line 87 reflects up to 400 characters of the resolved XML document in the response.'
  impact_description: An unauthenticated attacker can exfiltrate arbitrary files readable by the Node.js process, including
    /etc/passwd, application config files, and private keys.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: 2000ms VM execution timeout guards against infinite recursion (xxe DoS); `utils.trunc(xmlString, 400)`
    limits exfiltrated bytes per request but does not prevent multi-request exfiltration
  mitigation_title: Disable external entity resolution by removing noent:true from libxmljs2 parseXml options in fileUpload.ts
  remediation:
    effort: Low
    steps:
    - 'Change the parseXml call at fileUpload.ts:83 to `libxml.parseXml(data, { noblanks: true, noent: false, nocdata: true
      })` — setting `noent: false` prevents external entity resolution at the C library level.'
    - 'Additionally disable the DOCTYPE declaration entirely using `libxml.parseXml(data, { noent: false, nonet: true, dtdload:
      false, dtdattr: false })` to block all external DTD loading.'
    - Do not reflect the parsed XML content in HTTP responses; replace the error message at line 87 with a fixed string that
      does not include `xmlString`.
    - If the B2B XML upload is deprecated (as the comment at line 78 suggests), consider removing the XML parsing branch entirely
      and returning HTTP 410 with a static message for all XML uploads.
    code_example: "// fileUpload.ts:83 — before\nconst xmlDoc = vm.runInContext(\n  'libxml.parseXml(data, { noblanks: true,\
      \ noent: true, nocdata: true })',\n  sandbox, { timeout: 2000 }\n)\n\n// after\nconst xmlDoc = vm.runInContext(\n  'libxml.parseXml(data,\
      \ { noblanks: true, noent: false, nonet: true, nocdata: true })',\n  sandbox, { timeout: 2000 }\n)"
    reference: CWE-611
  evidence:
  - file: routes/fileUpload.ts
    line: 83
  evidence_check: verified
