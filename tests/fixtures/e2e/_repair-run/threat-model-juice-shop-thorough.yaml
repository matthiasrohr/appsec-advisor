    code in the server process context with full filesystem and network access. The guard `utils.isChallengeEnabled(challenges.usernameXssChallenge)`
    only disables the eval path if the challenge is disabled — the challenge is enabled by default.'
  evidence_summary: '`routes/userProfile.ts:62` calls `eval(code)` on a server-rendered username with no sandbox, no allowlist,
    and no output escaping — the raw eval return value replaces the template placeholder.'
