  stride: Tampering
  cwe: CWE-829
  title: Unsafe Postinstall Hook Execution During Production Docker Build — Dockerfile:5
  affected_parameter: null
  scenario: '`Dockerfile:5` runs `npm install --omit=dev --unsafe-perm`. The `--unsafe-perm` flag disables npm''s safety restriction
    that would otherwise drop privileges during lifecycle scripts. In the `FROM node:24` build stage, this means postinstall
    hooks in any npm dependency run as the container build user (typically root inside the Docker build context). A malicious
    dependency (whether injected via the disabled lockfile in `.npmrc`, version squatting, or a compromised upstream package)
    can: write files anywhere in the `/juice-shop` build context, overwrite the application entrypoint at `build/app.js`,
    or read environment variables injected as Docker `ARG`/`ENV` — including `CYCLONEDX_NPM_VERSION`. The modified build context
    is then copied into the final distroless stage via `COPY --from=installer --chown=65532:0 /juice-shop .` at `Dockerfile:39`,
    propagating any injected code into the published `bkimminich/juice-shop:latest` image.'
  evidence_summary: '`Dockerfile:5` uses `--unsafe-perm` with `npm install`, allowing lifecycle hooks to run as root and modify
    any file in the build context before it is copied to the production image.'
  impact_description: A compromised npm dependency can inject code into the published Docker image shipped to all Juice Shop
    users and deployments.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: The final image uses `gcr.io/distroless/nodejs24-debian13` and runs as UID 65532, limiting runtime privilege.
    However, the build stage runs as root with `--unsafe-perm`.
  mitigation_title: Remove --unsafe-perm from Dockerfile npm install and enforce lockfile in Docker build
  remediation:
    effort: Low
    steps:
    - Remove `--unsafe-perm` from the `npm install` command at `Dockerfile:5`. Modern npm (v7+) does not require this flag
      for production installs; it was historically needed for older npm lifecycle script behaviour.
    - After committing `package-lock.json` (see `ci-cd-pipeline-002`), change `Dockerfile:5` to `npm ci --omit=dev` so the
      Docker build uses the pinned lockfile and fails on any lockfile mismatch, preventing silent dependency substitution
      in the build stage.
    code_example: '# Dockerfile — installer stage

      FROM node:24 AS installer

      COPY . /juice-shop

      WORKDIR /juice-shop

      RUN npm i -g typescript ts-node

      RUN npm ci --omit=dev    # was: npm install --omit=dev --unsafe-perm'
    reference: CWE-829
