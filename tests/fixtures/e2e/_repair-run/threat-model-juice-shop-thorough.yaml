  title: Missing Authentication on /file-upload Multipart Upload Endpoint — server.ts:309
  affected_parameter: multipart/form-data file field
  scenario: The POST /file-upload route registered at server.ts:309 has no authentication middleware before the handler chain
    (`uploadToMemory.single('file'), ensureFileIsPassed, checkUploadSize, checkFileType, handleZipFileUpload, handleXmlUpload,
    handleYamlUpload`). Any unauthenticated network actor — including anonymous internet users — can submit XML, ZIP, or YAML
