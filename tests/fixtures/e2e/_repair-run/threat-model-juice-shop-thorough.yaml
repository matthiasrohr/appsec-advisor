  title: 'Mass Assignment: role Field Writable — server.ts:483'
  affected_parameter: role
  scenario: 'The finale-rest auto-generated REST API registers UserModel with `exclude: [''password'', ''totpSecret'']` (server.ts:483),
    but does NOT exclude the `role` field. Finale passes the entire request body to Sequelize''s create() method. An unauthenticated
    attacker sends `POST /api/Users` with body `{"email":"attacker@evil.com","password":"pass","role":"admin"}`. Sequelize''s
    UserModel.create() receives `role: ''admin''` and the model setter at models/user.ts:86-99 accepts it (isIn validator
    confirms ''admin'' is a valid value). The attacker receives a registered account with the admin role, bypassing any privilege
    gate.'
  evidence_summary: server.ts:483 shows the finale resource for User excludes only password and totpSecret, leaving role writable;
    models/user.ts:80-84 confirms role is a string field with defaultValue 'customer' but no write-protection from external
    input.
  impact_description: Any unauthenticated user on the internet can self-register with admin role, gaining full administrative
    access to the application including access to all user data and administrative operations.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: 'The role field uses `isIn: [[''customer'', ''deluxe'', ''accounting'', ''admin'']]` for validation,
    which only restricts the value to known roles but does not prevent external assignment.'
  mitigation_title: Add 'role' to excludeAttributes in the finale User resource, and force server-side default
  remediation:
    effort: Low
    steps:
    - 'In server.ts:483, change the User resource definition to `{ name: ''User'', exclude: [''password'', ''totpSecret'',
      ''role'', ''deluxeToken'', ''totpSecret''], model: UserModel }` so the finale layer strips these fields from the POST
      body before Sequelize create().'
    - Alternatively, add a `resource.create.fetch.before` hook that explicitly deletes `context.attributes.role` and sets
      it to the default value 'customer', similar to the wallet creation hook at server.ts:509.
    - Add a test that POSTs to /api/Users with role='admin' and verifies the created user has role='customer'.
    code_example: "// server.ts — add a before-create hook to strip role\nif (name === 'User') {\n  resource.create.fetch.before((req,\
      \ res, context) => {\n    delete context.attributes.role\n    return context.continue\n  })\n}"
