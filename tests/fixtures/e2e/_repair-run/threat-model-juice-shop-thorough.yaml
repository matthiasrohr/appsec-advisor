  title: JWT Role Claims Not Validated Against Database at — lib/insecurity.ts:156
  affected_parameter: null
  scenario: 'The `isAccounting()` middleware at lib/insecurity.ts:156 and `isDeluxe()` at line 167 check `decodedToken?.data?.role`
    from the JWT payload without performing a database lookup to confirm the user''s current role. A user who was granted
    `accounting` or `admin` role and subsequently had that role revoked retains elevated access until their 6-hour JWT expires.
    More critically, with the hardcoded private key (auth-002) an attacker forges a token payload with `role: ''admin''`,
    signs it, and all role checks will pass — there is no server-side role truth to compare against.'
  evidence_summary: lib/insecurity.ts:159 checks `decodedToken?.data?.role === roles.accounting` with no DB read — the token
    claim is treated as authoritative for access control decisions.
  impact_description: Role escalation via token forgery (facilitated by auth-002) or delayed revocation — an attacker or a
    revoked privileged user retains admin/accounting access for up to 6 hours after a privilege change.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: JWT expiry at 6 hours provides eventual revocation.
  mitigation_title: Validate user role against database on privileged endpoint access rather than trusting JWT role claim
    alone
