components:
- id: angular-spa
  name: Angular SPA Frontend
  description: Angular-based single-page application served from frontend/dist/frontend/. Handles all user-facing UI, stores
    JWT tokens in localStorage, and communicates with the Express backend via REST and Socket.IO. Contains intentional client-side
    vulnerabilities including DOM XSS, insecure localStorage token storage, and prototype pollution.
  paths:
  - frontend/src/**
  - frontend/dist/**
  - frontend/*.ts
  - frontend/*.json
  tier: client
  complexity: moderate
  deployment_zones:
  - browser
  handles_sensitive_data: true
  technology: Angular 19+, TypeScript, Socket.IO client, localStorage JWT
  threat_ids:
  - T-001
  - T-002
  - T-003
  - T-015
  - T-020
  - T-021
  - T-027
  - T-048
  - T-053
- id: express-backend
  name: Express.js REST API Backend
  description: Node.js 24 / Express 4.22.1 monolith serving REST APIs, static files, and challenge logic. Contains intentional
    vulnerabilities including SQL injection (login, search), JWT signing with hardcoded RSA private key (lib/insecurity.ts),
    eval() SSTI (userProfile.ts), SSRF (profileImageUrlUpload.ts), and 21 endpoints missing authentication middleware.
  paths:
  - routes/**
  - server.ts
  - lib/**
  - app.ts
  - build/**
  tier: application
  complexity: complex
  deployment_zones:
  - container
  handles_sensitive_data: true
  technology: Node.js 24, Express 4.22.1, express-jwt 0.1.3, jsonwebtoken 0.4.0, helmet 4.6.0, morgan
  threat_ids:
  - T-007
  - T-008
  - T-009
  - T-012
  - T-013
  - T-016
  - T-018
  - T-025
  - T-026
  - T-035
  - T-037
  - T-038
  - T-039
  - T-040
  - T-043
  - T-044
  - T-045
  - T-051
  - T-052
- id: file-upload-service
  name: File Upload & Processing Service
  description: 'Express route handlers responsible for file ingestion and processing: multer-based multipart upload (fileUpload.ts),
    profile image upload from URL (profileImageUrlUpload.ts), profile image from file (profileImageFileUpload.ts). Contains
    XXE via libxmljs2 with noent:true, SSRF via unchecked URL fetch, and path traversal via logfileServer/keyServer/quarantineServer.'
  paths:
  - routes/fileUpload.ts
  - routes/profileImageUrlUpload.ts
  - routes/profileImageFileUpload.ts
  - routes/logfileServer.ts
  - routes/keyServer.ts
  - routes/quarantineServer.ts
  - ftp/**
  - encryptionkeys/**
  - uploads/**
  tier: application
  complexity: moderate
  deployment_zones:
  - container
  handles_sensitive_data: true
  technology: multer 1.4.5-lts.1, libxmljs2 0.37.x, sanitize-filename 1.6.3, node:path
  threat_ids:
  - T-010
  - T-014
  - T-041
  - T-046
  - T-057
- id: b2b-api
  name: B2B Order Processing API
  description: Machine-to-machine API endpoint at POST /b2b/v2/orders protected by JWT bearer auth. Processes JSON order payloads
    via notevil sandbox (routes/b2bOrder.ts:23) with vm.runInContext — susceptible to sandbox escape RCE. Accepts arbitrary
    JavaScript expressions as orderLinesData.
  paths:
  - routes/b2bOrder.ts
  - routes/checkKeys.ts
  tier: application
  complexity: simple
  deployment_zones:
  - container
  handles_sensitive_data: true
  technology: notevil, vm2, Node.js vm module
  threat_ids:
  - T-011
  - T-028
  - T-055
  - T-058
- id: data-layer
  name: Data Layer (SQLite + MarsDB)
  description: Persistence layer composed of SQLite 3 via Sequelize 6.37.3 ORM for relational user/product/order data, MarsDB
    0.6.11 for in-memory NoSQL storage (chatbot/memories), and local filesystem for uploaded files, encryption keys, and FTP
    downloads. SQL injection paths exist at the Sequelize raw-query level (login, search). The encryption keys directory (encryptionkeys/)
    is served publicly.
  paths:
  - models/**
  - data/**
  - config/**
  - lib/mongodb.ts
  - ftp/**
  - encryptionkeys/**
  tier: data
  complexity: moderate
  deployment_zones:
  - container
  handles_sensitive_data: true
  technology: SQLite 3, Sequelize 6.37.3, MarsDB 0.6.11, sqlite3 5.1.7, local filesystem
  threat_ids:
  - T-036
  - T-056
  - T-065
- id: auth
  name: Authentication & Session Surface
