    middleware.'
  impact_description: Unauthenticated callers read full application configuration; chatbot responds to unauthenticated requests,
    potentially leaking internal information or being abused for denial-of-service against the LLM backend.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — no auth middleware on these routes.
  mitigation_title: Add isAuthorized() and admin role check to /rest/admin/* endpoints in server.ts
