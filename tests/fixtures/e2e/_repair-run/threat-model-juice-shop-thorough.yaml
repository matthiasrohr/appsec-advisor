  stride: Denial of Service
  cwe: CWE-1333
  title: ReDoS — registerWebsocketEvents.ts:47
  affected_parameter: data (verifySvgInjectionChallenge event)
  scenario: The `verifySvgInjectionChallenge` handler at line 46-47 calls `data?.match(/.*\.\.\/\.\.\/\.\.[\ w/-]*?\/redirect\?to=https?:\/\/placecats\.com\/(g\/)?[\d]+\/[\d]+.*/)`
    where `data` is fully attacker-controlled. The regex has unanchored `.*` at both ends and a lazy `[\ w/-]*?` in the middle.
    Node.js uses a backtracking regex engine. An attacker can send a crafted string such as `'../../../' + 'a/'.repeat(50000)`
    that causes catastrophic backtracking — the engine repeatedly tries combinations of the lazy quantifier against the fixed
    suffix `/redirect?to=...` that never appears. This blocks the JavaScript event loop thread for the duration of the match,
    causing all Socket.IO events to stall.
  evidence_summary: '`data?.match(/.*\.\.\/\.\.\/\.\.[\ w/-]*?\/redirect\?to=.../)`  at line 47 applies an unanchored backtracking
    regex to an attacker-supplied string with no length or content pre-check.'
  impact_description: A single crafted WebSocket message can block the Node.js event loop for seconds to minutes, causing
    a denial of service for all active connections.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — no input length limit, no pre-validation before the regex match.
  mitigation_title: Pre-validate and length-cap data before regex match in verifySvgInjectionChallenge handler
  remediation:
    effort: Low
    steps:
    - 'Add a length check before the regex: `if (typeof data !== ''string'' || data.length > 500) return;` to reject oversized
      or non-string inputs.'
    - 'Rewrite the regex to be anchored and non-backtracking: replace the leading `.*` with `^[^]*?` and reduce ambiguity
      in the middle quantifier, or use a non-backtracking approach by splitting on known delimiters first.'
    - Consider using the Node.js `vm.runInNewContext()` with a timeout, or the `re2` package (a linear-time RE2 engine for
      Node), for any regex applied to untrusted input.
    code_example: "socket.on('verifySvgInjectionChallenge', (data: any) => {\n  if (typeof data !== 'string' || data.length\
      \ > 500) return  // ReDoS guard\n  challengeUtils.solveIf(challenges.svgInjectionChallenge, () => {\n    return data.match(/.*\\\
      .\\.\\/\\.\\.\\/\\.\\.[\\ w/-]*?\\/redirect\\?to=https?:\\/\\/placecats\\.com\\/(g\\/)?[\\d]+\\/[\\d]+.*/) &&\n    \
      \  security.isRedirectAllowed(data)\n  })\n})"
    reference: CWE-1333
