- local_id: data-layer-005
  threat_category_id: TH-09
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-256
  title: Weak MD5 Password Hashing Without Salt — lib/insecurity.ts:43
  affected_parameter: password
  scenario: 'lib/insecurity.ts:43 defines `export const hash = (data: string) => crypto.createHash(''md5'').update(data).digest(''hex'')`.
    This unsalted MD5 hash is applied to every user password before storage (models/user.ts:77). MD5 is not a password hashing
    function — it is a general-purpose hash with no work factor, no salt, and is trivially reversible for common passwords
    via rainbow tables or GPU-accelerated brute force. If the SQLite database file (data/juiceshop.sqlite) is exfiltrated
    — possible via path traversal in file-serving routes or direct container access — all user passwords can be recovered
    within hours. Under PCI-DSS 8.3.1, password storage must use strong adaptive hashing (bcrypt/scrypt/Argon2). The SQL injection
    vulnerabilities (data-layer-001 and data-layer-002) make the Users table extractable from a remote attacker without file
    system access.'
  evidence_summary: lib/insecurity.ts:43 calls crypto.createHash('md5') for password hashing; models/user.ts:77 calls security.hash(clearTextPassword)
    in the Sequelize setter, storing the result as the user's password.
  impact_description: All user account passwords can be recovered from the database via rainbow tables or brute force, enabling
    account takeover across the user base.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no salt, no key-stretching, no work factor.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2 in lib/insecurity.ts
  remediation:
    effort: Medium
    steps:
    - 'Install bcrypt: `npm install bcrypt @types/bcrypt`.'
    - Replace `crypto.createHash('md5').update(data).digest('hex')` with `bcrypt.hashSync(data, 12)` for hashing and add a
      `verify` function using `bcrypt.compareSync`.
    - Update the login query in routes/login.ts to use bcrypt.compare() rather than comparing hash values in the SQL WHERE
      clause — this is also required to fix data-layer-001.
    - 'Migrate existing password hashes: on next login, re-hash the password with bcrypt and update the database record.'
    - Ensure the User model setter in models/user.ts:77 calls the new bcrypt hash function.
    code_example: "// lib/insecurity.ts\nimport bcrypt from 'bcrypt'\nconst BCRYPT_ROUNDS = 12\nexport const hash = (data:\
      \ string) => bcrypt.hashSync(data, BCRYPT_ROUNDS)\nexport const verifyPassword = (clearText: string, storedHash: string)\
      \ =>\n  bcrypt.compareSync(clearText, storedHash)"
    reference: CWE-256
  evidence:
  - file: lib/insecurity.ts
    line: 43
