    heap before the VM timer fires. Because the endpoint requires no authentication (finding file-upload-service-001), an
    attacker can submit concurrent requests to amplify resource exhaustion. The `xxeDosChallenge` at lines 91-93 confirms
    this vector is intentional but the authentication gap makes it exploitable at scale.'
  evidence_summary: 'fileUpload.ts:83 passes `noent: true` to libxmljs2''s C-level parser; the vm timeout at the same line
    guards only JavaScript execution, not C-level entity expansion memory allocation.'
