    a crafted `alg:none` JWT with `{data:{role:''admin''}}` payload to pass AdminGuard decoding`. While the actual administration
    API endpoints should enforce server-side authorization, the absence of guard hardening allows the admin UI to load and
    expose its structure to unauthenticated actors.'
  evidence_summary: '`LoginGuard` returns `true` based solely on `localStorage.getItem(''token'')` being truthy — any non-empty
    string passes. `AdminGuard` trusts the client-side decoded JWT role claim without signature verification.'
