  title: DOM XSS — last-login-ip.component.ts:39
  affected_parameter: lastLoginIp
  scenario: '`last-login-ip.component.ts:39` executes `this.sanitizer.bypassSecurityTrustHtml(''<small>${payload.data.lastLoginIp}</small>'')`
    where `payload.data.lastLoginIp` is taken directly from the decoded JWT. If the server stores an attacker-controlled value
    as the `lastLoginIp` claim (e.g., by routing a login request through an HTTP client with a crafted `X-Forwarded-For: <img
    src=x onerror=alert(1)>` header), the payload executes as HTML in the Last Login IP display page. This cross-component
    chain — attacker-controlled header → server-stored in JWT → client renders as HTML — bypasses Angular''s sanitization
    entirely.'
  evidence_summary: '`bypassSecurityTrustHtml` wraps a JWT claim interpolated directly into an HTML string, creating an XSS
    sink for any attacker-controlled data stored server-side in the JWT.'
  impact_description: Attacker-controlled data in the `lastLoginIp` JWT field executes as script in the authenticated user's
    browser context, enabling session takeover or credential theft.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None — explicit sanitization bypass.
  mitigation_title: Render last-login IP as plain text, not trusted HTML
