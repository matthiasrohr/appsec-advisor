  cwe: CWE-22
  title: Zip Slip Arbitrary File Write — routes/fileUpload.ts:45
  affected_parameter: ZIP archive entry filename (entry.path)
  scenario: 'In handleZipFileUpload (fileUpload.ts:40-45), entries from a ZIP archive are extracted and written to disk. The
    check at line 44 evaluates `absolutePath.includes(path.resolve(''.''))`. While this check is designed to prevent writing
    outside the working directory, it is bypassed by the fact that `fs.createWriteStream` at line 45 receives the raw un-normalized
    `fileName` string: `fs.createWriteStream(''uploads/complaints/'' + fileName)`. A ZIP entry named `../../ftp/legal.md`
    produces `absolutePath = /app/ftp/legal.md` which DOES include `/app` (the working dir), so the check passes. The stream
    then writes to `uploads/complaints/../../ftp/legal.md` which resolves to `/app/ftp/legal.md`, overwriting the FTP directory
    file. With appropriate traversal, attacker-controlled content can be written to `routes/`, `models/`, or any location
    writable by the Node.js process, enabling backdoor injection or data destruction.'
  evidence_summary: fileUpload.ts:45 passes the raw entry.path string directly to `fs.createWriteStream` without normalization,
    while the guard at line 44 checks the resolved absolute path — the mismatch allows traversal within the working directory.
  impact_description: An unauthenticated attacker can overwrite application source files, FTP contents, or configuration files
    within the working directory, leading to persistent backdoor injection or data destruction.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Path containment check at line 44 (insufficient — bypassable by path normalization mismatch); multer
    200KB file size limit applies to the outer ZIP, not individual extracted entries
  mitigation_title: Use the resolved absolute path as the write target in handleZipFileUpload and reject entries outside the
    complaints directory
  remediation:
    effort: Low
    steps:
    - Replace `fs.createWriteStream('uploads/complaints/' + fileName)` at line 45 with a stream to the pre-resolved `absolutePath`
      variable that was already computed at line 42.
    - 'Strengthen the guard at line 44: change to `if (!absolutePath.startsWith(path.resolve(''uploads/complaints'') + path.sep))`
      — use `startsWith` with a trailing path separator to prevent a filename like `../complaints_evil` from matching a prefix.'
    - Reject or skip ZIP entries whose `fileName` contains `..` before any path resolution.
    - Consider using the `unzipper` library's `entry.autodrain()` for any entry that fails validation instead of writing.
    code_example: "const targetDir = path.resolve('uploads/complaints') + path.sep\nconst absolutePath = path.resolve('uploads/complaints/'\
      \ + fileName)\nif (!absolutePath.startsWith(targetDir)) {\n  entry.autodrain()  // reject traversal entries\n  return\n\
      }\n// Write to the pre-resolved absolute path, not the raw fileName\nentry.pipe(fs.createWriteStream(absolutePath).on('error',\
      \ (err) => next(err)))"
    reference: CWE-22
  evidence:
