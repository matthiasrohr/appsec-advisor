tier_root_causes:
  edge:
  - OAuth-derived passwords via predictable email-based derivation
  - JWT bearer tokens in localStorage exposed to XSS-based theft
  - OAuth implicit flow without PKCE or state enables token interception
  - Angular bypassSecurityTrustHtml on product descriptions enables stored XSS
  - DOM XSS via unsanitized query parameters reflected into innerHTML sinks
  server:
  - Raw string interpolation in SQL queries across login, search, and review routes
  - Hardcoded RSA private key enables universal offline JWT forgery
  - JWT alg:none and weak verification allow signature bypass and role escalation
  - Missing ownership checks on resource endpoints enabling systemic IDOR
