  stride: Information Disclosure
  cwe: CWE-209
  title: Verbose Error Handler Exposing Stack Traces — server.ts:676
  affected_parameter: null
  scenario: '`server.ts:676` uses the `errorhandler` npm package (`const errorhandler = require(''errorhandler'')`). This
    package, designed for development, renders a full HTML page with the error message, stack trace, file path, and line number
    when an unhandled exception propagates. When `NODE_ENV` is not explicitly set to `production`, `errorhandler` sends this
    to the browser. Several routes deliberately call `next(error)` with user-readable error messages that include internal
    paths (e.g. `routes/login.ts`, `routes/resetPassword.ts:23` — `''Blocked illegal activity by '' + connection.remoteAddress`).
    An attacker who triggers a handled route error sees internal file paths and framework versions from the `errorhandler.title`
    field set at `server.ts:719`: `${config.get(''application.name'')} (Express ${utils.version(''express'')})`.'
  evidence_summary: '`server.ts:676` installs the `errorhandler` dev-mode package as the final error middleware; `server.ts:719`
    sets its title to expose the Express version.'
  impact_description: Stack traces and library versions delivered in 500 responses aid targeted exploit selection against
    known Express/Node.js CVEs.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — errorhandler is unconditionally registered.
  mitigation_title: Replace errorhandler with a production error handler that returns generic messages
  remediation:
    effort: Low
    steps:
    - Remove the `errorhandler` package from production code paths.
    - 'Add a custom Express error middleware as the last `app.use()` that logs the full error internally (via `logger.error()`)
      and returns only `{ error: ''Internal server error'' }` with HTTP 500 to the client.'
    - Set `NODE_ENV=production` in Docker/container env to suppress any development-mode verbose output from other middleware.
    code_example: "// server.ts — replace errorhandler with:\napp.use((err: Error, req: Request, res: Response, _next: NextFunction)\
      \ => {\n  logger.error({ msg: err.message, stack: err.stack, url: req.url })\n  res.status(500).json({ error: 'Internal\
      \ server error' })\n})"
    reference: CWE-209
