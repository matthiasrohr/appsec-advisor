    line: 18
    excerpt: 'return ({ body }: Request, res: Response, next: NextFunction) => { ... } // No logging of orderLinesData'
  controls_in_place: HTTP access logs via morgan (request-level only)
  mitigation:
    title: Add structured audit logging for B2B orders
    steps:
