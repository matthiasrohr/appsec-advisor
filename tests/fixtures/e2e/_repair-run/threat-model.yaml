  title: No audit trail for B2B orders routes/b2bOrder.ts
  stride: Repudiation
  component: b2b-api
  description: B2B orders processed through the /b2b/v2/orders endpoint are not logged with sufficient detail to reconstruct
    what orderLinesData was submitted. If an attacker abuses the RCE vulnerability, there is no forensic record of the malicious
    payload that was executed.
