threats:
- id: T-001
  title: SQL injection in login routes/login.ts
  stride: Spoofing
  component: backend-api
  description: The login handler constructs a raw SQL query using string interpolation of user-supplied email and password
    hash values. An attacker can use SQL injection payloads (e.g. `' OR '1'='1'--`) in the email field to bypass authentication
    entirely and gain access as any user, including admin.
  likelihood: Critical
  impact: Critical
  risk: Critical
  cwe: CWE-89
  evidence:
  - file: routes/login.ts
    line: 37
    excerpt: models.sequelize.query(`SELECT * FROM Users WHERE email = '${req.body.email || ''}' AND password = '${security.hash(req.body.password
      || '')}' AND deletedAt IS NULL`
  controls_in_place: None — raw SQL with no parameterization
  mitigation:
    title: Replace raw SQL with parameterized Sequelize query
    steps:
    - Replace string interpolation with Sequelize `where` clause using parameterized values
    - 'Use `UserModel.findOne({ where: { email, password: hash } })` instead of raw SQL'
    effort: Low
    reference: https://sequelize.org/docs/v6/core-concepts/model-querying-basics/
  mitigation_ids:
  - M-001
  source: stride
  evidence_check: verified-prior
  component_name: Express REST API Backend
  scenario: The login handler constructs a raw SQL query using string interpolation of user-supplied email and password hash
    values. An attacker can use SQL injection payloads (e.g. `' OR '1'='1'--`) in the email field to bypass authentication
    entirely and gain access as any user, including admin.
  vektor: internet-anon
  effective_severity: Critical
  breach_distance: 1
  chain_role: keystone
  compound_chain_ids:
  - CC-03
  verified_chain_ids: []
- id: T-002
  title: Hardcoded RSA private key enables JWT forgery lib/insecurity.ts
  stride: Spoofing
  component: backend-api
  description: The RSA private key used to sign all JWT authentication tokens is hardcoded as a string literal in lib/insecurity.ts.
    Anyone with access to the source code (public GitHub repository) can use this key to sign JWT tokens as any user, including
    admin, and authenticate without a valid password.
  likelihood: Critical
  impact: Critical
  risk: Critical
  cwe: CWE-321
  evidence:
  - file: lib/insecurity.ts
    line: 26
    excerpt: const privateKey = '[REDACTED RSA PRIVATE KEY]' (truncated — full key in source)
  controls_in_place: None — key permanently compromised via public source
  mitigation:
    title: Remove hardcoded RSA private key; use environment variable
    steps:
    - Generate new RSA key pair
    - Store private key in environment variable or secrets manager
    - Read via `process.env.JWT_PRIVATE_KEY`
    - Rotate all existing tokens (invalidate current sessions)
    effort: Medium
    reference: https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html
  mitigation_ids:
  - M-003
  source: stride
  evidence_check: verified-prior
  component_name: Express REST API Backend
  scenario: The RSA private key used to sign all JWT authentication tokens is hardcoded as a string literal in lib/insecurity.ts.
    Anyone with access to the source code (public GitHub repository) can use this key to sign JWT tokens as any user, including
    admin, and authenticate without a valid password.
  vektor: repo-read
