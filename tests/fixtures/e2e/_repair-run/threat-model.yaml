    title: Use path.resolve with strict prefix validation for ZIP extraction
    steps:
    - After resolving the path, verify it starts with `path.resolve('uploads/complaints') + path.sep`
    - Use the archiver library's safeExtract option or manually validate each entry
    - Reject ZIP entries with absolute paths or path traversal sequences
    effort: Low
    reference: https://snyk.io/research/zip-slip-vulnerability
  mitigation_ids:
  - M-030
  source: stride
  evidence_check: verified-prior
  component_name: File Upload Service
  scenario: The ZIP file upload handler extracts entries to uploads/complaints/ without sufficient path validation. The `absolutePath.includes(path.resolve('.'))`
    check can be bypassed with carefully crafted paths. An attacker can write files to arbitrary locations including ftp/
    (e.g. ftp/legal.md), enabling overwrite of sensitive server files.
  vektor: internet-anon
  effective_severity: High
  breach_distance: 2
  chain_role: none
  compound_chain_ids: []
  verified_chain_ids: []
- id: T-037
  title: Stored XSS via trust HTML bypass in admin panel administration.component.ts
  stride: Elevation of Privilege
  component: frontend-spa
  description: The administration component renders user emails and feedback comments using DomSanitizer.bypassSecurityTrustHtml(),
    which disables Angular's built-in XSS protection. An attacker who registers with an email containing a script tag or injects
    malicious HTML via feedback can execute arbitrary JavaScript in the browser of any admin who views the administration
    panel.
  likelihood: High
  impact: High
  risk: High
  cwe: CWE-79
  evidence:
  - file: frontend/src/app/administration/administration.component.ts
    line: 60
    excerpt: user.email = this.sanitizer.bypassSecurityTrustHtml(`<span class="${...}">${user.email}</span>`)
  - file: frontend/src/app/administration/administration.component.ts
    line: 78
    excerpt: feedback.comment = this.sanitizer.bypassSecurityTrustHtml(feedback.comment)
  controls_in_place: Angular DomSanitizer present but explicitly bypassed
  mitigation:
    title: Remove bypassSecurityTrustHtml calls; use Angular binding safely
    steps:
    - Remove bypassSecurityTrustHtml() calls
    - Use [innerText] binding for email display instead of [innerHTML]
    - For HTML-containing comments, use a sanitize pipe instead of bypass
    effort: Low
    reference: https://angular.io/guide/security#sanitization-and-security-contexts
  mitigation_ids:
  - M-019
  source: stride
  evidence_check: verified-prior
  component_name: Angular Single-Page Application
  scenario: The administration component renders user emails and feedback comments using DomSanitizer.bypassSecurityTrustHtml(),
    which disables Angular's built-in XSS protection. An attacker who registers with an email containing a script tag or injects
    malicious HTML via feedback can execute arbitrary JavaScript in the browser of any admin who views the administration
    panel.
  vektor: victim-required
  effective_severity: Critical
  breach_distance: 2
  chain_role: keystone
  compound_chain_ids:
  - CC-01
  verified_chain_ids: []
- id: T-038
  title: Client side only admin guard Angular route guard bypass app.guard.ts
  stride: Elevation of Privilege
  component: frontend-spa
  description: AdminGuard and AccountingGuard are client-side only Angular route guards. They can be bypassed by directly
    navigating to /administration or /accounting with a non-admin JWT. The backend has no matching server-side authorization
    check that restricts the admin UI's data endpoints to admin roles.
  likelihood: High
  impact: High
  risk: High
  cwe: CWE-602
  evidence:
  - file: frontend/src/app/app.guard.ts
    line: 18
    excerpt: canActivate () { if (localStorage.getItem('token')) { return true } ... }
  controls_in_place: Client-side guards only
  mitigation:
    title: Implement server-side admin role enforcement
    steps:
    - Create security.isAdmin() middleware checking JWT role === 'admin'
    - Apply to all admin-specific REST endpoints (user management, order history, etc.)
    - Do not rely on client-side guards for security enforcement
    effort: Medium
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html
  mitigation_ids:
  - M-021
  source: stride
