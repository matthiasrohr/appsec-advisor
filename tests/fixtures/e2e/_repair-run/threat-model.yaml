attack_surface:
- entry_point: POST /rest/user/login
  protocol: HTTP
  auth_required: false
  notes: SQL injection via email/password fields; no rate limiting on this endpoint
- entry_point: GET /rest/products/search
  protocol: HTTP
  auth_required: false
  notes: SQL injection via q parameter; raw Sequelize query with string interpolation
- entry_point: GET /rest/products/:id/reviews
  protocol: HTTP
  auth_required: false
  notes: NoSQL injection via $where clause in MarsDB query; sleep injection DoS possible
- entry_point: GET /rest/track-order/:id
  protocol: HTTP
  auth_required: false
  notes: SQL injection via order ID parameter
- entry_point: POST /file-upload
  protocol: HTTP multipart
  auth_required: false
  notes: ZIP directory traversal; XML XXE via libxmljs2 noent:true; YAML upload
- entry_point: POST /profile/image/url
  protocol: HTTP
  auth_required: false
  notes: SSRF via URL-based profile image upload; fetches arbitrary URLs server-side
- entry_point: GET /profile (POST /profile)
  protocol: HTTP
  auth_required: true
  notes: SSTI + eval() in username field; pug template injection
- entry_point: POST /b2b/v2/orders
  protocol: HTTP
  auth_required: true
  notes: RCE via vm.runInContext + notevil on orderLinesData field
- entry_point: GET /ftp (and files)
  protocol: HTTP
  auth_required: false
  notes: 'Directory listing exposing confidential files: acquisitions.md, incident-support.kdbx, coupons'
- entry_point: GET /encryptionkeys/:file
  protocol: HTTP
  auth_required: false
  notes: Exposes JWT public key (jwt.pub) and premium.key; directory listing enabled
- entry_point: GET /support/logs/:file
  protocol: HTTP
  auth_required: false
  notes: Access log directory listing; reveals user activity and IP addresses
- entry_point: GET /api/Users
  protocol: HTTP
  auth_required: true
  notes: Lists all users; IDOR possible on /api/Users/:id; finale-rest auto-generated
- entry_point: PUT /api/Products/:id
  protocol: HTTP
  auth_required: false
  notes: Authorization intentionally commented out — unauthenticated product modification
- entry_point: GET /metrics
  protocol: HTTP
  auth_required: false
  notes: Prometheus metrics endpoint; reveals application internals and request statistics
- entry_point: GET /api-docs
  protocol: HTTP
  auth_required: false
  notes: Swagger UI exposing full API documentation including B2B endpoints
- entry_point: POST /api/Users (registration)
  protocol: HTTP
  auth_required: false
  notes: User registration; allows setting role field (mass assignment if validation bypassed)
- entry_point: PATCH /rest/products/reviews
  protocol: HTTP
  auth_required: true
  notes: NoSQL injection in review update; multi:true allows updating all reviews
- entry_point: GET /rest/user/change-password
  protocol: HTTP
  auth_required: false
  notes: Password change via GET with no CSRF; current password can be omitted in some flows
- entry_point: WebSocket / Socket.IO
  protocol: WebSocket
  auth_required: false
  notes: Challenge notification socket; no authentication required to connect
- entry_point: GET /redirect
  protocol: HTTP
  auth_required: false
  notes: Open redirect via ?to= parameter; allowlist bypassable
trust_boundaries:
- id: tb-1
  name: Public Internet
  description: Unauthenticated external users and attackers. No trust. All traffic arrives here first.
  components:
  - external-user
  - attacker
  from: external
  to: backend-api
  crossing_enforcement: None — CORS wildcard, no authentication required for many endpoints
- id: tb-2
  name: Browser / Client Tier
  description: Angular SPA running in browser. JWT stored in localStorage (XSS-accessible). Client-side route guards only
    — no server enforcement.
  components:
  - frontend-spa
  from: frontend-spa
  to: backend-api
  crossing_enforcement: JWT Bearer token in Authorization header (RS256, but private key hardcoded)
- id: tb-3
  name: Application Tier
  description: Express backend process. Handles all routing, authentication, and business logic. Partially enforces access
    control via express-jwt middleware on selected routes.
  components:
  - backend-api
  - file-upload-service
  - b2b-api
  from: backend-api
  to: data-persistence
  crossing_enforcement: No network-level isolation — same process; Sequelize ORM with raw SQL fallback
- id: tb-4
  name: Data Tier
  description: SQLite file (data/juiceshop.sqlite) and MarsDB in-memory store. No network isolation — same filesystem.
  components:
  - data-persistence
  from: backend-api
  to: data-persistence
  crossing_enforcement: File system permissions; no network segmentation; SQLite file accessible to any process running as
    same user
- id: tb-5
  name: Filesystem / Upload Zone
  description: Server filesystem including uploads/, ftp/, encryptionkeys/, logs/. Intended to be isolated but exposed via
    directory listing routes.
  components:
  - file-upload-service
  from: file-upload-service
  to: external-user
  crossing_enforcement: None — /ftp, /encryptionkeys, /support/logs all publicly browsable
