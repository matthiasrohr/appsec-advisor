$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-plugin/schemas/dep-scan.schema.yaml
title: Dependency scan result
description: |
  Output written by `appsec-dep-scanner` to `$OUTPUT_DIR/.dep-scan.json`.
  Contains SCA findings for dependency manifests. Hardcoded secrets and
  insecure defaults are legacy fields retained for backward compatibility;
  current runs populate only `vulnerable_dependencies`.

# Error stubs (objects containing `parse_error`) are accepted as a known
# failure-state contract; the if/then/else routes validation so the error
# messages reference the actual missing fields rather than a generic
# "did not match any schema" oneOf failure.
type: object
if:
  required: [parse_error]
then:
  $ref: "#/$defs/errorStub"
else:
  $ref: "#/$defs/normal"

$defs:

  severity:
    type: string
    enum: [Critical, High, Medium, Low]

  errorStub:
    type: object
    required: [parse_error, vulnerable_dependencies]
    properties:
      parse_error:
        type: string
      vulnerable_dependencies:
        type: array
        maxItems: 0

  normal:
    type: object
    required: [scanned_at, repo_root, summary, vulnerable_dependencies]
    properties:

      scanned_at:
        type: string
        description: ISO-8601 timestamp

      repo_root:
        type: string

      summary:
        type: object
        required: [vulnerable_dependencies]
        properties:
          vulnerable_dependencies:
            type: integer
            minimum: 0
          hardcoded_secrets:
            type: integer
            minimum: 0
          insecure_defaults:
            type: integer
            minimum: 0

      vulnerable_dependencies:
        type: array
        items:
          type: object
          required: [manifest, package, version_found, issue, severity]
          properties:
            manifest: { type: string }
            package:  { type: string }
            version_found: { type: string }
            issue:    { type: string }
            cve_id:   { type: [string, "null"] }
            source:   { type: string }
            severity: { $ref: "#/$defs/severity" }
            cvss_v4:
              # CVSS v4.0 score from the upstream advisory. When the
              # advisory only publishes CVSS v3.1, set version_fallback to
              # "3.1" and copy the v3.1 vector/score/severity verbatim — do
              # NOT recompute v4 metrics from a v3.1 vector.
              oneOf:
                - type: "null"
                - type: object
                  required: [vector, base_score, severity, source]
                  additionalProperties: false
                  properties:
                    vector:
                      type: string
                      pattern: "^CVSS:[34]\\.[01](/[A-Z]+:[A-Z0-9]+)+$"
                    base_score:
                      type: number
                      minimum: 0.0
                      maximum: 10.0
                    severity:
                      type: string
                      enum: [None, Low, Medium, High, Critical]
                    source:
                      type: string
                      enum: [nvd, osv, ghsa, vendor, manual]
                    version_fallback:
                      type: [string, "null"]
                      enum: ["3.1", null]

      # Legacy fields — accepted if present, not required.
      hardcoded_secrets:
        type: array
        items:
          type: object
          required: [file, line, type, snippet, severity]
          properties:
            file:     { type: string }
            line:     { type: integer, minimum: 0 }
            type:     { type: string }
            snippet:  { type: string }
            severity: { $ref: "#/$defs/severity" }

      insecure_defaults:
        type: array
        items:
          type: object
          required: [file, issue, severity]
          properties:
            file:     { type: string }
            line:     { type: [integer, "null"], minimum: 0 }
            issue:    { type: string }
            severity: { $ref: "#/$defs/severity" }
