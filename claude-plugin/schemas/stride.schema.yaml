$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-plugin/schemas/stride.schema.yaml
title: Per-component STRIDE analysis result
description: |
  Output written by `appsec-stride-analyzer` to
  `$OUTPUT_DIR/.stride-<component-id>.json`. One file per analyzed
  component. Phase 9 of the orchestrator merges all stride files into
  `.threats-merged.json` after assigning global T-NNN IDs.

type: object
if:
  required: [parse_error]
then:
  $ref: "#/$defs/errorStub"
else:
  $ref: "#/$defs/normal"

$defs:

  stride_category:
    type: string
    enum:
      - Spoofing
      - Tampering
      - Repudiation
      - Information Disclosure
      - Denial of Service
      - Elevation of Privilege

  likelihood:
    type: string
    enum: [High, Medium, Low]

  impact:
    type: string
    enum: [Critical, High, Medium, Low]

  risk:
    type: string
    enum: [Critical, High, Medium, Low]

  cvss_v4:
    # Optional CVSS v4.0 score block. Only permitted when the threat's CWE
    # is on the eligibility list (claude-plugin/data/cvss-eligible-cwes.yaml) AND
    # concrete file:line evidence exists. See validate_intermediate.py for
    # the eligibility post-check that enforces this rule across sources.
    type: object
    required: [vector, base_score, severity, source]
    additionalProperties: false
    properties:
      vector:
        type: string
        # CVSS 4.0 base vector: AV/AC/AT/PR/UI + VC/VI/VA + SC/SI/SA at minimum.
        # Further supplemental/environmental metrics are allowed after the
        # base metrics but not required.
        pattern: "^CVSS:4\\.0(/[A-Z]+:[A-Z0-9]+)+$"
      base_score:
        type: number
        minimum: 0.0
        maximum: 10.0
      severity:
        type: string
        enum: [None, Low, Medium, High, Critical]
      source:
        type: string
        enum: [stride-analyzer, dep-scan, nvd, osv, known-vuln, manual]
      version_fallback:
        # Set to "3.1" when the upstream advisory only carries CVSS v3.1 and
        # we did not recompute a v4 vector; vector/base_score/severity in
        # that case reflect the v3.1 values. Consumers MUST check this flag
        # before comparing scores across threats.
        type: [string, "null"]
        enum: ["3.1", null]

  errorStub:
    type: object
    required: [parse_error, threats]
    properties:
      parse_error: { type: string }
      threats:
        type: array
        maxItems: 0

  normal:
    type: object
    required: [component_id, component_name, analyzed_at, threats]
    properties:

      component_id:   { type: string, minLength: 1 }
      component_name: { type: string, minLength: 1 }
      analyzed_at:    { type: string }
      compliance_scope_applied:
        type: array
        items: { type: string }

      threats:
        type: array
        items:
          type: object
          required: [local_id, stride, scenario, likelihood, impact, risk]
          properties:
            local_id:   { type: string }
            stride:     { $ref: "#/$defs/stride_category" }
            scenario:
              type: string
              # JSONSchema cannot check "stripped length >= 10"; Python
              # post-check in validate_intermediate.py enforces that.
              minLength: 10
            likelihood: { $ref: "#/$defs/likelihood" }
            impact:     { $ref: "#/$defs/impact" }
            risk:       { $ref: "#/$defs/risk" }
            controls_in_place:
              type: [string, "null"]
            mitigation_title:
              type: [string, "null"]
            remediation:
              type: [object, "null"]
              properties:
                effort:
                  type: string
                  enum: [Low, Medium, High]
                steps:
                  type: array
                  items: { type: string }
                code_example: { type: string }
                reference:    { type: string }
            evidence:
              type: [object, "null"]
              properties:
                file: { type: string }
                line: { type: [integer, "null"], minimum: 0 }
            prior_finding_ref:
              type: [string, "null"]
            cvss_v4:
              # Optional — see $defs/cvss_v4. Eligibility is enforced by
              # the Python post-check, not by the structural schema.
              oneOf:
                - type: "null"
                - $ref: "#/$defs/cvss_v4"
