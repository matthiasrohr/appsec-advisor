$schema: https://json-schema.org/draft/2020-12/schema
$id: https://appsec-plugin/schemas/threat-model.output.schema.yaml
title: threat-model.yaml — external machine-readable export
description: |
  Final output contract for `$OUTPUT_DIR/threat-model.yaml`. This is the
  structured export that downstream consumers (CI/CD, DefectDojo, SonarQube,
  sibling threat models via cross-repo discovery) depend on. Schema drift
  breaks integrations silently — producers MUST validate against this file.

  Extensibility: the schema allows additional properties at the top level
  and inside every major list item so future fields (run_statistics,
  cross_repo_dependencies, triage_flags, …) can be added without breaking
  consumers. Remove `additionalProperties: true` hints to tighten.

type: object
additionalProperties: true

required:
  - meta
  - components
  - assets
  - attack_surface
  - trust_boundaries
  - security_controls
  - threats
  - mitigations

properties:

  meta:
    type: object
    additionalProperties: true
    required: [schema_version, project, generated, mode, model]
    properties:
      schema_version:
        const: 1
      project:
        type: string
      generated:
        type: string
        description: ISO-8601 timestamp
      analysis_duration_seconds:
        type: [integer, "null"]
        minimum: 0
      mode:
        type: string
        enum: [full, incremental]
      analyst:
        type: string
      model:
        type: string
      compliance_scope:
        type: array
        items: { type: string }
      asset_classification:
        type: [string, "null"]
      repo_url:
        type: [string, "null"]
      team_owner:
        type: [string, "null"]
      git:
        type: [object, "null"]
        additionalProperties: true
        properties:
          commit_sha: { type: string }
          branch:     { type: string }
      id_counters:
        type: [object, "null"]
        additionalProperties: true
        properties:
          next_threat_id:
            type: string
            pattern: "^T-\\d{3,}$"
          next_mitigation_id:
            type: string
            pattern: "^M-\\d{3,}$"

  changelog:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [version, date, mode, summary]
      properties:
        version:
          type: integer
          minimum: 1
        date:
          type: string
        mode:
          type: string
          enum: [full, incremental]
        summary:
          type: string
        threats_added:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"
        threats_removed:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"
        threats_changed:
          type: array

  components:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [id, name]
      properties:
        id:          { type: string, minLength: 1 }
        name:        { type: string, minLength: 1 }
        description: { type: [string, "null"] }
        paths:
          type: array
          items: { type: string }
        complexity:
          type: string
          enum: [simple, moderate, complex]

  assets:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [name, classification]
      properties:
        name:           { type: string, minLength: 1 }
        classification:
          type: string
          enum: [Public, Internal, Confidential, Restricted]
        description:    { type: [string, "null"] }

  attack_surface:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [entry_point, protocol]
      properties:
        entry_point:   { type: string, minLength: 1 }
        protocol:      { type: string }
        auth_required: { type: [boolean, "null"] }
        notes:         { type: [string, "null"] }

  trust_boundaries:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [name]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: [string, "null"] }

  security_controls:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [domain, control, effectiveness]
      properties:
        domain:         { type: string }
        control:        { type: string }
        implementation: { type: [string, "null"] }
        effectiveness:
          type: string
          enum: [Adequate, Partial, Weak, Missing]
        linked_threats:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"

  threats:
    type: array
    items:
      type: object
      additionalProperties: true
      required:
        - id
        - component
        - stride
        - scenario
        - likelihood
        - impact
        - risk
      properties:
        id:
          type: string
          pattern: "^T-\\d{3,}$"
        component:   { type: string }
        stride:
          type: string
          enum:
            - Spoofing
            - Tampering
            - Repudiation
            - Information Disclosure
            - Denial of Service
            - Elevation of Privilege
        scenario:
          type: string
          minLength: 10
        likelihood:
          type: string
          enum: [Critical, High, Medium, Low]
        impact:
          type: string
          enum: [Critical, High, Medium, Low]
        risk:
          type: string
          enum: [Critical, High, Medium, Low]
        cwe:
          type: [string, "null"]
          pattern: "^CWE-\\d+$"
        evidence:
          type: array
          items:
            type: object
            additionalProperties: true
            required: [file]
            properties:
              file: { type: string }
              line: { type: [integer, "null"] }
        controls_in_place:
          type: [string, "null"]
        mitigation_ids:
          type: array
          items:
            type: string
            pattern: "^M-\\d{3,}$"
        violated_requirements:
          type: array
          items: { type: string }
        triage_flags:
          type: array
        source:
          type: string
          enum:
            - stride
            - requirements-compliance
            - architectural-anti-pattern
            - known-vuln
            - dep-scan
            - coverage-gap
        cvss_v4:
          # Optional CVSS v4.0 score. Only present for threats whose CWE is
          # on the eligibility list (plugin/data/cvss-eligible-cwes.yaml)
          # and that carry concrete code-level evidence — typically
          # source=dep-scan, source=known-vuln, or source=stride for
          # injection/auth-bypass-class CWEs with file:line evidence.
          # Threats sourced from architectural-anti-pattern,
          # requirements-compliance, or coverage-gap MUST NOT carry a CVSS
          # vector — design and policy gaps cannot be honestly scored on
          # the CVSS Base metrics.
          oneOf:
            - type: "null"
            - type: object
              required: [vector, base_score, severity, source]
              additionalProperties: false
              properties:
                vector:
                  type: string
                  pattern: "^CVSS:4\\.0(/[A-Z]+:[A-Z0-9]+)+$"
                base_score:
                  type: number
                  minimum: 0.0
                  maximum: 10.0
                severity:
                  type: string
                  enum: [None, Low, Medium, High, Critical]
                source:
                  type: string
                  enum: [stride-analyzer, dep-scan, nvd, osv, known-vuln, manual]
                version_fallback:
                  type: [string, "null"]
                  enum: ["3.1", null]

  mitigations:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [id, title, threat_ids, priority]
      properties:
        id:
          type: string
          pattern: "^M-\\d{3,}$"
        title:
          type: string
          minLength: 1
        threat_ids:
          type: array
          items:
            type: string
            pattern: "^T-\\d{3,}$"
        priority:
          type: string
          enum: [P1, P2, P3, P4]
        severity:
          type: string
          enum: [Critical, High, Medium, Low]
        effort:
          type: string
          enum: [Low, Medium, High]
        steps:
          type: array
          items: { type: string }
        code_example:
          type: [string, "null"]
        verification:
          type: [string, "null"]
        reference:
          type: [string, "null"]
        fulfills_requirements:
          type: array
          items: { type: string }

  critical_findings:
    type: array
    items:
      type: object
      additionalProperties: true
      required: [threat_id, summary]
      properties:
        threat_id:
          type: string
          pattern: "^T-\\d{3,}$"
        mitigation_id:
          type: [string, "null"]
          pattern: "^M-\\d{3,}$"
        summary:
          type: string

  # Optional blocks documented in plugin/CLAUDE.md but not always present.
  run_statistics:
    type: [object, "null"]
    additionalProperties: true

  cross_repo_dependencies:
    type: [array, "null"]
    items:
      type: object
      additionalProperties: true
