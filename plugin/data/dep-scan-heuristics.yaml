# dep-scan-heuristics.yaml
#
# Static fallback list used by plugin/scripts/dep_scan.py when the native
# audit tool (npm audit, pip-audit, govulncheck, mvn dependency-check) is
# unavailable for an ecosystem.
#
# Heuristic findings are inherently stale — they reflect the curator's
# knowledge at the time of writing, not live advisory feeds. Treat them as
# a best-effort signal, not authoritative SCA data. Output entries carry
# `source: heuristic` so downstream consumers can label / filter them.
#
# Format:
#   ecosystem:        one of {npm, python, go, maven}
#   package:          canonical package name as it appears in the manifest
#   vulnerable_below: SemVer / PEP-440 / Maven version below which the
#                     package is considered vulnerable. Versions equal or
#                     greater are treated as patched.
#   cve:              CVE identifier (CVE-YYYY-NNNN[N]) or null
#   severity:         one of {Critical, High, Medium, Low}
#   issue:            one-sentence summary used as `issue` in dep-scan.json

version: 1

known_vulns:
