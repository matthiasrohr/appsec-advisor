- id: SEC-FRONTEND_SECURITY
  url: https://asr.int.kn/scg/frontend-security/
  title: Frontend Security
  requirements:
  - id: SEC-ANTI-CSRF
    url: https://asr.int.kn/scg/frontend-security#sec-samesite
    text: |-
      Implement Anti-CSRF protection (e.g. via SameSite cookies) for user sessions. State‑changing actions MUST NOT be performed via HTTP GET
    priority: MUST
  - id: SEC-CLIENT-STORAGE
    url: https://asr.int.kn/scg/frontend-security#sec-client-storage
    text: Do not store sensitive data in any client-side storage mechanism
    priority: MUST
  - id: SEC-CORS
    url: https://asr.int.kn/scg/frontend-security#sec-cors
    text: Configure CORS restrictively to allow cross-origin requests from the UI
    priority: MUST
  - id: SEC-CSP
    url: https://asr.int.kn/scg/frontend-security#sec-csp
    text: Activate CSP headers on Internet-facing applications
    priority: SHOULD
  - id: SEC-HSTS
    url: https://asr.int.kn/scg/frontend-security#sec-hsts
    text: MUST use the HTTP response header Strict‑Transport‑Security (HSTS) on all Internet‑facing websites
    priority: MUST
  - id: SEC-SECURE-UI-FRAMEWORKS
    url: https://asr.int.kn/scg/frontend-security#sec-secure-ui-frameworks
    text: Only use mature, secure frontend frameworks
    priority: MUST
  - id: SEC-UI-ENCODE
    url: https://asr.int.kn/scg/frontend-security#sec-ui-encode
    text: Encode all user-controlled parameters at the frontend to prevent Cross-Site Scripting (XSS) attacks
    priority: MUST
  source_id: asr-scg
- id: SEC-HANDLING_SECURITY_EVENTS
  url: https://asr.int.kn/scg/handling-security-events/
  title: Handling Security Events
  requirements:
  - id: SEC-FAIL-SECURELY
    url: https://asr.int.kn/scg/handling-security-events#sec-fail-securely
    text: |-
      It MUST be ensured that in the event of any error (expected or unexpected), the application stays in a secure state in which no internal information (such as stack traces) is disclosed to users
    priority: MUST
  source_id: asr-scg
