- id: SEC-SECURE_DATA_ACCESS
  url: https://asr.int.kn/scg/secure-data-access/
  title: Secure Data Access
  requirements:
  - id: SEC-API-AUTH
    url: https://asr.int.kn/scg/secure-data-access#sec-api-auth
    text: APIs must mutually authenticate using a secure and standard mechanism
    priority: MUST
  - id: SEC-AUTHZ
    url: https://asr.int.kn/scg/secure-data-access#ec-api-authz
    text: Apply least‑privilege and RBAC to all endpoints
    priority: MUST
  - id: SEC-RATE-LIMITS
    url: https://asr.int.kn/scg/secure-data-access#sec-rate-limits
    text: Apply rate limiting to external APIs
    priority: MUST
  - id: SEC-USER-AUTH
    url: https://asr.int.kn/scg/secure-data-access#_must_securely_authenticate_users
    text: Users MUST be authenticated using standard KN authentication mechanisms with mandatory MFA
    priority: MUST
  source_id: asr-scg
- id: SEC-SECURE_DATA_HANDLING
  url: https://asr.int.kn/scg/secure-data-handling/
  title: Secure Data Handling
  requirements:
  - id: SCG-DESERIALIZING
    url: https://asr.int.kn/scg/secure-data-handling#sec-deserializing
    text: Restrict and validate objects during deserialization
    priority: MUST
  - id: SCG-HARDENXML
    url: https://asr.int.kn/scg/secure-data-handling#scg-hardenxml
    text: Harden XML parsers to prevent XXE attacks
    priority: MUST
  - id: SEC-IV
    url: https://asr.int.kn/scg/secure-data-handling#scg-iv
    text: Validate all external input as restrictively as possible
    priority: MUST
  - id: SEC-SQL
    url: https://asr.int.kn/scg/secure-data-handling#scg-sql
    text: Use parameterized SQL/HQL queries or ORM methods for database queries to prevent SQL injection
    priority: MUST
  - id: SEC-VALIDATE-FILES
    url: https://asr.int.kn/scg/secure-data-handling#scg-validate-files
    text: Validate, sanitize, and securely store uploaded files
    priority: MUST
  source_id: asr-scg
- id: SEC-SECURE_DATA_PROTECTION
  url: https://asr.int.kn/scg/secure-data-protection/
  title: Secure Data Protection
  requirements:
  - id: SEC-DATAENC
    url: https://asr.int.kn/scg/secure-data-protection#sec-dataenc
    text: |-
      Encrypt data that could be ≥ confidential using only secure algorithms. If possible encrypt all stored data (e.g. in CloudX)
    priority: MUST
  - id: SEC-KEGEN
    url: https://asr.int.kn/scg/secure-data-protection#_must_generate_strong_keys
    text: |-
      Tokens/keys used for security (e.g., access tokens, technical user passwords, API keys) MUST be cryptographically random and at least 256‑bit (≈ 32 chars)
    priority: MUST
  - id: SEC-LOGGING
    url: https://asr.int.kn/scg/secure-data-protection#_must_dont_log_sensitive_data
    text: Do not log sensitive data (e.g., PII) at standard log levels. If necessary, use DEBUG only and disable it in production
    priority: MUST
  - id: SEC-NO-GET
    url: https://asr.int.kn/scg/secure-data-protection#sec-no-get-sensitive
    text: Use methods like HTTP POST or PUT instead so that data is transmitted in the HTTP body
    priority: MUST
  - id: SEC-PASSWORDS
    url: https://asr.int.kn/scg/secure-data-protection#_should_dont_store_user_passwords
    text: Don’t store user credentials (e.g., passwords); use KN IAM instead
    priority: SHOULD
  - id: SEC-SECRETS
    url: https://asr.int.kn/scg/secure-data-protection#sec-secrets
    text: Secrets must be stored, generated, and rotated securely
    priority: MUST
  - id: SEC-TLS
    url: https://asr.int.kn/scg/secure-data-protection#sec-tls
    text: All data transmitted externally MUST be encrypted using TLS
    priority: MUST
  source_id: asr-scg
