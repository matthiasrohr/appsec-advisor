  - id: "SEC-HARD"
    title: "Hardening"
    requirements:
      - id: "SEC-HARD-1"
        text: "Debug mode and verbose error reporting must be disabled in production."
        priority: "MUST"

      - id: "SEC-HARD-2"
        text: "Security headers must include at least: HSTS, X-Content-Type-Options, X-Frame-Options, and Content-Security-Policy."
