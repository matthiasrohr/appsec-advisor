categories:

  - id: "SEC-INV"
    title: "Input Validation & Injection Prevention"
    requirements:
      - id: "SEC-INV-1"
        text: "User input must be validated server-side using an allowlist or schema. Client-side validation alone is insufficient."
        priority: "MUST"

      - id: "SEC-INV-2"
        text: "Database queries must use parameterized statements or a safe ORM. String concatenation with user input is prohibited."
        priority: "MUST"

      - id: "SEC-INV-3"
        text: "User input must not be interpolated into shell command strings. Commands must be executed without a shell and arguments passed as structured parameters."
