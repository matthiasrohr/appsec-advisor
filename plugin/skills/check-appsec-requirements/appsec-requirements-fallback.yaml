      - id: "SEC-HARD-3"
        text: "Server version or framework identification headers must be suppressed."
        priority: "MUST"

      - id: "SEC-HARD-4"
        text: "Public endpoints must implement rate limiting for abusive or resource-intensive usage."
        priority: "MUST"

      - id: "SEC-HARD-5"
        text: "Management and debug endpoints must be disabled or access-restricted in production."
