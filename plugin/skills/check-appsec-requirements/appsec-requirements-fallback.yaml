      - id: "SEC-INV-4"
        text: "File uploads must validate file type and extension server-side."
        priority: "MUST"

      - id: "SEC-INV-5"
        text: "Uploaded files must be stored outside the web root."
        priority: "MUST"

      - id: "SEC-INV-6"
        text: "Redirect targets must be validated against an allowlist."
        priority: "MUST"


  - id: "SEC-AUTH"
    title: "Authentication"
    requirements:
      - id: "SEC-AUTH-1"
        text: "Authentication must be enforced server-side on protected endpoints."
        priority: "MUST"

      - id: "SEC-AUTH-2"
        text: "Passwords must be hashed using bcrypt, scrypt, or Argon2."
        priority: "MUST"

      - id: "SEC-AUTH-3"
        text: "Login responses must not reveal whether the username or password was incorrect."
        priority: "MUST"

      - id: "SEC-AUTH-4"
        text: "Authentication endpoints must implement rate limiting or equivalent brute-force protection."
        priority: "MUST"

      - id: "SEC-AUTH-5"
        text: "Session identifiers and tokens must be generated using a cryptographically secure random source."
        priority: "MUST"

      - id: "SEC-AUTH-6"
        text: "Session identifiers and tokens must have an expiration or rotation policy."
        priority: "MUST"


  - id: "SEC-AUTHZ"
    title: "Authorization"
    requirements:
      - id: "SEC-AUTHZ-1"
        text: "Authorization checks must be enforced server-side and must not rely on client-supplied roles or UI restrictions."
        priority: "MUST"

      - id: "SEC-AUTHZ-2"
        text: "Access to resources must validate that the authenticated user is authorized for the requested resource identifier."
        priority: "MUST"

      - id: "SEC-AUTHZ-3"
        text: "Administrative endpoints must be restricted to privileged roles."
        priority: "MUST"


  - id: "SEC-DATA"
    title: "Secrets & Data Protection"
    requirements:
      - id: "SEC-DATA-1"
        text: "Secrets must not be hardcoded in source code or committed to version control."
        priority: "MUST"

      - id: "SEC-DATA-2"
        text: "All external network communication must use HTTPS."
        priority: "MUST"

      - id: "SEC-DATA-3"
        text: "MD5, SHA-1 (for security use), DES, RC4, and ECB mode must not be used."
        priority: "MUST"

      - id: "SEC-DATA-4"
        text: "Credentials, tokens, API keys, and secrets must never be logged."
        priority: "MUST"


  - id: "SEC-TLS"
    title: "TLS Configuration"
    requirements:
      - id: "SEC-TLS-1"
        text: "TLS version 1.2 or higher must be enforced."
        priority: "MUST"

      - id: "SEC-TLS-2"
        text: "Weak cipher suites (RC4, DES, 3DES, NULL, anonymous DH) must be disabled."
        priority: "MUST"

      - id: "SEC-TLS-3"
        text: "TLS certificate validation must not be disabled in client or server code."
        priority: "MUST"

      - id: "SEC-TLS-4"
        text: "HTTP Strict Transport Security (HSTS) must be enabled in production."
        priority: "MUST"

      - id: "SEC-TLS-5"
        text: "Internal service-to-service communication must use TLS."
        priority: "MUST"


  - id: "SEC-ERR"
    title: "Error Handling & Logging"
    requirements:
      - id: "SEC-ERR-1"
        text: "Error responses must not expose stack traces, internal paths, or framework details."
