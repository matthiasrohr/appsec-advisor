      - id: "SEC-ERR-2"
        text: "Authentication and authorization events must be logged."
        priority: "MUST"

      - id: "SEC-ERR-3"
        text: "Application exceptions must be handled by a centralized server-side error handler. Raw framework error pages, uncaught stack traces, and direct exception output must not be returned to clients."
