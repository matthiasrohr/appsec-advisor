# .gitlab-ci.yml — internal packaging pipeline for a company-branded
# build of appsec-advisor.
#
# Mirrors docs/internal-plugin-packaging.md:
#   1. clone pinned upstream appsec-advisor
#   2. run the upstream package_internal_plugin.py helper
#   3. publish dist/*.tgz + sha256 as job artifacts
#
# Repository layout this pipeline assumes:
#   .gitlab-ci.yml                (this file)
#   org-profile/                  (custom config payload)
#     org-profile.yaml
#     context/organization.md
#     actors/*.yaml               (optional)
#   upstream/appsec-advisor/      (cloned by the pipeline)
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   APPSEC_ADVISOR_URL   git URL of the upstream appsec-advisor repo
#   APPSEC_ADVISOR_REF   upstream tag/commit to pin (e.g. v0.4.0-beta)
#
# Optional:
#   INTERNAL_NAME        plugin name override (default: acme-appsec)
#   VERSION              artifact version (default: CI snapshot version)

stages:
  - package

variables:
  INTERNAL_NAME: "acme-appsec"
  # Safe default version for CI snapshots. Override per pipeline with your
  # release string, e.g. 0.4.0-acme.20260527.
  VERSION: "0.4.0-internal.${CI_COMMIT_SHORT_SHA}"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

default:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git
    - pip install --quiet pyyaml jsonschema packaging

package:
  stage: package
  script:
    - test -n "$APPSEC_ADVISOR_URL" || { echo "APPSEC_ADVISOR_URL not set"; exit 2; }
    - test -n "$APPSEC_ADVISOR_REF" || { echo "APPSEC_ADVISOR_REF not set"; exit 2; }
    - git clone --depth 1 "$APPSEC_ADVISOR_URL" upstream/appsec-advisor
    - git -C upstream/appsec-advisor fetch --depth 1 origin "$APPSEC_ADVISOR_REF"
    - git -C upstream/appsec-advisor checkout --detach FETCH_HEAD
    - >
      python3 upstream/appsec-advisor/scripts/package_internal_plugin.py
      --source upstream/appsec-advisor
      --org-profile org-profile
      --name "$INTERNAL_NAME"
      --version "$VERSION"
    # Example: push to GitLab Generic Packages registry.
    # - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN"
    #        --upload-file "dist/${INTERNAL_NAME}-${VERSION}.tgz"
    #        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${INTERNAL_NAME}/${VERSION}/${INTERNAL_NAME}-${VERSION}.tgz"'
  artifacts:
    name: "${INTERNAL_NAME}-${VERSION}"
    paths:
      - "dist/${INTERNAL_NAME}-${VERSION}.tgz"
      - "dist/${INTERNAL_NAME}-${VERSION}.tgz.sha256"
    expire_in: 30 days
