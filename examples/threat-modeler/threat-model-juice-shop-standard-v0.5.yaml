- local_id: data-store-002
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Unsalted MD5 Password Hashing in User Model (models/user.ts:76)
  affected_parameter: password
  scenario: The `User` model's `password` setter at `models/user.ts:76` calls `security.hash(clearTextPassword)`, which resolves
    to `crypto.createHash('md5').update(data).digest('hex')` (see `lib/insecurity.ts:41`). MD5 is a general-purpose hash function,
    not a password hashing algorithm. It produces a fixed 32-character hex digest with no salt and runs in nanoseconds on
    modern hardware. An attacker who obtains the `data/juiceshop.sqlite` file — via SQL injection data exfiltration, file-download
    vulnerabilities, or direct filesystem access — can crack the full password table against pre-computed MD5 rainbow tables
    (e.g., from CrackStation) within seconds for any common password. Users who reuse passwords across services face immediate
    account takeover at those services as well.
  evidence_summary: '`models/user.ts:76` stores `security.hash(clearTextPassword)` where `security.hash` (`lib/insecurity.ts:41`)
    is `crypto.createHash(''md5'')` — no salt, no stretching.'
  impact_description: All user passwords are recoverable from the SQLite file using pre-computed rainbow tables; accounts
    with common passwords are cracked in seconds.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the User model applies MD5 consistently to all cleartext passwords before storage. No salt column
    exists in the Users table schema.
  mitigation_title: Replace MD5 password hashing with bcrypt or argon2 in the User model password setter
  remediation:
    effort: Medium
    steps:
    - Replace the `security.hash` call in `models/user.ts:76` with `await bcrypt.hash(clearTextPassword, 12)` (using the `bcrypt`
      npm package already available in the Node.js ecosystem).
    - Add a `passwordSalt` column or rely on bcrypt's built-in salt embedding (`$2b$` prefix) — bcrypt stores salt in the
      output string, so no separate column is needed.
    - Update the login route's comparison from MD5-hash equality to `bcrypt.compare(req.body.password, storedHash)` — requires
      a schema migration that re-hashes passwords on next login.
    - Run a one-time migration that marks all existing MD5-hashed passwords as expired and forces users to reset their password
      on next login.
    code_example: "// Before — unsalted MD5\nset (clearTextPassword: string) {\n  this.setDataValue('password', security.hash(clearTextPassword))\
      \ // MD5\n}\n\n// After — bcrypt with cost factor 12\nimport bcrypt from 'bcrypt'\nset async (clearTextPassword: string)\
      \ {\n  this.setDataValue('password', await bcrypt.hash(clearTextPassword, 12))\n}"
    verification: Insert a test user and inspect the `password` column in the database; the value must start with `$2b$12$`
      (bcrypt format). Attempt login with the correct password and confirm success. Attempt login with the raw MD5 hash value
      as the password and confirm rejection.
    reference: CWE-916
