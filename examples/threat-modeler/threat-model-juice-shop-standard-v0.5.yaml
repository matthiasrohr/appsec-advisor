  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA Private Key Enables Offline JWT Forgery (lib/insecurity.ts)
  affected_parameter: null
  scenario: 'The full RSA private key (`----**** (31 chars)`) is embedded as a string literal at lib/insecurity.ts:21.
    The file is committed to the public GitHub repository (`juice-shop/juice-shop`). Any person who clones or views the repository
    obtains the signing key and can call `jwt.sign({ data: { id: 1, role: ''admin'', email: ''admin@juice-sh.op'' } }, privateKey,
    { algorithm: ''RS256'' })` locally to produce a valid token accepted by the running application — no network brute-force,
    no credential theft. Because the key is compiled into the application bundle, rotating it requires a code change and redeployment;
    it cannot be revoked silently.'
  evidence_summary: lib/insecurity.ts:21 contains the full private key literal beginning `MIICXAIBAAKBg...`, committed in
    plain text.
  impact_description: Permanent, offline JWT forgery for any user or role — effectively a skeleton key to every authenticated
    endpoint.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 algorithm is used (appropriate asymmetric choice), but the private half of the key pair is public,
    negating any security property.
  mitigation_title: Move RSA private key to an environment variable or secret store and rotate immediately
  remediation:
    effort: Medium
    steps:
    - 'Generate a new RSA key pair: `openssl genrsa -out jwt.key 2048 && openssl rsa -in jwt.key -pubout -out jwt.pub`.'
    - 'Store the new private key in an environment variable (`JWT_PRIVATE_KEY`) or a secrets manager (AWS Secrets Manager,
      HashiCorp Vault) and load it at runtime: `const privateKey = process.env.JWT_PRIVATE_KEY`.'
    - Delete the hardcoded key literal from lib/insecurity.ts and fail-fast at startup if the env var is absent.
    - 'Treat the current key as compromised: invalidate all active sessions, force re-login.'
    code_example: '// Before — hardcoded literal at lib/insecurity.ts:21

      const privateKey = ''----**** (31 chars)\r\nMIIC...''


      // After — loaded from environment at startup

      const privateKey = process.env.JWT_PRIVATE_KEY

      if (!privateKey) throw new Error(''JWT_PRIVATE_KEY env var is required'')'
    verification: After the change, run `grep -r 'BEGIN RSA PRIVATE KEY' .` from the repo root — expect zero matches outside
      secrets/vault configuration files.
    reference: CWE-321
