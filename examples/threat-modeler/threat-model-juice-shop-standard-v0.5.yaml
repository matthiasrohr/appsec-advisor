  - T-030
  - T-044
  - T-048
  - T-049
  - T-050
  - T-051
- id: data-store
  name: SQLite Data Store
  description: SQLite file-based database (primary) accessed via Sequelize ORM. Stores users, products, orders, challenges,
    and session data. Intentionally vulnerable to SQL injection via raw query construction in challenge routes. MarsDB optionally
    available.
  paths:
  - models/**
  - data/**
  tier: data
  complexity: simple
  framework: sequelize
  deployment_zones:
