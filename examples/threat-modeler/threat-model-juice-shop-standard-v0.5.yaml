  stride: Information Disclosure
  cwe: CWE-306
  title: Unauthenticated Management Endpoints Expose Operational Data (server.ts:676)
  affected_parameter: null
  scenario: 'Three management surfaces are accessible without any authentication middleware: (1) GET /metrics (server.ts:676,729)
    serves Prometheus metrics including total user counts by type, aggregate wallet balances, order counts, and application
    version; (2) GET /ftp (server.ts:269-270) lists all files in the ftp/ directory and serves any .md or .pdf file without
    auth; (3) GET /support/logs (server.ts:280-283) lists and serves daily access logs containing full request paths and client
    IP addresses. An internet-facing attacker enumerates these endpoints using a port scanner or browser to extract internal
    operational statistics, sensitive documents, and user request patterns.'
  evidence_summary: server.ts:676 registers `app.get('/metrics', ...)` with no `isAuthorized()` or IP filter preceding it;
    server.ts:269 mounts `serveIndex('ftp', ...)` with no auth middleware; server.ts:280 mounts `serveIndex('logs', ...)`
    with no auth middleware before the `serveLogFiles()` handler.
  impact_description: Attacker learns the application version (for targeted exploit selection), approximate user base size,
    financial throughput (wallet totals), and gains access to log files revealing user activity patterns and IP addresses.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: 'IP filter `IpFilter([''123.456.789''], { mode: ''allow'' })` is applied to `/api/Quantitys/:id` only,
    not to these endpoints.'
  mitigation_title: Add authentication or IP-allowlist middleware to /metrics, /ftp, and /support/logs endpoints
  remediation:
    effort: Low
    steps:
    - 'For /metrics: add an IP allowlist restricted to the monitoring host, or require a bearer token checked by a simple
      middleware: `app.get(''/metrics'', requireMetricsAuth, serveMetrics())`.'
    - 'For /ftp: remove the unauthenticated `serveIndex` mount or add `security.isAuthorized()` before it if the FTP challenge
      must remain accessible to authenticated users only.'
    - 'For /support/logs: add `security.isAdmin()` or equivalent before the serveIndex and serveLogFiles handlers.'
    - Confirm no other serveIndex mounts lack auth by auditing server.ts for all `serveIndex` calls.
    code_example: "// Before (server.ts:676):\napp.get('/metrics', utils.asyncHandler(metrics.serveMetrics()))\n\n// After:\n\
      const metricsAuth = (req, res, next) => {\n  const token = req.headers['x-metrics-token']\n  if (token === process.env.METRICS_TOKEN)\
      \ return next()\n  res.status(401).end()\n}\napp.get('/metrics', metricsAuth, utils.asyncHandler(metrics.serveMetrics()))"
    verification: GET /metrics with no credentials — must return HTTP 401. GET /ftp with no credentials — must return HTTP
      401 or redirect to login.
    reference: CWE-306
