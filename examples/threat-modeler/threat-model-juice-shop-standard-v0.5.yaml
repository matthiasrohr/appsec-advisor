      unauthenticated requests before the chat handler runs
    - If anonymous chat access is intentional, move coupon generation to a separate authenticated endpoint that the chatbot
      invokes server-side, not directly from the client
    code_example: "// routes/chat.ts — generateCoupon.execute\nexecute: async ({ discount }) => {\n  // Require authentication\
