- local_id: auth-service-002
  threat_category_id: TH-03
  additional_categories: []
  stride: Spoofing
  cwe: CWE-321
  title: RSA Private Key Hardcoded as String Literal (lib/insecurity.ts:21)
  affected_parameter: JWT signing key
  scenario: The 1024-bit RSA private key used to sign all JWTs is embedded verbatim as a multi-line string constant at lib/insecurity.ts:21.
    Any developer, contractor, or attacker with read access to the source repository (GitHub, CI artefacts, compiled bundles)
    possesses the signing key. With it, they can mint arbitrary JWTs that pass `jwt.verify` at line 189 and every `isAuthorized()`
    middleware check — bypassing authentication for all protected endpoints. The key is also used by `deluxeToken()` at line
    150, so HMAC-based deluxe-user tokens are equally forgeable. The same key has been committed to the repository since the
    project's inception, meaning every historical clone is a permanent exposure.
  evidence_summary: Line 21 assigns `const privateKey = '----**** (31 chars)\r\nMIICXAI...'` — a full PEM key
    embedded directly in a committed TypeScript file.
  impact_description: Any party who has ever cloned the repository can forge admin or deluxe-user JWTs indefinitely; there
    is no way to rotate the key without changing the source code.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — key is public in the repository.
  mitigation_title: Load RSA private key from an environment variable or secret manager at startup
  remediation:
    effort: Medium
    steps:
    - Remove the hardcoded key from lib/insecurity.ts:21.
    - 'Generate a fresh 2048-bit RSA key pair: `openssl genrsa -out jwt.key 2048 && openssl rsa -in jwt.key -pubout -out jwt.pub`.'
    - Store the private key in an environment variable (`JWT_PRIVATE_KEY`) or a secret manager (AWS Secrets Manager, HashiCorp
      Vault).
    - 'Load at runtime: `const privateKey = process.env.JWT_PRIVATE_KEY ?? fs.readFileSync(process.env.JWT_KEY_PATH ?? ''jwt.key'',
      ''utf8'')`.'
    - Rotate the key immediately — all existing tokens signed with the old key must be invalidated (see auth-service-006 for
      the revocation gap).
    - Add a pre-commit hook or CI secret-scanner (e.g. `git-secrets`, `trufflehog`) to block future PEM commits.
    code_example: "// Before\nconst privateKey = '----**** (31 chars)\\r\\nMIICXA...'\n\n// After — load from\
      \ environment at startup, fail fast if missing\nconst privateKey = process.env.JWT_PRIVATE_KEY ||\n  (() => { throw\
      \ new Error('JWT_PRIVATE_KEY env var not set') })()"
    verification: Run `git log -S 'BEGIN RSA PRIVATE KEY' --all` and confirm zero hits after the fix. Attempt to start the
      application without `JWT_PRIVATE_KEY` set and confirm it exits with a clear error rather than a hardcoded fallback.
    reference: CWE-321
