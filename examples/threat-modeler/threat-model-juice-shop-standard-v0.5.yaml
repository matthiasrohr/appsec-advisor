  stride: Spoofing
  cwe: CWE-327
  title: JWT Algorithm Restriction Missing express-jwt Accepts algorithm none
  affected_parameter: Authorization header / JWT token
  scenario: 'express-jwt 0.1.3 is configured at lib/insecurity.ts:52 as `expressJwt({ secret: publicKey })` with no `algorithms`
    allowlist. The jsonwebtoken 0.4.0 library (package.json:132) honours the algorithm field embedded in the JWT header, including
    the `alg:none` special value that disables signature verification entirely. An unauthenticated attacker crafts a JWT with
    header `{"alg":"none"}`, omits the signature, and places any valid-looking user payload (including `{"data":{"role":"admin"}}`)
    in the body. The middleware accepts it as authentic. Because the `verify` helper at line 55 delegates to `jws.verify`
    without pinning the algorithm, the same bypass applies to the lower-level token checks used by `isAccounting()` and `isDeluxe()`.'
  evidence_summary: 'Line 52 configures `expressJwt({ secret: publicKey })` without an `algorithms: [''RS256'']` restriction;
    jsonwebtoken 0.4.0 has no default algorithm deny-list.'
  impact_description: 'Complete authentication bypass: any attacker can forge an admin-level JWT and access every privileged
    API endpoint without credentials.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is used for signing at line 54; however the verification step does not enforce this algorithm,
    nullifying the protection.
  mitigation_title: Pin allowed algorithms to RS256 in expressJwt and jwt.verify calls
  remediation:
    effort: Low
    steps:
    - 'Upgrade express-jwt to 8.x (current): `npm install express-jwt@^8` — the new API requires `algorithms` as a mandatory
      field.'
    - 'Update `isAuthorized()` at lib/insecurity.ts:52 to `expressJwt({ secret: publicKey, algorithms: [''RS256''] })`.'
    - 'Update `updateAuthenticatedUsers()` at lib/insecurity.ts:189 `jwt.verify(token, publicKey, { algorithms: [''RS256'']
      }, ...)`.'
    - 'Remove the jws-based `verify` helper (line 55) — it cannot pin algorithms — and replace all call sites with `jwt.verify(...,
      { algorithms: [''RS256''] })`.'
    - Add an integration test that submits a forged `alg:none` token and asserts HTTP 401.
    code_example: "// Before (insecure — no algorithm restriction)\nexport const isAuthorized = () => expressJwt(({ secret:\
      \ publicKey }) as any)\n\n// After — pins to RS256, rejects alg:none\nimport { expressjwt } from 'express-jwt'\nexport\
      \ const isAuthorized = () =>\n  expressjwt({ secret: publicKey, algorithms: ['RS256'] })"
    verification: 'Send `Authorization: Bearer <header_b64>.<payload_b64>.` where header is `{"alg":"none","typ":"JWT"}` base64url-encoded
      and payload contains `{"data":{"role":"admin"}}`. Expect HTTP 401. A 200 or 403 on a protected endpoint indicates the
      fix is incomplete.'
    reference: CWE-327
