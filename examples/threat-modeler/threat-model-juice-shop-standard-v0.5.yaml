  stride: Spoofing
  cwe: CWE-798
  title: OAuth Implicit Flow with Algorithmically Derived Password
  affected_parameter: OAuth access_token, password
  scenario: 'The OAuth callback component uses the implicit grant: parseRedirectUrlParams() at line 71 extracts `access_token`
    directly from the URL hash fragment, and line 28 exchanges this token for the user profile. The critical flaw is at line
    30: `const password = btoa(profile.email.split('''').reverse().join(''''))` — the user''s Juice Shop password is algorithmically
    derived from their email address using a publicly known, deterministic formula. Any party who knows a user''s email can
    compute their password instantly without interacting with Google/GitHub. This creates a parallel authentication path:
    an attacker calls POST /rest/user/login with `{email: victim@gmail.com, password: btoa(''moc.liamg@mitciv'')}` and authenticates
    directly without OAuth. The implicit flow further exposes the access_token in the browser history, Referrer headers, and
    server logs of any sub-resource loaded after the redirect.'
  evidence_summary: oauth.component.ts:30 derives `password = btoa(email.split('').reverse().join(''))` — a fully predictable
    value computable by any observer who knows the target's email address.
  impact_description: Any OAuth user's Juice Shop account can be compromised by anyone knowing their email address, bypassing
    the OAuth identity provider entirely.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derived password formula is deterministic and embedded in public frontend source code.
  mitigation_title: Migrate OAuth flow to authorization code + PKCE and decouple OAuth identity from password-based auth
  remediation:
    effort: High
    steps:
    - 'Replace the implicit flow with an OAuth 2.0 authorization code flow with PKCE (RFC 7636): generate a `code_verifier`,
      send `code_challenge` in the authorization request, and exchange the returned `code` for tokens server-side.'
    - Remove the deterministic password-derivation at line 30. OAuth-authenticated users should not have a password-based
      login path at all — on first OAuth login, generate a cryptographically random 32-byte password that is stored (hashed)
      but never disclosed.
    - Move the OAuth token exchange to a backend endpoint (BFF pattern) so tokens never appear in the frontend URL.
    - Invalidate all existing passwords for OAuth-linked accounts by resetting them to a cryptographically random value that
      users cannot compute.
    code_example: '// Before — deterministic, attacker-computable password

      const password = btoa(profile.email.split('''').reverse().join(''''))


      // After — random, not derivable; password field becomes irrelevant for OAuth users

      // Handle session via BFF: the backend issues an HttpOnly cookie after validating the auth code'
    verification: 'Attempt POST /rest/user/login with `{email: <oauth-user-email>, password: btoa(<reversed-email>)}`. After
      the fix, the response must be HTTP 401. Also verify that the OAuth redirect URL no longer contains `access_token` in
      the fragment by inspecting the browser URL bar after callback.'
    reference: CWE-798
