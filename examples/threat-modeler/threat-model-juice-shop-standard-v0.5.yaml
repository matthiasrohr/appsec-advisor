- local_id: auth-service-001
  threat_category_id: TH-02
  additional_categories: []
  stride: Spoofing
  cwe: CWE-287
  title: Insecure JWT Verification
  affected_parameter: Authorization
  scenario: 'The `isAuthorized()` middleware at lib/insecurity.ts:52 constructs `expressJwt({ secret: publicKey })` without
    an `algorithms` field. express-jwt v0.1.3 does not default to a safe algorithm allowlist. An attacker who crafts a JWT
    with `alg: none` and an empty signature receives the same middleware pass-through as a legitimately signed RS256 token.
    The attacker can set any `role`, `email`, or `id` in the payload, gaining admin or other users'' sessions without ever
    possessing the private key. The companion `jws.verify()` call at line 55 is used in in-process lookups but expressJwt
    is the HTTP guard; it is the exploitable surface.'
  evidence_summary: 'lib/insecurity.ts:52 passes only `secret: publicKey` to expressJwt — no `algorithms` property — leaving
    alg:none and HS256-confusion attacks viable against the v0.1.3 library.'
  impact_description: 'Complete authentication bypass: any user can impersonate any account, including administrators, by
    issuing a self-signed or unsigned JWT.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is used at token issuance (lib/insecurity.ts:54). The public key is available for RS256 verification,
    but no algorithm allowlist is enforced at verification time.
  mitigation_title: Enforce RS256 algorithm allowlist in expressJwt middleware
  remediation:
    effort: Low
    steps:
    - 'Upgrade express-jwt to v8.x: `npm install express-jwt@^8`.'
    - 'Add `algorithms: [''RS256'']` to the expressJwt options object at lib/insecurity.ts:52 so unsigned and HS256-confusion
      tokens are rejected at the middleware layer.'
    - Pin the same algorithm constraint in the `jwt.verify` calls (lib/insecurity.ts:189) to close any secondary verification
      path.
    code_example: '// Before — lib/insecurity.ts:52 (alg:none accepted)

      export const isAuthorized = () => expressJwt({ secret: publicKey } as any)


      // After — explicit allowlist rejects alg:none and HS256 confusion

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] })'
    verification: Send `POST /rest/user/login` to obtain a valid token. Decode the header, change `alg` to `none`, strip the
      signature, and replay the token against `GET /rest/user/whoami`. Expect HTTP 401 — not 200.
    reference: CWE-287
