  title: NoSQL injection allows mass review update via unconstrained _id filter
  affected_parameter: id (PATCH /rest/products/reviews body)
  scenario: 'The review update handler passes `req.body.id` directly as the MongoDB `_id` filter with `{ multi: true }`: `db.reviewsCollection.update({
    _id: req.body.id }, { $set: { message } }, { multi: true })`. An authenticated attacker sends `{ "id": { "$gt": "" },
    "message": "hacked" }` — the `$gt: ""` operator matches every document. Combined with `multi: true`, this overwrites every
    review in the collection in a single request.'
  evidence_summary: '`routes/updateProductReviews.ts:18`: `db.reviewsCollection.update({ _id: req.body.id }, ... { multi:
    true })` — `req.body.id` used directly as MongoDB filter without type validation.'
  impact_description: Any authenticated user can overwrite all product reviews simultaneously, defacing the application and
    destroying review integrity.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: '`security.isAuthorized()` required on the route (server.ts:634).'
  mitigation_title: Validate and cast review _id to ObjectID before use in MongoDB query
  remediation:
    effort: Low
    steps:
    - 'Cast `req.body.id` to a MongoDB `ObjectId` before using it as a filter: `const objectId = new ObjectId(req.body.id)`
      — this will throw if the value is not a valid 24-char hex string, rejecting operator objects.'
    - 'Remove `{ multi: true }` from the update call — a review edit should update exactly one document identified by its
      `_id`.'
    - 'Add an ownership check: verify that `req.body.id` refers to a review authored by the authenticated user before allowing
      the update.'
    code_example: '// Before (updateProductReviews.ts:18) — unsafe

      db.reviewsCollection.update({ _id: req.body.id }, { $set: { message } }, { multi: true })


      // After — ObjectId cast + single-document update

      import { ObjectId } from ''mongodb'';

      const oid = new ObjectId(req.body.id); // throws on invalid/non-string input

      db.reviewsCollection.update({ _id: oid, author: user.data.email }, { $set: { message } })'
