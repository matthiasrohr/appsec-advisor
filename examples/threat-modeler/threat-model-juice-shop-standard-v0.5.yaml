    basis: confirmed-exploitable
  - id: T-011
    file: routes/search.ts
    line: 23
    basis: confirmed-exploitable
  description: Database queries are assembled from application values instead of passing those values through an enforced
    parameterised data-access path. This leaves every call site responsible for preserving query structure.
  structural_recommendation: provide one parameterised repository or query-builder path and prohibit application-value interpolation
    in database queries
- id: W-002
  weakness_class: missing_authz
  kind: design
  title: Authorization is implemented route by route
  statement: Centralised Authorization Policy is not consistently enforced.
  severity: Critical
