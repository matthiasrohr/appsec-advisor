  title: Path Traversal via Archive Extraction in Complaint Upload (fileUpload.ts:34)
  affected_parameter: null
  scenario: The `extractZipBuffer` function writes each zip entry to disk using `fs.createWriteStream('uploads/complaints/'
    + fileName)` where `fileName = entry.path` comes directly from the zip archive. The guard at line 33 checks `absolutePath.includes(path.resolve('.'))`
    — a substring check that can be satisfied by a malicious path like `../../ftp/evil.md` because the resolved path `<cwd>/../../ftp/evil.md`
    contains the cwd string as a prefix. An attacker crafts a zip archive where an entry path is `../../ftp/legal.md` and
    uploads it; the existing legal.md file in ftp/ is overwritten. The challenge verifier at line 32 confirms this exact path
    is reachable.
  evidence_summary: routes/fileUpload.ts:34 calls `fs.createWriteStream('uploads/complaints/' + fileName)` where `fileName
    = entry.path` from the zip; the `absolutePath.includes(path.resolve('.'))` check at line 33 is a substring check, not
    a safe prefix/resolve check.
  impact_description: Attacker overwrites arbitrary files accessible to the Node.js process (config files, static assets,
    application code) by crafting zip archive entry paths with directory traversal sequences.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The `absolutePath.includes(path.resolve('.'))` check is intended to confine writes to the working directory
    but is bypassable with symlinks or path strings that still contain the cwd as a substring.
  mitigation_title: Use path.resolve with a safe-prefix check to prevent directory traversal during zip extraction
  remediation:
    effort: Low
    steps:
    - 'Replace the substring check with a strict prefix assertion: `if (!absolutePath.startsWith(path.resolve(''uploads/complaints'')
      + path.sep)) { continue }` — skip any entry whose resolved path escapes the target directory.'
    - Use `path.basename(entry.path)` to strip all directory components from the archive entry name before writing.
    - Alternatively, use a library like `adm-zip` that provides built-in path-safety options, or validate each entry with
      `path.normalize` followed by the prefix check.
    code_example: "// Before (routes/fileUpload.ts:33-34):\nif (absolutePath.includes(path.resolve('.'))) {\n  await pipeline(entry.stream(),\
      \ fs.createWriteStream('uploads/complaints/' + fileName))\n}\n\n// After:\nconst targetDir = path.resolve('uploads/complaints')\n\
      const safePath = path.resolve(targetDir, path.basename(fileName))\nif (safePath.startsWith(targetDir + path.sep)) {\n\
      \  await pipeline(entry.stream(), fs.createWriteStream(safePath))\n}"
    verification: Upload a zip containing an entry named `../../ftp/legal.md` — the server must not write to ftp/legal.md;
      the file must remain unchanged.
    reference: CWE-22
