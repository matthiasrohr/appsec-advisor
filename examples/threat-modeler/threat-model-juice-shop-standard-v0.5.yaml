- local_id: data-store-005
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-285
  title: User Role Enforcement Is Application-Layer Only No Database CHECK Constraint
  affected_parameter: role column
  scenario: 'The `User` model in `models/user.ts:82-84` enforces role legitimacy with a Sequelize `validate.isIn` check: `isIn:
    [[''customer'', ''deluxe'', ''accounting'', ''admin'']]`. Sequelize `validate` blocks are application-level guards executed
    only when Sequelize model methods (`User.create`, `user.save`) are called. They are completely bypassed by raw `sequelize.query()`
    calls — such as the login query at `routes/login.ts:34` — and by direct SQLite file manipulation. No `CHECK (role IN (''customer'',''deluxe'',''accounting'',''admin''))`
    constraint is added to the `Users` table DDL, so the database itself places no restriction on the `role` column value.
    An attacker who exploits the SQL injection in the login or search routes can issue a raw `UPDATE Users SET role=''admin''
    WHERE id=N` that the database accepts without complaint, silently elevating their privilege to administrator.'
  evidence_summary: '`models/user.ts:82-84` applies `validate: { isIn: [...] }` — a Sequelize application-level check — without
    a corresponding SQL `CHECK` constraint; raw SQL statements bypass this guard entirely.'
  impact_description: A successful SQL injection payload can promote any user account to the `admin` role, granting full administrative
    access to the application.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Sequelize application-level `validate.isIn` check on the role field — bypassed by raw SQL queries.
  mitigation_title: Add a SQLite CHECK constraint on the Users.role column to enforce role legitimacy at the database layer
  remediation:
    effort: Low
    steps:
    - Add a Sequelize migration that executes `ALTER TABLE Users ADD CHECK (role IN ('customer', 'deluxe', 'accounting', 'admin'))`
      — or recreate the table with the CHECK constraint in the DDL, since SQLite's ALTER TABLE does not support adding constraints
      to existing columns.
    - 'Alternatively, specify `{ type: DataTypes.ENUM(''customer'', ''deluxe'', ''accounting'', ''admin'') }` in the Sequelize
      model definition — Sequelize translates ENUM to a CHECK constraint in the generated DDL for SQLite.'
    - Eliminate the raw `sequelize.query()` calls in login and search routes that bypass the ORM layer and use parameterized
      Sequelize finder methods instead.
    code_example: "// Before — application-level only\nrole: {\n  type: DataTypes.STRING,\n  validate: { isIn: [['customer','deluxe','accounting','admin']]\
      \ }\n}\n\n// After — DB-enforced ENUM (generates CHECK constraint)\nrole: {\n  type: DataTypes.ENUM('customer','deluxe','accounting','admin'),\n\
      \  defaultValue: 'customer'\n}"
    verification: Open `data/juiceshop.sqlite` with the SQLite CLI and run `INSERT INTO Users (email, role) VALUES ('x@x.com',
      'superadmin')`. The database must reject this with a constraint violation. Confirm the `sqlite_master` schema for the
      Users table includes a CHECK or type constraint on the role column.
    reference: CWE-285
  evidence:
  - file: models/user.ts
    line: 82
  evidence_check: unchecked
