- local_id: web3-nft-004
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-862
  title: Challenge Credit Claimable Without Wallet Ownership Proof (routes/nftMint.ts:41)
  affected_parameter: walletAddress
  scenario: 'An attacker learns (via block explorer or chat) that victim Alice minted the NFT from wallet `0xAlice`. Before
    Alice verifies on the app, the attacker sends `POST /rest/web3/walletNFTVerify` with `{ "walletAddress": "0xAlice" }`.
    The server checks `addressesMinted.has("0xAlice")` (true), deletes the entry, and responds with `{ success: true }` —
    solving `nftMintChallenge`. No cryptographic proof that the caller controls `0xAlice` is requested. Alice''s subsequent
    verification attempt returns `{ success: false }` because the entry was consumed. The same pattern applies to `walletExploitAddress`:
    pre-registering another user''s address at `routes/web3Wallet.ts:16` earns challenge credit when that address triggers
    the on-chain event.'
  evidence_summary: '`nftMint.ts:41-44` calls `addressesMinted.has(metamaskAddress)` on a caller-controlled value with no
    EIP-191 personal_sign challenge-response to prove private-key ownership of the submitted address.'
  impact_description: An attacker solves NFT-related CTF challenges by free-riding on another participant's on-chain activity,
    and can deny the legitimate participant their challenge completion.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None
  mitigation_title: Require EIP-191 signed message proof-of-ownership before accepting wallet address claims
  remediation:
    effort: High
    steps:
    - Issue a server-generated nonce to each authenticated session; require the caller to sign it with their private key using
      `eth.personal.sign(nonce, walletAddress)` before calling the verify endpoint.
    - On the server, recover the signer address via `ethers.verifyMessage(nonce, signature)` and compare it to the submitted
      `walletAddress`; reject if they do not match.
    - Bind the nonce to the authenticated user session so a different session cannot reuse the same signed proof.
    - If ownership proof is infeasible for the CTF design, at minimum require an authenticated session (see web3-nft-003)
      to tie the claim to a registered user.
    code_example: "// After — server recovers signer and validates ownership\nconst { verifyMessage } = await import('ethers')\n\
      const recovered = verifyMessage(sessionNonce, req.body.signature)\nif (recovered.toLowerCase() !== req.body.walletAddress.toLowerCase())\
      \ {\n  return res.status(403).json({ success: false, message: 'Signature does not match wallet address' })\n}"
    verification: 'Submit `{ walletAddress: ''0xVictim'', signature: <signed_by_attacker_key> }` and assert HTTP 403; submit
      with a valid self-signed proof and assert HTTP 200.'
    reference: CWE-862
  evidence:
  - file: routes/nftMint.ts
    line: 41
  evidence_check: unchecked
