- local_id: data-persistence-007
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-311
  title: PII Stored Without Field-Level Encryption in User Model (models/user.ts:56)
  affected_parameter: email
  scenario: The User model persists `email` (line 56), `lastLoginIp` (line 104), `totpSecret` (line 112), and `deluxeToken`
    (line 100) as plain DataTypes.STRING without column-level or field-level encryption. `password` is hashed (albeit with
    MD5 — see data-persistence-001), but all other PII fields are stored in plaintext in the SQLite file `data/juiceshop.sqlite`.
    An attacker who reads the database file — via the SQL injection at routes/search.ts:23, SSRF to the file path, or direct
    filesystem access — obtains all users' email addresses, last login IPs, and TOTP secrets in cleartext. Under GDPR Article
    32 and PCI DSS Requirement 3.5, sensitive cardholder/account data must be protected using strong cryptography at rest.
    The Card model (models/card.ts, registered at server.ts:495) similarly stores card numbers as plain strings.
  evidence_summary: The `email` column at models/user.ts:56 is declared `DataTypes.STRING` with no encryption option; `totpSecret`
    at line 112 and `lastLoginIp` at line 104 follow the same pattern — no `sequelize-encrypted` or equivalent wrapper is
    applied.
  impact_description: Full disclosure of all user email addresses, TOTP secrets, and last-known IP addresses to anyone who
    can read the SQLite file or issue an arbitrary SQL query.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Passwords are hashed (MD5). `totpSecret` and `password` are excluded from the finale-rest response (server.ts:484),
    but the column values in the database remain plaintext.
  mitigation_title: Encrypt PII columns (email, totpSecret, lastLoginIp) at rest using field-level AES-256 encryption
  remediation:
    effort: High
    steps:
    - Adopt `@sequelize/sequelize-encrypted` or a custom Sequelize virtual field that transparently encrypts on set and decrypts
      on get using AES-256-GCM with a key loaded from an environment variable (never hardcoded).
    - Apply the encrypted field wrapper to the `email`, `totpSecret`, `lastLoginIp`, and `deluxeToken` columns in models/user.ts.
      Apply the same wrapper to card number fields in models/card.ts.
    - Rotate the encryption key via a one-time migration script that decrypts each row with the old key and re-encrypts with
      the new key. Store the key in a secrets manager (Vault, AWS KMS, Azure Key Vault) rather than in environment variables
      for production deployments.
    - Update search/lookup queries that filter by `email` to use a deterministic HMAC of the email as a searchable index column,
      avoiding the need to decrypt for lookups.
    code_example: null
    verification: Open `data/juiceshop.sqlite` in a SQLite browser. The `email` column in the Users table must contain only
      opaque ciphertext, not a recognisable email address string.
    reference: CWE-311
  evidence:
