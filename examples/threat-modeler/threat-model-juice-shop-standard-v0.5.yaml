- local_id: frontend-spa-007
  threat_category_id: TH-13
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-306
  title: Unauthenticated Socket.IO Connection Established on SPA Load
  affected_parameter: null
  scenario: Any visitor to the Juice Shop URL — including unauthenticated bots and scanners — triggers `SocketIoService` instantiation,
    which immediately opens a Socket.IO WebSocket connection to the backend (line 22). No authentication token accompanies
    the handshake. An attacker running a script that opens thousands of tab-equivalent HTTP connections can exhaust the backend's
    WebSocket connection pool without needing a valid account. Additionally, each search query emits `verifyLocalXssChallenge`
    over the socket (`search-result.component.ts:140`) without rate limiting, allowing authenticated users to flood the backend
    event loop with socket events.
  evidence_summary: '`socket-io.service.ts:22` calls `io(window.location.origin, {...})` unconditionally at construction time
    with no `auth` option or token header; `search-result.component.ts:140` emits on the socket for every filtered query.'
  impact_description: Backend WebSocket connection pool exhaustion; server-side event-loop saturation via unbounded socket
    event emission from the search path.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — Socket.IO connection requires no authentication token; no client-side emission throttle.
  mitigation_title: Add authentication to Socket.IO handshake and throttle client-side socket event emission
  remediation:
    effort: Medium
    steps:
    - 'Pass the session credential in the Socket.IO handshake: `io(origin, { auth: { token: localStorage.getItem(''token'')
      } })`. On the server, validate the token in the `connection` middleware and reject unauthenticated sockets.'
    - Debounce the `verifyLocalXssChallenge` emit in `filterTable()` — emit at most once per 300 ms using `debounceTime(300)`
      from `rxjs/operators` applied to the route-param observable.
    - Configure the backend Socket.IO server with a connection rate limit per IP (e.g., `socket.io-rate-limiter`) to prevent
      connection-pool exhaustion.
    code_example: "// Before (socket-io.service.ts:22)\nthis._socket = io(window.location.origin, { path: '...' })\n\n// After\
      \ — include auth token in handshake\nthis._socket = io(window.location.origin, {\n  path: '...',\n  auth: { token: localStorage.getItem('token')\
      \ ?? '' }\n})"
    verification: Open a browser tab without logging in and inspect the WebSocket handshake in DevTools Network. Confirm the
      server rejects the connection with an authentication error rather than upgrading to WebSocket.
    reference: CWE-306
  evidence:
  - file: frontend/src/app/Services/socket-io.service.ts
    line: 22
