  title: Insecure Token Storage in Browser localStorage
  affected_parameter: token
  scenario: An attacker delivers an XSS payload through any of the nine confirmed injection points in this component (see
    frontend-spa-003, frontend-spa-004). Because the JWT, 2FA authentication token, and TOTP temporary token are all stored
    in `localStorage`, any script running in the page's origin can read them with `localStorage.getItem('token')`. The `request.interceptor.ts:13`
    confirms the JWT is subsequently attached to every API request, meaning stolen tokens provide immediate full API access
    without re-authentication. `localStorage` is also readable by browser extensions, shared browser profiles, and cross-site
    leaks through open redirectors.
  evidence_summary: 36+ `localStorage.getItem/setItem` calls for `token`, `email`, and `totp_tmp_token` across `request.interceptor.ts`,
    `app.guard.ts`, `two-factor-auth-service.ts`, and `oauth.component.ts` confirm all session credentials are JavaScript-readable.
  impact_description: Any XSS execution in the application's origin instantly yields all session credentials; no secure cookie
    flag or `HttpOnly` attribute can protect `localStorage` from script access.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no `HttpOnly`/`Secure` cookie for session; no Backend-for-Frontend (BFF) holding tokens server-side.
  mitigation_title: Move session tokens to HttpOnly Secure SameSite=Strict cookies via a Backend-for-Frontend
  remediation:
    effort: High
    steps:
    - Introduce a Backend-for-Frontend (BFF) layer that performs OAuth token exchange server-side and sets the session as
      an `HttpOnly; Secure; SameSite=Strict` cookie. The SPA never receives or stores the raw JWT.
    - 'Remove all `localStorage.setItem(''token'', ...)` calls; the `RequestInterceptor` should rely on the browser sending
      the `HttpOnly` cookie automatically (`withCredentials: true` on `HttpClient`).'
    - Ensure the backend adds `SameSite=Strict` on the session cookie to prevent CSRF (replacing the current no-cookie / no-CSRF-token
      posture).
    - Rotate to short-lived access tokens (15 min) held server-side in the BFF session, with a long-lived refresh token stored
      only server-side — never in `localStorage`.
    code_example: null
    verification: 'After fix: open the browser DevTools console and run `localStorage.getItem(''token'')`. Result must be
      `null`. Confirm API requests carry a `Cookie` header, not an `Authorization: Bearer` header.'
