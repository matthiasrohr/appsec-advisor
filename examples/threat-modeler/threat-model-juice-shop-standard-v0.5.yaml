  title: Remote code execution via notevil sandbox escape in B2B order endpoint
  affected_parameter: orderLinesData (POST /b2b/v2/orders bod…
  scenario: 'The B2B order endpoint evaluates the caller-supplied `orderLinesData` field using `notevil` (a ''safe'' JS evaluator)
    inside a Node.js `vm.createContext` sandbox: `vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 })`.
    The `notevil` library has known sandbox escape vectors — for example, accessing `this.constructor.constructor(''return
    process'')()` to obtain the Node.js `process` object. An authenticated B2B caller (any user with a valid JWT) can achieve
    arbitrary code execution on the server.'
  evidence_summary: '`routes/b2bOrder.ts:21-23`: `const sandbox = { safeEval, orderLinesData }; vm.createContext(sandbox);
    vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 })` — user-controlled `orderLinesData` evaluated
    as JavaScript.'
  impact_description: 'Full server-side code execution: file system read/write, process spawning, lateral movement to internal
    network, data exfiltration.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: 2-second execution timeout; `vm.createContext` sandbox; `notevil` safe-eval wrapper.
  mitigation_title: Remove server-side expression evaluation from the B2B order endpoint; accept only structured JSON order
    data
  remediation:
    effort: Medium
    steps:
    - 'Replace the `safeEval`/`vm.runInContext` block with a JSON schema validator (e.g. `zod` or `joi`): define the expected
      order-line structure (`{ productId: number, quantity: number, comment?: string }[]`) and validate `orderLinesData` against
      it.'
    - If expression evaluation is a deliberate challenge feature, isolate it in a separate process (child_process.fork or
      a worker_thread) with no access to `process`, `require`, or file system, and kill the worker on timeout rather than
      using a VM context.
    - 'Add an authentication check specific to verified B2B partners (beyond the generic `security.isAuthorized()`): require
      a specific role or an API key scoped to B2B to limit the attack surface.'
    code_example: '// Before (b2bOrder.ts:21-23) — unsafe eval

      const sandbox = { safeEval, orderLinesData };

      vm.createContext(sandbox);

      vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 });


      // After — structured validation

      import { z } from ''zod'';

      const orderLineSchema = z.array(z.object({ productId: z.number(), quantity: z.number().positive(), comment: z.string().optional()
      }));

      const parsed = orderLineSchema.parse(JSON.parse(orderLinesData)); // throws on invalid input'
    verification: Submit `POST /b2b/v2/orders` with `orderLinesData` set to `"this.constructor.constructor('return process.env')()"`
      — the server must return a 400 validation error and not leak environment variables in the response or logs.
