  title: All Web3 Endpoints Unauthenticated No Session Guard on /rest/web3/*
  affected_parameter: null
  scenario: An attacker who has not logged in sends `POST /rest/web3/submitKey` with a known private key, solves `nftUnlockChallenge`,
    and the server records the challenge as solved — with no binding to any authenticated user session. The same is true for
    `/rest/web3/walletNFTVerify`, `/rest/web3/walletExploitAddress`, and `/rest/web3/nftMintListen`. In a shared CTF instance
    this means any anonymous internet user can solve challenges on behalf of (or in competition with) authenticated players
    without possessing a valid JWT. Compare `server.ts:634` where similar state-changing routes carry `security.isAuthorized()`
    middleware.
