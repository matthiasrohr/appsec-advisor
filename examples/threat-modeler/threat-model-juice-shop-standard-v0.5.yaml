  title: Open Redirect via Substring Allowlist Bypass (routes/redirect.ts:17)
  affected_parameter: to
  scenario: The GET /redirect endpoint reads the destination from `query.to` and passes it to `security.isRedirectAllowed()`,
    which returns true when any allowlisted URL appears anywhere as a substring in the attacker-supplied URL (lib/insecurity.ts:136
    — `url.includes(allowedUrl)`). An attacker crafts a URL such as `GET /redirect?to=https://evil.example.com/?ref=https://github.com/juice-shop/juice-shop`
    — the allowlist check passes because the GitHub URL appears as a query parameter substring, and Express calls `res.redirect()`
    with the attacker-controlled destination. The victim is taken to `evil.example.com` while believing they followed a legitimate
    Juice Shop link.
  evidence_summary: '`performRedirect` at routes/redirect.ts:17 delegates to `security.isRedirectAllowed(toUrl)`, whose substring
    `includes()` match (lib/insecurity.ts:136) passes when an allowlisted URL appears anywhere in the attacker-supplied `to`
    value.'
  impact_description: Any unauthenticated attacker can redirect authenticated users from a trusted Juice Shop link to an arbitrary
    attacker-controlled domain, enabling credential phishing or malware delivery.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: A URL allowlist exists in `lib/insecurity.ts:122-131` and is checked before redirect, but the substring
    match completely negates its protection.
  mitigation_title: Replace substring allowlist match with exact URL equality check in isRedirectAllowed
  remediation:
    effort: Low
    steps:
    - Replace `url.includes(allowedUrl)` at lib/insecurity.ts:136 with `url === allowedUrl` to enforce exact-match allowlisting.
    - If prefix matching is required for any URL, use `url.startsWith(allowedUrl)` only after verifying the character immediately
      following the prefix is `/`, `?`, or end-of-string to prevent subdomain/path confusion.
    - Add an integration test that asserts `GET /redirect?to=https://evil.com/?bypass=https://github.com/juice-shop/juice-shop`
      returns HTTP 406.
    code_example: '// Before (lib/insecurity.ts:136) — substring match, bypassable:

      allowed = allowed || url.includes(allowedUrl)


      // After — exact match:

      allowed = allowed || url === allowedUrl'
    verification: Send `GET /redirect?to=https://attacker.example.com/?ref=https://github.com/juice-shop/juice-shop` and assert
      the response is HTTP 406 (not a 3xx redirect).
    reference: CWE-601
  evidence:
  - file: routes/redirect.ts
    line: 17
