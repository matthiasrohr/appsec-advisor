  title: Floating Tag on Third-Party CI Action (.github/workflows/image_actions.yml:33)
  affected_parameter: calibreapp/image-actions@main
  scenario: 'An attacker who compromises the `calibreapp/image-actions` GitHub repository (or a maintainer of that repo acting
    maliciously) pushes a new commit to its `main` branch. Because `image_actions.yml:33` references `calibreapp/image-actions@main`,
    the next workflow run that triggers on an image-path push or merge to `master`/`develop` automatically executes the attacker''s
    code inside the juice-shop CI runner. The step runs with `GITHUB_TOKEN` (which has `contents: write` and `pull-requests:
    write` permissions from the workflow-level defaults) and can create pull requests, modify repository files, or exfiltrate
    any secret available to the job — including `GITHUB_TOKEN`. There is no SHA pin to detect or prevent the substitution.'
  evidence_summary: '`image_actions.yml:33` specifies `uses: calibreapp/image-actions@main` — a floating branch reference
    that resolves to the current HEAD of the upstream repo''s `main` branch at every workflow execution, with no content hash
    verification.'
  impact_description: Supply-chain compromise of `calibreapp/image-actions` yields arbitrary code execution in the CI runner
    with repository-write access, enabling tampering with source, pushing malicious commits, or exfiltrating workflow secrets.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The job is guarded by `github.repository == 'juice-shop/juice-shop'` which prevents fork PRs from executing
    it; this limits exposure to direct push triggers on the upstream repo.
  mitigation_title: Pin calibreapp/image-actions to a full commit SHA in image_actions.yml
  remediation:
    effort: Low
    steps:
    - Run `gh api repos/calibreapp/image-actions/commits/main --jq '.sha'` to resolve the current `main` branch to a commit
      SHA.
    - 'Replace `uses: calibreapp/image-actions@main` with `uses: calibreapp/image-actions@<full-40-char-sha> # main` on line
      33 of `.github/workflows/image_actions.yml`.'
    - Also pin `actions/checkout@v6` (line 30) and `peter-evans/create-pull-request@v8` (line 43) in the same file to their
      full commit SHAs.
    - 'Add Dependabot configuration for GitHub Actions updates to receive automated SHA-bump PRs: add an `updates` entry with
      `package-ecosystem: github-actions` in `.github/dependabot.yml`.'
    code_example: '# Before (floating tag — any upstream commit is trusted):

      - uses: calibreapp/image-actions@main


      # After (SHA-pinned — specific commit hash; Dependabot keeps it current):

      - uses: calibreapp/image-actions@a9e7f1e6de21d1a7dc8c4c82811b3c4c3f8a5b2 # main (2025-01-15)'
    verification: Run `grep -r '@main\|@v[0-9]' .github/workflows/` after pinning — expect zero unpinned action references.
