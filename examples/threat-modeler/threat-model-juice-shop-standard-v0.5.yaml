  title: Unbounded In-Memory Set Growth via Unauthenticated Wallet Address Injection
  affected_parameter: walletAddress
  scenario: POST /rest/web3/walletExploitAddress is unauthenticated and calls `walletsConnected.add(metamaskAddress)` at routes/web3Wallet.ts:16
    on every request. The `walletsConnected` variable is a module-level `Set` (line 10) with no size cap, no deduplication
    guard per caller, and no rate limiting. An attacker can send thousands of POST requests with unique wallet address strings,
    each up to the maximum request body size, causing the Set to grow without bound and exhaust the Node.js heap. The endpoint
    is processed synchronously before the event-listener creation branch, so every request contributes an entry even if the
    WebSocket listener has already been established.
  evidence_summary: '`contractExploitListener` at routes/web3Wallet.ts:16 calls `walletsConnected.add(metamaskAddress)` unconditionally
    before any async work, on a module-scoped `Set` declared at line 10 with no capacity bound.'
  impact_description: A sustained request flood causes Node.js heap exhaustion, crashing the Juice Shop server and making
    all routes unavailable until restart.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no rate limiting, no size cap on the Set, no authentication.
  mitigation_title: Cap the walletsConnected Set size and add rate limiting to the walletExploitAddress endpoint
  remediation:
    effort: Low
    steps:
    - 'Enforce a maximum Set size (e.g., 1000 entries) in `contractExploitListener` before calling `.add()`: `if (walletsConnected.size
      >= MAX_WALLETS) return res.status(429).json({ error: ''Too many pending wallets'' })`.'
