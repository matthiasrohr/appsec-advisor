  stride: Repudiation
  cwe: CWE-345
  title: User-Controlled X-User-Email Header Enables Audit Log Falsification
  affected_parameter: X-User-Email
  scenario: The HTTP interceptor at `request.interceptor.ts:20-26` injects an `X-User-Email` header on every request using
    the value of `localStorage.getItem('email')`. The `email` entry in localStorage is set by the login component when the
    'Remember Me' checkbox is selected (`login.component.ts:135`), but it is a plain string with no integrity binding to the
    authenticated JWT. Any user — or an XSS payload — can execute `localStorage.setItem('email', 'admin@juice-sh.op')` in
    the browser console and subsequently perform any API action. Server-side logs that record the `X-User-Email` header as
    the action subject will attribute those actions to `admin@juice-sh.op`, allowing the real attacker to deny culpability
    and falsely implicate the administrator.
  evidence_summary: '`request.interceptor.ts:22` sets `''X-User-Email'': String(localStorage.getItem(''email''))` on every
    outbound request; the localStorage `email` key is user-settable without any signature or integrity check.'
  impact_description: An authenticated user can falsify their email identity in server audit logs, enabling repudiation of
    malicious actions and false attribution to other users including administrators.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — the header is accepted from the client and the value is not verified against the JWT subject.
  mitigation_title: Derive user identity exclusively from the verified JWT subject claim on the server side
  remediation:
    effort: Low
    steps:
    - Remove the `X-User-Email` header injection from `request.interceptor.ts` entirely — the server already receives the
      Bearer token whose `sub`/`email` claims are cryptographically signed.
    - Update all server-side audit logging to extract the user's email from the validated JWT payload (`req.user.data.email`)
      rather than from any request header.
    - If cross-service headers carrying identity are required, use a server-generated, signed identity assertion (e.g., an
      internal JWT signed with a service key) rather than a client-supplied header.
    code_example: "// Before (request.interceptor.ts:20-26) — client controls identity header:\nif (localStorage.getItem('email'))\
      \ {\n  req = req.clone({ setHeaders: { 'X-User-Email': String(localStorage.getItem('email')) } })\n}\n\n// After — remove\
      \ block entirely; server reads email from verified JWT:\n// (no code needed in interceptor)"
    verification: Set `localStorage.setItem('email','admin@juice-sh.op')` in browser console; make any authenticated API request;
      confirm the server log records the JWT's `email` claim (the actual authenticated user), not the `X-User-Email` header
      value.
    reference: CWE-345
