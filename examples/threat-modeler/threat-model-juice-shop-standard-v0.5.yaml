  title: No Server-Side Password Complexity Enforcement
  affected_parameter: password, new (reset)
  scenario: The login flow at routes/login.ts and the password reset handler at routes/resetPassword.ts:26 check only that
    the new password is not empty or the literal string 'undefined'. No minimum length, character class, or common-password
    check is enforced server-side. Users can register and maintain single-character passwords (e.g., `a`) or trivially guessable
    values (`admi**** (8 chars)`). Combined with the absence of rate limiting (auth-service-010), this makes credential-stuffing and
    brute-force attacks significantly more effective. The frontend may apply validation, but any attacker sending raw HTTP
    requests bypasses frontend validation entirely.
  evidence_summary: routes/resetPassword.ts:26 rejects only empty and 'undefined' passwords — no minimum length or complexity
    check is implemented server-side.
  impact_description: Users can set trivially weak passwords, dramatically reducing the effort needed for successful brute-force
    or credential-stuffing attacks.
