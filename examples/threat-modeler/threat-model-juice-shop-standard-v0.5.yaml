- id: docker-runtime
  name: Docker Container Runtime
  description: Multi-stage Dockerfile producing a distroless Node.js 24 image (gcr.io/distroless/nodejs24-debian13) running
    as UID 65532. Base images lack SHA256 digest pins. Test environment uses docker-compose.test.yml with bkimminich/juice-shop:latest
    (mutable tag).
  paths:
  - Dockerfile
  - docker-compose*.yml
  - .dockerignore
  tier: application
  complexity: simple
  framework: docker
  deployment_zones:
