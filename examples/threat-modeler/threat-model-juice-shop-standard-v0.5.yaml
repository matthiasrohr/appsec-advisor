  title: Rate Limit Bypass via User-Controlled X-Forwarded-For Header (server.ts:346)
  affected_parameter: X-Forwarded-For
  scenario: The password reset rate limiter at server.ts:346 uses `headers['X-Forwarded-For'] ?? ip` as its rate-limit key.
    With `app.enable('trust proxy')` set at line 342, Express trusts this header. An attacker sends requests with a different
    `X-Forwarded-For` header on each request (e.g., `1.1.1.1`, `1.1.1.2`, ...) to generate distinct keys, bypassing the 100-request
    cap entirely. This is the only rate limiter in the application.
  evidence_summary: server.ts:342 enables `trust proxy`; server.ts:346 passes `keyGenerator ({ headers, ip }) { return headers['X-Forwarded-For']
    ?? ip }` to rateLimit — the raw header value, not the Express-normalized `req.ip`, is used as the key, making it trivially
    spoofable.
  impact_description: Attacker bypasses the sole rate limit on password reset, enabling unlimited account takeover attempts
    via the security-question reset flow.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Rate limiter exists but is bypassable. express-rate-limit is present.
  mitigation_title: Remove the custom keyGenerator from the password reset rate limiter and use req.ip
  remediation:
    effort: Low
    steps:
    - Remove the custom `keyGenerator` from the password reset rate limiter; express-rate-limit defaults to `req.ip` which
      Express normalizes based on `trust proxy` settings.
    - Set `app.set('trust proxy', 'loopback')` or the specific IP of the trusted reverse proxy rather than `app.enable('trust
      proxy')` (which trusts all proxies).
    - 'Add `validate: { trustProxy: false }` to the rate limiter if you must trust a proxy but want to prevent X-Forwarded-For
      spoofing from clients.'
