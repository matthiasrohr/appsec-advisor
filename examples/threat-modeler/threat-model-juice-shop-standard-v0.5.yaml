  impact: Medium
  risk: Medium
  controls_in_place: Frontend likely applies some password UI hints, but server-side enforcement is absent.
  mitigation_title: Enforce minimum password complexity (length, character classes, common-password deny-list) in the server-side
    route handlers
  remediation:
    effort: Low
    steps:
    - 'Add a password-validation helper that enforces: minimum 12 characters, at least one uppercase, one lowercase, one digit,
      one special character.'
    - Integrate the have-i-been-pwned API (or a local copy of the HIBP SHA-1 hash list) to reject commonly breached passwords.
    - Apply this validation in both routes/resetPassword.ts (at line 26, before the HMAC check) and in the user registration
      route.
    - Return HTTP 400 with a structured error body listing which complexity requirements were not met.
    code_example: "// In routes/resetPassword.ts, after line 25\nconst MIN_LENGTH = 12\nconst COMPLEXITY_RE = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\\\
