  title: SSRF via unconstrained profile image URL fetch (profileImageUrlUpload.ts:24)
  affected_parameter: imageUrl (POST /profile/image/url body)
  scenario: The profile image URL handler calls `fetch(url)` where `url = req.body.imageUrl` with no scheme or host validation
    beyond a loose `includes('/solve/challenges/server-side')` check. An authenticated attacker sets `imageUrl` to `http://169.254.169.254/latest/meta-data/iam/security-credentials/`
    (AWS EC2 metadata) or `http://localhost:3000/rest/admin/application-configuration` (internal REST endpoint). The server
    makes the request and — when `response.ok` is true — writes the response body to a file in `uploads/`. The attacker retrieves
    the file via `/assets/public/images/uploads/<userId>.jpg`.
  evidence_summary: '`routes/profileImageUrlUpload.ts:24`: `const response = await fetch(url)` where `url` is directly from
    `req.body.imageUrl`; the only guard is a regex check for a challenge-solver path, not a host allowlist.'
  impact_description: 'Internal service probe and data exfiltration: cloud metadata credentials (AWS IAM role credentials),
    internal API responses, and private network host enumeration — all accessible to any authenticated user.'
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 'Soft check: `url.match(/(.)*solve\/challenges\/server-side(.)*/)` to detect challenge abuse only; no
    general host allowlist.'
  mitigation_title: Validate imageUrl against an allowed scheme and host allowlist before fetching
  remediation:
    effort: Low
    steps:
    - Parse the URL with `new URL(imageUrl)` and validate `parsedUrl.protocol === 'https:'` and `parsedUrl.hostname` matches
      an allowlist of known image CDN/hosting domains.
    - Reject any `imageUrl` whose resolved IP (after DNS lookup) falls in RFC1918 private ranges, link-local ranges (169.254.x.x),
      or loopback (127.x.x.x) — use a library such as `is-ip` + `ipaddr.js` for the check.
    - Set a short `fetch` timeout (e.g. 3 seconds) and limit the `Content-Length` of the response to prevent large internal
      responses being written to disk.
    - Remove or relocate the file written to `uploads/` so it is not publicly accessible until moderation is complete.
    code_example: '// After — scheme + private-IP guard before fetch

      import { isIPv4 } from ''net'';

      const parsed = new URL(imageUrl);

      if (![''https:''].includes(parsed.protocol)) throw new Error(''Only HTTPS URLs allowed'');

      const addr = await dns.promises.lookup(parsed.hostname);

      if (isPrivateIP(addr.address)) throw new Error(''Internal host not allowed'');'
    verification: 'Submit `POST /profile/image/url` with `imageUrl: ''http://169.254.169.254/latest/meta-data/''` — the server
