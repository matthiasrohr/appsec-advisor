assets:
- id: A-001
  name: User Credentials
  classification: Confidential
  description: Email addresses and bcrypt-hashed passwords stored in SQLite users table. Passwords hashed but SQL injection
    in login/search routes allows extraction.
  linked_threats: []
- id: A-002
  name: Authentication Tokens (JWT)
  classification: Confidential
  description: RS256 JWT tokens issued on login, stored in browser localStorage. Signed with a hardcoded RSA private key in
    lib/insecurity.ts. XSS on any page can extract all tokens via localStorage.
  linked_threats: []
- id: A-003
  name: User Account PII
  classification: Confidential
  description: User profile data including name, email, delivery address, and purchase history stored in SQLite. Accessible
    via IDOR vulnerabilities in user profile endpoints.
  linked_threats: []
- id: A-004
  name: Admin Credentials
  classification: Restricted
  description: Administrator account credentials seeded at startup. Admin role grants access to all user data, challenge management,
    and product administration endpoints.
  linked_threats: []
- id: A-005
  name: SQLite Database File
  classification: Confidential
  description: Primary data store at data/juice-shop.sqlite containing all users, orders, products, challenges, and wallet
    data. File-based; path traversal in download endpoints may expose it.
  linked_threats: []
- id: A-006
  name: LLM API Key
  classification: Restricted
  description: External LLM provider API key configured via LLM_API_KEY environment variable. Compromise enables unauthorized
    LLM API calls and billing fraud against the operator.
  linked_threats: []
- id: A-007
  name: RSA Private Signing Key
  classification: Restricted
  description: RSA private key committed to source code in lib/insecurity.ts (and encryptionkeys/ directory). Used to sign
    JWTs; possession enables offline forgery of any user or admin token without credentials.
  linked_threats: []
- id: A-008
  name: Product Catalog
  classification: Public
  description: Product listings, descriptions, images, and pricing data. Publicly accessible via /api/products. Product descriptions
    are an XSS injection sink.
  linked_threats: []
- id: A-009
  name: Order and Transaction History
  classification: Confidential
  description: User order records, basket contents, and payment history. Accessible via basket and order endpoints; IDOR vulnerabilities
    allow cross-user order disclosure.
  linked_threats: []
- id: A-010
  name: CTF Challenge Flags and Solutions
  classification: Internal
  description: Challenge keys, solution hints, and flag values embedded in data/static/challenges.yml and code. Disclosure
    undermines the training platform's pedagogical value.
  linked_threats: []
- id: A-011
  name: Application Metrics
  classification: Internal
  description: Prometheus metrics exported at /metrics (prom-client). Leaks runtime statistics, request counts, error rates,
    and memory usage to unauthenticated callers.
  linked_threats: []
- id: A-012
  name: Customer Feedback and Complaints
  classification: Internal
  description: User-submitted feedback and complaint records including file attachments (multer/uploads/). Path traversal
    in complaint file handling may expose server filesystem content.
  linked_threats: []
