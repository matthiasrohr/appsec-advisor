  stride: Elevation of Privilege
  cwe: CWE-829
  title: Pull_request_target Workflow Exposes ORG_ADMIN_TOKEN to Privileged Runner
  affected_parameter: ORG_ADMIN_TOKEN
  scenario: The `pr-compliance.yml` workflow is triggered by `pull_request_target`, which executes in the context of the BASE
    repository and has access to org secrets including `ORG_ADMIN_TOKEN` (line 438). An attacker who can compromise any SHA-pinned
    action used in this workflow (all are currently `actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd` — safe),
    OR who can cause a future maintainer to add a `run:` step that uses `${{ steps.init.outputs.pr }}` directly (expression
    injection vector), gains access to a token that can block and unblock users from the `juice-shop` GitHub organization
    via `PUT /orgs/juice-shop/blocks/<user>`. This is an organizational-level privilege that should not be reachable from
    a PR-triggered workflow. Even without compromise, if `ORG_ADMIN_TOKEN` is accidentally logged or captured by a third-party
    Slack action (`Gamesight/slack-workflow-status`), the token is exfiltrated.
  evidence_summary: '`pr-compliance.yml:438` passes `ORG_ADMIN_TOKEN` to a `Block Spammer` step that is conditionally executed
    for any PR where the spam score reaches 75 — a threshold reachable by carefully crafting a PR to avoid scoring rules while
    triggering the block path via a logic edge case.'
  impact_description: Exfiltration or injection abuse of `ORG_ADMIN_TOKEN` allows an attacker to block legitimate contributors
    from the GitHub organization, perform org-level administrative actions, or impersonate the automated block system.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The `pull_request_target` workflow does not check out PR HEAD code — only uses the GitHub API via `actions/github-script`.
    Actions/github-script is SHA-pinned. Org membership check skips non-member checks. The `ORG_ADMIN_TOKEN` step is guarded
    by spam score threshold.
  mitigation_title: Scope pull_request_target secrets to the minimum required and isolate ORG_ADMIN_TOKEN to a separate workflow
  remediation:
    effort: Medium
    steps:
    - Move the user-blocking functionality to a separate workflow triggered only by a `workflow_dispatch` or `repository_dispatch`
      event (initiated by a human or trusted internal system), removing the direct `pull_request_target` → `ORG_ADMIN_TOKEN`
      path.
    - 'Add `permissions: pull-requests: write` and `issues: write` as the ONLY permissions granted to this workflow, and add
      `secrets: inherit: false` if available for the org tier.'
    - Audit all steps that receive data derived from `steps.init.outputs.pr` (PR title/body/author) to ensure none use `${{
      steps.*.outputs.* }}` directly inside a `run:` shell step — require all such data to flow through `env:` variables only
      (current practice is correct; document it as a policy).
    - Consider replacing `ORG_ADMIN_TOKEN` with a fine-grained personal access token scoped to `organization:block` only,
      with a short expiry, to limit blast radius if exfiltrated.
    code_example: null
    verification: Verify `ORG_ADMIN_TOKEN` does not appear in `pr-compliance.yml` after refactoring. Use `gh secret list`
      to confirm the token scope. Test a spam PR to confirm the block flow still triggers via the new mechanism.
    reference: CWE-829
