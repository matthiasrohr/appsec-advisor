- id: backend-api
  name: Express REST API Backend
  description: Node.js 24 / Express.js monolith providing REST endpoints at /api/* and /rest/*, file upload/download, challenge
    logic, product catalog, orders, and all business routes. Entry point is server.ts; business routes in routes/; ORM models
    in models/.
