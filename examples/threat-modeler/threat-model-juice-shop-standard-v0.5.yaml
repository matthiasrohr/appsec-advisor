  relevance_tags:
  - missing-authz
- entry_point: POST /api/Challenges
  protocol: HTTP
  auth_required: true
  notes: 'handler: server.ts:373'
- entry_point: POST /rest/user/login
  protocol: HTTPS
  auth_required: false
  component_id: auth-service
  notes: Primary login endpoint. Accepts email/password. Issues JWT on success. Rate-limited by express-rate-limit. Intentional
    SQLi challenge present via email parameter.
  linked_threats: []
- entry_point: POST /api/Users
  protocol: HTTPS
  auth_required: false
  component_id: backend-api
  notes: Open self-registration endpoint. No email verification, no CAPTCHA, no invite gate. Enables automated account creation
    and credential stuffing.
  linked_threats: []
- entry_point: GET /api-docs
  protocol: HTTPS
  auth_required: false
  component_id: backend-api
  notes: Swagger/OpenAPI documentation exposed without authentication. Reveals all API endpoints, schemas, and B2B API structure
    to unauthenticated users.
  linked_threats: []
- entry_point: GET /metrics
  protocol: HTTPS
  auth_required: false
  component_id: backend-api
  notes: Prometheus metrics endpoint unauthenticated in baseline configuration. Leaks request rates, error counts, and Node.js
    process internals.
  linked_threats: []
- entry_point: GET /ftp
  protocol: HTTPS
