    — then POST that private key to `POST /rest/web3/submitKey` to instantly solve `nftUnlockChallenge` without performing
    any cryptographic discovery. On a non-public deployment the mnemonic still appears in version-control history, CI logs,
    and any source-code export.
  evidence_summary: '`checkKeys.ts:10` hard-codes the literal mnemonic string; `HDNodeWallet.fromPhrase(mnemonic)` on line
    11 then derives all key material from it, meaning the private key is trivially reproducible by anyone with source access.'
