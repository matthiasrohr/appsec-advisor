- local_id: data-persistence-008
  threat_category_id: TH-09
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-552
  title: SQLite Database File Stored in Application Working Directory (index.ts:41)
  affected_parameter: null
  scenario: 'Sequelize is configured at models/index.ts:41 with `storage: ''data/juiceshop.sqlite''` — a relative path within
    the application''s working directory. The database file is readable by any OS-level process running as the same user as
    the Node.js process, accessible via path traversal vulnerabilities, retrievable through SSRF to `file:///` URIs, and downloaded
    via the intentional `/ftp` directory listing if a symlink or misconfigured static file serving is present. In cloud or
    container deployments where the application directory is mounted as a volume, the SQLite file is trivially exfiltrated
    alongside the application image layer. The file contains all user credentials (MD5 hashes), security answers, order history,
    wallet balances, and TOTP secrets in a single portable 2–5 MB binary — the entire application''s data asset.'
  evidence_summary: '`storage: ''data/juiceshop.sqlite''` at models/index.ts:41 places the database file in the application
    source tree with no access controls beyond OS-level file permissions.'
  impact_description: Complete data exfiltration of all user, order, wallet, and security-answer records in a single file
    read operation — the worst-case data breach scenario for this application.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None. File resides in the application directory with no encryption at rest, no access control list, and
    no file integrity monitoring.
  mitigation_title: Move SQLite file outside the web root and restrict OS-level file permissions; prefer PostgreSQL for production
    deployments
  remediation:
    effort: Medium
    steps:
    - Change the storage path to an absolute path outside the application directory (e.g., `/var/lib/juiceshop/juiceshop.sqlite`)
      so the file is not co-located with web-accessible assets.
    - Set OS-level file permissions to `600` (owner read/write only) and ensure the Node process runs as a dedicated non-root
      service account, not as `root` or the deployment user.
    - 'For production or multi-user deployments, migrate from SQLite to PostgreSQL: remove the `dialect: ''sqlite''` option
      and configure `DB_HOST`, `DB_USER`, `DB_PASS` environment variables with a dedicated database user that has the minimum
      required permissions (SELECT/INSERT/UPDATE/DELETE on application tables only; no SUPERUSER).'
    - Enable full-disk or volume-level encryption (LUKS, AWS EBS encryption) on the host where the SQLite file resides.
    code_example: '// models/index.ts — use env-controlled path outside web root

      storage: process.env.DB_PATH ?? ''/var/lib/juiceshop/juiceshop.sqlite'''
    verification: Confirm `data/juiceshop.sqlite` does not exist in the application directory after startup. Confirm `ls -la
