- local_id: auth-service-011
  threat_category_id: TH-02
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-613
  title: Missing Server-Side Session Revocation on Logout
  affected_parameter: null
  scenario: 'JWT tokens issued by `security.authorize()` are stored in `authenticatedUsers.tokenMap` (lib/insecurity.ts:70–91)
    in-process. However, there is no route or mechanism to remove a token from the map on logout — the Angular logout action
    (not examined) is expected to clear localStorage and the cookie, but the server retains the token entry indefinitely until
    the process restarts. A token with a 6-hour expiry (`expiresIn: ''6h''`, lib/insecurity.ts:54) stolen via XSS, network
    interception, or the SQL injection bypass remains fully valid for the remainder of its lifetime. An attacker who obtains
    a token by any means cannot be shut out by the legitimate user''s logout action.'
  evidence_summary: 'lib/insecurity.ts:70 defines `authenticatedUsers.tokenMap` with `put()` but no `remove()` or `invalidate()`
    method; lib/insecurity.ts:54 sets `expiresIn: ''6h''` — stolen tokens remain valid for up to 6 hours post-logout.'
  impact_description: Stolen tokens remain active for up to 6 hours after the victim logs out; incident responders cannot
    force-invalidate a compromised session without restarting the process.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: '6-hour JWT expiry (`expiresIn: ''6h''`) provides time-bounded validity. No active revocation mechanism
    exists.'
  mitigation_title: Implement server-side token revocation on logout and add a token denylist check
  remediation:
    effort: Medium
    steps:
    - Add a `remove(token)` method to the `authenticatedUsers` object in lib/insecurity.ts that deletes from both `tokenMap`
      and `idMap`.
    - Add a `POST /rest/user/logout` route that calls `authenticatedUsers.remove(utils.jwtFrom(req))` and clears the `token`
      cookie server-side.
    - For the in-memory store already present, this is sufficient for single-instance deployments. For multi-instance deployments,
      add a Redis-backed denylist checked in `isAuthorized()` middleware.
    - Consider reducing the JWT expiry from 6h to 15–30 minutes for non-Remember-Me sessions and using short-lived refresh
      tokens.
    code_example: "// lib/insecurity.ts — add remove() to authenticatedUsers\nremove: function (token: string) {\n  const\
      \ user = this.tokenMap[utils.unquote(token)]\n  if (user) {\n    delete this.idMap[user.data.id]\n    delete this.tokenMap[utils.unquote(token)]\n\
      \  }\n}\n\n// routes/logout.ts\nexport function logout () {\n  return (req: Request, res: Response) => {\n    security.authenticatedUsers.remove(utils.jwtFrom(req))\n\
      \    res.clearCookie('token')\n    res.status(200).send()\n  }\n}"
    verification: Log in, capture the JWT, then call the logout endpoint. Replay the captured JWT against `GET /rest/user/whoami`
      — expect HTTP 401.
    reference: CWE-613
