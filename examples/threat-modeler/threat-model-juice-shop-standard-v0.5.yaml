  stride: Information Disclosure
  cwe: CWE-312
  title: TOTP Intermediate Token Stored in localStorage (login.component.ts:120)
  affected_parameter: totp_tmp_token
  scenario: 'When a user with 2FA enabled completes the first factor (password), the server returns a short-lived JWT (`tmpToken`)
    indicating `type: ''password_valid_needs_second_factor_token''`. The login component at login.component.ts:120 writes
    this token to `localStorage.setItem(''totp_tmp_token'', error.data.tmpToken)`. The two-factor-auth-service reads it back
    at two-factor-auth-service.ts:38: `tmpToken: localStorage.getItem(''totp_tmp_token'')`. localStorage is accessible to
    any same-origin JavaScript. An attacker exploiting any XSS vulnerability can steal `totp_tmp_token` while the victim is
    partway through the 2FA flow. Depending on the token''s lifetime, the attacker may be able to complete the 2FA challenge
    themselves (by submitting a valid TOTP code) and fully authenticate as the victim, defeating the purpose of 2FA.'
  evidence_summary: login.component.ts:120 writes `localStorage.setItem('totp_tmp_token', error.data.tmpToken)` — the intermediate
    2FA credential is stored in XSS-readable browser storage.
  impact_description: XSS during the 2FA flow allows theft of the intermediate token, potentially enabling an attacker to
    complete authentication as the victim and fully bypass 2FA.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The tmp_token is a short-lived JWT with a restricted `type` claim, limiting its use to the 2FA verification
    endpoint.
  mitigation_title: Store the TOTP intermediate token in sessionStorage with a short TTL and clear it after verification
  remediation:
    effort: Low
    steps:
    - Replace `localStorage.setItem('totp_tmp_token', ...)` with `sessionStorage.setItem(...)` — sessionStorage is tab-scoped
      and not persisted between tabs, reducing the exposure window.
    - 'Enforce a 5-minute expiry on the `tmpToken` JWT (server-side `expiresIn: ''5m''` in the `security.authorize()` call
      that creates it).'
    - 'Clear the sessionStorage key immediately after the 2FA verification API call completes (success or failure): `sessionStorage.removeItem(''totp_tmp_token'')`.'
    - 'Longer-term: implement the BFF pattern so the intermediate token is a server-side session cookie (`HttpOnly; Secure;
      SameSite=Strict`) rather than any form of browser storage.'
    code_example: '// Before

      localStorage.setItem(''totp_tmp_token'', error.data.tmpToken)


      // After — tab-scoped only, cleared immediately after use

      sessionStorage.setItem(''totp_tmp_token'', error.data.tmpToken)

      // In two-factor-auth-service after the verify call:

      sessionStorage.removeItem(''totp_tmp_token'')'
    verification: After a successful 2FA login, run `localStorage.getItem('totp_tmp_token')` and `sessionStorage.getItem('totp_tmp_token')`
      in the console. Both must return `null`. Simulate an XSS payload that reads localStorage during the 2FA step and confirm
      the key is absent.
    reference: CWE-312
