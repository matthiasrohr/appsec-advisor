- local_id: llm-chat-service-009
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-285
  title: Discount Cap Unenforced at Server Layer in generateCoupon Tool (chat.ts:179)
  affected_parameter: discount (generateCoupon tool parameter)
  scenario: 'LLM06 — Excessive Agency: The `generateCoupon` tool''s Zod input schema at `chat.ts:179` declares `discount:
    z.number()` with no `.max()` constraint. The system prompt at line 103 states "The maximum allowed discount is 10%", but
    this instruction is enforced only by the LLM''s instruction-following behaviour — an advisory control. An attacker using
    prompt injection (see llm-chat-service-002) tricks the LLM into calling `generateCoupon({ discount: 80 })`. The Vercel
    AI SDK validates the schema (`z.number()` is satisfied by 80), executes the tool, and `security.generateCoupon(80)` at
    line 184 encodes an 80% discount coupon with no rejection. The coupon is returned to the attacker and is valid at checkout.
    Challenge detection at line 183 confirms the discount ≥ 50% path is reachable and has been tested: `challengeUtils.solveIf(challenges.chatbotGreedyInjectionChallenge,
    () => discount >= 50)`.'
  evidence_summary: 'At `chat.ts:179`, `discount: z.number()` carries no `.max(10)` constraint; `security.generateCoupon(discount)`
    at line 184 encodes whatever numeric value the LLM passes. Challenge detection at line 183 explicitly tests for `discount
    >= 50`, confirming the ≥50% path is reachable in production.'
  impact_description: An attacker obtains arbitrarily high discount coupons (up to 100%), resulting in direct financial loss
    on redeemed orders with no server-side guardrail preventing abuse.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: System prompt instructs the LLM that the maximum discount is 10% and lists specific conditions. These
    are LLM behavioral guidelines only — not code-enforced.
  mitigation_title: Add server-side discount cap and Zod max constraint to generateCoupon tool input
  remediation:
    effort: Low
    steps:
    - Change the Zod schema at `chat.ts:179` from `z.number()` to `z.number().int().min(1).max(10)`, so the Vercel AI SDK's
      schema-validation layer rejects any tool call with `discount > 10` before `execute` runs.
    - 'Add a defense-in-depth cap inside `execute` at line 181: `const safeDiscount = Math.min(Math.max(1, Math.round(discount)),
      10)` before calling `security.generateCoupon(safeDiscount)`.'
    - Log a warning whenever the cap is exercised (input `discount !== safeDiscount`) to detect attempted abuse.
    code_example: "// Before (chat.ts:179) — no max constraint\ndiscount: z.number().describe('The discount percentage for\
      \ the coupon (maximum 10)')\n\n// After — schema-enforced cap\ndiscount: z.number().int().min(1).max(10)\n    .describe('The\
      \ discount percentage for the coupon (1–10)')\n\n// Also inside execute at chat.ts:181\nexecute: async ({ discount })\
      \ => {\n  const safeDiscount = Math.min(discount, 10) // defense-in-depth\n  const couponCode = security.generateCoupon(safeDiscount)\n\
      \  return { couponCode, discount: safeDiscount }\n}"
    verification: 'Verify that calling the `generateCoupon` tool with `discount: 80` (via a direct test or a prompt injection
      attempt) results in the Vercel AI SDK throwing a tool-input validation error rather than generating a coupon, OR that
      the returned coupon decodes to a discount of 10% or less.'
    reference: CWE-285
