  title: SQLite Database File Stored Unencrypted on Filesystem (models/index.ts:41)
  affected_parameter: 'storage path: data/juiceshop.sqlite'
  scenario: 'The Sequelize initializer at `models/index.ts:41` configures the SQLite engine with `storage: ''data/juiceshop.sqlite''`
    and no encryption extension (e.g., SQLCipher). The file contains every row of every table: Users (email addresses, MD5
    password hashes, TOTP secrets, last login IPs), Cards (payment card numbers and details), Addresses, Orders, Feedback,
    and Recycle requests. Any process or user with read access to the server''s filesystem — obtained via path-traversal vulnerabilities
    (several exist in other routes), server compromise, cloud-storage misconfiguration, or backup extraction — can open the
    file with any SQLite browser and read all data in plaintext, including plaintext TOTP secrets (`totpSecret` column, `models/user.ts:120`)
    that defeat 2FA when combined with MD5-cracked passwords.'
  evidence_summary: '`models/index.ts:41` passes `storage: ''data/juiceshop.sqlite''` to Sequelize with no `dialectOptions`
    encryption configuration; the TOTP secret column is declared as a plaintext `DataTypes.STRING` in `models/user.ts:120`.'
  impact_description: A server-side file-read vulnerability yields every user's email, (crackable) password hash, TOTP secret,
    payment card data, and address — full account takeover at scale and PCI-DSS/SOC2 breach.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: File-level OS permissions only — no cryptographic protection. The `data/` directory has no documented
    access-control configuration.
  mitigation_title: Encrypt the SQLite database with SQLCipher and field-level encryption for TOTP secrets
  remediation:
    effort: High
    steps:
    - 'Replace the `sqlite3` Sequelize dialect dependency with `@journeyapps/sqlcipher` and supply an encryption key via `dialectOptions:
      { key: process.env.DB_ENCRYPTION_KEY }` in `models/index.ts`.'
    - Store `DB_ENCRYPTION_KEY` in an environment variable or a secrets manager (not in source code); rotate it on any suspected
      compromise.
    - Apply field-level encryption to particularly sensitive columns (`totpSecret`, card numbers) using Node.js `crypto.createCipheriv`
      with AES-256-GCM before writing and decrypting after reading, so even a key-less SQLite read yields ciphertext.
    - Add OS-level file permissions (`chmod 600 data/juiceshop.sqlite`) and ensure the application runs as a dedicated least-privilege
      OS user that owns the file.
