  title: Remote Code Execution via B2B Order Sandbox Escape (routes/b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: 'The B2B order endpoint at routes/b2bOrder.ts:23 executes `vm.runInContext(''safeEval(orderLinesData)'', sandbox,
    { timeout: 2000 })` where `orderLinesData = req.body.orderLinesData`. The `notevil` library (`safeEval`) is intended to
    sandbox JavaScript, but it has documented escape vectors — attackers can access `this.constructor.constructor(''return
    process'')()` inside a notevil expression to reach the Node.js `process` object and execute arbitrary commands. The route
    requires authentication (server.ts:424), but any logged-in user can reach it.'
  evidence_summary: routes/b2bOrder.ts:23 passes `safeEval(orderLinesData)` where `orderLinesData` is attacker-controlled
    JSON body field; `notevil` is the sandbox but has known constructor-chain escapes that break out of the restricted evaluator.
  impact_description: Authenticated attacker achieves arbitrary code execution in the Node.js server process, enabling data
    exfiltration, backdoor installation, and complete host compromise.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Requires authentication. notevil sandbox provides partial isolation. 2000ms execution timeout limits
    infinite loops.
  mitigation_title: Remove user-controlled expression evaluation from the B2B order endpoint and validate orderLinesData by
    schema
  remediation:
    effort: Medium
    steps:
    - Replace `vm.runInContext('safeEval(orderLinesData)', ...)` with a strict JSON schema validation of the order lines payload
      — parse the string as JSON and validate against a schema defining allowed line-item fields (productId, quantity, price).
    - Remove the `notevil` and `vm` imports from routes/b2bOrder.ts entirely.
    - If expression evaluation is required for business logic, implement it as a fixed interpreter over a whitelist of permitted
      operations, not a general-purpose JavaScript evaluator.
    code_example: "// Before (routes/b2bOrder.ts:19-24):\nconst orderLinesData = body.orderLinesData || ''\nvm.runInContext('safeEval(orderLinesData)',\
      \ sandbox, { timeout: 2000 })\n\n// After:\nimport Ajv from 'ajv'\nconst ajv = new Ajv()\nconst orderSchema = { type:\
      \ 'array', items: { type: 'object',\n  properties: { productId: { type: 'integer' }, quantity: { type: 'integer', minimum:\
      \ 1 } },\n  required: ['productId', 'quantity'], additionalProperties: false }}\nconst parsed = JSON.parse(body.orderLinesData)\n\
      if (!ajv.validate(orderSchema, parsed)) throw new Error('Invalid order lines')"
    verification: POST /b2b/v2/orders with `orderLinesData` set to `"this.constructor.constructor('return process')()"` —
      the server must return a validation error, not execute the expression.
    reference: CWE-94
