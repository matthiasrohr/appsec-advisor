  title: User Conversation Data and PII Transmitted to External LLM Provider
  affected_parameter: messages (system prompt + chat history)
  scenario: 'LLM02 — Sensitive Information Disclosure: Every request to `POST /rest/chat` forwards the authenticated user''s
    username (line 200: `buildSystemPrompt(userName)`) and the full conversation history (line 206: `messages`) to the configurable
    LLM provider at `application.chatBot.llmApiUrl`. If a user shares order details, personal information, or complaints in
    the chat, that data is transmitted to — and potentially retained by — the external provider under that provider''s data
    retention policy. Under PCI-DSS Req 3.4 and SOC2 CC6.7, processing of cardholder or personal data through a third-party
    AI provider requires an executed Data Processing Agreement and may constitute unauthorized data transfer. Customers are
    not disclosed that their conversation data leaves the application boundary.'
  evidence_summary: '`streamText` at `chat.ts:203` sends both the `system` prompt (which embeds the username at line 200)
    and `messages` (full conversation history from `req.body`) to the external provider constructed at lines 108–112.'
