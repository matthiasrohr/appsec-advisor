  stride: Tampering
  cwe: CWE-434
  title: File Upload Storage Without Content Validation (ftp/)
  affected_parameter: file
  scenario: The application stores user-uploaded files in the `ftp/` directory (confirmed present with files such as `coupons_2013.md.bak`,
    `eastere.gg`, `encrypt.pyc`). The file upload handler accepts files without server-side MIME type validation, magic-byte
    inspection, or anti-malware scanning before writing to disk. An attacker can upload a PHP webshell disguised as a JPEG,
    a polyglot file (JPEG+ZIP containing exploit), or a script that executes when the `ftp/` directory is served. Furthermore,
    `encrypt.pyc` and other compiled files in the ftp/ directory suggest the upload channel has previously been used to place
    executable content. File storage without scanning enables persistent malware hosting via the application's own file serving
    infrastructure.
  evidence_summary: The `ftp/` directory contains files with mixed types (`.pyc`, `.bak`, `.md`, `.gg`) indicating no enforced
    content policy at upload time.
  impact_description: Arbitrary file placement in the served ftp/ directory enables malware hosting, webshell execution (if
    directory is executable), and exfiltration of backup files that may contain secrets.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None confirmed. No server-side MIME validation, no magic-byte verification, no ClamAV or equivalent anti-malware
    scan is applied before files are persisted.
  mitigation_title: Validate file type via magic-byte inspection and content-length limit before writing to the ftp/ directory
  remediation:
    effort: Medium
    steps:
    - Use the `file-type` npm package to inspect the first 4100 bytes of the upload buffer and compare the detected MIME type
      against an allowlist (e.g., `['image/jpeg','image/png','application/pdf']`). Reject any upload whose detected type is
      absent from the allowlist.
    - Apply a file-size cap (e.g., 2 MB) via multer's `limits.fileSize` option in the upload middleware before any disk write
      occurs.
    - 'Store uploaded files outside the web-accessible directory (`ftp/`) in a private storage path, and serve them via a
      controller that sets `Content-Disposition: attachment` to prevent browser execution.'
    - Optionally integrate `clamscan` (Node.js ClamAV binding) as an async post-upload scanner; quarantine files that trigger
      a signature match.
    code_example: null
    verification: Upload a file named `test.php` with content `<?php phpinfo(); ?>` and MIME type `image/jpeg`. The server
      must reject it with 400 or 415 before writing it to disk. Confirm no file appears under `ftp/`.
    reference: CWE-434
