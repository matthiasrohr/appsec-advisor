- local_id: ci-cd-pipeline-004
  threat_category_id: TH-06
  additional_categories:
  - TH-14
  stride: Elevation of Privilege
  cwe: CWE-732
  title: Missing workflow-level permissions block grants GITHUB_TOKEN write access by de…
  affected_parameter: permissions block absent in release.yml…
  scenario: 'GitHub Actions defaults to granting `GITHUB_TOKEN` broad write access (specifically `contents: write`, `packages:
    write`, `deployments: write`, `pull-requests: write`) in workflows that do not explicitly declare a `permissions:` block.
    Of the 16 workflows in this repository, at least four high-impact ones — `release.yml`, `ci.yml`, `image_actions.yml`,
    and `zap_scan.yml` — lack a workflow-level `permissions:` declaration. `release.yml` publishes GitHub Releases and pushes
    Docker images; `ci.yml` deploys to Heroku and pushes Docker snapshots; `image_actions.yml` creates commits and pull requests.
    If any step in these workflows is compromised (via a malicious dependency, a compromised action, or a script injection
    attack), the attacker immediately holds an implicitly powerful `GITHUB_TOKEN`. By contrast, `codeql-analysis.yml` correctly
    declares `permissions: actions: read, contents: read, security-events: write` at the job level, demonstrating the pattern
    is known but inconsistently applied.'
  evidence_summary: '`release.yml` (14 steps, Docker push, GitHub Release creation) has no `permissions:` block; the GITHUB_TOKEN
    defaults to write on all scopes when triggered by a tag push from the upstream repository.'
  impact_description: A compromised step in any unscoped workflow can create or modify releases, push to branches, write packages,
    or invoke the Deployments API — all actions that would be silently authorized by the elevated default GITHUB_TOKEN.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Repository-level default permissions may be set to read-only in GitHub Settings → Actions → General;
    however this is a runtime organizational setting not visible in the workflow files and cannot be relied upon as a code-level
    control. `pull_request_target` is not used, reducing one common privilege escalation vector.
  mitigation_title: Add explicit least-privilege permissions blocks to all GitHub Actions workflows
  remediation:
    effort: Low
    steps:
    - 'Add `permissions: read-all` at the workflow level in every workflow as the default, then override only the specific
      scopes each job requires (e.g., `contents: write` for release creation, `packages: write` for GHCR pushes).'
    - 'For `release.yml`: add `permissions: contents: write, packages: write` at the workflow level and remove unnecessary
      scopes.'
    - 'For `ci.yml`: the Docker push job needs `packages: write`; the Heroku deploy job needs no special GitHub permissions;
      the coverage-report job needs `contents: read` and passes `GITHUB_TOKEN` to coveralls — scope to `checks: write` only.'
    - 'For `image_actions.yml`: needs `contents: write` and `pull-requests: write` for the PR creation step.'
    - 'For `zap_scan.yml`: needs `security-events: write` only.'
    - 'Set the repository-level default to `permissions: read-only` in GitHub Settings → Actions → General to enforce the
      safe default for any workflow that omits the block.'
    code_example: "# release.yml — Add at top level (after 'on:')\npermissions:\n  contents: write   # create/update GitHub\
      \ releases and upload artifacts\n  packages: write   # push to GitHub Packages if used\n  # All other scopes default\
      \ to none\n\n# zap_scan.yml — Add at top level\npermissions:\n  contents: read\n  security-events: write\n\n# image_actions.yml\
      \ — Add at top level\npermissions:\n  contents: write\n  pull-requests: write"
    verification: Run `actionlint .github/workflows/*.yml` and verify zero `permissions` warnings. Run `gh api /repos/juice-shop/juice-shop/actions/permissions
      --jq .default_workflow_permissions` and confirm it returns `read` not `write`.
    reference: CWE-732
  evidence:
