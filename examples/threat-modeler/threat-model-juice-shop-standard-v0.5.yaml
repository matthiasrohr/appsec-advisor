    the requester is authenticated; server.ts:638 registers the route without an auth middleware.
  impact_description: Anonymous attackers can obtain discount coupons without owning an account or having a valid order, bypassing
    the coupon policy entirely.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: LLM system-prompt coupon policy instructions describe eligibility requirements but are bypassable via
    prompt injection.
  mitigation_title: Require authenticated session before allowing generateCoupon tool execution
  remediation:
