tier_root_causes:
  edge:
  - JWT and TOTP tokens stored in localStorage, accessible to any injected script
  - OAuth implicit flow derives credentials from public email, enabling takeover
  - Client-side role guards enforced without corresponding server-side validation
  - Missing Content Security Policy allows injected scripts to steal stored tokens
  - DomSanitizer bypass in Angular permits stored and reflected XSS in product views
  server:
  - Hardcoded RSA key and express-jwt 0.1.3 alg:none allow arbitrary JWT forgery
  - Raw SQL string concatenation in search and login routes enables injection
  - Missing auth middleware on admin and management API routes
  - LLM chat forwards unvalidated user input, enabling prompt injection and SSRF
  - Outdated JWT libs (express-jwt 0.1.3, jsonwebtoken 0.4.x) with unpatched CVEs
  data:
  - MD5 without salt for password hashing, vulnerable to rainbow-table cracking
  - ORM auto-CRUD on User model exposes mass-assignment including the role field
  - PII fields (email, address, orders) stored unencrypted in SQLite
  - IDOR on order and user IDs enables horizontal privilege escalation
