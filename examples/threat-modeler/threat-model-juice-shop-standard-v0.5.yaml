  stride: Spoofing
  cwe: CWE-521
  title: OAuth Derived Password from Email Claim
  affected_parameter: email
  scenario: The OAuthComponent at frontend/src/app/oauth/oauth.component.ts:30 derives the user's application password as
    `btoa(profile.email.split('').reverse().join(''))` — base64-encoding the reversed email address. This password is then
    registered or used to log in via the standard `/rest/user/login` endpoint. Because the password is a pure deterministic
    function of the email address (a public-profile claim), any party who knows a user's email can compute the password offline
    without interacting with the OAuth provider, then authenticate via the standard password login endpoint. The 2FA TOTP
    check is conditional (`totpSecret !== ''`); for accounts enrolled via Google OAuth that never set up TOTP, no second factor
    applies.
  evidence_summary: oauth.component.ts:30 sets `password = btoa(profile.email.split('').reverse().join(''))`, a reversible
    one-to-one function of the email; line 46 submits this to `/rest/user/login` as a bearer credential.
  impact_description: Any attacker who knows a victim's Google account email can derive the application password and log in
    as that user, bypassing the OAuth provider entirely.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Google ID-token validation is performed by the Google OAuth provider. No server-side check prevents the
    derived password from being submitted directly to the standard login endpoint.
  mitigation_title: Replace derived-password OAuth pattern with server-side token exchange
  remediation:
    effort: High
    steps:
    - Remove the client-side password-derivation and registration logic from OAuthComponent entirely.
    - 'Implement a server-side OAuth authorization-code flow with PKCE: the backend exchanges the authorization code for tokens
      with Google, then issues its own JWT session — no application password for OAuth users.'
    - If a password must exist for account-linking purposes, generate a cryptographically random credential (`crypto.randomBytes(32).toString('hex')`)
      server-side that is never revealed to the client.
    code_example: '// Before — frontend/src/app/oauth/oauth.component.ts:30 (predictable password)

      const password = btoa(profile.email.split('''').reverse().join(''''))


      // After — backend issues session directly from Google token exchange

      // Frontend posts the access_token; backend verifies with Google and returns its own JWT

      // No application password is derived or stored'
    verification: After the fix, attempt `POST /rest/user/login` with `{"email":"any.google.user@gmail.com","password":"<btoa(reverse(email))"}`.
      Expect HTTP 401.
    reference: CWE-521
