  stride: Denial of Service
  cwe: CWE-400
  title: YAML bomb via unrestricted yaml.load on uploaded file causes memory exhaustion
  affected_parameter: file (POST /file-upload multipart)
  scenario: 'The YAML upload handler at `routes/fileUpload.ts:109` calls `yaml.load(data)` inside a `vm.runInContext` sandbox
    with a 2-second timeout. The `js-yaml` `load()` function is vulnerable to YAML alias amplification (YAML bomb): a small
    YAML file using nested anchors and aliases (`a: &a [&a [...]]`) expands exponentially in memory during parsing, before
    any timeout can fire. A single 200-byte upload can expand to gigabytes and OOM-kill the Node.js process. The Multer limit
    of 200KB still allows payloads that expand to tens of GB via YAML anchors.'
  evidence_summary: '`routes/fileUpload.ts:109`: `vm.runInContext(''JSON.stringify(yaml.load(data))'', sandbox, { timeout:
    2000 })` — `yaml.load()` processes the full YAML structure before the VM timeout applies.'
  impact_description: 'Unauthenticated single-request denial of service: the Node.js process is OOM-killed, taking down the
    entire application until it is restarted.'
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 'Multer file size limit: 200KB; vm.runInContext 2-second timeout (does not prevent memory exhaustion).'
  mitigation_title: Replace yaml.load() with yaml.safeLoad()/yaml.load() using safe schema and add alias depth limit
  remediation:
    effort: Low
    steps:
    - 'Replace `yaml.load(data)` with `yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })` or `yaml.load(data, { schema: yaml.JSON_SCHEMA
      })` to prevent JavaScript-specific type tags (`!!js/function`, etc.).'
    - 'Set a maximum alias depth: pass `{ maxAliases: 100 }` in js-yaml 4.x options to cap alias expansion before it reaches
      memory-exhaustion scale.'
    - Reduce the Multer file size limit for YAML uploads to 10KB, as legitimate YAML order files are small.
    - Run `yaml.load()` in a separate worker_thread with a strict memory limit (Node.js `--max-old-space-size`) so a YAML
      bomb kills only the worker, not the main process.
    code_example: '// Before (fileUpload.ts:109)

      yaml.load(data)


      // After — safe schema + alias cap

      yaml.load(data, { schema: yaml.JSON_SCHEMA, maxAliases: 100 })'
    verification: 'Upload a YAML bomb file (`a: &a [&a [&a [&a [&a [&a [&a [&a [&a [&a []]]]]]]]]]`) to `POST /file-upload`
      — the server must return a 400 or 410 error without consuming excessive memory (monitor RSS with `process.memoryUsage()`
      before and after).'
    reference: CWE-400
