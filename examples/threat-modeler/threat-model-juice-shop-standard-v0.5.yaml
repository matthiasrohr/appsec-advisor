  stride: Information Disclosure
  cwe: CWE-321
  title: Hardcoded HMAC secret exposes security-answer hashes (lib/insecurity.ts:42)
  affected_parameter: SecurityAnswer HMAC verification
  scenario: The `hmac()` function at `lib/insecurity.ts:42` uses a hardcoded secret `'pa4qacea4VK9t9nGv7yZtwmj'` for HMAC-SHA256
    of security answers. The `resetPassword.ts:41` verification compares `security.hmac(answer) === data.answer`. An attacker
    who obtains a dump of the SecurityAnswers table (via the SQL injection at `routes/search.ts:23`) can precompute HMAC values
    for common security answers offline using the known key, enabling targeted account takeover via the password reset flow
    without any server interaction.
  evidence_summary: '`lib/insecurity.ts:42`: `crypto.createHmac(''sha256'', ''pa4qacea4VK9t9nGv7yZtwmj'')` — static string
    used as HMAC key for all security-answer storage.'
  impact_description: Offline cracking of security answers enables account takeover for any user whose SecurityAnswer hash
    is exposed via SQL injection, without triggering any rate limits.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: HMAC applied (not plaintext); security answers stored as HMAC digests not plaintext.
  mitigation_title: Replace hardcoded HMAC secret with environment-variable key and add per-answer salt
  remediation:
    effort: Medium
    steps:
    - Load the HMAC key from an environment variable `SECURITY_ANSWER_HMAC_KEY` with a startup check that prevents startup
      if absent.
    - Add a random per-answer salt stored alongside the hash in the SecurityAnswers table, so that precomputed rainbow tables
      are ineffective even if the key leaks.
    - Consider replacing the security-question flow entirely with a time-limited email token (TOTP or signed URL) for password
      reset, which eliminates the static shared secret entirely.
    code_example: "// Before (insecurity.ts:42)\nexport const hmac = (data: string) => crypto.createHmac('sha256', 'pa4qacea4VK9t9nGv7yZtwmj').update(data).digest('hex');\n\
      \n// After — key from env, per-answer salt\nexport const hmac = (data: string, salt: string) =>\n  crypto.createHmac('sha256',\
      \ process.env.SECURITY_ANSWER_HMAC_KEY!).update(salt + data).digest('hex');"
    verification: Extract the SecurityAnswers table via a test SQL injection; attempt to brute-force HMAC values for common
      answers ('pet', 'mother', 'school') using the old key — all HMAC values must now differ and be unsalted-brute-force-resistant.
    reference: CWE-321
