  stride: Information Disclosure
  cwe: CWE-204
  title: Account Existence and 2FA Enrollment Disclosed via Differential Login Response
  affected_parameter: email, password
  scenario: 'The login handler at routes/login.ts produces two distinct success-path response shapes: when a user exists,
    the password matches, AND 2FA is enabled, it returns HTTP 401 with `{status: ''totp_token_required'', data: {tmpToken:
    ...}}` (line 38). For all failure cases (non-existent email, wrong password, or no 2FA) it returns HTTP 401 with the plain
    string ''Invalid email or password.'' (line 50). An attacker can exploit the difference to confirm: (1) the exact email
    address of a registered user, and (2) whether that account has TOTP 2FA enabled — both valuable for targeted phishing
    and bypass attempts. For non-TOTP accounts the single error message prevents enumeration, but TOTP-enrolled users are
    distinguishable.'
  evidence_summary: 'Line 38 returns `status: ''totp_token_required''` on successful password authentication for 2FA accounts,
    while line 50 returns a generic error for all other failures — the differing HTTP body reveals account existence and 2FA
    enrollment.'
  impact_description: Attackers can enumerate which registered email addresses have 2FA enabled and which do not, enabling
    targeted social engineering and prioritised credential-stuffing campaigns.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Non-TOTP login failures return the same error message for wrong email vs wrong password, preventing basic
    enumeration on the majority of accounts.
  mitigation_title: Return an opaque 2FA-required response that does not confirm password validity
  remediation:
    effort: Medium
    steps:
    - Introduce a fixed artificial delay (e.g., 100–300 ms with jitter) on all login responses to prevent timing-based enumeration
      as a baseline.
    - 'When returning the TOTP requirement, do so with a deliberately ambiguous response: respond with a generic ''Additional
      verification required'' message without the interim `tmpToken`; issue the `tmpToken` only after the client submits both
      email and password again on a second step.'
    - Alternatively, hide TOTP enrollment status by always requiring a TOTP field in a single-step form; return the same error
      for wrong-password and wrong-TOTP to collapse distinguishability.
    - Consider returning HTTP 200 with a uniform body structure for all auth challenges to avoid status-code-based discrimination.
    code_example: null
    verification: Submit a POST /rest/user/login for a known TOTP-enrolled email with correct password. Confirm the response
      body is indistinguishable from a failed login to an observer who does not control the account.
    reference: CWE-204
  evidence:
  - file: routes/login.ts
    line: 38
