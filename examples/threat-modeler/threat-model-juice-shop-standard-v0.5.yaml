  stride: Tampering
  cwe: CWE-770
  title: YAML Bomb Resource Exhaustion via File Upload (routes/fileUpload.ts:109)
  affected_parameter: null
  scenario: 'The YAML file upload handler at routes/fileUpload.ts:109 calls `yaml.load(data)` in the outer Node.js thread
    before passing the result to `vm.runInContext`. The vm timeout of 2000ms does not cover the yaml.load call. A ''billion
    laughs'' YAML document with deeply nested anchor references (`&a` expanded 9 levels: `a: &a [...]`) causes exponential
    memory expansion during YAML parsing — before the VM sandbox even starts. This can exhaust the server''s heap, triggering
    OOM and crashing the process. The endpoint requires no authentication.'
  evidence_summary: routes/fileUpload.ts:109 executes `yaml.load(data)` synchronously in the sandbox setup (`const sandbox
    = { yaml, data }`) before `vm.runInContext`, placing the amplification attack outside the VM timeout protection; `vm.runInContext`
    only protects the eval step.
  impact_description: Unauthenticated attacker uploads a YAML bomb and crashes the Express process, taking down the entire
    application until it restarts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 'Multer memory storage limits uploads to 200,000 bytes (`limits: { fileSize: 200000 }`), which limits
    but does not eliminate amplification since YAML anchors can produce gigabytes from a small payload.'
  mitigation_title: Load YAML inside the VM context with a memory guard, or use yaml.safeLoad with a max-alias-count option
  remediation:
    effort: Medium
    steps:
    - 'Use js-yaml''s `loadAll` with `{ maxAliases: 100 }` option (available in js-yaml v4+) to cap anchor expansion.'
    - 'Move the `yaml.load(data)` call inside the vm context with a strict timeout: `vm.runInContext(''JSON.stringify(yaml.load(data))'',
      sandbox, { timeout: 2000 })` — the current code already does this, but ensure yaml is treated as a pure data loader,
      not an evaluator.'
    - Add an explicit check for the number of newlines or document structure depth before parsing.
    - Reduce the max upload size for YAML files specifically to 10KB.
    code_example: '// Before (routes/fileUpload.ts:107-109):

      const sandbox = { yaml, data }

      vm.createContext(sandbox)

      const yamlString = vm.runInContext(''JSON.stringify(yaml.load(data))'', sandbox, { timeout: 2000 })


      // After — use js-yaml v4 with alias limit:

      import { load } from ''js-yaml''

      const yamlString = JSON.stringify(load(data, { maxAliases: 100 }))'
    verification: Upload a billion-laughs YAML (9-level nested anchors, ~50 bytes expanded to >1GB) — the server must return
      503 or 413, not hang or crash.
    reference: CWE-770
