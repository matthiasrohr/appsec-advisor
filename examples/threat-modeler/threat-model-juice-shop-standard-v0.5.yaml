- local_id: auth-service-004
  threat_category_id: TH-02
  additional_categories: []
  stride: Spoofing
  cwe: CWE-640
  title: Security-Question Password Reset Without Rate Limiting (resetPassword.ts:17)
  affected_parameter: answer, email
  scenario: The password-reset handler at routes/resetPassword.ts:17 accepts an email, a security question answer, and a new
    password via a single POST request with no rate limiting, CAPTCHA, or lockout policy. Security question answers are predictable
    for public figures and can be scraped from social media (e.g., the challenge at line 58 reveals that 'Samuel' is Jim's
    answer). An attacker who identifies a target's email address can programmatically enumerate all plausible security-question
    answers — first names, pet names, hometown strings — until the HMAC comparison at line 41 (`security.hmac(answer) ===
    data.answer`) succeeds and a new attacker-controlled password is set. Because the HMAC key at lib/insecurity.ts:42 is
    also hardcoded (`'pa4qacea4VK9t9nGv7yZtwmj'`), an attacker who knows the HMAC key can precompute answers offline.
  evidence_summary: routes/resetPassword.ts:17 begins the handler with no rate-limit or lockout middleware; the HMAC comparison
    at line 41 is the only gate.
  impact_description: Complete account takeover for any user whose security-question answer can be guessed or brute-forced,
    requiring only the victim's email address.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Answer is HMAC-compared, preventing timing attacks on comparison; however HMAC key is also hardcoded
    (lib/insecurity.ts:42).
  mitigation_title: Replace security-question reset with email token flow and add rate limiting
  remediation:
    effort: Medium
    steps:
    - Replace security-question based reset with a time-limited one-time token (OTP or signed URL) sent to the account's registered
      email address.
    - 'Apply express-rate-limit to the reset endpoint: `rateLimit({ windowMs: 15 * 60 * 1000, max: 5 })` before the handler.'
    - Add account lockout after 3 failed reset attempts within a 15-minute window, requiring an additional email confirmation
      to unlock.
    - If security questions cannot be removed immediately, increase entropy by requiring at least two questions and enforce
      minimum answer length of 8 characters.
    code_example: null
    verification: Submit 20 sequential POST /rest/user/reset-password requests with different `answer` values. The 6th and
      subsequent requests must return HTTP 429 with a `Retry-After` header.
    reference: CWE-640
  evidence:
  - file: routes/resetPassword.ts
    line: 17
