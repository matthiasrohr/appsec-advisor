- local_id: frontend-spa-008
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-522
  title: TOTP Pre-Authentication Token Stored in localStorage (login.component.ts:120)
  affected_parameter: totp_tmp_token
  scenario: When a user with 2FA enabled attempts to log in, `login.component.ts:120` stores the server-issued temporary TOTP
    token in `localStorage.setItem('totp_tmp_token', error.data.tmpToken)` before redirecting to the `/2fa/enter` route. This
    token is subsequently read by `two-factor-auth-service.ts:38` and submitted alongside the TOTP code to complete authentication.
    Because localStorage is JavaScript-accessible, an XSS payload executing during the 2FA step can read `totp_tmp_token`
    and use it — together with a brute-forced or phished TOTP code — to bypass the second factor. This is particularly dangerous
    because the user is in a partially authenticated state during the 2FA window, giving the attacker the highest-value credential
    (a short-lived but complete 2FA bypass token) with minimal XSS timing requirements.
  evidence_summary: '`login.component.ts:120` calls `localStorage.setItem(''totp_tmp_token'', error.data.tmpToken)` when the
    server responds with `status === ''totp_token_required''`, storing the pre-auth token in XSS-accessible storage.'
  impact_description: XSS during the 2FA flow allows an attacker to extract the temporary TOTP token and authenticate as the
    victim, defeating the 2FA protection that was the only additional credential gate.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The token is short-lived (server-side TTL), but it is available for the entire duration of the 2FA step
    in localStorage.
  mitigation_title: Store the TOTP pre-authentication token in sessionStorage with a short TTL and deliver it via an HttpOnly
    cookie when possible
  remediation:
    effort: Medium
    steps:
    - Replace `localStorage.setItem('totp_tmp_token', ...)` with `sessionStorage.setItem('totp_tmp_token', ...)` — sessionStorage
      is scoped to the tab and cleared on close, reducing the exposure window.
    - Prefer delivering the TOTP flow token as an HttpOnly `SameSite=Strict` cookie set by the server in the 401 response;
      the client would not need to store it at all, and `two-factor-auth-service.ts` would omit the token from the request
      body (the cookie provides it automatically).
    - Enforce a server-side TTL of 60 seconds or less on `totp_tmp_token` to limit the replay window if extracted.
    - Deploy a CSP to reduce the XSS attack surface that makes this extraction possible.
    code_example: '// Before (login.component.ts:120):

      localStorage.setItem(''totp_tmp_token'', error.data.tmpToken)


      // After — use sessionStorage (scoped to tab, not accessible post-close):

      sessionStorage.setItem(''totp_tmp_token'', error.data.tmpToken)

      // Preferred: server sets HttpOnly cookie on 401 response, no client storage needed'
    verification: Initiate login for a 2FA-enabled account; in DevTools, confirm `localStorage.getItem('totp_tmp_token')`
      returns `null` while `sessionStorage.getItem('totp_tmp_token')` returns the token (or null if using the cookie approach).
