- local_id: web3-nft-005
  threat_category_id: TH-06
  additional_categories: []
  stride: Tampering
  cwe: CWE-284
  title: Unauthenticated Wallet State Pollution Enables Exploit Challenge Credit Theft
  affected_parameter: walletAddress
  scenario: 'An attacker monitors the Ethereum Sepolia chain and sees that address `0xVictim` just emitted a `ContractExploited`
    event. Before the event listener processes it, the attacker sends `POST /rest/web3/walletExploitAddress` with `{ "walletAddress":
    "0xVictim" }`. Line 16 unconditionally executes `walletsConnected.add(metamaskAddress)` before any auth check. When the
    on-chain event fires, `walletsConnected.has(exploiter)` returns `true`, `web3WalletChallenge` is solved, and the attacker
    — not the legitimate on-chain exploiter — receives credit. The `walletsConnected` set is also not bounded: an attacker
    can POST thousands of unique addresses to exhaust process heap.'
  evidence_summary: '`web3Wallet.ts:16` unconditionally adds the caller-supplied `walletAddress` to the `walletsConnected`
    Set before the auth check at line 17 (`try`), and the Set has no capacity bound.'
  impact_description: An attacker steals challenge completion credit from the legitimate on-chain actor, and can simultaneously
    degrade server availability through unbounded memory growth.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None
  mitigation_title: Validate and auth-gate wallet address registration before mutating walletsConnected
  remediation:
    effort: Medium
    steps:
    - Move `walletsConnected.add(metamaskAddress)` to after authentication verification — apply `security.isAuthorized()`
      middleware on `POST /rest/web3/walletExploitAddress` and only add the address once the session is validated.
    - Validate `metamaskAddress` as a valid EIP-55 checksum Ethereum address using `ethers.isAddress(metamaskAddress)` before
      adding it; return HTTP 400 for invalid formats.
    - Cap `walletsConnected` at a maximum size (e.g., 10,000 entries) and reject new additions with HTTP 429 when the cap
      is reached to prevent OOM.
    - Require wallet ownership proof (EIP-191 signed nonce) as described in web3-nft-004.
    code_example: '// Before (web3Wallet.ts:15-16) — unconditional add before any validation

      const metamaskAddress = req.body.walletAddress

      walletsConnected.add(metamaskAddress)


      // After — validate format + cap size before adding

      const { isAddress } = await import(''ethers'')

      if (!isAddress(metamaskAddress)) return res.status(400).json({ error: ''Invalid Ethereum address'' })

      if (walletsConnected.size >= MAX_CONNECTED) return res.status(429).json({ error: ''Too many registrations'' })

      walletsConnected.add(metamaskAddress)'
    verification: 'POST `{ "walletAddress": "not-an-address" }` and assert HTTP 400; POST 10,001 unique addresses and assert
      the 10,001st returns HTTP 429 without crashing the process.'
    reference: CWE-284
  evidence:
  - file: routes/web3Wallet.ts
    line: 16
  evidence_check: unchecked
