  cwe: CWE-347
  title: Insecure JWT Verification
  affected_parameter: Authorization header JWT alg header
  scenario: 'The `isAuthorized()` middleware is configured as `expressJwt({ secret: publicKey })` without specifying an `algorithms`
    allowlist. The public key is exposed at `/encryptionkeys/jwt.pub` (unauthenticated directory listing). An attacker downloads
    the public key, crafts a JWT with header `{ alg: ''HS256'' }`, signs it with the public key bytes used as the HMAC-SHA256
    secret, and submits it. The server — expecting RS256 but accepting any algorithm — validates the HMAC signature using
    the same public key it already trusts, accepting the forged token. `express-jwt 0.1.3` does not default-restrict algorithms.'
  evidence_summary: '`lib/insecurity.ts:52`: `expressJwt({ secret: publicKey })` with no `algorithms` field; public key at
    `encryptionkeys/jwt.pub` served via unauthenticated directory listing at `/encryptionkeys`.'
  impact_description: Unauthenticated attacker forges a valid admin JWT using the publicly available RSA public key, bypassing
    all `isAuthorized()` guards.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 used at token issuance; `jws.verify` checks signature at decode.
  mitigation_title: Pin JWT algorithm allowlist to RS256 in express-jwt configuration
  remediation:
    effort: Low
    steps:
    - 'Add `algorithms: [''RS256'']` to the `expressJwt` options object in `isAuthorized()` at `lib/insecurity.ts:52`.'
    - Upgrade `express-jwt` from 0.1.3 to the current 8.x series, which enforces algorithm pinning by default.
    - Remove the `/encryptionkeys` directory listing route (`server.ts:277`) or add authentication middleware before it so
      the public key is not trivially discoverable.
    code_example: '// Before (lib/insecurity.ts:52)

      export const isAuthorized = () => expressJwt({ secret: publicKey } as any);


      // After

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] });'
