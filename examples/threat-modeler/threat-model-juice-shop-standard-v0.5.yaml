    adjacent routes at lines 634-635 apply the guard to equivalent state-changing operations.'
  impact_description: Unauthenticated actors can solve CTF challenges, claim NFT completion for any wallet address, and manipulate
    shared server state without a session — undermining challenge integrity and enabling replay attacks.
