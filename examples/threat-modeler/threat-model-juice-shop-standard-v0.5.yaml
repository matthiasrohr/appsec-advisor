  stride: Elevation of Privilege
  cwe: CWE-862
  title: Missing Authentication Middleware on Sensitive API Routes
  affected_parameter: PUT /api/Products/:id
  scenario: 'The `isAuthorized()` middleware for `PUT /api/Products/:id` is commented out at `server.ts:370`: `// app.put(''/api/Products/:id'',
    security.isAuthorized())`. The finale-rest resource still serves the endpoint. Any unauthenticated attacker can send `PUT
    /api/Products/1 { "description": "<script>...</script>" }` to modify product descriptions. Because product descriptions
    render as HTML in the Angular frontend, this is also a stored XSS escalation path targeting admin sessions.'
  evidence_summary: '`server.ts:370`: `// app.put(''/api/Products/:id'', security.isAuthorized())` — isAuthorized() intentionally
    disabled (vuln-code-snippet comment for `changeProductChallenge`); finale still handles the route without auth.'
  impact_description: Any internet user can modify product catalog data; combined with HTML rendering in the frontend, this
    enables stored XSS attacks that hijack admin sessions.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None on PUT; DELETE is protected with denyAll().
  mitigation_title: Re-enable isAuthorized() guard on PUT /api/Products/:id and require admin role
  remediation:
    effort: Low
    steps:
    - 'Uncomment `app.put(''/api/Products/:id'', security.isAuthorized())` at `server.ts:370` and additionally add a role
      check: `app.put(''/api/Products/:id'', security.isAuthorized(), security.isAdmin())`.'
    - Sanitize HTML in product `description` fields on write using `security.sanitizeHtml()` (already available in `lib/insecurity.ts:58`)
      before persisting to the database.
    - Add a Content-Security-Policy header via `helmet.contentSecurityPolicy()` that prevents inline script execution to limit
      XSS impact.
    code_example: '// Before (server.ts:370) — commented out

      // app.put(''/api/Products/:id'', security.isAuthorized())


      // After — auth + role enforcement

      app.put(''/api/Products/:id'', security.isAuthorized(), security.isAdmin())'
