  stride: Spoofing
  cwe: CWE-1104
  title: Express-jwt 0.1.3 Critically Outdated JWT Middleware (lib/insecurity.ts:10)
  affected_parameter: Authorization header / JWT token
  scenario: express-jwt 0.1.3 (package.json:112, imported at lib/insecurity.ts:10) was released circa 2013 and is 8 major
    versions behind the current 8.x release. The old version lacks the mandatory `algorithms` field that its successor requires,
    making the algorithm-confusion and alg:none vulnerabilities described in auth-service-001 structurally impossible to fix
    without upgrading. The outdated library may also carry unpatched CVEs in its dependency chain (jsonwebtoken 0.4.0 at package.json:132
    is similarly ancient and has known CVEs including one for alg:none). Continuing to use an unmaintained library version
    means security patches released by the maintainers since 2013 are not applied.
  evidence_summary: package.json:112 pins `express-jwt` at `0.1.3`; lib/insecurity.ts:10 imports it — a 13-year-old release
    with no algorithm restriction API.
  impact_description: Structural inability to enforce JWT algorithm restrictions without a library upgrade; potential additional
    unpatched CVEs in old jsonwebtoken dependency chain.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — the old API does not expose an `algorithms` option.
  mitigation_title: Upgrade express-jwt to 8.x and jsonwebtoken to 9.x and update all call sites to use the new algorithm-pinning
    API
  remediation:
    effort: Medium
    steps:
    - Run `npm install express-jwt@^8 jsonwebtoken@^9` to upgrade both libraries.
    - Update the import at lib/insecurity.ts:10 from `import expressJwt from 'express-jwt'` to `import { expressjwt } from
      'express-jwt'` (named export in v8).
    - 'Update `isAuthorized()` at line 52 to use `algorithms: [''RS256'']` — the new API requires it.'
    - 'Update all `jwt.verify()` call sites to use the callback-less promise form: `jwt.verify(token, publicKey, { algorithms:
      [''RS256''] })`.'
    - Run the full test suite after upgrade and audit the `npm audit` report to confirm no remaining critical vulnerabilities.
    - Add a Dependabot or Renovate configuration to receive automated PRs for future security updates.
    code_example: null
    verification: Run `npm list express-jwt jsonwebtoken` and confirm versions are `8.x` and `9.x` respectively. Run `npm
      audit` and confirm zero critical or high vulnerabilities in the JWT dependency chain.
    reference: CWE-1104
