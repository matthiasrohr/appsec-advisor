  stride: Spoofing
  cwe: CWE-522
  title: Derived Credential from OAuth Email Claim (oauth.component.ts:30)
  affected_parameter: email
  scenario: The OAuth callback handler at `oauth.component.ts:30` derives the user's Juice Shop password using the deterministic
    formula `btoa(profile.email.split('').reverse().join(''))`. Because this derivation depends solely on the publicly known
    or guessable email address, any attacker who knows a victim's email can compute the correct password without OAuth involvement
    and authenticate directly against the `/rest/user/login` endpoint. This creates a parallel authentication path that completely
    bypasses the OAuth identity provider. For example, if the victim's email is `victim@example.com`, the attacker computes
    `btoa('moc.elpmaxe@mitciv')` and submits it as the password. This is not a Juice Shop training quirk limited to challenge
    mode — the derived password is the production credential for all social-login users.
  evidence_summary: '`OAuthComponent.ngOnInit()` at line 30 calls `btoa(profile.email.split('''').reverse().join(''''))` to
    construct both the registration password and the login credential, making every social-login account''s password a pure
    deterministic function of the email address.'
  impact_description: An attacker knowing any social-login user's email address can authenticate as that user without OAuth,
    gaining full account access including order history, payment methods, and admin privileges if the victim has an elevated
    role.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the OAuth flow is the only control, which this finding bypasses entirely.
  mitigation_title: Replace deterministic email-derived password with a cryptographically random credential for OAuth-linked
    accounts
  remediation:
    effort: Medium
    steps:
    - Generate a cryptographically random password (minimum 32 bytes via `crypto.getRandomValues`) during first OAuth registration
      and store it hashed server-side; never expose it to the browser.
    - Remove `btoa(email.split('').reverse().join(''))` from `oauth.component.ts` lines 30 and 46; the browser should never
      know or compute the underlying credential.
    - 'Implement a dedicated server-side OAuth token exchange: the frontend delivers the Google access token to a `/rest/oauth/login`
      endpoint; the backend validates it against Google''s JWKS and issues its own JWT — no client-side password derivation
      needed.'
    - Rotate all existing social-login account passwords server-side to invalidate previously derived values.
    code_example: "// Before (oauth.component.ts:30) — password computable from public email:\nconst password = btoa(profile.email.split('').reverse().join(''))\n\
      \n// After — server validates access_token, returns session; no password in browser:\nthis.userService.oauthExchange(accessToken).subscribe((authentication)\
      \ => {\n  localStorage.setItem('token', authentication.token)\n})"
    verification: POST /rest/user/login with body `{"email":"<oauth-user-email>","password":"<btoa(reversed-email)>"}` must
      return HTTP 401; the derived credential must no longer be valid.
