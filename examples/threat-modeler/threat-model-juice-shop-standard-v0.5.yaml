  stride: Tampering
  cwe: CWE-20
  title: Conditional Input Sanitization Bypass in User Model (models/user.ts:48)
  affected_parameter: username
  scenario: 'The User model''s `username` setter (models/user.ts:47-54) selects between two sanitization paths based on whether
    a challenge flag is active: when `persistedXssUserChallenge` is enabled, it calls `security.sanitizeLegacy(username)`,
    which is deliberately less strict; otherwise it calls `security.sanitizeSecure(username)`. In a running Juice Shop instance
    with challenges enabled (the default), any registration or profile update can supply XSS payloads that survive `sanitizeLegacy`.
    The same conditional pattern appears for the `email` setter (lines 60-70): when the challenge is enabled, no sanitization
    is applied at all and the raw email value — including `<iframe src="javascript:alert(`xss`)">` — is persisted. The model-layer
    validation is therefore conditional on runtime state rather than being a reliable security boundary.'
  evidence_summary: The `username` setter at models/user.ts:48 applies `sanitizeLegacy` instead of `sanitizeSecure` when `persistedXssUserChallenge`
    is active; the `email` setter at line 60 skips sanitization entirely in the same condition.
  impact_description: XSS payloads stored in the `username` and `email` fields are rendered to admin users or other visitors
    who view the affected profile or feedback page, enabling session hijacking.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: When the challenge is disabled, `sanitizeSecure` is applied. Sanitization is present on one of the two
    branches.
  mitigation_title: Apply strict output encoding at render time regardless of challenge state; decouple XSS challenge from
    model sanitization logic
  remediation:
    effort: Medium
    steps:
    - 'Move the challenge-solvability detection out of the model setter and into the response layer: always store the raw
      (unsanitized) value in the DB column (which is safe as long as output is encoded), and detect the XSS payload at read
      time without persisting it unencoded.'
    - Ensure the Angular frontend encodes all user-supplied strings through `{{ }}` interpolation rather than `[innerHTML]`
      binding. If `[innerHTML]` is required, use DomSanitizer with an explicit allowlist.
    - Add a model-level `validate` constraint on `username` (Sequelize's `is` regex) that rejects HTML angle brackets regardless
      of challenge state, so the persistence layer is never a sanitization bypass path.
    code_example: null
    verification: 'POST `/api/Users` with `{"username": "<script>alert(1)</script>", "email": "xss@test.com", "password":
      "test"}`. The stored username must be HTML-encoded or rejected; a subsequent GET must not return the literal `<script>`
      tag in the JSON.'
    reference: CWE-20
  evidence:
