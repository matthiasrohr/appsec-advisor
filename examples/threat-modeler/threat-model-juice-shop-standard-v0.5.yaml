- local_id: ci-cd-pipeline-008
  threat_category_id: TH-14
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-272
  title: Missing Top-Level permissions Block in CI and Release Workflows
  affected_parameter: ci.yml, release.yml
  scenario: 'Neither `ci.yml` nor `release.yml` declare a top-level `permissions:` block. GitHub Actions defaults to the repository''s
    default token permissions (configurable per org/repo, but commonly `contents: write` and `metadata: read` for `push` events
    on private repos, and repository default for public repos). If the org default is not explicitly set to `permissions:
    contents: read` (deny-by-default), every job in these workflows — including matrix jobs running on `windows-latest` and
    `macos-latest` with PR checkout — runs with broader than necessary write permissions. A supply-chain compromise of any
    action used in these workflows (e.g., `actions/setup-node`, `nick-invision/retry`) would inherit those permissions and
    could push commits, modify releases, or write to repository contents.'
  evidence_summary: '`ci.yml` has no `permissions:` key between lines 1 and `jobs:` at line 24; `release.yml` has no `permissions:`
    key before `jobs:` at line 9. The `codeql-analysis.yml` sets job-level permissions correctly (line 11–15) as a model to
    follow.'
  impact_description: A compromised action in a job with implicit write permissions can push malicious commits, overwrite
    release assets, or modify repository contents.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: Several other workflows (`pr-compliance.yml`, `lock.yml`, `codeql-analysis.yml`) explicitly set `permissions:`.
    The `codeql-analysis.yml` uses job-level permissions following the principle of least privilege.
  mitigation_title: 'Add top-level permissions: read-all to ci.yml and release.yml with job-level overrides where write is
    needed'
  remediation:
    effort: Low
    steps:
    - 'Add `permissions: contents: read` (or `read-all`) at the top level of `ci.yml` (before `jobs:`), which restricts all
      jobs to read-only by default.'
    - 'Add job-level `permissions` overrides only for jobs that require write access (e.g., the `docker` job needs `packages:
      write` if using GHCR, and `coverage-report` needs `checks: write` for Coveralls).'
    - 'Apply the same treatment to `release.yml`: add `permissions: contents: write` at the top level (releases need asset
      upload), but scope individual jobs explicitly.'
    - 'Enable the org-level GitHub Actions setting `Default permissions: Read repository contents and packages permissions`
      to enforce least-privilege by default across all repositories.'
    code_example: "# ci.yml — add at the top level:\nname: \"CI/CD Pipeline\"\non:\n  push: ...\n\npermissions:  # deny write\
      \ by default\n  contents: read\n\njobs:\n  coverage-report:\n    permissions:\n      checks: write  # only the job that\
      \ needs it\n    ..."
    verification: 'After adding `permissions: contents: read`, trigger a CI run and confirm the `coverage-report` job can
      still post to Coveralls. Use `gh run view --log` to confirm no `403 Resource not accessible` errors.'
    reference: CWE-272
  evidence:
  - file: .github/workflows/ci.yml
    line: 24
  evidence_check: unchecked
  controls_absent_evidence:
  - pattern: '^permissions:'
    search_paths:
    - .github/workflows/ci.yml
    - .github/workflows/release.yml
    hit_count: 0
