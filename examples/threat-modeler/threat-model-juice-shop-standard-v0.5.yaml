  scenario: The `googleLogin()` method at `login.component.ts:148` initiates OAuth2 using `response_type=token`, the implicit
    flow. The access token is delivered directly in the URL fragment (`#access_token=...`). No `state` parameter is included
    in the authorization request, meaning there is no CSRF binding between the login initiation and the redirect callback.
    An attacker can craft a malicious page that silently redirects the victim's browser to the Google authorization URL and
    then captures the resulting fragment. Additionally, implicit flow is deprecated in OAuth 2.1 because it delivers bearer
    tokens in URL fragments that appear in browser history, are forwarded in `Referer` headers, and can be captured by embedded
    scripts or analytics.
  evidence_summary: At `login.component.ts:148`, `location.replace()` constructs the Google authorization URL with `response_type=token`
    and no `&state=` parameter, delivering the access token in the URL fragment with no CSRF protection.
  impact_description: An attacker can perform a CSRF-style OAuth login injection, associating the victim's browser session
    with the attacker's Google account, or intercept the access token from the URL fragment via browser history, referrer
    leakage, or embedded third-party scripts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — implicit flow with no state is the only OAuth implementation.
  mitigation_title: Migrate OAuth flow to authorization code with PKCE and mandatory state parameter
  remediation:
    effort: High
    steps:
    - Replace `response_type=token` with `response_type=code` to use authorization code flow.
    - Generate a cryptographically random `state` parameter (min 128 bits) before redirecting; store it in `sessionStorage`;
      validate it exactly on the redirect callback before consuming the code.
    - 'Implement PKCE: generate a `code_verifier` (random 43–128 char string), derive `code_challenge = base64url(sha256(code_verifier))`,
      include `code_challenge_method=S256` and `code_challenge` in the authorization request, and send `code_verifier` with
      the token exchange.'
    - Move the token exchange (authorization code → access token) to a backend BFF endpoint so no bearer token ever appears
      in the browser URL or localStorage.
    code_example: '// Before:

      location.replace(`${oauthProviderUrl}?client_id=${clientId}&response_type=token&scope=email&redirect_uri=${redirectUri}`)


      // After (with state + PKCE):

      const state = crypto.randomUUID()

      const verifier = generateCodeVerifier()        // 96 random bytes, base64url

      const challenge = await sha256Base64url(verifier)

      sessionStorage.setItem(''oauth_state'', state)

      sessionStorage.setItem(''pkce_verifier'', verifier)

      location.replace(`${oauthProviderUrl}?client_id=${clientId}&response_type=code&scope=email&redirect_uri=${redirectUri}&state=${state}&code_challenge=${challenge}&code_challenge_method=S256`)'
    verification: 'Inspect the Google authorization redirect URL: it must contain `response_type=code`, a `state` parameter
      with a random value, `code_challenge`, and `code_challenge_method=S256`. The callback URL must NOT contain `#access_token=`.'
    reference: CWE-287
