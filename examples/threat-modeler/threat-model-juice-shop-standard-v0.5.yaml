- local_id: auth-service-005
  threat_category_id: TH-04
  additional_categories:
  - TH-11
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Session Token Written to localStorage (oauth.component.ts:51)
  affected_parameter: token (JWT)
  scenario: The OAuth login callback at oauth.component.ts:51 calls `localStorage.setItem('token', authentication.token)`
    to persist the session JWT. localStorage is accessible to any JavaScript running on the same origin — including injected
    scripts via any XSS vulnerability in the application (and OWASP Juice Shop is intentionally riddled with XSS). An attacker
    who exploits any stored or reflected XSS reads the token with `localStorage.getItem('token')`, exfiltrates it to an attacker-controlled
    server, and replays it to impersonate the victim without requiring their credentials. Because there is no token revocation
    mechanism (see auth-service-006), the stolen token remains valid for its full 6-hour lifespan. The same localStorage pattern
    is used in the standard login flow, confirmed by the pattern across the frontend.
  evidence_summary: Line 51 in oauth.component.ts writes the JWT to `localStorage`, making it readable by any same-origin
    script.
  impact_description: 'XSS to full session hijack: token stolen from localStorage grants 6 hours of impersonation with no
    server-side way to invalidate.'
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The token is also placed in a cookie (line 50 via cookieService.put), but the localStorage copy is redundant
    and the attack vector.
  mitigation_title: Store session JWT exclusively in an HttpOnly Secure SameSite=Strict cookie and remove localStorage usage
  remediation:
    effort: Medium
    steps:
    - Remove `localStorage.setItem('token', ...)` from oauth.component.ts:51 and all other login paths in the frontend.
    - Ensure the server sets the token cookie with `HttpOnly; Secure; SameSite=Strict` attributes via the `Set-Cookie` response
      header so JavaScript cannot read it.
    - Update all frontend code that reads `localStorage.getItem('token')` to instead rely on the cookie being sent automatically
      by the browser.
    - Implement a Backend-for-Frontend (BFF) pattern for the OAuth flow to avoid returning raw tokens to the SPA at all.
    code_example: '// Before — token accessible to any JS

      localStorage.setItem(''token'', authentication.token)


      // After — removed; the HttpOnly cookie set by the server is sufficient

      // this.cookieService.put(''token'', ...) already in place at line 50

      // Remove the localStorage line entirely'
    verification: After login, run `localStorage.getItem('token')` in the browser console. The result must be `null`. Confirm
      the `token` cookie has `HttpOnly` flag set via browser dev-tools Application tab.
    reference: CWE-922
