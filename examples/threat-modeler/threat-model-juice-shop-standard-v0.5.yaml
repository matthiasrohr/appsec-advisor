trust_boundaries:
- id: tb-1
  name: Public Internet
  description: Untrusted network zone from which anonymous users, authenticated customers, and attackers access the application.
    No filtering or authentication enforced at this layer.
  from: external
  to: backend-api
  enforcement: None — Express app listens on port 3000 with no ingress filtering, WAF, or rate limiting beyond express-rate-limit
    on login endpoint.
  crossing_protocols:
  - HTTPS
  - WSS
  trust_level: untrusted
- id: tb-2
  name: Browser Execution Environment
  description: Browser sandbox where the Angular SPA executes. JWT tokens stored in localStorage (accessible to JavaScript).
    Any XSS in the frontend domain results in full token theft.
  from: frontend-spa
  to: external
  enforcement: Browser same-origin policy plus Angular's DomSanitizer (intentionally bypassed in 9 components). Content-Security-Policy
    absent.
  crossing_protocols:
  - HTTPS
  - OAuth redirect
  trust_level: untrusted
- id: tb-3
  name: API Authentication Gate
  description: Express middleware boundary between unauthenticated public routes and JWT-protected routes. Enforced by express-jwt
    0.1.3 and security.isLoggedIn() / security.isAdmin() guards.
  from: external
  to: auth-service
  enforcement: express-jwt 0.1.3 (outdated; alg:none vulnerability present in jsonwebtoken 0.4.0). isAdmin() and isLoggedIn()
    middleware on protected routes. CORS unrestricted (cors() with no origin whitelist).
  crossing_protocols:
  - HTTPS
  trust_level: partially-trusted
- id: tb-4
  name: Backend Application to Data Layer
  description: Trust boundary between Express application logic and the Sequelize ORM / database. Parameterized queries enforced
    by ORM in most paths but intentional raw SQL exists for challenge purposes.
  from: backend-api
  to: data-persistence
  enforcement: Sequelize ORM with parameterized queries (most paths). Intentional raw SQL injection vectors in challenge routes.
    No database-level row security or tenant isolation.
  crossing_protocols:
  - Sequelize/SQL
  - File I/O
  trust_level: trusted
- id: tb-5
  name: Backend to External LLM Provider
  description: Outbound trust boundary from the LLM chat service to configurable external OpenAI-compatible endpoint. User-supplied
    prompt content crosses this boundary after minimal sanitization.
  from: llm-chat-service
  to: external
  enforcement: HTTPS to configurable OPENAI_API_BASE endpoint. No prompt sanitization or output filtering. API key in environment
    variable (OPENAI_API_KEY_OVERRIDE). User input flows directly into LLM prompt.
  crossing_protocols:
  - HTTPS
  trust_level: untrusted
- id: tb-6
  name: CI/CD Pipeline to Source and Registry
  description: GitHub Actions pipeline boundary. Builds artifacts from source, pushes Docker images to registry. Third-party
    actions unpinned — a supply-chain attack on action repos crosses this boundary.
  from: ci-cd-pipeline
  to: external
  enforcement: GitHub Actions secrets for BOT_TOKEN and GITHUB_TOKEN. Third-party actions pinned to major version only (not
    SHA). Dependabot for dependency updates. No SBOM signing in baseline workflows.
  crossing_protocols:
  - HTTPS
  - GitHub API
  trust_level: partially-trusted
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Partial
  evidence: routes/login.ts, lib/startup/security.ts
  notes: bcrypt password hashing with configurable rounds is present. express-rate-limit applied globally. However, express-jwt
    0.1.3 is approximately 8 major versions behind current release, and the underlying jsonwebtoken 0.4.0 library is 10+ major
    versions behind and accepts algorithm:none tokens. Login endpoint subject to intentional SQLi challenge via email parameter.
- domain: Identity and Authentication
  control: OAuth2 / Social Login
  effectiveness: Partial
  evidence: routes/oauth.ts, frontend/src/app/oauth/oauth.component.ts
  notes: Google and GitHub OAuth2 via Passport strategies. State parameter present. Redirect URI validation requires STRIDE
    verification. Refresh token hardening not confirmed. Frontend-side OAuth token handling stores tokens in localStorage.
- domain: Identity and Authentication
  control: TOTP Two-Factor Authentication
  effectiveness: Partial
  evidence: routes/2fa.ts, frontend/src/app/two-factor-auth-service.ts
  notes: TOTP 2FA service detected and wired. Temporary TOTP token stored in localStorage (totp_tmp_token) — XSS-extractable.
    2FA enforcement not universal.
- domain: Session and Token Controls
  control: JWT Issuance and Validation
  effectiveness: Weak
  evidence: lib/insecurity.ts, routes/login.ts
  notes: jsonwebtoken 0.4.0 used for JWT signing — algorithm:none attack is possible on this version. HS256 (symmetric) signing.
    JWT stored in browser localStorage (XSS-accessible). No token revocation mechanism. No explicit token expiry configuration.
    express-jwt 0.1.3 does not enforce algorithm restriction.
- domain: Session and Token Controls
  control: Token Storage
  effectiveness: Weak
  evidence: frontend/src/app/Services/request.interceptor.ts, frontend/src/app/login/login.component.ts (36 locations)
  notes: JWT tokens stored in browser localStorage in 36+ locations throughout the Angular frontend. localStorage is accessible
    to any JavaScript executing in the page context — any XSS vulnerability anywhere on the domain results in full token theft.
    No httpOnly cookie alternative present.
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Partial
  evidence: lib/startup/security.ts, routes/**
  notes: isAdmin() and isLoggedIn() middleware guards on most protected routes. Admin role segregated under /admin/* path.
    No ABAC or fine-grained resource-level permissions. No multi-tenancy isolation (single-tenant model). CORS unrestricted
    (cors() with no origin allowlist at server.ts:182) undermines auth boundary.
- domain: Authorization Controls
  control: Client-Side Route Guards
  effectiveness: Weak
  evidence: frontend/src/app/app.guard.ts
  notes: Angular CanActivate guards check localStorage token presence and role. These are not security boundaries — any user
    can modify localStorage to bypass frontend navigation checks. Must be accompanied by server-side authorization (present
    but requires verification for all routes).
- domain: Query Construction and Data Access Controls
  control: ORM Parameterization
  effectiveness: Partial
  evidence: models/**, routes/**
  notes: Sequelize 6.37.3 ORM used for most database interactions, providing parameterized query protection. However, intentional
    raw SQL injection challenge routes exist (rest/products/search is a known SQLi challenge target). ORM use is not universal
    across all route handlers.
- domain: Input Boundary Validation Controls
  control: Server-Side Input Validation
  effectiveness: Weak
  evidence: lib/startup/express.ts, routes/**
  notes: No global input validation middleware detected at Express entry point. express-validator or joi not detected in scope.
    Many intentional OWASP Top 10 patterns present (XSS, injection, path traversal). body-parser with default limits. File
    upload validation via Multer is intentionally permissive.
- domain: Output Encoding and Rendering Controls
  control: Angular Template Security
  effectiveness: Weak
  evidence: frontend/src/app/**/*.ts (9 components)
  notes: Angular DomSanitizer.bypassSecurityTrustHtml() called in 9 components including about.component.ts:119, last-login-ip.component.ts:39,
    administration.component.ts:73, search-result.component.ts:110, score-board.component.ts:82. Raw innerHTML assignment
    in hacking-instructor/index.ts:126,142. These are intentional XSS challenge targets but represent real DOM XSS sinks.
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy
  effectiveness: Missing
  evidence: server.ts, lib/startup/express.ts
  notes: No Content-Security-Policy header observed in server configuration. Helmet middleware does not include CSP in default
    config. Single route (userProfile) sets a custom CSP but application-wide CSP absent. XSS impact is unrestricted without
    CSP.
- domain: Browser and Cross-Origin Controls
  control: CORS Configuration
  effectiveness: Weak
  evidence: server.ts:182-183
  notes: app.use(cors()) and app.options('*', cors()) with no origin allowlist. Default cors() behavior reflects the requesting
    origin back as Access-Control-Allow-Origin. Combined with JWT in localStorage (not httpOnly cookies), this does not create
    an immediate CORS-authenticated-cross-origin vulnerability (CORS cannot force cookies that aren't there), but combined
    with XSS it expands the attack surface. CSRF protection also absent.
- domain: Browser and Cross-Origin Controls
  control: HSTS and Security Headers
  effectiveness: Partial
  evidence: lib/startup/express.ts (Helmet)
  notes: Helmet middleware provides X-Content-Type-Options (noSniff), X-Frame-Options (frameguard), X-XSS-Protection. HSTS
    (Strict-Transport-Security) absent. Referrer-Policy not observed. Permissions-Policy not observed. Overall header posture
    below OWASP baseline.
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing
  effectiveness: Adequate
  evidence: lib/startup/security.ts, models/user.model.ts
  notes: bcrypt with configurable salt rounds used for password storage. No MD5 or SHA1 observed for password hashing. Adequate
    for current threat model.
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  effectiveness: Partial
  evidence: package.json, .env* (not present), Dockerfile
  notes: LLM API key (OPENAI_API_KEY_OVERRIDE) and OAuth secrets stored as environment variables. No secrets in source code
    detected by recon. However, environment variables baked into Docker image layers during build represent a risk. No secrets
    vault or rotation mechanism observed.
- domain: File Parser and Outbound Request Controls
  control: File Upload Security
  effectiveness: Weak
  evidence: routes/fileOperations.ts, routes/upload.ts
  notes: Multer used for file uploads. MIME type validation intentionally permissive (training challenge). Path traversal
    and zip slip challenges documented. File storage in ftp/ directory with direct filesystem access. No AV scanning or content
    inspection.
- domain: File Parser and Outbound Request Controls
  control: XML / YAML Parsing
  effectiveness: Weak
  evidence: server.ts (yaml.load), lib/startup (libxml2-wasm)
  notes: js-yaml used for challenge YAML loading. XXE challenge documented (intentional). libxml2-wasm present for XML parsing.
    JSON parsing via Express body-parser (safe). YAML loading without safeLoad() risk present in some code paths.
- domain: File Parser and Outbound Request Controls
  control: Outbound Request Control (SSRF)
  effectiveness: Weak
  evidence: routes/chat.ts, routes/profileImageUrlUpload.ts
