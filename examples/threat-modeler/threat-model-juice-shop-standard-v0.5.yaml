    page, Angular''s `DomSanitizer.bypassSecurityTrustHtml()` marks the string as already-safe without sanitizing it, and
    Angular''s template renders it as live HTML. The script executes in the user''s browser, exfiltrating the JWT from `localStorage`
    to the attacker''s server. All `bypassSecurityTrustHtml` call sites are affected: product descriptions (`search-result.component.ts:110`),
    user emails in the admin panel (`administration.component.ts:73`), feedback comments (`administration.component.ts:91`),
    about-page feedbacks (`about.component.ts:119`), and order-tracking IDs (`track-result.component.ts:48`).'
  evidence_summary: Nine confirmed `DomSanitizer.bypassSecurityTrustHtml()` calls across five components accept server-returned,
    user-influenced strings and render them as trusted HTML without any secondary sanitization.
  impact_description: Persistent XSS executing in any visitor's browser; combined with `localStorage` token storage, allows
    full session takeover for all users who view the affected content.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Angular's built-in sanitizer is intentionally bypassed at all identified call sites; no Content-Security-Policy
    header is configured.
  mitigation_title: Replace bypassSecurityTrustHtml calls with Angular's safe binding and server-side sanitization
  remediation:
    effort: High
    steps:
    - Replace `bypassSecurityTrustHtml(value)` with direct string binding (`[textContent]="value"` or `{{ value }}`) wherever
      rich HTML is not a genuine product requirement.
    - 'Where HTML rendering is required (e.g., product descriptions with bold/italic), sanitize server-side before storage
      using a strict allowlist library (e.g., `DOMPurify` with `ALLOWED_TAGS: [''b'',''i'',''a'',''p'']`, no `onerror`/`onload`
      attributes) and remove `bypassSecurityTrustHtml` from the component.'
    - Deploy a strict `Content-Security-Policy` header (`script-src 'self'`) from the backend so that even bypassed sanitization
      does not allow inline or remote script execution.
    - Audit all nine call sites identified above and remove or harden each one.
    code_example: '// Before (search-result.component.ts:110)

      tableData[i].description = this.sanitizer.bypassSecurityTrustHtml(tableData[i].description)


      // After — sanitize with DOMPurify before marking safe, or bind as text

      import DOMPurify from ''dompurify''

      tableData[i].description = DOMPurify.sanitize(tableData[i].description, { ALLOWED_TAGS: [''b'', ''i'', ''em'', ''strong'']
      })'
    verification: Submit a product description containing `<img src=x onerror=alert(1)>` via the admin API. Load the search
      page and confirm no alert dialog appears and the `onerror` attribute is absent from the rendered DOM.
    reference: CWE-79
