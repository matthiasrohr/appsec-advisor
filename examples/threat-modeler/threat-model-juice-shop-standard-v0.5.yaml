- local_id: frontend-spa-009
  threat_category_id: TH-06
  additional_categories:
  - TH-02
  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client-Side-Only Admin and Accounting Role Guard
  scenario: The `AdminGuard` at `app.guard.ts:52-59` and `AccountingGuard` at `app.guard.ts:64-76` both call `loginGuard.tokenDecode()`,
    which reads the JWT from localStorage and decodes it client-side without cryptographic signature verification. The guard
    then checks `payload.data.role === roles.admin`. An attacker can execute `localStorage.setItem('token', '<crafted-jwt>')`
    in the browser console to place a JWT bearing `"role":"admin"` — using `alg:none`, a self-signed key, or a token from
    the Juice Shop's own intentionally weak JWT signing (if the secret is known). Angular's router then allows navigation
    to `/administration` and `/accounting` routes and renders their components, granting access to all admin UI actions. While
    the server-side API endpoints enforce their own JWT validation for destructive operations, the admin UI itself exposes
    bulk user management, feedback deletion, and coupon generation functionality that becomes accessible through this bypass.
  evidence_summary: '`app.guard.ts:53-55` calls `loginGuard.tokenDecode()` which uses `jwtDecode()` — a decode-only library
    that does NOT verify the JWT signature — and checks the decoded `role` field, providing no cryptographic assurance that
    the token is authentic.'
  impact_description: Any browser user can navigate to the admin panel UI and access administrative functions; the extent
    of damage depends on whether the backend API endpoints independently validate the JWT signature (Juice Shop's backend
    does, but the UI access itself constitutes privilege escalation).
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Backend API endpoints independently validate JWT signatures — server-side CRUD operations reject forged
    tokens. The guard is not a security boundary, only a UX gate.
  mitigation_title: Replace client-side JWT role decode in route guards with server-side authorization check
  remediation:
    effort: Medium
    steps:
    - 'Replace `jwtDecode()` in `LoginGuard.tokenDecode()` with a server-side authorization check: add an Angular `CanActivate`
      guard that calls `GET /rest/user/whoami` and checks the returned role from the server — not from the locally stored
      token payload.'
    - Never trust the decoded JWT payload on the client for access control decisions; use the JWT only for display purposes
      (e.g., showing the username).
    - Add Angular route-level data validators that call the server's authorization API before rendering sensitive components;
      cache the role for the session duration rather than re-reading localStorage on every navigation.
    - Document `app.guard.ts` clearly as a UX routing helper, not a security boundary, so future developers do not add security-sensitive
      checks to it.
    code_example: "// Before (app.guard.ts:52-58) — decodes unverified JWT client-side:\ncanActivate() {\n  const payload\
      \ = this.loginGuard.tokenDecode()  // no sig verification\n  if (payload?.data && payload.data.role === roles.admin)\
      \ { return true }\n  this.loginGuard.forbidRoute()\n  return false\n}\n\n// After — verify role from server before activating\
      \ route:\ncanActivate(): Observable<boolean> {\n  return this.userService.whoAmI().pipe(\n    map(user => user.role\
      \ === roles.admin),\n    tap(allowed => { if (!allowed) this.loginGuard.forbidRoute() })\n  )\n}"
    verification: Set `localStorage.setItem('token', 'eyJhbGciOiJub25lIn0.eyJkYXRhIjp7InJvbGUiOiJhZG1pbiJ9fQ.')` (alg:none
      admin token); attempt to navigate to `/#/administration` — the route must redirect to `/403` because the server's `/rest/user/whoami`
      returns a non-admin role.
    reference: CWE-602
