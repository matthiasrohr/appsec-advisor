tier_root_causes:
  edge:
  - sanitizer disabled via bypassSecurityTrustHtml across 15+ Angular components
  - OAuth-derived password computed from public email claim (CWE-330)
  - client-side route guard in app.guard.ts is trivially bypassable via devtools
  server:
  - SQL and NoSQL injection via raw string interpolation in multiple route handlers
  - hardcoded RSA private key and static JWT secret allow offline token forgery
  - missing authentication middleware leaves management and sensitive routes open
  - LLM system prompt exposed and injectable via unguarded Socket.IO chat interface
  - SSRF and open redirect via unsanitized URL parameters in redirect routes
  data:
  - unsalted MD5 password hashing allows offline rainbow-table credential recovery
  - insufficient row-level access control exposes cross-user records in queries
cross_repo_dependencies: []
weaknesses:
- id: W-001
  weakness_class: injection
  kind: design
  title: Database access relies on concatenated queries
  statement: Parameterized Database Access is not consistently enforced.
  severity: Critical
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Parameterized Queries
    - ORM / Repository Layer
  mechanism_id: database-query-concatenation
  affected_components:
  - auth-service
  - backend-api
  instances:
  - id: T-004
    file: routes/login.ts
    line: 34
    basis: confirmed-exploitable
  - id: T-009
    file: routes/search.ts
    line: 23
    basis: confirmed-exploitable
  description: Database queries are assembled from application values instead of passing those values through an enforced
    parameterised data-access path. This leaves every call site responsible for preserving query structure.
  structural_recommendation: provide one parameterised repository or query-builder path and prohibit application-value interpolation
    in database queries
- id: W-002
  weakness_class: missing_authz
  kind: design
  title: Authorization is implemented route by route
  statement: Centralised Authorization Policy is not consistently enforced.
  severity: Critical
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Centralised AuthZ Policy
    - Role / Scope Enforcement
    - Ownership Check
    - Object-Level Ownership Check
    - Tenant Scoping
  mechanism_id: route-by-route-authorization
  affected_components:
  - backend-api
  - data-store
  - web3-nft
  instances:
  - id: T-011
    file: routes/address.ts
    line: 11
    basis: confirmed-exploitable
  - id: T-041
    file: server.ts
    line: 310
    basis: confirmed-exploitable
  - id: T-045
    file: models/user.ts
    line: 82
    basis: confirmed-exploitable
  - id: T-053
    file: routes/nftMint.ts
    line: 41
    basis: confirmed-exploitable
  description: Authorization depends on per-handler checks instead of a policy boundary that consistently enforces role, ownership,
    and tenant scope. New routes can bypass protection by omitting a local check.
  structural_recommendation: enforce authorization through a shared server-side policy layer and make ownership and tenant
    scope mandatory inputs to data access
- id: W-003
  weakness_class: secret_management
  kind: design
  title: Secrets are committed to source instead of a managed store
  statement: Managed Secret Storage is not consistently enforced.
  severity: Critical
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Managed Secret Store
    - Runtime Secret Injection
  mechanism_id: secrets-committed-to-source
  affected_components:
  - auth-service
  - web3-nft
  instances:
  - id: T-006
    file: lib/insecurity.ts
    line: 21
    basis: confirmed-exploitable
  - id: T-032
    file: routes/checkKeys.ts
    line: 10
    basis: confirmed-exploitable
  description: Cryptographic keys, credentials, and other high-entropy secrets are embedded as literals in source or config
    rather than resolved at runtime from a managed secret store, so anyone with repository read access obtains reusable signing
    material and credentials.
  structural_recommendation: move every secret to a managed secret store or injected environment configuration, rotate the
    exposed values, and add secret-scanning to CI
- id: W-004
  weakness_class: broken_auth
  kind: design
  title: Endpoints are reachable without enforced authentication
  statement: Route Authentication is not consistently enforced.
  severity: High
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Route Authentication Middleware
    - Server-Side Session Enforcement
  mechanism_id: missing-endpoint-authentication
  affected_components:
  - backend-api
  - chat-service
  - frontend-spa
  - web3-nft
  instances:
  - id: T-024
    file: server.ts
    line: 676
    basis: confirmed-exploitable
  - id: T-042
    file: routes/chat.ts
    line: 181
    basis: confirmed-exploitable
  - id: T-046
    file: server.ts
    line: 641
    basis: confirmed-exploitable
  - id: T-052
    file: frontend/src/app/Services/socket-io.service.ts
    line: 22
    basis: confirmed-exploitable
  description: Sensitive API routes and real-time channels are exposed without an enforced authentication check at the endpoint
    boundary. Access control depends on each handler (or the caller) remembering to require a session, so an unauthenticated
    client can reach privileged operations directly.
  structural_recommendation: enforce authentication centrally at the routing and channel boundary so every exposed endpoint
    requires a verified session unless explicitly marked public
- id: W-005
  weakness_class: injection
  kind: design
  title: API validation relies on regex blacklists
  statement: Schema / Allowlist Input Validation is not consistently enforced.
  severity: High
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Schema Validation
    - Allowlist Validation
  mechanism_id: blacklist-only-input-validation
  affected_components:
  - backend-api
  instances:
  - id: T-017
    file: routes/dataErasure.ts
    line: 104
    basis: confirmed-exploitable
  - id: T-018
    file: routes/fileUpload.ts
    line: 34
    basis: confirmed-exploitable
  description: Request validation rejects selected bad patterns but does not define the accepted data shape at the server
    boundary. New encodings and unanticipated input forms can therefore reach downstream parsers or interpreters.
  structural_recommendation: enforce server-side schemas and domain-specific allowlists before input reaches parsing, persistence,
    or command construction
- id: W-006
  weakness_class: outdated_deps
  kind: design
  title: Build pipeline trusts mutable third-party references
  statement: Third-Party Action Pinning is not consistently enforced.
  severity: High
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Commit-SHA Action Pinning
    - Dependency Provenance Verification
  mechanism_id: build-pipeline-mutable-refs
  affected_components:
  - ci-cd-pipeline
  instances:
  - id: T-002
    file: .github/workflows/image_actions.yml
    line: 33
    basis: confirmed-exploitable
  - id: T-029
    file: .github/workflows/codeql-analysis.yml
    line: 23
    basis: confirmed-exploitable
  description: CI/CD workflows resolve third-party actions and other build dependencies to mutable tags or branches instead
    of immutable commit digests, so a retagged or compromised upstream runs inside the pipeline with its token and secret
    scope.
  structural_recommendation: pin every third-party action and build dependency to an immutable commit SHA (or a vetted internal
    mirror) and enforce SHA-pinning in CI
- id: W-007
  weakness_class: weak_crypto
  kind: implementation
  title: Security-sensitive data uses weak cryptographic primitives
  statement: OAuth Derived Password from Email Claim (frontend/src/app/oauth/oauth.component.ts:30)
  severity: Medium
  severity_basis: observed-practice
  observable_backing:
    practice_evidence:
    - file: frontend/src/app/oauth/oauth.component.ts
      line: 30
      id: T-008
    - file: models/user.ts
      line: 76
      id: T-013
    - file: lib/insecurity.ts
      line: 53
      id: T-019
    - file: lib/insecurity.ts
      line: 41
      id: T-025
  mechanism_id: weak-cryptographic-primitives
  affected_components:
  - backend-api
  - data-store
  - frontend-spa
  description: Password, token, or integrity protection uses a weak hash, predictable random source, or insufficient work
    factor. The application may use a standard library, but the selected primitive does not provide the required security
    property.
  structural_recommendation: standardise on a password KDF, a CSPRNG for secrets, and modern authenticated cryptographic primitives
    with centrally reviewed parameters
- id: W-008
  weakness_class: injection
  kind: design
  title: Frontend rendering lacks enforced output encoding
  statement: Output Encoding / Templating Autoescape is not consistently enforced.
  severity: Medium
  severity_basis: design-risk
  observable_backing:
    absent_control_signal:
    - Template Autoescape
    - Output Encoding
    - Content Security Policy
  mechanism_id: frontend-output-encoding
  description: Browser rendering paths write HTML or DOM content directly without one enforced contextual-encoding or sanitisation
    boundary. Safety depends on each individual component using the right API.
  structural_recommendation: use framework-safe rendering by default and isolate any required raw HTML behind one reviewed
    sanitisation and Trusted Types policy
