- local_id: auth-service-006
  threat_category_id: TH-02
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-613
  title: No Server-Side JWT Revocation Mechanism (lib/insecurity.ts:70)
  affected_parameter: JWT token
  scenario: The `authenticatedUsers` object at lib/insecurity.ts:70 maintains an in-memory token map used for session tracking.
    However, there is no deny-list, revocation endpoint, or database-backed token store. When a user logs out, the frontend
    discards the token locally (localStorage.removeItem / cookie.remove), but the server retains no record of the logout.
    A stolen JWT (see auth-service-005) or a JWT recovered from browser history, logs, or Referrer headers remains fully valid
    until the 6-hour `expiresIn` window at line 54 expires. The same gap means password-change events, account disablement,
    and role downgrades do not immediately invalidate outstanding tokens — a newly demoted user continues to hold a valid
    admin JWT for up to 6 hours.
  evidence_summary: lib/insecurity.ts:70 shows `authenticatedUsers.tokenMap` is an in-memory JavaScript object with no expiry-on-revocation
    logic, no logout registration endpoint, and no persistent revocation store.
  impact_description: Stolen or logged-out sessions remain exploitable for up to 6 hours; privilege changes do not take effect
    until token expiry.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 'Tokens expire after 6 hours (lib/insecurity.ts:54 `expiresIn: ''6h''`). The in-memory tokenMap provides
    a partial allow-list that can be cleared on restart.'
  mitigation_title: Implement a server-side token deny-list and a POST /rest/user/logout revocation endpoint
  remediation:
    effort: Medium
    steps:
    - 'Add a POST /rest/user/logout endpoint that extracts the JWT from the Authorization header and records its `jti` claim
      (add `jti: uuid()` to `security.authorize()`) in a Redis or DB deny-list with TTL equal to the token''s remaining lifetime.'
    - Modify `isAuthorized()` middleware to reject tokens whose `jti` is in the deny-list.
    - Reduce the token lifetime from 6 hours to 15–30 minutes and introduce a refresh-token flow with server-side revocability.
    - On password change or role update, immediately revoke all outstanding tokens for the affected user by adding their current
      `jti` values to the deny-list.
    code_example: null
    verification: Log in, copy the JWT, call POST /rest/user/logout, then replay the JWT on GET /api/Users. After the fix,
      the replayed request must return HTTP 401 rather than the user list.
    reference: CWE-613
