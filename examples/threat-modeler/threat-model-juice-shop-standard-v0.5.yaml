    writable; routes/verify.ts:53 confirms `req.body.role === ''admin''` is detectable, proving the field reaches the model
    layer.'
  impact_description: Unauthenticated attacker creates an admin-role account and gains full administrative access to user
    management, order data, challenge state, and all admin API endpoints.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: POST /api/Users does not require authentication (intentional for registration). `role` field is not protected
    by exclude list.
  mitigation_title: Add role to the finale-rest exclude list and strip privilege fields in a registration pre-save hook
  remediation:
    effort: Low
    steps:
