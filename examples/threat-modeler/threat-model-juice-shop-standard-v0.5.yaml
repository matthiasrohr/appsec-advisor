  title: Unauthenticated NFT Verification State Manipulation (routes/nftMint.ts:41)
  affected_parameter: walletAddress
  scenario: The POST /rest/web3/walletNFTVerify endpoint accepts `walletAddress` from the request body, checks if that address
    is in the `addressesMinted` in-memory Set, and if found deletes it and marks the challenge solved (nftMint.ts:41-44).
    The endpoint has no authentication middleware. An attacker who knows or can enumerate a legitimate user's Ethereum wallet
    address (on-chain data is public) can POST that address before the legitimate user does, consuming the record from the
    Set and both claiming the challenge credit and preventing the real NFT minter from ever verifying their on-chain work.
    Because `addressesMinted` is a module-level singleton, the deletion is permanent for the server's lifetime.
  evidence_summary: '`walletNFTVerify` at routes/nftMint.ts:41 reads `req.body.walletAddress` and calls `addressesMinted.delete(metamaskAddress)`
    at line 43 without any authentication check, allowing any caller to consume another user''s minted NFT record.'
  impact_description: An unauthenticated attacker can both steal challenge credit from a legitimate NFT minter and deny that
    minter the ability to claim it, by racing to POST the minter's publicly visible wallet address.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — no authentication, no ownership proof, no rate limiting on the endpoint.
  mitigation_title: Require cryptographic wallet ownership proof before accepting NFT verification
  remediation:
    effort: Medium
    steps:
    - Add authentication middleware (e.g., `security.isAuthorized()`) to POST /rest/web3/walletNFTVerify so only logged-in
      users can call the endpoint.
    - Require the caller to sign a challenge nonce with their Ethereum private key using `ethers.verifyMessage(nonce, signature)`
      and verify the recovered address matches `req.body.walletAddress` before checking `addressesMinted`.
    - Do not delete from `addressesMinted` until after the signature is verified to prevent state destruction by unauthenticated
      callers.
    code_example: "// After — verify wallet ownership before consuming the record:\nconst { verifyMessage } = await import('ethers')\n\
      const recovered = verifyMessage(serverNonce, req.body.signature)\nif (recovered.toLowerCase() !== metamaskAddress.toLowerCase())\
      \ {\n  return res.status(401).json({ success: false, message: 'Signature mismatch' })\n}"
