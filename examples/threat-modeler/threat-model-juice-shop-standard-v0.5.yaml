  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Missing Rate Limiting on WebSocket Connections and Events
  affected_parameter: null
  scenario: The socket.io server is initialized without connection-count limits, per-socket event-rate limits, or a `maxHttpBufferSize`
    cap (which defaults to 1 MB per message). An unauthenticated attacker can open thousands of concurrent WebSocket connections,
    each flooding the server with rapid `notification received`, `verifyLocalXssChallenge`, or other events. Each `notification
    received` event triggers a `notifications.findIndex()` linear scan of the in-memory array. High-volume event streams exhaust
    the Node.js event loop and memory, causing service unavailability for legitimate users.
  evidence_summary: '`new Server(server, { cors: { origin: ''http://localhost:4200'' } })` at line 20 specifies no `connectionStateRecovery`,
    no `perMessageDeflate` limits, no event throttle, and no `connectTimeout`; the `io.on(''connection'', ...)` handler at
    line 23 attaches without checking total connection count.'
  impact_description: A flood of concurrent unauthenticated WebSocket connections or high-rate event streams can exhaust Node.js
    heap and event-loop capacity, denying service to all other application users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None observed in the WebSocket initialization path.
  mitigation_title: Apply per-IP connection limits and event-rate throttling to the socket.io server
  remediation:
    effort: Medium
    steps:
    - Set `maxHttpBufferSize` to a conservative value (e.g., `1e4` — 10 KB) in the `Server` constructor to limit per-message
      payload size.
    - Track concurrent connection counts per IP in the `io.on('connection', ...)` handler and disconnect sockets that exceed
      the per-IP threshold (e.g., 5 concurrent connections).
    - Apply an application-layer rate limiter (e.g., `socket.io-redis-adapter` with leaky-bucket rate limits or a custom `io.use()`
      middleware using `express-rate-limit` token counts) to throttle event frequency per socket.
    code_example: "const io = new Server(server, {\n  cors: { origin: config.get('application.domain') },\n  maxHttpBufferSize:\
      \ 1e4  // 10 KB max message size\n})\n\nconst ipConnections: Map<string, number> = new Map()\nio.on('connection', (socket)\
      \ => {\n  const ip = socket.handshake.address\n  const count = (ipConnections.get(ip) ?? 0) + 1\n  if (count > 5) {\
      \ socket.disconnect(true); return }\n  ipConnections.set(ip, count)\n  socket.on('disconnect', () => ipConnections.set(ip,\
      \ count - 1))\n})"
    verification: Use a load-testing script to open 20 simultaneous WebSocket connections from the same IP. After applying
      the limit, connections 6–20 must be rejected with a disconnect before reaching any event handler.
    reference: CWE-400
  evidence:
  - file: lib/startup/registerWebsocketEvents.ts
    line: 20
  evidence_check: unchecked
