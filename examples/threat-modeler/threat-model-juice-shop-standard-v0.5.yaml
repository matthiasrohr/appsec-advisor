trust_boundaries:
- id: tb-1
  name: Public Internet
  description: Any unauthenticated external actor — anonymous browser, attacker, security researcher. No trust assumed.
  from: external
  to: frontend-spa
  enforcement: None — CORS wildcard (app.use(cors())) allows any origin; no WAF configured in source
  key_weakness: CORS wildcard combined with localStorage JWT enables cross-site credential theft from any attacker-controlled
    origin
- id: tb-2
  name: Browser to Backend API
  description: Browser (Angular SPA) communicates with the Express backend over HTTPS/REST and WebSocket.
  from: frontend-spa
  to: backend-api
  enforcement: JWT Bearer token in Authorization header; express-jwt middleware (v0.1.3, outdated) validates tokens
  key_weakness: JWT signed with hardcoded RSA private key in lib/insecurity.ts — offline forgery possible; alg:none accepted
    by express-jwt 0.1.3
- id: tb-3
  name: Browser WebSocket to Chat Service
  description: Browser Socket.IO client connects to the chat-service for LLM-powered chatbot interaction.
  from: frontend-spa
  to: chat-service
  enforcement: Optional authentication via Socket.IO handshake; anonymous users permitted
  key_weakness: No mandatory authentication on chat endpoint; user input forwarded to LLM without sanitization — prompt injection
    risk
- id: tb-4
  name: Backend to Data Store
  description: Express backend accesses SQLite via Sequelize ORM and in some routes via raw query construction.
  from: backend-api
  to: data-store
  enforcement: File-level access control (SQLite file permissions); Sequelize parameterized queries on most routes
  key_weakness: Several routes bypass ORM and use raw string interpolation for SQL queries — intentional SQL injection challenge
    vectors
- id: tb-5
  name: Backend to External LLM Provider
  description: Chat service sends user messages to an external OpenAI-compatible LLM provider via HTTPS.
  from: chat-service
  to: external
  enforcement: HTTPS transport; LLM_API_KEY env var for authentication
  key_weakness: No output validation on LLM responses; system prompt contains confidential coupon data extractable via prompt
    injection
- id: tb-6
  name: Backend to External OAuth Identity Provider
  description: Social login flow redirects to Google/GitHub OAuth endpoints for authorization code exchange.
  from: backend-api
  to: external
  enforcement: OAuth 2.0 authorization code flow; state parameter validation unconfirmed
  key_weakness: OAuth state parameter validation not confirmed in routes/oauthCallback.ts — CSRF in OAuth flow possible
- id: tb-7
  name: GitHub Source Repository to CI/CD
  description: Public GitHub repository triggers GitHub Actions workflows on push, PR, and schedule events.
  from: external
  to: ci-cd-pipeline
  enforcement: GitHub GITHUB_TOKEN; workflow permissions defaulted to broad write scope
  key_weakness: Unpinned third-party actions (tag-based references) allow action maintainer to inject malicious code into
    CI; no SHA256 pinning
- id: tb-8
  name: CI/CD to Container Registry
  description: GitHub Actions release workflow pushes built Docker image to Docker Hub.
  from: ci-cd-pipeline
  to: external
  enforcement: Docker Hub credentials (GitHub Secrets); no image signing or SBOM attestation in default workflow
  key_weakness: No cosign/SBOM signing for published images — users cannot verify image provenance
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Weak
  evidence: routes/user.ts — JWT issued via jsonwebtoken v0.4.0 (publicly known vulns, alg:none accepted). express-jwt v0.1.3
    (8+ major versions behind). lib/insecurity.ts hardcodes RSA private key used for signing/verification. Password hashing
    uses bcryptjs (adequate primitive) but the auth stack as a whole is intentionally compromised.
  verdict: Weak
- domain: Identity and Authentication
  control: OAuth / OIDC Social Login
  effectiveness: Weak
  evidence: routes/oauthCallback.ts, frontend/src/app/oauth.component.ts — Proof-of-concept social login (Google, GitHub,
    OIDC). OAuth state parameter validation not confirmed. Tokens stored in localStorage (same XSS risk as password-based
    flow).
  verdict: Weak
- domain: Identity and Authentication
  control: TOTP / 2FA
  effectiveness: Partial
  evidence: routes/userProfile.ts — otplib-based TOTP enrollment available but optional. 2FA state (totp_tmp_token) stored
    in localStorage alongside JWT — same XSS extraction risk.
  verdict: Partial
- domain: Session and Token Controls
  control: JWT Issuance and Verification
  effectiveness: Weak
  evidence: lib/insecurity.ts:63-65 — RS256 JWT signed and verified using hardcoded private key in source. jws.verify() does
    not enforce algorithm — attacker can switch to alg:none. express-jwt 0.1.3 accepts alg:none bypass. No token revocation
    list; logout merely clears localStorage.
  verdict: Weak
- domain: Session and Token Controls
  control: Token Storage
  effectiveness: Weak
  evidence: frontend/src/app/app.guard.ts:18, request.interceptor.ts:13 — JWT stored in browser localStorage (36+ hits across
    frontend). Any XSS on any page steals all session tokens. httpOnly cookies not used.
  verdict: Weak
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Partial
  evidence: routes/administration.ts — security.isAdmin() checks present on admin endpoints. Angular route guards (app.guard.ts)
    enforce client-side role checks only — bypassed via direct API call or dev tools. Multiple IDOR vulnerabilities in user
    profile and basket endpoints (intentional).
  verdict: Partial
- domain: Query Construction and Data Access Controls
  control: SQL Query Construction
  effectiveness: Weak
  evidence: Sequelize ORM used for most queries (parameterized). Multiple routes use raw string interpolation for SQL construction
    — intentional SQLi challenge vectors in login, search, and other endpoints. Direct database access patterns bypass ORM
    parameterization.
  verdict: Weak
- domain: Input Boundary Validation Controls
  control: Server-Side Input Validation
  effectiveness: Weak
  evidence: No comprehensive server-side schema validation (no express-validator or Joi globally). Body-parser provides basic
    type coercion. Many endpoints accept raw user input without validation — intentional for training challenges.
  verdict: Weak
- domain: Input Boundary Validation Controls
  control: File Upload Validation
  effectiveness: Partial
  evidence: multer + file-type library checks MIME type and magic bytes on uploads. Path traversal in filename handling intentionally
    present. ZIP bomb / archive extraction not restricted.
  verdict: Partial
- domain: Output Encoding and Rendering Controls
  control: HTML Output Encoding / XSS Prevention
  effectiveness: Weak
  evidence: Angular built-in sanitization intentionally bypassed via bypassSecurityTrustHtml() in 15+ components (search-result.ts:110,
    search-result.ts:143, administration.ts, data-export.ts, etc.). innerHTML assignments without sanitizer in hacking-instructor/index.ts.
    XSS is a core training feature.
  verdict: Weak
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy
  effectiveness: Missing
  evidence: No CSP header configured in server.ts or Helmet setup. Helmet enables X-Frame-Options (DENY) and X-Content-Type-Options
    (nosniff) but CSP is absent. Absence of CSP removes the defence-in-depth layer against XSS execution.
  verdict: Missing
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Weak
  evidence: server.ts:182-183 — app.use(cors()) + app.options('*', cors()) with no origin restriction. Wildcard CORS combined
    with localStorage JWT enables cross-site credential theft from any attacker-controlled domain.
  verdict: Weak
- domain: Browser and Cross-Origin Controls
  control: HTTP Security Headers
  effectiveness: Partial
  evidence: Helmet v4.6.0 enables X-Frame-Options:DENY and X-Content-Type-Options:nosniff. HSTS not configured (downgrade
    attack risk). No Referrer-Policy, Permissions-Policy, or COEP headers detected.
  verdict: Partial
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  effectiveness: Weak
  evidence: lib/insecurity.ts — RSA private key hardcoded in source code (publicly accessible on GitHub). encryptionkeys/
    directory contains additional key material. AES symmetric encryption used in utilities but keys co-located with signing
    code. LLM_API_KEY correctly environment-variable-based.
  verdict: Weak
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing
  effectiveness: Adequate
  evidence: bcryptjs used for password hashing (adaptive cost). Adequate primitive for the task. No evidence of MD5 or SHA1
    for password storage.
  verdict: Adequate
- domain: File Parser and Outbound Request Controls
  control: File Parser Security
  effectiveness: Weak
  evidence: libxml2-wasm v0.7.1 used for XML parsing (XPath injection challenge). Path traversal in file-download endpoint
    (/file-download) intentionally exploitable. multer stores uploads in filesystem without content inspection beyond MIME
    type.
  verdict: Weak
- domain: File Parser and Outbound Request Controls
  control: Outbound Request Controls (SSRF)
  effectiveness: Weak
  evidence: routes/chat.ts — LLM_API_BASE environment variable allows operator to configure target URL. Profile image URL
    in POST /profile/image/url may allow SSRF if not validated (routes/userProfile.ts). download package used for file retrieval.
  verdict: Weak
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Management
  effectiveness: Partial
  evidence: package-lock.json committed (version reproducibility). npm audit runs in CI but known vulnerabilities (jsonwebtoken
    v0.4.0, sanitize-html v1.4.2) intentionally retained. No SBOM generation for application packages in default workflow.
  verdict: Partial
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Pipeline Hardening
  effectiveness: Weak
  evidence: .github/workflows/ — 16 workflows use tag-based action references (v2, v3, v8, main) instead of SHA256 commit
    pins. Workflow-level permissions block absent in most workflows (defaults to full repo write). Third-party action mutation
    can inject malicious code.
  verdict: Weak
- domain: Operations Runtime and Supply Chain Controls
  control: Container Image Security
  effectiveness: Partial
  evidence: Dockerfile — distroless runtime image (gcr.io/distroless/nodejs24-debian13), non-root UID 65532. Production hardening
    is adequate. Base images lack SHA256 digest pins (node:24, gcr.io/distroless/nodejs24-debian13). No cosign/SBOM signing.
    Test image uses :latest tag.
  verdict: Partial
- domain: Real-time and Not Applicable Controls
  control: WebSocket / Real-time Security
  effectiveness: Weak
  evidence: Socket.IO v3.1.2 — authentication optional on chat-message event. User messages forwarded directly to LLM without
    sanitization or injection detection. No rate limiting on WebSocket events. Prompt injection challenges (systemPromptExtractionChallenge,
    chatbotGreedyInjectionChallenge) are intentional.
  verdict: Weak
- domain: Real-time and Not Applicable Controls
  control: AI / LLM Guardrails
  effectiveness: Missing
  evidence: routes/chat.ts — no input sanitization, output validation, or injection detection on LLM interactions. System
    prompt contains confidential coupon data extractable via prompt injection. No content policy enforcement on LLM responses.
    Intentionally absent for training challenges.
  verdict: Missing
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated dependency updates
  effectiveness: Missing
  kind: lifecycle
  assessment: Automated dependency updates not detected in the repository. Patch-management posture depends on this control
    being in place — the team is reactive rather than proactive without it.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Lockfile hygiene
  effectiveness: Missing
  kind: lifecycle
  assessment: Lockfile hygiene not detected in the repository. Patch-management posture depends on this control being in place
    — the team is reactive rather than proactive without it.
  linked_threats: []
threats:
- local_id: backend-api-005
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-943
  title: NoSQL JavaScript Injection via MongoDB $where Queries
  affected_parameter: id
  scenario: The order tracking endpoint passes `req.params.id` (truncated to 60 characters when the XSS challenge is enabled,
    otherwise sanitized to `[\w-]+`) into a MongoDB `$where` clause as a bare string interpolation. When the XSS challenge
    is active, an attacker sends `GET /rest/track-order/'; return true; var x='` to trigger a server-side JavaScript tautology
    that returns all orders in the collection. The endpoint requires no authentication, making this exploitable by any anonymous
    user.
  evidence_summary: 'routes/trackOrder.ts:18 calls `db.ordersCollection.find({ $where: `this.orderId === ''${id}''` })` where
    `id` is attacker-controlled; the XSS-challenge branch sets `id = utils.trunc(req.params.id, 60)` with no further sanitization.'
  impact_description: Attacker retrieves all orders from the MongoDB orders collection without authentication, exposing order
    details, delivery addresses, and customer information.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: When the XSS challenge is disabled, input is sanitized to `[\w-]+`. When enabled, only a 60-char truncation
    applies.
  mitigation_title: Replace $where JavaScript evaluation with a standard MongoDB equality query in trackOrder
  remediation:
    effort: Low
    steps:
    - 'Replace the `$where` operator with a standard field equality query: `db.ordersCollection.find({ orderId: id })` — MongoDB
      evaluates this as a field comparison, not server-side JavaScript.'
    - Remove the `$where` usage entirely from routes/trackOrder.ts:18.
    - Validate `id` against a strict format (e.g. UUID or alphanumeric) before the query regardless of challenge state.
    code_example: '// Before (routes/trackOrder.ts:18):

      db.ordersCollection.find({ $where: `this.orderId === ''${id}''` })


      // After:

      db.ordersCollection.find({ orderId: id })'
    verification: GET /rest/track-order/'; return true; var x=' — response must return an empty data array, not all orders.
    reference: CWE-943
  evidence:
  - file: routes/trackOrder.ts
    line: 18
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: true
  component_name: Express REST API Backend
  source: stride
  instances:
  - file: routes/trackOrder.ts
    line: 18
    severity: High
    local_id: backend-api-005
    scenario: The order tracking endpoint passes `req.params.id` (truncated to 60 characters when the XSS challenge is enabled,
      otherwise sanitized to `[\w-]+`) into a MongoDB `$where` clause as a bare string interpolation. When the XSS challenge
      is active, an attacker sends `GET /rest/track-order/'; return true; var x='` to trigger a server-side JavaScript tautology
      that returns all orders in the collection. The endpoint requires no authentication, making this exploitable by any anonymous
      user.
    source_ref: backend-api-005
  - file: routes/chat.ts
    line: 149
    severity: High
    local_id: chat-service-004
    scenario: 'The getProductReviews tool at routes/chat.ts:146-149 concatenates a user-supplied product ID into a MongoDB
      $where JavaScript expression: `$where: ''this.product == '' + productId`. The input passes through `Number(id)` at line
      147, converting most string payloads to NaN. However, an attacker can manipulate the LLM via prompt injection to invoke
      getProductReviews with values that survive Number() as meaningful JavaScript: `id = ''NaN''` → `this.product == NaN`
      (matches no documents but confirms $where is active); `id = ''Infinity''` → executes JS with Infinity. More critically,
      MongoDB''s $where clause executes arbitrary JavaScript in the mongod process — any future drift in the input handling
      (LLM temperature, updated SDK) could allow full JS injection. The $where operator is deprecated in MongoDB 4.4+ for
      this reason.'
    source_ref: chat-service-004
  - file: data/mongodb.ts
    line: 9
    severity: High
    local_id: data-store-001
    scenario: 'MarsDB collections (`reviewsCollection`, `ordersCollection`) in `data/mongodb.ts` are initialized with no schema
      definition and expose a JavaScript-evaluable `$where` operator. Route handlers concatenate attacker-controlled URL parameters
      directly into `$where` expressions — for example, `reviewsCollection.find({ $where: ''this.product == '' + id })` in
      `routes/showProductReviews.ts:36` and `db.ordersCollection.find({ $where: \`this.orderId === ''${id}''\` })` in `routes/trackOrder.ts:18`.
      Because MarsDB evaluates `$where` as JavaScript, an attacker can inject timing side-channels (`; sleep(2000)`), logical
      bypasses (`|| true`), or attempt server-side code execution. The `showProductReviews.ts` route even defines `global.sleep`
      to deliberately enable a DoS-via-sleep challenge, confirming the evaluation path is live. No query sanitizer, no schema
      validator, and no type coercion is applied at the collection layer.'
    source_ref: data-store-001
  affected_files:
  - data/mongodb.ts
  - routes/chat.ts
  - routes/trackOrder.ts
  instance_count: 3
  systemic: true
  consolidated_refs:
  - backend-api-005
  - chat-service-004
  - data-store-001
  merged_from:
  - backend-api
  - chat-service
  - data-store
  evidence_tier: confirmed-exploitable
  evidence_flags:
  - flag_id: EV-012
    verdict: verified
    reason: 'Line 18 calls db.ordersCollection.find({ $where: `this.orderId === ''${id}''` }) with attacker-controlled id.'
    line_excerpt: 'db.ordersCollection.find({ $where: `this.orderId === ''${id}''` })'
    verified_at: '2026-07-15T07:52:58.620052Z'
  id: T-001
  component: backend-api
  mitigation_ids:
  - M-001
  effective_severity: Critical
  breach_distance: 2
  chain_role: keystone
  compound_chain_ids:
