  title: XXE via XML File Upload in Complaint Handler (routes/fileUpload.ts:76)
  affected_parameter: null
  scenario: 'The file upload handler at routes/fileUpload.ts:76 passes the raw XML buffer to `parseXmlString(data)` via lib/xml.ts
    without disabling external entity resolution. An attacker uploads an XML file containing `<!DOCTYPE foo [<!ENTITY xxe
    SYSTEM "file:///etc/passwd">]><foo>&xxe;</foo>` as a complaint attachment. The parser resolves the external entity, includes
    the file content in `xmlString`, and the error response echoes it back to the caller via line 79: `next(new Error(''B2B
    customer complaints via file upload have been deprecated for security reasons: '' + utils.trunc(xmlString, 400) ...))`.
    The endpoint requires no authentication beyond a valid file upload.'
  evidence_summary: routes/fileUpload.ts:76 calls `parseXmlString(data)` where `data = file.buffer.toString()` without any
    DTD-disabling option; the result is truncated to 400 chars and returned verbatim in an error message at line 79.
  impact_description: Attacker reads arbitrary server-side files (e.g. /etc/passwd, application config, private keys) and
    potentially triggers SSRF to internal HTTP endpoints via external entity URLs.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Response truncated to 400 characters; parse is gated on `isChallengeEnabled(challenges.deprecatedInterfaceChallenge)`.
    In full-challenge deployments the path is active.
  mitigation_title: Disable external entity resolution in the XML parser used by the file upload handler
  remediation:
