  cwe: CWE-352
  title: OAuth Implicit Flow Without State Parameter
  affected_parameter: state
  scenario: 'The login component initiates Google OAuth at frontend/src/app/login/login.component.ts:148 using `response_type=token`
    (the implicit flow) with no `state` parameter: `${oauthProviderUrl}?client_id=...&response_type=token&scope=email&redirect_uri=${this.redirectUri}`.
    The implicit flow sends the access token in the URL hash fragment, exposing it to browser history, HTTP Referer headers,
    and any script on the page. The missing `state` parameter removes CSRF protection from the OAuth flow: an attacker can
    craft a link that initiates a login-with-Google flow that completes in the victim''s browser session, potentially linking
    an attacker-controlled Google account to the victim''s application session (login CSRF).'
  evidence_summary: login.component.ts:148 constructs the Google authorization URL with `response_type=token` and no `state`
    parameter — implicit flow without CSRF protection.
  impact_description: Tokens appear in URL fragments (history/Referer exposure); login CSRF allows an attacker to force-associate
    their Google account with the victim's application session.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The redirect URI is validated against a server-side allowlist in the application config (`authorizedRedirects`),
    limiting where the token can be sent. No state parameter or PKCE is present.
  mitigation_title: Migrate OAuth flow to authorization-code with PKCE and enforce state parameter
  remediation:
    effort: Medium
    steps:
    - Switch to `response_type=code` (authorization-code flow) with `code_challenge_method=S256` PKCE.
    - Generate a cryptographically random `state` value per login attempt (`crypto.getRandomValues(new Uint8Array(32))`),
      store it in `sessionStorage`, include it in the authorization URL, and validate it on callback.
    - Handle the code exchange server-side (or via a BFF) so the access token never appears in the browser URL or fragment.
    - Remove the `response_type=token` URL parameter and the client-side implicit-flow token parse in `parseRedirectUrlParams()`.
    code_example: "// Before — login.component.ts:148 (implicit, no state)\nlocation.replace(`${oauthProviderUrl}?client_id=${this.clientId}&response_type=token&scope=email&redirect_uri=${this.redirectUri}`)\n\
      \n// After — authorization-code + PKCE + state\nconst state = btoa(String.fromCharCode(...crypto.getRandomValues(new\
      \ Uint8Array(16))))\nsessionStorage.setItem('oauth_state', state)\nlocation.replace(\n  `${oauthProviderUrl}?client_id=${this.clientId}&response_type=code`\
      \ +\n  `&scope=email&redirect_uri=${this.redirectUri}&state=${state}&code_challenge_method=S256&code_challenge=${pkceChallenge}`\n\
      )"
    verification: Open the login page in a browser. Inspect the Google authorization redirect URL — it must contain `response_type=code`,
      a non-static `state` parameter, and `code_challenge_method=S256`.
    reference: CWE-352
