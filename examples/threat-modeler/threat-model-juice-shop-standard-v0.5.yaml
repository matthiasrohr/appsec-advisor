  stride: Tampering
  cwe: CWE-915
  title: Mass Assignment via finale-rest Auto-CRUD on User Model (server.ts:501)
  affected_parameter: role
  scenario: 'Juice Shop registers all Sequelize models as finale-rest resources at server.ts:481-507. For the User model (line
    484), only `password` and `totpSecret` are in the `excludeAttributes` list — the `role` field is fully writable via API.
    A PUT or PATCH to `/api/Users/:id` with body `{"role": "admin"}` will persist the admin role directly to the Users table
    without any privilege check. The `isIn` validator at models/user.ts:83 permits `admin` as a valid value, so validation
    passes. The auth middleware at server.ts:365 only verifies that the caller is authenticated (`isAuthorized()`), not that
    they are authorized to modify the target record or set privileged fields. Any authenticated customer can self-escalate
    to admin.'
  evidence_summary: '`finale.resource()` at server.ts:501 registers `/api/Users/:id` with `excludeAttributes: [''password'',
    ''totpSecret'']` but leaves the `role` field unrestricted; the User model''s `isIn` validator at models/user.ts:83 allows
    ''admin'' as a permitted value.'
  impact_description: Any authenticated user can grant themselves or another account the admin role, gaining access to all
    administrative endpoints and challenge-bypass functionality.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Password and totpSecret are excluded from the API via `excludeAttributes`. The `role` field has an ORM-level
    `isIn` validator that rejects values outside the permitted enum — but 'admin' is in that enum.
  mitigation_title: Add role field to excludeAttributes and enforce role-change authorization in a dedicated admin endpoint
  remediation:
    effort: Low
    steps:
    - 'Add `''role''` to the `exclude` array for the User resource in server.ts:484: `{ name: ''User'', exclude: [''password'',
      ''totpSecret'', ''role''], model: UserModel }`. This prevents the generic REST resource from accepting role changes.'
    - Implement a dedicated admin-only endpoint (e.g., `PUT /api/admin/users/:id/role`) protected by an `isAdmin()` middleware
      that verifies `req.user.role === 'admin'` before allowing role changes.
    - 'Add an integration test: authenticate as a customer, issue `PUT /api/Users/:id` with `{"role": "admin"}`, and assert
      the role field remains unchanged in the database response.'
    code_example: '// server.ts — add ''role'' to excludeAttributes

      { name: ''User'', exclude: [''password'', ''totpSecret'', ''role''], model: UserModel }'
    verification: 'Authenticate as a customer user. Send `PUT /api/Users/<own-id>` with body `{"role":"admin"}`. The response
      must not reflect `role: admin`; a subsequent GET must confirm the role is still `customer`.'
    reference: CWE-915
