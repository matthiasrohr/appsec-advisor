- local_id: auth-service-003
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-89
  title: SQL Injection via String Concatenation in Login Query (routes/login.ts:34)
  affected_parameter: email
  scenario: 'The login handler at routes/login.ts:34 builds its SQL query by direct string interpolation: `SELECT * FROM Users
    WHERE email = ''${req.body.email || ''''}'' AND password = ''${security.hash(req.body.password || '''')}''`. An attacker
    submits `email = \'' OR 1=1 --` to collapse the WHERE clause, logging in as the first user in the table (typically the
    administrator). More destructively, UNION-based injection (`'' UNION SELECT * FROM Users --`) exfiltrates the full user
    table including password hashes. Blind boolean and time-based techniques allow enumeration even when output is not reflected.
    The `models.sequelize.query` call at line 34 uses `{ model: UserModel, plain: true }` which does not enable parameterised
    binding, confirming the raw template string is sent to the database engine.'
  evidence_summary: Line 34 passes `req.body.email` and `req.body.password` via template-literal interpolation into a raw
    Sequelize `query()` call with no parameterisation.
  impact_description: Authentication bypass for any account, plus full read/write access to the Users table including password
    hashes, emails, and security answers.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Password is hashed via MD5 before inclusion, but only protects the password field; the email field is
    unsanitised.
  mitigation_title: Replace raw SQL string concatenation with Sequelize parameterised query or ORM finder
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `models.sequelize.query` call at line 34 with a Sequelize ORM finder that uses parameterised binding:
      `UserModel.findOne({ where: { email: req.body.email, password: security.hash(req.body.password) } })`.'
    - 'If raw SQL is required, use Sequelize replacements: `models.sequelize.query(''SELECT * FROM Users WHERE email = :email
      AND password = :password'', { replacements: { email, password: hash }, model: UserModel, plain: true })`.'
    - Remove the `|| ''` fallback for email so a missing email parameter produces a 400 error rather than matching blank rows.
    - Add integration tests for `' OR 1=1 --` and `' UNION SELECT NULL --` payloads asserting HTTP 401.
    code_example: "// Before — vulnerable to SQLi\nmodels.sequelize.query(\n  `SELECT * FROM Users WHERE email = '${req.body.email\
      \ || ''}'\n   AND password = '${security.hash(req.body.password || '')}'`,\n  { model: UserModel, plain: true }\n)\n\
      \n// After — parameterised, injection-safe\nUserModel.findOne({\n  where: {\n    email: req.body.email,\n    password:\
      \ security.hash(req.body.password ?? ''),\n    deletedAt: null\n  }\n})"
    verification: Submit `email=%27+OR+1%3D1+--&password=x` via POST /rest/user/login. The fixed endpoint must return HTTP
      401. Also run `npm run test` (or the project's integration suite) to confirm the login challenge tests still pass.
    reference: CWE-89
