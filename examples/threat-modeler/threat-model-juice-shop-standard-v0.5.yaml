  title: No Query Timeout or Connection Pool Limit in Sequelize Configuration
  affected_parameter: null
  scenario: 'The Sequelize instance at models/index.ts:33 is configured without a query timeout (`dialectOptions.timeout`
    for SQLite, `query_timeout` for PostgreSQL) and without a connection pool limit (`pool.max`). The raw SQL query in routes/search.ts:23
    — already exploitable for injection — is also unbounded: it contains no LIMIT or execution-time cap. An attacker can submit
    a crafted search string that triggers a computationally expensive SQLite LIKE scan across all Products rows, or use the
    SQLite `zeroblob()` function within an injected payload to allocate hundreds of megabytes of memory, causing the Node.js
    event loop to block during the synchronous Sequelize promise resolution. Under default SQLite BUSY retry settings (models/index.ts:35-39,
    max 5 retries), concurrent requests from the same or multiple sources can exhaust the retry budget and cause `SQLITE_BUSY`
    errors for all users. The absence of a rate limiter on `/rest/products/search` (confirmed by absence of `rateLimit` middleware
    on this route) means this attack is repeatable without authentication.'
  evidence_summary: No `dialectOptions`, `pool`, or `timeout` key appears in the Sequelize options object at models/index.ts:33-43;
    the `/rest/products/search` route applies no rate-limit middleware.
  impact_description: Sustained event-loop blocking or SQLITE_BUSY cascade renders the application unavailable to legitimate
    users.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: SQLite BUSY retry (max 5, match /SQLITE_BUSY/) at models/index.ts:35-38 provides limited back-off but
    does not prevent exhaustion under sustained load.
  mitigation_title: Add query timeout and apply express-rate-limit to the product search endpoint
  remediation:
    effort: Medium
    steps:
    - 'Add `dialectOptions: { timeout: 5000 }` to the Sequelize options object at models/index.ts:33 (SQLite''s statement
      timeout in milliseconds). For PostgreSQL, add `pool: { acquire: 5000, idle: 10000 }` and `dialectOptions: { statement_timeout:
      5000 }`.'
    - 'Apply `express-rate-limit` middleware to the `/rest/products/search` route in server.ts: `app.use(''/rest/products/search'',
      rateLimit({ windowMs: 60_000, max: 30 }))` — 30 requests per minute per IP.'
    - Add a `LIMIT 100` clause to the raw search query at routes/search.ts:23 (or the ORM equivalent) so result set size is
      bounded regardless of table size.
    code_example: "// models/index.ts — add timeout\nnew Sequelize('database', 'username', 'password', {\n  dialect: 'sqlite',\n\
      \  dialectOptions: { timeout: 5000 },  // 5-second statement timeout\n  storage: 'data/juiceshop.sqlite',\n  logging:\
      \ false\n})"
    verification: Send 50 concurrent GET requests to `/rest/products/search?q=a` within one minute from a single IP. After
