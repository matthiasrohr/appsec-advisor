  stride: Repudiation
  cwe: CWE-778
  title: Missing Security Event Logging
  affected_parameter: null
  scenario: The login route (routes/login.ts) and the 2FA handler (routes/2fa.ts) do not emit any structured security log
    entry on successful or failed authentication. HTTP access logging via morgan (`combined` format, server.ts:338) records
    the request method and status code, but not the authenticated user identity, the source IP as an auditable event, or the
    authentication outcome in a dedicated security log. An attacker who conducts a successful account takeover — via SQL injection,
    JWT forgery, or brute-force — leaves no identity-correlated forensic trace that distinguishes them from a legitimate session.
    Incident responders cannot determine which accounts were compromised, when, or from what source.
  evidence_summary: routes/login.ts contains no logger.info/warn call on auth success or failure; routes/2fa.ts has no logging
    on TOTP verify outcome — morgan at server.ts:338 is the only record, carrying no user identity.
  impact_description: Security incidents cannot be reconstructed; attackers operate without leaving identity-correlated evidence;
    regulatory audit requirements (SOC 2 CC7, PCI DSS 10.2) are unmet.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Morgan access log captures HTTP method, path, status, and timestamp. No structured security audit log
    captures user identity, auth outcome, or IP address in a security-event context.
  mitigation_title: Add structured security event logging to login and 2FA routes
  remediation:
    effort: Low
    steps:
    - 'In routes/login.ts `afterLogin()`, emit a structured log entry: `logger.info({ event: ''auth.login.success'', userId:
      user.id, email: user.email, ip: req.socket.remoteAddress, ua: req.headers[''user-agent''] })`.'
    - 'In the failed-authentication branch (empty user result), emit `logger.warn({ event: ''auth.login.failure'', email:
      req.body.email, ip: req.socket.remoteAddress })`.'
    - In routes/2fa.ts `verify()`, log both `auth.totp.success` and `auth.totp.failure` events.
    - Route security events to an append-only sink (e.g., a dedicated `security.log` via winston) separate from the HTTP access
      log.
    code_example: '// routes/login.ts — afterLogin()

      logger.info({ event: ''auth.login.success'', userId: user.id, email: user.email, ip: req.socket?.remoteAddress })


      // Failed login branch

      logger.warn({ event: ''auth.login.failure'', email: req.body.email, ip: req.socket?.remoteAddress })'
    verification: Submit a successful login and a failed login attempt. Check `logs/security.log` (or the configured log sink)
      — both events must appear with `userId` (or `email`), `ip`, and `event` fields within 1 second.
    reference: CWE-778
