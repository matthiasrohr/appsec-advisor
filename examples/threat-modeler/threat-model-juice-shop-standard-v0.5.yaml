- id: auth-service
  name: Authentication and Session Management
  description: 'Authentication logic co-located inside the Express backend: JWT issuance and verification (lib/insecurity.ts,
    routes/user.ts), session management via localStorage-stored tokens, 2FA/TOTP (routes/userProfile.ts), OAuth social login
    (routes/oauthCallback.ts), and express-jwt middleware. Modeled as a separate component per M3.4 auth invariant — auth
    threats are categorically distinct from business-route threats.'
  paths:
  - routes/user.ts
  - lib/insecurity.ts
  - lib/authorization.ts
  - routes/oauthCallback.ts
  - routes/userProfile.ts
  - frontend/src/app/app.guard.ts
  - frontend/src/app/request.interceptor.ts
  tier: application
  complexity: complex
  framework: express-jwt
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-005
  - T-006
  - T-037
  - T-038
- id: frontend-spa
  name: Angular SPA Frontend
  description: Angular 21.x single-page application serving user-facing and admin UI. Stores JWT tokens in browser localStorage.
    Contains intentional XSS vectors via bypassSecurityTrustHtml() in 15+ components. Client-side route guards enforced by
    app.guard.ts (bypassed via dev tools).
  paths:
  - frontend/src/**
  tier: client
  complexity: moderate
  framework: angular
  deployment_zones:
  - internet
  - client-device
  handles_sensitive_data: true
  threat_ids:
  - T-003
  - T-007
  - T-008
  - T-015
  - T-022
  - T-052
  - T-058
- id: chat-service
  name: LLM Chat Service (Socket.IO + Vercel AI SDK)
  description: Socket.IO WebSocket endpoint (routes/chat.ts) proxying user messages to a configurable OpenAI-compatible LLM
    provider via Vercel AI SDK. Contains intentional prompt injection challenges (systemPromptExtractionChallenge, chatbotGreedyInjectionChallenge).
    System prompt holds confidential coupon instructions.
  paths:
  - routes/chat.ts
  - frontend/src/app/chat/**
  - frontend/src/app/chatbot/**
  tier: application
  complexity: moderate
  framework: socket.io
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-012
  - T-027
  - T-042
  - T-043
- id: ci-cd-pipeline
  name: GitHub Actions CI/CD Pipeline
  description: 14 GitHub Actions workflows for CI (lint, test, build), release (Docker push, SBOM), and security scanning
    (CodeQL, ZAP). Multiple workflows use unpinned third-party actions (tag-based). No workflow-level permissions restriction
    in most workflows. Runs on a public repo — external contributions are a trust boundary.
  paths:
  - .github/workflows/**
  - .gitlab-ci.yml
  - Gruntfile.js
  - Dockerfile
  - docker-compose*.yml
  - .npmrc
  - test/smoke/**
