- local_id: data-persistence-001
  threat_category_id: TH-03
  additional_categories: []
  stride: Spoofing
  cwe: CWE-916
  title: Unsalted MD5 Password Hashing (models/user.ts:76)
  affected_parameter: password
  scenario: 'The User model''s password setter at models/user.ts:76 calls `security.hash(clearTextPassword)`, which resolves
    to `crypto.createHash(''md5'').update(data).digest(''hex'')` (lib/insecurity.ts:41). MD5 is a broken hash function: it
    produces a 128-bit digest with no per-user salt, completing in nanoseconds on modern GPUs. An attacker who obtains the
    Users table — via the SQL injection at routes/search.ts:23, a backup leak, or direct SQLite file access — can crack all
    password hashes offline using precomputed rainbow tables or GPU-accelerated brute force. Because hashes are unsalted,
    identical passwords map to identical hashes, revealing password reuse across the entire user base. A compromised hash
    set enables impersonation of any account, including admin users whose credentials are seeded in data/.'
  evidence_summary: '`security.hash()` at lib/insecurity.ts:41 wraps Node''s `crypto.createHash(''md5'')` — invoked unconditionally
    by the User model password setter at models/user.ts:76 with no salt argument.'
  impact_description: Full offline credential recovery for all user accounts; administrative account takeover via rainbow-table
    lookup against the known seed password hashes.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. No bcrypt, argon2, or scrypt; no per-user salt; no iteration count. Password and totpSecret are
    excluded from the finale-rest API response (server.ts:484) but the hash itself is persisted unprotected.
  mitigation_title: Replace MD5 with bcrypt (cost factor ≥12) in User model password setter
  remediation:
    effort: Medium
    steps:
    - Install `bcryptjs` or `argon2` (both available as npm packages with type definitions). Remove the MD5 call at lib/insecurity.ts:41;
      replace `security.hash()` with an async bcrypt hash in the User model setter.
    - Update the User model password setter (models/user.ts:75-77) to call `await bcrypt.hash(clearTextPassword, 12)` and
      store the full bcrypt string (which embeds salt and cost factor). Update all comparison sites (login route) to use `await
      bcrypt.compare(input, storedHash)`.
    - 'Migrate existing password hashes: on next successful login, re-hash the verified plaintext with bcrypt and overwrite
      the stored MD5 hash. Force password reset for any account that never logs in within a migration window.'
    - Add a regression test that asserts `security.hash('password')` no longer produces an MD5-length (32-char hex) string.
    code_example: "// Before (lib/insecurity.ts:41) — broken\nexport const hash = (data: string) => crypto.createHash('md5').update(data).digest('hex')\n\
      \n// After — bcrypt in User model setter (models/user.ts)\nimport bcrypt from 'bcryptjs'\nset (clearTextPassword: string)\
      \ {\n  // bcrypt.hashSync acceptable in model hook; prefer async in route handler\n  this.setDataValue('password', bcrypt.hashSync(clearTextPassword,\
      \ 12))\n}"
    verification: POST /rest/user/login with a known-bad password must return 401. Dump the Users table and confirm stored
      values start with `$2b$12$` (bcrypt format), not a 32-character hex string.
    reference: CWE-916
