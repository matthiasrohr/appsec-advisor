  title: Unverified External Code Execution in CI Pipeline
  affected_parameter: 'uses: calibreapp/image-actions@main'
  scenario: 'The `image_actions.yml` workflow uses `calibreapp/image-actions@main`, pinning to the HEAD of the action''s default
    branch rather than an immutable commit SHA. Any code pushed by the calibreapp organization (or an attacker who compromises
    that account) to their `main` branch is immediately picked up the next time the workflow runs — no tag mutation or separate
    attack step is required. Because the workflow also lacks a `permissions:` block, `GITHUB_TOKEN` carries default write
    access to `contents`, `pull-requests`, and other scopes. The workflow already demonstrates this write access in practice:
    `peter-evans/create-pull-request@v8` (itself tag-pinned) creates commits and PRs on behalf of the token. A malicious version
    of `calibreapp/image-actions@main` could exfiltrate all secrets available to the runner (including `DOCKERHUB_TOKEN`,
    `SLACK_WEBHOOK_URL`, and `GITHUB_TOKEN`), push backdoored code, modify releases, or pivot to the Docker Hub image push
    surface.'
  evidence_summary: '`image_actions.yml:33` specifies `calibreapp/image-actions@main`; the workflow has no `permissions:`
    restriction, so GITHUB_TOKEN inherits write access to the repository by default.'
  impact_description: If the calibreapp/image-actions repository is compromised, an attacker gains arbitrary code execution
    in the Juice Shop CI runner, repository write access, and access to all CI secrets.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: The workflow restricts execution to same-repo PRs (line 24-27 head.repo guard) and push to master/develop,
    which prevents fork-based exploitation. This does not mitigate action-maintainer-side compromise.
  mitigation_title: Pin calibreapp/image-actions and all other actions to full commit SHAs, and add workflow-level permissions
    block
  remediation:
    effort: Low
    steps:
    - Replace `calibreapp/image-actions@main` with the full commit SHA of a verified release, e.g. `calibreapp/image-actions@9018159f8f6b8c3d3d3a16ba61f4e6be04b41a1f`.
      Resolve the SHA with `gh api /repos/calibreapp/image-actions/commits/main --jq .sha`.
    - Pin `peter-evans/create-pull-request@v8` to the matching commit SHA (e.g. `peter-evans/create-pull-request@67df0bc36a98c46fffe9e8ac18f6dc91adf8044a`
      for v8.0.0).
    - Pin `actions/checkout@v6` in image_actions.yml to `actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683` (the same
      SHA already used in other workflows).
    - 'Add a workflow-level `permissions: contents: write` (or the minimal required scope) to `image_actions.yml` to make
