  mitigation_fingerprints:
  - replace $where javascript evaluation with a standard mongodb equality query in trackorder
  - pin calibreapp/image-actions and all other actions to full commit shas, and add workflow-level permissions block
  - move session tokens to httponly secure samesite=strict cookies via a backend-for-frontend
  - replace raw sql login query with parameterized sequelize finder
  - enforce rs256 algorithm allowlist in expressjwt middleware
  - move rsa private key to an environment variable or secret store and rotate immediately
  - replace derived-password oauth pattern with server-side token exchange
  - replace derived password with a server-side random credential for oauth-linked accounts
  - replace raw sql like interpolation with sequelize parameterized like in search handler
  - remove eval call from user profile rendering and sanitize username before template substitution
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - enforce maximum discount cap server-side in generatecoupon.execute before calling security.generatecoupon
  - replace md5 password hashing with bcrypt or argon2 in the user model password setter
  - add role to the finale-rest exclude list and strip privilege fields in a registration pre-save hook
  - migrate oauth flow to authorization-code with pkce and enforce state parameter
  - enforce strict prefix-anchored or exact allowlist matching in isredirectallowed
  - resolve the path, assert it stays within an allowed base directory, and use path.basename on user input.
  - use path.resolve with a safe-prefix check to prevent directory traversal during zip extraction
  - use crypto.randombytes / crypto.randomuuid / webcrypto getrandomvalues for any security value.
  - disable external entity resolution in the xml parser used by the file upload handler
  - load yaml inside the vm context with a memory guard, or use yaml.safeload with a max-alias-count option
  - replace bypasssecuritytrusthtml calls with angular's safe binding and server-side sanitization
  - add structured security event logging to login and 2fa routes
  - add authentication or ip-allowlist middleware to /metrics, /ftp, and /support/logs endpoints
  - replace md5 with bcrypt or argon2 for password hashing with per-user salt
  - validate imageurl against an allowlist of permitted schemes and hostnames before fetching
  - remove confidential business logic from the llm system prompt and enforce discount policy server-side
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - encrypt the sqlite database with sqlcipher and field-level encryption for totp secrets
  - remove hardcoded mnemonic and load it from an encrypted secret store at runtime
  - apply rate limiting to the login endpoint with per-ip and per-account windows
  - remove the custom keygenerator from the password reset rate limiter and use req.ip
  - add express-rate-limit middleware to post /rest/chat with per-ip and per-user limits
  - apply rate limiting and set a maximum capacity on the addressesminted and walletsconnected sets
  - add server-side role verification on all admin api endpoints; treat client-side guard as ui-only
  - implement server-side token revocation on logout and add a token denylist check
  - remove user-controlled expression evaluation from the b2b order endpoint and validate orderlinesdata by schema
  - replace substring includes check with exact-match or startswith prefix check in redirect allowlist
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark
    the route intentionally public via app.get for read-only access only.
  - require authenticated session before allowing generatecoupon tool execution
  - validate the llm api base url against an allowlist of permitted hosts at startup
  - add explicit least-privilege permissions blocks to all github actions workflows
  - add a sqlite check constraint on the users.role column to enforce role legitimacy at the database layer
  - add security.isauthorized middleware to all /rest/web3/* state-changing routes
  - validate and auth-gate wallet address registration before mutating walletsconnected
  - add user <non-root-uid>
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - 'add `permissions: { contents: read }` at root; per-job elevate to `contents: write` only where needed'
  - add authentication to socket.io handshake and throttle client-side socket event emission
  - require eip-191 signed message proof-of-ownership before accepting wallet address claims
