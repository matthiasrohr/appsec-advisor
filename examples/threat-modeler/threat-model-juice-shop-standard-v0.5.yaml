- local_id: ci-cd-pipeline-006
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Postinstall Hook Executes Frontend Build on npm install (package.json:56)
  affected_parameter: postinstall
  scenario: 'The `package.json` `postinstall` hook (`cd frontend && npm install && npm run build:frontend`) executes automatically
    whenever any CI job runs `npm install` without `--ignore-scripts`. In `ci.yml`, the `coding-challenge-rsn`, `api-test`,
    `server-test`, `custom-config-test`, `e2e-test`, and `smoke-test` jobs all run bare `npm install` (lines 51, 110, 147,
    202, 238, etc.). If a transitive dependency is compromised at any depth in the dependency graph — for example, a popular
    utility package whose maintainer account is hijacked and a new malicious version published — the `postinstall` hook sequence
    causes `npm install --ignore-scripts` protections to be bypassed in the frontend install, and the malicious package''s
    own `postinstall` hook executes inside the CI runner with full filesystem access. This is distinct from a direct dependency
    compromise: the outer `postinstall` passes control to `npm install` in `frontend/`, which processes untrusted third-party
    `postinstall` hooks.'
  evidence_summary: '`package.json:56` defines `postinstall: "cd frontend && npm install && ..."`, causing a nested `npm install`
    (without `--ignore-scripts`) to execute inside any CI job that runs bare `npm install`, propagating hook execution to
    all frontend transitive dependencies.'
  impact_description: A compromised transitive frontend dependency executes arbitrary code in the CI runner at install time,
    with access to environment variables (workflow secrets) and the full repository checkout.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Top-level `npm install` in the `lint` job uses `--ignore-scripts` (ci.yml:36,38), as does the installer
    stage in the Dockerfile (`--omit=dev`). The `package-lock.json` lockfile prevents version drift for direct dependencies.
  mitigation_title: Replace postinstall with an explicit CI build step and add --ignore-scripts to the nested frontend install
  remediation:
    effort: Medium
    steps:
    - Remove or rename the `postinstall` hook from `package.json`. Instead, add an explicit `build` script (or extend existing
      CI steps) that runs `cd frontend && npm ci && npm run build:frontend` only in CI contexts where the build output is
      needed.
    - For CI jobs that only need server-side code (e.g., `server-test`, `api-test`), install with `npm ci --ignore-scripts`
      to prevent hook execution entirely.
    - 'If the `postinstall` hook must remain for developer convenience, add an environment variable guard: `if [ "$CI" !=
      ''true'' ]; then cd frontend && npm install ...; fi`, so it skips in CI where steps are explicit.'
    - Review `frontend/package.json` for any `postinstall`/`prepare` hooks in frontend transitive dependencies using `npm
      ls --parseable | xargs -I{} cat {}/package.json 2>/dev/null | jq -r '.scripts.postinstall // empty'`.
    code_example: '// package.json — before:

      "postinstall": "cd frontend && npm install && cd .. && npm run build:frontend"


      // package.json — after (remove postinstall; add explicit ci-build):

      "ci-build": "cd frontend && npm ci --ignore-scripts && cd .. && npm run build:frontend"'
    verification: Run `npm install --ignore-scripts` in a clean checkout and confirm no frontend build executes. Then run
      `npm run ci-build` separately in the CI step that needs the built frontend.
    reference: CWE-829
