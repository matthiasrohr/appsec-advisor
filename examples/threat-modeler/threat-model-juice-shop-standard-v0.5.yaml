  title: Unauthenticated WebSocket Channel
  affected_parameter: socket.io upgrade handshake
  scenario: The socket.io server is created with CORS restricted to `http://localhost:4200` (a development-only origin), but
    no `io.use()` authentication middleware is installed. Any client — whether a browser at the expected origin or a raw WebSocket
    tool such as `wscat` or a custom script — can establish a persistent socket.io connection without providing a session
    token, JWT, or cookie. Browser-origin CORS enforcement does not apply to non-browser clients, and even browser requests
    from a compromised page can bypass the `localhost:4200` restriction once the initial HTTP upgrade completes without a
    server-side token check. An unauthenticated attacker connecting to the WebSocket endpoint can then invoke all registered
    event handlers as if they were a legitimate authenticated user.
  evidence_summary: Line 20 creates the socket.io `Server` with only a CORS origin config; line 23 `io.on('connection', ...)`
    attaches all event handlers with no prior auth gate and no `io.use()` middleware.
  impact_description: Any anonymous network client gains the ability to receive server-pushed notifications and invoke all
    challenge-verification and state-mutation event handlers without authentication.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin restricted to `http://localhost:4200`; effective only for browser preflight — not a server-side
    authentication control.
  mitigation_title: Add socket.io authentication middleware to validate session or JWT on every connection
  remediation:
    effort: Medium
    steps:
    - 'Install `socket.io`''s built-in `io.use()` middleware pipeline: extract the auth token from the socket handshake (`socket.handshake.auth.token`
      or the `Authorization` header forwarded via `socket.handshake.headers`).'
    - Verify the token using the same `security.verify()` / JWT library call used for REST-endpoint authentication; reject
      with `next(new Error('Unauthorized'))` on failure.
    - Store the decoded user identity on `socket.data.user` so downstream event handlers can access it without repeating verification.
    - 'Replace the hardcoded `cors: { origin: ''http://localhost:4200'' }` with the value of the `application.domain` config
      key so the CORS setting tracks the deployment environment rather than being pinned to localhost.'
    code_example: "// Before: no auth middleware\nconst io = new Server(server, { cors: { origin: 'http://localhost:4200'\
      \ } })\n\n// After: token validated before any event handler runs\nconst io = new Server(server, { cors: { origin: config.get('application.domain')\
      \ } })\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  if (!token) return next(new Error('Unauthorized'))\n\
      \  try {\n    socket.data.user = security.verify(token)\n    next()\n  } catch {\n    next(new Error('Unauthorized'))\n\
      \  }\n})"
    verification: Connect with `wscat -c ws://localhost:3000/socket.io/?EIO=4&transport=websocket` (no auth header). The server
      must respond with a disconnect error and the connection must not reach any `socket.on(...)` handler. Connect again with
      a valid JWT in `socket.handshake.auth.token`; the connection must succeed.
    reference: CWE-306
