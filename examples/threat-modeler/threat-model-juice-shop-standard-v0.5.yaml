    the MD5 hash of `req.body.password` into a string: `SELECT * FROM Users WHERE email = ''${req.body.email}'' AND password
    = ''...''`. Sending `email` as `'' OR 1=1--` causes the database to return the first user row (typically the admin) regardless
    of the supplied password. An attacker can log in as any account, including admin, without knowing any credential. Because
    the MD5 of an empty-string password is appended after the injected comment, the attack succeeds with any non-empty password
    value in the request body.'
  evidence_summary: routes/login.ts:34 uses Sequelize `sequelize.query()` with a template-literal string interpolating `req.body.email`
    — no parameterized placeholder used.
