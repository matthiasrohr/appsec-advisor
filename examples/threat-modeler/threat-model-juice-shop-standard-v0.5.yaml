  stride: Elevation of Privilege
  cwe: CWE-601
  title: Open Redirect via Substring Allowlist in Redirect Handler (insecurity.ts:136)
  affected_parameter: to
  scenario: The redirect allowlist check at lib/insecurity.ts:136 uses `url.includes(allowedUrl)` — a substring match, not
    a prefix or exact-match check. An attacker crafts `GET /redirect?to=https://evil.com/?x=https://github.com/juice-shop/juice-shop`
    — the URL contains the allowlisted string as a query parameter, passes the check, and the server issues a 302 redirect
    to `https://evil.com/`. Users following legitimate Juice Shop links (in phishing emails, QR codes) are sent to an attacker-controlled
    domain. The redirect endpoint requires no authentication.
  evidence_summary: lib/insecurity.ts:136 evaluates `allowed = allowed || url.includes(allowedUrl)` for each entry in `redirectAllowlist`;
    the challenge `isUnintendedRedirect()` at redirect.ts:27-32 uses `utils.startsWith` for its own check, confirming the
    insecurity.ts substring check is the actual guard used for the pass decision.
  impact_description: Attacker sends phishing links that appear to originate from a trusted Juice Shop domain but redirect
    victims to credential-harvesting or malware-serving sites.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Allowlist of permitted redirect targets exists in lib/insecurity.ts:122-131. The match logic is incorrect.
  mitigation_title: Replace substring includes() check with exact-match or startsWith prefix check in redirect allowlist
  remediation:
    effort: Low
    steps:
    - Replace `url.includes(allowedUrl)` with `url === allowedUrl` for exact-match semantics, since all allowlisted URLs are
      full-path absolute URLs.
    - If prefix matching is needed (e.g., for URLs with trailing paths), use `url.startsWith(allowedUrl)` — matching the approach
      in `isUnintendedRedirect()` which already uses `utils.startsWith`.
    - Ensure the allowlist is not expanded with partial-path entries that could reintroduce the substring bypass.
    code_example: '// Before (lib/insecurity.ts:136):

      allowed = allowed || url.includes(allowedUrl)


      // After:

      allowed = allowed || url === allowedUrl

      // or for prefix matching:

      allowed = allowed || url.startsWith(allowedUrl)'
    verification: GET /redirect?to=https://evil.com/?ref=https://github.com/juice-shop/juice-shop — must return HTTP 406,
      not HTTP 302 to evil.com.
    reference: CWE-601
