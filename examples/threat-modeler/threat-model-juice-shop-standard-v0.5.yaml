  stride: Information Disclosure
  cwe: CWE-327
  title: MD5 Password Hashing Without Salt (lib/insecurity.ts:41)
  affected_parameter: null
  scenario: All user passwords are stored as unsalted MD5 digests via `crypto.createHash('md5').update(data).digest('hex')`.
    After exploiting the SQL injection at routes/login.ts:34 or routes/search.ts:23 to dump the Users table, an attacker submits
    all password hashes to publicly available rainbow tables (e.g. CrackStation) or a GPU cracking rig. Common passwords crack
    in seconds. The absence of a salt means identical passwords produce identical hashes — one crack yields all accounts sharing
    that password.
  evidence_summary: 'lib/insecurity.ts:41 defines `export const hash = (data: string) => crypto.createHash(''md5'').update(data).digest(''hex'')`;
    this function is called at routes/login.ts:34 to hash the submitted password before the SQL comparison, confirming MD5
    is the storage algorithm.'
  impact_description: After any credential dump, attacker recovers plaintext passwords for the majority of users within hours,
    enabling account takeover, credential stuffing against external services, and social engineering.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no salting, no key stretching, no bcrypt/argon2/scrypt.
  mitigation_title: Replace MD5 with bcrypt or argon2 for password hashing with per-user salt
  remediation:
    effort: Medium
    steps:
    - Install `bcrypt` (`npm install bcrypt @types/bcrypt`) or `argon2` (`npm install argon2`).
    - Replace the `hash` function in lib/insecurity.ts with `bcrypt.hash(password, 12)` for storage and `bcrypt.compare(candidate,
      stored)` for verification.
    - Update the login query at routes/login.ts to first fetch the user by email, then compare the password with the stored
      hash using bcrypt.compare instead of embedding the hash in SQL.
    - 'Run a one-time migration: force all users to reset their passwords on next login by nulling out stored MD5 hashes and
      adding a `requirePasswordReset` flag.'
    - Remove the exported `hash` function from lib/insecurity.ts or replace its body to use bcrypt.
    code_example: '// Before (lib/insecurity.ts:41):

      export const hash = (data: string) => crypto.createHash(''md5'').update(data).digest(''hex'')


      // After:

      import bcrypt from ''bcrypt''

      export const hash = async (data: string): Promise<string> => bcrypt.hash(data, 12)

      export const verifyHash = async (data: string, hash: string): Promise<boolean> => bcrypt.compare(data, hash)'
    verification: Register a new user and inspect the stored password in the DB — it must not be a 32-character hexadecimal
      string (MD5); it must begin with `$2b$` (bcrypt) or `$argon2` (argon2).
    reference: CWE-327
