  stride: Elevation of Privilege
  cwe: CWE-918
  title: SSRF via Configurable LLM API Base URL (routes/chat.ts:111)
  affected_parameter: application.chatBot.llmApiUrl
  scenario: 'The Vercel AI SDK provider is initialised at routes/chat.ts:108-112 with baseURL: config.get<string>(''application.chatBot.llmApiUrl'').
    The default value is http://localhost:11434/v1 (config/default.yml:22) but this can be overridden via config file or environment
    variable. If an operator misconfigures this value — or if an attacker achieves config-layer write access (e.g. through
    a path-traversal vulnerability in another component, a CI/CD misconfiguration, or a compromised deployment secret) — the
    application will forward all chat requests, including the LLM_API_KEY, to an attacker-controlled endpoint. The attacker
    endpoint returns crafted LLM responses that bypass all chatbot safety checks and can observe the full system prompt and
    conversation history. In cloud environments, this URL can be set to http://169.254.169.254/latest/meta-data/ to trigger
    cloud IMDS metadata extraction via SSRF.'
  evidence_summary: createOpenAICompatible at routes/chat.ts:111 sets baseURL directly from config without allowlist validation;
    outbound HTTP requests carry the LLM_API_KEY header to whatever host is configured.
  impact_description: Full system prompt and API key exfiltrated to attacker; crafted LLM responses bypass all chatbot controls;
    potential cloud IMDS SSRF in hosted environments.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: LLM_API_KEY is managed via environment variable (adequate pattern per CONTROLS). Config file is on disk
    and requires file-system access to modify.
  mitigation_title: Validate the LLM API base URL against an allowlist of permitted hosts at startup
  remediation:
    effort: Medium
    steps:
    - At application startup, parse the configured llmApiUrl with new URL(llmApiUrl) and assert the hostname is in an explicit
      allowlist (e.g. ['localhost', 'ollama', 'api.openai.com', 'api.mistral.ai'])
    - Reject configurations that use link-local (169.254.x.x), loopback (127.x), or RFC-1918 addresses unless the environment
      is explicitly marked as development
    - Log a startup error and refuse to start if the configured LLM URL fails allowlist validation, preventing silent misconfiguration
    code_example: "// At startup, before createOpenAICompatible:\nconst llmApiUrl = config.get<string>('application.chatBot.llmApiUrl')\n\
      const parsedUrl = new URL(llmApiUrl)\nconst ALLOWED_LLM_HOSTS = (process.env.ALLOWED_LLM_HOSTS ?? 'localhost').split(',')\n\
      if (!ALLOWED_LLM_HOSTS.includes(parsedUrl.hostname)) {\n  throw new Error(`LLM API URL host '${parsedUrl.hostname}'\
      \ is not in the allowed list`)\n}"
    verification: Set application.chatBot.llmApiUrl to http://169.254.169.254/ and start the application — it must throw at
      startup rather than accepting the configuration. Alternatively, use a test that asserts URL validation fires for RFC-1918
      addresses.
    reference: CWE-918
