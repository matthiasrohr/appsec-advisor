- local_id: backend-api-017
  threat_category_id: TH-02
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-284
  title: Open redirect allowlist bypass via substring match enables phishing redirect
  affected_parameter: to (GET /redirect?to=)
  scenario: 'The redirect allowlist check at `lib/insecurity.ts:136` uses `url.includes(allowedUrl)` instead of an exact or
    prefix match: `allowed = allowed || url.includes(allowedUrl)`. An attacker crafts `GET /redirect?to=https://evil.com/phish?bypass=https://github.com/juice-shop/juice-shop`
    — `url.includes(''https://github.com/juice-shop/juice-shop'')` returns `true`, so `isRedirectAllowed()` returns `true`,
    and the server performs `res.redirect(''https://evil.com/phish?...'')`. Users are sent to a phishing page while the URL
    in the browser bar starts with the trusted Juice Shop domain.'
  evidence_summary: '`lib/insecurity.ts:136`: `allowed = allowed || url.includes(allowedUrl)` — substring inclusion check
    instead of exact or prefix match on the URL allowlist.'
  impact_description: Phishing attacks using the trusted Juice Shop domain as a redirect hop; credential harvesting targeting
    users who receive /redirect links in emails or notifications.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Allowlist of known URLs exists; non-allowlisted redirects return 406.
  mitigation_title: Replace url.includes() allowlist check with exact URL match or strict prefix match
  remediation:
    effort: Low
    steps:
    - Replace `url.includes(allowedUrl)` with `url === allowedUrl` for exact matching, or with `url.startsWith(allowedUrl
      + '?') || url === allowedUrl` if query strings should be permitted on allowlisted base URLs.
    - Use `new URL(toUrl).origin` to compare only the origin portion against the allowlist, preventing bypass via query parameter
      stuffing.
    - Consider removing the `/redirect` endpoint entirely and replacing with named redirect identifiers (e.g. `?to=github`)
      that map server-side to hardcoded URLs, eliminating attacker-controlled URL handling.
    code_example: '// Before (insecurity.ts:136)

      allowed = allowed || url.includes(allowedUrl)


      // After — exact match

      allowed = allowed || url === allowedUrl'
    verification: Submit `GET /redirect?to=https://evil.com/?ref=https://github.com/juice-shop/juice-shop` — response must
      be 406 Not Acceptable. Submit `GET /redirect?to=https://github.com/juice-shop/juice-shop` — response must be 302 to
      the allowlisted URL.
    reference: CWE-284
  evidence:
  - file: lib/insecurity.ts
    line: 136
  evidence_check: unchecked
