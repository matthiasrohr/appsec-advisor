assets:
- id: A-001
  name: User Credentials (Passwords + JWT Tokens)
  classification: Restricted
  description: Bcrypt-hashed passwords in database; plaintext passwords in transit during login; JWT tokens in browser localStorage
    and HTTP headers. Compromise yields account takeover for all users.
  component_id: auth-service
  linked_threats: []
- id: A-002
  name: User PII (Email, Name, Delivery Address)
  classification: Confidential
  description: User email addresses, full names, delivery addresses, and profile data stored in Sequelize database. Used for
    GDPR/privacy regulation scope.
  component_id: data-persistence
  linked_threats: []
- id: A-003
  name: Payment and Order Data
  classification: Confidential
  description: Credit card details (intentionally vulnerable for demo), order history, basket contents, wallet balances. Stored
    in database. Real PCI-DSS data handling scope in non-training context.
  component_id: data-persistence
  linked_threats: []
- id: A-004
  name: LLM System Prompt and API Keys
  classification: Restricted
  description: Chatbot system prompt containing business instructions and intended-to-be-secret rules (intentional extraction
    challenge). LLM API key (OPENAI_API_KEY_OVERRIDE) in environment. Exposure enables prompt injection and LLM provider billing
    abuse.
  component_id: llm-chat-service
  linked_threats: []
- id: A-005
  name: JWT Signing Key
  classification: Restricted
  description: HMAC-SHA256 symmetric signing key used by jsonwebtoken 0.4.0 to issue JWTs. Stored in server-side configuration
    (lib/insecurity.ts). Compromise enables forgery of any user or admin session token.
  component_id: auth-service
  linked_threats: []
- id: A-006
  name: OAuth2 Client Secrets (Google, GitHub)
  classification: Restricted
  description: OAuth2 client IDs and secrets for Google and GitHub social login Passport strategies. Stored in environment
    variables or configuration. Exposure enables social login impersonation.
  component_id: auth-service
  linked_threats: []
- id: A-007
  name: Uploaded User Files (Profile Images, Complaints)
  classification: Internal
  description: User-uploaded files stored in ftp/ directory. Includes profile pictures and complaint attachments. Path traversal
    and malicious file upload vectors apply (intentional challenge targets).
  component_id: backend-api
  linked_threats: []
- id: A-008
  name: Application Source Code and Challenges Configuration
  classification: Internal
  description: Full application source code (public GitHub repo). Challenge definitions in data/static/challenges.yml reveal
    all intended vulnerability locations. Public repo means attacker recon is unrestricted.
  component_id: backend-api
  linked_threats: []
- id: A-009
  name: Prometheus Metrics
  classification: Internal
  description: Runtime metrics at /metrics endpoint (request counts, response times, Node.js heap). Unauthenticated in baseline
    configuration. Leaks application behavior patterns and error distribution.
  component_id: backend-api
  linked_threats: []
- id: A-010
  name: Database (SQLite File / PostgreSQL Instance)
  classification: Confidential
  description: 'Primary data store containing all application data: users, orders, products, feedback, chat logs. SQLite default
    means single-file database on filesystem. Sequelize ORM layer with intentional SQLi challenge bypass paths.'
  component_id: data-persistence
  linked_threats: []
- id: A-011
  name: LLM Chat Conversation History
  classification: Confidential
  description: User conversational data sent to external LLM provider. May contain PII, order details, or sensitive queries.
    Governed by provider's data retention policy. Privacy risk when using cloud-hosted LLM providers.
  component_id: llm-chat-service
  linked_threats: []
- id: A-012
  name: CI/CD Pipeline Secrets (BOT_TOKEN, GITHUB_TOKEN)
  classification: Restricted
  description: 'GitHub Actions secrets: BOT_TOKEN (repository write access for automated PRs), GITHUB_TOKEN (workflow permissions).
    Compromise enables repository manipulation or malicious build artifact injection.'
  component_id: ci-cd-pipeline
  linked_threats: []
attack_surface:
- entry_point: OPTIONS *
  protocol: HTTP
  auth_required: false
  notes: 'handler: server.ts:182'
- entry_point: POST /file-upload
  protocol: HTTP
  auth_required: true
  notes: Multer-based file upload. Accepts user-supplied files for complaints and profile pictures. Intentionally permissive
    MIME type validation. Path traversal and zip slip challenge targets.
  relevance_tags:
  - missing-auth
- entry_point: POST /profile/image/file
  protocol: HTTP
