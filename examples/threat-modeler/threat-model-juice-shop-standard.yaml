    steps:
    - Move the `dbSchemaChallenge` detection logic out of the hot search path. Cache the schema DDL at startup (once) rather
      than querying `sqlite_master` on every request.
    - Gate the entire challenge-detection block behind `if (utils.isChallengeEnabled(challenges.dbSchemaChallenge))` to ensure
