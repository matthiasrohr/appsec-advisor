  title: Open Redirect Allowlist Bypass — lib/insecurity.ts:138
  affected_parameter: to
  scenario: '`lib/insecurity.ts:138` implements the redirect allowlist check as `url.includes(allowedUrl)` — a substring match,
    not an exact URL match. This is bypassable: `https://evil.com?ref=https://github.com/juice-shop/juice-shop` passes the
    check because the string contains the allowed URL as a query parameter. An attacker crafts a redirect link like `/redirect?to=https://evil.com?x=https://github.com/juice-shop/juice-shop`
    which the application accepts and redirects the victim''s browser to `evil.com`. Combined with the phishing and session
    theft scenarios common to open redirects, this can be used to steal OAuth tokens or session cookies in redirect-based
    authentication flows.'
  evidence_summary: '`url.includes(allowedUrl)` at lib/insecurity.ts:138 performs a substring match rather than exact URL
    or origin-prefix match, enabling bypass via query parameter embedding.'
  impact_description: 'Phishing-grade open redirect: crafted links on the Juice Shop domain redirect users to attacker-controlled
    sites, enabling session token theft and credential phishing.'
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Redirect allowlist exists with 8 approved URLs; substring matching is the weakness.
  mitigation_title: Replace substring redirect allowlist check with exact URL equality match
  remediation:
    effort: Low
    steps:
    - 'Replace `url.includes(allowedUrl)` with exact equality: `url === allowedUrl`, or use URL parsing to compare the full
      normalized URL including scheme, host, path, and query.'
    - Additionally validate that the `to` parameter starts with `https://` and parse it as a URL object to prevent protocol-relative
      bypass (`//evil.com`).
    - Consider switching to an allowlist of allowed hostnames rather than full URLs, using `new URL(url).hostname === 'github.com'`
      checks.
    code_example: "// lib/insecurity.ts\nexport const isRedirectAllowed = (url: string) => {\n  return [...redirectAllowlist].some(allowed\
      \ => url === allowed)\n}"
