      bombs.
    - 'Replace js-yaml''s yaml.load() with yaml.safeLoad() (or use the js-yaml v4 default safe schema: `yaml.load(data, {
      schema: yaml.FAILSAFE_SCHEMA })`), which rejects anchors producing exponential expansion.'
    - 'Apply express-rate-limit to POST /file-upload: `app.use(''/file-upload'', rateLimit({ windowMs: 60000, max: 10 }))`
