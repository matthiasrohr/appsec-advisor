  cwe: CWE-321
  title: Hardcoded RSA Private Key (lib/insecurity.ts:23)
  affected_parameter: null
  scenario: '`lib/insecurity.ts:23` embeds the full PEM-encoded RSA private key as a string literal. Any person who clones
    the repository — including unauthenticated GitHub visitors if the repo is public — obtains the key used to sign all JWT
    tokens. Using this key, an attacker calls `jwt.sign({ email: ''admin@juice-sh.op'', role: ''admin'' }, privateKey, { algorithm:
    ''RS256'' })` locally to mint a token accepted by `isAuthorized()` on every protected endpoint, including `/b2b/v2/orders`
    which exposes the `vm.runInContext` sink.'
  evidence_summary: The RSA private key appears as a hard-coded multi-line string at `lib/insecurity.ts:23`, directly embedded
    in the TypeScript source file committed to version control.
  impact_description: Possession of the private key allows offline minting of arbitrary JWT tokens, effectively voiding all
    JWT-based authentication across the application.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — key is in plain text in source.
  mitigation_title: Load RSA private key from an environment variable or secret manager in lib/insecurity.ts
  remediation:
    effort: Medium
    steps:
    - Remove the hardcoded key from `lib/insecurity.ts`. Inject it via `process.env.JWT_PRIVATE_KEY` at runtime, sourced from
      a secret manager (e.g., AWS Secrets Manager, HashiCorp Vault, or a Kubernetes Secret mounted as an env var).
    - Generate a new RSA key pair immediately — the committed key must be treated as permanently compromised. Invalidate all
      sessions signed with the old key by rotating the public key reference in `encryptionkeys/jwt.pub`.
    - Add a pre-commit hook or CI secret scanner (e.g., `trufflesecurity/trufflehog`, `gitleaks`) to prevent future key commits.
    code_example: "```typescript\n// lib/insecurity.ts — load from environment\nconst privateKey = process.env.JWT_PRIVATE_KEY\
      \ ??\n  (() => { throw new Error('JWT_PRIVATE_KEY environment variable is not set') })()\n```"
    reference: CWE-321
