  title: OAuth access_token passed in URL fragment and query — oauth.component.ts:28
  affected_parameter: access_token
  scenario: 'The OAuth flow is an implicit-style flow: the access_token arrives in the redirect URL fragment and is parsed
    by parseRedirectUrlParams() (oauth.component.ts:73-82), then sent to Google as a query-string parameter ''https://www.googleapis.com/oauth2/v1/userinfo?...&access_token=''
    + accessToken (user.service.ts:68). Tokens in URLs leak via browser history, Referer headers, server access logs, and
    proxy logs. There is no PKCE, no ''state'' parameter validation against CSRF on the redirect, and no nonce binding — recon
    Section 7.9 confirms the flow is implicit/authorization-code simulated with no PKCE. An attacker who recovers the leaked
    access_token can impersonate the user against the userinfo endpoint and complete the derived-password login.'
  evidence_summary: access_token is read from the redirect URL fragment and then re-sent in a GET query string to the Google
    userinfo endpoint, with no PKCE or state validation.
  impact_description: Access tokens leak through history/Referer/logs, enabling token replay and account impersonation.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — token handled in URL with no PKCE, state, or nonce checks.
  mitigation_title: Replace implicit flow with Authorization Code + PKCE and keep tokens out of URLs
  remediation:
    effort: High
    steps:
    - Adopt OAuth 2.0 Authorization Code flow with PKCE (code_challenge/code_verifier) so no access_token ever appears in
      a URL.
    - Generate and validate a 'state' parameter to defend the redirect against CSRF, and validate the id_token 'nonce' to
      defend against replay.
    - Exchange the code for tokens server-side (in the BFF) and pass userinfo lookups via Authorization header, never as a
      query parameter.
    code_example: '// PKCE on the client

      const verifier = randomString(64)

      const challenge = base64url(await sha256(verifier))

