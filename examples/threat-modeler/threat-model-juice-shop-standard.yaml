  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client Side Only Admin Route Guard (frontend/src/app/app.guard.ts:54)
  affected_parameter: role
  scenario: '`AdminGuard.canActivate()` in `app.guard.ts:54` reads `localStorage.getItem(''token'')`, decodes it client-side
    via `jwtDecode(token)`, and checks `payload.data.role === roles.admin`. `jwtDecode` does not verify the JWT signature
    — it only base64-decodes the payload. An attacker with console access to their own browser can set `localStorage.setItem(''token'',
    craftedAdminJwt)` with a crafted payload asserting `role=admin` and the guard passes, rendering admin routes. While backend
    API calls still require a valid signed token, the guard bypass allows UI enumeration and testing of every admin endpoint
    path from the admin interface.'
  evidence_summary: '`app.guard.ts:54` checks `payload.data.role === roles.admin` where `payload` comes from `jwtDecode(token)`
    — a decode-only operation with no signature verification.'
  impact_description: An attacker can bypass client-side route protection and access the admin panel UI, enabling enumeration
    of admin API endpoints and CSRF-style attacks through the admin interface.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Backend API endpoints still validate JWT signature server-side; the guard bypass only affects client-side
    routing.
  mitigation_title: Back admin route guard with a server-side authorization check or signature-verified token claim
  remediation:
    effort: Medium
    steps:
    - 'Replace the client-side `jwtDecode` role check with a server-side probe: on admin route activation, call a `/api/whoami`
      or `/api/admin/check` endpoint that returns 403 if the token is not a valid signed admin token.'
    - If client-side decoding is retained for UX purposes, ensure it is never the sole authorization gate — always pair with
      a server-side enforcement point.
    - Store user role in an HttpOnly cookie managed by the BFF (see angular-spa-006) instead of in a client-readable JWT payload.
