assets:
- id: A-001
  name: RSA Private Key (JWT Signing)
  classification: Restricted
  description: 1024-bit RSA private key hardcoded in lib/insecurity.ts:23. Used to sign all JWT tokens. Permanently compromised
    — committed to public GitHub repository.
  linked_threats: []
- id: A-002
  name: User Credentials (Passwords)
  classification: Restricted
  description: User passwords stored as MD5 hashes in SQLite Users table. MD5 is not a password-hashing function — trivially
    reversible via rainbow tables or GPU cracking.
  linked_threats: []
- id: A-003
  name: User Personally Identifiable Information
  classification: Confidential
  description: Email addresses, names, postal addresses, credit card numbers (card routes), delivery addresses stored in SQLite.
    Accessible via IDOR and SQL injection.
  linked_threats: []
- id: A-004
  name: JWT Tokens (Session Credentials)
  classification: Restricted
  description: RS256-signed JWTs stored in browser localStorage. 6-hour expiry. Vulnerable to XSS theft and offline forgery
    via committed private key.
  linked_threats: []
- id: A-005
  name: Encryption Keys Directory
  classification: Restricted
  description: encryptionkeys/ directory containing jwt.pub (and potentially other key material) served publicly at /encryptionkeys/
    via serve-index middleware.
  linked_threats: []
- id: A-006
  name: Application Logs
  classification: Confidential
  description: Access logs in logs/ directory containing IP addresses, request paths, user-agent strings, and potentially
    JWT tokens. Served publicly at /support/logs/.
  linked_threats: []
- id: A-007
  name: SQLite Database File
  classification: Restricted
  description: data/juiceshop.sqlite — contains all user data, orders, security questions, feedback, and admin configuration.
    In-process with no network-level isolation from the application.
  linked_threats: []
- id: A-008
  name: LLM API Key
  classification: Confidential
  description: OpenAI-compatible LLM API key loaded from LLM_API_KEY environment variable. Not hardcoded but accessible via
    process.env through RCE vectors or prompt injection tool calls.
  linked_threats: []
- id: A-009
  name: FTP Directory Contents
  classification: Internal
  description: ftp/ directory with publicly served files including potentially sensitive attachments. Directory listing enabled
    via serve-index.
  linked_threats: []
- id: A-010
  name: HMAC Signing Secret
  classification: Restricted
  description: Hardcoded HMAC-SHA256 key 'pa4qacea4VK9t9nGv7yZtwmj' in lib/insecurity.ts:44. Used for deluxe membership verification.
    Permanently compromised.
  linked_threats: []
- id: A-011
  name: Challenge Solution State
  classification: Internal
