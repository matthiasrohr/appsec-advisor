  description: Angular 20 single-page application served as static files from /frontend/dist/frontend. Handles all UI logic
    including authentication state, routing guards, and user interactions. Contains multiple [innerHTML] XSS sinks.
  tier: client
  paths:
  - frontend/src/**
  - frontend/dist/**
  deployment_zones:
  - browser
  handles_sensitive_data: true
  technology: Angular 20.1, TypeScript, Socket.IO client 3.1
  interfaces:
  - HTTP REST
  - WebSocket
  threat_ids:
  - T-001
  - T-003
  - T-014
  - T-023
  - T-048
- id: express-backend
  name: Express Backend API
  description: Node.js 24 / Express 4 monolithic backend serving REST API at /api/ and /rest/, static files, challenge verification,
    OAuth, 2FA, JWT auth. Contains intentional SQLi, path traversal, CORS bypass, and other vulnerabilities.
  tier: application
  paths:
  - server.ts
  - routes/**
  - lib/**
  - models/**
  - app.ts
  deployment_zones:
  - container
  - application-server
  handles_sensitive_data: true
  technology: Node.js 24, Express 4.22, TypeScript, express-jwt 0.1.3, jsonwebtoken 0.4.0, helmet 4.6.0, multer 1.4.5
  interfaces:
  - HTTP REST
  - WebSocket (Socket.IO)
  - File System
  threat_ids:
  - T-006
  - T-008
  - T-009
  - T-012
  - T-013
  - T-018
  - T-019
  - T-020
  - T-022
  - T-029
  - T-030
  - T-031
  - T-033
  - T-034
  - T-035
  - T-039
  - T-040
- id: data-layer
  name: Data Layer (SQLite + File Store)
  description: SQLite database via Sequelize 6 ORM storing user data, orders, baskets, challenges. Supplemented by MarsDB
    (in-memory NoSQL). File system serves as data store for uploads, FTP files, encryption keys, and access logs.
  tier: data
  paths:
  - models/**
  - data/**
  - ftp/**
  - encryptionkeys/**
  - logs/**
  deployment_zones:
  - application-server
  handles_sensitive_data: true
  technology: SQLite 3 via Sequelize 6, MarsDB 0.6.11, Local File System
  interfaces:
  - Sequelize ORM
  - File I/O
  threat_ids:
  - T-005
  - T-021
  - T-051
- id: b2b-api
  name: B2B Order API (RCE endpoint)
  description: POST /b2b/v2/orders endpoint that executes orderLinesData via vm.runInContext + notevil.eval — an intentional
    RCE challenge. Protected by JWT isAuthorized() middleware but contains JavaScript sandbox escape.
  tier: application
  paths:
  - routes/b2bOrder.ts
  deployment_zones:
  - application-server
  handles_sensitive_data: false
  technology: Node.js vm module, notevil 1.3.3
  interfaces:
  - HTTP REST (POST /b2b/v2/orders)
  threat_ids: []
- id: ci-cd-pipeline
  name: CI/CD Pipeline (GitHub Actions)
  description: 'GitHub Actions workflows: ci.yml, codeql-analysis.yml, frontend-bundle-analysis.yml and others. No top-level
    permissions hardening, third-party actions using tag refs (not SHA-pinned), no lockfile, no dependabot.'
  tier: application
  paths:
  - .github/workflows/**
  - Dockerfile
  - docker-compose*.yml
  - package.json
  - package-lock.json
  deployment_zones:
  - ci-cd
  handles_sensitive_data: false
  technology: GitHub Actions, Docker multi-stage (node:24 + distroless/nodejs24-debian13), npm
  interfaces:
  - GitHub API
  - npm registry
  - Docker Hub
  threat_ids:
  - T-002
  - T-024
  - T-025
  - T-026
  - T-027
  - T-028
  - T-036
  - T-037
  - T-038
  - T-042
  - T-043
  - T-044
  - T-045
  - T-049
  - T-050
- id: auth
  name: Authentication & Session Surface
  description: Login, token/session issuance, password-reset and MFA handlers (lib/insecurity.ts, lib/startup/registerWebsocketEvents.ts,
    routes/2fa.ts, routes/authenticatedUsers.ts, …). The credential-bearing entry surface — the highest-value authentication
    boundary in the system.
  paths:
  - lib/insecurity.ts
  - lib/startup/registerWebsocketEvents.ts
  - routes/2fa.ts
  - routes/authenticatedUsers.ts
  - routes/login.ts
  - routes/resetPassword.ts
  - routes/saveLoginIp.ts
  tier: application
  complexity: moderate
  framework: null
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: true
  origin: reconciliation
  threat_ids:
  - T-004
  - T-007
  - T-010
  - T-011
  - T-015
  - T-017
  - T-041
  - T-046
- id: realtime-channel
  name: Real-time WebSocket Channel
  description: Server-side socket.io real-time channel pushing live events to connected browsers. Internet-facing WebSocket
    surface with its own connection auth/origin checks and message-handler trust boundary.
  paths:
  - lib/challengeUtils.ts
  - lib/startup/registerWebsocketEvents.ts
  tier: application
  complexity: simple
  framework: socket.io
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: false
  origin: reconciliation
  threat_ids:
  - T-016
  - T-032
  - T-047
assets:
- id: A-001
  name: User Credentials (email + password hash)
  classification: Restricted
  description: User email addresses and MD5-hashed passwords stored in SQLite Users table. MD5 is reversible at scale; plaintext
    passwords recoverable via rainbow tables.
  location: data/juiceshop.sqlite / models/user.ts
  linked_threats:
  - T-001
  - T-005
  - T-007
  - T-009
  - T-017
  - T-018
  - T-033
- id: A-002
  name: JWT RSA Private Signing Key
  classification: Restricted
  description: RSA private key hardcoded in lib/insecurity.ts:23 used to sign all JWT tokens. Any attacker who reads the source
    code can forge admin JWT tokens.
  location: lib/insecurity.ts:23, encryptionkeys/jwt.pub
  linked_threats:
  - T-004
  - T-005
  - T-006
  - T-010
  - T-011
  - T-029
  - T-046
- id: A-003
  name: Customer Personal & Payment Data
  classification: Restricted
  description: Customer addresses, credit card data, delivery orders, basket contents stored in SQLite. Includes PII (name,
    address, country) and payment card metadata.
  location: data/juiceshop.sqlite / models/address.ts, card.ts, order.ts
  linked_threats:
  - T-001
  - T-007
  - T-008
  - T-009
  - T-035
  - T-051
- id: A-004
  name: Application Session Tokens (JWT)
  classification: Confidential
  description: JWT RS256 tokens issued by /rest/user/login and stored client-side (localStorage). Tokens grant access to all
    authenticated endpoints for 6 hours.
  location: lib/insecurity.ts:56, frontend/src (localStorage)
  linked_threats:
  - T-001
  - T-003
  - T-004
  - T-017
  - T-023
  - T-043
- id: A-005
  name: Server-Side Encryption Keys
  classification: Restricted
  description: RSA keypair and other encryption keys stored in /encryptionkeys/ directory and exposed via HTTP at /encryptionkeys/:file
    (intentional). Includes JWT keys.
  location: encryptionkeys/
  linked_threats:
  - T-010
  - T-029
- id: A-006
  name: Application Source Code & Configuration
  classification: Internal
  description: TypeScript source code, configuration files, challenge definitions, and infrastructure-as-code. Repository
    is public on GitHub — all source code including hardcoded secrets is publicly readable.
  location: github.com/juice-shop/juice-shop (public)
  linked_threats: []
- id: A-007
  name: FTP Files & Confidential Documents
  classification: Confidential
  description: Files served from /ftp/ directory including acquisitions.md, coupons_2013.md, incident-support.kdbx, and other
    documents. Publicly accessible without authentication.
  location: ftp/
  linked_threats:
  - T-035
- id: A-008
  name: Application Access Logs
  classification: Internal
  description: HTTP access logs served at /support/logs/. Logs may contain user IP addresses, request parameters, and other
    sensitive data. Exposed without authentication.
  location: logs/, routes/logfileServer.ts
  linked_threats:
  - T-030
  - T-035
- id: A-009
  name: Challenge State & Score Data
  classification: Internal
  description: Challenge completion status, user scores, and hacking challenge progress stored in SQLite. Integrity determines
    the validity of the CTF/training platform.
  location: data/juiceshop.sqlite / models/challenge.ts, routes/verify.ts
  linked_threats:
  - T-032
- id: A-010
  name: Product Catalog & Reviews
  classification: Public
  description: Product listings, descriptions, and user reviews. Product descriptions allow HTML injection (intentional XSS
    vector). Review data stored in SQLite.
  location: data/juiceshop.sqlite / models/feedback.ts, routes/createProductReviews.ts
  linked_threats:
  - T-001
  - T-007
  - T-009
  - T-013
  - T-019
  - T-034
  - T-039
