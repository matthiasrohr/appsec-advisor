- local_id: ci-cd-pipeline-002
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-506
  title: Untrusted npm Install/Postinstall Scripts Enabled — ci.yml:51
  affected_parameter: npm install
  scenario: 'The `coding-challenge-rsn`, `frontend-test`, `server-test`, `api-test`, `custom-config-test`, and `e2e-test`
    jobs in ci.yml all execute `npm install` without the `--ignore-scripts` flag (lines 51, 71, 110, 147, 203, 238). The top-level
    package.json defines a `postinstall` script: `cd frontend && npm install && cd .. && npm run build:frontend && (npm run
    --silent build:server || cd .)`. Any of the installed packages — including transitive dependencies — can also declare
    their own `preinstall`, `postinstall`, or `prepare` scripts. These run with full shell access to the runner environment.
    A malicious package substituted via a dependency confusion attack (a public npm package whose name matches a private scoped
    package, or a typosquatted package) would immediately execute arbitrary code in the CI runner, potentially exfiltrating
    DOCKERHUB_TOKEN, CYPRESS_RECORD_KEY, ALCHEMY_API_KEY, and GITHUB_TOKEN. This workflow runs on both `push` and `pull_request`
    — including PRs from external forks, where the contributor is untrusted.'
  evidence_summary: ci.yml jobs invoke `npm install` without `--ignore-scripts` while the top-level package.json declares
    a postinstall hook, allowing any installed package to run arbitrary code in the CI runner.
  impact_description: A malicious or compromised transitive dependency executes shell commands in the runner context, enabling
    secret exfiltration, artifact manipulation, or pivot to Docker registry credentials.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The `lint` job (ci.yml line 36) and `frontend-bundle-analysis.yml` correctly use `--ignore-scripts` for
    their minimal install steps. Dependabot monitors dependency versions.
  mitigation_title: Audit and restrict npm lifecycle scripts in CI workflows and add `--ignore-scripts` for test runner installs
  remediation:
    effort: Medium
    steps:
    - For jobs that only run tests and do not need the full postinstall build (e.g., `server-test`, `api-test`), add `--ignore-scripts`
      and invoke build steps explicitly and auditably (`npm run build:server`, `npm run build:frontend`) as separate named
      steps.
    - Add `npm audit --audit-level=high` as a mandatory step before any `npm install` in PR-triggered workflows, failing the
      build on high or critical severity advisories.
    - Enable npm package lock enforcement with `npm ci` instead of `npm install` to prevent version resolution drift and reduce
      the attack surface for dependency confusion.
    code_example: "# ci.yml server-test job — safer pattern\n      - name: \"Install application\"\n        run: npm install\
      \ --ignore-scripts\n      - name: \"Build server\"\n        run: npm run build:server\n      - name: \"Execute server\
      \ unit tests\"\n        run: npm run test:server:coverage"
