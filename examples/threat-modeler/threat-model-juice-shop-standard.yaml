trust_boundaries:
- id: tb-1
  name: Public Internet / Untrusted Zone
  description: External users, attackers, and anonymous clients communicating with the application over HTTP/HTTPS. No authentication
    or integrity guarantees.
  from: external
  to: express-backend
  protocol: HTTP/HTTPS
  enforcement: None — CORS allows all origins, no rate limiting on most endpoints; deployment-time perimeter controls out
    of scope for source-tree review
  weaknesses:
  - Wide-open CORS policy (app.use(cors()))
  - No CSP header
  - No CSRF protection
  - Rate limiting only on /reset-password and /2fa endpoints
- id: tb-2
  name: Browser Client Boundary
  description: Trust boundary between the Angular SPA running in the browser and the Express backend API. JWT tokens transmitted
    in Authorization header and localStorage.
  from: angular-frontend
  to: express-backend
  protocol: HTTPS/REST + WSS
  enforcement: JWT RS256 (6h expiry) via express-jwt middleware — selectively applied
  weaknesses:
  - Private key hardcoded in source — tokens forgeable
  - Token stored in localStorage (XSS-accessible)
  - Cookie secret 'kekse' is weak and public
  - Many routes lack isAuthorized() middleware
- id: tb-3
  name: Application / Data Tier Boundary
  description: Trust boundary between the Express application tier and the SQLite/MarsDB data stores. In-process for SQLite
    (file-based), in-memory for MarsDB.
  from: express-backend
  to: sqlite-db
  protocol: In-process (SQLite file)
  enforcement: Sequelize ORM — but raw queries used in attack-critical paths
  weaknesses:
  - Raw SQL in routes/search.ts:23 and routes/login.ts:34
  - MD5 password hashing — trivially reversible
  - No database encryption at rest
  - MarsDB used without sanitization in NoSQL challenges
- id: tb-4
  name: LLM API Boundary
  description: Trust boundary between the Express backend and the external LLM provider. Outbound HTTP to configurable OpenAI-compatible
    endpoint.
  from: express-backend
  to: external
  protocol: HTTPS (outbound to LLM API)
  enforcement: API key authentication to LLM provider (configurable)
  weaknesses:
  - User input passed to LLM without sanitization
  - System prompt includes user-controlled data (userName)
  - Tool call (coupon generation) accessible via prompt injection
- id: tb-5
  name: File System Boundary
  description: Trust boundary between HTTP clients and the file system (ftp/, encryptionkeys/, uploads/, logs/). No authentication
    enforced on static file serving.
  from: external
  to: file-server
  protocol: HTTP
  enforcement: None — all directories publicly accessible
  weaknesses:
  - Directory listing enabled on ftp/, encryptionkeys/, support/logs
  - XML uploaded to file-upload parsed with XXE
  - ZIP extraction lacks path traversal protection
- id: tb-6
  name: CI/CD / Supply Chain Boundary
  description: Trust boundary between GitHub Actions workflows and the application build/deploy pipeline.
  from: external
  to: ci-cd-pipeline
  protocol: HTTPS (GitHub Actions)
  enforcement: GitHub token permissions (not hardened at workflow level)
  weaknesses:
  - Third-party actions not SHA-pinned
  - Missing root-level permissions:read-all
  - No Dependabot config
  - postinstall script can execute arbitrary code on npm install
security_controls:
- domain: IAM
  control: Password-Based Authentication
  effectiveness: Weak
  effectiveness_reason: Password hashing uses MD5 (insecurity.ts:41) — trivially reversible. Login uses raw SQL string interpolation
    vulnerable to SQL injection (routes/login.ts:34). Weak password policy with known defaults (admin123).
  evidence_file: lib/insecurity.ts
  evidence_line: 41
  gaps:
  - MD5 hashing instead of bcrypt/argon2
  - SQL injectable login query
  - No password strength enforcement
  - Known default credentials in codebase
- domain: Session and Token Controls
  control: Session Token Signing (JWT RS256)
  effectiveness: Weak
  effectiveness_reason: JWT signing uses a 1024-bit RSA private key hardcoded in source (insecurity.ts:21). Anyone with repo
    access (public GitHub repo) can forge tokens with any role/email.
  evidence_file: lib/insecurity.ts
  evidence_line: 21
  gaps:
  - Private key hardcoded in public source
  - 1024-bit key (weak for RSA)
  - No key rotation mechanism
  - Token stored in XSS-accessible localStorage
  audit_flags:
  - control_domain_reclassified_from_SessionMgmt
- domain: Session and Token Controls
  control: Token Storage and Transmission
  effectiveness: Weak
  effectiveness_reason: JWT stored in localStorage (XSS-accessible). Cookie secret 'kekse' is hardcoded and public. No HttpOnly/Secure/SameSite
    flags on session cookies.
  evidence_file: server.ts
  evidence_line: 289
  gaps:
  - localStorage token storage vulnerable to XSS
  - Weak cookie secret 'kekse'
  - Missing HttpOnly/Secure/SameSite cookie flags
  audit_flags:
  - control_domain_reclassified_from_SessionMgmt
- domain: Identity and Authentication Controls
  control: Multi-Factor Authentication (TOTP)
  effectiveness: Partial
  effectiveness_reason: TOTP 2FA implemented via otplib in routes/2fa.ts. Rate-limited at 100 req/5min but validation can
    be bypassed via SQL injection in the login flow before 2FA check.
  evidence_file: routes/2fa.ts
  evidence_line: 1
  gaps:
  - 2FA bypassed via SQL injection login (SQLi reaches session before 2FA check)
  - Rate limit keyed on X-Forwarded-For which is spoofable (server.ts:346)
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Authorization Controls
  control: Route-Level Authorization (isAuthorized middleware)
  effectiveness: Weak
  effectiveness_reason: express-jwt middleware applied selectively via isAuthorized(). Many routes intentionally lack authorization.
    PUT /api/Products/:id is intentionally left unguarded (server.ts:370 comment). No ownership checks — IDOR possible.
  evidence_file: server.ts
  evidence_line: 356
  gaps:
  - PUT /api/Products/:id unguarded (changeProductChallenge)
  - No user-ownership checks on /api/BasketItems
  - Admin-only endpoints not restricted to admin role
  - isAccounting() check has IP allow-list bypass via spoofable X-Forwarded-For
  audit_flags:
  - control_domain_reclassified_from_AuthZ
- domain: Authorization Controls
