- local_id: data-persistence-001
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Passwords stored as unsalted MD5 hashes — models/user.ts:77
  affected_parameter: password
  scenario: The User model's password setter calls security.hash(clearTextPassword), which is crypto.createHash('md5').update(data).digest('hex')
    (lib/insecurity.ts:43) — a single-round, unsalted MD5 digest. Every password column in the Users table is therefore a
    bare MD5 hash. An attacker who obtains the SQLite file (data/juiceshop.sqlite, an unencrypted file accessible to any process
    or backup with OS file read) can crack the entire user base offline at billions of guesses per second on commodity GPUs,
    and identical passwords across users produce identical hashes (no per-user salt), enabling instant rainbow-table lookups
    and cross-account password reuse detection.
  evidence_summary: The password setter in user.ts:77 delegates to security.hash, which is defined as an unsalted single-round
    MD5 digest at insecurity.ts:43.
  impact_description: Full plaintext recovery of all stored user passwords once the database file is read, enabling account
    takeover and credential-stuffing against other services.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — a hash is applied but the algorithm (MD5) provides no resistance to offline cracking and no salt.
  mitigation_title: Replace MD5 password hashing with bcrypt/argon2id in the User model setter
  remediation:
    effort: Medium
    steps:
    - 'Replace security.hash in the password setter (models/user.ts:77) with a memory-hard adaptive hash: bcrypt (cost >=
      12) or argon2id; the project already depends on bcryptjs, so call bcrypt.hashSync(clearTextPassword, 12).'
    - Make hashing async or move it into an async beforeSave hook so the work factor does not block the event loop; store
      the full modular-crypt string (algorithm + salt + hash) in the password column.
    - On next successful login, transparently re-hash legacy MD5 passwords to the new scheme, then drop MD5 support; never
      reversibly migrate.
    code_example: "import bcrypt from 'bcryptjs'\n// in models/user.ts password setter:\nset (clearTextPassword: string) {\n\
      \  this.setDataValue('password', bcrypt.hashSync(clearTextPassword, 12))\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
    blueprint: null
