  title: NoSQL Injection — routes/chat.ts:149
  affected_parameter: id
  scenario: 'LLM05 — Improper Output Handling / NoSQL Injection: The `getProductReviews` tool at routes/chat.ts:149 constructs
    a MongoDB `$where` query by string concatenation: `{ $where: ''this.product == '' + productId }`. MongoDB''s `$where`
    operator evaluates the string as server-side JavaScript. `productId` is derived from `Number(id)` where `id` is the LLM-supplied
    tool argument. Under normal LLM operation this yields a numeric string. However, a prompt injection attack can coerce
    the LLM to supply a crafted `id` value. If the input is not a valid number, `Number(id)` returns `NaN`, and the `$where`
    clause becomes `this.product == NaN` — still evaluated by the JS engine. More critically, an attacker who achieves prompt
    injection may supply `id = ''0; return true''`, which would match all documents. The underlying cause is the use of `$where`
    with string concatenation instead of parameterized query operators.'
  evidence_summary: 'Line 149: `db.reviewsCollection.find({ $where: ''this.product == '' + productId })` concatenates a query-controlled
    string into a JavaScript evaluator.'
  impact_description: A successful injection could return all reviews in the collection regardless of product ID, or execute
    arbitrary JavaScript in the MongoDB server context (data exfiltration, timing attacks).
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: '`Number(id)` coercion at line 147 reduces but does not eliminate the attack surface — `$where` with
    NaN or crafted coercions may still be exploitable.'
  mitigation_title: Replace $where string concatenation with parameterized MongoDB equality operator in getProductReviews
  remediation:
    effort: Low
    steps:
    - 'Replace `{ $where: ''this.product == '' + productId }` with `{ product: productId }` using a standard equality filter
      — MongoDB evaluates this without executing JavaScript.'
    - 'Validate that `productId` is a finite positive integer before issuing the query: `if (!Number.isFinite(productId) ||
      productId <= 0) return []`.'
    - Remove any remaining `$where` usage across the codebase; prefer standard MongoDB query operators to avoid JavaScript
      evaluation.
    code_example: "```typescript\nexecute: async ({ id }) => {\n  const productId = Number(id)\n  if (!Number.isFinite(productId)\
      \ || productId <= 0) return []\n  return await db.reviewsCollection.find({ product: productId }) as Review[]\n}\n```"
    reference: CWE-943
