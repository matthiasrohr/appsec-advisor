  impact: High
  risk: High
  controls_in_place: '`checkUploadSize` at `fileUpload.ts:55` checks `file.size > 100000` (compressed size only, not decompressed).
    No decompressed size limit.'
  mitigation_title: Enforce decompressed size limits during ZIP extraction to prevent ZIP bomb exhaustion
  remediation:
    effort: Low
    steps:
    - Accumulate a byte counter per entry and across all entries; abort extraction if the total decompressed size exceeds
      a configurable threshold (e.g. 10 MB).
    - Check `entry.vars.uncompressedSize` from the unzipper metadata before streaming, and skip entries exceeding the limit.
