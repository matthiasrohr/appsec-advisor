- local_id: data-persistence-004
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: MD5 password hashing without salt — models/user.ts:77
  affected_parameter: password
  scenario: The `User.password` setter at `models/user.ts:77` stores passwords via `security.hash(clearTextPassword)` which
    computes an unsalted MD5 digest. MD5 produces a 128-bit output crackable against large wordlists via GPU-accelerated rainbow
    tables in seconds to minutes for common passwords. An attacker who gains read access to the SQLite file (through the intentional
    SQLi at `routes/login.ts:34`, a path traversal, or backup exposure) recovers plaintext passwords for the majority of user
    accounts. Because no salt is used, identical passwords produce identical hashes — allowing bulk cracking across the entire
    user table via a single lookup rather than per-user bruteforce.
  evidence_summary: '`User.password` setter at line 77 delegates to `security.hash()` which returns an unsalted MD5 hex string.'
  impact_description: All user passwords exposed via any database read path are immediately crackable, enabling account takeover
    across the full user base.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — MD5 provides no meaningful resistance to offline cracking without a salt and a computationally
    expensive algorithm.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2id with per-record salt
  remediation:
    effort: Medium
    steps:
    - 'Replace `security.hash()` in `lib/insecurity.ts` with `bcrypt.hash(password, 12)` (or `argon2.hash(password, { type:
      argon2.argon2id })`); install the `bcrypt` or `argon2` npm package.'
    - Update the `User.password` setter in `models/user.ts` to call the async bcrypt/Argon2 hash function (requires converting
      the setter to an `async` method or a `beforeCreate`/`beforeUpdate` hook).
    - 'On next successful login, re-hash passwords transparently: verify the submitted password against the stored MD5 hash,
      then store a bcrypt/Argon2 hash and clear the MD5 hash.'
    - 'Add a migration that marks existing MD5 hashes with a `hash_version: 1` column so they can be identified and rehashed
      on next login or forced reset.'
    code_example: "// models/user.ts — use bcrypt hook instead of MD5 setter\nimport bcrypt from 'bcrypt'\nUser.addHook('beforeCreate',\
      \ async (user: User) => {\n  if (user.password) {\n    user.password = await bcrypt.hash(user.password, 12)\n  }\n})"
    reference: CWE-916
  evidence:
  - file: models/user.ts
    line: 77
  evidence_check: verified
  controls_absent_evidence: []
