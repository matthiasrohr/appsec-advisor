- local_id: frontend-spa-007
  threat_category_id: TH-06
  additional_categories:
  - TH-02
  stride: Elevation of Privilege
  cwe: CWE-862
  title: Client-Side-Only Admin Route Guard (frontend/src/app/app.guard.ts:52)
  affected_parameter: role
  scenario: '`AdminGuard.canActivate()` at lines 52-60 decodes the JWT payload client-side using `jwtDecode()` and checks
    `payload.data.role === roles.admin`. This check is enforced only in the Angular router — it prevents the admin route from
    rendering in the browser, but it does not prevent direct API calls to admin-only backend endpoints. Furthermore, `jwtDecode()`
    does not verify the JWT signature; it only base64-decodes the payload. Any authenticated user can copy their JWT, modify
    the `role` field in the payload (changing the base64 encoding), and reload the SPA to bypass the guard. The guard is rendered
    useless if the backend also accepts JWTs without verifying the role claim, but even in isolation it provides no meaningful
    security boundary since the Angular router can be bypassed by direct navigation.'
  evidence_summary: '`payload.data.role === roles.admin` at line 54 — `jwtDecode()` imported at line 7 explicitly does not
    verify signatures; the role check is read from the unverified payload.'
  impact_description: An authenticated low-privilege user can bypass the Angular admin guard by modifying the JWT payload
    locally, gaining access to admin UI components and triggering admin-only API calls.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Angular route guard (client-side only); server-side role enforcement depends on Express backend JWT middleware
  mitigation_title: Enforce role-based authorization server-side on every admin API endpoint; treat client-side guard as UX-only
  remediation:
    effort: Medium
    steps:
    - On the Express backend, add a middleware that validates the JWT signature AND checks `decodedToken.data.role === 'admin'`
      before processing any `/api/` route served by admin-only handlers (`GET /api/Users`, `GET /api/Feedbacks`, etc.).
    - Document `AdminGuard` in a comment as a UX gate only — it must never be relied upon for security decisions.
    - Consider issuing separate short-lived admin tokens (scoped to admin operations) rather than embedding a role claim in
      the same long-lived user token.
    code_example: "// Express admin middleware\nfunction requireAdmin(req, res, next) {\n  const token = req.headers.authorization?.replace('Bearer\
      \ ', '');\n  if (!token) return res.status(401).json({ error: 'Unauthorized' });\n  try {\n    const payload = jwt.verify(token,\
      \ process.env.JWT_SECRET,\n      { algorithms: ['RS256'] });\n    if (payload.data?.role !== 'admin') {\n      return\
      \ res.status(403).json({ error: 'Forbidden' });\n    }\n    req.user = payload.data;\n    next();\n  } catch (err) {\n\
      \    return res.status(401).json({ error: 'Invalid token' });\n  }\n}"
    reference: CWE-862
  evidence:
