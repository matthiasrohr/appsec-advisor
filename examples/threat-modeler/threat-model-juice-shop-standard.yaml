  title: Tool Call Details Exposed to Non-Admin Users via show_tool_calls Cookie
  affected_parameter: show_tool_calls
  scenario: At routes/chat.ts:219-224, the aiDebuggingChallenge is solved when `req.cookies.show_tool_calls === 'true'` AND
    the user's role is NOT admin. This means a non-admin user who sets the cookie `show_tool_calls=true` causes full tool
    call details to be streamed back in the SSE response (tool name, toolCallId, and tool input arguments as JSON at line
    226-236). Any user can set this cookie in their browser. The tool-call output includes the exact arguments passed to tools
    like generateCoupon (revealing discount values), getOrderById (revealing the orderId being queried), and getProductReviews
    (revealing product IDs). This debug feature was intended for administrators but is exposed to all users with no privilege
    check.
