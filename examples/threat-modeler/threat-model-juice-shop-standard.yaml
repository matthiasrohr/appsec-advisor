- local_id: angular-spa-001
  threat_category_id: TH-10
  additional_categories: []
  stride: Spoofing
  cwe: CWE-598
  title: OAuth Implicit Flow Without PKC… (frontend/src/app/login/login.component.ts:134)
  affected_parameter: response_type
  scenario: '`login.component.ts:134` constructs the Google OAuth redirect as `response_type=token` — the legacy implicit
    flow. No `state` parameter is included, so a cross-site request can substitute its own `access_token` in the redirect
    URL fragment. No PKCE code challenge is sent, so an authorization code interceptor could exchange the code without the
    original client secret. The access token arrives in the URL fragment (`#access_token=...`) and is read by `app.routing.ts:237`
    via `window.location.href`; the fragment is recorded in browser history and may appear in `Referer` headers sent to third-party
    resources on the landing page.'
  evidence_summary: '`googleLogin()` in `login.component.ts` constructs the authorization URL with `response_type=token` and
    no `state` parameter, confirming the implicit-flow pattern without CSRF protection.'
  impact_description: An attacker who injects a crafted access_token via a cross-site redirect can log in as an arbitrary
    Google user; lack of state allows CSRF against the OAuth flow itself.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: redirect_uri is validated against an allowlist from the server configuration (`authorizedRedirects.find(r
    => r.uri === this.redirectUri)`).
  mitigation_title: Migrate Google OAuth flow to Authorization Code with PKCE and add state validation
  remediation:
    effort: High
    steps:
    - Replace `response_type=token` with `response_type=code` and add `code_challenge` (S256 method) and `code_challenge_method=S256`
      parameters to the authorization URL.
    - Generate a cryptographically random `state` parameter per flow, store it in `sessionStorage`, and verify it in `oauth.component.ts`
      before consuming the authorization code.
    - Exchange the authorization code for tokens on the backend (Backend-for-Frontend pattern) so the access_token never appears
      in the browser URL or JavaScript.
    - Use Angular's `crypto.getRandomValues()` for generating the PKCE code verifier and state.
    code_example: "// Generate PKCE code verifier and state\nconst verifier = generateRandomString(64)\nconst state = generateRandomString(32)\n\
      sessionStorage.setItem('pkce_verifier', verifier)\nsessionStorage.setItem('oauth_state', state)\nconst challenge = await\
      \ sha256Base64url(verifier)\nwindow.location.replace(\n  `${oauthProviderUrl}?client_id=${clientId}&response_type=code`\
      \ +\n  `&code_challenge=${challenge}&code_challenge_method=S256` +\n  `&state=${state}&scope=email&redirect_uri=${redirectUri}`\n\
      )"
    reference: CWE-598
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 134
