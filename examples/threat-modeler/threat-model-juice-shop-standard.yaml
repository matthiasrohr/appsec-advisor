- local_id: data-persistence-007
  threat_category_id: TH-01
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Unbounded Raw SQL Query Event Loop Block (routes/search.ts:23)
  affected_parameter: q
  scenario: 'The raw LIKE query at `routes/search.ts:23` has no query timeout, no row-count cap, and no index guarantee on
    the Products table text columns. An attacker submits a crafted payload (e.g., a long pattern causing full-table scan with
    expensive regex backtracking, or a UNION with many joined subqueries) that causes SQLite to hold the write lock for an
    extended period. Because `models/index.ts:36` sets `transactionType: IMMEDIATE`, all concurrent write transactions are
    blocked for the lock duration, stalling the single-threaded Node.js application.'
  evidence_summary: '`routes/search.ts:23` issues `sequelize.query()` with user-supplied LIKE wildcards and no `timeout` option;
    `models/index.ts:36` sets `transactionType: IMMEDIATE` making all writes serialized.'
  impact_description: Application write operations stall while the lock is held; sustained submissions can render the application
    unresponsive.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Input is capped at 200 chars — reduces but does not eliminate the risk.
  mitigation_title: Add query timeout and result-set limit to the product search raw SQL call
  remediation:
    effort: Low
    steps:
    - 'Pass `{ timeout: 2000 }` (2 s) in the Sequelize query options object for the product search call so SQLite aborts long-running
      queries before they starve the event loop.'
    - Migrate to the ORM `ProductModel.findAll()` path (with `limit` and `offset` pagination), which also enables query cancellation
      via Sequelize's built-in timeout support.
    - Add `PRAGMA query_only = ON` for read-only queries to prevent accidental writes in the search path.
    code_example: "// Add timeout to raw query (interim fix)\nawait models.sequelize.query(\n  `SELECT * FROM Products WHERE\
      \ ((name LIKE :criteria OR description LIKE :criteria) AND deletedAt IS NULL) ORDER BY name LIMIT 100`,\n  { replacements:\
      \ { criteria: `%${criteria}%` }, timeout: 2000 }\n)"
    reference: CWE-400
  evidence:
