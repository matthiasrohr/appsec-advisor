components:
- id: frontend-spa
  name: Frontend SPA (Angular)
  description: Angular 21 single-page application served from the Express server. Holds JWT tokens in localStorage (XSS-amplified),
    uses client-side route guards as primary authorization, and contains postMessage listeners with wildcard origin acceptance.
  paths:
  - frontend/src/**
  - frontend/package.json
  - frontend/package-lock.json
  tier: client
  complexity: moderate
  framework: angular
  deployment_zones:
  - client-device
  - internet
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-004
  - T-015
  - T-024
  - T-034
  - T-054
  - T-065
- id: express-api
  name: Express API Server
  description: Node.js 24 Express application serving REST endpoints, static files, and authentication logic. Contains intentional
    vulnerabilities including eval() in captcha/userProfile routes, raw SQL injection in the login route, and a hardcoded
    RSA private key in lib/insecurity.ts. Handles authentication (JWT RS256), RBAC, file upload, and challenge mechanics.
  paths:
  - routes/**
  - lib/**
  - models/**
  - app.ts
  - server.ts
  - views/**
  - ftp/**
  - uploads/**
  - encryptionkeys/**
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-005
  - T-006
  - T-007
  - T-011
  - T-012
  - T-014
  - T-018
  - T-022
  - T-023
  - T-032
  - T-033
  - T-040
  - T-042
  - T-043
  - T-047
  - T-050
  - T-051
  - T-052
  - T-053
  - T-055
- id: data-store
  name: Data Store (SQLite + MarsDB)
  description: SQLite database via Sequelize ORM serving as primary relational store for users, products, orders, baskets,
    and challenge state. MarsDB (MongoDB-compatible in-process store) used for product reviews. Accessed from within the same
    Node.js process.
  paths:
  - models/**
  - data/**
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-008
  - T-030
  - T-031
- id: websocket-server
  name: WebSocket Server
  description: Socket.IO-based real-time messaging server registered in lib/startup/registerWebsocketEvents.ts. Handles chatbot
    interactions and challenge notifications. Authentication and origin validation on WebSocket upgrade may be absent.
  paths:
  - lib/startup/registerWebsocketEvents.ts
  - routes/verify.ts
  tier: application
  complexity: simple
  framework: socket.io
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: false
  threat_ids:
  - T-010
  - T-017
  - T-039
  - T-045
- id: llm-chatbot
  name: LLM Chatbot Service
  description: AI-powered customer service chatbot using @ai-sdk/openai-compatible to call an external LLM API. System prompt
    concatenates user identity data and contains confidential policy instructions. Exposes searchProducts, getProductReviews,
    getOrderById, and generateCoupon tools. Vulnerable to prompt injection via unconstrained user input in routes/chat.ts.
  paths:
  - routes/chat.ts
  - lib/startup/registerWebsocketEvents.ts
  tier: application
  complexity: moderate
  framework: ai-sdk
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-016
  - T-025
  - T-026
  - T-027
  - T-035
  - T-036
- id: ci-cd-pipeline
  name: CI/CD Pipeline (GitHub Actions)
  description: 12 GitHub Actions workflows covering build, test, release, CodeQL SAST, and PR compliance checks. Uses pull_request_target
    triggers with potentially insufficient permission scoping and npm install (not npm ci) in build steps. Container images
    use mutable :latest tags. No automated SCA tooling (Snyk/Trivy/Grype) configured.
  paths:
  - .github/workflows/**
  - Dockerfile
  - docker-compose.test.yml
  - .npmrc
  tier: application
  complexity: moderate
  framework: null
  deployment_zones:
  - ci-cd-runtime
  - build-pipeline
  handles_sensitive_data: true
  threat_ids:
  - T-020
  - T-021
  - T-029
  - T-048
  - T-049
  - T-057
  - T-058
  - T-060
  - T-061
  - T-062
  - T-063
  - T-064
- id: auth
  name: Authentication & Session Surface
  description: Login, token/session issuance, password-reset and MFA handlers (lib/insecurity.ts, lib/startup/registerWebsocketEvents.ts,
    routes/2fa.ts, routes/authenticatedUsers.ts, …). The credential-bearing entry surface — the highest-value authentication
    boundary in the system.
  paths:
  - lib/insecurity.ts
  - lib/startup/registerWebsocketEvents.ts
  - routes/2fa.ts
  - routes/authenticatedUsers.ts
  - routes/login.ts
  - routes/resetPassword.ts
  - routes/saveLoginIp.ts
  tier: application
  complexity: moderate
  framework: null
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: true
  origin: reconciliation
  threat_ids:
  - T-002
  - T-003
  - T-009
  - T-013
  - T-019
  - T-028
  - T-041
  - T-046
  - T-059
- id: web3-nft
  name: Web3 / Wallet / NFT Surface
  description: Blockchain/web3 endpoints handling wallet addresses, NFT minting, and on-chain key material (ethers). Internet-facing
    crypto-asset surface with its own key-handling and ownership-verification trust boundary.
  paths:
  - routes/checkKeys.ts
  - routes/nftMint.ts
  - routes/redirect.ts
  - routes/web3Wallet.ts
  tier: application
  complexity: moderate
  framework: ethers
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: true
  origin: reconciliation
  threat_ids:
  - T-037
  - T-038
  - T-044
  - T-056
assets:
- id: A-001
  name: User Credentials (Passwords + Password Hashes)
  classification: Restricted
  description: Bcrypt-hashed user passwords stored in the SQLite Users table. The login route uses raw SQL concatenation making
    these directly exposed to SQLi-based extraction. Compromise yields account takeover for all users.
  linked_threats:
  - T-002
  - T-006
  - T-008
  - T-013
  - T-015
  - T-024
  - T-028
  - T-040
  - T-046
  - T-050
  evidence_flags:
  - inferred_classification
- id: A-002
  name: JWT RSA Private Signing Key
  classification: Restricted
  description: 2048-bit RSA private key hardcoded at lib/insecurity.ts:21. Used to sign all JWT tokens. Full compromise means
    any attacker who reads the source code (public GitHub repo) can forge admin-level JWT tokens for any user.
  linked_threats:
  - T-003
  - T-009
  - T-013
  - T-014
  - T-019
  - T-022
  - T-028
  - T-031
  - T-032
  - T-038
  - T-039
  - T-041
  - T-049
  - T-059
  evidence_flags: []
- id: A-003
  name: Session Tokens (JWTs in localStorage)
  classification: Confidential
  description: JWT bearer tokens stored in browser localStorage across all authenticated sessions. Accessible to any JavaScript
    executing on the page — XSS anywhere on the domain yields full session token theft for all active users.
  linked_threats:
  - T-001
  - T-004
  - T-009
  - T-024
  - T-028
  - T-031
  - T-049
  evidence_flags: []
- id: A-004
  name: User Personal Data (PII)
  classification: Confidential
  description: User profiles containing email addresses, usernames, delivery addresses, and security question answers stored
    in the SQLite Users table. Subject to GDPR data-subject rights (data export and erasure routes exist).
  linked_threats:
  - T-002
  - T-006
  - T-008
  - T-013
  - T-015
  - T-024
  - T-027
  - T-040
  - T-046
  - T-050
  evidence_flags: []
- id: A-005
  name: Payment and Order Data
  classification: Confidential
  description: Customer order history, basket contents, wallet balances, and delivery addresses stored across SQLite Baskets/Orders/Cards/Wallets
    tables. IDOR vulnerabilities allow cross-user data access without ownership checks.
  linked_threats:
  - T-002
  - T-005
  - T-006
  - T-024
  - T-028
  - T-030
  - T-031
  - T-036
  - T-047
  - T-050
  - T-053
  - T-065
  evidence_flags: []
- id: A-006
  name: LLM API Key
  classification: Restricted
  description: External LLM provider API key loaded from environment variable LLM_API_KEY in routes/chat.ts. Compromise enables
    unauthorized LLM usage and potential data exfiltration via the chatbot tool invocations.
  linked_threats: []
  evidence_flags:
  - inferred_classification
- id: A-007
  name: Product Catalog and Business Data
  classification: Internal
  description: Product listings, prices, reviews, and promotional coupon configurations stored in SQLite and MarsDB. Integrity
    is a challenge target — unauthorized modification fulfills challenge objectives and could affect business logic.
  linked_threats:
  - T-002
  - T-006
  - T-010
  - T-024
  - T-050
  evidence_flags: []
- id: A-008
  name: Uploaded User Files
  classification: Confidential
  description: User-uploaded complaint files and profile images stored under /uploads/ and served publicly. Malicious file
    upload (unrestricted type validation) can introduce stored XSS or path traversal artifacts.
  linked_threats:
  - T-007
  - T-011
  - T-022
  - T-023
  - T-051
  evidence_flags: []
- id: A-009
  name: FTP Directory Contents
  classification: Internal
  description: Files served via the /ftp/* HTTP endpoint — includes sensitive challenge artifacts and potentially sensitive
    backup/config files accessible without authentication (intentional challenge).
  linked_threats:
  - T-022
  - T-032
  - T-039
  - T-047
  - T-053
  - T-059
  evidence_flags: []
- id: A-010
  name: Challenge State and Solution Data
  classification: Internal
  description: Challenge completion records, continue-codes, and solution data stored in the SQLite Challenges table and in-memory
    cache. Manipulation allows bypassing challenge solutions without actually exploiting the vulnerability.
  linked_threats: []
  evidence_flags: []
- id: A-011
  name: CI/CD Secrets (GitHub Actions)
  classification: Restricted
  description: GitHub Actions secrets including NPM_TOKEN, Docker Hub credentials, and GITHUB_TOKEN used during release workflows.
    Overly broad permissions and pull_request_target triggers create exfiltration paths from malicious PR contributors.
  linked_threats:
  - T-001
  - T-002
  - T-006
  - T-008
  - T-013
  - T-015
  - T-021
  - T-024
  - T-040
  - T-046
  - T-048
  - T-049
  - T-050
  - T-062
  evidence_flags:
  - inferred_classification
- id: A-012
  name: Application Metrics and Prometheus Data
  classification: Internal
  description: Prometheus metrics endpoint at /metrics exposing internal counters, LLM token usage, and application performance
    data. Accessible without authentication (missing_auth_suspect = true) — information disclosure to unauthenticated attackers.
  linked_threats: []
  evidence_flags: []
