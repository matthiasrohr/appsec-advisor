  scenario: 'LLM01 — Prompt Injection: The request body''s `messages` array (routes/chat.ts:189) is forwarded verbatim into
    `streamText({ system: systemPrompt, messages, ... })` at routes/chat.ts:201-205. There is no sanitization, no delimiter
