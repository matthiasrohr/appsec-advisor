    no origin validation or callback name sanitization.'
  impact_description: Any website can silently read authenticated user PII (email, lastLoginIp, profileImage) from a victim's
    session.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — JSONP is served unconditionally when the callback parameter is present.
  mitigation_title: Remove JSONP support from the whoami endpoint and use CORS headers for cross-origin access
