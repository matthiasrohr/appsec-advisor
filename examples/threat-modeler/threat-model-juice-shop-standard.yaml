- local_id: ci-cd-pipeline-009
  threat_category_id: TH-14
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-378
  title: Privileged Secrets Reachable in pull_request_target Flow — pr-compliance.yml:438
  affected_parameter: null
  scenario: '`pr-compliance.yml` triggers on `pull_request_target` (`:4`), which runs in the base-repo context with access
    to secrets even for fork PRs. The flow references `ORG_ADMIN_TOKEN` (`:438`), `SLACK_WEBHOOK_URL` (`:471`), and the repo
    `GITHUB_TOKEN` (`:470`). This workflow is comparatively well-hardened — it does NOT checkout the PR head, all actions
    are SHA-pinned (`actions/github-script@ed5974…`), and untrusted PR fields are passed via `env:` rather than interpolated
    into `script:` bodies, which closes the classic script-injection sink. The residual risk is the blast radius if any single
    step in this privileged context is ever compromised (e.g. a future edit that interpolates `github.event.pull_request.title`
    into a `run:`, or a supply-chain compromise of github-script): the org-admin-scoped `ORG_ADMIN_TOKEN` — broader than the
    workflow needs — would be exposed to a forker-triggered run. The token is only used to block spammers (`:445`).'
  evidence_summary: pull_request_target at line 4 grants the fork-triggered workflow access to ORG_ADMIN_TOKEN (line 438)
    and SLACK_WEBHOOK_URL (line 471).
  impact_description: If any step in this privileged fork-triggered context is compromised, an org-admin-scoped token and
    a Slack webhook become reachable to an external attacker.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: No PR-head checkout; all actions SHA-pinned; untrusted PR fields passed through env vars (not interpolated
    into script bodies); membership gate runs checks only for non-org authors.
  mitigation_title: Minimize secret scope and isolate the privileged step in the pull_request_target workflow
  remediation:
    effort: Medium
    steps:
    - Replace the org-wide `ORG_ADMIN_TOKEN` with a fine-grained token scoped only to the org-block API, or move the block-user
      action into a separate `workflow_run` job that does not run in the untrusted PR context.
    - Keep enforcing that no step in this workflow checks out or executes PR-head code, and add a CI lint (e.g. zizmor / actionlint)
      that fails if `github.event.pull_request.*` is ever interpolated into a `run:` or `script:` block.
    - 'Scope the workflow `permissions:` block (already `pull-requests: write`, `issues: write`) to the minimum and avoid
      expanding it.'
    code_example: "# isolate privileged action via workflow_run on the trusted side\non:\n  workflow_run:\n    workflows:\
      \ [\"PR Compliance Check\"]\n    types: [completed]"
    reference: https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
