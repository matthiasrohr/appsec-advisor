  title: SQL Injection Login Bypass — routes/login.ts:34
  affected_parameter: email
  scenario: 'At routes/login.ts:34, req.body.email is interpolated directly into a raw Sequelize query: `SELECT * FROM Users
    WHERE email = ''${req.body.email}''`. Submitting `'' OR ''1''=''1` as the email bypasses the WHERE clause entirely and
    returns the first user row, which is the seeded admin account. No parameterization or ORM-layer escaping is applied. The
    attacker receives a valid JWT signed with the app''s RS256 private key and gains full admin session without credentials.'
  evidence_summary: req.body.email flows unescaped into models.sequelize.query() at routes/login.ts:34 via string template
    literal.
  impact_description: Unauthenticated login as any user, including the admin account; complete authentication bypass.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no input validation, no parameterized query, no WAF documented in repo.
  mitigation_title: Replace raw Sequelize query with parameterized query using replacements or UserModel.findOne()
  remediation:
    effort: Low
    steps:
    - 'Replace models.sequelize.query() string interpolation at routes/login.ts:34 with UserModel.findOne({ where: { email:
      req.body.email, password: security.hash(req.body.password), deletedAt: null } }) — Sequelize will parameterize the WHERE
      clause.'
    - 'Alternatively use models.sequelize.query(''SELECT * FROM Users WHERE email = ? AND password = ? AND deletedAt IS NULL'',
      { replacements: [email, hash], model: UserModel, plain: true }) to use positional placeholders.'
    - Add integration test verifying that the payload `' OR '1'='1` returns HTTP 401.
    - Enable eslint-plugin-security or a SAST rule to flag future raw string interpolation into query calls.
    code_example: '// Before (vulnerable)

      models.sequelize.query(`SELECT * FROM Users WHERE email = ''${req.body.email}'' AND password = ''${security.hash(req.body.password)}''`)


      // After (safe)

      UserModel.findOne({ where: { email: req.body.email, password: security.hash(req.body.password), deletedAt: null } })'
    reference: CWE-89
