  cwe: CWE-922
  title: JWT Stored Without HttpOnly Flag — lib/insecurity.ts:192
  affected_parameter: token
  scenario: '`lib/insecurity.ts:192` sets the session cookie with `res.cookie(''token'', token)` — no `httpOnly: true`, no
    `secure: true`, no `sameSite` attribute. Additionally, the Angular frontend stores the JWT in `localStorage` (confirmed
    by the dual-path `req.cookies.token || utils.jwtFrom(req)` at line 187). Any XSS payload — for example, through the stored
    XSS in the product review or `True-Client-IP` header — can call `document.cookie` or `localStorage.getItem(''token'')`
    to exfiltrate the token. Because there is no server-side session invalidation (`authenticatedUsers.tokenMap` is populated-only,
    never evicted by logout), the stolen token remains valid for the full 6-hour expiry.'
  evidence_summary: '`res.cookie(''token'', token)` at `lib/insecurity.ts:192` sets no `httpOnly` or `secure` flag; frontend
    mirrors it to `localStorage`.'
  impact_description: XSS-obtained token grants an attacker a 6-hour authenticated session with no possibility of server-side
    revocation.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 6-hour JWT expiry; cookie parser configured
  mitigation_title: Set HttpOnly, Secure, and SameSite=Strict on the session cookie and remove localStorage token storage
  remediation:
    effort: Medium
    steps:
    - 'Change `res.cookie(''token'', token)` at `lib/insecurity.ts:192` to `res.cookie(''token'', token, { httpOnly: true,
      secure: true, sameSite: ''strict'' })`.'
    - Remove JWT from `localStorage` in the Angular frontend; rely solely on the `httpOnly` cookie for session state.
    - Implement server-side token revocation by storing a token hash or jti in a fast store (Redis) and checking it on each
      request.
    - Ensure `res.clearCookie('token')` is called on logout with matching cookie options.
    code_example: '// lib/insecurity.ts:192

      res.cookie(''token'', token, { httpOnly: true, secure: process.env.NODE_ENV === ''production'', sameSite: ''strict''
      })'
    reference: CWE-922
    blueprint: null
