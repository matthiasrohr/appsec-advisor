- local_id: socket-io-service-005
  threat_category_id: TH-06
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-942
  title: Hardcoded permissive CORS origin on Socket.IO — registerWebsocketEvents.ts:21
  affected_parameter: cors.origin
  scenario: 'The Socket.IO `Server` is configured with a hardcoded `cors: { origin: ''http://localhost:4200'' }`. This static
    value is a development origin baked into production code rather than derived from configuration. In a deployed environment
    the real frontend origin differs, so operators are pressured to widen this (commonly to `''*''` or to reflect the request
    origin) to make the app work — and a wildcard/reflected CORS origin combined with the unauthenticated handshake (socket-io-service-001)
    lets any web origin establish a cross-origin WebSocket and read broadcast challenge-solution notifications. The origin
    is not sourced from `config`, so there is no safe deployment-time override.'
  evidence_summary: 'registerWebsocketEvents.ts:21 sets `cors: { origin: ''http://localhost:4200'' }` as a literal, not from
    `config.get(...)`.'
  impact_description: A static/over-broad CORS origin enables cross-origin clients to receive solution-bearing broadcasts
    once relaxed for deployment.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: CORS restricted to a single static origin (http://localhost:4200), but not configurable and not auth-backed.
  mitigation_title: Source the Socket.IO CORS origin from configuration with an explicit allowlist
  remediation:
    effort: Low
    steps:
    - Replace the literal with an allowlist read from `config.get('server.allowedOrigins')` so production origins are set
      per environment without code changes.
    - Never fall back to `'*'` or origin reflection; reject unknown origins in the CORS `origin` callback.
    - Pair the origin allowlist with handshake authentication so CORS is not the only access control.
    code_example: "const allowed = config.get('server.allowedOrigins')\nconst io = new Server(server, {\n  cors: { origin:\
      \ (o, cb) => cb(null, allowed.includes(o)) }\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cross_Origin_Resource_Sharing_Cheat_Sheet.html
  evidence:
  - file: lib/startup/registerWebsocketEvents.ts
    line: 21
  evidence_check: ambiguous
