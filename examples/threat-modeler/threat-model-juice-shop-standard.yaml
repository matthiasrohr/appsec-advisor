  stride: Information Disclosure
  cwe: CWE-312
  title: High-Privilege ORG_ADMIN_TOKEN Accessible to All Steps — pr-compliance.yml:438
  affected_parameter: ORG_ADMIN_TOKEN
  scenario: '`pr-compliance.yml:438` injects `ORG_ADMIN_TOKEN` (an organization-level admin token) as an environment variable
    `orgAdminToken` into the `Block Spammer` step. The token is scoped to block GitHub organization members, meaning it has
    elevated org-admin capabilities beyond the standard `GITHUB_TOKEN`. The workflow uses `pull_request_target` trigger (line
    4) — while the compliance checks themselves operate on PR metadata fetched via the API (not on PR HEAD code), the workflow
    runs in the base repo context with privileged secrets. If an earlier step in the same job is compromised (e.g., via a
    future unpin of `actions/github-script`), the `ORG_ADMIN_TOKEN` value becomes accessible in the runner environment via
    `process.env` or log injection. The token is a long-lived credential (not OIDC-scoped) and, if exfiltrated, grants organization-wide
    block/unblock capabilities.'
  evidence_summary: '`pr-compliance.yml:439` passes `ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}` as an environment variable
    into a step that makes a direct GitHub API call — a long-lived org-admin token is available in the runner''s environment
    for the duration of that step.'
  impact_description: Exfiltration of `ORG_ADMIN_TOKEN` grants an attacker org-admin capabilities on the `juice-shop` GitHub
    organization, enabling them to block legitimate contributors, modify org settings, or enumerate private org members.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: '`pr-compliance.yml` explicitly declares `permissions: pull-requests: write; issues: write` (lines 7-9),
    limiting the `GITHUB_TOKEN` scope. The `ORG_ADMIN_TOKEN` secret is only injected in the `Block Spammer` step (not the
    whole job). `actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd` is SHA-pinned.'
  mitigation_title: Isolate ORG_ADMIN_TOKEN usage to a separate job with minimal permissions and step-scoped injection
  remediation:
    effort: Medium
    steps:
    - 'Move the `Block Spammer` step to a separate job that has `needs: [check-compliance]` and only runs when `spam-detected`
      output is true. This isolates the org-admin token from all compliance-checking steps.'
    - Within that isolated job, inject `ORG_ADMIN_TOKEN` only as a `with` secret (if `actions/github-script` supports it)
      or immediately delete it after use via `unset orgAdminToken`.
    - Consider replacing the long-lived `ORG_ADMIN_TOKEN` with a GitHub App installation token that has a 1-hour TTL and scoped
      to only the `members` permission — GitHub Apps support fine-grained install tokens that expire automatically.
    - Add a GitHub Actions secret scan policy to detect if `ORG_ADMIN_TOKEN` is ever echoed or leaked in logs (`ACTIONS_STEP_DEBUG`
      and similar).
    code_example: "# Separate blocking into its own job:\n  block-spammer:\n    needs: [check-compliance]\n    if: needs.check-compliance.outputs.spamRating\
      \ >= 75\n    runs-on: ubuntu-latest\n    permissions:\n      id-token: write  # for GitHub App auth\n    steps:\n  \
      \    - name: Get App Token\n        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a #v2.1.0\n\
      \        id: app-token\n        with:\n          app_id: ${{ secrets.ORG_APP_ID }}\n          private_key: ${{ secrets.ORG_APP_PRIVATE_KEY\
      \ }}"
    reference: CWE-312
