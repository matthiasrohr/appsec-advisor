components:
- id: rest-api
  name: REST API (Express Routes)
  description: Core Express.js REST API handling ~111 endpoints including authentication, product catalog, user management,
    basket, orders, and admin functions. Contains SQL injection in login and search routes.
  tier: application
  paths:
