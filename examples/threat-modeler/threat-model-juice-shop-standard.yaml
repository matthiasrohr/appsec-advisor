  impact: Critical
  risk: Critical
  controls_in_place: Token expiry of 6 hours (meaningless when the signing key is publicly available).
  mitigation_title: Rotate RSA key pair, remove from source, and enforce server-side role store for admin claims
  remediation:
    effort: Medium
    steps:
