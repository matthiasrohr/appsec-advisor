- local_id: ci-cd-pipeline-007
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Missing Concurrency Limit on pull_request_target Workflow — pr-compliance.yml:4
  affected_parameter: concurrency
  scenario: The `pr-compliance.yml` workflow triggers on `pull_request_target` with event types `opened`, `edited`, `reopened`.
    No `concurrency:` group is configured. An attacker can programmatically open many PRs in rapid succession (or repeatedly
    edit a single PR's title/body) via the GitHub API to spawn unlimited parallel CI runs, each consuming a GitHub-hosted
    runner. GitHub.com public repos share a pool of 20 concurrent runners per repository. A coordinated burst of 20 simultaneous
    edits saturates the runner pool for the repository, delaying all legitimate CI runs (security scans, test jobs) and preventing
    the compliance workflow from processing genuine PRs in reasonable time. The `rebase.yml` workflow similarly lacks a `concurrency:`
    guard and triggers on `issue_comment`, allowing `/rebase` spam to consume runners.
  evidence_summary: '`pr-compliance.yml` has no `concurrency:` key at lines 1-8; the `pull_request_target` trigger processes
    `edited` events, which any PR author can fire repeatedly.'
  impact_description: Legitimate CI blocked; compliance checks for valid PRs delayed or starved of runners during coordinated
    PR-flood attack.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: GitHub enforces a global concurrent job limit per repository; the compliance workflow is fast (typically
    < 1 min). The spam detection logic may eventually close and label the PR.
  mitigation_title: Add `concurrency:` group to pr-compliance.yml and rebase.yml to cancel superseded runs
  remediation:
    effort: Low
    steps:
    - 'Add a `concurrency:` block to `pr-compliance.yml` scoped per PR number so that a new edit cancels the in-flight compliance
      check for the same PR: `concurrency: group: pr-compliance-${{ github.event.pull_request.number }}, cancel-in-progress:
      true`.'
    - Add a matching `concurrency:` block to `rebase.yml` scoped per issue number.
    - Consider restricting PR creation/editing rates via GitHub's abuse rate limit settings at the org level or using GitHub's
      built-in spam labels to prevent automated PR bursts.
    code_example: "# pr-compliance.yml — add after `on:` block:\nconcurrency:\n  group: pr-compliance-${{ github.event.pull_request.number\
      \ }}\n  cancel-in-progress: true"
    reference: CWE-400
  evidence:
  - file: .github/workflows/pr-compliance.yml
    line: 4
  evidence_check: verified
