  stride: Denial of Service
  cwe: CWE-400
  title: No Rate Limiting on WebSocket Message Handlers — registerWebsocketEvents.ts:33
  affected_parameter: null
  scenario: The four message event handlers (notification received, verifyLocalXssChallenge, verifySvgInjectionChallenge,
    verifyCloseNotificationsChallenge) impose no per-socket or per-IP rate limit. An attacker can flood any handler with high-frequency
    messages. The notification received handler calls notifications.findIndex() on each message, and the two verify handlers
    call utils.contains() and a regex match against attacker-supplied strings. Continuous flooding can saturate the event
    loop's single thread on the Node.js process, degrading response time for all concurrent HTTP and WebSocket clients. Combined
    with the lack of connection limits, a single attacker can open many concurrent connections and multiply the message rate.
  evidence_summary: No socket.on handler in registerWebsocketEvents.ts is guarded by a rate-limit counter or per-IP token
    bucket; handlers at lines 33, 40, 45, and 49 process every incoming message unconditionally.
  impact_description: A single attacker can degrade or halt the Node.js event loop by flooding WebSocket message handlers,
    causing denial of service for all application users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None.
  mitigation_title: Add per-socket rate limiting to WebSocket message handlers and cap concurrent Socket.IO connections
  remediation:
    effort: Low
    steps:
    - 'Install socket.io-rate-limiter or implement a per-socket token-bucket in the io.use() middleware: track message count
      per socket within a rolling 1-second window and disconnect sockets exceeding the threshold.'
    - Set io.engine.maxHttpBufferSize to a small value (e.g. 1e4 bytes) to limit payload size per message.
    - Set a maximum concurrent connection count via a counter in the connection and disconnect events, rejecting new connections
      when the limit is reached.
    code_example: "```typescript\nconst msgCount = new Map<string, number>()\nio.use((socket, next) => {\n  const count =\
      \ (msgCount.get(socket.id) ?? 0) + 1\n  msgCount.set(socket.id, count)\n  if (count > 100) return next(new Error('Rate\
      \ limit exceeded'))\n  setTimeout(() => msgCount.delete(socket.id), 1000)\n  next()\n})\n```"
    reference: CWE-400
  evidence:
