trust_boundaries:
- id: tb-1
  name: Public Internet / Browser
  description: Untrusted boundary between external actors (anonymous users, attackers, CTF participants) and the application.
    All HTTP/WebSocket connections from browsers and API clients cross this boundary. No TLS enforcement at app level — expected
    to be handled by reverse proxy in production.
  from: external
  to: express-backend
  enforcement: no rate limiting on most endpoints. Only /rest/user/reset-password has rate limiting. deployment-time perimeter
    controls out of scope for source-tree review
  crossing_protocols:
  - HTTP
  - HTTPS (reverse proxy)
  - WebSocket
- id: tb-2
  name: Browser / SPA Trust Boundary
  description: Client-side trust boundary between the Angular SPA and the user's browser environment. JWT stored in localStorage
    (accessible to any same-origin script). Client-side auth guards (LoginGuard) are bypassable — server-side enforcement
    is the only authoritative check.
  from: external
  to: angular-frontend
  enforcement: Angular LoginGuard (bypassable client-side). JWT validated server-side by express-jwt middleware.
  crossing_protocols:
  - JavaScript execution context
- id: tb-3
  name: Application / SQLite Data Tier
  description: Boundary between Express backend application logic and the embedded SQLite database. Crossed via Sequelize
    ORM calls. Raw SQL string interpolation in login and search routes bypasses ORM parameterization.
  from: express-backend
  to: sqlite-db
  enforcement: Sequelize ORM (partially bypassed by raw .query() calls in login.ts and search.ts). SQLite file stored in container
    filesystem.
  crossing_protocols:
  - Sequelize ORM
  - Raw SQL (sequelize.query)
- id: tb-4
  name: Application / MarsDB Document Store
  description: Boundary between Express backend and MarsDB in-process document store. Accessed via collection.find() with
    object queries — object injection (NoSQL injection) can occur when req.body fields are passed directly as query objects.
  from: express-backend
  to: marsdb-mongodb
  enforcement: None — direct collection API calls without input sanitization for query objects.
  crossing_protocols:
  - MarsDB JavaScript API (in-process)
- id: tb-5
  name: Application / External LLM Service
  description: Boundary between the Express chatbot route and the external Ollama LLM service (http://localhost:11434/v1).
    User-controlled input flows across this boundary as LLM prompt content without sanitization or sandboxing.
  from: express-backend
  to: external
  enforcement: None — no prompt sanitization, no output filtering. LLM response streamed directly to client.
  crossing_protocols:
  - HTTP/OpenAI-compatible API
- id: tb-6
  name: CI/CD / Source Repository
  description: Boundary between GitHub Actions workflows and the source repository / registry. Workflows with missing permissions
    blocks and unpinned third-party actions create supply chain attack surface — a compromised action can read secrets and
    exfiltrate them.
  from: ci-cd-pipeline
  to: external
  enforcement: CodeQL SAST runs on pull requests. No OIDC token pinning or artifact signing for npm packages.
  crossing_protocols:
  - GitHub Actions API
  - npm registry
  - Docker Hub API
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Missing
  evidence: lib/insecurity.ts:41 — crypto.createHash('md5') used for password storage. MD5 is cryptographically broken and
    rainbow-table precomputed. No bcrypt/argon2/scrypt.
  notes: RSA private key hardcoded at lib/insecurity.ts:21 — entire authentication token infrastructure compromised at rest.
- domain: Identity and Authentication
  control: Multi-Factor Authentication
  effectiveness: Partial
  evidence: models/user.ts:totpSecret field present. Routes for TOTP exist. However TOTP is optional and not enforced for
    admin accounts.
  notes: TOTP flow bypassed by SQL injection on the login endpoint before TOTP check is reached.
- domain: Session and Token Controls
  control: Session Token Issuance (JWT Based)
  effectiveness: Missing
  evidence: 'lib/insecurity.ts:52 — express-jwt({ secret: publicKey }) with no algorithms allowlist. lib/insecurity.ts:55
    — jws.verify() with no algorithm constraint. Vulnerable to alg:none and RS256/HS256 confusion attacks.'
  notes: Private key committed to source (lib/insecurity.ts:21) — tokens can be forged offline.
  audit_flags:
  - control_name_canonicalised
- domain: Session and Token Controls
  control: Token Storage
  effectiveness: Missing
  evidence: frontend/src/app/app.guard.ts:10 — localStorage.getItem('token'). localStorage is accessible to XSS payloads.
  notes: Cookie-based storage with HttpOnly not used.
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  evidence: lib/insecurity.ts:154 — isAccounting() checks JWT role claim. lib/insecurity.ts:165 — isDeluxe() verifies deluxeToken
    HMAC. However 17 routes use attacker-controlled UserId without ownership verification (AUTHZ-001).
  notes: Admin routes /rest/admin/* lack any authentication middleware.
- domain: Authorization Controls
  control: Object-Level Authorization (IDOR prevention)
  effectiveness: Missing
  evidence: routes/address.ts:11 — UserId taken from URL parameter without ownership check (AUTHZ-001, 17 instances). routes/basketItems.ts:68
    — basket item lookup by URL param without ownership filter (AUTHZ-002).
  notes: Pattern is systemic across address, basket, order, card routes.
- domain: Query Construction and Data Access Controls
  control: SQL Injection Prevention
  effectiveness: Missing
  evidence: routes/search.ts:23 — SELECT * FROM Products WHERE name LIKE '%${criteria}%'. routes/login.ts:34 — SELECT * FROM
    Users WHERE email = '${req.body.email}'. Raw string interpolation in Sequelize.query().
  notes: Both are intentional training vulnerabilities. Parameterized query examples exist in data/static/codefixes/.
- domain: Query Construction and Data Access Controls
  control: NoSQL Injection Prevention
  effectiveness: Missing
  evidence: data/mongodb.ts — MarsDB collection.find() calls receive unvalidated request body objects enabling query operator
    injection.
  notes: MarsDB in-process, not networked MongoDB — reduces network exposure but object injection remains.
- domain: Input Boundary Validation Controls
  control: XML External Entity (XXE) Prevention
  effectiveness: Missing
  evidence: lib/xml.ts:16 — ParseOption.XML_PARSE_NOENT | XML_PARSE_DTDLOAD | xmlRegisterFsInputProviders() enables full XXE
    including file:// entity resolution. Intentional training design.
  notes: External entity loading explicitly enabled via xmlRegisterFsInputProviders().
- domain: Input Boundary Validation Controls
  control: File Upload Validation
  effectiveness: Weak
  evidence: routes/fileUpload.ts — file type check present (checkFileType) but ZIP path traversal uses path.resolve() which
    may be bypassable. YAML parsed with js-yaml without sandboxing.
  notes: 'ZIP path traversal check at line ~35: absolutePath.includes(path.resolve(''.'')) — symlink attacks may bypass this.'
- domain: Output Encoding and Rendering Controls
  control: HTML Output Encoding / XSS Prevention
  effectiveness: Weak
  evidence: lib/insecurity.ts:58 — sanitizeHtml() (sanitize-html library). lib/insecurity.ts:59 — sanitizeLegacy() regex-based,
    used when persistedXssUserChallenge enabled. Email field setter bypasses sanitization for XSS challenge.
  notes: Dual sanitization paths — secure and intentionally-vulnerable — switched by challenge flags.
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy (CSP)
  effectiveness: Missing
  evidence: server.ts:186–197 — helmet.noSniff() and helmet.frameguard() applied. No helmet.contentSecurityPolicy() call.
    CSP header absent.
  notes: Angular serves inline scripts that would need CSP nonces.
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Missing
  evidence: server.ts:183 — app.use(cors()) with no options — allows all origins. Any cross-origin request can read API responses.
  notes: Open CORS combined with JWT in Authorization header means any website can make authenticated API calls if the user
    has a valid token.
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  effectiveness: Missing
  evidence: lib/insecurity.ts:21 — RSA private key hardcoded. lib/insecurity.ts:42 — HMAC key 'pa4qacea4VK9t9nGv7yZtwmj' hardcoded.
    server.ts:cookieParser('kekse') — cookie secret hardcoded. ctf.key committed to repository.
  notes: All secrets are intentionally committed for training purposes. No secrets manager integration.
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing
  effectiveness: Missing
  evidence: lib/insecurity.ts:41 — export const hash = (data) => crypto.createHash('md5').update(data).digest('hex'). MD5
    with no salt.
  notes: All passwords in the Users table are MD5 hashed without salt — full database dump is trivially crackable.
- domain: File Parser and Outbound Request Controls
  control: SSRF Prevention
  effectiveness: Missing
  evidence: routes/profileImageUrlUpload.ts — POST /profile/image/url fetches attacker-controlled URL without allowlist validation.
    No scheme restriction, no private IP block.
  notes: Enables access to internal services at http://localhost:*, http://169.254.169.254/ (cloud metadata), etc.
- domain: File Parser and Outbound Request Controls
  control: Open Redirect Prevention
  effectiveness: Missing
  evidence: routes/redirect.ts — GET /redirect?to=<url> redirects to any URL without allowlist. Enables phishing redirects
    from trusted juice-shop domain.
  notes: Allowlist check present as a challenge — disabled when challenge is unsolved.
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Pinning and Integrity
  effectiveness: Weak
  evidence: .github/workflows/ — 3 unpinned third-party actions (IAC-011). Dockerfile base image node:24 unpinned. package-lock.json
    committed. CycloneDX SBOM generated.
  notes: Third-party actions at tag (not SHA) — tag can be moved. SBOM generation is positive but unsigned.
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Pipeline Hardening
  effectiveness: Missing
  evidence: '14 of 16 workflows missing permissions blocks (IAC-010). 16 workflows missing contents: read scope (IAC-015).
    Workflow tokens default to read-write.'
  notes: Missing permissions blocks mean workflow tokens have default GITHUB_TOKEN permissions (write to repo, packages).
- domain: Real-time and Not Applicable Controls
  control: WebSocket Security
  effectiveness: Partial
  evidence: lib/startup/registerWebsocketEvents.ts:23 — Socket.IO on connection handler. Challenge notifications broadcast
    to all connected clients. No authentication required to establish Socket.IO connection.
  notes: Socket.IO used for server-to-client push only (challenge solved notifications). No sensitive data transmitted over
    WebSocket.
- domain: Operations Runtime and Supply Chain Controls
  control: Logging and Audit Trail
  effectiveness: Partial
  evidence: server.ts:338 — Morgan combined format to access.log. lib/logger.ts — Winston logger. /metrics endpoint exposes
    Prometheus metrics unauthenticated.
  notes: Access logs present. No structured security event logging. /metrics unauthenticated reveals internal telemetry.
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
