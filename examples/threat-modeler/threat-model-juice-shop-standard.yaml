    it on logout or compromise.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: JWT has a 6h expiry, but there is no server-side revocation, deny-list, or jti tracking; logout does
    not invalidate the token.
  mitigation_title: Add server-side token revocation with jti deny-list and shorter access-token TTL
  remediation:
    effort: Medium
    steps:
    - Include a unique jti claim in every issued token and check it against a server-side revocation store on each request;
      reject revoked jtis.
    - On logout (and on password/2FA change), add the active jti to the revocation list so the token is immediately unusable.
