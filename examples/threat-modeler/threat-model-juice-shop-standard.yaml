  threat_category_id: TH-10
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-522
  title: Derived Credential from OAuth Email Claim — oauth.component.ts:30
  affected_parameter: password
  scenario: When a user authenticates via Google OAuth, `oauth.component.ts:30-31` derives a password as `btoa(profile.email.split('').reverse().join(''))`.
    This password is then used to register or log in the user via the standard `/rest/user/login` endpoint. Since the derivation
    algorithm is deterministic and publicly visible in the SPA source code, any attacker who knows the target user's email
    address can compute this password and authenticate through the password login endpoint without going through OAuth at
    all. This converts the OAuth flow into a trivially bypassable authentication scheme — the OAuth identity provider adds
    no actual security.
  evidence_summary: Line 30 of oauth.component.ts computes `btoa(profile.email.split('').reverse().join(''))` and uses it
    as both registration password and login credential, making the password fully predictable from public identity data.
  impact_description: Any party knowing a victim's email can authenticate as that victim on the Juice Shop application without
    requiring the OAuth token or Google credential.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derived password is accepted by the standard login endpoint
  mitigation_title: Remove derived-password pattern; enforce OAuth-only login path with server-side token exchange
  remediation:
    effort: Medium
    steps:
    - Remove the `btoa(email.split('').reverse().join(''))` password derivation at oauth.component.ts:30.
    - 'Mark OAuth-registered accounts with a flag (e.g. `oauth_only: true`) in the user record; the backend should reject
      password-based login for these accounts.'
    - The OAuth flow should exchange the authorization code server-side and issue a Juice Shop session token directly, without
      creating a secondary password credential.
