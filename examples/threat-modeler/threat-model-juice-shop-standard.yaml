- local_id: data-persistence-005
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-312
  title: Payment card number stored as unencrypted INTEGER — models/card.ts:39
  affected_parameter: cardNum
  scenario: The `Card` model at `models/card.ts:39` declares `cardNum` as `DataTypes.INTEGER`. The full 16-digit PAN is stored
    in the SQLite database without any encryption, masking, or tokenization. A read of the `Cards` table — via SQLi, a compromised
    admin session querying `/api/Cards`, or direct access to the SQLite file at `data/juiceshop.sqlite` — exposes complete
    card numbers for all users. PCI-DSS requirement 3.4 mandates that PANs be rendered unreadable anywhere they are stored
    (truncation, tokenization, or strong encryption). The integer type also means the full number is presented in every ORM
    result set without server-side masking logic.
  evidence_summary: '`Card.cardNum` at `models/card.ts:39` is typed `DataTypes.INTEGER` with no encryption transform or masking
    setter — the full PAN is persisted in cleartext.'
  impact_description: Full payment card numbers for all users are readable by anyone with database read access, creating a
    direct PCI-DSS scope violation and enabling card fraud.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Sequelize `validate.min`/`max` enforces a valid 16-digit integer range but does not protect the stored
    value.
  mitigation_title: Store only last-4 digits of PAN plus a payment processor token; encrypt or truncate existing records
  remediation:
    effort: High
    steps:
    - Integrate a payment tokenization provider (e.g., Stripe, Braintree) — store only the provider-issued token and last
      4 digits of the PAN; never persist the full card number locally.
    - If local storage is required, change `cardNum` type to `DataTypes.STRING` and store a field-level AES-256-GCM encrypted
      value; manage the encryption key via an HSM or KMS rather than in application code.
    - Add a Sequelize `beforeCreate` hook that encrypts the PAN before persistence and a `afterFind` hook that decrypts only
      for display, returning a masked version (e.g., `**** **** **** 1234`) via the API.
    - Audit all `GET /api/Cards` responses to ensure the full card number is never serialized to the API response even when
      stored encrypted.
    code_example: null
    reference: CWE-312
  evidence:
  - file: models/card.ts
    line: 39
  evidence_check: verified
  controls_absent_evidence: []
