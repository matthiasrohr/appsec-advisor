  title: Stored XSS — routes/saveLoginIp.ts:18
  affected_parameter: True-Client-IP
  scenario: '`routes/saveLoginIp.ts:18` reads `req.headers[''true-client-ip'']` and, when the `httpHeaderXssChallenge` is
    enabled, stores the value directly into `UserModel.lastLoginIp` without sanitization. When the challenge flag is disabled,
    `security.sanitizeSecure()` is called — but this branch exists specifically to permit the XSS payload through when challenges
    are active. A production-intent deployment that enables challenge mode (or any deployment where `lastLoginIp` is later
    rendered in an admin interface) propagates the stored `True-Client-IP` value containing `<iframe src="javascript:alert(\`xss\`)">`
    into the DOM. The header value is attacker-controlled — no middleware validates its content before the DB write.'
  evidence_summary: '`saveLoginIp.ts:18` stores the raw `True-Client-IP` header into the Users table without sanitization
    when `httpHeaderXssChallenge` is enabled, and the sanitization branch is explicitly bypassed for that code path.'
  impact_description: An attacker who can trigger admin viewing of the `lastLoginIp` field achieves stored XSS in the admin
    context — session hijack or admin credential exfiltration.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: '`security.sanitizeSecure()` is applied when the XSS challenge is disabled, but the challenge-enabled
    code path deliberately skips sanitization.'
  mitigation_title: Validate True-Client-IP format as an IP address before database write
  remediation:
    effort: Low
    steps:
    - 'Regardless of challenge state, validate `lastLoginIp` is a valid IPv4 or IPv6 address before persisting: use `net.isIP(lastLoginIp)`
      (Node.js built-in) and reject or truncate any value that does not match.'
    - Do not use client-supplied headers (`True-Client-IP`, `X-Forwarded-For`) to record the login IP in security-sensitive
      fields; prefer `req.socket.remoteAddress` or `req.ip` (trust-proxy resolved).
    - When rendering `lastLoginIp` in any UI, apply output encoding — treat it as untrusted data even if it passed format
      validation.
