  stride: Denial of Service
  cwe: CWE-307
  title: Rate Limit Bypass via X Forwarded For Spoofing server.ts:346
  affected_parameter: X-Forwarded-For header
  scenario: 'The application enables `trust proxy` globally (`app.enable(''trust proxy'')`) and then configures rate limiting
    on `/rest/user/reset-password` with a custom key generator: `keyGenerator ({ headers, ip }) { return headers[''X-Forwarded-For'']
    ?? ip }`. Because `trust proxy` is enabled without a hop count (it should be set to the number of trusted reverse proxy
    hops), Express trusts the `X-Forwarded-For` header from any client. The keyGenerator reads this header directly, so an
    attacker can rotate values (`X-Forwarded-For: 1.1.1.1`, `1.1.1.2`, etc.) to bypass the 100-request-per-5-minute rate limit.
    Login (`POST /rest/user/login`) has no rate limit at all. This enables unlimited brute-force against both endpoints.'
  evidence_summary: Line 346 in `server.ts` uses `headers['X-Forwarded-For']` as the rate-limit key without verifying that
    the header originates from a trusted proxy.
  impact_description: An attacker performs unlimited brute-force attempts against password reset and login endpoints, leading
    to account compromise at scale.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Rate limit of 100 requests per 5 minutes exists for `/rest/user/reset-password` but is trivially bypassed.
    No rate limit on `/rest/user/login`.
  mitigation_title: Fix X-Forwarded-For-based rate limit key and add rate limiting to login endpoint
  remediation:
    effort: Low
    steps:
    - Change `app.enable('trust proxy')` to `app.set('trust proxy', 1)` (or the actual number of trusted proxy hops) so Express
      only trusts the rightmost IP from that many proxies.
    - Remove the custom `keyGenerator` from the rate limit config — the default `req.ip` will correctly reflect the real client
      IP after the proxy trust is corrected.
    - 'Add an equivalent `rateLimit({ windowMs: 5 * 60 * 1000, max: 10 })` middleware to `POST /rest/user/login`.'
    - Consider adding account lockout logic (5 failed attempts → 15-minute lockout) in addition to rate limiting.
    code_example: '```typescript

      app.set(''trust proxy'', 1); // trust first proxy hop only

      const authRateLimit = rateLimit({ windowMs: 5 * 60 * 1000, max: 10 });

      app.post(''/rest/user/login'', authRateLimit, login());

      app.use(''/rest/user/reset-password'', rateLimit({ windowMs: 5 * 60 * 1000, max: 10 }));

      ```'
    reference: CWE-307
