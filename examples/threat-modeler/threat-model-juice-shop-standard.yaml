  title: Hardcoded RSA Private Key (lib/insecurity.ts:23)
  affected_parameter: null
  scenario: The RSA private key used to sign all application JWTs is hardcoded verbatim in lib/insecurity.ts at line 23 as
    a multi-line PEM string. Any actor with read access to the source repository — including third-party contributors, CI/CD
    workers, code-review tools, and supply-chain components — obtains the signing key. With this key, an attacker can mint
    valid RS256 tokens for any user identity or privilege level. Because the B2B endpoint and all REST endpoints share the
    same JWT key pair, a single key leak compromises the entire authentication fabric. The key cannot be rotated without a
    code change and redeployment.
  evidence_summary: The full RSA-1024 private key PEM is assigned to the `privateKey` constant at module load time with no
    environment-variable indirection.
  impact_description: Any actor who reads the source code can forge valid RS256 tokens for admin or any user account, fully
    bypassing authentication on all protected endpoints.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the key is available in plaintext to anyone with repo access.
  mitigation_title: Move RSA private key to an environment variable or secrets manager, remove from source
  remediation:
    effort: Medium
    steps:
    - Remove the hardcoded `privateKey` string from lib/insecurity.ts and replace with `process.env.JWT_PRIVATE_KEY` (or load
      from a mounted secret file at startup).
    - Generate a new 2048-bit RSA key pair using `openssl genrsa -out jwt.key 2048` and store the private key in the deployment
      secrets manager (e.g., AWS Secrets Manager, HashiCorp Vault, Kubernetes Secret).
    - Update the corresponding public key reference and rotate all active JWT tokens to invalidate any forged tokens using
      the old key.
    - Add a startup guard that exits the process if `JWT_PRIVATE_KEY` is not set, preventing deployment without a configured
      key.
    code_example: '// lib/insecurity.ts — corrected

