  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded Cryptographic Key — lib/insecurity.ts:21
  scenario: 'The 2048-bit RSA private key is embedded as a string literal at `lib/insecurity.ts:21`. Any actor who clones
    the repository — or reads the file in any environment — can call `security.authorize({ data: { role: ''admin'', email:
    ''attacker@example.com'' } })` and receive a fully valid RS256 JWT accepted by all protected endpoints. Key rotation requires
    a code change and full redeployment; there is no out-of-band key management path.'
  evidence_summary: '`lib/insecurity.ts:21` assigns the full PEM-encoded RSA private key as a string literal: `const privateKey
    = ''[PEM PRIVATE KEY — REDACTED]\r\nMIICXA...''`.'
  impact_description: Any actor with repository read access can sign arbitrary JWTs for any identity and role, permanently
    and without detection.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the private key is in plaintext source committed to the public repository.
  mitigation_title: Load JWT signing key from environment variable or secrets manager and remove hardcoded value
  remediation:
    effort: Medium
    steps:
    - Remove the private key string literal from `lib/insecurity.ts:21`. Read the key from an environment variable (`process.env.JWT_PRIVATE_KEY`)
      or a secrets manager (AWS Secrets Manager, HashiCorp Vault) at startup.
    - Rotate the key immediately — the current key is permanently compromised and must be revoked. All existing tokens signed
      with it will need to be invalidated.
    - Store only the public key in `encryptionkeys/jwt.pub` (already done); ensure the private key is never committed to version
      control by adding a `.gitignore` rule and a pre-commit hook that detects PEM headers.
    - Add a startup check that fails fast with a clear error if the private key environment variable is absent.
    code_example: "// lib/insecurity.ts — load from env\nconst privateKey = process.env.JWT_PRIVATE_KEY\n  ? Buffer.from(process.env.JWT_PRIVATE_KEY,\
      \ 'base64').toString('utf8')\n  : (() => { throw new Error('JWT_PRIVATE_KEY env var is required') })()"
    reference: CWE-321
