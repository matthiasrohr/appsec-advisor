  cwe: CWE-522
  title: OAuth Implicit Flow Token in URL Fragment — app.routing.ts:286
  affected_parameter: access_token
  scenario: '`app.routing.ts:285-286` detects OAuth callbacks by matching `#access_token=` in `window.location.href` and immediately
    passes the token to `UserService.oauthLogin()`. This is the OAuth 2.0 implicit grant — the access token is embedded in
    the URL fragment. The token appears in the browser''s session history, can be read by any third-party script loaded on
    the page (XSS), and may leak via `Referer` headers to analytics or CDN origins. There is no `state` parameter anywhere
    in the OAuth initiation or callback flow, so CSRF against the OAuth endpoint is trivially possible: an attacker constructs
    a redirect URL with their own `access_token` hash fragment and tricks the victim into navigating to it, logging the victim
    in as the attacker''s Google account. No PKCE and no `nonce` are present.'
  evidence_summary: '`oauthMatcher` at `app.routing.ts:285` checks `path.includes(''#access_token='')`, routing any URL carrying
    an implicit grant token directly to `OAuthComponent` without state validation.'
  impact_description: An attacker can steal the OAuth access token from browser history or XSS, or CSRF the OAuth callback
    to log a victim in under an attacker-controlled identity.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no state parameter, no PKCE, no nonce, no redirect_uri validation visible in the SPA.
  mitigation_title: Replace implicit flow with authorization code + PKCE and validate state parameter
  remediation:
    effort: High
    steps:
    - Switch the Google OAuth integration to the authorization code flow with PKCE (`response_type=code`, `code_challenge_method=S256`).
      The SPA generates a random `code_verifier`, hashes it as `code_challenge`, stores `code_verifier` in `sessionStorage`,
      and sends `code_challenge` in the redirect.
    - Generate a cryptographically random `state` value per authorization request, store it in `sessionStorage`, and verify
      it exactly on callback before calling `UserService.oauthLogin()`. Reject callbacks where `state` is absent or mismatched.
    - Remove the `#access_token=` URL-fragment path in `app.routing.ts` entirely. After code exchange, keep the access token
      only in memory (a module-scoped variable or NgRx store state), never in `localStorage` or the URL.
    - Restrict the Google OAuth `redirect_uri` to the exact production origin in the Google Cloud Console — disallow wildcard
      or subdomain matches.
    code_example: '// In OAuth initiation (Angular service)

      const verifier = crypto.randomUUID() + crypto.randomUUID();

      sessionStorage.setItem(''pkce_verifier'', verifier);

      const challenge = btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.digest(''SHA-256'', new TextEncoder().encode(verifier))))).replace(/\+/g,''-'').replace(/\//g,''_'').replace(/=/g,'''');

      const state = crypto.randomUUID();

      sessionStorage.setItem(''oauth_state'', state);

      window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?response_type=code&code_challenge=${challenge}&code_challenge_method=S256&state=${state}&...`;'
    reference: CWE-522
