  cwe: CWE-287
  title: OAuth-Derived Password Predictable from Email Claim — oauth.component.ts:46
  affected_parameter: password
  scenario: After the OAuth implicit flow callback, `oauth.component.ts:46` derives a local Juice Shop password as `btoa(profile.email.split('').reverse().join(''))`
    — a deterministic reversible encoding of the user's email address. This password is then used to register or log in the
    user via the standard password-based endpoint. Any party who knows (or can enumerate) a user's email address can compute
    this password without any OAuth interaction, call `/rest/user/login` directly, and authenticate as that user. The OAuth
    flow becomes a redundant path around the intended identity provider while creating a trivially exploitable parallel authentication
    mechanism with a predictably weak credential.
  evidence_summary: '`login()` at line 46 calls `btoa(profile.email.split('''').reverse().join(''''))` to derive the password,
    which is sent to the standard login endpoint — making every OAuth account accessible via the password endpoint with a
    computable secret.'
  impact_description: An attacker who knows any user's email (e.g. from the admin panel or public profiles) can authenticate
    as that user without OAuth interaction, achieving full account takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derived password is inherent to this implementation.
  mitigation_title: Replace email-derived password with a securely random credential or OAuth-only account type in oauth.component.ts
  remediation:
    effort: High
    steps:
    - Generate a cryptographically random 32-byte password server-side when creating an OAuth-linked account; never derive
      it from the email claim.
    - 'Mark OAuth-created accounts as `oauth_only: true` in the database and reject password-based login for those accounts
      at the backend login endpoint.'
    - If OAuth and password login must coexist for the same account, require explicit account linking with user consent, not
      silent derivation.
    code_example: null
    reference: CWE-287
