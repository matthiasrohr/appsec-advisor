- local_id: ci-cd-pipeline-008
  threat_category_id: TH-14
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: No concurrency group on push-triggered matrix jobs enables CI — ci.yml:1
  affected_parameter: 'concurrency: (absent)'
  scenario: 'The ci.yml workflow triggers on every push to all non-excluded branches. The test and api-test jobs run a 6-job
    matrix (2 OS x 3 Node versions) each, and e2e runs a 4-job matrix. A contributor or attacker with repository write access
    (or a bot that creates automated commits) can trigger dozens of concurrent workflow runs by pushing rapidly, consuming
    all available GitHub Actions minutes for the organization. Without a `concurrency:` group with `cancel-in-progress: true`,
    each push spawns a full new matrix run without cancelling the still-running previous one. On the public juice-shop repository
    this consumes community CI budget and can delay legitimate security-relevant CI checks (including the ZAP scan).'
  evidence_summary: ci.yml defines no `concurrency:` block at workflow or job level, confirmed by reading the full file; every
    push triggers a complete new matrix run.
  impact_description: Rapid pushes by any contributor exhaust GitHub Actions CI minutes, delaying or blocking legitimate builds
    and security-scan jobs.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: 'The expensive docker and heroku jobs are conditioned on `github.event_name == ''push''` and specific
    branches, reducing some waste. Test jobs have `max_attempts: 3` retry but no cancellation.'
  mitigation_title: Add concurrency group with cancel-in-progress to cancel superseded workflow runs on new push
  remediation:
