- local_id: data-persistence-002
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-311
  title: Sensitive columns stored unencrypted at rest — models/card.ts:40
  affected_parameter: cardNum
  scenario: The SQLite database is persisted as a plain unencrypted file at data/juiceshop.sqlite (models/index.ts:41), and
    no model applies field-level encryption (grep across models/ for encrypt|crypto|cipher|AES returns zero hits). The Card
    model stores cardNum as a raw INTEGER full primary account number with no truncation, masking, or encryption (models/card.ts),
    the User model stores totpSecret in cleartext (user.ts:113), and Feedback/Address/Complaint models hold free-text PII
    in cleartext. Anyone able to read the database file — a malicious co-tenant process, a stolen backup, a container volume
    snapshot, or an LFI/path-traversal that reaches data/juiceshop.sqlite — recovers full card numbers, the second-factor
    seed (defeating 2FA), and customer PII directly, with no cryptographic barrier.
  evidence_summary: models/card.ts declares cardNum as a plain INTEGER with only range validation, models/index.ts:41 writes
    an unencrypted SQLite file, and no model in models/ contains any encryption primitive.
  impact_description: Direct recovery of full payment card numbers, TOTP seeds, and customer PII from any read of the database
    file or backup, with no decryption step required.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — encryption_at_rest is explicitly absent; only OS file permissions protect the SQLite file.
  mitigation_title: Encrypt the SQLite file and apply field-level encryption to card numbers and TOTP secrets
  remediation:
    effort: High
    steps:
    - Adopt an encrypted SQLite engine (SQLCipher / better-sqlite3-sqlcipher) so the data/juiceshop.sqlite file is AES-256
      encrypted at rest, with the key supplied from a secrets manager or KMS at process start — never committed to the repo.
    - Apply application-layer field encryption (e.g. AES-256-GCM via Node crypto) in the Card model setter so cardNum is never
      persisted in cleartext; store only a masked last-4 for display.
    - Encrypt totpSecret (models/user.ts:113) the same way and restrict OS file permissions on the database to the service
      account (chmod 600, dedicated non-root user).
    code_example: "// Card model setter\nimport crypto from 'crypto'\nset (cardNum: string) {\n  const iv = crypto.randomBytes(12)\n\
      \  const c = crypto.createCipheriv('aes-256-gcm', KEY, iv)\n  const enc = Buffer.concat([c.update(cardNum, 'utf8'),\
      \ c.final()])\n  this.setDataValue('cardNum', iv.toString('hex') + ':' + enc.toString('hex') + ':' + c.getAuthTag().toString('hex'))\n\
      }"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
    blueprint: null
