  title: ZIP Slip Path Traversal — routes/fileUpload.ts:34
  affected_parameter: file
  scenario: The ZIP extraction handler at routes/fileUpload.ts:27-37 iterates over ZIP entries and constructs `absolutePath
    = path.resolve('uploads/complaints/' + entry.path)`. The guard at line 33 checks `absolutePath.includes(path.resolve('.'))`
    which passes for any path within the current working directory tree — including `../../ftp/legal.md` which resolves to
    `ftp/legal.md` under cwd. An attacker can upload a ZIP containing an entry with path `../ftp/legal.md` to overwrite arbitrary
    files within the application directory, including source files, configuration, or the FTP directory.
  evidence_summary: routes/fileUpload.ts:34 calls `fs.createWriteStream('uploads/complaints/' + fileName)` where `fileName`
    is `entry.path` from the ZIP archive; the contains-check guard at line 33 does not enforce that the resolved path stays
    within `uploads/complaints/`.
  impact_description: An attacker can overwrite arbitrary files within the application's working directory, potentially replacing
    configuration, source modules, or FTP-served files.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Guard checks `absolutePath.includes(path.resolve('.'))` but this allows traversal within the cwd subtree.
  mitigation_title: Enforce that extracted ZIP entries resolve within the target directory before writing
  remediation:
    effort: Low
    steps:
    - 'Replace the guard at routes/fileUpload.ts:33 with a strict prefix check: `if (!absolutePath.startsWith(path.resolve(''uploads/complaints'')
      + path.sep)) continue` — this prevents any path that escapes the complaints subdirectory.'
    - 'Additionally sanitise `entry.path` with `path.basename()` to strip any leading `../` segments before constructing absolutePath:
      `const safeName = path.basename(entry.path)`.'
    code_example: '// routes/fileUpload.ts — safe ZIP extraction

      const targetDir = path.resolve(''uploads/complaints'')

      const safeName = path.basename(entry.path)

      const absolutePath = path.join(targetDir, safeName)

      if (!absolutePath.startsWith(targetDir + path.sep)) continue

      await pipeline(entry.stream(), fs.createWriteStream(absolutePath))'
    reference: CWE-22
