- id: angular-spa
  name: Angular SPA Frontend
  description: Angular 20 single-page application served as static files. Contains DomSanitizer bypass patterns and client-side
    XSS vulnerabilities.
  tier: client
  paths:
  - frontend/src/**
  - frontend/dist/**
  technology: Angular 20, TypeScript 5
