  scenario: 'Both `nftMint.ts:18` and `web3Wallet.ts:20` construct the Alchemy WebSocket URL by interpolating `process.env.ALCHEMY_API_KEY`
    directly into the URL string: `wss://eth-sepolia.g.alchemy.com/v2/${process.env.ALCHEMY_API_KEY ?? ''''}`. The WebSocket
