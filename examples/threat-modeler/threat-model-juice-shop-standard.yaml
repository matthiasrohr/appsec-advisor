  title: Missing Authentication Event Audit Log — routes/login.ts:18
  affected_parameter: null
  scenario: '`routes/login.ts` emits no structured log entry on successful or failed authentication. `routes/resetPassword.ts`
    similarly writes nothing to an audit trail on password change. The only record of login events is the HTTP access log
    written by Morgan (`combined` format at `server.ts:338`), which records IP, timestamp, and URL but not the email address
    or user ID involved. After a credential compromise is discovered, the operator cannot determine which accounts were accessed,
    from which IPs, or whether the SQLi bypass was used — the HTTP log shows a 200 response to `POST /rest/user/login` with
    no further detail.'
  evidence_summary: No `logger.info()` or equivalent structured log call appears in `routes/login.ts` or `routes/resetPassword.ts`
    — confirmed by grepping for log/audit/winston in those files.
  impact_description: Credential abuse and account compromise go undetected; post-incident forensics cannot reconstruct the
    authentication timeline.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: HTTP access log (Morgan `combined`) captures URL and status but not user identity.
  mitigation_title: Emit structured audit log entries on login success, login failure, and password reset
  remediation:
    effort: Low
    steps:
    - 'Add a structured logger (e.g. `winston` with JSON transport) and emit `{ event: ''login_success'', userId, email, ip:
      req.ip, timestamp }` inside `afterLogin()` at `routes/login.ts:19`.'
    - 'Emit `{ event: ''login_failure'', email: req.body.email, ip: req.ip, reason: ''bad_credentials'' }` in the `else` branch
      at line 50.'
    - 'Emit `{ event: ''password_reset'', userId: data.UserId, ip: req.ip }` in `routes/resetPassword.ts:43` after a successful
      update.'
    - Route audit logs to an append-only sink (file with log-rotation, or a SIEM) that application code cannot modify.
    code_example: "// routes/login.ts — afterLogin function\nimport logger from '../lib/logger'\nfunction afterLogin(user,\
      \ res, next) {\n  logger.info({ event: 'login_success', userId: user.data.id,\n    email: user.data.email, ip: req.ip\
