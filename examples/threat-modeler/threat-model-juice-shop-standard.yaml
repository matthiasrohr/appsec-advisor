  title: Server-Side Request Forgery — routes/profileImageUrlUpload.ts:24
  affected_parameter: imageUrl
  scenario: The profile image URL upload handler at routes/profileImageUrlUpload.ts:24 passes `req.body.imageUrl` directly
    to `fetch(url)` without validating the scheme, hostname, or IP range. An authenticated attacker can supply `http://169.254.169.254/latest/meta-data/`
