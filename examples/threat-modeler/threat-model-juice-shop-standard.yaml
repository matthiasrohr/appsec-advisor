- local_id: socketio-server-003
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: No connection rate limit on Socket.IO upgrade endpoint
  affected_parameter: WebSocket upgrade /socket.io
  scenario: The Socket.IO server is instantiated at line 20 with only a CORS origin restriction and no connection-count cap,
    rate limiting, or upgrade throttle. An anonymous attacker can open thousands of simultaneous WebSocket connections from
    a single IP or distributed botnet. Each new connection triggers the `notifications.forEach` loop (line 30) — if the notification
    array is large, this loop executes once per new connection, creating a linear amplification factor. Sustained connection
    flooding can exhaust the Node.js event-loop and OS socket descriptors, degrading or denying service to legitimate users
    accessing the HTTP and WebSocket endpoints sharing the same Express process.
  evidence_summary: Line 20 constructs the Socket.IO Server with no `maxHttpBufferSize`, `connectTimeout`, or per-IP connection
    throttle; line 30 executes an unbounded `forEach` on every new connection.
  impact_description: Sustained WebSocket connection flood exhausts server file descriptors and event-loop capacity, causing
    full service denial for all HTTP and WebSocket clients.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None identified.
  mitigation_title: Add per-IP connection rate limiting and a connection count cap to the Socket.IO server
  remediation:
    effort: Low
    steps:
    - 'Apply `express-rate-limit` (or `socket.io`''s built-in `allowRequest` hook) to limit WebSocket upgrade requests per
      IP: `io.engine.on(''connection_error'', ...) ` combined with a custom `allowRequest` function that tracks per-IP upgrade
      counts using a sliding-window counter.'
    - 'Set `maxHttpBufferSize` on the Socket.IO server constructor to cap the size of incoming event payloads (default 1 MB
      is reasonable; lower for this app): `new Server(server, { cors: {...}, maxHttpBufferSize: 1e5 })`.'
    - 'Consider setting a `connectTimeout` (default 45 s) and ensuring inactive sockets are disconnected: `new Server(server,
      { connectTimeout: 10000 })`.'
    - If the application supports multiple users, convert the shared `notifications` array to a per-user store so the `forEach`
      loop at connection time is bounded to one user's entries rather than all pending notifications.
    code_example: "```typescript\nconst io = new Server(server, {\n  cors: { origin: 'http://localhost:4200' },\n  maxHttpBufferSize:\
      \ 1e5,\n  connectTimeout: 10000\n})\n// Per-IP upgrade rate limiting\nconst connectCounts = new Map<string, number>()\n\
      io.engine.use((req: any, res: any, next: any) => {\n  const ip = req.socket.remoteAddress\n  const count = (connectCounts.get(ip)\
      \ ?? 0) + 1\n  connectCounts.set(ip, count)\n  if (count > 50) return res.destroy()\n  setTimeout(() => connectCounts.set(ip,\
      \ Math.max(0, (connectCounts.get(ip) ?? 1) - 1)), 60000)\n  next()\n})\n```"
    reference: CWE-400
  evidence:
