  cwe: CWE-94
  title: Sandbox Escape via Unsafe Expression Evaluation (routes/b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: 'The `b2bOrder()` handler passes the HTTP request body field `orderLinesData` directly to `safeEval()` from the
    notevil package inside a Node.js vm context (routes/b2bOrder.ts line 23). notevil is known to be bypassable via prototype
    pollution: an attacker crafts an `orderLinesData` expression that writes to `Object.prototype.__proto__` or `constructor.prototype`,
    poisoning properties that notevil''s runtime subsequently accesses. Once prototype properties are poisoned, the restriction
    checks notevil performs on evaluated code no longer function, allowing the attacker to call `process.mainModule.require(''child_process'').execSync(...)`
    or equivalent, achieving arbitrary server-side code execution. The vm context sandboxing itself does not provide isolation
    in Node.js — `vm.createContext` shares the same V8 isolate and prototype chain as the host process. A valid (or forged)
    JWT is the only prerequisite, which is trivially obtained given threat b2b-api-001.'
  evidence_summary: User-controlled `body.orderLinesData` is passed without sanitization to `safeEval()` within a Node.js
    vm context that shares V8 prototype objects with the host process.
  impact_description: Full server-side remote code execution under the Node.js process identity, enabling data exfiltration,
    persistence, lateral movement, and complete application takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: notevil is used as a sandboxed evaluator; a 2-second vm timeout (line 23) limits infinite-loop DoS. Neither
    control prevents prototype-pollution-based sandbox escape.
  mitigation_title: Remove dynamic expression evaluation from order processing; replace with a strict numeric parser
  remediation:
    effort: Medium
    steps:
    - 'Remove the `safeEval(orderLinesData)` call entirely. Replace order-line total computation with a strict schema-validated
      input: accept a JSON array of `{quantity: number, unitPrice: number}` objects and compute totals with `quantity * unitPrice`
      in application code.'
    - If an expression DSL is genuinely required, use a purpose-built arithmetic parser (e.g., `mathjs` with a restricted
      scope that exposes only numeric constants and no property access) rather than a general-purpose JS evaluator.
    - Add a JSON Schema validation step before any expression evaluation that rejects inputs containing `__proto__`, `constructor`,
      `prototype`, or bracket-notation property access.
    - Pin the notevil dependency to a specific SHA256 digest in package-lock.json and enable Dependabot security alerts for
      it until removal is complete.
    code_example: "// Replace dynamic eval with strict computation\nconst orderLines: Array<{quantity: number, unitPrice:\
      \ number}> = JSON.parse(orderLinesData)\nif (!Array.isArray(orderLines)) throw new Error('Invalid order data')\nconst\
      \ total = orderLines.reduce((sum, line) => {\n  if (typeof line.quantity !== 'number' || typeof line.unitPrice !== 'number')\
      \ throw new Error('Invalid line')\n  return sum + (line.quantity * line.unitPrice)\n}, 0)"
    reference: CWE-94
  evidence:
  - file: routes/b2bOrder.ts
    line: 23
  evidence_check: verified
