  stride: Elevation of Privilege
  cwe: CWE-502
  title: Unsafe YAML Deserialization — routes/fileUpload.ts:117
  affected_parameter: uploaded .yml/.yaml file body
  scenario: An unauthenticated attacker uploads a YAML file to `/file-upload` containing a js-yaml `!!js/function` tag or
    a specially crafted YAML anchor chain. At `fileUpload.ts:117`, `yaml.load(data)` is called (the unsafe loader that processes
    arbitrary JavaScript type tags). In js-yaml versions prior to 4.0, `!!js/function` allows arbitrary JavaScript execution
    on the server. Even in js-yaml 4.x where `!!js/function` was removed, crafted YAML with deep anchor expansion causes memory
    amplification that can bring down the Node.js process. The vm sandbox timeout at 2000ms applies to the `vm.runInContext()`
    call itself, but `yaml.load(data)` executes synchronously BEFORE the vm.runInContext wrapper — the timeout does not protect
    against in-process YAML bomb expansion.
  evidence_summary: js-yaml `yaml.load()` at fileUpload.ts:117 is the unsafe loader variant; it processes YAML inside a vm.runInContext
    call that provides a vm timeout, but the yaml.load() expansion occurs in the synchronous call stack before the vm timeout
    can fire.
  impact_description: Server-side code execution (older js-yaml) or process crash via YAML bomb (any version), both triggered
    without authentication.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: vm.createContext sandbox with 2000ms timeout. The `catch` block at line 122 catches `Invalid string length`
    (YAML bomb) but does not prevent in-process memory expansion.
  mitigation_title: Replace yaml.load() with yaml.safeLoad() or a schema-restricted YAML parser
  remediation:
    effort: Low
    steps:
    - 'Replace `yaml.load(data)` with `yaml.load(data, { schema: yaml.JSON_SCHEMA })` which restricts parsing to JSON-compatible
      types and disables JS-specific tags including `!!js/function`.'
    - Alternatively use `yaml.safeLoad(data)` (js-yaml 3.x) or validate against a strict Zod/Joi schema after parsing to reject
      unexpected types.
    - Add an upload size pre-check that rejects files above a configured threshold (e.g., 50KB for YAML) before passing to
      the parser, to limit YAML bomb amplification potential.
    code_example: "// Restrict to JSON-compatible YAML types only\nconst yamlString = vm.runInContext(\n  'JSON.stringify(yaml.load(data,\
      \ { schema: yaml.JSON_SCHEMA }))',\n  sandbox, { timeout: 2000 }\n)"
    reference: CWE-502
