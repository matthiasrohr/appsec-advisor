  title: Open redirect allowlist bypassed — routes/redirect.ts:16
  affected_parameter: to
  scenario: The redirect allowlist check at lib/insecurity.ts:136 uses `url.includes(allowedUrl)` rather than `url.startsWith(allowedUrl)`
    or exact equality. An attacker crafts a redirect URL such as `https://evil.com/?ref=https://github.com/juice-shop/juice-shop`,
    which passes the allowlist because it *contains* the allowed GitHub URL as a substring. The victim who clicks a link like
    `/redirect?to=https://evil.com/?ref=https://github.com/juice-shop/juice-shop` is sent to `evil.com`, not GitHub. This
    enables phishing, OAuth token harvesting (if the attacker mirrors an OAuth callback that includes the domain in a query
    parameter), and session-fixation attacks targeting users who trust the Juice Shop domain.
  evidence_summary: lib/insecurity.ts:136 evaluates `allowed = allowed || url.includes(allowedUrl)` — a substring test that
    accepts any URL whose query string or path fragment contains an allowlisted domain.
  impact_description: Victim browsers are redirected to attacker-controlled sites under the false appearance of a trusted
    Juice Shop redirect, enabling credential phishing or OAuth state theft.
  likelihood: High
