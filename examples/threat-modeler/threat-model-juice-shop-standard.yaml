    into the SELECT string: `SELECT * FROM Products WHERE ((name LIKE ''%${criteria}%'' OR description LIKE ''%${criteria}%'')
    AND deletedAt IS NULL) ORDER BY name`. No parameterization or prepared statement is used. An unauthenticated attacker
    submits a UNION-based payload (e.g., `q='')) UNION SELECT * FROM Users--`) to read all rows from the Users table, recovering
