  title: Rate Limit Bypass — server.ts:346
  affected_parameter: X-Forwarded-For
  scenario: 'The `rateLimit` middleware on `/rest/user/reset-password` at `server.ts:343` uses a custom key generator: `headers[''X-Forwarded-For'']
    ?? ip`. `X-Forwarded-For` is an attacker-controlled request header. An attacker cycles through arbitrary values (`1.2.3.4`,
    `1.2.3.5`, …) to get a fresh 100-request quota with each value. Combined with the weak security question answers, this
    enables a brute-force attack against `POST /rest/user/reset-password` that exhausts the answer space for short string
    answers before the account owner notices.'
  evidence_summary: '`keyGenerator` at `server.ts:346` reads `headers[''X-Forwarded-For'']` directly rather than using `req.ip`
    from the trusted-proxy chain, making the rate limit key attacker-controlled.'
  impact_description: Attacker effectively removes the rate limit on password reset, enabling unlimited attempts to brute
    force a user's security answer and take over the account.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Rate limit middleware is present but its key is attacker-controllable.
  mitigation_title: Use req.ip instead of X-Forwarded-For in the reset-password rate limit key generator
  remediation:
    effort: Low
    steps:
    - Remove the custom `keyGenerator` from the `rateLimit()` call at `server.ts:343`–`347`, or change it to `({ ip }) =>
      ip`. Express sets `req.ip` using the trusted proxy chain (`app.set('trust proxy', N)`) rather than the raw header.
    - Configure `app.set('trust proxy', 1)` (or the correct hop count for the deployment's proxy topology) so that `req.ip`
      reflects the real client IP behind a single load balancer, but still cannot be spoofed from the internet.
    - Add a rate limit on `POST /rest/user/login` as well (currently absent — see auth-007).
    code_example: "// server.ts — remove spoofable key generator\napp.use('/rest/user/reset-password', rateLimit({\n  windowMs:\
