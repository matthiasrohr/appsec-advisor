- local_id: data-persistence-008
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-639
  title: Insecure Direct Object Reference — models/relations.ts:22
  affected_parameter: UserId
  scenario: 'The `relationsInit` function at `models/relations.ts` wires all user-owned models (`Card`, `Address`, `Wallet`,
    `Memory`, `Recycle`, `Complaint`, `PrivacyRequest`) to `UserModel` via `belongsTo` associations with FK constraints. However,
    these FK constraints enforce only referential integrity (the referenced `UserId` must exist) — they do NOT enforce that
    the calling application supplies a WHERE clause that restricts results to the authenticated user''s `UserId`. Route handlers
    that call `CardModel.findByPk(req.params.id)`, `AddressModel.findOne({ where: { id: req.params.id } })`, or similar without
    also asserting `UserId = req.user.data.id` allow any authenticated user to read or modify any other user''s cards, addresses,
    wallet balance, or memories by substituting the resource ID in the URL parameter. The model layer has no hook-based ownership
    guard to catch this omission.'
  evidence_summary: '`models/relations.ts` defines FK associations for `Card`, `Address`, `Wallet`, `Memory`, and others to
    `User`, but `belongsTo` enforces only referential integrity — no hook guards against cross-user access.'
  impact_description: An authenticated user can read, update, or delete payment cards, shipping addresses, and wallet balances
    belonging to other users by enumerating resource IDs.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Sequelize FK constraints prevent association with a non-existent UserId but do not restrict which UserId
    a query may access.
  mitigation_title: Add Sequelize model-level `beforeFind`/`beforeUpdate`/`beforeDestroy` hooks enforcing UserId ownership
    on all user-owned models
  remediation:
    effort: High
    steps:
    - For each user-owned model (`Card`, `Address`, `Wallet`, `Memory`, `Recycle`, `Complaint`, `PrivacyRequest`), add a Sequelize
      `beforeFind` hook that injects `where.UserId = req.userId` when a `userId` is set in the query options context.
    - 'Alternatively, create a shared `withOwnership(userId: number)` query-scope helper that wraps all findOne/findByPk calls
      with an additional `AND UserId = :userId` constraint; enforce its use via a linting rule.'
    - 'Audit all route handlers using these models to confirm each read/write call includes `where: { id: ..., UserId: req.user.data.id
      }` rather than `where: { id: ... }` alone.'
    - Add integration tests asserting that a request from user A cannot retrieve or modify resources belonging to user B,
      covering all five model types.
    code_example: "// Correct route handler pattern — always include UserId\nconst card = await CardModel.findOne({\n  where:\
      \ { id: req.params.id, UserId: req.user.data.id }\n})\nif (!card) return res.status(404).json({ error: 'Not found' })"
    reference: CWE-639
