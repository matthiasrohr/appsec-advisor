  stride: Denial of Service
  cwe: CWE-1333
  title: Catastrophic-backtracking regex on client data — registerWebsocketEvents.ts:46
  affected_parameter: data
  scenario: 'The `verifySvgInjectionChallenge` handler runs `data?.match(/.*\.\.\/\.\.\/\.\.[\w/-]*?\/redirect\?to=https?:\/\/placecats.com\/(g\/)?[\d]+\/[\d]+.*/)`
    directly on attacker-controlled `data: any` received over an unauthenticated socket. The pattern combines a leading `.*`,
    a lazy `[\w/-]*?` segment, and a trailing `.*`, which is vulnerable to catastrophic backtracking: a crafted long string
    of slashes/word characters that nearly-but-never matches forces exponential regex evaluation on the single Node.js event
    loop, blocking the entire server for all users. There is no length cap, no input validation, and no rate limiting on the
    event, so a single small malicious payload can hang the process.'
  evidence_summary: registerWebsocketEvents.ts:46 applies a backtracking-prone regex (`.*` ... lazy ... `.*`) to unbounded
    client-supplied `data` with no length guard.
  impact_description: A single crafted WebSocket message can pin the event loop and deny service to all connected users.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None. No input length limit, no rate limiting, no regex timeout.
  mitigation_title: Bound and validate verify-challenge input length and harden the SVG-injection regex against backtracking
  remediation:
    effort: Medium
    steps:
    - Reject `data` that is not a string or exceeds a small max length (e.g. 2048 chars) before any regex evaluation.
    - Rewrite the regex to remove the leading/trailing `.*` and anchor the match, or replace with explicit substring/`URL`
      parsing to eliminate exponential backtracking.
    - Add per-socket rate limiting on the `verify*` events so repeated payloads cannot be replayed to amplify load.
    code_example: "socket.on('verifySvgInjectionChallenge', (data) => {\n  if (typeof data !== 'string' || data.length > 2048)\
      \ return\n  // anchored, non-backtracking check ...\n})"
