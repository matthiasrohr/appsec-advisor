  title: Postinstall Script Executes During Docker Build Without Script — Dockerfile:5
  affected_parameter: null
  scenario: '`Dockerfile:5` runs `RUN npm install --omit=dev` without `--ignore-scripts`. The `package.json` `postinstall`
    hook (line 56) executes `cd frontend && npm install && cd .. && npm run build:frontend`, which triggers a second `npm
    install` in the `frontend/` directory. If any dependency in the transitive graph includes a malicious `preinstall`, `install`,
    or `postinstall` hook (enabled by the absent lockfile documented in ci-cd-pipeline-003), that hook runs as an unrestricted
    shell command inside the Docker builder container. The builder container has network access and inherits the full build
    environment. The `coding-challenge-rsn` and other CI jobs (`ci.yml:51`) also run plain `npm install` — also without `--ignore-scripts`
    — exposing the CI runner environment.'
  evidence_summary: '`Dockerfile:5` calls `npm install --omit=dev` without `--ignore-scripts`; `package.json:56` defines a
    `postinstall` that runs `npm install` in `frontend/`, meaning any package hook in either dependency tree executes during
    the Docker build.'
  impact_description: A malicious postinstall hook in any transitive dependency runs arbitrary code inside the Docker build
    environment, potentially exfiltrating secrets, backdooring the built image, or modifying source before compilation.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The `lint` and `lint-fixer.yml` jobs pass `--ignore-scripts` to their npm install calls, demonstrating
    awareness of the risk. The production Docker build stage does not apply the same guard.
  mitigation_title: Add --ignore-scripts to production npm install in Dockerfile, validate postinstall necessity
  remediation:
    effort: Medium
    steps:
    - 'Determine whether the `postinstall` hook in `package.json` is required for production builds or only for development
      setup. If it is development-only, guard it: `"postinstall": "if [ \"$NODE_ENV\" != \"production\" ]; then cd frontend
      && npm install ...; fi"`.'
    - Update `Dockerfile:5` from `RUN npm install --omit=dev` to `RUN npm install --omit=dev --ignore-scripts` to prevent
      arbitrary hook execution during the image build.
    - 'Add an explicit build step for anything the postinstall hook legitimately does in production: e.g., add `RUN npm run
      build:frontend` as a separate `RUN` directive after the install.'
    - For CI test jobs (`ci.yml` lines 51, 71, 110, 147, 203, 238) that run the full test suite, evaluate whether `--ignore-scripts`
      is safe (the frontend build is needed for e2e tests, so the hook may need to run selectively, not be disabled globally).
    - After committing `package-lock.json` (ci-cd-pipeline-003), switch to `npm ci` which honors `--ignore-scripts` cleanly
      and provides reproducibility.
    code_example: '# Dockerfile — before:

      RUN npm install --omit=dev


      # Dockerfile — after:

      RUN npm install --omit=dev --ignore-scripts

      RUN npm run build:frontend  # explicit build step replaces postinstall'
    reference: CWE-829
