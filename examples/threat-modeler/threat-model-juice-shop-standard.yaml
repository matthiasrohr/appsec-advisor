    registers `io.on(''connection'', ...)` with no `io.use()` handshake middleware and no token/session check. Any anonymous
    client that can reach `/socket.io` opens a full duplex channel and receives every server-side broadcast (`io.emit(''challenge
    solved'', ...)` from challengeUtils.ts:71) plus the replay of all queued `notifications` on connect. No identity is ever
    bound to the socket, so a client cannot be attributed and every emitted event is delivered to spoofable, unauthenticated
    peers.'
