- local_id: sqlite-db-001
  threat_category_id: TH-03
  additional_categories: []
  stride: Spoofing
  cwe: CWE-916
  title: Unsalted MD5 Password Hash — models/user.ts:76
  affected_parameter: password
  scenario: The User model hashes every password with unsalted MD5 via `security.hash()` before storing it in the Users table.
    MD5 is a fast, cryptographically broken digest; without per-user salt every identical password maps to the same hash,
    enabling precomputed rainbow table attacks. An attacker who obtains the database file — either directly (ACT-D-04 has
    local-fs access to `data/juiceshop.sqlite`) or via a UNION-based SQL injection in the routes layer — can recover all plaintext
    passwords in minutes using freely available rainbow tables or GPU-accelerated cracking (Hashcat). Recovered credentials
    are then replayed against the login endpoint to authenticate as any user including administrators, bypassing multi-factor
    controls that are not universally enforced.
  evidence_summary: '`models/user.ts:76` calls `this.setDataValue(''password'', security.hash(clearTextPassword))` where `security.hash`
    is `crypto.createHash(''md5'').update(data).digest(''hex'')` with no salt, confirmed at `lib/insecurity.ts:41`.'
  impact_description: Full account takeover for every user whose password appears in a rainbow table, including the default
    admin account (password `admi**** (8 chars)` maps to a trivially known MD5 digest).
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no salting, no key-stretching algorithm (bcrypt/Argon2/PBKDF2), no pepper.
  mitigation_title: Replace MD5 with Argon2id and per-user salts in User model password setter
  remediation:
    effort: Medium
    steps:
    - Replace `security.hash()` in the `password` setter at `models/user.ts:76` with `bcrypt.hash(clearTextPassword, 12)`
      (or `argon2.hash(clearTextPassword)` via the `argon2` npm package).
    - Add a migration to mark all existing MD5-hashed passwords as expired and force a password reset on next login, since
      legacy hashes cannot be re-hashed without the original plaintext.
    - Update the login query at `routes/login.ts:34` to fetch the user by email only, then call `bcrypt.compare(req.body.password,
      user.password)` — never hash-then-compare with MD5.
    code_example: "```typescript\nimport * as bcrypt from 'bcrypt'\n\n// models/user.ts — password setter\nset(clearTextPassword:\
      \ string) {\n  const hash = bcrypt.hashSync(clearTextPassword, 12)\n  this.setDataValue('password', hash)\n}\n```"
    reference: CWE-916
  evidence:
  - file: models/user.ts
    line: 76
