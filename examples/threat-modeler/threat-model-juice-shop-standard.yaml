    orders collection — all order IDs, customer emails, and delivery details — via a single crafted URL.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: When `reflectedXssChallenge` is disabled, non-word/non-hyphen characters are stripped via `replace(/[^\w-]+/g,
    '')`, neutralising the injection. The 60-char truncation when the challenge is enabled is insufficient.
  mitigation_title: Replace $where template interpolation with a parameterised field equality selector in trackOrder
  remediation:
