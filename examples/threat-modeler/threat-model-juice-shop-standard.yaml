  mitigation_title: Require session token validation in Socket.IO connection middleware before accepting any socket
  remediation:
    effort: Medium
    steps:
    - 'Add a Socket.IO `io.use()` middleware that extracts and validates a session JWT or cookie before the connection is
      accepted: `io.use((socket, next) => { const token = socket.handshake.auth.token || socket.handshake.headers[''authorization''];
      if (!verifyToken(token)) return next(new Error(''unauthorized'')); next(); });`'
