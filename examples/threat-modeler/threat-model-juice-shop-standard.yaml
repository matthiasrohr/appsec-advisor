  title: Hardcoded HMAC Secret in Security Answer Validation — lib/insecurity.ts:42
  affected_parameter: answer
  scenario: '`lib/insecurity.ts:42` computes the HMAC of security answers using a hardcoded key `pa4qacea4VK9t9nGv7yZtwmj`.
    `routes/resetPassword.ts:41` validates the submitted answer by comparing `security.hmac(answer) === data.answer`. An attacker
    who reads the source file knows the key and can precompute `HMAC-SHA256(''pa4qacea4VK9t9nGv7yZtwmj'', anyAnswer)` for
