components:
- id: frontend-spa
  name: Angular Frontend SPA
  description: Single-page Angular application serving the Juice Shop UI. Handles client-side routing with Angular route guards,
    token storage in localStorage, and all user-facing challenge interactions.
  paths:
  - frontend/src/**
  - frontend/package.json
  tier: client
  complexity: moderate
  framework: angular
  deployment_zones:
  - internet
  - client-device
  handles_sensitive_data: true
  threat_ids:
  - T-003
  - T-010
  - T-013
  - T-020
  - T-026
  - T-048
  - T-052
- id: backend-api
  name: Express REST API Backend
  description: Node.js/Express monolith serving the REST API at /rest/* and /api/*, JWT authentication, challenge lifecycle
    management, file serving, and all core business logic. Co-located with the Angular static file serving.
  paths:
  - server.ts
  - routes/**
  - lib/**
  - models/**
  - data/**
  - config/**
  - package.json
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - dmz
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-002
  - T-008
  - T-009
  - T-011
  - T-014
  - T-015
  - T-017
  - T-018
