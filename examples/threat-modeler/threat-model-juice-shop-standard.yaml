- local_id: ci-cd-pipeline-006
  threat_category_id: TH-14
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-732
  title: Missing Permissions Block Allows Write-All GITHUB_TOKEN — ci.yml:1
  scenario: 'Neither ci.yml nor release.yml defines a top-level or job-level `permissions:` block. GitHub Actions defaults
    to `write` for all GITHUB_TOKEN scopes when no permissions block is present. Every third-party action running in these
    workflows — including the unpinned coveralls action and the Heroku deploy action — inherits write access to repository
    contents, packages, deployments, pull-requests, and issues. A compromised action can push tags, create releases, write
    to the package registry, or modify branch protection settings. By contrast, codeql-analysis.yml correctly defines `permissions:
    actions: read; contents: read; security-events: write`.'
  evidence_summary: ci.yml has no `permissions:` block (confirmed by absence — lines 1–391 reviewed); release.yml has no `permissions:`
    block (lines 1–97 reviewed); codeql-analysis.yml at line 11 demonstrates the correct pattern.
  impact_description: Any compromised action in ci.yml or release.yml can write to the repository, create/modify releases,
    and push Docker images with full GITHUB_TOKEN authority.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: codeql-analysis.yml applies least-privilege permissions; the pattern is known and used in one workflow.
  mitigation_title: Add least-privilege permissions blocks to ci.yml and release.yml
  remediation:
    effort: Low
    steps:
    - 'Add a top-level `permissions: read-all` to ci.yml and release.yml to deny write by default'
    - 'Override at the job level only where write is required: `coverage-report` needs no write; `docker` job needs `packages:
      write`; `heroku` needs `deployments: write`; `notify-slack` needs no write'
    - 'For release.yml, the `package` job needs `contents: write` (to attach files to the release); `docker` job needs `packages:
      write`'
    - Verify with `actionlint` (GitHub Actions linter) that no job uses write operations without the corresponding permission
    code_example: "# Top-level default deny:\npermissions: read-all\n\njobs:\n  docker:\n    permissions:\n      contents:\
      \ read\n      packages: write\n  coverage-report:\n    permissions:\n      contents: read"
    reference: CWE-732
  evidence:
