- local_id: frontend-spa-011
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-1333
  title: Client CAPTCHA timestamp read unvalidated from — data-export.component.ts:48
  affected_parameter: lstdtxprt
  scenario: 'data-export.component.ts:48 reads the data-export throttle timestamp from localStorage (''lstdtxprt'') and JSON.parses
    it with no validation: new Date(JSON.parse(String(localStorage.getItem(''lstdtxprt'')))). The CAPTCHA/rate gate for the
    data-export feature is therefore enforced client-side using attacker-writable storage — a user can simply overwrite or
    delete ''lstdtxprt'' to defeat the cooldown and repeatedly trigger the data-export request, removing the intended client-side
    throttle on a potentially expensive backend operation. Recon Section 7 flags this JSON.parse on localStorage as unvalidated
    source. The real fix is server-side rate limiting, since any client-side gate is bypassable by definition.'
  evidence_summary: The data-export cooldown is gated by a client-writable, unvalidated localStorage timestamp that the user
    fully controls.
  impact_description: A user can erase the client cooldown and repeatedly invoke data-export, burdening the backend if no
    server throttle exists.
  likelihood: Medium
  impact: Low
  risk: Low
  controls_in_place: A client-side timestamp check exists but is stored in user-controlled localStorage and is trivially bypassable.
  mitigation_title: Enforce data-export throttling and CAPTCHA validation server-side, not via localStorage
  remediation:
    effort: Medium
    steps:
    - Move the data-export cooldown to the server, keyed by authenticated user/IP, with express-rate-limit or an equivalent
      throttle.
    - Validate the CAPTCHA solution server-side on every data-export request and reject if absent or stale.
    - Treat the localStorage timestamp as a UX hint only; never as the enforcing control.
    code_example: "// server\nimport rateLimit from 'express-rate-limit'\napp.post('/rest/user/data-export',\n  rateLimit({\
      \ windowMs: 60_000, max: 1 }), handler)"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
  evidence:
  - file: frontend/src/app/data-export/data-export.component.ts
    line: 48
