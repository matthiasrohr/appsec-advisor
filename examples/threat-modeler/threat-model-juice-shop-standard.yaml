tier_root_causes:
  edge:
  - missing Content Security Policy allows XSS via Angular sanitizer bypass
  - client-side credential storage in localStorage without encryption
  - predictable password derivation from publicly observable user identity
  server:
  - hardcoded cryptographic secrets (RSA keys, HMAC, BIP-39 mnemonic) in source
  - raw SQL string interpolation without parameterized queries across route handlers
  - missing authentication middleware on sensitive REST and Web3 endpoints
  - JWT role claims trusted from token payload without server-side verification
  - absent rate-limiting on authentication, key submission, and resource endpoints
  data:
  - unsalted MD5 password hashing with no key-stretching algorithm in user model
  - plaintext PII columns without column-level encryption or access policy
