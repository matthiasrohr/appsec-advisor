    in `data/mongodb.ts` has no logging wrapper. Neither data store emits structured events for authentication attempts (successful
    or failed), review mutations, or order modifications. An attacker who exploits the SQL injection at `routes/login.ts:34`
    or the mass-update flaw at `routes/updateProductReviews.ts:18` leaves no trace in any log. Incident responders cannot
    reconstruct which rows were read or modified.'
