  cwe: CWE-89
  title: SQL Injection Enables Schema Disclosure — routes/search.ts:47
  scenario: The search route at `routes/search.ts:47` executes `SELECT sql FROM sqlite_master` to check the dbSchemaChallenge
    flag. Combined with the UNION injection vulnerability at line 23, an attacker can cause this query result (all table DDL
    statements) to appear in the product-search API response. The full schema includes column names for `Users`, `SecurityAnswers`,
    `Cards`, `Wallets`, and all other tables. With schema knowledge, the attacker can craft precise UNION payloads to extract
    specific sensitive columns, reducing the effort required to compromise all user data. Additionally, `role` column is discoverable,
    enabling targeted UPDATE injection attempts.
  evidence_summary: '`models.sequelize.query(''SELECT sql FROM sqlite_master'')` at `routes/search.ts:47` is reachable via
    the UNION injection at line 23, returning full table definitions in the API response.'
  impact_description: Attacker learns full database schema, accelerating extraction of all sensitive columns and enabling
    targeted privilege escalation via UPDATE injection.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The `sqlite_master` query runs only when the dbSchemaChallenge is not yet solved — but the UNION injection
    that makes the result visible runs unconditionally.
  mitigation_title: Remove or gate the sqlite_master schema query behind a server-side admin role check, independent of challenge
    state
  remediation:
    effort: Low
    steps:
    - Move the `SELECT sql FROM sqlite_master` call behind a server-side admin authorization check (e.g., `if (req.user?.role
      !== 'admin') return`) so it is never reachable from a public search endpoint.
    - Fix the UNION injection at `routes/search.ts:23` (see data-store-002) as the primary remediation — once the search query
      is parameterized, UNION injection into `sqlite_master` is no longer possible.
    - Remove the schema-disclosure side-effect entirely from the production code path; implement it as a separate, admin-only
      diagnostic endpoint if needed.
    code_example: null
    reference: CWE-89
  evidence:
  - file: routes/search.ts
    line: 47
  evidence_check: verified
