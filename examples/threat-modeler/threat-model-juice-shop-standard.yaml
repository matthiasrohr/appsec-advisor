  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded Cryptographic Key — lib/insecurity.ts:21
  affected_parameter: null
  scenario: 'The RSA 1024-bit private key for JWT signing is embedded verbatim in `lib/insecurity.ts:21` and committed to
    the public repository. Any user who clones the repo — including CI runners, contributors, or a third-party who obtains
    a historical snapshot — can call `jwt.sign({ data: { id: 1, role: ''admin'' } }, privateKey, { expiresIn: ''6h'', algorithm:
    ''RS256'' })` and produce a token the server''s `isAuthorized()` middleware accepts unconditionally. Because `lib/insecurity.ts:54`
    signs with `algorithm: ''RS256''` and `lib/insecurity.ts:52` verifies with the corresponding public key, the forged token
    is indistinguishable from a legitimately issued one. The attacker gains admin-role access to every guarded endpoint.'
  evidence_summary: '`privateKey` at `lib/insecurity.ts:21` is a 1024-bit RSA PEM literal; `security.authorize()` at line
    54 signs JWTs with it using RS256.'
  impact_description: Attacker mints arbitrary-role JWTs accepted by the server, achieving full authentication bypass without
    credentials.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: JWT RS256 algorithm used; key material loaded from a file for the public key component only
  mitigation_title: Rotate JWT signing key and load it from a secret manager or environment variable
  remediation:
    effort: Medium
    steps:
    - 'Generate a new RSA 4096-bit (or EC P-384) key pair outside the repository: `openssl genrsa -out jwt-private.pem 4096`.'
    - Store the private key as a secret in the deployment platform (e.g. AWS Secrets Manager, Vault, Kubernetes Secret) and
      load it at startup via `process.env.JWT_PRIVATE_KEY` — never committed to source.
    - Remove the hardcoded PEM literal from `lib/insecurity.ts:21` and rewrite `authorize()` to read from the environment
      variable.
    - Rotate all currently issued JWTs by incrementing a `kid` (key ID) and rejecting tokens signed with the old key.
    - Scan Git history for the leaked key and treat all previously issued tokens as compromised.
    code_example: '// lib/insecurity.ts

      const privateKey = process.env.JWT_PRIVATE_KEY ?? (() => { throw new Error(''JWT_PRIVATE_KEY env var not set'') })()

      export const authorize = (user = {}) => jwt.sign(user, privateKey, { expiresIn: ''6h'', algorithm: ''RS256'' })'
    reference: CWE-321
    blueprint: null
