  threat_category_id: TH-16
  additional_categories: []
  stride: Repudiation
  cwe: CWE-778
  title: No Actor Attribution on Socket Event Handlers — registerWebsocketEvents.ts:34
  affected_parameter: socket identity
  scenario: 'The three inbound socket event handlers (`notification received`, `verifyLocalXssChallenge`, `verifySvgInjectionChallenge`)
    in `registerWebsocketEvents.ts` record no connection identity, source IP, or user binding when processing events. `challengeUtils.solve()`
    logs the challenge name (line 31 of `challengeUtils.ts`: `logger.info(...)`), but the log entry contains only the challenge
    key and name — no socket ID, no IP address, no JWT subject. An attacker who triggers a challenge solve via a forged socket
    event can deny the action. Forensic reconstruction of who submitted what challenge-verify payload is impossible from the
    application logs.'
  evidence_summary: None of the three `socket.on(...)` handlers in `registerWebsocketEvents.ts` call `logger.*` before processing
    events, and `challengeUtils.solve()` logs only the challenge key without actor context.
  impact_description: Post-incident investigation cannot determine which IP or user account triggered a socket-based challenge
    solve, blocking attribution of game-state manipulation.
  likelihood: Medium
  impact: Low
  risk: Low
  controls_in_place: Application-level logging via `logger.info()` in `challengeUtils.ts` captures the challenge name but
    not the actor.
  mitigation_title: Log socket identity and source IP on inbound challenge-verify events
  remediation:
    effort: Low
    steps:
    - In each `socket.on(...)` handler, emit a structured log entry including `socket.id`, `socket.handshake.address`, and
      the authenticated user ID (once auth middleware from realtime-channel-001 is in place).
    - Pass actor context from the socket into `challengeUtils.solve()` so the solve-log entry includes `{ userId, socketId,
      remoteIp }` fields.
    - Ensure logs are forwarded to an append-only sink (not the same process) so socket-level entries cannot be deleted by
      the attacker who triggered them.
    code_example: "socket.on('verifyLocalXssChallenge', (data: any) => {\n  logger.info(`[socket:${socket.id}] verifyLocalXssChallenge\
      \ from ${socket.handshake.address}`)\n  challengeUtils.solveIf(challenges.localXssChallenge, () => utils.contains(data,\
      \ '<iframe src=\"javascript:alert(`xss`)\">'))\n})"
