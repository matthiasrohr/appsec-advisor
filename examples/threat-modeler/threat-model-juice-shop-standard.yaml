  stride: Elevation of Privilege
  cwe: CWE-732
  title: GITHUB_TOKEN Write-All Permission on 10 of 13 Workflows — ci.yml:1
  affected_parameter: null
  scenario: 'Ten of 13 workflow files in `.github/workflows/` omit the `permissions:` block entirely. Under GitHub''s default
    configuration, the absence of an explicit `permissions:` block grants the `GITHUB_TOKEN` write-all access to the repository
    (write to contents, pull-requests, issues, actions, packages, deployments, security-events, etc.). `ci.yml` is the widest-scope
    example: it runs test, build, docker push, and Heroku deploy jobs without any permission restriction. Any step in these
    workflows that executes attacker-influenced code — via a compromised action, an injected dependency postinstall script
    (see ci-cd-pipeline-002), or an `eval`-style GitHub expression injection — inherits write-all GITHUB_TOKEN. An attacker
    can use this token to push malicious commits to `master`, modify workflow files themselves, create releases, or approve
    PRs.'
  evidence_summary: '`ci.yml` has no top-level or job-level `permissions:` block, granting write-all GITHUB_TOKEN to all 10+
    jobs including the docker push and Heroku deploy steps.'
  impact_description: A compromised step in `ci.yml` can push to the `master` branch, modify workflow definitions, or trigger
    the release pipeline with attacker-controlled code.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Three workflows (`codeql-analysis.yml`, `lock.yml`, `pr-compliance.yml`) explicitly restrict permissions.
    The other 10 rely on the write-all default.
  mitigation_title: Add explicit least-privilege permissions block to all workflow files
  remediation:
    effort: Medium
    steps:
    - 'Add a top-level `permissions: read-all` default to every workflow file, then add only the specific job-level permissions
      each job needs (e.g., `contents: write` only for the release job that attaches files to releases).'
    - 'For the `ci.yml` docker job, add `packages: write` only on that job; for the Heroku deploy job, no GITHUB_TOKEN write
      access is needed.'
    - Enable the GitHub repository setting 'Workflow permissions → Read repository contents and packages permissions' as the
      org-level default to make write-all opt-in rather than the default.
    - Run `actionlint` in CI to enforce that all new workflows declare explicit permissions before merge.
    code_example: "# ci.yml — add at top level\npermissions:\n  contents: read\n\njobs:\n  docker:\n    permissions:\n   \
      \   contents: read\n      packages: write\n    ..."
    reference: CWE-732
