components:
- id: angular-frontend
  name: Angular SPA Frontend
  description: Single-page Angular 20 application served as static assets. Handles all UI rendering, client-side routing (with
    LoginGuard), JWT storage in localStorage, and WebSocket event subscriptions via Socket.IO client.
  paths:
  - frontend/src/**
  - frontend/dist/**
  tier: client
  complexity: moderate
  framework: Angular 20
  deployment_zones:
  - browser
  handles_sensitive_data: true
  threat_ids:
  - T-002
  - T-004
  - T-013
  - T-017
  - T-018
  - T-027
  - T-028
  - T-044
  - T-051
- id: express-backend
  name: Express REST API Backend
  description: Node.js/TypeScript Express monolith serving REST API (/rest/*), Sequelize-backed REST endpoints (/api/*), file
    uploads, redirect, and the Angular SPA static files. Contains auth middleware (express-jwt), rate limiting (login only),
    helmet headers, and all business logic routes (61 route files).
  paths:
  - server.ts
  - app.ts
  - routes/**
  - lib/**
  - models/**
  - data/**
  tier: application
  complexity: complex
  framework: Express 4.x + TypeScript
  deployment_zones:
  - docker-container
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-003
  - T-007
  - T-008
  - T-009
  - T-010
  - T-014
  - T-022
  - T-023
  - T-024
  - T-025
  - T-026
  - T-029
  - T-033
