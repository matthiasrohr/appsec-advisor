  title: Wildcard CORS Configuration Allows Cross-Origin Credential — server.ts:289
  affected_parameter: null
  scenario: 'The Express server applies `app.use(cors())` with no configuration, which defaults to `Access-Control-Allow-Origin:
    *` for all routes. While the wildcard origin prevents credential sharing in standard browser behavior, it combines dangerously
    with the application''s cookie-based authentication (`cookieParser(''kekse'')` at server.ts:289). More critically, a wildcard
    CORS header allows any malicious website to read unauthenticated API responses (such as the admin configuration endpoint
    at /rest/admin/application-configuration and the product search endpoint) via cross-origin fetch. This enables data exfiltration
    from public API endpoints through malicious pages visited by any browser.'
  evidence_summary: 'server.ts uses `app.use(cors())` (identified in CONTROLS section) with no origin restriction, resulting
    in Access-Control-Allow-Origin: * on all responses.'
  impact_description: Any web page can read all public API responses including admin configuration data via cross-origin requests
    from a victim's browser.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Browser CORS policy prevents credential (cookie) sharing with wildcard. Cookie secret signing is in place.
  mitigation_title: Replace wildcard CORS with an explicit origin allowlist in cors() configuration
  remediation:
    effort: Low
    steps:
    - 'Pass an explicit `origin` allowlist to cors(): `app.use(cors({ origin: [''https://your-domain.com''], credentials:
