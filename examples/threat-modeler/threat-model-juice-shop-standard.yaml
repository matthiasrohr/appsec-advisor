trust_boundaries:
- id: tb-1
  name: Public Internet / Browser
  description: Trust zone containing unauthenticated users, attackers, and CTF participants. No trust assumed for any request
    originating here.
  from: external
  to: frontend-spa
  enforcement: None — Express serves Angular SPA to any client on port 3000
- id: tb-2
  name: Browser to Express API
  description: HTTP/HTTPS boundary between the Angular SPA running in the browser and the Express REST API. JWT Bearer token
    required for protected routes, but JWT validation is incomplete.
  from: frontend-spa
  to: backend-api
  enforcement: express-jwt middleware on selected routes; wildcard CORS origin '*'; no CSRF protection
- id: tb-3
  name: Express to SQLite Data Layer
  description: In-process trust boundary between Express application code and the SQLite database via Sequelize ORM. SQLite
    runs in-process with no network boundary.
  from: backend-api
  to: data-persistence
  enforcement: Sequelize ORM parameterization (partial); raw SQL queries bypass ORM in some routes (intentional SQLi challenge)
- id: tb-4
  name: Authenticated User to Admin Zone
  description: Trust escalation boundary between a normal authenticated user and admin-only API endpoints. No server-side
    enforcement — only client-side Angular guards.
  from: frontend-spa
  to: backend-api
  enforcement: NONE — client-side isAdmin flag in JWT payload; backend does not validate isAdmin before executing admin operations
- id: tb-5
  name: Express to External Web3 RPC
  description: Outbound HTTPS/WSS boundary to Alchemy Ethereum RPC service. API key in URL enables blockchain read/write operations.
  from: backend-api
  to: external
  enforcement: API key authentication (key hardcoded in source, permanently compromised)
- id: tb-6
  name: GitHub Actions Fork PR Boundary
  description: Trust boundary between external contributors submitting fork PRs and the CI/CD pipeline execution environment.
    pull_request_target grants write scope to fork-originated code.
  from: external
  to: ci-cd-pipeline
  enforcement: GitHub branch protection + pull_request_target event; pr-compliance.yml grants write scope creating privilege
    escalation risk
- id: tb-7
  name: B2B API JWT Validation Boundary
  description: Trust boundary at the B2B API gateway protecting /b2b/v2 endpoints. JWT required but shares the same weak signing
    secret as the main API.
  from: external
  to: b2b-api
  enforcement: express-jwt middleware with shared HS256 secret; no separate B2B credential store
- id: tb-8
  name: File Upload to Filesystem
  description: Boundary between multer upload processing and the /ftp/ filesystem directory that is also served as a public
    static listing. Files written here are immediately readable by any client.
  from: file-upload-service
  to: external
  enforcement: MIME type check (bypassable); file extension check (intentionally weak challenge); no quarantine or sandboxing
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Login
  effectiveness: Weak
  kind: mechanism
  assessment: Login at routes/login.ts constructs a raw SQL query via Sequelize.query() with string interpolation of the email
    parameter — intentional SQL injection challenge. Successful login issues a JWT signed with a hardcoded HS256 secret. No
    per-attempt lockout (only express-rate-limit on IP basis).
  evidence_file: routes/login.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Identity and Authentication Controls
  control: User Registration
  effectiveness: Weak
  kind: mechanism
  assessment: Self-registration at /rest/user/register with no email verification, no approval gate, and no registration rate
    limiting. Allows unlimited account creation including admin flag manipulation via unfiltered body parameters.
  evidence_file: routes/register.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Identity and Authentication Controls
  control: Password Reset
  effectiveness: Weak
  kind: mechanism
  assessment: Password reset via security questions (routes/resetPassword.ts). Security questions are enumerable (OWASP A07:2021
    challenge). No token-based reset link; answer guessing is practical.
  evidence_file: routes/resetPassword.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: IAM
  control: Password Change
  effectiveness: Weak
  kind: primitive
  assessment: Password change endpoint at /rest/user/change-password does not require the current password — only a valid
    JWT Bearer token. Any XSS-stolen or forged token enables password takeover without knowing the current credential.
  evidence_file: routes/changePassword.ts
- domain: Identity and Authentication Controls
  control: Multi-Factor Enrollment (TOTP)
  effectiveness: Partial
  kind: mechanism
  assessment: TOTP-based 2FA is implemented as an optional challenge (routes/2fa.ts). The setup flow exists but bypass is
    also a challenge objective — the implementation intentionally has a bypass path to serve as a learning exercise.
  evidence_file: routes/2fa.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Identity and Authentication Controls
  control: Social Login Adapter (OAuth / OIDC)
  effectiveness: Weak
  kind: mechanism
  assessment: OAuth adapter in frontend/src/app/oauth/ is a frontend-only identity hint that converts a Google profile into
    a local password login. It is not a server-side authorization-code flow — it inherits all Password Login weaknesses including
    the SQLi login path.
  evidence_file: frontend/src/app/oauth/oauth.component.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing
  effectiveness: Partial
  kind: primitive
  assessment: bcrypt is used for password hashing (models/user.ts). However, the number of rounds may be at minimum defaults
    and the login comparison bypasses hashing when SQL injection succeeds.
  evidence_file: models/user.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Identity and Authentication Controls
  control: Authentication Rate Limiting
  effectiveness: Partial
  kind: primitive
  assessment: express-rate-limit is applied to the login endpoint. However, the limit applies per IP and is trivially bypassed
    with rotating IPs or by using the SQLi bypass path which does not need brute force.
  evidence_file: server.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  effectiveness: Missing
  kind: primitive
  assessment: No secret management system present. JWT signing secret, Web3 API keys, and test credentials are all hardcoded
    in source files. No environment variable injection, no vault integration, no secret rotation mechanism.
  evidence_file: lib/insecurity.ts
  audit_flags:
  - control_domain_reclassified_from_IAM
- domain: Session and Token Controls
  control: Session Token Signing (JWT Based)
  effectiveness: Unsafe
  kind: lifecycle
  assessment: JWT tokens are signed with a hardcoded HS256 shared secret in lib/insecurity.ts. The signing secret is in the
    public GitHub repository. Any actor with source code access can forge arbitrary tokens including admin tokens offline.
  evidence_file: lib/insecurity.ts
  audit_flags:
  - control_domain_reclassified_from_SessionMgmt
- domain: Session and Token Controls
  control: Session Token Validation (JWT Based)
  effectiveness: Unsafe
  kind: lifecycle
  assessment: 'express-jwt middleware validates tokens on protected routes but: (1) algorithm enforcement is absent — alg:none
    bypass is accepted; (2) the shared secret is publicly known; (3) not all routes are protected. The express-jwt version
    is approximately 8 major versions behind current.'
  evidence_file: lib/insecurity.ts
  audit_flags:
  - control_domain_reclassified_from_SessionMgmt
- domain: Session and Token Controls
  control: Session Token Storage (Browser localStorage)
  effectiveness: Weak
  kind: lifecycle
  assessment: JWT tokens are stored in browser localStorage (frontend/src/app/Services/request.interceptor.ts). localStorage
    is accessible to any JavaScript on the page — XSS anywhere in the application results in session token theft.
  evidence_file: frontend/src/app/Services/request.interceptor.ts
  audit_flags:
  - control_domain_reclassified_from_SessionMgmt
- domain: Session and Token Controls
  control: Session Token Revocation
  effectiveness: Missing
  kind: lifecycle
  assessment: No server-side token revocation mechanism. Logout is client-side cookie deletion only. Stolen or compromised
    tokens remain valid until JWT expiry. No token blocklist or session invalidation endpoint.
  evidence_file: routes/logout.ts
  audit_flags:
  - control_domain_reclassified_from_SessionMgmt
- domain: Session and Token Controls
  control: Session Token Expiry
  effectiveness: Partial
  kind: lifecycle
  assessment: JWT tokens have an expiry claim (exp). The exact TTL is not confirmed from recon but is presumably non-zero.
    However, tokens cannot be revoked before expiry, so the window of risk extends the full TTL after compromise.
  evidence_file: lib/insecurity.ts
  audit_flags:
  - control_domain_reclassified_from_SessionMgmt
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Missing
  kind: mechanism
  assessment: Authorization is entirely client-side. Angular route guards (app.guard.ts) check isAdmin and accountingRole
    flags from the JWT payload but the backend never validates roles before processing admin API calls. Any JWT bearer (including
    forged ones) can call admin endpoints directly.
  evidence_file: frontend/src/app/app.guard.ts
  audit_flags:
  - control_domain_reclassified_from_AuthZ
- domain: AuthZ
  control: Object-Level Authorization
  effectiveness: Missing
  kind: primitive
  assessment: No per-object ownership checks on resource access. Basket enumeration at /rest/basket returns any basket without
    verifying the requesting user owns it (intentional IDOR challenge).
  evidence_file: routes/basket.ts
- domain: Query Construction and Data Access Controls
  control: Parameterized Database Access
  effectiveness: Unsafe
  kind: mechanism
  assessment: Sequelize ORM is used throughout but several routes use Sequelize.query() with raw string interpolation of user
    input (notably routes/search.ts searchProducts). This is an intentional SQL injection challenge that demonstrates the
    vulnerability class.
  evidence_file: routes/search.ts
  audit_flags:
  - control_domain_reclassified_from_InputVal
- domain: Input Boundary Validation Controls
  control: Input Schema Validation
  effectiveness: Weak
  kind: mechanism
  assessment: finale-rest provides partial model-level validation on CRUD endpoints. No centralized input schema validation
    middleware. User-supplied data flows directly into ORM calls, HTML output, and shell commands in several routes.
  evidence_file: server.ts
  audit_flags:
  - control_domain_reclassified_from_InputVal
- domain: Output Encoding and Rendering Controls
  control: Output Encoding
  effectiveness: Weak
  kind: mechanism
  assessment: Angular's default template escaping provides baseline XSS protection but is bypassed at multiple intentional
    challenge points using innerHTML assignment, DomSanitizer.bypassSecurityTrust*, and unsafe-eval in CSP configuration.
  evidence_file: frontend/src/hacking-instructor/challenges/domXss.ts
  audit_flags:
  - control_domain_reclassified_from_InputVal
- domain: InputVal
  control: Sandbox Isolation
  effectiveness: Weak
  kind: mechanism
  assessment: The B2B order processing uses notevil sandbox for evaluating order line expressions. notevil is a JavaScript
    subset interpreter but has known prototype pollution bypass paths. User-controlled input reaches the sandbox after minimal
    sanitization.
  evidence_file: routes/b2bOrder.ts
- domain: DataProt
  control: Transport Layer Security
  effectiveness: Partial
  kind: primitive
  assessment: HTTPS is assumed in production deployment but not enforced by the application itself. The Express server listens
    on HTTP; TLS termination is expected at a load balancer or reverse proxy that is not present in the repository.
  evidence_file: server.ts
- domain: Cryptography Secrets and Data Protection
  control: Data at Rest Encryption
  effectiveness: Missing
  kind: primitive
  assessment: No encryption at rest. Payment card numbers are stored in plaintext in the SQLite database (intentional OWASP
    A02:2021 challenge). SQLite database file has no encryption layer.
  evidence_file: models/card.ts
  audit_flags:
  - control_domain_reclassified_from_DataProt
- domain: DataProt
  control: Client-Side Storage Safety
  effectiveness: Weak
  kind: primitive
  assessment: JWT tokens stored in localStorage are accessible to any script on the page. No httpOnly cookies used for session
    management. This is the primary XSS-to-account-takeover vector.
  evidence_file: frontend/src/app/Services/request.interceptor.ts
- domain: FrontendSec
  control: HTTP Security Headers
  effectiveness: Partial
  kind: primitive
  assessment: 'helmet.js is configured but selectively: X-Content-Type-Options (noSniff) and X-Frame-Options (frameguard)
    are applied. HSTS (strict-transport-security) and Referrer-Policy are absent. The xssFilter is explicitly commented out.'
  evidence_file: server.ts
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy
  effectiveness: Unsafe
  kind: primitive
  assessment: CSP is either absent or contains unsafe-eval to support eval() in challenge routes. Additionally, routes/userProfile.ts
    interpolates user-controlled profileImage URL into the CSP header value, enabling an attacker to inject unsafe-inline
    into their own session's CSP.
  evidence_file: routes/userProfile.ts
  audit_flags:
  - control_domain_reclassified_from_FrontendSec
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Weak
  kind: primitive
  assessment: 'CORS is configured as a wildcard: app.use(cors()) with no origin restriction (server.ts:181-182). All cross-origin
    requests from any domain are permitted. Intentional per code comment: ''Bludgeon solution for possible CORS problems''.'
  evidence_file: server.ts
  audit_flags:
  - control_domain_reclassified_from_FrontendSec
- domain: FrontendSec
  control: CSRF Protection
  effectiveness: Missing
  kind: primitive
  assessment: No CSRF token mechanism. The application relies on JWT-in-header (not cookies) for most routes, which inherently
    prevents cookie-based CSRF. However, mixed state-changing endpoints without this pattern remain unprotected.
  evidence_file: server.ts
- domain: Audit
  control: Request Access Logging
  effectiveness: Partial
  kind: primitive
  assessment: Morgan HTTP request logging is configured and provides access log output. However, logs may contain stack traces
    and verbose error messages (intentional challenge). No structured JSON logging format or log correlation IDs.
  evidence_file: lib/logger.ts
- domain: Audit
  control: Security Event Logging
  effectiveness: Missing
  kind: primitive
  assessment: No dedicated security event logging for authentication failures, authorization violations, or admin actions.
    Challenge completion events are logged for gamification purposes but security-relevant events (failed logins, role escalation
    attempts) are not separately tracked.
  evidence_file: lib/logger.ts
- domain: Audit
  control: Production Error Handler
  effectiveness: Weak
  kind: primitive
  assessment: Express error handler at the bottom of server.ts catches unhandled errors but may expose stack traces to clients
    (intentional challenge for information disclosure). Verbose error messages reveal internal state including database errors.
  evidence_file: server.ts
- domain: Operations Runtime and Supply Chain Controls
  control: Container Runtime Hardening (Distroless)
  effectiveness: Partial
  kind: primitive
  assessment: Multi-stage Docker build uses gcr.io/distroless/nodejs24-debian13 as the final runtime image (non-root, minimal
    attack surface). However, the base image lacks a content digest pin and version tag, enabling silent image replacement
    on rebuild.
  evidence_file: Dockerfile
  audit_flags:
  - control_domain_reclassified_from_Infra
- domain: Identity and Authentication Controls
  control: API Rate Limiting
  effectiveness: Partial
  kind: primitive
  assessment: express-rate-limit is applied to the login endpoint only. No global rate limiting on the REST API or WebSocket
    connections. Admin endpoints and file upload endpoints are unrate-limited.
  evidence_file: server.ts
  audit_flags:
  - control_domain_reclassified_from_Infra
- domain: Operations Runtime and Supply Chain Controls
  control: Lockfile Integrity
  effectiveness: Missing
  kind: primitive
  assessment: package-lock.json is disabled via .npmrc (package-lock=false). npm install resolves fresh dependency trees on
    each invocation. Transitive dependencies are not pinned, creating a window for version-confused or malicious package injection.
  evidence_file: .npmrc
  audit_flags:
  - control_domain_reclassified_from_SupplyChain
- domain: SupplyChain
  control: Dependency Vulnerability Scanning
  effectiveness: Partial
  kind: primitive
  assessment: GitHub Dependabot is assumed enabled but not confirmed from repository config. No npm audit, Snyk, Trivy, or
    OSV-Scanner in CI workflows. CodeQL provides SAST but not SCA.
  evidence_file: .github/workflows/ci.yml
- domain: SupplyChain
  control: Base Image Pinning
  effectiveness: Missing
  kind: primitive
  assessment: Dockerfile uses node:24 (no digest) and gcr.io/distroless/nodejs24-debian13 (no tag, no digest). docker-compose.test.yml
    uses bkimminich/juice-shop:latest. None of these are content-digest pinned, enabling silent image substitution.
  evidence_file: Dockerfile
- domain: Real-time and Not Applicable Controls
  control: WebSocket Authentication
  effectiveness: Missing
  kind: mechanism
  assessment: Socket.IO WebSocket connections are accepted without JWT validation on upgrade. Any client can connect and receive
    challenge completion broadcasts. The client has a JWT in localStorage but it is not validated server-side during the WebSocket
    handshake.
  evidence_file: lib/startup/registerWebsocketEvents.ts
  audit_flags:
  - control_domain_reclassified_from_RealTime
- domain: AI
  control: LLM Output Filtering
  effectiveness: Missing
  kind: primitive
  assessment: .claude/settings.local.json commits Bash(*:*) wildcard permission allowing unconstrained shell execution for
    AI coding agents. Combined with prompt injection via code comments or commit messages, this enables arbitrary code execution
    on developer workstations.
  evidence_file: .claude/settings.local.json
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated dependency updates
  effectiveness: Missing
  kind: lifecycle
  assessment: Automated dependency updates not detected in the repository. Patch-management posture depends on this control
    being in place — the team is reactive rather than proactive without it.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Lockfile hygiene
  effectiveness: Missing
  kind: lifecycle
  assessment: Lockfile hygiene not detected in the repository. Patch-management posture depends on this control being in place
    — the team is reactive rather than proactive without it.
  linked_threats: []
threats:
- local_id: b2b-api-001
  threat_category_id: TH-02
  additional_categories:
  - TH-06
  stride: Spoofing
  cwe: CWE-347
  title: JWT Algorithm Confusion Missing algorithms Allowlist (lib/insecurity.ts)
  affected_parameter: Authorization
  scenario: 'The express-jwt middleware is configured at lib/insecurity.ts:54 as `expressJwt({ secret: publicKey })` without
    specifying an `algorithms:` allowlist. This means the middleware will accept JWTs signed with any algorithm, including
    `alg:none` (unsigned, zero-credential) and HS256 using the RSA public key as the HMAC secret. An anonymous internet attacker
    can base64-decode the public key from any valid JWT, craft a new payload with `role: admin` or another user''s `email`,
    sign it using HS256 with the decoded public key as the secret, and send it to `POST /b2b/v2/orders`. The middleware''s
    verification passes, granting arbitrary identity impersonation across all endpoints protected by `security.isAuthorized()`.'
  evidence_summary: expressJwt is called with only `secret` and no `algorithms` parameter, leaving the algorithm negotiated
    by the token header rather than enforced by the server.
  impact_description: Attacker forges a JWT for any user or admin role and gains full access to the B2B order endpoint and
    all other isAuthorized()-protected routes.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is used for token issuance (authorize() at line 56), but the verification step does not enforce
    this restriction.
  mitigation_title: Add algorithms allowlist to express-jwt middleware in lib/insecurity.ts
  remediation:
    effort: Low
    steps:
    - 'Change line 54 of lib/insecurity.ts from `expressJwt({ secret: publicKey })` to `expressJwt({ secret: publicKey, algorithms:
      [''RS256''] })` to reject tokens with any other algorithm.'
    - Audit all other JWT verification call sites (jws.verify, jwt.verify) in the codebase to confirm they also pin the algorithm.
    - Add an integration test that submits a JWT with `alg:none` or `alg:HS256` to /b2b/v2/orders and asserts a 401 response.
    code_example: '// lib/insecurity.ts — corrected

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] })'
    reference: CWE-347
  evidence:
  - file: lib/insecurity.ts
    line: 54
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: true
  actor_ids:
  - ACT-D-01
  - ACT-D-04
  primary_actor: ACT-D-01
  component_name: B2B API / Order Sandbox
  source: stride
  merged_from:
  - b2b-api
  - backend-api
  merged_strides:
  - Spoofing
  evidence_flags:
  - evidence-verifier-partial-run
  - tier_reclassified_from_b2b-api
  triage_flags:
  - TF-001
  id: T-001
  component: backend-api
