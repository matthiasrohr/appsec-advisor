  title: NoSQL Injection — routes/chat.ts:149
  affected_parameter: id
  scenario: 'The `getProductReviews` tool at `routes/chat.ts:148-150` constructs a MongoDB `$where` JavaScript expression
    by string-concatenating the tool-supplied `id` parameter: `db.reviewsCollection.find({ $where: ''this.product == '' +
    productId })`. While `Number(id)` at line 148 converts the input before concatenation, MongoDB''s `$where` operator executes
    JavaScript server-side. If the LLM is prompt-injected to pass a crafted non-numeric string such as `"1 || sleep(5000)"`,
    `Number(''1 || sleep(5000)'')` evaluates to `NaN`, and the concatenated expression becomes `''this.product == NaN''` —
    likely returning no results but still executing on the MongoDB server. More critically, a `$where` expression with `NaN`
    comparison does not short-circuit safely on all MongoDB drivers; the operator still evaluates JavaScript. Any future modification
    that relaxes the `Number()` cast or passes the raw string would be a direct injection. The `$where` operator itself is
    a dangerous anti-pattern (disabled by default in newer MongoDB configurations) and should be replaced entirely.'
  evidence_summary: '`routes/chat.ts:149` builds `{ $where: ''this.product == '' + productId }` — `$where` executes JavaScript
    on the MongoDB server, making string concatenation into the clause a NoSQL injection primitive.'
  impact_description: A successful injection allows MongoDB server-side JavaScript execution, enabling data exfiltration from
    the reviews collection or server-side denial of service via expensive `$where` predicates.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Input passes through `Number(id)` before concatenation, which coerces non-numeric strings to NaN and
    limits immediate exploitation.
  mitigation_title: Replace $where-based MongoDB query in getProductReviews with a parameterized equality filter
  remediation:
    effort: Low
    steps:
    - 'Replace the `$where` expression with a direct equality filter: `db.reviewsCollection.find({ product: productId })`
      where `productId` is the integer value. This eliminates server-side JavaScript evaluation entirely.'
    - 'Validate that `productId` is a finite positive integer before querying: `if (!Number.isFinite(productId) || productId
      <= 0) return []`.'
    - 'Check MongoDB server configuration to ensure `$where` is disabled globally via `--noscripting` or `security.javascriptEnabled:
      false` in `mongod.conf`.'
    code_example: "// routes/chat.ts — replace $where with direct filter\nexecute: async ({ id }) => {\n  const productId\
      \ = Number(id)\n  if (!Number.isFinite(productId) || productId <= 0) return []\n  return await db.reviewsCollection.find(\n\
      \    { product: productId }\n  ) as Review[]\n}"
    reference: CWE-943
