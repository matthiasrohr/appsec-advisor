- local_id: sqlite-db-005
  threat_category_id: TH-06
  additional_categories:
  - TH-01
  stride: Elevation of Privilege
  cwe: CWE-915
  title: Mass Assignment Role Escalation — models/user.ts:79
  affected_parameter: role
  scenario: 'The `role` field in `models/user.ts:79` has a Sequelize `validate.isIn` check at the model level but the `set`
    hook simply calls `this.setDataValue(''role'', role)` without restricting callers from passing `role=admin` through a
    registration or profile-update API. Where routes accept a JSON body and pass it directly to `UserModel.create()` or `UserModel.update()`
    without a field allowlist, an attacker can include `"role": "admin"` in the request body to self-elevate. The model-level
    `isIn` validates the value (preventing unknown roles) but does not enforce that only the server may set privileged roles
    — it accepts `admin` from any caller.'
  evidence_summary: '`User.init()` at `models/user.ts:79` accepts `role` as a settable field with `validate.isIn` but no write-protection
    against external callers elevating to `admin`.'
  impact_description: A newly registered or existing user can elevate to `role=admin` by including the field in the registration
    or profile-update payload, gaining administrative access to all application functions.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: 'Sequelize `validate.isIn` rejects unknown role strings; `defaultValue: ''customer''` applies when the
    field is omitted. Neither blocks explicit `role=admin` from a caller.'
  mitigation_title: Strip privileged fields from user-controlled input in registration and profile routes
  remediation:
    effort: Low
    steps:
    - 'In every route that calls `UserModel.create()` or `UserModel.update()` with user-supplied body data, destructure only
      the allowed fields: `const { username, email, password } = req.body` — never spread `req.body` directly.'
    - 'Add a server-enforced allowlist: `const ALLOWED_REGISTRATION_FIELDS = [''username'', ''email'', ''password'']` and
      validate that no additional keys from `req.body` are passed to the model.'
    - 'Verify via integration test that `POST /api/Users` with `{ "role": "admin" }` results in `role=customer` in the created
      record.'
    code_example: "// Safe registration — strip privileged fields\nconst { username, email, password } = req.body\nUserModel.create({\
      \ username, email, password })\n  .then(user => res.json(user))\n  .catch(next)"
    reference: CWE-915
  evidence:
