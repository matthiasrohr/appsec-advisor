- local_id: backend-api-014
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-915
  title: Mass Assignment to role Field in User Registration — server.ts:419
  affected_parameter: role
  scenario: '`POST /api/Users` is the open registration endpoint. The route handler at `server.ts:407-421` validates that
    `email`, `password`, and `passwordRepeat` are non-empty, then passes the entire `req.body` to the finale-rest auto-generated
    handler which calls `UserModel.create(req.body)`. The `User` Sequelize model includes a `role` field. Since there is no
    field allowlist stripping `role` before model creation, a registration request `{ "email": "attacker@evil.com", "password":
    "pass123", "passwordRepeat": "pass123", "role": "admin" }` creates an admin-role account. `verify.registerAdminChallenge()`
    at `server.ts:419` detects this for challenge-scoring purposes but does NOT reject the request.'
  evidence_summary: '`POST /api/Users` body is passed to `UserModel.create()` via finale without a field allowlist, and the
    `role` field is writable on the User model.'
  impact_description: Any unauthenticated user can self-register an admin account, gaining access to all admin-protected API
    endpoints and the admin panel.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: '`verify.registerAdminChallenge()` detects the condition for scoring but does not block it.'
  mitigation_title: Exclude role field from user registration body before model creation
  remediation:
    effort: Low
    steps:
    - Add a middleware before `finale.initialize()` that strips `role`, `totpSecret`, and any other privileged fields from
      `req.body` on `POST /api/Users`.
