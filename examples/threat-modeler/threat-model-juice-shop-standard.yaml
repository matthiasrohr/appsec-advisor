  title: Zip-Slip Path Traversal — routes/fileUpload.ts:45
  affected_parameter: file (multipart ZIP upload), entry.path
  scenario: An unauthenticated attacker uploads a ZIP file containing an entry with a path like ../../ftp/legal.md. At fileUpload.ts:41,
    entry.path is concatenated directly into 'uploads/complaints/' + fileName without path sanitization. path.resolve() normalizes
    the result to /app/ftp/legal.md (line 42). The guard at line 44 checks absolutePath.includes(path.resolve('.')) which
    matches because the resolved path still contains the working directory prefix — the check does not enforce confinement
    to the uploads/complaints/ subdirectory. At line 45, fs.createWriteStream('uploads/complaints/' + fileName) then writes
    the entry content to the traversed path, overwriting existing files within the application working directory tree.
  evidence_summary: entry.path from the ZIP archive is concatenated unsanitized at line 45; the containment check at line
    44 uses path.resolve('.') as the guard boundary (the entire app root) rather than path.resolve('uploads/complaints/'),
    allowing writes to any subdirectory of the app root.
  impact_description: Attacker overwrites application files (e.g., ftp/legal.md, config files) within the app working directory,
    enabling content tampering or file corruption. The challenge at line 43 explicitly confirms ftp/legal.md is a reachable
    target.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: path.resolve() normalization (prevents escaping the OS root); string includes() check against working
    directory prefix (insufficient — does not constrain to uploads/complaints/)
  mitigation_title: Validate extracted ZIP entry paths against the intended upload directory prefix before writing
  remediation:
    effort: Low
    steps:
    - 'Replace the path.resolve(''.'') boundary check with a check against the resolved uploads/complaints/ directory: const
      uploadDir = path.resolve(''uploads/complaints/''); if (!absolutePath.startsWith(uploadDir + path.sep)) { entry.autodrain();
      return; }'
    - Use path.basename(entry.path) to strip any directory component from the entry filename before writing, preventing any
      subdirectory traversal regardless of boundary check.
    - Consider using the unzipper library's safeFilter option or a well-audited zip-extraction helper that sanitizes entry
      paths by default.
    code_example: "// routes/fileUpload.ts — safe extraction\nconst uploadDir = path.resolve('uploads/complaints')\nconst\
      \ fileName = path.basename(entry.path)  // strip directory components\nconst absolutePath = path.resolve(uploadDir,\
      \ fileName)\nif (!absolutePath.startsWith(uploadDir + path.sep)) {\n  entry.autodrain()\n  return\n}\nentry.pipe(fs.createWriteStream(absolutePath))"
    reference: CWE-22
