  title: Missing Authentication on WebSocket Connection — registerWebsocketEvents.ts:24
  affected_parameter: Socket.IO connection handshake
  scenario: The Socket.IO server registers a 'connection' event handler at line 24 with no authentication middleware. Any
    script or browser tab — authenticated or not — can establish a WebSocket connection and both receive all broadcast messages
    and invoke all event handlers. The CORS origin restriction (`http://localhost:4200`, line 20) applies only to browser-originated
    requests and is bypassed by wscat, curl, or socket.io-client in a script. Because no `io.use()` middleware validates a
    JWT or session token before the connection is accepted, an unauthenticated attacker connecting from any network-reachable
    host can participate in the WebSocket channel as if they were a legitimate authenticated user.
  evidence_summary: io.on('connection', ...) at line 24 has no preceding io.use() middleware that validates a bearer token
    or session; the only Socket.IO constructor option is the CORS origin setting at line 20.
  impact_description: Unauthenticated access to all WebSocket event handlers, enabling reception of CTF flags, challenge-solve
    notifications, and ability to invoke all server-side verification events.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin limited to http://localhost:4200 in Socket.IO constructor (browser-only restriction, not
    a true auth control)
  mitigation_title: Add JWT authentication middleware to Socket.IO connection via io.use() before accepting connections
  remediation:
    effort: Medium
    steps:
    - Add an `io.use()` middleware that extracts and verifies the JWT from `socket.handshake.auth.token` or `socket.handshake.headers.authorization`
      using the same `security.verify()` / `express-jwt` logic used on HTTP routes.
    - Reject the connection with `next(new Error('Unauthorized'))` when the token is missing or invalid.
    - Pass the verified user identity into `socket.data.user` so event handlers can perform per-user authorization checks.
    - 'Update the Angular SPA (`registerWebsocketEvents.ts` call site) to pass the JWT as `auth: { token }` in the Socket.IO
      client constructor options.'
    code_example: "// lib/startup/registerWebsocketEvents.ts\nconst io = new Server(server, { cors: { origin: 'http://localhost:4200'\
      \ } })\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  if (!token) return next(new Error('Unauthorized'))\n\
      \  try {\n    socket.data.user = security.verify(token)\n    next()\n  } catch {\n    next(new Error('Unauthorized'))\n\
      \  }\n})"
