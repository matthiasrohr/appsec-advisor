  mitigation_title: Add --ignore-scripts to all npm install calls in CI workflows that run before security-sensitive steps
  remediation:
    effort: Medium
    steps:
    - Change `npm install` to `npm install --ignore-scripts` in the `frontend-test`, `server-test`, `api-test`, `e2e-test`,
      and `custom-config-test` jobs. Run build steps (`npm run build:frontend`) explicitly and separately after the install
      step.
