  title: User Controlled UserId in Memory Creation (routes/memory.ts:15)
  affected_parameter: UserId
  scenario: '`addMemory` at `routes/memory.ts:15` constructs the database record as `{ caption: req.body.caption, imagePath:
    ..., UserId: req.body.UserId }`. The middleware chain at `server.ts:312` includes `security.appendUserId()`, which overwrites
    `req.body.UserId` with the authenticated user''s ID from the token map. However, `security.appendUserId()` at `lib/insecurity.ts:180`
    reads `req.body.UserId` from the token map, but if the token lookup fails (`tokenMap[utils.jwtFrom(req)]` returns undefined),
    the `try` block throws and the route returns 401 — meaning the overwrite never happens and `req.body.UserId` from the
    original request body would flow into `MemoryModel.create()`. An attacker who crafts a malformed or expired token that
    causes `appendUserId` to throw might trigger this path, recording a memory under an arbitrary UserId.'
  evidence_summary: '`routes/memory.ts:15` uses `req.body.UserId` directly in `MemoryModel.create()` without a separate server-side
    assertion that the value matches the authenticated user; correctness depends entirely on `security.appendUserId()` succeeding
    and overwriting the field.'
  impact_description: An attacker may associate uploaded images with another user's account, enabling social-engineering attacks
