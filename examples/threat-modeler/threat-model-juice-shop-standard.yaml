  title: No Token Revocation Mechanism (lib/insecurity.ts:72)
  affected_parameter: null
  scenario: 'The authenticatedUsers object (lib/insecurity.ts line 72) provides put(), get(), and tokenOf() operations on
    an in-memory tokenMap, but no delete() or revoke() method. There is no logout endpoint in server.ts (confirmed: grep for
    ''logout'' in routes/ and server.ts returns zero hits). JWT tokens expire after 6 hours (lib/insecurity.ts line 56), but
    stolen or leaked tokens cannot be invalidated before that window. An attacker who captures a token via XSS, network intercept,
    or log reading retains full authenticated access for up to 6 hours regardless of any server-side session termination attempt
    by the legitimate user.'
  evidence_summary: authenticatedUsers at lib/insecurity.ts:72 defines tokenMap as a lookup-only store with no revocation
    API; server.ts has no logout route that would clear a token entry.
  impact_description: Stolen JWT tokens remain usable for the full 6-hour expiry window; there is no server-side mechanism
    to invalidate them after compromise.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Token expiry set to 6 hours; tokenMap holds current sessions but provides no revocation path.
