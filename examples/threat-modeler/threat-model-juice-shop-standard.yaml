trust_boundaries:
- id: tb-1
  name: Public Internet / Express Application
  from: external
  to: express-backend
  protocol: HTTP (no TLS in default config)
  enforcement: No enforcement — CORS wildcard; deployment-time perimeter controls out of scope for source-tree review
  weakness: All origins allowed; no TLS enforced at application layer; HTTP-only by default
- id: tb-2
  name: Express Application / SQLite Data Store
  from: express-backend
  to: data-layer
  protocol: In-process (Sequelize ORM)
  enforcement: Sequelize ORM — but bypassed via .query() with raw string interpolation
  weakness: Raw SQL in login.ts:34 and search.ts:23 bypasses ORM parameterization
- id: tb-3
  name: Express Application / MarsDB NoSQL Store
  from: express-backend
  to: data-layer
  protocol: In-process (MarsDB API)
  enforcement: None — $where clause accepts raw JavaScript from user input
  weakness: JavaScript injection via $where; multi:true allows mass updates
- id: tb-4
  name: Express Application / Local Filesystem
  from: express-backend
  to: data-layer
  protocol: In-process (Node.js fs)
  enforcement: Partial path check (absolutePath.includes(path.resolve('.'))) in ZIP handler
  weakness: Path traversal bypass possible; ftp/ and encryptionkeys/ served publicly via serve-index
- id: tb-5
  name: Unauthenticated / Authenticated Zone
  from: external
  to: express-backend
  protocol: JWT Bearer token in Authorization header or cookie
  enforcement: express-jwt 0.1.3 middleware on selected routes; missing on /ftp/, /encryptionkeys/, /rest/admin/*
  weakness: express-jwt 0.1.3 vulnerable to alg:none bypass; private key committed to repo enables token forgery
- id: tb-6
  name: Application / VM Sandbox
  from: express-backend
  to: b2b-api
  protocol: In-process (Node.js vm.createContext + notevil)
  enforcement: notevil sandbox + vm timeout 2000ms
  weakness: notevil sandboxing is incomplete; timeout is the primary DoS control; error responses leak execution output
- id: tb-7
  name: Authenticated / Admin Zone
  from: express-backend
  to: express-backend
  protocol: In-process JWT role claim check
  enforcement: security.isAccounting() checks role on select routes; most admin endpoints only check isAuthorized()
  weakness: No RBAC framework; admin detection relies on JWT role claim which is forgeable via committed private key
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Authentication
  effectiveness: Unsafe
  kind: mechanism
  assessment: 'Login at routes/login.ts:34 uses raw SQL interpolation: `SELECT * FROM Users WHERE email = ''${req.body.email}''`.
    Authentication bypass via SQL injection is trivial. Additionally, passwords are hashed with MD5 (lib/insecurity.ts:43)
    — not bcrypt/argon2.'
  group_subcontrols: true
  subcontrols:
  - title: Login
    effectiveness: Unsafe
    status_note: Raw SQL injection at routes/login.ts:34; bypasses authentication entirely
    assessment: No parameterized queries; SQLi bypass is a known CTF challenge
  - title: Registration
    effectiveness: Partial
    status_note: Open registration; no email verification; admin role can be assigned via API
    assessment: POST /api/Users has no email verification and no role restriction in the API model
  - title: Password Storage
    effectiveness: Unsafe
    status_note: MD5 used at lib/insecurity.ts:43 — not bcrypt; trivially reversible
    assessment: crypto.createHash('md5') is intentionally weak per CTF design
  - title: Password Reset
    effectiveness: Weak
    status_note: Rate-limited but X-Forwarded-For header bypassable at server.ts:346
    assessment: Security questions are enumerable; rate-limit key uses unvalidated X-Forwarded-For
- domain: Identity and Authentication Controls
  control: OAuth / Google OAuth
  effectiveness: Partial
  kind: mechanism
  assessment: Google OAuth is configured in config/default.yml:48 with clientId. OAuth flow exists but is optional and the
    JWT issued afterward uses the same vulnerable signing mechanism.
- domain: Identity and Authentication Controls
  control: TOTP / 2FA
  effectiveness: Partial
  kind: mechanism
  assessment: 2FA via TOTP is implemented at routes/2fa.ts. Rate-limited at 100 req/5min. However, the JWT private key being
    committed means 2FA can be bypassed by forging a token that claims 2FA is already verified.
- domain: Session and Token Controls
  control: JWT RS256 Token Issuance
  effectiveness: Unsafe
  kind: primitive
  assessment: RSA private key hardcoded at lib/insecurity.ts:23 and committed to public GitHub repository. express-jwt@0.1.3
    is vulnerable to CVE-2020-15084 (alg:none bypass). jsonwebtoken@0.4.0 does not enforce algorithm. Token map stored in
    process memory (authenticatedUsers.tokenMap) — no persistent revocation.
- domain: Session and Token Controls
  control: Cookie Security
  effectiveness: Weak
  kind: primitive
  assessment: Cookie parser uses hardcoded secret 'kekse' at server.ts:289. Token cookie not marked HttpOnly. JWT also accepted
    from Authorization header, increasing XSS exposure.
- domain: Authorization Controls
  control: Route-Level Authorization
  effectiveness: Weak
  kind: mechanism
  assessment: 'security.isAuthorized() applied inconsistently — /ftp/, /encryptionkeys/, /support/logs/, /rest/admin/application-version,
    /rest/admin/application-configuration are accessible without authentication. BOLA on /rest/basket/:id: no UserId ownership
    check.'
- domain: Authorization Controls
  control: Role-Based Access Control (RBAC)
  effectiveness: Weak
  kind: mechanism
  assessment: Role checks via JWT claim only (roles.accounting, roles.admin in lib/insecurity.ts). Role claim is forgeable
    via committed private key. No server-side role store or session management.
- domain: Query Construction and Data Access Controls
  control: SQL Parameterization
  effectiveness: Unsafe
  kind: cross-cutting
  assessment: Raw SQL string interpolation at routes/login.ts:34 and routes/search.ts:23. Sequelize ORM .query() called without
    parameterization. All other Sequelize queries use parameterized methods.
- domain: Query Construction and Data Access Controls
  control: NoSQL Injection Prevention
  effectiveness: Missing
  kind: cross-cutting
  assessment: 'MarsDB $where clause at routes/showProductReviews.ts:34 accepts raw JavaScript from user input: `{ $where:
    ''this.product == '' + id }`. No sanitization. Additionally routes/updateProductReviews.ts uses multi:true with unvalidated
    _id.'
- domain: Input Boundary Validation Controls
  control: Input Validation and Allowlisting
  effectiveness: Partial
  kind: cross-cutting
  assessment: URL deduplication at server.ts:203. File type checks in handleZipFileUpload and checkFileType. However, most
    route handlers accept arbitrary input without schema validation. No framework-level input validation (e.g. Joi, zod).
- domain: Input Boundary Validation Controls
  control: File Upload Validation
  effectiveness: Weak
  kind: surface
  assessment: File size limit (200KB) via multer. File type check exists but is bypassable. ZIP path-traversal check uses
    absolutePath.includes(path.resolve('.')) which is breakable. XML uploads processed with noent:true (XXE).
- domain: Output Encoding and Rendering Controls
  control: XSS Prevention
  effectiveness: Unsafe
  kind: cross-cutting
  assessment: 'Angular DomSanitizer.bypassSecurityTrustHtml() called in: about.component.ts:119 (feedback), search-result.component.ts:170
    (search query), last-login-ip.component.ts:39 (IP field). Helmet XSS filter intentionally disabled at server.ts:187. Multiple
    [innerHTML] bindings without sanitization in templates.'
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Unsafe
  kind: mechanism
  assessment: app.use(cors()) with no options at server.ts:182 — allows all origins, all methods, all headers. OWASP best
    practice requires origin allowlist.
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy (CSP)
  effectiveness: Missing
  kind: mechanism
  assessment: No application-wide CSP header. Profile page sets a per-user CSP via server.ts:88 that includes `unsafe-eval`
    and reflects user-controlled profileImage URL — making it exploitable for additional XSS.
- domain: Browser and Cross-Origin Controls
  control: CSRF Protection
  effectiveness: Missing
  kind: mechanism
  assessment: No CSRF tokens anywhere. CORS wildcard makes this exploitable from any origin.
- domain: Cryptography, Secrets and Data Protection
  control: Cryptographic Key Management
  effectiveness: Unsafe
  kind: primitive
  assessment: RSA private key (1024-bit) hardcoded in lib/insecurity.ts:23. HMAC key 'pa4qacea4VK9t9nGv7yZtwmj' hardcoded
    at lib/insecurity.ts:44. Cookie secret 'kekse' hardcoded at server.ts:289. Premium key committed at encryptionkeys/premium.key.
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing Algorithm
  effectiveness: Unsafe
  kind: primitive
  assessment: MD5 used for password hashing at lib/insecurity.ts:43 — computationally trivial to reverse. No salt applied.
    Should use bcrypt/argon2/scrypt.
  audit_flags:
  - control_domain_reclassified_from_Cryptography, Secrets and Data Protection
- domain: Cryptography Secrets and Data Protection
  control: Transport Encryption (TLS)
  effectiveness: Missing
  kind: mechanism
  assessment: Application serves HTTP only on port 3000 by default. No TLS termination configured in source. Production deployment
    must add TLS termination externally.
  audit_flags:
  - control_domain_reclassified_from_Cryptography, Secrets and Data Protection
- domain: File, Parser and Outbound Request Controls
  control: XML Entity Processing
  effectiveness: Unsafe
  kind: surface
  assessment: 'libxmljs2.parseXml() called with `noent: true` at routes/fileUpload.ts:83 — external entity resolution enabled.
    This is the XXE vulnerability (xxeFileDisclosureChallenge, xxeDosChallenge).'
- domain: File Parser and Outbound Request Controls
  control: Server-Side Request Forgery (SSRF) Prevention
  effectiveness: Missing
  kind: surface
  assessment: fetch(req.body.imageUrl) at routes/profileImageUrlUpload.ts:24 with no URL validation, no allowlist, no SSRF
    filter. Any URL reachable from the container can be fetched.
  audit_flags:
  - control_domain_reclassified_from_File, Parser and Outbound Request Controls
- domain: File, Parser and Outbound Request Controls
  control: Archive Extraction Safety
  effectiveness: Weak
  kind: surface
  assessment: ZIP extraction at routes/fileUpload.ts:44 uses absolutePath.includes(path.resolve('.')) to check for path traversal.
    This check is insufficient — crafted paths can escape the upload directory.
- domain: Operations, Runtime and Supply Chain Controls
  control: Dependency Vulnerability Management
  effectiveness: Weak
  kind: lifecycle
  assessment: express-jwt@0.1.3 vulnerable to CVE-2020-15084. jsonwebtoken@0.4.0 (2014) lacks algorithm enforcement. marsdb@0.6.11
    unmaintained since 2017. notevil@1.3.3 sandbox-escape risk. CycloneDX SBOM generated at build time — good. No automated
    update tooling configured.
- domain: Operations, Runtime and Supply Chain Controls
  control: Container Security
  effectiveness: Adequate
  kind: lifecycle
  assessment: Dockerfile uses gcr.io/distroless/nodejs24-debian13 runtime image (minimal attack surface). Runs as non-root
    user 65532. Multi-stage build removes build tooling. Good baseline container hardening.
- domain: Operations, Runtime and Supply Chain Controls
  control: CI/CD Pipeline Security
  effectiveness: Partial
  kind: lifecycle
  assessment: GitHub Actions workflows mostly pinned to commit SHAs (good). CodeQL analysis configured. However, --unsafe-perm
    in Dockerfile npm install allows postinstall script privilege escalation during build.
- domain: Operations, Runtime and Supply Chain Controls
  control: Observability and Logging
  effectiveness: Partial
  kind: cross-cutting
  assessment: Morgan access logging to rotating files. Prometheus metrics at /metrics (unauthenticated). No security event
    logging, no intrusion detection logging. Access logs browseable without authentication via /support/logs/.
- domain: Identity and Authentication Controls
  control: Rate Limiting
  effectiveness: Weak
  kind: cross-cutting
  assessment: Rate limiting only on /rest/user/reset-password (100/5min) and /rest/2fa/* endpoints. Login endpoint has NO
    rate limiting. Rate limit key uses X-Forwarded-For header at server.ts:346 without proxy trust validation — bypassable
    via header injection.
  audit_flags:
  - control_domain_reclassified_from_Operations, Runtime and Supply Chain Controls
- domain: Real-time and Not Applicable Controls
  control: WebSocket / Socket.IO Authentication
  effectiveness: Missing
  kind: mechanism
  assessment: Socket.IO used for real-time challenge notifications. No authentication on WebSocket connection — any client
    can connect and receive or send events.
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
