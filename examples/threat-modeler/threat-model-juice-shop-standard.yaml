  - T-001
  - T-002
  - T-015
  - T-016
  - T-018
  - T-019
  - T-022
- id: b2b-api
  name: B2B Order API
  description: POST /b2b/v2/orders — accepts JSON order data and evaluates orderLinesData through the notevil sandbox inside
    a Node.js vm context. Known to be exploitable via prototype pollution for RCE.
  tier: application
  paths:
  - routes/b2bOrder.ts
  deployment_zones:
  - container
  handles_sensitive_data: true
  complexity: moderate
  tags:
  - rce
  - sandbox
  - notevil
  - prototype-pollution
  threat_ids:
  - T-003
  - T-009
  - T-020
  - T-033
  - T-046
- id: file-upload
  name: File Upload Handler
  description: POST /file-upload — handles ZIP, XML, YAML uploads via multer. XML parsing uses libxmljs with noent:true enabling
    XXE. No authentication required. ZIP handler has path traversal risk.
  tier: application
  paths:
  - routes/fileUpload.ts
  deployment_zones:
  - container
  handles_sensitive_data: false
  complexity: moderate
  tags:
  - xxe
  - path-traversal
  - file-upload
  - no-auth
  threat_ids:
  - T-010
  - T-013
  - T-017
  - T-028
  - T-035
  - T-040
  - T-044
- id: chatbot
  name: AI Chatbot (LLM Integration)
  description: POST /rest/chat — integrates with OpenAI-compatible LLM API. System prompt includes username. Vulnerable to
    prompt injection (forces discount coupon generation) and greedy injection (50%+ discount). Uses @ai-sdk/openai-compatible
    with tool-call capability.
  tier: application
  paths:
  - routes/chat.ts
  deployment_zones:
  - container
  handles_sensitive_data: false
  complexity: moderate
  tags:
  - prompt-injection
  - llm
  - tool-abuse
  - ai
  threat_ids:
  - T-005
  - T-011
  - T-012
  - T-034
  - T-039
  - T-043
  - T-047
  - T-051
- id: angular-frontend
  name: Angular 20 SPA
  description: Angular 20 single-page application served from frontend/dist/. JWT stored in localStorage (XSS-accessible).
    Client-side auth guards bypassable via direct API calls. DOM XSS via search results and iframe payloads.
  tier: client
  paths:
  - frontend/src/
  deployment_zones:
  - browser
  handles_sensitive_data: true
  complexity: moderate
  tags:
  - xss
  - localStorage
  - angular
  - dom-xss
  threat_ids: []
- id: sqlite-db
  name: SQLite3 Database
  description: In-process SQLite3 database accessed via Sequelize ORM. Contains user credentials (MD5-hashed), PII, orders,
    feedback, and security questions. Raw Sequelize queries on login and search bypass ORM parameterization.
  tier: data
  paths:
  - models/
  - data/
  deployment_zones:
  - container
  handles_sensitive_data: true
  complexity: simple
  tags:
  - sql-injection
  - credentials
  - pii
  threat_ids:
  - T-021
  - T-029
  - T-030
  - T-042
- id: static-files
  name: Static File & Directory Server
  description: serve-index middleware exposes ftp/, encryptionkeys/, and logs/ directories publicly. The encryptionkeys/ directory
    contains jwt.pub (and potentially private keys). Intentional for training but severe in any production context.
  tier: application
  paths:
  - server.ts
  deployment_zones:
  - container
  handles_sensitive_data: true
  complexity: simple
  tags:
  - key-disclosure
  - log-disclosure
  - serve-index
  threat_ids:
  - T-031
- id: websocket
  name: Socket.IO WebSocket Gateway
  description: Socket.IO 3.1.2 real-time channel for challenge notifications and score board updates. No connection-level
