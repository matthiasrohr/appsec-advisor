  title: NoSQL Mass-Update Injection — routes/updateProductReviews.ts:18
  affected_parameter: id
  scenario: 'The updateProductReviews handler calls db.reviewsCollection.update({ _id: req.body.id }, { $set: { message: req.body.message
    } }, { multi: true }). Because req.body.id is passed directly to the MarsDB _id filter without sanitization and the update
    option is { multi: true }, an attacker can supply a MongoDB-style query object such as { $gt: '''' } as the id value.
    MarsDB interprets this as a comparison operator, matching all review documents. Combined with multi: true, the update
    overwrites the message field of every review in the database — a mass-data-tampering primitive. An authenticated session
    is required but any customer-tier user can exploit this.'
  evidence_summary: req.body.id flows directly into db.reviewsCollection.update() _id filter at routes/updateProductReviews.ts:18
    with multi:true at line 20.
  impact_description: Any authenticated user can overwrite all product reviews in the MarsDB collection in a single request,
    wiping legitimate review content.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Endpoint requires JWT authentication; MarsDB is in-memory (data lost on restart), but reviews are re-seeded
    from datacreator on startup
  mitigation_title: Validate review _id as a string literal and remove multi:true from updateProductReviews
  remediation:
    effort: Low
    steps:
