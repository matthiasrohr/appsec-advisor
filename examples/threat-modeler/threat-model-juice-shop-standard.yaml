- local_id: b2b-api-001
  threat_category_id: TH-05
  additional_categories:
  - TH-01
  stride: Elevation of Privilege
  cwe: CWE-94
  title: VM Sandbox Escape — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: '`routes/b2bOrder.ts:19` extracts `body.orderLinesData` with no structural validation and passes it to `vm.runInContext(''safeEval(orderLinesData)'',
    sandbox, { timeout: 2000 })` at line 23. The `notevil` sandbox wraps arithmetic-expression evaluation but is defeatable
    via prototype pollution: a payload such as `{}.constructor.constructor(''return process'')()` or a chain that writes to
    `Object.prototype.__defineGetter__` can escape the sandbox context and access the Node.js `process` global. Once outside
    the sandbox, the attacker has arbitrary server-side code execution at the privilege level of the Node.js process. The
    `rceChallenge` at line 31 confirms this attack path is intentionally wired in the application — the infinite-loop detection
    branch fires on successful exploitation. Combined with the `alg:none` authentication bypass (b2b-api-002), this path is
    reachable without any valid credentials.'
  evidence_summary: '`body.orderLinesData` flows unsanitized from the request body into `vm.runInContext(''safeEval(orderLinesData)'',
    sandbox)` at `routes/b2bOrder.ts:23` with no allowlist, type check, or structural schema validation applied before the
    eval call.'
  impact_description: Attacker achieves arbitrary server-side code execution as the Node.js process user — full server compromise,
    file system access, internal network access from the application container.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: '`notevil` sandbox wraps the `vm.runInContext` call (intended to restrict to safe arithmetic). A 2-second
    VM execution timeout (`timeout: 2000`) limits sustained CPU abuse. Neither control prevents prototype pollution escape.'
  mitigation_title: Remove eval-based order processing and replace with a typed schema parser
  remediation:
    effort: Medium
    steps:
    - Replace `vm.runInContext('safeEval(orderLinesData)', sandbox)` with a typed JSON schema validator (e.g. `zod` or `ajv`)
      that parses `orderLinesData` as a structured order-line array with explicit numeric/string field constraints. Reject
      any input that does not match the schema before processing.
    - If expression evaluation is functionally required, replace `notevil` with a purpose-built safe arithmetic evaluator
      that operates on a CST (not an AST that touches `Object.prototype`), such as `expr-eval` with a strict operator allowlist.
    - Add an integration test asserting that the payload `Object.constructor.constructor('return process')()` returns an HTTP
      400 (bad request) rather than executing.
    code_example: "import { z } from 'zod'\n\nconst OrderLineSchema = z.array(z.object({\n  productId: z.number().int().positive(),\n\
      \  quantity: z.number().int().positive().max(1000)\n}))\n\n// In handler:\nconst parsed = OrderLineSchema.safeParse(body.orderLinesData)\n\
      if (!parsed.success) {\n  return res.status(400).json({ error: 'Invalid order lines format' })\n}\n// use parsed.data\
      \ — never eval()"
    reference: CWE-94
  evidence:
  - file: routes/b2bOrder.ts
    line: 23
