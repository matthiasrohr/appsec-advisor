  title: XML and YAML Decompression Bomb — routes/fileUpload.ts:76
  affected_parameter: file (XML/YAML upload via POST /file-up…
  scenario: 'handleXmlUpload at routes/fileUpload.ts:70-99 passes the full XML buffer to parseXmlString in lib/xml.ts, which
    uses XML_PARSE_NOENT enabling recursive entity expansion. A Billion Laughs payload of 10 nested entities each referencing
    10 copies of the prior level produces ~10^10 expansions before the 2-second vm timeout fires — during which time the process
    may exhaust available memory. Similarly, handleYamlUpload at routes/fileUpload.ts:109 calls yaml.load(data) inside a vm
    context — a YAML anchor bomb (`a: &a [...]` nested 20+ levels) expands exponentially. The multer 200KB limit (server.ts:692)
    does not prevent either attack because bomb payloads are small before expansion. POST /file-upload requires no authentication
    (server.ts:309), making this reachable by any anonymous user.'
  evidence_summary: lib/xml.ts:35 uses XML_PARSE_NOENT|XML_PARSE_DTDLOAD enabling entity substitution; fileUpload.ts:114 confirms
    the YAML bomb path with a yamlBombChallenge trigger; both routes lack auth middleware in server.ts:309.
