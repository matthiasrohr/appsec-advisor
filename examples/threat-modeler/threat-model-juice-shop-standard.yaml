    ...)` from `oauth.component.ts:51` and `RequestInterceptor`''s localStorage reads. All authenticated requests go via the
    same-origin BFF, which appends the Authorization header server-side before proxying to the API. Remove `localStorage.setItem(''email'',
    ...)` and the corresponding `X-User-Email` header injection — the server derives the user identity from the validated
