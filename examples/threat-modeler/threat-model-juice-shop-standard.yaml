- id: M-072
  title: Move data export rate limiting to server-side middleware; remove client-side localStorage gate
  kind: fix
  priority: P3
  severity: Medium
  effort: Medium
  threat_ids:
  - T-088
  how: 'Implement server-side rate limiting on the data export endpoint using `express-rate-limit`: allow at most 1 export
    per 5 minutes per authenticated user, tracked by user ID in server memory or Redis. Remove the `lstdtxprt` localStorage
    check from the frontend entirely; the frontend should simply call the endpoint and display the error if rate-limited (HTTP
    429). Replace `window.open().document.write(this.userData)` with a proper file download: `const blob = new Blob([userData],
    {type: ''application/json''}); saveAs(blob, ''data-export.json'')` to avoid the popup XSS risk.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-400
  _title_source: Move data export rate limiting to server-side middleware; remove client-side localStorage gate
- id: M-073
  title: Restrict pull_request_target permissions and isolate ORG_ADMIN_TOKEN to a separate minimal workflow
  kind: fix
  priority: P3
  severity: Medium
  effort: Medium
  threat_ids:
  - T-089
  how: 'Move the `Block Spammer` step (which needs `ORG_ADMIN_TOKEN`) to a separate workflow that runs only after the compliance
    check completes, triggered by a `workflow_run` event with a condition on the spam score output — this isolates the admin
    token from the PR data processing context. Add `permissions: pull-requests: write, issues: write, contents: none` explicitly
    (removing `read-all` default) so the token cannot be escalated to repository write operations. Validate that `JSON.parse(process.env.PR_JSON)`
    cannot be bypassed by testing with PR titles/bodies containing `}`, `"`, and control characters — the JSON is produced
    by `core.setOutput` which should handle encoding, but this should be confirmed. Consider replacing `pull_request_target`
    with `pull_request` for the compliance checks that don''t need write permissions; only the comment-posting step needs
    elevated access and can be triggered via a second workflow.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-284
  _title_source: Restrict pull_request_target permissions and isolate ORG_ADMIN_TOKEN to a separate minimal workflow
- id: M-074
  title: Add security audit logging
  kind: fix
  priority: P4
  severity: Low
  effort: Low
  threat_ids:
  - T-090
  how: In each `socket.on(...)` handler, emit a structured log entry including `socket.id`, `socket.handshake.address`, and
    the authenticated user ID (once auth middleware from realtime-channel-001 is in place). Pass actor context from the socket
    into `challengeUtils.solve()` so the solve-log entry includes `{ userId, socketId, remoteIp }` fields. Ensure logs are
    forwarded to an append-only sink (not the same process) so socket-level entries cannot be deleted by the attacker who
    triggered them.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-778
  _title_source: Log socket identity and source IP on inbound challenge-verify events
