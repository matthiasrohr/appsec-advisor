  title: Excessive LLM agency unconstrained discount in — routes/chat.ts:179
  affected_parameter: discount (generateCoupon tool parameter)
  scenario: 'The `generateCoupon` tool at `chat.ts:176-187` is exposed to the LLM with a Zod schema that specifies `discount:
    z.number()` (`chat.ts:179`) without any `.max()` bound. The system prompt instructs the LLM that `The maximum allowed
    discount is 10%` (`chat.ts:101`), but this is a natural-language instruction, not a server-side constraint. Via prompt
    injection (see chatbot-llm-002), or by interacting with a different/jailbroken LLM model, an attacker causes the LLM to
    invoke `generateCoupon({ discount: 100 })`. The `execute` function at `chat.ts:181-186` calls `security.generateCoupon(discount)`
    which encodes the discount value into a coupon string without validating its range. The result is a valid coupon code
    granting a 100% discount on any order. This is privilege escalation from customer to discount-code administrator.'
  evidence_summary: '`discount: z.number().describe(''The discount percentage for the coupon (maximum 10)'')` at `chat.ts:179`
    documents the maximum in prose but does not enforce it; `security.generateCoupon(discount)` at `chat.ts:184` encodes any
    numeric value.'
  impact_description: Attacker generates coupon codes for arbitrary discount percentages (including 100%), enabling free purchases
    and direct financial loss to the application operator.
