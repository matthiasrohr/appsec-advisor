- local_id: ci-cd-pipeline-005
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-284
  title: Improper Access Control — pr-compliance.yml:4
  affected_parameter: null
  scenario: '`pr-compliance.yml` uses the `pull_request_target` trigger at line 4 and declares `permissions: pull-requests:
    write` and `issues: write` at lines 7-9. Unlike `pull_request`, the `pull_request_target` event runs in the context of
    the base repository — giving it access to base-repo secrets and write permissions — even for PRs from untrusted forks.
    The current workflow mitigates the most critical variant (RCE from checked-out PR code) by NOT checking out the PR HEAD;
    instead it extracts PR metadata through the GitHub API and passes it as JSON environment variables. However, the spam-detection
    step at `ci.yml` injects PR body and title content into a JavaScript `eval`-equivalent context inside `actions/github-script`.
    If PR title or body contains specially crafted content that escapes the JSON encoding (`JSON.parse(process.env.PR_JSON)`
    at line 88 and others), an attacker could inject malicious script logic. Additionally, the `Block Spammer` step (`pr-compliance.yml:433`)
    loads `ORG_ADMIN_TOKEN` — an org-level admin token — as an environment variable in the same runner that processes external
    PR data.'
  evidence_summary: '`pr-compliance.yml:4` triggers on `pull_request_target` (base-repo context with write permissions) for
    every externally submitted PR, while `pr-compliance.yml:438` loads `ORG_ADMIN_TOKEN` into the same runner environment.'
  impact_description: 'An attacker who successfully injects into the github-script execution context gains `pull-requests:
    write`, `issues: write` permissions and access to the `ORG_ADMIN_TOKEN` — enabling org-level user blocking or account
    enumeration.'
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The workflow does not check out PR HEAD code. PR data is pre-filtered via GitHub API calls before being
    passed to scripts. Actions are SHA-pinned. Org-membership check skips external contributors who are org members.
  mitigation_title: Restrict pull_request_target permissions and isolate ORG_ADMIN_TOKEN to a separate minimal workflow
  remediation:
    effort: Medium
    steps:
    - Move the `Block Spammer` step (which needs `ORG_ADMIN_TOKEN`) to a separate workflow that runs only after the compliance
      check completes, triggered by a `workflow_run` event with a condition on the spam score output — this isolates the admin
      token from the PR data processing context.
    - 'Add `permissions: pull-requests: write, issues: write, contents: none` explicitly (removing `read-all` default) so
      the token cannot be escalated to repository write operations.'
    - Validate that `JSON.parse(process.env.PR_JSON)` cannot be bypassed by testing with PR titles/bodies containing `}`,
      `"`, and control characters — the JSON is produced by `core.setOutput` which should handle encoding, but this should
      be confirmed.
    - Consider replacing `pull_request_target` with `pull_request` for the compliance checks that don't need write permissions;
      only the comment-posting step needs elevated access and can be triggered via a second workflow.
    code_example: null
    reference: CWE-284
