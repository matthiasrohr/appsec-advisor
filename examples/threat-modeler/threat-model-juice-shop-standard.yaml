  title: Remote Code Execution — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData (request body)
  scenario: 'The B2B order handler at b2bOrder.ts:19-24 passes `body.orderLinesData` directly to `vm.runInContext(''safeEval(orderLinesData)'',
    sandbox)`. The `notevil` library''s `safeEval` has known bypass vectors: prototype chain access (`this.constructor.constructor(''return
    process'')()`) and function constructor injection can escape the sandbox. The `vm` module provides a second containment
    layer but Node.js `vm` contexts are not security boundaries — they share the same V8 heap. An authenticated B2B user submits
    a crafted `orderLinesData` payload that escapes both `notevil` and `vm` to execute `require(''child_process'').execSync(''id'')`
    as the server process.'
  evidence_summary: '`vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 })` at b2bOrder.ts:23 evaluates
    user-supplied `body.orderLinesData` in a Node.js VM context with `notevil` sandboxing — both known to be insufficient
    isolation.'
  impact_description: Authenticated B2B user achieves OS-level code execution on the server.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: '`security.isAuthorized()` limits access to authenticated users on `/b2b/v2`; `notevil` provides partial
    expression sandboxing; `vm` context provides partial isolation. Neither is a reliable security boundary.'
  mitigation_title: Replace the VM-based code evaluation in b2bOrder with a structured data parser
  remediation:
    effort: Medium
    steps:
    - Remove the `vm.runInContext` / `safeEval` block at b2bOrder.ts:21-24. Replace with a JSON schema validator (`zod` or
      `ajv`) that parses `orderLinesData` as a typed order-line structure — no arbitrary expression evaluation required.
    - 'Define the expected order-line schema (e.g. `{ productId: number, quantity: number, unitPrice: number }[]`) and validate
      before processing.'
