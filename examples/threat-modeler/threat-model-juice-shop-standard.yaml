  title: Server-Side Request Forgery via Profile Image URL (profileImageUrlUpload.ts:24)
  affected_parameter: imageUrl
  scenario: 'profileImageUrlUpload.ts:24 calls `fetch(url)` where `url = req.body.imageUrl` with no scheme allowlist, no host
    allowlist, and no SSRF filter. An authenticated attacker POSTs `imageUrl=http://169.254.169.254/latest/meta-data/iam/security-credentials/`
    to POST /profile/image/url. The server fetches the AWS metadata endpoint, the response body is written to `frontend/dist/frontend/assets/public/images/uploads/<userId>.jpg`
    (line 29), and the attacker retrieves the IAM credentials by GETting the public static file path. The only filter at line
    20 detects `solve/challenges/server-side` in the URL — a challenge-tracking marker that does not block SSRF. Internal
    services reachable include: Prometheus metrics (localhost:9090), Redis (localhost:6379 — no HTTP response but connection
    probing), and any internal HTTP service.'
  evidence_summary: profileImageUrlUpload.ts:24 issues `fetch(url)` with an attacker-controlled URL and no hostname/scheme
    restriction; the response body is written to a publicly accessible static file path.
  impact_description: An authenticated attacker can read AWS instance metadata credentials, probe internal HTTP services,
    and retrieve responses via the publicly accessible static file server.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Only a regex check for `solve/challenges/server-side` in the URL (line 20) — this is a challenge marker,
    not a security control.
  mitigation_title: Add URL scheme and hostname allowlist before fetching attacker-controlled imageUrl
  remediation:
    effort: Medium
    steps:
    - Parse `req.body.imageUrl` with `new URL(url)` and reject any scheme other than `https:` (or a configured allowlist).
    - Resolve the URL's hostname to an IP address and block RFC 1918 ranges (10/8, 172.16/12, 192.168/16), loopback (127/8),
