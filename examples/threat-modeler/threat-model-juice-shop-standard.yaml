  - T-068
- id: A-005
  name: Payment Card Data
  classification: Restricted
  description: Credit/debit card data stored in the Basket/Payment models. Intentionally stored in cleartext for training
    purposes — real payment PCI-DSS concern in production deployments.
  linked_threats:
  - T-005
  - T-006
  - T-007
  - T-017
  - T-018
  - T-028
  - T-039
  - T-040
  - T-045
  - T-052
- id: A-006
  name: Application Source Code
  classification: Internal
  description: Full application source code including all intentional vulnerabilities, challenge solutions, and encryption
    keys. Public on GitHub, providing attackers complete advance knowledge of the attack surface.
  linked_threats:
  - T-002
  - T-008
  - T-020
  - T-029
  - T-068
- id: A-007
  name: GitHub Actions CI/CD Secrets
  classification: Restricted
  description: GITHUB_TOKEN and any repository secrets accessible to GitHub Actions workflows. 8 workflows with write-all
    inherited permissions and no SHA-pinned third-party actions create exfiltration risk.
  linked_threats: []
- id: A-008
  name: LLM API Key / Endpoint
  classification: Confidential
  description: OpenAI-compatible API key (OPENAI_API_KEY or equivalent) used by routes/chat.ts for the opt-in LLM chat feature.
    Stored in environment variable; not committed to repo.
  linked_threats: []
- id: A-009
  name: Uploaded User Files
  classification: Internal
  description: Files uploaded by users to the uploads/ directory and served via serve-index. Path traversal in upload handler
    could expose arbitrary filesystem paths.
  linked_threats: []
- id: A-010
  name: Encryption Keys Directory
  classification: Restricted
  description: The encryptionkeys/ directory contains plaintext private keys committed to the repository for training purposes.
    Readable by anyone with repo access.
  linked_threats:
  - T-002
  - T-008
  - T-020
  - T-029
  - T-068
- id: A-011
  name: Challenge State / Progress
  classification: Internal
  description: CTF challenge completion state stored in the Challenges model and Redis-like in-memory cache. Tampering allows
    false challenge-completion claims.
  linked_threats: []
- id: A-012
  name: Application Configuration
  classification: Internal
  description: Runtime configuration from config/default.json including feature flags, database paths, and security toggles.
    Exposed via /rest/admin/application-configuration endpoint without authentication.
  linked_threats: []
- id: A-013
  name: Product / Inventory Data
  classification: Public
  description: Product catalogue and pricing stored in SQLite. Publicly readable via /api/Products. Admin routes allow modification
    without server-side authorization checks.
  linked_threats:
  - T-001
  - T-005
  - T-006
  - T-013
  - T-014
  - T-017
  - T-018
  - T-038
  - T-039
  - T-040
  - T-043
  - T-044
  - T-052
  - T-053
  - T-055
- id: A-014
  name: Docker Container Image
  classification: Internal
  description: Published Docker image (bkimminich/juice-shop) built from GitHub Actions release workflow. No artifact signing,
    SBOM attestation, or SLSA provenance attached to releases.
  linked_threats: []
