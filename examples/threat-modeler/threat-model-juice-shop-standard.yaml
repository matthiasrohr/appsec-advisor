    - 'Replace the plain object `tokenMap` with an LRU-cache (`npm install lru-cache`) capped at 10,000 entries with a 6-hour
      TTL matching the JWT `expiresIn: ''6h''`'
    - Alternatively, eliminate the in-memory store entirely and derive session state directly from the verified JWT payload
