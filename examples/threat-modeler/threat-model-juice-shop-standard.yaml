  title: JWT Role Claim Accepted Without Server-Side Verification — lib/insecurity.ts:157
  scenario: 'An attacker who forges a JWT (via the hardcoded private key at `lib/insecurity.ts:21` or the algorithm confusion
    at line 55) includes `data.role: ''accounting''` or `data.role: ''admin''` in the payload. The `isAccounting()` middleware
    at `lib/insecurity.ts:154-163` reads `decodedToken?.data?.role` from the JWT payload and calls `next()` without consulting
    any server-side role store or database. An attacker escalates from anonymous or low-privilege to accounting or admin access
    on any route protected by this middleware, executing privileged actions such as financial exports or administrative user
    management.'
  evidence_summary: '`lib/insecurity.ts:157` authorizes the request solely by comparing `decodedToken?.data?.role === roles.accounting`,
    where `decodedToken` comes from the attacker-supplied JWT payload with no server-side role lookup.'
  impact_description: Attacker elevates to any application role (accounting, admin, deluxe) by embedding the target role string
    in a forged JWT, bypassing all server-side privilege checks.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Token signature is checked via `verify()`, but algorithm enforcement is missing (see auth-identity-002),
    and the role claim itself is never validated against a server-side source of truth.
  mitigation_title: Validate user roles against the database on each privileged request instead of trusting JWT claims
  remediation:
    effort: Medium
    steps:
    - 'In `isAccounting()` and equivalent role-check functions, look up the authenticated user''s role from the database using
      the `userId` embedded in the JWT rather than trusting the `role` claim: `const dbUser = await UserModel.findByPk(decoded.data.id);
      if (dbUser?.role !== roles.accounting) return res.status(403)...`.'
    - 'Remove role claims from the JWT payload entirely. The JWT should carry only a stable user identifier (e.g., `sub: userId`);
      all authorization decisions derive from the database row.'
    - As a defense-in-depth measure, fix the JWT algorithm confusion (auth-identity-002) and remove the hardcoded key (auth-identity-003)
      first, which prevents forgery of any role claim.
    code_example: "// lib/insecurity.ts — role check via DB\nexport const isAccounting = () =>\n  async (req: Request, res:\
      \ Response, next: NextFunction) => {\n    const decoded = verify(utils.jwtFrom(req)) && decode(utils.jwtFrom(req))\n\
      \    if (!decoded?.data?.id) return res.status(401).json({ error: 'Unauthorized' })\n    const user = await UserModel.findByPk(decoded.data.id)\n\
      \    if (user?.role === roles.accounting) return next()\n    res.status(403).json({ error: 'Forbidden' })\n  }"
    reference: CWE-285
