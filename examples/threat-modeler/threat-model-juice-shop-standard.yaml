  title: Hardcoded Cryptographic Key — lib/insecurity.ts:23
  affected_parameter: null
  scenario: 'The RSA private key used to sign all JWTs is embedded as a string literal at `lib/insecurity.ts:23`. The Juice
    Shop repository is public on GitHub; anyone who clones it has the full private key. With it, they call `jwt.sign({ data:
    { id: 1, role: ''admin'', email: ''admin@juice-sh.op'' } }, privateKey, { algorithm: ''RS256'', expiresIn: ''6h'' })`
    and produce a token the server''s `isAuthorized()` middleware accepts without question. The same key is reused by `deluxeToken()`
    at line 152 — so the hardcoded secret also compromises the deluxe-subscription entitlement check.'
  evidence_summary: A 1024-bit RSA private key PEM is assigned as a string constant at `lib/insecurity.ts:23`, committed to
    the public repository.
  impact_description: Any party with repository read access can forge tokens for any user role, bypassing the entire authentication
    layer.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the key is in the committed source tree.
  mitigation_title: Move JWT signing key to environment variable and rotate the committed key
  remediation:
    effort: Medium
    steps:
    - 'Generate a new RSA-2048 key pair (or switch to ECDSA P-256 for equivalent security at smaller size): `openssl genrsa
      -out jwt.key 2048 && openssl rsa -in jwt.key -pubout -out jwt.pub`.'
    - Store the private key in an environment variable (`JWT_PRIVATE_KEY`) or a secrets manager; read it at startup with `process.env.JWT_PRIVATE_KEY`
      — never commit to source.
    - Remove the hardcoded key from `lib/insecurity.ts:23` and replace with `const privateKey = process.env.JWT_PRIVATE_KEY`;
      add startup validation that aborts if the variable is absent.
    - 'Treat the old private key as compromised: invalidate all active sessions on deploy by requiring a different `kid` or
      issuer claim.'
    code_example: "// lib/insecurity.ts — read from environment\nconst privateKey = process.env.JWT_PRIVATE_KEY ??\n  (()\
      \ => { throw new Error('JWT_PRIVATE_KEY env var required') })()\nexport const publicKey = process.env.JWT_PUBLIC_KEY\
      \ ??\n  (() => { throw new Error('JWT_PUBLIC_KEY env var required') })()"
    reference: CWE-321
