  title: SQL Injection — routes/search.ts:23
  affected_parameter: q
  scenario: 'The search endpoint at `routes/search.ts:23` interpolates `req.query.q` directly into a raw SQL LIKE query: `SELECT
    * FROM Products WHERE ((name LIKE ''%${criteria}%'' OR ...`. An attacker sends `q=%'' UNION SELECT email,password,null,null,null,null,null
    FROM Users--` to extract all user credentials from the response. The length cap at 200 chars provides no injection barrier.
    The `sqlite_master` query at line 47 further confirms the schema is discoverable, enabling targeted extraction of any
    table.'
  evidence_summary: '`models.sequelize.query()` at `routes/search.ts:23` concatenates the `criteria` variable (sourced from
    `req.query.q`) without binding, allowing UNION-based data extraction.'
  impact_description: Complete exfiltration of Users table including hashed passwords and emails via UNION injection, and
    full schema disclosure via `sqlite_master`.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input length is capped at 200 characters but this does not prevent UNION injection.
  mitigation_title: Parameterize Products search query using Sequelize ORM or named bind parameters
  remediation:
    effort: Low
    steps:
    - 'Replace the raw LIKE query with `ProductModel.findAll({ where: { [Op.or]: [{ name: { [Op.like]: `%${criteria}%` } },
      { description: { [Op.like]: `%${criteria}%` } }], deletedAt: null }, order: [[''name'', ''ASC'']] })` — Sequelize escapes
      the LIKE value automatically.'
    - If Sequelize operators are not used, escape via `sequelize.escape(criteria)` before interpolation as a fallback.
    - Add a server-side input validation step rejecting criteria containing SQL metacharacters (`'`, `--`, `UNION`, `SELECT`)
      with a 400 response.
    code_example: "```typescript\nimport { Op } from 'sequelize'\n\n// AFTER (safe)\nProductModel.findAll({\n  where: {\n\
      \    [Op.and]: [\n      { deletedAt: null },\n      { [Op.or]: [\n        { name: { [Op.like]: `%${criteria}%` } },\n\
      \        { description: { [Op.like]: `%${criteria}%` } }\n      ]}\n    ]\n  },\n  order: [['name', 'ASC']]\n})\n```"
    reference: CWE-89
  evidence:
  - file: routes/search.ts
    line: 23
  evidence_check: verified
