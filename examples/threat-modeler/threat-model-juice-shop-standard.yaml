- local_id: rest-api-003
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-89
  title: SQL Injection via String Interpolation in Login Query (routes/login.ts:34)
  affected_parameter: email, password (POST body)
  scenario: 'The login handler at routes/login.ts:34 constructs a SQL query by directly interpolating `req.body.email` and
    `req.body.password` into the SQL string: `SELECT * FROM Users WHERE email = ''${req.body.email}'' AND password = ''${security.hash(req.body.password)}''`.
    An attacker submits `email=admin@juice-sh.op''--` and arbitrary password. The resulting query becomes `SELECT * FROM Users
    WHERE email = ''admin@juice-sh.op''--'' AND password = ''...''` — the password check is commented out. The attacker authenticates
    as any known user without credentials. Alternatively, submitting `'' OR 1=1--` logs in as the first user in the database
    (typically admin).'
  evidence_summary: models.sequelize.query() at routes/login.ts:34 receives a template literal with req.body.email and security.hash(req.body.password)
    interpolated directly into the SQL string without parameterization.
  impact_description: Authentication bypass for any account; with more complex payloads, full database schema and credential
    dump via UNION SELECT.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — req.body.email is used raw with no escaping or parameterized query.
  mitigation_title: Replace raw SQL string interpolation with Sequelize parameterized query or ORM findOne()
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `models.sequelize.query()` call with a Sequelize ORM query: `UserModel.findOne({ where: { email: req.body.email,
      password: security.hash(req.body.password), deletedAt: null } })`.'
    - 'If a raw query is required for any reason, use Sequelize replacements: `sequelize.query(''SELECT * FROM Users WHERE
      email = :email AND password = :password AND deletedAt IS NULL'', { replacements: { email: req.body.email, password:
      security.hash(req.body.password) }, model: UserModel, plain: true })`.'
    - 'Add input validation: reject emails that do not match a valid email regex before they reach the DB layer.'
