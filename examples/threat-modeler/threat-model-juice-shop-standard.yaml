tier_root_causes:
  edge:
  - missing input neutralization on Angular template rendering paths
  - JWT session tokens stored in localStorage (XSS-exfiltrable)
  - client-side auth guards bypassable without server-side enforcement
  server:
  - hardcoded cryptographic secrets committed to source (RSA key, JWT secret)
  - raw SQL and NoSQL query construction without parameterization
  - missing authentication middleware on admin and management endpoints
  - mass assignment permits privileged field injection at registration
  - absent security audit logging across auth, B2B, and data layers
  data:
  - NoSQL $where operator injection enables arbitrary JS execution in MarsDB
  - SQLite data accessible without query parameterization on multiple routes
