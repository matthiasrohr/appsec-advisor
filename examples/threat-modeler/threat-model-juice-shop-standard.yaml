  stride: Elevation of Privilege
  cwe: CWE-285
  title: Excessive LLM Agency in Coupon Tool — routes/chat.ts:174
  affected_parameter: discount
  scenario: 'LLM06 — Excessive Agency: The generateCoupon tool (routes/chat.ts:174-185) is exposed to the model and calls
    security.generateCoupon(discount) at line 182 with the discount value the model chose. The eligibility policy — verified
    damaged order, rejected return, max 10% discount (system prompt lines 98-103) — is enforced only as natural-language instructions,
    never in execute(). The handler performs no server-side check that the caller has a damaged order, and does not clamp
    `discount`. Combined with prompt injection (llm-chat-interface-001), an attacker instructs the bot to call generateCoupon
    with discount 100; execute() runs and returns a real coupon code. The hidden solveIf calls at lines 180-181 confirm the
    intended exploit: discount >= 10 solves chatbotPromptInjectionChallenge and discount >= 50 solves chatbotGreedyInjectionChallenge.'
  evidence_summary: generateCoupon.execute() at routes/chat.ts:179-184 issues a discount coupon using the model-supplied `discount`
    with no server-side eligibility check and no upper-bound clamp.
  impact_description: Any chat user can mint arbitrary-discount coupons (including 100% off), causing direct financial loss,
    by steering the LLM to invoke the coupon tool outside policy.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None enforced in code. The coupon policy exists only as system-prompt text (routes/chat.ts:98-103), which
    the model can be made to ignore.
  mitigation_title: Gate the generateCoupon tool on server-verified eligibility and clamp the discount value in code
  remediation:
    effort: Medium
    steps:
    - 'In generateCoupon''s execute(), independently verify eligibility server-side: confirm the authenticated user owns a
      damaged order with a valid orderId before issuing any coupon; reject otherwise.'
    - 'Clamp discount to the policy maximum in code: const safeDiscount = Math.min(Math.max(discount, 0), 10) — never trust
      the model-supplied value.'
    - Require the orderId as a tool input and validate ownership the same way getOrderById does, rather than relying on the
      model to have followed the policy.
    - Apply the same human-in-the-loop / server-validation pattern to any future state-changing tool; treat LLM tool calls
      as untrusted requests.
    code_example: "execute: async ({ discount }) => {\n  const userId = await getUserId(req)\n  if (!userId || !(await hasVerifiedDamagedOrder(userId)))\
      \ {\n    return { error: 'Not eligible for a coupon' }\n  }\n  const safeDiscount = Math.min(Math.max(discount, 0),\
      \ 10)\n  return { couponCode: security.generateCoupon(safeDiscount), discount: safeDiscount }\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html
