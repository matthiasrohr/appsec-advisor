- local_id: realtime-channel-006
  threat_category_id: TH-06
  additional_categories:
  - TH-13
  stride: Elevation of Privilege
  cwe: CWE-862
  title: Challenge Score Inflation — lib/challengeUtils.ts:29
  affected_parameter: null
  scenario: The three challenge-verification handlers in `registerWebsocketEvents.ts` (lines 40–50) call `challengeUtils.solveIf()`
    → `solve()` → `challenge.save()` at `challengeUtils.ts:31` without any user-identity check. An attacker without a valid
    account opens a WebSocket connection and emits `verifyCloseNotificationsChallenge` with `[1, 2]`. The `Array.isArray(data)
    && data.length > 1` guard at line 50 passes; `challenge.solved = true` is set and persisted to the database. The solve
    triggers `antiCheat.calculateCheatScore()` at `challengeUtils.ts:36`, which records a cheat score — but cannot undo the
    already-committed database write at line 31. The attacker has gained solved-challenge credit in the authoritative data
    store without satisfying the challenge's actual security requirement. In a CTF deployment, this grants ranking/scoring
    privileges the attacker did not earn.
  evidence_summary: '`challenge.save()` at `challengeUtils.ts:31` is invoked from WebSocket event handlers that perform no
    auth check; `antiCheat.calculateCheatScore()` at line 36 fires after the DB write and cannot prevent it.'
  impact_description: An unauthenticated attacker gains database-persisted credit for challenges they did not solve, enabling
    ranking manipulation and CTF integrity violation.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: '`antiCheat.calculateCheatScore()` at `challengeUtils.ts:36` detects cheating after the fact but does
    not block the privilege gain.'
  mitigation_title: Gate challenge-solve persistence on verified socket authentication and block solve if anti-cheat fires
    pre-write
  remediation:
    effort: Medium
    steps:
    - Add Socket.IO authentication middleware (realtime-channel-001) so only authenticated users can trigger verify events.
    - Move `antiCheat.calculateCheatScore()` before `challenge.save()` in `challengeUtils.solve()` and abort the save when
      a high cheat score is detected, returning early rather than persisting a fraudulent solve.
    - Validate that `socket.data.userId` matches an existing user record before calling `solveIf()` in any verify handler.
    - Consider making WebSocket verify events stateless confirmations only — have the server re-derive the solve criteria
      from the current HTTP session rather than trusting the data sent over the WebSocket.
    code_example: null
    reference: CWE-862
