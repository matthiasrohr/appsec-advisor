  title: Weak Password Hashing MD5 Without Salt — lib/insecurity.ts:43
  affected_parameter: password
  scenario: The `hash()` function at `lib/insecurity.ts:43` computes `crypto.createHash('md5').update(data).digest('hex')`
    with no salt. All user passwords stored in `data/juiceshop.sqlite` (Users table, `password` column) are unsalted MD5 digests.
    An attacker who obtains the SQLite file — via SQL injection union-select (see data-layer-002), path traversal, or server
    compromise — can recover all plaintext passwords from public rainbow tables in seconds. Recovered credentials allow the
    attacker to impersonate any user including administrators.
  evidence_summary: '`security.hash()` uses `crypto.createHash(''md5'')` without salt; `models/user.ts:77` calls it unconditionally
    via the Sequelize `set` hook on every password write.'
  impact_description: Full plaintext password recovery for all accounts from a single SQLite file exfiltration, enabling identity
    spoofing across the application.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — MD5 with no salt is the sole hashing mechanism; no bcrypt/argon2/scrypt used anywhere in the password
    storage path.
  mitigation_title: Replace MD5 password hashing with bcrypt or argon2 in lib/insecurity.ts
  remediation:
    effort: Medium
    steps:
    - Replace `crypto.createHash('md5')` in `lib/insecurity.ts:43` with `bcrypt.hash(data, 12)` using the `bcrypt` npm package
      (already a transitive dependency in many Node.js stacks).
    - 'Add a migration that re-hashes existing MD5 passwords on next successful login (detect by hash length: MD5 = 32 hex
      chars, bcrypt = 60 chars starting with `$2b$`).'
    - Set the Sequelize `password` setter in `models/user.ts:76-78` to call the async bcrypt function and store the result,
      ensuring no raw cleartext is ever logged.
    code_example: '// lib/insecurity.ts — replace hash()

      import bcrypt from ''bcrypt''

      export const hash = async (data: string): Promise<string> => bcrypt.hash(data, 12)

