  - T-008
  - T-036
  - T-041
  - T-045
- id: auth-security
  name: Authentication & Security Library
  description: lib/insecurity.ts — central auth module containing hardcoded RSA private key, MD5 password hashing, JWT signing/verification
    via express-jwt@0.1.3, and HMAC with hardcoded key.
  tier: application
  paths:
  - lib/insecurity.ts
  - lib/
  deployment_zones:
  - container
  handles_sensitive_data: true
  complexity: moderate
  tags:
  - hardcoded-secret
