  title: Rate Limit Bypass — server.ts:346
  affected_parameter: X-Forwarded-For
  scenario: 'An attacker targeting the password-reset brute-force defence sends POST `/rest/user/reset-password` with a spoofed
    `X-Forwarded-For: <rotating-IP>` header. Because `server.ts:346` uses `headers[''X-Forwarded-For''] ?? ip` as the rate-limit
    key generator and `trust proxy` is enabled app-wide, each forged header value is treated as a distinct client IP and the
    100-request window never accumulates. The attacker enumerates all users'' security-question answers without hitting the
    limit.'
  evidence_summary: '`server.ts:346` uses `headers[''X-Forwarded-For''] ?? ip` as the keyGenerator for `express-rate-limit`,
    trusting the header value without validation.'
  impact_description: Rate-limit protection on `/rest/user/reset-password` is negated, allowing unlimited brute-force of security
    question answers to take over any account.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: '`express-rate-limit` middleware is applied to `/rest/user/reset-password` and 2FA endpoints; however,
    the key generator accepts the attacker-controlled `X-Forwarded-For` header.'
  mitigation_title: Remove X-Forwarded-For from rate-limit keyGenerator and rely on verified IP at server.ts:346
  remediation:
    effort: Low
    steps:
    - Remove the `keyGenerator` override at `server.ts:346` so `express-rate-limit` defaults to `req.ip`, which is set by
      the trusted-proxy chain — not the raw `X-Forwarded-For` header.
    - If a reverse proxy does set the real client IP, configure `app.set('trust proxy', 1)` with the specific proxy IP range
      rather than the blanket `app.enable('trust proxy')`.
    - Add a test asserting that 101 requests with distinct `X-Forwarded-For` values are not each granted a fresh limit window.
    code_example: "// server.ts — remove the keyGenerator override\napp.use('/rest/user/reset-password', rateLimit({\n  windowMs:\
      \ 5 * 60 * 1000,\n  max: 100\n  // no keyGenerator — use req.ip which reflects the trusted-proxy chain\n}))"
    reference: CWE-290
