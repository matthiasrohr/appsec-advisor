- local_id: auth-module-003
  threat_category_id: TH-02
  additional_categories: []
  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:52
  affected_parameter: null
  scenario: 'Two related JWT verification weaknesses exist in lib/insecurity.ts. First, `expressJwt({ secret: publicKey })`
    at line 52 does not include an `algorithms: [''RS256'']` constraint. The express-jwt version 0.1.3 (2013) does not enforce
    algorithm. An attacker downloads the public key from `encryptionkeys/jwt.pub` (or extracts it from the committed source),
    then signs a token with `alg: HS256` using the public key as the HMAC secret. The server''s expressJwt middleware accepts
    it as valid because the HMAC verification of (header+payload) with the public key bytes produces a signature that matches.
    Second, jsonwebtoken 0.4.0 is affected by CVE-2015-9235, which permits `alg: none` — a token with no signature and `alg:none`
    in the header is accepted. Both attacks allow an unauthenticated attacker to craft a token with `role: ''admin''` or any
    arbitrary user ID.'
  evidence_summary: '`expressJwt({ secret: publicKey })` at lib/insecurity.ts:52 omits the `algorithms` allowlist parameter;
    jsonwebtoken 0.4.0 at line 54 carries CVE-2015-9235.'
  impact_description: Unauthenticated attacker mints a valid admin token without the private key, bypassing all JWT-protected
    routes.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 algorithm specified at signing time (lib/insecurity.ts:54); provides no protection at verification.
  mitigation_title: Add algorithms allowlist to expressJwt and upgrade jsonwebtoken to a non-CVE version
  remediation:
    effort: Low
    steps:
    - Upgrade `jsonwebtoken` to >= 9.0.0 and `express-jwt` to >= 8.4.0 (current stable). Both include algorithm-enforcement
      by default.
    - 'Pass `algorithms: [''RS256'']` to the expressJwt options: `expressJwt({ secret: publicKey, algorithms: [''RS256'']
      })`. This rejects any token with a different algorithm header.'
    - 'Additionally call `jwt.verify(token, publicKey, { algorithms: [''RS256''] })` wherever `jws.verify` is currently used
      (lib/insecurity.ts:55) to enforce algorithm at the decode layer.'
    code_example: "// lib/insecurity.ts:52 — enforce algorithm allowlist\nexport const isAuthorized = () =>\n  expressJwt({\
      \ secret: publicKey, algorithms: ['RS256'] })"
    reference: CWE-347
