- local_id: auth-security-002
  threat_category_id: TH-02
  additional_categories:
  - TH-03
  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification
  affected_parameter: null
  scenario: 'express-jwt@0.1.3 (package.json line 112) is a 7-year-outdated version with a well-documented vulnerability:
    it accepts tokens with `alg: none` and an empty signature string, treating them as valid. The isAuthorized() middleware
    at lib/insecurity.ts line 54 applies this library to protect routes. An attacker takes a legitimate JWT payload (e.g.
    from their own session or decoded from a public endpoint), changes the header to `{"alg":"none","typ":"JWT"}`, removes
    the signature, and submits it. The middleware passes the token as valid, and the server trusts the attacker-controlled
    payload claims including role and userId.'
  evidence_summary: 'isAuthorized() wraps expressJwt({secret: publicKey}) from express-jwt@0.1.3, a version known to accept
    unsigned tokens with alg:none when the algorithm is not explicitly restricted.'
  impact_description: 'Authentication bypass without any credential: attacker accesses any route protected by isAuthorized()
    as an arbitrary user identity.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 algorithm used for token issuance. The verification path does not pin the algorithm, leaving the
    alg:none path open.
  mitigation_title: Upgrade express-jwt and pin JWT algorithm to RS256 in verification
  remediation:
    effort: Low
    steps:
    - 'Upgrade express-jwt to >=6.1.3 (current stable): `npm install express-jwt@^8.4.1`'
    - 'Pin the algorithm in the expressJwt call: `expressJwt({ secret: publicKey, algorithms: [''RS256''] })`'
    - Also upgrade jsonwebtoken from 0.4.0 to >=9.0.0 and pin algorithm in jwt.verify() calls
    - Add a regression test that sends a token with alg:none and asserts 401 response
    code_example: "// lib/insecurity.ts — algorithm-pinned verification\nimport { expressjwt } from 'express-jwt'\nexport\
      \ const isAuthorized = () =>\n  expressjwt({ secret: publicKey, algorithms: ['RS256'] })"
    reference: CWE-347
