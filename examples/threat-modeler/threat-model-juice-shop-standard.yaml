  stride: Tampering
  cwe: CWE-89
  title: SQL Injection — routes/search.ts:23
  affected_parameter: q
  scenario: 'The product search endpoint at GET /rest/products/search constructs a raw SQL query by interpolating the user-controlled
    `q` query parameter directly into a template literal at routes/search.ts:23: `SELECT * FROM Products WHERE ((name LIKE
    ''%${criteria}%'' OR description LIKE ''%${criteria}%'') AND deletedAt IS NULL)`. The only sanitization is a 200-character
    length truncation, which does not prevent UNION-based or boolean-based injection. An unauthenticated attacker can inject
    `'' UNION SELECT email,password,role,NULL,NULL,NULL,NULL FROM Users--` to exfiltrate all user credentials, or dump the
    full database schema via `sqlite_master`. This endpoint requires no authentication.'
  evidence_summary: search.ts:23 calls `models.sequelize.query()` with a template literal that embeds `criteria` (derived
    from `req.query.q`) without parameterization.
  impact_description: 'Full database read access: attacker extracts all user email addresses, MD5-hashed passwords, and role
    information without authentication.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Length truncation to 200 characters (search.ts:22). No parameterized query, no input validation.
  mitigation_title: Replace raw SQL template literal with Sequelize parameterized query in searchProducts()
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `models.sequelize.query()` call at search.ts:23 with a Sequelize ORM query using `ProductModel.findAll({
      where: { [Op.or]: [{ name: { [Op.like]: `%${criteria}%` } }, { description: { [Op.like]: `%${criteria}%` } }], deletedAt:
      null } })`'
    - 'If raw SQL is required, use named bind parameters: `models.sequelize.query(''SELECT * FROM Products WHERE name LIKE
      :pattern AND deletedAt IS NULL'', { replacements: { pattern: `%${criteria}%` } })`'
    - Add input validation on the `q` parameter using Zod to reject characters not in an expected pattern
    code_example: "// routes/search.ts — parameterized alternative\nimport { Op } from 'sequelize'\n\nconst results = await\
      \ ProductModel.findAll({\n  where: {\n    [Op.or]: [\n      { name: { [Op.like]: `%${criteria}%` } },\n      { description:\
      \ { [Op.like]: `%${criteria}%` } }\n    ],\n    deletedAt: null\n  },\n  order: [['name', 'ASC']]\n})"
    reference: CWE-89
  evidence:
