  cwe: CWE-311
  title: Unencrypted SQLite Database File at Rest — models/index.ts:41
  scenario: The Sequelize storage path at models/index.ts:41 points to data/juiceshop.sqlite — a plain SQLite3 file with no
    encryption at rest. Any user or process with filesystem read access to the deployment host (e.g., via path traversal,
    container escape, shared hosting, or server compromise) can copy and open the file with sqlite3 CLI or DB Browser for
    SQLite. The file contains the full Users table with email addresses, MD5 password hashes, TOTP secrets, wallet balances,
    security answers, and payment card data.
  evidence_summary: Storage option data/juiceshop.sqlite at models/index.ts:41 configures a plaintext SQLite file with no
    SQLCipher or OS-level encryption.
  impact_description: Physical or logical access to the host filesystem yields all user PII, authentication credentials, and
    financial data with no additional effort.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — no encryption at rest, no filesystem ACLs enforced by the application
  mitigation_title: Encrypt the SQLite database file using SQLCipher or OS-level disk encryption
  remediation:
    effort: High
    steps:
    - Replace the sqlite3 npm package with the '@journeyapps/sqlcipher' package, which wraps SQLCipher; initialize the database
      with a PRAGMA key derived from a secret stored in an HSM or secrets manager.
    - As a compensating control, store the SQLite file on an encrypted filesystem volume (dm-crypt/LUKS on Linux, BitLocker
      on Windows) managed at the OS level.
    - Restrict the juiceshop.sqlite file to read/write by the application process user only (chmod 600) and ensure no web-accessible
      directory serves the data/ folder.
    - Apply field-level encryption for the most sensitive columns (TOTP secrets, security answers, payment data) using AES-256-GCM
      with application-layer key management independent of the database.
