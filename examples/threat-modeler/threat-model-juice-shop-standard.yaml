  stride: Elevation of Privilege
  cwe: CWE-613
  title: No server-side token revocation; logout leaves JWT valid — lib/insecurity.ts:72
  affected_parameter: null
  scenario: Sessions are tracked in the in-memory authenticatedUsers map (lib/insecurity.ts:72) which has no TTL and no revocation
    API. Tokens are stateless JWTs with a 6h expiry (authorize(), line 56). Logout merely removes the in-memory entry, but
    updateAuthenticatedUsers() (line 188) transparently re-adds any presented token whose signature/expiry still validate,
    so a stolen or leaked token remains fully usable for the entire 6h window regardless of logout. There is no allow/deny-list
    check on token id, so a forged token (auth-001/auth-002) or one captured from a compromised client cannot be invalidated
    server-side. An attacker who obtains a privileged user's token retains that privilege until natural expiry.
  evidence_summary: authenticatedUsers (lib/insecurity.ts:72) is a TTL-less in-memory map and updateAuthenticatedUsers() (line
    188) re-registers any still-valid token, so logout cannot revoke a JWT.
