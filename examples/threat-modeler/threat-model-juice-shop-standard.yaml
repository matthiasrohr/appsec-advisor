- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Systemic Unverified Remote Code Execution in CI Pipeline — ci.yml:161
  affected_parameter: coverallsapp/github-action@v2
  scenario: The `coverallsapp/github-action@v2` step at ci.yml:161 resolves the mutable `v2` tag at execution time, meaning
    the SHA it executes can change without any change to the workflow file. An attacker who compromises the `coverallsapp/github-action`
    repository or gains write access to its tags can push malicious code under the same `@v2` tag. On the next CI run triggered
    by any push to any non-ignored branch, the hijacked action executes in the runner environment with access to `secrets.GITHUB_TOKEN`
    (line 163). From there it can exfiltrate the token, read all other secrets available to the job, push commits to the repository,
    modify releases, or exfiltrate the `CYPRESS_RECORD_KEY` and `SOLUTIONS_WEBHOOK` secrets present in adjacent jobs of the
    same workflow.
  evidence_summary: '`coverallsapp/github-action@v2` on line 161 of ci.yml uses a mutable tag reference rather than a SHA
    digest, making the resolved action code silently substitutable.'
  impact_description: A compromised or tag-hijacked version of `coverallsapp/github-action` runs with GITHUB_TOKEN write access
    and can exfiltrate secrets, push malicious commits, or tamper with artifacts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Most other third-party actions in ci.yml are SHA-pinned (e.g., actions/checkout, actions/setup-node,
    nick-invision/retry). Only coverallsapp is unpinned.
  mitigation_title: Pin coverallsapp/github-action to a full SHA digest in ci.yml
  remediation:
    effort: Low
    steps:
    - Run `gh api repos/coverallsapp/github-action/git/ref/tags/v2` to resolve the current commit SHA for the `v2` tag.
    - 'Replace `coverallsapp/github-action@v2` with `coverallsapp/github-action@<full-40-char-SHA> # v2.x.x` in ci.yml line
      161.'
    - 'Add a Dependabot configuration for `package-ecosystem: github-actions` to track future action updates and auto-PR SHA
      bumps.'
    code_example: "# ci.yml line 161 — before:\n      uses: coverallsapp/github-action@v2\n# after:\n      uses: coverallsapp/github-action@3dfc5567390f1d858f4321ef0feede23a0b0bbf1\
      \ # v2.3.4"
