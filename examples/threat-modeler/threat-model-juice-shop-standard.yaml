  title: User email stored in localStorage and leaked as — request.interceptor.ts:20
  affected_parameter: email (localStorage), X-User-Email head…
  scenario: 'When a user selects ''Remember Me'' during login, `login.component.ts:135` stores the email address in `localStorage`.
    `RequestInterceptor` at request.interceptor.ts:20–25 reads that value and appends it as `X-User-Email: <email>` on every
    outbound API request, regardless of whether the request is sensitive or public. This exposes PII in HTTP request logs,
    reverse proxies, and CDN edge caches that record request headers. Additionally, because the header value is controlled
    by JavaScript (attackers with XSS access can set `localStorage.email` to any string), it can be used to impersonate other
    users in header-based access checks on the server.'
  evidence_summary: request.interceptor.ts:20–25 reads `localStorage.getItem('email')` and injects it as `X-User-Email` on
    every request; combined with XSS, this header becomes attacker-controllable.
  impact_description: User email is logged server-side on every request; a compromised request-logging infrastructure exposes
    PII for all active users at once.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — header is injected unconditionally for any user with Remember Me enabled.
  mitigation_title: Remove the X-User-Email header injection from RequestInterceptor; derive identity server-side from the
    JWT claim
  remediation:
    effort: Low
    steps:
    - Remove the `X-User-Email` header injection block at request.interceptor.ts:20–25 entirely; the server already receives
      the JWT which contains the email claim.
    - Audit any server-side code that reads `req.headers['x-user-email']` and replace it with identity extraction from the
      validated JWT (`req.user.email` after middleware).
    - Remove `localStorage.setItem('email', …)` from login.component.ts:135 if the Remember Me feature can instead persist
      only a non-sensitive preference.
    code_example: null
