- local_id: auth-007
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-770
  title: Unbounded In-Memory Token Map Enables Session Exhaustion — lib/insecurity.ts:75
  affected_parameter: authenticatedUsers.tokenMap
  scenario: 'The `authenticatedUsers` object at `lib/insecurity.ts:72` stores every issued JWT token in `tokenMap` (keyed
    by token string) and `idMap` (keyed by user id). The `put()` function at line 75 adds entries without any eviction, TTL
    check, or size cap. A bot can call `POST /rest/user/login` in a loop (no rate limiting), registering a new session token
    each time. Each token occupies ~500 bytes in heap. At 10,000 requests/second, heap grows by ~5 MB/s. The Node.js process
    will exhaust available heap and crash with `FATAL ERROR: CALL_AND_RETRY_LAST Allocation failed — JavaScript heap out of
    memory`, taking down all other users.'
  evidence_summary: lib/insecurity.ts:75-78 inserts into `tokenMap` and `idMap` with no bound check, eviction policy, or TTL;
    no rate-limit middleware is applied to the login route.
  impact_description: Full service outage — the Node.js process crashes when heap is exhausted, dropping all active user sessions
    and making the application unavailable.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None
  mitigation_title: Apply rate limiting to login endpoint and cap the in-memory token store with TTL eviction
  remediation:
