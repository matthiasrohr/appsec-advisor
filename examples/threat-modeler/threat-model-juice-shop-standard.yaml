- id: backend-api
  name: Express REST API Backend
  description: Node.js 22/TypeScript Express 4 monolith serving all REST (/rest/*), API (/api/*), and static routes on port
    3000. Contains the intentional SQLi login route, hardcoded RSA private key, MD5 password hashing, and the core authentication/authorization
    library (lib/insecurity.ts).
