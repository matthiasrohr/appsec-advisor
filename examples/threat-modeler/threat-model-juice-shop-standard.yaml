  stride: Information Disclosure
  cwe: CWE-209
  title: Alchemy API Key Exposure — routes/nftMint.ts:18
  affected_parameter: ALCHEMY_API_KEY
  scenario: Both `nftMintListener` (routes/nftMint.ts:18) and `contractExploitListener` (routes/web3Wallet.ts:20) construct
    a WebSocket URL as `` `wss://eth-sepolia.g.alchemy.com/v2/${process.env.ALCHEMY_API_KEY ?? ''}` ``. When the Alchemy service
    is unreachable, returns an error, or the key is invalid, ethers.js raises an Error whose `.message` field includes the
    full connection URL — key embedded. The catch blocks at lines 30–31 (nftMint.ts) and lines 36–38 (web3Wallet.ts) call
    `utils.getErrorMessage(error)` which returns `error.message` verbatim (lib/utils.ts:211). This raw message is serialised
    into a 500 JSON response body visible to any unauthenticated caller.
  evidence_summary: routes/nftMint.ts:18 interpolates `process.env.ALCHEMY_API_KEY` directly into the WebSocket URL; lib/utils.ts:211
    returns `error.message` raw; the catch at nftMint.ts:30 sends this to the client.
  impact_description: The Alchemy API key is exfiltrated to any unauthenticated caller who triggers a WebSocket error, enabling
    them to make arbitrary Alchemy API calls charged to the application's account.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — error messages are passed to the client unredacted.
  mitigation_title: Sanitize WebSocket error responses to exclude the connection URL before returning to the client
  remediation:
    effort: Low
    steps:
    - In the catch blocks of `nftMintListener` and `contractExploitListener`, return a generic error message ('WebSocket connection
      failed') rather than calling `utils.getErrorMessage(error)` directly.
    - Alternatively, extend `utils.getErrorMessage` with a URL-scrubbing step that redacts `wss://.*` and `https://.*` substrings
      before returning the message.
    - Log the full error server-side using `logger.error(...)` so the Alchemy connection issue is still diagnosable from server
      logs without exposing the key to clients.
    code_example: "// routes/nftMint.ts — catch block\ncatch (error) {\n  logger.error(`NFT mint listener error: ${utils.getErrorMessage(error)}`)\n\
      \  res.status(500).json({ error: 'Internal server error initialising event listener' })\n}"
    reference: CWE-209
