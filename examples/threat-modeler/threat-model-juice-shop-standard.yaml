  stride: Information Disclosure
  cwe: CWE-89
  title: Database Schema Exposure via sqlite_master Query (routes/search.ts:47)
  affected_parameter: q
  scenario: '`routes/search.ts:47` executes `models.sequelize.query(''SELECT sql FROM sqlite_master'')` unconditionally within
    the product search handler whenever `dbSchemaChallenge` is unsolved. The results (DDL for every table) are compared against
    the attacker''s response payload to detect if the challenge was solved, but the comparison runs against whatever the attacker
    injects. When a UNION payload extracts rows from `sqlite_master`, the server validates those rows against its own `sqlite_master`
    contents — inadvertently confirming exact table/column names. This gives an attacker who partially knows the schema a
    built-in oracle to enumerate all table definitions.'
  evidence_summary: '`routes/search.ts:47` issues a bare `SELECT sql FROM sqlite_master` query on every search request, exposing
    internal schema DDL as a side-channel for injection.'
  impact_description: Attacker learns the exact column names, types, and indexes of all tables (Users, Products, Baskets,
    etc.), reducing the effort to craft targeted injection payloads.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — the `sqlite_master` query runs on every product search.
  mitigation_title: Remove sqlite_master challenge-detection query from the production search path
  remediation:
