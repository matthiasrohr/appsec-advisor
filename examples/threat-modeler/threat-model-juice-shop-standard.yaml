  stride: Spoofing
  cwe: CWE-330
  title: Predictable Juice Shop password derived from reversed — oauth.component.ts:30
  affected_parameter: password
  scenario: After a successful Google OAuth exchange, `OAuthComponent.ngOnInit()` calls `btoa(profile.email.split('').reverse().join(''))`
    to synthesize a Juice Shop account password. Because this derivation is deterministic and based solely on the publicly
    knowable email address, an attacker who knows — or guesses — a victim's email can independently compute the password and
    POST it directly to `/rest/user/login`. No OAuth interaction is required. This effectively reduces account security to
    a deterministic string that any party with the email address can reproduce in a browser console in seconds.
  evidence_summary: oauth.component.ts:30 derives the account password as `btoa(profile.email.split('').reverse().join(''))`
    — deterministic and reproducible by anyone who knows the target email address.
  impact_description: Full account takeover for any user who registered via Google OAuth; the attacker bypasses the Google
    IdP entirely and authenticates as the victim using only the email address.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — password derivation is fully predictable from public data.
  mitigation_title: Generate a cryptographically random password for OAuth-linked accounts instead of deriving it from the
    email
  remediation:
    effort: Low
    steps:
    - Replace `btoa(profile.email.split('').reverse().join(''))` with a server-side random password generation step (e.g.,
      `crypto.randomBytes(32).toString('hex')`) so the password is never deterministically derivable client-side.
    - Alternatively, mark OAuth-linked accounts as having no local password (set `passwordHash = null` or a sentinel value)
      and reject direct `/rest/user/login` attempts for accounts with no local credential.
    - Audit the `/rest/user/login` endpoint to ensure it rejects OAuth-only accounts when no local password is set.
    code_example: '// INSECURE — current code

      const password = btoa(profile.email.split('''').reverse().join(''''))


      // SECURE — server generates random credential

      // On registration, POST to a dedicated OAuth-register endpoint.

      // The server creates the account with a null/unusable password hash.

      // No password ever exists in the SPA.'
    reference: CWE-330
