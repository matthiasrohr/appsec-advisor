- id: A-002
  name: RSA Private Signing Key
  classification: Restricted
  description: RSA private key committed to lib/insecurity.ts used to sign all JWT session tokens. Readable by anyone with
    GitHub access to the public repository.
  linked_threats:
  - T-002
  - T-003
  - T-008
  - T-020
  - T-029
  - T-037
  - T-047
  - T-050
  - T-068
- id: A-003
  name: JWT Session Tokens
  classification: Confidential
  description: JWT tokens issued on successful authentication and stored in browser localStorage. Stolen tokens grant full
    account access including admin privileges.
  linked_threats:
  - T-003
  - T-004
  - T-013
  - T-017
  - T-018
  - T-031
  - T-037
  - T-044
