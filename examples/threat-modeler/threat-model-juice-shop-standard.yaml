- local_id: file-upload-service-002
  threat_category_id: TH-01
  additional_categories:
  - TH-06
  stride: Tampering
  cwe: CWE-22
  title: Zip-slip arbitrary file write via raw entry.path in ZIP extraction
  affected_parameter: file (ZIP upload, entry.path)
  scenario: An attacker uploads a ZIP archive containing an entry with a path-traversal sequence such as `../../../../.ssh/authorized_keys`.
    At line 41 `const fileName = entry.path` captures this raw path. Line 42 computes `absolutePath = path.resolve('uploads/complaints/'
    + fileName)`. The guard at line 44 (`absolutePath.includes(path.resolve('.'))`) tests whether the resolved absolute path
    contains the CWD string — but line 45 passes the original unresolved `fileName` to `fs.createWriteStream('uploads/complaints/'
    + fileName)`. Because Node's `fs.createWriteStream` normalises `../` sequences during open, the write reaches the traversed
    path outside `uploads/complaints/`. The challenge check at line 43 confirms `ftp/legal.md` is a valid escape target, demonstrating
    the intended exploit surface.
  evidence_summary: Line 45 writes using raw `fileName` (not the guard-checked `absolutePath`), allowing traversal sequences
    to escape the `uploads/complaints/` sandbox.
  impact_description: An unauthenticated attacker can write arbitrary content to any path writable by the Node process, enabling
    persistence, overwriting application code, or poisoning the FTP download directory.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: The `absolutePath.includes(path.resolve('.'))` guard at line 44 is intended to contain writes but uses
    `includes()` semantics which do not reliably enforce a prefix constraint. The guard is also bypassed because the write
    call uses the unresolved `fileName`.
  mitigation_title: Sanitize zip entry paths and write using the resolved absolute path with startsWith prefix check
  remediation:
    effort: Medium
    steps:
    - Reject any zip entry whose `entry.path` contains `..` or begins with `/` before calling `path.resolve()`.
    - Replace `absolutePath.includes(path.resolve('.'))` with `absolutePath.startsWith(path.resolve('uploads/complaints')
      + path.sep)` to enforce a strict prefix constraint.
    - Change the `fs.createWriteStream` argument from `'uploads/complaints/' + fileName` to `absolutePath` — the already-resolved
      and validated path — so the guard and the write target are identical.
    - Consider using a library such as `fflate` or `adm-zip` that exposes a safe extraction API with automatic path sanitization.
    code_example: "const safeBase = path.resolve('uploads/complaints')\nconst fileName = entry.path.replace(/\\.\\.\\/|\\\
      .\\.\\\\/g, '').replace(/^\\//, '')\nconst absolutePath = path.resolve(safeBase, fileName)\nif (!absolutePath.startsWith(safeBase\
      \ + path.sep)) {\n  entry.autodrain()\n  return\n}\nentry.pipe(fs.createWriteStream(absolutePath).on('error', next))"
    reference: CWE-22
  evidence:
