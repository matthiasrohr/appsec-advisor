  title: XML External Entity Injection with Host Filesystem Access — lib/xml.ts:35
  affected_parameter: file (XML body)
  scenario: A user uploads an XML file containing a DTD declaration referencing `file:///etc/passwd`. At `lib/xml.ts:22`,
    `xmlRegisterFsInputProviders()` grants the libxml2-wasm WASM sandbox access to the host filesystem. Line 35 sets parse
    options `XML_PARSE_NOENT | XML_PARSE_DTDLOAD`, enabling both entity substitution and external DTD loading. The parser
