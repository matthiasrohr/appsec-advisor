  scenario: '`lib/insecurity.ts:43` defines `export const hash = (data: string) => crypto.createHash(''md5'').update(data).digest(''hex'')`.
    This function is called in `models/user.ts:77` (`this.setDataValue(''password'', security.hash(clearTextPassword))`) for
    all password storage and in `routes/login.ts:34` for the login comparison. MD5 is a fast, unsalted hash: a 1TB rainbow
    table covers all 8-character passwords, and online cracking services (e.g. CrackStation) resolve common MD5 digests in
    seconds. When the Users table is extracted via SQLi at `routes/search.ts:23`, all user passwords are recoverable without
    brute force.'
  evidence_summary: '`lib/insecurity.ts:43` applies unsalted MD5 to all passwords stored in the `Users` table, making any
    database dump immediately reversible.'
  impact_description: A database dump obtained via SQL injection yields plaintext passwords for all users, enabling account
    takeover across any service where users reuse passwords.
