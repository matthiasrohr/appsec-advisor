  stride: Tampering
  cwe: CWE-89
  title: SQL Injection (routes/login.ts:34)
  affected_parameter: email
  scenario: '`req.body.email` flows unescaped into `models.sequelize.query()` at `routes/login.ts:34`. The full query is `SELECT
    * FROM Users WHERE email = ''${req.body.email || ''''}'' AND password = ''${security.hash(req.body.password || '''')}''
    AND deletedAt IS NULL`. Submitting `admin@juice-sh.op''--` as the email short-circuits the password check and returns
    the admin row. The query executes with `{ plain: true }` so the first matching row — the seeded admin account — is returned
    directly, producing a valid JWT with `role=admin`.'
  evidence_summary: '`routes/login.ts:34` calls `models.sequelize.query()` with a template literal that directly embeds `req.body.email`
    without parameterization.'
  impact_description: Unauthenticated attacker gains admin-level JWT and full application access without credentials.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Password is hashed via `security.hash()` before interpolation, but the email field has no sanitization.
    The `deletedAt IS NULL` clause does not prevent the bypass.
  mitigation_title: Replace raw SQL login query with parameterized Sequelize query
  remediation:
    effort: Low
    steps:
    - 'Replace `models.sequelize.query()` template literal with a parameterized call: `models.sequelize.query(''SELECT * FROM
      Users WHERE email = $1 AND password = $2 AND deletedAt IS NULL'', { bind: [req.body.email, security.hash(req.body.password
      || '''')], model: UserModel, plain: true })`.'
    - 'Alternatively, use `UserModel.findOne({ where: { email: req.body.email, password: security.hash(req.body.password ||
      ''''), deletedAt: null } })` to let Sequelize handle escaping.'
    - Add integration test asserting that `email = "admin'--"` returns 401.
    code_example: "// Safe parameterized version\nmodels.sequelize.query(\n  'SELECT * FROM Users WHERE email = $1 AND password\
      \ = $2 AND deletedAt IS NULL',\n  { bind: [req.body.email, security.hash(req.body.password || '')],\n    model: UserModel,\
      \ plain: true }\n)"
    reference: CWE-89
