- local_id: sqlite-db-004
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-862
  title: Application-Only Role Constraint Bypassed — models/user.ts:83
  affected_parameter: role
  scenario: The `role` column in the Users table is enforced only by a Sequelize-level `validate.isIn` check (`models/user.ts:83`).
    SQLite does not enforce a CHECK constraint on this column — no `CREATE TABLE` constraint is generated by the Sequelize
    migration. ACT-D-04, who has `local-fs` access to `data/juiceshop.sqlite`, can open the file with any SQLite client and
    execute `UPDATE Users SET role='admin' WHERE id=<target>` without going through the application layer. The Sequelize validator
    is never invoked for direct file writes. Because the application trusts the `role` field from the database without re-validation
    at query time, the modified role is accepted on the next authenticated request and grants full admin access to the Juice
    Shop administration panel.
  evidence_summary: '`models/user.ts:83` defines `isIn: [[''customer'', ''deluxe'', ''accounting'', ''admin'']]` as a Sequelize
    validator; the SQLite schema has no corresponding `CHECK (role IN (...))` constraint enforced at the database engine level.'
  impact_description: Any actor with direct filesystem access can grant themselves administrator privileges, bypassing all
    application-layer authorization controls.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: Sequelize `validate.isIn` for ORM-mediated writes; does not apply to direct SQLite file access.
  mitigation_title: Add a SQLite CHECK constraint on the role column and enforce privilege separation between the application
    DB connection and the SQLite file
  remediation:
    effort: Medium
    steps:
    - Add a `CHECK (role IN ('customer', 'deluxe', 'accounting', 'admin'))` constraint to the `Users` table via a Sequelize
      migration so the database engine itself rejects invalid role values regardless of the insertion path.
    - Restrict the filesystem permissions of `data/juiceshop.sqlite` to `0640` with the application user as owner and no world
      read, preventing direct offline access by non-root local accounts.
    - For production deployments, use a dedicated, non-interactive OS user to run the application and deny shell access; audit
      `sudo` escalation paths to the working directory.
    code_example: "```sql\n-- Migration: add CHECK constraint on role\nALTER TABLE Users ADD CONSTRAINT chk_role\n  CHECK\
      \ (role IN ('customer', 'deluxe', 'accounting', 'admin'));\n```"
    reference: CWE-862
  evidence:
