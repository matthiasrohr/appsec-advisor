tier_root_causes:
  edge:
  - OAuth implicit flow exposes tokens in URL; passwords derived from email
  - JWT stored in localStorage exfiltrated by any successful XSS exploit
  - Missing CSP and DomSanitizer bypass allows stored and reflected XSS
  server:
  - SQL and NoSQL queries built from raw user input, no parameterization
  - Hardcoded JWT private key and secrets committed to version control
  - eval() and notevil sandbox exec user-controlled expressions for RCE
  - Auth middleware absent from LLM chat, WebSocket, and admin endpoints
  - 'Supply chain unpinned: lockfile absent, actions mutable, postinstall free'
  data:
  - Mass assignment via registration allows privilege escalation to admin
  - NoSQL $where accepts arbitrary JavaScript from unparameterized inputs
