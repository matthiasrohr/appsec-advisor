trust_boundaries:
- id: tb-1
  name: Internet → Express API Server
  from: external
  to: express-api
  controls:
  - HTTPS (configurable)
  - rate limiting (absent — no middleware detected)
  - no WAF configured in source
  description: All external HTTP/HTTPS requests from browsers, API clients, and attackers reach the Express server directly
    on port 3000. No application-side rate limiting or WAF middleware is configured in the source tree.
- id: tb-2
  name: Browser (Frontend SPA) → Express API
  from: frontend-spa
  to: express-api
  controls:
  - CORS (permissiveness unknown)
  - JWT bearer token (localStorage)
  - CSRF (absent — token-based, but no SameSite enforcement evidenced)
  description: The Angular SPA communicates with the Express API over HTTP/HTTPS. JWT tokens are stored in localStorage and
    attached via the request interceptor — XSS in the SPA context directly reads the token. CORS configuration permissiveness
    is not confirmed from source.
- id: tb-3
  name: Express API → SQLite Data Store (in-process)
  from: express-api
  to: data-store
  controls:
  - Sequelize ORM (parameterized queries for most routes)
  - raw SQL in login route (enforcement absent)
  description: The database is accessed within the same Node.js process via Sequelize. Most queries are parameterized via
    the ORM. The login route (routes/login.ts:34) uses raw string interpolation, bypassing parameterization entirely.
- id: tb-4
  name: Unauthenticated Zone → Authenticated Zone (within Express)
  from: external
  to: express-api
  controls:
  - express-jwt middleware on protected routes
  - RS256 JWT signature verification via publicKey
  - client-side Angular route guards (not a server control)
  description: The boundary between public and authenticated routes is enforced by express-jwt middleware applied per-route.
    The private key used to sign tokens is hardcoded in lib/insecurity.ts, meaning any actor with source access can forge
    tokens and bypass this boundary.
- id: tb-5
  name: Authenticated User Zone → Admin Zone (within Express)
  from: express-api
  to: express-api
  controls:
  - JWT role claim check ('admin' role)
  - role assigned server-side at registration or by SQLi manipulation
  description: Admin endpoints are protected by checking the 'role' field in the decoded JWT. Because the signing key is public
    knowledge, an attacker can forge a JWT with role=admin and bypass this boundary entirely.
- id: tb-6
  name: Express API → External LLM Provider (outbound)
  from: llm-chatbot
  to: external
  controls:
  - LLM_API_KEY environment variable
  - TLS (HTTPS to LLM baseURL)
  description: The chatbot route makes outbound HTTPS calls to a configurable LLM API endpoint. The baseURL is read from config
    (application.chatBot.llmApiUrl) — if this value is data-driven or environment-injectable, SSRF on startup is possible.
- id: tb-7
  name: Internet → WebSocket Server (Socket.IO upgrade)
  from: external
  to: websocket-server
  controls:
  - WebSocket upgrade token check (status unknown)
  - origin validation (likely absent)
  description: WebSocket connections are established via Socket.IO upgrade. Authentication state and origin validation during
    the upgrade handshake have not been confirmed as enforced — unauthenticated WebSocket access is a real risk.
- id: tb-8
  name: GitHub Pull Request → CI/CD Pipeline (GitHub Actions)
  from: external
  to: ci-cd-pipeline
  controls:
  - CODEOWNERS review requirement (if configured)
  - pull_request_target isolation (insufficient if mixed with checkout)
  description: External fork-based PRs trigger pull_request_target workflows which execute with elevated GITHUB_TOKEN scope.
    If the workflow checks out PR HEAD code alongside write-privileged steps, malicious PR contributors can exfiltrate secrets.
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Authentication
  effectiveness: Unsafe
  kind: mechanism
  assessment: Passwords are hashed with MD5 (lib/insecurity.ts:41 crypto.createHash('md5')) — a fast, collision-prone algorithm
    trivially cracked by GPU rainbow tables. The login route uses raw SQL string interpolation (routes/login.ts:34) bypassing
    ORM parameterization, enabling SQL injection that extracts all password hashes directly.
  group_subcontrols: true
  subcontrols:
  - title: Password Storage (Hashing)
    effectiveness: Unsafe
    status_note: MD5 hashing — GPU-crackable in seconds
    assessment: lib/insecurity.ts:41
  - title: Login Endpoint
    effectiveness: Unsafe
    status_note: Raw SQL injection in email/password fields
    assessment: routes/login.ts:34
  - title: Password Reset
    effectiveness: Partial
    status_note: Security question flow present but bypasses available
    assessment: routes/changePassword.ts
  - title: Registration
    effectiveness: Weak
    status_note: No email verification gate; open registration
    assessment: routes/register.ts
- domain: Session and Token Controls
  control: Session Token Validation (JWT Based)
  effectiveness: Unsafe
  kind: mechanism
  assessment: RS256 JWT tokens are issued and validated using a hardcoded RSA private key at lib/insecurity.ts:21. The private
    key is committed to the public GitHub repository, meaning any actor can forge arbitrarily privileged JWT tokens. The jws.verify()
    call at lib/insecurity.ts:55 does not explicitly reject alg:none tokens — the express-jwt version should be audited for
    alg:none acceptance.
  audit_flags:
  - control_name_canonicalised
  - control_domain_reclassified_from_Identity and Authentication Controls
- domain: Identity and Authentication Controls
  control: OAuth 2.0 / Social Login
  effectiveness: Weak
  kind: mechanism
  assessment: OAuth 2.0 implicit flow is used (frontend/src/app/app.routing.ts:286) — tokens are placed in URL fragments,
    exposed in browser history and Referer headers. PKCE is not confirmed as enforced on the authorization-code flow variant.
  implementation: frontend/src/app/app.routing.ts, threat-model.json
- domain: Identity and Authentication Controls
  control: Two-Factor Authentication (TOTP)
  effectiveness: Weak
  kind: mechanism
  assessment: TOTP-based 2FA is implemented (routes/2fa.ts). However, temporary 2FA tokens are cached in localStorage (two-factor-auth-service.ts:38)
    — XSS can steal 2FA session tokens alongside the primary JWT.
  implementation: routes/2fa.ts, frontend/src/app/services/two-factor-auth-service.ts
- domain: Session and Token Controls
  control: Token Storage Security
  effectiveness: Unsafe
  kind: primitive
  assessment: JWT tokens and 2FA tokens are stored in browser localStorage (36 findings including app.guard.ts, request.interceptor.ts,
    basket.service.ts). localStorage is fully accessible to JavaScript — any XSS payload can exfiltrate all tokens without
    any additional permissions.
- domain: Authorization Controls
  control: Role-Based Access Control (RBAC)
  effectiveness: Unsafe
  kind: mechanism
  assessment: RBAC is implemented via JWT role claims enforced by express-jwt. Because the JWT signing key is hardcoded and
    publicly committed, any attacker can forge role=admin tokens and bypass all role checks. Client-side Angular route guards
    (100 findings) are the only visible enforcement layer for many routes, making privilege escalation trivial from the browser
    console.
- domain: Query Construction and Data Access Controls
  control: SQL Injection Prevention
  effectiveness: Weak
  kind: cross-cutting
  assessment: Sequelize ORM is used for most queries — parameterized by default. The login route (routes/login.ts:34) uses
    raw sequelize.query() with string interpolation, creating a direct SQL injection path. The search route should also be
    audited. MarsDB (NoSQL) is used for reviews with a $where clause in chat.ts:149 that concatenates the product ID — potential
    NoSQL injection.
- domain: Input Boundary Validation Controls
  control: Input Validation and Sanitization
  effectiveness: Weak
  kind: cross-cutting
  assessment: sanitize-html and sanitize-filename libraries are present in lib/insecurity.ts. However, eval() is used directly
    with user-controlled input at routes/captcha.ts:22 and routes/userProfile.ts:61 — code injection sinks that intentionally
    bypass all validation. User profile username is passed to eval() via the /profile POST route.
- domain: Output Encoding and Rendering Controls
  control: XSS Prevention
  effectiveness: Weak
  kind: cross-cutting
  assessment: Angular 21 provides automatic template escaping for {{text}} bindings. However, direct innerHTML assignments
    are used in the hacking-instructor (frontend/src/hacking-instructor/index.ts) with snarkdown Markdown rendering on user-facing
    hints. helmet.xssFilter() is explicitly commented out at server.ts:188.
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy (CSP)
  effectiveness: Missing
  kind: cross-cutting
  assessment: No Content-Security-Policy header is set in server.ts. helmet.noSniff() and helmet.frameguard() are applied
    (server.ts:186-187) but CSP is absent. The userProfile route sets a per-request CSP allowing 'unsafe-eval' (routes/userProfile.ts:88)
    which contradicts any future CSP deployment.
- domain: Browser and Cross-Origin Controls
  control: CORS Configuration
  effectiveness: Weak
  kind: cross-cutting
  assessment: 'cors() middleware is applied globally with no explicit allowlist (server.ts:182-183) — permissive cross-origin
    access is enabled by default. The cors() call without options defaults to Access-Control-Allow-Origin: * which, combined
    with localStorage token storage (not cookies), reduces (but does not eliminate) direct credential leakage.'
- domain: Browser and Cross-Origin Controls
  control: postMessage / iframe Origin Validation
  effectiveness: Unsafe
  kind: cross-cutting
  assessment: 53 postMessage-related findings detected — wildcard target origins ('*') used in postMessage calls and missing
    event.origin validation in listeners. This allows any origin to receive or inject messages into the application window.
- domain: Cryptography Secrets and Data Protection
  control: Cryptographic Key Management
  effectiveness: Unsafe
  kind: primitive
  assessment: The RSA private key used for JWT signing is hardcoded in lib/insecurity.ts:21 (full 2048-bit key in source).
    The encryptionkeys/ directory contains jwt.pub and premium.key committed to the repo. These keys are therefore permanently
    compromised for anyone who can read the public repository.
- domain: File Parser and Outbound Request Controls
  control: File Upload Validation
  effectiveness: Partial
  kind: surface
  assessment: multer is configured with MIME-type based filtering (server.ts:698-713) and a 200KB file size limit. However,
    MIME-type checking is client-declared and bypassable — no magic-byte signature validation. The file upload endpoint (POST
    /file-upload) is flagged as missing_auth_suspect, potentially allowing unauthenticated uploads.
- domain: File Parser and Outbound Request Controls
  control: Server-Side Request Forgery (SSRF) Prevention
  effectiveness: Weak
  kind: surface
  assessment: Profile image URL endpoint (POST /profile/image/url) accepts user-provided URLs for fetching images — a classic
    SSRF vector. The LLM chatbot baseURL is configured from application config which could be environment-injectable.
- domain: Operations Runtime and Supply Chain Controls
  control: Container Hardening
  effectiveness: Adequate
  kind: lifecycle
  assessment: Production Docker image uses gcr.io/distroless/nodejs24-debian13 as runtime base with non-root UID 65532. Multi-stage
    build reduces attack surface. The build-stage uses mutable node:24 tag (High) but runtime is properly hardened.
  implementation: Dockerfile
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Pipeline Security
  effectiveness: Partial
  kind: lifecycle
  assessment: 'CodeQL SAST is configured (.github/workflows/codeql-analysis.yml). However: npm install (not npm ci) is used
    in build steps allowing version drift; pull_request_target workflows have elevated GITHUB_TOKEN scope; no SCA tooling
    (Snyk/Trivy/Grype) is configured; Dockerfile node:24 base uses mutable tag.'
  implementation: .github/workflows/
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Supply Chain Integrity
  effectiveness: Partial
  kind: lifecycle
  assessment: Both package-lock.json files are committed — a necessary condition for reproducible builds. CI uses npm install
    (not npm ci) which does not strictly enforce the lockfile. No Dependabot, Renovate, or minimum package-age cooldown is
    configured.
- domain: Operations Runtime and Supply Chain Controls
  control: Secret Scanning
  effectiveness: Partial
  kind: lifecycle
  assessment: GitHub's built-in secret scanning is available at the repository level. No local secret-detection tool (TruffleHog,
    gitleaks) is configured in CI. The hardcoded RSA private key in lib/insecurity.ts is a known-intentional finding but demonstrates
    the gap.
- domain: Real-time and Not Applicable Controls
