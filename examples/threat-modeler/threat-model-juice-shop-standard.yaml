- id: M-043
  title: Dockerfile base image must be digest-pinned
  kind: fix
  priority: P2
  severity: High
  threat_ids:
  - T-004
  how: Pin base image to @sha256:<digest> — Tag-only base images (FROM node:24) can be silently substituted by a malicious
    publisher. Digest-pinning (@sha256:…) ensures the exact image bytes are used on every build.
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-044
  title: Container image signing via cosign or attest-build-provenance
  kind: fix
  priority: P3
  severity: Medium
  threat_ids:
  - T-005
  how: Add cosign signing step to release workflow; or use actions/attest-build-provenance — Unsigned container images cannot
    be verified for provenance — any registry intermediary could substitute them.
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-045
  title: Dockerfile npm/pnpm/yarn uses --ignore-scripts
  kind: fix
  priority: P3
  severity: Medium
  threat_ids:
  - T-006
  how: Use `npm ci --ignore-scripts` and audit required postinstalls separately — Without --ignore-scripts, any compromised
    dependency publisher can execute postinstall code at build time.
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-046
  title: Dockerfile HEALTHCHECK instruction
  kind: fix
  priority: P4
  severity: Low
  threat_ids:
  - T-007
  how: Add HEALTHCHECK CMD curl -f http://localhost:<port>/health — Missing HEALTHCHECK delays orchestrator detection of a
    hung or poisoned container.
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-047
  title: Dockerfile no --unsafe-perm install flag
  kind: fix
  priority: P2
  severity: High
  threat_ids:
  - T-032
  how: Remove --unsafe-perm; use non-root user — `npm install --unsafe-perm` runs postinstall scripts as root, widening supply-chain
    compromise scope.
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-048
  title: GitHub Actions workflow-level permissions block
  kind: fix
  priority: P2
  severity: High
  threat_ids:
  - T-033
  how: 'Add `permissions: { contents: read }` at workflow root; elevate per-job only where needed — Without an explicit permissions
    block, the workflow inherits the repository default (commonly write-all) for GITHUB_TOKEN — any compromised step can push
    code, create releases, or approve PRs.'
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-049
  title: Third-party GitHub Actions pinned to commit SHA
  kind: fix
  priority: P2
  severity: High
  threat_ids:
  - T-034
  how: Pin every third-party action to a full 40-char commit SHA — Tag-based action references (@v3, @main) are mutable —
    a compromised publisher can retroactively inject malicious code into an already-used tag.
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-050
  title: Dockerfile USER directive (non-root)
  kind: fix
  priority: P3
  severity: Medium
  threat_ids:
  - T-050
  how: Add USER <non-root-uid> — Containers running as root expand container-escape blast radius.
  effort: Low
  auto_emitted: true
  auto_source: config-scan
- id: M-051
  title: GITHUB_TOKEN scope minimization
  kind: fix
  priority: P3
  severity: Medium
  threat_ids:
  - T-051
  how: 'Add `permissions: { contents: read }` at root; per-job elevate to `contents: write` only where needed — `contents:
    read` at workflow root forces per-job opt-in for write scopes — minimal privilege by default.'
  effort: Low
  auto_emitted: true
  auto_source: config-scan
