  title: Wallet address spoofing in NFT ownership verification no — routes/nftMint.ts:41
  affected_parameter: walletAddress
  scenario: The /rest/web3/walletNFTVerify endpoint (nftMint.ts:41) accepts req.body.walletAddress and checks it against an
    in-memory Set populated from blockchain NFTMinted events. The server never requires a signed challenge proving the submitter
    controls the private key for that address. An attacker who observes a valid minted address (via the public blockchain,
    another user's session, or by watching the event listener before the legitimate owner claims) can POST that address first
    and receive the challenge-solved response. The Set is cleared on first match (addressesMinted.delete), so the real owner's
    subsequent claim fails.
