  title: Unauthenticated File Upload Endpoint — server.ts:309
  affected_parameter: null
  scenario: 'POST /file-upload is registered at server.ts:309 with no security.isAuthorized() middleware — the middleware
    chain is: uploadToMemory.single, ensureFileIsPassed, observeFileUploadMetricsMiddleware, checkUploadSize, checkFileType,
    handleZipFileUpload, handleXmlUpload, handleYamlUpload. The absence of an auth guard means any unauthenticated user on
    the internet can invoke the full upload processing pipeline, triggering Zip Slip (file-system-005), XXE (file-system-004),
    and DoS (file-system-006/007) without first establishing a session. POST /profile/image/file at server.ts:310 shares the
    same vulnerability.'
  evidence_summary: server.ts:309 shows no isAuthorized() call in the middleware chain for /file-upload, while comparable
    sensitive endpoints at server.ts:356-437 (basket, feedback, complaints REST API) all require isAuthorized().
  impact_description: All file-processing vulnerabilities in this component — Zip Slip, XXE, DoS — are exploitable by anonymous
    users, removing authentication as a compensating control.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: ensureFileIsPassed rejects requests with no file attached. Multer enforces a 200KB size cap.
  mitigation_title: Add security.isAuthorized() middleware to POST /file-upload and POST /profile/image/file
  remediation:
