  title: Missing Server-Side Discount Cap in generateCoupon Tool — routes/chat.ts:179
  affected_parameter: discount
  scenario: 'LLM06 — Excessive Agency / LLM01 — Prompt Injection: The `generateCoupon` tool defined at routes/chat.ts:176
    accepts a `discount` number from the LLM with no server-side upper-bound enforcement. The system prompt instructs the
    model that the maximum discount is 10%, but this policy is enforced only as natural-language instruction in the LLM context
    — not as code. An attacker who injects adversarial content into the system prompt (via their username or via crafted message
    history) can instruct the LLM to call `generateCoupon({ discount: 100 })`. The `execute` function at line 181 calls `security.generateCoupon(discount)`
    with the attacker-supplied value, issuing a 100% discount coupon. The challenge confirmation at line 182 (`discount >=
    10`) and line 183 (`discount >= 50`) demonstrates this path is actively exploitable.'
  evidence_summary: '`generateCoupon` tool at line 179 declares `z.number()` for the discount with no `.max()` constraint;
    `execute` at line 184 calls `security.generateCoupon(discount)` unconditionally.'
  impact_description: An attacker can generate arbitrarily large discount coupons (up to 100% off), causing direct financial
    loss with no server-side guard.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Natural-language policy in system prompt ('maximum allowed discount is 10%') — not a code-level control.
  mitigation_title: Enforce maximum discount ceiling in generateCoupon tool execute() handler
  remediation:
    effort: Low
