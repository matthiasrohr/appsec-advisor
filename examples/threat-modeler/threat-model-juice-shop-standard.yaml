  stride: Tampering
  cwe: CWE-94
  title: Remote Code Execution — routes/userProfile.ts:62
  affected_parameter: username
  scenario: '`routes/userProfile.ts:55-62` checks if the authenticated user''s stored username matches `#{(.*)}` and, if so,
    calls `eval(code)` where `code` is the captured group from the regex match. An attacker updates their profile username
    to `#{require(''child_process'').execSync(''id'')}` and then visits `/profile`. The server executes `require(''child_process'').execSync(''id'')`
    in the Node.js process context, returning the OS user identity. Full OS command execution is achievable — the attacker
    can exfiltrate environment variables, the SQLite database file, or establish a reverse shell.'
  evidence_summary: '`eval(code)` at routes/userProfile.ts:62 executes the regex-captured substring of `user.username`, which
    is attacker-controlled via the profile update API.'
  impact_description: Full server-side OS command execution as the Node.js process user, enabling exfiltration of all application
    secrets, database contents, and the ability to pivot to internal network resources.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Challenge-enabled guard (`isChallengeEnabled`) gates the code path, but that guard is always true unless
    the challenge is explicitly disabled in config.
  mitigation_title: Remove eval() from username rendering and use a safe template substitution
  remediation:
    effort: Low
    steps:
    - Remove the `eval(code)` branch entirely from `routes/userProfile.ts`. The SSTI challenge it enables should be implemented
      in a sandboxed environment or through a safer expression evaluator that does not have access to Node.js built-ins.
    - If expression evaluation is required for challenge purposes, use `notevil` (already imported in `routes/b2bOrder.ts`)
      with an explicit allowlist of permitted expressions, and strip `require`, `process`, and `__proto__` from input before
      evaluation.
    - Enforce a username format allowlist (alphanumeric + limited punctuation) at the point of profile update to reject `#{}`
      patterns server-side.
    code_example: '// routes/userProfile.ts — remove the eval branch

      // Instead, HTML-encode the username for safe display

      const displayUsername = entities.encode(user.username ?? '''')'
    reference: CWE-94
