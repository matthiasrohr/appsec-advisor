  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:23
  affected_parameter: socket connection
  scenario: Any client on the internet can establish a Socket.IO connection to the /socket.io endpoint without presenting
    a session token, JWT, or any other credential. The server's only guard is the CORS origin header `http://localhost:4200`,
    which is enforced by browsers but is trivially bypassed by non-browser clients (curl, Python websocket libraries, custom
    scripts). Once connected, the unauthenticated client receives all queued notifications (line 29-31), can emit challenge-verify
    events (lines 40-51), and can mutate server-side notification state (lines 33-38). The attacker can impersonate any browser
    session because no identity binding occurs at connection time.
  evidence_summary: '`io.on(''connection'', (socket: any) => {` at line 23 contains no authentication middleware or token
    check before proceeding to emit state and register event handlers.'
  impact_description: Any internet-connected attacker can silently connect, receive all challenge-solved events, and trigger
    server-side state changes without any credential — bypassing the intended player authentication model entirely.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS configured to `http://localhost:4200` only — enforced by browsers, not by the WebSocket upgrade
    path for non-browser clients.
  mitigation_title: Require JWT or session cookie verification on Socket.IO connection
  remediation:
    effort: Medium
    steps:
    - Add a Socket.IO middleware function using `io.use((socket, next) => { ... })` that extracts and verifies the user's
      JWT from `socket.handshake.auth.token` or the `Authorization` header before calling `next()`.
    - Reject unauthenticated connections with `next(new Error('Authentication required'))` so the client receives a connection
      error instead of a socket instance.
    - Attach the decoded user identity to `socket.data.user` so downstream event handlers can reference it for per-user filtering
      and authorization.
    - 'Update the frontend `SocketIoService` to pass the stored auth token in the `auth` option: `io(origin, { auth: { token:
      this.authToken } })`.'
    code_example: "```typescript\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  if (!token)\
      \ return next(new Error('Authentication required'))\n  try {\n    socket.data.user = jwt.verify(token, process.env.JWT_SECRET,\
      \ { algorithms: ['RS256'] })\n    next()\n  } catch {\n    next(new Error('Invalid token'))\n  }\n})\n```"
    reference: CWE-306
