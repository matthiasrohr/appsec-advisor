- local_id: ci-cd-pipeline-003
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-250
  title: Npm install --unsafe-perm runs postinstall scripts as root in — Dockerfile:5
  affected_parameter: --unsafe-perm
  scenario: 'The Dockerfile builder stage runs `npm install --omit=dev --unsafe-perm` at line 5 as the default root user.
    The `--unsafe-perm` flag explicitly disables npm''s normal privilege-drop behaviour, causing all postinstall lifecycle
    scripts in the dependency tree to execute as UID 0. Any compromised transitive dependency (the lockfile is absent — see
    ci-cd-pipeline-005) can execute arbitrary commands with root privileges at build time: write files anywhere in the container,
    modify build outputs, inject backdoors into `/juice-shop/build/app.js`, or exfiltrate secrets present in build-time environment
    variables. The poisoned image is then pushed to DockerHub as `bkimminich/juice-shop:latest` or `bkimminich/juice-shop:snapshot`
    without integrity verification.'
  evidence_summary: Dockerfile line 5 uses `--unsafe-perm` flag, forcing postinstall scripts to run as root within the builder
    container stage.
  impact_description: A compromised npm dependency executes as root at image build time, enabling backdoor injection into
    the published Docker image or exfiltration of CI secrets.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The final image stage uses `gcr.io/distroless/nodejs24-debian13` and drops to UID 65532 (`USER 65532`),
    limiting runtime privilege. This does not mitigate the build-time root execution risk.
  mitigation_title: Remove --unsafe-perm and run npm install as a non-root build user in Dockerfile
  remediation:
    effort: Medium
    steps:
    - 'Create a non-root user in the builder stage: `RUN addgroup --system appgroup && adduser --system --ingroup appgroup
      appuser`.'
    - 'Change ownership of the working directory before `npm install`: `RUN chown -R appuser:appgroup /juice-shop`.'
    - 'Switch to the non-root user: `USER appuser` before the `npm install` line.'
    - Remove the `--unsafe-perm` flag from the npm install command.
    - Additionally, add `--ignore-scripts` to npm install and audit any postinstall scripts that are genuinely required, running
      them explicitly as documented steps.
    code_example: '# In Dockerfile builder stage:

      RUN adduser --system --no-create-home builduser

      COPY --chown=builduser:root . /juice-shop

      USER builduser

      RUN npm install --omit=dev --ignore-scripts'
    reference: CWE-250
  evidence:
