  stride: Elevation of Privilege
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:54
  affected_parameter: null
  scenario: 'With the private key from `lib/insecurity.ts:21` in hand, any attacker calls `jwt.sign({ data: { role: ''admin'',
    email: ''anyuser@juice-sh.op'', isActive: true } }, privateKey, { expiresIn: ''6h'', algorithm: ''RS256'' })` — identical
    to `lib/insecurity.ts:54`. The resulting token passes `expressJwt({ secret: publicKey })` at `lib/insecurity.ts:52` and
    also `security.isAccounting()` at `lib/insecurity.ts:154` for accounting-role endpoints. The attacker can impersonate
    any existing user or claim any role without knowing that user''s password.'
  evidence_summary: '`lib/insecurity.ts:54` calls `jwt.sign(user, privateKey, ...)` where `privateKey` at line 21 is a source-committed
    PEM literal. `isAuthorized()` at line 52 and `isAccounting()` at line 154 verify against the corresponding public key
    — a key pair any reader of the repo controls.'
  impact_description: Attacker mints a valid admin- or accounting-role JWT for any email address, bypassing all server-side
    authentication and authorization checks.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: JWT algorithm is RS256 (not `alg:none`). Algorithm confusion is not the attack vector here — key exposure
    is.
  mitigation_title: Rotate and externalize the JWT signing key, and pin key load to environment secrets
  remediation:
    effort: Medium
    steps:
    - 'Immediately rotate the committed key pair: `openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out jwt.pem
      && openssl rsa -in jwt.pem -pubout -out jwt.pub`.'
    - Load the new private key at runtime from `process.env.JWT_PRIVATE_KEY` or a mounted secret file outside the repository
      (see auth-002 for code example).
    - Invalidate all existing sessions by changing the public key — previously issued tokens signed with the old key will
      fail verification once the public key is updated.
    - Configure a key-rotation schedule (e.g., quarterly) using a key management service.
    code_example: null
    reference: CWE-347
