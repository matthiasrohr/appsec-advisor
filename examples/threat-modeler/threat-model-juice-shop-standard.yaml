  cwe: CWE-770
  title: Unbounded In-Memory Set Growth — routes/web3Wallet.ts:16
  affected_parameter: walletAddress
  scenario: The `walletsConnected` Set at `web3Wallet.ts:10` grows unboundedly because `contractExploitListener` adds `req.body.walletAddress`
    to it on every POST to `/rest/web3/walletExploitAddress` without any size cap, deduplication limit, TTL, or rate limiting.
    An attacker sends thousands of unique fake wallet addresses (UUIDs, random hex strings) in rapid succession. The Set grows
    until Node.js heap exhaustion causes OOM errors or process termination. The same applies to `addressesMinted` in `nftMint.ts:10`
    — while that Set is populated by on-chain events (harder to spam), the `walletsConnected` path is directly attacker-controlled.
    No rate-limit middleware is applied to either endpoint (`server.ts:641-645`).
  evidence_summary: '`web3Wallet.ts:10` declares `walletsConnected` as a module-level `Set` with no size bound; `web3Wallet.ts:16`
    adds arbitrary attacker-supplied values on every request; `server.ts:641-645` shows no rate limiting on any web3 route.'
  impact_description: Continuous heap growth exhausts Node.js memory, crashing the application server and causing full denial
    of service for all users.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no rate limiting, no size cap, no TTL.
  mitigation_title: Apply rate limiting and add a maximum-size cap to wallet tracking Sets
  remediation:
    effort: Low
    steps:
    - 'Add `rateLimit({ windowMs: 15 * 60 * 1000, max: 20 })` from `express-rate-limit` to `/rest/web3/walletExploitAddress`
      and `/rest/web3/walletNFTVerify` in `server.ts`.'
    - 'Add a size guard before inserting into `walletsConnected`: `if (walletsConnected.size < 10000) walletsConnected.add(metamaskAddress)`
      or switch to a TTL-based structure (e.g. using a Map with timestamps and periodic cleanup).'
    - Validate that `req.body.walletAddress` matches the Ethereum address format (`/^0x[0-9a-fA-F]{40}$/`) before adding to
      the Set, reducing the write surface for non-address garbage.
    code_example: '```typescript

      // server.ts — add before route registration

      app.use(''/rest/web3/'', rateLimit({ windowMs: 15 * 60 * 1000, max: 20 }))

      ```'
    reference: CWE-770
