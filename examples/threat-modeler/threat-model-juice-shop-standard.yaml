  title: Forged JWT Claims Enable Admin Privilege Escalation via Committed Private Key
  affected_parameter: Authorization header
  scenario: 'Because the RSA-1024 private key is committed to source (lib/insecurity.ts:23) and `isAuthorized()` does not
    enforce algorithm restrictions (lib/insecurity.ts:54), an attacker constructs a JWT with arbitrary claims: `{ email: ''admin@juice-sh.op'',
    isAdmin: true, bid: 1 }` signed with the extracted private key. The token passes `expressJwt` validation and all downstream
    calls to `security.isAdmin()` (which reads the decoded token claims). The attacker now has admin-level access to every
    protected route in the application, not just the B2B endpoint. The B2B endpoint specifically accepts any authenticated
    identity, so the escalation path here is: anonymous → forged B2B caller → admin impersonation via claim injection.'
  evidence_summary: '`isAuthorized()` at insecurity.ts:54 decodes tokens from the committed private key without algorithm
    pinning; `isAdmin()` at insecurity.ts:168 reads decoded token claims to determine admin status without a server-side role
