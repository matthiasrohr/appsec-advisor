- local_id: socket-io-service-004
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: No rate limiting or connection cap on — registerWebsocketEvents.ts:21
  affected_parameter: null
  scenario: The Socket.IO server accepts unlimited unauthenticated connections and unlimited inbound events per socket. There
    is no `express-rate-limit`-equivalent gate on the handshake, no per-IP connection cap, and no per-event throttle. An attacker
    can open thousands of sockets and flood the `notification received` / `verify*` handlers, exhausting memory, file descriptors,
    and event-loop time. Each new connection also re-emits every queued notification (`notifications.forEach(... socket.emit
    ...)`), so connection floods amplify outbound work linearly with the notification backlog.
  evidence_summary: registerWebsocketEvents.ts:21-50 registers the Server and handlers with no connection limit, per-IP cap,
    or event throttle anywhere in the file.
  impact_description: Connection/event floods from anonymous clients can exhaust server resources and degrade availability
    for all users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None. No rate limiting or connection cap detected on the WebSocket endpoint.
  mitigation_title: Apply per-IP connection limits and per-event rate limiting to the Socket.IO server
  remediation:
    effort: Medium
    steps:
    - Introduce a per-IP connection counter in the `io.use()` handshake middleware and reject sockets beyond a sane threshold.
    - Add a token-bucket rate limiter on inbound events (e.g. a counter on `socket.data`) so a single socket cannot flood
      `verify*`/`notification received` handlers.
    - Configure `maxHttpBufferSize` and `pingTimeout`/`pingInterval` on the `Server` options to cap payload size and reap
      idle sockets.
    code_example: "const io = new Server(server, {\n  cors: { origin: allowedOrigins },\n  maxHttpBufferSize: 1e5,\n  pingTimeout:\
      \ 20000\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
