    at routes/resetPassword.ts:41 (`security.hmac(answer) === data.answer`). Security question answers (pet names, birth cities,
    favorite movies) are brute-forceable using OSINT data from social media profiles. The reset endpoint has a rate limit
    of 100 requests per 5 minutes, but the `X-Forwarded-For` header can be used to bypass this limit (server.ts:346). An attacker
    targeting a specific user can iterate through a wordlist of common answers and reset the password without knowledge of
    the current one. No second factor or email confirmation is required.
