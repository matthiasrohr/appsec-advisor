  title: Client-Side-Only Admin Guard Bypassable — app.guard.ts:52
  affected_parameter: token
  scenario: The `AdminGuard` at app.guard.ts:52–58 calls `loginGuard.tokenDecode()`, which calls `jwtDecode(token)` from the
    `jwt-decode` library. `jwtDecode` performs no signature verification — it is a pure base64 decoder. An attacker opens
    the browser console and executes `localStorage.setItem('token', '<crafted.jwt.here>')` where the payload contains `{"data":{"role":"admin"}}`.
    The AdminGuard passes, the Angular router renders the `/administration` route, and the administration panel's components
    fetch user and feedback data, which is then rendered in the DOM. While backend API calls will fail authorization, the
    admin UI is fully rendered with whatever data the real token is authorized to retrieve, or with cached data.
  evidence_summary: '`AdminGuard.canActivate()` at line 52 calls `loginGuard.tokenDecode()`, which uses `jwtDecode()` (signature-blind
    decode) to check `payload.data.role`, making the guard trivially bypassable.'
  impact_description: Any attacker with browser DevTools access can render the admin panel UI by placing a crafted JWT in
    localStorage, circumventing the intended access control on the admin route.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Backend API endpoints enforce server-side authorization (separate component); the client-side guard is
    the only frontend control.
  mitigation_title: Move admin route authorization to a server-side session check in app.guard.ts
  remediation:
