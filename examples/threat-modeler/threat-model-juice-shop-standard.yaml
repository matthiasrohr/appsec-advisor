  scenario: 'The `saveLoginIp()` handler at `routes/saveLoginIp.ts:18` reads `req.headers[''true-client-ip'']` — a header
    that is entirely attacker-controlled, not set by a trusted proxy. When `httpHeaderXssChallenge` is enabled (the default
    challenge mode), line 23 checks for an XSS payload and stores it unsanitized via `user.update({ lastLoginIp: lastLoginIp
    })` at line 32. Even when the challenge is disabled (line 25), `sanitizeSecure()` is called on `lastLoginIp`, but this
    still writes the (sanitized) attacker-supplied string to the database. If the lastLoginIp value is later rendered in an
    admin panel without escaping, the stored value becomes a persistent XSS vector. The condition at line 22 that gates sanitization
    means all production-mode deployments with `httpHeaderXssChallenge` enabled store the raw XSS payload.'
