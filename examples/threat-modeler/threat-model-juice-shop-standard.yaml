  cwe: CWE-79
  title: Stored XSS via lastLoginIp JWT Claim Trust Bypass
  affected_parameter: lastLoginIp
  scenario: '`last-login-ip.component.ts:39` decodes the JWT from localStorage and passes `payload.data.lastLoginIp` directly
    to `sanitizer.bypassSecurityTrustHtml(''<small>'' + lastLoginIp + ''</small>'')`. The `lastLoginIp` field is controlled
    by the server (it is written into the JWT on login) — if the backend records IP addresses without validation, an attacker
    who connects from a spoofed or injected IP string can embed HTML (e.g., `<img src=x onerror=...>`) in the JWT''s `lastLoginIp`
    claim. When the victim views the Last Login IP component after their next login, the injected HTML executes. This is a
    stored XSS routed through the JWT payload rather than a direct API response.'
  evidence_summary: '`bypassSecurityTrustHtml(\`<small>${payload.data.lastLoginIp}</small>\`)` at line 39 embeds a server-supplied
    JWT claim directly into trusted HTML without any validation.'
  impact_description: An attacker who can influence the `lastLoginIp` JWT field can inject persistent XSS that fires on the
    victim's next session, exfiltrating their new JWT token.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None — no sanitization of JWT claim before HTML rendering
  mitigation_title: Render lastLoginIp as textContent rather than trusted HTML in last-login-ip.component.ts
  remediation:
    effort: Low
    steps:
    - 'Replace `bypassSecurityTrustHtml(\`<small>${payload.data.lastLoginIp}</small>\`)` with a plain string assignment: `this.lastLoginIp
      = payload.data.lastLoginIp` and update the template to render it in a `<small>{{ lastLoginIp }}</small>` text binding.'
    - Validate that `lastLoginIp` matches an IPv4/IPv6 regex on the server before embedding it in the JWT, rejecting any value
      containing HTML-special characters.
    code_example: "// last-login-ip.component.ts — safe replacement\n// Change field type from SafeHtml to string\nlastLoginIp:\
      \ string = '';\n\nparseAuthToken() {\n  const token = localStorage.getItem('token');\n  if (token) {\n    const payload\
      \ = jwtDecode(token) as any;\n    if (payload.data?.lastLoginIp) {\n      // plain string — Angular template escapes\
      \ automatically\n      this.lastLoginIp = payload.data.lastLoginIp;\n    }\n  }\n}"
    reference: CWE-79
