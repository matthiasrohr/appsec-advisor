  cwe: CWE-829
  title: Missing on allows non-reproducible npm installs enabling — package.json:56
  affected_parameter: npm install
  scenario: No `package-lock.json` is committed to the repository (confirmed by project description). Every `npm install`
    in CI resolves dependency versions live against the npm registry using semver ranges from `package.json`. An attacker
    who publishes a malicious package under a name that satisfies an existing semver range — or who executes a dependency
    confusion attack using an internal package name — will have their package installed silently during the next CI run. Multiple
    jobs in `ci.yml` run `npm install` without `--ignore-scripts`, meaning the malicious package's `postinstall` hook executes
    immediately in the runner context with access to all CI environment variables including `CYPRESS_RECORD_KEY`, `ALCHEMY_API_KEY`,
    and `GITHUB_TOKEN`.
  evidence_summary: package.json line 56 defines a `postinstall` hook; ci.yml line 71, 110, 147, 202, 238 run `npm install`
    without `--ignore-scripts`, and no package-lock.json is present in the repo.
  impact_description: A dependency confusion or semver-hijack attack installs a malicious package whose postinstall hook exfiltrates
    CI secrets or tampers with build artifacts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The lint job uses `--ignore-scripts` (ci.yml:36,38), but the majority of CI jobs do not.
  mitigation_title: Commit package-lock.json and enforce --ignore-scripts for CI build steps
  remediation:
    effort: Medium
    steps:
    - Generate and commit `package-lock.json` by running `npm install` locally and committing the lockfile. Switch all CI
      install steps to `npm ci` (which requires a lockfile and performs integrity checking).
    - For jobs that do not require postinstall scripts (lint, test), add `--ignore-scripts` to prevent arbitrary hook execution
      from transitive dependencies.
    - Configure `.npmrc` with `ignore-scripts=true` as a default and selectively re-enable for jobs that legitimately need
      postinstall (e.g., the `postinstall` building the frontend).
    - Enable npm audit in CI (`npm audit --audit-level=high`) to detect known-vulnerable packages before install.
    code_example: '# In CI jobs that don''t need postinstall:

      - run: npm ci --ignore-scripts


      # In .npmrc to make this the default:

      ignore-scripts=true'
    reference: CWE-829
