  title: Docker base images unpinned to digest SHA allows build-time — Dockerfile:1
  affected_parameter: FROM node:24
  scenario: The Dockerfile uses `FROM node:24` (line 1) and `FROM gcr.io/distroless/nodejs24-debian13` (line 22) without digest
    SHA pinning. If the `node:24` tag is updated on Docker Hub — whether legitimately or via a registry compromise — the next
    build will use a different image layer. An attacker with write access to the `library/node` repository on Docker Hub,
    or a registry MitM, can inject a modified base image that is incorporated into the published `bkimminich/juice-shop` container
    without detection. The multi-stage build means both the installer stage (node:24) and the runtime stage (distroless) are
    affected.
  evidence_summary: Dockerfile line 1 is `FROM node:24` and line 22 is `FROM gcr.io/distroless/nodejs24-debian13` — both use
    mutable tags with no `@sha256:` digest appended.
  impact_description: A tampered base image is silently incorporated into released Docker images, enabling persistent malware
    in every downstream deployment.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: CycloneDX SBOM is generated at build time but does not prevent a tampered base image from being used
    before the SBOM is generated.
  mitigation_title: Pin Docker base images to immutable digest SHAs in Dockerfile
  remediation:
    effort: Low
    steps:
    - 'Append `@sha256:<digest>` to each base image: `FROM node:24@sha256:<current-digest>` and `FROM gcr.io/distroless/nodejs24-debian13@sha256:<current-digest>`.'
    - Add Dependabot `docker` ecosystem support in `.github/dependabot.yml` to automate digest-pinned updates.
    - Add a CI step that verifies the image digest matches the pinned value before proceeding with the build.
    code_example: '# Dockerfile

