  cwe: CWE-916
  title: Unsalted MD5 Password Hashing — lib/insecurity.ts:41
  affected_parameter: null
  scenario: The `hash()` function at lib/insecurity.ts:41 computes `crypto.createHash('md5').update(data).digest('hex')`.
    This hash is used to store all user passwords in the database (routes/login.ts:34) and to verify current password during
    change-password (routes/changePassword.ts:39) and 2FA setup (routes/2fa.ts:107). MD5 produces a 128-bit digest with no
    salt. A database breach exposes all password hashes, which can be cracked against precomputed rainbow tables (e.g. the
    rockyou MD5 table) or via GPU at >10 billion hashes/second (RTX 3090). Identical passwords produce identical hashes, enabling
    bulk cracking. The entire user population's passwords are recoverable in hours after a DB exfiltration.
  evidence_summary: '`crypto.createHash(''md5'')` at lib/insecurity.ts:41 with no salt parameter; this `hash()` function is
    called at routes/login.ts:34 for credential verification.'
  impact_description: A database dump exposes every user's plaintext password within hours via rainbow-table or GPU cracking,
    enabling credential stuffing against other services.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — MD5 without salt provides no meaningful protection against offline cracking.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2id in lib/insecurity.ts
  remediation:
    effort: Medium
    steps:
    - 'Replace `crypto.createHash(''md5'')` with `bcrypt.hash(password, 12)` (or `argon2.hash(password, { type: argon2.argon2id,
      memoryCost: 65536, timeCost: 3, parallelism: 1 })`). Install `bcryptjs` or `argon2` package.'
    - Update the `hash()` function in lib/insecurity.ts to be async and return a Promise, then update all callers (login.ts:34,
      changePassword.ts:39, 2fa.ts:107, 152).
    - 'Implement a migration strategy: on next successful login with MD5-verified password, rehash and store the new hash.
      Mark migrated accounts. After a transition window, force password resets for unmigrated accounts.'
    - Re-seed the database users with properly hashed passwords.
    code_example: "import bcrypt from 'bcryptjs'\n\n// lib/insecurity.ts\nexport const hash = async (data: string): Promise<string>\
      \ =>\n  bcrypt.hash(data, 12)\n\nexport const verifyPassword = async (plain: string, stored: string): Promise<boolean>\
      \ =>\n  bcrypt.compare(plain, stored)"
    reference: CWE-916
