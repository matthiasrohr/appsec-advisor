  title: XML External Entity File Disclosure — routes/fileUpload.ts:76
  affected_parameter: multipart file upload (.xml)
  scenario: 'The file upload handler at routes/fileUpload.ts:76 calls `parseXmlString(data)` on the raw buffer of any XML
    file submitted to `/file-upload`. The XML parser (lib/xml.ts) does not disable external entity resolution. An attacker
    submits an XML file containing `<!DOCTYPE foo [<!ENTITY xxe SYSTEM ''file:///etc/passwd''>]><foo>&xxe;</foo>`. The parser
    resolves the external entity, and the content is included in the `xmlString` variable which is then truncated and reflected
    in the HTTP error response at line 79: `''B2B customer complaints via file upload have been deprecated for security reasons:
    '' + utils.trunc(xmlString, 400)`. The first 400 characters of `/etc/passwd` are returned to the attacker.'
  evidence_summary: '`parseXmlString(data)` at fileUpload.ts:76 processes user-supplied XML without disabling XXE; the parsed
    result is reflected in the error body at line 79.'
  impact_description: Attacker reads arbitrary files accessible by the Node.js process, including `/etc/passwd`, application
    secrets, and private keys.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — XML parser is not configured to disable external entities.
  mitigation_title: Disable external entity resolution in the XML parser and avoid reflecting parsed content in error responses
  remediation:
    effort: Low
    steps:
    - 'In lib/xml.ts, configure the XML parser to disable external entities. For `xml2js`, set `disableEntityExpansion: true`.
      For `libxmljs`, use `noent: false`. For DOMParser-based parsers, strip DOCTYPE declarations before parsing.'
    - 'Remove the reflection of `xmlString` from the error response at fileUpload.ts:79. Return a generic error string instead:
      `''B2B customer complaints via file upload have been deprecated for security reasons.''`.'
    - Consider rejecting XML uploads that contain a DOCTYPE declaration before parsing begins.
    code_example: "```typescript\n// lib/xml.ts — disable XXE\nimport { parseStringPromise } from 'xml2js'\nexport const parseXmlString\
      \ = (data: string) =>\n  parseStringPromise(data, { strict: true, xmlParserOptions: { disableEntityExpansion: true }\
