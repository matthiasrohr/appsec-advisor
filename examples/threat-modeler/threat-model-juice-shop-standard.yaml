  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA Private Key Enables Arbitrary JWT Forgery — lib/insecurity.ts:23
  affected_parameter: Authorization header (JWT)
  scenario: 'The 1024-bit RSA private key is embedded as a string literal at `lib/insecurity.ts:23`. Any actor with access
    to the repository (public GitHub repo) can extract it. Because `security.authorize()` at line 56 signs all session JWTs
    with this key and `isAuthorized()` at line 54 verifies them with the corresponding public key, an attacker can call `jwt.sign({
    data: { id: 1, role: ''admin'', email: ''admin@juice-sh.op'' } }, stolenPrivateKey, { algorithm: ''RS256'' })` to mint
    a fully valid admin-role session token without providing credentials. The produced token passes all `expressJwt` middleware
    checks on every protected route.'
  evidence_summary: Line 23 of lib/insecurity.ts contains the full RSA private key as an inline string literal assigned to
    `const privateKey`; line 56 passes it directly to `jwt.sign()`.
  impact_description: Full authentication bypass — attacker impersonates any user including admin, gains access to all protected
    API endpoints, administrative functions, and user data.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — private key is committed to the public repository
  mitigation_title: Remove hardcoded private key and load from environment-injected secret at runtime
  remediation:
    effort: Medium
    steps:
    - Remove the inline `privateKey` string from `lib/insecurity.ts:23` and replace with `process.env.JWT_PRIVATE_KEY` loaded
      at startup with a startup-fail guard (`if (!process.env.JWT_PRIVATE_KEY) throw new Error('JWT_PRIVATE_KEY not set')`)
    - Generate a fresh 2048-bit RSA key pair (`openssl genrsa -out jwt.key 2048 && openssl rsa -in jwt.key -pubout -out jwt.pub`)
      and provision the private key as a Kubernetes Secret or environment variable, never committed to source
    - 'Add `algorithms: [''RS256'']` constraint to the `expressJwt()` call at line 54 to prevent algorithm downgrade'
    - Rotate the key immediately — all existing sessions must be invalidated by incrementing a `jti` counter or changing the
      signing key
    code_example: '// lib/insecurity.ts

