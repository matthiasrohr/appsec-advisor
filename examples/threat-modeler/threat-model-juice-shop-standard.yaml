assets:
- id: A-001
  name: User Credentials (Passwords + Email)
  classification: Confidential
  description: User email addresses and password hashes (SHA256, no salt) stored in the Users table in SQLite. Credentials
    are also transmitted via login endpoint. Password hashes are trivially crackable due to weak algorithm.
  linked_threats:
  - T-002
  - T-005
  - T-007
  - T-008
  - T-018
  - T-019
  - T-020
  - T-028
  - T-043
  - T-054
- id: A-002
  name: JWT RSA Private Key
  classification: Restricted
  description: 1024-bit RSA private key used to sign all JWT session tokens. Hardcoded in plaintext in lib/insecurity.ts:24
    and committed to the public GitHub repository. Possession of this key allows forging arbitrary admin JWTs.
  linked_threats:
  - T-001
  - T-003
  - T-004
  - T-005
  - T-010
  - T-013
  - T-022
  - T-025
  - T-028
  - T-029
  - T-035
  - T-037
  - T-039
  - T-040
  - T-058
  - T-066
- id: A-003
  name: User Session Tokens (JWT)
  classification: Confidential
  description: RS256-signed JWT tokens stored in browser localStorage by the Angular SPA. Tokens carry user identity (email,
    role, userId) with 6-hour expiry. Vulnerable to alg:none bypass due to jsonwebtoken@0.4.0.
  linked_threats:
  - T-001
  - T-003
  - T-010
  - T-012
  - T-018
  - T-019
  - T-020
  - T-028
  - T-045
