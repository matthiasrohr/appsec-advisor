  stride: Elevation of Privilege
  cwe: CWE-915
  title: User.role is a mass-assignable column with only isIn — models/user.ts:80
  affected_parameter: role
  scenario: 'The User model exposes role as an ordinary writable attribute whose only guard is validate.isIn([''customer'',''deluxe'',''accounting'',''admin''])
    (models/user.ts:80-99). Sequelize create/update calls that spread untrusted request bodies (e.g. UserModel.create(req.body)
    in registration/profile-update routes) will therefore accept and persist role: ''admin'' as long as the value is one of
    the allowed enum members — the isIn check confirms it is a known role but does NOT confirm the caller is authorized to
    grant it. There is no field-level write authorization at the model layer (no readonly/immutable role attribute, no beforeSave
    hook rejecting privilege escalation), so the data tier itself permits a self-service privilege jump if any consuming route
    fails to strip the field.'
  evidence_summary: models/user.ts:80-99 defines role as a writable STRING with only an isIn membership validator and no authorization
    or immutability guard at the model layer.
  impact_description: If any route mass-assigns the request body to the User model, an attacker registers or updates themselves
    to role 'admin', gaining full administrative privilege.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: isIn validation restricts role to a known enum, but does not enforce who may set it.
  mitigation_title: Make User.role non-mass-assignable and authorize role changes in a model hook
  remediation:
    effort: Medium
    steps:
    - Never spread req.body directly into UserModel.create/update; explicitly pick allowed fields and exclude role from user-facing
      registration and profile-update paths.
    - Add a beforeSave/beforeUpdate hook on the User model that rejects any role transition unless an authorized-actor flag
      set by server-side admin logic is present, so the data tier defends in depth even if a route regresses.
    - Default role to 'customer' on create and require a dedicated, separately-authorized admin endpoint for elevation.
    code_example: "User.addHook('beforeSave', (user) => {\n  if (user.changed('role') && !user.getDataValue('_roleChangeAuthorized'))\
      \ {\n    throw new Error('Unauthorized role change')\n  }\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Mass_Assignment_Cheat_Sheet.html
    blueprint: null
