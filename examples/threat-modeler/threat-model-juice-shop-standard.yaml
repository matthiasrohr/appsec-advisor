- local_id: data-layer-005
  threat_category_id: TH-06
  additional_categories: []
  stride: Tampering
  cwe: CWE-284
  title: User role field writable without ownership check in model — models/user.ts:80
  affected_parameter: role
  scenario: 'The `role` setter in `UserModel` at `models/user.ts:80-99` validates that the value is in `[''customer'', ''deluxe'',
    ''accounting'', ''admin'']` but performs no caller-identity check. Any call to `UserModel.update({ role: ''admin'' },
    { where: { id: targetId } })` from any route handler will succeed if the value is a valid enum string. If a route handler
    passes the `role` field from `req.body` (directly or via Sequelize''s dynamic `fields[]` option), an authenticated customer-tier
    user can self-elevate by sending `{ "role": "admin" }` in a PUT body. The model-layer validation guards only type/value
    correctness, not authorization — that boundary is expected to exist in the route layer, but model-layer defense-in-depth
    is absent.'
  evidence_summary: The `role` field definition at models/user.ts:80 has `validate.isIn` but no `readOnly` flag or context-aware
    authorization hook preventing escalation.
  impact_description: A customer-tier user who finds any route passing `req.body.role` to `UserModel.update()` gains admin-level
    access to the application.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Sequelize `validate.isIn` enforces valid enum values; route-level authorization guards are the primary
    (but sole) defense.
  mitigation_title: Add a model-layer beforeUpdate hook that rejects role changes by non-admin callers
  remediation:
    effort: Medium
    steps:
    - Add a Sequelize `beforeUpdate` hook on `UserModel` that checks `user.changed('role')` and throws an error unless the
      invoking context carries an admin capability flag (passed via Sequelize `options.context`).
    - Audit all route handlers that call `UserModel.update()` or `UserModel.create()` and ensure `role` is not included in
      the allowed `fields` array for non-admin callers.
    - Add an integration test that asserts a customer-role JWT cannot elevate itself to admin via any PUT /api/Users/:id endpoint.
    code_example: "// models/user.ts — role-change guard hook\nUser.addHook('beforeUpdate', (user, options: any) => {\n  if\
      \ (user.changed('role') && options?.context?.callerRole !== 'admin') {\n    throw new Error('Unauthorized role change')\n\
      \  }\n})"
    reference: CWE-284
    blueprint: null
