  cwe: CWE-312
  title: Payment card numbers stored in plaintext — models/card.ts:39
  affected_parameter: cardNum
  scenario: The `Card` Sequelize model at `models/card.ts:39` declares `cardNum` as `DataTypes.INTEGER`. Full 16-digit payment
    card numbers are written to the `Cards` table in the SQLite database (`data/juiceshop.sqlite`) without any encryption,
    truncation, or masking. Any actor with read access to the SQLite file — including via SQL injection (the known `sequelize.query()`
    sinks in `routes/login.ts:34` and `routes/search.ts:23`) or OS-level file access — retrieves complete PANs in a single
    SELECT. PCI-DSS Requirement 3.4 mandates that stored PANs be rendered unreadable (e.g., via AES-256 encryption or truncation
    to last four digits).
  evidence_summary: '`cardNum` field in CardModel is `DataTypes.INTEGER` with no encryption column option; no field-level
    encryption hook exists in the model definition.'
  impact_description: 'Mass PAN exposure: all stored card numbers are recoverable by any SQLite-file reader or SQL injection
    attacker without further privilege.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Sequelize INTEGER range validation (1000000000000000–9999999999999998) — enforces valid card number format
    but provides no confidentiality protection.
  mitigation_title: Encrypt PANs at the model layer using AES-256-GCM before SQLite write
  remediation:
    effort: High
    steps:
    - Add a Sequelize `beforeCreate` / `beforeUpdate` hook on `CardModel` that encrypts `cardNum` with AES-256-GCM using a
      key sourced from `process.env.CARD_ENCRYPTION_KEY` (never from source).
    - Add a corresponding `afterFind` hook (or getter) that decrypts `cardNum` on read, so application code continues to use
      the plaintext value in memory.
    - Store only the last four digits in the `cardNum` column for display/verification purposes; keep the encrypted full PAN
      in a separate `cardNumEncrypted` column.
    - Rotate the encryption key via envelope encryption (key-encryption-key wrapping) so that key rotation does not require
      re-encrypting all records.
    code_example: "// models/card.ts — field-level encryption hook sketch\nimport { createCipheriv, createDecipheriv, randomBytes\
      \ } from 'crypto'\nCardModel.addHook('beforeCreate', (card) => {\n  const iv = randomBytes(12)\n  const cipher = createCipheriv('aes-256-gcm',\
      \ Buffer.from(process.env.CARD_ENCRYPTION_KEY!, 'hex'), iv)\n  const encrypted = Buffer.concat([cipher.update(String(card.cardNum)),\
      \ cipher.final()])\n  const tag = cipher.getAuthTag()\n  card.cardNumEncrypted = `${iv.toString('hex')}:${tag.toString('hex')}:${encrypted.toString('hex')}`\n\
      \  card.cardNum = Number(String(card.cardNum).slice(-4))  // keep last-4 only\n})"
