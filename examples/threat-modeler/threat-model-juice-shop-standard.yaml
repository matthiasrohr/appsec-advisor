components:
- id: auth-identity
  name: Authentication and Identity Module
  type: process
  tier: application
  description: JWT issuance/validation logic, password hashing, login route, 2FA, and session management co-located in lib/insecurity.ts
    and routes/login.ts. Hardcoded RSA private key, MD5 hashing, and ancient JWT libraries define the auth posture.
  paths:
  - lib/insecurity.ts
  - routes/login.ts
  - routes/2fa.ts
  - routes/currentUser.ts
  - routes/changePassword.ts
  - routes/resetPassword.ts
  - encryptionkeys/**
  responsibilities:
  - JWT token issuance (RS256 with hardcoded private key)
  - Password verification (MD5 hash comparison via raw SQL)
  - JWT validation (express-jwt 0.1.3, no algorithm enforcement)
  - Two-factor authentication (TOTP via otplib)
  complexity: complex
  deployment_zones:
  - internet-facing
  handles_sensitive_data: true
  threat_ids:
  - T-003
  - T-004
  - T-005
  - T-012
  - T-019
  - T-028
  - T-029
  - T-037
  - T-048
  - T-049
- id: backend-api
  name: Express REST API Backend
  type: process
  tier: application
  description: 'Node.js/Express server handling all REST and API routes, JWT issuance/validation, file uploads, business logic,
    Socket.IO connections, and Prometheus metrics. Entry point: server.ts, routes/ directory.'
  paths:
  - server.ts
  - app.ts
  - routes/**
  - lib/**
  - models/**
  responsibilities:
  - User authentication via JWT RS256 (hardcoded private key)
  - Session management (Bearer token, no server-side revocation)
  - CRUD operations for users, products, orders, reviews
  - File upload and file serving (FTP directory, image uploads)
  - Challenge verification and hacking-challenge tracking
  complexity: complex
  deployment_zones:
  - internet-facing
  handles_sensitive_data: true
  threat_ids:
  - T-008
  - T-009
  - T-013
  - T-014
  - T-020
  - T-021
  - T-022
  - T-023
  - T-024
  - T-027
  - T-030
  - T-031
  - T-032
  - T-038
  - T-039
  - T-040
  - T-041
  - T-042
  - T-043
- id: frontend-spa
  name: Angular Single-Page Application
  type: process
  tier: client
  description: Angular SPA compiled to frontend/dist/. Served statically from Express; runs in user browsers. Handles UI,
    stores JWT in localStorage, sends API requests.
  paths:
  - frontend/src/**
  responsibilities:
  - Rendering product catalog, cart, checkout, user profile UI
  - JWT storage in localStorage (XSS-extractable)
  - Client-side routing and challenge display
  complexity: moderate
  deployment_zones:
  - browser
  handles_sensitive_data: true
  threat_ids:
  - T-002
  - T-006
  - T-010
  - T-016
  - T-045
  - T-054
  - T-057
  - T-061
- id: sqlite-db
  name: SQLite Database
  type: datastore
  tier: data
  description: Embedded SQLite database accessed via Sequelize ORM and raw queries. Stores users, products, orders, feedback,
    challenges. File on disk, no network isolation.
  paths:
  - models/**
  - data/static/*.json
  responsibilities:
  - Persistent storage for all application entities
  - Challenge state persistence
  complexity: simple
  deployment_zones:
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-007
  - T-036
  - T-046
- id: ci-cd-pipeline
  name: GitHub Actions CI/CD Pipeline
  type: process
  tier: application
  description: GitHub Actions workflows for CI (lint, tests, node-matrix), CodeQL SAST scan, and frontend bundle analysis.
    Multi-stage Docker build for container image production.
  paths:
  - .github/workflows/**
  - Dockerfile
  responsibilities:
  - Continuous integration testing (Node 22/24/26 matrix)
  - CodeQL security scanning (security-extended queries)
  - Docker image build and push
  complexity: simple
  deployment_zones:
  - internal-network
  handles_sensitive_data: false
  threat_ids:
  - T-001
  - T-015
  - T-025
  - T-026
  - T-033
  - T-034
  - T-044
  - T-050
  - T-051
  - T-052
  - T-053
- id: realtime-channel
  name: Real-time WebSocket Channel
  description: Server-side socket.io real-time channel pushing live events to connected browsers. Internet-facing WebSocket
    surface with its own connection auth/origin checks and message-handler trust boundary.
  paths:
  - lib/challengeUtils.ts
  - lib/startup/registerWebsocketEvents.ts
  tier: application
  complexity: simple
  framework: socket.io
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: false
  origin: reconciliation
  threat_ids:
  - T-017
