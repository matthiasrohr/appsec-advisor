components:
- id: express-backend
  name: Express Backend API
  description: Node.js/TypeScript Express server handling all REST API requests, authentication, authorization, file uploads,
    and business logic. Entry point server.ts, 61 route handlers. Intentionally vulnerable by design.
  tier: application
  paths:
  - server.ts
  - routes/
  - lib/
  - models/
  - data/
  deployment_zones:
  - application
  handles_sensitive_data: true
  technology: Node.js 22-26, TypeScript, Express 4
  notes: Primary attack surface. Contains intentional SQLi (search, login), eval injection (userProfile, captcha), XXE (fileUpload),
    JWT forgery (hardcoded RSA key), open CORS, missing CSRF.
  threat_ids:
  - T-008
  - T-013
  - T-014
  - T-016
  - T-019
  - T-043
  - T-044
  - T-045
  - T-051
  - T-052
  - T-054
  - T-055
  - T-057
  - T-063
  - T-065
  - T-066
  - T-067
  - T-070
  - T-078
- id: angular-frontend
  name: Angular SPA Frontend
  description: Angular 21 single-page application served as static assets. Contains challenge UI, shopping features, admin
    panel. Deliberately bypasses Angular's DomSanitizer in multiple components.
  tier: client
  paths:
  - frontend/src/
  - frontend/dist/
  deployment_zones:
  - client
  handles_sensitive_data: true
  technology: Angular 21, TypeScript
  notes: Stores JWT in localStorage (XSS-accessible). Multiple bypassSecurityTrustHtml() usages enabling stored/reflected
    XSS.
  threat_ids:
  - T-001
  - T-002
  - T-006
  - T-017
  - T-061
  - T-071
- id: sqlite-db
  name: SQLite Database
  description: SQLite3 database via Sequelize ORM storing users, products, orders, challenges, feedback. Also contains MarsDB
    (in-memory MongoDB-compatible) for some challenge data.
  tier: data
  paths:
