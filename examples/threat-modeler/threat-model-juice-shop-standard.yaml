- local_id: ci-cd-pipeline-002
  threat_category_id: TH-22
  additional_categories: []
  stride: Tampering
  cwe: CWE-494
  title: Unpinned Container Base Image — Dockerfile:1
  affected_parameter: null
  scenario: '`Dockerfile:1` specifies `FROM node:24` as the build stage base image, and `Dockerfile:22` specifies `FROM gcr.io/distroless/nodejs24-debian13`
    as the runtime base. Both use mutable tags (no `@sha256:` digest). When Docker pulls these images during a CI build, it
    resolves the tag against the current registry state. If the upstream publisher (Docker Hub for `node:24`, Google Container
    Registry for distroless) is compromised, or if the tag is updated to include a vulnerable or backdoored layer, the production
    container image ships that compromised layer. The smoke test Dockerfile (referenced in `ci.yml:311` via `docker-compose.test.yml`)
    also uses `FROM alpine` without a digest pin.'
  evidence_summary: '`Dockerfile:1` uses `FROM node:24` and `Dockerfile:22` uses `FROM gcr.io/distroless/nodejs24-debian13`
    — both mutable-tag references without `@sha256:` digests, meaning the resolved image content can change between builds.'
  impact_description: A compromised upstream base image layer ships silently into the production Docker image pushed to DockerHub
    (`bkimminich/juice-shop:latest`), with no build-time integrity check to detect the change.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The runtime stage uses `gcr.io/distroless/nodejs24-debian13` (a minimal image), which reduces attack
    surface. The production container runs as UID 65532 (non-root). CycloneDX SBOM is generated during build.
  mitigation_title: Pin Dockerfile base images to digest in Dockerfile and docker-compose.test.yml
  remediation:
    effort: Medium
    steps:
    - 'Resolve the current digest for `node:24`: `docker manifest inspect node:24 | jq -r ''.config.digest''` or use `docker
      pull node:24 && docker inspect node:24 --format ''{{index .RepoDigests 0}}''`.'
    - Update `Dockerfile:1` to `FROM node:24@sha256:<digest> AS installer`.
    - 'Resolve and pin `gcr.io/distroless/nodejs24-debian13` similarly: `docker manifest inspect gcr.io/distroless/nodejs24-debian13`.'
    - Update `Dockerfile:22` to `FROM gcr.io/distroless/nodejs24-debian13@sha256:<digest>`.
    - Add Dependabot `docker` ecosystem config in `.github/dependabot.yml` to receive automated PRs when digests are updated
      upstream.
    - Verify digest integrity in CI with `docker trust inspect` or Cosign signature verification where available.
    code_example: '# Before

      FROM node:24 AS installer

      # After

      FROM node:24@sha256:abc123...def456 AS installer


      # Before

      FROM gcr.io/distroless/nodejs24-debian13

      # After

      FROM gcr.io/distroless/nodejs24-debian13@sha256:789abc...012def'
    reference: CWE-494
