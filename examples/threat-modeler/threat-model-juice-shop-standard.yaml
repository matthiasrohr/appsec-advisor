    read access — or access to the compiled bundle — can call `HDNodeWallet.fromPhrase(mnemonic)` offline to derive the wallet's
    private key, public key, and Ethereum address. The private key is then accepted by `/rest/web3/submitKey` to solve `nftUnlockChallenge`.
