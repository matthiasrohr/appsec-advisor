    stepCountIs(10)` at line 209 permits 10 sequential LLM + tool-call steps per request with no per-user throttle.'
  impact_description: Attacker drives up LLM API costs at the operator's expense and can degrade or deny chatbot availability
    for all users by exhausting API quota.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: A `maxRetries` config parameter limits retry attempts. No per-user rate limiting or token-count cap on
    chat requests.
  mitigation_title: Add per-user rate limiting and message-history size cap to the chat endpoint in routes/chat.ts
  remediation:
