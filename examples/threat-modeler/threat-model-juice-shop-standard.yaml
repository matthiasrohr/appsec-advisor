  title: Plaintext Payment Card Storage (models/card.ts:39)
  affected_parameter: cardNum
  scenario: '`models/card.ts:39` defines `cardNum` as `DataTypes.INTEGER` with no encryption, tokenization, or masking. The
    full 16-digit PAN is written to the Cards table in cleartext. Any actor with read access to the SQLite file or who exploits
