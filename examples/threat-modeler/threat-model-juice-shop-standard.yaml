  scenario: '`AdminGuard.canActivate()` at line 52 decodes the stored JWT with `loginGuard.tokenDecode()`, which calls `jwtDecode(token)`
    — a decode-only library that performs no signature verification. An attacker sets `localStorage.setItem(''token'', ''<crafted-jwt-with-role-admin>'')`
    where the crafted JWT has `data.role = "admin"` in its payload. `AdminGuard` sees `payload.data.role === ''admin''` and
    returns `true`, rendering the full `/administration` component. The same flaw applies to `AccountingGuard` (line 69, role
    `"accounting"`). The `jwtDecode` import at line 7 is the decode-only package, not a verifier.'
  evidence_summary: Lines 53-54 call `tokenDecode()` which uses `jwtDecode()` (signature-unaware decoder) and checks `payload.data.role`,
    accepting any JWT regardless of whether it was signed by the server.
  impact_description: Any browser user can self-promote to admin by writing a crafted JWT to localStorage, gaining the administration
    UI including user enumeration and feedback deletion.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Client-side role guard only; relies on jwtDecode which does not verify signatures
  mitigation_title: Move role enforcement to server-side API authorization; treat all client-side role checks as UI hints
    only
  remediation:
    effort: Medium
    steps:
    - Ensure every admin API endpoint (`/api/Users`, `/api/Feedbacks/delete`, etc.) enforces `role === 'admin'` server-side
      with a verified JWT — the Angular guard is a UX convenience only, not a security boundary.
    - In `AdminGuard`, add a server-round-trip check (e.g. call `/api/Users/me` and verify the returned role) rather than
      trusting the client-decoded payload.
    - 'Replace `jwtDecode` in guards with an explicit expiry check: even without signature verification, reject tokens where
      `payload.exp < Date.now() / 1000` to prevent session replay.'
    code_example: "// AdminGuard: add server check\nasync canActivate(): Promise<boolean> {\n  try {\n    const me = await\
