  cwe: CWE-829
  title: Unpinned third-party GitHub Action allows supply-chain code — ci.yml:161
  affected_parameter: 'uses: coverallsapp/github-action@v2'
  scenario: The coverage-report job references `coverallsapp/github-action@v2` (ci.yml line 161) using a mutable version tag
    instead of a 40-character commit SHA. A threat actor who compromises the coverallsapp publisher account — or who can perform
    a tag-mutation attack — can retroactively move the @v2 tag to point to malicious code. On the next workflow run triggered
    by any push to master/develop, that code executes inside the CI runner with full access to `secrets.GITHUB_TOKEN` (also
    passed at line 163), `secrets.CYPRESS_RECORD_KEY`, and other ambient environment secrets. The attacker can exfiltrate
    all CI secrets, push malicious commits to the repository, create unauthorized releases, or inject backdoors into the shipped
    artifact — all while the workflow log shows the legitimate action name.
  evidence_summary: Line 161 of ci.yml uses `coverallsapp/github-action@v2` — a mutable tag that can be silently redirected
    by the publisher to arbitrary code.
  impact_description: Full compromise of all repository secrets, ability to push code or releases to production, and persistent
    backdoor injection into Docker images published to DockerHub.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Most first-party and docker/* actions in the same workflow are SHA-pinned (e.g., actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683).
    The coverallsapp action is the primary unpinned third-party exception.
  mitigation_title: Pin coverallsapp/github-action and all unpinned third-party actions to full 40-char commit SHAs
  remediation:
    effort: Low
    steps:
    - Run `npx pin-github-action` or check https://api.github.com/repos/coverallsapp/github-action/git/ref/tags/v2 to resolve
      the current @v2 commit SHA.
    - 'Replace `uses: coverallsapp/github-action@v2` with `uses: coverallsapp/github-action@<sha> #v2.x.x` in ci.yml line
      161.'
    - 'Audit all workflow files for additional mutable-tag references using: `grep -r ''uses:'' .github/workflows/ | grep
      -v ''#v'' | grep -v ''@[0-9a-f]\{40\}''`.'
    - Add a CI check (e.g., `zizmor` or `step-security/harden-runner`) to enforce SHA-pinning as a policy gate on all PRs.
    code_example: '# Before (vulnerable):

      - uses: coverallsapp/github-action@v2


      # After (safe):

