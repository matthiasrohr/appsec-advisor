assets:
- id: A-001
  name: User Credentials Database
  classification: Restricted
  description: SQLite Users table containing email addresses, MD5-hashed passwords, TOTP secrets, role assignments, and profile
    data for all registered users. MD5 hashing makes the entire password store trivially reversible.
  linked_threats:
  - T-004
  - T-005
  - T-008
  - T-017
  - T-018
  - T-019
  - T-036
  - T-038
- id: A-002
  name: JWT RSA Private Key
  classification: Restricted
  description: 1024-bit RSA private key hardcoded in lib/insecurity.ts:21. Used to sign all JWT tokens. Compromise allows
    creation of arbitrary admin-role tokens for any user.
  linked_threats:
  - T-006
  - T-011
  - T-015
  - T-019
  - T-028
  - T-036
  - T-037
  - T-049
  - T-053
- id: A-003
  name: User Payment Card Data
  classification: Restricted
  description: Credit card data (card number, expiry, CVV) stored in the Card model in SQLite. Associated with user accounts
    and used for checkout.
  linked_threats:
  - T-005
  - T-007
  - T-008
  - T-014
  - T-017
  - T-018
  - T-036
  - T-047
- id: A-004
  name: User PII and Addresses
  classification: Confidential
  description: Full names, email addresses, physical addresses, phone numbers, and IP addresses (lastLoginIp) stored per user.
    Subject to GDPR data erasure requests (/dataerasure).
  linked_threats:
  - T-001
  - T-005
  - T-007
  - T-008
  - T-014
  - T-017
  - T-018
  - T-047
- id: A-005
  name: Product and Order Data
  classification: Internal
  description: Product catalogue, basket contents, order history, delivery status, and coupon data stored in SQLite and MarsDB.
    Commercially sensitive — includes acquisition strategy (ftp/acquisitions.md).
  linked_threats:
  - T-001
  - T-005
  - T-007
  - T-008
  - T-014
  - T-047
- id: A-006
  name: FTP Directory Contents
  classification: Confidential
  description: Publicly accessible /ftp directory containing acquisitions.md (M&A strategy), announcement_encrypted.md, coupons_2013.md.bak,
    incident-support.kdbx (KeePass database), and encrypted files. Served with directory listing enabled.
  linked_threats:
  - T-014
  - T-033
  - T-047
- id: A-007
  name: Encryption Keys Directory
  classification: Restricted
  description: Publicly accessible /encryptionkeys directory exposing jwt.pub (RSA public key) and premium.key. Served with
    directory listing enabled, enabling offline JWT forging attacks.
  linked_threats:
  - T-011
  - T-028
  - T-033
  - T-036
  - T-037
  - T-049
  - T-062
- id: A-008
  name: CTF Key and Score State
  classification: Confidential
  description: ctf.key (30-char secret) committed to the repository. Used for CTF mode scoring. Challenges and their solution
    state stored in SQLite Challenge model.
  linked_threats: []
- id: A-009
  name: Application Configuration
  classification: Internal
  description: Runtime configuration from config/*.yml including domain settings, OAuth client IDs, chatbot LLM URL, and feature
    flags. Exposed unauthenticated via GET /rest/admin/application-configuration.
  linked_threats: []
- id: A-010
  name: CI/CD Pipeline Secrets
  classification: Restricted
  description: GitHub Actions secrets (NPM_TOKEN, Docker Hub credentials, COVERALLS_REPO_TOKEN) used in 16 workflows. Workflows
    lack permissions blocks and use unpinned third-party actions — supply chain attack could exfiltrate these.
  linked_threats:
  - T-004
  - T-005
  - T-008
  - T-017
  - T-018
  - T-019
  - T-030
  - T-031
  - T-038
  - T-046
  - T-054
- id: A-011
  name: Prometheus Metrics
  classification: Internal
  description: Application performance and business metrics exposed at /metrics (unauthenticated). Reveals internal route
    latencies, error rates, file upload volumes, and custom challenge metrics.
  linked_threats: []
- id: A-012
  name: User Memory Images and Uploads
  classification: Confidential
  description: User-uploaded memory images stored in uploads/. Profile images may be fetched from attacker-controlled URLs
    (SSRF via /profile/image/url). Complaint attachments stored in uploads/complaints/ with path traversal risk.
  linked_threats:
  - T-009
  - T-012
  - T-034
