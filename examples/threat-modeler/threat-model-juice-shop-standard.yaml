- local_id: angular-spa-001
  threat_category_id: TH-10
  additional_categories: []
  stride: Spoofing
  cwe: CWE-287
  title: OAuth Implicit Flow with Derived Password — oauth.component.ts:30
  affected_parameter: access_token (URL fragment)
  scenario: The Google OAuth integration at login.component.ts:134 uses `response_type=token`, initiating the implicit flow.
    The access_token arrives in the URL fragment (#access_token=...) where it is visible to any JavaScript executing on the
    page, stored in browser history, and potentially leaked via the Referer header. At oauth.component.ts:30, the component
    derives the user's Juice Shop password as `btoa(profile.email.split('').reverse().join(''))` — a deterministic, reversible
    transformation of the email claim. Any attacker who knows a target's email address can compute this password offline with
    a one-liner and log into the account directly via /rest/user/login, bypassing OAuth entirely. No PKCE is used (implicit
    flow has no PKCE), and no `state` parameter is generated or validated in the redirect.
  evidence_summary: oauth.component.ts:30 derives the account password from the email via `btoa(email.split('').reverse().join(''))`,
    and login.component.ts:134 passes `response_type=token` with no `state` parameter.
  impact_description: An attacker knowing any user's email can compute and use their Juice Shop password, fully bypassing
    the OAuth flow and gaining authenticated access to the account.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no PKCE, no state parameter, password derivation is deterministic from public claim.
  mitigation_title: Replace implicit flow with authorization code + PKCE and generate unique random passwords for OAuth-provisioned
    accounts
  remediation:
    effort: High
    steps:
    - Switch the Google OAuth redirect to `response_type=code` with `code_challenge_method=S256` and a per-request PKCE `code_verifier`/`code_challenge`
      pair generated via `crypto.getRandomValues()`.
    - Generate a cryptographically random password (`crypto.getRandomValues(new Uint8Array(32))` → hex) on first OAuth account
      provisioning; store only the hash server-side. Never derive the password from an email claim.
    - 'Add `state` parameter: generate a random nonce before redirecting, store it in sessionStorage, and verify it on callback
      before processing the token.'
    - Move token exchange server-side (Backend-for-Frontend pattern) so the access_token never enters the browser JavaScript
      context.
    code_example: '// Generate PKCE challenge

      const verifier = crypto.getRandomValues(new Uint8Array(32));

      const verifierHex = Array.from(verifier).map(b => b.toString(16).padStart(2,''0'')).join('''');

      const challenge = btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.digest(''SHA-256'', new TextEncoder().encode(verifierHex)))));

      sessionStorage.setItem(''pkce_verifier'', verifierHex);

      window.location.replace(`${oauthProviderUrl}?response_type=code&code_challenge=${challenge}&code_challenge_method=S256&state=${nonce}&...`);'
    reference: CWE-287
  evidence:
  - file: frontend/src/app/oauth/oauth.component.ts
    line: 30
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: false
  component_name: Angular SPA Frontend
  source: stride
  evidence_flags:
  - flag_id: EV-002
    verdict: verified
    reason: Line 30 derives password as btoa(profile.email reversed) -- predictable from email.
    line_excerpt: const password = btoa(profile.email.split("").reverse().join(""))
