      that exchanges it for tokens without exposing them to the browser.'
    - Validate the `state` parameter on callback to prevent CSRF against the OAuth flow.
    - If a BFF is not feasible short-term, use the authorization code flow with PKCE fully in the SPA (RFC 7636) — never `response_type=token`.
