- local_id: auth-003
  threat_category_id: TH-10
  additional_categories: []
  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:54
  affected_parameter: Authorization header
  scenario: express-jwt version 0.1.3 (package.json) and jsonwebtoken version 0.4.0 do not enforce algorithm restrictions.
    An attacker constructs a JWT with header {"alg":"none"}, an arbitrary payload ({"data":{"role":"admin","id":1}}), and
    an empty signature. isAuthorized() at lib/insecurity.ts:54 passes this token to express-jwt without specifying an algorithms
    allowlist, so the library accepts the unsigned token as valid. Additionally, the MFA second-factor tmpToken is verified
    at routes/2fa.ts:26 via security.verify() which calls jws.verify() — if jws.verify() with algorithm none also passes,
    the attacker skips the MFA step entirely.
  evidence_summary: 'expressJwt({ secret: publicKey }) call at lib/insecurity.ts:54 omits the algorithms field; express-jwt
    0.1.3 accepts alg:none by default.'
  impact_description: Attacker forges a zero-signature JWT for any user/role, bypassing all isAuthorized() guards and optionally
    the MFA second factor.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — algorithm pinning absent; library version does not enforce it.
  mitigation_title: Upgrade express-jwt and pin RS256 algorithm on all JWT verification calls
  remediation:
    effort: Medium
    steps:
    - Upgrade express-jwt to ^8.x and jsonwebtoken to ^9.x.
    - 'Change isAuthorized() to: expressJwt({ secret: publicKey, algorithms: [''RS256''] }) — this rejects any token with
      alg:none or unexpected algorithms.'
    - 'Update security.verify() at lib/insecurity.ts:57 to use jsonwebtoken.verify(token, publicKey, { algorithms: [''RS256'']
      }) instead of jws.verify.'
    - Verify routes/2fa.ts:26 uses the updated security.verify() so the MFA step also enforces algorithm pinning.
    code_example: "// lib/insecurity.ts\nimport { expressjwt } from 'express-jwt'\nexport const isAuthorized = () =>\n  expressjwt({\
      \ secret: publicKey, algorithms: ['RS256'] })"
    reference: CWE-347
