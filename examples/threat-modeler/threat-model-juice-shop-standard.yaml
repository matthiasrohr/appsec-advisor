- local_id: b2b-api-005
  threat_category_id: TH-17
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-209
  title: Stack Trace Disclosure on Sandbox Eval Error (routes/b2bOrder.ts:33)
  affected_parameter: orderLinesData
  scenario: 'When `vm.runInContext(''safeEval(orderLinesData)'', sandbox)` throws an error that is not a timeout (b2bOrder.ts:33),
    the handler calls `next(err)` — passing the raw JavaScript Error object to Express. The global `errorhandler()` middleware
    (server.ts:678, errorhandler@^1.5.1) responds with the full error stack trace in the HTTP response body when `NODE_ENV`
    is not exactly `''production''`. In development and staging environments the response includes: the notevil library path,
    Node.js internal frame addresses, and the exact expression that triggered the error. An authenticated B2B caller can systematically
    probe `orderLinesData` values to map the sandbox internals and craft a more precise bypass payload.'
  evidence_summary: '`next(err)` at b2bOrder.ts:33 forwards the raw Error to `errorhandler()`, which sends stack traces to
    HTTP clients when not in strict production mode.'
  impact_description: Authenticated callers receive notevil sandbox internals and Node.js stack frames in error responses,
    accelerating sandbox escape research.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Timeout errors are caught separately and return a sanitized 503 message (b2bOrder.ts:29).
  mitigation_title: Sanitize eval error responses to return a generic 400 without stack trace
  remediation:
    effort: Low
    steps:
    - 'In the `catch` block at b2bOrder.ts:33, replace `next(err)` with a sanitized response: `res.status(400).json({ error:
      ''Invalid order expression'' })` — do not forward the raw Error to the Express error pipeline.'
    - Set `NODE_ENV=production` in all deployment environments so `errorhandler` suppresses stack traces globally as a defense-in-depth
      measure.
    - Log the full error server-side (not in the response) for debugging.
    code_example: "// routes/b2bOrder.ts — sanitized error response\n} catch (err) {\n  if (utils.getErrorMessage(err).match(/Script\
      \ execution timed out.*/) != null) {\n    challengeUtils.solveIf(challenges.rceOccupyChallenge, () => true)\n    return\
      \ res.status(503).json({ error: 'Service temporarily unavailable' })\n  }\n  // Do NOT call next(err) — sanitize the\
      \ response\n  logger.warn('B2B eval error', { type: err instanceof Error ? err.constructor.name : 'unknown' })\n  return\
      \ res.status(400).json({ error: 'Invalid order expression' })\n}"
    reference: CWE-209
  evidence:
  - file: routes/b2bOrder.ts
    line: 33
