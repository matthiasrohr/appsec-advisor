  title: Derived Predictable Password from Email Claim (oauth.component.ts:30)
  affected_parameter: password
  scenario: 'When completing the OAuth flow, `OAuthComponent.login()` at line 46 submits `{ email: profile.email, password:
    btoa(profile.email.split('''').reverse().join('''')) }` as the Juice Shop login credential. The password is the base64-encoding
    of the reversed email address — a deterministic, publicly derivable value. Any attacker who knows a target user''s email
    address can compute this password without OAuth interaction and authenticate directly against the `POST /rest/user/login`
    endpoint with the derived credential, bypassing OAuth entirely. This is a parallel authentication bypass: the OAuth flow
    protects the Google side; the Juice Shop backend accepts a password that is algorithmically derived from publicly known
    data.'
  evidence_summary: '`btoa(profile.email.split('''').reverse().join(''''))` at line 30 and line 46 produces the same value;
    the pattern is identical and deterministic from the email claim alone.'
  impact_description: Any attacker who knows a victim's email can authenticate as that user on the Juice Shop backend without
    OAuth interaction, obtaining a valid JWT session.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — password is publicly derivable
  mitigation_title: Replace deterministic email-derived password with server-side OAuth account linking in oauth.component.ts
  remediation:
    effort: High
    steps:
    - Remove the derived-password login path from `OAuthComponent.login()`. The backend should have a dedicated `POST /rest/oauth/callback`
      endpoint that accepts the authorization code (not a derived password) and creates/links the account server-side.
    - On first OAuth login, generate a cryptographically random password (or no password at all) using `crypto.randomBytes(32)`
      on the server — never expose it to the client.
    - Mark OAuth-linked accounts in the database with an `oauthOnly` flag; reject direct password authentication for those
      accounts at the `POST /rest/user/login` handler.
    - Audit existing accounts created via OAuth and force a password reset for all accounts where the current password hash
      matches `bcrypt(btoa(email.reverse()))`.
    code_example: "// Express backend: dedicated OAuth callback\napp.post('/rest/oauth/callback', async (req, res) => {\n\
      \  const { code } = req.body;\n  const tokenRes = await exchangeCodeForToken(code); // server-side exchange\n  const\
      \ profile = await fetchGoogleProfile(tokenRes.access_token);\n  let user = await User.findOne({ where: { email: profile.email\
      \ } });\n  if (!user) {\n    user = await User.create({ email: profile.email,\n      password: crypto.randomBytes(32).toString('hex'),\
      \ oauthOnly: true });\n  }\n  const jwt = security.authorize(user);\n  res.json({ token: jwt });\n});"
    reference: CWE-522
