  title: NoSQL Mass-Update — routes/updateProductReviews.ts:17
  affected_parameter: id
  scenario: 'The review update endpoint at `routes/updateProductReviews.ts:17-20` passes `req.body.id` directly as the MarsDB
    filter: `db.reviewsCollection.update({ _id: req.body.id }, { $set: { message: req.body.message } }, { multi: true })`.
    Any authenticated user can supply a MongoDB-style operator object as `id` (e.g., `{ "$gt": "" }`) to match ALL reviews
    and overwrite every review''s message with arbitrary content. No ownership check compares `user.data.email` against `review.author`
    before performing the update.'
  evidence_summary: '`req.body.id` flows unchecked into the MarsDB `update()` filter with `{ multi: true }` at `routes/updateProductReviews.ts:17-20`,
    allowing any authenticated user to mass-modify all review documents.'
  impact_description: An authenticated customer can overwrite all product reviews in the database, destroying review integrity
    and performing horizontal privilege escalation to act on behalf of all other users.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Requires a valid JWT (authenticated user). No ownership enforcement after authentication.
  mitigation_title: Add ownership check and reject non-string _id values in updateProductReviews
  remediation:
    effort: Low
    steps:
    - Before calling `db.reviewsCollection.update()`, fetch the review by `_id` and verify `review.author === user.data.email`;
      return HTTP 403 if the check fails.
    - Validate that `req.body.id` is a non-empty string (not an object) with `typeof req.body.id !== 'string'` guard, rejecting
      operator-injection attempts.
    - 'Remove `{ multi: true }` from the update call — a single review update should never affect multiple documents.'
    code_example: '// routes/updateProductReviews.ts — safe version

      if (typeof req.body.id !== ''string'') return res.status(400).json({ error: ''Invalid id'' })

      const review = await db.reviewsCollection.findOne({ _id: req.body.id })

      if (!review || review.author !== user?.data?.email) return res.status(403).json({ error: ''Forbidden'' })

      await db.reviewsCollection.update({ _id: req.body.id }, { $set: { message: req.body.message } })'
    reference: CWE-915
  evidence:
  - file: routes/updateProductReviews.ts
    line: 17
