  stride: Tampering
  cwe: CWE-611
  title: XXE via external entity resolution in XML upload parser (fileUpload.ts:83)
  affected_parameter: file (XML upload body)
  scenario: 'An attacker uploads a crafted XML file with a DTD that declares an external entity referencing a local file (e.g.
    `<!ENTITY xxe SYSTEM "file:///etc/passwd">`). libxmljs2 is invoked with `noent: true` at line 83, which causes entity
    substitution before the document is read. The resolved content is embedded into `xmlString` and then reflected back verbatim
    in the HTTP error response at line 87 (`''B2B customer complaints via file upload have been deprecated for security reasons:
    '' + utils.trunc(xmlString, 400)`). A completely unauthenticated attacker on the internet can exfiltrate up to 400 characters
    of any server-readable file per request.'
  evidence_summary: '`libxml.parseXml(data, { noblanks: true, noent: true, nocdata: true })` at line 83 enables external entity
    resolution; the parsed document is embedded in the error response at line 87.'
  impact_description: Unauthenticated read of any file accessible to the Node.js process, including `/etc/passwd`, application
    secrets, and private keys.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The endpoint returns a 410 status and the result is limited to 400 characters via `utils.trunc()`. A
    2-second VM timeout is applied to the sandbox execution but does not prevent entity resolution.
  mitigation_title: Disable external entity resolution in libxmljs2 XML parse options
  remediation:
    effort: Low
    steps:
    - 'Replace `{ noblanks: true, noent: true, nocdata: true }` with `{ noblanks: true, noent: false, nocdata: true }` in
      the `libxml.parseXml()` call at routes/fileUpload.ts:83.'
    - If entity substitution is required for legitimate use cases, restrict to an explicit allowlist of internal entities
      only and reject documents containing SYSTEM or PUBLIC entity declarations.
    - Remove the parsed XML content from the error message at line 87 — return only a generic error string to prevent exfiltration
      via error body.
    - Consider disabling XML upload support entirely if the `deprecatedInterfaceChallenge` is the only consumer.
    code_example: '// Before (vulnerable):

      const xmlDoc = vm.runInContext(''libxml.parseXml(data, { noblanks: true, noent: true, nocdata: true })'', sandbox, {
      timeout: 2000 })

      // After (fixed):

      const xmlDoc = vm.runInContext(''libxml.parseXml(data, { noblanks: true, noent: false, nocdata: true })'', sandbox,
      { timeout: 2000 })'
    reference: CWE-611
  evidence:
