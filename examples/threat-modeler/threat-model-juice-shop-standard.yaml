    steps:
    - 'Create `models/auditLog.ts` with fields: `id`, `actorId` (UserId FK), `action` (enum: role_change, password_reset,
      card_add, address_modify, wallet_credit, privacy_request), `targetId`, `targetModel`, `before`, `after` (JSON), `ipAddress`,
      `createdAt`.'
    - Add Sequelize `afterCreate` / `afterUpdate` hooks in `models/user.ts`, `models/card.ts`, `models/wallet.ts`, and `models/address.ts`
      that write immutable AuditLog rows.
    - Mark the `AuditLog` table with no `deletedAt` (disable paranoid mode) and revoke DELETE privileges on the table at the
      SQLite level (via an `init` pragma).
    - Ship audit log rows to an append-only external sink (e.g., a write-only S3 bucket or a dedicated log service) so that
