- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-1357
  title: Org-Admin Token Exposed in pull_request_target Context (pr-compliance.yml:438)
  affected_parameter: ORG_ADMIN_TOKEN
  scenario: 'The `pr-compliance.yml` workflow is triggered by `pull_request_target` — a privileged trigger that runs in the
    base repository context with access to secrets. The ''Block Spammer'' step at line 433 injects `ORG_ADMIN_TOKEN` into
    `process.env` within a `github-script` step. A fork PR attacker (ACT-X-2) cannot currently execute arbitrary code because
    no `actions/checkout` step checks out fork content. However, the combination is architecturally unsafe: if any future
    maintainer adds a `run:` step or an `actions/checkout` of the PR head without `persist-credentials: false`, the fork''s
    code runs in a context that holds an org-admin-level token. Additionally, if the `actions/github-script` action (even
    at its pinned SHA) had a deserialization or injection flaw, `ORG_ADMIN_TOKEN` would be exfiltrated. The token grants `PUT
    /orgs/juice-shop/blocks/{username}` — org-wide user blocking — which can be abused to block all maintainers from the org,
    halting all contributor interactions.'
  evidence_summary: '`ORG_ADMIN_TOKEN` is loaded from `process.env` inside a `pull_request_target`-triggered workflow at line
    443, making it accessible in the most permissive CI context for fork PRs.'
  impact_description: An attacker who achieves code execution in this workflow context obtains an org-admin token capable
    of blocking any GitHub user from the juice-shop organisation, disrupting all maintainer and contributor operations.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: No `actions/checkout` of fork code prevents current direct exploitation. The `actions/github-script`
    action is SHA-pinned. Org membership check partially gates execution paths.
  mitigation_title: Move ORG_ADMIN_TOKEN usage out of pull_request_target into a separately-triggered workflow with no fork
    access
  remediation:
    effort: Medium
    steps:
    - 'Split the ''Block Spammer'' step into a separate workflow triggered by `workflow_run` (with `types: [completed]`) that
      reads the spam-rating output via artifacts — this trigger runs in the base repo context but never exposes secrets to
      fork code.'
    - 'In the interim, add `if: github.event.pull_request.head.repo.full_name == github.repository` to the ''Block Spammer''
      step so it never runs for fork PRs.'
    - 'Apply `permissions: pull-requests: write, issues: write` (already present) but explicitly set `secrets: inherit: false`
      to prevent automatic secret propagation to inner steps — ensure no step other than the block step has access to `ORG_ADMIN_TOKEN`.'
    - Document the secret's intended scope in a comment adjacent to the step to prevent future maintainers from inadvertently
      expanding its usage context.
    code_example: "# Safe pattern: use workflow_run to process fork PR events\non:\n  workflow_run:\n    workflows: [\"PR\
      \ Compliance Check\"]\n    types: [completed]\n\njobs:\n  block-spammer:\n    if: github.event.workflow_run.conclusion\
      \ == 'success'\n    runs-on: ubuntu-latest\n    steps:\n      - name: Block user if spam\n        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd\n\
      \        env:\n          ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}\n        with:\n          script: |\n     \
      \       // safe: workflow_run never checks out fork code"
    reference: CWE-1357
  evidence:
