    each with a `messages` array containing hundreds of entries of fabricated conversation history. Because `routes/chat.ts:191`
    passes `req.body.messages` without any size or token-count check to `streamText()`, each request triggers a large LLM
    API call. With `stopWhen: stepCountIs(10)` allowing up to 10 agentic steps per request, a single attacker can generate
