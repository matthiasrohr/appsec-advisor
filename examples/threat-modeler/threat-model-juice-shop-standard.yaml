  cwe: CWE-862
  title: Missing workflow-level permissions block grants GITHUB_TOKEN — ci.yml:1
  affected_parameter: permissions
  scenario: 'The `ci.yml` workflow (391 lines) and `image_actions.yml` workflow have no top-level `permissions:` block, so
    GitHub''s default token permissions apply. On repositories where the organization-level setting is not hardened to read-only,
    the `GITHUB_TOKEN` injected into every job has write access to `contents`, `packages`, `pull-requests`, `deployments`,
    and other scopes. Any step in these workflows — including a compromised unpinned action — can use the implicit `GITHUB_TOKEN`
    to push commits, approve pull requests, trigger deployments, or publish packages. The `coverage-report` job (ci.yml:168)
    already demonstrates that `GITHUB_TOKEN` is actively used (`coverallsapp/github-action@v2` line 191), yet no minimum-privilege
    scope is declared. The `codeql-analysis.yml` workflow, by contrast, explicitly declares `permissions: { actions: read,
    contents: read, security-events: write }` — demonstrating the correct pattern that `ci.yml` and `image_actions.yml` do
    not follow.'
  evidence_summary: '`ci.yml:1` begins with `name:` with no `permissions:` key at workflow scope; any compromised action step
    in the 9 jobs (ci.yml:24–391) inherits an unrestricted `GITHUB_TOKEN`, while `codeql-analysis.yml:12–15` shows the correctly
    scoped pattern already in use in the same repository.'
  impact_description: A step executing with an overprivileged `GITHUB_TOKEN` can write to the repository, approve or merge
    PRs, and trigger downstream deployment pipelines — enabling a CI-level privilege escalation to full repository write access.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: '`codeql-analysis.yml` correctly declares minimal permissions at the job level. GitHub branch protection
    rules may limit direct pushes, but the token''s write scope still permits API calls.'
  mitigation_title: Declare a minimal permissions block at the workflow level in ci.yml and image_actions.yml
  remediation:
    effort: Low
    steps:
    - 'Add `permissions: read-all` at the top of `ci.yml` immediately after the `on:` block to set the default to read-only
      for all jobs. Then override only in the specific jobs that require write access (e.g., `coverage-report` needs `contents:
      read`, `docker` job needs no token writes).'
    - 'Add `permissions: read-all` to `image_actions.yml`. The `create-pull-request` step requires `contents: write` and `pull-requests:
      write` — declare these only at the job level for that step.'
    - Set the repository's default token permissions to 'Read repository contents and packages' in Settings → Actions → General
      → Workflow permissions to enforce least-privilege org-wide.
    - 'Reference: GitHub Actions security hardening — https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#restricting-permissions-for-tokens'
    code_example: "```yaml\n# ci.yml — add after the 'on:' block\npermissions:\n  contents: read\n  actions: read\n\njobs:\n\
      \  coverage-report:\n    # override only where write is needed\n    permissions:\n      contents: read\n      checks:\
      \ write\n```"
    reference: CWE-862
