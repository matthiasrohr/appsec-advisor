- local_id: auth-security-001
  threat_category_id: TH-03
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA Private Key (lib/insecurity.ts:23)
  affected_parameter: null
  scenario: The 1024-bit RSA private key used to sign all JWT tokens is hardcoded as a string literal in lib/insecurity.ts
    line 23 and committed to a public GitHub repository. Any attacker — authenticated or not — can copy this key directly
    from the source code or from git history. With the private key, they call security.authorize() or craft a JWT payload
    signed with the known key to impersonate any user, including administrators. Because express-jwt verifies against the
    matching public key (lib/insecurity.ts line 22, read from encryptionkeys/jwt.pub), forged tokens pass signature verification.
    The attacker gains full session access as any identity they choose without knowing any credentials.
  evidence_summary: security.authorize() at line 56 signs with a hardcoded privateKey string literal (line 23) that is checked
    into the public repository, making the signing secret universally known.
  impact_description: 'Complete authentication bypass: attacker forges JWT tokens for admin or any user, gaining full application
    access without valid credentials.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 algorithm is correctly configured; public key is read from file. These controls are nullified by
    the private key being hardcoded.
  mitigation_title: Remove hardcoded RSA private key and load from environment or secret manager
  remediation:
    effort: Medium
    steps:
    - 'Generate a new 2048-bit (or larger) RSA key pair outside the repository: `openssl genrsa -out jwt.key 2048 && openssl
      rsa -in jwt.key -pubout -out jwt.pub`'
    - Store the private key in an environment variable (JWT_PRIVATE_KEY) or a secrets manager (HashiCorp Vault, AWS Secrets
      Manager); never commit it to source control
    - 'Update lib/insecurity.ts: replace the hardcoded `privateKey` string with `const privateKey = process.env.JWT_PRIVATE_KEY
      ?? fs.readFileSync(process.env.JWT_KEY_PATH ?? ''encryptionkeys/jwt.key'', ''utf8'')`'
    - Add encryptionkeys/jwt.key (and any *.key files) to .gitignore immediately
    - Rotate all existing sessions — invalidate all tokens signed with the compromised key by rotating the key pair and restarting
      the application
    code_example: "// lib/insecurity.ts — safe key loading\nconst privateKey = process.env.JWT_PRIVATE_KEY\n  ?? fs.readFileSync(process.env.JWT_KEY_PATH\
      \ ?? 'encryptionkeys/jwt.key', 'utf8')\nexport const publicKey = fs.readFileSync('encryptionkeys/jwt.pub', 'utf8')\n\
      export const authorize = (user = {}) =>\n  jwt.sign(user, privateKey, { expiresIn: '6h', algorithm: 'RS256' })"
    reference: CWE-321
