  title: Hardcoded RSA Private Key Enables Arbitrary JWT Signing — lib/insecurity.ts:21
  affected_parameter: JWT signing key
  scenario: 'The RSA private key for JWT signing is committed verbatim as a string literal at insecurity.ts:21. Any developer,
    contractor, or attacker with access to the repository (public GitHub) can extract this key. Using `jwt.sign({ data: {
    id: 1, role: ''admin'', email: ''admin@juice-sh.op'' } }, stolenKey, { algorithm: ''RS256'', expiresIn: ''6h'' })`, the
    attacker mints a valid JWT accepted by all `isAuthorized()` guards. This also enables forging deluxeToken values (insecurity.ts:150
    uses this same private key for HMAC).'
  evidence_summary: '`privateKey` is a 1,024-bit RSA PEM literal at insecurity.ts:21, used directly in `authorize()` at line
    54 and `deluxeToken()` at line 150.'
  impact_description: Attacker signs arbitrary JWTs as any role; full authentication infrastructure compromised.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — key is publicly visible in the open-source repository.
  mitigation_title: Remove hardcoded private key and load signing material from environment secret or secrets manager
  remediation:
    effort: Medium
    steps:
    - Generate a new 2048-bit RSA key pair; store the private key in an environment variable or secret manager (e.g., AWS
      Secrets Manager, HashiCorp Vault).
    - 'Load the key at startup: `const privateKey = process.env.JWT_PRIVATE_KEY ?? fs.readFileSync(''/run/secrets/jwt.key'',
      ''utf8'');`'
    - Rotate the existing key immediately — all currently issued JWTs using the leaked key must be invalidated by changing
      the public key used for verification.
    - Add the private key path/file to `.gitignore` and configure git-secrets or trufflehog in CI to prevent re-commit.
