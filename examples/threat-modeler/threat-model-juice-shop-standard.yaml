  title: YAML Bomb Resource Exhaustion (routes/fileUpload.ts:117)
  affected_parameter: file (YAML upload)
  scenario: '`handleYamlUpload` at `routes/fileUpload.ts:117` calls `yaml.load(data)` inside a vm sandbox with a 2000ms timeout.
    A YAML billion-laughs bomb (deeply nested anchor expansion) causes `js-yaml`''s internal string operations to allocate
    gigabytes of memory before the JavaScript engine raises `Invalid string length`. The catch block at line 122 handles this
    condition and marks the `yamlBombChallenge` as solved, then returns a 503. However, if a flood of concurrent YAML bomb
    requests is submitted (the endpoint has no rate limiting and no authentication), each request allocates maximum memory
    before the exception fires, potentially crashing or starving the Node.js process.'
  evidence_summary: '`yaml.load(data)` at line 117 uses `js-yaml`''s full-schema loader; the vm timeout guards against CPU
    exhaustion but not against memory exhaustion from anchor expansion before string length is checked.'
  impact_description: Node.js process OOM termination or severe memory pressure affecting all application users, achievable
    without authentication.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: vm.createContext sandbox with 2000ms timeout partially limits CPU DoS. The `Invalid string length` catch
    at line 122 prevents unhandled process crash on a single request. No rate limiting or request concurrency cap exists.
