trust_boundaries:
- id: tb-1
  name: Public Internet / Untrusted Browser
  from: external
  to: angular-spa
  protocol: HTTPS/HTTP
  enforcement: deployment-time perimeter controls out of scope for source-tree review
  weakness: Wide-open CORS allows cross-origin requests from any domain. No global Content-Security-Policy.
- id: tb-2
  name: Browser to Express Backend (REST API)
  from: angular-spa
  to: express-backend
  protocol: HTTP/HTTPS (port 3000)
  enforcement: JWT Bearer token required on authenticated endpoints via express-jwt@0.1.3 middleware. However, 21 routes lack
    auth middleware (missing_auth_suspect=true). Token validated against hardcoded public key.
  weakness: express-jwt@0.1.3 does not enforce algorithm whitelist — alg:none bypass possible. JWT signing key hardcoded in
    source (permanently compromised). 21 routes bypass auth entirely.
- id: tb-3
  name: Browser to Express Backend (WebSocket)
  from: angular-spa
  to: express-backend
  protocol: WS/WSS (Socket.IO)
  enforcement: None — Socket.IO connections accepted without authentication validation. socket-io.service.ts:21 connects to
    window.location.origin without token.
  weakness: No authentication on WebSocket upgrade. Any user in the browser can connect and receive challenge notifications.
- id: tb-4
  name: Express Backend to SQLite Data Layer
  from: express-backend
  to: data-layer
  protocol: Sequelize ORM / SQLite file I/O
  enforcement: In-process access only (SQLite is embedded). Sequelize ORM used but raw SQL queries bypass ORM protection in
    critical paths (login, search).
  weakness: Raw string interpolation in sequelize.query() at routes/login.ts:34. No parameterized query enforcement. Database
    file (data/juiceshop.sqlite) writable by application process.
- id: tb-5
  name: Express Backend to File System
  from: express-backend
  to: data-layer
  protocol: Node.js fs module
  enforcement: Static file serving via express.static + serveIndex. Path traversal controls depend on Express path matching
    — intentionally bypassable for challenge goals.
  weakness: Path traversal at /ftp/:file (servePublicFiles) allows directory traversal. /encryptionkeys/:file exposes private
    keys. /support/logs/:file exposes logs.
- id: tb-6
  name: Authenticated User to B2B API
  from: external
  to: b2b-api
  protocol: HTTP (POST /b2b/v2/orders)
  enforcement: security.isAuthorized() JWT middleware at server.ts:423 — requires valid JWT. However, JWT signing key is hardcoded
    and publicly available, so forging a valid token is trivial.
  weakness: JWT authentication is nominally enforced but effectively bypassable via hardcoded key. Endpoint executes user-supplied
    code via vm.runInContext + notevil (intentional RCE).
- id: tb-7
  name: CI/CD Pipeline to Package Registry / Docker Hub
  from: ci-cd-pipeline
  to: external
  protocol: HTTPS (npm registry, GitHub API, Docker Hub)
  enforcement: GitHub Actions with OIDC. No lockfile (package-lock.json gitignored) — npm resolves latest compatible version
    at build time. Third-party actions using tag refs not SHA-pinned.
  weakness: Non-reproducible builds (no lockfile). Tag-pinned actions vulnerable to tag overwrite. No dependabot or Renovate
    for automated updates. GITHUB_TOKEN inherits write-all default.
