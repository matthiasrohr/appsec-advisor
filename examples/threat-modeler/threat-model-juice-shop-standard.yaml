- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1357
  title: Lockfile Disabled by Config — .npmrc:1
  affected_parameter: package-lock
  scenario: '`.npmrc:1` sets `package-lock=false`, `package-lock.json` is gitignored (`.gitignore:10`) and absent from the
    tree. Every `npm install` across CI (`ci.yml:65,85,124,161,217,252`), the release packaging job (`release.yml:43`), and
    the Docker build (`Dockerfile:5`) resolves the full dependency graph fresh against the live npm registry with no committed
    integrity baseline. There is no `integrity:` hash to validate against and no diff signal when a transitive version changes.
    An attacker who gains a momentary version window on any transitive dependency — via typosquatting, a maintainer-account
    takeover that publishes a poisoned patch release, or registry cache poisoning — has their version installed on the next
    CI run and the next published Docker image with nothing in the repo to detect the substitution. Unlike a mutable-install
    (`npm install` vs `npm ci`) problem, this cannot be fixed by switching to `npm ci` later: without a lockfile `npm ci`
    has nothing to install from.'
  evidence_summary: '`.npmrc` line 1 contains `package-lock=false`, which suppresses lockfile generation for every install
    invocation in the repo.'
  impact_description: Dependency versions are non-deterministic and integrity-unverified across every developer and CI build,
    so a poisoned registry version installs silently into the published image.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: npm audit runs advisory-only in CI; CycloneDX SBOM is generated at build time (Dockerfile:20) but is
    descriptive, not an install-time integrity gate.
  mitigation_title: Remove package-lock=false from .npmrc, commit package-lock.json, and switch CI to npm ci
  remediation:
    effort: Medium
    steps:
    - Delete the `package-lock=false` line from `.npmrc` and run `npm install` once to generate `package-lock.json`.
    - Remove `package-lock.json` from `.gitignore:10` and commit the lockfile.
    - Replace every `npm install` in `.github/workflows/ci.yml` and `release.yml` with `npm ci` so installs are restricted
      to the committed lockfile.
    - Add `npm config set audit-level=high` and run `npm audit --omit=dev` as a blocking step so integrity drift surfaces
      in CI.
    code_example: '# .npmrc  (remove the disabling line)

      -package-lock=false


      # ci.yml — deterministic install

      - run: npm ci --ignore-scripts'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html
  evidence:
  - file: .npmrc
    line: 1
  evidence_check: verified
