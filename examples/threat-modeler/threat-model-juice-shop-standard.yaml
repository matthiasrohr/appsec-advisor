  title: OAuth deriving account password from email enables auth — oauth.component.ts:30
  affected_parameter: profile.email
  scenario: After the OAuth callback, the SPA derives a deterministic account password 'btoa(profile.email.split('').reverse().join(''))'
    (oauth.component.ts:30) and both registers (save) and logs in (oauth.component.ts:46) with it. The password is a pure
    function of the public email address, so anyone who knows a victim's email can reconstruct it (reverse the local+domain
    string, base64-encode) and authenticate to that account through the normal /rest/user/login endpoint — a complete parallel-authentication
    bypass that does not require the OAuth flow at all. Email addresses are not secrets, so this reduces account security
    to zero for every OAuth-provisioned user.
  evidence_summary: The OAuth component computes the account password by base64-encoding the reversed email and uses it for
    both registration and login.
  impact_description: Any attacker who knows a victim's email can log in as them, fully bypassing authentication for OAuth-provisioned
    accounts.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derived password is the sole credential and is computed from a public value.
  mitigation_title: Stop deriving passwords from email; bind OAuth identities to a server-issued session instead
  remediation:
    effort: Medium
    steps:
    - Remove the btoa(...email...) password derivation; never create a guessable shared secret from a public claim.
    - Have the backend validate the OAuth id_token server-side and issue its own session for the matched user, with no password
      set on OAuth-only accounts.
    - If a local password must exist, generate a cryptographically random one server-side and never expose or derive it client-side.
    code_example: '// server-side OAuth: verify id_token, then mint session

      const claims = await verifyIdToken(idToken)           // checks iss/aud/exp/nonce

      const user = await findOrCreateByEmail(claims.email)  // no client password

      return issueSession(user)'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
