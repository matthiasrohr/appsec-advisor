    - Resolve the URL's hostname to an IP address and reject RFC-1918 private ranges (10.x, 172.16-31.x, 192.168.x), loopback
      (127.x, ::1), and link-local (169.254.x) addresses using a library such as `ssrf-req-filter` or manual DNS check.
