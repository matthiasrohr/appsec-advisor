- local_id: frontend-spa-010
  threat_category_id: TH-02
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-601
  title: Unvalidated post-login redirect URL parameter enables — login.component.ts:100
  affected_parameter: redirectUrl
  scenario: On successful login, `LoginComponent.login()` reads `this.route.snapshot.queryParamMap.get('redirectUrl')` (line
    100) and passes it directly to `this.router.navigateByUrl(redirectUrl)` (line 144). Angular's `navigateByUrl` will silently
    accept any string beginning with `/`; an attacker who crafts `https://juice-shop.example/?#/login?redirectUrl=/administration`
    can force an authenticated user to land on `/administration` immediately after login, skipping any page-load consent or
    navigation cue. More critically, on some Angular configurations a value such as `//evil.example` is treated as a protocol-relative
    URL and redirects to an external phishing page after authentication, potentially leaking the authentication context or
    harvesting credentials via a lookalike page.
  evidence_summary: login.component.ts:100 reads `redirectUrl` from query params without allowlist validation; line 144 passes
    it directly to `router.navigateByUrl()` without sanitization.
  impact_description: An attacker can redirect authenticated users to an attacker-controlled external page immediately after
    login, enabling session-token phishing or credential harvesting.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Angular router may reject some absolute external URLs, but protocol-relative paths (`//evil.example`)
    and SPA-internal privilege escalation paths (e.g., `/administration`) are not blocked.
  mitigation_title: Validate the redirectUrl parameter against a relative-path allowlist before calling router.navigateByUrl
    in login.component.ts
  remediation:
    effort: Low
    steps:
    - Before consuming `redirectUrl`, validate that it starts with `/` and does not contain `//`, `http:`, or `https:` — accept
      only same-origin relative paths.
    - Maintain an explicit allowlist of permitted post-login destinations (e.g., `/search`, `/basket`, `/profile`) and default
      to `/search` for any value not in the allowlist.
    - Use `Router.parseUrl(redirectUrl)` and inspect the resulting `UrlTree`; reject any URL that resolves to a route requiring
      a higher privilege level than the authenticated user holds.
    code_example: '// Safe redirect validation

      const raw = this.route.snapshot.queryParamMap.get(''redirectUrl'') ?? ''/search''

      const safe = /^\/[a-zA-Z0-9\-\/]*$/.test(raw) ? raw : ''/search''

      await this.router.navigateByUrl(safe)'
    reference: CWE-601
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 100
  controls_absent_evidence: []
