  title: Unbounded In-Memory Session Store — lib/insecurity.ts:76
  affected_parameter: null
  scenario: '`authenticatedUsers.tokenMap` and `authenticatedUsers.idMap` at `lib/insecurity.ts:72-93` are plain JavaScript
    objects that grow on every successful login via `put()` at line 76. Neither map has an eviction policy — entries are never
    removed when a JWT expires (6 hours after issuance) or when a user logs out. A long-running server accumulates one entry
    per login forever. An attacker who can register accounts (or who uses anonymous sessions) and logs in repeatedly causes
    unbounded heap growth. Under load testing with 10 000 sessions, the process memory increases by the size of full user
    objects (including all profile data) multiplied by 10 000 with no ceiling.'
  evidence_summary: '`authenticatedUsers.put()` at `lib/insecurity.ts:76` adds entries to `tokenMap` and `idMap` with no corresponding
    eviction, TTL, or size cap.'
  impact_description: Server process eventually exhausts available heap memory and crashes, denying service to all authenticated
    users.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: JWT tokens expire after 6 hours, but the in-memory store entry is never removed on expiry.
  mitigation_title: Add TTL-based eviction to the in-memory authenticated-user store
  remediation:
    effort: Medium
    steps:
    - 'Replace the plain object `tokenMap` with a TTL-aware structure: use `node-cache` (`new NodeCache({ stdTTL: 6 * 3600
      })`) or a similar library that auto-evicts entries after the JWT lifetime.'
    - Alternatively, on each call to `authenticatedUsers.get()`, verify the JWT's `exp` claim against `Date.now()` and remove
      stale entries lazily.
    - For production deployments, replace the entire in-memory store with a Redis-backed session store (`connect-redis`) that
      inherits Redis's native key expiry.
    code_example: ''
    reference: CWE-400
  evidence:
