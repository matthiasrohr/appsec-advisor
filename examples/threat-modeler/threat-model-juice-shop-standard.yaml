  stride: Spoofing
  cwe: CWE-916
  title: Unsalted MD5 password hashing — lib/insecurity.ts:43
  affected_parameter: password
  scenario: 'All user passwords are hashed using MD5 with no salt at `lib/insecurity.ts:43` (`crypto.createHash(''md5'').update(data).digest(''hex'')`),
    applied in the User model setter at `models/user.ts:77`. MD5 is a broken cryptographic primitive for password storage:
    rainbow-table attacks against MD5 are pre-computed at scale (CrackStation, hashes.org). Because there is no per-user salt,
    two users with the same password produce the identical hash, enabling both cross-user correlation and bulk cracking. An
    attacker who exfiltrates the `Users` table (e.g., via the SQLi surfaces documented in known_vulns) can crack all hashes
    offline with commodity GPU resources in minutes, then log in as any user by submitting the recovered plaintext through
    `/rest/user/login`.'
  evidence_summary: '`security.hash()` at lib/insecurity.ts:43 calls `crypto.createHash(''md5'')` with no salt argument; the
    model setter at models/user.ts:77 invokes this for every password write.'
  impact_description: Full credential compromise for all users after any SQLite exfiltration; attacker can authenticate as
    any user including admins.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — MD5 is applied unconditionally with no salt, no pepper, no iteration count.
  mitigation_title: Replace MD5 with bcrypt or argon2 in security.hash() and re-hash all stored passwords
  remediation:
    effort: Medium
    steps:
    - 'Replace `crypto.createHash(''md5'')` in `lib/insecurity.ts:43` with `bcrypt.hash(data, 12)` (bcrypt) or `argon2.hash(data,
      { memoryCost: 65536, timeCost: 3 })` (argon2id).'
    - Update the User model `set` hook at `models/user.ts:76-78` to call the new async hash function; add a corresponding
      `verify` helper used in login routes.
    - Add a one-time migration that detects MD5-format hashes (32-char hex) at login time, verifies the plaintext against
      the MD5, and re-hashes with bcrypt on successful login (rolling upgrade).
    - Remove `security.hash` usage from all callers and replace with the new async `hashPassword` / `verifyPassword` pair
      to prevent re-introduction.
    code_example: '// lib/insecurity.ts — replacement

      import bcrypt from ''bcrypt''

      export const hashPassword = async (plain: string): Promise<string> => bcrypt.hash(plain, 12)

      export const verifyPassword = async (plain: string, hash: string): Promise<boolean> => bcrypt.compare(plain, hash)'
