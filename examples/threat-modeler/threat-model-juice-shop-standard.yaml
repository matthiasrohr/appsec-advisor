  cwe: CWE-307
  title: Missing Rate Limit on Login Endpoint — server.ts:594
  affected_parameter: null
  scenario: '`app.post(''/rest/user/login'', login())` at `server.ts:594` has no rate limiting middleware. The reset-password
    and 2FA routes do have rate limits; the login endpoint does not. An attacker runs credential stuffing from a leaked credential
    list or brute-forces the admin password (`admin123` is the default, exposed at `routes/login.ts:60`). Each attempt triggers
    a `models.sequelize.query()` call with an MD5 hash computation — lightweight enough that the server sustains high request
    throughput, enabling thousands of attempts per second.'
  evidence_summary: '`app.post(''/rest/user/login'', login())` is registered without any `rateLimit()` middleware, confirmed
    by grepping `server.ts` for `rateLimit` near the login route registration.'
  impact_description: Attacker exhausts the credential space for common or leaked passwords, achieving account takeover without
    triggering any limit.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None on the login endpoint itself.
  mitigation_title: Add rate limiting middleware to POST /rest/user/login
  remediation:
    effort: Low
    steps:
    - 'Add `rateLimit({ windowMs: 15 * 60 * 1000, max: 20 })` before `login()` in the route registration at `server.ts:594`,
      using `req.ip` (not a client header) as the key.'
    - Consider also implementing per-account lockout after N failed attempts (store attempt count in the session or a fast
      key-value store) to protect against distributed credential stuffing where each attacker IP stays under the IP-based
      threshold.
    - Alert or log on 5+ consecutive failures for the same email to aid incident detection.
    code_example: "// server.ts:594\napp.post('/rest/user/login',\n  rateLimit({ windowMs: 15 * 60 * 1000, max: 20 }),\n \
      \ login()\n)"
    reference: CWE-307
