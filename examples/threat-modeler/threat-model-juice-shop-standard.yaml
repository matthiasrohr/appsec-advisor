- local_id: ci-cd-pipeline-004
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-345
  title: Unpinned Docker Base Image Allows Silent Build-Time Substitution — Dockerfile:1
  affected_parameter: FROM node:24
  scenario: The Dockerfile uses `FROM node:24` (line 1) — a floating tag resolved at build time against Docker Hub. The `node:24`
    tag is a mutable pointer; Docker Hub's tag can be updated at any time by the node project, or could be replaced via a
    supply-chain compromise of the Docker Hub account. During a `docker build` step in the CI pipeline (ci.yml docker job,
    lines 337–349), the runner pulls whatever image Docker Hub resolves `node:24` to at that moment, without verifying a content-addressable
    SHA digest. A build-time dependency substitution attack — or a Docker Hub account compromise — means the resulting `bkimminich/juice-shop`
    image published to Docker Hub and used as a teaching tool by thousands of security professionals could contain a backdoor
    introduced at the base image layer, not visible in the source diff.
  evidence_summary: Dockerfile line 1 uses `FROM node:24` without a `@sha256:` digest, so the base image layer pulled at build
    time is not pinned to a known-good version.
  impact_description: A compromised or substituted `node:24` image layer contaminates every downstream Docker image published
    to Docker Hub and ghcr.io, affecting users who pull `bkimminich/juice-shop:latest`.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The runtime stage uses `FROM gcr.io/distroless/nodejs24-debian13` (Dockerfile line 22) which is pulled
    from Google's distroless registry — a more controlled source — but it is also tag-pinned rather than digest-pinned.
  mitigation_title: Pin Docker base images to immutable `@sha256:` digests in Dockerfile
  remediation:
    effort: Low
    steps:
    - Replace `FROM node:24` with `FROM node:24@sha256:<current-digest>` and `FROM gcr.io/distroless/nodejs24-debian13` with
      `FROM gcr.io/distroless/nodejs24-debian13@sha256:<current-digest>`. Fetch current digests with `docker inspect --format='{{index
      .RepoDigests 0}}' node:24`.
    - 'Add a Dependabot configuration entry for Docker base images (`ecosystem: docker`) so digest updates are proposed automatically
      as PRs.'
    code_example: '# Dockerfile — pinned digest example

      FROM node:24@sha256:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890ab AS installer'
    reference: CWE-345
  evidence:
  - file: Dockerfile
    line: 1
