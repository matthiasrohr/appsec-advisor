  title: Unhandled Sandbox Error Propagated to HTTP Response — routes/b2bOrder.ts:31
  scenario: When safeEval throws an error that is not a timeout (e.g. a syntax error, a type error from a prototype-pollution
    attempt, or a partial sandbox escape), the catch block at line 31 calls next(err), delegating to Express's default error
    handler. The default handler serialises the Error object — including its message and, in development mode, the full stack
    trace — into the HTTP 500 response body. An attacker can deliberately trigger controlled errors to enumerate internal
    library paths, Node.js version, or sandbox internals.
  evidence_summary: routes/b2bOrder.ts:31 calls next(err) with the raw caught Error; no sanitisation of err.message or err.stack
    is applied before delegation to the global error handler.
  impact_description: Internal file paths, Node.js version, notevil/vm module paths, and stack frames are exposed in HTTP
    error responses, aiding further exploitation.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: utils.getErrorMessage() is used to extract a message string for the timeout branch (line 26), but the
    non-timeout branch passes the raw error object.
  mitigation_title: Sanitise sandbox errors before forwarding to the Express error handler
  remediation:
    effort: Low
    steps:
    - Replace next(err) at line 31 with next(new Error('Order processing failed')) to strip internal details from the client
      response.
    - Log the original err internally with a structured logger (request ID, user ID) so it remains available for debugging
      without exposure.
    - Ensure the global Express error handler returns a generic error body in production (NODE_ENV=production suppresses stack
