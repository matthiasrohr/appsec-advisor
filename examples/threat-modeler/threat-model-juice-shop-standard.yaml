  scenario: '`login.component.ts:101`, `oauth.component.ts:51`, and `two-factor-auth-enter.component.ts:53` all write the
    JWT to `localStorage` as `localStorage.setItem(''token'', ...)`. `request.interceptor.ts:13-16` reads it and attaches
    it as the `Authorization: Bearer` header on every outbound API request. `localStorage` is accessible to any JavaScript
    running in the same origin — a single stored XSS payload (multiple present in this component) can call `localStorage.getItem(''token'')`
    and exfiltrate the token to an attacker-controlled endpoint. Additionally, `localStorage` persists across browser sessions
    without expiry, extending the attacker''s window beyond the token''s nominal lifetime.'
  evidence_summary: '`localStorage.setItem(''token'', authentication.token)` appears in three distinct authentication flows;
    `request.interceptor.ts:13` reads and attaches it on every request.'
  impact_description: Any successful XSS in this application exfiltrates the victim's authentication JWT, enabling persistent
    session hijacking for the token's full lifespan.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Token is also set as a cookie (`cookieService.put('token', ...)`) in some flows, but the cookie flags
    (HttpOnly, Secure, SameSite) are not confirmed in the SPA code.
  mitigation_title: Migrate JWT storage from localStorage to HttpOnly Secure SameSite=Strict cookies via a Backend-for-Frontend
  remediation:
    effort: High
    steps:
    - 'Introduce a Backend-for-Frontend endpoint that performs the token exchange and sets the JWT in a `Set-Cookie: token=...;
      HttpOnly; Secure; SameSite=Strict` response header.'
    - Remove all `localStorage.setItem('token', ...)` calls from the Angular components.
    - Update `request.interceptor.ts` to remove the `Authorization` header injection — the browser will automatically send
      the HttpOnly cookie.
    - Verify the cookie expiry matches the token expiry (currently 8 hours per `login.component.ts:103`).
    code_example: null
    reference: CWE-922
