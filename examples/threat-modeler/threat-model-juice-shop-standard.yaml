  stride: Information Disclosure
  cwe: CWE-22
  title: Path Traversal — routes/dataErasure.ts:104
  affected_parameter: layout
  scenario: An authenticated attacker sends POST `/privacy/erasure` with the body field `layout=../../../etc/passwd`. At `routes/dataErasure.ts:104`,
    `path.resolve(req.body.layout).toLowerCase()` is called to derive the absolute path. The blocklist check at line 105 (`isForbiddenFile`)
    only rejects paths containing `ftp`, `ctf.key`, or `encryptionkeys` — `/etc/passwd` passes the check. The Pug renderer
    reads and returns the first 100 bytes of the file via `res.send(sendlfrResponse.slice(0, 100) + '......')`.
  evidence_summary: '`routes/dataErasure.ts:104` uses `path.resolve(req.body.layout)` and a denylist (`ftp`, `ctf.key`, `encryptionkeys`)
    rather than a strict allowlist of permitted template paths.'
  impact_description: Authenticated attacker reads the first 100 bytes of any file accessible to the Node.js process on the
    host filesystem.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: A denylist of three specific path substrings (`ftp`, `ctf.key`, `encryptionkeys`) is checked; all other
    paths are allowed.
  mitigation_title: Replace denylist path check in routes/dataErasure.ts with an allowlist of permitted view templates
  remediation:
    effort: Low
    steps:
    - 'Replace the `isForbiddenFile` denylist at `routes/dataErasure.ts:105` with an explicit allowlist: `const ALLOWED_LAYOUTS
      = new Set([''dataErasureResult'']); if (!ALLOWED_LAYOUTS.has(req.body.layout)) return next(new Error(''Invalid layout''))`.'
    - Do not pass user-supplied strings to `path.resolve()` or `res.render()` — map user-supplied identifiers to hardcoded
      template names in a lookup table.
    - If arbitrary template paths are genuinely required, restrict to a safe base directory and verify the resolved path starts
      with that directory before rendering.
    code_example: "// routes/dataErasure.ts — allowlist replacement\nconst ALLOWED_LAYOUTS = new Set(['dataErasureResult'])\n\
      if (req.body.layout && !ALLOWED_LAYOUTS.has(req.body.layout)) {\n  return next(new Error('File access not allowed'))\n\
      }\nres.render(req.body.layout ?? 'dataErasureResult', { ...req.body, ...themeVars })"
    reference: CWE-22
