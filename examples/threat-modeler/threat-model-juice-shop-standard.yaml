  title: Event Loop Blocking — routes/showProductReviews.ts:17
  affected_parameter: id
  scenario: A global `sleep()` function is injected at `routes/showProductReviews.ts:17-25` — a synchronous busy-wait loop
    capped at 2000ms. The `$where` query at line 36 evaluates attacker-controlled JavaScript in the MarsDB engine. An unauthenticated
    attacker sends concurrent requests to `GET /rest/products/<payload>/reviews` with a JavaScript payload that calls `sleep(2000)`.
    Each request blocks the Node.js event loop for 2 seconds; with a concurrency of 10 parallel requests, the event loop is
    saturated and the entire application becomes unresponsive to all other users for the duration.
  evidence_summary: '`global.sleep` is defined as a synchronous `while` loop at `routes/showProductReviews.ts:17-25`; the
    `$where` predicate at line 36 allows calling it via injected JavaScript in MarsDB queries.'
  impact_description: Unauthenticated attacker can block Node.js event loop for up to 2 seconds per request via injected sleep;
    concurrent requests achieve sustained application-wide denial of service.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Sleep duration capped at 2000ms; input truncated to 40 chars when challenge is disabled. These caps do
    not prevent DoS via concurrent requests.
  mitigation_title: Remove global sleep injection and replace $where with typed field filter in showProductReviews
  remediation:
    effort: Low
    steps:
    - Delete the `global.sleep` assignment at `routes/showProductReviews.ts:17-25` entirely — this is a deliberate challenge
      artifact that constitutes a real DoS primitive.
    - 'Replace the `$where` JavaScript predicate with a typed equality filter `{ product: Number(id) }` (see data-layer-003
      for the full fix pattern).'
    - If the `noSqlCommandChallenge` requires the sleep behavior for scoring, gate it behind a server-side challenge registry
      check that prevents execution when the challenge is already solved.
