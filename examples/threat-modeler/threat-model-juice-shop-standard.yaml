- local_id: realtime-channel-003
  threat_category_id: TH-07
  additional_categories:
  - TH-04
  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client-Controlled Challenge Solver — registerWebsocketEvents.ts:41
  affected_parameter: verifyLocalXssChallenge, verifySvgInjec…
  scenario: 'Three WebSocket event handlers at lines 41-52 accept client-supplied data and directly invoke `challengeUtils.solveIf()`,
    which persists `solved=true` to the database (`challengeUtils.ts:29-43`). Because the connection has no authentication
    check, any unauthenticated client can: (1) send `<iframe src="javascript:alert(\`xss\`)">` to `verifyLocalXssChallenge`
    to mark the XSS challenge as solved; (2) send a crafted path matching the SVG injection regex to `verifySvgInjectionChallenge`;
    (3) send `[1, 2]` to `verifyCloseNotificationsChallenge`. Each triggers a DB update, a server-side log entry, and a global
    broadcast announcing the challenge as solved — without the attacker ever having triggered the exploit in a browser. The
    check logic at lines 42-43 and 47-48 is client-side-controlled because the input validation is solely based on the client''s
    own payload.'
  evidence_summary: challengeUtils.solveIf() at registerWebsocketEvents.ts:42,47,51 is called with a lambda that validates
    only the client-supplied data parameter — no server-side verification of actual exploit execution, no authentication gate.
  impact_description: Any unauthenticated client can mark arbitrary challenges as solved in the persistent database, corrupting
    the challenge scoreboard and gaining false credit.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None
  mitigation_title: Require authenticated identity and server-side evidence before marking WebSocket-triggered challenges
    as solved
  remediation:
    effort: High
    steps:
    - Add JWT auth middleware so that only authenticated users' WebSocket events are processed (realtime-channel-001 is a
      prerequisite).
    - Move challenge verification to server-authoritative sources (e.g. HTTP request headers, session log, or a server-side
      XSS sink) rather than accepting client-reported payloads as proof of exploit.
    - At minimum, associate the solve event with `socket.data.user.id` so the solve is scoped to the authenticated user, not
      anonymous.
    - Audit all `socket.on` event handlers for any that call `challengeUtils.solveIf` or `challengeUtils.solve` and apply
      the same auth requirement.
    code_example: "// registerWebsocketEvents.ts - auth-gated event handler\nsocket.on('verifyLocalXssChallenge', (data: any)\
      \ => {\n  if (!socket.data?.user) return // reject unauthenticated\n  challengeUtils.solveIf(challenges.localXssChallenge,\
      \ () => {\n    return utils.contains(data, '<iframe src=\"javascript:alert(`xss`)\">')\n  })\n})"
    reference: CWE-602
  evidence:
