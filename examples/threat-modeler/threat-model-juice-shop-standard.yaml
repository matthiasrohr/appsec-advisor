  - data/
  - routes/showProductReviews.ts
  - routes/trackOrder.ts
  - routes/updateProductReviews.ts
  - routes/search.ts
  deployment_zones:
  - data
  handles_sensitive_data: true
  technology: SQLite3, Sequelize 6, MarsDB
  notes: MD5-hashed passwords. No encryption at rest. Exposed via raw SQL injection in search and login routes.
  threat_ids:
  - T-009
  - T-032
  - T-033
  - T-034
  - T-048
  - T-049
  - T-059
