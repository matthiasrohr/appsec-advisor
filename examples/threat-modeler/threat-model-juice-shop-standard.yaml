  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:23
  affected_parameter: null
  scenario: The Socket.IO server at `registerWebsocketEvents.ts:20` is initialized with a CORS origin allowlist of `http://localhost:4200`,
    which controls the HTTP upgrade negotiation only. The `io.on('connection', ...)` handler at line 23 accepts every incoming
    WebSocket connection without verifying a JWT, session cookie, or any credential. An attacker from the internet opens a
    raw `ws://` or `wss://` connection directly to the Socket.IO endpoint — bypassing the CORS preflight entirely because
    raw WebSocket clients do not perform CORS checks — and gains a fully authenticated-equivalent socket. From there they
    can send any event the server handles (`verifyLocalXssChallenge`, `verifySvgInjectionChallenge`, `verifyCloseNotificationsChallenge`,
    `notification received`) while impersonating a legitimate user session. No handshake middleware (`io.use(...)`) is present
    to reject unauthenticated connections.
  evidence_summary: '`io.on(''connection'', (socket: any) => { ... })` at line 23 runs no credential check before calling
    challenge-verification handlers; `io.use()` middleware for auth is absent.'
  impact_description: Any internet client can interact with all WebSocket event handlers as if authenticated, enabling challenge-solve
    manipulation, notification deletion, and information harvest.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin set to `http://localhost:4200` on HTTP upgrade; does not restrict raw WebSocket clients.
  mitigation_title: Add Socket.IO authentication middleware to reject unauthenticated connections
  remediation:
    effort: Medium
    steps:
    - Add an `io.use()` middleware that extracts and verifies the JWT from `socket.handshake.auth.token` or `socket.handshake.headers.authorization`
      using the same `security.verify()` function used by HTTP routes.
    - On verification failure, call `next(new Error('Unauthorized'))` to reject the connection before any event handler runs.
    - Attach the verified `userId` to `socket.data.userId` for downstream authorization checks in individual event handlers.
    - Update the frontend to pass the JWT as `socket.handshake.auth.token` when constructing the Socket.IO client.
    code_example: "```typescript\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  if (!token)\
      \ return next(new Error('Unauthorized'))\n  try {\n    const decoded = security.verify(token)\n    socket.data.userId\
      \ = decoded.id\n    next()\n  } catch {\n    next(new Error('Unauthorized'))\n  }\n})\n```"
    reference: CWE-306
