  title: Root-Privilege Postinstall Execution in Docker Build — Dockerfile:5
  affected_parameter: null
  scenario: '`Dockerfile:5` runs `npm install --omit=dev --unsafe-perm` inside the `node:24` builder stage. The `--unsafe-perm`
    flag lifts the uid/gid downgrade that npm normally applies when running as root, so package lifecycle scripts (`preinstall`,
    `install`, `postinstall`) execute with full root permissions inside the build container. Combined with the disabled lockfile
    (`.npmrc:1`), any transitive dependency that ships a malicious postinstall script can read secrets from the build environment
    (build args, mounted volumes), write to arbitrary filesystem paths, or exfiltrate data to external endpoints during the
    Docker build. The Dockerfile also uses `FROM node:24` without a digest pin (`FROM node:24@sha256:...`), so DockerHub tag
    updates silently change the base image between builds.'
  evidence_summary: '`Dockerfile:5` passes `--unsafe-perm` to `npm install` in a root-user build stage, granting postinstall
    scripts unrestricted filesystem and network access.'
  impact_description: A malicious npm package with a postinstall script can exfiltrate `DOCKERHUB_TOKEN`, `HEROKU_API_KEY`,
    or other secrets passed as build-time arguments, or backdoor the produced container image.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The runtime stage uses `gcr.io/distroless/nodejs24-debian13` and runs as UID 65532 — this protects the
    runtime image but not the build stage where secrets are present.
  mitigation_title: Remove --unsafe-perm and pin the Dockerfile base image to a digest
  remediation:
    effort: Low
    steps:
    - Remove `--unsafe-perm` from the `npm install` command in `Dockerfile:5`; if postinstall scripts fail without it, investigate
      which dependency requires root and assess whether that dependency is necessary.
    - 'Pin the builder base image to a specific digest: replace `FROM node:24` with `FROM node:24@sha256:<current-digest>`
      and set up Dependabot or Renovate to track digest updates.'
    - Add `npm dedupe` after `npm install` and verify the build still passes — this is already present at line 6, so the main
      change is removing `--unsafe-perm`.
    - Consider using `npm install --ignore-scripts --omit=dev` if the build does not require lifecycle scripts, then run only
      the specific build scripts explicitly.
    code_example: '# Dockerfile — before

      RUN npm install --omit=dev --unsafe-perm


      # After

      RUN npm install --omit=dev --ignore-scripts

      RUN npm run build  # explicit build step instead of relying on postinstall'
    reference: CWE-250
  evidence:
  - file: Dockerfile
    line: 5
  evidence_check: verified
