    to the new socket (lines 30-32). An attacker with no account can connect with a script (e.g. `wscat` or `socket.io-client`)
    and receive the complete list of solved challenges, their flag values, and associated notification payloads for all users
    currently in the application''s in-memory notification store. The CORS `origin: ''http://localhost:4200''` restriction
    applies only to browser cross-origin preflight and does not affect direct non-browser WebSocket clients.'
  evidence_summary: Line 30 unconditionally iterates `notifications` and emits each entry to every newly-connected socket
    with no session or token check at the connection handler.
  impact_description: Challenge flag data and completion status for all active sessions leaks to any unauthenticated observer
    connected to the WebSocket endpoint.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin restricted to http://localhost:4200 — ineffective against non-browser clients.
  mitigation_title: Require JWT authentication on Socket.IO connection and scope notification delivery to the authenticated
    user
  remediation:
    effort: Medium
    steps:
    - 'Add a Socket.IO middleware that extracts and verifies the JWT from the `auth` handshake parameter: `io.use((socket,
      next) => { const token = socket.handshake.auth?.token; jwt.verify(token, SECRET, (err, decoded) => { if (err) return
      next(new Error(''Unauthorized'')); socket.data.userId = decoded.id; next(); }); })`.'
    - 'In the `connection` handler, replace the broadcast-all loop with a per-user filtered query: only emit `challenge solved`
      notifications whose `userId` matches `socket.data.userId`.'
    - 'Update `frontend/src/app/Services/socket-io.service.ts` to pass the current session JWT in the `auth` option: `io(origin,
      { auth: { token: localStorage.getItem(''token'') } })`.'
    - Ensure the Socket.IO middleware runs before any event listener so unauthenticated upgrade attempts are rejected before
      the `connection` event fires.
    code_example: "```typescript\n// In registerWebsocketEvents.ts\nio.use((socket: any, next: any) => {\n  const token =\
      \ socket.handshake.auth?.token\n  if (!token) return next(new Error('Unauthorized'))\n  jwt.verify(token, jwtSecret,\
      \ (err: any, decoded: any) => {\n    if (err) return next(new Error('Unauthorized'))\n    socket.data.userId = decoded.id\n\
      \    next()\n  })\n})\n```"
