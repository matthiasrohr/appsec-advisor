  - T-046
  - T-047
  - T-053
  - T-054
- id: data-persistence
  name: SQLite Data Layer
  description: 'SQLite database managed through Sequelize ORM. Stores all application data: users, passwords (bcrypt), payment
    cards (plaintext — intentional challenge), challenges, feedback, and orders.'
  paths:
  - models/**
  - data/datacreator.ts
  - data/static/**
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - prod-write-db
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-029
  - T-036
- id: b2b-api
  name: B2B API / Order Sandbox
  description: NextGen B2B API v2 at /b2b/v2 with JWT bearer authentication. Processes XML-encoded order data and uses a sandboxed
    evaluator (notevil) for order line expressions. JWT-protected but shares the same signing secret as the main API.
  paths:
  - routes/b2bOrder.ts
  - routes/order.ts
  tier: application
  complexity: moderate
  framework: express
  deployment_zones:
  - dmz
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-016
  - T-027
- id: file-upload-service
  name: File Upload Service
  description: Multer-based multipart file upload handler at /file-upload. Accepts user-supplied files, performs MIME type
    validation, and stores uploads in /ftp/ directory which is also served as a public static directory.
  paths:
  - routes/fileUpload.ts
  - routes/fileServer.ts
  - ftp/**
  tier: application
  complexity: simple
  framework: multer
  deployment_zones:
  - dmz
  handles_sensitive_data: false
  threat_ids:
  - T-012
  - T-025
  - T-030
  - T-037
  - T-043
- id: socketio-server
  name: Socket.IO Real-Time Server
  description: Socket.IO WebSocket server integrated with the Express process. Broadcasts challenge completion events, score
    updates, and notifications. No authentication required on WebSocket upgrade.
  paths:
  - lib/startup/registerWebsocketEvents.ts
  - frontend/src/app/Services/socket-io.service.ts
  tier: application
  complexity: simple
  framework: socket.io
  deployment_zones:
  - dmz
  handles_sensitive_data: false
  threat_ids:
  - T-039
  - T-044
  - T-049
- id: ci-cd-pipeline
  name: GitHub Actions CI/CD Pipeline
  description: 13 GitHub Actions workflows controlling build, test, release, and linting. Multiple workflows lack explicit
    permissions blocks; pr-compliance.yml uses pull_request_target with write permissions. Lock file disabled in .npmrc.
  paths:
  - .github/workflows/**
  - .github/**
  - .npmrc
  - package.json
  tier: application
  complexity: moderate
  framework: github-actions
  deployment_zones:
  - build-pipeline
  - ci-cd-runtime
  handles_sensitive_data: true
  threat_ids:
  - T-004
  - T-005
  - T-006
  - T-007
  - T-024
  - T-032
  - T-033
  - T-034
  - T-035
  - T-050
  - T-051
assets:
- id: A-001
  name: User Credentials Database
  classification: Confidential
  description: SQLite users table containing email addresses, bcrypt-hashed passwords, isAdmin flags, and associated profile
    data for all registered users.
  linked_threats:
  - T-008
  - T-010
  - T-011
  - T-013
  - T-015
  - T-026
  - T-041
  - T-052
- id: A-002
  name: JWT Signing Secret
  classification: Restricted
  description: Hardcoded HS256 JWT signing secret in lib/insecurity.ts. Compromise allows forgery of arbitrary user and admin
    tokens without credential validation.
  linked_threats:
  - T-001
  - T-008
  - T-009
  - T-010
  - T-011
  - T-013
  - T-014
  - T-015
  - T-017
  - T-019
  - T-026
  - T-041
  - T-052
  - T-054
- id: A-003
  name: Payment Card Data
  classification: Confidential
  description: Plaintext payment card numbers stored in the cards table (intentional OWASP A02:2021 challenge). Not real card
    data but demonstrates cleartext storage vulnerability.
  linked_threats:
  - T-002
  - T-008
  - T-011
  - T-013
  - T-022
  - T-026
  - T-036
  - T-045
  - T-047
  - T-048
  - T-052
- id: A-004
  name: Alchemy Web3 RPC API Key
  classification: Restricted
  description: Hardcoded Alchemy WebSocket RPC API key in routes/web3Wallet.ts and routes/nftMint.ts. Enables blockchain API
    access; key permanently compromised in public commit history.
  linked_threats:
  - T-002
  - T-008
  - T-009
  - T-011
  - T-013
  - T-014
  - T-022
  - T-026
  - T-036
  - T-045
  - T-047
  - T-048
  - T-052
- id: A-005
  name: Challenge Solution Database
  classification: Internal
  description: SQLite challenges table tracking solved/unsolved state for all OWASP challenges. Challenge completion events
    are broadcast via Socket.IO to all connected clients.
  linked_threats: []
- id: A-006
  name: User Feedback and Reviews
  classification: Internal
  description: User-submitted product reviews, feedback, and complaint data stored in SQLite. Subject to stored XSS and NoSQL
    injection via unsanitized input fields.
  linked_threats: []
- id: A-007
  name: Application Source Code (Public GitHub Repo)
  classification: Public
  description: Public GitHub repository at github.com/juice-shop/juice-shop. Enables attacker reconnaissance including committed
    secrets, vulnerability patterns, and CI/CD pipeline configuration.
  linked_threats: []
- id: A-008
  name: File Upload Storage (/ftp/ directory)
  classification: Internal
  description: Local filesystem directory served as public static files via serve-index. Uploaded files land here; the directory
    is also served as a listing, enabling path traversal and file exfiltration.
  linked_threats:
  - T-012
  - T-022
  - T-030
  - T-031
  - T-037
  - T-038
  - T-045
  - T-047
  - T-048
- id: A-009
  name: Prometheus Metrics Endpoint
  classification: Internal
  description: Unauthenticated /metrics endpoint (prom-client) exposing request counts, latency histograms, and application
    internals. Reveals business logic patterns and internal timing.
  linked_threats: []
- id: A-010
  name: Swagger/OpenAPI API Specification
  classification: Public
  description: Unauthenticated /api-docs endpoint (swagger-ui-express) listing all API routes, parameters, and schemas. Provides
    attackers a complete API surface map.
  linked_threats: []
- id: A-011
  name: GitHub Actions Pipeline Secrets
  classification: Restricted
  description: CI/CD pipeline secrets (Docker Hub credentials, npm tokens, GitHub tokens) stored in GitHub Actions secrets.
    Accessible to workflows with write permissions including pr-compliance.yml.
  linked_threats:
  - T-008
  - T-010
  - T-011
  - T-013
  - T-015
  - T-026
  - T-033
  - T-034
  - T-035
  - T-041
  - T-052
- id: A-012
  name: Claude Code AI Agent Configuration
  classification: Internal
  description: Committed .claude/settings.local.json with Bash(*:*) wildcard permission. Enables unconstrained shell execution
    for any developer using Claude Code against this repo.
  linked_threats: []
