  title: No Build Provenance Attestation on Published Image — release.yml:74
  affected_parameter: null
  scenario: The `docker/build-push-action` invocations (`release.yml:74`, `ci.yml:352`) push multi-arch images to Docker Hub
    with no `provenance:` or `sbom:` attestation flags and no separate signing step — confirmed absent across release.yml
    and ci.yml. A CycloneDX SBOM is generated inside the image (`Dockerfile:20`) but is not emitted as a verifiable, signed
    attestation attached to the registry manifest. Consequently a consumer pulling `bkimminich/juice-shop:latest` has no cryptographic
    way to verify the image was built by this pipeline from this source commit. Paired with the unpinned base images (ci-cd-pipeline-005)
    and lockfile-less install (ci-cd-pipeline-001), there is no integrity chain from source to published artifact that a downstream
    user can independently check.
