- local_id: backend-api-015
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-601
  title: Open Redirect Allowlist Bypass via Substring Match (lib/insecurity.ts:138)
  affected_parameter: to
  scenario: '`isRedirectAllowed` at lib/insecurity.ts:138 checks `url.includes(allowedUrl)` for each entry in the allowlist.
    An attacker constructs the URL `https://evil.com?return=https://github.com/juice-shop/juice-shop` — the query parameter
    value contains the allowed URL as a substring, so `url.includes(''https://github.com/juice-shop/juice-shop'')` returns
    `true`. The attacker uses this in a phishing link: a victim clicks `https://juice-shop.example.com/redirect?to=https://evil.com?r=https://github.com/juice-shop/juice-shop`
    and is redirected to the attacker''s site. Legitimate branding of the Juice Shop domain lends credibility to the phishing
    page.'
  evidence_summary: lib/insecurity.ts:138 uses `url.includes(allowedUrl)` which matches the allowed URL as a substring anywhere
    in the redirect target, not exclusively as a prefix.
  impact_description: Redirect to attacker-controlled phishing site under the cover of a legitimate Juice Shop URL, enabling
    credential harvesting from users who trust the originating domain.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Allowlist present — but implemented with substring matching instead of exact or prefix matching.
  mitigation_title: Replace url.includes() with exact-match or startsWith() in isRedirectAllowed
  remediation:
    effort: Low
    steps:
    - Replace `allowed = allowed || url.includes(allowedUrl)` at lib/insecurity.ts:138 with `allowed = allowed || url ===
      allowedUrl` for exact matching, or `url.startsWith(allowedUrl)` if subdirectory redirects within the allowed domain
      are required.
    - 'Prefer exact matching: the current allowlist contains full canonical URLs (no trailing wildcards intended), so `===`
      is semantically correct.'
    - 'Add a test case: `isRedirectAllowed(''https://evil.com?r=https://github.com/juice-shop/juice-shop'')` must return `false`.'
    code_example: "```typescript\n// lib/insecurity.ts — exact match\nexport const isRedirectAllowed = (url: string) => {\n\
      \  for (const allowedUrl of redirectAllowlist) {\n    if (url === allowedUrl) return true\n  }\n  return false\n}\n\
      ```"
    reference: CWE-601
  evidence:
