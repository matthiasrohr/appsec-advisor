  title: Stored XSS — about.component.ts:119
  affected_parameter: feedbacks[i].comment
  scenario: The `AboutComponent.populateSlideshowFromFeedbacks()` method fetches all feedback records from the API and at
    line 119 passes `feedbacks[i].comment` directly to `this.sanitizer.bypassSecurityTrustHtml()`. Any user who submits a
    feedback comment containing `<script>alert(1)</script>` or `<img src=x onerror=...>` will have that payload stored in
    the backend and executed in every visitor's browser that views the About page. Angular's DomSanitizer is explicitly bypassed,
    so Angular's built-in XSS protections are negated. The XSS payload executes in the origin context, enabling cookie/token
    theft (JWT from localStorage), keylogging, or account takeover.
  evidence_summary: '`about.component.ts:119` calls `this.sanitizer.bypassSecurityTrustHtml(feedbacks[i].comment)` where `comment`
    is user-supplied data fetched from `GET /api/Feedbacks`.'
  impact_description: Any visitor to the About page executes attacker-supplied JavaScript in their browser session, enabling
    JWT theft from localStorage and full account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Angular DomSanitizer is active by default but explicitly bypassed here with `bypassSecurityTrustHtml`.
  mitigation_title: Remove bypassSecurityTrustHtml from feedback rendering; use safe server-side HTML allowlist
  remediation:
    effort: Medium
    steps:
    - Remove the `bypassSecurityTrustHtml` call. Render the star rating HTML using Angular template directives (`*ngFor` with
      `<i>` elements) instead of injecting raw HTML strings.
    - For any user-supplied text in `comment`, use Angular's standard interpolation `{{ feedbacks[i].comment }}` which auto-escapes
      HTML.
    - If rich formatting is required, sanitize comments server-side through an HTML allowlist (e.g., `sanitize-html` with
      a strict `allowedTags` set) before storing in the database.
    - Add a Content Security Policy header (`script-src 'self'`) via the Express backend to reduce XSS impact across the SPA.
    code_example: "// Replace HTML injection with template directives\n// about.component.html\n<figcaption>\n  <p class=\"\
      feedback-comment\">{{ feedback.comment }}</p>\n  <div class=\"feedback-stars\">\n    <i *ngFor=\"let star of getStars(feedback.rating)\"\
      \n       [class]=\"star.filled ? 'fas fa-star' : 'far fa-star'\"></i>\n  </div>\n</figcaption>"
    reference: CWE-79
