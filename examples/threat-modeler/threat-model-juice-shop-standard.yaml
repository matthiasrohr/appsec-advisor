  title: XML External Entity Injection in File Upload Handler — routes/fileUpload.ts:76
  affected_parameter: null
  scenario: 'The file upload endpoint at POST /file-upload accepts XML files and parses them at routes/fileUpload.ts:76 using
    `parseXmlString(data)` (lib/xml.ts), which uses libxml2-wasm with external entity resolution enabled. An attacker uploads
    an XML file containing `<!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><foo>&xxe;</foo>`. The parser resolves
    the external entity, reads the file, and the content is included in the parsed XML string which is then echoed back in
    the HTTP error response at line 79: `next(new Error(''... '' + utils.trunc(xmlString, 400) + '' ...''))`. No authentication
    is required for file upload based on the route registration at server.ts:309.'
  evidence_summary: fileUpload.ts:76 calls `parseXmlString(data)` on raw upload content, then includes the result in an error
    response at line 79, leaking external entity file contents.
  impact_description: Unauthenticated attackers can read arbitrary server-side files including /etc/passwd, configuration
    files, and application secrets via the HTTP error response.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: File type check at checkFileType() (fileUpload.ts:62), but this is not enforced to block XML — XML is
    explicitly allowed. Upload size checked.
  mitigation_title: Disable external entity resolution in the XML parser used by handleXmlUpload()
  remediation:
    effort: Low
    steps:
    - 'In lib/xml.ts (the parseXmlString implementation), set the parser option to disable external entity loading: pass `{
      noent: false, dtdload: false, dtdvalid: false }` to the libxml2-wasm parser'
    - Do not include parsed XML content in HTTP error responses; replace `utils.trunc(xmlString, 400)` in the error message
      with a static string like 'XML content rejected'
    - Consider rejecting XML uploads entirely if B2B XML processing is deprecated (the error message already says it is)
    code_example: "// lib/xml.ts — disable external entities\nimport { parseXml } from 'libxml2-wasm'\n\nexport async function\
      \ parseXmlString(data: string): Promise<string> {\n  const doc = parseXml(data, {\n    // Disable all external entity\
      \ types\n    nonet: true,    // block network entities\n    noent: false,   // do not substitute entities\n    dtdload:\
      \ false  // do not load external DTD\n  })\n  const result = doc.toString()\n  doc.dispose()\n  return result\n}"
    reference: CWE-611
  evidence:
  - file: routes/fileUpload.ts
    line: 76
  evidence_check: verified
