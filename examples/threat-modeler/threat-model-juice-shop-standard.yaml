- local_id: ci-cd-pipeline-006
  threat_category_id: TH-23
  additional_categories:
  - TH-22
  stride: Elevation of Privilege
  cwe: CWE-284
  title: Postinstall Hook Auto-Commits Code to Branch Without — lint-fixer.yml:22
  affected_parameter: null
  scenario: '`lint-fixer.yml` triggers on every `push` event across all branches (line 3: `on: [push]`). It runs `npm install
    --ignore-scripts` then executes `npm run lint:fix`, which may modify source files, then unconditionally commits the result
    back to the branch via `stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5058a842` (line 22). No human
    approval, no PR gate, no status check guards this commit. The commit author is `JuiceShopBot` — an identity injected by
    the action, not a verifiable human committer. If a dependency used during `lint:fix` is compromised or `lint:fix` introduces
    unintended changes, those changes are silently committed to the branch. The workflow has no `permissions:` block, so it
    inherits the default token with potentially `contents: write`.'
  evidence_summary: '`lint-fixer.yml:3` triggers on all pushes; `lint-fixer.yml:22` uses `stefanzweifel/git-auto-commit-action`
    to commit lint fixes with the bot identity `JuiceShopBot <61591748+JuiceShopBot@users.noreply.github.com>` without any
    PR or review gate.'
  impact_description: An attacker who compromises a linting dependency or injects code via a push to any branch gets arbitrary
    code auto-committed back to that branch under the bot's identity, bypassing code review.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The lint step uses `--ignore-scripts` for npm install. The `stefanzweifel/git-auto-commit-action` is
    SHA-pinned. Only files changed by `lint:fix` are committed.
  mitigation_title: Restrict lint-fixer.yml to specific branches and add a PR gate for auto-committed changes
  remediation:
    effort: Medium
    steps:
    - 'Restrict the workflow trigger to specific branches: change `on: [push]` to `on: push: branches: [develop]` or add a
      `branches-ignore` for protected branches.'
    - 'Add `permissions: contents: write` explicitly at the job level (removes implicit scope inheritance) and `permissions:
      read-all` at workflow level.'
    - 'Consider converting the auto-commit to a PR creation: use `peter-evans/create-pull-request` (SHA-pinned) instead of
      direct commit, requiring a human to merge. This gives reviewers visibility into what the linter changed.'
    - Add a branch protection rule requiring at least one review before merge on protected branches, which would catch any
      auto-commit-to-PR before it merges.
    - 'If direct auto-commit is retained, add `skip_dirty_check: false` and `skip_fetch: false` on the action to avoid committing
      noise.'
    code_example: "# lint-fixer.yml — change trigger:\non:\n  push:\n    branches:\n      - develop  # restrict to non-protected\
      \ feature branches only\n\n# add permissions block:\npermissions: read-all\njobs:\n  LMLFTFY:\n    permissions:\n  \
      \    contents: write"
    reference: CWE-284
