  scenario: 'The workflow `.github/workflows/image_actions.yml` pins `calibreapp/image-actions` at the mutable `@main` tag
    (line 33) rather than a SHA digest. Any push to the `calibreapp/image-actions` main branch on GitHub immediately becomes
    the code that executes in CI. An attacker who gains write access to that repository — via compromised maintainer credentials,
    a malicious PR, or a supply-chain takeover — can inject arbitrary code that runs with access to `secrets.GITHUB_TOKEN`
    (which has `pull-requests: write` in this context) and the ability to call `peter-evans/create-pull-request@v8` to inject
    commits into the target repository. The `@main` designation is the highest-risk mutable anchor because it tracks a live
    branch tip and has zero grace period between compromise and delivery. Additional unpinned tags present across the pipeline:
    `actions/checkout@v6` (image_actions.yml:30), `peter-evans/create-pull-request@v8` (image_actions.yml:42), `coverallsapp/github-action@v2`
    (ci.yml:188), and all three `github/codeql-action` sub-actions at `@v3` (codeql-analysis.yml:23,34,36).'
  evidence_summary: '`calibreapp/image-actions@main` at image_actions.yml:33 uses a live branch tip; the associated `actions/checkout@v6`
    (line 30) is a version tag with no SHA. Four additional workflows carry unpinned action references.'
  impact_description: Compromised action code executes in CI with secrets access, can commit backdoored code or exfiltrate
    credentials before detection.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The `image_actions.yml` workflow restricts fork PRs via an `if:` condition on `github.event.pull_request.head.repo.full_name
    == github.repository`. Most other workflows use SHA-pinned actions.
  mitigation_title: Pin all GitHub Actions to a full commit SHA with an inline version comment
  remediation:
    effort: Low
    steps:
    - 'Replace `calibreapp/image-actions@main` with the current SHA: run `gh api repos/calibreapp/image-actions/commits/main
      --jq .sha` and pin as `calibreapp/image-actions@<sha> # vX.Y.Z`.'
    - Pin `actions/checkout@v6`, `peter-evans/create-pull-request@v8`, and `coverallsapp/github-action@v2` to their SHA equivalents
      in the same manner.
    - Pin all three `github/codeql-action` sub-actions (`/init`, `/autobuild`, `/analyze`) to SHA digests instead of `@v3`.
    - Enforce SHA pinning in CI via a lint step using `zizmor` or `actionlint` (`actionlint` flags mutable tag references
      as errors).
    - 'Enable Dependabot for GitHub Actions (`dependabot.yml` with `package-ecosystem: github-actions`) to receive automated
      PRs when pinned SHAs fall behind the current release.'
