  cwe: CWE-287
  title: Insecure JWT Verification — lib/insecurity.ts:54
  affected_parameter: null
  scenario: '`security.isAuthorized()` at `lib/insecurity.ts:54` calls `expressJwt({ secret: publicKey })` without specifying
    an `algorithms` array. Versions of `express-jwt` prior to the fix for CVE-2020-15084 accept `alg:none` tokens when no
    algorithm constraint is applied — an attacker crafts a JWT with header `{"alg":"none"}` and an arbitrary payload such
    as `{"data":{"role":"admin","email":"attacker@x.com"}}`, omits the signature, and the middleware accepts it. Separately,
    the RSA private key is hardcoded at `lib/insecurity.ts:23` (see auth-003), so an attacker can also forge fully signed
    RS256 tokens offline. Either path produces a JWT the server treats as authoritative.'
  evidence_summary: '`expressJwt` is invoked with only `{ secret: publicKey }` — no `algorithms: [''RS256'']` constraint —
    leaving the server open to the `alg:none` downgrade attack.'
  impact_description: 'Attacker mints a JWT for any user identity, including `role: ''admin''`, without valid credentials.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: JWT signature verification uses RSA public key, but without algorithm pinning the RS256 constraint is
    not enforced.
  mitigation_title: Pin JWT algorithm to RS256 in expressJwt middleware
  remediation:
    effort: Low
    steps:
    - 'Change `lib/insecurity.ts:54` to `expressJwt({ secret: publicKey, algorithms: [''RS256''] })` — this rejects any token
      whose header specifies a different algorithm including `none`.'
    - Verify the `express-jwt` package version is ≥6.0.0 (the version that introduced the `algorithms` required field); update
      if older.
    - Add a test that submits a `alg:none` token to a protected endpoint and asserts HTTP 401.
    code_example: '// lib/insecurity.ts:54 — add algorithms whitelist

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] })'
    reference: CWE-347
