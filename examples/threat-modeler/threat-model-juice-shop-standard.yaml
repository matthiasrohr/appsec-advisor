  title: Zip Bomb — routes/fileUpload.ts:34
  affected_parameter: file (ZIP upload via POST /file-upload)
  scenario: extractZipBuffer at routes/fileUpload.ts:27-37 streams each ZIP entry directly to disk via pipeline(entry.stream(),
    fs.createWriteStream(...)) without checking the decompressed size of entries. A highly compressed ZIP file within the
    200KB multer limit can expand to gigabytes on disk when decompressed (compression ratios of 1000:1 are achievable). This
    fills the disk partition hosting uploads/complaints/, potentially blocking all file system writes including log rotation
    and database operations. No authentication is required (server.ts:309).
  evidence_summary: routes/fileUpload.ts:34 writes each zip entry to disk without a decompressed-size check; server.ts:692
    sets only a 200KB compressed limit via multer; no disk-quota enforcement is present in the extraction loop.
  impact_description: An unauthenticated attacker can exhaust server disk space by uploading a zip bomb, potentially crashing
    the application or causing data loss when writes fail.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Multer limit of 200KB on the incoming compressed file. The unzipper library streams entries, which prevents
    in-memory explosion but not disk explosion.
  mitigation_title: Enforce a decompressed-size limit per ZIP entry and per archive during extraction
  remediation:
    effort: Low
    steps:
    - 'Track cumulative decompressed bytes during extraction and abort if the total exceeds a safe threshold (e.g., 10MB):
      maintain a `bytesWritten` counter incremented per entry and throw before writing when the limit is exceeded.'
    - Check `entry.vars.uncompressedSize` (available from the unzipper directory metadata before streaming) and skip entries
      whose declared uncompressed size exceeds the per-entry limit.
    - Use OS-level disk quotas or a tmpfs mount for the uploads/complaints/ directory to bound the blast radius of any zip
      bomb.
    code_example: "// routes/fileUpload.ts\nconst MAX_DECOMPRESSED_BYTES = 10 * 1024 * 1024 // 10MB\nlet totalBytes = 0\n\
      for (const entry of directory.files) {\n  if ((entry.vars?.uncompressedSize ?? 0) + totalBytes > MAX_DECOMPRESSED_BYTES)\
      \ {\n    entry.autodrain(); continue\n  }\n  totalBytes += entry.vars?.uncompressedSize ?? 0\n  // ... safe to write\n\
      }"
