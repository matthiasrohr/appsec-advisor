trust_boundaries:
- id: tb-1
  name: Public Internet / Application Tier
  description: The boundary between unauthenticated internet users/attackers and the Express backend. Enforced only by Express
    routing middleware — no network-layer WAF or API gateway is configured in the source tree.
  from: external
  to: express-backend
  enforcement: Express routing + optional express-jwt middleware on protected routes
  weaknesses:
  - Login endpoint has no rate limit (only password-reset is rate-limited)
  - express-jwt 0.1.3 is vulnerable to algorithm confusion attacks
  - CORS configured wide-open via cors() with no origin allowlist
  - Unauthenticated endpoints include file upload, metrics, admin config, FTP listing
- id: tb-2
  name: Unauthenticated / Authenticated User Zone
  description: The boundary between anonymous sessions and authenticated user sessions. Crossed by obtaining a valid JWT via
    login, registration, or JWT forgery using the hardcoded private key.
  from: external
  to: auth-module
  enforcement: JWT presence check via express-jwt isAuthorized() middleware applied per-route
  weaknesses:
  - RSA private key is committed to public repository — JWT forgery trivial
  - SQL injection in login.ts bypasses credential verification entirely
  - jsonwebtoken 0.4.0 susceptible to alg:none bypass
  - Authorization checks on UserId in request body (not JWT sub) — IDOR possible
- id: tb-3
  name: Application Tier / Database Tier
  description: The boundary between the Express application layer and the in-process SQLite database. Not a true network boundary
    — SQLite runs embedded in the Node.js process. Access controlled only by Sequelize ORM usage discipline.
  from: express-backend
  to: sqlite-db
  enforcement: Sequelize ORM — but raw query capability is actively used in login.ts and search.ts
  weaknesses:
  - Raw string-interpolated queries bypass ORM parameterization
  - No database-level access controls (in-process SQLite has no user concept)
  - Full database readable/writable from any route handler
- id: tb-4
  name: Application Tier / Filesystem
  description: The boundary between the Express application and the local filesystem. No OS-level sandboxing — the Node.js
    process can read/write any path accessible to the OS user.
  from: express-backend
  to: file-system
  enforcement: Application-level path checks (path.resolve with includes check in fileUpload.ts) — bypassable via Zip Slip
  weaknesses:
  - Zip Slip in fileUpload.ts:31 allows writing to arbitrary paths outside uploads/
  - XXE in xml.ts grants WASM sandbox host filesystem read access
  - encryptionkeys/ directory committed to public repo
  - FTP directory intentionally world-readable with no auth
- id: tb-5
  name: Application Tier / LLM API
  description: The boundary between the Express backend and the external OpenAI-compatible LLM API endpoint. URL is configurable
    — potential SSRF via misconfigurations. LLM responses are not sanitized before being relayed to users.
  from: chatbot-llm
  to: external
  enforcement: HTTPS transport only; LLM API key credential in config
  weaknesses:
  - System prompt contains confidential business rules extractable via prompt injection
  - LLM tool-call grants database query capability — prompt injection can read arbitrary product/user data
  - LLM API URL configurable — potential SSRF if URL can be attacker-controlled
  - No output sanitization of LLM responses
- id: tb-6
  name: Browser / Angular SPA
  description: The boundary between the server-rendered assets and the Angular SPA running in the user's browser. JWT tokens
    are stored in localStorage — accessible to any JavaScript running in the same origin.
  from: external
  to: frontend-spa
  enforcement: Browser same-origin policy; Angular route guards (app.guard.ts)
  weaknesses:
  - JWT in localStorage stolen by any XSS payload on the same origin
  - bypassSecurityTrustHtml() used in about.component.ts for feedback rendering
  - Angular route guards are UI-only — direct API calls bypass them
  - postMessage / iframe surface present in 23 frontend files
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Weak
  evidence: routes/login.ts:34 — raw SQL string interpolation; no parameterized query; password hashed with unsalted MD5 (models/user.ts:76)
  notes: Login endpoint is SQL-injectable. MD5 without salt is reversible for common passwords via rainbow tables. No account
    lockout after repeated failures.
- domain: Identity and Authentication Controls
  control: TOTP / 2FA
  effectiveness: Partial
  evidence: routes/2fa.ts — verifySync with 30s epoch tolerance; TOTP setup/disable implemented
  notes: TOTP implementation is technically correct but optional and not enforced on any privilege level. 2FA can be bypassed
    by exploiting the SQL injection login path.
  audit_flags:
  - control_domain_suffix_normalised
- domain: Identity and Authentication Controls
  control: OAuth / Social Login
  effectiveness: Partial
  evidence: routes/oauth.ts — Google/GitHub OAuth configured; passport integration
  notes: OAuth flows exist but lack PKCE and state parameter validation in all cases. Social login bypasses 2FA.
  audit_flags:
  - control_domain_suffix_normalised
- domain: Session and Token Controls
  control: Session Token Issuance (JWT Based)
  effectiveness: Weak
  evidence: lib/insecurity.ts:54 — jwt.sign() with RSA private key hardcoded at line 19; jsonwebtoken 0.4.0
  notes: Private key committed to public GitHub repository. jsonwebtoken 0.4.0 from 2013 has known CVEs including alg:none
    bypass (CVE-2015-9235). Token expiry is 6 hours.
  audit_flags:
  - control_name_canonicalised
- domain: Session and Token Controls
  control: Session Token Validation (JWT Based)
  effectiveness: Weak
  evidence: lib/insecurity.ts:52 — expressJwt with publicKey; express-jwt 0.1.3 from 2013
  notes: express-jwt 0.1.3 predates algorithm confusion mitigations. The publicKey is the RSA public key but algorithm is
    not explicitly enforced to RS256 in all verification paths.
  audit_flags:
  - control_name_canonicalised
- domain: Session and Token Controls
  control: Token Storage
  effectiveness: Weak
  evidence: frontend/src/app — JWT stored in localStorage per recon-patterns.json category 10 (36 findings)
  notes: localStorage is accessible to any XSS payload on the same origin. No httpOnly cookie alternative offered. Any successful
    XSS on the Angular SPA yields persistent session theft.
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  evidence: 'lib/insecurity.ts — roles: customer/deluxe/accounting/admin; routes use isAuthorized() middleware selectively'
