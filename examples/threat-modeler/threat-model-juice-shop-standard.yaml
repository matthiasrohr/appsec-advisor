  mitigation_fingerprints:
  - move jwt session token from localstorage to httponly secure samesite=strict cookie managed by a backend-for-frontend
  - enforce server-side authorization checks on all admin and authenticated api endpoints
  - replace raw string interpolation with parameterized sequelize query in routes/login.ts
  - remove hardcoded rsa private key and load from environment-injected secret at runtime
  - add algorithms allowlist to expressjwt and upgrade jsonwebtoken to a non-cve version
  - use parameterized / bound queries; never interpolate request data into the sql string.
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - enforce discount cap in `generatecoupon` zod schema and add message input validation
  - parameterize the product search query using sequelize replacements or the orm findall method
  - remove bypasssecuritytrusthtml and sanitize feedback html before rendering
  - disable external entity resolution and host filesystem access in the xml parser
  - remove hardcoded mnemonic and load wallet key material from a secrets manager or environment variable
  - apply an allowlist filter before passing the body to any model, and strip privilege fields before persistence.
  - enforce discount cap in `generatecoupon` zod schema and add server-side range check before coupon generation
  - replace the vm-based code evaluation in b2border with a structured data parser
  - remove eval from the user profile renderer and use a safe template engine
  - enforce strict path containment for zip entry paths using path.resolve and startswith
  - eliminate xss injection points and enforce admin authorization server-side for all privileged api endpoints
  - replace security-question reset with email-token-based reset and remove hardcoded hmac key
  - add `security.isauthorized` middleware to `/rest/chat` route registration
  - restrict trust proxy to known reverse-proxy cidr and remove x-forwarded-for from rate limit key
  - add socket.io authentication middleware to reject unauthenticated connections
  - replace substring match with exact-prefix match in isredirectallowed
  - replace `$where` string concatenation with parameterized marsdb query in `getproductreviews`
  - replace curl-pipe-to-shell heroku install with a pinned official github action or verified binary
  - pin all actions in image_actions.yml to sha digests and add a permissions block
  - pin coverallsapp/github-action to a specific commit sha digest
  - replace the zip slip guard with a strict prefix check against the intended upload directory
  - disable external entity resolution in the xml parser and avoid reflecting parsed content in error responses
  - add structured audit log entries for all authentication events in routes/login.ts, changepassword.ts, resetpassword.ts,
    and 2fa.ts
  - replace md5 password hashing with bcrypt or argon2id in lib/insecurity.ts
  - remove confidential business rules from the llm system prompt and enforce them as server-side code
  - add authentication middleware to /ftp directory serving routes
  - remove confidential business logic from llm system prompt and enforce it server-side in the generatecoupon tool
  - apply isauthorized middleware to all /encryptionkeys routes and remove the serve-index directory listing
  - apply rate-limit middleware to post /rest/user/login in server.ts
  - add rate limiting middleware and input size validation to `/rest/chat`
  - remove global.sleep registration and replace $where with a typed mongodb query
  - add express-rate-limit to post /rest/user/login with per-ip and per-email limiting
  - enforce a decompressed-size limit per zip entry and per archive during extraction
  - disable entity expansion in xml/yaml parsers and add rate limiting to the upload endpoint
  - apply connection rate limiting and a maximum connection cap to the socket.io server
  - apply rate limiting and add a maximum-size cap to wallet tracking sets
  - enforce current-password verification unconditionally and change to post with body parameters in routes/changepassword.ts
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark
    the route intentionally public via app.get for read-only access only.
  - add least-privilege permissions blocks to ci.yml and release.yml
  - validate profileimage is a url before inserting into csp and use helmet.contentsecuritypolicy for header construction
  - add security.isauthorized middleware to post /file-upload and post /profile/image/file
  - gate challenge-solve persistence on verified socket authentication and block solve if anti-cheat fires pre-write
  - strip privileged fields from user-controlled input in registration and profile routes
  - add jwt authentication and user-session binding to wallet registration endpoints
  - add isauthorized middleware to all web3 key and wallet endpoints
  - pin github/codeql-action steps to sha digests in codeql-analysis.yml
  - pin docker base images to sha-256 digest in dockerfile
  - validate `llmapiurl` against an allowlist of permitted llm api host patterns at startup
  - return a single generic 401 response for all incorrect key submissions to eliminate the oracle
  - sanitize websocket error log output and assert api key presence at startup
