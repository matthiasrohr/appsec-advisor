- local_id: auth-004
  threat_category_id: TH-05
  additional_categories: []
  stride: Tampering
  cwe: CWE-916
  title: Unsalted MD5 Password Hash — lib/insecurity.ts:41
  affected_parameter: password
  scenario: '`lib/insecurity.ts:41` hashes every password as `crypto.createHash(''md5'').update(data).digest(''hex'')` — a
    single fast, unsalted hash. After an SQLi dump (see auth-002), every password hash is crackable against published MD5
    rainbow tables in seconds. The `models/user.ts:76` setter applies this function on write, so all stored passwords share
    the same weakness. An attacker who exfiltrates the `Users` table immediately recovers plaintext credentials for all accounts.'
  evidence_summary: '`lib/insecurity.ts:41` uses `crypto.createHash(''md5'')` without a salt; `models/user.ts:76` applies
    it to every stored password.'
  impact_description: Full plaintext credential recovery for all users within seconds from a database dump, enabling account
    takeover across the user base.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Passwords are hashed (not stored plaintext)
  mitigation_title: Replace MD5 with bcrypt or Argon2id and re-hash existing passwords on next login
  remediation:
    effort: Medium
    steps:
    - Replace `crypto.createHash('md5')` in `lib/insecurity.ts:41` with `bcrypt.hashSync(data, 12)` (or `argon2.hash(data)`).
    - Update the `UserModel` password setter at `models/user.ts:76` to use the new hash function.
    - 'Implement a migration path: on next successful login with the old MD5 hash, rehash the verified plaintext with bcrypt
      and store the new hash.'
    - Force a password reset for any account that has not re-authenticated within a defined window.
    code_example: '// lib/insecurity.ts

      import bcrypt from ''bcrypt''

      export const hash = (data: string) => bcrypt.hashSync(data, 12)

      export const verifyHash = (data: string, stored: string) => bcrypt.compareSync(data, stored)'
    reference: CWE-916
    blueprint: null
