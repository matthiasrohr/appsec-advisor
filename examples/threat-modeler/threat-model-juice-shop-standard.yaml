- local_id: b2b-api-003
  threat_category_id: TH-05
  additional_categories:
  - TH-01
  stride: Tampering
  cwe: CWE-94
  title: Unvalidated orderLinesData Executed in Bypassable Sandbox (b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: 'At routes/b2bOrder.ts:19, `body.orderLinesData` is read without any type or schema check — it can be any string.
    At line 23 it is passed verbatim to `vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 })`. The `notevil@^1.3.3`
    library is meant to evaluate arithmetic expressions safely, but prototype pollution bypasses its guards: the payload `({}).constructor.constructor(''return
    process'')()` accesses `Function` through the prototype chain, which `notevil` does not block. The payload executes arbitrary
    Node.js code under the server process identity, enabling file reads, environment variable dumps, or downstream service
    calls. The `timeout: 2000` only guards infinite loops, not prototype traversal.'
  evidence_summary: '`body.orderLinesData` flows without validation directly into `safeEval()` inside a `vm.runInContext`
    call; no type guard or AST pre-check precedes evaluation.'
  impact_description: Authenticated B2B caller achieves server-side code execution — can exfiltrate secrets, pivot to internal
    services, or install persistent backdoors.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: '`vm.createContext(sandbox)` provides a minimal context boundary; 2000ms timeout prevents infinite loops;
    `notevil` library attempts expression-only parsing.'
  mitigation_title: Replace notevil sandbox eval with a strict JSON/numeric schema validation on orderLinesData
  remediation:
    effort: Medium
    steps:
    - 'Define an explicit JSON schema for the `orderLinesData` field using `zod` or `joi`: parse and validate before any evaluation.
      If the field is meant to carry structured order lines, it should be JSON, not an expression string.'
    - If expression evaluation is a genuine product requirement, replace `notevil` with a well-maintained, audited alternative
      (e.g. `expr-eval` restricted to numeric operators) and add an AST depth/complexity cap.
    - Remove the `vm.runInContext` call entirely when `orderLinesData` is validated JSON — there is no need to evaluate structured
      data.
    - 'Add a canary integration test: send `({}).constructor.constructor(''return process.env'')()` as `orderLinesData` and
      assert HTTP 400 (not 200 or 500).'
    code_example: "// routes/b2bOrder.ts — fixed (schema validation approach)\nimport { z } from 'zod'\n\nconst OrderLineSchema\
      \ = z.array(z.object({\n  productId: z.number().int().positive(),\n  quantity:  z.number().int().positive().max(999)\n\
      }))\n\n// Inside handler:\nconst parsed = OrderLineSchema.safeParse(JSON.parse(body.orderLinesData ?? '[]'))\nif (!parsed.success)\
      \ return res.status(400).json({ error: 'Invalid orderLinesData' })"
    reference: CWE-94
  evidence:
