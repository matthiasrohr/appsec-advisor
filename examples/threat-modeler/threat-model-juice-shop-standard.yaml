    anywhere. A long-lived registry credential is a single stealable secret: a compromised action (see ci-cd-pipeline-004),
    a leaked log line, or a workflow-injection foothold lets an attacker pull the token and publish a malicious `bkimminich/juice-shop`
    image under the project''s own name, trusted by every downstream `docker pull`. Short-lived OIDC credentials scoped to
    a single workflow run would shrink the steal-and-replay window from indefinite to minutes and additionally enable signed
    provenance.'
