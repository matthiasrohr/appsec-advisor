  stride: Tampering
  cwe: CWE-943
  title: NoSQL $where JavaScript Injection — routes/showProductReviews.ts:36
  affected_parameter: id (req.params.id)
  scenario: 'When the challenge flag `noSqlCommandChallenge` is enabled, `showProductReviews` passes `req.params.id` through
    `utils.trunc(id, 40)` (a 40-character truncation, no type enforcement) and concatenates it directly into a MarsDB `$where`
    clause: `{ $where: ''this.product == '' + id }`. An unauthenticated attacker sends a GET request to `/rest/products/<payload>/reviews`
    with a payload such as `0; sleep(2000)` or `0; return this`. MarsDB evaluates this as server-side JavaScript. The globally-registered
    `sleep` function is callable from within the expression, blocking the Node.js event loop for up to 2000 ms per request.
    The product-filter can also be escaped to return all reviews regardless of product ID.'
  evidence_summary: '`db.reviewsCollection.find({ $where: ''this.product == '' + id })` at line 36 uses string concatenation
    to build the JS expression; `id` is bounded only by a 40-char truncation when the challenge flag is active.'
  impact_description: An attacker can enumerate all product reviews regardless of product, execute arbitrary JavaScript in
    the MarsDB evaluation context, and block the Express event loop for up to 2 seconds per request, degrading availability.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 'Conditional safeguard: when `noSqlCommandChallenge` is disabled, `req.params.id` is coerced to `Number()`,
    neutralising string injection. When the challenge is enabled (intentional vuln path), only a 40-char truncation applies.'
  mitigation_title: Replace $where string concatenation with a typed equality filter in showProductReviews
  remediation:
    effort: Low
    steps:
    - 'Replace `db.reviewsCollection.find({ $where: ''this.product == '' + id })` with `db.reviewsCollection.find({ product:
      Number(id) })` — MarsDB supports standard field equality selectors without JavaScript evaluation.'
    - Remove the global `sleep` registration (`global.sleep = ...`) from `showProductReviews.ts`; the timing challenge can
      be detected via the wall-clock delta without exposing a blocking sleep to the query context.
    - 'Add an integer-validation guard: if `isNaN(Number(req.params.id))` return 400 before the DB call, so the challenge-flag
      branch never reaches a JS-interpolated query.'
    code_example: '// Before (vulnerable)

      db.reviewsCollection.find({ $where: ''this.product == '' + id })


      // After (safe)

      const productId = Number(req.params.id)

      if (isNaN(productId)) return res.status(400).json({ error: ''Invalid id'' })

      db.reviewsCollection.find({ product: productId })'
