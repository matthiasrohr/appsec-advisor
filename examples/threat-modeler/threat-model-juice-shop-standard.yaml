  title: Alchemy RPC WebSocket event data trusted without — routes/web3Wallet.ts:26
  affected_parameter: null
  scenario: Both listeners open a `WebSocketProvider` to `wss://eth-sepolia.g.alchemy.com` (routes/nftMint.ts:18, routes/web3Wallet.ts:20)
    and subscribe to contract events (`NFTMinted` at routes/nftMint.ts:24, `ContractExploited` at routes/web3Wallet.ts:26).
    The event payload (`minter` / `exploiter` address) is consumed directly with no schema validation, no checksum-address
    normalisation, and no confirmation-depth check before it is used to mutate challenge-gating state. The DESCRIPTION confirms
    'RPC responses used without schema validation'. A compromised/spoofed RPC response, a chain reorg on the Sepolia testnet,
    or an event emitted by an unrelated contract reusing the same event signature can inject an attacker-chosen address into
    `addressesMinted` / drive `solveIf`, tampering with application state across the Application-to-Ethereum-RPC trust boundary.
  evidence_summary: contract.on('ContractExploited', ...) consumes the event-supplied exploiter address with no type/format
    validation or confirmation check before deleting from walletsConnected and solving the challenge.
  impact_description: Unvalidated cross-boundary RPC event data can corrupt in-memory wallet/mint state and unlock challenges
    based on data the application never authenticated.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None. RPC responses consumed without schema validation, address normalisation, or confirmation depth.
  mitigation_title: Validate and normalise on-chain event payloads and require confirmation depth before mutating state
  remediation:
    effort: Medium
    steps:
    - Normalise event addresses with `ethers.getAddress()` (checksum) and reject values that fail validation before any Set
      mutation or `solveIf`.
    - Verify the event originates from the expected contract address and signature, and wait for a minimum confirmation count
      to survive Sepolia reorgs before acting on it.
    - Wrap event-handler logic in defensive validation so a malformed RPC frame cannot throw inside the unbounded subscription
      callback.
    code_example: "void contract.on('ContractExploited', (exploiter: string) => {\n  let addr: string\n  try { addr = ethers.getAddress(exploiter)\
      \ } catch { return }\n  if (walletsConnected.has(addr)) { /* act only on validated, confirmed event */ }\n})"
