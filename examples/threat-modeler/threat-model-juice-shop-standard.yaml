  stride: Information Disclosure
  cwe: CWE-200
  title: Full User Object Returned on Password Reset Success — routes/resetPassword.ts:44
  affected_parameter: null
  scenario: '`routes/resetPassword.ts:44` returns `res.json({ user: updatedUser })` after a successful password reset, where
    `updatedUser` is the full Sequelize model instance. This includes fields such as `email`, `role`, `totpSecret` (even if
    masked in the users list endpoint, it is unmasked here), `isActive`, `lastLoginIp`, and other stored columns. An attacker
    who completes a password reset for an account they control can inspect the full response to enumerate all user model fields
    and observe field presence/absence.'
  evidence_summary: '`routes/resetPassword.ts:44` passes the raw Sequelize `updatedUser` model to `res.json()` without field
    filtering.'
  impact_description: Password reset response leaks internal user model structure and potentially sensitive fields including
    TOTP secret status and last login IP.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: The users-list endpoint (`routes/authenticatedUsers.ts:26-28`) masks password and totpSecret, but this
    reset endpoint applies no such masking.
  mitigation_title: Filter password reset response to return only non-sensitive confirmation fields
  remediation:
    effort: Low
    steps:
    - 'Replace `res.json({ user: updatedUser })` at `routes/resetPassword.ts:44` with `res.json({ email: updatedUser.email
      })` or an explicit allowlist of safe fields.'
    - Apply the same field-masking pattern used in `routes/authenticatedUsers.ts:26-28` consistently across all user-returning
      endpoints.
    code_example: '```typescript

      // routes/resetPassword.ts — return only confirmation

      res.json({ email: updatedUser.email, message: ''Password updated successfully'' });

      ```'
    reference: CWE-200
