  title: Password Change Without Current Password — routes/changePassword.ts:39
  affected_parameter: current
  scenario: 'The GET /rest/user/change-password handler at routes/changePassword.ts:39 checks the current password only when
    the `current` query parameter is provided: `if (currentPassword && security.hash(currentPassword) !== loggedInUser.data.password)`.
    If `currentPassword` is absent (or sent as empty), the condition short-circuits and the password change proceeds without
    any current password check. An attacker who has obtained a victim''s JWT (via XSS, network interception, or the hardcoded
    key) can send `GET /rest/user/change-password?new=attacker123&repeat=attacker123` without `current`, and the victim''s
    password is changed. This locks the legitimate user out of their account.'
  evidence_summary: 'changePassword.ts:39: `if (currentPassword && ...)` — the boolean short-circuit means omitting `current`
    param skips the password verification entirely.'
  impact_description: An attacker with a stolen JWT can permanently change any user's password without knowing the current
    one, achieving full account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: JWT authentication is required (headers.authorization check at line 27). New password non-empty and repeat
    match are validated.
  mitigation_title: Make current password verification mandatory in changePassword() handler
  remediation:
    effort: Low
    steps:
    - 'Change the condition at changePassword.ts:39 to always require current password: remove the `currentPassword &&` prefix
      — `if (!currentPassword || security.hash(currentPassword) !== loggedInUser.data.password) { res.status(401).send(...);
      return }`'
    - Convert the endpoint from GET to POST or PUT so parameters are not logged in access logs
    - Invalidate the session after a successful password change to prevent session fixation
    code_example: "// routes/changePassword.ts — always require current password\nif (!currentPassword) {\n  res.status(401).send(res.__('Current\
      \ password is required.'))\n  return\n}\nif (security.hash(currentPassword) !== loggedInUser.data.password) {\n  res.status(401).send(res.__('Current\
