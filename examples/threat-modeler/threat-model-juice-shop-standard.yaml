- local_id: file-system-005
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-22
  title: Zip Slip Insufficient Path Traversal Guard — routes/fileUpload.ts:31
  affected_parameter: file (ZIP upload via POST /file-upload)
  scenario: 'extractZipBuffer at routes/fileUpload.ts:27-37 iterates ZIP entries and constructs absolutePath = path.resolve(''uploads/complaints/''
    + entry.path). The guard at line 33 checks absolutePath.includes(path.resolve(''.'')) — which passes for ANY path under
    the current working directory, including traversal targets such as ''uploads/complaints/../../ftp/legal.md'' resolving
    to ''<cwd>/ftp/legal.md''. The game-challenge code at line 32 confirms the intended exploit: it detects when absolutePath
    equals path.resolve(''ftp/legal.md''), proving the traversal succeeds. The file is then written via fs.createWriteStream
    at line 34 using the raw unvalidated ''uploads/complaints/'' + fileName path. POST /file-upload has no isAuthorized()
    guard (server.ts:309), so this is exploitable by unauthenticated attackers.'
  evidence_summary: routes/fileUpload.ts:32 contains a challenge trigger explicitly checking if the traversal reaches ftp/legal.md,
    confirming that the includes(path.resolve('.')) guard at line 33 fails to block paths resolving within the CWD tree; line
    34 writes the file using the unvalidated entry.path.
  impact_description: An unauthenticated attacker can overwrite any file under the application working directory — including
    route files, configuration, or startup scripts — enabling persistent code execution after application restart.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Forward slash check on the filename at a higher layer (fileServer.ts) applies only to FTP download, not
    to ZIP extraction. sanitize-filename is applied to uploaded filenames but not to ZIP entry paths inside the archive.
  mitigation_title: Enforce strict path containment for ZIP entry paths using path.resolve and startsWith
  remediation:
    effort: Low
    steps:
    - 'Replace the `absolutePath.includes(path.resolve(''.''))` check with a strict prefix guard: `const safeBase = path.resolve(''uploads/complaints'');
      if (!absolutePath.startsWith(safeBase + path.sep)) { entry.autodrain(); continue; }` — this rejects any entry whose
      resolved path escapes the complaints directory.'
    - Apply `sanitize-filename` (already imported via lib/insecurity.ts) to each `entry.path` before concatenation, and additionally
      strip any `..` path components.
    - Consider extracting ZIP files using a library with built-in Zip Slip protection such as `adm-zip` with path validation,
      or `@zip.js/zip.js` with an explicit destination prefix check.
    - Add an authentication guard to POST /file-upload (server.ts:309) so that only authenticated users can trigger ZIP extraction.
    code_example: "// routes/fileUpload.ts — fixed extractZipBuffer\nasync function extractZipBuffer (buffer: Buffer) {\n\
      \  const safeBase = path.resolve('uploads/complaints')\n  const directory = await unzipper.Open.buffer(buffer)\n  for\
      \ (const entry of directory.files) {\n    const absolutePath = path.resolve(safeBase, path.basename(entry.path))\n \
      \   if (!absolutePath.startsWith(safeBase + path.sep)) {\n      entry.autodrain()\n      continue\n    }\n    await\
      \ pipeline(entry.stream(), fs.createWriteStream(absolutePath))\n  }\n}"
    reference: CWE-22
