tier_root_causes:
  edge:
  - Missing output encoding allows stored and DOM-based XSS via user data
  - Token storage in localStorage exposes session tokens to script injection
  - Client-side-only authorization guards bypassable by direct URL navigation
  - OAuth implicit flow lacks PKCE and state parameter, enabling token hijack
  server:
  - Raw string interpolation in SQL and NoSQL queries across multiple routes
  - Committed RSA private key and weak MD5 hashing undermine all auth guarantees
  - Missing authentication and ownership checks on mutation endpoints
  - Absent rate limiting and audit logging on authentication and file-upload paths
  - JS sandbox escape via notevil allows arbitrary code exec from B2B input
  data:
  - SQLite accessed via string interpolation with no parameterized query layer
  - MarsDB allows $where operator with user-supplied JavaScript — remote code eval
  - No database-level audit logging; all access decisions enforced only in app layer
  - Mass-update vulnerability in NoSQL review routes permits overwriting all records
