      (it bundles the CLI) — remove the separate CLI install step
    - 'If a standalone CLI is required, download the specific versioned binary and verify its SHA-256 checksum before execution:
      `curl -sL https://cli-assets.heroku.com/heroku-linux-x64.tar.gz -o heroku.tgz && echo ''<expected-sha256>  heroku.tgz''
      | sha256sum -c`'
    - Pin the Heroku CLI version in CI by using the npm package `heroku` at a fixed version with `npm install -g heroku@<version>`
