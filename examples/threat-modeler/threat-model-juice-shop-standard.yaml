- local_id: rest-api-005
  threat_category_id: TH-09
  additional_categories: []
  stride: Repudiation
  cwe: CWE-778
  title: No Structured Security Audit Log for Authentication and Administrative Events
  affected_parameter: null
  scenario: 'The only server-side logging is morgan''s HTTP combined format written to logs/access.log (server.ts:338). This
    records HTTP method, URL, status, and IP but does not include: actor identity (user ID), action type (login-failure, admin-action,
    data-export), resource identifier, or outcome. An attacker who authenticates as admin, modifies products, exports all
    user data, and then deletes evidence can claim each action was unauthorized. Investigators cannot attribute actions to
    specific authenticated users because the JWT subject is never written to the log, and failed-login events are indistinguishable
    from generic 401 responses.'
  evidence_summary: server.ts:338 uses morgan('combined') as the sole logging mechanism; no security event journal records
    actor ID, action class, or resource for sensitive operations.
  impact_description: Security incidents cannot be investigated or attributed; compliance requirements (SOC2, PCI-DSS CC7.2)
    for security event logging are unmet.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: morgan combined-format HTTP access log at logs/access.log.
  mitigation_title: Add structured security audit log emitting actor-id, action, resource, and outcome for authentication
    and sensitive operations
  remediation:
    effort: Medium
    steps:
    - 'Create an `auditLog(event: { actor: string, action: string, resource: string, outcome: string, ip: string })` helper
      that writes structured JSON to a separate audit sink (e.g. append-only file, Splunk, CloudWatch Logs).'
    - Call it after every login (success and failure), password change, data export, admin route access, and token issuance.
