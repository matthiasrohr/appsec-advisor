- local_id: file-upload-002
  threat_category_id: TH-01
  additional_categories:
  - TH-17
  stride: Tampering
  cwe: CWE-611
  title: XML External Entity Injection (routes/fileUpload.ts:83)
  affected_parameter: file
  scenario: 'handleXmlUpload at fileUpload.ts:83 parses the uploaded file with `libxml.parseXml(data, { noblanks: true, noent:
    true, nocdata: true })`. The `noent: true` option instructs libxmljs2 to resolve external entity references during parsing.
    An attacker submits an XML file with a DOCTYPE declaring an external entity pointing to a sensitive file: `<!DOCTYPE foo
    [<!ENTITY xxe SYSTEM ''file:///etc/passwd''>]><foo>&xxe;</foo>`. libxmljs2 reads /etc/passwd into the entity value, the
    parsed document''s text content becomes the file contents, and line 87 returns `utils.trunc(xmlString, 400)` in the HTTP
    410 error response body. This gives the attacker the first 400 characters of any file readable by the Node.js process.'
  evidence_summary: 'fileUpload.ts:83 passes `{ noent: true }` to libxml.parseXml, enabling external entity resolution; line
    87 includes the parsed XML body in the HTTP error response.'
  impact_description: An attacker reads arbitrary local files (private keys, /etc/passwd, .env, application source) directly
    from the 410 HTTP response body, up to 400 characters per request.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: vm.createContext sandbox wrapping the parseXml call provides a 2000ms execution timeout but does not
    prevent entity resolution which occurs inside libxmljs2 native code before the script timeout can fire.
  mitigation_title: Disable external entity resolution in libxmljs2 by removing noent option
  remediation:
    effort: Low
    steps:
    - 'Change the parseXml call at fileUpload.ts:83 from `{ noblanks: true, noent: true, nocdata: true }` to `{ noblanks:
      true, noent: false, nocdata: true }` to disable entity expansion.'
    - 'Additionally set `{ nonet: true }` to prevent network-based XXE (SSRF via DTD fetch).'
    - Strip the inline DOCTYPE block from accepted XML before parsing, or use an XML schema allowlist (whitelist-based element
      validation) to reject unexpected structures.
    code_example: "// fileUpload.ts:83 — before\nconst xmlDoc = vm.runInContext(\n  'libxml.parseXml(data, { noblanks: true,\
      \ noent: true, nocdata: true })',\n  sandbox, { timeout: 2000 })\n\n// after\nconst xmlDoc = vm.runInContext(\n  'libxml.parseXml(data,\
      \ { noblanks: true, noent: false, nonet: true, nocdata: true })',\n  sandbox, { timeout: 2000 })"
    reference: CWE-611
  evidence:
  - file: routes/fileUpload.ts
    line: 83
