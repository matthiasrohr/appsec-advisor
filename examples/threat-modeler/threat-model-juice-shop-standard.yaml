- id: M-007
  title: Use parameterized database queries
  kind: fix
  priority: P1
  severity: Critical
  effort: Low
  threat_ids:
  - T-002
  how: 'Replace `models.sequelize.query(template-literal)` at `routes/login.ts:34` with `UserModel.findOne({ where: { email:
    req.body.email, password: security.hash(req.body.password), deletedAt: null } })` using Sequelize''s ORM methods which
    bind parameters safely. If raw SQL is required, use named-parameter binding: `models.sequelize.query(''SELECT * FROM Users
    WHERE email = :email AND password = :password AND deletedAt IS NULL'', { replacements: { email: req.body.email, password:
    security.hash(req.body.password) }, model: UserModel, plain: true })`. Add an integration test that submits `'' OR ''1''=''1`
    as the email value and asserts HTTP 401 is returned.'
