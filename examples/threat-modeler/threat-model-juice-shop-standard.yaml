- local_id: data-layer-006
  threat_category_id: TH-08
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-330
  title: Deterministic deluxeToken derivation enables unauthorized — models/user.ts:101
  affected_parameter: deluxeToken
  scenario: The `deluxeToken` field is computed deterministically from the user's email address by `security.deluxeToken(email)`
    (called in `data/datacreator.ts:140`). The algorithm is open-source and available in `lib/insecurity.ts`. Any customer-tier
    user can compute their own deluxeToken offline by running the same function with their email, then submit it to any endpoint
    that grants deluxe privileges in exchange for a valid deluxeToken value. Because the token is stored as a `DataTypes.STRING`
    (plaintext, `models/user.ts:101-103`) and compared by value, possession of the computed token is sufficient to claim deluxe
    access — no server-side ownership challenge exists at the data layer.
  evidence_summary: '`deluxeToken` is a DataTypes.STRING field stored without encryption; its value is deterministically derived
    from the user''s email via a public algorithm.'
  impact_description: Any registered user can self-grant deluxe-tier privileges by computing their own deluxeToken, bypassing
    the paid upgrade path.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None at the data layer — the model stores the token without any integrity binding to the user's actual
    subscription state.
  mitigation_title: Replace deterministic deluxeToken with a cryptographically random secret stored as a non-derivable token
  remediation:
    effort: Medium
    steps:
    - Replace `security.deluxeToken(email)` with `crypto.randomBytes(32).toString('hex')` generated at account creation and
      stored in the DB as the user's deluxe entitlement token.
    - Remove the public derivation algorithm from `lib/insecurity.ts`; the token must be unguessable and non-reproducible
      from public data.
    - At the route layer, verify the deluxeToken by comparing against the DB record — not by re-deriving it — and invalidate
      the token when the subscription lapses.
    - Add a `deluxeExpiresAt` timestamp field to `UserModel` so token validity is time-bounded independently of the token
      value.
    code_example: '// data/datacreator.ts — secure token generation

      import { randomBytes } from ''crypto''

      const deluxeToken = role === security.roles.deluxe ? randomBytes(32).toString(''hex'') : '''''
    reference: CWE-330
    blueprint: null
