  title: Zip Slip Path Traversal — routes/fileUpload.ts:34
  affected_parameter: multipart file upload (.zip)
  scenario: The Zip extraction handler at routes/fileUpload.ts:27-36 extracts each archive entry using `entry.path` as a relative
    path component appended to `uploads/complaints/`. The traversal guard at line 33 checks `absolutePath.includes(path.resolve('.'))`
    — but this check passes for paths that BEGIN with the application root, including paths like `../../ftp/legal.md` if the
    resolved string still contains the working directory prefix (it does, because `path.resolve('uploads/complaints/../../../ftp/legal.md')`
    begins with the process working directory). An attacker crafts a zip containing an entry named `../../../ftp/legal.md`
    — the guard passes and the entry is written to `ftp/legal.md`, overwriting a public FTP file.
  evidence_summary: '`absolutePath.includes(path.resolve(''.''))` at fileUpload.ts:33 is an insufficient containment check
    because any path starting with the CWD passes, including traversal paths that resolve outside `uploads/complaints/`.'
  impact_description: Attacker overwrites arbitrary files within the application directory tree, potentially replacing served
    files or configuration.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Containment check using `absolutePath.includes(path.resolve('.'))` — insufficient, does not verify the
    path stays within `uploads/complaints/`.
  mitigation_title: Replace the Zip Slip guard with a strict prefix check against the intended upload directory
  remediation:
    effort: Low
    steps:
    - 'Replace the guard at fileUpload.ts:33 with: `if (!absolutePath.startsWith(path.resolve(''uploads/complaints'') + path.sep))`
      to strictly verify the resolved path is inside the target directory.'
    - Sanitize the entry filename by calling `path.basename(entry.path)` before joining — this strips any directory components
      including `..`.
    - Consider using a library like `unzip-stream` with a destination-path validator, or switch to `yauzl` which does not
      follow path traversal by default.
