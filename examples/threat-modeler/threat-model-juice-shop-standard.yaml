  title: NoSQL Mass-Update — routes/updateProductReviews.ts:18
  affected_parameter: id (req.body.id)
  scenario: 'The `updateProductReviews` handler uses `req.body.id` directly as the MarsDB selector and sets `{ multi: true
    }`. An authenticated attacker submits a PATCH request with body `{ "id": { "$gt": "" }, "message": "Hacked" }`. MarsDB
    interprets `{ $gt: "" }` as a comparison operator that matches every document. Because `multi: true` is set, the update
    modifies ALL reviews in `reviewsCollection`, replacing every `message` field with the attacker-controlled string. No ownership
    check confirms that the caller authored the matched documents.'
  evidence_summary: '`db.reviewsCollection.update({ _id: req.body.id }, { $set: { message: req.body.message } }, { multi:
    true })` at line 17-20 passes `req.body.id` unvalidated as a selector with multi-document update enabled.'
  impact_description: A single authenticated request can overwrite every product review in the store, causing mass data tampering
    that cannot be reversed without a backup.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Requires a valid authentication token (JWT). No input validation on `req.body.id` type or structure.
  mitigation_title: Enforce string-type _id validation and add author ownership check before multi-document review update
  remediation:
    effort: Medium
    steps:
    - 'Validate that `req.body.id` is a non-empty string (not an object) before using it as a selector: `if (typeof req.body.id
      !== ''string'') return res.status(400).json({ error: ''Invalid id'' })`.'
    - 'Add an ownership check: include `{ author: user.data.email }` in the selector so only the authenticated user''s own
      reviews are matched.'
    - 'Remove `{ multi: true }` unless a legitimate bulk-edit workflow requires it; a normal user editing their own review
      should match exactly one document.'
    - 'Sanitise `req.body.message` to prevent stored XSS: validate maximum length and strip HTML.'
    code_example: "// Before (vulnerable)\ndb.reviewsCollection.update(\n  { _id: req.body.id },\n  { $set: { message: req.body.message\
