  cwe: CWE-1357
  title: Pull_request_target with ORG_ADMIN_TOKEN — pr-compliance.yml:4
  affected_parameter: pull_request_target trigger; ORG_ADMIN_…
  scenario: '`pr-compliance.yml` uses the `pull_request_target` trigger (line 4), which runs in the context of the BASE repository
    even for PRs from external forks, providing the workflow with access to all repository secrets including `ORG_ADMIN_TOKEN`
    (line 438). The `ORG_ADMIN_TOKEN` is used to call `PUT /orgs/juice-shop/blocks/{username}` to block GitHub users. The
    current implementation does not check out or run code from the PR — it only reads PR metadata via the GitHub API — but
    `pull_request_target` is inherently dangerous because future workflow modifications could introduce `actions/checkout@ref:
    ${{ github.event.pull_request.head.sha }}` or `run: node ${{ steps.script.outputs.file }}`, enabling a fork PR to trigger
    code execution with secret access. The `ORG_ADMIN_TOKEN` secret present in this workflow would allow an attacker who achieves
    code execution in this context to take administrative actions on the juice-shop GitHub organization.'
  evidence_summary: '`pr-compliance.yml` line 4 declares `pull_request_target` — a trigger that grants fork PRs access to
    base-repo secrets — and line 438 uses `ORG_ADMIN_TOKEN` (org admin scope), making this a high-privilege attack surface
    if the workflow is ever modified to execute PR-provided code.'
  impact_description: Exploiting `pull_request_target` with a checkout of fork code would give an external contributor access
    to `ORG_ADMIN_TOKEN`, enabling organization-wide administrative actions including member management, repo creation, and
    webhook manipulation.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 'The workflow does not currently check out or execute code from the PR head. It reads PR data only via
    `github.rest.*` API calls. Permissions are scoped to `pull-requests: write` and `issues: write` at the workflow level.'
  mitigation_title: Add explicit guard against checkout of PR head code in pull_request_target workflow
  remediation:
    effort: Medium
    steps:
    - 'Add a comment block at the top of pr-compliance.yml documenting the security constraint: ''SECURITY: Never add actions/checkout
      with ref: github.event.pull_request.head.sha or run code from the PR in this workflow — pull_request_target gives fork
      PRs access to secrets.'''
    - Move the `ORG_ADMIN_TOKEN` usage to a separate workflow triggered via `workflow_run` (not `pull_request_target`) that
      runs only after the compliant `pull_request` (non-target) workflow completes successfully. This ensures the admin token
      is never in the same execution context as external fork code.
    - Add a CodeQL or Semgrep rule to detect `pull_request_target` combined with `checkout` using `head.sha` ref — enforce
      via the existing CodeQL workflow.
    - Rotate `ORG_ADMIN_TOKEN` to have the minimum required scope (just `org:block`) rather than broad org admin permissions.
    code_example: "# Safe pattern: separate workflow for admin actions\n# admin-actions.yml (triggered by workflow_run, never\
      \ by pull_request_target):\non:\n  workflow_run:\n    workflows: [\"PR Compliance Check\"]\n    types: [completed]\n\
      \npermissions:\n  contents: read  # ORG_ADMIN_TOKEN used internally, not GITHUB_TOKEN"
    reference: CWE-1357
  evidence:
  - file: .github/workflows/pr-compliance.yml
    line: 4
  evidence_check: verified
