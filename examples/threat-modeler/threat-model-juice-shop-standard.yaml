  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:23
  affected_parameter: socket connection
  scenario: 'The Socket.IO server at `registerWebsocketEvents.ts:20` registers an `io.on(''connection'')` handler with no
    preceding `io.use()` authentication middleware. Any external client that can reach the server''s HTTP port can upgrade
    to a WebSocket connection without supplying a JWT or session cookie. The attacker connects, receives all pending challenge-solved
    notifications broadcast to every new socket (line 29-30), and can emit any of the three challenge-verification events.
    Because the CORS configuration (`origin: ''http://localhost:4200''`) only restricts browser-originated HTTP polling —
    not raw WebSocket frames or non-browser tools — this protection does not close the unauthenticated connection gap.'
  evidence_summary: '`io.on(''connection'', (socket) => { ... })` at line 23 executes without any prior `io.use()` call in
    the same file or in the server bootstrap, leaving the upgrade path unguarded.'
  impact_description: Unauthenticated remote clients can interact with all WebSocket event handlers, receive challenge notifications,
    and mutate server-side state without possessing a valid session.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin locked to `http://localhost:4200` (line 20) — partially limits browser-originated cross-origin
    polling but does not prevent raw WebSocket connections or tool-based clients.
  mitigation_title: Add Socket.IO authentication middleware that validates JWT on every connection upgrade
  remediation:
    effort: Medium
    steps:
    - Add an `io.use()` middleware before the `io.on('connection')` handler that reads the handshake token (e.g. `socket.handshake.auth.token`
      or `Authorization` header from the upgrade request) and calls `jwt.verify()` against the application's public key.
    - Reject connections that lack a valid token by calling `next(new Error('Authentication required'))` in the middleware;
      Socket.IO will close the socket with an error event the client can handle.
    - 'Ensure the frontend passes the JWT in the Socket.IO connect options: `io({ auth: { token: localStorage.getItem(''token'')
      } })` — or better, read from an httpOnly cookie via a BFF proxy.'
    code_example: "```typescript\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  if (!token)\
      \ return next(new Error('Authentication required'))\n  jwt.verify(token, security.publicKey, (err, decoded) => {\n \
      \   if (err) return next(new Error('Invalid token'))\n    socket.data.user = decoded\n    next()\n  })\n})\n```"
    reference: CWE-306
    blueprint: null
