  title: No database-level access separation single connection for all privilege levels
  affected_parameter: null
  scenario: 'All application code — customer routes, admin routes, background jobs — shares a single Sequelize connection
    with implicit SQLite owner-level access (SQLite has no user/role system). There is no database-level enforcement of privilege
    separation: a compromised customer session that achieves RCE or exploits a second-order SQL injection can issue arbitrary
    DML (UPDATE Users SET role=''admin'' WHERE id=<victim>) without hitting any DB-level authorization check. The application
    relies entirely on application-layer guards (`security.isAdmin()`, JWT role claims) for access control. If those guards
    are bypassed at the application layer, no compensating DB control exists.'
  evidence_summary: models/index.ts:32-44 initializes a single Sequelize instance with SQLite file access — no per-role connection
    strings, no Row-Level Security, no view-based access separation — used by all route handlers regardless of the caller's
    privilege level.
  impact_description: Any application-layer privilege bypass (SQLi, JWT forgery, IDOR) translates directly to unrestricted
    DB write access — no defense-in-depth layer exists at the data tier.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Application-layer role checks only (security.isAdmin(), JWT role claims); no DB-layer enforcement.
  mitigation_title: Implement read-only DB connections for query-only endpoints and view-based access separation
