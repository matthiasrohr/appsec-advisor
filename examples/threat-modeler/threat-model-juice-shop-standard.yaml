  how: 'Remove the `password = btoa(email.split('''').reverse().join(''''))` pattern entirely. OAuth users must never have
    a password-based login path; the server should mark OAuth-sourced accounts with an `oauth_only` flag and reject password
    login attempts for them. Replace the client-side Google profile fetch (`UserService.oauthLogin`) with a server-side authorization
    code exchange: the SPA sends only the authorization code to the backend (`POST /rest/oauth/callback`), which exchanges
    it with Google''s token endpoint using the client secret held server-side and issues a first-party JWT. On the backend,
    create OAuth-provisioned user records with a random high-entropy password field (e.g. `crypto.randomBytes(32).toString(''hex'')`)
    that is never exposed or accepted over the login endpoint.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
