    argument values (customer order IDs), `searchProducts` queries, and `generateCoupon` calls with their discount values.
    This is an inverted privilege guard: the debug feature is visible to non-admins instead of admins. The role comparison
    at line 225 should be `role === roles.admin`, not `role !== roles.admin`.'
