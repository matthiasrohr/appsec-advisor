  title: Missing Audit Logging for B2B Order Submissions — routes/b2bOrder.ts:24
  affected_parameter: null
  scenario: '`routes/b2bOrder.ts` emits no structured audit log event on the order-accepted path (line 24) or on the error
    paths (lines 29, 33). When an attacker exploits the `alg:none` JWT bypass to submit fraudulent orders, the event is indistinguishable
    from legitimate traffic in any log stream: the JWT payload (claimed identity), the submitted `orderLinesData`, and the
    generated `orderNo` are not recorded together. Forensic reconstruction of a B2B order-fraud incident is impossible without
    these records. In a PCI-DSS scope, order-related API calls must be attributable to authenticated identities in a tamper-evident
    log.'
  evidence_summary: '`routes/b2bOrder.ts:24` calls `res.json(...)` on the success path with no preceding structured log statement
    capturing the JWT `sub`/`email`, `cid`, `orderNo`, or `orderLinesData` hash.'
  impact_description: Order fraud via JWT bypass cannot be detected or attributed post-hoc; PCI-DSS requirement 10.2 (logging
    of all access to cardholder-data-adjacent APIs) is unmet.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Express request logging captures HTTP method, path, status, and IP. No application-level audit event
    captures JWT identity, order parameters, or sandbox invocation.
  mitigation_title: Emit a structured audit log entry for every B2B order submission and sandbox invocation
  remediation:
    effort: Low
    steps:
    - 'Before `res.json(...)` on the success path, emit a structured JSON log entry with fields: `event: ''b2b_order_submitted''`,
      `actor: req.user?.email`, `cid: body.cid`, `orderNo`, `orderLinesDataHash: crypto.createHash(''sha256'').update(orderLinesData).digest(''hex'')`,
      `timestamp: new Date().toISOString()`.'
    - 'On the sandbox error path (line 33), log `event: ''b2b_order_sandbox_error''` with the same actor and `errorMessage:
      utils.getErrorMessage(err)` — do not log the raw error object (avoids stack trace leakage) but do record that a sandbox
      exception occurred for this identity.'
    - Route logs to an append-only sink (CloudWatch Logs, Splunk, or a WORM-compliant log destination) to meet PCI-DSS requirement
      10.5.
    code_example: "// In b2bOrder handler, success path:\nconst orderNo = uniqueOrderNumber()\nconsole.log(JSON.stringify({\n\
      \  event: 'b2b_order_submitted',\n  actor: (req as any).user?.email ?? 'unknown',\n  cid: body.cid,\n  orderNo,\n  orderLinesDataHash:\
      \ require('crypto')\n    .createHash('sha256').update(orderLinesData).digest('hex'),\n  timestamp: new Date().toISOString()\n\
      }))\nres.json({ cid: body.cid, orderNo, paymentDue: dateTwoWeeksFromNow() })"
    reference: CWE-778
