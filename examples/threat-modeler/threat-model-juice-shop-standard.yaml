  cwe: CWE-598
  title: OAuth Implicit Flow with missing CSRF state — login.component.ts:148
  affected_parameter: response_type, state
  scenario: 'An attacker navigates the victim to a crafted URL that initiates a Google OAuth exchange. Because `googleLogin()`
    passes `response_type=token` (implicit grant) without a `state` parameter, the IdP returns an `access_token` directly
    in the URL fragment (`#access_token=…`). Three consequences follow: (1) the token appears in browser history, server logs
    of resources loaded by the callback page, and Referer headers; (2) without `state`, the SPA cannot distinguish a legitimate
    redirect from an attacker-injected one, enabling login-CSRF — the attacker can force the victim into an attacker-controlled
    Google session; (3) the implicit grant is deprecated by OAuth 2.1 because bearer tokens in URL fragments provide weaker
    confidentiality guarantees than code flows with PKCE.'
  evidence_summary: '`googleLogin()` at login.component.ts:148 constructs the authorization URL with `response_type=token`
    and no `state` parameter, producing an implicit grant request.'
  impact_description: Victim session can be hijacked by an attacker who controls the post-auth landing page or can read the
    browser history/logs containing the URL fragment.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no state parameter generated; implicit flow not gated by PKCE.
  mitigation_title: Replace OAuth implicit flow with authorization code + PKCE and add state validation in login.component.ts
  remediation:
    effort: Medium
    steps:
    - Change `response_type=token` to `response_type=code` and add `code_challenge_method=S256` with a per-request PKCE verifier
      generated via `crypto.getRandomValues()`.
    - Generate a cryptographically random `state` value (32+ bytes, base64url-encoded) before redirecting; store it in sessionStorage;
      validate it matches when the redirect returns before consuming the authorization code.
    - Exchange the authorization code for tokens server-side so that the access/refresh tokens never appear in the browser
      URL or history.
    - Update `oauthMatcher` (app.routing.ts:286) to check for `?code=` instead of `#access_token=` once the flow is switched
      to authorization code.
    code_example: "// Before (implicit — INSECURE)\nwindow.location.replace(`${oauthProviderUrl}?client_id=${clientId}&response_type=token&scope=email&redirect_uri=${redirectUri}`)\n\
      \n// After (code + PKCE)\nconst verifier = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)))\nconst challenge\
      \ = base64urlEncode(await crypto.subtle.digest('SHA-256', encoder.encode(verifier)))\nsessionStorage.setItem('pkce_verifier',\
      \ verifier)\nconst state = base64urlEncode(crypto.getRandomValues(new Uint8Array(16)))\nsessionStorage.setItem('oauth_state',\
      \ state)\nwindow.location.replace(\n  `${oauthProviderUrl}?client_id=${clientId}&response_type=code` +\n  `&scope=email&redirect_uri=${redirectUri}`\
      \ +\n  `&code_challenge=${challenge}&code_challenge_method=S256&state=${state}`\n)"
    reference: CWE-598
  evidence:
