  remediation:
    effort: Low
    steps:
    - Change the `discount` schema at `chat.ts:179` to `z.number().int().min(1).max(10)` to enforce the policy at the schema
      layer, causing the AI SDK to reject out-of-range values before `execute` is called.
    - 'Add an explicit range check inside `execute`: `if (discount > 10) return { error: ''Discount exceeds policy maximum''
      }` as a defense-in-depth guard.'
    - Consider requiring the `orderId` parameter in `generateCoupon` and verifying order ownership and damage status server-side
      before generating the coupon, rather than relying on LLM judgment.
    - Remove the 15% courtesy discount from the system prompt entirely (see chatbot-llm-005) — its existence in the prompt
      provides an injection vector to claim exactly that discount.
    code_example: "// chat.ts — generateCoupon tool schema fix\ngenerateCoupon: tool({\n  description: 'Generate a discount\
      \ coupon. Only when coupon policy is fully met.',\n  inputSchema: z.object({\n    discount: z.number().int().min(1).max(10)\n\
      \      .describe('Discount percentage (1-10 only)')\n  }),\n  execute: async ({ discount }) => {\n    if (discount >\
      \ 10) return { error: 'Policy violation: discount cap exceeded' }\n    const couponCode = security.generateCoupon(discount)\n\
      \    return { couponCode, discount }\n  }\n})"
