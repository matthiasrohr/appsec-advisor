- local_id: sqlite-db-004
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Weak password hashing in Users table (models/user.ts:77)
  affected_parameter: password
  scenario: All user passwords are stored as unsalted MD5 hashes via `security.hash(clearTextPassword)` set on the Sequelize
    User model at models/user.ts:77. MD5 is a general-purpose hash with no work factor, no salt, and GPU-crackable throughput
    exceeding 10 billion hashes/second. If the database file is exfiltrated (via SQL injection reading the Users table, or
    direct file system access to data/juiceshop.sqlite), all password hashes crack in seconds against common wordlists. The
    login query also compares the submitted password's MD5 hash against the stored value, meaning the hash is the authentication
    token — an attacker who reads the DB can replay hashes directly into a crafted raw query.
  evidence_summary: models/user.ts:77 calls `security.hash(clearTextPassword)` which is confirmed to use MD5, storing unsalted
    MD5 digests as the password field in the Users table.
  impact_description: All user plaintext passwords recoverable from a database dump; credential reuse attacks against external
    services become viable for every user.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — MD5 provides no meaningful protection against offline cracking.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2 in the User model
  remediation:
    effort: Medium
    steps:
    - Replace `security.hash()` in models/user.ts:77 with `bcrypt.hash(clearTextPassword, 12)` (or `argon2.hash(clearTextPassword)`
      with Argon2id). Update lib/insecurity.ts to export the new hash/compare functions.
    - Update the login query at routes/login.ts to use `bcrypt.compare(req.body.password, user.password)` after fetching the
      user by email only — bcrypt compare must happen in application code, not the SQL WHERE clause.
    - 'Migrate existing MD5 hashes: on next successful login, detect the MD5 format and re-hash with bcrypt, storing the new
      hash. This provides transparent migration without forcing password resets.'
    - Add a migration script that flags all users with legacy MD5 hashes for forced password reset if silent migration is
      not acceptable.
    code_example: "// lib/insecurity.ts replacement:\nimport bcrypt from 'bcrypt'\nconst BCRYPT_ROUNDS = 12\nexport const\
      \ hashPassword = async (plain: string) => bcrypt.hash(plain, BCRYPT_ROUNDS)\nexport const verifyPassword = async (plain:\
      \ string, stored: string) => bcrypt.compare(plain, stored)\n\n// models/user.ts set hook:\nset async (clearText: string)\
      \ {\n  this.setDataValue('password', await hashPassword(clearText))\n}"
