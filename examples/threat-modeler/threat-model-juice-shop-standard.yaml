- local_id: b2b-api-005
  threat_category_id: TH-17
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-209
  title: Stack Trace Disclosure — server.ts:682
  affected_parameter: null
  scenario: When routes/b2bOrder.ts calls next(err) at line 29 (timeout) or line 33 (eval error), the error propagates to
    the global error handler at server.ts:682 which uses the errorhandler npm package. This package is a development-only
    middleware that responds with the full error stack trace, Node.js internals, library version strings, and source file
    paths in the HTTP response body (and HTML-formatted for browsers). There is no NODE_ENV guard around the errorhandler()
    registration. An attacker who intentionally triggers a non-timeout eval error (e.g., a syntax error in orderLinesData)
    receives a stack trace revealing internal file layout, installed package versions, and the notevil call stack.
  evidence_summary: server.ts:682 registers `app.use(errorhandler())` without an environment guard; b2bOrder.ts:33 passes
    eval errors directly to next(err) which routes to this handler.
  impact_description: An attacker learns the internal directory structure, Node.js version, installed package list and versions,
    and call-stack layout from a single crafted request — accelerating reconnaissance for subsequent exploits.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — errorhandler is always active regardless of environment.
  mitigation_title: Gate errorhandler on NODE_ENV=development and add a sanitized production error handler
  remediation:
    effort: Low
    steps:
    - 'Wrap the errorhandler() registration in server.ts with a NODE_ENV check: `if (process.env.NODE_ENV !== ''production'')
      app.use(errorhandler())`.'
    - 'Add a production-safe error handler after the environment gate that returns a generic JSON error `{ error: ''Internal
      server error'' }` with HTTP 500, logging the full error server-side only.'
    - 'In routes/b2bOrder.ts, sanitize the error passed to next() for known eval errors: return a fixed message rather than
      the raw vm/notevil exception.'
    code_example: "// server.ts — replace unconditional errorhandler\nif (process.env.NODE_ENV !== 'production') {\n  app.use(errorhandler());\n\
      } else {\n  app.use((err: Error, req: Request, res: Response, _next: NextFunction) => {\n    logger.error({ err }, 'Unhandled\
      \ error');\n    res.status(500).json({ error: 'Internal server error' });\n  });\n}"
    reference: CWE-209
