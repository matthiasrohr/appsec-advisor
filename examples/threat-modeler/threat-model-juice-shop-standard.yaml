  cwe: CWE-312
  title: TOTP Secret Stored Unencrypted in Database — models/user.ts:112
  affected_parameter: totpSecret
  scenario: '`models/user.ts:112` defines `totpSecret` as a plain `DataTypes.STRING` column with no encryption, no field-level
    protection, and no masking at the model layer. The `routes/authenticatedUsers.ts:26` endpoint does mask the value in its
    response (`user.totpSecret?.replace(/./g, ''*'')`), but the raw value in the `Users` table is readable by anyone with
    database access — including read replicas, backup files, or any internal service with a DB connection. An attacker who
    obtains a DB dump (via the SQL injection on the login route) recovers all TOTP secrets and can generate valid one-time
    codes, defeating the second factor for all users who have it enabled.'
  evidence_summary: '`models/user.ts:112` stores `totpSecret` as `DataTypes.STRING` without field-level encryption; the SQLi
    at `routes/login.ts:34` can exfiltrate the table.'
  impact_description: Recovery of TOTP secrets from a database dump allows permanent bypass of the second authentication factor
    for all affected accounts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Response masking in authenticatedUsers.ts:26; TOTP verification enforced before full session issuance
  mitigation_title: Encrypt TOTP secrets at rest using field-level encryption before storing in the Users table
  remediation:
    effort: Medium
    steps:
    - Add a field-level encryption helper (e.g. `@sequelize-aes-256-gcm` or a custom AES-256-GCM wrapper) to the `totpSecret`
      column setter and getter in `models/user.ts`.
    - Derive the encryption key from a secret stored in the deployment environment, not in source code.
    - Re-encrypt any existing `totpSecret` values with a migration script after deploying the new model.
    - Ensure the encryption key is separate from the JWT signing key and rotated independently.
    code_example: "// models/user.ts — setter/getter pattern\ntotpSecret: {\n  type: DataTypes.STRING,\n  get() { return decrypt(this.getDataValue('totpSecret'),\
      \ process.env.TOTP_ENC_KEY) },\n  set(value: string) { this.setDataValue('totpSecret', encrypt(value, process.env.TOTP_ENC_KEY))\
      \ }\n}"
    reference: CWE-312
    blueprint: null
