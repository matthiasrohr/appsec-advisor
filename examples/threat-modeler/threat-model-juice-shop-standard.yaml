- local_id: data-persistence-006
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-312
  title: TOTP secret stored in plaintext — models/user.ts:113
  affected_parameter: totpSecret
  scenario: The `User.totpSecret` field at `models/user.ts:113` is declared as `DataTypes.STRING` with no encryption setter
    or column-level protection. TOTP secrets are long-lived symmetric keys used to generate time-based one-time passwords.
    Storing them in plaintext means that any database read exposure — SQLi, path traversal to `data/juiceshop.sqlite`, or
    a compromised backup — allows an attacker to clone the TOTP credential for every 2FA-enrolled user, permanently bypassing
    multi-factor authentication. Unlike passwords, TOTP secrets cannot be rotated transparently; users would need to re-enroll
    their authenticator apps after a breach.
  evidence_summary: '`User.totpSecret` at `models/user.ts:113` uses `DataTypes.STRING` with no transform; the raw TOTP seed
    bytes are stored in cleartext.'
  impact_description: Database read exposure allows permanent MFA bypass for all enrolled users by cloning their TOTP seeds
    into an authenticator app.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — the field has a default empty string but no encryption or access restriction.
  mitigation_title: Encrypt TOTP secrets at rest using application-layer AES-256-GCM before persistence
  remediation:
    effort: Medium
    steps:
    - Add a Sequelize `beforeCreate`/`beforeUpdate` hook in `models/user.ts` that encrypts `totpSecret` with AES-256-GCM using
      a key stored in `process.env.TOTP_ENCRYPTION_KEY` (never in source code).
    - Add an `afterFind` hook that decrypts `totpSecret` in-memory only when needed (e.g., at TOTP verification time), and
      never serializes the decrypted value to API responses.
    - Change `DataTypes.STRING` to `DataTypes.BLOB` to store the encrypted bytes without charset conversion ambiguity.
    - Rotate the encryption key periodically; on key rotation, decrypt all secrets with the old key and re-encrypt with the
      new key as a migration job.
    code_example: "// models/user.ts — encrypt totpSecret before persistence\nimport crypto from 'crypto'\nconst key = Buffer.from(process.env.TOTP_ENCRYPTION_KEY!,\
      \ 'hex')\nUser.addHook('beforeCreate', (user: User) => {\n  if (user.totpSecret) {\n    const iv = crypto.randomBytes(12)\n\
      \    const cipher = crypto.createCipheriv('aes-256-gcm', key, iv)\n    const enc = Buffer.concat([cipher.update(user.totpSecret,\
      \ 'utf8'), cipher.final()])\n    user.totpSecret = iv.toString('hex') + ':' + enc.toString('hex') + ':' + cipher.getAuthTag().toString('hex')\n\
      \  }\n})"
    reference: CWE-312
  evidence:
