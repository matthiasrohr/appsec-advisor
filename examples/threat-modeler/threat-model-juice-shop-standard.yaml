    (IAC-050), so npm resolves the latest satisfying semver at install time. Any dependency that reaches the runner — whether
    via a malicious publish, a dependency-confusion attack, or a compromised transitive dep — can execute arbitrary code in
    its `postinstall` script. The application''s own `package.json:56` postinstall script (`cd frontend && npm install &&
    cd .. && npm run build:frontend`) also executes during these jobs, further widening the attack surface to nested `npm
    install` calls in the frontend directory.'
