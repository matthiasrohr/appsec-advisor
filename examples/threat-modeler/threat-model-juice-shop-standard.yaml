    only
  remediation:
    effort: Low
    steps:
    - 'Add a top-level `permissions: read-all` (or `permissions: {}`) to each workflow lacking one, then add job-level overrides
      granting only required scopes (e.g., `contents: write` only for the docker push job, `packages: write` only for ghcr.io
      pushes).'
    - 'For frontend-bundle-analysis.yml, scope the token used in `git push origin master` to `contents: write` at job scope
      only, and add a required status check or environment gate before that step runs.'
