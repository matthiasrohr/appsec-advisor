  stride: Elevation of Privilege
  cwe: CWE-1357
  title: 'Missing permissions: Block Allows Default Write-All GITHUB_TOKEN — ci.yml:1'
  affected_parameter: GITHUB_TOKEN permissions
  scenario: 'Thirteen of the sixteen workflows — including `ci.yml`, `release.yml`, `lint-fixer.yml`, `rebase.yml`, `image_actions.yml`,
    `zap_scan.yml`, and all five `update-*` workflows — have no top-level `permissions:` key. On repositories where the organization
    or repository default has not been narrowed to `contents: read`, the implicit `GITHUB_TOKEN` inherits **write access to
    every scope**: `contents`, `packages`, `deployments`, `issues`, `pull-requests`, `actions`, and `security-events`. A compromised
    step anywhere in these workflows — a malicious npm postinstall hook, a backdoored unpinned action, or a workflow-injection
    payload — gains the full write-all token, enabling it to push commits to protected branches, create releases, delete workflow
    runs to erase evidence, or access GitHub Packages. The `ci.yml` `docker` and `heroku` jobs additionally consume `DOCKERHUB_TOKEN`
    and `HEROKU_API_KEY` secrets; a GITHUB_TOKEN escalation in an adjacent step on the same runner shares the same secret
    environment.'
  evidence_summary: '`ci.yml`, `release.yml`, `lint-fixer.yml`, `rebase.yml`, and 9 other workflows have no `permissions:`
    key at the workflow or job level. Only `lock.yml` and `pr-compliance.yml` declare explicit permissions; `codeql-analysis.yml`
    declares them per-job.'
  impact_description: Compromised CI step writes malicious code to protected branches or escalates to publish a backdoored
    release under the project's own identity.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: 'The `pr-compliance.yml` (pull_request_target) and `lock.yml` workflows explicitly declare permissions.
    The `codeql-analysis.yml` analyze job is scoped to `contents: read, security-events: write`.'
  mitigation_title: 'Add `permissions: read-all` default at org level and declare explicit write scopes per workflow'
  remediation:
    effort: Medium
    steps:
    - In GitHub org Settings → Actions → General → Workflow permissions, set the default to **'Read repository contents and
      packages permissions'** (read-only). This sets the baseline for all repos in the org.
    - 'Add a top-level `permissions:` block to every workflow file that currently lacks one: `permissions: {}` (deny all)
      followed by job-level overrides for only the scopes that job requires.'
    - 'For `ci.yml` `docker` job: `permissions: contents: read` is sufficient (DOCKERHUB_TOKEN is an explicit secret, not
      GITHUB_TOKEN).'
    - 'For `release.yml` `package` job: `permissions: contents: write` to attach assets to the GitHub Release.'
    - 'For `lint-fixer.yml`: `permissions: contents: write` to allow the auto-commit action to push.'
    - 'For `rebase.yml`: `permissions: pull-requests: write, contents: write`.'
    - Validate permissions using `zizmor --format sarif .github/workflows/ | gh sarif upload` or include `actionlint` in CI
      to flag missing permission blocks.
    code_example: "# ci.yml — top-level default + job-level override\npermissions: {}\njobs:\n  docker:\n    permissions:\n\
      \      contents: read"
    reference: CWE-1357
  evidence:
