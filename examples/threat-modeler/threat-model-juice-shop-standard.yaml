  stride: Information Disclosure
  cwe: CWE-611
  title: XXE file disclosure — lib/xml.ts:21
  affected_parameter: file (multipart/form-data, XML body)
  scenario: 'An unauthenticated attacker (the /file-upload endpoint has no auth middleware per server.ts:309) uploads a crafted
    XML document containing an external entity declaration: `<!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><foo>&xxe;</foo>`.
    The parseXmlString function in lib/xml.ts:35 invokes libxml2-wasm with XML_PARSE_NOENT | XML_PARSE_DTDLOAD options, and
    the preceding xmlRegisterFsInputProviders() call (lib/xml.ts:21) grants the WASM sandbox host filesystem access. The resolved
    entity content is returned as xmlString and included verbatim in the error response body at fileUpload.ts:79 via utils.trunc(xmlString,
    400). An attacker receives up to 400 characters of any server-readable file per request — /etc/passwd, application secrets,
    private keys, or database credentials.'
  evidence_summary: lib/xml.ts:35 passes XML_PARSE_NOENT | XML_PARSE_DTDLOAD to libxml2-wasm after registering host FS providers
    (line 21); fileUpload.ts:79 echoes the parsed xmlString back in the error response body.
  impact_description: Attacker can read any file accessible to the Node.js process on the host, including /etc/passwd, application
    configuration, and private keys.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — xmlRegisterFsInputProviders() explicitly enables filesystem access; the error response exposes
    parsed content directly.
  mitigation_title: Disable external entity resolution and filesystem providers in libxml2-wasm XML parsing
  remediation:
    effort: Low
    steps:
    - Remove xmlRegisterFsInputProviders() call from lib/xml.ts:21 to revoke WASM filesystem access.
    - Drop XML_PARSE_NOENT and XML_PARSE_DTDLOAD from the parse options in lib/xml.ts:35 — use only XML_PARSE_NOBLANKS | XML_PARSE_NOCDATA.
    - Strip resolved-entity content from error responses in fileUpload.ts:79 — return only a static error message, not xmlString.
    - Consider rejecting XML uploads entirely since the endpoint is marked deprecated at fileUpload.ts:72.
    code_example: '// lib/xml.ts — safe options (no external entity resolution)

      const option = libxml2.ParseOption.XML_PARSE_NOBLANKS | libxml2.ParseOption.XML_PARSE_NOCDATA

      // Do NOT call xmlRegisterFsInputProviders()'
    reference: CWE-611
  evidence:
  - file: lib/xml.ts
    line: 21
