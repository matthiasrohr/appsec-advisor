    steps:
    - Remove the hardcoded mnemonic from checkKeys.ts and load it via process.env.NFT_WALLET_MNEMONIC at startup.
    - Add NFT_WALLET_MNEMONIC to .env.example with a placeholder value and to .gitignore-covered .env so developers know the
      variable is required.
    - Rotate the exposed Ethereum wallet immediately by generating a new mnemonic and funding a fresh address.
