  title: Insecure JWT Verification — lib/insecurity.ts:52
  affected_parameter: Authorization header JWT
  scenario: express-jwt@0.1.3 (CVE-2020-15084) is used by isAuthorized() at insecurity.ts:52. This version accepts JWTs with
    alg:none — no signature required. An unauthenticated attacker sends a crafted JWT header `{"alg":"none"}` with any payload
    (e.g., `{"data":{"id":1,"role":"admin"}}`), no signature, and a trailing dot. express-jwt accepts it, populating req.user
    with attacker-controlled claims. The attacker gains full authentication as any user — including admin — without any credential.
  evidence_summary: '`isAuthorized()` at insecurity.ts:52 passes `express-jwt@0.1.3` which does not enforce algorithm constraints,
    accepting unsigned tokens.'
  impact_description: Complete authentication bypass; attacker authenticates as any user including admin without credentials.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 used for issuance but not enforced on verification due to vulnerable library version.
  mitigation_title: Upgrade express-jwt and pin accepted algorithm to RS256 in isAuthorized()
  remediation:
    effort: Low
    steps:
    - Upgrade express-jwt to >=6.0.0 which drops alg:none support and enforces algorithm allowlists.
    - 'Pass `algorithms: [''RS256'']` explicitly: `expressJwt({ secret: publicKey, algorithms: [''RS256''] })`.'
    - 'Pin jsonwebtoken to >=9.0.0 and pass `{ algorithms: [''RS256''] }` to `jwt.verify()` calls.'
    code_example: "```typescript\nimport { expressjwt } from 'express-jwt';\nexport const isAuthorized = () => expressjwt({\n\
      \  secret: publicKey,\n  algorithms: ['RS256']\n});\n```"
    reference: CWE-347
