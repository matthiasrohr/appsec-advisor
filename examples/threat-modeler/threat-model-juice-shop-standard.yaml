  stride: Tampering
  cwe: CWE-829
  title: CodeQL SAST Suppresss Rate-Limiting Check — codeql-analysis.yml:32
  affected_parameter: js/missing-rate-limiting
  scenario: 'The `codeql-analysis.yml` workflow explicitly excludes the `js/missing-rate-limiting` CodeQL query (line 32)
    via a `query-filters: - exclude: id:` directive. This means CodeQL will never report missing rate-limiting findings for
    this codebase, regardless of how many endpoints lack protection. OWASP Juice Shop is an intentionally vulnerable application,
    so this suppression is likely deliberate to avoid noise during capture-the-flag usage. However, if this repository is
    used as a template or forked as a real application starting point, the suppression silently disables a relevant security
    check. The suppression has no expiry date, no associated comment explaining the rationale, and no compensating control
    (no separate rate-limit audit). Additionally, the `codeql-analysis.yml` action sub-steps (`/init`, `/autobuild`, `/analyze`)
    are pinned at `@v3` without SHA digests, combining a suppressed check with an unpinned SAST tool.'
  evidence_summary: '`codeql-analysis.yml:32` uses `id: js/missing-rate-limiting` in an exclude filter, permanently disabling
    that CodeQL query category.'
  impact_description: Rate-limiting vulnerabilities introduced in future code changes will never surface in SAST output, creating
    a blind spot in the security pipeline for one of the most common API abuse vectors.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: 'The CodeQL configuration uses `queries: security-extended` which activates a broad ruleset. The suppression
    is scoped to exactly one rule ID.'
  mitigation_title: Document or remove the js/missing-rate-limiting CodeQL suppression and pin CodeQL action steps to SHAs
  remediation:
    effort: Low
    steps:
    - 'Remove the `query-filters: - exclude: id: js/missing-rate-limiting` block, or replace it with a per-alert suppression
      comment (`// lgtm [js/missing-rate-limiting]`) on the specific intentionally-unprotected endpoints, so the suppression
      is scoped and visible in code review.'
    - If the suppression is intentional (OWASP demo app context), add a comment in `codeql-analysis.yml` explaining the rationale
      and link to the decision record.
    - 'Pin `github/codeql-action/init@v3`, `/autobuild@v3`, and `/analyze@v3` to SHA digests: `github/codeql-action/init@<sha>
      # v3.x.y`.'
    code_example: "# codeql-analysis.yml — pin actions:\n- name: Initialize CodeQL\n  uses: github/codeql-action/init@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169\
      \ # v3.28.0"
    reference: CWE-829
  evidence:
