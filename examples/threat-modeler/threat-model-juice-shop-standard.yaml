  title: Archived Action with Mutable Tag in Release Workflow — release.yml:66
  affected_parameter: null
  scenario: '`release.yml:66` uses `dawidd6/action-get-tag@727a6f0a561be04e09013531e73a3983a65e3479 #v1.1.0`. The action is
    marked as archived on GitHub (noted in the workflow comment `TODO Action is archived`). The SHA reference `727a6f0` is
    a short SHA, not a full 40-character SHA — short SHAs are vulnerable to SHA prefix collision attacks where an attacker
    publishes a commit whose 7-character prefix matches the short SHA. More practically, the action receives no security patches.
    If a vulnerability is discovered in the action, there is no upstream fix available. A fork of the archived action controlled
    by an attacker could be substituted. The release workflow has no `permissions:` block, so any code injection in this step
    inherits write-all GITHUB_TOKEN during the tag-push release event.'
  evidence_summary: '`release.yml:66` uses `dawidd6/action-get-tag@727a6f0` — a 7-char short SHA referencing an archived,
    unmaintained action in the release workflow.'
  impact_description: Code execution in the release workflow via a compromised archived action can push tampered Docker images
    to DockerHub or attach malicious artifacts to GitHub releases.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The SHA reference provides some protection over a mutable tag. The action itself is simple (reads the
    git tag name). The workflow comment flags this as a known technical debt item.
  mitigation_title: Replace archived dawidd6/action-get-tag with an inline git command and a full SHA pin
  remediation:
    effort: Low
    steps:
    - 'Replace the `dawidd6/action-get-tag` step entirely with a native shell command: `run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}"
      >> $GITHUB_ENV` — this eliminates the third-party dependency.'
    - If a dedicated action is needed, use a maintained alternative such as `ncipollo/release-action` or the built-in `github.ref_name`
      context variable, which is available on tag-push events without any action.
    - Short-term, upgrade the short SHA `727a6f0` to the full 40-character SHA to remove the prefix-collision risk.
    code_example: "# release.yml — replace the archived action\n- name: \"Get tag name\"\n  id: tag\n  run: echo \"tag=${GITHUB_REF#refs/tags/}\"\
      \ >> $GITHUB_OUTPUT"
    reference: CWE-1104
