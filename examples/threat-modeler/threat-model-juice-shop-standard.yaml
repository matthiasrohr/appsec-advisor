  title: 'XXE: XML parsed with external entities enabled — routes/fileUpload.ts:83'
  affected_parameter: file
  scenario: 'handleXmlUpload parses uploaded XML with libxml.parseXml(data, { noent: true }) inside a vm sandbox. `noent:
    true` substitutes external entities, so an attacker uploads an XML file declaring `<!ENTITY xxe SYSTEM ''file:///etc/passwd''>`
    and references it, causing the server to read local files and reflect them in the error response (line 87 echoes xmlString).
    The same parser is also abusable for billion-laughs entity-expansion DoS.'
  evidence_summary: libxml.parseXml is called with noent:true, which enables external entity substitution on attacker-supplied
    XML.
  impact_description: Local file disclosure (e.g. /etc/passwd) and entity-expansion denial of service.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Parsing runs in a vm with a 2000ms timeout (limits DoS, not file disclosure) and is gated behind deprecatedInterfaceChallenge.
  mitigation_title: Disable external entities (noent:false, noload) when parsing uploaded XML
  remediation:
    effort: Low
    steps:
    - 'Set noent: false and disable network/file loading (nonet: true, noblanks only) when calling libxml.parseXml on untrusted
      input.'
    - Reject DOCTYPE declarations outright for user-uploaded XML.
    - Do not echo parsed XML content back in error messages.
    code_example: 'libxml.parseXml(data, { noent: false, nonet: true, dtdload: false })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
