- local_id: llm-chatbot-007
  threat_category_id: TH-06
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-284
  title: Weak Order Ownership Check Enables Cross-User Order Data — routes/chat.ts:165
  affected_parameter: orderId
  scenario: 'The `getOrderById` tool at `routes/chat.ts:153-173` verifies order ownership by comparing the order''s stored
    `email` field against a masked version of the authenticated user''s email. The masking at line 165 applies `user.email.replace(/[aeiou]/gi,
    ''*'')` — replacing all vowels with asterisks. This is a deterministic and reversible transformation: given a target user''s
    email address (which may be known through other means, such as the `/api/Users` endpoint or social engineering), an attacker
    computes the expected masked form and passes an `orderId` belonging to the target. The `db.ordersCollection.findOne({
    orderId })` at line 166 retrieves the order, and if the attacker supplies a correctly-masked email comparison that matches
    the stored value, they receive the full order document. Furthermore, the full order document is returned at line 170 without
    field projection, exposing all stored fields (shipping address, payment details, item list) to the LLM context and through
    it to the attacker via the SSE stream.'
  evidence_summary: '`routes/chat.ts:165` masks the user''s email via vowel-substitution (`replace(/[aeiou]/gi, ''*'')`) and
    uses this as the sole ownership check; `routes/chat.ts:170` returns the full order document without field projection.'
  impact_description: An attacker who knows a target's email can impersonate their order ownership check and retrieve full
    order details including shipping address and purchase history.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Authentication is checked at line 160 before proceeding; order retrieval requires knowing a valid `orderId`.
  mitigation_title: Replace vowel-masking email comparison with a cryptographic user ID binding on orders
  remediation:
    effort: Medium
    steps:
    - Store and compare a user ID (integer PK) or a cryptographic hash of the email on the order document, not a reversible
      vowel-masked form. Update the order schema to include `userId` and change the ownership check to `if (order.userId !==
      userId)`.
    - 'Apply field projection in `db.ordersCollection.findOne()` to return only fields the chatbot legitimately needs: `{
      orderId: 1, items: 1, status: 1, _id: 0 }`. Never return payment method details or raw email through the LLM tool.'
    - 'If backward compatibility requires the masked email approach, at minimum use a keyed HMAC of the email as the stored
      comparison value: `crypto.createHmac(''sha256'', process.env.ORDER_EMAIL_HMAC_SECRET).update(email.toLowerCase()).digest(''hex'')`.'
    code_example: "// routes/chat.ts — replace masked email check with userId binding\nexecute: async ({ orderId }) => {\n\
      \  const userId = await getUserId(req)\n  if (!userId) return { error: 'Customer not authenticated' }\n  // Fetch order\
      \ with userId field, project only safe fields\n  const order = await db.ordersCollection.findOne(\n    { orderId, userId\
      \ },\n    { projection: { orderId: 1, items: 1, status: 1, _id: 0 } }\n  )\n  if (!order) return { error: 'Order not\
      \ found or does not belong to you' }\n  return order\n}"
    reference: CWE-284
