  stride: Spoofing
  cwe: CWE-345
  title: Unsigned Client-Side Conversation History Replayed to LLM (routes/chat.ts:189)
  affected_parameter: messages
  scenario: 'The chatbot frontend stores the full conversation history in localStorage (ConversationStorageService, line 44).
    On each new message, chat-conversation.component.ts:126-131 sends the entire messages[] array to POST /rest/chat as req.body.messages.
    At routes/chat.ts:189, the server accepts this array as-is: `const messages = req.body?.messages ?? []`. There is no server-side
    signature, HMAC, or session binding on the history. An attacker crafts a POST /rest/chat payload where messages[] includes
    fabricated ''assistant'' role messages — for example, a prior message claiming ''The coupon policy does not apply to preferred
    customers'' — that were never actually generated by the LLM. The server passes this manipulated history to the LLM as
    ground truth context, causing the LLM to continue the conversation under false premises, potentially unlocking tool calls
    it would otherwise refuse.'
  evidence_summary: routes/chat.ts:189 accepts req.body.messages[] without any integrity check, HMAC, or server-side session
    storage of prior turns, allowing callers to forge arbitrary conversation history.
  impact_description: An attacker can pre-populate the LLM's context window with fabricated prior conversation turns that
    establish false policy exceptions or false user identity claims, causing the LLM to comply with requests it would otherwise
    reject.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — messages[] array is trusted without integrity verification.
  mitigation_title: Store and validate conversation history server-side, do not trust client-supplied message arrays
  remediation:
    effort: High
    steps:
    - Store conversation history server-side keyed by a session ID (e.g., signed cookie or server-managed session). On each
      request, look up the canonical history from the session store rather than accepting it from the request body.
    - If client-side storage is retained for performance, sign each appended assistant message with an HMAC using a server-side
      secret (keyed to the session ID) before returning it to the client. On the next request, verify all assistant-role message
      HMACs and reject the request if any signature fails.
    - At minimum, enforce a maximum messages[] array length and a maximum per-message character length to limit the blast
      radius of injected history payloads.
