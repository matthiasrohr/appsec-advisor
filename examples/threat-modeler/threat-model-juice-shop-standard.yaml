  - routes/redirect.ts
  - routes/web3Wallet.ts
  tier: application
  complexity: moderate
  framework: ethers
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: true
  origin: reconciliation
  threat_ids:
  - T-011
