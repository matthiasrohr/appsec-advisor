  cwe: CWE-598
  title: OAuth implicit flow exposes access_token in URL fragment — app.routing.ts:286
  affected_parameter: access_token
  scenario: 'The `oauthMatcher` function at `app.routing.ts:286` detects an OAuth callback by checking if `window.location.href`
    contains `#access_token=`, confirming use of the OAuth implicit flow. The access token placed in the URL fragment is:
    (1) stored in browser history; (2) potentially leaked to servers via Referer headers if any third-party resources are
    loaded; (3) accessible to other JavaScript on the same origin; (4) visible in browser developer tools and server-access
    logs. Additionally, `app.routing.ts:257` captures `window.location.href.substr(window.location.href.indexOf(''#''))` as
    route data, meaning the raw fragment (including the access token) is passed to the OAuthComponent via Angular router''s
    data object.'
  evidence_summary: '`oauthMatcher` at line 286 of `app.routing.ts` checks for `#access_token=` in the current URL, and line
    257 passes the raw fragment containing the token as Angular router `data`, confirming OAuth implicit flow is in use.'
  impact_description: OAuth access token exposed in browser history and potentially via Referer leakage, enabling session
    replay attacks by any party who obtains the URL.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — implicit flow is the design choice here.
  mitigation_title: Migrate OAuth flow from implicit to authorization code flow with PKCE
  remediation:
    effort: High
    steps:
    - Replace the implicit flow (`response_type=token`) with authorization code flow + PKCE (`response_type=code&code_challenge=<SHA256>&code_challenge_method=S256`).
    - Exchange the authorization code on the backend (server-side token exchange), so the access token is never placed in
      the URL or returned to the browser.
    - Remove the `oauthMatcher` that detects `#access_token=` and replace with a code callback handler.
    - Store the resulting session via an HttpOnly Secure SameSite=Strict cookie instead of localStorage.
    code_example: null
    reference: CWE-598
