- local_id: auth-module-007
  threat_category_id: TH-06
  additional_categories:
  - TH-15
  stride: Elevation of Privilege
  cwe: CWE-620
  title: Password Change Without Current-Password — routes/changePassword.ts:39
  affected_parameter: current
  scenario: The password change handler at routes/changePassword.ts:13 reads the current password from `query.current` (a
    query string parameter). The verification at line 39 is guarded by `if (currentPassword && ...)` — if `current` is absent
    from the request, `currentPassword` is undefined, the condition is false, and verification is skipped entirely. An attacker
    who has a victim's active bearer token (e.g. obtained via XSS, token leakage, or network interception) can call `GET /rest/user/change-password?new=attacker123&repeat=attacker123`
    (omitting `current`) to change the password without knowing the existing one. The endpoint also accepts parameters via
    GET query string rather than POST body, making it trivially exploitable via CSRF with a simple `<img>` tag if the token
    is in a cookie.
  evidence_summary: '`currentPassword = query.current` at routes/changePassword.ts:14; the conditional at line 39 `if (currentPassword
    && ...)` skips verification when `current` is absent.'
  impact_description: An attacker with a stolen session token completes an account takeover by changing the password without
    knowing the original, locking out the legitimate user.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Requires a valid bearer token for the target account (session hijack prerequisite).
  mitigation_title: Enforce current-password verification unconditionally and change to POST with body parameters in routes/changePassword.ts
  remediation:
    effort: Low
    steps:
    - 'Remove the `if (currentPassword && ...)` guard: always require current password. Return 401 when `currentPassword`
      is absent, before any other logic.'
    - Move the endpoint to `POST /rest/user/change-password` and accept all parameters from `req.body` instead of `req.query`.
      GET requests must not cause state changes.
    - Add CSRF protection (SameSite=Strict cookie or CSRF token) to prevent cross-origin exploitation.
    code_example: "// routes/changePassword.ts — unconditional current-password check\nconst currentPassword = req.body.current\
      \ as string\nif (!currentPassword) {\n  res.status(401).send('Current password is required.')\n  return\n}\nif (security.hash(currentPassword)\
      \ !== loggedInUser.data.password) {\n  res.status(401).send('Current password is not correct.')\n  return\n}"
    reference: CWE-620
  evidence:
  - file: routes/changePassword.ts
    line: 39
  evidence_check: verified
