  title: Unbounded Unauthenticated WebSocket Connection — registerWebsocketEvents.ts:19
  affected_parameter: Socket.IO server connection limit, mess…
  scenario: 'The Socket.IO server is created with `new Server(server, { cors: { origin: ''http://localhost:4200'' } })` at
    line 19-20 with no `maxHttpBufferSize`, connection count cap, or per-socket rate limit. An unauthenticated attacker opens
    thousands of concurrent WebSocket connections and floods the `verifyLocalXssChallenge`, `verifySvgInjectionChallenge`,
    or `notification received` handlers at high rate. The `notification received` handler calls `notifications.splice()` on
    each message, mutating the shared in-memory array. The `verifySvgInjectionChallenge` handler passes each message through
    a regex match and `security.isRedirectAllowed()`. Under sustained flood, the Node.js event loop saturates, blocking legitimate
    users from receiving real-time notifications.'
  evidence_summary: No `io.use()` rate-limit middleware, no `maxConnections` option, and no message-frequency guard appear
    in `registerWebsocketEvents.ts`; all event handlers execute synchronous mutations on shared state on every received message.
  impact_description: A single unauthenticated attacker can exhaust the Node.js event loop and degrade or deny WebSocket service
    for all connected users.
  likelihood: Medium
  impact: Medium
