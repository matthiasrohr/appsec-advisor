      \ = z.array(z.object({\n  productId: z.number().int().positive(),\n  quantity: z.number().int().positive(),\n  unitPrice:\
      \ z.number().positive()\n}))\nconst orderLines = OrderSchema.parse(JSON.parse(body.orderLinesData))\n```"
    reference: CWE-94
