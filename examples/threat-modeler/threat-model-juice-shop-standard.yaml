- local_id: express-backend-015
  threat_category_id: TH-01
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-79
  title: CSP Header Injection — routes/userProfile.ts:88
  affected_parameter: profileImage (user model field)
  scenario: The CSP header at userProfile.ts:88 is constructed as `img-src 'self' ${user?.profileImage}; script-src 'self'
    'unsafe-eval'`. If the authenticated user sets their `profileImage` to `data:; script-src 'unsafe-inline'`, the resulting
    CSP header becomes `img-src 'self' data:; script-src 'unsafe-inline'; script-src 'self' 'unsafe-eval'`. The first `script-src`
    directive encountered by the browser applies — `'unsafe-inline'` is now permitted. Combined with any stored XSS payload,
    this neutralizes the last script-execution defense for the profile page. The profile image URL is user-controlled via
    the profile update endpoint.
  evidence_summary: '`const CSP = ''img-src \''self\'' '' + user?.profileImage + ''; script-src ...''` at userProfile.ts:88
    inserts the unsanitized `profileImage` field into an HTTP response header value.'
  impact_description: Authenticated user bypasses the Content Security Policy on their own profile page, enabling stored XSS
    execution that affects any admin viewing the page.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — profileImage is inserted directly into the CSP header with no sanitization.
  mitigation_title: Validate profileImage is a URL before inserting into CSP and use helmet.contentSecurityPolicy() for header
    construction
  remediation:
    effort: Low
    steps:
    - Validate `user.profileImage` is a well-formed HTTPS URL (using `new URL(profileImage).protocol === 'https:'`) before
      inserting it into the CSP. Reject or replace with a default on validation failure.
    - Strip semicolons, newlines, and control characters from `profileImage` before CSP insertion.
    - 'Switch to `helmet.contentSecurityPolicy({ directives: { imgSrc: ["''self''", sanitizedImageSrc] } })` for structured
      CSP construction that prevents directive injection.'
    code_example: "```typescript\n// routes/userProfile.ts — safe CSP construction\nconst imageSrc = /^https?:\\/\\/[^\\s;]+$/.test(user?.profileImage\
      \ ?? '') \n  ? user.profileImage \n  : \"'self'\"\nconst CSP = `img-src 'self' ${imageSrc}; script-src 'self' 'unsafe-eval'`\n\
      ```"
    reference: CWE-79
  evidence:
