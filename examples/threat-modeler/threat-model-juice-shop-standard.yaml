- local_id: sqlite-data-tier-008
  threat_category_id: TH-09
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Unbounded raw SQL execution on search blocks event loop — routes/search.ts:23
  scenario: The search route executes user-controlled SQL synchronously within SQLite's in-process engine. Because SQLite
    calls in Node.js are blocking (better-sqlite3) or tie up an async thread (node-sqlite3), a crafted query containing expensive
    subqueries (e.g., a UNION ALL with a large recursive CTE or a cross-join that produces millions of rows) can consume CPU
    for seconds, blocking other concurrent requests. There is no query timeout configured on the Sequelize instance and no
    per-query execution time limit. An unauthenticated attacker hitting /rest/products/search repeatedly with such payloads
    degrades availability for all users.
  evidence_summary: routes/search.ts:23 calls models.sequelize.query() with user-supplied criteria embedded in raw SQL; models/index.ts
    shows no busyTimeout or query timeout option set on the Sequelize/SQLite connection.
  impact_description: CPU exhaustion of the Node.js process, causing request timeouts for all concurrent users until the expensive
    query completes or the process is restarted.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Input is truncated to 200 characters, limiting payload size but not execution cost.
  mitigation_title: Set SQLite busy timeout and per-query execution limit; add rate limiting on the search endpoint
  remediation:
    effort: Medium
    steps:
    - 'Add `dialectOptions: { busyTimeout: 3000 }` to the Sequelize constructor in models/index.ts to limit lock-wait time.'
    - Wrap the search query in a Promise.race() with a timeout of 2000ms, rejecting with a 503 if SQLite does not return within
      the window.
    - 'Add express-rate-limit middleware on the /rest/products/search route: `rateLimit({ windowMs: 60000, max: 100 })` to
      limit unauthenticated query volume.'
    - Migrate the search query to Sequelize's parameterized Op.like syntax, which the ORM can plan more predictably and which
      prevents the UNION injection that enables arbitrary subquery injection.
    code_example: '```typescript

      import rateLimit from ''express-rate-limit''

      router.get(''/search'', rateLimit({ windowMs: 60_000, max: 100 }), searchProducts())

      ```'
    reference: CWE-400
  evidence:
