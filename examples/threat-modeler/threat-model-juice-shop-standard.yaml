  threat_category_id: TH-03
  additional_categories:
  - TH-02
  stride: Information Disclosure
  cwe: CWE-798
  title: Hardcoded HMAC key guards knowledge-based password reset — lib/insecurity.ts:44
  affected_parameter: answer
  scenario: 'Password reset at routes/resetPassword.ts:41 authenticates the user solely by comparing security.hmac(answer)
    to the stored security-answer HMAC. hmac() at lib/insecurity.ts:44 uses the committed static key ''pa4qacea4VK9t9nGv7yZtwmj''.
    Because the key is public, an attacker who learns or guesses a victim''s security answer (frequently low-entropy: a first
    name, a pet, a place such as ''Samuel''/''Stop''n''Drop'' seen in verifySecurityAnswerChallenges) can reset any account''s
    password to one they control via POST /rest/user/reset-password, with no possession of the original password. The reset
    path enforces no rate limit keyed to identity (see auth-008) and no email-link confirmation.'
  evidence_summary: Security answers are HMAC'd with a hardcoded literal key at lib/insecurity.ts:44 and that HMAC is the
    only credential checked at routes/resetPassword.ts:41.
  impact_description: Attacker resets arbitrary accounts using guessable knowledge-based answers, achieving account takeover
    without the password.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: HMAC comparison gates the reset, but the key is public and the answers are low-entropy knowledge questions
    with no out-of-band confirmation.
  mitigation_title: Replace knowledge-based reset with emailed single-use token and secret HMAC key
  remediation:
    effort: Medium
    steps:
    - Move the HMAC key out of source into an environment variable / secret store and rotate the exposed value.
    - Replace security-question reset with a single-use, time-limited reset token delivered to the registered email address
      (RFC-style opaque token, hashed at rest).
    - Rate-limit and lock the reset endpoint per account identity, not per request header, to blunt answer guessing.
    - If security questions are retained as a secondary factor, store answers with a per-user-salted KDF rather than a global
      HMAC.
    code_example: 'const token = crypto.randomBytes(32).toString(''hex'')

      await PasswordResetModel.create({ userId, tokenHash: sha256(token), expiresAt: Date.now() + 15*60_000 })

      // email the raw token; verify by hashing the presented token and matching an unexpired row'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Forgot_Password_Cheat_Sheet.html
    blueprint: null
  evidence:
  - file: lib/insecurity.ts
    line: 44
  evidence_check: verified
