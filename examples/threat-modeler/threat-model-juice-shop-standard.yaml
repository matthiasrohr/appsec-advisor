  title: Open Redirect — lib/insecurity.ts:136
  affected_parameter: to (GET /redirect?to=...)
  scenario: 'The `isRedirectAllowed()` function at lib/insecurity.ts:136 uses `url.includes(allowedUrl)` (substring matching)
    instead of a prefix or exact match. An attacker crafts a URL where the allowlisted string appears as a query parameter:
    `https://evil.com/phish?bypass=https://github.com/juice-shop/juice-shop`. The `includes()` check passes because the allowed
    URL string is present in the full URL. When the victim visits `/redirect?to=https://evil.com/phish?bypass=https://github.com/juice-shop/juice-shop`,
    they are redirected to the attacker-controlled domain. This enables credential phishing by constructing a redirect from
    the trusted Juice Shop domain to a lookalike.'
  evidence_summary: '`isRedirectAllowed()` at lib/insecurity.ts:136 uses `url.includes(allowedUrl)` — a substring match that
    allows any URL containing the allowlisted string anywhere in its path or query parameters.'
  impact_description: Phishing attacks leveraging the trusted juice-shop domain to redirect victims to attacker-controlled
    sites.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Allowlist of permitted redirect targets exists; implementation is bypassable.
  mitigation_title: Replace substring matching with exact URL equality or strict prefix matching in the redirect allowlist
    check
  remediation:
    effort: Low
    steps:
    - Replace `allowed = allowed || url.includes(allowedUrl)` with `allowed = allowed || url === allowedUrl` for exact match.
    - If prefix matching is needed (e.g. for path variants), use `url.startsWith(allowedUrl)` after parsing both URLs with
      the `URL` constructor to normalize trailing slashes and encoding.
    - Validate the parsed URL's origin against the allowlist, not the full string.
