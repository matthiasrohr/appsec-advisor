  title: Mutable Action Tag Supply Chain Injection — codeql-analysis.yml:23
  affected_parameter: null
  scenario: '`codeql-analysis.yml` references `github/codeql-action/init@v3`, `github/codeql-action/autobuild@v3`, and `github/codeql-action/analyze@v3`
    at lines 23, 34, and 36 — all three are mutable floating tags, not SHA-pinned. GitHub tag references resolve at runtime:
    any GitHub user with push access to the `github/codeql-action` repository can move the `v3` tag to point to a different
    commit. The CodeQL workflow runs on every push and every pull request with `security-events: write` permission and the
    default GITHUB_TOKEN. Malicious code injected via a moved tag executes inside the runner with access to all secrets scoped
    to that workflow run. Similarly, `coverallsapp/github-action@v2` at `ci.yml:161` is mutable and runs with the GITHUB_TOKEN
    from a workflow that has no `permissions:` block (write-all).'
  evidence_summary: '`codeql-analysis.yml:23` uses `github/codeql-action/init@v3` — a human-readable tag, not a commit SHA
    — meaning the referenced code can change without any change to the workflow file.'
  impact_description: 'A tag-redirect attack lets an adversary run arbitrary code in CI with `security-events: write` and
    (via write-all GITHUB_TOKEN in other workflows) full repository write access.'
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Most other actions in the workflow files are SHA-pinned (e.g., `actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683`).
    CodeQL and Coveralls are exceptions.
  mitigation_title: Pin github/codeql-action and coverallsapp/github-action to commit SHAs in all workflow files
  remediation:
    effort: Low
    steps:
    - 'Run `gh api repos/github/codeql-action/git/refs/tags/v3 --jq ''.object.sha''` to resolve the current SHA for `codeql-action@v3`,
      then replace each `@v3` reference in `codeql-analysis.yml` with `@<sha> #v3`.'
    - Run `gh api repos/coverallsapp/github-action/git/refs/tags/v2 --jq '.object.sha'` and replace `coverallsapp/github-action@v2`
      in `ci.yml:161` with the resolved SHA.
    - Enable GitHub's Dependabot for `github-actions` in `.dependabot/config.yml` to keep SHA-pinned actions updated automatically.
    - Add a CI step using `pinact` or `actionlint` to enforce that all action references are SHA-pinned before merge.
    code_example: '# codeql-analysis.yml — before

      - uses: github/codeql-action/init@v3


      # After (SHA from 2026-06 — always re-resolve before committing)

      - uses: github/codeql-action/init@cdcdbb579706841c204a7e43f9d38b4aea0cf7e3 #v3'
    reference: CWE-1104
