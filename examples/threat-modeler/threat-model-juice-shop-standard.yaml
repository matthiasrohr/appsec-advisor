    the entry on first match, enabling a race-to-claim attack.
  impact_description: An attacker can claim the NFT mint challenge credit for any wallet address they observe, without having
    minted the NFT or controlling that wallet's private key.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The Set is populated only from on-chain NFTMinted events — an attacker cannot claim an address that never
    minted. However, there is no proof that the HTTP claimant controls the wallet.
  mitigation_title: Require ECDSA signature-over-nonce proof of wallet ownership before accepting NFT mint claims
  remediation:
    effort: Medium
    steps:
    - Issue a server-generated nonce to the client when they request verification (GET /rest/web3/nftMintChallenge).
    - Require the client to sign the nonce with their wallet private key (ethers.js Wallet.signMessage()) and submit the signature
      alongside walletAddress.
    - Verify the signature server-side using ethers.verifyMessage(nonce, signature) === walletAddress before checking addressesMinted.
    - Expire nonces after 60 seconds to prevent replay.
    code_example: "```typescript\nimport { verifyMessage } from 'ethers'\n// On verification request:\nconst { walletAddress,\
      \ nonce, signature } = req.body\nconst recovered = verifyMessage(nonce, signature)\nif (recovered.toLowerCase() !==\
      \ walletAddress.toLowerCase()) {\n  return res.status(401).json({ error: 'Invalid wallet signature' })\n}\n```"
