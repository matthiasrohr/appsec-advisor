  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded Cryptographic Key — lib/insecurity.ts:21
  affected_parameter: null
  scenario: 'The RSA private key used to sign JWTs is hardcoded in `lib/insecurity.ts:21` as a multiline string literal. Any
    developer with repository access — or anyone who clones the public repo — can read the key offline. They then call `jwt.sign({
    data: { role: ''admin'', email: ''attacker@evil.com'' }}, privateKey, { algorithm: ''RS256'' })` to produce a token that
    `expressJwt({ secret: publicKey })` at `lib/insecurity.ts:52` accepts as valid. No login credential is needed.'
  evidence_summary: Full PEM-encoded RSA private key appears at `lib/insecurity.ts:21` as a string literal assigned to `privateKey`.
  impact_description: Any token holder with repo access can mint admin-role or any-user JWTs accepted unconditionally by all
    protected API endpoints.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 algorithm is used (correct algorithm choice), but key management is absent.
  mitigation_title: Remove hardcoded RSA private key and load it from an environment variable or secret manager at startup
  remediation:
    effort: Medium
    steps:
    - Delete the private key literal from `lib/insecurity.ts:21`. Store the PEM in an environment variable `JWT_PRIVATE_KEY`
      or a secret manager (e.g., AWS Secrets Manager, HashiCorp Vault).
    - 'At startup, read: `const privateKey = process.env.JWT_PRIVATE_KEY || fs.readFileSync(process.env.JWT_PRIVATE_KEY_FILE,
      ''utf8'')`. Fail fast if neither is set.'
    - Rotate the exposed key immediately — generate a new RSA key pair (`openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048`)
      and deploy only the new public key to the verification side.
    - Add a pre-commit hook or CI secret-scanning step (e.g., `trufflehog`, `gitleaks`) to prevent re-introduction of PEM
      literals.
    code_example: "```typescript\n// lib/insecurity.ts — load from environment\nconst privateKey = process.env.JWT_PRIVATE_KEY\n\
      \  ? Buffer.from(process.env.JWT_PRIVATE_KEY, 'base64').toString('utf8')\n  : fs.readFileSync(process.env.JWT_PRIVATE_KEY_FILE\
      \ ?? 'encryptionkeys/jwt.pem', 'utf8');\n```"
