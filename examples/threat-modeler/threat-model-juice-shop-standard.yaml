    four event listeners per socket. Simultaneously, an attacker can flood the `notification received` handler (line 33) with
    random flag strings, triggering `notifications.findIndex()` on every message. At sufficient volume this exhausts file
    descriptors, Node.js event-loop capacity, and process memory — causing the co-located Express server to become unresponsive.'
  evidence_summary: '`new Server(server, { cors: { origin: ''http://localhost:4200'' } })` at line 20 contains no `maxHttpBufferSize`,
