  title: SSRF — routes/profileImageUrlUpload.ts:24
  affected_parameter: imageUrl (POST /profile/image/url body)
  scenario: 'At routes/profileImageUrlUpload.ts:24, the handler calls `fetch(url)` where `url = req.body.imageUrl` with no
    scheme or host validation. An authenticated attacker sends `imageUrl: http://169.254.169.254/latest/meta-data/iam/security-credentials/`
    to retrieve AWS EC2 instance metadata including IAM role credentials. Internal services (Redis, databases, admin panels
    on internal ports) are equally reachable. The response body is piped to a file (line 29-30) making the SSRF semi-blind
    — only image-extension responses are stored to disk, but any URL is fetched server-side. The only check at line 20 looks
    for the string `solve/challenges/server-side` to track a challenge flag, not to validate safety.'
  evidence_summary: '`fetch(url)` at profileImageUrlUpload.ts:24 is called with `req.body.imageUrl` without any scheme or
    host allowlist validation.'
  impact_description: Internal network probing and cloud metadata credential theft from any cloud-hosted deployment.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Requires valid JWT session cookie. No URL validation beyond challenge-flag string check.
  mitigation_title: Validate imageUrl against an allowlist of permitted schemes and external hosts before fetching
  remediation:
    effort: Medium
    steps:
    - 'Parse the URL and validate: only `https:` scheme permitted; hostname must not resolve to RFC-1918 private ranges (10.x,
      172.16.x, 192.168.x, 127.x) or link-local (169.254.x.x).'
    - Use a DNS rebinding-safe HTTP client (or resolve the hostname once and check against a private-IP blocklist before connecting)
      to prevent DNS rebinding attacks.
    - 'Add `express-validator` `isURL({ protocols: [''https''], require_tld: true })` on `imageUrl` before the handler.'
    - Consider fetching via a dedicated image-proxy service that enforces the allowlist, rather than the main application
      server.
    code_example: "// routes/profileImageUrlUpload.ts\nimport { isValidExternalImageUrl } from '../lib/urlValidator'\nif (!isValidExternalImageUrl(url))\
      \ {\n  return res.status(400).json({ error: 'Invalid image URL' })\n}"
