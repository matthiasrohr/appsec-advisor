    and uses a broken-for-passwords algorithm.'
  impact_description: After any credential dump, all user passwords are recoverable offline without brute-force, enabling
    cross-service credential stuffing at scale.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no salt, no stretching, no iteration count.
  mitigation_title: Replace MD5 with bcrypt or Argon2id for password hashing
