  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:189
  scenario: jwt.verify() at lib/insecurity.ts:189 is called as jwt.verify(token, publicKey, callback) with no algorithms option.
    The RSA public key (encryptionkeys/jwt.pub) is readable by anyone with repo access or via directory traversal. An attacker
    who obtains the public key can forge a JWT with alg:HS256 and sign it with the public key used as an HMAC-SHA256 secret.
    The jsonwebtoken library, when no algorithms restriction is passed, will verify this as valid. The attacker embeds data.role:'admin'
    or data.email:'admin@juice-sh.op' and submits the forged token to any authenticated endpoint. The same gap exists at SAF-001
    (expressJwt at insecurity.ts:52) which guards all /api/* routes.
  evidence_summary: 'jwt.verify(token, publicKey, callback) at insecurity.ts:189 passes no algorithms array; expressJwt({
    secret: publicKey }) at insecurity.ts:52 likewise omits algorithms.'
  impact_description: An attacker with the public key forges an admin-role JWT and bypasses all authentication and authorization
    checks application-wide.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 signing key present; no algorithm allowlist enforced at verification.
  mitigation_title: 'Add algorithms: [''RS256''] to jwt.verify() and expressJwt() calls in lib/insecurity.ts'
  remediation:
    effort: Low
    steps:
    - 'At lib/insecurity.ts:189, change jwt.verify(token, publicKey, callback) to jwt.verify(token, publicKey, { algorithms:
      [''RS256''] }, callback).'
    - 'At lib/insecurity.ts:52, change expressJwt({ secret: publicKey }) to expressJwt({ secret: publicKey, algorithms: [''RS256'']
      }).'
    - Audit all other jwt.verify / jws.verify call sites in the codebase for missing algorithm constraints (routes/verify.ts:120
      also flagged by SAF-021).
    - Rotate the RSA key pair — the current private key is committed in source and the 1024-bit key size is below NIST minimum
      of 2048 bits.
    code_example: "// lib/insecurity.ts:189 — after fix\njwt.verify(token, publicKey, { algorithms: ['RS256'] }, (err, decoded)\
      \ => {\n  if (err === null && decoded?.data !== undefined) {\n    authenticatedUsers.put(token, decoded)\n  }\n})\n\n\
      // lib/insecurity.ts:52 — after fix\nexport const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: ['RS256']\
      \ })"
    reference: CWE-347
