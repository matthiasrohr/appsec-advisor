components:
- id: frontend-spa
  name: Angular Frontend SPA
  description: Single-page application built with Angular 20. Handles all user-facing UI including the shop, basket, admin
    panel, score board, and challenge interfaces. Runs in the browser and stores JWT tokens in localStorage.
  tier: client
  paths:
  - frontend/src/**
  - frontend/package.json
  deployment_zones:
  - public-internet
  handles_sensitive_data: true
  tech: Angular 20, TypeScript, Angular Material, Socket.IO client
  complexity: moderate
  threat_ids:
  - T-001
  - T-002
  - T-036
  - T-044
- id: express-backend
  name: Express Backend API
  description: 'Node.js/Express monolith serving REST API on port 3000. Implements all business logic: authentication, product
    catalog, orders, basket, user management, challenges, and intentionally vulnerable endpoints. Acts as the single deployable
    unit for both API and static file serving.'
  tier: application
  paths:
  - routes/**
  - server.ts
  - app.ts
  - lib/**
  - models/**
  deployment_zones:
  - application-tier
  handles_sensitive_data: true
  tech: Node.js 20-24, Express 4.22, TypeScript, express-jwt 0.1.3, jsonwebtoken 0.4.0, Helmet 4.6, Socket.IO 3.1
  complexity: complex
  threat_ids:
  - T-033
  - T-035
