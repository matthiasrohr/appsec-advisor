  title: Script Injection — ci.yml:358
  affected_parameter: curl https://cli-assets.heroku.com/inst…
  scenario: 'The `heroku` job in ci.yml line 358 executes `curl https://cli-assets.heroku.com/install.sh | sh`, downloading
    and immediately executing a shell script from an external Heroku CDN endpoint. This pattern is vulnerable to: (1) network-level
    MITM — if the CDN endpoint is compromised or subject to a BGP hijack, an attacker can substitute arbitrary shell commands
    that run as root in the runner environment; (2) domain/CDN compromise — if Heroku''s CDN origin is breached, all subsequent
    CI runs silently execute attacker-controlled code; (3) an HTTPS certificate is no longer a trust root for code integrity
    — it only proves the server identity, not the content''s provenance. At the time this step runs, HEROKU_API_KEY, GITHUB_TOKEN,
    and all other secrets loaded into environment variables are accessible to the injected code.'
  evidence_summary: ci.yml line 358 pipes an HTTPS-fetched shell script directly into `sh` without verifying a checksum or
    pinned content hash.
  impact_description: CDN or network compromise at execution time allows arbitrary code execution in the runner with access
    to deployment secrets including HEROKU_API_KEY, DOCKERHUB_TOKEN, and GITHUB_TOKEN.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None specific to this step. HTTPS provides transport encryption but not content integrity.
  mitigation_title: Replace curl-pipe-shell Heroku installer with a pinned, hash-verified installation method
  remediation:
