  title: Directory Listing and Unauthenticated File Serving on /ftp and — server.ts:269
  affected_parameter: GET /ftp/*, GET /encryptionkeys/*
  scenario: The `/ftp` directory is served with `serveIndex` (directory listing enabled) and individual files served at `/ftp/:file`
    without authentication (server.ts:269-270). The `/encryptionkeys` directory similarly provides directory listing and file
    serving at `/encryptionkeys/:file` without auth (server.ts:277-278). The `encryptionkeys/jwt.pub` file is the RSA public
    key that enables the JWT algorithm confusion attack (express-backend-001), and `premium.key` exposes premium feature decryption
    material. The `/ftp` directory contains internal order backup files, legal documents, and other business-sensitive materials
    intended only for B2B use.
  evidence_summary: '`serveIndex(''ftp'', { icons: true })` and `serveIndex(''encryptionkeys'', ...)` are mounted at server.ts:269
    and 277 without any authentication middleware.'
  impact_description: Public exposure of internal FTP documents, JWT public key (enabling algorithm confusion), and premium
    feature decryption keys.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — routes are publicly accessible.
  mitigation_title: Add authentication middleware to /ftp and /encryptionkeys routes and restrict key file serving
  remediation:
    effort: Low
    steps:
    - Add `security.isAuthorized()` (or an admin-role check) before `serveIndex` and `servePublicFiles()` on the `/ftp` route
      in server.ts.
    - Remove the `/encryptionkeys` directory listing entirely — individual key files should not be browsable or downloadable
      by the public.
    - Move `jwt.pub` out of the static serving directory and load it only at application startup via `fs.readFileSync`.
    - If FTP file serving must remain for legitimate B2B use, enforce a signed token (e.g. time-limited download URL) rather
      than open directory access.
    code_example: '// server.ts

      app.use(''/ftp'', security.isAuthorized(), serveIndexMiddleware, serveIndex(''ftp'', { icons: true }))

      app.use(''/ftp(?!/quarantine)/:file'', security.isAuthorized(), servePublicFiles())

