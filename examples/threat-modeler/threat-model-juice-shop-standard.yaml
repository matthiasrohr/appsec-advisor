tier_root_causes:
  edge:
  - JWT stored in localStorage accessible to any XSS payload
  - DomSanitizer bypass enables stored XSS in feedback and lastLoginIp
  - OAuth implicit flow with no CSRF state validation
  server:
  - Raw SQL string interpolation across multiple query paths
  - Hardcoded RSA private key allows arbitrary JWT forgery
  - eval() on user-supplied input enables remote code execution
  - No authentication middleware on administrative and sensitive routes
  - Unrestricted file upload with path traversal to arbitrary write
  data:
  - MD5 without salt used for password hashing
  - Payment card numbers stored as plaintext integer
  - Mass-assignment of role field via Sequelize models
