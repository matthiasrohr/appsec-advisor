- local_id: auth-009
  threat_category_id: TH-02
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-287
  title: JWT Algorithm Bypass in 2FA Token Verification — routes/2fa.ts:26
  affected_parameter: body.tmpToken
  scenario: 'The 2FA verification handler at `routes/2fa.ts:26` calls `security.verify(tmpToken) && security.decode(tmpToken)`
    to extract `userId` and `type`. The `verify()` function at `lib/insecurity.ts:57` uses `jws.verify(token, publicKey)`
    — the `jws` library''s verify with an RS256 public key will return false for an `alg:none` token because it checks the
    signature against the key. However, since the `privateKey` is publicly known (auth-001), an attacker who intercepts the
    `tmpToken` response (or knows a target''s `userId` from a previous account enumeration) can sign a fresh `{ userId: <victim_id>,
    type: ''password_valid_needs_second_factor_token'' }` token with the known RSA private key. This token passes `jws.verify()`
    with RS256 and bypasses the requirement that the attacker actually know the user''s password, as the `type` claim is never
    validated against a one-time-use store.'
  evidence_summary: routes/2fa.ts:26 trusts the decoded `userId` from `tmpToken` without verifying that the token was issued
    as part of a genuine password-valid session; lib/insecurity.ts:23 makes the signing key available to any attacker.
  impact_description: 2FA is rendered ineffective — an attacker who only knows a victim's username can forge a tmpToken and
    complete the 2FA flow to obtain a fully-authenticated session token.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: TOTP check via otplib (correct implementation — bypassed only via token forgery, not TOTP weakness)
  mitigation_title: Bind tmpToken to a server-side one-time-use nonce store indexed by userId
  remediation:
    effort: Medium
    steps:
    - After a successful password check in `routes/login.ts`, store a cryptographic nonce in an in-memory set (or Redis) keyed
      by `userId` with a 5-minute TTL
    - Issue `tmpToken` containing only the nonce (not the userId) — the server maps nonce→userId on verification
    - In `routes/2fa.ts:verify()`, look up the nonce in the store and delete it after first use (one-time use enforcement)
    - This eliminates the need to trust token contents for user identity at the 2FA step
    code_example: null
    reference: CWE-287
