  mitigation_fingerprints:
  - restrict writable fields on post /api/users to exclude role, deluxetoken, totpsecret, and isactive
  - move jwt storage to an httponly secure samesite=strict cookie and remove localstorage usage
  - implement a structured security event log recording actor identity, action, resource, and result for all security-relevant
    events
  - replace implicit oauth flow with pkce authorization-code flow and use a cryptographically random password
  - replace raw sequelize query with parameterized query using replacements or usermodel.findone()
  - 'add algorithms: [''rs256''] to jwt.verify() and expressjwt() calls in lib/insecurity.ts'
  - replace req.body.userid/userid/ownerid with req.user.id (or equivalent session-derived identity) in every where/filter
    clause.
  - parameterize the product search query using sequelize op.like with replacements
  - disable external entity processing and dtd loading in the xml parser configuration
  - replace $where template interpolation with a parameterised field equality selector in trackorder
  - remove hardcoded rsa key from source; load 2048-bit key pair from environment-injected secret at startup
  - remove orderlinesdata eval and replace with a structured json schema for order line items
  - validate jwt structure and expiry in loginguard before granting route access
  - derive the review author from the authenticated jwt claim instead of req.body
  - replace cors-only origin check with server-side authentication middleware on socket.io connections
  - add wallet ownership proof via signed message before accepting walletaddress claims
  - sanitize product descriptions with domsanitizer.sanitize() instead of bypasssecuritytrusthtml()
  - remove bypasssecuritytrusthtml call for url query parameter in searchresultcomponent
  - replace md5 password hashing with bcrypt (cost factor ≥12) in lib/insecurity.ts and models/user.ts
  - audit and restrict npm lifecycle scripts in ci workflows and add `--ignore-scripts` for test runner installs
  - pin all github actions to immutable commit shas across every workflow file
  - replace $where nosql query with a standard equality filter on the product field
  - replace $where string concatenation with a typed equality filter in showproductreviews
  - enforce string-type _id validation and add author ownership check before multi-document review update
  - replace tautological uint8 guard with a pre-subtraction balance check in beefaucet.withdraw()
  - 'apply checks-effects-interactions: decrement balance before the external call in withdraw()'
  - eliminate access_token url fragment exposure by migrating to pkce authorization-code flow
  - remove hardcoded testing credentials from the angular component and replace with environment-variable-driven e2e fixtures
  - gate errorhandler on node_env=development and add a sanitized production error handler
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - add authentication middleware to /ftp and /encryptionkeys routes and restrict key file serving
  - validate imageurl against an allowlist of permitted schemes and external hosts before fetching
  - require jwt authentication on socket.io connection and scope notifications to the authenticated user
  - encrypt totp secrets at the field level and enforce sqlite database file encryption
  - move mnemonic/private key to an environment variable or secrets manager and remove from source
  - add express-rate-limit middleware to post /rest/user/login with per-ip and per-account throttling
  - add per-ip rate limiting to post /b2b/v2/orders
  - add rate limiting to login and search endpoints using express-rate-limit with a trusted ip resolver
  - remove global.sleep registration and replace $where with a non-js field selector in showproductreviews
  - enforce per-ip connection limits and a maximum total connection cap on the socket.io server
  - add query timeout and result-set pagination to the raw product search query
  - move role enforcement to server-side api authorization; treat all client-side role checks as ui hints only
  - replace security question reset with time-limited reset token sent to the user's verified email address
  - add least-privilege `permissions:` blocks to all 13 workflows and scope github_token to required operations only
  - require admin role authorization on /rest/admin/* and restrict /metrics to localhost or internal network
  - enforce server-side discount cap in generatecoupon tool and add input message content validation
  - replace hardcoded hmac key with a secret loaded from environment variable for deluxetoken generation
  - add security.isauthorized() middleware to all /rest/web3/* route registrations
  - access window.ethereum only inside guarded functions and validate provider origin before use
  - replace curl-pipe-shell heroku installer with a pinned, hash-verified installation method
  - replace substring matching with exact url equality or strict prefix matching in the redirect allowlist check
  - pin docker base images to immutable `@sha256:` digests in dockerfile
  - add slsa provenance attestation and sigstore/cosign signing to the docker image publish step
  - add user <non-root-uid>
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - add npm ecosystem entry to .github/dependabot.yml
  - add workflow-level `concurrency` groups and `timeout-minutes` to the main ci workflow
  - add rate limiting and a size cap to the walletexploitaddress in-memory set
  - add healthcheck cmd curl -f http://localhost:<port>/health
  - collapse differentiated key-format error messages to a single generic response
