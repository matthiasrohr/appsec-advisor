  stride: Information Disclosure
  cwe: CWE-22
  title: Null-byte injection bypasses extension allowlist to serve restricted FTP files
  affected_parameter: file (GET /ftp/:filename)
  scenario: The `servePublicFiles` handler allows only `.md` and `.pdf` extensions via `endsWithAllowlistedFileType`. An attacker
    requests `GET /ftp/package.json.bak%2500.md`. The raw `file` parameter is `package.json.bak%2500.md` which ends with `.md`
    — the allowlist check at line 27 passes. `security.cutOffPoisonNullByte(file)` is then called at line 28 and strips everything
    from `%00` onward, returning `package.json.bak`. `res.sendFile(path.resolve('ftp/', 'package.json.bak'))` serves the backup
    file. Files exposed this way include `package.json.bak`, `coupons_2013.md.bak`, `encrypt.pyc`, `incident-support.kdbx`,
    and `eastere.gg`.
  evidence_summary: The null-byte stripping function (insecurity.ts:46-51) is applied after the extension allowlist check
    (fileServer.ts:27), so the check sees a different filename than the one served.
  impact_description: Unauthenticated access to any file in the `ftp/` directory regardless of extension, including backup
    files, compiled Python, and KeePass databases containing credentials.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Extension allowlist checks for `.md` and `.pdf` at fileServer.ts:52-54. `cutOffPoisonNullByte` exists
    but is called after the check rather than before.
  mitigation_title: Apply null-byte stripping before the extension allowlist check in servePublicFiles
  remediation:
    effort: Low
    steps:
    - Move `file = security.cutOffPoisonNullByte(file)` to execute before `endsWithAllowlistedFileType(file)` in the `verify`
      function at routes/fileServer.ts:26-38.
    - Additionally reject filenames containing `%00` or raw null bytes (`\x00`) before processing — these have no legitimate
      use in filenames.
    - Consider replacing the extension allowlist approach with a stricter explicit filename allowlist for the FTP directory,
      enumerating only files intended for public download.
    code_example: "function verify (file: string, res: Response, next: NextFunction) {\n  file = security.cutOffPoisonNullByte(file)\
      \ // sanitize FIRST\n  if (file && endsWithAllowlistedFileType(file)) {\n    // now the extension check sees the real\
      \ filename\n    res.sendFile(path.resolve('ftp/', file))\n  } else {\n    res.status(403)\n    next(new Error('Only\
      \ .md and .pdf files are allowed!'))\n  }\n}"
    reference: CWE-22
  evidence:
