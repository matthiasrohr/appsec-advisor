  title: Open Redirect — lib/insecurity.ts:136
  affected_parameter: to
  scenario: The redirect allowlist check at `insecurity.ts:136` uses `url.includes(allowedUrl)` — a substring match rather
    than a prefix or exact match. An attacker crafts a redirect URL such as `https://evil.com?ref=https://github.com/juice-shop/juice-shop`
    or embeds any allowlisted URL as a query parameter. Because `includes()` returns true when the allowlisted string appears
    anywhere in the URL, `isRedirectAllowed` approves the request and `performRedirect` issues `res.redirect(toUrl)` to the
    attacker-controlled domain. A victim who clicks a Juice Shop link (e.g. from an email) is silently redirected to a phishing
    site that mirrors the Juice Shop login page. OAuth flows, password-reset deep-links, or payment redirects passed through
    this endpoint are particularly exploitable for credential harvesting.
  evidence_summary: '`insecurity.ts:136` performs `url.includes(allowedUrl)` rather than `url.startsWith(allowedUrl)`, making
    the allowlist bypassable by embedding an approved URL as a substring anywhere in the attacker-supplied `to` parameter.'
  impact_description: Users following Juice Shop links can be silently redirected to attacker-controlled pages, enabling phishing,
    credential theft, and session hijacking.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Allowlist of approved redirect targets exists in `redirectAllowlist` Set; endpoint is GET-only.
  mitigation_title: Replace substring match with exact-prefix match in isRedirectAllowed
  remediation:
    effort: Low
    steps:
    - Change `url.includes(allowedUrl)` to `url.startsWith(allowedUrl)` in `lib/insecurity.ts:136` to prevent substring embedding
      attacks.
    - 'Add a URL parse step to validate the full origin before prefix matching: `new URL(toUrl).origin === new URL(allowedUrl).origin`
      as a secondary guard.'
    - Add integration tests asserting that `https://evil.com?ref=https://github.com/juice-shop/juice-shop` is rejected.
    code_example: "```typescript\nexport const isRedirectAllowed = (url: string) => {\n  try {\n    const parsed = new URL(url)\n\
      \    for (const allowedUrl of redirectAllowlist) {\n      if (url.startsWith(allowedUrl)) return true\n    }\n    return\
      \ false\n  } catch {\n    return false\n  }\n}\n```"
