  stride: Elevation of Privilege
  cwe: CWE-862
  title: Product Update Endpoint Lacks Authentication Middleware — server.ts:370
  scenario: 'An unauthenticated attacker sends PUT `/api/Products/1` with a JSON body containing modified product data such
    as `{ "price": 0.01, "description": "<script>..." }`. At `server.ts:370`, `app.put(''/api/Products/:id'', security.isAuthorized())`
    is commented out. The `finale-rest` handler at line 481 processes the PUT without any authentication check, updating the
    product record in the SQLite database. The attacker sets any product''s price to a near-zero value or injects XSS payloads
    into product descriptions.'
  evidence_summary: '`server.ts:370` shows `// app.put(''/api/Products/:id'', security.isAuthorized()) // vuln-code-snippet
    vuln-line changeProductChallenge` — the authentication middleware for `PUT /api/Products/:id` is commented out, leaving
    the route unprotected.'
  impact_description: Unauthenticated attacker modifies any product's price, description, or image, enabling price manipulation
    fraud and stored XSS injection into product pages.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: '`POST /api/Products` requires `security.isAuthorized()` (server.ts:369). The `PUT` middleware is intentionally
    disabled as a challenge feature.'
  mitigation_title: Re-enable authentication middleware on PUT /api/Products/:id in server.ts and add admin-role guard
  remediation:
    effort: Low
    steps:
    - Uncomment `app.put('/api/Products/:id', security.isAuthorized())` at `server.ts:370` to require authentication for all
      product updates.
    - 'Further restrict to admin-only: replace `security.isAuthorized()` with `security.isAdmin()` (or equivalent role check)
      since product modification is not a user-level action.'
    - Add input validation on the PUT body fields (`price`, `description`, `name`) via a schema validator before the `finale-rest`
      handler processes the request.
    - Sanitize `description` output when rendering product pages to prevent stored XSS from injected HTML.
    code_example: "// server.ts — restore and strengthen the guard\napp.put('/api/Products/:id', security.isAuthorized(),\
