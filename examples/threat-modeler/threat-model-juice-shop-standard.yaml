    Users WHERE email = ''${req.body.email || ''''}'' AND password = ''...''`. An anonymous attacker sends the email value
    `'' OR ''1''=''1'' --` to short-circuit the WHERE clause, causing Sequelize to return the first user row — which is the
    seeded admin account. No authentication check stands between the malicious input and the returned token. The attack is
    unauthenticated, requires no prior knowledge of any credential, and grants full admin-level JWT within a single request.'
