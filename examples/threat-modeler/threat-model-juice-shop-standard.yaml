  title: SQL Injection in Product Search Route — routes/search.ts:23
  affected_parameter: q
  scenario: '`routes/search.ts:23` interpolates `req.query.q` directly into a raw SQL LIKE query: ``SELECT * FROM Products
    WHERE ((name LIKE ''%${criteria}%'' OR description LIKE ''%${criteria}%'') AND deletedAt IS NULL)``. The only guard is
    a 200-character length truncation (`criteria.substring(0, 200)`). A UNION-SELECT payload such as `%'')) UNION SELECT email,password,1,1,1,1,1,1,1
    FROM Users--` extracts all user credentials. The endpoint is publicly accessible with no authentication requirement, widening
    the attacker population to anonymous internet users.'
  evidence_summary: '`req.query.q` flows unescaped through `criteria` into a raw sequelize.query() LIKE clause at routes/search.ts:23
    without parameterized binding.'
  impact_description: Unauthenticated extraction of all user emails, MD5 password hashes, and the full database schema via
    UNION-based SQL injection.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input truncated to 200 characters — does not prevent injection.
  mitigation_title: Parameterize the product search LIKE query using Sequelize replacements
  remediation:
    effort: Low
    steps:
    - 'Use Sequelize `Op.like` with the ORM: `ProductModel.findAll({ where: { [Op.or]: [{ name: { [Op.like]: `%${criteria}%`
      } }, { description: { [Op.like]: `%${criteria}%` } }], deletedAt: null } })` — Sequelize escapes the value in LIKE expressions.'
    - 'Alternatively use `sequelize.query(''SELECT * FROM Products WHERE (name LIKE ? OR description LIKE ?) AND deletedAt
      IS NULL'', { replacements: [`%${criteria}%`, `%${criteria}%`], ... })`.'
    - Validate `criteria` to only allow printable non-control characters before the database call.
    code_example: "import { Op } from 'sequelize'\n// routes/search.ts — ORM approach\nconst products = await ProductModel.findAll({\n\
      \  where: {\n    [Op.or]: [\n      { name: { [Op.like]: `%${criteria}%` } },\n      { description: { [Op.like]: `%${criteria}%`\
      \ } }\n    ],\n    deletedAt: null\n  },\n  order: [['name', 'ASC']]\n})"
    reference: CWE-89
