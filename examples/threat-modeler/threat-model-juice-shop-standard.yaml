    Ethereum addresses, rendering the challenges meaningless.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — no JWT auth middleware, no EIP-712 or personal_sign signature challenge
  mitigation_title: Add wallet ownership proof via signed message before accepting walletAddress claims
