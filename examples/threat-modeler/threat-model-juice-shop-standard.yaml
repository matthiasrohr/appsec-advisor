  title: Missing Security Event Logging — server.ts:338
  scenario: An attacker who exploits SQL injection (`routes/login.ts:34`) or JWT forgery (`lib/insecurity.ts:21`) to authenticate
    as the admin can read, modify, or delete records with no structured security event written to an immutable log. Because
    HTTP access logs (`logs/access.log`) record only requests — not the actor identity derived from the JWT, the outcome,
    or the changed resource — a forensic analyst cannot reconstruct what the attacker did, which records were read, or whether
    lateral movement occurred.
  evidence_summary: HTTP request logging uses `morgan('combined')` at `server.ts:338`, which records IP, method, path, and
    status code only. No structured log emits `actor_id`, `action`, `resource`, or `outcome` for authentication events, basket
    access, admin operations, or chatbot tool calls.
  impact_description: Post-incident forensic analysis is blocked; attacker actions are unattributable, and compliance audits
    (e.g., access to PII under GDPR) cannot be completed.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: HTTP access logs via `morgan` are written to rotating files. No structured security event log exists.
  mitigation_title: Add structured security audit logging for authentication, authorization, and admin events
  remediation:
    effort: Medium
    steps:
    - Emit a structured JSON log entry on every authentication event (`login`, `logout`, `2FA verify`, `password reset`) recording
      `{ timestamp, actor_email, actor_id, event_type, ip, outcome }`.
    - Emit a structured log entry on every authorization decision for sensitive resources (basket access, admin panel, B2B
      orders) including the resource ID and caller identity.
    - Write security events to an append-only log sink separate from the `morgan` HTTP log — consider a dedicated file channel
      with `winston` or piping to stdout for a log aggregator.
    - Add a log entry whenever `generateCoupon` or other LLM tools execute, recording the `userId`, tool name, and parameters.
    code_example: "// lib/auditLogger.ts\nimport winston from 'winston'\nexport const audit = winston.createLogger({\n  format:\
      \ winston.format.json(),\n  transports: [new winston.transports.File({ filename: 'logs/security-audit.log' })]\n})\n\
      export const logAuthEvent = (event: string, userId: number, ip: string, outcome: string) =>\n  audit.info({ timestamp:\
      \ new Date().toISOString(), event, userId, ip, outcome })"
