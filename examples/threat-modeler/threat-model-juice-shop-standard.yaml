- local_id: ci-cd-pipeline-006
  threat_category_id: TH-14
  additional_categories: []
  stride: Repudiation
  cwe: CWE-1357
  title: No Build Provenance Attestation or SBOM Signing for Published — ci.yml:337
  affected_parameter: docker/build-push-action
  scenario: The Docker images published to Docker Hub (`bkimminich/juice-shop:latest`, `:snapshot`, and release tags) and
    implicitly to ghcr.io are built and pushed by ci.yml and release.yml without any provenance attestation, SBOM signing,
    or build artifact signing (no calls to `actions/attest-build-provenance`, `sigstore/cosign`, or SLSA provenance generation).
    Users who pull the image have no cryptographic means to verify that the image was built from the declared commit SHA,
    on the declared date, using the declared Dockerfile. This enables an attacker who gains push access to Docker Hub (via
    a compromised DOCKERHUB_TOKEN) to push a trojanized image under the `latest` tag; downstream users and instructors relying
    on `bkimminich/juice-shop:latest` for security training would run the compromised image with no warning. SBOM generation
    (`npm run sbom` in Dockerfile line 20) is performed inside the image but the resulting CycloneDX artifact is not signed
    or published as a verifiable attestation.
  evidence_summary: Neither ci.yml nor release.yml calls any attestation or signing action after `docker/build-push-action`,
    leaving the Docker Hub publication repudiation-free.
  impact_description: A compromised DOCKERHUB_TOKEN allows silent substitution of the published image with no forensic trail
    to detect the tampering; affected users cannot distinguish legitimate from trojanized builds.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: CodeQL SAST runs on source code. CycloneDX SBOM is embedded in the built image but not externally attested
    or signed.
  mitigation_title: Add SLSA provenance attestation and Sigstore/cosign signing to the Docker image publish step
  remediation:
    effort: Medium
    steps:
    - Add `actions/attest-build-provenance` immediately after the `docker/build-push-action` step in both ci.yml and release.yml
      to produce a SLSA Level 2 provenance attestation anchored to the image digest.
    - Enable Docker Hub content trust (`DOCKER_CONTENT_TRUST=1`) or migrate Docker image publication to ghcr.io with OIDC-based
      cosign signing using `sigstore/cosign-installer` plus `cosign sign --key env://COSIGN_KEY`.
    - Publish the CycloneDX SBOM generated inside the Docker build as a signed GitHub release artifact so consumers can verify
      it against the image digest.
    code_example: "# ci.yml docker job — after docker/build-push-action step\n      - name: \"Attest build provenance\"\n\
      \        uses: actions/attest-build-provenance@v2\n        with:\n          subject-name: index.docker.io/bkimminich/juice-shop\n\
      \          subject-digest: ${{ steps.push.outputs.digest }}\n          push-to-registry: true"
    reference: CWE-1357
  evidence:
