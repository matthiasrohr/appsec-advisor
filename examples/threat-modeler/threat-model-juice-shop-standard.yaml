    while a rate limit of 100 requests per 5 minutes exists, its key generator uses the client-supplied `X-Forwarded-For`
    header (see auth-006), making it trivially bypassed for brute-forcing short answers.'
  evidence_summary: '`SecurityAnswerModel.findOne()` is matched against `security.hmac(answer)` with no attempt counter or
    lockout, and the HMAC key is hardcoded.'
  impact_description: Attacker resets any target account's password by guessing or researching the security question answer,
    then authenticates as that user.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Rate limit on `/rest/user/reset-password` — 100 req/5 min — but bypassed via `X-Forwarded-For` spoofing.
