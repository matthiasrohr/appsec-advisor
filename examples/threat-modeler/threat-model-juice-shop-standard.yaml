- local_id: llm-chat-interface-004
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-770
  title: Unbounded LLM Consumption on Chat Endpoint — server.ts:637
  affected_parameter: messages
  scenario: 'LLM10 — Unbounded Consumption: /rest/chat (server.ts:637) has no rate-limiting middleware, while other sensitive
    routes use express-rate-limit (server.ts:343, 458, 465, 471). Each request triggers an outbound streaming LLM call (routes/chat.ts:201)
    with stopWhen: stepCountIs(10) — up to 10 model/tool round-trips per request — and maxRetries configurable (line 206).
    The client controls the full `messages` array (line 189) with no size cap, so a single caller can submit very large message
    histories and loop requests to drive token cost and saturate the upstream LLM connection. Because the endpoint is also
    unauthenticated (llm-chat-interface-003), this amplification requires no account. There is no per-user token budget, no
    max_tokens cap on output, and no concurrency limit; the only token controls are Prometheus counters (lines 57-79) that
    measure but do not bound usage.'
  evidence_summary: No rate-limit, request-size, or output-token bound is applied to /rest/chat; the route at server.ts:637
    lacks the express-rate-limit middleware used on other routes, and routes/chat.ts permits up to 10 LLM steps per request.
  impact_description: A single client can inflate LLM API cost and exhaust the upstream connection pool, degrading the chat
    service and incurring unbounded provider spend.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None bounding. Prometheus token counters exist (routes/chat.ts:57-79) for observability but enforce no
    limit. maxRetries is configurable but multiplies, not caps, load.
  mitigation_title: Apply per-user rate limiting, request-size caps, and output-token bounds to the chat endpoint
  remediation:
    effort: Low
    steps:
    - 'Add express-rate-limit to the route, keyed on authenticated user id: app.post(''/rest/chat'', security.isAuthorized(),
      rateLimit({ windowMs: 60_000, max: 20 }), utils.asyncHandler(chat())).'
    - Cap the accepted messages array length and per-message size before invoking streamText (see llm-chat-interface-001 code
      example).
    - Set a maxOutputTokens limit on the streamText call and consider lowering stepCountIs below 10 unless multi-tool flows
      require it.
    - Add cost alerting on the existing Prometheus llm_*_tokens counters so runaway consumption is detected.
    code_example: "import { rateLimit } from 'express-rate-limit'\napp.post('/rest/chat',\n  security.isAuthorized(),\n  rateLimit({\
      \ windowMs: 60_000, max: 20, validate: false }),\n  utils.asyncHandler(chat()))"
    reference: CWE-770
