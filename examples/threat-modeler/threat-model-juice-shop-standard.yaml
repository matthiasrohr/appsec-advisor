tier_root_causes:
  edge:
  - JWT tokens stored in localStorage expose all sessions to XSS theft
  - Client-side route guards bypassable via direct localStorage manipulation
  - OAuth credentials computed client-side from predictable email values
  - Angular bypasses due to missing CSP and unsafe innerHTML rendering
  - Frontend trusts server-supplied role claims without server re-verification
  server:
  - Raw SQL string interpolation on multiple routes enables SQL injection
  - eval() and vm.runInContext sandbox escapes allow RCE
  - Hardcoded RSA private key enables JWT forgery for any user
  - Missing auth middleware on sensitive routes allows unauthenticated access
  - XML parsing with noent:true and file upload SSRF enable entity injection
  data:
  - Unsalted MD5 password hashing makes all stored passwords trivially crackable
  - Payment card numbers stored in plaintext expose PCI-scope data at rest
  - User role field writable via unguarded model setters enables escalation
  - No field-level encryption for sensitive PII columns in SQLite database
  - No database-layer access controls allow horizontal privilege escalation
