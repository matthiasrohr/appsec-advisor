- local_id: ci-cd-pipeline-005
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1104
  title: Absent on and no Dependabot leaves dependency tree unlocked — package.json:88
  affected_parameter: package-lock.json / .github/dependabot.…
  scenario: 'No `package-lock.json` is committed to the repository. Every `npm install` in CI resolves the full dependency
    tree afresh from the registry — different transitive dependency versions may install on each run. A supply-chain attacker
    who publishes a maliciously-updated version of any transitive dependency (e.g., bumping the patch version of an unmonitored
    package) can silently inject backdoor code into CI builds without any source code change. Compounding this, no `.github/dependabot.yml`
    file exists, so GitHub provides no automated vulnerability-update PRs. Known-vulnerable transitive packages (such as those
    already identified in the `express-backend` component) can persist indefinitely without triggering any automated alert.
    The `postinstall` script in package.json (line 88) amplifies this: it automatically installs frontend dependencies and
    builds the project on every `npm install`, expanding the attack surface to the full frontend dependency tree as well.'
  evidence_summary: package-lock.json is absent from the repository root, and .github/dependabot.yml does not exist, confirmed
    by the config-scan (CFG-011, CFG-012).
  impact_description: Transitive dependency compromise delivers backdoored builds to all environments (DockerHub, Heroku,
    packaged releases) without detection.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: CycloneDX SBOM generation (`npm run sbom`) is present in the Dockerfile, providing post-hoc inventory.
    This does not prevent installation of compromised packages.
  mitigation_title: Commit package-lock.json, switch CI to npm ci, and configure Dependabot for npm ecosystem
  remediation:
    effort: Medium
    steps:
    - Run `npm install` locally to generate `package-lock.json` and commit it to the repository.
    - Replace `npm install` with `npm ci` in all CI workflow jobs to enforce lockfile-exact installation.
    - Create `.github/dependabot.yml` with an `npm` ecosystem entry targeting the repo root and `frontend/` directory.
    - Add `--ignore-scripts` to `npm ci` commands in CI where postinstall scripts are not required for the specific job (e.g.,
      lint, rsn checks).
    - 'Review the `postinstall` script in package.json and document why it is required; add `# audited: <date> <reviewer>`
      annotation.'
    code_example: "# .github/dependabot.yml\nversion: 2\nupdates:\n  - package-ecosystem: npm\n    directory: /\n    schedule:\n\
      \      interval: weekly\n  - package-ecosystem: npm\n    directory: /frontend\n    schedule:\n      interval: weekly"
    reference: CWE-1104
  evidence:
  - file: package.json
    line: 88
