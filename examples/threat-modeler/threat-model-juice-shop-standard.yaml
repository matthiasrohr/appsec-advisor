  cwe: CWE-829
  title: Lockfile Disabled Enabling Dependency Confusion — .npmrc:1
  affected_parameter: null
  scenario: '`.npmrc` sets `package-lock=false` at line 1, and `package-lock.json` is also listed in `.gitignore`. Every `npm
    install` in CI — including the test matrix (6 OS/node combinations in `ci.yml:85`), api-test (9 combinations at `ci.yml:125`),
    e2e tests (`ci.yml:211`), and the release packaging job (`release.yml:41`) — resolves dependency versions from the npm
    registry at install time with no lockfile to constrain them. An attacker who publishes a malicious patch version of any
    transitive dependency can have it installed into the next CI run. The `coding-challenge-rsn` job (`ci.yml:65`) also runs
    `npm install` without `--ignore-scripts`, meaning postinstall scripts from any injected package execute in the runner
    context. The no-minimum-release-age and no-npm-audit controls confirmed absent in all 13 workflows.'
  evidence_summary: '`.npmrc:1` permanently disables lockfile generation with `package-lock=false`; CI jobs call `npm install`
    without version pinning or integrity verification.'
  impact_description: A dependency confusion or typosquatting attack yields code execution inside the GitHub Actions runner
    with access to all secrets scoped to that workflow run.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: SBOM is generated at build time via CycloneDX, but this is post-install — it records what was installed,
    not what was expected.
  mitigation_title: Commit a lockfile and remove the package-lock=false override from .npmrc
  remediation:
    effort: Medium
    steps:
    - Remove `package-lock=false` from `.npmrc` and remove `package-lock.json` from `.gitignore`.
    - Run `npm install` locally to generate `package-lock.json`, then commit it. Do the same for `frontend/package-lock.json`.
    - Add `npm ci` (instead of `npm install`) in all CI workflow jobs — `npm ci` requires a lockfile and fails if `package-lock.json`
      is absent or inconsistent with `package.json`.
    - Add `npm audit --audit-level=high` as a required CI gate step to catch known vulnerabilities in resolved dependencies.
    code_example: "# ci.yml — replace npm install with npm ci in all jobs\n- name: \"Install application\"\n  run: npm ci\n\
      \n- name: \"Audit dependencies\"\n  run: npm audit --audit-level=high"
    reference: CWE-829
  evidence:
