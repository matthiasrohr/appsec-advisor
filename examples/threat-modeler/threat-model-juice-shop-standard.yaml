  title: Missing Brute-Force Protection on Login Endpoint — routes/login.ts:32
  scenario: An attacker submits unlimited POST requests to `/rest/user/login` against a target email address. Because no rate
    limiting, account lockout, or CAPTCHA is applied to this route (`server.ts:596` registers it with no middleware guards),
