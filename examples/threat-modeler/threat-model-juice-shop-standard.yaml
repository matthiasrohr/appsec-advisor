  stride: Information Disclosure
  cwe: CWE-611
  title: XML External Entity Expansion — routes/fileUpload.ts:83
  affected_parameter: file (multipart XML upload)
  scenario: An unauthenticated attacker POSTs to /file-upload a crafted XML file containing an external entity declaration
    (e.g., <!DOCTYPE x [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><x>&xxe;</x>). At fileUpload.ts:83, libxmljs2 is invoked
    with noent:true, which triggers DTD entity resolution and substitutes the file content into the XML document tree. The
    resolved XML string is then embedded directly in the error message at line 87 and returned to the caller, exposing up
    to 400 bytes of the target file's content per request. No authentication is required; any internet actor can trigger this.
  evidence_summary: 'libxmljs2.parseXml() is called with { noent: true } at fileUpload.ts:83, and the resulting xmlString
    (including resolved entity content) is embedded in the HTTP 410 error response at line 87.'
  impact_description: Attacker reads arbitrary files readable by the Node.js process — /etc/passwd, application secrets, private
    keys, or any file accessible on the server filesystem.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: 2-second vm.runInContext timeout (does not prevent entity resolution, which occurs in native C before
    JS evaluates)
  mitigation_title: Disable DTD entity expansion in libxmljs2 by setting noent:false
  remediation:
    effort: Low
    steps:
    - Change noent:true to noent:false in the libxml.parseXml() options at routes/fileUpload.ts:83 — this disables external
      entity resolution at the C-library level.
    - Additionally set nonet:true to block network-based entity fetches as defence-in-depth.
    - Remove the parsing result from the error message at line 87 — never echo parsed XML content back to callers.
    - If XML intake is no longer needed (endpoint is already marked 'deprecated'), remove the handleXmlUpload middleware entirely
      from the route chain.
    code_example: "// routes/fileUpload.ts:83 — safe options\nconst xmlDoc = vm.runInContext(\n  'libxml.parseXml(data, {\
      \ noblanks: true, noent: false, nocdata: true, nonet: true })',\n  sandbox,\n  { timeout: 2000 }\n)"
