  title: Remote Code Execution — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: 'The B2B order endpoint at POST /b2b/v2/orders accepts a JSON body with `orderLinesData` and executes it via `vm.runInContext(''safeEval(orderLinesData)'',
    sandbox, { timeout: 2000 })` at routes/b2bOrder.ts:23. The `notevil` library''s safe-eval is not a true sandbox — known
    escape techniques involving prototype chain manipulation or constructor access allow breakout from notevil into the Node.js
    runtime. An authenticated B2B user (JWT required, but key is hardcoded so token is forgeable) can submit crafted `orderLinesData`
    to execute arbitrary Node.js code. This is a well-documented class of vulnerability in notevil/vm2.'
  evidence_summary: b2bOrder.ts:23 calls `vm.runInContext('safeEval(orderLinesData)', sandbox)` where `orderLinesData` is
    directly from `req.body.orderLinesData`.
  impact_description: Authenticated attackers achieve full server-side RCE via notevil sandbox escape, with access to all
    server resources, environment variables, and the filesystem.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: 2000ms execution timeout; `isAuthorized()` middleware on /b2b/v2 (but JWT key is hardcoded, making auth
    forgeable).
  mitigation_title: Remove dynamic code evaluation from B2B order endpoint; replace with schema-validated order line parsing
  remediation:
    effort: Medium
    steps:
    - Replace the safeEval pattern entirely with a Zod schema that validates `orderLinesData` as a structured JSON object
      (order line items with typed fields)
    - If expression evaluation is genuinely required, use a purpose-built expression parser (e.g., `expr-eval`) restricted
      to arithmetic operations and a fixed variable set
    - Remove the `notevil` dependency from package.json as it is not a safe sandbox for untrusted code
    code_example: "// routes/b2bOrder.ts — replace eval with schema validation\nimport { z } from 'zod'\n\nconst orderLineSchema\
      \ = z.array(z.object({\n  productId: z.number().int().positive(),\n  quantity: z.number().int().positive().max(100),\n\
      \  price: z.number().positive()\n}))\n\nconst orderLines = orderLineSchema.parse(JSON.parse(body.orderLinesData))\n\
      // Process orderLines safely"
    reference: CWE-94
