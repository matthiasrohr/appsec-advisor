  impact: High
  risk: High
  controls_in_place: Rate limiting at 100 req/5min (bypassable via X-Forwarded-For). HMAC of answer stored rather than plaintext.
  mitigation_title: Replace security-question reset with email OTP verification and enforce rate limit by real IP
  remediation:
    effort: High
    steps:
