  cwe: CWE-269
  title: JWT role claim elevation — lib/insecurity.ts:54
  affected_parameter: Authorization header
  scenario: The public key is served at /encryptionkeys/jwt.pub (static file serving confirmed in manifest). An attacker retrieves
    this public key and crafts a JWT signed with HS256 using the public key bytes as the HMAC secret. express-jwt 0.1.3 and
    isAuthorized() at lib/insecurity.ts:54 do not restrict accepted algorithms. If the library accepts the HS256 token (the
    public key is used as the HMAC secret by the attacker; verification would check HS256(public_key_bytes) which the attacker
    can compute), the attacker can set role:admin in the payload. Even if express-jwt rejects it, isAccounting() at lib/insecurity.ts:156
    uses security.verify() which calls jws.verify(token, publicKey) — jws may accept HS256-signed tokens when passed the public
    key string as a symmetric secret, depending on version.
  evidence_summary: 'isAuthorized() at lib/insecurity.ts:54 passes only { secret: publicKey } to express-jwt 0.1.3 without
    algorithms restriction, enabling algorithm confusion attacks.'
  impact_description: Attacker elevates their JWT role claim to 'admin' or 'accounting' without the RSA private key, gaining
    access to all privileged routes.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: express-jwt validates signature, but does not pin the algorithm.
  mitigation_title: Restrict JWT verification to RS256 algorithm across all verification call sites
  remediation:
    effort: Medium
    steps:
    - 'Upgrade express-jwt to ^8.x and specify { algorithms: [''RS256''] } in every expressJwt() call.'
    - 'Replace jws.verify() in security.verify() with jsonwebtoken.verify(token, publicKey, { algorithms: [''RS256''] }) which
      explicitly rejects HS256.'
    - Serve jwt.pub only from an internal endpoint (not publicly accessible) or remove static serving of encryptionkeys/ directory.
    - After algorithm pinning, audit all isAuthorized(), isAccounting(), isDeluxe(), and isCustomer() helpers to confirm they
      all use the updated verify path.
    code_example: "// lib/insecurity.ts — algorithm-pinned verify\nimport jwt from 'jsonwebtoken'\nexport const verify = (token:\
      \ string) => {\n  try {\n    return jwt.verify(token, publicKey, { algorithms: ['RS256'] })\n  } catch { return false\
