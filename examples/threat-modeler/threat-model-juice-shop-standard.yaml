    speed, leading to account takeover or login service degradation.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Rate limiting exists on `/rest/user/reset-password` but not on `/rest/user/login`.
  mitigation_title: Apply per-IP and per-account rate limiting with progressive backoff on the login endpoint
