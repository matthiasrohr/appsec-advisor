    and rendered with [innerHTML].
  impact_description: An attacker-controlled login IP header yields persistent script execution in the origin, enabling token
    theft.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None at the sink — bypassSecurityTrustHtml explicitly disables escaping for this value.
  mitigation_title: Render lastLoginIp as escaped text and validate the source IP header server-side
  remediation:
