  threat_category_id: TH-06
  stride: Spoofing
  cwe: CWE-290
  title: Wallet Address Spoofing in NFT Challenge Verification — routes/nftMint.ts:41
  affected_parameter: walletAddress
  scenario: The `walletNFTVerify` function at routes/nftMint.ts:41 reads `req.body.walletAddress` and checks whether it exists
    in the in-memory `addressesMinted` Set. There is no cryptographic proof that the caller controls the submitted Ethereum
    address (e.g., a signed message challenge or `eth_sign` signature verification). Ethereum addresses are public — every
    on-chain NFT mint transaction is visible in the mempool and block explorer. An attacker who monitors the Sepolia chain
    for `NFTMinted` events can extract a minter's address and submit it to `/rest/web3/walletNFTVerify` before the legitimate
    user does, thereby consuming the Set entry and claiming the challenge credit. The same design flaw exists in `contractExploitListener`
    (web3Wallet.ts:15).
  evidence_summary: routes/nftMint.ts:41 trusts `req.body.walletAddress` without any ECDSA signature verification; the `addressesMinted`
    Set membership check at line 42 provides the only gate.
  impact_description: An attacker can claim NFT-mint challenge solutions on behalf of users who performed the on-chain action,
    constituting identity spoofing in the challenge credit system.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: The server-side Set is populated only by the on-chain WebSocket event, providing some integrity for the
    recorded address — but caller identity is never verified.
  mitigation_title: Require an Ethereum signed-message proof in walletNFTVerify to prove caller controls the submitted address
  remediation:
    effort: Medium
    steps:
    - Before checking Set membership, issue a server-generated nonce per session and require the caller to submit `eth_sign(nonce,
      walletAddress)` alongside `walletAddress`.
    - Verify the signature on the server using ethers.js `verifyMessage(nonce, signature)` and confirm the recovered address
      equals `req.body.walletAddress`.
    - Alternatively, tie the wallet address to the authenticated user session at registration time (via a wallet-connect step)
      so that `walletNFTVerify` resolves against the session's pre-registered address rather than a user-supplied parameter.
    code_example: "// routes/nftMint.ts\nconst { verifyMessage } = await import('ethers')\nconst recovered = verifyMessage(sessionNonce,\
      \ req.body.signature)\nif (recovered.toLowerCase() !== req.body.walletAddress.toLowerCase()) {\n  return res.status(401).json({\
      \ error: 'Signature verification failed' })\n}"
    reference: CWE-290
  evidence:
  - file: routes/nftMint.ts
    line: 41
  evidence_check: verified
