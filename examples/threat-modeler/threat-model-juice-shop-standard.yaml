  title: SQL injection — routes/search.ts:23
  affected_parameter: q (query parameter)
  scenario: 'GET /rest/products/search?q=<input> passes `req.query.q` directly into a Sequelize raw SQL query at routes/search.ts:23:
    `SELECT * FROM Products WHERE ((name LIKE ''%${criteria}%'' OR description LIKE ''%${criteria}%'') ...)`. No parameterization
    or escaping is applied. An attacker sends `q='')) UNION SELECT 1,email,password,4,5,6,7,8,9 FROM Users--` to extract all
    user email and password hash combinations. A secondary `UNION SELECT sql FROM sqlite_master` leaks the full database schema.
    The query is unauthenticated.'
  evidence_summary: routes/search.ts:23 interpolates `criteria` (from `req.query.q`) directly into a raw Sequelize SQL template
    string with no parameterization.
  impact_description: Complete database exfiltration including user credentials, order history, and schema; potential for
    blind SQLi-based data modification.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input length is capped at 200 characters (line 22), insufficient to prevent UNION injection.
  mitigation_title: Replace raw SQL template interpolation with Sequelize parameterized queries in searchProducts
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `sequelize.query(\`SELECT...${criteria}...\`)` with Sequelize''s ORM operators: `ProductModel.findAll({
      where: { [Op.or]: [{ name: { [Op.like]: ''%'' + criteria + ''%'' } }, { description: { [Op.like]: ''%'' + criteria +
      ''%'' } }], deletedAt: null } })`.'
    - Import `Op` from `sequelize` and remove the raw SQL string entirely.
    - Add a SAST rule (e.g. eslint-plugin-security `detect-non-literal-regexp`) to prevent future raw SQL interpolation.
    code_example: "import { Op } from 'sequelize'\n// routes/search.ts\nconst products = await ProductModel.findAll({\n  where:\
      \ {\n    [Op.or]: [\n      { name: { [Op.like]: `%${criteria}%` } },\n      { description: { [Op.like]: `%${criteria}%`\
      \ } }\n    ],\n    deletedAt: null\n  },\n  order: [['name', 'ASC']]\n})"
    reference: CWE-89
