- local_id: auth-002
  threat_category_id: TH-10
  additional_categories: []
  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA private key enables arbitrary JWT forgery — lib/insecurity.ts:23
  affected_parameter: Authorization header / token cookie
  scenario: 'The 1024-bit RSA private key is embedded as a string literal at lib/insecurity.ts:23 and committed to a public
    GitHub repository. Any actor who reads the source — including automated secret scanners, forks, or cached git history
    — possesses the private key. Using this key they can call jwt.sign() with any payload (e.g. { role: ''admin'', email:
    ''attacker@evil.com'' }) and algorithm RS256, producing a token that passes express-jwt validation at every isAuthorized()
    middleware. This grants attacker-chosen role and identity to all protected REST endpoints.'
  evidence_summary: The privateKey constant at lib/insecurity.ts:23 contains a complete PKCS#1 RSA private key as a hardcoded
