  cwe: CWE-778
  title: Query Logging Disabled No Audit Trail for Data Mutations — models/index.ts:39
  affected_parameter: null
  scenario: 'Sequelize is initialized with `logging: false` at `models/index.ts:39`, suppressing all SQL query logs. Combined
    with the absence of a separate audit log (no write to any append-only table or log sink on sensitive operations), sensitive
    mutations — user password changes, role updates, order modifications, review tampering — leave no forensic trace. An insider
    or a compromised session that modifies user roles or deletes records cannot be reconstructed from logs.'
  evidence_summary: '`new Sequelize(..., { logging: false })` at `models/index.ts:39` explicitly disables query-level audit
    logging; no Sequelize hooks or middleware write to a separate audit log on sensitive model events.'
  impact_description: Post-incident forensic reconstruction of data-layer attacks (SQL injection, privilege escalation via
    role field tampering) is impossible; attackers cannot be attributed.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — application-level logging via Winston covers HTTP requests, not data mutations.
  mitigation_title: Enable structured audit logging for sensitive Sequelize model events via afterCreate/afterUpdate/afterDestroy
    hooks
  remediation:
    effort: Medium
    steps:
    - Add Sequelize `afterCreate`, `afterUpdate`, `afterDestroy` hooks on `UserModel`, `BasketItemModel`, and `WalletModel`
      that emit a structured log entry (actor ID, model name, primary key, changed fields, timestamp) to a dedicated security
      log sink.
    - 'Do NOT re-enable `logging: true` in production — raw SQL logs contain cleartext query parameters; use hook-level structured
      logging instead.'
    - Consider an append-only `AuditLog` Sequelize model (insert-only, no `deleteAt` / soft-delete) to capture mutations in
      the same database, or ship to an external log aggregator.
    code_example: "// models/user.ts — add after UserModelInit\nUser.addHook('afterUpdate', 'auditUserUpdate', (user) => {\n\
      \  logger.info({ event: 'user.updated', userId: user.id, changed: Object.keys(user.changed() || {}), ts: new Date().toISOString()\
      \ })\n})\nUser.addHook('afterDestroy', 'auditUserDelete', (user) => {\n  logger.info({ event: 'user.deleted', userId:\
      \ user.id, ts: new Date().toISOString() })\n})"
    reference: CWE-778
