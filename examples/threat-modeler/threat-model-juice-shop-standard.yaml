  title: SQL injection in login query enables auth bypass — routes/login.ts:34
  affected_parameter: email
  scenario: The login handler at routes/login.ts:34 builds a raw SQL string by interpolating req.body.email directly into
    a SELECT against the Users table, then runs it via sequelize.query with plain:true. Submitting email = "' OR 1=1--" returns
    the first user row (the admin) and the handler issues that user a valid JWT at line 49, bypassing the password check entirely.
    An attacker can also pivot to UNION-based extraction of any column. This is the canonical Juice-Shop login-bypass and
    admin-account-takeover vector.
  evidence_summary: req.body.email is string-concatenated into the WHERE clause of a raw sequelize.query at routes/login.ts:34
    with no parameterization.
  impact_description: Unauthenticated attacker logs in as any user (including admin) and exfiltrates the full Users table
    via UNION injection.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. No input validation, escaping, or parameter binding on the email field before query construction.
  mitigation_title: Replace raw login query with parameterized Sequelize finder on email
  remediation:
    effort: Low
    steps:
    - 'Replace the string-interpolated query with a parameterized finder: UserModel.findOne({ where: { email: req.body.email,
      password: security.hash(req.body.password), deletedAt: null } }).'
    - 'If raw SQL is unavoidable, use sequelize replacements/bind parameters (replacements: { email }) so the driver escapes
      input.'
    - Add a request-body schema (express-validator / zod) that constrains email to a valid address format before it reaches
      the data layer.
