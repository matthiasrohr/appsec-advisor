  title: Socket.IO CORS Allows Any Non-Browser Client to — registerWebsocketEvents.ts:20
  affected_parameter: cors.origin
  scenario: 'The Socket.IO CORS configuration `{ cors: { origin: ''http://localhost:4200'' } }` at `lib/startup/registerWebsocketEvents.ts:20`
    restricts the browser `Origin` header to the development Angular dev server. In production deployments (where the Angular
    app is served from the same Express origin), this restriction does not match (the Angular app connects to `window.location.origin`,
    not `localhost:4200`). More critically, non-browser Socket.IO clients (wscat, Python `python-socketio`, automated scripts)
    do not send an `Origin` header at all; Socket.IO v3 defaults to `allowEIO3: false` but accepts connections without an
    `Origin`. An attacker using `python-socketio` connects without any `Origin` header, the CORS check is not triggered, and
    they receive the full event stream including challenge flags.'
  evidence_summary: '`cors: { origin: ''http://localhost:4200'' }` at line 20 is a browser-only control that native WebSocket
    clients bypass by omitting the `Origin` header.'
  impact_description: An attacker using a non-browser WebSocket client connects to the production server without any origin
    restriction and receives all broadcast events.
