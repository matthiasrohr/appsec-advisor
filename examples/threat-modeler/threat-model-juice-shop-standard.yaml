- local_id: frontend-spa-006
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client-Side-Only Role Guard for Admin and Accounting Routes — app.guard.ts:52
  scenario: '`AdminGuard.canActivate()` at `app.guard.ts:52-60` decodes the JWT from `localStorage` using `jwtDecode()` and
    checks `payload.data.role === ''admin''`. `jwtDecode()` decodes the payload without verifying the signature — it is purely
    a base64 decode. The Angular route guard only prevents Angular''s router from rendering the component; it does not send
    a request to the server to verify authorization. An attacker who can execute JavaScript in the page (via any of the XSS
    sinks in `frontend-spa-004`) can call `localStorage.setItem(''token'', forgedJWT)` with a crafted payload where `role`
    is `admin`, and the guard passes. The same pattern applies to `AccountingGuard` at line 64-77. Several sensitive routes
    (`/basket`, `/saved-payment-methods`, `/delivery-method`, `/order-completion/:id`) have no `canActivate` guard at all,
    relying entirely on server-side API rejection — which is the correct model, but is inconsistent with the admin pattern
    that trusts the client-side check.'
  evidence_summary: '`app.guard.ts:52` reads role from a locally-decoded (unverified) JWT; the server never sees a pre-authorization
    check before the Angular component is rendered and API calls begin.'
  impact_description: An attacker with any XSS vector can forge the client-side role check to access the `AdministrationComponent`,
    see the full user list and feedback, and trigger admin-scoped API calls.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The backend API endpoints themselves enforce JWT validity — admin route guard is defense-in-depth only,
    but it provides a false sense of security when XSS is present.
  mitigation_title: Add server-side authorization check on admin/accounting API routes and document client guards as UX-only
  remediation:
    effort: Medium
    steps:
    - Ensure every API route consumed by `AdministrationComponent` and `AccountingComponent` verifies the JWT signature and
      role server-side (e.g. via an `isAdmin` middleware in Express). The Angular guard should be treated as a UX convenience,
      not a security boundary.
    - Document `AdminGuard` and `AccountingGuard` in code comments as UI-only navigation guards that do NOT provide security
      — the security is in the server middleware. This prevents future developers from adding sensitive logic behind client-side
      guards.
    - 'Remove `jwtDecode()` from the client guard entirely if a pre-render authorization check is desired: replace with an
      authenticated HTTP call to `/rest/user/whoami` that returns the role from a server-verified token, and only render the
      component on a 200 response.'
    code_example: null
    reference: CWE-602
  evidence:
  - file: frontend/src/app/app.guard.ts
    line: 52
  evidence_check: verified
