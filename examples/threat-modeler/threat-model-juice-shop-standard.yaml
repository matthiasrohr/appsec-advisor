    of the wallet, drain any on-chain balance, or transfer any NFTs the address holds. This is an unconditional Critical finding:
    the secret is in the committed source tree of a public-facing application.'
  evidence_summary: '`checkKeys.ts:10` embeds the BIP-39 mnemonic in a string literal; `HDNodeWallet.fromPhrase` derives the
    private key deterministically, meaning the private key is equivalent to the mnemonic and equally exposed.'
