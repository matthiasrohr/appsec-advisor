  stride: Spoofing
  cwe: CWE-522
  title: OAuth-Derived Predictable Password — oauth.component.ts:30
  affected_parameter: password (derived from email)
  scenario: 'When a user authenticates via Google OAuth, `OAuthComponent` at line 30 computes a deterministic password: `btoa(profile.email.split('''').reverse().join(''''))`.
    This password is then used to register or log in the user at line 31 and 46. The algorithm is trivially computable by
    any attacker who knows the target''s email address. An attacker can call `POST /rest/user/login` directly with `email=victim@example.com`
    and `password=btoa(''moc.elpmaxe@mitciv'')` to authenticate as the victim without involving OAuth at all. If the victim
    is an admin, this grants full admin access bypassing all OAuth protections.'
  evidence_summary: '`oauth.component.ts:30` uses `btoa(profile.email.split('''').reverse().join(''''))` as the user''s password
    — a formula publicly derivable from any known email address.'
  impact_description: Any attacker who knows a victim's email can authenticate as that user (including admins) by computing
    the deterministic password and calling the login endpoint directly.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the password derivation algorithm is embedded in client-side JavaScript and trivially reversible.
  mitigation_title: Eliminate derived passwords; use server-side OAuth token exchange without a password proxy
  remediation:
    effort: High
    steps:
    - Remove the derived-password pattern entirely. Do not create or update a local password record during OAuth login.
    - 'Implement server-side OAuth token validation: the backend accepts the `access_token`, validates it with Google''s tokeninfo
      endpoint, and issues a Juice Shop JWT directly — no local password account is created or used.'
    - If a local password is operationally required, generate a cryptographically random 256-bit secret server-side at account
      creation time and never expose it to the client.
    - Add a check in `POST /rest/user/login` that rejects login attempts for accounts flagged as `oauth_only` with a password
      credential.
    code_example: '// Server-side: validate OAuth token and issue app JWT directly

      // routes/oauth.ts

      const { data } = await axios.get(`https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=${access_token}`);

      if (data.aud !== process.env.GOOGLE_CLIENT_ID) throw new Error(''aud mismatch'');

      const user = await UserModel.findOrCreate({ where: { email: data.email } });

      const appJwt = security.authorize(user); // issue own JWT, no password involved'
    reference: CWE-522
