- local_id: auth-003
  threat_category_id: TH-03
  additional_categories: []
  stride: Spoofing
  cwe: CWE-916
  title: Weak Password Hashing — lib/insecurity.ts:41
  affected_parameter: password
  scenario: '`lib/insecurity.ts:41` hashes passwords with unsalted MD5: `crypto.createHash(''md5'').update(data).digest(''hex'')`.
    MD5 produces a 128-bit hash in nanoseconds; no salt is applied, so identical passwords produce identical hashes. An attacker
    who obtains the Users table via the SQL injection at `routes/login.ts:34` can crack all hashes offline against standard
    rainbow tables or using a GPU (`hashcat -m 0`) within minutes. Recovered plaintext credentials enable direct replay authentication
    against `POST /rest/user/login`.'
  evidence_summary: '`lib/insecurity.ts:41` exports `hash` as `crypto.createHash(''md5'').update(data).digest(''hex'')` —
    no salt, no work factor.'
  impact_description: An attacker with the Users table dump recovers all user passwords in minutes, enabling credential replay
    for every account.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — MD5 without salt provides effectively no resistance to offline cracking.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2id throughout the authentication path
  remediation:
    effort: Medium
    steps:
    - 'Replace the `hash()` export in `lib/insecurity.ts:41` with `bcrypt.hash(data, 12)` (using the `bcryptjs` package already
      available in Node ecosystems) or `argon2.hash(data, { type: argon2.argon2id })` (using the `argon2` package).'
