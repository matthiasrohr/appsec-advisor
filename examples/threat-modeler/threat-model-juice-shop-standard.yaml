  how: 'Implement a Backend-for-Frontend (BFF) proxy that holds the JWT in an HttpOnly Secure SameSite=Strict cookie instead
    of returning it to the SPA for localStorage storage. The SPA never touches the raw JWT. Remove all localStorage.setItem(''token'',
    ...) call sites and replace SPA-side auth state with a lightweight session indicator (non-sensitive boolean or display
    name) returned by the BFF. As an interim measure while the BFF is implemented: eliminate all XSS injection points (bypassSecurityTrustHtml,
    [innerHTML] bindings) to reduce the attack surface for token theft.'
