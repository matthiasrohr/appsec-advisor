  title: Payment Card PAN Stored Unencrypted — models/card.ts:38
  scenario: The `CardModelInit` function at `models/card.ts:38` defines `cardNum` as `DataTypes.INTEGER` with range validation
    only. Full 16-digit card numbers (PANs) are persisted verbatim in the `Cards` table with no tokenization, truncation,
    or AES-256 encryption. PCI-DSS Requirement 3.4 mandates that PANs be rendered unreadable wherever stored. Any attacker
    who reads the SQLite file (e.g., via SQL injection file dump or filesystem access) obtains complete, immediately usable
    card data for all registered payment methods.
  evidence_summary: '`cardNum: DataTypes.INTEGER` at `models/card.ts:38` stores the full PAN as a plain integer with no encryption
    setter or tokenization layer.'
  impact_description: Direct extraction of all user payment card numbers from the `Cards` table, enabling fraudulent transactions
    — a PCI-DSS Requirement 3.4 violation.
