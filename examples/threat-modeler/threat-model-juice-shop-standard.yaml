  title: XML External Entity Injection in File Upload routes/fileUpload.ts:83
  affected_parameter: file (POST /file-upload, XML files)
  scenario: 'When an XML file is uploaded to `/file-upload`, the handler parses it with libxmljs2 using `{ noent: true }`
    (external entities enabled): `libxml.parseXml(data, { noblanks: true, noent: true, nocdata: true })`. An attacker uploads
    a crafted XML file containing an external entity declaration referencing `/etc/passwd` or an internal service URL. The
    `noent: true` option causes libxmljs to resolve and substitute these entities during parse. The parsed XML string is included
    in the error response body, leaking the file contents back to the attacker. The `{timeout: 2000}` vm sandbox wraps the
    parse but does not prevent entity resolution within that window.'
  evidence_summary: 'Line 83 in `routes/fileUpload.ts` calls `libxml.parseXml(data, { noent: true })` on attacker-supplied
    XML data, enabling external entity resolution.'
  impact_description: An unauthenticated attacker reads arbitrary files from the server filesystem (e.g., `/etc/passwd`, private
    keys) via XXE, and can trigger internal SSRF via entity URLs.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: A 2-second execution timeout is enforced via vm.runInContext. The endpoint is documented as deprecated.
  mitigation_title: Disable external entity processing in libxmljs2 XML parse options
  remediation:
    effort: Low
    steps:
    - 'Change the parse call to `libxml.parseXml(data, { noblanks: true, noent: false, nocdata: true })` — setting `noent:
      false` disables external entity substitution.'
    - 'Additionally pass `{ nonet: true }` to prevent network-based entity fetches.'
    - Consider removing XML file upload support entirely since the route is already marked deprecated and returns 410.
    code_example: "```typescript\nconst xmlDoc = libxml.parseXml(data, {\n  noblanks: true,\n  noent: false,   // disable\
      \ XXE\n  nonet: true,    // disable network access\n  nocdata: true\n});\n```"
    reference: CWE-611
