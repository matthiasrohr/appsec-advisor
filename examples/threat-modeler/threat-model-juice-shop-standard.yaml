- local_id: frontend-spa-006
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: 'Architectural anti-pattern: SPA without BFF JWT and — login.component.ts:101'
  affected_parameter: token, email (localStorage)
  scenario: 'The Angular SPA stores the session JWT in `localStorage` (`login.component.ts:101`, `oauth.component.ts:51`)
    and reads it in `RequestInterceptor` (request.interceptor.ts:13) to attach it as an `Authorization: Bearer` header on
    every outbound request. Because `localStorage` is readable by any JavaScript executing in the same origin, any XSS vulnerability
    in the SPA (see frontend-spa-003 and frontend-spa-004) enables complete session token extraction. Additionally, the user''s
    email is stored separately in `localStorage` (login.component.ts:135) and sent as an `X-User-Email` header on every request,
    leaking PII over the wire and providing an additional XSS extraction vector. A Backend-for-Frontend (BFF) pattern — where
    the server holds tokens server-side and issues `HttpOnly Secure SameSite=Strict` cookies to the browser — would prevent
    JavaScript-readable token storage entirely.'
  evidence_summary: '`login.component.ts:101` writes `localStorage.setItem(''token'', authentication.token)`; `request.interceptor.ts:13`
    reads it back on every request. No BFF or HttpOnly cookie mechanism is in place.'
  impact_description: Any successful XSS in the SPA results in immediate, silent session token exfiltration; the token is
    valid for up to 8 hours after theft.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no BFF, no HttpOnly cookie, no token binding.
  mitigation_title: 'Migrate to a Backend-for-Frontend pattern: store tokens server-side, issue HttpOnly Secure SameSite=Strict
    session cookies to the browser'
  remediation:
    effort: High
    steps:
    - 'Introduce a BFF layer (or leverage the existing Express server) that holds access and refresh tokens server-side and
      returns a session identifier via `Set-Cookie: session=…; HttpOnly; Secure; SameSite=Strict`.'
    - Remove all `localStorage.setItem('token', …)` calls from the SPA; the SPA should not hold a bearer token at any point.
    - 'Update `RequestInterceptor` to send `withCredentials: true` on HttpClient requests so the session cookie is automatically
      attached.'
    - Rotate the server-side session on each token refresh; invalidate it on logout by calling the BFF's logout endpoint,
      which clears the cookie.
    code_example: "// Express BFF session endpoint (outline)\napp.post('/auth/session', async (req, res) => {\n  const tokenResponse\
      \ = await exchangeCodeForToken(req.body.code)\n  req.session.accessToken = tokenResponse.access_token  // server-side\
      \ only\n  res.cookie('sid', req.sessionID, { httpOnly: true, secure: true, sameSite: 'strict' })\n  res.json({ loggedIn:\
      \ true })  // no token sent to browser\n})"
    reference: CWE-922
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 101
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: true
  actor_ids:
  - ACT-D-08
  primary_actor: ACT-D-08
  component_name: Angular Single-Page Application
  source: stride
  id: T-002
  component: frontend-spa
  mitigation_ids:
  - M-008
  effective_severity: High
  breach_distance: 2
  chain_role: contributor
  compound_chain_ids:
  - CC-01
  verified_chain_ids: []
  _title_source: 'Architectural anti-pattern: SPA without BFF JWT and email stored in localStorage'
  vektor: internet-anon
  evidence_check: verified
- local_id: auth-identity-001
  threat_category_id: TH-01
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-89
  title: SQL Injection — routes/login.ts:34
  affected_parameter: email
  scenario: An attacker submits `' OR '1'='1'--` as the login form's email field. Because `req.body.email` flows unescaped
    into `models.sequelize.query()` at `routes/login.ts:34`, the WHERE clause is short-circuited, returning the first user
    row (the seeded admin account), and the attacker is authenticated as admin without a valid password or account knowledge.
  evidence_summary: '`routes/login.ts:34` interpolates `req.body.email` directly into a raw SQL string: `SELECT * FROM Users
    WHERE email = ''${req.body.email}''` with no parameterization.'
  impact_description: Full authentication bypass; attacker receives a valid admin JWT and basket ID, gaining unrestricted
    administrative access.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: MD5 password hash is applied to the submitted password before injection into the query, but the email
    field is completely unescaped.
  mitigation_title: Replace raw SQL string interpolation in login query with parameterized Sequelize query
  remediation:
    effort: Low
    steps:
    - 'Replace `models.sequelize.query(template-literal)` at `routes/login.ts:34` with `UserModel.findOne({ where: { email:
      req.body.email, password: security.hash(req.body.password), deletedAt: null } })` using Sequelize''s ORM methods.'
    - 'If raw SQL is required elsewhere, use Sequelize''s `replacements` or `bind` parameter binding: `sequelize.query(''SELECT
      * FROM Users WHERE email = ? AND password = ?'', { replacements: [email, hash], ... })`.'
