  threat_category_id: TH-14
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-532
  title: CI secrets printed in workflow logs — ci.yml:153
  affected_parameter: ALCHEMY_API_KEY
  scenario: 'The `api-test` job exposes `ALCHEMY_API_KEY` and `NODE_ENV: test` directly in the `env:` block at `ci.yml:151–154`.
    The `e2e-test` job exposes `ALCHEMY_API_KEY`, `CYPRESS_RECORD_KEY`, and `SOLUTIONS_WEBHOOK` at lines 250–268. When a step
    in these jobs echoes environment variables — whether via a debug script, a failing npm lifecycle hook, or an untrusted
    action — the secret values appear in the publicly readable Actions log on a public repository. GitHub Actions does mask
    registered secrets in log output, but `ALCHEMY_API_KEY` passed via the `env:` block with the literal key name `ALCHEMY_API_KEY`
    is masked, while any derived string or re-exported variable may not be. Additionally, any third-party action that reads
    `process.env` and logs it (e.g., a debug mode in `nick-invision/retry`) would expose all env vars in that job''s log.'
  evidence_summary: '`ci.yml:153` injects `ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}` into the `api-test` job environment;
    `ci.yml:250–253` injects multiple secrets into `e2e-test`, making them available to every step including the unpinned-action
    steps in those jobs.'
  impact_description: Leaked `ALCHEMY_API_KEY` or `CYPRESS_RECORD_KEY` enables an attacker to abuse the API quotas, impersonate
    legitimate test runs, or access the associated service accounts.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: GitHub Actions automatically masks registered secret values in log output. Secrets are not passed to
    fork pull_request builds by default.
  mitigation_title: Restrict secret injection to the specific steps that require them using step-level env blocks
  remediation:
    effort: Low
    steps:
    - Move `ALCHEMY_API_KEY` and `CYPRESS_RECORD_KEY` from the job-level `env:` block to the specific step that calls `npm
      run test:api:coverage` or the Cypress action. This narrows the secret's blast radius to a single step.
    - Audit third-party actions (`nick-invision/retry`, `cypress-io/github-action`) to confirm they do not log `process.env`
      contents in debug or verbose modes.
    - Enable GitHub Actions secret scanning alerts and review the repository's Actions log retention policy to limit the window
      during which logs containing partial secret exposure are accessible.
    code_example: "```yaml\n# Before — secret at job level, visible to all steps\nenv:\n  NODE_ENV: test\n  ALCHEMY_API_KEY:\
      \ ${{ secrets.ALCHEMY_API_KEY }}\n\n# After — secret scoped to the specific step\n- name: \"Execute integration tests\"\
      \n  env:\n    NODE_ENV: test\n    ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}\n  run: npm run test:api:coverage\n\
      ```"
    reference: CWE-532
  evidence:
