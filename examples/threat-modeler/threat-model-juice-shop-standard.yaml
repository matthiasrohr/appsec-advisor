  scenario: 'POST /rest/web3/walletNFTVerify accepts `req.body.walletAddress` with no JWT authentication middleware and no
    cryptographic signature verification. An attacker who observes any Ethereum address that minted an NFT (all on-chain events
    are public) can POST that address directly to the endpoint and claim the nftMintChallenge solution — without ever having
    interacted with the blockchain. The same pattern applies to POST /rest/web3/walletExploitAddress: any caller can register
    any Ethereum address to the `walletsConnected` set and later receive credit for the web3WalletChallenge. Neither endpoint
    appears in the `security.isAuthorized()` middleware chain at server.ts:641-645.'
