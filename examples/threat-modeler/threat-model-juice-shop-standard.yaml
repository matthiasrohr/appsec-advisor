  title: No Rate Limiting or Connection Cap on Socket.IO — registerWebsocketEvents.ts:20
  affected_parameter: Socket.IO connection count, event messa…
  scenario: The Socket.IO server is initialized at line 20 with only a CORS origin option — no `maxHttpBufferSize`, no `connectTimeout`,
    no per-connection event rate throttling, and no connection count ceiling. Any client (unauthenticated, per realtime-channel-001)
    can open an unlimited number of concurrent WebSocket connections. Each connection triggers the notification replay loop
    at lines 30-32 (synchronous forEach over the shared notifications array). Additionally, flooding the `notification received`
    event at lines 34-38 triggers repeated `Array.findIndex` and `Array.splice` operations on the shared global `notifications`
    array in the Node.js event loop, stalling other I/O. Unlike the HTTP routes (server.ts:343-471) which have `express-rate-limit`,
    no equivalent protection exists for WebSocket events.
  evidence_summary: Socket.IO constructor at line 20 contains only cors option; no maxHttpBufferSize, connectTimeout, or per-event
    throttle is configured; confirmed no rateLimit/throttle/RateLimiter pattern in lib/ directory.
  impact_description: An attacker flooding the WebSocket endpoint with connections and events saturates the Node.js event
    loop, causing latency spikes and denial of service for all users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: HTTP routes have express-rate-limit; WebSocket endpoint has no equivalent
  mitigation_title: Configure Socket.IO connection limits and per-event rate throttling to prevent event-loop flooding
  remediation:
    effort: Low
    steps:
    - Set `maxHttpBufferSize` (e.g. 1e4) and `connectTimeout` (e.g. 5000) in the Socket.IO Server constructor options.
    - Implement a per-socket event rate limiter using a token bucket (e.g. `socket-io-rate-limiter` or a custom counter on
      `socket.data`) and disconnect sockets that exceed the threshold.
    - Consider limiting total concurrent connections using a connection counter and rejecting new handshakes above the limit
      via `io.use()`.
    - Reject event payloads exceeding a maximum byte size before processing.
    code_example: "// lib/startup/registerWebsocketEvents.ts\nconst io = new Server(server, {\n  cors: { origin: 'http://localhost:4200'\
      \ },\n  maxHttpBufferSize: 1e4,\n  connectTimeout: 5000\n})\n// Per-socket event throttle\nio.use((socket, next) =>\
      \ {\n  let count = 0\n  const interval = setInterval(() => { count = 0 }, 1000)\n  socket.onAny(() => { if (++count\
      \ > 20) socket.disconnect(true) })\n  socket.on('disconnect', () => clearInterval(interval))\n  next()\n})"
