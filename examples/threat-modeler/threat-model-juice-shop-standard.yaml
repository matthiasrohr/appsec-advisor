    from `req.params.id` truncated to 60 characters. An attacker appends a JS expression such as `'' || true || ''` to make
    the `$where` condition always evaluate to `true`, causing all orders in the collection to be returned. The order result
    is serialised and returned as JSON at line 19, exposing every customer''s order ID, email, and basket contents.'
  evidence_summary: Template-literal interpolation `\`this.orderId === '${id}'\`` at line 18 embeds a 60-char-truncated, unvalidated
    URL parameter into a MarsDB JavaScript expression.
