  cwe: CWE-829
  title: Mutable Action References Allow Malicious Code Injection — image_actions.yml:33
  affected_parameter: 'uses: <action>@<tag>'
  scenario: 'Three actions in image_actions.yml are pinned to mutable version tags or a live branch: `actions/checkout@v6`
    (line 30), `calibreapp/image-actions@main` (line 33), and `peter-evans/create-pull-request@v8` (line 42). A threat actor
    who can push to the upstream action repository — or who can compromise the npm/git account that owns it — can silently
    replace the tag with a malicious payload. Because image_actions.yml fires on `pull_request` (and `push` to master/develop),
    a crafted PR that touches an image file triggers the workflow with a GITHUB_TOKEN in scope. The `calibreapp/image-actions@main`
    reference is especially dangerous: `@main` resolves to the repository''s HEAD at execution time, meaning any commit merged
    to that repo''s main branch is immediately live in this pipeline with no pin to audit. Similarly, `github/codeql-action/init@v3`,
    `github/codeql-action/autobuild@v3`, and `github/codeql-action/analyze@v3` (codeql-analysis.yml lines 23, 34, 36) and
    `coverallsapp/github-action@v2` (ci.yml line 188) are tag-pinned rather than SHA-pinned, creating the same exposure for
    code security scanning and coverage workflows respectively.'
  evidence_summary: image_actions.yml lines 30, 33, and 42 reference third-party actions by mutable version tag or live branch
    rather than immutable commit SHA.
  impact_description: A compromised upstream action can exfiltrate GITHUB_TOKEN, DOCKERHUB_TOKEN, NPM_TOKEN, or any other
    secret present in the runner environment, and push backdoored code or Docker images to production registries.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Most workflows in ci.yml and release.yml already pin critical actions (actions/checkout, actions/setup-node,
    docker/login-action, docker/build-push-action) to full 40-character commit SHAs with a version comment. This partial mitigation
    does not cover the three actions in image_actions.yml or the GitHub/Coveralls actions.
  mitigation_title: Pin all GitHub Actions to immutable commit SHAs across every workflow file
  remediation:
    effort: Low
    steps:
    - 'Replace every `uses: <action>@<tag>` reference with `uses: <action>@<sha> #<tag>` format, including calibreapp/image-actions,
      peter-evans/create-pull-request, github/codeql-action/*, and coverallsapp/github-action.'
    - 'Enable Dependabot for GitHub Actions (`ecosystem: github-actions` in .github/dependabot.yml) so that new SHA pins are
      proposed automatically when upstream releases a new version.'
    - Add a CI gate using `zizmor` or `actionlint` that rejects any workflow file containing non-SHA action pins, enforcing
      the rule on every PR.
    code_example: "# image_actions.yml — before\n      - uses: calibreapp/image-actions@main\n\n# image_actions.yml — after\
      \ (replace with current SHA)\n      - uses: calibreapp/image-actions@f2d9a97d6ca0b17e0e8f5eff4e70af8c6339a94e #v1.1.0"
