    || fs.readFileSync(process.env.JWT_PRIVATE_KEY_FILE, ''utf8'')`. Fail fast if neither is set. Rotate the exposed key immediately
    — generate a new RSA key pair (`openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048`) and deploy only the new
    public key to the verification side. Add a pre-commit hook or CI secret-scanning step (e.g., `trufflehog`, `gitleaks`)
