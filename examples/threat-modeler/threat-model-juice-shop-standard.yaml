- id: data-persistence
  name: Data Persistence Layer
  description: In-process SQLite 3 database accessed via Sequelize 6 ORM (22 models including User with MD5-hashed passwords
    and plain-integer card numbers) and MarsDB 0.6 MongoDB-compatible in-memory store for product reviews. Both run in the
    same Node.js process as the application logic.
  paths:
  - models/**
  - data/static/**
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-025
  - T-026
  - T-027
  - T-032
  - T-058
  - T-072
  - T-081
  - T-087
- id: file-upload-service
  name: File Upload Handler
  description: Express route handler at /file-upload accepting ZIP (path traversal via unzipper), XML (XXE via libxmljs2 with
    external entities enabled), and YAML (unsafe deserialization via js-yaml inside a vm sandbox). Also handles profile image
    uploads (/profile/image/file) and SSRF via URL-based image fetching (/profile/image/url).
  paths:
  - routes/fileUpload.ts
  - routes/userProfile.ts
  tier: application
  complexity: moderate
  framework: multer
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: false
  threat_ids:
  - T-030
  - T-049
  - T-059
  - T-064
  - T-073
  - T-075
- id: b2b-api
  name: B2B Order API
  description: B2B REST API at POST /b2b/v2/orders accepting JWT bearer auth. The orderLinesData field is passed directly
    to vm.runInContext('safeEval(orderLinesData)') — the notevil sandbox is defeated by prototype pollution, yielding unauthenticated
    remote code execution. Documented in swagger.yml.
  paths:
  - routes/b2bOrder.ts
  - swagger.yml
  tier: application
  complexity: simple
  framework: express
  deployment_zones:
  - internet
