  title: Unbounded In-Memory Token Store — lib/insecurity.ts:70
  affected_parameter: null
  scenario: '`lib/insecurity.ts:70-91` implements `authenticatedUsers` as a plain JavaScript object (`tokenMap: {}`) with
    `put()` but no eviction policy, TTL, or size cap. `tokenMap` grows with every `authenticatedUsers.put()` call from `routes/login.ts:25`
    and `routes/2fa.ts:45`. Since there is no rate limit on the login endpoint (auth-009), an attacker can generate a new
    token per request, growing `tokenMap` indefinitely until the Node.js process exhausts heap memory and crashes.'
  evidence_summary: '`lib/insecurity.ts:70-91` defines `tokenMap: {}` with no eviction, TTL, or size limit.'
  impact_description: Memory exhaustion crash of the authentication service by repeatedly calling the login endpoint to accumulate
    tokens.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — token map grows unbounded.
  mitigation_title: Implement TTL-based eviction or size cap on the in-memory token store
  remediation:
    effort: Medium
    steps:
    - 'Replace the plain object `tokenMap: {}` in `lib/insecurity.ts` with an LRU cache (e.g., `lru-cache` npm package) with
      a maximum size and TTL matching the JWT expiry (`6h`).'
    - Alternatively, rely exclusively on JWT verification (`expressJwt`) without the in-memory map — tokens are stateless
      by design; the map is only needed for server-side revocation. Evaluate whether true revocation is required and, if not,
      remove the map.
    - As a shorter-term fix, add an entry-count guard in `authenticatedUsers.put()` that evicts the oldest entry when the
      map exceeds a safe threshold (e.g., 10,000 sessions).
    code_example: "```typescript\nimport { LRUCache } from 'lru-cache';\nconst tokenMap = new LRUCache<string, ResponseWithUser>({\n\
      \  max: 10000,\n  ttl: 6 * 60 * 60 * 1000 // 6h — matches JWT expiry\n});\n```"
