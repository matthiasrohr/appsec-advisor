  title: Unbounded Raw SQL Query Blocks Event Loop — routes/search.ts:23
  affected_parameter: q
  scenario: The searchProducts handler at routes/search.ts:23 executes a raw SQL query against the embedded SQLite database
    with no timeout and no result-set limit. Because SQLite runs synchronously in the same process as the Node.js application,
    a deliberately expensive query (e.g., `q=')) UNION SELECT randomblob(100000000),2,3--` or a deeply recursive CTE) blocks
    the event loop for seconds. During this time all other requests queue indefinitely. An unauthenticated attacker with network
    access to the `/rest/products/search` endpoint can sustain a low-rate attack (one request every few seconds) to keep the
    event loop saturated continuously, denying service to all users.
