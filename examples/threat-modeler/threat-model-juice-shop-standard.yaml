    API calls. An attacker can call any admin API endpoint (e.g., `GET /rest/admin/application-configuration`, `DELETE /api/Users/:id`)
    directly without triggering any guard. Additionally, since `AdminGuard` trusts only the locally decoded JWT and the backend
    accepts `alg:none` tokens (a separate finding), a crafted JWT with `role:admin` passes both the frontend guard and the
    backend's express-jwt middleware. `AccountingGuard` has the same pattern at lines 64-76.
