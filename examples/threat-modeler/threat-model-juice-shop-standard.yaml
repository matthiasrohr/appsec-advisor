  title: No Concurrency Limits or Workflow-Level Timeouts Enable Runner — ci.yml:1
  affected_parameter: 'on: pull_request'
  scenario: The CI pipeline in ci.yml has no `concurrency:` block and no `timeout-minutes:` at the workflow level. The workflow
    matrix spans 3 OS × 3 Node versions for frontend-test, server-test, and api-test, plus 2 OS × 1 browser for e2e-test —
    a single PR run can launch up to 12 parallel matrix jobs. A threat actor with a GitHub account can open many PRs in rapid
    succession from forks (GitHub's first-time contributor approval gate applies only to accounts with no prior merged contribution;
    repeat contributors are not gated). Each PR triggers the full matrix, potentially exhausting the repository's GitHub-hosted
    runner pool or consuming all available Actions minutes in the billing period. Without a concurrency group keyed on the
    PR number, redundant runs from force-pushes to the same PR also pile up without cancellation. Only `lock.yml` defines
    a `concurrency:` block among all 16 workflows.
  evidence_summary: ci.yml defines no `concurrency:` block and no workflow-level `timeout-minutes:`, while the job matrix
    can produce up to 12 parallel runners per PR trigger.
  impact_description: Sustained PR spam from fork contributors exhausts available Actions runner minutes or GitHub-hosted
    runner slots, blocking legitimate CI for maintainers.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: GitHub Actions first-time contributor approval gate applies to accounts with no prior merged contribution.
    Job-level `timeout_minutes` are set inside `nick-invision/retry` steps (10 minutes each) but these do not bound the overall
    workflow.
  mitigation_title: Add workflow-level `concurrency` groups and `timeout-minutes` to the main CI workflow
