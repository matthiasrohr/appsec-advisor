  stride: Elevation of Privilege
  cwe: CWE-602
  title: Admin authorization decided client-side from unverified JWT — app.guard.ts:57
  affected_parameter: role
  scenario: AdminGuard.canActivate() (app.guard.ts:51-60) authorizes the /admin zone purely by jwtDecode-ing the localStorage
    token and comparing payload.data.role to roles.admin. jwtDecode does NOT verify the signature (LoginGuard.tokenDecode,
    app.guard.ts:38), and the decision runs entirely in the browser. An attacker can either (a) hand-craft a JWT with role='admin'
    in localStorage to satisfy the guard and load the admin UI, or (b) ignore the SPA entirely and call the backend admin
    endpoints directly — recon Section 7.10/route analysis confirms guards are client-only with 'no server-side authorization
    on API endpoints'. Either way the trust boundary 'Admin Zone within Application' is enforced only by code the attacker
    controls.
  evidence_summary: AdminGuard authorizes by reading an unverified, client-decoded JWT role claim with no server-side authorization
    backing it.
  impact_description: Forging a role claim or calling the API directly grants admin-zone access, defeating the admin trust
    boundary.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: AdminGuard and AccountingGuard check the decoded role, but client-side only and without signature verification;
    the server must independently authorize.
  mitigation_title: Enforce admin/accounting authorization server-side on every privileged endpoint
  remediation:
    effort: Medium
    steps:
    - Add server-side authorization middleware that verifies the JWT signature and checks role on every /api/.../admin and
      accounting endpoint; never trust the client guard.
    - Treat the Angular guards purely as UX (hide menu items) and document that they provide no security.
    - Verify the token signature (not just jwtDecode) wherever role is consumed, including any server-side rendering paths.
    code_example: "// server middleware\nfunction requireRole(role) {\n  return (req, res, next) => {\n    const p = jwt.verify(req.token,\
      \ PUBLIC_KEY)  // signature-checked\n    if (p.data?.role !== role) return res.sendStatus(403)\n    next()\n  }\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html
