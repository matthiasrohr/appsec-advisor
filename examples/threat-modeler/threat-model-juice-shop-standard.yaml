    the server. Combined with client-only guards (frontend-spa-007) and an unauthenticated WebSocket (frontend-spa-008), there
    is no reliable record tying a user action to an identity, so abusive client behaviour (forged role, repeated guard bypass
    attempts) leaves no server-visible audit trail and is effectively repudiable. This is a client-tier observability gap
    that must be paired with server-side auditing.'
