  stride: Spoofing
  cwe: CWE-287
  title: Insecure JWT Verification — lib/insecurity.ts:54
  affected_parameter: Authorization header (JWT)
  scenario: '`express-jwt@0.1.3` is configured at `lib/insecurity.ts:54` with only `{ secret: publicKey }` — no `algorithms`
    allowlist. `jsonwebtoken@0.4.0` (CVE-2020-15084) accepts tokens with `alg: ''none''` and an empty signature when no algorithm
    constraint is provided. An attacker crafts the header `{"alg":"none","typ":"JWT"}` and any payload (e.g. `{"data":{"role":"admin"}}`),
    base64url-encodes them, appends an empty signature, and submits this token. `express-jwt@0.1.3` calls `jsonwebtoken.verify()`
    internally; without an algorithm constraint it accepts the token as valid, granting the attacker the role embedded in
    the payload.'
  evidence_summary: 'Line 54 passes only `{ secret: publicKey }` to `expressJwt()` with no `algorithms` field; jsonwebtoken@0.4.0
    in package.json is the CVE-2020-15084-affected version.'
