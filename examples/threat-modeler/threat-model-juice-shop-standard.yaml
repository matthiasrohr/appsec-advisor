  title: Wallet ownership accepted from request body without proof — routes/nftMint.ts:41
  affected_parameter: walletAddress
  scenario: '`walletNFTVerify` (routes/nftMint.ts:41) reads `req.body.walletAddress` and checks it against the in-memory `addressesMinted`
    Set, then solves `nftMintChallenge`. `contractExploitListener` (routes/web3Wallet.ts:15) likewise adds the caller-supplied
    `walletAddress` to `walletsConnected`. Neither endpoint requires the caller to prove control of the Ethereum address —
    there is no signed-message / nonce challenge (EIP-191/EIP-4361 SIWE) and no `security.isAuthorized()` middleware on `/rest/web3/*`
    (server.ts:642-644). An attacker who observes or guesses any address present in an on-chain `NFTMinted`/`ContractExploited`
    event can POST that address and claim the result that belongs to a different wallet owner, spoofing wallet identity.'
  evidence_summary: walletNFTVerify trusts req.body.walletAddress directly against addressesMinted with no signature verification
    and no auth middleware on the route.
  impact_description: Any unauthenticated caller can impersonate an arbitrary Ethereum wallet to claim minting/exploit credit,
    defeating the wallet-ownership trust assumption.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. No signature/nonce proof-of-ownership; no isAuthorized() on /rest/web3 routes.
  mitigation_title: Require a signed SIWE/EIP-191 nonce challenge to prove wallet ownership before crediting an address
  remediation:
    effort: Medium
    steps:
    - Issue a server-generated random nonce per session and require the client to return an `ethers.verifyMessage(nonce, signature)`
      result whose recovered address equals the claimed `walletAddress` before adding it to `walletsConnected` / matching
      it in `addressesMinted`.
    - Reject `walletAddress` values that fail `ethers.isAddress()` and bind the verified address to the authenticated session
      rather than trusting raw `req.body`.
    - Add `security.isAuthorized()` to the `/rest/web3/*` POST routes in server.ts so unauthenticated callers cannot drive
      wallet state.
