  cwe: CWE-640
  title: Current Password Not Required for Password Change — routes/changePassword.ts:39
  affected_parameter: current
  scenario: The change-password handler at routes/changePassword.ts:39 checks `if (currentPassword && security.hash(currentPassword)
    !== loggedInUser.data.password)` — the condition short-circuits when `currentPassword` is falsy. An attacker who obtains
    a valid session token (via XSS, session fixation, or JWT forgery) can change the victim's password without knowing the
    current password by simply omitting the `current` query parameter. The route is a GET (`server.ts:597`), making the new
    password visible in server access logs and browser history.
  evidence_summary: routes/changePassword.ts:39 guards the current-password check with `if (currentPassword && ...)` — the
    guard is a no-op when the `current` query parameter is absent from the GET request.
  impact_description: An attacker with any valid session token can permanently lock out the account owner by changing the
    password without knowing the original credential.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Requires a valid JWT (Bearer token from Authorization header checked at line 27).
  mitigation_title: Make current password mandatory on the change-password endpoint and convert to POST
  remediation:
    effort: Low
    steps:
    - Remove the `currentPassword &&` short-circuit at routes/changePassword.ts:39; always require and verify the current
      password.
    - Convert the endpoint from GET to POST so that credentials are not logged in access logs or browser history.
    - Consider adding re-authentication (e.g. a one-time confirmation step) for sensitive account operations.
    code_example: "// routes/changePassword.ts — enforce current password\nif (!currentPassword) {\n  res.status(401).send('Current\
      \ password is required.')\n  return\n}\nif (security.hash(currentPassword) !== loggedInUser.data.password) {\n  res.status(401).send(res.__('Current\
      \ password is not correct.'))\n  return\n}"
    reference: CWE-640
  evidence:
  - file: routes/changePassword.ts
    line: 39
  evidence_check: verified
  controls_absent_evidence: []
