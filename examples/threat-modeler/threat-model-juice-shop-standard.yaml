  stride: Information Disclosure
  cwe: CWE-918
  title: SSRF — routes/profileImageUrlUpload.ts:24
  affected_parameter: imageUrl
  scenario: profileImageUrlUpload() takes req.body.imageUrl from an authenticated user and passes it straight to fetch(url)
    with no scheme or host allowlist. An attacker submits imageUrl=`http://169.254.169.254/latest/meta-data/iam/security-credentials/`
    (cloud metadata) or `http://internal-service:8080/admin` to make the server issue requests to internal/metadata endpoints.
    On fetch failure the URL is even persisted as the profile image (line 36), and on success the response body is written
    to disk, enabling content substitution.
  evidence_summary: fetch(url) is called on the raw req.body.imageUrl with only a challenge-marker regex, no scheme/host validation.
  impact_description: Internal network and cloud-metadata probing, potential credential theft from the metadata service.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Requires an authenticated session (loggedInUser check). No URL validation otherwise.
  mitigation_title: Allowlist scheme/host and block private/link-local ranges before fetching image URLs
  remediation:
    effort: Medium
    steps:
    - Reject any URL whose scheme is not https and whose resolved host is in a private, loopback, or link-local range (RFC
      1918, 127.0.0.0/8, 169.254.0.0/16, ::1, fc00::/7).
    - Resolve DNS first and validate the resolved IP, not just the hostname, to defeat DNS rebinding; pin the connection to
      the validated IP.
    - Cap response size and content-type to image/* and never persist the raw URL as the profile image on failure.
    code_example: 'const u = new URL(url)

      if (u.protocol !== ''https:'') throw new Error(''scheme'')

      const { address } = await dns.promises.lookup(u.hostname)

      if (ipaddr.parse(address).range() !== ''unicast'') throw new Error(''private host'')'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html
  evidence:
  - file: routes/profileImageUrlUpload.ts
    line: 24
  evidence_check: verified
