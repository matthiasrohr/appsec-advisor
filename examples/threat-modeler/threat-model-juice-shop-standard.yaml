  title: Server Side Request Forgery via Profile Image URL routes/profileImageUrlUpload.…
  affected_parameter: imageUrl (POST /profile/image/url body)
  scenario: 'The profile image URL upload handler fetches an attacker-supplied URL using the Node.js `fetch()` API without
    any scheme or host allowlist: `const response = await fetch(url)` at line 24. An authenticated attacker can supply URLs
    like `http://169.254.169.254/latest/meta-data/` (AWS IMDS) or `http://localhost:3000/metrics` to probe internal services.
    The response body is written to disk and the file path is stored in the database, meaning the attacker can then read the
    fetched content by accessing their profile image. If the fetched URL returns a non-image type (e.g., JSON or text), the
    content is still written with the guessed extension.'
  evidence_summary: Line 24 in `routes/profileImageUrlUpload.ts` calls `fetch(url)` where `url` is `req.body.imageUrl` with
    no scheme/host restriction.
  impact_description: An authenticated attacker can probe internal network hosts and cloud metadata endpoints, potentially
    leaking cloud credentials, service tokens, or internal API responses.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The route checks `req.app.locals.abused_ssrf_bug` flag when the URL matches `solve/challenges/server-side`
    pattern (challenge detection only, not a security control).
  mitigation_title: Enforce URL scheme and host allowlist before fetching profile image URLs
  remediation:
    effort: Low
    steps:
    - Parse the supplied URL with `new URL(url)` and validate that `url.protocol` is `https:` or `http:` and that the hostname
      resolves to a public IP (reject RFC 1918, loopback, and link-local addresses).
    - Use a library such as `ssrf-req-filter` or implement a pre-resolution DNS check to block internal host ranges.
    - Alternatively, process image uploads server-side via an isolated fetch proxy or CDN origin, never from the application
      server itself.
    code_example: '```typescript

      const parsed = new URL(url);

      if (![''http:'', ''https:''].includes(parsed.protocol)) throw new Error(''Invalid scheme'');

      const ip = await dns.promises.lookup(parsed.hostname);

      if (isPrivateIP(ip.address)) throw new Error(''Private host not allowed'');

      ```'
    reference: CWE-918
