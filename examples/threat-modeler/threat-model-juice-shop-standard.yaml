- local_id: data-layer-003
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-943
  title: NoSQL Injection — routes/showProductReviews.ts:36
  affected_parameter: id
  scenario: 'The product reviews endpoint at `routes/showProductReviews.ts:36` executes `db.reviewsCollection.find({ $where:
    ''this.product == '' + id })`. MarsDB evaluates `$where` predicates as live JavaScript. When the `noSqlCommandChallenge`
    is enabled, `id` is passed through `utils.trunc(req.params.id, 40)` — still 40 characters of attacker-controlled JavaScript.
    An attacker sends `GET /rest/products/1;sleep(2000)/reviews` or injects `1); sleep(2000); (1==1` to trigger the globally-injected
    `sleep()` busy-wait at `showProductReviews.ts:17-25`, which blocks the Node.js event loop. With a crafted payload, arbitrary
    JavaScript executes in the MarsDB query context.'
  evidence_summary: '`db.reviewsCollection.find({ $where: ''this.product == '' + id })` at `routes/showProductReviews.ts:36`
    concatenates the route parameter into a JavaScript-evaluated predicate string with no escaping.'
  impact_description: Attacker-controlled JavaScript executed in the MarsDB engine; event loop blocked for up to 2 seconds
    per request enabling denial-of-service; potential data exfiltration from the reviews collection.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Input truncated to 40 characters when challenge flag is disabled; `sleep()` is capped at 2000ms. Neither
    control prevents injection.
  mitigation_title: Replace $where JavaScript predicate with a typed field equality filter in MarsDB queries
  remediation:
    effort: Low
    steps:
    - 'Replace `{ $where: ''this.product == '' + id }` with `{ product: Number(id) }` — MarsDB supports standard field equality
      filters that do not evaluate JavaScript.'
    - Remove the global `sleep` injection (lines 17-25) from production code; it exists solely for the challenge and creates
      a real DoS primitive.
    - Add `Number.isInteger(Number(id))` guard before the query to reject non-numeric product IDs with HTTP 400.
    code_example: '// routes/showProductReviews.ts — safe version

      const productId = parseInt(req.params.id, 10)

      if (isNaN(productId)) { return res.status(400).json({ error: ''Invalid id'' }) }

      db.reviewsCollection.find({ product: productId }).then((reviews: Review[]) => { ... })'
    reference: CWE-943
  evidence:
  - file: routes/showProductReviews.ts
    line: 36
