    clutch` is hardcoded at routes/checkKeys.ts:10. Any actor with read access to the source repository — including contributors,
    CI/CD pipelines, container image inspectors, or the public if the repo is open — can reproduce the `HDNodeWallet.fromPhrase()`
    derivation at line 11 and obtain the private key (line 12), public key (line 13), and wallet address (line 14). The runtime
    comparison at line 16 (`req.body.privateKey === privateKey`) confirms these values are the live authentication secret
    for the NFT unlock challenge. Possession of the private key gives full control over the associated Ethereum wallet, including
    signing transactions on any chain that accepts the key.
  evidence_summary: routes/checkKeys.ts:10 hardcodes the 12-word mnemonic directly in source; the derived private key is extracted
    at line 12 and compared against user input at line 16 — no runtime secret injection or HSM indirection is present.
