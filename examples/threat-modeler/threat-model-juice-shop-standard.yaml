      injection markers: `const safeUserName = userName.replace(/[\n\r]/g, '' '').slice(0, 64)`.'
    - Alternatively, keep the username outside the system prompt and pass it as a named variable in a structured user turn,
      so the LLM cannot confuse it with instructions.
    - Validate usernames at registration to disallow embedded newlines and special characters that could act as prompt delimiters.
    code_example: "// routes/chat.ts — buildSystemPrompt()\nexport function buildSystemPrompt(userName?: string) {\n  const\
