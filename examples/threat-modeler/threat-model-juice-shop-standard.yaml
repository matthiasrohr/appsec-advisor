threats:
- local_id: angular-spa-002
  threat_category_id: TH-10
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-522
  title: Derived Password from OAuth Emai… (frontend/src/app/oauth/oauth.component.ts:46)
  affected_parameter: password
  scenario: '`oauth.component.ts:30` computes `const password = btoa(profile.email.split('''').reverse().join(''''))` — base64
    of the reversed email string. This deterministic derivation means that any party who knows a target user''s email address
    can compute the exact password used to register and authenticate that account via the `/api/Users` and login endpoints.
    The OAuth callback at line 46 submits this derived password to the standard password endpoint with `oauth: true`, effectively
    creating a parallel non-OAuth authentication path for every OAuth-registered user.'
  evidence_summary: '`btoa(profile.email.split('''').reverse().join(''''))` on line 30 and 46 of `oauth.component.ts` shows
    the password is deterministically derived from the email with no secret or randomness component.'
  impact_description: An attacker knowing any user's email can authenticate as that user without OAuth interaction or knowledge
    of any real secret, bypassing the Google IdP entirely.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derived password scheme is intentionally predictable.
  mitigation_title: Replace deterministic email-derived password with server-side OAuth-account linking and randomized credentials
  remediation:
    effort: High
    steps:
    - Remove the `btoa(email.split('').reverse().join(''))` password derivation from `oauth.component.ts` entirely.
    - On the backend, link Google OAuth accounts to internal users via the OAuth `sub` claim rather than a password; do not
