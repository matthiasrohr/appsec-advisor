    than coerced to a number. An attacker supplies a crafted id such as `0; while(true){}` — the $where clause executes arbitrary
    JavaScript inside MarsDB''s eval context, either causing a denial of service through busy-loop or exfiltrating data through
    conditional timing. The global.sleep function defined at lines 17–25 is also accessible in the eval scope.'
