  title: Open redirect — lib/insecurity.ts:136
  affected_parameter: to
  scenario: 'The /redirect endpoint uses insecurity.ts:133-139 isRedirectAllowed() which calls url.includes(allowedUrl) for
    each entry in redirectAllowlist. Because includes() checks for substring containment rather than prefix or exact match,
    an attacker constructs a URL such as: https://attacker.com/?q=https://blockchain.info/address/1AbKfgvw9psQ41NbLi8kufDQTezwG8DRZm
    and submits it as the ''to'' parameter. The check passes because the allowlisted string appears as a query parameter value.
    The server calls res.redirect() to the attacker-controlled domain, enabling phishing, credential harvesting, and OAuth
    token theft if used in OAuth flows.'
  evidence_summary: insecurity.ts:136 applies url.includes(allowedUrl) — a substring test — rather than url.startsWith(allowedUrl)
    or an exact Set lookup.
  impact_description: Users following redirect links from the trusted Juice Shop domain are delivered to attacker-controlled
    pages, enabling phishing and session credential theft.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: A redirect allowlist exists (insecurity.ts:122-131), but the substring-match bypass makes it ineffective.
  mitigation_title: Replace url.includes() with strict prefix or exact-match validation in isRedirectAllowed()
  remediation:
    effort: Low
    steps:
    - Replace the includes() check with utils.startsWith(url, allowedUrl) (which is already used in the isUnintendedRedirect
      helper at redirect.ts:30), ensuring the allowlisted URL is a true prefix.
    - Alternatively, parse both URLs with new URL() and compare scheme + host + pathname exactly.
    - Add an integration test asserting that https://attacker.com/?q=https://blockchain.info/... returns HTTP 406.
    code_example: "```typescript\nexport const isRedirectAllowed = (url: string) => {\n  for (const allowedUrl of redirectAllowlist)\
      \ {\n    if (url === allowedUrl || url.startsWith(allowedUrl + '/') || url.startsWith(allowedUrl + '?')) {\n      return\
      \ true\n    }\n  }\n  return false\n}\n```"
    reference: CWE-601
