  controls_in_place: vm.runInContext timeout of 2000ms catches script-execution timeouts but not memory exhaustion during
    native C++ parsing (libxmljs2) or pre-vm JavaScript parsing (js-yaml anchor expansion).
  mitigation_title: Use yaml.safeLoad (js-yaml v4 load) and set noent:false with entity expansion limits to prevent parser
    amplification
  remediation:
    effort: Medium
    steps:
    - 'Upgrade js-yaml from v3.14 to v4.x and replace `yaml.load(data)` at fileUpload.ts:117 with `yaml.load(data, { schema:
      yaml.DEFAULT_SCHEMA })` — in v4, load() uses a safe schema by default with no JS type tags.'
    - 'Set `noent: false` and `nonet: true` in the libxmljs2 parseXml call at fileUpload.ts:83 to prevent entity expansion
      and network-based entity fetching.'
    - Add rate limiting on the /file-upload route using `express-rate-limit` (e.g., max 5 requests per minute per IP) to throttle
      concurrent bomb submissions.
    code_example: '// js-yaml v4: load() is safe by default

