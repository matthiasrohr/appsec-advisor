  cwe: CWE-598
  title: OAuth Implicit Flow Token Exposure — login.component.ts:134
  affected_parameter: response_type
  scenario: 'The `googleLogin()` method constructs an OAuth authorization URL with `response_type=token`, redirecting the
    browser to Google''s authorization endpoint. On return, the access_token appears in the URL fragment (hash). This exposes
    the token in browser history, and if any external resource (analytics, fonts, third-party script) is loaded on the redirect-landing
    page, the token may leak via the Referer header. No `state` parameter is included in the request, so the flow is also
    vulnerable to CSRF-based token injection: an attacker can trigger the OAuth flow from a controlled page, redirect back
    with a forged token, and authenticate as the victim in the SPA.'
  evidence_summary: Line 134 explicitly sets `response_type=token` and omits both `state` and `nonce` parameters, matching
    the OAuth Implicit Flow pattern deprecated by RFC 9700.
  impact_description: An attacker who captures the access token from the URL fragment or via CSRF token injection can impersonate
    the victim user, obtaining a valid session token stored in localStorage.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no state parameter, no PKCE, no nonce
  mitigation_title: Replace Implicit Flow with Authorization Code + PKCE in googleLogin()
  remediation:
    effort: Medium
    steps:
    - Change `response_type=token` to `response_type=code` in the OAuth redirect URL built at login.component.ts:134.
    - Generate a cryptographically random `state` parameter per request (e.g. `crypto.getRandomValues`) and store it in sessionStorage;
      verify it matches the value returned in the redirect.
    - Add `code_challenge_method=S256` and a derived `code_challenge` (PKCE) to the authorization request.
    - Exchange the authorization code for tokens server-side (Express Backend), so the access/refresh tokens never appear
      in the browser's address bar.
    code_example: "// Replace the googleLogin() body with:\nconst state = crypto.randomUUID()\nsessionStorage.setItem('oauth_state',\
      \ state)\nconst params = new URLSearchParams({\n  client_id: this.clientId,\n  response_type: 'code',\n  scope: 'email\
      \ openid',\n  redirect_uri: this.redirectUri,\n  state\n})\nwindow.location.href = `${oauthProviderUrl}?${params}`"
