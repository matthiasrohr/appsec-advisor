  stride: Elevation of Privilege
  cwe: CWE-601
  title: Open Redirect Allowlist Bypass via URL Substring Match lib/insecurity.ts:138
  affected_parameter: to (GET /redirect query string)
  scenario: 'The redirect allowlist check uses `url.includes(allowedUrl)` to validate the destination: `allowed = allowed
    || url.includes(allowedUrl)`. Because this is a substring match rather than an exact prefix match, an attacker can craft
    a URL like `https://attacker.com/?r=https://github.com/juice-shop/juice-shop` or a path-traversal variant such that the
    allowed URL string appears somewhere inside the malicious destination. The attacker sends `GET /redirect?to=https://attacker.example.com/phishing?ref%3Dhttps://github.com/juice-shop/juice-shop`
    — `url.includes(''https://github.com/juice-shop/juice-shop'')` returns true and the server issues a 302 redirect to the
    attacker-controlled domain. This enables phishing attacks using the legitimate application''s domain as a trusted relay.'
  evidence_summary: Line 138 in `lib/insecurity.ts` validates redirect targets with `url.includes(allowedUrl)` instead of
    `url.startsWith(allowedUrl)`, allowing the allowlisted string to appear anywhere in the attacker-controlled URL.
  impact_description: An attacker sends phishing links using the trusted juice-shop domain that silently redirect victims
    to credential-harvesting pages on attacker-controlled domains.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: A redirect allowlist is implemented; the allowlist check method is flawed.
  mitigation_title: Replace URL.includes() allowlist check with strict URL.startsWith() for redirect validation
  remediation:
    effort: Low
    steps:
    - Change `url.includes(allowedUrl)` to `url === allowedUrl` for an exact match, or `url.startsWith(allowedUrl + '?')`
      if query parameters on known URLs must be allowed.
    - Alternatively, parse both URLs with `new URL()` and compare only the origin and pathname components.
    - Add a test asserting that `to=https://evil.com/?x=https://github.com/juice-shop/juice-shop` returns 406.
    code_example: "```typescript\nexport const isRedirectAllowed = (url: string) => {\n  for (const allowedUrl of redirectAllowlist)\
      \ {\n    if (url === allowedUrl) return true;\n  }\n  return false;\n};\n```"
    reference: CWE-601
