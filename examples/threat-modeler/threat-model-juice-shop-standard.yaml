      sanitising `id` to alphanumeric-hyphen characters unconditionally (do not gate sanitisation behind a challenge flag).'
    - Apply the character-class filter `id.replace(/[^\w-]+/g, '')` on every code path, not only when `reflectedXssChallenge`
