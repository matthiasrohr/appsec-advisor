  stride: Denial of Service
  cwe: CWE-400
  title: YAML Bomb Causes Process Stall — routes/fileUpload.ts:109
  scenario: 'An unauthenticated attacker uploads a YAML file to POST `/file-upload` containing a billion-laugh-style alias
    chain (`a: &a [''lol'', ''lol'', ...]`) that expands exponentially. At `routes/fileUpload.ts:109`, `vm.runInContext(''JSON.stringify(yaml.load(data))'',
    sandbox, { timeout: 2000 })` runs `js-yaml`''s default loader inside a VM context. The `js-yaml` `load()` function is
    vulnerable to YAML alias expansion that exhausts Node.js heap memory before the 2-second timeout fires, causing the process
    to crash or become unresponsive.'
  evidence_summary: '`routes/fileUpload.ts:109` calls `yaml.load(data)` (full-trust loader) on attacker-controlled YAML inside
    a VM context with a 2-second timeout that does not protect against memory exhaustion before evaluation completes.'
  impact_description: Unauthenticated attacker triggers Node.js heap exhaustion, crashing the server process and making the
    application unavailable to all users.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: A 2-second `vm.runInContext` timeout is applied; however, heap exhaustion from alias expansion may occur
    before the timeout fires. The `js-yaml` challenge handler will set `yamlBombChallenge` as solved.
  mitigation_title: Replace js-yaml full-trust loader with safeLoad and add YAML alias depth limits in routes/fileUpload.ts
  remediation:
    effort: Low
    steps:
    - 'Replace `yaml.load(data)` with `yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })` which disallows anchors and aliases
      entirely — this is safe for well-formed complaint YAML.'
    - 'Alternatively, enforce a maximum input size check before parsing: reject uploads larger than 10 KB for YAML files.'
    - Require authentication for the `/file-upload` endpoint (add `security.isAuthorized()` to `server.ts:309`) to raise the
      bar for DoS attacks.
    code_example: "// routes/fileUpload.ts — safe YAML load\nconst yamlString = vm.runInContext(\n  'JSON.stringify(yaml.load(data,\
      \ { schema: yaml.FAILSAFE_SCHEMA }))',\n  sandbox,\n  { timeout: 2000 }\n)"
