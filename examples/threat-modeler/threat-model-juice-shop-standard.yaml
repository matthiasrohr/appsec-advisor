  title: Server-Side Template Injection via eval in User Profile (userProfile.ts:62)
  affected_parameter: username
  scenario: An authenticated user updates their username to `#{process.mainModule.require('child_process').execSync('id').toString()}`
    via PUT /api/Users/:id or the profile update endpoint. At routes/userProfile.ts:55-62, any username matching the regex
    `#{(.*)}` is evaluated with `eval(code)` where `code` is the substring between `#{` and `}`. The result is embedded in
    the rendered Pug template response. This yields synchronous OS command execution in the Node.js process context. The `vm.runInContext`
    / sandbox is not used here — bare `eval()` is called directly.
