- local_id: socketio-server-002
  threat_category_id: TH-13
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-306
  title: Unauthenticated client events trigger server-side challenge solution state chan…
  affected_parameter: 'socket events: verifyLocalXssChallenge,…'
  scenario: The server registers three event handlers that process client-controlled data without validating the caller's
    identity. At line 41, any WebSocket client — without authentication — can emit `verifyLocalXssChallenge` with the expected
    XSS payload string `<iframe src="javascript:alert(\`xss\`)">` and cause `challengeUtils.solveIf()` to mark the `localXssChallenge`
    and `xssBonusChallenge` as solved in the application's shared challenge state. Similarly, at line 46, emitting `verifySvgInjectionChallenge`
    with a crafted URL matching the regex pattern marks `svgInjectionChallenge` as solved. At line 34, emitting `notification
    received` with a flag value removes that notification from the shared in-memory store, denying other users access to that
    notification. In a multi-user or competitive deployment, this enables score manipulation and denial of challenge notifications
    to legitimate users.
  evidence_summary: Lines 41-48 call `challengeUtils.solveIf()` directly on attacker-supplied socket event data with no authentication
    or session ownership check on the socket connection.
  impact_description: Unauthenticated clients can artificially mark challenges as solved and expunge pending notifications
    from the shared in-memory store, corrupting application state for all users.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no authentication, no server-side binding of socket events to a verified user session.
  mitigation_title: Bind challenge-verification socket events to an authenticated user session and validate ownership before
    mutating shared state
  remediation:
    effort: Medium
    steps:
    - Gate the WebSocket upgrade with JWT authentication middleware (see socketio-server-001 remediation step 1) so only authenticated
      users can emit events.
    - For `verifyLocalXssChallenge` and `verifySvgInjectionChallenge`, bind solved state to `socket.data.userId` rather than
      the global challenges object — use per-user challenge tracking if the application requires it in multi-user mode.
    - For `notification received`, verify `socket.data.userId` owns the notification before removing it from the store, or
      use per-user notification queues instead of a shared array.
    - Consider whether these challenge-verify events need to be WebSocket events at all — challenge completion triggered by
      server-observed HTTP actions is harder to forge than client-emitted events.
    code_example: "```typescript\n// Reject events from unauthenticated sockets\nsocket.on('verifyLocalXssChallenge', (data:\
      \ any) => {\n  if (!socket.data.userId) return // reject unauthenticated\n  challengeUtils.solveIf(challenges.localXssChallenge,\
      \ () =>\n    utils.contains(data, '<iframe src=\"javascript:alert(`xss`)\">'),\n  )\n})\n```"
    reference: CWE-306
  evidence:
