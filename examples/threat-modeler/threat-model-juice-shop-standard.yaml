  stride: Spoofing
  cwe: CWE-347
  title: JWT Algorithm Confusion Missing algorithms Allowlist (lib/insecurity.ts:54)
  affected_parameter: Authorization
  scenario: '`lib/insecurity.ts:54` defines `isAuthorized()` as `expressJwt(({ secret: publicKey }) as any)` without specifying
    an `algorithms` allowlist. The `express-jwt` library, when not constrained to `algorithms: [''RS256'']`, may accept tokens
    signed with `alg: none` (unauthenticated) or with HS256 using the RSA public key as the HMAC secret — both are publicly
    documented RS256→HS256 confusion attacks. An attacker obtains the public key (which is non-secret and typically distributed),
    crafts a token with `alg: HS256` and any desired claims (including `role: admin`), signs it with the public key as the
    HMAC secret, and submits it to `/b2b/v2/orders`. The `isAuthorized()` guard accepts the token, granting access to the
    B2B order endpoint as any user.'
  evidence_summary: '`expressJwt` at line 54 accepts only `secret` without `algorithms`, leaving algorithm negotiation to
    the library default which is permissive toward HS256 and potentially `alg:none`.'
  impact_description: An unauthenticated attacker forges a valid JWT for any user identity, bypassing the `/b2b/v2` authentication
    guard entirely and gaining access to the RCE-capable B2B order endpoint.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 algorithm used during token issuance (`lib/insecurity.ts:56`); RSA key pair in use.
  mitigation_title: 'Pin expressJwt to algorithms: [''RS256''] in lib/insecurity.ts'
  remediation:
    effort: Low
    steps:
    - 'Update `isAuthorized()` at `lib/insecurity.ts:54` to `expressJwt({ secret: publicKey, algorithms: [''RS256''] })`.
      This single change closes both the `alg:none` and the HS256 confusion paths.'
    - Rotate the RSA key pair after the fix is deployed, since the current private key is committed to the repository (see
      b2b-api-003) and any tokens minted with it should be considered compromised.
    code_example: '```typescript

      // lib/insecurity.ts:54 — before

      export const isAuthorized = () => expressJwt(({ secret: publicKey }) as any)


      // after

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] })

      ```'
    reference: CWE-347
  evidence:
  - file: lib/insecurity.ts
    line: 54
