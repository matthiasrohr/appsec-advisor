- local_id: express-backend-004
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-89
  title: UNION SQL Injection in Product Search — routes/search.ts:23
  affected_parameter: q
  scenario: The product search handler at routes/search.ts:23 interpolates `req.query.q` directly into `models.sequelize.query()`
    with no parameterization. An attacker submits `q=')) UNION SELECT sql,2,3,4,5,6,7,8,9 FROM sqlite_master--` to extract
    the full database schema. A follow-up UNION payload `UNION SELECT email,password,3,4,5,6,7,8,9 FROM Users--` dumps all
    user email/password-hash pairs. The only server-side constraint is truncation to 200 characters (search.ts:22), which
    is insufficient — all the above payloads fit within 200 characters.
  evidence_summary: Template literal `SELECT * FROM Products WHERE ((name LIKE '%${criteria}%'...` at search.ts:23 passes
    unparameterized user input directly to `models.sequelize.query()`.
  impact_description: Full database read via UNION injection — all user credentials, orders, and schema definitions are exfiltrated.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input truncated to 200 characters (search.ts:22) — insufficient to prevent SQL injection.
  mitigation_title: Parameterize the product search query using Sequelize replacements or the ORM findAll method
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `models.sequelize.query()` at search.ts:23 with `ProductModel.findAll({ where: { [Op.or]: [{ name:
      { [Op.like]: ''%'' + criteria + ''%'' } }, { description: { [Op.like]: ''%'' + criteria + ''%'' } }], deletedAt: null
      }, order: [[''name'', ''ASC'']] })` which uses Sequelize''s parameter binding.'
    - 'Alternatively, use `models.sequelize.query(..., { replacements: { criteria: ''%'' + criteria + ''%'' } })` with `?`
      placeholders if a raw query is required for performance.'
    - Add an integration test that sends `' UNION SELECT 1--` as the `q` parameter and asserts the response contains no User
      rows.
    code_example: "```typescript\n// routes/search.ts — safe ORM query\nconst products = await ProductModel.findAll({\n  where:\
      \ {\n    [Op.or]: [\n      { name: { [Op.like]: `%${criteria}%` } },\n      { description: { [Op.like]: `%${criteria}%`\
      \ } }\n    ],\n    deletedAt: null\n  },\n  order: [['name', 'ASC']]\n})\n```"
    reference: CWE-89
  evidence:
