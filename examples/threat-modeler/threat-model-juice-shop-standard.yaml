    host (or a botnet), consuming Node.js file descriptors and heap memory proportional to the connection count. Additionally,
    repeated `notification received` events trigger an O(n) `findIndex` scan of the `notifications` array on every event,
    creating CPU amplification under high event rates. No middleware calls `rateLimit`, `throttle`, or any socket-level guard
