  cwe: CWE-94
  title: JavaScript Sandbox Escape via notevil (routes/b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: '`routes/b2bOrder.ts:19` reads `body.orderLinesData` without any schema validation or type constraints and passes
    it directly to `vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 })` at line 23. The `notevil` library
    (`safeEval`) is a JavaScript expression evaluator with documented sandbox escapes — prototype pollution chains, constructor
    access, or function constructor tricks can reach the host Node.js process from within the sandbox context. A JWT-authenticated
    attacker sends a `POST /b2b/v2/orders` request with `orderLinesData` set to a crafted payload that escalates from the
    `vm.Context` into the parent Node.js process, enabling arbitrary command execution under the application process account.
    The 2-second timeout only prevents infinite loops; it does not prevent fast-executing payloads.'
  evidence_summary: '`body.orderLinesData` is assigned without validation at line 19, then placed in a `vm.Context` sandbox
    and evaluated at line 23 — the path from network input to `vm.runInContext` has zero sanitization checkpoints.'
  impact_description: Successful sandbox escape grants the attacker arbitrary server-side code execution as the Node.js process
    user, enabling data exfiltration, lateral movement, or persistent backdoor installation.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: JWT authentication required on `/b2b/v2` (server.ts:423 via `security.isAuthorized()`); 2-second execution
    timeout; `notevil` sandboxing layer.
  mitigation_title: Replace safeEval with a strict JSON schema parser for orderLinesData in routes/b2bOrder.ts
  remediation:
    effort: Medium
    steps:
    - Define a JSON Schema or `zod` schema that specifies the exact structure expected in `orderLinesData` (e.g., an array
      of line objects with numeric quantity and string product ID). Reject any input that does not conform before it reaches
      any evaluation step.
    - Remove the `vm.runInContext(safeEval(...))` call entirely. If expression evaluation is a business requirement, replace
      it with a dedicated parser (e.g., `mathjs` for numeric expressions) bound to a strict allowlist of operations.
    - If removing eval is not immediately feasible, add a pre-evaluation allowlist regex that permits only numeric literals,
      arithmetic operators, and whitespace — rejecting any input containing `constructor`, `prototype`, `__proto__`, `Function`,
      or bracket access forms.
    code_example: "```typescript\nimport { z } from 'zod'\n\nconst OrderLineSchema = z.array(z.object({\n  productId: z.string().uuid(),\n\
      \  quantity: z.number().int().min(1).max(999)\n}))\n\n// In b2bOrder handler:\nconst parsed = OrderLineSchema.safeParse(body.orderLinesData)\n\
      if (!parsed.success) {\n  res.status(400).json({ error: 'Invalid order lines data' })\n  return\n}\n```"
    reference: CWE-94
