- local_id: file-upload-007
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-22
  title: ZIP Path Traversal Allowing Overwrite of Files Within Application Root
  affected_parameter: file
  scenario: 'handleZipFileUpload at fileUpload.ts:40-45 iterates ZIP entries and checks `absolutePath.includes(path.resolve(''.''))`
    (line 44) to prevent traversal outside the application directory. This check uses string inclusion, not a prefix check,
    meaning any path that contains the CWD string (even as a substring) passes. Crucially, the actual file write at line 45
    uses the raw string `''uploads/complaints/'' + fileName` — the unresolved entry path — while the security check uses the
    resolved absolutePath. An attacker crafts a ZIP with entry name `../../frontend/dist/frontend/assets/public/images/uploads/shell.js`:
    absolutePath resolves to `/juice-shop/frontend/dist/frontend/assets/public/images/uploads/shell.js` (includes CWD — check
    passes), but the write goes to `uploads/complaints/../../frontend/dist/frontend/assets/public/images/uploads/shell.js`,
    landing in the public static file directory. The intentional challenge uses `../ftp/legal.md` (line 43).'
  evidence_summary: fileUpload.ts:44 checks absolutePath (resolved) but fileUpload.ts:45 writes using the raw string-concatenated
    path, creating a disconnect between the security check and the actual write destination.
  impact_description: An attacker overwrites arbitrary files within the application root directory, including publicly served
    JavaScript files, configuration files, or the SQLite database, enabling persistent code injection or data corruption.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: absolutePath.includes(path.resolve('.')) check at fileUpload.ts:44 — insufficient because it uses string
    inclusion rather than a startsWith prefix check, and the actual write uses string concatenation rather than the sanitized
    absolutePath.
  mitigation_title: Use absolutePath.startsWith for traversal check and write to absolutePath instead of raw string concatenation
  remediation:
    effort: Low
    steps:
    - Replace `absolutePath.includes(path.resolve('.'))` with `absolutePath.startsWith(path.resolve('uploads/complaints')
      + path.sep)` at fileUpload.ts:44 to enforce prefix containment rather than substring match.
    - Change the write destination at fileUpload.ts:45 from `'uploads/complaints/' + fileName` to `absolutePath` to ensure
      the checked path is the written path.
    - Sanitize the ZIP entry filename using `path.basename(fileName)` before joining to strip any `../` components, rejecting
      entries with path separators entirely.
    code_example: "// fileUpload.ts:42-45 — before\nconst absolutePath = path.resolve('uploads/complaints/' + fileName)\n\
      if (absolutePath.includes(path.resolve('.'))) {\n  entry.pipe(fs.createWriteStream('uploads/complaints/' + fileName)...)\n\
      }\n\n// after\nconst safeBase = path.resolve('uploads/complaints')\nconst safeName = path.basename(fileName) // strip\
      \ any ../ components\nconst absolutePath = path.join(safeBase, safeName)\nif (absolutePath.startsWith(safeBase + path.sep))\
      \ {\n  entry.pipe(fs.createWriteStream(absolutePath)...)\n}"
    reference: CWE-22
