trust_boundaries:
- id: tb-1
  name: Public Internet to Express Backend
  from: external
  to: express-backend
  description: All inbound HTTP/HTTPS traffic from anonymous or authenticated internet users to the Express API. No application-level
    API gateway or WAF. JWT verification via express-jwt@0.1.3 (vulnerable to alg:none bypass). CORS wildcard configured.
    No CSRF protection.
  controls:
  - express-jwt@0.1.3 middleware on selected routes
  - wildcard CORS
  - express-rate-limit on some endpoints
- id: tb-2
  name: Browser to Angular SPA
  from: external
  to: angular-frontend
  description: Client-side application boundary. JWT session token stored in browser localStorage, accessible to any JavaScript
    on the page (XSS token theft). Client-side route guards are bypassable. CSP absent except on profile image endpoint.
  controls:
  - Angular route guards (client-side only, bypassable)
- id: tb-3
  name: Express Application to SQLite Database (in-process)
  from: express-backend
  to: sqlite-data-tier
  description: In-process boundary between the Express route handlers and the SQLite database via Sequelize ORM. No network
    separation. Several routes bypass ORM parameterization with raw string-interpolated SQL queries.
  controls:
  - Sequelize ORM parameterized queries on most routes (raw SQL bypasses in routes/search.ts:23 and routes/login.ts:34)
- id: tb-4
  name: Express Application to vm2 Sandbox
  from: express-backend
  to: b2b-order-processor
  description: In-process boundary between the Express request handler and user-supplied code evaluated inside a vm2 Node.js
    VM context or via notevil safe-eval. Known sandbox escape vulnerabilities and prototype-pollution bypasses exist.
  controls:
  - vm2 VM context with timeout=2000ms
  - notevil safe-eval
- id: tb-5
  name: Express Application to Local Filesystem
  from: express-backend
  to: file-upload-handler
  description: In-process boundary between file upload handlers and the local filesystem. Uploaded zip entry paths not sanitized
    before writing. The ftp/ directory is publicly served. RSA keys in encryptionkeys/ may be accessible as static files.
  controls:
  - Partial path.resolve check in fileUpload.ts:32 for one specific challenge path only
- id: tb-6
  name: Express Application to External LLM Provider
  from: express-backend
  to: chatbot-engine
  description: Outbound HTTPS calls to the configured OpenAI-compatible LLM API. User-controlled data flows into the system
    prompt without sanitization. No output content filtering applied to LLM responses.
  controls: []
- id: tb-7
  name: Public Internet to Socket.IO WebSocket
  from: external
  to: socket-io-gateway
  description: WebSocket (WSS/WS) channel for real-time events. No authentication required on WebSocket connection. CORS origin
    set to localhost:4200 (development default). Challenge events broadcast to all connected sockets.
  controls:
  - Socket.IO 3.1.2 CORS origin=localhost:4200
- id: tb-8
  name: GitHub Actions to Production Artifacts
  from: external
  to: ci-cd-pipeline
  description: Build and deployment pipeline boundary. Workflows run without least-privilege permissions. Third-party actions
    not pinned to commit SHA. Supply-chain compromise could exfiltrate secrets or inject malicious code into artifacts.
  controls:
  - GitHub Actions hosted runner environment isolation
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Authentication
  effectiveness: Unsafe
  assessment: 'Passwords hashed with MD5 (no salt) in lib/insecurity.ts:41. MD5 is a broken algorithm for password storage.
    express-jwt@0.1.3 is intentionally pinned to a version vulnerable to CVE-2020-15084 (alg:none bypass). jsonwebtoken@0.4.0
    is extremely old (current: 9.x). RSA private key hardcoded in source at lib/insecurity.ts:29 — any party with repo access
    can forge arbitrary JWTs for any user.'
  linked_threats: []
- domain: Identity and Authentication Controls
  control: TOTP / 2FA
  effectiveness: Partial
  assessment: TOTP support implemented via otplib@13 with time-based codes. However intentional 2FA bypass challenges exist
    in the codebase. The 2FA verification endpoint POST /rest/2fa/verify has no rate limiting observed.
  linked_threats: []
- domain: Identity and Authentication Controls
  control: OAuth / Social Login
  effectiveness: Partial
  assessment: OAuth integration present (19 OAuth/OIDC pattern matches in Cat 9). routes/oauth.ts handles OAuth token. State
    parameter handling for CSRF on OAuth callback not verified.
  linked_threats: []
- domain: Session and Token Controls
  control: JWT Token Lifecycle
  effectiveness: Unsafe
  assessment: JWTs signed with hardcoded RSA private key (lib/insecurity.ts:29), stored in localStorage (XSS-accessible, frontend/src/app/app.guard.ts:18).
    Token revocation is in-memory only (lib/insecurity.ts:189) — cleared on restart, no persistent revocation. express-jwt@0.1.3
    accepts alg:none header (CVE-2020-15084). 6-hour token lifetime with no rotation.
  linked_threats: []
- domain: Authorization Controls
  control: Object-Level Access Control (BOLA/IDOR)
  effectiveness: Missing
  assessment: 17 routes (AUTHZ-001 findings) return objects without verifying UserId ownership. Users can access other users'
    addresses, payment cards, orders, memories via direct object reference. No centralized ownership-verification middleware.
  linked_threats: []
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  assessment: Admin role check exists via isAdmin field on JWT payload. Mass-assignment vulnerability (AUTHZ-008, 17 instances)
    allows setting isAdmin=true via API. No Sequelize model-level field restrictions prevent role escalation through body
    parameters.
  linked_threats: []
- domain: Query Construction and Data Access Controls
  control: SQL Injection Prevention
  effectiveness: Unsafe
  assessment: Raw string interpolation SQL in routes/search.ts:23 (union-injectable product search) and routes/login.ts:34
    (auth bypass via login). Both are intentional CTF challenges. Most other routes use Sequelize ORM with parameterized queries.
  linked_threats: []
- domain: Input Boundary Validation Controls
  control: Input Validation and Sanitization
  effectiveness: Weak
  assessment: sanitize-html@1.4.2 (pinned to very old version with known bypasses). Direct eval() of user input in routes/userProfile.ts:61
    and routes/captcha.ts:22. No centralized input validation middleware. XML input not sanitized for XXE.
  linked_threats: []
- domain: Output Encoding and Rendering Controls
  control: XSS Prevention
  effectiveness: Weak
  assessment: Angular provides automatic HTML encoding in most contexts but bypassSecurityTrustHtml usage detected (35 XSS
    pattern matches). CSP absent globally — only a user-controlled img-src CSP on profile image endpoint (routes/userProfile.ts:88),
    which can be exploited to inject arbitrary origins.
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Unsafe
  assessment: 'Wildcard CORS configured globally: app.options(''*'', cors()) and app.use(cors()) in server.ts:182-183. Any
    origin can send credentialed requests. No CSRF protection (no csurf middleware, no SameSite cookies).'
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: Security Headers
  effectiveness: Partial
  assessment: helmet.noSniff() and helmet.frameguard() active. helmet.xssFilter() explicitly commented out (server.ts:188).
    helmet.contentSecurityPolicy() not configured globally. X-Powered-By header removed. Feature-Policy header available via
    feature-policy package.
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Secrets Management
  effectiveness: Missing
  assessment: RSA private key hardcoded in source (lib/insecurity.ts:29). HMAC secret hardcoded as string literal (lib/insecurity.ts:42).
    MD5 used for password hashing (lib/insecurity.ts:41). No secrets vault, no env-var injection, no rotation capability.
    Multiple secrets permanently compromised.
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Encryption at Rest
  effectiveness: Missing
  assessment: SQLite database stored as plaintext file data/juiceshop.sqlite included in repository. No encryption at rest
    for the data store or uploaded files. Payment card data stored in cleartext in database.
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: File Upload Security
  effectiveness: Unsafe
  assessment: 'ZIP path traversal: zip entry path concatenated without sanitization (routes/fileUpload.ts:31-34). XML XXE:
    libxml2-wasm processes user-uploaded XML without disabling external entity resolution (routes/fileUpload.ts:71-79). Profile
    image allows user-controlled img-src CSP injection. No file type allowlist enforced at byte-level.'
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: Server-Side Request Forgery Prevention
  effectiveness: Missing
  assessment: POST /profile/image/url fetches arbitrary user-supplied URLs server-side (routes/userProfile.ts). No allowlist
    of permitted URL targets, no block on internal IP ranges (RFC1918, loopback, metadata services). XXE in XML upload can
    also trigger SSRF via external entity references.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Security
  effectiveness: Missing
  assessment: 'Intentionally pinned vulnerable packages: express-jwt@0.1.3 (CVE-2020-15084), jsonwebtoken@0.4.0, sanitize-html@1.4.2.
    No package-lock.json committed (supply chain reproducibility gap). No Dependabot for npm, docker, or GitHub Actions. No
    SCA scanning in CI pipeline.'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Pipeline Security
  effectiveness: Weak
  assessment: '10 GitHub Actions workflows missing top-level permissions: read-all block. 3 workflows use third-party actions
    pinned to mutable tag/branch (not commit SHA). image_actions.yml:533 uses action@main (branch-head). No container image
    signing (no cosign/SLSA attestation). Docker base images not pinned to digest.'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Logging and Audit Trail
  effectiveness: Partial
  assessment: morgan HTTP access logging configured. winston structured logging available. No security-event audit log (login
    successes/failures, admin actions). Error handler can expose stack traces in development mode. /support/logs endpoint
    provides admin log viewing.
  linked_threats: []
- domain: Real-time and Not Applicable Controls
  control: WebSocket Security
  effectiveness: Weak
  assessment: Socket.IO 3.1.2 without connection authentication. CORS configured to localhost:4200 only (appropriate for development).
    Challenge events broadcast to all connected sockets without recipient filtering. No authentication required to subscribe
    to real-time events.
  linked_threats: []
- domain: Real-time and Not Applicable Controls
  control: AI/LLM Security Controls
  effectiveness: Missing
  assessment: Chatbot (routes/chat.ts) concatenates user-supplied name directly into system prompt without sanitization (chatbotGreedyInjectionChallenge).
    No prompt injection detection, no output content filtering, no rate limiting on LLM calls, no tool-use restrictions. LLM
    API key stored in config file.
  linked_threats: []
- domain: Identity and Authentication
  control: User Registration
  kind: mechanism
  effectiveness: Unsafe
  implementation: 'Detected in scope: GET /api/Users'
  evidence: GET /api/Users
  main_reason: User Registration is present but was not in the Phase-8 control catalog; rated from linked finding(s).
  auto_source: auth-coverage
