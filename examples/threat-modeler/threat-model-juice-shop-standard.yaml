  scenario: The Socket.IO server at `lib/startup/registerWebsocketEvents.ts:24` accepts every incoming connection without
    validating any session token, JWT, or credential. The CORS origin is hardcoded to `http://localhost:4200` (line 20), but
    this constraint applies only to browser CORS preflight and is trivially bypassed by non-browser clients (curl, Python
    scripts, direct WebSocket libraries). Any internet-facing attacker can open an unauthenticated WebSocket connection and
    emit any of the registered message events (`notification received`, `verifyLocalXssChallenge`, `verifySvgInjectionChallenge`,
    `verifyCloseNotificationsChallenge`) impersonating a legitimate authenticated user session.
  evidence_summary: '`io.on(''connection'', (socket: any) => { ... })` at line 24 contains no middleware guard, token extraction,
    or session verification before granting the socket access to all registered event handlers.'
