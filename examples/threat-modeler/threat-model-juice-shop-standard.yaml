    and output. This is the seeded `chatbotPromptInjectionChallenge` (routes/chat.ts:180).'
  evidence_summary: User-supplied `req.body.messages` flows unaltered into the model call at routes/chat.ts:201-205; the only
    guardrail is natural-language policy text in the system prompt.
  impact_description: An attacker overrides system-prompt rules to coerce tool calls (e.g. coupon generation), leak the system
    prompt, or produce arbitrary output attributed to the shop's chatbot.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 'None. Component config confirms prompt_injection_prevention: None. No input sanitization or structured
    instruction isolation exists; policy is expressed only as natural-language system-prompt text at routes/chat.ts:88-103.'
  mitigation_title: Enforce coupon and tool policy in code rather than in system-prompt prose, and isolate untrusted user
    turns
  remediation:
    effort: Medium
    steps:
    - Move every safety-critical rule out of the natural-language system prompt and into code. For example, do not let the
      model decide coupon eligibility — gate the generateCoupon tool's execute() on server-verified order state (see threat
      llm-chat-interface-002).
    - Wrap/delimit untrusted user content and instruct the model to treat it as data, not instructions; reject or strip control
      phrases is insufficient alone but reduces casual injection.
    - Add an input length cap and a server-side allowlist of message roles so an attacker cannot inject a forged `system`/`assistant`
      turn via the messages array.
    - Add an output/tool-call validation layer (see llm-chat-interface-002) so that even a fully hijacked model cannot exceed
      policy limits.
    code_example: "// reject client-supplied system/assistant turns; only 'user' content is trusted from the wire\nconst messages\
      \ = (req.body?.messages ?? []).filter((m: any) => m.role === 'user').slice(-20)\nif (messages.some((m: any) => typeof\
      \ m.content !== 'string' || m.content.length > 4000)) {\n  return res.status(400).json({ error: 'invalid message' })\n\
      }"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html
