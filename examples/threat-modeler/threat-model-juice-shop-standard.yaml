  cwe: CWE-359
  title: CTF Flag Broadcast to Unauthenticated WebSocket — lib/challengeUtils.ts:70
  affected_parameter: challenge solved event — flag field
  scenario: 'When any challenge is solved, `challengeUtils.sendNotification()` (line 70 of `challengeUtils.ts`) calls `globalWithSocketIO.io.emit(''challenge
    solved'', notification)`, broadcasting to ALL connected sockets. The `notification` object includes a `flag` field containing
    the CTF flag value (line 48: `utils.ctfFlag(challenge.name)`). Additionally, on every new socket connection, `registerWebsocketEvents.ts:30-32`
    iterates over all pending notifications and re-emits each one to the new socket. Since connections require no authentication,
    any internet client connecting to the WebSocket endpoint receives CTF flags for all challenges solved since the last server
    restart, without needing to solve those challenges.'
  evidence_summary: '`globalWithSocketIO.io.emit(''challenge solved'', notification)` at `challengeUtils.ts:70` broadcasts
    the full notification object (including `flag`) to all sockets, and `registerWebsocketEvents.ts:30-32` re-plays all historical
    notifications to each new unauthenticated connection.'
  impact_description: An attacker passively connects to the WebSocket and harvests CTF flag values for all previously solved
    challenges, undermining the integrity of the challenge system for all participants.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: The `hidden` field in the notification object (`config.get('challenges.showSolvedNotifications')`) can
    suppress UI display, but the flag is still transmitted in the WebSocket message payload.
  mitigation_title: Scope challenge solved broadcasts to per-user authenticated socket rooms rather than broadcasting to all
    connections
  remediation:
    effort: Medium
    steps:
    - After implementing Socket.IO connection authentication, join each authenticated socket to a per-user room (`socket.join('user:'
      + socket.data.user.id)`) on connection.
    - Replace `io.emit('challenge solved', notification)` with `io.to('user:' + solvedByUserId).emit('challenge solved', notification)`
      so flags are only delivered to the user who solved the challenge.
    - Remove the bulk re-play of all pending notifications to new sockets (lines 30-32 of `registerWebsocketEvents.ts`) or
      filter to only notifications belonging to the authenticated user's session.
    code_example: "// challengeUtils.ts — targeted emit\nif (globalWithSocketIO.io) {\n  globalWithSocketIO.io\n    .to('user:'\
      \ + challenge.userId)\n    .emit('challenge solved', notification)\n}"
    reference: CWE-359
