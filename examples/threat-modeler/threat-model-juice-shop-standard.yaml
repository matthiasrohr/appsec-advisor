  cwe: CWE-22
  title: ZIP Path Traversal — routes/fileUpload.ts:44
  affected_parameter: ZIP entry path (entry.path)
  scenario: An unauthenticated attacker crafts a ZIP archive containing an entry whose path is `../ftp/legal.md` or similar.
    At `fileUpload.ts:42`, `path.resolve('uploads/complaints/' + fileName)` produces an absolute path. The check at line 44
    uses `absolutePath.includes(path.resolve('.'))` — this tests whether the current working directory string appears ANYWHERE
    in the resolved path, not whether the resolved path starts with the CWD. A path such as `/home/juice-shop/../../etc/cron.d/evil`
    will fail this check and be blocked, but paths that thread through the CWD (e.g., `/home/juice-shop/../../home/juice-shop/ftp/evil`)
    pass it. The challenge is intentionally triggered by writing to `ftp/legal.md` (`absolutePath === path.resolve('ftp/legal.md')`
    at line 43). A malicious actor can overwrite application files outside `uploads/complaints/` with arbitrary content, leading
    to remote code execution on next `require()` or application restart.
  evidence_summary: The traversal guard at fileUpload.ts:44 uses `includes()` rather than `startsWith()`, allowing crafted
    ZIP entry paths that embed the CWD string mid-path to escape the intended directory.
  impact_description: Unauthenticated attacker writes arbitrary files to any path accessible under the Node.js process, enabling
    persistent RCE by overwriting application scripts or configuration.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: '`path.resolve()` normalises `../` sequences. `includes()` check rejects fully-external paths. Multer
    200KB size limit applies.'
  mitigation_title: Replace includes() traversal check with a strict startsWith() prefix guard on ZIP entry paths
  remediation:
    effort: Low
    steps:
    - Replace `absolutePath.includes(path.resolve('.'))` with `absolutePath.startsWith(path.resolve('uploads/complaints')
      + path.sep)` at routes/fileUpload.ts:44.
    - Sanitize `fileName` with `path.basename(entry.path)` to strip all directory components before constructing the destination
      path, preventing traversal entirely.
    - Consider validating the unzipped content with an allowlist of permitted file extensions before writing to disk.
    code_example: "const safeBase = path.resolve('uploads/complaints') + path.sep\nconst fileName = path.basename(entry.path)\
      \ // strip any directory component\nconst absolutePath = path.resolve('uploads/complaints/' + fileName)\nif (absolutePath.startsWith(safeBase))\
      \ {\n  entry.pipe(fs.createWriteStream(absolutePath))\n} else {\n  entry.autodrain()\n}"
    reference: CWE-22
  evidence:
