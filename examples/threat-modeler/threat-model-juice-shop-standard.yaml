tier_root_causes:
  edge:
  - missing Content Security Policy allows arbitrary JS execution
  - OAuth tokens stored in cleartext localStorage (no httpOnly cookie)
  - no auth validation on client-side route guards
  server:
  - hardcoded RSA private key enables offline JWT forgery for any identity
  - missing authorization middleware on privileged and resource endpoints
  - raw SQL string interpolation enables injection across multiple routes
  - no input validation allows mass assignment and prototype pollution
  - LLM prompt injection due to unsanitized user input in system context
  data:
  - MD5 password hashing trivially crackable offline
  - raw SQL queries bypass ORM parameterization
  - no field-level encryption for PII stored in SQLite
