  title: OAuth Implicit Flow with No State Validation — app.routing.ts:262
  affected_parameter: access_token (URL fragment)
  scenario: 'The Angular SPA uses Google OAuth implicit grant: `oauthMatcher` at `app.routing.ts:262` activates `OAuthComponent`
    whenever `window.location.href` contains `#access_token=`. No `state` parameter is generated before the redirect and no
    `state` value is validated on return. An attacker can craft a malicious OAuth redirect URI that delivers a forged or stolen
    `access_token` in the fragment (CSRF on OAuth flow). When the victim navigates to the attacker''s link, `OAuthComponent.ngOnInit()`
    at line 28 calls `userService.oauthLogin(access_token)` with the attacker-supplied token, fetching the attacker''s profile
    and logging the victim in as the attacker — a classic OAuth CSRF / session fixation.'
  evidence_summary: The `oauthMatcher` function tests only `path.includes('#access_token=')` with no state check; the `OAuthComponent`
    immediately consumes `access_token` from the URL without verifying any anti-CSRF state parameter.
  impact_description: An attacker can force a victim's browser to silently authenticate as the attacker (or as any OAuth-flow
    user) — resulting in account takeover or unauthorized access to victim session data.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no state parameter is generated or validated anywhere in the OAuth flow.
  mitigation_title: Replace implicit flow with OAuth 2.0 authorization code flow and validate state parameter
  remediation:
    effort: High
    steps:
    - Migrate from implicit flow (`response_type=token`) to authorization code flow with PKCE (`response_type=code&code_challenge=...`)
      using Angular's standard OAuth library such as `angular-oauth2-oidc`.
    - Generate a cryptographically random `state` parameter before initiating the OAuth redirect, store it in `sessionStorage`,
      and verify it matches the value returned in the callback before consuming the `access_token`.
    - Remove `oauthMatcher` and `OAuthComponent`'s direct fragment parsing; let the OAuth library handle the callback securely.
    - Set the `redirect_uri` in Google Cloud Console to the exact SPA callback URL and validate it exact-match server-side.
    code_example: '// Using angular-oauth2-oidc

      import { OAuthService } from ''angular-oauth2-oidc'';

      // In AuthService.initiateLogin():

      const state = crypto.randomUUID();

      sessionStorage.setItem(''oauth_state'', state);

      this.oauthService.initCodeFlow(state);  // PKCE + state generated

      // In callback handler:

      const returnedState = params.get(''state'');

      if (returnedState !== sessionStorage.getItem(''oauth_state'')) throw new Error(''State mismatch'');'
