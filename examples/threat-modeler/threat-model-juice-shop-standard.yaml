    })`. When `challenges.reflectedXssChallenge` is enabled, `id` is `utils.trunc(req.params.id, 60)` — a raw string. An attacker
    supplies `''; return true; var x = ''` which evaluates to `this.orderId === ''''; return true; var x = ''''`, causing
    the predicate to return `true` for every document and returning the entire orders collection. When the challenge is disabled,
    only `\w-` characters pass — but the challenge-enabled path (production-deployed by default) is unguarded.'
  evidence_summary: '`routes/trackOrder.ts:18` interpolates `req.params.id` into a MarsDB `$where` JavaScript expression,
    bypassing any field-equality filter.'
  impact_description: Attacker retrieves all orders from the MarsDB orders collection, including other customers' order details
    and delivery addresses.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: When `reflectedXssChallenge` is disabled, `String(req.params.id).replace(/[^\w-]+/g, '')` strips most
    special characters. Challenge mode removes this guard.
  mitigation_title: Replace $where order query with direct field equality and strict ID format validation
  remediation:
