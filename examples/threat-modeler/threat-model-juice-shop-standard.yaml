- local_id: frontend-spa-002
  threat_category_id: TH-10
  additional_categories:
  - TH-06
  stride: Spoofing
  cwe: CWE-287
  title: Derived Password from OAuth Email Claim — oauth.component.ts:30
  affected_parameter: password
  scenario: '`OAuthComponent.ngOnInit()` at line 30 derives a user password as `btoa(profile.email.split('''').reverse().join(''''))`.
    This deterministic, reversible formula is then used to register or log in the user via `POST /api/Users` and `POST /rest/user/login`.
    Any party who knows a target user''s email address can compute this password locally and authenticate directly against
    the `/rest/user/login` endpoint — completely bypassing Google OAuth. For admin accounts whose emails are discoverable
    (e.g. exposed in the `/rest/user/authentication-details/` API, the user list in the administration panel, or CTF writeups),
    this grants full admin access without any Google credential.'
  evidence_summary: '`oauth.component.ts:30` computes `btoa(email.split('''').reverse().join(''''))` and stores it as both
    the registration and login password, creating a globally predictable credential for any OAuth user.'
  impact_description: An attacker who knows any OAuth-registered user's email address can authenticate as that user with a
    locally computed password, gaining their full session JWT including admin privileges.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the email-to-password formula is public in the client-side source.
  mitigation_title: Remove derived-password login path and authenticate OAuth users via server-side token exchange only
  remediation:
    effort: High
    steps:
    - Remove the `password = btoa(email.split('').reverse().join(''))` pattern entirely. OAuth users must never have a password-based
      login path; the server should mark OAuth-sourced accounts with an `oauth_only` flag and reject password login attempts
      for them.
    - 'Replace the client-side Google profile fetch (`UserService.oauthLogin`) with a server-side authorization code exchange:
      the SPA sends only the authorization code to the backend (`POST /rest/oauth/callback`), which exchanges it with Google''s
      token endpoint using the client secret held server-side and issues a first-party JWT.'
    - On the backend, create OAuth-provisioned user records with a random high-entropy password field (e.g. `crypto.randomBytes(32).toString('hex')`)
      that is never exposed or accepted over the login endpoint.
    code_example: null
    reference: CWE-287
