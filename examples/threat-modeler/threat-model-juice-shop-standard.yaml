  name: CI/CD Pipeline
  description: '13 GitHub Actions workflows covering lint, test (matrix: ubuntu/macos x Node 20/22/24), CodeQL static analysis,
    ZAP DAST scan, and release. 10 of 13 workflows lack a permissions block (GITHUB_TOKEN write-all), CodeQL actions use mutable
