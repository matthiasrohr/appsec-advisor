  stride: Elevation of Privilege
  cwe: CWE-327
  title: JWT Algorithm Confusion — lib/insecurity.ts:52
  affected_parameter: null
  scenario: '`lib/insecurity.ts:52` initialises `express-jwt` as `expressJwt({ secret: publicKey })` — the `algorithms` option
    is absent. The installed version `express-jwt@0.1.3` (`package.json:112`) does not enforce algorithm restrictions and
    accepts tokens with `alg: none`. An attacker calls `jws.sign({ header: { alg: ''none'' }, payload: JSON.stringify({ data:
    { id: 1, role: ''admin'' } }) })` to obtain an unsigned token the middleware accepts, bypassing the RS256 signature check
    entirely.'
  evidence_summary: '`express-jwt@0.1.3` at `lib/insecurity.ts:52` lacks `algorithms: [''RS256'']`; this version accepts `alg:none`
    tokens.'
  impact_description: Attacker crafts an unsigned JWT with any role payload that the server accepts as authenticated, enabling
    full privilege escalation without the signing key.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 used for token issuance; verification uses the public key
  mitigation_title: Pin allowed JWT algorithms to RS256 in express-jwt and upgrade to a supported version
  remediation:
    effort: Low
    steps:
    - Upgrade `express-jwt` to the current major (≥8.x) and `jsonwebtoken` to ≥9.x in `package.json`.
    - 'Add `algorithms: [''RS256'']` to the `expressJwt()` call at `lib/insecurity.ts:52`: `expressJwt({ secret: publicKey,
      algorithms: [''RS256''] })`.'
    - Add a test that presents an `alg:none` token and asserts a 401 response.
    code_example: '// lib/insecurity.ts:52

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] })'
    reference: CWE-327
