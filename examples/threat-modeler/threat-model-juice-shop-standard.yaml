threats:
- local_id: frontend-spa-002
  threat_category_id: TH-04
  additional_categories:
  - TH-02
  stride: Information Disclosure
  cwe: CWE-1173
  title: SPA holds API bearer credential client-side with no — socket-io.service.ts:22
  affected_parameter: null
  scenario: 'The Angular SPA talks directly to the Express API and Socket.IO endpoint with no Backend-for-Frontend proxy (socket-io.service.ts:22,
    request.interceptor.ts attaches the Bearer on every REST call). Recon Section 7.10 confirms ''No BFF proxy layer; direct
    SPA-to-API communication'' and ''Token stored in localStorage (no httpOnly flag)''. This is the SPA-without-BFF architectural
    anti-pattern: the browser is forced to store and replay a full-power API credential, so the entire client-side XSS attack
    surface becomes an authentication-bypass surface, and there is no server-side place to enforce token binding, rotation,
    or per-request authorization decisions. All trust-boundary enforcement collapses to the browser.'
  evidence_summary: Section 7.10 states no BFF exists and the token lives in localStorage; the SPA wires Socket.IO and REST
    directly to the origin API.
  impact_description: Every client-side weakness escalates to credential theft, and there is no server-side control point
    to bind, rotate, or scope the session.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — direct SPA-to-API architecture with client-held credentials.
  mitigation_title: Introduce a Backend-for-Frontend that holds tokens server-side and exposes only a cookie session to the
    SPA
  remediation:
    effort: High
    steps:
    - Stand up a BFF (e.g. an Express layer in front of the API) that performs login, stores the upstream API token server-side
      keyed by session, and returns only an HttpOnly Secure SameSite=Strict session cookie.
    - Route all SPA REST and Socket.IO traffic through the BFF origin so the browser sends the cookie automatically and never
      sees the API token.
    - Move the route-guard authorization decisions server-side in the BFF; keep the Angular guards only as UX hints.
    code_example: null
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html
  evidence:
  - file: frontend/src/app/Services/socket-io.service.ts
    line: 22
  evidence_check: verified
  prior_finding_ref: null
  architectural_violation: true
  component_name: Angular SPA Frontend
  source: stride
  id: T-001
  component: frontend-spa
  effective_severity: High
  breach_distance: 2
  chain_role: none
  compound_chain_ids: []
  verified_chain_ids: []
  mitigation_ids:
  - M-015
  _title_source: SPA holds API bearer credential client-side with no BFF
  vektor: internet-anon
- local_id: auth-001
  threat_category_id: TH-03
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA JWT signing key in source — lib/insecurity.ts:23
  affected_parameter: null
  scenario: The RSA private key used to sign every authentication JWT is a string literal in lib/insecurity.ts:23 and is committed
    to the public repository. authorize() (line 56) signs tokens with this key. Any attacker who reads the source can mint
    a JWT with arbitrary data.role (e.g. 'admin') and a valid deluxeToken HMAC (deluxeToken() at line 152 also derives from
    the same private key), then present it to any isAuthorized()-protected endpoint. This is full authentication and authorization
    bypass against the entire application.
  evidence_summary: privateKey is a hardcoded 1024-bit RSA PEM literal at lib/insecurity.ts:23, consumed by authorize() at
    line 56 and deluxeToken() at line 152.
  impact_description: Attacker forges admin-role JWTs offline, gaining complete account takeover and privileged access without
    credentials.
