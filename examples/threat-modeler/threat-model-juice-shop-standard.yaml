- local_id: data-store-003
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Weak Password Hashing MD5 Without Salt — models/user.ts:76
  scenario: 'The `UserModelInit` setter at `models/user.ts:76` hashes passwords using `security.hash(clearTextPassword)`,
    where `hash` is defined as `crypto.createHash(''md5'').update(data).digest(''hex'')` in `lib/insecurity.ts:41`. MD5 is
    not a password hashing function: it has no salt, no work factor, and a 128-bit output that fits entirely in GPU rainbow
    tables. An attacker who reads the SQLite file (via SQL injection `LOAD_DATA INFILE` or direct filesystem access) can recover
    all plaintext passwords in minutes using hashcat or Crackstation. The issue applies to every user account including admin,
    accounting, and deluxe roles.'
  evidence_summary: '`security.hash()` at `models/user.ts:76` calls `crypto.createHash(''md5'')` — a collision-prone, unsalted
    single-round hash — to store user passwords in the `Users.password` column.'
  impact_description: Full offline recovery of all user passwords after any database read access event, enabling account takeover
    for the entire user population.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — MD5 is used with no salt, no iteration, no per-user random component.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2id in User model setter
  remediation:
    effort: Medium
    steps:
    - Install `bcrypt` or `argon2` npm package and replace `security.hash(clearTextPassword)` with `await bcrypt.hash(clearTextPassword,
      12)` in the `user.ts` password setter; update all authentication queries that compare hashed values to use `bcrypt.compare()`.
    - Run a one-time migration to re-hash existing passwords on next login (verify old MD5 hash, then store new bcrypt hash)
      so existing accounts are upgraded transparently.
    - Update `lib/insecurity.ts:41` to remove the `hash` export or rename it to `legacyMD5Hash` and document it as challenge-only
      code, preventing accidental reuse.
    code_example: "```typescript\nimport bcrypt from 'bcrypt'\n\n// In user.ts setter:\nasync set (clearTextPassword: string)\
      \ {\n  const hashed = await bcrypt.hash(clearTextPassword, 12)\n  this.setDataValue('password', hashed)\n}\n\n// In\
      \ login route:\nconst match = await bcrypt.compare(req.body.password, user.password)\nif (!match) return res.status(401).send('Invalid\
      \ credentials')\n```"
    reference: CWE-916
  evidence:
  - file: models/user.ts
    line: 76
  evidence_check: verified
