- local_id: web3-nft-003
  threat_category_id: TH-06
  additional_categories: []
  stride: Tampering
  cwe: CWE-841
  title: Reentrancy in ETHWalletBank withdraw — ETHWalletBank.sol:32
  affected_parameter: amount
  scenario: 'ETHWalletBank.sol:32 executes `(bool result,) = msg.sender.call{value: _amount}("")` to transfer ETH to the caller
    before updating `balances[msg.sender] -= _amount` at line 34. This violates the Checks-Effects-Interactions pattern. A
    malicious contract that implements a `receive()` fallback can re-enter `withdraw()` before the balance is decremented,
    draining the contract''s ETH balance in a loop. The `userWithdrawing` counter at line 25-31 only prevents more than 2
    recursive calls before emitting `ContractExploited` — it does not prevent double-spending; it is intentionally the challenge
    target. The Juice Shop server at routes/web3Wallet.ts listens for the `ContractExploited` event to award the challenge,
    so an attacker who executes the reentrancy attack on Sepolia testnet receives the challenge credit.'
  evidence_summary: The external call at ETHWalletBank.sol:32 precedes the state update at line 34 — balance is decremented
    after funds are sent, enabling reentrancy.
  impact_description: Attacker withdraws ETH beyond their deposited balance by re-entering the withdraw function before the
    balance update commits.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: userWithdrawing counter (intentional challenge mechanic, not a security control); SafeMath imported but
    not applied to the balance decrement
  mitigation_title: 'Apply checks-effects-interactions: decrement balance before the external call in withdraw()'
  remediation:
    effort: Low
    steps:
    - Move `balances[msg.sender] -= _amount` to before the `call{value:}` at ETHWalletBank.sol:32 — this is the standard CEI
      fix.
    - Add a `ReentrancyGuard` from OpenZeppelin and apply the `nonReentrant` modifier to `withdraw()`.
    - Alternatively, use a pull-payment pattern (Withdrawal Pattern) so the contract never sends ETH directly.
    code_example: '// CEI fix:

      require(balances[msg.sender] >= _amount);

      balances[msg.sender] -= _amount;  // effects first

      (bool result,) = msg.sender.call{value: _amount}("");  // interaction last

      require(result, "Withdrawal call failed");'
    reference: CWE-841
  evidence:
  - file: data/static/web3-snippets/ETHWalletBank.sol
    line: 32
  evidence_check: verified
  controls_absent_evidence: []
