  title: Missing Structured Security Audit Log for Auth and Admin Events — server.ts:338
  affected_parameter: null
  scenario: The application logs HTTP requests via Morgan (`server.ts:338`) in combined format to rotating files in `logs/`.
    No structured security audit log is written for authentication events (login success/failure, 2FA events, JWT forgery
    detection), authorization failures (403 responses from `security.isAuthorized()`, `security.denyAll()`), or sensitive
    data mutations (order placement, profile update, wallet balance changes). The Morgan access log captures only HTTP-layer
    metadata. If an attacker authenticates as admin (via JWT forgery or SQLi) and modifies data, no record exists tying the
    actor identity to the specific action with sufficient context for forensic reconstruction. The access logs themselves
    are publicly readable (express-backend-010), further degrading their forensic value.
  evidence_summary: server.ts:338 uses morgan('combined') for HTTP logging only; no security.audit() or equivalent call appears
    on login success, auth failure, or admin action paths.
  impact_description: Successful attacks leave no actor-attributable record; forensic investigation after a breach cannot
    establish what data was accessed or modified, by whom, and when.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Morgan HTTP access log captures request metadata including IP and URL; insufficient for security audit.
  mitigation_title: Add structured security audit logging on authentication events and admin actions
  remediation:
    effort: Medium
    steps:
    - 'Create a dedicated audit logger (e.g. using winston with a separate transport) that writes JSON events with fields:
      timestamp, actor (userId/email), action, resource, outcome, sourceIp.'
    - 'In routes/login.ts: emit audit events on login success and failure (with email but not password).'
    - 'In lib/insecurity.ts isAuthorized() rejection path: emit audit event with userId and requested path.'
    - Write audit events to a separate append-only log file (or external SIEM sink) distinct from the publicly-accessible
      access.log.
    code_example: "// lib/audit.ts\nimport winston from 'winston'\nexport const auditLog = winston.createLogger({\n  transports:\
      \ [new winston.transports.File({ filename: 'logs/security-audit.log' })]\n})\nexport const logAuth = (event: string,\
      \ actor: string, ip: string, outcome: string) =>\n  auditLog.info({ event, actor, ip, outcome, ts: new Date().toISOString()\
      \ })"
