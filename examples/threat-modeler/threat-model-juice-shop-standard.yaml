tier_root_causes:
  edge:
  - admin authz decided client-side from unverified JWT claim
  - API bearer token stored in non-httpOnly localStorage
  - DOM and stored XSS via disabled Angular sanitizer (bypassSecurityTrustHtml)
  - OAuth tokens exposed in URL fragment and query string
  - no server-side validation of client-supplied CAPTCHA timestamps
  server:
  - hardcoded RSA and HMAC secrets committed to public source
  - missing input neutralization on raw SQL paths (login, search)
  - no authentication middleware on management and chat endpoints
  - unrestricted file-upload parsers enabling path traversal and XXE
  - missing rate limiting on authentication and sensitive endpoints
  data:
  - passwords stored as unsalted MD5 hashes
  - sensitive PII and payment columns unencrypted at rest
  - security answers HMAC'd with a hardcoded static key
cross_repo_dependencies: []
