  title: JWT Not Revocable on Logout — lib/insecurity.ts:54
  affected_parameter: JWT session token
  scenario: 'JWTs are valid for 6 hours (`expiresIn: ''6h''` at insecurity.ts:54). The `authenticatedUsers.tokenMap` at insecurity.ts:70
    is an in-memory map with no eviction logic. When a user logs out, changes their password, or has their account disabled,
    the previously issued JWT remains cryptographically valid until expiry. An attacker who steals a token via XSS (tokens
    are stored in localStorage per component description) retains authenticated access for up to 6 hours post-theft. There
    is no server-side token blacklist or short-lived token with refresh mechanism.'
  evidence_summary: '`authenticatedUsers.tokenMap` at insecurity.ts:70 is a plain in-memory object; `authorize()` at line
    54 sets 6h expiry with no server-side revocation path.'
  impact_description: Stolen JWT tokens remain valid for up to 6 hours; account takeover persists through password changes,
    account disables, or logout.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no server-side revocation, no short expiry with refresh.
  mitigation_title: Implement server-side JWT revocation list or reduce token lifetime to 15 minutes with refresh tokens
  remediation:
    effort: Medium
    steps:
    - Reduce JWT `expiresIn` to 15 minutes and issue a separate httpOnly Secure SameSite=Strict refresh token stored server-side.
    - Implement a server-side token revocation list (e.g., Redis set of invalidated jti values); check on every authenticated
      request.
    - On password change or logout, add the current token's `jti` to the revocation list.
    - Alternatively, include a `passwordVersion` counter in the JWT; increment on password change; reject tokens with a stale
      counter.
