  title: MD5 Without Salt Used for Password Hashing — lib/insecurity.ts:41
  affected_parameter: User.password field
  scenario: All user passwords are hashed with MD5 without a salt (`crypto.createHash('md5').update(data).digest('hex')` at
    insecurity.ts:41). MD5 is a fast, non-stretching hash — rainbow tables for common passwords are freely available. If the
    SQLite database is exfiltrated (e.g., via SQL injection or path traversal), all hashed passwords are crackable offline
    in minutes to hours using tools such as hashcat with a wordlist. Additionally, two users with the same password share
    the same hash, enabling correlation attacks.
  evidence_summary: '`security.hash()` at insecurity.ts:41 calls `crypto.createHash(''md5'')` with no salt; this function
    is called for every stored password and for login credential comparison.'
  impact_description: Full offline cracking of all user passwords after any DB exfiltration, enabling mass account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no salt, no key-stretching algorithm.
  mitigation_title: Replace MD5 with bcrypt/argon2 for password hashing throughout insecurity.ts and models
  remediation:
    effort: Medium
    steps:
    - 'Replace `export const hash = (data: string) => crypto.createHash(''md5'').update(data).digest(''hex'')` with bcrypt:
      `import bcrypt from ''bcrypt''; export const hash = (data: string) => bcrypt.hashSync(data, 12);` and `export const
      verifyHash = (data: string, hash: string) => bcrypt.compareSync(data, hash);`.'
    - Update all call sites that compare `security.hash(password)` to use `bcrypt.compare()` instead of equality check.
    - 'Migrate existing MD5 hashes: on next successful login, re-hash the password with bcrypt and update the DB row.'
    - Use Argon2id if bcrypt is not already a project dependency — preferred per OWASP Password Storage Cheat Sheet 2024.
    code_example: '```typescript

