- id: auth-module
  name: Authentication & Authorization Module
  description: 'Handles all authentication flows: password-based login (SQL-injectable), JWT issuance and verification using
    hardcoded RSA private key in source, OAuth via GitHub/Google, 2FA via TOTP. Authorization via express-jwt 0.1.3 middleware
    with RS256 JWT validation. Contains multiple intentional vulnerabilities.'
  tier: application
  paths:
  - lib/insecurity.ts
  - routes/login.ts
  - routes/changePassword.ts
  - routes/2fa.ts
  - routes/oauth.ts
  deployment_zones:
  - application-tier
  handles_sensitive_data: true
  tech: express-jwt 0.1.3, jsonwebtoken 0.4.0, jws, speakeasy (TOTP), passport
  complexity: complex
  threat_ids:
  - T-003
  - T-004
  - T-005
  - T-056
  - T-057
  - T-062
  - T-070
- id: sqlite-db
  name: SQLite Database
  description: In-process SQLite database accessed via Sequelize 6 ORM. Stores users (with MD5-hashed passwords), products,
    orders, basket items, addresses, payment cards, wallets, security questions/answers, complaints, and challenge state.
    No separate process — embedded in Express backend.
  tier: data
  paths:
  - models/**
  - data/**
  deployment_zones:
