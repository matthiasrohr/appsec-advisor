threats:
- local_id: auth-005
  threat_category_id: TH-06
  additional_categories:
  - TH-02
  stride: Elevation of Privilege
  cwe: CWE-915
  title: Mass Assignment Privileged Role Field Settable at — models/user.ts:79
  scenario: The /api/Users POST endpoint is handled by Sequelize-based REST (epilogue/finale) configured at server.ts:408-422.
    The User model at models/user.ts:79-98 declares role with defaultValue:'customer' and a validator that allows 'customer',
    'deluxe', 'accounting', 'admin'. Because the REST layer passes req.body directly to the Sequelize create() call without
    stripping sensitive fields, an attacker can POST {"email":"evil@test.com", "password":"pass", "role":"admin"} to /api/Users
    and create an admin account. The role setter at line 85 accepts any valid role value from the request body.
  evidence_summary: User model role field accepts 'admin' from request body at models/user.ts:79; /api/Users POST at server.ts:408
    applies no field allowlist before the Sequelize create().
  impact_description: Any anonymous user can self-register as admin and access all administrative functionality.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Server-side role validator confirms value is in the allowed set, but does not prevent external assignment.
  mitigation_title: Restrict writable fields on POST /api/Users to exclude role, deluxeToken, totpSecret, and isActive
  remediation:
    effort: Low
    steps:
    - In the epilogue/finale resource configuration at server.ts:479-517, add a milestones.create.write.before hook that deletes
      req.body.role, req.body.deluxeToken, req.body.totpSecret, and req.body.isActive before the Sequelize create() call.
    - Alternatively, move user registration off the generic REST layer to a dedicated route handler that explicitly whitelists
      only email, password, and username.
    - 'Add a regression test: POST /api/Users with role:''admin'' must return a user with role:''customer''.'
    code_example: "// In the epilogue resource create.write.before hook:\nresource.create.write.before((req, res, context)\
      \ => {\n  delete req.body.role\n  delete req.body.deluxeToken\n  delete req.body.totpSecret\n  delete req.body.isActive\n\
      \  return context.continue\n})"
    reference: CWE-915
  evidence:
  - file: models/user.ts
    line: 79
  evidence_check: ambiguous
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: true
  component_name: Authentication & Session Management
  source: stride
  merged_from:
  - auth
  - express-backend
  evidence_flags:
  - flag_id: EV-001
    verdict: ambiguous
    reason: Line 79 shows role field with admin in isIn validator; mass assignment exploitation requires server.ts route config
      not visible here.
    line_excerpt: 'role: { type: DataTypes.STRING, defaultValue: ''customer'', validate: {'
    verified_at: '2026-06-24T04:25:29Z'
  mitigation_ids:
  - M-004
  - M-066
  id: T-001
  component: auth
  effective_severity: Critical
  breach_distance: 1
  chain_role: keystone
  compound_chain_ids:
  - CC-06
  verified_chain_ids: []
  _title_source: Mass Assignment Privileged Role Field Settable at Registration
  vektor: internet-user
- local_id: auth-007
  threat_category_id: TH-04
  additional_categories:
  - TH-11
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Stored in localStorage XSS Token Exfiltration — login.component.ts:101
  scenario: 'After a successful login, the Angular frontend stores the JWT in localStorage at login.component.ts:101: localStorage.setItem(''token'',
    authentication.token). The TOTP intermediate token is similarly stored at line 120. localStorage is accessible to any
    JavaScript running in the same origin. Given the stored XSS vulnerabilities in the username and email fields (models/user.ts:48-70
    notes challenge-mode sanitization), a successful XSS payload can call localStorage.getItem(''token'') and exfiltrate the
    JWT to an attacker-controlled server. The token is valid for 6 hours (security.authorize at insecurity.ts:54: expiresIn:''6h'')
    with no server-side revocation.'
  evidence_summary: localStorage.setItem('token', authentication.token) at login.component.ts:101; no HttpOnly flag; token
    valid 6 hours with no revocation.
  impact_description: XSS exfiltrates a long-lived JWT; attacker impersonates the victim for up to 6 hours and no logout can
    revoke it.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Token also written to a cookie, but cookie is not configured HttpOnly (see CookieService.put at line
    104 — no httpOnly flag passed).
  mitigation_title: Move JWT storage to an HttpOnly Secure SameSite=Strict cookie and remove localStorage usage
  remediation:
    effort: Medium
    steps:
    - 'On the server side, set the JWT in a Set-Cookie header with flags: HttpOnly; Secure; SameSite=Strict instead of returning
      it in the JSON response body.'
    - Remove localStorage.setItem('token', ...) at login.component.ts:101 and all localStorage.getItem('token') reads in the
      Angular codebase.
    - 'Update the Angular HTTP client to send cookies (withCredentials: true) rather than an Authorization header.'
    - 'Implement a /rest/user/logout endpoint that clears the cookie server-side (Set-Cookie: token=; Max-Age=0; HttpOnly;
      Secure).'
    - Add a Content-Security-Policy header to reduce XSS exfiltration risk as a defence-in-depth layer.
    code_example: "// Server-side: set JWT as HttpOnly cookie\nres.cookie('token', token, {\n  httpOnly: true,\n  secure:\
      \ true,\n  sameSite: 'strict',\n  maxAge: 6 * 60 * 60 * 1000\n})\nres.json({ authentication: { bid: basket.id, umail:\
      \ user.email } })"
    reference: CWE-922
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 101
  evidence_check: verified
  controls_absent_evidence: []
  prior_finding_ref: null
  architectural_violation: true
  component_name: Authentication & Session Management
