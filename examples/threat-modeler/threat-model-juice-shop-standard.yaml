  title: Unrestricted Workflow Trigger on Issue Comment Enables CI — rebase.yml:10
  affected_parameter: github.event.comment.body
  scenario: '`rebase.yml` triggers on `issue_comment: types: [created]` (line 5-6) and executes the rebase job when the comment
    body contains the string `/rebase` (line 10). There is no check that the commenter is a repository member, collaborator,
    or any other role — any authenticated GitHub user who can comment on a PR (i.e., all public GitHub users on this public
    repository) can trigger the job. An attacker can post a flood of comments containing `/rebase` to any open PR, triggering
    a rebase job for each comment. Since the `always_job` (line 21) also runs unconditionally for every trigger, two runner-minutes
    are consumed per comment. This can exhaust the organization''s free GitHub Actions minutes budget, blocking legitimate
    CI runs.'
  evidence_summary: '`rebase.yml:10` gates job execution only on `github.event.issue.pull_request != ''''` and `contains(github.event.comment.body,
    ''/rebase'')` — no membership or permission check restricts who can trigger it.'
  impact_description: Any public GitHub user can exhaust CI minutes by flooding PR comments with `/rebase`, preventing legitimate
    builds from running during the attack window.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. The workflow has no rate limiting, no actor membership check, and no concurrency group to limit
    parallel rebase jobs.
  mitigation_title: Add GitHub membership or permission check before executing rebase in rebase.yml
  remediation:
    effort: Low
    steps:
    - 'Add a membership check before the rebase step: use `github.event.comment.author_association` to restrict to `OWNER`,
      `MEMBER`, or `COLLABORATOR`. Example: `if: github.event.issue.pull_request != '''' && contains(github.event.comment.body,
      ''/rebase'') && contains(fromJSON(''["OWNER","MEMBER","COLLABORATOR"]''), github.event.comment.author_association)`.'
    - 'Add a `concurrency:` block to the workflow to limit to one rebase per PR at a time: `concurrency: group: rebase-${{
      github.event.issue.number }} cancel-in-progress: true`.'
    - 'Consider adding `permissions: read-all` at the workflow level and `permissions: contents: write` only at the rebase
      job level, to limit blast radius if the trigger is abused.'
    code_example: "jobs:\n  rebase:\n    name: Rebase\n    if: |\n      github.event.issue.pull_request != '' &&\n      contains(github.event.comment.body,\
      \ '/rebase') &&\n      contains(fromJSON('[\"OWNER\",\"MEMBER\",\"COLLABORATOR\"]'),\n               github.event.comment.author_association)\n\
      \    concurrency:\n      group: rebase-${{ github.event.issue.number }}\n      cancel-in-progress: true"
    reference: CWE-400
