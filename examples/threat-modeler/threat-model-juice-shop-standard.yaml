  cwe: CWE-598
  title: OAuth Access Token Exposed in URL Fragment — app.routing.ts:257
  affected_parameter: access_token (URL fragment / window.loc…
  scenario: The route definition at line 257 captures `window.location.href` at module load time when the URL contains `#access_token=...`.
    The access token is present in the full URL fragment, visible in the browser's address bar, stored in browser history,
    and potentially leaked in the `Referer` header when the page loads external resources — including Google Fonts loaded
    in `index.html:13-15` (`https://fonts.googleapis.com`, `https://fonts.gstatic.com`). Any browser extension or script with
    `tabs` permission can read the URL from history.
  evidence_summary: Line 257 evaluates `(window.location.href).substr(window.location.href.indexOf('#'))` at route-table initialization,
    capturing the raw access_token fragment into Angular route data.
  impact_description: OAuth access tokens are readable from browser history and potentially from Referer headers sent to Google
    Fonts CDN, enabling token theft without JavaScript execution.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — implicit flow with token in fragment, no PKCE
  mitigation_title: Eliminate access_token URL fragment exposure by migrating to PKCE authorization-code flow
  remediation:
    effort: High
    steps:
    - 'Replace the implicit flow OAuth matcher with an authorization-code + PKCE flow: the callback URL carries `?code=` (not
      `#access_token=`), which the client exchanges server-side, keeping the token out of browser history.'
    - 'Remove the `data: { params: window.location.href... }` route-data capture; use `ActivatedRoute.queryParams` to read
      `?code=` instead.'
    - Until implicit flow is removed, add `<meta referrer='no-referrer'>` in `index.html` to prevent the token from leaking
      via Referer to Google Fonts.
    code_example: null
    reference: CWE-598
