tier_root_causes:
  edge:
  - JWT stored in localStorage makes tokens accessible to any injected script
  - Client-side-only auth guards bypassable by direct URL navigation
  - Hardcoded BIP-39 mnemonic committed to repo exposes Web3 wallet keys
  - XSS sinks in Angular templates enable cross-user script injection
  - Real-time channel unauthenticated access enables event-data spoofing
  server:
  - Raw SQL string interpolation throughout ORM bypass enables injection
  - Hardcoded RSA private key allows arbitrary JWT forgery as any user
  - LLM system prompt accepts user-controlled input without neutralization
  - Missing server-side authorization checks on privileged REST endpoints
  - eval() and vm2 sandbox escapes enable remote code execution
  data:
  - XXE processing with external entity access exposes host filesystem
  - Zip Slip in file upload allows path traversal outside upload directory
  - NoSQL injection via MarsDB $where clause enables data exfiltration
  - Unsalted MD5 password hashing trivially crackable via rainbow tables
