- local_id: ci-cd-pipeline-002
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1104
  title: Unlocked npm Dependencies Enable Postinstall Code Execution (.npmrc:1)
  affected_parameter: null
  scenario: '`.npmrc` sets `package-lock=false`, which prevents generation of `package-lock.json`. The `test`, `api-test`,
    `coding-challenge-rsn`, `e2e`, and `smoke-test` jobs in `ci.yml` all run `npm install` without a lockfile. Without a pinned
    lockfile, npm resolves transitive dependencies fresh from the registry on each run. A supply-chain attacker (ACT-D-06)
    who publishes a malicious version of any transitive dependency (matching an unpinned semver range in any of the project''s
    dependencies) would have that package installed and its `postinstall` script executed with GitHub Actions runner privileges.
    The attack surface spans all jobs that call bare `npm install`, not just the package with the malicious version. The `Dockerfile`
    compounds this by running `npm install --omit=dev --unsafe-perm` at line 5, which additionally grants root-level privileges
    to postinstall scripts during container builds, allowing persistence into container image layers.'
  evidence_summary: '`.npmrc` line 1 sets `package-lock=false`; `ci.yml` jobs at lines 85, 65, 125, 211 run `npm install`
    without `--ignore-scripts`, and `Dockerfile` line 5 uses `--unsafe-perm`, each constituting an independent postinstall
    execution surface.'
  impact_description: A malicious postinstall script runs in a GitHub Actions runner with access to all workflow environment
    variables, including `CYPRESS_RECORD_KEY`, `E2E_SOLUTIONS_WEBHOOK`, `GITHUB_TOKEN`, and any other secrets mounted for
    that job.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: The `lint` job uses `--ignore-scripts` for its install step (ci.yml line 37). The Docker final image
    uses `gcr.io/distroless/nodejs24-debian13` which limits runtime attack surface. SBOM is generated for the Docker build.
  mitigation_title: Enable lockfile generation and enforce --ignore-scripts on all CI npm install invocations
  remediation:
    effort: Medium
    steps:
    - Remove `package-lock=false` from `.npmrc` or override it for CI with `npm install --package-lock` in the `npm ci` flow
      — replace `npm install` with `npm ci` in all CI jobs so the lockfile is enforced and no network resolution occurs.
    - Add `--ignore-scripts` to all `npm install` invocations in workflows that do not require postinstall execution (build/test
      jobs). For the `coding-challenge-rsn` job on `windows-latest`, verify whether any postinstall hook is genuinely required
      before adding the flag.
    - Remove `--unsafe-perm` from the `Dockerfile` line 5 `npm install` invocation — it is not required when running as a
      dedicated user inside the container; replace with `npm install --omit=dev` without the flag.
    - Enable `npm audit` as a required CI gate and pin the `CYCLONEDX_NPM_VERSION` range to an exact version (`=4.x.x`) to
      reduce transitive drift.
    - Consider adopting `socket.dev` or Dependabot supply-chain alerts to detect typosquatting and dependency confusion before
      install.
    code_example: "# ci.yml — replace npm install with npm ci\n- name: \"Install application\"\n  run: |\n    npm ci --ignore-scripts\n\
      \    cd frontend\n    npm ci --ignore-scripts\n\n# Dockerfile — remove --unsafe-perm\nRUN npm install --omit=dev"
    reference: CWE-1104
  evidence:
