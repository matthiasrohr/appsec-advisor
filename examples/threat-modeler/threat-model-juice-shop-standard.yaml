- local_id: auth-module-001
  threat_category_id: TH-02
  additional_categories: []
  stride: Spoofing
  cwe: CWE-89
  title: SQL Injection Authentication Bypass — routes/login.ts:34
  affected_parameter: email
  scenario: 'The login query at routes/login.ts:34 interpolates `req.body.email` and `req.body.password` directly into a raw
    SQL string: `SELECT * FROM Users WHERE email = ''${req.body.email}'' AND password = ''${security.hash(req.body.password)}''`.
    An unauthenticated attacker submits `'' OR ''1''=''1` as the email field. The resulting query returns the first row in
    the Users table, which is the seeded admin account. The `afterLogin` function then issues a valid RS256 JWT with the admin
    user''s role and ID. The TOTP check at line 37 is bypassed because the SQLi returns the admin user whose `totpSecret`
    is empty string — the `!== ''''` guard at line 37 evaluates false, so `afterLogin` is called directly. Authentication
    is fully bypassed with a single unauthenticated HTTP request.'
  evidence_summary: '`models.sequelize.query()` at routes/login.ts:34 uses template-literal string interpolation for both
    `email` and `password` parameters, with no parameterized query or prepared statement.'
  impact_description: Complete authentication bypass; attacker obtains a valid admin-role JWT without knowing any credentials.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Password field is MD5-hashed before interpolation (provides no protection against SQLi on the email column).
  mitigation_title: Replace raw string interpolation with parameterized Sequelize query in routes/login.ts
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `models.sequelize.query()` call with `UserModel.findOne({ where: { email: req.body.email, password:
      security.hash(req.body.password), deletedAt: null } })` using Sequelize''s ORM parameterization.'
    - 'If raw SQL is required for any reason, use `models.sequelize.query(''SELECT * FROM Users WHERE email = ? AND password
      = ? AND deletedAt IS NULL'', { replacements: [email, hashedPassword], model: UserModel, plain: true })` with replacements
      array.'
    - Add input validation to reject email values not matching RFC 5322 format before they reach the query.
    code_example: "// Parameterized Sequelize ORM approach\nconst authenticatedUser = await UserModel.findOne({\n  where:\
      \ {\n    email: req.body.email || '',\n    password: security.hash(req.body.password || ''),\n    deletedAt: null\n\
      \  }\n})"
    reference: CWE-89
