- id: frontend-spa
  name: Angular 20 SPA Frontend
  description: Angular 20 Single-Page Application compiled to static files and served by Express. Stores JWT in localStorage
    (XSS-accessible), implements client-side-only auth guards (AdminGuard, AccountingGuard), and contains multiple DomSanitizer
    bypasses enabling stored and DOM-based XSS.
  paths:
  - frontend/src/**
  - frontend/package.json
  tier: client
  complexity: moderate
  framework: angular
  deployment_zones:
  - client-device
  handles_sensitive_data: true
