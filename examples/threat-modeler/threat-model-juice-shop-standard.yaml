    Additionally, any open browser tab sharing the browsing session can read `document.referrer` to extract these values.'
  evidence_summary: '`user.service.ts:54` constructs the change-password request as an HTTP GET with all three password values
    concatenated into the URL query string.'
  impact_description: Current and new passwords are written to access logs and browser history, enabling credential theft
    from log access or history exfiltration.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no POST body, no HTTPS enforcement at the client layer for this specific call.
  mitigation_title: Change password endpoint to POST with JSON body and verify current password server-side
  remediation:
    effort: Low
    steps:
    - 'Change `UserService.changePassword()` from `this.http.get(... + ''?current=...'')` to `this.http.post(''/rest/user/change-password'',
      { current, new: newPwd, repeat })`. Update the corresponding Express route handler to accept POST with a JSON body.'
