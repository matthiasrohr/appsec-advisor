  title: Rate Limit IP Spoofing — server.ts:346
  affected_parameter: X-Forwarded-For
  scenario: The password-reset rate limiter at server.ts:346 uses `headers['X-Forwarded-For'] ?? ip` as the rate limit key.
    Because `app.enable('trust proxy')` is set at server.ts:342 without a trusted-proxy allowlist, an attacker can rotate
    the `X-Forwarded-For` header value on each request to present a different apparent source IP. The rate limiter sees a
    new key each time and never triggers. This enables unlimited password-reset attempts — identical to having no rate limiter
    at all.
  evidence_summary: '`keyGenerator` at server.ts:346 returns `headers[''X-Forwarded-For''] ?? ip` without stripping attacker-controlled
    header values; `trust proxy` is enabled globally without an IP allowlist.'
  impact_description: Rate limit on `/rest/user/reset-password` is fully bypassed by cycling the X-Forwarded-For header, enabling
    brute-force of security answers.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: '`express-rate-limit` is configured, but the key derivation defeats it.'
  mitigation_title: Restrict trust proxy to known reverse-proxy CIDR and remove X-Forwarded-For from rate limit key
  remediation:
    effort: Low
    steps:
    - Change `app.enable('trust proxy')` to `app.set('trust proxy', '<reverse-proxy-CIDR>')` so `req.ip` is correctly set
      only when the header arrives from a trusted proxy — not from the end client.
    - Remove the custom `keyGenerator` from the rate limiter and rely on `req.ip` (the default), which `express-rate-limit`
      uses when no keyGenerator is provided.
    - Re-test the rate limiter with curl-based header injection to confirm the bypass is closed.
    code_example: "```typescript\n// server.ts — fix trust proxy and rate limiter\napp.set('trust proxy', '10.0.0.0/8') //\
      \ only trust LB subnet\napp.use('/rest/user/reset-password', rateLimit({\n  windowMs: 5 * 60 * 1000,\n  max: 10\n  //\
