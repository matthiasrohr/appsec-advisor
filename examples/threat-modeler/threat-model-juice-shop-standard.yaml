  title: Hardcoded HMAC Key for Security Answer Verification — lib/insecurity.ts:42
  affected_parameter: answer
  scenario: '`lib/insecurity.ts:42` defines `export const hmac = (data: string) => crypto.createHmac(''sha256'', ''pa4qacea4VK9t9nGv7yZtwmj'').update(data).digest(''hex'')`.
    The HMAC key `pa4qacea4VK9t9nGv7yZtwmj` is committed in plaintext. `routes/resetPassword.ts:41` verifies security answers
    by comparing `security.hmac(answer) === data.answer`. An attacker who reads the source can precompute the HMAC for any
    candidate answer offline (no server round-trip) and compare directly against the stored hash in the `SecurityAnswers`
    table, eliminating the need for interactive brute-force. Additionally, `lib/insecurity.ts:150` reuses the RSA private
    key as the HMAC key for `deluxeToken`, coupling two separate credential concerns to the same hardcoded secret.'
  evidence_summary: '`lib/insecurity.ts:42` hardcodes the HMAC key as a string literal; `routes/resetPassword.ts:41` uses
    it to verify security answers.'
  impact_description: Offline HMAC precomputation of security answers bypasses the reset-password rate limit, enabling account
    takeover without interactive guessing.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: HMAC used rather than plaintext comparison
  mitigation_title: Load HMAC key from environment variable and adopt bcrypt or Argon2id for security answer hashing
  remediation:
    effort: Low
    steps:
    - Replace the hardcoded key string in `lib/insecurity.ts:42` with `process.env.HMAC_SECRET` and validate it is set at
      startup.
    - Consider replacing HMAC with bcrypt for security answers, giving a work factor that prevents offline precomputation
      even if the key is later leaked.
    - Rotate the HMAC key and force re-enrollment of security answers for all users after deployment.
    - Decouple `deluxeToken` generation from the JWT private key (`lib/insecurity.ts:150`) — use a separate environment-sourced
      secret.
