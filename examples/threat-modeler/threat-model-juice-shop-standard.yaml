  stride: Elevation of Privilege
  cwe: CWE-1357
  title: Missing Workflow-Level Permissions Block — ci.yml:1
  affected_parameter: GITHUB_TOKEN default permissions
  scenario: 'Ten of the thirteen workflows in `.github/workflows/` lack a top-level `permissions:` block: ci.yml, release.yml,
    lint-fixer.yml, stale.yml, zap_scan.yml, frontend-bundle-analysis.yml, update-challenges-ebook.yml, update-challenges-www.yml,
    update-news-www.yml, rebase.yml. When no `permissions:` block is present, the GITHUB_TOKEN inherits the organization/repository
    default — typically `contents: write`, `packages: write`, `pull-requests: write`, `issues: write`. Any compromised step
    (a malicious npm postinstall script, a tag-hijacked third-party action, a MITM''d install script) in these workflows receives
    a write-all GITHUB_TOKEN. In ci.yml specifically, this token is also passed explicitly to actions (lines 225, 239, 357)
    and used in the Coveralls upload (line 163). The `heroku` job in ci.yml deploys to production using this overscoped token
    context.'
  evidence_summary: ci.yml, release.yml, lint-fixer.yml, and 7 other workflows contain no `permissions:` block at the workflow
    or job level, causing GITHUB_TOKEN to default to write-all inherited permissions.
  impact_description: A compromised step in any unpermissioned workflow gains write access to repository contents, packages,
    issues, and pull-requests — sufficient to inject malicious code into the main branch, create releases, or modify Actions
    workflow files.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: lock.yml, pr-compliance.yml, and codeql-analysis.yml have explicit permissions blocks. Other workflows
    do not.
  mitigation_title: Add explicit least-privilege permissions block to all GitHub Actions workflows
  remediation:
    effort: Medium
    steps:
    - 'Add `permissions: {}` (deny-all) or `permissions: contents: read` at the top level of each workflow that currently
      has no permissions block: ci.yml, release.yml, lint-fixer.yml, frontend-bundle-analysis.yml, stale.yml, zap_scan.yml,
      update-challenges-ebook.yml, update-challenges-www.yml, update-news-www.yml, rebase.yml.'
    - 'For each job that legitimately needs elevated permissions (e.g., the `docker` job in ci.yml needs `packages: write`;
      the `coverage-report` job needs `contents: read`), add a job-level `permissions:` block scoped to the minimum required.'
    - 'For release.yml `package` job, add `permissions: contents: write` at the job level only (for the `action-gh-release`
      step) and `contents: read` at the workflow level.'
    - Enable the GitHub repository setting 'Restrict GitHub Actions to be able to create PRs' and set the default token permission
      to `read-only`.
    code_example: "# ci.yml — add at top level after `env:`:\npermissions:\n  contents: read\n\n# Then per job that needs\
      \ more:\njobs:\n  docker:\n    permissions:\n      contents: read\n      packages: write\n      id-token: write   #\
      \ for OIDC if used"
    reference: CWE-1357
