threats:
- local_id: frontend-spa-003
  threat_category_id: TH-04
  additional_categories:
  - TH-11
  stride: Information Disclosure
  cwe: CWE-922
  title: Insecure Token Storage in localStorage — request.interceptor.ts:13
  scenario: '`RequestInterceptor` at `request.interceptor.ts:13-17` reads the JWT from `localStorage.getItem(''token'')` and
    attaches it as the `Authorization: Bearer` header on every outbound HTTP request. `localStorage` is accessible to any
    JavaScript executing in the same origin — including XSS payloads, malicious browser extensions, and injected third-party
    scripts. Combining this with any of the multiple `bypassSecurityTrustHtml()` sinks in the codebase (see `frontend-spa-004`)
    means a single successful XSS can exfiltrate the JWT, which is then usable directly against the API until expiry. The
    email address is stored and sent similarly via `X-User-Email` at line 20-23.'
  evidence_summary: '`request.interceptor.ts:13` reads the session JWT from `localStorage` for every API call; `oauth.component.ts:51`
    writes it there after login — making the token reachable by any XSS payload in the same origin.'
  impact_description: XSS on any page in the SPA fully compromises the user's session by exfiltrating the JWT from `localStorage`.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no BFF pattern; tokens are stored in JavaScript-accessible storage.
  mitigation_title: Move JWT storage to HttpOnly Secure SameSite=Strict cookies via a Backend-for-Frontend (BFF)
  remediation:
    effort: High
    steps:
    - 'Implement a Backend-for-Frontend (BFF) endpoint on the Express server that issues a session cookie (`Set-Cookie: session=...;
      HttpOnly; Secure; SameSite=Strict`) after successful login. The SPA never receives or stores the JWT.'
    - Remove `localStorage.setItem('token', ...)` from `oauth.component.ts:51` and `RequestInterceptor`'s localStorage reads.
      All authenticated requests go via the same-origin BFF, which appends the Authorization header server-side before proxying
      to the API.
    - Remove `localStorage.setItem('email', ...)` and the corresponding `X-User-Email` header injection — the server derives
      the user identity from the validated session cookie, not a client-supplied header.
    code_example: null
    reference: CWE-922
