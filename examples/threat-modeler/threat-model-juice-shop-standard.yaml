  title: No Server-Side Session Invalidation on Logout — lib/insecurity.ts:70
  affected_parameter: null
  scenario: '`lib/insecurity.ts:70-91` maintains `authenticatedUsers.tokenMap` and `idMap` as in-process dictionaries. Tokens
    are added on login (`put`) and looked up on requests (`get`/`from`), but no removal path is implemented for logout. The
    Angular frontend clears the token from `localStorage`, but the token remains valid server-side until its 6-hour `exp`
    claim elapses. A token stolen via XSS, network interception, or from a shared device retains full server-side validity
    regardless of the victim logging out.'
  evidence_summary: '`authenticatedUsers` at `lib/insecurity.ts:70` has `put` and `get` methods but no `delete` or `invalidate`
    method; no logout route removes the token from the map.'
  impact_description: Stolen JWT grants attacker full session access for up to 6 hours, surviving the victim's explicit logout.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 6-hour JWT expiry; client-side token deletion on logout
  mitigation_title: Implement server-side token revocation on logout by removing the token from authenticatedUsers
  remediation:
    effort: Medium
    steps:
    - 'Add a `delete(token: string)` method to `authenticatedUsers` in `lib/insecurity.ts` that removes entries from both
      `tokenMap` and `idMap`.'
    - Call `security.authenticatedUsers.delete(token)` in the logout route handler when the client logs out.
    - For distributed deployments, migrate `authenticatedUsers` to a shared Redis store with TTL matching the JWT `exp` so
      in-process state is not needed.
    - Reduce the JWT expiry from 6 hours to 15–30 minutes and issue refresh tokens via the `httpOnly` cookie path.
    code_example: "// lib/insecurity.ts — add to authenticatedUsers object\ndelete: function (token: string) {\n  const user\
      \ = this.tokenMap[token]\n  if (user) { delete this.idMap[user.data.id] }\n  delete this.tokenMap[token]\n}"
