    constructor or __proto__ property access.
  impact_description: Object.prototype poisoning can bypass authorization property checks across the entire application for
    the lifetime of the process.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: vm.createContext provides a sandboxed global object; however notevil operates inside that context and
    can still reach Object.prototype shared across the context.
