trust_boundaries:
- id: tb-1
  name: Public Internet → Express Backend
  from: external
  to: express-backend
  controls:
  - CORS wildcard (permissive)
  - helmet (weakly configured)
  - express-rate-limit (partial routes)
  description: WAF, or API gateway is configured in the repository. CORS allows all origins. deployment-time perimeter controls
    out of scope for source-tree review
- id: tb-2
  name: Browser Client → Angular SPA → Express Backend
  from: angular-spa
  to: express-backend
  controls:
  - JWT bearer token (RS256, compromised private key)
  - LoginGuard (client-side only)
  description: 'The Angular SPA stores JWT tokens in localStorage and sends them as Authorization: Bearer headers. Client-side
    LoginGuard is bypassable by direct URL navigation. The real enforcement point is the express-jwt middleware on the backend.'
- id: tb-3
  name: Express Backend → Data Layer
  from: express-backend
  to: data-layer
  controls:
  - Sequelize ORM (raw query fallback used in login.ts and search.ts)
  - local Unix socket / in-process
  description: SQLite is accessed in-process via Sequelize. Two routes (login, search) use raw string-interpolated SQL queries
    that bypass ORM parameterization, enabling SQL injection. MarsDB is also in-process.
- id: tb-4
  name: Express Backend → File System (Uploads)
  from: express-backend
  to: file-upload-service
  controls:
  - multer (file type not strictly enforced)
  - sanitize-filename (partial)
  - libxmljs2 (DTD expansion enabled)
  description: File uploads land on the local filesystem under assets/public/images/uploads/. XML files are parsed with libxmljs2
    with external entity resolution enabled, creating an XXE path to read server files including /etc/passwd.
- id: tb-5
  name: B2B API User → B2B Order Route (RCE Surface)
  from: external
  to: b2b-api
  controls:
  - JWT authentication (express-jwt)
  - notevil sandbox (bypassable via prototype pollution)
  description: The B2B Order endpoint requires JWT auth but then executes user-supplied orderLinesData inside a Node.js vm
    sandbox using notevil. Known sandbox escape techniques allow RCE on the server process.
- id: tb-6
  name: Browser → Socket.IO (WebSocket)
  from: angular-spa
  to: express-backend
  controls:
  - Same-origin WebSocket connection
  - No token auth on socket handshake
  description: Socket.IO connects from the browser to port 3000 using same-origin. No JWT or session token is required at
    connection time. Server pushes challenge notifications and chat responses.
