  title: SQL Injection in Product Search — routes/search.ts:23
  affected_parameter: q
  scenario: An attacker issues GET `/rest/products/search?q=' UNION SELECT email,password,3,4,5,6,7,8,9 FROM Users--` to the
    unauthenticated search endpoint. Because `routes/search.ts:23` interpolates `criteria` (which is `req.query.q`) directly
    into a `models.sequelize.query()` template literal, the UNION appends the Users table to the result set. The response
    JSON exposes every user's email and MD5 password hash.
  evidence_summary: '`routes/search.ts:23` builds the query as `` `SELECT * FROM Products WHERE ((name LIKE ''%${criteria}%''
    OR description LIKE ''%${criteria}%'') AND deletedAt IS NULL)` `` with attacker-controlled `req.query.q`.'
  impact_description: Unauthenticated read of the full Users table including email addresses and hashed passwords; schema
    enumeration via `sqlite_master` also possible.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input length is capped at 200 characters (`routes/search.ts:22`), which does not prevent UNION-based
    injection. Sequelize ORM is available but not used here.
  mitigation_title: Replace raw SQL interpolation in routes/search.ts with a Sequelize parameterised query
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `models.sequelize.query()` at `routes/search.ts:23` with `ProductModel.findAll({ where: { [Op.or]:
      [{ name: { [Op.like]: `%${criteria}%` } }, { description: { [Op.like]: `%${criteria}%` } }], deletedAt: { [Op.is]: null
      } } })`.'
    - Remove the length-capping pre-processing — it provides false security and is unnecessary once parameterisation is in
      place.
    - Add a test asserting that a UNION SELECT payload in `?q=` returns zero products and a 200 response with an empty array.
    code_example: "// routes/search.ts — safe replacement\nconst products = await ProductModel.findAll({\n  where: {\n   \
      \ [Op.or]: [\n      { name: { [Op.like]: `%${criteria}%` } },\n      { description: { [Op.like]: `%${criteria}%` } }\n\
      \    ],\n    deletedAt: { [Op.is]: null }\n  },\n  order: [['name', 'ASC']]\n})"
