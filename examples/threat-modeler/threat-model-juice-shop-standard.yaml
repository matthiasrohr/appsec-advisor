  title: NoSQL JavaScript Injection in getProductReviews Tool — routes/chat.ts:149
  affected_parameter: id
  scenario: 'The getProductReviews tool at routes/chat.ts:147-151 accepts `id: z.string()` from LLM tool call input, converts
    it via `Number(id)` at line 148, then executes `db.reviewsCollection.find({ $where: ''this.product == '' + productId })`.
    The `$where` MongoDB operator evaluates the concatenated string as a JavaScript expression on the server. While `Number(id)`
    coercion guards against direct string injection from the LLM, the $where pattern is inherently dangerous — any future
    change to skip the Number() cast, or manipulation through the LLM''s tool-call argument encoding, could allow server-side
    JavaScript execution in the MongoDB context. The pattern is also wasteful (full collection scan) and indicative of inadequate
    input handling.'
  evidence_summary: 'chat.ts:149: `db.reviewsCollection.find({ $where: ''this.product == '' + productId })` — string concatenation
    into a MongoDB $where clause executing server-side JavaScript.'
  impact_description: If the Number() coercion is bypassed, an attacker can execute arbitrary JavaScript in the MongoDB server
    context, reading or modifying any document in the reviews collection.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: productId is coerced via Number(id) at chat.ts:148, which converts non-numeric strings to NaN — partially
    mitigating string injection.
  mitigation_title: Replace $where JavaScript evaluation with a parameterized MongoDB equality query in getProductReviews
  remediation:
    effort: Low
    steps:
    - 'Replace the $where query with a standard equality filter: `db.reviewsCollection.find({ product: productId })` — this
      removes the JavaScript evaluation context entirely.'
    - 'Validate that productId is a positive integer before querying: `if (!Number.isInteger(productId) || productId <= 0)
      return []`.'
    - Disable the MongoDB $where operator at the driver configuration level if it is not used elsewhere in the application.
    code_example: "// routes/chat.ts — getProductReviews execute()\nexecute: async ({ id }) => {\n  const productId = Number(id)\n\
      \  if (!Number.isInteger(productId) || productId <= 0) return []\n  return await db.reviewsCollection.find({ product:\
      \ productId }) as Review[]\n}"
