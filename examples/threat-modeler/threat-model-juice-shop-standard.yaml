- local_id: ci-cd-pipeline-004
  threat_category_id: TH-14
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-506
  title: Untrusted npm Install/Postinstall Scripts Enabled — ci.yml:65
  affected_parameter: npm install (coding-challenge-rsn, test…
  scenario: 'Multiple CI jobs run bare `npm install` without the `--ignore-scripts` flag: ci.yml lines 65 (coding-challenge-rsn),
    85 (test), 125 (api-test), 175 (custom-config-test), 211 (e2e), and release.yml line 42. Without `--ignore-scripts`, npm
    executes `preinstall`, `install`, and `postinstall` lifecycle scripts from all dependencies and transitive dependencies.
    If any npm package in `package.json` or its transitive closure is compromised (supply chain attack, typosquatting, account
    takeover of a maintainer) or if a malicious package is introduced via a PR, the postinstall script runs with full access
    to the CI environment. In the affected jobs this includes `CYPRESS_RECORD_KEY`, `SOLUTIONS_WEBHOOK`, `GITHUB_TOKEN`, and
    — in the `heroku` job that follows — `HEROKU_API_KEY`. The absence of a lockfile (`package-lock.json` is absent from the
    repository) means npm resolves semver ranges at install time, expanding the attack surface to any package version that
    satisfies the declared range.'
  evidence_summary: '`npm install` without `--ignore-scripts` at ci.yml:65 (and 5 additional job steps) combined with the
    absence of `package-lock.json` allows postinstall hooks from any resolved dependency to execute in the CI runner with
    full secret access.'
  impact_description: A compromised or malicious npm dependency can exfiltrate CI secrets (`CYPRESS_RECORD_KEY`, `HEROKU_API_KEY`,
    `GITHUB_TOKEN`) or inject malicious code into the build artifact deployed to Docker Hub and Heroku.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The `lint` job (ci.yml:36-38) and `frontend-bundle-analysis.yml` use `--ignore-scripts` for their install
    steps. The Dockerfile also uses `--unsafe-perm` (a separate concern). The affected jobs are the test/build/deploy jobs.
  mitigation_title: Add --ignore-scripts to all production npm install steps and commit a lockfile
  remediation:
    effort: Medium
    steps:
    - 'Add `--ignore-scripts` to all `npm install` invocations in CI jobs that do not already use it: ci.yml lines 65, 85,
      125, 175, 211; release.yml line 42. Use `npm install --ignore-scripts` and separately run required build scripts explicitly
      with `npm run build`, `npm run compile`, etc.'
    - Generate and commit `package-lock.json` by running `npm install` locally and committing the lockfile. Switch CI install
      to `npm ci` (which reads the lockfile, ensuring reproducible installs without version float and without running scripts
      by default when combined with `--ignore-scripts`).
    - 'Add `package-lock.json` to `.gitignore` exceptions if it is currently excluded, and configure Dependabot for `package-ecosystem:
      npm` to keep the lockfile updated via automated PRs.'
    - 'Add a CI step that fails the build if `package-lock.json` is absent or differs from `package.json`: `npm ci --dry-run`.'
    code_example: "# ci.yml — replace bare npm install:\n      - name: \"Install application\"\n        run: npm ci --ignore-scripts\n\
      \      - name: \"Build application\"\n        run: npm run build  # explicit, not via postinstall"
    reference: CWE-506
