  - T-038
  - T-040
  - T-041
  - T-043
  - T-047
  - T-048
  - T-050
  - T-053
- id: sqlite-db
  name: SQLite Database
  description: Embedded SQLite3 database managed via Sequelize ORM. Stores users (with MD5-hashed passwords), baskets, orders,
    products, addresses, payment cards, complaints, recycling requests, and challenge state.
  paths:
  - models/**
  - data/datacreator.ts
  - data/datacache.ts
  tier: data
  complexity: simple
  framework: SQLite3 + Sequelize
  deployment_zones:
  - docker-container
  handles_sensitive_data: true
  threat_ids:
  - T-036
  - T-049
- id: marsdb-mongodb
  name: MarsDB (MongoDB-compatible) Document Store
  description: MarsDB (in-process MongoDB-compatible store) used for product reviews, orders (NoSQL), and CTF challenge data.
    Accessed directly via collection API without parameterized queries — susceptible to NoSQL injection via object prototype
    manipulation.
  paths:
  - data/mongodb.ts
  - data/types.ts
  tier: data
  complexity: simple
  framework: MarsDB
  deployment_zones:
  - docker-container
  handles_sensitive_data: true
  threat_ids: []
- id: b2b-api
  name: B2B Order API
  description: Unauthenticated B2B order endpoint (POST /b2b/v2/orders) that evaluates attacker-controlled JSON field orderLinesData
    via notevil sandbox in a node:vm context. Intentional RCE surface for training challenges.
  paths:
  - routes/b2bOrder.ts
  tier: application
  complexity: simple
  framework: node:vm + notevil
  deployment_zones:
  - docker-container
  - internet-facing
  handles_sensitive_data: false
  threat_ids:
  - T-012
  - T-039
- id: ci-cd-pipeline
  name: CI/CD Pipeline (GitHub Actions)
  description: 16 GitHub Actions workflows covering build, test, e2e (Cypress), CodeQL SAST, Docker image publish, coverage
    reporting, and dependency management. Multiple workflows lack permissions blocks and use unpinned third-party actions.
  paths:
  - .github/workflows/**
  - Dockerfile
  - docker-compose.test.yml
  - package.json
  - package-lock.json
  tier: application
  complexity: moderate
  framework: GitHub Actions
  deployment_zones:
  - github-cloud
  handles_sensitive_data: true
  threat_ids:
  - T-020
  - T-021
