  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:55
  affected_parameter: Authorization
  scenario: 'An attacker downloads the public key from the publicly served `/encryptionkeys/jwt.pub` endpoint. They craft
    a JWT with `alg: HS256` in the header and `data.role: admin` in the payload, signing it with the RSA public key used as
    an HMAC secret. `jws.verify(token, publicKey)` at `lib/insecurity.ts:55` accepts the token because it passes no algorithm
    constraint, and `isAuthorized()` at line 52 uses `express-jwt@0.1.3` (CVE-2020-15084) which has the same gap. The forged
    token passes all middleware and grants admin-level access.'
  evidence_summary: '`lib/insecurity.ts:55` calls `jws.verify(token, publicKey)` without a third `algorithms` argument; `express-jwt@0.1.3`
    at line 52 is subject to CVE-2020-15084 algorithm bypass.'
  impact_description: Attacker forges a JWT with arbitrary role claims, bypassing all JWT-based authentication and authorization
    without any account credentials.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is used for signing (`lib/insecurity.ts:54`), but algorithm is not pinned during verification.
  mitigation_title: Pin RS256 algorithm in JWT verification and upgrade express-jwt to current version
  remediation:
    effort: Medium
    steps:
    - 'Upgrade `jsonwebtoken` and replace `jws.verify(token, publicKey)` at `lib/insecurity.ts:55` with `jwt.verify(token,
      publicKey, { algorithms: [''RS256''] })` to hard-pin the algorithm server-side.'
    - 'Upgrade `express-jwt` from `0.1.3` to `>=6.0.0` (patched for CVE-2020-15084) and pass `{ algorithms: [''RS256''] }`
      in the options to `isAuthorized()`.'
    - Verify that `decode()` at line 56 is never called on tokens that have not first passed `verify()` — `jws.decode()` does
      no signature check and should not be used as a verification step.
    code_example: "// lib/insecurity.ts — safe verify\nimport jwt from 'jsonwebtoken'\nexport const verify = (token: string)\
      \ =>\n  token ? jwt.verify(token, publicKey, { algorithms: ['RS256'] }) : false\n\n// isAuthorized — pin algorithm\n\
      export const isAuthorized = () =>\n  expressJwt({ secret: publicKey, algorithms: ['RS256'] })"
    reference: CWE-347
