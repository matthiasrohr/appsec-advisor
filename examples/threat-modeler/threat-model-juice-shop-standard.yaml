  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA Private Key — lib/insecurity.ts:21
  affected_parameter: null
  scenario: 'The RSA private key is hardcoded as a string literal at lib/insecurity.ts:21 and is committed to the public GitHub
    repository. Any person with access to the repository can extract the key and use it with `jwt.sign(payload, privateKey,
    { algorithm: ''RS256'' })` to mint valid JWTs for any user ID and role, including `role: ''admin''`. The server at lib/insecurity.ts:52
    verifies tokens using only the corresponding public key — a token forged with the committed private key passes verification
    identically to a legitimately issued token. There is no secondary server-side revocation check; the in-memory `authenticatedUsers.tokenMap`
    is not consulted by `isAuthorized()`. Additionally, the same key is used as HMAC input for `deluxeToken` computation at
    lib/insecurity.ts:150, enabling forgery of deluxe-tier tokens.'
  evidence_summary: Private key is a hardcoded 1216-character PEM string literal at lib/insecurity.ts:21, used in `jwt.sign()`
    at line 54.
  impact_description: Anyone with repository read access can forge admin-role JWTs indefinitely; key rotation requires a source
    code change and redeployment.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the key is publicly committed.
  mitigation_title: Remove hardcoded RSA private key and load from environment-injected secret at runtime
  remediation:
    effort: Medium
    steps:
    - Delete the hardcoded key string from lib/insecurity.ts:21. Generate a new RSA-2048 or RSA-4096 keypair offline.
    - 'Store the private key in a secret manager (AWS Secrets Manager, HashiCorp Vault) or inject via environment variable
      `JWT_PRIVATE_KEY`. Load at startup: `const privateKey = process.env.JWT_PRIVATE_KEY ?? fs.readFileSync(process.env.JWT_PRIVATE_KEY_FILE,
      ''utf8'')`.'
    - Rotate the committed key immediately by generating a new keypair and updating the server's JWT verification public key,
      then invalidating all existing sessions.
    - Add a CI secret-scan step (e.g. `truffleHog`, `gitleaks`) to block future private key commits.
    code_example: "// lib/insecurity.ts — load key from environment, never hardcode\nconst privateKey = process.env.JWT_PRIVATE_KEY\n\
      \  ? Buffer.from(process.env.JWT_PRIVATE_KEY, 'base64').toString('utf8')\n  : fs.readFileSync(process.env.JWT_PRIVATE_KEY_FILE\
      \ ?? 'encryptionkeys/jwt.key', 'utf8')"
