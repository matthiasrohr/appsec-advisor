    without any startup alert.'
  evidence_summary: '`nftMint.ts:18` embeds `process.env.ALCHEMY_API_KEY` directly in the WSS URL string; `nftMint.ts:19-21`
    logs `error.message` from the WebSocket provider unconditionally, which may include the URL with the embedded key.'
