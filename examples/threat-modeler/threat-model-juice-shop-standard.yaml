  title: Missing Lockfile Allows Non-Deterministic Dependency Resolution — ci.yml:71
  affected_parameter: null
  scenario: No `package-lock.json` is committed to the repository (IAC-050). Every `npm install` call in CI — `ci.yml` lines
    51, 71, 110, 147, 203, 238; `release.yml:55`; `Dockerfile:5` — resolves the full dependency graph fresh against the current
    npm registry. Without a lockfile, CI cannot use `npm ci` (which requires a lockfile). An attacker who gains momentary
    control of a transitive dependency version window (via typosquatting, maintainer account takeover, or registry cache poisoning)
    can install a malicious package version across every build without any diff appearing in the repository. The attack is
    silent — the repository changes nothing, only the registry does.
  evidence_summary: No `package-lock.json` exists in the repository root; all CI build steps use `npm install` (not `npm ci`),
    making every build a fresh, potentially non-deterministic registry resolution without lockfile integrity verification.
  impact_description: A registry-level substitution of any transitive dependency installs silently into the CI build and production
    Docker image, with no baseline lockfile to detect the drift.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: CycloneDX SBOM generation at build time provides post-hoc visibility into what was installed, but does
    not prevent the attack. No Dependabot or Renovate configuration exists.
  mitigation_title: Commit package-lock.json and switch CI installs to npm ci
  remediation:
    effort: Medium
    steps:
    - Run `npm install` locally to generate `package-lock.json`, then commit it to the repository.
    - Replace `npm install` with `npm ci` in all CI workflow `run:` steps where a lockfile is available (`ci.yml` lines 51,
      71, 110, 147, 203, 238; `release.yml:55`).
    - 'For the frontend: run `cd frontend && npm install` to generate `frontend/package-lock.json` and commit it; update CI
      steps accordingly.'
    - Update `Dockerfile:5` to `RUN npm ci --omit=dev` after committing the lockfile.
    - 'Add `.github/dependabot.yml` with `package-ecosystem: npm` to receive automated dependency update PRs that keep the
      lockfile current.'
    - 'Add a CI gate that fails the build if `package-lock.json` is absent or has uncommitted changes: `npm install && git
      diff --exit-code package-lock.json`.'
    code_example: '# ci.yml — change:

      - run: npm install

      # to:

      - run: npm ci


      # Dockerfile — change:

      RUN npm install --omit=dev

      # to:

      RUN npm ci --omit=dev'
    reference: CWE-494
