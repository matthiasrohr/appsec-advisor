  impact: Critical
  risk: Critical
  controls_in_place: None — private key material is inline in application source code with no encryption, secret management
    integration, or environment variable indirection.
  mitigation_title: Replace hardcoded mnemonic with runtime-injected secret via environment variable or secrets manager
  remediation:
