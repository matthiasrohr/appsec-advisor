  title: XXE — lib/xml.ts:35
  affected_parameter: file
  scenario: The XML upload handler at routes/fileUpload.ts:70-98 passes uploaded XML content to `parseXmlString()` in lib/xml.ts.
    That function initialises libxml2 with `XML_PARSE_NOENT | XML_PARSE_DTDLOAD | XML_PARSE_NOBLANKS` flags (line 35), enabling
    full external entity substitution and DTD loading. An attacker can upload an XML file containing `<!ENTITY xxe SYSTEM
    "file:///etc/passwd">` to read local files. The parsed content including resolved entities is returned in the error response
    at routes/fileUpload.ts:79.
  evidence_summary: lib/xml.ts:35 sets `XML_PARSE_NOENT | XML_PARSE_DTDLOAD` flags and calls `xmlRegisterFsInputProviders()`
    at line 21, which grants the WASM sandbox host filesystem access.
  impact_description: An attacker can read arbitrary files readable by the Node.js process, including private keys, environment
    files, and /etc/passwd.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: File type check exists but allows XML; XML processing is gated on a challenge-enabled flag at routes/fileUpload.ts:73,
    but the flag defaults to enabled.
  mitigation_title: Disable external entity resolution and DTD loading in libxml2 XML parser
  remediation:
    effort: Low
    steps:
    - Remove `XML_PARSE_NOENT` and `XML_PARSE_DTDLOAD` parse flags in lib/xml.ts:35; replace with `XML_PARSE_NONET` to block
      network entities while keeping basic parsing.
    - Remove `xmlRegisterFsInputProviders()` call at lib/xml.ts:21 to prevent filesystem entity resolution.
    - If XML upload is not needed for production functionality, remove the XML branch entirely from routes/fileUpload.ts.
    code_example: '// lib/xml.ts — safe parse flags

      const option = libxml2.ParseOption.XML_PARSE_NONET | libxml2.ParseOption.XML_PARSE_NOBLANKS

      // Remove: XML_PARSE_NOENT, XML_PARSE_DTDLOAD

      // Remove: xmlRegisterFsInputProviders()'
    reference: CWE-611
