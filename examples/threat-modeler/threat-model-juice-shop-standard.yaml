      password = ? AND deletedAt IS NULL'', { replacements: [email, security.hash(password)], model: UserModel, plain: true
      })`.'
    - Add input validation (non-empty string, valid email format) before the DB call.
    code_example: "```typescript\nconst authenticatedUser = await UserModel.findOne({\n  where: {\n    email: req.body.email,\n\
