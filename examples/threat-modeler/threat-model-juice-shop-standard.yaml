  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:57
  affected_parameter: null
  scenario: 'verify() at lib/insecurity.ts:57 calls jws.verify(token, publicKey) with no algorithm allowlist, and isAuthorized()
    (line 54) wires express-jwt 0.1.3 with only { secret: publicKey } and no algorithms option. Both express-jwt 0.1.3 and
    jsonwebtoken 0.4.0 are pre-CVE-2015-9235 versions that accept the ''none'' algorithm and allow algorithm confusion (signing
    an RS256-verified token with the public key as an HMAC secret). An attacker crafts a token with header alg:none (or HS256
    using the published public key) carrying data.role=''admin'' and passes isAccounting()/isDeluxe()/isAuthorized() checks
    without possessing the private key.'
  evidence_summary: verify() (line 57) and isAuthorized() (line 54) perform signature verification without an algorithms allowlist
    on express-jwt 0.1.3 / jsonwebtoken 0.4.0.
  impact_description: Attacker bypasses signature verification entirely (alg:none) or via algorithm confusion, forging any-role
    tokens for full takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Tokens are signed RS256 on issuance, but verification does not enforce that algorithm, so the signing
    strength is moot.
  mitigation_title: Pin RS256 on all JWT verification and upgrade express-jwt / jsonwebtoken
  remediation:
    effort: Medium
    steps:
    - 'Pass algorithms: [''RS256''] explicitly to every verification call so ''none'' and HS256 confusion are rejected.'
    - Upgrade express-jwt and jsonwebtoken to current major versions (express-jwt >= 8, jsonwebtoken >= 9) which reject alg:none
      by default and require an explicit algorithms list.
    - 'Replace the raw jws.verify wrapper in verify() with jwt.verify(token, publicKey, { algorithms: [''RS256''] }).'
    - Add a unit test that submits an alg:none token and asserts a 401.
    code_example: "export const isAuthorized = () =>\n  expressJwt({ secret: publicKey, algorithms: ['RS256'] } as any)\n\
      export const verify = (token: string) =>\n  token ? jwt.verify(token, publicKey, { algorithms: ['RS256'] }) : false"
    reference: CWE-347
    blueprint: null
