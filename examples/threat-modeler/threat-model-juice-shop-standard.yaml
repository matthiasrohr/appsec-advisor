  title: NoSQL Injection via $where Clause (routes/showProductReviews.ts:36)
  affected_parameter: id
  scenario: '`routes/showProductReviews.ts:36` passes `req.params.id` directly into MarsDB''s `$where` operator: `db.reviewsCollection.find({
    $where: ''this.product == '' + id })`. When `challenges.noSqlCommandChallenge` is enabled, `id` is `utils.trunc(req.params.id,
    40)` — a JavaScript string. An attacker sends `id = ''0; sleep(2000)''`, which evaluates to `this.product == 0; sleep(2000)`
    inside the `$where` JavaScript predicate, executing the globally defined `global.sleep()` function and blocking the Node.js
    event loop for up to 2000ms per request.'
  evidence_summary: '`routes/showProductReviews.ts:36` concatenates `req.params.id` into the MarsDB `$where` JavaScript expression
    without sanitization.'
  impact_description: Attacker with public network access can block the Node.js event loop for 2 seconds per request, enabling
    sustained denial of service against the single-threaded server.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: When challenge is disabled, `id` is cast to `Number(req.params.id)`, preventing injection. Challenge
    mode removes this guard.
  mitigation_title: Replace MarsDB $where JavaScript evaluation with a direct field equality query
  remediation:
    effort: Low
    steps:
    - 'Replace `db.reviewsCollection.find({ $where: ''this.product == '' + id })` with `db.reviewsCollection.find({ product:
      Number(id) })` — MarsDB supports direct field matching without JavaScript evaluation.'
    - 'Cast `id` to `Number` before the query in all code paths (challenge-enabled or not): `const productId = Number(req.params.id);
      if (isNaN(productId)) { return res.status(400).json({ error: ''Invalid id'' }); }`.'
    - Remove the `global.sleep` definition from `routes/showProductReviews.ts` or scope it to a test-only import.
    code_example: '// Safe: field equality instead of $where

      const productId = Number(req.params.id)

      if (isNaN(productId)) return res.status(400).json({ error: ''Invalid id'' })

      db.reviewsCollection.find({ product: productId }).then((reviews: Review[]) => { ... })'
    reference: CWE-943
  evidence:
  - file: routes/showProductReviews.ts
    line: 36
  evidence_check: verified
