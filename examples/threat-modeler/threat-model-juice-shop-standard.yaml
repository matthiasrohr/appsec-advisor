    subsequent steps use `secrets.HEROKU_API_KEY` for deployment.
  impact_description: A compromised Heroku install script can exfiltrate the HEROKU_API_KEY and deploy malicious code to the
    Heroku staging/production environment.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: HTTPS transport provides some MitM protection. Heroku is a well-known vendor with CDN infrastructure.
  mitigation_title: Replace curl-pipe-to-shell Heroku install with a pinned official GitHub Action or verified binary
  remediation:
