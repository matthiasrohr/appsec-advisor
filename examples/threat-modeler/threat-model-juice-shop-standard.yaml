  stride: Spoofing
  cwe: CWE-89
  title: SQL Injection — routes/login.ts:34
  affected_parameter: email
  scenario: '`req.body.email` flows unescaped into `models.sequelize.query()` at `routes/login.ts:34`: `SELECT * FROM Users
    WHERE email = ''${req.body.email}''`. Submitting `'' OR ''1''=''1` as the email short-circuits the WHERE clause and the
    query returns the first row — the seeded admin account. The attacker receives a valid JWT signed with the server''s RSA
    private key with `role=admin`. No authentication credential is required.'
  evidence_summary: '`routes/login.ts:34` uses string interpolation — not parameterized binding — to construct the Users lookup
    query.'
  impact_description: Unauthenticated attacker gains admin-level JWT, full access to all admin endpoints and every user's
    data.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — raw string interpolation, no ORM parameterization on this path.
  mitigation_title: Replace raw SQL string interpolation with parameterized Sequelize query in login route
  remediation:
    effort: Low
    steps:
    - 'Replace `models.sequelize.query(template-literal)` at `routes/login.ts:34` with `UserModel.findOne({ where: { email:
      req.body.email, password: security.hash(req.body.password), deletedAt: null } })` using Sequelize''s ORM methods which
      bind parameters safely.'
    - 'If raw SQL is required, use named-parameter binding: `models.sequelize.query(''SELECT * FROM Users WHERE email = :email
      AND password = :password AND deletedAt IS NULL'', { replacements: { email: req.body.email, password: security.hash(req.body.password)
      }, model: UserModel, plain: true })`.'
    - Add an integration test that submits `' OR '1'='1` as the email value and asserts HTTP 401 is returned.
    code_example: "```typescript\n// Safe alternative using ORM\nconst authenticatedUser = await UserModel.findOne({\n  where:\
      \ {\n    email: req.body.email || '',\n    password: security.hash(req.body.password || ''),\n    deletedAt: null\n\
      \  }\n});\n```"
    reference: CWE-89
