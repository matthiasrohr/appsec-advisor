  cwe: CWE-1357
  title: Unpinned GitHub Action to Mutable Ref — image_actions.yml:33
  affected_parameter: null
  scenario: '`image_actions.yml` references third-party actions by mutable refs: `calibreapp/image-actions@main` (`:33` —
    a branch HEAD that can change at any time), `actions/checkout@v6` (`:30`), and `peter-evans/create-pull-request@v8` (`:42`).
    `ci.yml:202` similarly uses `coverallsapp/github-action@v2`. The `@main` reference is the most dangerous: whoever controls
    the `calibreapp/image-actions` default branch can push code that runs in this workflow with the `GITHUB_TOKEN` (`image_actions.yml:35`),
    and the downstream `create-pull-request` step opens a PR with write scope. A maintainer-account compromise or a force-push
    to `main` on the upstream action immediately executes attacker code in the Juice Shop pipeline — no re-tag or release
    needed. Most other workflows (release.yml, pr-compliance.yml, the test jobs in ci.yml) already pin to 40-char SHAs, so
    these four are the outliers.'
  evidence_summary: image_actions.yml line 33 pins calibreapp/image-actions to the mutable `@main` branch, with two further
    tag-only refs at lines 30 and 42.
  impact_description: A compromise of the upstream action's default branch runs arbitrary code in the pipeline with a write-capable
    GITHUB_TOKEN and PR-creation rights.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The job is gated to the canonical repo and same-repo PRs (image_actions.yml:24-27), which blocks fork-triggered
    runs but not upstream-action compromise.
  mitigation_title: Pin all third-party actions to a full 40-character commit SHA
  remediation:
    effort: Low
    steps:
    - Replace `calibreapp/image-actions@main` with `calibreapp/image-actions@<commit-sha>` and pin `actions/checkout`, `peter-evans/create-pull-request`,
      and `coverallsapp/github-action` to 40-char SHAs with a `# vX.Y.Z` comment.
    - Enable a pinning enforcement tool (e.g. `pin-github-action` or the `step-security/harden-runner` audit) in CI so future
      unpinned refs fail review.
    - Configure Dependabot for `github-actions` so SHA pins are kept current with an auditable PR per bump.
    code_example: '- uses: calibreapp/image-actions@<40-char-sha> # main

      - uses: actions/checkout@<40-char-sha> # v6

      - uses: peter-evans/create-pull-request@<40-char-sha> # v8'
    reference: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
  evidence:
