- local_id: chatbot-004
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-943
  title: NoSQL Operator Injection in getProductReviews Tool (routes/chat.ts:147)
  affected_parameter: id
  scenario: 'The getProductReviews tool at routes/chat.ts:140-149 executes a MongoDB-style query using the $where operator:
    `db.reviewsCollection.find({ $where: ''this.product == '' + productId })`. The productId is derived from `Number(id)`
    where id comes from the LLM''s tool call input. While numeric coercion prevents direct string injection (''1; return true''
    becomes NaN), the $where clause constructs JavaScript code via string concatenation — a structural NoSQL injection pattern.
    If the underlying MarsDB engine evaluates $where expressions as JavaScript (as standard MongoDB does), a carefully crafted
    non-numeric string that survives Number() conversion (e.g., Infinity, NaN, or a specially constructed numeric string)
    could alter query semantics. Additionally, since the LLM controls the id string based on attacker-provided conversation
    context, a prompt injection payload instructing the LLM to pass a specially crafted id string could reach this sink.'
  evidence_summary: routes/chat.ts:147 builds a $where query expression via string concatenation of user-influenced input,
    creating a NoSQL injection sink even though Number() coercion provides partial mitigation.
  impact_description: An attacker who bypasses the Number() coercion could enumerate all product reviews or execute arbitrary
    JavaScript in the MongoDB $where context, potentially extracting review data across all products.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: Number() coercion on the id input provides partial protection by converting non-numeric strings to NaN.
  mitigation_title: Replace $where string concatenation in getProductReviews with a parameterized equality query
  remediation:
    effort: Low
    steps:
    - 'Replace the $where expression with a direct field equality query: `db.reviewsCollection.find({ product: productId })`.
      This eliminates the JavaScript string evaluation entirely.'
    - 'Validate that productId is a finite positive integer before executing the query: `if (!Number.isFinite(productId) ||
      productId <= 0) { return [] }`.'
    code_example: "// routes/chat.ts — safe getProductReviews execute\nexecute: async ({ id }) => {\n  const productId = Number(id)\n\
      \  if (!Number.isFinite(productId) || productId <= 0) return []\n  return await db.reviewsCollection.find({ product:\
      \ productId }) as Review[]\n}"
    reference: CWE-943
  evidence:
  - file: routes/chat.ts
    line: 147
