  title: Missing Explicit Workflow Permissions — ci.yml:1
  affected_parameter: null
  scenario: '13 of 16 workflow files declare no top-level `permissions:` block, so each job inherits the repository default
    `GITHUB_TOKEN` scope. On repos created before the 2023 GitHub default change — or where the org/repo default was left
    at read-write — that default is write across `contents`, `packages`, `pull-requests`, and `issues`. `ci.yml` is the highest-value
    example: its `docker` and `heroku` jobs hold deploy credentials and run after fork-influenced install steps. A single
    compromised step (a poisoned dependency from the lockfile-less install, or a re-tagged third-party action) inherits a
    broadly-scoped token and can push commits, create releases, or write packages. Only `lock.yml` and `pr-compliance.yml`
    scope their tokens; the supply-chain-critical `release.yml`, `image_actions.yml`, and `ci.yml` do not.'
  evidence_summary: 13 of 16 files under `.github/workflows/` contain no `permissions:` key; ci.yml, release.yml, and image_actions.yml
    are among them.
  impact_description: A compromised step in any unscoped workflow wields a write-capable GITHUB_TOKEN, turning a single supply-chain
    foothold into repo-write, release-publish, or package-push.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: lock.yml and pr-compliance.yml declare explicit least-privilege permissions blocks.
  mitigation_title: Add a least-privilege top-level permissions block to every workflow
  remediation:
    effort: Low
    steps:
    - 'Add `permissions: {}` (or `contents: read`) at the top of every workflow under `.github/workflows/`, then grant only
      the specific scopes each job needs (e.g. `contents: write` for release, `packages: write` for the docker push).'
    - Set the repository/org default `GITHUB_TOKEN` permissions to read-only under Settings → Actions → Workflow permissions
      as defense in depth.
    - Audit the three deploy jobs (ci.yml docker/heroku, release.yml docker) and pin their job-level permissions explicitly.
    code_example: "# top of ci.yml\npermissions:\n  contents: read\n\njobs:\n  docker:\n    permissions:\n      packages:\
      \ write"
    reference: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
  evidence:
