  cwe: CWE-321
  title: Hardcoded RSA Private Key in Source — lib/insecurity.ts:21
  scenario: A 1024-bit RSA private key is embedded as a string literal at lib/insecurity.ts:21. This key is used by security.authorize()
    at insecurity.ts:54 to sign all JWTs issued by the application. Any developer, CI system, or third party with read access
    to the repository obtains the signing key and can produce arbitrary JWTs with any claims (including role:'admin', email
    of any user). The key is also 1024 bits, which is below the NIST SP 800-131A Rev 2 minimum of 2048 bits and is computationally
    feasible to factor. Combined with the algorithm confusion gap (auth-002), this constitutes complete and irrecoverable
    compromise of the authentication layer.
  evidence_summary: Full RSA PKCS#1 private key embedded as a string literal at lib/insecurity.ts:21, used for all JWT signing
    via security.authorize().
  impact_description: Any party with repo access can sign admin-role JWTs; the authentication system offers no cryptographic
    guarantee of identity.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — key is plaintext in source.
  mitigation_title: Remove hardcoded RSA key from source; load 2048-bit key pair from environment-injected secret at startup
  remediation:
    effort: Medium
    steps:
    - 'Generate a fresh 2048-bit (minimum) RSA key pair: openssl genrsa -out jwt.private.pem 2048 && openssl rsa -in jwt.private.pem
      -pubout -out jwt.pub.'
    - Store the private key in a secrets manager (HashiCorp Vault, AWS Secrets Manager, or Docker/Kubernetes secret) injected
      as environment variable JWT_PRIVATE_KEY at runtime.
    - Update lib/insecurity.ts:21 to read process.env.JWT_PRIVATE_KEY (fail fast at startup if absent).
    - Rotate the public key file referenced at insecurity.ts:20 (encryptionkeys/jwt.pub) to the new public key.
    - Revoke all existing JWTs by changing the key — add a startup timestamp claim or key ID (kid) header to enable future
      key rotation without service restart.
