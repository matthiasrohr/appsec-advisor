- local_id: auth-identity-007
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-798
  title: Hardcoded HMAC Secret — lib/insecurity.ts:42
  scenario: The HMAC key `'pa4qacea4VK9t9nGv7yZtwmj'` is embedded at `lib/insecurity.ts:42`. `security.hmac(answer)` is used
    in `routes/resetPassword.ts:41` to hash and compare security question answers. Any attacker who reads the source can precompute
    HMAC values for any candidate answer offline and enumerate the correct answer for any user's security question without
    rate-limit exposure. The same key is exposed in the `deluxeToken()` function at line 150, which signs the deluxe-tier
    membership token.
  evidence_summary: '`lib/insecurity.ts:42` hardcodes `''pa4qacea4VK9t9nGv7yZtwmj''` as the HMAC-SHA256 key in `export const
    hmac = (data: string) => crypto.createHmac(''sha256'', ''pa4qacea4VK9t9nGv7yZtwmj'').update(data).digest(''hex'')`.'
  impact_description: Attacker can forge valid HMAC values for security question answers and deluxe membership tokens, bypassing
    both account recovery and entitlement checks.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — the key is a literal string in publicly committed source code.
  mitigation_title: Move HMAC secret to environment variable and replace security-question reset with token-based email flow
  remediation:
    effort: Medium
    steps:
    - Remove the hardcoded string from `lib/insecurity.ts:42`. Read the HMAC key from `process.env.HMAC_SECRET` and fail fast
      at startup if absent.
    - Rotate the HMAC key immediately — all existing security answer hashes stored in the database are compromised and must
      be rehashed after the key is changed.
    - Replace the security-question password reset flow with a time-limited email token sent to the registered address, eliminating
      the HMAC-based answer check entirely.
    - If the HMAC remains, add rate limiting on `/rest/user/reset-password` beyond the current 100-per-window limit to throttle
      offline-derived answer submission.
    code_example: "// lib/insecurity.ts — load from env\nconst HMAC_SECRET = process.env.HMAC_SECRET\n  ?? (() => { throw\
      \ new Error('HMAC_SECRET env var is required') })()\nexport const hmac = (data: string) =>\n  crypto.createHmac('sha256',\
      \ HMAC_SECRET).update(data).digest('hex')"
    reference: CWE-798
