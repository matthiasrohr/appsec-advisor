- local_id: ci-cd-pipeline-006
  threat_category_id: TH-16
  additional_categories:
  - TH-14
  stride: Repudiation
  cwe: CWE-1357
  title: No Artifact Provenance Attestation on Published Release — release.yml:45
  affected_parameter: dist/* release artifacts
  scenario: The `release.yml` workflow builds and publishes release tarballs (`dist/*`) as GitHub Release assets (line 45)
    and pushes a Docker image with a version tag (line 81). Neither artifact is accompanied by a cryptographic provenance
    attestation. A consumer downloading `juice-shop-v20.1.0-linux-x64.tgz` has no way to verify it was produced by the GitHub
    Actions workflow from the tagged commit, rather than a build performed outside CI by a maintainer with write access or
    a compromised pipeline. SLSA Level 2 and 3 require that build provenance be generated non-forgeable by the build service
    itself. The absence of attestation makes supply-chain substitution undetectable downstream.
  evidence_summary: '`release.yml:45` uses `softprops/action-gh-release` to attach `dist/*` assets with no sigstore/SLSA provenance
    step; the Docker publish at line 74-85 does not use `docker/build-push-action` SBOM/attestation flags.'
  impact_description: Downstream consumers cannot distinguish CI-built artifacts from attacker-substituted builds; compromise
    is undetectable post-delivery.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: An SBOM is generated inside the Dockerfile via `npm run sbom` using CycloneDX-npm (Dockerfile:20), but
    it is bundled inside the image and not published as a separate attestation. The Dockerfile uses a distroless base image
    (gcr.io/distroless/nodejs24-debian13) which reduces the attack surface.
  mitigation_title: Add SLSA provenance attestation and Docker image SBOM to release and docker publish jobs
  remediation:
    effort: Medium
    steps:
    - 'Add `actions/attest-build-provenance` after the `softprops/action-gh-release` step in `release.yml` to generate a Sigstore-signed
      SLSA provenance attestation for each tarball: requires `permissions: id-token: write, attestations: write`.'
    - 'Enable Docker image attestations in the `docker/build-push-action` step by adding `provenance: true` and `sbom: true`
      to the `with:` block — this pushes a separate attestation manifest alongside the image.'
    - Consider adopting OIDC Trusted Publishing for Docker (via workload identity federation with DockerHub) to eliminate
      long-lived `DOCKERHUB_TOKEN` and generate short-lived credentials per workflow run.
    - 'Add a verification step in consumers'' CI: `gh attestation verify <artifact>` to enforce provenance checks before install.'
    code_example: "# In release.yml, after softprops/action-gh-release:\n- name: Attest build provenance\n  uses: actions/attest-build-provenance@v1\n\
      \  with:\n    subject-path: dist/*\n  permissions:\n    id-token: write\n    attestations: write"
    reference: CWE-1357
  evidence:
  - file: .github/workflows/release.yml
    line: 45
  evidence_check: verified
  controls_absent_evidence:
