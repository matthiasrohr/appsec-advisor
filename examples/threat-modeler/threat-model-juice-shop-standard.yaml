  stride: Spoofing
  cwe: CWE-522
  title: OAuth Implicit Flow with Derived Password — oauth.component.ts:30
  affected_parameter: access_token (URL fragment)
  scenario: 'The OAuth callback flow in `oauth.component.ts` uses the OAuth 2.0 implicit flow: `app.routing.ts:286` matches
    `#access_token=` in the URL fragment, routing to `OAuthComponent`. The access_token arrives in the browser URL fragment
    with no PKCE, no `state` parameter validation, and no `nonce`. Additionally, at line 30, a deterministic password is computed
    as `btoa(profile.email.split('''').reverse().join(''''))` and used to register/login the user. This password is derived
    entirely from the publicly known email address. An attacker who knows a victim''s email (e.g., from a data breach, social
    engineering, or the public user enumeration endpoint) can compute the exact Juice Shop password for that account and log
    in directly via the `/rest/user/login` endpoint — completely bypassing the OAuth flow. The implicit flow also exposes
    the access_token in browser history and to any script that can read `window.location.href`.'
  evidence_summary: Line 30 computes `password = btoa(profile.email.split('').reverse().join(''))` — a reversible, deterministic
    transformation of the email address used as the account password.
  impact_description: Any attacker knowing a victim's email can derive and use their Juice Shop password, achieving full account
    takeover without OAuth interaction.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no state parameter, no PKCE, no nonce validation, password derivation algorithm is public
  mitigation_title: Replace implicit OAuth flow with PKCE authorization-code flow and use a cryptographically random password
  remediation:
    effort: High
    steps:
    - Migrate from implicit flow (`response_type=token`) to authorization-code flow with PKCE (`response_type=code&code_challenge=...&code_challenge_method=S256`)
      using the Angular OAuth2 OIDC library (`angular-oauth2-oidc`).
    - Generate a cryptographically random password on first OAuth login using `crypto.getRandomValues()` and store it server-side,
      never deriving it from the email or any other predictable claim.
    - Add `state` parameter generation and validation before accepting the OAuth callback to prevent CSRF on the redirect.
    - Store tokens in `httpOnly Secure SameSite=Strict` cookies via a Backend-for-Frontend proxy rather than `localStorage`.
    code_example: "// Remove: password = btoa(profile.email.split('').reverse().join(''))\n// Replace with server-side: generate\
      \ random password at account creation\nconst randomPassword = Array.from(crypto.getRandomValues(new Uint8Array(32)))\n\
      \  .map(b => b.toString(16).padStart(2, '0')).join('')"
    reference: CWE-522
