  title: Rate Limit Bypass — server.ts:346
  affected_parameter: X-Forwarded-For
  scenario: '`server.ts:343-347` applies a rate limit of 100 requests per 5 minutes to `POST /rest/user/reset-password`, using
    `headers[''X-Forwarded-For''] ?? ip` as the rate-limit key. With `app.enable(''trust proxy'')` at `server.ts:342`, the
    client-supplied `X-Forwarded-For` header is used without verification. An attacker rotates this header value across requests
    (e.g., `X-Forwarded-For: 1.2.3.0`, `1.2.3.1`, ...) to obtain an effectively unlimited number of password-reset attempts,
    enabling enumeration of all valid email addresses and, combined with HMAC precomputation (see auth-004), unlimited account
    takeovers.'
  evidence_summary: '`server.ts:346` uses `headers[''X-Forwarded-For''] ?? ip` as the rate-limit key without header validation.'
  impact_description: Rate limit on password reset is fully defeated by rotating the X-Forwarded-For header, enabling unlimited
    reset attempts and email enumeration.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Rate limiter middleware is present (`express-rate-limit`) but its key generator accepts attacker-controlled
    input.
  mitigation_title: Remove X-Forwarded-For header from rate-limit key generator and key on authenticated socket IP only
  remediation:
    effort: Low
    steps:
    - Remove the custom `keyGenerator` from `server.ts:346`; the default `express-rate-limit` key uses `req.ip` which respects
      `trust proxy` settings. Only trust the IP resolved by Express after `trust proxy` configuration is set correctly (e.g.,
      `app.set('trust proxy', 1)` for one trusted reverse proxy).
    - 'If the deployment sits behind a known reverse proxy (e.g., nginx, Cloudflare), configure `trust proxy` to the specific
      proxy IP/CIDR so only that proxy''s forwarded header is trusted: `app.set(''trust proxy'', ''10.0.0.0/8'')`.'
    - Consider adding an email-level rate limit in addition to IP-level, using a token-bucket per normalized email address.
