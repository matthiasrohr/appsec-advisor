  title: Mutable npm install in CI Resolves Live Registry — ci.yml:51
  affected_parameter: npm install
  scenario: Every test and build job in `ci.yml` runs `npm install` (lines 51, 71, 110, 147, 203, 238) rather than `npm ci`.
    `npm install` resolves the dependency graph against the current npm registry state and may update the lockfile, whereas
    `npm ci` installs exactly the versions recorded in `package-lock.json` and fails if there is a drift. An attacker who
    executes a version-confusion or typosquatting attack against any package in the dependency tree — or who briefly controls
    a transitive dependency via maintainer account takeover — gets their malicious version resolved by every CI build during
    the attack window. The `release.yml:43` job uses `npm install --production` for the production package step, directly
    linking the supply-chain exposure to the published release artifacts (tarballs attached to GitHub Releases and the Docker
    image). Because no SCA tooling (Snyk, Trivy, Grype) is configured, a compromised transitive dependency reaches production
    with no automated detection.
  evidence_summary: '`npm install` appears at ci.yml:51, 71, 110, 147, 203, 238 and release.yml:43; `npm ci` is never used.
    No SCA scan step is present in any workflow.'
  impact_description: Malicious package version installed during attack window ships in release artifacts and the Docker image
    without SCA detection.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: A `package-lock.json` lockfile exists in the repository; `npm install` updates it locally if versions
    drift but CI installs may not commit the result.
  mitigation_title: Replace `npm install` with `npm ci` in all CI jobs and add SCA scanning
  remediation:
    effort: Low
    steps:
    - Replace every `npm install` step in `.github/workflows/ci.yml` and `release.yml` with `npm ci` to enforce lockfile fidelity.
    - Replace `npm install --production` at release.yml:43 with `npm ci --omit=dev` — the lockfile already tracks production-only
      transitive graph.
    - Add a dependency vulnerability scan job using `npm audit --audit-level=high` (built-in, zero config) or integrate `actions/dependency-review-action`
      on pull_request events to block PRs that add known-vulnerable packages.
    - 'Configure Dependabot for npm in `.github/dependabot.yml` (package-ecosystem: npm) to receive weekly PRs for outdated
      dependencies.'
    - Consider adding Trivy or Grype as a post-build Docker image scan step in the `docker` job to catch vulnerabilities in
      the published container.
    code_example: "# In ci.yml — replace:\n- name: \"Install application\"\n  run: npm install\n# With:\n- name: \"Install\
      \ application\"\n  run: npm ci"
