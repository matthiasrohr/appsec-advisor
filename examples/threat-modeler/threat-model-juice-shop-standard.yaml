  title: Insufficient Secret Management
  category: Insufficient Secret Management
  summary: '2 findings trace to secrets, keys, or tokens stored directly in source code. The architectural concern is not
    the individual values — they can be rotated — but the absence of a secret-management substrate: no env-var convention,
    no vault/KMS integration, no pre-commit scan. Rotating individual secrets addresses symptoms; instituting the substrate
    addresses the gap.'
