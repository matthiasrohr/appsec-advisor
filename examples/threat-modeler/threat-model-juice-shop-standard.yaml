  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-306
  title: Web3 state-changing endpoints registered without authentication — server.ts:642
  affected_parameter: null
  scenario: 'The three `/rest/web3/*` endpoints (`nftMintListen` GET at server.ts:642, `walletNFTVerify` POST at 643, `walletExploitAddress`
    POST at 644) are registered with no `security.isAuthorized()` middleware, unlike `/rest/basket`, `/api/Users`, etc. (server.ts:355-380).
    `nftMintListener` performs a privileged outbound action — establishing a long-lived WebSocket subscription to the Alchemy
    RPC using the server''s `ALCHEMY_API_KEY` — triggerable by any anonymous GET. There is no per-user scoping: the `isEventListenerCreated`,
    `addressesMinted`, and `walletsConnected` values are process-global, so any caller mutates state shared across all users.
    This is an unauthenticated management-plane surface co-located with the user API.'
  evidence_summary: server.ts registers the /rest/web3 routes with no isAuthorized() guard, exposing privileged RPC-subscription
    and challenge-state operations to anonymous callers.
  impact_description: Anonymous callers can trigger server-side RPC subscriptions on the operator's API key and mutate global
    challenge state with no authentication boundary.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. No isAuthorized() on /rest/web3 routes; other sensitive routes use security.isAuthorized().
  mitigation_title: Gate /rest/web3 endpoints behind security.isAuthorized() and scope state per authenticated user
  remediation:
    effort: Low
    steps:
    - Add `app.use('/rest/web3', security.isAuthorized())` (or per-route guards) in server.ts before the web3 handler registrations
      at lines 642-644.
    - Scope `addressesMinted` / `walletsConnected` to the authenticated user identity rather than process-global Sets so one
