- local_id: ci-cd-pipeline-002
  threat_category_id: TH-14
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-732
  title: Missing workflow-level permissions block grants GITHUB_TOKEN — ci.yml:1
  affected_parameter: GITHUB_TOKEN implicit permissions
  scenario: 'Three workflows — ci.yml, release.yml, and zap_scan.yml — define no top-level `permissions:` block. On repositories
    where the organization or repo default is ''read-write'' (GitHub''s legacy default), the GITHUB_TOKEN implicitly carries
    write access to contents, packages, deployments, pull-requests, and issues. Any compromised or malicious step in these
    workflows (e.g., the unpinned coverallsapp action, or the curl-piped Heroku installer) immediately inherits these elevated
    permissions. The release.yml runs on `push: tags: v*` and pushes Docker images and GitHub release assets with this token
    — a compromised release step can publish trojaned release binaries under legitimate version tags, inject unauthorized
    release notes, or approve PRs, all using the inherited GITHUB_TOKEN without any additional credential theft required.'
  evidence_summary: ci.yml, release.yml, and zap_scan.yml each lack a `permissions:` block at both workflow and job level,
    relying on the repository's default GITHUB_TOKEN grant.
  impact_description: A compromised workflow step gains write access to the repository and all associated GitHub resources,
