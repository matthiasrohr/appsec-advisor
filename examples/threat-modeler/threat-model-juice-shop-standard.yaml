  scenario: 'GitHub Actions repositories default to `read-write` GITHUB_TOKEN permissions when no top-level `permissions:`
    block is set. 13 of 16 workflows in this repository (ci.yml, release.yml, frontend-bundle-analysis.yml, image_actions.yml,
    lint-fixer.yml, rebase.yml, stale.yml, update-challenges-ebook.yml, update-challenges-www-legacy.yml, update-challenges-www.yml,
    update-news-www-legacy.yml, update-news-www.yml, zap_scan.yml) lack a top-level `permissions:` block. Only codeql-analysis.yml,
    lock.yml, and pr-compliance.yml define explicit permissions. A compromised step — via a malicious action, a supply-chain
    attack on an npm postinstall script, or a TOCTOU race in the build — can use the over-privileged GITHUB_TOKEN to push
    commits to protected branches, approve pull requests, modify releases, or read/write repository secrets. The `frontend-bundle-analysis.yml`
    workflow explicitly pushes to master (line 66: `git push origin master`) using the default token with no scoped permissions
    block, creating a permanent branch-write foothold.'
  evidence_summary: 13 workflow files omit top-level `permissions:` blocks, leaving GITHUB_TOKEN at the default read-write
    scope; frontend-bundle-analysis.yml then uses this token to push directly to master.
