  stride: Repudiation
  cwe: CWE-347
  title: Container images published without signing or build provenance — ci.yml:305
  affected_parameter: docker/build-push-action (no cosign ste…
  scenario: Both the ci.yml `docker` job and the release.yml `docker` job build and push images to DockerHub (`bkimminich/juice-shop:latest`,
    `:snapshot`, and version tags) without any image signing or SLSA provenance attestation. There is no `sigstore/cosign-installer`
    step, no `actions/attest-build-provenance`, and no `--sbom` flag on the `docker/build-push-action`. Downstream users,
    security teams, and deployment automation cannot verify that a pulled image was produced by the legitimate CI pipeline
    from the expected git commit. An attacker who gains write access to DockerHub (e.g., via exfiltrated DOCKERHUB_TOKEN)
    can push a trojaned image that appears identical to a legitimate release — and there is no cryptographic audit trail to
    detect or attribute the substitution. The existing CycloneDX SBOM embedded in the image is not externally verifiable without
    a corresponding signature.
  evidence_summary: docker/build-push-action in both ci.yml and release.yml pushes images to DockerHub with no cosign signing
    step or SLSA provenance attestation present in any workflow.
  impact_description: Attackers who substitute a malicious DockerHub image cannot be detected or attributed; downstream deployments
    silently run compromised code.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: CycloneDX SBOM is generated and embedded in the image. Most CI actions are SHA-pinned. DockerHub credentials
    are stored as GitHub secrets (DOCKERHUB_USERNAME, DOCKERHUB_TOKEN).
  mitigation_title: Add cosign image signing and SLSA build-provenance attestation to the docker push jobs
  remediation:
    effort: Medium
    steps:
    - Add `sigstore/cosign-installer` step after the build-push step in both ci.yml and release.yml docker jobs.
    - Sign the pushed image digest with `cosign sign --yes <image>@<digest>` using keyless signing (OIDC-based, no long-lived
      key required).
    - Alternatively, add `actions/attest-build-provenance` step to generate a SLSA Level 2 provenance attestation.
    - Store the DOCKERHUB_TOKEN with minimum required scopes (push to specific repos only) and rotate it after any suspected
      workflow compromise.
    code_example: "- name: Install cosign\n  uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb #v3.8.2\n\
      \n- name: Sign container image\n  run: |\n    cosign sign --yes \\\n      bkimminich/juice-shop@${{ steps.build-push.outputs.digest\
      \ }}"
    reference: CWE-347
  evidence:
