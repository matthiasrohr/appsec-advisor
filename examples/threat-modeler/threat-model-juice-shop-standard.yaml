    financial operations (coupon issuance, order lookup) require an authenticated session, not just prompt-level policy enforcement.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-306
  _title_source: Require authentication on /rest/chat and add explicit auth check in generateCoupon tool execute function
- id: M-060
  title: Require Ethereum signed-message proof in walletNFTVerify to verify address ownership
  kind: fix
  priority: P3
  severity: Medium
  effort: Medium
  threat_ids:
  - T-056
  how: Before checking Set membership, issue a server-generated nonce per session and require the caller to submit `eth_sign(nonce,
    walletAddress)` alongside `walletAddress`. Verify the signature on the server using ethers.js `verifyMessage(nonce, signature)`
    and confirm the recovered address equals `req.body.walletAddress`. Alternatively, tie the wallet address to the authenticated
    user session at registration time (via a wallet-connect step) so that `walletNFTVerify` resolves against the session's
    pre-registered address rather than a user-supplied parameter.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-290
  _title_source: Require an Ethereum signed-message proof in walletNFTVerify to prove caller controls the submitted address
- id: M-061
  title: Pin third-party dependencies to immutable versions
  kind: fix
  priority: P3
  severity: Medium
  effort: Low
  threat_ids:
  - T-057
  how: 'In `docker-compose.test.yml`, replace `image: bkimminich/juice-shop:latest` with a pinned digest: `image: bkimminich/juice-shop@sha256:<digest>`.
    Update the digest as part of the release pipeline by running `docker inspect --format=''{{index .RepoDigests 0}}'' bkimminich/juice-shop:latest`
    after the push step and writing the result into the compose file via a script. Alternatively, change the docker-compose.test.yml
    `app` service to use `build: ./` (which already exists as a build context) instead of pulling `:latest` — this always
    tests the locally-built image from the current commit, eliminating the registry dependency entirely.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-829
  _title_source: Pin the smoke-test image to a content-addressable digest rather than the mutable :latest tag
- id: M-062
  title: Add SLSA provenance attestation and Docker image SBOM to release and docker publish jobs
  kind: fix
  priority: P3
  severity: Medium
  effort: Medium
  threat_ids:
  - T-058
  how: 'Add `actions/attest-build-provenance` after the `softprops/action-gh-release` step in `release.yml` to generate a
    Sigstore-signed SLSA provenance attestation for each tarball: requires `permissions: id-token: write, attestations: write`.
    Enable Docker image attestations in the `docker/build-push-action` step by adding `provenance: true` and `sbom: true`
    to the `with:` block — this pushes a separate attestation manifest alongside the image. Consider adopting OIDC Trusted
    Publishing for Docker (via workload identity federation with DockerHub) to eliminate long-lived `DOCKERHUB_TOKEN` and
    generate short-lived credentials per workflow run. Add a verification step in consumers'' CI: `gh attestation verify <artifact>`
    to enforce provenance checks before install.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
