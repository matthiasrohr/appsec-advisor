- local_id: file-upload-service-005
  threat_category_id: TH-05
  additional_categories:
  - TH-01
  stride: Elevation of Privilege
  cwe: CWE-502
  title: Unsafe YAML Deserialization — routes/fileUpload.ts:117
  affected_parameter: file (multipart YAML upload)
  scenario: 'An unauthenticated attacker uploads a YAML file to /file-upload using a .yml or .yaml extension. At fileUpload.ts:116-117,
    js-yaml 3.14.2 is loaded into a vm sandbox and invoked via yaml.load(data). In js-yaml v3, yaml.load() uses the DEFAULT_UNSAFE_SCHEMA
    by default, which supports !!js/function, !!js/undefined, and !!js/regexp tags. A payload containing ''"exec": !!js/function
    "function(){return require(\"child_process\").execSync(\"id\");}"'' causes yaml.load() to deserialize a live JavaScript
    Function object. JSON.stringify() then invokes the function if it is a value in the parsed object, potentially executing
    arbitrary OS commands. The vm.createContext sandbox limits but does not fully prevent access to host APIs via prototype
    chain traversal.'
  evidence_summary: js-yaml version 3.14.2 (package.json line 187) is used with the unsafe yaml.load() API at fileUpload.ts:117;
    v3 defaults to DEFAULT_UNSAFE_SCHEMA which deserializes !!js/function and !!js/regexp tags into live JavaScript objects.
  impact_description: A successful payload achieves arbitrary code execution on the server host as the Node.js process user,
    achieving full compromise of the application and potentially the underlying container or host.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: vm.createContext sandbox with 2000ms timeout (provides partial isolation; does not block unsafe YAML
    type instantiation within the sandbox); sanitize-filename on disk uploads (unrelated to YAML parsing)
  mitigation_title: Replace js-yaml yaml.load() with yaml.safeLoad() or upgrade to js-yaml v4 and use load()
  remediation:
    effort: Low
    steps:
    - Upgrade js-yaml from ^3.14.0 to ^4.1.0 in package.json — in v4, yaml.load() uses the safe (DEFAULT_SCHEMA) by default
      and !!js/* types are removed entirely.
    - If upgrading is not immediately possible, replace yaml.load(data) with yaml.safeLoad(data) at fileUpload.ts:117 — safeLoad()
      uses SAFE_SCHEMA in v3 and rejects !!js/* types.
    - If YAML upload functionality is deprecated (same comment as XML), remove handleYamlUpload from the /file-upload middleware
      chain.
    code_example: '// package.json — upgrade

      "js-yaml": "^4.1.0"


      // routes/fileUpload.ts:117 — use safe API until upgrade

      // v3 workaround:

      const yamlString = vm.runInContext(''JSON.stringify(yaml.safeLoad(data))'', sandbox, { timeout: 2000 })'
    reference: CWE-502
  evidence:
  - file: routes/fileUpload.ts
    line: 117
