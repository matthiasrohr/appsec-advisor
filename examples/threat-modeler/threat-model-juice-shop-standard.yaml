    — a different error than the one at line 22 (`Blocked illegal activity`) which fires when email or answer is absent. An
    attacker can enumerate valid accounts (distinct HTTP 401 responses for wrong-answer vs. blocked-activity), then guess
    security question answers. Security questions are drawn from a publicly enumerable list (the application's question catalog
    is exposed). Answers are HMAC-hashed (lib/insecurity.ts:42) with a hardcoded key `pa4qacea4VK9t9nGv7yZtwmj` — since this
    key is also in the source, answers can be precomputed. Rate limit at server.ts:343 partially mitigates, but the window
    (undefined parameters) allows offline answer precomputation.
