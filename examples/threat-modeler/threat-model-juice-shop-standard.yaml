    encryption keys from /encryptionkeys, retrieves a KeePass database from /ftp/incident-support.kdbx, or exfiltrates server-side
    files via XXE — all without any server-side trace. In a post-incident investigation, there is no way to determine what
    files were accessed, when, or from where. Uploads of malicious XML or ZIP files also generate no structured security event.
  evidence_summary: Zero logger calls found in fileServer.ts, keyServer.ts, logfileServer.ts, and fileUpload.ts; security-critical
    file access and upload events are silently handled.
  impact_description: Post-breach forensic reconstruction is impossible — attacker's access window, exfiltrated files, and
    upload timing are unrecoverable.
