- id: M-055
  title: Render lastLoginIp as textContent rather than trusted HTML in last-login-ip.component.ts
  kind: fix
  priority: P3
  severity: Medium
  effort: Low
  threat_ids:
  - T-052
  how: 'Replace `bypassSecurityTrustHtml(\`<small>${payload.data.lastLoginIp}</small>\`)` with a plain string assignment:
    `this.lastLoginIp = payload.data.lastLoginIp` and update the template to render it in a `<small>{{ lastLoginIp }}</small>`
    text binding. Validate that `lastLoginIp` matches an IPv4/IPv6 regex on the server before embedding it in the JWT, rejecting
    any value containing HTML-special characters.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-79
- id: M-056
  title: Add query timeout and result-set limit to the product search raw SQL call
  kind: fix
  priority: P3
  severity: Medium
  effort: Low
  threat_ids:
  - T-053
  how: 'Pass `{ timeout: 2000 }` (2 s) in the Sequelize query options object for the product search call so SQLite aborts
    long-running queries before they starve the event loop. Migrate to the ORM `ProductModel.findAll()` path (with `limit`
    and `offset` pagination), which also enables query cancellation via Sequelize''s built-in timeout support. Add `PRAGMA
    query_only = ON` for read-only queries to prevent accidental writes in the search path.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-400
- id: M-057
  title: Replace url.includes() with exact-match or startsWith() in isRedirectAllowed
  kind: fix
  priority: P3
  severity: Medium
  effort: Low
  threat_ids:
  - T-054
  how: 'Replace `allowed = allowed || url.includes(allowedUrl)` at lib/insecurity.ts:138 with `allowed = allowed || url ===
    allowedUrl` for exact matching, or `url.startsWith(allowedUrl)` if subdirectory redirects within the allowed domain are
    required. Prefer exact matching: the current allowlist contains full canonical URLs (no trailing wildcards intended),
    so `===` is semantically correct. Add a test case: `isRedirectAllowed(''https://evil.com?r=https://github.com/juice-shop/juice-shop'')`
    must return `false`.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-601
