  stride: Denial of Service
  cwe: CWE-400
  title: No query timeout in Sequelize SQLite configuration — models/index.ts:30
  affected_parameter: null
  scenario: 'The Sequelize instance at `models/index.ts:30` is initialized without a `dialectOptions.timeout` or query-level
    timeout. SQLite uses a single writer lock. Any long-running query — whether via the intentional raw-SQL injection at `routes/login.ts:34`
    or an unexpectedly expensive ORM query — holds the write lock and blocks all concurrent write operations across the application.
    The retry configuration (line 34: `retry: { max: 5 }` on `SQLITE_BUSY`) means five retries are attempted but there is
    no cap on how long a single query can run before it is aborted. A malicious authenticated user who triggers the SQLi path
    with a time-delay payload (e.g., appending `AND (SELECT count(*) FROM Users) > 0 UNION SELECT ...`) can cause cascading
    SQLITE_BUSY errors that effectively freeze order placement, basket updates, and user registration for all concurrent users.'
  evidence_summary: 'Sequelize init at `models/index.ts:30` has no `dialectOptions: { timeout: N }` or `pool.acquire` timeout;
    queries run unbounded.'
  impact_description: A single malicious time-delay SQL payload stalls all concurrent write operations against the SQLite
    database, denying service to legitimate users.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: '`retry: { max: 5 }` limits SQLITE_BUSY retry attempts but does not abort long-running queries.'
  mitigation_title: Add SQLite statement timeout and connection pool acquire timeout to Sequelize configuration
  remediation:
    effort: Low
    steps:
    - 'Set `dialectOptions: { timeout: 5000 }` in the Sequelize constructor options at `models/index.ts:30` — this passes
      `PRAGMA busy_timeout=5000` to SQLite, aborting queries that wait more than 5 seconds for the write lock.'
    - 'Add `pool: { acquire: 5000, idle: 10000 }` to the Sequelize options to cap connection acquisition wait time.'
    - For the intentional SQLi route (`routes/login.ts:34`), consider wrapping the raw query in a Promise with a `setTimeout`
      circuit-breaker as an additional defense layer.
    code_example: "// models/index.ts — add timeout\nconst sequelize = new Sequelize('database', 'username', 'password', {\n\
      \  dialect: 'sqlite',\n  dialectOptions: { timeout: 5000 },\n  pool: { acquire: 5000, idle: 10000 },\n  storage: 'data/juiceshop.sqlite',\n\
      \  logging: false\n})"
    reference: CWE-400
  evidence:
  - file: models/index.ts
    line: 30
  evidence_check: verified
  controls_absent_evidence:
