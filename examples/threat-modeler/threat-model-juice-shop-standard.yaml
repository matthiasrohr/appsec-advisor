- local_id: ci-cd-pipeline-005
  threat_category_id: TH-23
  additional_categories:
  - TH-17
  stride: Elevation of Privilege
  cwe: CWE-732
  title: Missing Workflow Permissions Block Inherits Default Read-Write Token — ci.yml:2
  affected_parameter: null
  scenario: 'Nine workflows lack an explicit `permissions:` block: `ci.yml`, `release.yml`, `image_actions.yml`, `lint-fixer.yml`,
    `rebase.yml`, `zap_scan.yml`, `stale.yml`, `frontend-bundle-analysis.yml`, and others. Without an explicit block, GitHub
    injects the repository''s default `GITHUB_TOKEN` scope. On repositories where the organization or repo default has not
    been hardened to `permissions: read-all`, the token inherits write access to `contents`, `packages`, `pull-requests`,
    `issues`, and `deployments`. A compromised step in any of these workflows — via a malicious dependency hook, a workflow
    injection, or a supply-chain-compromised action — then has write access sufficient to push commits, create releases, modify
    branch protections (indirectly), or publish packages.'
  evidence_summary: '`ci.yml` has no top-level or job-level `permissions:` key, meaning the `GITHUB_TOKEN` scope is determined
    entirely by the organization/repository default setting rather than least-privilege explicit declaration.'
  impact_description: A compromised CI step in any unscoped workflow can push code to any branch, create releases, modify
    issues, or publish Docker images under the project's identity without any additional credential theft.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: '`codeql-analysis.yml` and `pr-compliance.yml` explicitly declare scoped `permissions:` blocks. The `docker`
    jobs in `ci.yml` use dedicated DockerHub credentials via `DOCKERHUB_USERNAME`/`DOCKERHUB_TOKEN` secrets.'
  mitigation_title: 'Add explicit permissions: read-all at top level and grant write only where required in all workflows'
  remediation:
    effort: Medium
    steps:
    - 'Add `permissions: read-all` at the top level of `ci.yml`, `release.yml`, `image_actions.yml`, `lint-fixer.yml`, `rebase.yml`,
      `zap_scan.yml`, and `stale.yml`.'
    - 'For jobs that require write access, override at the job level with the minimum required scope. Examples: `ci.yml` coverage-report
      job needs no write; `ci.yml` docker job needs no `GITHUB_TOKEN` write (uses DockerHub); `release.yml` create-release
      job needs `contents: write`.'
    - 'For `lint-fixer.yml`, the `git-auto-commit-action` requires `contents: write` — scope it to that job only: `permissions:
      contents: write`.'
    - 'For `rebase.yml`, the rebase action requires `contents: write` at the job level.'
    - Set the repository-level default to `Read repository contents and packages permissions` in GitHub Settings > Actions
      > General > Workflow permissions.
    - Enable `Allow GitHub Actions to create and approve pull requests` only if explicitly needed, and restrict it to the
      specific jobs that use `peter-evans/create-pull-request`.
    code_example: "# ci.yml — add at top level, before 'env:'\npermissions: read-all\n\njobs:\n  # For jobs needing write\
      \ access, override at job level:\n  coverage-report:\n    permissions:\n      contents: read  # still read-all default\
      \ for unlisted scopes would not apply"
    reference: CWE-732
  evidence:
  - file: .github/workflows/ci.yml
    line: 2
  evidence_check: verified
  controls_absent_evidence:
