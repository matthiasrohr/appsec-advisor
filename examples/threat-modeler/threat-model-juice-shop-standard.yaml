  cwe: CWE-94
  title: Server-Side Code Execution — routes/userProfile.ts:61
  affected_parameter: null
  scenario: The GET /profile route in routes/userProfile.ts reads the authenticated user's `username` from the database and,
    if it matches the pattern `/#{(.*)}/`, extracts the bracketed expression and passes it to `eval()` at line 61. An attacker
    who controls their username (via the profile update API) can set it to `#{require('child_process').execSync('id')}` or
