  additional_categories: []
  stride: Tampering
  cwe: CWE-916
  title: MD5 Password Hashing Without Salt (lib/insecurity.ts:43)
  affected_parameter: password
  scenario: The hash() function at lib/insecurity.ts line 43 uses crypto.createHash('md5') — a fast, keyless, unsalted cryptographic
    hash — to store and verify user passwords. MD5 is not a password-hashing function. There is no per-user salt (confirmed
    by reading models/user.ts line 77 — setDataValue calls security.hash(clearTextPassword) with no salt argument). An attacker
    who exfiltrates the SQLite database (e.g. via SQL injection on routes/login.ts:34) obtains MD5 hashes. Pre-computed rainbow
    tables covering common passwords crack most hashes in seconds; GPU-based brute force cracks arbitrary 8-character passwords
    in minutes. The attacker then authenticates as any user whose hash they cracked.
  evidence_summary: models/user.ts line 77 calls security.hash(clearTextPassword) to set the password field; security.hash()
    performs crypto.createHash('md5').update(data).digest('hex') with no salt — trivially reversible.
  impact_description: All user passwords are recoverable via offline attack after database exfiltration; re-use of cracked
    passwords enables lateral movement.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no bcrypt, argon2, or scrypt in package.json; no salt generation in the hash function.
  mitigation_title: Replace MD5 password hashing with bcrypt or argon2id
  remediation:
    effort: Medium
    steps:
    - 'Install a proper password-hashing library: `npm install bcryptjs` (pure JS, no native deps) or `npm install argon2`'
    - 'Replace security.hash() for password storage: `export const hashPassword = async (pw: string) => bcrypt.hash(pw, 12)`'
    - 'Update models/user.ts setter to await the async hash: update the Sequelize beforeCreate/beforeUpdate hooks to store
      bcrypt hashes'
    - Update password comparison in routes/login.ts raw SQL and routes/2fa.ts line 107 to use bcrypt.compare() instead of
      string equality on MD5
    - Force a password reset for all existing users on next login (existing MD5 hashes cannot be migrated automatically without
      the plaintext)
