  title: Unauthenticated WebSocket Channel
  affected_parameter: 'socket event: verifyLocalXssChallenge,…'
  scenario: The Socket.IO server registered at lib/startup/registerWebsocketEvents.ts:24 performs no authentication on the
    WebSocket upgrade handshake. Any client — including unauthenticated HTTP clients, wscat, or Python websocket libraries
    — can connect and emit the 'verifyLocalXssChallenge', 'verifySvgInjectionChallenge', or 'verifyCloseNotificationsChallenge'
    events with crafted payloads that satisfy the challenge criteria checked at lines 41-52. When the criteria match (e.g.
    sending the literal XSS payload string via the event), challengeUtils.solveIf() marks the challenge as solved in the database
    and emits a broadcast notification. This allows an attacker to claim CTF credit for challenges they did not perform in
    the browser.
  evidence_summary: io.on('connection', ...) registers event handlers for challenge verification at lines 41-52 with no preceding
    io.use() authentication middleware anywhere in registerWebsocketEvents.ts.
  impact_description: An unauthenticated remote attacker can artificially mark CTF challenges as solved in the persistent
    database, corrupting leaderboard integrity and obtaining CTF flags without performing the required exploits.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Socket.IO CORS origin restricted to 'http://localhost:4200' — bypassed by any non-browser WebSocket client.
  mitigation_title: Add JWT authentication middleware to Socket.IO handshake via io.use()
  remediation:
    effort: Medium
    steps:
    - Add an io.use() middleware in registerWebsocketEvents.ts that reads the handshake auth token and calls security.verify(token)
      from lib/insecurity.ts — reject the connection with next(new Error('Unauthorized')) on missing or invalid tokens
    - 'In the Angular client (socket-io.service.ts), pass the JWT in the Socket.IO auth option: io(origin, { auth: { token:
      authService.getToken() } })'
    - Inside event handlers that verify challenge completion, additionally confirm socket.data.user identity matches the active
      session to prevent replay from a stolen token
    code_example: "// registerWebsocketEvents.ts\nio.use((socket: any, next: any) => {\n  const token = socket.handshake.auth?.token\n\
      \  if (!token) return next(new Error('Authentication required'))\n  try {\n    socket.data.user = security.verify(token)\n\
      \    next()\n  } catch (err) {\n    next(new Error('Invalid token'))\n  }\n})"
    reference: CWE-306
