trust_boundaries:
- id: tb-1
  name: Public Internet / Untrusted Client
  description: All unauthenticated HTTP/HTTPS requests from browsers, API clients, and attackers. No network-layer enforcement
    exists in the repository; Express handles all inbound traffic directly on port 3000.
  from: external
  to: backend-api
  enforcement: None configured in source. express-jwt middleware is present but 8+ major versions behind (v0.1.3) and accepts
    alg:none tokens.
  crossing_protocols:
  - HTTPS
  - WSS
- id: tb-2
  name: Authenticated vs Unauthenticated Zone
  description: The boundary between public routes and routes requiring a valid JWT. Enforced by express-jwt middleware on
    selected routes in server.ts, but no server-side RBAC beyond login-or-not.
  from: external
  to: backend-api
  enforcement: express-jwt 0.1.3 (severely outdated; alg:none bypass). Admin/Accounting separation enforced only by client-side
    Angular guards.
  crossing_protocols:
  - HTTPS
- id: tb-3
  name: Application Logic to Data Tier
  description: The in-process boundary between Express route handlers and the SQLite database via Sequelize ORM. SQLite runs
    embedded in the same process — no network socket, no separate credential.
  from: backend-api
  to: data-persistence
  enforcement: Sequelize ORM provides parameterized queries for most operations. The login route (routes/login.ts:34) bypasses
    the ORM with raw SQL string interpolation — SQL injection is the direct consequence.
  crossing_protocols:
  - In-process SQL
- id: tb-4
  name: Application to External LLM Endpoint
  description: Outbound HTTPS connection from routes/chat.ts to an OpenAI-compatible API (Ollama, LM Studio, or hosted endpoint).
    API key stored in environment variable.
  from: llm-chat-interface
  to: external
  enforcement: TLS on outbound connection. API key not committed to repo. No input sanitization before prompt assembly — prompt
    injection is unmitigated.
  crossing_protocols:
  - HTTPS REST streaming
- id: tb-5
  name: Application to Ethereum RPC (Web3)
  description: Outbound WebSocket connection from routes/nftMint.ts to Alchemy Ethereum Sepolia testnet. Ethers.js handles
    the JSON-RPC protocol.
  from: web3-integration
  to: external
  enforcement: TLS on outbound WSS. Alchemy API key in environment variable. No validation of RPC response data before use
    in application logic.
  crossing_protocols:
  - WSS JSON-RPC
- id: tb-6
  name: CI/CD Build Environment to External Actions
  description: GitHub Actions workflows fetching and executing third-party actions from the GitHub Marketplace. 8 workflows
    inherit write-all GITHUB_TOKEN permissions.
  from: ci-cd-pipeline
  to: external
  enforcement: GitHub runner sandboxing (GitHub-hosted). GITHUB_TOKEN scoped to repo. No SHA pinning on third-party actions
    — malicious tag updates run undetected.
  crossing_protocols:
  - HTTPS (actions download)
  - GitHub API
- id: tb-7
  name: Browser SPA to Express API
  description: Same-origin HTTPS communication from the Angular SPA to the Express backend. JWT stored in localStorage (accessible
    to JavaScript — not httpOnly).
  from: frontend-spa
  to: backend-api
  enforcement: CORS middleware (cors() with no origin allowlist — accepts all origins). CSRF protection absent. Any XSS on
    the page can steal the localStorage JWT.
  crossing_protocols:
  - HTTPS REST
  - WSS Socket.IO
- id: tb-8
  name: Admin Zone within Application
  description: The boundary between regular-user access and admin/accounting capabilities. Enforced exclusively by client-side
    Angular route guards (AdminGuard, AccountingGuard).
  from: frontend-spa
  to: backend-api
  enforcement: Client-side Angular guards only. Server-side API endpoints for admin operations have no role check beyond JWT
    presence — direct API calls bypass guards entirely.
  crossing_protocols:
  - HTTPS REST
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Weak
  evidence: routes/login.ts:34 uses raw SQL string interpolation; lib/insecurity.ts provides JWT issuance with hardcoded RSA
    private key; express-jwt 0.1.3 (8+ major versions behind). MD5-equivalent password hashing intentionally weak.
- domain: Identity and Authentication Controls
  control: TOTP / 2FA
  effectiveness: Partial
  evidence: TOTP 2FA available in routes/login.ts:37-46 but not enforced for admin accounts and optional for all users.
  audit_flags:
  - control_domain_suffix_normalised
- domain: Session and Token Controls
  control: JWT Token Management
  effectiveness: Weak
  evidence: JWT issued via lib/insecurity.ts with hardcoded RSA private key committed to public GitHub repo. express-jwt 0.1.3
    accepts alg:none. Tokens stored in localStorage (XSS-accessible). No revocation mechanism.
- domain: Session and Token Controls
  control: Session Expiration
  effectiveness: Weak
  evidence: JWT expiry field present but in-memory session cache (security.authenticatedUsers) has no TTL enforcement. Session
    lifetime effectively unbounded until process restart.
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  evidence: RBAC enforced only via Angular route guards (client-side). Server-side API endpoints lack role checks beyond JWT
    presence. Direct API calls bypass AdminGuard/AccountingGuard entirely.
- domain: Authorization Controls
  control: Object-Level Authorization (IDOR)
  effectiveness: Missing
  evidence: Basket, order, and user profile endpoints lack ownership validation. Any authenticated user can access other users'
    data by guessing or enumerating integer IDs.
- domain: Query Construction and Data Access Controls
  control: Parameterized Queries / ORM
  effectiveness: Partial
  evidence: 'Sequelize ORM used for most CRUD operations. routes/login.ts:34 uses raw SQL: SELECT * FROM Users WHERE email
    = ''${req.body.email}'' — intentional SQLi vulnerability.'
  audit_flags:
  - control_domain_suffix_normalised
- domain: Input Boundary Validation Controls
  control: Server-Side Input Validation
  effectiveness: Weak
  evidence: No framework-level input schema validation. sanitize-html 1.4.2 (outdated) applied selectively in feedback/review
    flows only. Most routes accept arbitrary payloads.
  audit_flags:
  - control_domain_suffix_normalised
- domain: Input Boundary Validation Controls
  control: File Upload Validation
  effectiveness: Weak
  evidence: POST /file-upload lacks strict MIME type and path validation. adm-zip used without Zip Slip protection. libxmljs2
    XML parser with external entity resolution enabled (XXE).
  audit_flags:
  - control_domain_suffix_normalised
- domain: Output Encoding and Rendering
  control: XSS Prevention
  effectiveness: Partial
  evidence: 'Angular templates auto-escape on most paths. DomSanitizer applied selectively. Intentional bypasses: eval() in
    routes/captcha.ts and routes/userProfile.ts; innerHTML in hacking-instructor/index.ts.'
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy
  effectiveness: Partial
  evidence: Helmet 4.6.0 sets default CSP. Custom CSP override in routes/userProfile.ts is permissive. No CSP nonce or hash-based
    policy. CORS set to wildcard (all origins accepted) via cors() middleware.
- domain: Browser and Cross-Origin Controls
  control: CSRF Protection
  effectiveness: Missing
  evidence: No CSRF tokens or SameSite cookie attributes. Reliance on JWT in Authorization header provides some protection
    for authenticated API calls but does not cover cookie-based flows.
- domain: Browser and Cross-Origin Controls
  control: Clickjacking Prevention
  effectiveness: Partial
  evidence: Helmet sets X-Frame-Options and frame-ancestors in default CSP. Custom CSP override may weaken frame-ancestors
    in some routes.
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  effectiveness: Missing
  evidence: RSA private key hardcoded in lib/insecurity.ts and committed to public repository. encryptionkeys/ directory contains
    plaintext private keys. No vault, HSM, or environment-variable-based secret loading for these keys.
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing
  effectiveness: Missing
  evidence: MD5-equivalent custom hash in lib/insecurity.ts. No bcrypt, argon2, or scrypt. Intentionally insecure for CTF
    training.
- domain: Cryptography Secrets and Data Protection
  control: Transport Encryption
  effectiveness: Partial
  evidence: HTTPS expected in production deployment but not enforced at the application layer. SQLite runs in-process (no
    network TLS needed). No HSTS preload. Outbound LLM/ETH connections use TLS.
- domain: File Parser and Outbound Request Controls
  control: Server-Side Request Forgery Prevention
  effectiveness: Missing
  evidence: POST /profile/image/url accepts user-provided URLs without allowlist validation. routes/chat.ts makes LLM API
    calls to a configurable endpoint — URL injection possible via config.
- domain: File Parser and Outbound Request Controls
  control: XML/ZIP Parser Hardening
  effectiveness: Missing
  evidence: libxmljs2 used without disabling external entity resolution (XXE). adm-zip path extraction without canonical-path
    validation (Zip Slip).
- domain: Operations Runtime and Supply Chain
  control: Dependency Integrity
  effectiveness: Weak
  evidence: package-lock.json committed but npm install (not npm ci) used in CI. No --ignore-scripts flag. No Dependabot or
    Renovate. No minimum release age cooldown.
- domain: Operations Runtime and Supply Chain
  control: CI/CD Pipeline Hardening
  effectiveness: Weak
  evidence: 8/11 GitHub Actions workflows lack explicit permissions blocks (inherit write-all default). Zero SHA-pinned third-party
    actions. No dependency-review gate. SBOM generated but not attached to releases.
- domain: Operations Runtime and Supply Chain
  control: Container Hardening
  effectiveness: Partial
  evidence: Multi-stage Docker build with distroless final image (good). No USER directive (runs as root). No HEALTHCHECK.
    Base image tags not digest-pinned. No image signing or SLSA provenance.
- domain: Operations Runtime and Supply Chain
  control: Logging and Audit
  effectiveness: Partial
  evidence: Winston 3.16.0 structured logging present. No security event audit log (login failures, admin actions, data exports).
    Potential sensitive data in error logs via errorhandler middleware.
- domain: Real-time and Not Applicable Controls
  control: WebSocket Authentication
  effectiveness: Missing
  evidence: Socket.IO 3.1.2 WebSocket endpoint has no authentication check on connection (lib/startup/registerWebsocketEvents.ts).
    Any client can subscribe to challenge and notification events.
- domain: Real-time and Not Applicable Controls
  control: LLM Prompt Injection Prevention
  effectiveness: Missing
  evidence: routes/chat.ts assembles user input directly into LLM prompt messages without sanitization or system-prompt isolation.
    No content filtering on LLM responses before display.
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated dependency updates
  effectiveness: Missing
  kind: lifecycle
  assessment: Automated dependency updates not detected in the repository. Patch-management posture depends on this control
    being in place — the team is reactive rather than proactive without it.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Lockfile hygiene
  effectiveness: Missing
  kind: lifecycle
  assessment: Lockfile hygiene not detected in the repository. Patch-management posture depends on this control being in place
