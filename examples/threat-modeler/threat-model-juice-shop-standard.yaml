      req.body.id !== ''string'') return res.status(400).json({ error: ''Invalid id'' }).'
    - 'Remove { multi: true } from the update options — a review update should target exactly one document.'
    - 'Add ownership check: compare the review''s author field against the authenticated user''s email before allowing the
      update (see also sqlite-db-013).'
