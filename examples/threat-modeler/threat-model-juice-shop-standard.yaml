  impact: Critical
  risk: High
  controls_in_place: Range validation (min 1000000000000000, max 9999999999999998) ensures the value is a plausible card number
    but does not protect it at rest.
  mitigation_title: Tokenize or truncate PANs at write time in the Card model; store only last four digits or a payment-gateway
    token
