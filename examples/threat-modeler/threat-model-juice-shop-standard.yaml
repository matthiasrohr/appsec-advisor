- local_id: web3-nft-008
  threat_category_id: TH-03
  additional_categories: []
  stride: Tampering
  cwe: CWE-682
  title: Tautological Underflow Guard in BeeFaucet withdraw — BeeFaucet.sol:15
  affected_parameter: amount
  scenario: BeeFaucet.sol:12 declares `uint8 public balance = 200`. The `withdraw()` function at line 14 performs `balance
    -= amount` then checks `require(balance >= 0)` at line 15. A `uint8` is an unsigned integer and can never be less than
    0 by definition — the require check is a tautology that never reverts. In Solidity ^0.8.0 arithmetic underflow would revert
    automatically, so the require is redundant; but the intent of the guard (prevent overdraft) is not achieved by this specific
    condition. An attacker can call `withdraw(200)` to drain the full faucet balance in one transaction because the `require`
    does not check `amount <= balance` before the subtraction.
  evidence_summary: '`require(balance >= 0)` at BeeFaucet.sol:15 is always true for a uint8 variable, providing no actual
    protection against overdraft.'
  impact_description: Faucet balance can be drained to zero in a single transaction because the overflow guard never triggers
    the intended rejection.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Solidity 0.8.x built-in overflow revert (prevents wrap-around, but doesn't catch the zero-guard logic
    flaw)
  mitigation_title: Replace tautological uint8 guard with a pre-subtraction balance check in BeeFaucet.withdraw()
  remediation:
    effort: Low
    steps:
    - Change the guard at BeeFaucet.sol:15 to `require(amount <= balance, 'Insufficient faucet balance')` and place it BEFORE
      the subtraction.
    - Also add a per-address withdrawal limit or cooldown to prevent a single address from draining the faucet entirely.
    code_example: "function withdraw(uint8 amount) public {\n    require(amount <= balance, 'Insufficient faucet balance');\
      \  // pre-check\n    balance -= amount;\n    token.transfer(msg.sender, uint256(amount) * 1e18);\n}"
    reference: CWE-682
  evidence:
