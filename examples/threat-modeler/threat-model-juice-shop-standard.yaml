  stride: Elevation of Privilege
  cwe: CWE-22
  title: Path Traversal via Archive Extraction (routes/fileUpload.ts:42)
  affected_parameter: file (ZIP entry path)
  scenario: '`handleZipFileUpload` at `routes/fileUpload.ts:40-48` iterates ZIP entries and resolves each entry path at line
    42: `const absolutePath = path.resolve(''uploads/complaints/'' + fileName)`. The guard at line 44 checks `absolutePath.includes(path.resolve(''.''))`
    — a string containment check against the current working directory. A ZIP entry named `../../ftp/legal.md` resolves to
    `<cwd>/ftp/legal.md`; this path does include `path.resolve(''.'')`, so the check passes. The file is then written at line
    45 using `fs.createWriteStream(''uploads/complaints/'' + fileName)`, which resolves to `<cwd>/uploads/complaints/../../ftp/legal.md`
    = `<cwd>/ftp/legal.md`. An attacker can overwrite any file within the application''s working directory by crafting ZIP
    entries with relative path sequences.'
  evidence_summary: The containment check at line 44 passes for paths that traverse INTO subdirectories of the CWD (e.g. `ftp/`,
    `lib/`, `routes/`) because those paths also contain the CWD prefix string, but line 45 uses the raw unsanitized filename
    in the `createWriteStream` call.
  impact_description: Arbitrary file overwrite within the application directory tree, including source files (`routes/*.ts`),
    FTP-served files (`ftp/`), and configuration — enabling persistent server-side modification or data destruction.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The `absolutePath.includes(path.resolve('.'))` check prevents writes completely outside the CWD (e.g.
    `/etc/passwd`). The multer 200KB file size limit caps the content that can be written. Neither control prevents writes
    to sensitive directories within the CWD.
  mitigation_title: Normalize ZIP entry paths and enforce a strict allowlist prefix before writing
  remediation:
    effort: Low
    steps:
    - 'Replace the `includes` containment check with a prefix check: `absolutePath.startsWith(path.resolve(''uploads/complaints'')
      + path.sep)`. This ensures only paths strictly under `uploads/complaints/` are written.'
    - 'Strip all `..` segments from `fileName` before path resolution: `const safeFileName = path.basename(fileName)` for
      flat extraction, or use a path normalization utility that eliminates traversal sequences before joining.'
    - Use `absolutePath` (the resolved path) in the `createWriteStream` call at line 45 instead of the raw `fileName`, so
      the path used for writing is identical to the path used for the security check.
    - Consider using the `unzipper` library's built-in path sanitization or switching to a library that rejects Zip Slip paths
      by default.
    code_example: "```typescript\n// routes/fileUpload.ts:42-45 — fix: prefix check + sanitized path\nconst safeBase = path.resolve('uploads/complaints')\n\
      const absolutePath = path.resolve(safeBase, path.basename(fileName))\nif (absolutePath.startsWith(safeBase + path.sep))\
      \ {\n  entry.pipe(fs.createWriteStream(absolutePath).on('error', (err) => next(err)))\n} else {\n  entry.autodrain()\n\
      }\n```"
    reference: CWE-22
  evidence:
