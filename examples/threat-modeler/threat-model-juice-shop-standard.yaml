  stride: Elevation of Privilege
  cwe: CWE-94
  title: YAML Arbitrary Code Execution via js-yaml DEFAULT_FULL_SCHEMA
  affected_parameter: file
  scenario: 'handleYamlUpload at fileUpload.ts:117 calls `yaml.load(data)` using js-yaml v3.14. The installed version uses
    DEFAULT_FULL_SCHEMA, which supports `!!js/eval` and `!!js/function` YAML type tags. These tags execute arbitrary JavaScript
    during parsing — specifically before `vm.runInContext` wraps the call, so the sandbox provides no isolation. An attacker
    uploads a YAML file containing: `exploit: !!js/eval ''require("child_process").execSync("id > /tmp/pwn")''`. js-yaml evaluates
    this expression in the main Node.js process during `yaml.load()`, granting RCE as the application user. The endpoint is
    unauthenticated (server.ts:309), enabling exploitation without any credential.'
  evidence_summary: 'fileUpload.ts:117 calls yaml.load(data) with js-yaml v3.14 (package.json: js-yaml ^3.14.0) which executes
    !!js/eval and !!js/function tags during parsing, outside the vm.runInContext sandbox.'
  impact_description: An unauthenticated attacker achieves server-side remote code execution as the Node.js process user by
    uploading a YAML file containing a !!js/eval or !!js/function tag.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: vm.createContext sandbox (fileUpload.ts:115-116) is ineffective — js-yaml evaluates custom type tags
    during yaml.load() before returning the parsed object, executing code in the caller's process context, not inside vm.
  mitigation_title: Upgrade js-yaml to v4 and use yaml.load with safe schema to eliminate !!js/ tag execution
  remediation:
    effort: Low
    steps:
    - Upgrade js-yaml from `^3.14.0` to `^4.1.0` in package.json. In v4, the default `yaml.load()` uses CORE_SCHEMA which
      does not include !!js/* types.
    - Remove the `vm.createContext` and `vm.runInContext` wrapper at fileUpload.ts:114-117 — they provide no isolation when
      the parser is unsafe. Call `yaml.load(data)` directly.
    - 'If YAML processing must be retained, prefer `yaml.load(data, { schema: yaml.CORE_SCHEMA })` to explicitly constrain
      to a safe schema, regardless of library version.'
    code_example: '// package.json: "js-yaml": "^4.1.0"


      // routes/fileUpload.ts:117 — before

      const yamlString = vm.runInContext(''JSON.stringify(yaml.load(data))'', sandbox, { timeout: 2000 })


      // after (js-yaml v4)

      const parsed = yaml.load(data) // safe: no !!js/* tags in v4 default schema

      const yamlString = JSON.stringify(parsed)'
    reference: CWE-94
