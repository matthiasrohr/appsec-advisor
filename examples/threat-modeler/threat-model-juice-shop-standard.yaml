  title: Mass assignment allows role elevation — server.ts:483
  affected_parameter: role, isAdmin (request body fields)
  scenario: POST /api/Users (user registration) is handled by finale-rest which passes the entire request body to Sequelize's
    `create()`. The User model's `excludeAttributes` in server.ts:484 is `['password', 'totpSecret']`, leaving `role` and
    `isAdmin` unfiltered. An attacker registers with `{"email":"evil@x.com","password":"x","role":"admin"}` and receives an
    admin-level account. No field allowlisting is enforced before the ORM call. The registration endpoint is unauthenticated
    (POST /api/Users explicitly has no isAuthorized in server.ts:363).
  evidence_summary: 'server.ts:484 declares `exclude: [''password'', ''totpSecret'']` for the User resource but does not exclude
    `role` or `isAdmin`, so finale-rest passes them to `UserModel.create()`.'
  impact_description: Attacker self-registers as an admin, gaining access to all admin-only endpoints without any credential
    compromise.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Password and totpSecret are excluded from auto-create. No field allowlist for role/isAdmin.
  mitigation_title: Allowlist permitted registration fields and strip role/isAdmin before ORM creation
  remediation:
    effort: Low
    steps:
    - Add a middleware before `/api/Users` POST that deletes `req.body.role` and `req.body.isAdmin` unconditionally.
    - 'Alternatively, change the finale-rest resource to use `allowAttributes: [''email'', ''password'', ''passwordRepeat'']`
      if supported, or intercept the `create.write` lifecycle hook to sanitize.'
    - Set the default role in the Sequelize model definition to `'customer'` and mark it non-updatable at the model level.
    code_example: "// server.ts — before finale-rest registration\napp.post('/api/Users', (req, res, next) => {\n  delete\
      \ req.body.role\n  delete req.body.isAdmin\n  next()\n})"
    reference: CWE-915
