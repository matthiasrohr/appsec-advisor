  cwe: CWE-306
  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:29
  affected_parameter: notifications[]
  scenario: Any client — including unauthenticated bots or CTF competitors — can open a raw WebSocket connection to `ws://<host>:3000/socket.io/`.
    The `SocketIoService` client (`frontend/src/app/Services/socket-io.service.ts:22`) does not pass a JWT during handshake,
    and the server-side `io.on('connection', ...)` handler at `lib/startup/registerWebsocketEvents.ts:23` performs no authentication
    check before accepting the socket. On every new connection, lines 29–31 iterate `notifications[]` — the global in-memory
    array of challenge-solved events — and replay every pending notification to the newly connected socket, including the
    `flag` field containing the CTF answer string. An attacker who connects before the legitimate solver views the score board
    harvests all flags already queued, regardless of whether they are logged in.
  evidence_summary: '`notifications.forEach((n) => socket.emit(''challenge solved'', n))` at line 29 replays every queued
    notification (including `flag`) to every connecting socket without checking caller identity.'
  impact_description: An unauthenticated attacker harvests pending CTF flag strings for challenges solved by other users,
    undermining CTF integrity without solving any challenge.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin locked to `http://localhost:4200` in Socket.IO config, but this is a browser-enforced restriction
    that WebSocket clients (wscat, Python `socketio`) bypass trivially.
  mitigation_title: Require JWT authentication on Socket.IO connection and scope notifications to the authenticated user
  remediation:
    effort: Medium
    steps:
    - Add a Socket.IO middleware via `io.use((socket, next) => { ... })` that reads the token from `socket.handshake.auth.token`
      (or `socket.handshake.headers.authorization`) and calls `security.verify(token)` before calling `next()`; reject with
      `next(new Error('Unauthorized'))` on failure.
    - Store the decoded `userId` on the socket object (`socket.data.userId = decoded.userId`) after successful verification.
    - 'In the `connection` handler, replace `socket.emit(''challenge solved'', notification)` with a user-scoped lookup: only
      replay notifications whose `userId` matches `socket.data.userId`, or join the socket to a user-specific room (`socket.join(''user:''
      + userId)`) and emit to that room only.'
    - 'Update `SocketIoService` (`frontend/src/app/Services/socket-io.service.ts`) to pass `auth: { token: localStorage.getItem(''token'')
      }` in the `io()` options.'
    code_example: "// Server-side middleware (registerWebsocketEvents.ts)\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n\
      \  if (!token) return next(new Error('Unauthorized'))\n  try {\n    socket.data.userId = security.verify(token).data.id\n\
      \    next()\n  } catch {\n    next(new Error('Invalid token'))\n  }\n})"
