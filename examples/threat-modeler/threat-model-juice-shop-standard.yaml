  title: JWT Algorithm Confusion — lib/insecurity.ts:54
  affected_parameter: Authorization header token
  scenario: 'express-jwt@0.1.3 is configured at `lib/insecurity.ts:54` as `expressJwt({ secret: publicKey })` with no `algorithms:`
    allowlist. This version of express-jwt predates the `algorithms` parameter and accepts any algorithm the token header
    declares. An attacker crafts a token with `alg: none` (unsigned) or switches the algorithm to `HS256` and signs with the
    RSA public key (which is served unauthenticated at `/encryptionkeys/jwt.pub`). The resulting forged token passes `jwt.verify()`
    and grants the attacker the identity of any user ID or role they embed in the payload — including `role: admin`.'
  evidence_summary: 'isAuthorized() calls expressJwt with only { secret: publicKey } — no algorithms restriction, using express-jwt@0.1.3
    which lacks algorithm enforcement.'
  impact_description: 'Complete authentication bypass: attacker can forge tokens for any user account including admin, without
    knowing the private key.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is used for token issuance (lib/insecurity.ts:56), but verification does not enforce this algorithm.
  mitigation_title: Pin express-jwt algorithms allowlist to RS256 and upgrade to a current express-jwt version
  remediation:
    effort: Low
    steps:
    - 'Upgrade express-jwt to v8+ (current): `npm install express-jwt@^8`.'
    - 'Pass `algorithms: [''RS256'']` in the expressJwt options: `expressJwt({ secret: publicKey, algorithms: [''RS256'']
      })`.'
    - 'Verify that `jwt.verify()` calls in lib/insecurity.ts:191 also pass `{ algorithms: [''RS256''] }`.'
    code_example: '// lib/insecurity.ts — fixed

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] })'
