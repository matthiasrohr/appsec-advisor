  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Mutable Docker Image Tag in Smoke Test — docker-compose.test.yml:8
  affected_parameter: bkimminich/juice-shop:latest
  scenario: The Docker-based smoke test job in `ci.yml:311` runs `docker compose -f docker-compose.test.yml up` which pulls
    `bkimminich/juice-shop:latest` (docker-compose.test.yml:8) — a mutable tag. The `ci.yml` `docker` job publishes the `latest`
    tag on every push to `master` (line 345). The smoke test runs concurrently with the docker publish in the CI pipeline;
    depending on runner scheduling, the smoke test may pull the *previous* latest image rather than the image built from the
    current commit. More critically, an attacker who gains DockerHub write access — via a leaked `DOCKERHUB_TOKEN` (used at
    ci.yml:327) or a compromise of the DockerHub account — can push a backdoored image tagged `latest` that then executes
    inside the CI smoke test environment. Since the smoke test runner has access to other secrets (`GITHUB_TOKEN`), this constitutes
    a container-based supply-chain attack.
  evidence_summary: '`docker-compose.test.yml:8` references `bkimminich/juice-shop:latest`; the `docker` job in `ci.yml` pushes
    to `:latest` at line 345 using `DOCKERHUB_TOKEN` from secrets.'
  impact_description: A poisoned `:latest` image executes arbitrary code in the CI environment with access to `GITHUB_TOKEN`
    and other secrets available to the smoke test runner.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The `docker` publish job requires all test jobs to pass before running (`needs:` at ci.yml:314). DockerHub
    credentials are stored as GitHub secrets.
  mitigation_title: Pin the smoke-test image to a content-addressable digest rather than the mutable :latest tag
  remediation:
    effort: Low
    steps:
    - 'In `docker-compose.test.yml`, replace `image: bkimminich/juice-shop:latest` with a pinned digest: `image: bkimminich/juice-shop@sha256:<digest>`.'
    - Update the digest as part of the release pipeline by running `docker inspect --format='{{index .RepoDigests 0}}' bkimminich/juice-shop:latest`
      after the push step and writing the result into the compose file via a script.
    - 'Alternatively, change the docker-compose.test.yml `app` service to use `build: ./` (which already exists as a build
      context) instead of pulling `:latest` — this always tests the locally-built image from the current commit, eliminating
      the registry dependency entirely.'
    code_example: "# docker-compose.test.yml\nservices:\n  app:\n    build: ./   # use local build, not :latest pull"
    reference: CWE-829
  evidence:
  - file: docker-compose.test.yml
    line: 8
  evidence_check: verified
