- id: A-006
  name: User-Uploaded Files
  classification: Internal
  description: Files uploaded via POST /file-upload (XML, images) and profile images. Stored in assets/public/images/uploads/.
    XML files are parsed with libxmljs2 with DTD expansion enabled — XXE attack surface.
