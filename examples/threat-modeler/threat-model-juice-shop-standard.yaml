- id: M-065
  title: Configure Socket.IO connection limits and per-event rate throttling to prevent event-loop flooding
  kind: fix
  priority: P3
  severity: Medium
  effort: Low
  threat_ids:
  - T-064
  how: Set `maxHttpBufferSize` (e.g. 1e4) and `connectTimeout` (e.g. 5000) in the Socket.IO Server constructor options. Implement
    a per-socket event rate limiter using a token bucket (e.g. `socket-io-rate-limiter` or a custom counter on `socket.data`)
    and disconnect sockets that exceed the threshold. Consider limiting total concurrent connections using a connection counter
    and rejecting new handshakes above the limit via `io.use()`. Reject event payloads exceeding a maximum byte size before
    processing.
