- local_id: auth-identity-006
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Weak Password Hashing — lib/insecurity.ts:41
  scenario: An attacker who extracts the `Users` table via the SQL injection at `routes/login.ts:34` obtains MD5 hashes with
    no salt. Using a pre-computed MD5 rainbow table (publicly available), the attacker recovers the plaintext password for
    each hash within minutes. Because the same `security.hash()` function is used for all password comparisons in the application
    (login, change-password, 2FA setup), the compromised hash is immediately usable for account takeover across all those
    flows.
  evidence_summary: '`lib/insecurity.ts:41` defines `export const hash = (data: string) => crypto.createHash(''md5'').update(data).digest(''hex'')`
    — MD5 with no salt, no work factor.'
  impact_description: A database dump yields plaintext credentials for every registered user, directly enabling full account
    takeover across all accounts.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — passwords are stored as unsalted MD5 hashes.
  mitigation_title: Replace MD5 password hashing with bcrypt or Argon2id with per-user salting
  remediation:
    effort: Medium
    steps:
    - Replace `crypto.createHash('md5')` in `lib/insecurity.ts:41` with `bcrypt.hash(password, 12)` (bcrypt) or `argon2.hash(password)`
      (Argon2id). Both produce a salted, work-factor-protected digest.
    - Update every comparison site (`routes/login.ts`, `routes/changePassword.ts`, `routes/2fa.ts`) to use `bcrypt.compare(plaintext,
      hash)` instead of comparing hash strings directly.
    - 'Migrate existing password rows: on the user''s next successful login with the old MD5 hash, re-hash with bcrypt and
      store the new value. Invalidate old sessions after migration.'
    - Add a database column length check — bcrypt hashes are 60 characters, not 32.
    code_example: '// lib/insecurity.ts — replacement

      import bcrypt from ''bcrypt''

      export const hashPassword = (pw: string) => bcrypt.hash(pw, 12)

      export const verifyPassword = (pw: string, stored: string) => bcrypt.compare(pw, stored)'
    reference: CWE-916
