  title: MD5 Password Hashing Without Salt (lib/insecurity.ts:43)
  affected_parameter: null
  scenario: lib/insecurity.ts:43 defines `hash = (data) => crypto.createHash('md5').update(data).digest('hex')` which is used
    as the sole password hashing function throughout the application (login at routes/login.ts:34, changePassword at routes/changePassword.ts:39).
    MD5 produces a fast, unsalted digest. A combined attack using the SQLi in routes/search.ts:23 dumps the entire Users table
    exposing all MD5 password hashes; these hashes are then cracked offline via rainbow tables (CrackStation lists 15+ billion
    MD5 entries) in minutes. A dedicated Hashcat GPU rig recovers 8-character passwords in under 60 seconds.
