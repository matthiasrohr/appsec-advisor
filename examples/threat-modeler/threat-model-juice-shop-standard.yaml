tier_root_causes:
  edge:
  - JWT stored in localStorage makes tokens trivially extractable via XSS
  - Client-side-only admin route guards bypassable by direct URL navigation
  - Reflected and stored XSS via unescaped DOM interpolation of user input
  - Predictable password derivation from email claim enables account takeover
  server:
  - Hardcoded RSA key and alg:none acceptance enable unrestricted JWT forgery
  - Missing parameterised queries allow SQLi bypass and UNION data exfiltration
  - Mass assignment on PUT /users allows self-promotion to admin role
  - Missing ownership checks expose all resource records to any session
  - MD5 password hashing without salt makes offline credential cracking trivial
  data:
  - Raw SQL from user input without parameterisation in login and search routes
  - Password hashes and tokens returned in API responses without field projection
cross_repo_dependencies: []
