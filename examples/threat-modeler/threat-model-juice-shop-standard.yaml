  title: No audit log table for security-relevant mutations — models/index.ts:30
  affected_parameter: null
  scenario: 'The 22-model Sequelize schema initialized in `models/index.ts` includes no audit log, action log, or event table.
    Security-relevant mutations — role changes, password resets, card additions, address changes, wallet balance adjustments,
    privacy requests — leave no durable record in the database. The `User.lastLoginIp` field partially tracks IP origin but
    it (a) accepts attacker-controlled `True-Client-IP` values and (b) overwrites on each login, losing history. An attacker
    who performs privilege escalation (mass-assigning `role: admin`) or accesses other users'' data via IDOR leaves no forensic
    trail that persists after the Express process logs are rotated.'
  evidence_summary: No model file in `models/` defines an audit-log table; `User.lastLoginIp` is the only field approximating
    audit data but is overwritable and spoofable.
  impact_description: Post-incident forensics cannot attribute unauthorized role changes, data exfiltrations, or payment method
    additions to specific actor identities or timestamps.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Express HTTP request logs capture request metadata but are not tamper-evident and are not correlated
    to specific database mutations.
  mitigation_title: Add an append-only AuditLog Sequelize model covering all security-relevant mutations
  remediation:
