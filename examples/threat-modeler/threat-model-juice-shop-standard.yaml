  title: Released Docker Images Lack SLSA Provenance Attestation — release.yml:50
  affected_parameter: null
  scenario: The `release.yml` docker job at lines 50-83 builds and pushes `bkimminich/juice-shop:<tag>` to DockerHub. No step
    generates or attaches a SLSA provenance attestation or cosign signature. Without a cryptographic link from the published
    image to the specific GitHub Actions run that produced it, there is no way to verify after the fact that the image on
    DockerHub was built from the expected source commit. An insider with DockerHub credentials (`DOCKERHUB_TOKEN`) or an attacker
    who exfiltrates that token can push a tampered image to the same tag, and downstream users who `docker pull bkimminich/juice-shop:latest`
    have no mechanism to detect the substitution. The `release.yml` workflow itself has no `permissions:` block (write-all
    GITHUB_TOKEN).
  evidence_summary: '`release.yml` pushes to DockerHub at line 72 (`push: true`) without any cosign signing step or SLSA provenance
    generation, leaving released images without cryptographic integrity guarantees.'
  impact_description: A tampered Docker image pushed to `bkimminich/juice-shop:latest` or a release tag reaches every downstream
    user who pulls that image, with no mechanism for those users to detect the substitution.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: Images are built from the public source repository; build logs are available in GitHub Actions. CycloneDX
    SBOM is generated at build time. No image signing or SLSA attestation step exists.
  mitigation_title: Add cosign image signing and SLSA provenance attestation to the release workflow
  remediation:
    effort: Medium
    steps:
    - Add `sigstore/cosign-installer` to the release workflow and sign the produced image with `cosign sign --key env://COSIGN_KEY
      bkimminich/juice-shop:<tag>` after the push step.
    - 'Use `docker/build-push-action` with `provenance: true` and `sbom: true` flags (supported since v4) to generate and
      attach SLSA provenance metadata to the image manifest.'
    - 'Publish the cosign public key or Rekor transparency-log entry URL in the `SECURITY.md` so downstream users can verify:
      `cosign verify --key cosign.pub bkimminich/juice-shop:<tag>`.'
    - 'Add `permissions: id-token: write` to the docker job in `release.yml` to enable keyless SLSA provenance using the GitHub
      OIDC token.'
    code_example: "# release.yml — after docker/build-push-action\n- name: \"Sign image with cosign (keyless via OIDC)\"\n\
      \  uses: sigstore/cosign-installer@main\n- name: \"Sign\"\n  run: |\n    cosign sign --yes \\\n      bkimminich/juice-shop:${{\
      \ steps.tag.outputs.tag }}"
    reference: CWE-345
