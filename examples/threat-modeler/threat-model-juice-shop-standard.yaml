trust_boundaries:
- id: tb-1
  name: Public Internet / Browser to Express Server
  description: All HTTP/HTTPS traffic from user browsers to the Express server on port 3000. No TLS enforcement at application
    level; relies on external reverse proxy. CORS wildcard allows any origin.
  from: frontend-spa
  to: backend-api
  enforcement: JWT Bearer token verification via express-jwt (isAuthorized middleware) on protected routes; CORS wildcard
    (no restriction)
  weaknesses:
  - CORS wildcard allows any origin
  - JWT using ancient express-jwt@0.1.3 without algorithm enforcement
  - No CSRF protection
  - Token stored in localStorage
- id: tb-2
  name: Express Server to SQLite Database
  description: Internal process boundary between the Express application and the embedded SQLite file. No network isolation
    — both in the same process/container. Raw SQL queries bypass ORM parameterization.
  from: backend-api
  to: sqlite-db
  enforcement: None — same process, file-based database with no access control
  weaknesses:
  - Raw string interpolation in SQL queries (login.ts:34, search.ts:23)
  - No query parameterization on vulnerable routes
  - ORM used for most routes but not authentication
- id: tb-3
  name: Unauthenticated Internet to Public Endpoints
  description: Attack surface for unauthenticated internet users. Includes login, registration, search, file upload, and several
    file-serving paths.
  from: external
  to: backend-api
  enforcement: None (by design for public endpoints)
  weaknesses:
  - SQL injection on login and search
  - Open file upload with XXE processing
  - FTP and log directory listing
  - Prometheus metrics unauthenticated
  - No rate limiting on most endpoints
- id: tb-4
  name: CI/CD Pipeline to Production
  description: GitHub Actions workflows deploying Docker images. Uses pinned action hashes but excludes the js/missing-rate-limiting
    CodeQL query.
  from: ci-cd-pipeline
  to: backend-api
  enforcement: GitHub Actions workflow permissions; pinned action SHAs
  weaknesses:
  - CodeQL excludes rate-limiting query category
  - Supply chain via npm registry (lockfile present but no npm audit in CI)
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Missing
  evidence: lib/insecurity.ts:41 uses MD5 (no salt, no bcrypt/argon2). login.ts:34 uses raw SQL string interpolation allowing
    bypass. No lockout or brute-force protection on /rest/user/login.
  linked_threats: []
- domain: Identity and Authentication
  control: Multi-Factor Authentication
  effectiveness: Partial
  evidence: TOTP 2FA implemented via otplib (routes/2fa.ts). Optional — not enforced for admin accounts.
  linked_threats: []
- domain: Session and Token Controls
  control: Session Token Issuance (JWT Based)
  effectiveness: Missing
  evidence: lib/insecurity.ts:21 hardcodes RSA private key in source. jsonwebtoken@0.4.0 and express-jwt@0.1.3 lack algorithm
    enforcement. jws.verify() called without algorithm constraint. alg:none attack possible.
  linked_threats: []
  audit_flags:
  - control_name_canonicalised
- domain: Session and Token Controls
  control: Token Storage
  effectiveness: Weak
  evidence: JWT stored in localStorage (frontend/src interceptors). Vulnerable to XSS token extraction. No httpOnly cookie
    option available.
  linked_threats: []
- domain: Session and Token Controls
  control: Token Revocation
  effectiveness: Missing
  evidence: No server-side token revocation mechanism. Compromised tokens valid for 6 hours with no way to invalidate.
  linked_threats: []
- domain: Authorization Controls
  control: Object-Level Authorization
  effectiveness: Missing
  evidence: routes/basket.ts:18 looks up basket by req.params.id without checking user ownership. routes/memory.ts:15 uses
    UserId from req.body (attacker-controlled). IDOR pattern pervasive.
  linked_threats: []
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Partial
  evidence: lib/insecurity.ts:142 defines roles object. Encoded in JWT payload but JWT can be forged. Admin role exists but
    enforceable only if JWT signature is trusted.
  linked_threats: []
- domain: Query Construction and Data Access
  control: SQL Query Parameterization
  effectiveness: Missing
  evidence: routes/login.ts:34 and routes/search.ts:23 use string interpolation in sequelize.query(). Most other routes use
    ORM but authentication is not parameterized.
  linked_threats: []
- domain: Input Boundary Validation Controls
  control: Server-Side Input Validation
  effectiveness: Missing
  evidence: No express-validator or Joi/Zod validation on request bodies in authentication or search routes. eval() used in
    routes/captcha.ts:22, routes/userProfile.ts:61, routes/b2bOrder.ts:23.
  linked_threats: []
  audit_flags:
  - control_domain_suffix_normalised
- domain: Input Boundary Validation Controls
  control: File Upload Validation
  effectiveness: Partial
  evidence: checkFileType middleware exists but XML/ZIP processing in handleXmlUpload uses libxml2 without XXE entity restriction.
    Multer limits size.
  linked_threats: []
  audit_flags:
  - control_domain_suffix_normalised
- domain: Output Encoding and Rendering Controls
  control: HTML Sanitization
  effectiveness: Weak
  evidence: sanitize-html@1.4.2 (2016, known bypass vectors). lib/insecurity.ts:58 exports sanitizeHtml wrapper. Not consistently
    applied across all output rendering paths.
  linked_threats: []
  audit_flags:
  - control_domain_suffix_normalised
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Missing
  evidence: server.ts:183 applies cors() with no options — wildcard origin. Credential requests from any origin are accepted.
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy
  effectiveness: Missing
  evidence: No global CSP header. routes/userProfile.ts:88 sets per-response CSP from user-controlled input (CSP injection
    vulnerability).
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: CSRF Protection
  effectiveness: Missing
  evidence: No csurf or equivalent CSRF middleware in server.ts. API is stateless JWT but CORS wildcard + cookie token fallback
    (lib/insecurity.ts:187) creates CSRF attack surface.
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  effectiveness: Missing
  evidence: lib/insecurity.ts:21 hardcodes 2048-bit RSA private key. lib/insecurity.ts:42 hardcodes HMAC secret. encryptionkeys/
    directory committed to repository.
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing
  effectiveness: Missing
  evidence: lib/insecurity.ts:41 uses crypto.createHash('md5') without salt. MD5 is cryptographically broken for password
    storage.
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: XML External Entity (XXE) Prevention
  effectiveness: Missing
  evidence: lib/xml.ts:18 uses libxml2-wasm without disabling external entity resolution. File upload at /file-upload processes
    XML. XXE attack path confirmed.
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: Server-Side Request Forgery (SSRF) Prevention
  effectiveness: Missing
  evidence: routes/userProfile.ts allows profile image URL from user input. No allowlist or DNS rebinding protection. routes/b2bOrder.ts:23
    executes user-supplied expressions.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Security
  effectiveness: Partial
  evidence: express-jwt@0.1.3 (CVE-2020-15084), jsonwebtoken@0.4.0, sanitize-html@1.4.2 are critically outdated. package-lock.json
    present. GitHub Actions uses CodeQL but excludes rate-limiting queries.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Container Security
  effectiveness: Adequate
  evidence: Dockerfile uses gcr.io/distroless/nodejs24-debian13 runtime, non-root UID 65532, minimal attack surface. Multi-stage
    build strips dev dependencies.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Security Logging and Monitoring
  effectiveness: Partial
  evidence: Morgan HTTP access logging and Winston application logging configured. Prometheus metrics at /metrics. No centralized
    SIEM or alerting for security events.
  linked_threats: []
- domain: Real-time and Not Applicable Controls
  control: WebSocket Security
  effectiveness: Partial
  evidence: Socket.IO 3.1.2 used for real-time notifications. No per-message authentication checked. CORS wildcard applies
