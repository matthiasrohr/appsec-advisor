  title: Install Scripts Execute on Untrusted PR — ci.yml:161
  affected_parameter: null
  scenario: The `frontend-test`, `server-test`, and `api-test` jobs run `npm install` (`ci.yml:85,124,161`) without `--ignore-scripts`
    on the `pull_request` trigger (`ci.yml:14`). A forked PR controls `package.json`, so its `preinstall`/`postinstall` lifecycle
    scripts execute on the runner during install. The `api-test` job exposes `ALCHEMY_API_KEY` (`ci.yml:167`) in the same
    job that runs the attacker-influenced install; a postinstall hook can read `process.env` and exfiltrate it. The Dockerfile
    compounds the pattern at release time with `npm install --omit=dev --unsafe-perm` (`Dockerfile:5`), which runs install
    scripts as root inside the image build with no `--ignore-scripts`. Only the `lint` job (`ci.yml:36,38`) defensively uses
    `--ignore-scripts`, confirming the maintainers know the flag but did not apply it to the test/build jobs that carry secrets.
  evidence_summary: Install steps at ci.yml lines 85/124/161 invoke `npm install` with no `--ignore-scripts`, while only the
    lint job (line 36) passes the flag.
  impact_description: Attacker-controlled lifecycle scripts run on the CI runner alongside ALCHEMY_API_KEY and, at release,
    as root in the image build, enabling secret theft or artifact tampering.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The lint job uses `npm install --ignore-scripts`. Several test jobs are gated by `github.repository ==
    'juice-shop/juice-shop'` conditionals, but the api-test install step (ci.yml:161) still runs for forks on the ubuntu/node-24
    matrix cell.
  mitigation_title: Pass --ignore-scripts to every npm install in CI and drop --unsafe-perm in the Dockerfile
  remediation:
    effort: Low
    steps:
    - Append `--ignore-scripts` to the `npm install` (or `npm ci`) command in every test/build job in `.github/workflows/ci.yml`,
      matching the existing lint job at line 36.
    - In `Dockerfile:5` remove `--unsafe-perm` and add `--ignore-scripts`, running any required build step explicitly and
      not as root.
    - Move secret-bearing steps (`ALCHEMY_API_KEY` at ci.yml:167) into jobs that never run an unscoped install of fork-controlled
      manifests, or gate them so they never execute for `pull_request` events from forks.
    code_example: '# Dockerfile

      -RUN npm install --omit=dev --unsafe-perm

      +RUN npm ci --omit=dev --ignore-scripts'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html
