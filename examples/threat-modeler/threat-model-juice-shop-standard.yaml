  title: Remote Shell Script Executed Without Integrity Check — ci.yml:358
  scenario: 'The heroku deploy job fetches and pipes a remote install script directly to the shell: `curl https://cli-assets.heroku.com/install.sh
    | sh`. This pattern is vulnerable to a MITM attack or a compromise of the heroku.com CDN — the script executes arbitrary
    code in the CI runner without any hash verification. The CI runner then uses the installed Heroku CLI with `secrets.HEROKU_API_KEY`
    to deploy to production/staging. A compromised install script could exfiltrate the API key or deploy a backdoored application.'
