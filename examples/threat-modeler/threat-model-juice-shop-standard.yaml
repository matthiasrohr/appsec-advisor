  title: Missing Rate Limiting on B2B Order Endpoint Enables Thread Exhaustion
  affected_parameter: null
  scenario: 'No rate-limiting middleware is applied to `POST /b2b/v2/orders` (server.ts:423,647). The `vm.runInContext` call
    has a 2000ms timeout per request (b2bOrder.ts:23). An authenticated attacker — or a compromised B2B partner credential
    — sends concurrent POST requests with a large `orderLinesData` string designed to trigger the timeout on every invocation.
    With 50 concurrent requests, the Node.js event loop is occupied for up to 2 seconds × 50 = 100 seconds of cumulative blocking
    (vm.runInContext is synchronous within the event loop). This renders the application unresponsive to all other users for
    the duration. The `bodyParser.text({ type: ''*/*'' })` (server.ts:314) imposes no size limit, enabling megabyte-scale
    payloads that slow parsing before even reaching the timeout.'
  evidence_summary: No `rateLimit()` middleware is applied to the `/b2b/v2` router or the `POST /b2b/v2/orders` handler; `vm.runInContext`
    with a 2s timeout is synchronous and blocks the event loop.
  impact_description: A single compromised B2B credential can sustain a denial-of-service condition against the entire Juice
    Shop application with ~50 concurrent requests.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 2000ms vm.runInContext timeout prevents infinite loops but does not prevent concurrent request exhaustion.
  mitigation_title: Add express-rate-limit middleware to the /b2b/v2 router with a per-IP and per-JWT-subject cap
  remediation:
    effort: Low
    steps:
    - 'Apply `rateLimit` to the `/b2b/v2` router in server.ts — e.g. 20 requests per minute per IP: `app.use(''/b2b/v2'',
      rateLimit({ windowMs: 60_000, max: 20 }))`. Add this before `app.use(''/b2b/v2'', security.isAuthorized())`.'
    - 'Add a request body size cap on the b2b route: `app.use(''/b2b/v2'', express.json({ limit: ''64kb'' }))` to prevent
