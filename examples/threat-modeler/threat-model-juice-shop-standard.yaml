  title: CPU Exhaustion via Unbounded safeEval Requests (routes/b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: '`routes/b2bOrder.ts:23` runs `vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 })` for
    every authenticated request to `POST /b2b/v2/orders`. Each request that triggers the evaluation path blocks the Node.js
    event loop for up to 2 seconds. No rate limiter is applied to the `/b2b/v2` route group (confirmed by absence in `server.ts`
    — rate limiting is only configured for `/rest/user/reset-password` and the 2FA endpoints). An attacker holding a valid
    JWT sends concurrent requests with compute-intensive `orderLinesData` payloads. With 10 concurrent connections each timing
    out after 2 seconds, the event loop is saturated and legitimate requests are queued indefinitely.'
  evidence_summary: No `rateLimit()` middleware appears in `server.ts` for the `/b2b/v2` route group; `vm.runInContext` at
    line 23 blocks synchronously up to 2 seconds per request.
  impact_description: The Node.js process becomes unresponsive to all requests, causing a full application-level outage for
    the duration of the attack.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 2-second execution timeout on `vm.runInContext` (routes/b2bOrder.ts:23); JWT authentication required.
  mitigation_title: Add express-rate-limit middleware to the /b2b/v2 route group in server.ts
  remediation:
    effort: Low
    steps:
    - 'Apply `rateLimit({ windowMs: 60 * 1000, max: 10 })` to `app.use(''/b2b/v2'', ...)` in `server.ts` before the `security.isAuthorized()`
      middleware, limiting each IP to 10 B2B order requests per minute.'
    - Consider moving the `vm.runInContext` call to a worker thread (`node:worker_threads`) so that compute-heavy evaluation
      does not block the event loop shared with other requests.
    code_example: '```typescript

      // server.ts — add before security.isAuthorized()

      app.use(''/b2b/v2'', rateLimit({ windowMs: 60_000, max: 10, standardHeaders: true, legacyHeaders: false }))

      app.use(''/b2b/v2'', security.isAuthorized())

      ```'
    reference: CWE-400
