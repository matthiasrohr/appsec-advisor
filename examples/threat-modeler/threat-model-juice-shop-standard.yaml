components:
- id: express-backend
  name: Express Backend
  description: Core Node.js/TypeScript Express application server. Handles all REST API routing, authentication middleware
    (express-jwt), business logic, challenge tracking, and serves the Angular SPA. Entry point is server.ts/app.ts on port
    3000.
  paths:
  - server.ts
  - app.ts
  - routes/**
  - lib/**
  - models/**
  - data/**
  - config/**
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-006
  - T-007
  - T-008
  - T-009
  - T-027
  - T-035
  - T-036
  - T-043
  - T-046
  - T-050
  - T-051
  - T-058
  - T-063
- id: angular-spa
  name: Angular SPA Frontend
  description: Angular 20 single-page application providing the shop UI. Implements client-side routing with LoginGuard, DOM
    manipulation, Socket.IO real-time communication, and consumes REST API via HTTP client. JWT tokens stored in browser localStorage.
  paths:
  - frontend/src/**
  - frontend/package.json
  tier: client
  complexity: moderate
  framework: angular
  deployment_zones:
  - client-device
  handles_sensitive_data: false
  threat_ids:
  - T-001
  - T-002
  - T-012
  - T-015
  - T-018
  - T-019
  - T-028
  - T-054
- id: data-layer
  name: Data Layer (SQLite + MarsDB)
  description: Persistence layer comprising SQLite 5.x (accessed via Sequelize 6 ORM) for relational data (users, products,
    orders, baskets, challenges) and MarsDB 0.6.x for in-memory NoSQL (reviews, chatbot). Sequelize model definitions in models/
    directory.
  paths:
  - models/**
  - data/datacache.ts
  - data/datacreator.ts
  - data/mongodb.ts
  - data/staticData.ts
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-005
  - T-010
  - T-024
  - T-034
  - T-042
  - T-049
  - T-057
- id: file-upload-service
  name: File Upload Service
  description: Handles multipart file uploads via multer. Processes XML uploads using libxmljs2 with DTD entity expansion
    enabled (XXE attack surface). Also handles profile image URLs and memory photo uploads. Writes files to assets/public/images/uploads/.
  paths:
  - routes/fileUpload.ts
  - routes/profileImageUpload.ts
  - routes/profileImageUrlUpload.ts
  - routes/memory.ts
  tier: application
  complexity: simple
  framework: express
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: false
  threat_ids:
  - T-011
  - T-025
  - T-037
  - T-038
  - T-044
  - T-052
  - T-065
- id: b2b-api
  name: B2B Order API
  description: NextGen B2B JSON API documented via swagger.yml. Processes enterprise orders by evaluating the orderLinesData
    field using notevil safeEval inside a Node.js vm sandbox. Contains intentional RCE via vm.runInContext sandbox escape.
    Serves B2B challenge set.
  paths:
  - routes/b2bOrder.ts
  - swagger.yml
  - routes/order.ts
  tier: application
  complexity: simple
  framework: express
  deployment_zones:
  - internet
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-014
  - T-041
  - T-055
  - T-059
- id: auth
  name: Authentication & Session Surface
  description: Login, token/session issuance, password-reset and MFA handlers (lib/insecurity.ts, lib/startup/registerWebsocketEvents.ts,
    routes/2fa.ts, routes/authenticatedUsers.ts, …). The credential-bearing entry surface — the highest-value authentication
    boundary in the system.
  paths:
  - lib/insecurity.ts
  - lib/startup/registerWebsocketEvents.ts
  - routes/2fa.ts
  - routes/authenticatedUsers.ts
