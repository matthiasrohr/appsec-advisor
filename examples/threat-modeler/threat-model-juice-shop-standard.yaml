    = function(){ ... } or using __proto__ assignment. An attacker who is any authenticated Juice Shop user can craft orderLinesData
    to mutate Object.prototype in the host V8 heap, causing unexpected behaviour in all subsequent requests handled by the
    same process (e.g. privilege escalation in downstream authorization checks that rely on property lookups).
