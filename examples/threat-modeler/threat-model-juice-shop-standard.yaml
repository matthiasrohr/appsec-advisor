  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client-side-only admin and role guards bypassable in browser — app.guard.ts:52
  affected_parameter: role
  scenario: 'The `AdminGuard` at `app.guard.ts:52` and `AccountingGuard` at line 69 decode the JWT from localStorage client-side
    and check `payload.data.role === roles.admin` (or `roles.accounting`). These are Angular route guards — they gate client-side
    navigation only. An attacker can bypass them by: (1) directly navigating to `/#/administration` after disabling the guard
    in browser devtools; (2) crafting a fake JWT with `{"data":{"role":"admin"}}` and placing it in localStorage — the guard
    will grant access to the admin UI, though API calls will fail if the backend validates the JWT independently. However,
    if the backend only checks token presence rather than role claims, this becomes a full vertical privilege escalation.
    The `LoginGuard` at line 18 only checks `localStorage.getItem(''token'') !== null` — a non-null forged token passes it.'
  evidence_summary: '`AdminGuard.canActivate()` at line 54 trusts `jwtDecode(localStorage.getItem(''token'')).data.role` without
    cryptographic verification — any locally-crafted JWT with `role: admin` passes the guard.'
  impact_description: An attacker can modify their localStorage token to access the admin navigation routes client-side; if
    backend auth is also weak, this achieves full vertical privilege escalation.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Backend JWT signature validation (if enforced) prevents API-level privilege escalation, but the client-side
    route guard provides no real access control.
