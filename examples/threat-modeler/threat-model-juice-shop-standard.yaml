  scenario: 'handleYamlUpload at fileUpload.ts:117 calls `yaml.load(data)` using js-yaml v3.14 with DEFAULT_FULL_SCHEMA, which
    expands YAML anchor/alias chains (`&a [*a, *a]` repeated 10 levels = 2^10 copies) during parsing. This expansion occurs
    in js-yaml''s JavaScript interpreter, not inside the vm sandbox, so the `timeout: 2000` of vm.runInContext fires only
    after allocation. A 200-byte YAML bomb can expand to gigabytes of intermediate objects before ''Invalid string length''
    is caught. Separately, handleXmlUpload at line 83 parses XML with `noent: true` — a DOCTYPE with recursive entity definitions
    (`<!ENTITY b ''&a;&a;&a;&a;&a;''>`) similarly causes exponential memory growth inside libxmljs2''s C++ parser, bypassing
    the vm timeout entirely. The endpoint at /file-upload has no authentication and no rate limiting, so concurrent requests
    maximize the impact.'
  evidence_summary: fileUpload.ts:117 uses yaml.load() (DEFAULT_FULL_SCHEMA anchor expansion) and fileUpload.ts:83 uses libxml.parseXml
    with noent:true (recursive entity expansion), both on an unauthenticated, unrate-limited endpoint.
