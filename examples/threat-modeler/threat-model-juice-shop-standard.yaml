  title: XXE with Host Filesystem Access Enabled — lib/xml.ts:21
  affected_parameter: file (XML upload via POST /file-upload)
  scenario: 'parseXmlString in lib/xml.ts:33-42 calls libxml2.XmlDocument.fromString with XML_PARSE_NOENT | XML_PARSE_DTDLOAD,
    and xmlRegisterFsInputProviders() at line 22 explicitly grants the WASM parser access to the Node.js process filesystem.
    An attacker uploads an XML file containing `<!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><foo>&xxe;</foo>`
    to POST /file-upload (which requires no authentication per server.ts:309). The parser resolves the entity against the
    host filesystem and returns the file contents, which are then included in the HTTP 410 response body at routes/fileUpload.ts:79:
    `''deprecated for security reasons: '' + utils.trunc(xmlString, 400)`.'
  evidence_summary: lib/xml.ts:21-22 explicitly calls xmlRegisterFsInputProviders() with the comment 'Grants the WASM sandbox
    host filesystem access so external entities like file:///etc/passwd resolve'; the expanded XML is echoed into a 410 response
    at fileUpload.ts:79.
  impact_description: An unauthenticated attacker can read arbitrary files from the application server's filesystem — including
    /etc/passwd, application config files, and private keys — via the XML upload endpoint.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: A 2-second vm execution timeout is applied. The response is truncated to 400 characters (utils.trunc).
    The endpoint returns HTTP 410.
  mitigation_title: Disable external entity resolution and host filesystem access in the XML parser
  remediation:
    effort: Low
    steps:
    - Remove the call to `xmlRegisterFsInputProviders()` in lib/xml.ts:22. Without it, the WASM sandbox cannot resolve `file://`
      entities against the host filesystem.
    - Remove the parse options XML_PARSE_NOENT and XML_PARSE_DTDLOAD from the option bitmask in lib/xml.ts:35 to disable entity
      substitution and DTD loading entirely.
    - 'If XML upload functionality is required for legitimate purposes, use a dedicated safe XML parser (e.g., fast-xml-parser
      with `processEntities: false`) instead of libxml2 with permissive options.'
    - Do not echo parsed XML content in error responses (fileUpload.ts:79) — log server-side only and return a generic error
      message to the client.
    code_example: "// lib/xml.ts — safe version\nexport async function parseXmlString (data: string): Promise<string> {\n\
