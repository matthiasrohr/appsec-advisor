- local_id: b2b-api-005
  threat_category_id: TH-17
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-209
  title: Raw VM Error Propagation to API Response — routes/b2bOrder.ts:33
  affected_parameter: orderLinesData
  scenario: At `routes/b2bOrder.ts:33`, the else branch of the error handler calls `next(err)` directly — passing the raw
    `Error` object thrown by `vm.runInContext` to Express's error middleware. In a development environment (or any environment
    where `errorhandler` is active, or where a verbose global error handler is mounted), this causes the server to return
    stack traces, internal module paths, and VM context detail in the HTTP response body. An attacker who deliberately triggers
    parsing errors in `orderLinesData` (e.g. unclosed expressions, type errors) receives detailed internal Node.js stack traces
    disclosing absolute file paths (`/app/routes/b2bOrder.ts`, `/app/node_modules/notevil/...`), Node.js version, and the
    internal sandbox state — all useful for crafting a working escape payload.
  evidence_summary: '`routes/b2bOrder.ts:33` calls `next(err)` with the raw `vm.runInContext` exception, bypassing any error
    sanitization before the error reaches the response encoder.'
  impact_description: Deliberate parse errors reveal internal file paths, `notevil` library internals, and Node.js stack frames
    — accelerating sandbox-escape research by an attacker probing the B2B endpoint.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: The timeout branch (line 29) returns a fixed error message. The general-error branch (line 33) propagates
    the raw error object with no sanitization.
  mitigation_title: Sanitize VM sandbox errors before forwarding to the Express error handler
  remediation:
    effort: Low
    steps:
    - Replace `next(err)` at line 33 with `next(new Error('Invalid order expression'))` — wrapping in a generic message prevents
      internal detail leakage while preserving the HTTP 500 path.
    - Log the original `err` server-side (with full stack) at `warn` level for debugging, before passing the sanitized error
      to `next()`.
    - Configure the global Express error handler to strip `err.stack` from HTTP responses in production (check `process.env.NODE_ENV
      !== 'development'`).
    code_example: "} else {\n  // Log internally for debugging; never expose sandbox internals to callers\n  console.warn('b2b\
      \ sandbox error', utils.getErrorMessage(err))\n  challengeUtils.solveIf(challenges.rceChallenge,\n    () => utils.getErrorMessage(err)\
      \ === 'Infinite loop detected - reached max iterations')\n  next(new Error('Invalid order expression'))\n}"
    reference: CWE-209
