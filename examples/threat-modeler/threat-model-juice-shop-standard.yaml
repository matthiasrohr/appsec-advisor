  stride: Spoofing
  cwe: CWE-287
  title: OAuth Implicit Flow Token in URL Fragment (login.component.ts:134)
  affected_parameter: response_type
  scenario: The Google OAuth redirect in `login.component.ts:134` uses `response_type=token` (implicit flow), which causes
    the `access_token` to land in the URL fragment (#access_token=...). This token is written to browser history on every
    authentication, and Referer headers on subsequent navigations can leak it to third-party scripts or analytics. No `state`
    parameter is present in the redirect URL, so a CSRF attack can force a user's browser to complete the OAuth flow with
    an attacker-controlled authorization code. The router matcher at `app.routing.ts:262` confirms the token arrives in the
    fragment and routes it to `OAuthComponent`. An attacker who intercepts the token (via browser history API, Referer leak,
    or injected script) can call the Google userinfo endpoint and impersonate the victim's OAuth identity on the Juice Shop
    backend.
  evidence_summary: '`location.replace()` constructs the OAuth redirect with `response_type=token` and no `state` field; the
    router matcher at line 262 extracts `#access_token=` from the URL, proving implicit-flow delivery.'
  impact_description: Full account takeover for any user whose Google OAuth token is intercepted — the token grants access
    to the Google userinfo endpoint and is then used to authenticate to the backend.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — no PKCE, no state, implicit flow in use
  mitigation_title: Replace OAuth implicit flow with authorization code + PKCE in login.component.ts
  remediation:
    effort: Medium
    steps:
    - Change `response_type=token` to `response_type=code` and add `code_challenge` (PKCE S256) and `code_challenge_method=S256`
      to the redirect URL built at `login.component.ts:134`.
    - Generate a cryptographically random `state` value, store it in `sessionStorage`, and include it in the authorization
      request; validate it in `OAuthComponent.ngOnInit()` before processing the callback.
    - Exchange the authorization code server-side (Express backend) using `code_verifier`; return the Juice Shop JWT to the
      SPA via a secure response — do not accept tokens in URL fragments.
    - Remove the `oauthMatcher` fragment-based routing path that currently triggers on `#access_token=` in `app.routing.ts:262`.
    code_example: "// login.component.ts — generate state + PKCE before redirect\nconst state = crypto.randomUUID();\nsessionStorage.setItem('oauth_state',\
      \ state);\nconst verifier = generateCodeVerifier(); // 43-128 chars random\nconst challenge = await sha256(verifier);\
      \  // base64url\nsessionStorage.setItem('pkce_verifier', verifier);\nwindow.location.replace(\n  `${oauthProviderUrl}?client_id=${this.clientId}`\
      \ +\n  `&response_type=code&scope=email` +\n  `&redirect_uri=${this.redirectUri}` +\n  `&state=${state}` +\n  `&code_challenge=${challenge}&code_challenge_method=S256`\n\
      );"
    reference: CWE-287
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 134
  evidence_check: verified
