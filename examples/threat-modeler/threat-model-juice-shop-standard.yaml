  cwe: CWE-943
  title: NoSQL injection — routes/chat.ts:149
  affected_parameter: id (getProductReviews tool input)
  scenario: 'The `getProductReviews` tool at `chat.ts:147-150` converts the LLM-supplied `id` parameter with `Number(id)`,
    then builds a MarsDB `$where` query: `db.reviewsCollection.find({ $where: ''this.product == '' + productId })`. If prompt
    injection causes the LLM to pass a non-numeric string (e.g., `id: ''0 || 1 == 1''`), `Number(''0 || 1 == 1'')` returns
    `NaN`, and the resulting query is `{ $where: ''this.product == NaN'' }`. MarsDB evaluates `$where` expressions as JavaScript
    functions. Depending on MarsDB''s handling, `NaN == NaN` is always `false`, but more targeted payloads like `id: ''0;
    return true''` may cause all review documents to be returned. The vulnerability''s exploitability depends on whether the
    LLM can be injected to supply non-numeric IDs, which prompt injection makes plausible.'
  evidence_summary: '`db.reviewsCollection.find({ $where: ''this.product == '' + productId })` at `chat.ts:149` concatenates
    an LLM-controlled value into a JavaScript `$where` expression evaluated by MarsDB.'
  impact_description: An attacker who controls the LLM's tool arguments via prompt injection can extract all product reviews
    regardless of product ID, or cause arbitrary JavaScript evaluation in the MarsDB context.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: '`Number(id)` conversion at `chat.ts:148` converts non-numeric input to `NaN`, partially constraining
    the injection surface.'
  mitigation_title: Replace `$where` string concatenation with parameterized MarsDB query in `getProductReviews`
  remediation:
    effort: Low
    steps:
    - 'Replace the `$where` expression with a direct field comparison: `db.reviewsCollection.find({ product: productId })`
      where `productId = Number(id)`. Validate that `productId` is a finite number and return `{ error: ''Invalid product
      ID'' }` if not.'
    - Add `isNaN(productId)` guard before executing the query.
    - Consider switching to Sequelize-based `ProductModel` for review storage to benefit from ORM parameterization.
    code_example: "// chat.ts — fix getProductReviews tool\nexecute: async ({ id }) => {\n  const productId = Number(id)\n\
      \  if (!Number.isFinite(productId)) return { error: 'Invalid product ID' }\n  // No $where — direct field match is safe\n\
      \  return await db.reviewsCollection.find({ product: productId }) as Review[]\n}"
    reference: CWE-943
