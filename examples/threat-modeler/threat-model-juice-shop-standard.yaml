  title: Hardcoded BIP-39 mnemonic exposes derived Ethereum — routes/checkKeys.ts:10
  affected_parameter: mnemonic
  scenario: The BIP-39 mnemonic phrase 'purpose betray marriage blame crunch monitor spin slide donate sport lift clutch'
    is embedded as a string literal at checkKeys.ts:10. Any developer with repository access, any CI artifact containing source
    maps, or any public fork of this codebase exposes the full mnemonic. Using ethers.js HDNodeWallet.fromPhrase(), any reader
    can deterministically derive the private key, public key, and Ethereum address without interacting with the server. The
    private key is also computed in memory at checkKeys.ts:12 on every request to /rest/web3/submitKey, which runs unauthenticated.
  evidence_summary: checkKeys.ts:10 assigns a string-literal mnemonic directly; checkKeys.ts:11-12 derives privateKey from
    it on every unauthenticated request.
  impact_description: Full compromise of the application's intentional Ethereum wallet; any funds or on-chain assets associated
    with the derived address are exposed to any attacker who reads the source code.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no authentication on the endpoint, no HSM or secret manager, key material in source code.
  mitigation_title: Move mnemonic/private key to an environment variable or secrets manager and remove from source
  remediation:
