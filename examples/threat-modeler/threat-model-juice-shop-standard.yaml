  stride: Elevation of Privilege
  cwe: CWE-829
  title: Pull_request_target Workflow Exposes ORG_ADMIN_TOKEN to — pr-compliance.yml:438
  affected_parameter: ORG_ADMIN_TOKEN
  scenario: 'The `pr-compliance.yml` workflow triggers on `pull_request_target` (line 4), which runs in the privileged base-repo
    context with full access to organization secrets. The `Block Spammer` step (line 434) loads `ORG_ADMIN_TOKEN` — an organization-level
    admin credential — into the runner environment and uses it to call the GitHub REST API to block users. The trigger condition
    for this privileged action is a computed `spamRating >= 75` derived entirely from attacker-controlled data: the PR title,
    body, and changed filenames supplied by the pull request author. While the score is computed through JavaScript logic,
    the `ORG_ADMIN_TOKEN` credential is loaded into a runner that has just processed untrusted PR content through `actions/github-script`.
    A compromised `actions/github-script` action (which is SHA-pinned at `ed597411d8f924073f98dfc5c65a23a2325f34cd` but must
    be verified against the upstream), or a ReDoS-triggering regex in the spam detection logic, could cause unexpected behavior
    in a step that holds this credential. More critically, the pattern of making a privileged admin operation (org user block)
    based solely on an algorithm applied to untrusted input, without human review, represents a misuse of an elevated credential
    in an automated PR-triggered context.'
  evidence_summary: '`ORG_ADMIN_TOKEN` is passed to the `Block Spammer` step at pr-compliance.yml:438, which executes on `pull_request_target`
    triggered by external PR authors; the spam score is computed entirely from attacker-controlled PR metadata.'
  impact_description: Compromise of the ORG_ADMIN_TOKEN gives an attacker the ability to manage organization membership, repositories,
    and settings — full org-level administrative access.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: PR HEAD code is not checked out or executed — the critical `pull_request_target` + HEAD-checkout EoP
    pattern is absent. The `actions/github-script` action is SHA-pinned. The spam score algorithm is implemented in JavaScript,
    not shell, reducing direct injection risk.
  mitigation_title: Remove ORG_ADMIN_TOKEN from pull_request_target workflow and use a separate protected environment for
    block actions
  remediation:
    effort: Medium
    steps:
    - Move the user-blocking logic into a separate workflow that triggers via `workflow_run` or `repository_dispatch` from
      a verified internal trigger — not directly from `pull_request_target`.
    - Use a GitHub Environment with required reviewers for any step that consumes `ORG_ADMIN_TOKEN`, so the privileged operation
      requires human approval before execution.
    - 'Alternatively, replace direct org blocking with a GitHub App that has only the `members: write` permission scoped to
      block operations, rather than a full ORG_ADMIN_TOKEN.'
    - 'Apply the principle of least privilege: audit what `ORG_ADMIN_TOKEN` can do and create a fine-grained Personal Access
      Token (or GitHub App) with only `org:block` scope.'
    code_example: null
    reference: CWE-829
  evidence:
  - file: .github/workflows/pr-compliance.yml
    line: 438
  evidence_check: verified
