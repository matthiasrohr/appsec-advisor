  cwe: CWE-306
  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:23
  affected_parameter: socket connection handshake
  scenario: 'The Socket.IO server accepts every incoming WebSocket connection with no authentication check. At line 23 of
    registerWebsocketEvents.ts, io.on(''connection'', ...) fires unconditionally — there is no io.use() middleware that validates
    a JWT, session cookie, or any other credential before the connection is accepted. The CORS origin restriction (origin:
    ''http://localhost:4200'') is browser-enforced only; non-browser clients (wscat, curl, custom scripts) bypass it entirely.
    An unauthenticated external attacker connects directly, receives all pending challenge-solved notifications (including
    CTF flags), and can invoke all registered server-side event handlers as if they were an authenticated user.'
  evidence_summary: 'io.on(''connection'', (socket: any) => { at registerWebsocketEvents.ts:23 has no preceding io.use() auth
    middleware, leaving every connection unconditionally accepted.'
  impact_description: Any internet-connected client gains full access to the WebSocket event surface — reading broadcast notifications
    and triggering all registered message handlers — without supplying credentials.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin restricted to http://localhost:4200 (browser-only enforcement; ineffective against non-browser
    clients).
  mitigation_title: Add io.use() JWT validation middleware to the Socket.IO server before accepting connections
  remediation:
    effort: Low
    steps:
    - Add an io.use() middleware that extracts the bearer token from socket.handshake.auth.token or socket.handshake.headers.authorization
      and verifies it with the same security.verify() / jwt.verify() function used by the Express routes.
    - Reject the connection with next(new Error('Unauthorized')) when the token is absent, expired, or has an invalid signature.
    - 'Update the Angular frontend to pass the stored JWT in the Socket.IO handshake auth option on connect: io(url, { auth:
      { token: localStorage.getItem(''token'') } }).'
    code_example: "```typescript\n// lib/startup/registerWebsocketEvents.ts\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n\
      \  if (!token) return next(new Error('Unauthorized'))\n  try {\n    socket.data.user = security.verify(token)\n    next()\n\
      \  } catch {\n    next(new Error('Unauthorized'))\n  }\n})\n```"
    reference: CWE-306
