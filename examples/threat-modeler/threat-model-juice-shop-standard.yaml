- local_id: backend-api-012
  threat_category_id: TH-17
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-548
  title: Directory Listing on Sensitive Paths Exposes Encryption Keys — server.ts:269
  scenario: An unauthenticated attacker browses to `/encryptionkeys` and sees a directory listing (via `serve-index`) of all
    committed cryptographic key files. Clicking `jwt.pub` returns the RSA public key used for JWT verification. Browsing to
    `/support/logs` reveals all dated access log files; downloading one discloses internal IP addresses, user agents, request
    paths, and the full body of failed requests. Browsing to `/ftp` reveals confidential documents including a legal agreement
    and other sensitive files.
  evidence_summary: '`server.ts:269, 277, 281` serve `/ftp`, `/encryptionkeys`, and `/support/logs` via `serveIndex()` and
    static file handlers without any authentication middleware.'
  impact_description: Unauthenticated attacker retrieves cryptographic keys (aiding JWT forgery), access log data (mapping
    user behaviour and internal routing), and confidential FTP-resident documents.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: No authentication middleware on any of these three path groups. `robots.txt` discloses `/ftp` to crawlers.
  mitigation_title: Require authentication for /encryptionkeys and /support/logs and remove public directory listings
  remediation:
    effort: Low
    steps:
    - Add `security.isAuthorized()` middleware before the `serveIndex` and static file handlers for `/encryptionkeys` and
      `/support/logs` in `server.ts`.
    - Add `security.isAdmin()` (or equivalent admin-role guard) for `/support/logs` — access logs contain PII and should be
      admin-only.
    - Disable `serveIndex` for these directories in production; provide a dedicated admin API endpoint that reads log files
      with proper access control instead of exposing directory listings.
    - Remove or restrict `/ftp` public access to only the files that must be publicly downloadable; move sensitive documents
      out of the FTP directory.
    code_example: "// server.ts — add auth guard before directory listings\napp.use('/encryptionkeys', security.isAuthorized(),\
      \ serveIndexMiddleware,\n  serveIndex('encryptionkeys', { icons: true, view: 'details' }))\napp.use('/support/logs',\
      \ security.isAdmin(), serveIndexMiddleware,\n  serveIndex('logs', { icons: true, view: 'details' }))"
    reference: CWE-548
