  stride: Information Disclosure
  cwe: CWE-200
  title: Challenge CTF Flags Broadcast to All Connected — lib/challengeUtils.ts:75
  affected_parameter: challenge.flag in notification payload
  scenario: When any challenge is solved, challengeUtils.sendNotification() calls globalWithSocketIO.io.emit('challenge solved',
    notification) at line 75, delivering the notification payload — which includes the CTF flag string — to every currently
    connected WebSocket client, including unauthenticated ones. Additionally, on each new client connection, lines 29-31 of
    registerWebsocketEvents.ts push ALL historically pending notifications (including flags) to the newly connected socket.
    An attacker who connects to the WebSocket endpoint without credentials receives a live feed of every challenge flag solved
    by any user, and a replay of all unacknowledged flags from the past session.
  evidence_summary: io.emit('challenge solved', notification) at challengeUtils.ts:75 sends the full notification object including
    the flag field to every socket on the server, not only the user who solved the challenge.
  impact_description: Any connected client can harvest CTF flags for challenges they have not solved, undermining scoring
    integrity and exposing sensitive challenge metadata.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None at the broadcast layer; sanitizeHtml is applied to challenge.description but not to flag/key routing.
  mitigation_title: Scope challenge-solved notifications to the solving user's socket rather than broadcasting to all connected
    clients
  remediation:
    effort: Medium
    steps:
    - Track the socket ID per authenticated user after the io.use() auth middleware is added (see realtime-channel-001). Store
      userId to socketId in a Map updated on connect and pruned on disconnect.
    - In sendNotification(), replace io.emit(...) with io.to(userSocketId).emit(...) so only the solver's socket receives
      the flag.
    - For the on-connect replay (registerWebsocketEvents.ts:29-31), filter notifications to only those belonging to socket.data.user.sub
      before emitting.
    code_example: "```typescript\n// In sendNotification — targeted emit instead of broadcast\nconst targetSocket = userSocketMap.get(challenge.userId)\n\
      if (targetSocket) {\n  globalWithSocketIO.io.to(targetSocket).emit('challenge solved', notification)\n}\n```"
    reference: CWE-200
