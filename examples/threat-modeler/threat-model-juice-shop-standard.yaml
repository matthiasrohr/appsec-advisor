trust_boundaries:
- id: tb-1
  name: Public Internet to Express Application
  description: Network boundary between the internet and the Express.js process on port 3000. Any actor on the internet can
    reach the application directly.
  from: external
  to: rest-api
  enforcement: express-jwt@0.1.3 validates Bearer token on protected routes; no network-level controls configured in source
  weakness: 21 routes have no auth middleware; express-jwt@0.1.3 accepts alg:none; committed RSA private key nullifies JWT
    validation
- id: tb-2
  name: Anonymous to Authenticated Zone (Application Layer)
  description: Logical boundary within Express between routes requiring authentication and those that are public. Enforced
    by selective middleware application.
  from: external
  to: rest-api
  enforcement: 'security.isAuthorized() = expressJwt({secret: publicKey}) applied on selected routes'
  weakness: Inconsistent application — admin routes like GET /api/Users require auth, but POST /file-upload does not
- id: tb-3
  name: Authenticated User to Admin Zone
  description: Boundary between regular authenticated users and admin-only functionality (GET /api/Users, /rest/admin/*, user
    administration).
  from: rest-api
  to: rest-api
  enforcement: 'JWT role claim checked: security.isAdmin() validates decoded.data.role === ''admin'''
  weakness: Forged JWTs bypass role check entirely; IDOR in some routes allows regular users to access other users' data without
    role escalation
- id: tb-4
  name: Application to SQLite Database (In-Process)
  description: In-process trust boundary between Express route handlers and SQLite3 via Sequelize ORM. No network separation
    — database runs in-process.
  from: rest-api
  to: sqlite-db
  enforcement: Sequelize ORM parameterized queries for most operations
  weakness: Raw string interpolation on login.ts:34 and search.ts bypasses ORM parameterization; SQL injection is direct
- id: tb-5
  name: Application to Local Filesystem (Public Serve Paths)
  description: 'Boundary between the Express process and the local filesystem for publicly served directories: ftp/, encryptionkeys/,
    logs/, frontend/dist/.'
  from: rest-api
  to: static-files
  enforcement: OS file permissions only; no application-level access control on serve-index paths
  weakness: encryptionkeys/ and logs/ served without any authentication or access restriction
- id: tb-6
  name: B2B API to notevil Sandbox (In-Process VM)
  description: In-process trust boundary between the B2B order handler and the notevil-based vm.runInContext sandbox. The
    sandbox is supposed to prevent arbitrary code execution.
  from: b2b-api
  to: rest-api
  enforcement: notevil library sandbox + Node.js vm.runInContext with 2000ms timeout
  weakness: notevil is known to be bypassable via prototype pollution — the sandbox does not prevent process-level access
- id: tb-7
  name: Application to External LLM API
  description: Outbound HTTPS boundary from the Juice Shop process to the configured OpenAI-compatible LLM API endpoint.
  from: chatbot
  to: external
  enforcement: HTTPS transport + LLM_API_KEY authentication header
  weakness: No prompt sanitization — user input flows directly into the LLM context; prompt injection can force tool calls
    (discount coupon generation)
- id: tb-8
  name: Browser to Application (JWT in localStorage)
  description: Browser-to-server trust boundary. JWTs are stored in localStorage and attached as Bearer tokens via Angular
    request interceptor.
  from: angular-frontend
  to: rest-api
  enforcement: HTTPS transport; JWT Bearer validation on protected routes
  weakness: localStorage is XSS-accessible — any XSS yields full session theft; no httpOnly cookie alternative; JWT in localStorage
    is industry anti-pattern
- id: tb-9
  name: GitHub Public Repository to Attacker
  description: Logical boundary representing the public visibility of the source code. Any internet user can read lib/insecurity.ts
    and extract the hardcoded RSA private key.
  from: external
  to: external
  enforcement: None — repository is public
  weakness: RSA private key, HMAC secret, and cookie secret are all committed to the public repository
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Unsafe
  verdict: Unsafe
  evidence: lib/insecurity.ts:43 uses MD5 (crypto.createHash('md5')) for password hashing — not a password hashing function.
    routes/login.ts:34 uses raw SQL string interpolation allowing full authentication bypass. express-jwt@0.1.3 is extremely
    outdated and accepts alg:none attacks.
  implemented_controls:
  - JWT RS256 token issuance via jsonwebtoken
  - express-jwt middleware on selected routes
  - TOTP-based 2FA available (otplib) — optional for users
  missing_controls:
  - Proper password hashing (bcrypt/argon2/scrypt)
  - Parameterized queries in login handler
  - express-jwt upgrade to v8+
  - Account lockout on failed attempts
  linked_threats: []
- domain: Session and Token Controls
  control: JWT Session Management
  effectiveness: Unsafe
  verdict: Unsafe
  evidence: RSA private key hardcoded in lib/insecurity.ts:23 — any GitHub reader can forge admin JWTs. Cookie secret hardcoded
    as 'kekse' in server.ts:289. express-jwt@0.1.3 known to accept alg:none. JWT stored in localStorage (XSS-accessible) per
    frontend/src/app/Services/request.interceptor.ts:16.
  implemented_controls:
  - JWT RS256 (when key is not leaked)
  - 6-hour token expiry
  missing_controls:
  - Rotate and externalize RSA key pair
  - Upgrade express-jwt to v8+
  - httpOnly cookie or BFF pattern instead of localStorage
  - Token revocation mechanism
  linked_threats: []
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  verdict: Weak
  evidence: security.isAuthorized() applied inconsistently — POST /file-upload and GET /api/Users are missing auth middleware
    per .route-inventory.json. IDOR in routes/address.ts:11,18,29 and routes/dataExport.ts:26 allow users to access other
    users' data. Client-side AdminGuard in app.guard.ts:48 is bypassable via direct API calls.
  implemented_controls:
  - JWT role claim checked on admin routes (security.isAdmin())
  - security.isAccounting() for accounting routes
  - security.isAuthorized() middleware on /api/BasketItems, /api/Feedbacks
  missing_controls:
  - Consistent server-side authorization on all routes
  - Object-level authorization checks (IDOR prevention)
  - Remove client-side auth guards as sole authorization mechanism
  linked_threats: []
- domain: Query Construction and Data Access
  control: SQL Injection Prevention
  effectiveness: Unsafe
  verdict: Unsafe
  evidence: 'routes/login.ts:34 uses raw Sequelize.query() with string interpolation: SELECT * FROM Users WHERE email = ''${req.body.email}''.
    routes/search.ts uses raw Sequelize query for product search. Both are confirmed SQL injection entry points.'
  implemented_controls:
  - Sequelize ORM used for most CRUD operations (parameterized by default)
  - Most model-based queries use parameterized Sequelize methods
  missing_controls:
  - Replace raw string-interpolated queries in login.ts and search.ts with parameterized Sequelize methods
  linked_threats: []
- domain: Input Boundary Validation
  control: Server-Side Input Validation
  effectiveness: Missing
  verdict: Missing
  evidence: No centralized input validation library detected in production routes (no express-validator, joi, or ajv in route
    handlers). Zod is used only in routes/chat.ts for LLM tool schemas. User input flows directly to SQL queries and eval()
    calls without schema validation.
  implemented_controls:
  - Zod schemas for LLM tool call parameters in routes/chat.ts
  - sanitize-html@1.4.2 in lib/insecurity.ts (extremely outdated, bypasses known)
  missing_controls:
  - Schema-based validation on all REST API endpoints
