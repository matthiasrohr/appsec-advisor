  title: OAuth Implicit Flow Token Exposed in URL Fragment — oauth.component.ts:28
  affected_parameter: access_token
  scenario: The OAuth callback handler at oauth.component.ts:28 calls `parseRedirectUrlParams().access_token`, extracting
    the access token from the URL fragment (hash). This implements the OAuth 2.0 implicit flow (`response_type=token`), which
    places the bearer token directly in the browser URL. The token is persisted in browser history, sent in the HTTP Referer
    header to any external resource loaded on the redirect page, and readable by any JavaScript running on the same page at
    the time of the callback. An attacker who tricks a victim into visiting a malicious page, or who controls any script on
    the origin, can capture the token from `location.hash` and impersonate the victim.
  evidence_summary: '`parseRedirectUrlParams()` splits `this.route.snapshot.data.params` on `&` to extract `access_token`
    from the URL fragment, bypassing the safer authorization code + PKCE flow entirely.'
