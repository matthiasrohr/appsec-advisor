  cwe: CWE-311
  title: Unencrypted SQLite database file at rest (models/index.ts:41)
  affected_parameter: null
  scenario: 'The SQLite database is stored as a plaintext file at `data/juiceshop.sqlite` (models/index.ts:41, `storage: ''data/juiceshop.sqlite''`).
    No encryption at rest is configured — SQLite''s `sqlcipher` extension or equivalent is not in use. Any OS-level user or
    process that can read the file — including the web server process itself if compromised, a co-tenant in a shared hosting
    environment, or an attacker who gains filesystem read access via path traversal — obtains the complete database: all user
    PII (email, lastLoginIp, profileImage), MD5-hashed passwords, security answers, order history, credit card tokens, and
    wallet balances. The file is also written to disk during SQLite''s WAL (write-ahead log) operations, creating additional
    `data/juiceshop.sqlite-wal` and `data/juiceshop.sqlite-shm` files that contain recent transaction data in the clear.'
  evidence_summary: models/index.ts:41 configures the Sequelize SQLite storage as a plaintext file path with no cipher extension
    or encryption option specified.
  impact_description: Complete PII and credential database readable by any process with filesystem access — no cryptographic
    barrier between file access and data exposure.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — OS file permissions only.
  mitigation_title: Enable SQLite encryption at rest using SQLCipher or equivalent
  remediation:
    effort: High
    steps:
    - Replace the `sqlite3` npm package with `@journeyapps/sqlcipher` or `better-sqlite3` with SQLCipher support. Configure
      Sequelize dialect options to pass `PRAGMA key = '<key>'` immediately after connection open.
    - Store the encryption key in an environment variable or secrets manager (AWS Secrets Manager, HashiCorp Vault), never
