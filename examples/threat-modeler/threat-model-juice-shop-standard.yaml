- id: file-system
  name: File System / Upload Storage
  description: Local filesystem used for static file serving (FTP directory exposed publicly), user upload storage (complaints,
    profile images), encryption keys (JWT RSA key committed to repo), and application assets. Multiple intentional path traversal
    and directory listing exposures.
  tier: data
  paths:
  - ftp/**
  - uploads/**
  - encryptionkeys/**
  - routes/fileServer.ts
  - routes/fileUpload.ts
  deployment_zones:
  - data-tier
  handles_sensitive_data: true
  tech: Node.js fs, unzipper, multer, local FS
  complexity: simple
  threat_ids:
  - T-043
  - T-066
  - T-067
- id: chatbot-llm
  name: LLM Chatbot (AI-SDK OpenAI-Compatible)
  description: Customer service chatbot powered by an OpenAI-compatible LLM API via @ai-sdk/openai-compatible. The system
    prompt includes confidential business rules (discount policy). Vulnerable to prompt injection. LLM URL configurable via
    application config — potential SSRF. Exposes tool-calling interface to the LLM with database query capabilities.
  tier: application
  paths:
  - routes/chat.ts
  deployment_zones:
  - application-tier
  handles_sensitive_data: true
  tech: '@ai-sdk/openai-compatible, configurable LLM endpoint'
  complexity: moderate
  threat_ids:
