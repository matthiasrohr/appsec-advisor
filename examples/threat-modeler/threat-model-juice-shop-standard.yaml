  cwe: CWE-400
  title: Event-loop blocking DoS — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: An authenticated attacker (or one who forged a JWT) submits POST /b2b/v2/orders with `orderLinesData` set to an
    infinite loop such as `while(true){}`. The `vm.runInContext` call at b2bOrder.ts:23 blocks Node.js's single event loop
    thread for the full 2-second timeout before the script-execution-timed-out error fires. During those 2 seconds, all other
    HTTP requests queue. By sending concurrent requests at a rate exceeding one per 2 seconds, an attacker can keep the event
    loop perpetually blocked, causing 503 responses for all users. No rate limiting is applied to `/b2b/v2/orders`.
  evidence_summary: b2bOrder.ts:23 calls vm.runInContext with a 2-second timeout; the Node.js VM module runs synchronously
    and blocks the event loop for the full timeout duration on CPU-bound payloads.
  impact_description: Full application-level denial of service — the Juice Shop becomes unresponsive to all concurrent users
    for the duration of the attack.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 2-second vm timeout (insufficient — blocks event loop synchronously)
  mitigation_title: Add rate limiting to POST /b2b/v2/orders and move expression evaluation off the main event loop
  remediation:
