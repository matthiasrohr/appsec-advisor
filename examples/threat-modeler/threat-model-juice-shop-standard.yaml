- local_id: ci-cd-pipeline-004
  threat_category_id: TH-14
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-494
  title: Heroku CLI installed — ci.yml:326
  affected_parameter: curl https://cli-assets.heroku.com/inst…
  scenario: The `heroku` job in ci.yml installs the Heroku CLI by piping the installer script directly to `sh` without any
    integrity check (line 326). This pattern is vulnerable to MITM attacks against the Heroku CDN, DNS hijacking of `cli-assets.heroku.com`,
    or a supply-chain compromise of Heroku's asset delivery infrastructure. The injected code runs with the full permissions
    of the CI runner, which also holds `secrets.HEROKU_API_KEY` injected two steps later. An attacker delivering a trojaned
    installer gains immediate access to the Heroku deployment credential and can deploy arbitrary code to the production Juice
    Shop Heroku instance (`juice-shop` app on master branch, `juice-shop-staging` on develop).
  evidence_summary: ci.yml line 326 runs `curl https://cli-assets.heroku.com/install.sh | sh` without checksum verification,
    in the same job that subsequently uses HEROKU_API_KEY.
  impact_description: A compromised Heroku CLI install script gains access to HEROKU_API_KEY and can deploy arbitrary code
    to the production Heroku environment.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: The heroku job is conditioned on `github.repository == 'juice-shop/juice-shop'`, preventing execution
    on forks.
  mitigation_title: Replace curl-pipe Heroku CLI install with pinned GitHub Action or checksum-verified download
  remediation:
    effort: Low
    steps:
    - Replace the `curl | sh` install pattern with the official `akhileshns/heroku-deploy` action already present in the same
      job — it bundles the CLI internally, removing the need for a separate install step.
    - 'Alternatively, pin the Heroku CLI to a specific version and verify its SHA256 checksum: `curl -fsSL https://cli-assets.heroku.com/heroku-linux-x64.tar.gz
      -o heroku.tar.gz && echo ''<sha256>  heroku.tar.gz'' | sha256sum -c`.'
    - If the separate install step is required, use a pre-built GitHub Action for Heroku CLI setup pinned to a commit SHA.
    code_example: "# Remove the Install Heroku CLI step entirely since akhileshns/heroku-deploy\n# bundles the CLI. If needed\
      \ standalone:\n- name: Install Heroku CLI\n  run: |\n    VERSION=8.11.5\n    SHA256=<known-good-sha256>\n    curl -fsSL\
      \ https://cli-assets.heroku.com/channels/stable/heroku-linux-x64.tar.gz -o heroku.tar.gz\n    echo \"$SHA256  heroku.tar.gz\"\
      \ | sha256sum -c\n    tar xzf heroku.tar.gz"
    reference: CWE-494
