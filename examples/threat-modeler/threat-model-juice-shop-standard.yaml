trust_boundaries:
- id: tb-1
  name: Public Internet to Application Host
  from: external
  to: backend-api
  enforcement: deployment-time perimeter controls out of scope for source-tree review
  weakness: Missing global rate limiting; wildcard CORS; no mutual TLS; no IP allowlist
- id: tb-2
  name: Express Middleware to Route Handlers
  from: backend-api
  to: backend-api
  enforcement: express-jwt 0.1.3 validates JWT presence on protected routes. Role checks via isAuthorized(), isAccounting()
    helpers in lib/insecurity.ts.
  weakness: express-jwt 0.1.3 accepts alg:none — unsigned tokens bypass signature verification. Role field is in the JWT payload
    and trusts the token claim without server-side validation.
- id: tb-3
  name: Application Logic to SQLite Database
  from: backend-api
  to: data-persistence
  enforcement: Sequelize ORM uses parameterized queries on most routes. In-process SQLite — no network crossing, no database
    credentials required.
  weakness: 'routes/login.ts:34 bypasses ORM with raw string interpolation: SELECT * FROM Users WHERE email = ''${req.body.email}''.
    Mass-assignment via Sequelize model with user-controlled fields on registration.'
- id: tb-4
  name: Application Logic to MarsDB
  from: backend-api
  to: data-persistence
  enforcement: MarsDB MongoDB-style API for product reviews. In-process, no network crossing.
  weakness: 'Query object built from user-supplied keys — NoSQL injection via object key manipulation (e.g., {$gt: ''''} instead
    of string value).'
- id: tb-5
  name: Application to VM Sandbox (B2B eval)
  from: b2b-api
  to: backend-api
  enforcement: notevil sandbox wraps vm.runInContext() call in routes/b2bOrder.ts:23. Designed to restrict safeEval() to arithmetic
    expressions.
  weakness: notevil sandbox is defeated by prototype pollution. An attacker can escape the sandbox by crafting orderLinesData
    to pollute Object.prototype, achieving arbitrary code execution in the Node.js process.
- id: tb-6
  name: Application to Local Filesystem (serve-index)
  from: backend-api
  to: external
  enforcement: serve-index middleware serves ftp/ and encryptionkeys/ with HTTPS GET. uploads/ is the file upload write target.
  weakness: ZIP path traversal check uses includes() not strict prefix match (routes/fileUpload.ts:43). Public directory listing
    exposes all ftp/ contents and the JWT public key.
- id: tb-7
  name: Browser SPA to Express Backend
  from: frontend-spa
  to: backend-api
  enforcement: JWT bearer token in Authorization header. HTTPS transport assumed in production. Angular route guards protect
    client-side navigation.
  weakness: JWT stored in localStorage — any XSS steals the session. Angular guards only protect frontend navigation, not
    the underlying API. express-jwt 0.1.3 accepts alg:none.
- id: tb-8
  name: GitHub Actions to Production Secrets
  from: ci-cd-pipeline
  to: external
  enforcement: GITHUB_TOKEN scoped to the workflow run. DOCKER_TOKEN stored as GitHub Actions secret. Actions use SHA-pinned
    refs on most workflows.
  weakness: 10 of 13 workflows lack a permissions block — GITHUB_TOKEN defaults to write-all. CodeQL actions use mutable @v3
    tags. No package-lock.json committed (non-deterministic dependency resolution). pull_request_target trigger in pr-compliance.yml
    with write permissions.
