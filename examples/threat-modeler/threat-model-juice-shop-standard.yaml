  mitigation_fingerprints:
  - 'establish supply-chain hygiene program: pin all deps, images, and actions'
  - enforce authentication middleware on all non-public api routes
  - replace raw sql concatenation with a parameterized sequelize query on the login route
  - rotate jwt signing key and load it from a secret manager or environment variable
  - 'always pass `algorithms: [''rs256'']` as the third argument''s options object to jwt.verify.'
  - remove bypasssecuritytrusthtml from administration.component.ts and render user/feedback data as plain text
  - replace md5 with bcrypt or argon2id and re-hash existing passwords on next login
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - replace raw sql template literal with sequelize parameterized query in searchproducts
  - restrict /encryptionkeys to authenticated admin requests and remove directory listing
  - disable external entity resolution and filesystem providers in libxml2-wasm xml parsing
  - pin allowed jwt algorithms to rs256 in express-jwt and upgrade to a supported version
  - apply an allowlist filter before passing the body to any model, and strip privilege fields before persistence.
  - remove eval from userprofile route; use safe template substitution for username rendering
  - sanitize zip entry paths with path.basename and enforce strict prefix check in extractzipbuffer
  - exclude the role attribute from the finale user auto-model and enforce server-side default in usermodel
  - replace oauth implicit flow with authorization code flow and pkce in oauth.component.ts
  - replace security-question reset with email otp verification and enforce rate limit by real ip
  - add security.isauthorized middleware to post /rest/chat route registration
  - validate origin header and require session token on websocket upgrade in registerwebsocketevents.ts
  - require ecdsa signature-over-nonce proof of wallet ownership before accepting nft mint claims
  - load hmac key from environment variable and adopt bcrypt or argon2id for security answer hashing
  - commit package-lock.json and switch ci installs to npm ci
  - pin all third-party github actions to full commit sha in image_actions.yml and ci.yml
  - add --ignore-scripts to production npm install in dockerfile, validate postinstall necessity
  - disable external entity resolution in the xml parser used by handlexmlupload
  - replace $where javascript evaluation with a parameterized mongodb equality query in getproductreviews
  - sanitize or quote the username before interpolating it into the system prompt
  - enforce server-side discount cap in generatecoupon tool and validate message roles before llm dispatch
  - require authenticated session before processing challenge-verification socket events in registerwebsocketevents.ts
  - scope notification acknowledgements to the owning authenticated session in registerwebsocketevents.ts
  - replace $where javascript operator with a typed equality filter in showproductreviews
  - replace $where string concatenation with a typed equality filter in trackorder
  - validate review _id as a string literal and remove multi:true from updateproductreviews
  - replace url.includes with strict prefix or exact-match validation in isredirectallowed
  - add structured security audit logging to all file-serving and file-upload handlers
  - encrypt totp secrets at rest using field-level encryption before storing in the users table
  - set httponly, secure, and samesite=strict on the session cookie and remove localstorage token storage
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - commit package-lock.json; use `npm ci` in ci
  - restrict /support/logs to authenticated admin users by adding isauthorized and admin role guard
  - validate imageurl against an allowlist of schemes and block private/internal ip ranges before fetch
  - remove sensitive files from the public ftp directory and add authentication to directory browsing
  - remove sensitive business policy from the llm system prompt and enforce it in application code
  - scope challenge solved notifications to the authenticated session that triggered the solve in challengeutils.ts
  - remove the sqlite_master schema-check from the production search handler
  - encrypt the sqlite database file using sqlcipher or os-level disk encryption
  - move mnemonic/private key to an environment variable or secrets manager and remove from source
  - add express-rate-limit middleware to post /rest/user/login
  - remove x-forwarded-for from rate-limit key generation and use socket ip or authenticated user id
  - add github membership or permission check before executing rebase in rebase.yml
  - fix rate limit key generator to use req.ip instead of raw x-forwarded-for header
  - apply global rate limiting middleware to all rest api routes using express-rate-limit
  - add rate limiting to /file-upload and enforce per-ip concurrency ceiling for xml/yaml processing
  - apply per-ip rate limiting and maxtokens cap to the post /rest/chat endpoint
  - add per-connection event rate limiting and cap maxhttpbuffersize on the socket.io server in registerwebsocketevents.ts
  - remove the global.sleep busy-wait from production code and replace $where with a typed filter
  - add rate limiting and a maximum capacity cap to walletsconnected set with ttl-based eviction
  - move admin route authorization to a server-side session check in app.guard.ts
  - implement server-side token revocation on logout by removing the token from authenticatedusers
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark
    the route intentionally public via app.get for read-only access only.
  - 'add explicit permissions: read-all at top level and grant write only where required in all workflows'
  - remove dynamic code evaluation from b2b order endpoint; replace with schema-validated order line parsing
  - add isauthorized and admin role check to get /rest/admin/application-configuration
  - make current password verification mandatory in changepassword handler
  - enforce file-type rejection in checkfiletype — return 415 for disallowed extensions
  - add server-side discount cap with z.number.max and clamp in generatecoupon execute
  - add isauthorized middleware to all /rest/web3/* endpoints requiring authenticated users
  - include jwt in socket.io handshake auth and validate it server-side in socket-io.service.ts
  - pin dockerfile base images to digest in dockerfile and docker-compose.test.yml
  - add user <non-root-uid> to smoke test dockerfile
