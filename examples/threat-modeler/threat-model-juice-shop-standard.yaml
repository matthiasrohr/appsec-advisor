  title: Password Change Bypass Without Current Password (routes/changePassword.ts:39)
  affected_parameter: current
  scenario: 'routes/changePassword.ts:39 checks `if (currentPassword && security.hash(currentPassword) !== loggedInUser.data.password)`
    — the condition only validates the current password when it is provided. If `currentPassword` is absent (or empty), the
    block is skipped entirely and the new password is set unconditionally. An attacker with a valid session token (obtained
    via XSS, token theft, or session fixation) can change the victim''s password to a new value by omitting the `current`
    query parameter: `GET /rest/user/change-password?new=attacker&repeat=attacker`. The victim is locked out permanently.'
  evidence_summary: routes/changePassword.ts:39 uses `if (currentPassword && ...)` — a falsy `currentPassword` (absent or
    empty string) short-circuits the check, allowing password change without verification.
  impact_description: An attacker with a stolen JWT or session cookie can permanently change the victim's password and lock
    them out of their account.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 'Route requires a valid `Authorization: Bearer=<token>` header — reduces to authenticated-attacker scenario
    (CSRF, XSS, token theft).'
  mitigation_title: Require current password unconditionally in changePassword and reject requests where it is missing
  remediation:
    effort: Low
    steps:
    - 'Change the guard at routes/changePassword.ts:39 from `if (currentPassword && security.hash(currentPassword) !== loggedInUser.data.password)`
      to an unconditional block: first check `if (!currentPassword) return res.status(401).send(''Current password required.'')`,
