  title: Security Relevant Events Not Written to Audit Log routes/login.ts, routes/reset…
  scenario: Authentication events (successful login, failed login, password reset) are processed in `routes/login.ts` and
    `routes/resetPassword.ts` without any call to `logger.*` or an audit sink. The only logging is the HTTP access log via
    Morgan (combined format, line 338 of server.ts), which records request method/path/IP/status but not the authenticated
    user identity, the account targeted, or the success/failure of the authentication decision. An attacker who compromises
    an account can deny the action, and incident responders have no forensic record of which accounts were accessed, when,
    and from where. Admin actions such as toggling delivery status (server.ts:623), deleting users, or modifying products
    also lack audit entries.
