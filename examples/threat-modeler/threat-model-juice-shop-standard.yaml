- local_id: file-upload-service-001
  threat_category_id: TH-01
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-611
  title: XXE File Read — routes/fileUpload.ts:83
  affected_parameter: uploaded .xml file body
  scenario: 'An unauthenticated attacker POSTs a crafted XML file to `/file-upload` containing an external entity declaration
    such as `<!ENTITY xxe SYSTEM "file:///etc/passwd">`. Because `libxmljs2.parseXml()` is invoked with `noent: true` at line
    83, the external entity is resolved by the XML parser. The resolved file content is then embedded in the XML document,
    and `xmlDoc.toString(false)` at line 84 returns it. At line 87 the handler constructs an error message that includes up
    to 400 characters of the XML string via `utils.trunc(xmlString, 400)` and returns it directly in the HTTP 410 response
    body. The attacker reads server-side files (e.g. `/etc/passwd`, application config files) from the response without any
    authentication.'
