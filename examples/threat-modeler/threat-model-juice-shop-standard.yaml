  title: Mutable-branch action reference — image_actions.yml:33
  affected_parameter: 'uses: calibreapp/image-actions@main'
  scenario: The `image_actions.yml` workflow consumes `calibreapp/image-actions@main` (line 33) and `peter-evans/create-pull-request@v8`
    (line 43) — both are mutable references resolved at runtime. A threat actor who gains push access to the upstream `main`
    branch of `calibreapp/image-actions` can silently replace the action's code; on the next CI run the runner fetches the
    tampered version while the workflow YAML appears unchanged. Because no commit SHA is pinned, the CI pipeline cannot distinguish
    the authentic action from a substituted one. The `peter-evans/create-pull-request` step then runs with `GITHUB_TOKEN`
    write access, so the spoofed action can create PRs with arbitrary content in the juice-shop repository.
  evidence_summary: '`image_actions.yml:33` references `calibreapp/image-actions@main` — a mutable branch tag — granting a
    compromised upstream maintainer transparent code-execution authority in the CI runner without any change to the workflow
    file.'
  impact_description: Arbitrary code executes in a CI runner with access to `GITHUB_TOKEN` (write scope), enabling repository
    writes, PR creation, and lateral movement to other workflow-exposed secrets.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Job is conditioned on `github.repository == 'juice-shop/juice-shop'` (line 24), limiting execution to
    the canonical repo. No SHA pin prevents substitution.
  mitigation_title: Pin all third-party GitHub Actions to immutable commit SHAs
  remediation:
    effort: Low
    steps:
    - 'For every `uses:` directive in all workflow files, replace the tag or branch reference with the full 40-character commit
      SHA of the release you intend to use. Example: `calibreapp/image-actions@main` → `calibreapp/image-actions@<sha>`.'
    - Run `gh release list --repo calibreapp/image-actions` to identify the latest stable release, then `git ls-remote https://github.com/calibreapp/image-actions
      refs/heads/main` to obtain the current SHA.
    - Add a Dependabot entry for `github-actions` ecosystem (addresses IAC-031) so pinned SHAs receive automated update PRs.
    - Apply the same fix to `peter-evans/create-pull-request@v8`, `coverallsapp/github-action@v2`, `github/codeql-action/*@v3`,
      and `actions/checkout@v6` in `image_actions.yml`.
    code_example: '```yaml

      # image_actions.yml — before

      uses: calibreapp/image-actions@main


      # after — pin to a specific commit SHA

      uses: calibreapp/image-actions@efbe54bb315cae4ce86a3862e8c9d5ef4c2a43c0 #v1.1.0

      ```'
