  title: Server-Side Template Injection — routes/userProfile.ts:61
  affected_parameter: username
  scenario: The user profile page renderer at routes/userProfile.ts:54-67 checks whether the stored username matches `#{(.*)}`
    and, if so, evaluates the captured group with `eval(code)` at line 61. Any authenticated user who updates their username
    to `#{require('child_process').execSync('id').toString()}` will cause the server to execute that expression when the profile
    page is rendered. Because `eval()` runs in the Node.js process context, this is a full RCE primitive.
  evidence_summary: routes/userProfile.ts:61 calls `eval(code)` where `code` is extracted from the username field via regex;
    any user with update-profile access can inject arbitrary JavaScript.
  impact_description: Any authenticated user can achieve full server-side code execution within the Node.js process, enabling
    exfiltration of secrets, modification of data, or lateral movement.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: The eval branch is gated on `utils.isChallengeEnabled(challenges.usernameXssChallenge)`, which defaults
    to true in the challenge application.
  mitigation_title: Remove eval() from the user profile renderer and use a sandboxed template engine with strict output escaping
  remediation:
    effort: Medium
    steps:
    - Remove the `#{(.*)}` pattern matching and `eval(code)` block at routes/userProfile.ts:54-67.
    - Use Pug's built-in interpolation (`#{username}`) with HTML escaping rather than pre-processing the template string with
      raw eval.
    - Validate that usernames stored in the database cannot contain backtick expressions or template syntax — apply a server-side
      regex allowlist on the username field at registration and update time.
    code_example: '// Unsafe pattern to remove:

      // if (username?.match(/#\{(.*)\}/) !== null) {

      //   username = eval(code)

      // }

      // Safe: pass username directly to pug template with escaping

      // In userProfile.pug: p= username  (auto-escapes)'
    reference: CWE-94
