  cwe: CWE-200
  title: CTF Flag Broadcast to All Unauthenticated WebSocket — lib/challengeUtils.ts:75
  affected_parameter: challenge solved event payload
  scenario: When any challenge is solved, `globalWithSocketIO.io.emit('challenge solved', notification)` at challengeUtils.ts:75
    broadcasts to every connected socket. The notification payload includes `flag` (the CTF flag value from `ctfFlag(challenge.name)`),
    `challenge.name`, and the decoded `challenge.description`. Any client that opens a WebSocket connection — without any
    authentication — receives these values in real time. Additionally, every new connection immediately receives the full
    historical notification list (registerWebsocketEvents.ts:29-31), replaying all previously solved challenges' flags.
  evidence_summary: '`io.emit(''challenge solved'', notification)` at challengeUtils.ts:75 broadcasts the `flag` field to
    every socket without checking if the recipient is the challenge solver or even authenticated.'
  impact_description: An unauthenticated attacker receives CTF flags for challenges solved by any user, trivially winning
    all CTF points without performing any challenge.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — the `hidden` field on notifications controls UI rendering client-side but does not suppress the
    server-side broadcast.
  mitigation_title: Scope challenge solved notifications to the authenticated session that triggered the solve in challengeUtils.ts
  remediation:
    effort: Medium
    steps:
    - Replace `io.emit('challenge solved', notification)` with `socket.emit(...)` targeting only the socket of the user who
      solved the challenge, using a per-user socket registry keyed by userId.
    - Require socket authentication (per realtime-channel-001/002) before emitting any notification, so the recipient is always
      an identified session.
    - Omit the `flag` field from the broadcast entirely when `config.get('ctf.enabled')` is false.
