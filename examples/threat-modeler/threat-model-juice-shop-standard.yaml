      real admin capabilities, but eliminating the client-side role check removes the confusion.
    - 'Use `canActivate` with an async observable that calls the backend: `this.userService.whoAmI().pipe(map(user => user.role
      === ''admin'' || this.router.createUrlTree([''/403''])))`.'
