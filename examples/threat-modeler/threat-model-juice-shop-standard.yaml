- local_id: angular-frontend-007
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: 'Architectural Anti-Pattern: JWT Session Token — request.interceptor.ts:13'
  affected_parameter: token
  scenario: 'The HTTP request interceptor at request.interceptor.ts:13–16 reads the JWT from `localStorage.getItem(''token'')`
    and attaches it as the `Authorization: Bearer` header on every API request. localStorage is readable by any JavaScript
    running on the same origin. Given the multiple XSS vulnerabilities present in this component (search query, feedback rendering,
    admin panel), any successful XSS exploitation leads directly to `localStorage.getItem(''token'')` being exfiltrated, achieving
    full session theft. This is the SPA-without-BFF architectural anti-pattern: session tokens should reside in `httpOnly
    Secure SameSite=Strict` cookies managed by a backend-for-frontend, making them inaccessible to injected scripts.'
  evidence_summary: '`RequestInterceptor.intercept()` at line 13 reads the JWT from `localStorage` — a JavaScript-accessible
    store — and uses it as the session credential on all API calls.'
  impact_description: Any successful XSS attack on this SPA results in complete session token exfiltration, giving the attacker
    persistent authenticated access as the victim.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Token is also stored in a cookie (`cookieService.put('token', ...)`) per oauth.component.ts:50, but the
    primary transport mechanism is the Authorization header populated from localStorage.
  mitigation_title: Migrate JWT session to httpOnly Secure cookies via a Backend-for-Frontend (BFF) in Angular SPA
  remediation:
    effort: High
    steps:
    - 'Introduce a Backend-for-Frontend (BFF) layer: the Angular SPA authenticates through the BFF, which holds the JWT server-side
      and issues a session via `Set-Cookie: token=...; HttpOnly; Secure; SameSite=Strict`.'
    - Update the HTTP interceptor to remove the `Authorization` header injection from localStorage; the browser automatically
      sends the `httpOnly` cookie on same-site requests.
    - Remove `localStorage.setItem('token', ...)` from all components (oauth.component.ts, login components) — the token never
      reaches JavaScript.
    - 'Add `withCredentials: true` to Angular''s `HttpClientModule` configuration to ensure the session cookie is sent on
      API requests.'
    code_example: null
    reference: CWE-922
  evidence:
  - file: frontend/src/app/Services/request.interceptor.ts
    line: 13
  evidence_check: verified
