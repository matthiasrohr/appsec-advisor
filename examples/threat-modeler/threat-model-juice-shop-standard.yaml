  cwe: CWE-602
  title: Client-side-only admin and accounting route guards — app.guard.ts:52
  affected_parameter: payload.data.role
  scenario: 'The `AdminGuard.canActivate()` (app.guard.ts:52–57) and `AccountingGuard.canActivate()` (app.guard.ts:64–74)
    decode the JWT from `localStorage` using `jwtDecode` — which performs no signature verification — and compare `payload.data.role`
    to the expected role string. A user who modifies the `localStorage` token value (trivially possible from browser DevTools),
    constructs a forged JWT with `alg: none` accepted by the server, or obtains another user''s token can pass the client-side
    guard. While the server''s API endpoints should independently enforce role checks, the client-side guard is the only visible
    barrier to rendering admin-only UI components and is trivially bypassed without network interaction. Notably, `LoginGuard.canActivate()`
    (line 17–24) trusts the mere *presence* of a `token` key in localStorage, not its validity.'
  evidence_summary: app.guard.ts:52–54 resolves role authorization by calling `this.loginGuard.tokenDecode()` (which uses
    `jwtDecode` without signature verification) and comparing the payload's `role` claim client-side.
  impact_description: An attacker can render admin-panel UI components without a valid admin JWT, exposing admin interface
    affordances; combined with a server-side authorization gap, this leads to direct privilege escalation.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Server-side JWT verification is the authoritative check; client-side guards are a secondary UI-only layer
    — but they create a false sense of security and expose UI surface to unprivileged users.
  mitigation_title: Replace client-side role decoding with a server-validated session check; enforce role authorization exclusively
    server-side
  remediation:
    effort: Medium
    steps:
    - In `AdminGuard` and `AccountingGuard`, call a server-side `/rest/user/whoami` or `/api/currentUser` endpoint that returns
      the role from the server-validated JWT; only render admin routes if the server confirms the role.
    - On the server, ensure every `/administration/*` and `/accounting/*` API request validates the JWT signature and the
      role claim via middleware before returning data — the client-side guard is unreliable and must not be the sole enforcement
      point.
    - In `LoginGuard.tokenDecode()`, add a try/catch around `jwtDecode` and validate the `exp` claim client-side to prevent
      obviously expired tokens from passing the presence check.
    code_example: "// Angular guard — server-authoritative role check\ncanActivate(): Observable<boolean> {\n  return this.userService.currentUser().pipe(\n\
      \    map(user => user.role === 'admin'),\n    catchError(() => of(false))\n  )\n}"
    reference: CWE-602
