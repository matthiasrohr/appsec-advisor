- local_id: angular-spa-006
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Bearer Token in localStorage — login.component.ts:101
  affected_parameter: token (JWT)
  scenario: login.component.ts:101 and oauth.component.ts:51 both call `localStorage.setItem('token', authentication.token)`.
    The request interceptor at request.interceptor.ts:13 reads the token back from localStorage for every HTTP request. localStorage
    is readable by any JavaScript executing in the same origin. Combined with the multiple [innerHTML] XSS sinks confirmed
    in this component (search query, feedback, last-login-ip, product description), any successful XSS payload can read `localStorage.getItem('token')`
    and exfiltrate the JWT to an attacker-controlled endpoint. Additionally, localStorage persists across browser sessions
    and is not cleared on tab close.
  evidence_summary: login.component.ts:101 stores the JWT in localStorage; request.interceptor.ts:13 reads it back for all
    API requests; multiple confirmed XSS sinks in this component can read and exfiltrate it.
  impact_description: XSS exfiltration of the JWT from localStorage grants full authenticated access as the victim user, including
    account takeover, order manipulation, and — if the victim is admin — full admin control.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no HttpOnly cookie pattern used for the JWT; ngy-cookie.put('token') at login.component.ts:104
    is also readable by JS.
  mitigation_title: Store session tokens exclusively in HttpOnly Secure SameSite=Strict cookies managed by the server
  remediation:
    effort: High
    steps:
    - Remove `localStorage.setItem('token', ...)` from login.component.ts and oauth.component.ts. Stop reading from localStorage
      in request.interceptor.ts.
    - 'Have the Express backend set the JWT as an HttpOnly Secure SameSite=Strict cookie (`res.cookie(''token'', jwt, { httpOnly:
      true, secure: true, sameSite: ''strict'' })`) on successful login. The browser will include the cookie automatically
      without exposing it to JavaScript.'
    - Remove the Authorization header injection from request.interceptor.ts — rely on the browser to send the HttpOnly cookie.
      The backend must read `req.cookies.token` instead of `req.headers.authorization`.
    - Clear the cookie server-side on logout (`res.clearCookie('token')`) rather than `localStorage.removeItem('token')`.
    code_example: "// Express login route — after\nres.cookie('token', jwt, {\n  httpOnly: true,\n  secure: process.env.NODE_ENV\
      \ === 'production',\n  sameSite: 'strict',\n  maxAge: 8 * 60 * 60 * 1000\n})\nres.json({ status: 'success' })  // no\
      \ token in body"
    reference: CWE-922
  evidence:
