  title: Cross-Site Scripting — search-result.component.ts:143
  affected_parameter: q
  scenario: 'Six distinct call sites invoke `DomSanitizer.bypassSecurityTrustHtml()` on attacker-controllable or server-returned
    data and bind the result to `[innerHTML]`. The highest-impact instances are: (1) `search-result.component.ts:143` applies
    `bypassSecurityTrustHtml(queryParam)` where `queryParam` is taken directly from `route.snapshot.queryParams.q`, creating
    a reflected XSS via `/#/search?q=<script>...` — the value is emitted into `<span id=''searchValue'' [innerHTML]=''searchValue''>`
    in the template. (2) `search-result.component.ts:110` passes API-returned `product.description` through the same bypass
    (stored XSS: inject a malicious description into a product and it executes in every user''s search). (3) `administration.component.ts:91`
    pipes raw `feedback.comment` to `bypassSecurityTrustHtml`, creating stored XSS in the admin panel. (4) `last-login-ip.component.ts:39`
    injects `payload.data.lastLoginIp` from the decoded JWT into `bypassSecurityTrustHtml()` — if the backend stores a poisoned
    IP, this executes in the user''s IP display page.'
  evidence_summary: '`search-result.component.ts:143` writes `bypassSecurityTrustHtml(route.snapshot.queryParams.q)` into
    `[innerHTML]` on the search page, providing a direct reflected XSS path via the `?q=` parameter.'
  impact_description: An attacker can deliver a URL with a crafted `?q=` value to steal the victim's JWT from `localStorage`,
    forge requests, or pivot to account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Angular's default HTML sanitization is present but explicitly disabled at every affected call site via
    `bypassSecurityTrustHtml()`.
  mitigation_title: Remove bypassSecurityTrustHtml calls and use Angular's built-in sanitized binding or an explicit allowlist
    sanitizer
  remediation:
    effort: Medium
    steps:
    - Replace every `bypassSecurityTrustHtml(userInput)` binding with Angular's default `{{ }}` interpolation or a sanitized
      `[innerHTML]` where the value is passed through `DomSanitizer.sanitize(SecurityContext.HTML, value)` instead of the
      bypass.
    - For cases where rich HTML is genuinely needed (e.g. product descriptions), use a server-side allowlist sanitizer (e.g.
      `sanitize-html` with a strict allowlist) before storing in the database, rather than trusting client-side bypass.
    - Specifically for `search-result.component.ts:143`, replace `bypassSecurityTrustHtml(queryParam)` with `{{ queryParam
      }}` — the query string is plain text and does not require HTML rendering.
    - 'Add a Content Security Policy header (`Content-Security-Policy: default-src ''self''; script-src ''self''`) in the
      Express server response to reduce the XSS blast radius even when bypass calls remain.'
    code_example: '// Before (unsafe)

      this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam);


      // After (safe — plain text interpolation in template)

      // template: <span id="searchValue">{{ searchValue }}</span>

      this.searchValue = queryParam; // let Angular escape it'
    reference: CWE-79
