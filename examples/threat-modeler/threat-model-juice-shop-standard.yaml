- local_id: data-persistence-002
  threat_category_id: TH-06
  additional_categories: []
  stride: Tampering
  cwe: CWE-915
  title: Mass-assignment of role field enables privilege escalation — models/user.ts:80
  affected_parameter: role
  scenario: 'The `UserModel` declares the `role` field at `models/user.ts:80` with a `validate.isIn` constraint but no setter-side
    block that prevents external callers from supplying the field. Any route handler that calls `UserModel.create(req.body)`
    or `UserModel.update(req.body, { where: { id: userId } })` without explicitly excluding the `role` key will persist an
    attacker-supplied role value (e.g., `role: ''admin''`). The `set()` handler at line 86 reads the role value to adjust
    the profile image but does NOT reject or sanitize the incoming role — it only updates `profileImage` as a side-effect.
    Because Sequelize 6 does not automatically strip undeclared/protected fields, and because the model exposes `role` as
    a first-class writable field, any endpoint using bulk-assignment against the User model is vulnerable.'
  evidence_summary: '`role` at `models/user.ts:80` is declared as a writable field with only an `isIn` range validator; no
    `readOnly` or explicit allowlist prevents external callers from overriding it.'
  impact_description: An authenticated user can elevate their own account to `admin` or `accounting` roles by including `role`
    in a profile-update request body.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Sequelize `validate.isIn` checks that the value is one of the four permitted roles — but does not prevent
    a customer from self-assigning the `admin` role.
  mitigation_title: Enforce server-side field allowlist before every Sequelize User write to exclude the role field
  remediation:
    effort: Low
    steps:
    - In every route handler that creates or updates User records, explicitly pick only the allowed fields from `req.body`
      using a fixed allowlist (e.g., `const allowed = _.pick(req.body, ['username', 'email', 'password', 'profileImage'])`).
    - Add a Sequelize `beforeUpdate` / `beforeCreate` hook in `models/user.ts` that throws if `role` is set to a value other
      than `'customer'` for a non-admin caller context.
    - Consider marking `role` with a Sequelize virtual-field setter that validates the caller's current role before allowing
      promotion.
    - 'Add an integration test that POSTs `{role: ''admin''}` to the user creation endpoint and asserts the role is stored
      as `''customer''`.'
    code_example: '// Route handler — safe field extraction

      import _ from ''lodash''

      const safeFields = _.pick(req.body, [''username'', ''email'', ''password'', ''profileImage''])

      await UserModel.update(safeFields, { where: { id: req.user.data.id } })'
    reference: CWE-915
  evidence:
  - file: models/user.ts
    line: 80
  evidence_check: verified
  controls_absent_evidence: []
