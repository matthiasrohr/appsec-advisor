  title: Stored XSS — last-login-ip.component.ts:39
  affected_parameter: lastLoginIp
  scenario: last-login-ip.component.ts:39 wraps the JWT claim payload.data.lastLoginIp in HTML and passes it through bypassSecurityTrustHtml,
    then binds it to [innerHTML]="lastLoginIp" (last-login-ip.component.html:10). The lastLoginIp value originates from a
    client-supplied request header (commonly X-Forwarded-For / True-Client-IP) recorded server-side and embedded back into
    the JWT, so an attacker who logs in with a forged IP header containing '<img src=x onerror=...>' achieves persistent XSS
    that fires whenever they (or, in admin-review contexts, a staff member) view the last-login-IP panel. The bypassSecurityTrustHtml
    call removes Angular's escaping on this attacker-influenced value.
