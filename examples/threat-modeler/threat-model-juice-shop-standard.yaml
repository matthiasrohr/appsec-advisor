    Morgan records IP, method, URL, status code, and user agent — but not the authenticated user identity, the specific resource
    mutated, or the outcome of authorization checks. An attacker who exploits the admin mass-assignment bug (express-backend-006)
    or the JWT algorithm confusion (express-backend-001) and performs admin-level actions (deleting users, exporting data,
    modifying orders) leaves no traceable identity in the logs. Post-incident forensics cannot reconstruct which user performed
    which action, because the authenticated user ID is never written to any log.
