- domain: Identity and Authentication
  control: Password Reset
  kind: mechanism
  effectiveness: Weak
  implementation: 'Detected in scope: POST /rest/user/reset-password'
  evidence: POST /rest/user/reset-password
  main_reason: Password Reset is present but was not in the Phase-8 control catalog; rated from linked finding(s).
  auto_source: auth-coverage
  linked_threats:
