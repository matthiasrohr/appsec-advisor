  title: YAML Bomb Denial of Service — routes/fileUpload.ts:109
  affected_parameter: file
  scenario: The YAML file upload handler at routes/fileUpload.ts:101-131 parses uploaded YAML with `yaml.load(data)` inside
    a `vm.runInContext()` sandbox with a 2-second timeout. A YAML bomb (exponentially aliased anchors, e.g. billion-laughs)
    causes `js-yaml` to expand a kilobyte-sized input into gigabytes of objects in memory before the timeout fires, crashing
    or severely degrading the Node.js process. The handler catches `'Invalid string length'` as an indicator but memory exhaustion
    occurs before the string length check.
  evidence_summary: 'routes/fileUpload.ts:109 calls `vm.runInContext(''JSON.stringify(yaml.load(data))'', sandbox, { timeout:
    2000 })` where `data` is the raw buffer of an attacker-supplied YAML file; no YAML safe-load or anchor-depth limit is
    applied.'
  impact_description: A single malicious YAML file upload can exhaust the Node.js process heap and cause a server crash or
    prolonged unavailability.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 2-second vm execution timeout; catches 'Script execution timed out' error string. Does not prevent memory
    expansion before timeout.
  mitigation_title: Replace js-yaml full load with safe-load and enforce anchor expansion limits
  remediation:
    effort: Low
    steps:
    - 'Replace `yaml.load(data)` at routes/fileUpload.ts:109 with `yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })` which
      disables type coercion, or better, reject YAML uploads entirely if the deprecated interface is being discontinued.'
    - Add a file size cap specifically for YAML uploads (e.g. 10 KB) in addition to the existing 200 KB multer limit.
    - Consider using `yaml.safeLoad()` (js-yaml v3) or ensuring YAML anchors are limited via a schema validator that counts
      alias expansion depth.
    code_example: "// routes/fileUpload.ts — safer YAML parsing\nconst parsed = yaml.load(data, {\n  schema: yaml.FAILSAFE_SCHEMA,\
      \  // no tags, no expansion\n  onWarning: () => {} // suppress warnings\n})"
