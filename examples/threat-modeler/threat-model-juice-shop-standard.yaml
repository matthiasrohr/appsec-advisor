    accepted: `io.use((socket, next) => { const token = socket.handshake.auth.token || socket.handshake.headers[''authorization''];
    if (!verifyToken(token)) return next(new Error(''unauthorized'')); next(); });`. Pass the authenticated user identity
    (`socket.data.userId`) from the middleware into each event handler so handlers can verify that the acting user owns the
    relevant challenge state. Replace the hardcoded `cors: { origin: ''http://localhost:4200'' }` with a runtime-configurable
