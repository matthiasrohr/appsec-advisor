  title: Unpinned GitHub Actions — image_actions.yml:33
  affected_parameter: null
  scenario: '`image_actions.yml:33` references `calibreapp/image-actions@main` and line 43 references `peter-evans/create-pull-request@v8`.
    The `@main` tag is a moving pointer; the `@v8` tag can be force-pushed by the action maintainer at any time. An attacker
    who compromises either GitHub account or supply-chain infrastructure can update the pointed commit to execute arbitrary
    code in the CI runner. The runner has access to `secrets.GITHUB_TOKEN` (line 35), which grants write permissions to the
    repository. The same workflow also uses `actions/checkout@v6` (line 30) instead of a SHA-pinned reference. `ci.yml:188`
    uses `coverallsapp/github-action@v2` (tag-only) which also receives `secrets.GITHUB_TOKEN`.'
  evidence_summary: '`image_actions.yml:33` pins `calibreapp/image-actions@main` (mutable branch pointer, not a commit SHA);
    `image_actions.yml:43` pins `peter-evans/create-pull-request@v8` (tag, not SHA); both steps pass `secrets.GITHUB_TOKEN`
    to the action.'
  impact_description: A supply-chain compromise of any unpinned action executes attacker-controlled code in the CI runner
    with repository write access, enabling code injection, secret exfiltration, or malicious release artifact production.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Most other actions in ci.yml and release.yml are SHA-pinned. The image_actions.yml workflow is restricted
    to the canonical juice-shop/juice-shop repository and excludes fork PRs (line 24-27).
  mitigation_title: Pin all third-party GitHub Actions to full commit SHA in image_actions.yml and ci.yml
  remediation:
    effort: Low
    steps:
    - Replace `calibreapp/image-actions@main` with `calibreapp/image-actions@<full-SHA>` — find the current HEAD SHA via `git
      ls-remote https://github.com/calibreapp/image-actions refs/heads/main`.
    - 'Replace `peter-evans/create-pull-request@v8` with the corresponding SHA, e.g., `peter-evans/create-pull-request@<SHA>
      #v8`.'
    - Replace `actions/checkout@v6` in `image_actions.yml:30` with the SHA used in other workflows (`11bd71901bbe5b1630ceea73d27597364c9af683`
      for v4.2.2, or verify latest v6 SHA).
    - Replace `coverallsapp/github-action@v2` in `ci.yml:188` with its pinned SHA.
    - Add Dependabot `github-actions` updates (`.github/dependabot.yml`) to automate SHA bump PRs when upstream actions release
      new versions.
    - Consider running `tj-actions/changed-files` or similar tooling to audit all workflow files for mutable references as
      a CI gate.
    code_example: '# Before

