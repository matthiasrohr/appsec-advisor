  cwe: CWE-778
  title: Missing Security Event Logging — routes/chat.ts:184
  scenario: 'The `generateCoupon` tool at `routes/chat.ts:181-185` generates discount coupons and returns them to callers
    without emitting any structured security log entry. The only observability signal is a Prometheus counter increment at
    line 227 (`metricToolCalls.labels({ tool: event.toolName }).inc()`), which records that a tool was called but not who
    called it, what arguments were used, what coupon code was issued, or what the preceding conversation contained. An attacker
    who successfully injects a prompt to generate a 50% coupon (`chatbotGreedyInjectionChallenge`) can apply it at checkout,
    and the only post-hoc trace available is the coupon code itself in the orders table — with no linkage to the chat session,
    the user account, or the injected messages that triggered it. `logger.warn()` at lines 211 and 263 fires only on transport
    errors, not on business-logic events.'
  evidence_summary: '`routes/chat.ts:184` calls `security.generateCoupon(discount)` and returns the code to the client; no
    `logger.info()` or structured audit record is emitted for this security-relevant event.'
  impact_description: Coupon abuse via prompt injection cannot be forensically reconstructed after the fact, preventing incident
    response and abuse pattern detection.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Prometheus tool-call counters provide aggregate telemetry but no per-event identity or argument audit
    trail.
  mitigation_title: Emit structured audit log entries for generateCoupon calls including user ID, discount value, and session
    identifier
  remediation:
    effort: Low
    steps:
    - 'In the `generateCoupon` tool `execute` function at `routes/chat.ts:181`, call `logger.info()` with a structured payload:
      `{ event: ''coupon_generated'', userId, discount, couponCode, timestamp }` before returning.'
    - Capture `userId` from `getUserId(req)` in the outer `chat()` closure and make it available to all tool `execute` closures
      — currently only `getOrderById` fetches the user ID.
    - Log tool-call arguments for all four tools at the point of execution (not just at the SSE stream event), ensuring the
      log record is written even if the SSE connection drops before the client receives the response.
    - Consider a session correlation ID (e.g., a UUID generated per `POST /rest/chat` request) emitted in every log line so
      that the full conversation can be reconstructed from logs.
    code_example: "// routes/chat.ts — structured audit in generateCoupon\nexecute: async ({ discount }) => {\n  const couponCode\
      \ = security.generateCoupon(discount)\n  logger.info(JSON.stringify({\n    event: 'coupon_generated',\n    userId: await\
      \ getUserId(req),\n    discount,\n    couponCode,\n    ts: new Date().toISOString()\n  }))\n  return { couponCode, discount\
      \ }\n}"
    reference: CWE-778
