  scenario: 'The login handler at routes/login.ts:34 constructs a raw SQL query via string interpolation: `SELECT * FROM Users
    WHERE email = ''${req.body.email}'' AND password = ''${security.hash(req.body.password)}''`. Sending `email = \'' OR 1=1--`
    with any password causes the WHERE clause to evaluate true for all rows, returning the first user (typically admin). This
    bypasses both the password check and the MD5 hash requirement entirely. No WAF, parameterised query, or input sanitisation
    is applied to the email field.'
  evidence_summary: '`models.sequelize.query()` at login.ts:34 embeds `req.body.email` and `req.body.password` via template
    literal with no parameterisation.'
  impact_description: Attacker logs in as any user — including admin — without knowing any credential.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no input sanitisation, no parameterised query, no WAF.
  mitigation_title: Replace raw SQL string interpolation with Sequelize parameterised query in login handler
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `sequelize.query()` with `UserModel.findOne({ where: { email, password: security.hash(password), deletedAt:
      null } })`.'
