  title: Security-relevant client errors logged only to console — app.guard.ts:41
  affected_parameter: null
  scenario: 'Authentication and session failures in the SPA are surfaced only via console.log: token-decode failures (app.guard.ts:41),
    and OAuth session invalidation logs the error object to the console (oauth.component.ts:65 invalidateSession -> console.log(error)).
