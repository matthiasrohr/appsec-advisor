    before path resolution: `const safeFileName = path.basename(fileName)` for flat extraction, or use a path normalization
    utility that eliminates traversal sequences before joining. Use `absolutePath` (the resolved path) in the `createWriteStream`
    call at line 45 instead of the raw `fileName`, so the path used for writing is identical to the path used for the security
    check. Consider using the `unzipper` library''s built-in path sanitization or switching to a library that rejects Zip
    Slip paths by default.'
