  - TH-06
  stride: Denial of Service
  cwe: CWE-400
  title: AddressesMinted Set pre-emption — routes/nftMint.ts:42
  affected_parameter: walletAddress
  scenario: The `walletNFTVerify` handler (nftMint.ts:42) calls `addressesMinted.delete(metamaskAddress)` immediately upon
    a matching submission — before any response is written. The in-memory Set is populated by listening to the public on-chain
    `NFTMinted` event (line 24-28). Because the event is public and no authentication ties a claim to the original minter's
    session, an attacker monitoring the contract events (trivial with any Ethereum indexer) can submit the observed minted
    address via a direct HTTP request to `/rest/web3/walletNFTVerify` faster than the legitimate minter's frontend can respond.
    The first submitter wins and deletes the address from the Set, permanently denying the legitimate minter the ability to
    claim the challenge. No rate limiting or authentication guard is present on this endpoint.
  evidence_summary: routes/nftMint.ts:42 calls `addressesMinted.delete(metamaskAddress)` unconditionally on a Set hit, enabling
    any client to irreversibly consume a legitimate minter's pending claim.
  impact_description: A targeted attack depletes challenge state, denying the legitimate NFT minter the ability to complete
    the `nftMintChallenge` even after a valid on-chain transaction.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — no authentication, no rate limiting, no session binding on the claim endpoint.
  mitigation_title: Bind NFT mint claims to authenticated user sessions and add rate limiting on /rest/web3/walletNFTVerify
  remediation:
    effort: Medium
    steps:
    - Gate `/rest/web3/walletNFTVerify` with `security.isAuthorized()` middleware so only logged-in users can submit claims.
    - Store `(walletAddress → userId)` in the claim Set so the deletion only succeeds when `req.user.id` matches the registered
      submitter.
    - Add `express-rate-limit` middleware (e.g., 10 requests per minute per IP) to `/rest/web3/walletNFTVerify` to prevent
      rapid enumeration of pending minted addresses.
    code_example: "```typescript\n// nftMint.ts — bind claim to authenticated session\nconst claimedBy = claimsMap.get(metamaskAddress)\n\
      if (claimedBy && claimedBy === req.user?.id) {\n  claimsMap.delete(metamaskAddress)\n  challengeUtils.solveIf(challenges.nftMintChallenge,\
      \ () => true)\n  res.status(200).json({ success: true, ... })\n}\n```"
    reference: CWE-400
  evidence:
  - file: routes/nftMint.ts
    line: 42
