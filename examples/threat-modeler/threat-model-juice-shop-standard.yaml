    an unencrypted file. Any operating-system-level read access to the file — via a path traversal exploit, container escape,
    backup misconfiguration, or storage snapshot — yields all database content in plaintext: user emails, MD5 password hashes,
    payment card numbers, wallet balances, order history, feedback, and security answers. SQLite does not natively support
    transparent data encryption; a third-party extension (SQLCipher) is required.'
  evidence_summary: '`storage: ''data/juiceshop.sqlite''` at `models/index.ts:41` configures Sequelize without any encryption
    extension, leaving the database file fully readable by any OS-level accessor.'
  impact_description: Single-file exfiltration exposes the complete dataset of all registered users and their PII, credentials,
    and financial data.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: None — no SQLCipher or equivalent transparent encryption layer is configured.
  mitigation_title: Enable SQLite transparent encryption via SQLCipher or migrate sensitive columns to encrypted fields
  remediation:
    effort: High
    steps:
    - 'Replace the `sqlite3` Sequelize dialect driver with `@journeyapps/sqlcipher` and set `dialectOptions: { key: process.env.SQLITE_ENCRYPTION_KEY
      }` to enable AES-256 full-database encryption; manage the key via environment variable or KMS.'
    - 'As an interim measure, apply field-level AES-256-GCM encryption in Sequelize setters for the most sensitive columns:
      `Users.password`, `Cards.cardNum`, `Users.totpSecret`.'
