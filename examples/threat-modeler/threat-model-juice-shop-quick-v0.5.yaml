trust_boundaries:
- id: tb-1
  name: Public Internet / Browser
  description: Untrusted zone encompassing all anonymous and authenticated end-users accessing the application via browser. HTTPS enforced for transit but client-side code runs in attacker-controlled environment.
  from: external
  to: web-frontend
  enforcement: HTTPS transport only; no mutual TLS; origin not validated on WebSocket
- id: tb-2
  name: Browser to Backend API
  description: Trust boundary between Angular SPA running in the browser and the Express REST API. JWT bearer token required for authenticated routes but stored in XSS-accessible localStorage. CORS policy not strictly enforced.
  from: web-frontend
  to: backend-api
  enforcement: JWT bearer token (weak — alg:none accepted, private key in source); CORS permissive
- id: tb-3
  name: Backend API to Data Layer
  description: Internal boundary between Express application process and embedded SQLite database. Co-located in same process/container; no network separation. Sequelize ORM provides partial injection protection.
  from: backend-api
  to: data-persistence
  enforcement: Sequelize ORM parameter binding (partially applied); no row-level security; no separate DB credentials
- id: tb-4
  name: Backend to External LLM Providers
  description: Egress boundary to external AI providers (OpenAI, Anthropic). API key authentication; user-controlled prompt content transmitted without sanitization. Exfiltration and injection risk.
  from: backend-api
  to: llm-integration
  enforcement: API key authentication; HTTPS transport; no prompt content filtering
- id: tb-5
  name: CI/CD Pipeline Privilege Boundary
  description: GitHub Actions workflow execution environment with access to repository secrets and deployment credentials. pull_request_target misuse allows untrusted PR code to run with elevated GITHUB_TOKEN.
  from: external
  to: ci-cd-pipeline
  enforcement: GitHub repository permissions; GITHUB_TOKEN scoping (overly broad); branch protection rules
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Weak
  assessment: Login endpoint at /rest/user/login uses bcrypt for password comparison but raw SQL injection is possible in the query. JWT issued with RS256 but express-jwt 0.1.3 accepts alg:none, enabling signature bypass. No brute-force rate limiting detected.
  linked_threats: []
- domain: Identity and Authentication Controls
  control: OAuth / OIDC Integration
  effectiveness: Unsafe
  assessment: OAuth integration lacks PKCE (S256 challenge), uses implicit flow (token in URL fragment), missing state parameter, and static/missing nonce. 457 OAuth findings detected. Client secrets visible in frontend JavaScript. Intentionally broken for training.
  linked_threats: []
  audit_flags:
  - control_domain_suffix_normalised
- domain: Identity and Authentication Controls
  control: TOTP / 2FA / MFA
  effectiveness: Weak
  assessment: TOTP-based MFA implemented in frontend/src/app/Services/two-factor-auth-service.ts but TOTP secrets stored in localStorage. Bypassable via XSS token theft. Intentionally broken for training.
  linked_threats: []
  audit_flags:
  - control_domain_suffix_normalised
- domain: Session and Token Controls
  control: JWT Session Token Management
  effectiveness: Unsafe
  assessment: JWT tokens stored in localStorage (XSS-accessible; 15+ instances detected). Private RSA signing key stored in source code (encryptionkeys/). express-jwt 0.1.3 accepts alg:none. No token revocation mechanism. 6-hour expiry with no refresh rotation.
