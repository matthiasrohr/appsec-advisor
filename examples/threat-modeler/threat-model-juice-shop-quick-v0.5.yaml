  likelihood: High
  impact: High
  risk: High
  controls_in_place: Allowlist of permitted destination URLs exists, but the substring matching logic renders it ineffective.
  mitigation_title: Replace substring match in isRedirectAllowed with exact URL startsWith or host-equivalence check
  remediation:
    effort: Low
    steps:
    - Replace `url.includes(allowedUrl)` with `url === allowedUrl` for exact-match entries, or use `new URL(url).origin === new URL(allowedUrl).origin && url.startsWith(allowedUrl)` for prefix matching.
    - Parse the `to` parameter with `new URL()` and validate only the `hostname` + `protocol` against an allowlisted host set, rejecting any URL whose host is not explicitly permitted.
    code_example: '// Before (vulnerable): url.includes(allowedUrl)

      allowed = allowed || url.includes(allowedUrl)


      // After: exact or prefix match only

