assets:
- id: A-001
  name: User Account Database
  classification: Restricted
  description: SQLite table storing user credentials (email, hashed passwords), roles (customer/deluxe/admin), profile data, and security question answers. Primary target for credential theft and privilege escalation attacks.
  linked_threats:
  - T-005
  - T-006
  - T-016
  - T-026
- id: A-002
  name: JWT RSA Private Signing Key
  classification: Restricted
  description: RSA private key stored in encryptionkeys/ directory used to sign all JWT tokens. Compromise allows offline forgery of arbitrary tokens including admin sessions. Intentionally accessible for training purposes.
  linked_threats:
  - T-008
  - T-013
  - T-023
  - T-024
  - T-025
  - T-027
- id: A-003
  name: Authentication Session Tokens
  classification: Confidential
  description: JWT bearer tokens issued after successful authentication. Stored in browser localStorage (XSS-accessible). 6-hour expiry with no revocation mechanism. Compromise yields full account takeover.
  linked_threats:
  - T-001
  - T-003
  - T-004
  - T-016
  - T-019
  - T-033
- id: A-004
  name: Order and Payment Data
  classification: Confidential
  description: Customer basket contents, checkout records, payment simulation data, and coupon codes stored in SQLite. Sensitive in realistic deployment scenarios; exploitable via IDOR and basket manipulation attacks.
  linked_threats:
  - T-005
  - T-006
  - T-007
  - T-016
  - T-028
  - T-029
  - T-036
- id: A-005
  name: Product and Challenge Catalog
  classification: Public
  description: Product listing, reviews, challenge metadata, and hint data. Intentionally public; primary injection attack surface (search, product reviews) rather than a confidentiality asset.
  linked_threats:
  - T-005
  - T-006
  - T-009
  - T-016
- id: A-006
  name: User-Uploaded Files
  classification: Internal
  description: Files uploaded via /file-upload and /profile/image routes, stored in uploads/ directory with quarantine subdirectory. No extension or MIME-type validation; path traversal and malicious file storage risk.
  linked_threats:
  - T-013
- id: A-007
  name: CI/CD Pipeline Secrets
  classification: Restricted
  description: GitHub Actions secrets (GITHUB_TOKEN, Docker Hub credentials, npm publish tokens) used across 16 workflows. Compromised via pull_request_target misuse or self-hosted runner exploitation; enables supply-chain attacks.
  linked_threats:
  - T-005
  - T-006
  - T-016
  - T-020
  - T-021
  - T-026
- id: A-008
  name: LLM API Credentials
  classification: Restricted
  description: API keys for OpenAI, Anthropic, and other LLM providers configured via environment variables. Exposure enables financial abuse (unauthorized API calls) and exfiltration of prompt context including any PII in prompts.
  linked_threats:
  - T-005
  - T-006
  - T-016
  - T-026
- id: A-009
  name: Source Code and Build Artifacts
  classification: Internal
  description: Application source code, TypeScript configurations, Docker image layers, and npm package build artifacts. Public on GitHub; Docker image published to Docker Hub. Supply-chain integrity relies on CI/CD pipeline security.
  linked_threats: []
- id: A-010
  name: FTP Simulation Data
  classification: Internal
  description: Files in the ftp/ directory simulating an insecure FTP service used as a challenge surface. Contains intentionally exposed backup files, password lists, and sensitive documents for training purposes.
  linked_threats:
  - T-005
  - T-006
  - T-016
  - T-026
