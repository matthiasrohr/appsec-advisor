- local_id: auth-006
  threat_category_id: TH-06
  additional_categories:
  - TH-02
  stride: Elevation of Privilege
  cwe: CWE-269
  title: Hardcoded JWT Private Key Enables Arbitrary Role — lib/insecurity.ts:154
  affected_parameter: JWT role claim (data.role)
  scenario: Because the RSA private key is committed in plaintext to the source repository (lib/insecurity.ts:21), any actor with source-code access can generate a valid RS256-signed JWT carrying `data.role = 'admin'` or `data.role = 'accounting'`. The `isAccounting()` middleware (lib/insecurity.ts:154) and the `isDeluxe()` check (line 165) read role and deluxeToken claims from the verified JWT without any server-side session check — once the JWT is accepted as valid, the claimed role is trusted. A supply-chain attacker or insider who extracts the hardcoded key can forge tokens for the admin role, granting access to every admin-only endpoint.
  evidence_summary: lib/insecurity.ts:154 (`isAccounting()`) and line 165 (`isDeluxe()`) derive authorization decisions solely from JWT claims; the signing key used to produce those claims is hardcoded at line 21, making the role boundary trivially forgeable by anyone with source access.
  impact_description: An attacker with source-code read access (developer, CI/CD compromise) can self-issue admin-role JWTs and gain full administrative control of the application without any credential.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: JWT signature verified against public key; role checks present in middleware.
  actor_ids:
  - ACT-D-06
  - ACT-D-03
  primary_actor: ACT-D-06
  mitigation_title: Enforce server-side session role verification in addition to JWT claim checks, and eliminate the hardcoded signing key
  remediation:
    effort: Medium
    steps:
    - Remove the hardcoded `privateKey` (addressed in auth-004); this is the root enabler — without the private key, forging role claims is infeasible.
    - 'Add a server-side role re-validation step in `isAccounting()` and `isDeluxe()`: after extracting the JWT claim, query the database or a session store to confirm the user''s current role, rather than trusting the JWT claim unconditionally.'
    - Implement short JWT lifetimes (15 minutes or less for privileged endpoints) combined with opaque refresh tokens, so that any compromised token's window is bounded.
    code_example: "// After key rotation (auth-004 fix applied), add DB re-validation:\nexport const isAccounting = () => {\n  return async (req: Request, res: Response, next: NextFunction) => {\n    const decodedToken = verify(jwtFrom(req)) && decode(jwtFrom(req))\n    if (!decodedToken?.data?.id) return res.status(403).json({ error: 'Unauthorized' })\n    const user = await UserModel.findByPk(decodedToken.data.id)\n    if (user?.role === roles.accounting) return next()\n    return res.status(403).json({ error: 'Malicious activity detected' })\n  }\n}"
    verification: Extract the private key from the source, sign a JWT with `{data:{role:'accounting'}}`, and submit to an accounting-only endpoint — must return HTTP 403 after the server-side DB check is added. After key rotation, confirm a token signed with the old key is rejected.
    reference: CWE-269
