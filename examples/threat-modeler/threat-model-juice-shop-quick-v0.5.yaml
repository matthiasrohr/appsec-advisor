- local_id: realtime-socket-io-001
  threat_category_id: TH-13
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-306
  title: Unauthenticated WebSocket Channel
  affected_parameter: null
  scenario: The Socket.IO server in `registerWebsocketEvents.ts` accepts all connections at `io.on('connection', ...)` (line 23) without any preceding `io.use()` authentication middleware. The Express-layer JWT check at server.ts:353 (`verify.jwtChallenges()`) does not gate WebSocket upgrade requests — it validates JWT tokens for challenge recognition on REST routes only. Any HTTP client that sends a WebSocket upgrade request to `/socket.io` receives a live socket without proving identity. Once connected, the unauthenticated client immediately receives all pending challenge notifications via the `notifications.forEach` broadcast (lines 29–31) and can emit `verifyLocalXssChallenge`, `verifySvgInjectionChallenge`, and `verifyCloseNotificationsChallenge` events that alter global application state, impersonating a legitimate authenticated browser session.
  evidence_summary: '`io.on(''connection'', (socket: any) => {...})` at line 23 accepts every connecting socket; no `io.use(...)` call exists anywhere in the file to validate a JWT or session credential before the handler fires.'
  impact_description: An unauthenticated attacker receives all in-flight challenge notifications intended for other users and can emit application-state-altering events as if they were a valid authenticated session.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — Express JWT middleware does not gate WebSocket upgrades; no io.use() authentication middleware is present on the Socket.IO server.
  mitigation_title: Add JWT validation middleware to the Socket.IO server via io.use() before accepting connections
  remediation:
    effort: Low
    steps:
    - Add an `io.use()` middleware that reads `socket.handshake.auth.token`, verifies it with the application's JWT secret (using `security.verify()` already available from `lib/insecurity`), attaches the decoded payload to `socket.data.user`, and calls `next(new Error('Unauthorized'))` on failure.
    - Ensure all subsequent event handlers reference `socket.data.user` for identity assertions; reject events where `socket.data.user` is null or undefined.
    code_example: "// Before: connections accepted without auth\nconst io = new Server(server, { cors: { origin: 'http://localhost:4200' } })\nio.on('connection', (socket: any) => { /* no auth */ })\n\n// After: io.use() gate added before connection handler\nimport * as security from '../insecurity'\nio.use((socket: any, next: Function) => {\n  const token = socket.handshake.auth?.token\n  if (!token) return next(new Error('Authentication required'))\n  security.verify(token, (err: any, decoded: any) => {\n    if (err) return next(new Error('Invalid or expired token'))\n    socket.data.user = decoded\n    next()\n  })\n})\nio.on('connection', (socket: any) => {\n  // socket.data.user is guaranteed to be set here\n})"
    verification: Connect with `socket.io-client` omitting `auth.token`; assert `connect_error` is emitted with message `Authentication required`. Then connect with a revoked or expired JWT and assert the same rejection — confirming the gate fires per-handshake and not only at the HTTP routing layer.
    reference: CWE-306
