  _title_source: Add JWT validation middleware to the Socket.IO server via io.use() before accepting connections
  steps:
  - Add an `io.use()` middleware that reads `socket.handshake.auth.token`, verifies it with the application's JWT secret (using `security.verify()` already available from `lib/insecurity`), attaches the decoded payload to `socket.data.user`, and calls `next(new Error('Unauthorized'))` on failure.
  - Ensure all subsequent event handlers reference `socket.data.user` for identity assertions; reject events where `socket.data.user` is null or undefined.
  code_example: "// Before: connections accepted without auth\nconst io = new Server(server, { cors: { origin: 'http://localhost:4200' } })\nio.on('connection', (socket: any) => { /* no auth */ })\n\n// After: io.use() gate added before connection handler\nimport * as security from '../insecurity'\nio.use((socket: any, next: Function) => {\n  const token = socket.handshake.auth?.token\n  if (!token) return next(new Error('Authentication required'))\n  security.verify(token, (err: any, decoded: any) => {\n    if (err) return next(new Error('Invalid or expired token'))\n    socket.data.user = decoded\n    next()\n  })\n})\nio.on('connection', (socket: any) => {\n  // socket.data.user is guaranteed to be set here\n})"
