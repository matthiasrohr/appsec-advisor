  - T-013
  - T-014
  - T-015
  - T-023
  - T-028
  - T-029
  - T-031
- id: web-frontend
  name: Angular SPA Frontend
  description: Angular 21 single-page application served by the backend. Contains client-side auth guards, localStorage token storage, DOM XSS sinks, OAuth integration patterns, and intentional training vulnerabilities across 100+ components.
  paths:
  - frontend/src/**
  - frontend/angular.json
  - frontend/package.json
  tier: client
  complexity: complex
  framework: angular
  deployment_zones:
  - client-device
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-004
  - T-016
  - T-019
  - T-030
- id: data-persistence
  name: SQLite Database (Sequelize ORM)
  description: SQLite embedded database accessed via Sequelize ORM. Stores user accounts, product catalog, orders, feedback, and challenge data. Single-tenant, co-located with the application process. Also includes optional MongoDB/MarsDB for NoSQL challenge scenarios.
  paths:
  - models/**
  - data/staticData/**
  tier: data
  complexity: simple
  framework: sequelize
  deployment_zones:
  - prod-write-db
  handles_sensitive_data: true
  threat_ids: []
- id: realtime-socket-io
  name: Socket.IO Real-Time Service
  description: Socket.IO 3.1.0 WebSocket layer integrated within the Express backend for real-time order notifications, challenge triggers, and chat simulation. No origin validation detected; authentication not re-validated per event.
  paths:
  - server.ts
  - lib/socketio*
  - frontend/src/**/*socket*
  tier: application
  complexity: moderate
  framework: socket.io
  deployment_zones:
  - internet
  - prod-env
  handles_sensitive_data: false
  threat_ids:
  - T-011
  - T-024
  - T-035
- id: llm-integration
  name: LLM API Integration
  description: Backend integration with external LLM providers (OpenAI, Anthropic, LangChain) for AI-powered challenge scenarios. User input concatenated into prompts without sanitization; vector database (Pinecone, Weaviate) references detected. Intentional prompt injection training surface.
  paths:
  - routes/*llm*
  - routes/*ai*
  - lib/*llm*
  - lib/*ai*
  tier: application
  complexity: simple
  framework: openai
  deployment_zones:
  - peer-service
  handles_sensitive_data: false
  threat_ids: []
- id: ci-cd-pipeline
  name: GitHub Actions CI/CD Pipeline
  description: 16 GitHub Actions workflows handling build, test, Docker image publication, and release automation. Unpinned action versions, pull_request_target misuse with self-hosted runners, and overly broad GITHUB_TOKEN permissions create supply-chain and privilege escalation risks.
  paths:
  - .github/workflows/**
  - Dockerfile
  - docker-compose.yml
  - .dockerignore
  tier: application
  complexity: moderate
  framework: github-actions
  deployment_zones:
  - ci-cd-runtime
  - build-pipeline
  handles_sensitive_data: true
  threat_ids:
  - T-020
  - T-021
