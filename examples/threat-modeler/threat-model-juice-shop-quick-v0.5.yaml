  title: Hardcoded BIP-39 Mnemonic Exposes Ethereum Wallet — routes/checkKeys.ts:10
  affected_parameter: null
  scenario: The `checkKeys` function hard-codes the BIP-39 mnemonic phrase `'purpose betray marriage blame crunch monitor spin slide donate sport lift clutch'` at source line 10. Because Juice Shop is an open-source repository, this mnemonic is publicly visible. Any reader can deterministically derive the wallet's private key (`HDNodeWallet.fromPhrase(mnemonic).privateKey`), public key, and Ethereum address using any BIP-32/BIP-39 compatible tool. The exposed private key grants full control over the associated Ethereum wallet, including the ability to sign transactions, transfer funds, and interact with smart contracts on behalf of that wallet.
  evidence_summary: checkKeys.ts:10 contains the literal mnemonic string `'purpose betray marriage blame crunch monitor spin slide donate sport lift clutch'` which is committed to the public repository.
  impact_description: Any reader of the source code can derive the wallet's private key and fully control the associated Ethereum wallet.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — the mnemonic is stored in plain text in the source file.
  mitigation_title: Remove hardcoded mnemonic from source and load wallet key material from a secrets manager or environment variable
  remediation:
    effort: Medium
    steps:
    - Remove the literal mnemonic string from checkKeys.ts and load it at runtime from an environment variable (e.g., `process.env.CHALLENGE_WALLET_MNEMONIC`) or a secrets manager (AWS Secrets Manager, HashiCorp Vault).
    - Rotate the affected wallet — generate a new HD wallet, transfer any assets, and invalidate the exposed mnemonic.
    - Add `CHALLENGE_WALLET_MNEMONIC` to `.gitignore`-guarded `.env` files and document it in the local-dev setup guide.
    code_example: '// Before: hardcoded mnemonic

      const mnemonic = ''purpose betray marriage blame crunch monitor spin slide donate sport lift clutch''


      // After: runtime injection

      const mnemonic = process.env.CHALLENGE_WALLET_MNEMONIC

      if (!mnemonic) throw new Error(''CHALLENGE_WALLET_MNEMONIC env var not set'')

      const mnemonicWallet = HDNodeWallet.fromPhrase(mnemonic)'
    verification: Run `git log -S 'purpose betray marriage' --all` — no commits should contain the literal mnemonic after remediation. Run `grep -r 'purpose betray' .` — expect zero hits outside test fixtures.
