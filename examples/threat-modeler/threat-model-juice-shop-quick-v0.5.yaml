  title: Client-Side-Only Admin and Accounting Route Guards — app.guard.ts:54
  affected_parameter: payload.data.role
  scenario: An attacker obtains a valid session JWT for any account (including their own), then uses the OAuth derived-password weakness (web-frontend-001) to obtain an admin-role JWT, or steals a JWT via XSS (web-frontend-002). The attacker sets the JWT in localStorage. The AdminGuard at app.guard.ts:54 and AccountingGuard at line 65 decode the localStorage JWT client-side using `jwtDecode` and check `payload.data.role === roles.admin` — never making a round-trip to the server. Angular's router then permits navigation to `/administration` and `/accounting` for the attacker's browser session. The server validates the JWT signature on individual API calls, but any admin-role JWT (legitimately issued or stolen) unlocks every admin-routed frontend view without additional server-side enforcement at the route level.
  evidence_summary: AdminGuard.canActivate() at app.guard.ts:54 grants admin route access by checking `payload.data.role === roles.admin` decoded from localStorage only; no server-side session check or route-level authorization endpoint is called.
  impact_description: Full access to admin and accounting Angular views for any attacker holding an admin-role JWT, including order management, user management, and financial data screens.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Server-side JWT signature validation on backend API calls provides partial protection, but client-side views expose sensitive data and actions before server validation fires.
  mitigation_title: Add server-side route authorization endpoint and validate role server-side before rendering admin views
  remediation:
    effort: Medium
    steps:
    - Introduce a backend endpoint (e.g. `GET /rest/user/me`) that returns the authenticated user's current role from the server-verified JWT. Call this from AdminGuard before allowing route activation.
    - Treat the client-side Angular guard as a UX optimization only, never as a security gate. All sensitive data fetched by admin views must be gated by server-side role checks on the API.
    - Remove reliance on `jwtDecode(localStorage.getItem('token'))` for role determination in the guards; use only the server response.
    code_example: "// Before (app.guard.ts:54) — client-side role check only:\nconst payload = this.loginGuard.tokenDecode()\nif (payload?.data && payload.data.role === roles.admin) { return true }\n\n// After — server-side verification:\nreturn this.userService.whoami().pipe(\n  map(user => user.role === roles.admin || (this.loginGuard.forbidRoute(), false))\n)"
    verification: Manually set a non-admin JWT with role=admin in localStorage without going through the server-issued admin JWT path; navigating to /administration should redirect to /403 because the server-side check rejects the forged role.
    reference: CWE-602
