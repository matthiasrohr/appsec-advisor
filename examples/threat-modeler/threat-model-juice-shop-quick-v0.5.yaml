  title: Wallet Ownership Spoofing Without Signature Proof — routes/nftMint.ts:41
  affected_parameter: walletAddress
  scenario: The `walletNFTVerify` handler accepts a `walletAddress` from the POST body and checks it against the `addressesMinted` in-memory Set. Blockchain `NFTMinted` events are public — any observer can read minted addresses from on-chain data or from a WebSocket listener. An attacker who knows a minted address can POST that address without ever controlling the corresponding private key. Because the server performs no cryptographic proof of wallet ownership (no `eth_sign` / `personal_sign` challenge-response), the attacker gains the challenge-completion credit belonging to the true NFT owner.
  evidence_summary: nftMint.ts:41 reads `req.body.walletAddress` and checks `addressesMinted.has(metamaskAddress)` with no signature or session binding.
  impact_description: Any third party who observes an on-chain mint event can claim the Juice Shop NFT challenge reward without owning the corresponding wallet.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no cryptographic ownership proof is requested.
  mitigation_title: Add wallet-ownership signature challenge before accepting walletAddress in NFT verification
  remediation:
    effort: Medium
    steps:
    - Issue a server-side nonce (stored in session or signed JWT) when the client requests NFT verification.
    - Require the client to sign the nonce with their private key using `eth.personal.sign(nonce, walletAddress)` (MetaMask `eth_sign`).
    - On the server, recover the signer address with `ethers.verifyMessage(nonce, signature)` and compare it to the claimed `walletAddress` before checking `addressesMinted`.
    code_example: "// Before: no proof\nconst metamaskAddress = req.body.walletAddress\nif (addressesMinted.has(metamaskAddress)) { ... }\n\n// After: verify signature\nconst { walletAddress, nonce, signature } = req.body\nconst { verifyMessage } = await import('ethers')\nconst recovered = verifyMessage(nonce, signature)\nif (recovered.toLowerCase() !== walletAddress.toLowerCase()) {\n  return res.status(401).json({ success: false, message: 'Signature invalid' })\n}\nif (addressesMinted.has(walletAddress)) { ... }"
    verification: POST /api/nftMint/verify with a known minted address but an invalid/missing signature — expect HTTP 401. POST with a valid signature from the private key of that address — expect HTTP 200.
    reference: CWE-290
