  title: Open Redirect — lib/insecurity.ts:136
  affected_parameter: to
  scenario: 'The `isRedirectAllowed` function checks `url.includes(allowedUrl)` for each entry in the redirect allowlist. An attacker constructs a URL like `https://evil.com/?ref=https://github.com/juice-shop/juice-shop` — the string includes an allowlisted URL as a query parameter, so the check returns `true` and the server issues `Location: https://evil.com/?ref=...`. The victim user is redirected to the attacker''s site. This is exploitable for phishing, credential harvesting, or crypto-wallet seed-phrase theft framed as a Juice Shop page.'
