    scenario: 'The chat endpoint accepts `req.body.messages` without any limit on array length or total content size. An unauthenticated or authenticated attacker submits repeated requests containing thousands of messages, each several kilobytes long. The LLM provider bills the operator per input token; each oversized request burns the maximum context window of the configured model. With `maxRetries` set via config (line 208), failed expensive calls are retried automatically, multiplying cost. Because the endpoint does not appear to require authentication (line 192-193: `userName` is optional), this attack surface is open to the public internet. The operator''s LLM API key can be exhausted within minutes, causing denial of service to all legitimate users.'
