  title: NFT Challenge Credit Claimable Without Wallet Ownership — routes/nftMint.ts:42
  affected_parameter: walletAddress
  scenario: The `walletNFTVerify` endpoint grants `nftMintChallenge` completion credit when `addressesMinted.has(metamaskAddress)` is true. The `metamaskAddress` is taken entirely from `req.body.walletAddress` with no binding to the authenticated user's session, JWT subject, or cryptographic proof. An authenticated user can submit any address that appears in the `addressesMinted` Set — addresses are discoverable from the Sepolia blockchain's public `NFTMinted` event log — and claim the challenge reward without having performed the mint. The deletion `addressesMinted.delete(metamaskAddress)` prevents the same address being reused, but the attacker merely needs to observe the event before the legitimate user calls this endpoint.
  evidence_summary: nftMint.ts:42-43 deletes and credits `metamaskAddress` from the POST body with no linkage to `req.user` or any cryptographic proof of ownership.
  impact_description: An authenticated user can claim another user's NFT challenge completion, effectively stealing challenge rewards across session boundaries.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: One-time-use deletion of the address from the Set limits repeated abuse with the same address.
  mitigation_title: Bind NFT mint verification to the authenticated user's session and require wallet-ownership signature
