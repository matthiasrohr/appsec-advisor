  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification
  affected_parameter: Authorization header / JWT token
  scenario: express-jwt@0.1.3 (pinned in package.json) does not enforce a required algorithm and accepts tokens signed with `alg:none` — i.e., no signature at all. An anonymous attacker crafts a JWT payload naming any user ID or email, sets `alg` to `none` in the header, omits the signature, and submits the token to any endpoint guarded by `isAuthorized()` (lib/insecurity.ts:52). The library verifies the token against `publicKey` but, because the algorithm is none, skips signature verification entirely. The attacker is authenticated as the victim user without ever knowing their password or the RSA private key.
  evidence_summary: '`isAuthorized()` at lib/insecurity.ts:52 calls `expressJwt({ secret: publicKey })` using the vulnerable express-jwt@0.1.3 package, which accepts unsigned `alg:none` tokens because no `algorithms` allowlist is configured.'
  impact_description: An unauthenticated attacker can authenticate as any user in the system, including administrators, without credentials, enabling full account takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 used for token issuance; JWT expiry of 6 hours.
  actor_ids:
  - ACT-D-01
  - ACT-D-02
  - ACT-D-03
  - ACT-D-06
  primary_actor: ACT-D-01
  mitigation_title: Pin express-jwt to a version that enforces an algorithm allowlist and reject unsigned tokens
  remediation:
    effort: Low
    steps:
    - 'Upgrade express-jwt to v6.x or later (first version to enforce `algorithms` option), or replace with `jsonwebtoken` middleware with explicit `{ algorithms: [''RS256''] }` option.'
    - 'Pass `algorithms: [''RS256'']` explicitly when calling `expressJwt()` so any token not signed with RS256 is rejected before payload extraction.'
    - Add a unit test that creates an alg:none token and asserts the endpoint returns HTTP 401.
    code_example: '// Before (vulnerable — express-jwt@0.1.3 accepts alg:none):

      export const isAuthorized = () => expressJwt({ secret: publicKey })


      // After (fix — pin algorithm; upgrade to express-jwt >=6):

      import { expressjwt } from ''express-jwt''

      export const isAuthorized = () => expressjwt({ secret: publicKey, algorithms: [''RS256''] })'
