- local_id: realtime-socket-io-004
  threat_category_id: TH-13
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-200
  title: Indiscriminate Challenge Notification Broadcast — registerWebsocketEvents.ts:29
  affected_parameter: null
  scenario: At lines 29–31 of `registerWebsocketEvents.ts`, on every new Socket.IO connection the server iterates the full global `notifications` array and emits every pending notification via `socket.emit('challenge solved', notification)` to that socket. The notifications array is not filtered by recipient identity. An attacker who connects to the Socket.IO endpoint — even unauthenticated (see realtime-socket-io-001) — receives pending challenge-solution events that belong to other users. Each notification may contain the challenge flag string; a received flag can be immediately replayed against the `notification received` event handler (realtime-socket-io-002) to delete that notification from the server before the legitimate owner's browser processes it.
  evidence_summary: '`notifications.forEach((notification: any) => { socket.emit(''challenge solved'', notification) })` at lines 29–31 broadcasts the entire global notification queue to every newly connected socket without filtering by the socket owner''s identity.'
  impact_description: Any connected client receives cross-user challenge state including flag values, enabling notification theft and replay attacks against other users.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None
  mitigation_title: Filter notification broadcast to only those notifications owned by the authenticated socket session
  remediation:
    effort: Medium
    steps:
    - Tag each notification at creation time with the `userId` of the user who triggered the challenge solution.
    - 'Replace the unconditional `notifications.forEach` loop with a filtered variant: `notifications.filter(n => n.userId === socket.data.user?.id).forEach(n => socket.emit(''challenge solved'', n))`.'
    code_example: "// Before: all notifications emitted to every connecting socket\nnotifications.forEach((notification: any) => {\n  socket.emit('challenge solved', notification)\n})\n\n// After: filter by authenticated user ID\nnotifications\n  .filter((n: any) => n.userId === socket.data.user?.id)\n  .forEach((n: any) => socket.emit('challenge solved', n))"
    verification: Connect two authenticated sockets as distinct users; solve a challenge as User A and verify that User B's socket receives no `challenge solved` event for User A's challenge.
    reference: CWE-200
  evidence:
  - file: lib/startup/registerWebsocketEvents.ts
    line: 29
  evidence_check: verified
  controls_absent_evidence: []
