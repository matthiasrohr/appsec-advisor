  title: MongoDB $where JavaScript Injection — routes/chat.ts:149
  affected_parameter: id
  scenario: 'The `getProductReviews` LLM tool passes the model-supplied `id` argument through `Number(id)` and concatenates the result into a MongoDB `$where` JavaScript expression: `''this.product == '' + productId`. The `$where` operator evaluates arbitrary JavaScript server-side in MongoDB. A successful prompt injection attack that controls the LLM tool call can supply a crafted `id` (e.g., a very large integer or `Infinity`) to trigger CPU-intensive JS evaluation on the MongoDB server. While `Number()` coercion prevents string injection, the `$where` pattern itself is a deprecated, inherently dangerous MongoDB feature that should not receive any attacker-influenced value. An attacker who chains this with prompt injection (e.g., instructing the LLM to call `getProductReviews` with `id: ''0''` to baseline, then escalating to `id` values that trigger MongoDB JS timeouts) can cause database resource exhaustion.'
  evidence_summary: 'At `routes/chat.ts:149`, `db.reviewsCollection.find({ $where: ''this.product == '' + productId })` constructs a server-side JavaScript predicate from LLM-tool-provided input, using the deprecated `$where` operator.'
  impact_description: Exploiting `$where` via crafted LLM tool arguments can exhaust MongoDB CPU/memory or enable JavaScript-level logic manipulation on the database server.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Number() coercion prevents direct string injection into the $where expression
  mitigation_title: Replace $where with a typed MongoDB equality query in the getProductReviews tool
  remediation:
    effort: Low
    steps:
    - 'Replace `{ $where: ''this.product == '' + productId }` with a typed equality filter `{ product: productId }` using MongoDB''s native query operators, eliminating server-side JavaScript evaluation entirely.'
    - Validate that `productId` is a positive finite integer (e.g. `Number.isFinite(productId) && productId > 0`) and return an empty result early if not.
    code_example: '// Before: $where with JS string concat

      return await db.reviewsCollection.find({ $where: ''this.product == '' + productId })


      // After: typed equality filter, no JS eval

      const productId = Number(id)

      if (!Number.isFinite(productId) || productId <= 0) return []

      return await db.reviewsCollection.find({ product: productId })'
    verification: Confirm that `db.reviewsCollection.find` is never called with a `$where` key; a grep for `\$where` in the codebase should return zero hits after the fix.
    reference: CWE-943
