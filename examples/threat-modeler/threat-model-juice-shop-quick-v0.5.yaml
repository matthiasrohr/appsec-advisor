  stride: Tampering
  cwe: CWE-89
  title: SQL Injection Authentication Bypass in Login Endpoint — routes/login.ts:34
  affected_parameter: email, password (POST /rest/user/login…
  scenario: 'The login route at routes/login.ts:34 builds its query via direct string interpolation: `SELECT * FROM Users WHERE email = ''${req.body.email}'' AND password = ''...'' AND deletedAt IS NULL`. An attacker submits `email` as `'' OR 1=1--` and any password value. The resulting SQL becomes `WHERE email = '''' OR 1=1-- '' AND password = ...`, which returns the first row in the Users table (commonly the admin account), granting the attacker a fully-authenticated session without valid credentials.'
  evidence_summary: routes/login.ts:34 constructs the login SQL query using ES6 template literals with `req.body.email` and a pre-hashed `req.body.password` embedded directly, with no parameterized binding.
  impact_description: An unauthenticated attacker can log in as any user (including admin) by injecting SQL predicates, or enumerate and exfiltrate the entire Users table through UNION-based injection.
  likelihood: High
  impact: Critical
