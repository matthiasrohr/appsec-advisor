tier_root_causes:
  edge:
  - Client-side security enforcement bypassed by attacker-controlled browser context
  - Session tokens in JavaScript-accessible localStorage instead of HttpOnly cookies
  - DOM sanitization bypassed enabling persistent XSS via user-controlled content
  server:
  - Raw SQL string interpolation without parameterized queries across route handlers
  - Cryptographic key material (RSA key, BIP-39 mnemonic) committed to repository
  - Missing authentication middleware on sensitive resource and management endpoints
  - No rate limiting on any endpoint enabling brute-force and denial-of-service
  - Outdated express-jwt accepts alg:none tokens — no algorithm allowlist configured
