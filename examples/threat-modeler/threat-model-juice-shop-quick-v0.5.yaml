  title: Missing Rate Limiting Across All Input Endpoints
  affected_parameter: null
  scenario: An anonymous attacker floods `POST /rest/user/login`, `GET /rest/products/search`, or any other Express route with hundreds of requests per second from a single IP. No rate-limit middleware (`express-rate-limit` or equivalent) is registered in `server.ts` or at the route level. The `GET /rest/products/search` endpoint executes a full-table SQLite query on every request, meaning a concurrency of 100 requests/second can exhaust the event loop via I/O queuing. The login endpoint with no lockout also enables unbounded brute-force attempts as a secondary consequence.
  evidence_summary: No `rateLimit`, `throttle`, or `RateLimiter` middleware is present on any route in the backend codebase; `server.ts` contains no rate-limiting registration.
  impact_description: An attacker can render the Juice Shop API unresponsive for all users and conduct unconstrained credential brute-forcing against the login endpoint.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None identified.
  mitigation_title: Apply express-rate-limit middleware to all REST routes, with tighter limits on authentication endpoints
  remediation:
    effort: Low
    steps:
