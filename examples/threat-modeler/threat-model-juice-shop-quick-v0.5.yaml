- local_id: auth-005
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-307
  title: No Rate Limiting on Login Endpoint Enables Credential — routes/login.ts:32
  affected_parameter: POST /rest/user/login (email, password)
  scenario: The login route handler at routes/login.ts:32 applies no rate-limiting or throttling middleware before processing credentials. An attacker can submit an unbounded volume of login attempts against any known email address. Because passwords are hashed with MD5 (lib/insecurity.ts:42) rather than bcrypt, offline cracking of any leaked hash is fast; online brute force against the live endpoint is also unconstrained. Combined with the SQL injection on the same endpoint (auth-002), the attacker can simultaneously enumerate all accounts.
  evidence_summary: routes/login.ts:32 defines the route handler with no preceding `rateLimit()`, `slowDown()`, or equivalent middleware; the CONTROLS field confirms 'No rate limiting on login endpoint'.
  impact_description: An attacker can perform unconstrained credential stuffing, brute-force all accounts, or exhaust server resources with fabricated login traffic, denying service to legitimate users.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None.
  actor_ids:
  - ACT-D-01
  primary_actor: ACT-D-01
  mitigation_title: Add per-IP and per-account rate limiting to the login and password-reset endpoints
  remediation:
    effort: Low
    steps:
    - 'Install `express-rate-limit` and apply a limiter to POST /rest/user/login: `rateLimit({ windowMs: 15 * 60 * 1000, max: 10, standardHeaders: true, legacyHeaders: false })` — allows 10 attempts per 15 minutes per IP.'
    - Apply the same limiter (or a stricter one) to POST /rest/user/reset-password to prevent automated security-question guessing.
    - Implement account-level lockout or exponential back-off after 5 consecutive failed attempts for the same email, stored in Redis or an in-memory store, to block distributed attacks that rotate IPs.
    - Replace MD5 password hashing (`crypto.createHash('md5')` in lib/insecurity.ts:42) with `bcrypt.hash(password, 12)` to increase per-attempt cost.
    code_example: "import rateLimit from 'express-rate-limit'\nconst loginLimiter = rateLimit({\n  windowMs: 15 * 60 * 1000, // 15 minutes\n  max: 10,\n  message: 'Too many login attempts, please try again later'\n})\n// Apply before the login route:\napp.post('/rest/user/login', loginLimiter, login())"
    verification: Send 11 POST requests to /rest/user/login within 15 minutes from the same IP — the 11th request must return HTTP 429. Confirm the Retry-After header is set.
    reference: CWE-307
