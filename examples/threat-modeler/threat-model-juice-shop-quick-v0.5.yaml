- local_id: realtime-socket-io-006
  threat_category_id: TH-15
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-346
  title: Challenge Completion Bypass — registerWebsocketEvents.ts:40
  affected_parameter: data (XSS / SVG payload string)
  scenario: 'The `verifyLocalXssChallenge` handler at line 40 and `verifySvgInjectionChallenge` at line 45 call `challengeUtils.solveIf()` based solely on the attacker-supplied `data` payload matching a known string pattern. The handlers contain no browser-origin assertion, no session-ownership check, and no verification that the payload was actually executed in a DOM context. Any non-browser client with a socket connection can emit these events with the publicly documented XSS or SVG payload strings and trigger challenge completion without performing the exploit in a browser. This bypasses the application''s intended challenge verification chain and awards challenge credit to users who did not legitimately complete the challenge. Additionally, `cors: { origin: ''http://localhost:4200'' }` at line 20 is a dev-only origin that will be incorrect in any production deployment, creating pressure on operators to switch to a wildcard origin (`''*''`), which would then allow cross-site WebSocket connections from attacker-controlled pages without same-origin restrictions.'
  evidence_summary: '`challengeUtils.solveIf(challenges.localXssChallenge, () => utils.contains(data, ''<iframe src="javascript:alert(`xss`)">'')` at line 41 trusts attacker-supplied `data` as proof of challenge completion with no browser-context or origin verification.'
  impact_description: An attacker emitting the correct payload string directly over a WebSocket connection earns challenge credit without executing the exploit, undermining the integrity of the challenge verification system.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — no browser-origin assertion, session check, or DOM-execution proof in event handlers.
  mitigation_title: Enforce server-side origin assertion and restrict challenge-solve events to verified browser contexts only
  remediation:
    effort: High
    steps:
    - Check `socket.handshake.headers.origin` against the configured application origin list and reject events from non-browser or unexpected origins with `socket.disconnect(true)` when the origin does not match.
    - 'Replace the hardcoded `cors: { origin: ''http://localhost:4200'' }` with a runtime-configurable origin derived from an environment variable (e.g., `process.env.FRONTEND_ORIGIN`) so production deployments do not default to a wildcard or a dev-only value.'
    - For challenge-verify events specifically, consider requiring a CSRF-like nonce issued by the server at connection time and presented alongside the payload, making replay of known challenge strings insufficient without an active authenticated session.
    code_example: "// Replace hardcoded dev origin with env-driven config:\nconst io = new Server(server, {\n  cors: { origin: process.env.FRONTEND_ORIGIN ?? 'http://localhost:4200' }\n})\n\n// Reject non-browser origins in challenge-verify handlers:\nsocket.on('verifyLocalXssChallenge', (data: any) => {\n  const origin = socket.handshake.headers.origin\n  if (origin !== (process.env.FRONTEND_ORIGIN ?? 'http://localhost:4200')) {\n    socket.disconnect(true)\n    return\n  }\n  challengeUtils.solveIf(challenges.localXssChallenge, () =>\n    utils.contains(data, '<iframe src=\"javascript:alert(`xss`)\">')\n  )\n})"
    verification: Emit `verifyLocalXssChallenge` with the correct XSS payload from a `socket.io-client` script (non-browser) with a spoofed origin; assert the challenge is NOT marked solved and the socket is disconnected.
    reference: CWE-346
  evidence:
