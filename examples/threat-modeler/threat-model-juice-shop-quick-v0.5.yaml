  title: OAuth Implicit Flow Exposes Access Token in URL Fragment — oauth.component.ts:71
  affected_parameter: access_token
  scenario: The OAuthComponent's `parseRedirectUrlParams()` at line 71 extracts the OAuth access_token from the URL hash fragment (`this.route.snapshot.data.params.substr(1)`), confirming the application uses the deprecated implicit grant (response_type=token). The token is visible in browser history, can be captured by third-party scripts on the page via `document.location.hash`, and is logged by proxies that record full URLs. An attacker who can read browser history (shared device, malware, browser extension) or who injects a script before the fragment is consumed retrieves the bearer token without breaking any cryptographic protection. No state parameter validation is performed to prevent CSRF on the OAuth endpoint.
  evidence_summary: '`parseRedirectUrlParams()` at oauth.component.ts:71 parses the OAuth callback by splitting the URL hash fragment, confirming the implicit flow (access_token in fragment); no state parameter is validated anywhere in the component.'
  impact_description: Bearer token exposure via browser history or script interception; CSRF attack on the OAuth authorization endpoint allowing an attacker to link their OAuth identity to a victim's application session.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no state parameter, no PKCE, no nonce validation.
  mitigation_title: Replace OAuth implicit flow with authorization code flow with PKCE and validate state parameter
  remediation:
    effort: High
    steps:
    - Switch the Google OAuth configuration from `response_type=token` (implicit) to `response_type=code` (authorization code flow) and implement PKCE (code_verifier + code_challenge, method=S256) in the Angular client.
    - Generate a cryptographically random `state` parameter per login attempt, store it in sessionStorage, and validate it on redirect in `parseRedirectUrlParams()` before processing the code.
    - Exchange the authorization code for tokens server-side (backend endpoint), never exposing tokens in URL fragments or client JavaScript.
    - Replace the URL hash fragment parsing in `parseRedirectUrlParams()` with a query parameter reader for the `code` and `state` values.
    code_example: null
    verification: Inspect the OAuth redirect URL in the browser — confirm no `access_token` appears in the fragment. Confirm a `state` query parameter is present and validated. Confirm the authorization code is exchanged server-side.
