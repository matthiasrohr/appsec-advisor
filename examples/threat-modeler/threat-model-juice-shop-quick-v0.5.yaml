  name: Express REST API Backend
  description: Node.js/Express server handling all REST API routes at /rest/* and /api/*, user authentication via JWT issuance and validation, RBAC enforcement, file serving, and business logic. Intentionally contains multiple training vulnerabilities including SQLi, XSS, and broken authorization.
  paths:
