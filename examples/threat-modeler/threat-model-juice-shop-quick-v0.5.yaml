- local_id: web-frontend-001
  threat_category_id: TH-10
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-287
  title: Derived Password from OAuth Email Claim — oauth.component.ts:30
  affected_parameter: profile.email
  scenario: 'An attacker who knows a victim''s email address (obtainable from public profiles, breach databases, or the Juice Shop user listing) can compute the victim''s application password by reversing the email string and base64-encoding the result: `btoa(email.split('''').reverse().join(''''))`. The OAuthComponent performs this derivation at line 30 after receiving the Google access token, then calls `userService.save()` and `userService.login()` with the derived credential — bypassing OAuth entirely. An attacker who has never gone through any OAuth flow authenticates directly to the `/rest/user/login` endpoint with the derived password, gaining a valid session JWT. Because the same derivation runs on every OAuth login, the attacker''s session is indistinguishable from a legitimate OAuth-origin session.'
  evidence_summary: OAuthComponent.ngOnInit() at line 30 sets `password = btoa(profile.email.split('').reverse().join(''))` and immediately calls `userService.save()` and `userService.login()` with it, creating a parallel password-based authentication path for every OAuth user.
  impact_description: Full account takeover for any user who has ever logged in via OAuth; the entire OAuth user population is vulnerable to credential stuffing using only their email address.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no server-side check prevents the derived-password login path from being used without an OAuth flow.
  mitigation_title: Remove derived-password OAuth path and use server-side identity assertion from access token
  remediation:
    effort: High
    steps:
    - 'Replace the derived-password pattern: instead of calling `/rest/user/login` with a computed password, send the Google access_token directly to a dedicated backend endpoint (e.g. `/rest/oauth/google`) that validates the token against Google''s tokeninfo API, then issues the application JWT on success.'
    - On the backend, never store or accept a user-constructed password derived from a claim. Introduce an `oauth_provider` flag on the user record and reject password-based logins for OAuth-only accounts.
    - Rotate all sessions for affected users and force re-authentication through the corrected OAuth flow.
    code_example: '// Before (oauth.component.ts:30) — predictable password derived from email:

      const password = btoa(profile.email.split('''').reverse().join(''''))

      this.userService.login({ email: profile.email, password, oauth: true })


      // After — send access_token to a server-side endpoint that validates with Google:

      this.userService.oauthAssert({ provider: ''google'', token: **** (12 chars) }).subscribe(...)'
    verification: POST /rest/user/login with body {"email":"victim@example.com","password":"<btoa(email.split('').reverse().join(''))>"} — must return HTTP 401. Confirm the endpoint no longer accepts the derived credential without a valid OAuth flow.
    reference: CWE-287
