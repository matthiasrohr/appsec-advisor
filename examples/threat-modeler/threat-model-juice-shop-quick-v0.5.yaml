  scenario: An attacker who achieves JavaScript execution in the victim's browser — via stored XSS (see web-frontend-002), a browser extension, or a malicious ad — reads `localStorage.getItem('token')` and exfiltrates the session JWT. The JWT is written to localStorage at login.component.ts:101 and oauth.component.ts:51 on every login. Because localStorage is accessible to all scripts on the same origin, any XSS payload can trivially extract it with a single line of JavaScript. The attacker then replays the stolen JWT against the backend API from their own machine, taking over the victim's session without requiring the victim's credentials.
  evidence_summary: '`localStorage.setItem(''token'', authentication.token)` at login.component.ts:101 and oauth.component.ts:51 stores the session JWT in a JavaScript-readable browser location accessible to any same-origin script.'
