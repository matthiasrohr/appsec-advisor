  cwe: CWE-321
  title: Hardcoded RSA Private Key Committed to Source Repository — lib/insecurity.ts:21
  affected_parameter: JWT signing key (privateKey)
  scenario: The RSA-2048 private key used to sign all JWTs is embedded as a string literal in lib/insecurity.ts at line 21. Any actor with read access to the repository — including supply-chain attackers who compromise the CI/CD pipeline, developers, or anyone who downloads a leaked copy of the source — can extract this key and use it to sign arbitrary JWTs with any payload (any user ID, any role). The private key never needs to be rotated via an operational process because it is baked into the code; a breach of the key requires a code change and full redeployment, not a secrets rotation.
  evidence_summary: lib/insecurity.ts:21 assigns the 1024-byte PEM-formatted RSA private key as a string literal `const privateKey = '[PEM PRIVATE KEY — REDACTED]\r\nMIICXAIBAAK...'`, which is then used in `security.authorize()` at line 54 for all JWT issuance.
  impact_description: Any party with source-code access can produce valid RS256-signed JWTs for any user and any role, completely undermining JWT-based authentication and authorization.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. Key is committed in plaintext and used unconditionally.
  actor_ids:
  - ACT-D-06
  - ACT-D-03
  primary_actor: ACT-D-06
  mitigation_title: Remove hardcoded private key and load it from an environment-injected secret or secret manager at runtime
  remediation:
    effort: Medium
    steps:
    - Remove the `privateKey` string literal from lib/insecurity.ts. Replace with `process.env.JWT_PRIVATE_KEY` loaded at startup, with a startup guard that terminates the process if the variable is absent.
    - Generate a new RSA-2048 key pair; store the private key in a secrets manager (AWS Secrets Manager, HashiCorp Vault, or equivalent) and inject it via an environment variable. Store only the public key in `encryptionkeys/jwt.pub`.
    - 'Rotate the key immediately: issue new tokens, invalidate all sessions signed with the compromised key, and add the old key to a blocklist.'
    - Add a CI secret-scanning rule (e.g., `gitleaks`, `trufflehog`) to reject commits containing PEM-formatted private keys.
    code_example: '// Before (vulnerable):

      const privateKey = ''[PEM PRIVATE KEY — REDACTED]\r\nMIICXA...''


      // After:

      const privateKey = process.env.JWT_PRIVATE_KEY

      if (!privateKey) throw new Error(''JWT_PRIVATE_KEY environment variable is required'')'
    verification: Confirm `git log -S 'BEGIN RSA PRIVATE KEY'` returns no commits after the fix. Confirm the application fails to start when JWT_PRIVATE_KEY is unset. Confirm a token signed with the old key is rejected by the new deployment.
    reference: CWE-321
