  stride: Elevation of Privilege
  cwe: CWE-915
  title: Mass assignment via finale-rest auto CRUD resources (server.ts:501)
  affected_parameter: role / arbitrary model fields
  scenario: '`finale.resource(...)` auto-exposes full CRUD for the models in `autoModels` (server.ts:483-511) without a field
    allowlist. The create/update handlers bind the entire request body onto the Sequelize model, so a registration or update
    request can set privileged columns the UI never offers — e.g. POSTing `{"email":"x","password":"y","role":"admin"}` to
    the user resource sets an attacker''s role to admin (the registerAdminChallenge). No `attributes`/`exclude` write allowlist
    is applied on create.'
  evidence_summary: finale.resource at server.ts:501 registers automatic create/update over autoModels with only read-side
    excludes, leaving write-side mass assignment open.
  impact_description: Privilege escalation to admin and tampering with protected fields (e.g. deluxeToken, isDeleted) through
    unfiltered model binding.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Read-side excludes on some resources; no write-side field allowlist on create/update.
  mitigation_title: Whitelist writable fields on every finale resource create/update hook
  remediation:
    effort: Medium
    steps:
