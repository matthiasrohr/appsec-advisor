  impact: Medium
  risk: Medium
  controls_in_place: CodeQL static analysis and scheduled OWASP ZAP baseline scans run, and a CycloneDX SBOM is generated
    at build; but no dependency-vulnerability scanning or update automation is wired into CI.
  mitigation_title: Add SCA scanning and a dependency-update bot to the pipeline
  remediation:
