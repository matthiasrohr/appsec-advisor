  title: Unauthenticated WebSocket allows deleting shared notifications
  affected_parameter: socket.io notification received event
  scenario: registerWebsocketEvents() creates a Socket.IO server with no authentication or authorization on connection (lib/startup/registerWebsocketEvents.ts:19-23).
    Any client that connects immediately receives every queued 'challenge solved' notification (lines 29-31, an information
    leak of server state) and can emit 'notification received' with an arbitrary flag to splice entries out of the shared,
    process-global notifications array (lines 33-38). Because the array is shared across all users, one anonymous client removes
    notifications destined for everyone, tampering with and denying delivery of server-pushed messages.
  evidence_summary: lib/startup/registerWebsocketEvents.ts:33-38 handles 'notification received' by splicing the shared notifications
    array, on a socket that underwent no authentication check at connection.
  impact_description: Any anonymous WebSocket client reads all queued notifications and deletes them for every user, tampering
    with shared state.
