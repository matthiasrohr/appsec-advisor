- local_id: file-storage-001
  threat_category_id: TH-07
  additional_categories:
  - TH-01
  stride: Information Disclosure
  cwe: CWE-611
  title: XML External Entity file disclosure (routes/fileUpload.ts:76)
  affected_parameter: file (multipart XML body)
  scenario: POST /file-upload accepts a .xml part and passes its raw buffer to parseXmlString (routes/fileUpload.ts:76). lib/xml.ts:35
    parses with XML_PARSE_NOENT | XML_PARSE_DTDLOAD and calls xmlRegisterFsInputProviders(), which grants the libxml2-wasm
    sandbox host-filesystem access. An unauthenticated attacker uploads a document declaring <!ENTITY xxe SYSTEM "file:///etc/passwd">
    and references &xxe; in the body; the resolved contents are reflected verbatim in the 410 error at routes/fileUpload.ts:79
    (utils.trunc(xmlString, 400)). The same primitive reaches http:// URLs, turning XXE into blind SSRF against prod-env internal
    services and the cloud metadata endpoint.
  evidence_summary: parseXmlString enables NOENT+DTDLOAD and registers filesystem input providers (lib/xml.ts:35, lib/xml.ts:21),
    and the parsed string is echoed back to the client at routes/fileUpload.ts:79.
  impact_description: Arbitrary local file read (/etc/passwd, application secrets, source) and internal network reachability
    from an internet-facing endpoint.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: A 2000ms vm.runInContext timeout bounds entity-expansion CPU but does not prevent single-entity file
    reads. The XML branch is gated behind the deprecatedInterfaceChallenge flag.
  mitigation_title: Disable DTD loading and external-entity resolution in parseXmlString
  remediation:
    effort: Low
    steps:
    - In lib/xml.ts, drop XML_PARSE_DTDLOAD and XML_PARSE_NOENT from the parse option so DOCTYPE declarations and entity substitution
      are rejected, and remove the xmlRegisterFsInputProviders() call that grants host filesystem access.
    - Reject any document whose prolog contains a <!DOCTYPE ...> before parsing, returning HTTP 400.
    - Stop reflecting parsed XML content in the error response at routes/fileUpload.ts:79; return a static message so a partial
      parse cannot leak file bytes.
    code_example: '// lib/xml.ts — After: no DTD, no entity substitution, no FS providers

      const option = libxml2.ParseOption.XML_PARSE_NOBLANKS | libxml2.ParseOption.XML_PARSE_NOCDATA // Before also had XML_PARSE_NOENT
      | XML_PARSE_DTDLOAD

      if (/<!DOCTYPE/i.test(data)) throw new Error(''DTDs are not allowed'')

      const xmlDoc = libxml2.XmlDocument.fromString(data, { option })'
    verification: Upload a file with body '<?xml version="1.0"?><!DOCTYPE r [<!ENTITY x SYSTEM "file:///etc/passwd">]><r>&x;</r>'
      to /file-upload and assert the response is 400 with no root:x:0:0 substring in the body.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
  evidence:
  - file: routes/fileUpload.ts
    line: 76
