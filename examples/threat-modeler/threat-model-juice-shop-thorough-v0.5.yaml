- local_id: auth-010
  threat_category_id: TH-06
  additional_categories:
  - TH-02
  stride: Elevation of Privilege
  cwe: CWE-863
  title: Role authorization trusts self-asserted JWT role claim (lib/insecurity.ts:157)
  affected_parameter: token data.role
  scenario: isAccounting() (lib/insecurity.ts:154-162) and isCustomer/isDeluxe (lines 165-173) grant access purely on decodedToken.data.role
    from the token payload. Combined with the hardcoded signing key (auth-001) and unpinned verification (auth-002), an attacker
    who mints or alters a token with data.role='accounting' or 'admin' passes these guards and reaches privileged accounting/admin
    functionality. Even absent key forgery, the reliance on a client-carried role claim with no server-side re-derivation
    from the persisted user record means any token-integrity weakness escalates directly to privilege escalation.
  evidence_summary: lib/insecurity.ts:157 authorizes on decodedToken?.data?.role === roles.accounting with no lookup of the
    user's actual persisted role.
  impact_description: A forged or altered role claim elevates an attacker to accounting/admin capabilities across the application.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Role is checked, but the value is read from the token payload rather than re-derived from the authoritative
    user record.
  mitigation_title: Re-derive role from the persisted user record after verified authentication
  remediation:
    effort: Medium
    steps:
    - After verifying the token (RS256-pinned), load the user by id and use the database role, not the token's data.role,
      for authorization.
    - Cache role server-side per session and invalidate on role change so a stale/forged claim cannot grant access.
    - Apply the re-derivation consistently in isAccounting/isDeluxe/isCustomer.
    code_example: '// Before (lib/insecurity.ts:157)

      // if (decodedToken?.data?.role === roles.accounting) next()


      // After: authoritative role from DB

      const claims = jwt.verify(utils.jwtFrom(req), publicKey, { algorithms: [''RS256''] })

      const user = await UserModel.findByPk(claims.data.id)

      if (user?.role === roles.accounting) next(); else res.status(403).json({ error: ''Forbidden'' })'
    verification: Present a token whose data.role='accounting' but whose user id maps to a customer record; confirm accounting
      routes return 403.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html
