- local_id: web3-nft-002
  threat_category_id: TH-18
  additional_categories: []
  stride: Tampering
  cwe: CWE-601
  title: Open redirect via substring allowlist match (routes/redirect.ts:19)
  affected_parameter: to
  scenario: 'GET /redirect?to=<url> passes the attacker-controlled `query.to` to `res.redirect(toUrl)` (routes/redirect.ts:16-19)
    after only calling `security.isRedirectAllowed(toUrl)`. That guard (lib/insecurity.ts:133-139) accepts the URL when it
    merely `includes()` any allowlisted string as a substring. An attacker crafts `https://evil-wallet-drainer.com/#https://github.com/juice-shop/juice-shop`
    (or `?x=` prefix): the allowlisted GitHub URL appears as a substring, the check returns true, and the victim''s browser
    is 302-redirected to the attacker origin. On a crypto/wallet surface this is a high-value phishing primitive — the redirect
    lands users on a fake wallet-connect or seed-phrase page under cover of the trusted Juice Shop domain.'
  evidence_summary: routes/redirect.ts:19 executes `res.redirect(toUrl)` on the raw query value, and its only gate `isRedirectAllowed`
    (lib/insecurity.ts:136) uses `url.includes(allowedUrl)` rather than an origin/exact match, so any URL containing an allowlisted
    substring is honored.
  impact_description: Attacker turns the trusted app origin into an open redirector to a wallet-phishing site, enabling credential/seed-phrase
    theft.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: A redirect allowlist exists but is enforced with substring `includes()` matching, which is bypassable.
  mitigation_title: Replace substring redirect matching with exact-origin allowlisting in isRedirectAllowed
  remediation:
    effort: Low
    steps:
    - Parse `toUrl` with the WHATWG `URL` API and compare the resulting `origin` (or full canonical href) against the allowlist
      by strict equality, not `includes()`.
    - Reject any URL that fails to parse or whose origin is not explicitly allowlisted, returning HTTP 406 as today.
    - Prefer redirecting to an internal path token that maps server-side to the external URL, so the raw external URL never
      comes from the client.
    code_example: "export const isRedirectAllowed = (url: string) => {\n  let target: URL\n  try { target = new URL(url) }\
      \ catch { return false }\n  // After: exact allowlist membership, not substring inclusion\n  return redirectAllowlist.has(target.href)\n\
      }"
    verification: Request `/redirect?to=https://evil.example/%23https://github.com/juice-shop/juice-shop`; expect HTTP 406
      and no `Location` header pointing at evil.example.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html
  evidence:
  - file: routes/redirect.ts
    line: 19
  evidence_check: unchecked
