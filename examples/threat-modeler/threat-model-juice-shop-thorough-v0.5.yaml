- local_id: sqlite-database-007
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: SQLite single-writer file lock exhausts under concurrent writes (index.ts:35)
  affected_parameter: null
  scenario: 'The datastore is a single SQLite file (models/index.ts:41) using IMMEDIATE transactions (models/index.ts:40),
    which acquire a database-wide write lock. SQLite permits only one writer at a time; concurrent write transactions receive
    SQLITE_BUSY. The configured retry policy caps at max: 5 (models/index.ts:35-38) with no backoff ceiling on total load.
    Under a burst of write-heavy requests (registrations, orders, feedback, basket updates), writers serialize on the single
    file lock and, once the 5 retries are exhausted, transactions fail outright. An attacker can deliberately flood any write
    endpoint to induce sustained SQLITE_BUSY failures, degrading or denying service for all users, since every write in the
    app funnels through this one file.'
  evidence_summary: models/index.ts:35-40 configures SQLITE_BUSY retry max:5 with IMMEDIATE (whole-DB write-lock) transactions
    against a single-file store — no writer concurrency and a hard retry cap.
  impact_description: A flood of concurrent writes serializes on the single file lock and fails after 5 retries, denying writes
    application-wide.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Bounded SQLITE_BUSY retry (max 5) mitigates transient contention but does not address sustained write
    pressure or provide writer concurrency.
  mitigation_title: Enable WAL mode and rate-limit write endpoints, or migrate to a concurrent-writer database
  remediation:
    effort: Medium
    steps:
    - Enable SQLite WAL journal mode (PRAGMA journal_mode=WAL) to allow readers to proceed during writes and reduce lock contention.
    - Set a busy_timeout so writers wait rather than immediately failing, and tune the Sequelize retry/backoff for write load.
    - Apply per-IP rate limiting to write-heavy endpoints upstream so a single client cannot monopolize the write lock.
    - For real concurrency needs, migrate to a client-server RDBMS (PostgreSQL) that supports concurrent writers.
    code_example: '// models/index.ts — after creating the Sequelize instance

      await sequelize.query(''PRAGMA journal_mode=WAL;'')   // concurrent reads during writes

      await sequelize.query(''PRAGMA busy_timeout=5000;'')  // wait, don''t instantly fail on lock

      // plus upstream: express-rate-limit on write routes to cap burst write pressure'
    verification: Drive N concurrent write transactions (e.g. 200 parallel order creations) and assert the failure rate stays
      near zero after enabling WAL + busy_timeout, versus SQLITE_BUSY failures on the current config.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
  evidence:
  - file: models/index.ts
    line: 35
  evidence_check: unchecked
  prior_finding_ref: null
  architectural_violation: false
  component_name: SQLite Database
  source: stride
  evidence_tier: confirmed-exploitable
