- local_id: angular-frontend-004
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client-side-only role gating trusts unverified JWT (app.guard.ts:54)
  affected_parameter: token
  scenario: 'AdminGuard, AccountingGuard and DeluxeGuard authorize privileged routes by calling loginGuard.tokenDecode(),
    which runs jwtDecode(localStorage token) — a pure Base64 decode with NO signature verification — and compares payload.data.role
    to roles.admin/accounting/deluxe (app.guard.ts:54/70/86). A user can hand-craft a token whose payload sets role:''admin'',
    place it in localStorage, and the router will render the admin UI, accounting board and deluxe features. While the backend
    still re-checks privileged APIs, exposing admin/accounting screens and their embedded logic client-side is a broken trust
    boundary: any server endpoint that under-enforces authorization becomes reachable, and the UI leaks privileged workflow
    structure.'
  evidence_summary: tokenDecode() (line 38) uses jwtDecode without verifying the signature, and the guards at lines 54/70/86
    branch purely on the decoded role claim.
  impact_description: Client-side unlocking of admin/accounting/deluxe interfaces and reliance on the SPA as the sole authorization
    boundary for those routes.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Route guards exist but decode an unverified token; server-side re-checks are the only real enforcement.
  mitigation_title: Treat client-side guards as UX-only and enforce role checks server-side on every privileged endpoint
  remediation:
    effort: Medium
    steps:
    - Ensure every /rest and /api endpoint behind an Admin/Accounting/Deluxe route independently verifies the JWT signature
      and role server-side — do not rely on app.guard.ts.
    - Document the client guards as cosmetic; never gate a security decision on jwtDecode output in the browser.
    - If any privileged data is fetched purely because a guard passed, add server authorization to that data endpoint.
    code_example: '// app.guard.ts:38 — jwtDecode does NOT verify the signature

      payload = jwtDecode(token)              // attacker-forgeable role claim

      // app.guard.ts:54 — authz decision on unverified claim (UX gate only)

      if (payload?.data && payload.data.role === roles.admin) { return true }

      // Server MUST re-verify: e.g. Express middleware validating the RS256/HS256

      // signature and role before serving any admin API response.'
    verification: Forge a token with an unsigned/invalid signature and role:'admin', set it in localStorage, then call each
      admin API — all must return 401/403 regardless of the client guard passing.
    reference: CWE-602
  evidence:
