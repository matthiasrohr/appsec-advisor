  stride: Tampering
  cwe: CWE-829
  title: CI/CD Workflow Supply-Chain Risk
  affected_parameter: null
  scenario: 'The image-compression workflow pins `calibreapp/image-actions@main` (line 33) — a mutable branch ref, not a tag
    or commit SHA. On the `push` events to master/develop the step runs with `githubToken: ${{ secrets.GITHUB_TOKEN }}` (line
    35) and, when it produces output, a follow-up step opens a pull request with `peter-evans/create-pull-request@v8`. Because
    `@main` resolves to whatever the upstream repository''s default branch points at during each run, an attacker who compromises
    the calibreapp/image-actions repository (or a maintainer account) needs zero further effort — no release, no re-tag —
    to have arbitrary JavaScript execute inside this repository''s runner with the repo-scoped GITHUB_TOKEN. This is the weakest
    link among the workflow action references: every other action in ci.yml, release.yml, codeql and zap is SHA-pinned, but
    this one floats on a live branch.'
  evidence_summary: The image-actions step resolves `@main`, a branch that moves on every upstream commit, while receiving
    the repository GITHUB_TOKEN.
  impact_description: A single upstream commit to calibreapp/image-actions runs attacker code with GITHUB_TOKEN write scope
    in the juice-shop runner, enabling code push or release tampering.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The job is gated to `github.repository == 'juice-shop/juice-shop'` and to same-repo PR heads, limiting
    fork abuse; but the mutable upstream ref remains fully trusted on push events.
  mitigation_title: Pin calibreapp/image-actions to a full-length commit SHA
  remediation:
    effort: Low
    steps:
    - Replace `calibreapp/image-actions@main` with `calibreapp/image-actions@<40-char-commit-SHA>` for a reviewed release
      commit, appending a `# vX.Y.Z` comment as the other steps do.
    - Also pin the tag-referenced actions in this file (actions/checkout@v6 on line 30, peter-evans/create-pull-request@v8
      on line 42) to commit SHAs.
    - Adopt a pinning enforcement gate (e.g. `zizmor`, `pin-github-action`, or a StepSecurity policy) so future edits reintroducing
      branch/tag refs fail CI.
    code_example: "# .github/workflows/image_actions.yml\n# Before:\n#   uses: calibreapp/image-actions@main       # floats\
