trust_boundaries:
- id: tb-1
  name: Public Internet → Application
  description: 'All inbound HTTP/HTTPS traffic from anonymous users, authenticated users, and B2B partners reaches the Express
    server on port 3000. No WAF, no reverse proxy, no TLS termination in code (operator-supplied). CORS is wide-open (Access-Control-Allow-Origin:
    *).'
  from: external
  to: backend-api
  enforcement: None in application code; operator responsible for TLS termination and network ACLs
  controls:
  - express-rate-limit (partial, endpoint-specific)
  - helmet.noSniff()
  - helmet.frameguard()
- id: tb-2
  name: Browser → Backend API
  description: Angular SPA communicates with backend via XHR/fetch. JWT Bearer token attached by frontend via Angular interceptor.
    Same origin in production (served from same port 3000). CSRF protection absent — JWT in Authorization header is the only
    credential.
  from: angular-frontend
  to: backend-api
  enforcement: JWT RS256 Bearer token via express-jwt 0.1.3 (outdated; alg:none bypass)
  controls:
  - express-jwt isAuthorized() middleware
  - JWT RS256 signature verification
- id: tb-3
  name: Backend API → SQLite Database
  description: Sequelize ORM (Node.js) accesses SQLite file directly via filesystem. No separate database process, no network
    socket, no authentication to database. SQL injection possible in raw queries (e.g. searchProducts uses LIKE with unparameterized
    user input).
  from: backend-api
  to: sqlite-database
  enforcement: Sequelize ORM parameterization (incomplete — raw queries present)
  controls:
  - Sequelize parameterized queries (partial coverage)
  - ORM model definitions
- id: tb-4
  name: Backend API → File Storage
  description: Node.js process reads/writes files in ftp/ and assets/public/images/uploads via fs module and Multer. Path
    traversal defenses applied (sanitize-filename) but bypasses exist. FTP directory is publicly readable via HTTP without
    authentication.
  from: backend-api
  to: file-storage
  enforcement: sanitize-filename library + file type detection (file-type package)
  controls:
  - Multer file size limits
  - sanitize-filename
  - file-type content sniffing
- id: tb-5
  name: CI/CD Pipeline → Production Registry
  description: GitHub Actions release.yml builds multi-platform Docker images and pushes to DockerHub using DOCKERHUB_USERNAME/DOCKERHUB_TOKEN
    secrets. Third-party GitHub Actions used without SHA pinning (tag-only), creating supply-chain risk.
  from: ci-cd-pipeline
  to: external
  enforcement: GitHub Actions secret management; OIDC not used
  controls:
  - GitHub Actions secret masking
  - CodeQL scanning
  - OWASP ZAP scan
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Authentication
  effectiveness: Unsafe
  kind: mechanism
  assessment: 'Login endpoint at routes/login.ts:34 constructs a raw Sequelize query with string interpolation: `SELECT *
    FROM Users WHERE email = ''${req.body.email}'' AND password = ''${security.hash(req.body.password)}''`. SQL injection
    via email field is trivially exploitable (loginAdminChallenge, loginBenderChallenge). Password hashing uses MD5 (lib/insecurity.ts:48:
    `crypto.createHash(''md5'')`), which is cryptographically broken — rainbow tables recover all common passwords instantly.
    Multiple hardcoded credentials are present in login.ts:59-65 (admi**** (8 chars), etc.) and in datacreator.ts.'
  group_subcontrols: true
  subcontrols:
  - title: Login
    effectiveness: Unsafe
    status_note: SQL injection via email parameter; no parameterized query used
    assessment: routes/login.ts:34 uses raw string interpolation in Sequelize query
  - title: Password Storage
    effectiveness: Unsafe
    status_note: MD5 without salt — rainbow-table attack recovers all passwords
    assessment: 'lib/insecurity.ts:48: `crypto.createHash(''md5'').update(data).digest(''hex'')`'
  - title: Password Reset
    effectiveness: Weak
    status_note: Security question reset with plaintext answers; rate-limiting applied to /rest/user/reset-password only
    assessment: routes/resetPassword.ts reads SecurityAnswer model; answers stored in plaintext
  - title: Registration
    effectiveness: Weak
    status_note: No CAPTCHA, no email verification; admin account seeded with known password
    assessment: POST /api/Users is unauthenticated and uncapped; datacreator.ts seeds admin@... with admi**** (8 chars)
  - title: 2FA / TOTP
    effectiveness: Adequate
    status_note: TOTP-based 2FA implemented via otplib; available but optional
    assessment: routes/2fa.ts uses otplib.generateSecret/verifySync; tmpToken flow gates second factor properly
- domain: Session and Token Controls
  control: JWT Token Issuance and Verification
  effectiveness: Unsafe
  kind: primitive
  assessment: 'JWT RS256 tokens are signed using a private key hardcoded verbatim in lib/insecurity.ts:23 and committed to
    the public GitHub repository. Any actor with repo read access can sign arbitrary JWTs and impersonate any user including
    admins. express-jwt version 0.1.3 (current: 9.x) is used for verification — this version accepts the alg:none bypass (CVE-2015-9235
    class). Token expiry is 6 hours with no rotation or revocation mechanism. The in-memory `authenticatedUsers.tokenMap`
    object maps tokens to user sessions but has no cleanup, enabling memory exhaustion.'
  implementation: lib/insecurity.ts:23-27, lib/insecurity.ts:55-57; express-jwt@0.1.3 in package.json
- domain: Authorization Controls
  control: Route-Level Access Control
  effectiveness: Missing
  kind: mechanism
  assessment: 'The route inventory shows 247 routes, all marked auth_required=false by the scanner (likely because express-jwt
    middleware is applied selectively rather than globally). Sensitive endpoints including GET /api/Users (returns all users),
    POST /api/Complaints, GET /api/Recycles, and the full /api/ CRUD surface (finale-rest) are unauthenticated. CORS is set
    to allow all origins: `app.options(''*'', cors()); app.use(cors())` at server.ts:182-183 with no origin whitelist. Admin-only
    routes like /rest/admin/application-configuration and /rest/order-history/orders are reachable without authentication
    per test results.'
- domain: Query Construction and Data Access Controls
  control: SQL Query Parameterization
  effectiveness: Unsafe
  kind: primitive
  assessment: 'At least two confirmed SQL injection points using raw Sequelize queries with string interpolation: (1) routes/login.ts:34
    — `WHERE email = ''${req.body.email}'' AND password = ''${hash}''`; (2) routes/search.ts:23 — `WHERE ((name LIKE ''%${criteria}%''
    OR description LIKE ''%${criteria}%'') AND deletedAt IS NULL)`. Both are intentional vuln-code-snippet marked lines. Sequelize
    parameterized queries (Model.findAll with `where:` clause) are used elsewhere — the injection points are deliberate bypasses.
    UNION-based extraction of the entire database is possible via the search endpoint.'
- domain: Input Boundary Validation Controls
  control: HTML Sanitization and Input Validation
  effectiveness: Weak
  kind: cross-cutting
  assessment: 'Three sanitization functions exist in lib/insecurity.ts: sanitizeHtml (uses sanitize-html library — Adequate
    for covered inputs), sanitizeLegacy (regex `/<(?:\w+)\W+?[\w]/gi` — trivially bypassed by many XSS payloads), and sanitizeSecure
    (recursive sanitizeHtml loop — adequate but not universally applied). No centralized input validation framework: individual
    routes apply validation inconsistently. B2B orderLinesData field (b2bOrder.ts) is parsed as JSON without schema validation
    — prototype pollution possible.'
  implementation: lib/insecurity.ts:58-67
- domain: Output Encoding and Rendering Controls
  control: Template Encoding and XSS Prevention
  effectiveness: Partial
  kind: surface
  assessment: 'Angular''s default template binding (`{{ }}` and `[property]`) auto-escapes HTML — adequate for rendered Angular
    views. However, stored XSS is possible via: (1) Memory caption field submitted via POST /rest/memories rendered without
    sanitizeSecure; (2) Product name/description fields stored in SQLite and rendered in Angular without additional server-side
    encoding; (3) hbs (Handlebars) templates used for some server-side views — Handlebars auto-escapes by default but `{{{
    }}}` triple-brace usage would not. xssFilter in Helmet is explicitly commented out at server.ts:188.'
- domain: Browser and Cross-Origin Controls
  control: CORS and Content Security Policy
  effectiveness: Missing
  kind: surface
  assessment: 'CORS is completely unrestricted: `app.options(''*'', cors()); app.use(cors())` at server.ts:182-183 allows
    any origin to make credentialed cross-origin requests. No Content-Security-Policy header is set (helmet.contentSecurityPolicy()
    is not called). Helmet applied partially: only helmet.noSniff() and helmet.frameguard() are active; helmet.xssFilter()
    is commented out. Feature-Policy is set for payment:''self'' only (server.ts:190). No CSRF protection: application relies
    on JWT in Authorization header but CORS wildcard + cookie-parser combination creates CSRF risk on cookie-based state.'
- domain: Cryptography Secrets and Data Protection
  control: Cryptographic Primitive Selection and Key Management
  effectiveness: Unsafe
  kind: primitive
  assessment: 'Three critical cryptographic failures: (1) Password hashing uses MD5 without salt (lib/insecurity.ts:48) —
    completely broken for password storage; bcrypt/argon2 required. (2) JWT signing key is a 2048-bit RSA private key hardcoded
    at lib/insecurity.ts:23 and committed to the public GitHub repository — permanently compromised. (3) HMAC function uses
    hardcoded key ''pa4qacea4VK9t9nGv7yZtwmj'' (lib/insecurity.ts:49). No secrets management system, no environment-variable
    injection of keys, no key rotation mechanism. All cryptographic secrets are in source code.'
- domain: File Parser and Outbound Request Controls
  control: File Upload and URL Fetch Safety
  effectiveness: Unsafe
  kind: surface
  assessment: File upload at /file-upload (handleXmlUpload, handleYamlUpload, handleZipFileUpload — routes/fileUpload.ts)
    accepts XML without XXE protection (no DTD disabling), YAML with potential unsafe deserialization, and ZIP files (ZIP
    bomb risk). File type check is extension-based only (fileType check at routes/fileUpload.ts:62-65 uses originalname substring,
    not magic bytes). Profile image URL upload at /profile/image/url (routes/profileImageUrlUpload.ts) fetches arbitrary URLs
    via the `download` npm package — SSRF enabling access to internal services and cloud metadata endpoints (169.254.169.254).
  implementation: routes/fileUpload.ts:62-65, routes/profileImageUrlUpload.ts
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Security and Dependency Management
  effectiveness: Partial
  kind: lifecycle
  assessment: 'Positive controls: CodeQL analysis (codeql-analysis.yml), OWASP ZAP dynamic scan (zap_scan.yml), CycloneDX
    SBOM generation on release, and Dependabot/automated dependency updates configured. Gaps: (1) Third-party GitHub Actions
    pinned by tag not SHA (e.g. actions/checkout@v4) — supply-chain compromise possible; (2) express-jwt@0.1.3 is over 10
    major versions behind (current 9.x) with known CVEs; (3) Dockerfile has no HEALTHCHECK instruction; (4) npm install does
    not use --ignore-scripts, allowing postinstall script execution from malicious deps; (5) Node.js 26 is tested in CI but
    currently pre-release/unstable.'
- domain: Real-time and Not Applicable Controls
  control: WebSocket and Socket.IO Authentication
  effectiveness: Weak
  kind: surface
  assessment: Socket.IO is used for real-time challenge notifications and order tracking (registerWebsocketEvents in lib/startup/).
    WebSocket upgrade does not enforce JWT authentication — anonymous connections can receive broadcast events. Socket.IO
    event namespace is not scoped per-user for sensitive notifications. Prometheus metrics endpoint at /metrics is exposed
    without authentication (routes/metrics.ts) — leaks application telemetry to any caller. Blockchain/NFT features (routes/web3Wallet.ts,
    routes/nftMint.ts) interact with ethers.js — smart contract interaction risks not in scope for this assessment.
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated dependency updates
  effectiveness: Missing
  kind: lifecycle
  assessment: Automated dependency updates not detected in the repository. Patch-management posture depends on this control
    being in place — the team is reactive rather than proactive without it.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Lockfile hygiene
  effectiveness: Missing
  kind: lifecycle
  assessment: Lockfile hygiene not detected in the repository. Patch-management posture depends on this control being in place
    — the team is reactive rather than proactive without it.
  linked_threats: []
threats:
- local_id: angular-frontend-005
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: SPA holds session JWT in localStorage with no Backend-for-Frontend
  affected_parameter: token
  scenario: 'The application is a pure SPA that stores the session JWT in localStorage and reads it back to authenticate every
    request: the router guard checks localStorage.getItem(''token'') (app.guard.ts:18), the HTTP interceptor injects Authorization:
    Bearer <localStorage token> (request.interceptor.ts:13-18), and the OAuth flow writes the token to localStorage (oauth.component.ts:51).
    localStorage is readable by any JavaScript in the origin, so any of the XSS sinks in this component immediately yields
    the bearer token. There is no Backend-for-Frontend holding the token server-side and no httpOnly cookie; the token''s
    confidentiality depends entirely on the SPA being XSS-free, which it is not.'
  evidence_summary: request.interceptor.ts:13-16 pulls the JWT from localStorage to build the Authorization header, confirming
    the session credential lives in JavaScript-readable storage.
  impact_description: Any single XSS (see angular-frontend-002/003) exfiltrates the session token, giving the attacker full
    authenticated access; the architecture provides no server-side token custody.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. The token is in localStorage; no BFF, no httpOnly/SameSite cookie session.
  mitigation_title: Introduce a Backend-for-Frontend and move the session to an httpOnly SameSite cookie
  remediation:
    effort: High
    steps:
    - Add a Backend-for-Frontend that performs login/OAuth exchange server-side and issues the browser an httpOnly; Secure;
      SameSite=Strict session cookie instead of a bearer token.
    - Remove token reads/writes from localStorage (app.guard.ts:18/35, request.interceptor.ts:13, oauth.component.ts:51) and
      let the browser attach the cookie automatically.
    - Add CSRF protection (double-submit or SameSite=Strict) once the credential moves to a cookie.
    code_example: "// BEFORE (request.interceptor.ts:13) — JS-readable bearer token\nif (localStorage.getItem('token')) {\n\
      \  req = req.clone({ setHeaders: { Authorization: `Bearer ${localStorage.getItem('token')}` } })\n}\n// AFTER — no token\
      \ in JS; BFF sets httpOnly cookie, browser sends it\nreq = req.clone({ withCredentials: true })   // session cookie:\
