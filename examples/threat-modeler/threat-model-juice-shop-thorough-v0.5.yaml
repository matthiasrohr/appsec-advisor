  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA private JWT signing key (lib/insecurity.ts:21)
  affected_parameter: Authorization bearer token
  scenario: The RSA private key used to sign every session JWT is embedded verbatim in lib/insecurity.ts:21 as a string literal
    and ships in the public source tree and every deployed bundle. An attacker who reads the repository (or extracts the key
    from a distributed image) signs a token of their choosing via security.authorize()-equivalent code with data.role='admin'
    and any data.email/id, then presents it as a bearer token. Because verify()/updateAuthenticatedUsers() validate against
    the matching public key, the forged token is accepted as a fully authenticated admin session with no credential ever entered.
  evidence_summary: privateKey at lib/insecurity.ts:21 is a hardcoded PEM literal; authorize() (line 54) signs all sessions
    with it and deluxeToken() (line 150) reuses it as an HMAC secret.
  impact_description: Anyone with source or image access forges arbitrary authenticated sessions for any user or role, fully
    bypassing login and MFA.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. Tokens are RS256-signed but the private key is not held in any secret store.
  mitigation_title: Move the RSA signing key out of source into a secret store and rotate the exposed key
  remediation:
    effort: Medium
    steps:
    - Delete the inline PEM at lib/insecurity.ts:21 and load the private key at startup from an environment variable or secret
      manager (e.g. process.env.JWT_PRIVATE_KEY / AWS Secrets Manager), failing closed if unset.
    - 'Treat the committed key as permanently compromised: generate a fresh RSA keypair, replace encryptionkeys/jwt.pub, and
      invalidate all existing tokens.'
    - Stop reusing the JWT private key as an HMAC secret in deluxeToken() (line 150); derive a separate purpose-specific key.
    - Add a CI secret-scan (gitleaks/trufflehog) that fails the build on PEM material in tracked files.
    code_example: '// Before: key baked into source, shipped to every client of the repo

      // const privateKey = ''----**** (31 chars)\r\nMIIC...''


      // After: injected at runtime, absent from the tree

      const privateKey = process.env.JWT_PRIVATE_KEY

      if (!privateKey) throw new Error(''JWT_PRIVATE_KEY not configured'')'
    verification: Sign a token off-repo with the committed key setting data.role='admin', call GET /rest/user/whoami with
      it, and confirm the deployed build (post-rotation) returns 401 rather than an admin identity.
    reference: CWE-321
