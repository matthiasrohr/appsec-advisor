- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-494
  title: Lockfile Generation Disabled (.npmrc)
  affected_parameter: null
  scenario: 'The repository root .npmrc sets package-lock off (line 1), so npm never writes package-lock.json for the root
    project. Every `npm install` in CI (ci.yml lines 51/71/110/147/203/238, release.yml line 55) and in the Docker build (Dockerfile
    line 5) therefore re-resolves the full dependency graph against the live registry with no committed integrity baseline.
    An attacker who wins a transitive version window — via typosquatting, a maintainer-account takeover that publishes a higher
    patch version inside an existing semver range, or npm cache poisoning — gets their package installed across every developer
    machine, every CI job, and the release/Docker build with no diff signal and no `npm ci` protection possible. The fix cannot
    be ''switch to npm ci later'': without a lockfile there is nothing to `ci` against.'
  evidence_summary: The single .npmrc directive turns off lockfile generation repo-wide, so no package-lock.json integrity
    baseline is ever produced.
  impact_description: A poisoned transitive dependency version is silently installed into the release build and shipped inside
    the published bkimminich/juice-shop image.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: npm's default subresource integrity on individual tarballs still applies per-download, but there is no
    committed lockfile to pin resolved versions or hashes across builds.
  mitigation_title: Remove the lockfile-disable directive from .npmrc and enforce npm ci with a committed lockfile
  remediation:
    effort: Medium
    steps:
    - Delete the lockfile-disable line from .npmrc so npm regenerates package-lock.json, then run `npm install` once and commit
      the generated package-lock.json (and frontend/package-lock.json).
    - Replace every mutable `npm install` in ci.yml, release.yml and Dockerfile with `npm ci` so installs fail closed when
      the lockfile and manifest diverge.
    - Add a CI step that runs `npm ci --ignore-scripts` first and fails the job on any lockfile drift, keeping resolution
      deterministic across runners.
    code_example: '# .npmrc — remove the directive that suppresses the lockfile

      # (delete: package-lock=false)


      # Dockerfile installer stage — deterministic, script-free base install

      # Before: RUN npm install --omit=dev        # re-resolves graph, runs lifecycle scripts

      # After:

      COPY package.json package-lock.json ./

      RUN npm ci --omit=dev --ignore-scripts'
    verification: After committing package-lock.json, run `npm ci --omit=dev` in a clean checkout and confirm it succeeds;
      then bump any dependency in package.json without updating the lockfile and confirm `npm ci` exits non-zero (EUSAGE lockfile-out-of-sync)
      rather than silently resolving.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html
