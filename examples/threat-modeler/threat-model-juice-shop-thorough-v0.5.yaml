  stride: Tampering
  cwe: CWE-89
  title: SQL injection in login authentication query (routes/login.ts:34)
  affected_parameter: email
  scenario: 'login() builds its authentication query by string-interpolating req.body.email directly into raw SQL at routes/login.ts:34:
    SELECT * FROM Users WHERE email = ''${req.body.email}'' AND password = ''${hash(password)}'' AND deletedAt IS NULL. Posting
    email = admin@juice-sh.op''-- or '' OR 1=1-- comments out the password clause, causing the query to return the first user
    row; the handler then mints a full session token for that user. This is a classic authentication-bypass SQLi requiring
    no valid credential, and the same injection point permits UNION-based extraction of arbitrary table data.'
  evidence_summary: routes/login.ts:34 concatenates req.body.email into a raw sequelize.query template string with no parameterization
    or escaping.
  impact_description: Unauthenticated attacker logs in as any user (including admin) and can exfiltrate the entire Users table
    via UNION injection.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The query is fully string-interpolated with no parameter binding.
  mitigation_title: Replace the interpolated login query with a parameterized/bound query
  remediation:
    effort: Low
    steps:
    - Use Sequelize replacements or bind parameters instead of template interpolation so email/password never alter query
      structure.
    - 'Prefer the model API (UserModel.findOne({ where: { email, password: hash(password) } })) which parameterizes automatically.'
    - Add a negative test asserting that SQL metacharacters in email do not authenticate.
    code_example: "// Before (routes/login.ts:34)\n// models.sequelize.query(`SELECT * FROM Users WHERE email = '${req.body.email||''}'\
      \ AND password = '${security.hash(req.body.password||'')}' AND deletedAt IS NULL`, ...)\n\n// After: values bound as\
      \ parameters, structure fixed\nmodels.sequelize.query(\n  'SELECT * FROM Users WHERE email = :email AND password = :password\
      \ AND deletedAt IS NULL',\n  { replacements: { email: req.body.email || '', password: security.hash(req.body.password\
      \ || '') }, model: UserModel, plain: true }\n)"
    verification: 'POST /rest/user/login with { email: "'' OR 1=1--", password: "x" } and confirm the response is 401 rather
      than an authentication token.'
