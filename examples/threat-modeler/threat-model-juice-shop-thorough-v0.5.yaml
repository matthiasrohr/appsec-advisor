  stride: Tampering
  cwe: CWE-79
  title: Stored XSS via true-client-ip header persisted as last login IP
  affected_parameter: true-client-ip
  scenario: saveLoginIp() reads the attacker-controlled true-client-ip request header at routes/saveLoginIp.ts:18 and writes
    it to the user's lastLoginIp field. When the httpHeaderXssChallenge branch is active the value is stored with no sanitization
    (lines 22-23); sanitizeSecure() is only applied in the else branch. A user (or an attacker who fixed the header on a victim's
    request) stores markup such as <iframe src="javascript:alert(`xss`)"> which later executes when lastLoginIp is rendered
    in the account/last-login UI, giving stored cross-site scripting in an authenticated context.
  evidence_summary: routes/saveLoginIp.ts:18-25 takes the true-client-ip header and, in the challenge-enabled branch, persists
    it to lastLoginIp without invoking sanitizeSecure().
  impact_description: Persisted script executes in the victim's authenticated session, enabling token theft and account takeover.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: sanitizeSecure() is applied only on the non-challenge code path; the stored value is never output-encoded
    at render time.
  mitigation_title: Sanitize and output-encode the stored last-login IP unconditionally
  remediation:
    effort: Low
    steps:
    - Validate true-client-ip against an IP-address format and reject/normalize non-conforming values before persistence.
    - Apply sanitizeSecure() (or discard the header entirely and use req.socket.remoteAddress) on every code path, not only
      the else branch.
    - Output-encode lastLoginIp wherever it is rendered so stored markup cannot execute.
    code_example: '// After: never trust the header shape

