assets:
- id: A-001
  name: User Account Credentials
  classification: Restricted
  description: User email addresses, usernames, and MD5-hashed passwords stored in the UserModel SQLite table. MD5 is cryptographically
    broken — rainbow-table attacks recover plaintext directly. Also includes admin account credentials seeded at startup via
    datacreator.ts.
- id: A-002
  name: Payment Card Data
  classification: Restricted
  description: Credit/debit card numbers stored in the CardModel table, including card number, expiry, and holder name. Also
    includes wallet balances in the WalletModel. Subject to PCI-DSS scope concerns even in a training application.
- id: A-003
  name: JWT RSA Private Key
  classification: Restricted
  description: 2048-bit RSA private key hardcoded in lib/insecurity.ts at line 23, used to sign all JWT tokens. Publicly committed
    to GitHub. Any actor with read access to the repository can forge arbitrary JWTs and impersonate any user including admins.
- id: A-004
  name: SQLite Database Files
  classification: Confidential
  description: 'SQLite .db files in data/ containing all application state: users, products, orders, challenges, feedback,
    recycling requests, and audit trails. No encryption at rest. No WAL-mode isolation between reads/writes.'
- id: A-005
  name: User-Uploaded Files
  classification: Internal
  description: Profile images uploaded via /profile/image/file and /profile/image/url. Stored in assets/public/images/uploads.
    File type validation is present but bypassed by known Juice Shop challenges. SSRF is possible via the URL upload endpoint.
- id: A-006
  name: FTP Directory Files
  classification: Internal
  description: Static files in /ftp served unauthenticated by /ftp route. Contains legal documents and intentionally-placed
    backup archives including acquisition-notes, coupons, and sensitive.zip. Disclosed via robots.txt Disallow hint.
- id: A-007
  name: Order History and Financial Transactions
  classification: Confidential
  description: Order confirmations, basket contents, coupon redemptions, and delivery status stored in Order and BasketItem
    models. IDOR vulnerabilities allow users to access other users' order history via /rest/order-history.
- id: A-008
  name: Security Questions and Answers
  classification: Restricted
  description: User-chosen security questions and plaintext answers stored in SecurityAnswer model. Used for password reset.
    Vulnerable to enumeration and brute-force — answers are simple personal data (pet name, birth city).
- id: A-009
  name: Application Secrets and Configuration
  classification: Restricted
  description: HMAC key hardcoded in lib/insecurity.ts (pa4qacea4VK9t9nGv7yZtwmj), DOCKERHUB_TOKEN, GITHUB_TOKEN in GitHub
    Actions secrets. JWT private key also belongs here. Operator-supplied config at runtime via config/ YAML files.
- id: A-010
  name: Challenge and CTF State
  classification: Internal
  description: Challenge solve status, continue-codes, and coding challenge snippets stored in ChallengeModel. Exposed via
    /api/Challenges endpoint (unauthenticated). Continue-codes allow cross-session CTF progress sharing.
attack_surface:
- entry_point: POST /file-upload
  protocol: HTTP
  auth_required: false
  notes: File upload accepting XML, YAML, and ZIP files. Vulnerable to XXE (XML), YAML deserialization, and ZIP bomb. No auth
    guard at route level per route inventory.
  relevance_tags:
  - missing-auth
- entry_point: POST /profile/image/file
  protocol: HTTP
  auth_required: false
  notes: 'handler: server.ts:310'
  relevance_tags:
  - missing-auth
- entry_point: POST /profile/image/url
  protocol: HTTP
  auth_required: false
  notes: Profile image via URL — SSRF endpoint. Fetches arbitrary URLs server-side via download library. Can reach internal
    services.
  relevance_tags:
  - missing-auth
- entry_point: POST /rest/memories
  protocol: HTTP
  auth_required: false
  notes: Create memory entries with caption and image. Stored XSS via caption field (insufficient sanitization). No auth guard.
  relevance_tags:
