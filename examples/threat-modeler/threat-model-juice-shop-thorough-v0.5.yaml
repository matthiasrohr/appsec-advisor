- local_id: web3-nft-001
  threat_category_id: TH-02
  additional_categories: []
  stride: Spoofing
  cwe: CWE-290
  title: Wallet ownership accepted without signature proof (routes/nftMint.ts:41)
  affected_parameter: walletAddress
  scenario: POST /rest/web3/walletNFTVerify and POST /rest/web3/walletExploitAddress trust a client-supplied `req.body.walletAddress`
    verbatim. walletNFTVerify (routes/nftMint.ts:41-45) matches the raw address against the in-memory `addressesMinted` Set
    and, on hit, marks the NFT-mint challenge solved; contractExploitListener (routes/web3Wallet.ts:15-16) blindly adds the
    claimed address to `walletsConnected`. Neither endpoint requires the caller to prove control of the address via a signed
    challenge (e.g. EIP-191 personal_sign of a server nonce). Because minter/exploiter addresses are emitted on a public Sepolia
    contract event and are readable by anyone on-chain, an attacker can replay any observed address and be credited as its
    owner without holding the corresponding private key.
  evidence_summary: walletNFTVerify at routes/nftMint.ts:42 gates success solely on `addressesMinted.has(metamaskAddress)`
    where metamaskAddress is the unauthenticated request body, with no signature verification anywhere in the handler.
  impact_description: An attacker credits themselves as the owner of any Ethereum address they can observe on-chain, spoofing
    wallet ownership and claiming ownership-gated state.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. No nonce challenge, no ethers `verifyMessage` call, no session binding of the wallet address to
    the caller.
  mitigation_title: Require a signed-nonce challenge and verify it with ethers verifyMessage before crediting wallet ownership
  remediation:
    effort: Medium
    steps:
    - Issue a per-session random nonce and require the client to sign it with the wallet (MetaMask `personal_sign`).
    - In walletNFTVerify / contractExploitListener recover the signer with ethers `verifyMessage(nonce, signature)` and reject
      unless the recovered address equals the claimed `walletAddress` AND matches the on-chain event minter.
    - Bind the verified address to the authenticated session and expire the nonce after a single use.
    code_example: "import { verifyMessage } from 'ethers'\n// After: prove control of the wallet, don't trust the raw address\n\
      const { walletAddress, signature } = req.body\nconst recovered = verifyMessage(req.session.web3Nonce, signature)\nif\
      \ (recovered.toLowerCase() !== String(walletAddress).toLowerCase() || !addressesMinted.has(recovered)) {\n  return res.status(401).json({\
      \ success: false, message: 'Wallet ownership not proven' })\n}\naddressesMinted.delete(recovered)"
    verification: Send POST /rest/web3/walletNFTVerify with a `walletAddress` present in the minted set but no/invalid `signature`;
      expect HTTP 401 and the challenge to remain unsolved.
    reference: CWE-290
  evidence:
