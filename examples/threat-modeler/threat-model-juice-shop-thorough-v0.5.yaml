- local_id: ci-cd-pipeline-005
  threat_category_id: TH-14
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-732
  title: Missing Workflow Permissions Block (.github/workflows/ci.yml)
  affected_parameter: null
  scenario: Neither ci.yml nor release.yml declares a top-level or job-level `permissions:` key, so every job inherits the
    repository's default GITHUB_TOKEN scope. On repositories created before the read-only default (or where the org default
    is still permissive) that grant is read-write across contents, packages, deployments, issues and pull-requests. The pipelines
    run many script-enabled `npm install` steps and several third-party actions (Cypress, retry, Coveralls) that receive the
    token, so any compromised dependency or action step (see ci-cd-pipeline-002/003/004) inherits full write access to the
    repository rather than a least-privilege slice. codeql-analysis.yml demonstrates the correct pattern with an explicit
    `permissions:` block (contents:read, security-events:write), making the omission in the two primary pipelines a clear
    inconsistency rather than an oversight of the mechanism.
  evidence_summary: ci.yml and release.yml contain no `permissions:` key, so jobs run with the repository's default (potentially
    write-all) GITHUB_TOKEN scope.
  impact_description: A single compromised step in these pipelines can push code, publish packages, or alter releases using
    an over-scoped GITHUB_TOKEN.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: codeql-analysis.yml, lock.yml and pr-compliance.yml declare scoped permissions; secret masking applies.
    The two main CI/release pipelines have no permissions declaration.
  mitigation_title: Declare least-privilege permissions blocks in ci.yml and release.yml
  remediation:
    effort: Low
    steps:
    - 'Add a top-level `permissions: { contents: read }` default to ci.yml and release.yml, then grant only the extra scopes
      each job needs (e.g. the release create-release/package jobs need `contents: write`; the coverage job needs nothing
      beyond the Coveralls token).'
    - Set the organisation/repository default GITHUB_TOKEN permission to read-only under Settings → Actions so any future
      workflow lacking a block also starts least-privilege.
    - Review the docker/heroku jobs to confirm they rely on the dedicated DOCKERHUB/HEROKU secrets rather than the GITHUB_TOKEN,
      so their token scope can stay read-only.
    code_example: "# ci.yml — top of file, after `env:`\npermissions:\n  contents: read        # default for all jobs\n\n\
      jobs:\n  create-release:       # release.yml — job that needs write\n    permissions:\n      contents: write"
    verification: 'Confirm `grep -n ''permissions:'' .github/workflows/ci.yml .github/workflows/release.yml` returns a match
      for each file, and that a workflow run''s job log shows the reduced `GITHUB_TOKEN Permissions` (contents: read) summary
      block.'
    reference: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
  evidence:
  - file: .github/workflows/ci.yml
    line: 24
  evidence_check: unchecked
  controls_absent_evidence:
