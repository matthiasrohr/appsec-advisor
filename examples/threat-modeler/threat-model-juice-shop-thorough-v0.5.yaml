components:
- id: angular-frontend
  name: Angular SPA Frontend
  description: 'Angular 20 single-page application compiled to static assets and served by the Node.js process. Handles all
    user-facing UI: login, shopping, admin, challenge UX, chatbot, Web3 wallet. Executes entirely in the browser without a
    separate origin.'
  paths:
