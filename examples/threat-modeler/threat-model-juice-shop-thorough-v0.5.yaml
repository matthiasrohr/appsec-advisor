- local_id: sqlite-database-002
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-759
  title: Security answers hashed with global static-key HMAC, no salt
  affected_parameter: answer
  scenario: 'The SecurityAnswer model setter stores answers as security.hmac(answer) (models/securityAnswer.ts:45), which
    is HMAC-SHA256 keyed by the hardcoded, repo-wide constant ''pa4qacea4VK9t9nGv7yZtwmj'' (lib/insecurity.ts:42). Because
    the key is global and there is no per-record salt, the transform is deterministic: the same answer always maps to the
    same digest across all users. Security answers are typically low-entropy (pet names, cities, dates), so an attacker who
    reads the SecurityAnswers table can pre-compute HMACs for a dictionary of common answers (the key is known from the source)
    and recover the cleartext answers, then drive the ''forgot password'' / security-question reset flow to take over accounts.'
  evidence_summary: models/securityAnswer.ts:45 sets the answer column from security.hmac(); the HMAC key at lib/insecurity.ts:42
    is a fixed literal shared by every record, so equal answers produce equal digests.
  impact_description: Offline dictionary recovery of low-entropy security answers, enabling account recovery/reset abuse and
    takeover.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Answers are keyed-hashed rather than plaintext, but with a known static key and no per-record salt, offering
    little protection for low-entropy inputs.
  mitigation_title: Hash security answers with per-record-salted argon2id instead of static-key HMAC
  remediation:
    effort: Medium
    steps:
    - Change the SecurityAnswer setter (models/securityAnswer.ts:45) to store argon2id/bcrypt of the normalized answer, so
      each record carries a unique salt and equal answers no longer collide.
    - Normalize answers (trim, lowercase) before hashing to keep verification usable without weakening entropy further.
    - Verify answers with a constant-time compare against the stored salted hash rather than recomputing a deterministic HMAC.
    - Remove reliance on the hardcoded HMAC key for this use; rotate any dependent flows.
    code_example: "// models/securityAnswer.ts — answer setter\nimport argon2 from 'argon2'\n// Before: this.setDataValue('answer',\
      \ security.hmac(answer)) // deterministic, static global key\n// After: per-record salted hash — identical answers no\
      \ longer share a digest\nasync set (answer: string) {\n  this.setDataValue('answer', await argon2.hash(answer.trim().toLowerCase(),\
      \ { type: argon2.argon2id }))\n}"
    verification: Create two SecurityAnswer rows with the same answer text for different users and assert the stored answer
      columns differ (unique salts). Confirm a known dictionary HMAC of a common answer no longer matches any stored value.
    reference: CWE-759
  evidence:
  - file: models/securityAnswer.ts
    line: 45
