- local_id: sqlite-database-008
  threat_category_id: TH-06
  additional_categories:
  - TH-03
  stride: Tampering
  cwe: CWE-284
  title: Database enforces no access control or integrity beyond OS file permissions
  affected_parameter: null
  scenario: All application data lives in one flat file, data/juiceshop.sqlite (models/index.ts:41), with no database-level
    authentication, no per-table access control, and no tamper-evidence. The connection uses fixed placeholder credentials
    ('database','username','password' at models/index.ts:33) that SQLite ignores. Access control depends entirely on OS filesystem
    permissions on the file. Any code path or process that gains write access to the file — a path-traversal/LFI write, a
    container/volume compromise, a misconfigured backup restore, or a co-located process — can directly modify or delete rows
    (alter roles, zero out orders, forge wallet balances) with no detection, because there is no integrity check, checksum,
    or audit binding on the stored records.
  evidence_summary: models/index.ts:33 passes ignored placeholder DB credentials and :41 points storage at a single unauthenticated
    file; no PRAGMA/foreign_keys or integrity control is configured (grep of models/ for PRAGMA/foreign_keys returns nothing).
  impact_description: Any actor with filesystem write access can tamper with or delete arbitrary records undetected, bypassing
    all application authorization.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None at the database layer; protection relies solely on host filesystem permissions.
  mitigation_title: Lock down the database file and enforce integrity/referential constraints
  remediation:
    effort: Medium
    steps:
    - Restrict data/juiceshop.sqlite to the service user with least-privilege filesystem permissions (chmod 600, dedicated
      non-root user) and store it on an encrypted volume.
    - Enable PRAGMA foreign_keys=ON so referential integrity is enforced and forged/orphaned related rows are rejected.
    - For a stronger boundary, host the database on a separate client-server RDBMS with authentication and role-scoped DB
      users so application-layer bypass no longer grants raw data access.
    - Add integrity monitoring (file-integrity monitoring / periodic checksum) and pair with the audit logging from finding
      sqlite-database-005 to detect out-of-band modification.
    code_example: '// models/index.ts — enforce referential integrity at the DB layer

      await sequelize.query(''PRAGMA foreign_keys=ON;'')

      // Deploy: chown appuser data/juiceshop.sqlite && chmod 600 data/juiceshop.sqlite

      // (raw file no longer readable/writable by other host users)'
    verification: As a non-service OS user, attempt to open data/juiceshop.sqlite for write and assert permission denied.
      Insert a Card row referencing a non-existent UserId and assert it is rejected once foreign_keys=ON.
    reference: CWE-284
  evidence:
  - file: models/index.ts
    line: 41
  evidence_check: unchecked
