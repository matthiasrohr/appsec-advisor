- id: M-001
  title: Adopt centralized secrets management for all cryptographic material
  threat_ids:
  - T-001
  priority: P1
  severity: High
  effort: Medium
  kind: review
  auto_emitted: true
  auto_source: build-mitigations-fallback
  remediation:
    effort: Medium
    steps:
    - Move RSA private key, HMAC secret, and hardcoded admin credentials out of source into a secrets manager (HashiCorp Vault,
      AWS Secrets Manager, or equivalent).
    - Rotate all committed secrets immediately; treat lib/insecurity.ts constants as permanently compromised.
    - Add a pre-commit hook (git-secrets or detect-secrets) and a CI gate that blocks PRs containing high-entropy strings,
      PEM headers, or known-secret patterns.
    - Audit all environment variable usage to ensure secrets are never logged or written to disk.
