- local_id: ci-cd-pipeline-004
  threat_category_id: TH-14
  additional_categories:
  - TH-06
  stride: Tampering
  cwe: CWE-829
  title: Dependency Install Scripts Enabled in Release and Image Build
  affected_parameter: null
  scenario: The privileged build lanes install dependencies with npm lifecycle scripts enabled. release.yml line 55 runs `npm
    install --production` on a `v*` tag push in the same job flow that authenticates to DockerHub (login-action, lines 73-77)
    and pushes the released image, and Dockerfile line 5 runs `npm install --omit=dev` while assembling the production image.
    Any dependency in the resolved graph — trivially exploitable because there is no committed lockfile (see ci-cd-pipeline-001)
    — can ship a `postinstall` hook that executes arbitrary code on the build host. In the release lane that host holds DOCKERHUB_TOKEN
    and GITHUB_TOKEN, so a poisoned install script can exfiltrate the publish credential or write a backdoor directly into
    build/ before the image is pushed to bkimminich/juice-shop, poisoning every downstream pull. The lint and frontend-bundle
    jobs correctly use `--ignore-scripts`, proving the safe pattern is known but not applied to the build/release lanes.
  evidence_summary: release.yml:55 and Dockerfile:5 install dependencies without --ignore-scripts, so any package postinstall
    hook runs on the credentialed release/build host.
  impact_description: A malicious postinstall script executes with DOCKERHUB_TOKEN in scope and can backdoor or replace the
    published production image.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: GitHub Actions secret masking hides token values in logs, and lint/frontend jobs use --ignore-scripts;
    but the release and Docker build installs run lifecycle scripts unrestricted.
  mitigation_title: Add --ignore-scripts to release and Dockerfile dependency installs and gate any required scripts explicitly
  remediation:
    effort: Medium
    steps:
    - Append `--ignore-scripts` to `npm install --production` in release.yml (line 55) and change Dockerfile line 5 to `npm
      ci --omit=dev --ignore-scripts`.
    - For the small set of packages that genuinely need a build step, run their builds explicitly and reviewably (e.g. `npm
      rebuild <pkg>`) rather than granting graph-wide lifecycle execution.
    - Scope the release job so the DockerHub login/push step runs after install in a separate job or with `permissions:` minimised,
      shrinking the credential exposure window for install-time code.
    code_example: "# release.yml — package step\n# Before:\n#   npm install --production        # runs every dependency's\
      \ postinstall\n# After:\n          npm ci --omit=dev --ignore-scripts"
    verification: 'Grep the build/release lanes for script-enabled installs: `grep -rnE ''npm (install|ci)'' .github/workflows/release.yml
      Dockerfile | grep -v ignore-scripts` should return no dependency-install lines. Optionally add a canary dev-dependency
      with a `postinstall` that touches a sentinel file and confirm the file is absent after the release build.'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html
  evidence:
