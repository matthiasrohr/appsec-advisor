  - internet
  handles_sensitive_data: false
  threat_ids:
  - T-001
  - T-004
  - T-007
  - T-029
  - T-041
  - T-063
- id: backend-api
  name: Express.js Backend API
  description: Node.js 24 / TypeScript Express server exposing 247+ REST endpoints on port 3000. Implements authentication
    (JWT RS256 via express-jwt 0.1.3), Sequelize/SQLite ORM, CORS wide-open, partial Helmet, rate-limiting, Socket.IO events,
    Prometheus metrics, and challenge-solve tracking. Also serves the Angular SPA static assets and Swagger UI.
