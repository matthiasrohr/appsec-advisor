  stride: Spoofing
  cwe: CWE-287
  title: OAuth login derives account password from public email (oauth.component.ts:30)
  affected_parameter: access_token
  scenario: OAuthComponent.ngOnInit reads the OAuth access_token from the URL fragment (parseRedirectUrlParams, line 71 splits
    location.hash), fetches the provider profile, then at line 30/46 sets the account password to btoa(profile.email.split('').reverse().join(''))
    — a deterministic, publicly-computable value. Any attacker who knows a victim's email address (e.g. from the /rest/user/whoami
    leak, a review author name, or an order) can compute the same Base64-of-reversed-email string and log in directly via
    POST /rest/user/login as that user without ever touching the OAuth provider. The token also travels in the URL fragment
    (implicit-flow style) and no state/nonce parameter is validated on the callback, so the redirect can be replayed/forged.
  evidence_summary: Line 30 computes password = btoa(profile.email reversed), reused verbatim in login() at line 46, making
    every OAuth user's password a pure function of their email.
  impact_description: Full account takeover of any OAuth-provisioned user given only their email address, plus OAuth CSRF
    via the unvalidated callback.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The password is derived client-side from a public value; there is no state parameter, no PKCE,
    and the token is exposed in the URL fragment.
  mitigation_title: Stop deriving OAuth passwords from email and validate an anti-CSRF state on the callback
  remediation:
    effort: Medium
    steps:
    - Remove the btoa(email-reversed) password derivation at oauth.component.ts:30 and :46; never set a client-known password
      for federated accounts. Provision OAuth users server-side with no local password, or a cryptographically random secret
      the client never sees.
    - Move token exchange to the backend (authorization-code + PKCE) so the access_token is never placed in the browser URL
      fragment; the SPA should receive only a first-party session cookie.
    - Generate a random state value before redirecting to the provider, store it, and reject the callback in parseRedirectUrlParams()
      when the returned state does not match.
    code_example: '// BEFORE (oauth.component.ts:30) — password anyone can compute from the email

      const password = btoa(profile.email.split('''').reverse().join(''''))

      this.userService.save({ email: profile.email, password, passwordRepeat: password })


      // AFTER — no client-derived credential; backend links the federated identity

      // Frontend only forwards the provider code; server exchanges it (PKCE) and

      // creates/links the user with NO password, returning a first-party session.

      this.userService.oauthCallback({ code, state: this.expectedState })'
    verification: 'With only the target email, POST /rest/user/login {email, password: btoa(reverse(email)), oauth:true} must
      return 401. Replaying an OAuth callback URL with a mismatched or absent state parameter must be rejected.'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/OAuth2_Cheat_Sheet.html
