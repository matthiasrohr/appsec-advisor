  title: Password-reset security-answer brute force via spoofable rate-limit key
  affected_parameter: answer / X-Forwarded-For
  scenario: resetPassword() at routes/resetPassword.ts:41 sets a new password when security.hmac(answer) equals the stored
    security answer, with no per-account attempt counter or lockout. The only throttle is the express-rate-limit on /rest/user/reset-password
    whose keyGenerator returns headers['X-Forwarded-For'] ?? ip (server.ts:346). Because X-Forwarded-For is fully attacker-controlled,
    an attacker rotates the header on every request to reset the rate-limit bucket and brute-forces the (typically low-entropy)
    security answer for any target email, then takes over the account by setting a new password.
  evidence_summary: The security-answer comparison at routes/resetPassword.ts:41 has no attempt limiting of its own, and the
    protecting rate limiter keys on the attacker-controlled X-Forwarded-For header.
  impact_description: Attacker resets any user's password by unthrottled guessing of low-entropy security answers, achieving
    full account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: A reset-password rate limiter exists but is keyed on the spoofable X-Forwarded-For header; the handler
    enforces no per-account attempt lockout.
  mitigation_title: Key rate limiting on a trusted client identity and add per-account reset attempt lockout
  remediation:
    effort: Medium
    steps:
    - Derive the rate-limit key from the real connection IP (or a trusted-proxy-validated left-most XFF entry), not the raw
      client-supplied X-Forwarded-For.
    - Add a per-account failed-reset counter with exponential backoff / temporary lockout independent of source IP.
    - Replace static security questions with an emailed single-use, time-limited reset token as the primary recovery path.
