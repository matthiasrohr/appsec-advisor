- local_id: file-storage-007
  threat_category_id: TH-07
  additional_categories: []
  stride: Tampering
  cwe: CWE-434
  title: Upload type enforced by extension only, no content validation (fileUpload.ts:62)
  affected_parameter: file (originalname extension)
  scenario: checkFileType (routes/fileUpload.ts:62) derives the type from originalname's extension and only calls challengeUtils.solveIf
    — it never rejects a request, and downstream handlers dispatch purely on the .xml/.yml/.zip suffix (handleXmlUpload line
    71, handleYamlUpload line 102). No magic-byte check is applied on /file-upload (unlike the profile-image path, which uses
    file-type.fromBuffer). An attacker renames any payload to a permitted extension to route it into the XXE, YAML-eval, or
    zip-extraction handlers, or stores content whose real type differs from its name.
  evidence_summary: checkFileType at routes/fileUpload.ts:62 reads originalname.substr(lastIndexOf('.')) and calls next()
    unconditionally — there is no content-type or magic-byte gate on /file-upload.
  impact_description: Attacker fully controls which server-side parser processes the bytes, enabling the injection/DoS handlers
    regardless of true file content.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: A 200KB multer size limit (server.ts:692) and sanitize-filename on the disk-upload path. No magic-byte
    or MIME validation on the memory /file-upload route.
  mitigation_title: Validate uploaded file content with magic-byte sniffing and reject on mismatch
  remediation:
    effort: Medium
    steps:
    - In checkFileType, call file-type.fromBuffer(file.buffer) and reject (HTTP 415) when the detected MIME does not match
      the declared extension's allowed set.
    - Make checkFileType actually terminate the request on disallowed types instead of only solving a challenge.
    - Constrain the accepted set to the minimum the B2B flow needs, and drop the deprecated XML/YAML branches entirely if
      unused.
    code_example: 'import fileType from ''file-type''

      const detected = await fileType.fromBuffer(file.buffer)

      const allowed = { pdf: ''application/pdf'', zip: ''application/zip'' }

      const ext = file.originalname.split(''.'').pop()?.toLowerCase()

      if (!detected || detected.mime !== allowed[ext]) { res.status(415); return next(new Error(''File content does not match
      its extension'')) }'
    verification: POST a PDF payload renamed to attack.xml to /file-upload and assert HTTP 415 and that the XML/XXE handler
      did not run.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
  evidence:
  - file: routes/fileUpload.ts
    line: 62
  evidence_check: unchecked
