  impact: Medium
  risk: Medium
  controls_in_place: CORS origin is pinned to http://localhost:4200 (dev), but there is no connection authentication or per-user
    scoping of notifications.
  mitigation_title: Authenticate WebSocket connections and scope notification handling per user
  remediation:
    effort: Medium
    steps:
    - Require a verified JWT during the Socket.IO handshake (io.use middleware) and reject unauthenticated connections.
    - Scope notifications to the authenticated user rather than a single process-global array so one client cannot mutate
      others' state.
    - Validate the 'notification received' payload and authorize that the caller owns the referenced notification before splicing.
    code_example: "io.use((socket, next) => {\n  try {\n    const token = socket.handshake.auth?.token\n    socket.data.user\
