- local_id: angular-frontend-006
  threat_category_id: TH-11
  additional_categories:
  - TH-12
  stride: Information Disclosure
  cwe: CWE-693
  title: No Content-Security-Policy leaves XSS uncontained (index.html)
  affected_parameter: null
  scenario: 'The served index.html contains no Content-Security-Policy meta tag and the Node backend does not set helmet.contentSecurityPolicy,
    so the browser applies no restriction on script sources or inline execution. Combined with the multiple sanitizer-bypass
    XSS sinks in this component (angular-frontend-002/003) and the JWT stored in localStorage (angular-frontend-005), the
    absence of CSP removes the last line of defence: an injected payload can run inline script and exfiltrate the token to
    an arbitrary attacker host with no connect-src restriction.'
  evidence_summary: A grep for Content-Security-Policy / http-equiv across frontend/src/index.html returned zero matches,
    confirming no client-side CSP is declared.
  impact_description: XSS payloads execute unrestricted and can beacon stolen tokens to any external origin, amplifying every
    injection finding to full account takeover.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. No CSP meta tag and no server-side CSP header.
  mitigation_title: Serve a strict Content-Security-Policy via helmet
  remediation:
    effort: Medium
    steps:
    - Enable helmet.contentSecurityPolicy on the Node server with default-src 'self', script-src 'self' (no unsafe-inline/unsafe-eval),
      and a locked-down connect-src.
    - Remove or nonce any inline scripts so the strict policy does not break the app.
    - Add object-src 'none' and base-uri 'self' to block plugin and base-tag injection.
    code_example: "// server: enable a strict CSP\napp.use(helmet.contentSecurityPolicy({\n  directives: {\n    defaultSrc:\
      \ [\"'self'\"],\n    scriptSrc: [\"'self'\"],      // no 'unsafe-inline'\n    connectSrc: [\"'self'\"],\n    objectSrc:\
      \ [\"'none'\"],\n    baseUri: [\"'self'\"]\n  }\n}))"
    verification: Load any page and confirm the response carries a Content-Security-Policy header; an inline <script>alert(1)</script>
      injected into a vulnerable sink must be blocked by the policy (console CSP violation, no execution).
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Content_Security_Policy_Cheat_Sheet.html
  evidence:
  - file: frontend/src/index.html
    line: null
