- local_id: auth-007
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Unsalted MD5 used for password hashing (lib/insecurity.ts:41)
  affected_parameter: password
  scenario: hash() at lib/insecurity.ts:41 is crypto.createHash('md5').update(data).digest('hex'), and this is the function
    used to hash passwords for both storage and the login comparison at routes/login.ts:34. MD5 is fast and unsalted here,
    so any dump of the Users table (via the SQLi in auth-003 or a backup leak) is trivially reversed with rainbow tables or
