- local_id: sqlite-database-003
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-311
  title: TOTP secrets, card PANs and wallet balances stored unencrypted at rest
  affected_parameter: totpSecret,cardNum
  scenario: 'The database is a flat SQLite file at data/juiceshop.sqlite (models/index.ts:41) with no encryption at rest (no
    SQLCipher, no column-level encryption). Highly sensitive columns are stored in cleartext: User.totpSecret (models/user.ts:112,
    the seed that generates 2FA codes), Card.cardNum / fullName / expMonth / expYear (models/card.ts:37-55, full payment card
    data), plus wallet balances and PII (email, role). Anyone who obtains the .db file — a backup exfiltration, a container/volume
    snapshot, an SSRF/LFI read, or the raw-SQL injection in the login/search routes — reads all of it directly. Cleartext
    totpSecret in particular fully defeats the 2FA control: an attacker regenerates valid TOTP codes offline.'
  evidence_summary: models/index.ts:41 sets storage to a plain 'data/juiceshop.sqlite' file with no cipher option; models/user.ts:112
    (totpSecret) and models/card.ts:38 (cardNum) declare plain STRING/INTEGER columns with no encryption setter.
  impact_description: Any read of the database file exposes 2FA seeds, full payment card numbers, and PII in cleartext, defeating
    MFA and enabling card fraud.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None. No encryption at rest and no field-level encryption for TOTP seeds or card data.
  mitigation_title: Encrypt TOTP secrets and card data at the field level and enable encryption at rest for the SQLite store
  remediation:
    effort: High
    steps:
    - Apply authenticated field-level encryption (AES-256-GCM) to User.totpSecret and Card.cardNum in their model setters/getters,
      with the key sourced from a secrets manager / KMS, not the codebase.
    - 'For payment data, prefer not storing the PAN at all: tokenize via the payment processor and retain only a last-4 +
      token; if storage is unavoidable, encrypt and scope PCI-DSS.'
    - Enable database-file encryption at rest (migrate to SQLCipher, or host the file on an encrypted volume) so the raw file
      is unreadable without the key.
    - Restrict filesystem permissions on data/juiceshop.sqlite to the service user only (chmod 600).
    code_example: "// models/user.ts — totpSecret column\nimport { encryptField, decryptField } from '../lib/fieldCrypto'\
      \ // AES-256-GCM, key from KMS\ntotpSecret: {\n  type: DataTypes.STRING,\n  defaultValue: '',\n  // Before: stored as\
      \ plaintext -> DB read yields a working 2FA seed\n  // After: ciphertext at rest; decrypt only in-process when generating/verifying\
