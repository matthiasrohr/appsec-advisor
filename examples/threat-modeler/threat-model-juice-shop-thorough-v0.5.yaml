    full account takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. Angular's automatic escaping is explicitly bypassed and no CSP is present to contain execution.
  mitigation_title: Remove bypassSecurityTrustHtml on the search term and bind via interpolation
