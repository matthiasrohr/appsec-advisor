  title: Cross-Site Scripting (XSS)
  affected_parameter: q
  scenario: filterTable() reads the user-controlled q query parameter and assigns this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam)
    (line 143), which is then rendered raw through [innerHTML]="searchValue" in search-result.component.html:11. bypassSecurityTrustHtml
    explicitly disables Angular's built-in output sanitization, so a link such as /#/search?q=<img src=x onerror=alert(document.cookie)>
    executes attacker script in the victim's origin. Because no Content-Security-Policy is served (index.html has no CSP meta
    and helmet CSP is disabled server-side), there is no defence-in-depth stopping the payload.
