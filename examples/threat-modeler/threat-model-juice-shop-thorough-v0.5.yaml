  stride: Information Disclosure
  cwe: CWE-532
  title: Unauthenticated access-log disclosure via /support/logs (logfileServer.ts:14)
  affected_parameter: file (path param)
  scenario: app.use('/support/logs', serveIndex('logs', ...)) and app.use('/support/logs/:file', serveLogFiles()) at server.ts:282-283
    browse and serve the logs/ directory. serveLogFiles (routes/logfileServer.ts:14) only blocks '/' in the filename and streams
    any file from logs/. The verify.accessControlChallenges() middleware on the path is challenge-instrumentation, not an
    authorization gate. An unauthenticated attacker lists /support/logs, then downloads access.log — which records request
    URLs and headers for all users — harvesting session tokens, password-reset links, and PII from other users' traffic.
  evidence_summary: serveLogFiles at routes/logfileServer.ts:14 sends any logs/ file with no authentication, and the route
    is mounted unauthenticated at server.ts:283.
  impact_description: Disclosure of server access logs containing other users' tokens, URLs, and PII — a session-hijack and
    account-takeover primitive.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Only a '/'-in-filename check (routes/logfileServer.ts:13). verify.accessControlChallenges() present on
    the route tracks challenge state but enforces no access control.
  mitigation_title: Require authenticated operator role for /support/logs and stop logging secrets
  remediation:
    effort: Medium
    steps:
    - Add a real authorization middleware in front of /support/logs and /support/logs/:file that requires an authenticated
      operator/admin role, rejecting anonymous requests with 401/403.
    - Remove the serveIndex('logs', ...) browsable listing at server.ts:282.
    - Redact Authorization headers, cookies, and reset tokens from the access-log format so exposure of a log line cannot
      yield a live credential.
    code_example: '// server.ts

      app.use(''/support/logs'', security.isAuthorized(), security.hasRole(''operator''))

      app.use(''/support/logs/:file'', security.isAuthorized(), security.hasRole(''operator''), serveLogFiles())'
    verification: GET /support/logs/access.log with no session cookie and assert HTTP 401/403; confirm access.log format masks
