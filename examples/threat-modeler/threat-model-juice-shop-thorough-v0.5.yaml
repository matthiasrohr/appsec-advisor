  stride: Denial of Service
  cwe: CWE-400
  title: Decompression/entity-expansion bombs and unrate-limited uploads
  affected_parameter: file
  scenario: handleYamlUpload runs yaml.load on attacker YAML (routes/fileUpload.ts:109) and handleZipFileUpload extracts zip
    entries (line 34) with no cap on entry count or uncompressed size, while handleXmlUpload parses DTD-bearing XML. A YAML
    anchor bomb, zip bomb, or billion-laughs XML inflates a sub-200KB upload into gigabytes of memory. The vm timeouts (2000ms)
    bound CPU on the YAML/XML paths but not memory allocation, and unzipper streams entries without a total-size ceiling.
    /file-upload has no rate-limit middleware (rateLimit is applied only to reset-password and a few other routes, not the
    upload endpoints), so an attacker repeats the request to exhaust memory and crash the prod-env process.
  evidence_summary: yaml.load (routes/fileUpload.ts:109) and unzipper extraction (line 34) run without size/entry ceilings,
    and no rateLimit middleware wraps app.post('/file-upload', ...) at server.ts:309.
  impact_description: Memory exhaustion and process crash of the internet-facing server from a single small malicious upload,
    repeatable at will.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 200KB multer size limit caps the compressed input; 2000ms vm timeouts bound CPU on YAML/XML parsing.
    No memory ceiling, no decompression-ratio guard, no rate limiting on upload routes.
  mitigation_title: Enforce decompression limits and add rate limiting to upload endpoints
  remediation:
    effort: Medium
    steps:
    - Before extraction, sum entry.uncompressedSize and reject archives exceeding a fixed budget (e.g. 5MB) or a compression
      ratio threshold, and cap the entry count.
    - Replace the raw yaml.load with a bounded parse and reject documents whose expanded size exceeds a limit.
    - Wrap app.post('/file-upload', ...), '/profile/image/file', and '/profile/image/url' with express-rate-limit (e.g. windowMs
      5m, max 20 per IP).
    code_example: "// decompression guard\nlet total = 0\nfor (const entry of directory.files) {\n  total += entry.uncompressedSize\
      \ ?? 0\n  if (total > 5_000_000 || directory.files.length > 100) throw new Error('archive too large')\n}\n// server.ts\n\
      app.post('/file-upload', rateLimit({ windowMs: 5*60*1000, max: 20 }), uploadToMemory.single('file'), /* ... */)"
    verification: Upload a 10:1000000 zip bomb to /file-upload and assert the request is rejected before memory rises materially;
      send 21 uploads within 5m and assert the 21st returns 429.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
