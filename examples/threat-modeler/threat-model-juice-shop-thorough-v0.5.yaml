  stride: Elevation of Privilege
  cwe: CWE-862
  title: Authorization applied per-route, not globally (server.ts:356+)
  affected_parameter: route middleware chain
  scenario: 'There is no default-deny gate. `security.isAuthorized()` and `denyAll()` are attached route-by-route from server.ts:356
    onward, so any endpoint the developer forgets to list is reachable unauthenticated. Combined with the forgeable JWT (backend-api-001),
    the model is fail-open: adding a new route silently exposes it, and admin-only operations rely on scattered `isAccounting`/`isDeluxe`
    checks rather than a central policy.'
  evidence_summary: Authorization is a hand-maintained per-route list (server.ts:356-430) with no catch-all default-deny middleware.
  impact_description: Missing or forgotten guards expose privileged endpoints; access control cannot be reasoned about centrally.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Explicit isAuthorized/denyAll on selected routes; no global default-deny.
  mitigation_title: Introduce a central default-deny authorization layer with per-route allowlisting
  remediation:
    effort: High
    steps:
    - Mount a global authentication middleware that requires a valid token for all /api and /rest routes except an explicit
      public allowlist.
    - Attach role checks declaratively (route metadata / policy table) rather than inline per handler.
    - Add a startup assertion or test that every registered route has an associated auth decision.
    code_example: 'const PUBLIC = new Set([''/rest/products/search'',''/rest/user/login''])

      app.use((req,res,next)=> PUBLIC.has(req.path) ? next() : security.isAuthorized()(req,res,next))'
    verification: Add a new route without an explicit guard and assert the global middleware returns 401 for an anonymous
      request to it.
    reference: CWE-862
