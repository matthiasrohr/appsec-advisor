  mitigation_title: Restrict CORS to the known frontend origin(s)
  remediation:
    effort: Low
    steps:
    - 'Configure cors with an explicit origin allowlist and only the methods/headers the SPA needs: `cors({ origin: config.get(''application.corsOrigins''),
      credentials: true })`.'
