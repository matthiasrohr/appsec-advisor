  mitigation_fingerprints:
  - adopt centralized secrets management for all cryptographic material
  - integrate sast/injection scanner in ci to gate injection and xss pre-merge
  - establish npm dependency pinning with cve-aware update sla
  - stop deriving oauth passwords from email and validate an anti-csrf state on the callback
  - move the rsa signing key out of source into a secret store and rotate the exposed key
  - 'always pass `algorithms: [''rs256'']` as the third argument''s options object to jwt.verify.'
  - remove bypasssecuritytrusthtml on the search term and bind via interpolation
  - replace the interpolated login query with a parameterized/bound query
  - parameterize the product search like clause
  - remove server-side eval of b2b order payloads; parse with json.parse under a schema
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - disable dtd loading and external-entity resolution in parsexmlstring
  - apply an allowlist filter before passing the body to any model, and strip privilege fields before persistence.
  - key rate limiting on a trusted client identity and add per-account reset attempt lockout
  - key the rate limiter on the real client ip, not a client-supplied header
  - add a socket.io handshake authentication middleware and drive cors origin from config
  - remove hardcoded privileged credentials from seed data and force first-boot rotation
  - require a signed-nonce challenge and verify it with ethers verifymessage before crediting wallet ownership
  - sanitize and output-encode the stored last-login ip unconditionally
  - use crypto.randombytes / crypto.randomuuid / webcrypto getrandomvalues for any security value.
  - disable dtds and external entities in the xml parser
  - enforce coupon policy server-side and isolate untrusted chat input from tool authority
  - remove the lockfile-disable directive from .npmrc and enforce npm ci with a committed lockfile
  - pin calibreapp/image-actions to a full-length commit sha
  - add --ignore-scripts to release and dockerfile dependency installs and gate any required scripts explicitly
  - anchor zip extraction to a normalized base directory and reject traversing entries
  - validate uploaded file content with magic-byte sniffing and reject on mismatch
  - replace substring redirect matching with exact-origin allowlisting in isredirectallowed
  - serve a strict content-security-policy via helmet
  - replace md5 password hashing with bcrypt/argon2 and migrate stored hashes
  - remove poison-null-byte truncation and validate the resolved path stays in ftp/
  - validate image urls against an allowlist and block internal address ranges
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin base image to @sha256:<digest>
  - require authenticated operator role for /support/logs and stop logging secrets
  - disable directory browsing on ftp/ and gate document downloads behind explicit allowlisting
  - encrypt totp secrets and card data at the field level and enable encryption at rest for the sqlite store
  - hash security answers with per-record-salted argon2id instead of static-key hmac
  - apply rate limiting and progressive backoff to the login endpoint
  - enforce decompression limits and add rate limiting to upload endpoints
  - treat client-side guards as ux-only and enforce role checks server-side on every privileged endpoint
  - re-derive role from the persisted user record after verified authentication
  - introduce a central default-deny authorization layer with per-route allowlisting
  - whitelist writable fields on every finale resource create/update hook
  - authenticate websocket connections and scope notification handling per user
  - add sca scanning and a dependency-update bot to the pipeline
  - lock down the database file and enforce integrity/referential constraints
  - emit structured, append-only audit events for all authentication outcomes
  - restrict the user-directory endpoint to admin role and scope non-admin responses to the caller
  - replace the dev error handler with a sanitized production error responder
  - require authentication for the /metrics endpoint
  - restrict cors to the known frontend origin
  - add user <non-root-uid>
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - 'add `permissions: { contents: read }` at root; per-job elevate to `contents: write` only where needed'
  - strip secret flag fields from broadcast payloads and gate hidden notifications server-side
  - enable wal mode and rate-limit write endpoints, or migrate to a concurrent-writer database
  - declare least-privilege permissions blocks in ci.yml and release.yml
