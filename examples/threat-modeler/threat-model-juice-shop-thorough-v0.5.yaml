  notes: 'handler: server.ts:449'
- entry_point: POST /rest/user/login
  protocol: HTTP/REST
  auth_required: false
  notes: Primary login endpoint. Accepts username+password, returns JWT. SQL injection via username parameter. Vulnerable
    to timing attacks and brute force (rate-limiting partial).
- entry_point: POST /rest/user/reset-password
  protocol: HTTP/REST
  auth_required: false
  notes: Password reset via security question. No rate-limiting on answer attempts. Answer is plaintext in database.
- entry_point: GET /rest/products/search
  protocol: HTTP/REST
  auth_required: false
  notes: Product search — primary SQLi attack surface (Sequelize raw query with string interpolation). Returns all products
    when query is empty. UNION-based injection possible.
- entry_point: POST /b2b/v2/orders
  protocol: HTTP/REST
  auth_required: true
  notes: B2B order endpoint with JWT Bearer auth. orderLinesData field accepts JSON string that is parsed unsafely — potential
    for prototype pollution or injection.
- entry_point: POST /rest/chat
  protocol: HTTP/REST
  auth_required: false
  notes: AI chatbot endpoint backed by @ai-sdk/openai-compatible. Potential prompt injection vector. No auth guard.
- entry_point: GET /ftp/*
  protocol: HTTP/Static
  auth_required: false
  notes: Static FTP directory served unauthenticated. Contains acquisition-notes, sensitive.zip, and coupon files. Path traversal
    mitigation in servePublicFiles.ts but bypass challenges exist.
- entry_point: PUT /rest/products/:id/reviews
  protocol: HTTP/REST
  auth_required: false
  notes: 'Product review update — mass assignment vulnerability via Mongoose-style model. IDOR: any user can overwrite any
    review.'
- entry_point: GET /rest/admin/application-configuration
  protocol: HTTP/REST
  auth_required: false
  notes: Returns full application configuration including branding, challenge settings, and feature flags. Unauthenticated.
    Information disclosure.
- entry_point: WebSocket /socket.io
  protocol: WebSocket/Socket.IO
  auth_required: false
  notes: Socket.IO event bus for challenge notifications and order tracking. Authentication state not enforced on WebSocket
    upgrade.
- entry_point: GET /rest/order-history
  protocol: HTTP/REST
  auth_required: false
  notes: 'Returns order history for authenticated user (via JWT). IDOR: order IDs are sequential integers — users can enumerate
    other users'' orders by manipulating URL parameters.'
- entry_point: OPTIONS *
  protocol: HTTP
  auth_required: false
