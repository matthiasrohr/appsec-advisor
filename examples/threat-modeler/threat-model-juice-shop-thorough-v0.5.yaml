  stride: Tampering
  cwe: CWE-22
  title: Zip-slip arbitrary file write in complaint extraction (routes/fileUpload.ts:33)
  affected_parameter: file (zip entry path)
  scenario: extractZipBuffer iterates zip entries and writes each to 'uploads/complaints/' + entry.path (routes/fileUpload.ts:34).
    The only guard is absolutePath.includes(path.resolve('.')) at line 33, which merely checks the resolved path contains
    the process CWD string — it does not confirm the target stays inside uploads/complaints. A crafted entry path such as
    ../ftp/legal.md (the fileWriteChallenge target checked at line 32) or an absolute-looking traversal writes outside the
    intended directory, overwriting served documents or dropping attacker-controlled files into web-served locations.
  evidence_summary: The write target at routes/fileUpload.ts:34 uses the unsanitized zip entry.path, and the line-33 containment
    check compares against path.resolve('.') rather than the resolved uploads/complaints base.
  impact_description: Attacker-controlled file write outside uploads/complaints — overwrite of served legal/backup files and
    potential planting of executable content.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: A containment check exists (line 33) but is anchored to the CWD, not the extraction base, so ../ escapes
    that remain under CWD pass. Extraction is gated behind isChallengeEnabled(fileWriteChallenge).
  mitigation_title: Anchor zip extraction to a normalized base directory and reject traversing entries
  remediation:
    effort: Low
    steps:
    - Compute the normalized base once (path.resolve('uploads/complaints')) and require the resolved target to start with
      base + path.sep before writing.
    - Reject entries whose path contains '..' or is absolute, and strip any leading path segments from entry.path.
    - Cap the number of entries and total uncompressed size before extraction (see file-storage-008).
    code_example: 'const base = path.resolve(''uploads/complaints'')

      const target = path.resolve(base, path.basename(entry.path)) // Before: path.resolve(''uploads/complaints/'' + fileName)

      if (target !== base && !target.startsWith(base + path.sep)) continue // reject traversal

      await pipeline(entry.stream(), fs.createWriteStream(target))'
    verification: Upload a zip containing an entry named '../ftp/legal.md' to /file-upload and assert ftp/legal.md is unchanged
      on disk.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
