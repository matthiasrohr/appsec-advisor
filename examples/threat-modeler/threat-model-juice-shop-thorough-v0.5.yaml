  stride: Spoofing
  cwe: CWE-306
  title: Unauthenticated WebSocket Channel
  affected_parameter: socket.handshake
  scenario: 'registerWebsocketEvents mounts the Socket.IO server on the same internet-facing HTTP server (server.ts:749) and
    accepts every connection with `io.on(''connection'', ...)` at line 23. There is no `io.use()` handshake middleware, no
    `allowRequest` callback, and no token/session check on `socket.handshake` — grep for allowRequest/handshake/io.use/verifyToken
    in this component returns nothing. Any anonymous client on the internet (a raw socket.io-client, not just the SPA) opens
    a session, immediately receives the replayed `challenge solved` notifications (lines 29-31), and can emit any of the four
    inbound events. The `cors.origin: ''http://localhost:4200''` option (line 20) is a hardcoded dev origin that only constrains
    browser-based handshakes and is trivially bypassed by non-browser clients, so it provides no authentication boundary.'
  evidence_summary: io.on('connection') at registerWebsocketEvents.ts:23 has no preceding io.use() authentication middleware
    or allowRequest handshake guard.
  impact_description: Any unauthenticated internet client establishes a real-time session and gains read/write access to every
    socket event handler.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. CORS origin is pinned to a hardcoded dev value (http://localhost:4200) which is not an authentication
    control and does not apply to non-browser clients.
  mitigation_title: Add a Socket.IO handshake authentication middleware and drive CORS origin from config
  remediation:
    effort: Medium
    steps:
    - 'Register an authentication gate before the connection handler: `io.use((socket, next) => { const token = socket.handshake.auth?.token;
      try { socket.data.user = security.verify(token); next() } catch { next(new Error(''unauthorized'')) } })`, reusing the
      existing `lib/insecurity` token verification used by the REST layer.'
    - 'Replace the hardcoded `cors: { origin: ''http://localhost:4200'' }` with the deployed origin(s) read from `config.get(''server.baseUrl'')`
      (or an explicit allow-list), so the value is correct per environment rather than a dev literal.'
    - 'Reject or namespace anonymous connections: if a public read-only feed is required, expose it on a dedicated namespace
      that carries no per-user or secret payloads.'
    code_example: "// Before: any client connects, no identity\n// io.on('connection', (socket) => { ... })\n\n// After: verify\
      \ token during the handshake, before 'connection' fires\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n\
      \  try {\n    socket.data.user = security.verify(token) // throws on invalid/expired\n    next()\n  } catch {\n    next(new\
      \ Error('unauthorized')) // handshake rejected\n  }\n})\nio.on('connection', (socket) => { /* socket.data.user is now\
      \ trusted */ })"
    verification: 'With a raw client (`io(''wss://<host>'', { auth: { token: '''' } })`) and no valid token, the handshake
      must be rejected with `connect_error` ''unauthorized'' and no `challenge solved` events must be received. A client presenting
      a valid token connects normally.'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
