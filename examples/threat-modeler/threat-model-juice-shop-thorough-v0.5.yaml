  stride: Denial of Service
  cwe: CWE-307
  title: No rate limiting on the login endpoint (routes/login.ts:32)
  affected_parameter: POST /rest/user/login
  scenario: 'The reset-password and 2FA endpoints are wrapped in express-rate-limit (server.ts:343,459,466,472), but /rest/user/login
    is registered with no limiter (server.ts:596: app.post(''/rest/user/login'', login())). An attacker can therefore drive
    unlimited credential-stuffing and password-spraying against the login handler, and each request executes a synchronous
    SQL query plus an MD5 hash, allowing request floods to consume database and CPU resources. The absence of throttling both
    enables brute-force authentication and provides a cheap resource-exhaustion vector.'
  evidence_summary: server.ts:596 registers the login route with no rate-limit middleware, while sibling auth routes at server.ts:343/459/466/472
    are rate-limited; the handler entry is routes/login.ts:32.
  impact_description: Unbounded login attempts permit credential stuffing and request-flood resource exhaustion of the auth
    path.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Rate limiting is applied to reset-password and 2FA routes but not to the login route.
  mitigation_title: Apply rate limiting and progressive backoff to the login endpoint
  remediation:
    effort: Low
    steps:
    - Wrap /rest/user/login with express-rate-limit keyed on a trusted client identity, mirroring the 2FA-route configuration.
    - Add per-account failed-attempt backoff/lockout in addition to per-IP limiting.
