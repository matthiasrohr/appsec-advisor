- local_id: realtime-channel-003
  threat_category_id: TH-13
  additional_categories:
  - TH-17
  stride: Information Disclosure
  cwe: CWE-200
  title: CTF flags broadcast to all sockets ignoring 'hidden' flag (challengeUtils.ts:75)
  affected_parameter: notification.flag
  scenario: 'sendNotification builds a notification object that includes `flag = utils.ctfFlag(challenge.name)` (lines 52,
    62-66) plus a `hidden: !config.get(''challenges.showSolvedNotifications'')` marker, then broadcasts the whole object with
    `globalWithSocketIO.io.emit(''challenge solved'', notification)` at line 75 to every connected socket. The secret `flag`
    value is present in the payload regardless of the `hidden` flag — `hidden` only hints the UI to suppress display, it does
    not strip the flag from the wire. Additionally, registerWebsocketEvents replays the entire accumulated `notifications`
    array (including flags) to each newly connected — and unauthenticated (realtime-channel-001) — socket at lines 29-31.
    Any client that connects or listens receives other participants'' CTF flags directly, defeating the intended per-player
    secrecy of the flag values.'
  evidence_summary: io.emit('challenge solved', notification) at challengeUtils.ts:75 sends the full payload including the
    secret `flag` field to every connected socket, and hidden notifications still carry the flag.
  impact_description: CTF flag secrets are disclosed to all connected clients, including anonymous ones, bypassing the intended
    'hidden' notification setting.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: A `hidden` field is computed from config, but it only influences UI display and does not remove the flag
    from the broadcast payload.
  mitigation_title: Strip secret flag fields from broadcast payloads and gate hidden notifications server-side
  remediation:
    effort: Low
    steps:
    - Remove `flag` (and any other secret) from the object passed to `io.emit('challenge solved', ...)`; deliver flags only
      to the specific authenticated socket that earned them, never via a global broadcast.
    - When `hidden` is true, suppress the broadcast entirely server-side rather than relying on the client to honor the flag.
    - On new-connection replay (registerWebsocketEvents.ts:29-31), send a redacted projection of `notifications` that omits
      flag values.
    code_example: "// Broadcast a redacted payload; deliver the flag only to the earner\nconst { flag, ...publicPayload }\
      \ = notification\nif (!notification.hidden) {\n  globalWithSocketIO.io.emit('challenge solved', publicPayload)\n}\n\
      // earnerSocket?.emit('flag', { key: notification.key, flag })"
    verification: Connect an anonymous client and trigger a challenge solve from another session; the anonymous client's received
      `challenge solved` payloads must contain no `flag` field, and a `hidden` notification must produce no broadcast at all.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Mass_Assignment_Cheat_Sheet.html
  evidence:
  - file: lib/challengeUtils.ts
    line: 75
  evidence_check: unchecked
