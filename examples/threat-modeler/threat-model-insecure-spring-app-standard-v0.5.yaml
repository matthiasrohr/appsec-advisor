    effort: Low
    steps:
    - Remove the `requestMatchers("/legacy/admin", "/legacy/admin/**").permitAll()` line from `SecurityConfig.java:41` and
      replace it with `.requestMatchers("/legacy/admin/**").hasRole('ADMIN')` to enforce authentication and role authorization.
    - If the legacy board is no longer in use, delete `LegacyAdminBoardController.java` and its associated Thymeleaf template
      to eliminate the attack surface entirely.
