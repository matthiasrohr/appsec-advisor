threats:
- local_id: input-validation-005
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Missing Rate Limiting on Public Endpoints
  affected_parameter: null
  scenario: 'GET /api/orders/search and GET /api/documents/search are both .permitAll() with no rate-limiting middleware (grep
    confirmed zero hits for rateLimit|RateLimiter|Bucket4j|throttle in the inputvalidation package). An attacker can saturate
    the endpoints with concurrent requests. More critically, because the endpoints are SQL-injection-vulnerable, an attacker
    can inject time-delay payloads (e.g., WAITFOR DELAY or SELECT pg_sleep() equivalents for H2: CALL SLEEP(5000)) that hold
    open database connections for extended periods. A modest number of concurrent requests with 5-second sleep payloads can
    exhaust the HikariCP connection pool, causing 503-equivalent failures for all other application endpoints that share the
    pool.'
  evidence_summary: OrderSearchController.java:24 and DocumentSearchController.java:25 invoke unbounded DAO calls with no
    rate-limiting or query-timeout guard; no rate-limiting configuration was found in the inputvalidation package.
  impact_description: An unauthenticated attacker can render the application unavailable by exhausting the database connection
    pool via slow-query injection.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None confirmed. Spring Boot's default HikariCP pool provides implicit connection limits, but these constitute
    a resource ceiling, not a DoS defense.
  mitigation_title: Apply rate limiting and query timeouts to all unauthenticated search endpoints
  remediation:
    effort: Medium
    steps:
    - 'Add Bucket4j or spring-boot-starter-cache-based rate limiting: configure a filter or HandlerInterceptor that allows
      at most 20 requests per IP per minute on /api/orders/search and /api/documents/search.'
    - 'Set a JDBC query timeout on the EntityManager for these operations: entityManager.createNativeQuery(sql, ...).setHint("jakarta.persistence.query.timeout",
      3000) (3-second timeout) so that slow-query injection payloads terminate before draining the connection pool.'
    - Consider moving both endpoints behind authentication (see input-validation-003 and the document endpoint) as this eliminates
      the unauthenticated DoS surface entirely.
    - 'Configure HikariCP''s connectionTimeout and idleTimeout in application.properties to limit the blast radius if the
      pool is exhausted: spring.datasource.hikari.connection-timeout=5000, spring.datasource.hikari.maximum-pool-size=10.'
    code_example: null
    verification: Using a load-testing tool (e.g., Apache Bench), send 100 concurrent requests to /api/orders/search?email=x.
      Confirm the application responds to other endpoints without degradation. With sleep-based injection payloads, confirm
      individual queries are terminated after 3 seconds.
    reference: CWE-400
  evidence:
  - file: src/main/java/com/example/appsecverificationtarget/inputvalidation/OrderSearchController.java
    line: 24
  evidence_check: verified
  controls_absent_evidence:
  - pattern: rateLimit|RateLimiter|Bucket4j|throttle|@RateLimit
