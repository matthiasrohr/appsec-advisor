  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: MD5 Password Hash Used in Registration Path (RegistrationController.java:55)
  affected_parameter: password (POST /register form field)
  scenario: RegistrationController.register() calls legacyPasswordService.hashForAudit(password) at line 55 and stores the
    result in the AppUser entity's password field. LegacyPasswordService.hashForAudit() computes a raw MD5 digest with no
    salt (MessageDigest.getInstance("MD5")). The AppUser record is persisted to the main application database. MD5 is a broken
    cryptographic hash — it produces a 128-bit output that can be reversed with precomputed rainbow tables in seconds for
    most common passwords. An insider (ACT-D-05) or attacker with database read access who exfiltrates the AppUser table can
    crack all MD5-hashed passwords offline using Hashcat against common wordlists at millions of hashes per second per GPU,
    obtaining plaintext passwords for all registered users.
  evidence_summary: RegistrationController.java:55 passes the plaintext password to LegacyPasswordService.hashForAudit();
    that method at LegacyPasswordService.java:15 applies unsalted MD5 with no computational cost.
  impact_description: Any attacker who obtains a database dump can recover all registered user passwords from MD5 hashes in
    minutes using commodity GPU hardware and standard wordlists.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The userDetailsManager.createUser() call at line 59 also stores a BCrypt hash for Spring Security authentication
    — but the MD5 hash is stored in the AppUser entity, persisting a crackable credential copy alongside the secure one.
  mitigation_title: Remove the MD5 hash from AppUser storage; rely solely on Spring Security's BCrypt credential store
  remediation:
    effort: Low
    steps:
    - Remove the legacyPasswordService.hashForAudit(password) call from RegistrationController.register() and do not store
      any derived password material in the AppUser entity.
    - Delete or deprecate LegacyPasswordService if it serves no other purpose — its only method is a broken MD5 implementation.
    - If a password hash in AppUser is required for other functionality, use PasswordEncoder.encode(password) (BCrypt) and
      store the result — but avoid duplicating credential storage across two separate tables.
    code_example: "// Before (RegistrationController.java:52-58):\nappUserRepository.save(new AppUser(\n    username, email,\n\
      \    legacyPasswordService.hashForAudit(password),  // MD5 — remove this\n    \"USER\", false));\n\n// After: omit hashed\
      \ password from AppUser, or use BCrypt:\nappUserRepository.save(new AppUser(username, email, null, \"USER\", false));"
    verification: Register a new user and query the AppUser table — the password column must be null or a BCrypt hash ($2a$...),
      never an MD5 hex string (32 lowercase hex characters).
    reference: CWE-916
