  title: World-Writable File Permissions on All Container Files (Dockerfile:26)
  affected_parameter: null
  scenario: Dockerfile line 26 runs chmod -R 777 /app /app/runtime, making every file in the application directory — including
    application JARs, configuration files, and all uploaded content — writable by any process running in the container under
    any UID. In a misconfigured container-runtime scenario (shared namespace, sidecar injection, compromised dependency process),
    any code executing in the container can modify application binaries, configuration, or uploaded documents without requiring
    elevated privileges. A malicious insider (ACT-D-05) with deployment-pipeline access who can inject a sidecar or exec into
    the container gains full file modification capability without needing to exploit the root user's privileges separately.
  evidence_summary: Dockerfile:26 runs chmod -R 777 /app /app/runtime unconditionally during image build, setting world-write
    permission on all files in the application and runtime directories.
  impact_description: Any process executing in the container — regardless of the user it runs as — can read, modify, or delete
    application files, uploaded documents, and credential stores.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — world-writable permissions are explicitly set.
  mitigation_title: Remove world-writable permissions and run the JVM as a non-root user in the container
  remediation:
    effort: Low
    steps:
    - 'Replace chmod -R 777 with least-privilege permissions: RUN useradd -r -u 1001 appuser && chown -R appuser:appuser /app
      && chmod -R 750 /app — application files readable only by the app user.'
    - Add USER appuser before ENTRYPOINT so the JVM process does not run as root.
    - 'Create a dedicated writable directory for runtime uploads and documents with permissions 770: RUN mkdir -p /app/runtime
      && chmod 770 /app/runtime.'
    - Do not include chmod -R 777 in any Dockerfile layer — it negates any file-system isolation provided by user namespaces
      or seccomp profiles.
    code_example: "# Before (Dockerfile:26):\nRUN chmod -R 777 /app /app/runtime\n\n# After:\nRUN useradd -r -u 1001 appuser\
      \ \\\n    && chown -R appuser:appuser /app \\\n    && chmod -R 750 /app \\\n    && chmod -R 770 /app/runtime\nUSER appuser"
    verification: After rebuild, exec into the container as a non-app user (docker exec -u nobody ...) and attempt to write
      to /app/target/*.jar — confirm Permission denied. Verify docker inspect shows the process UID is 1001, not 0.
    reference: CWE-732
