    scenario: An attacker scripts concurrent requests to the CPU-intensive or I/O-intensive public endpoints — GET /api/tools/lookup,
      POST /api/xml/preview, GET /api/orders/search, and GET /api/integration/fetch — at high concurrency without any throttle.
      Each XML preview request can amplify CPU usage through entity expansion; each integration/fetch may wait for an external
