  affected_parameter: null
  scenario: An unauthenticated attacker sends `GET /api/legacy-crypto/credentials` with no session cookie or Authorization
    header. SecurityConfig.java:46 explicitly marks `/api/legacy-crypto/**` as `permitAll()`. The handler at CustomCryptoController.java:40-48
    fetches every row from the `vault_credentials` table, calls `customCryptoService.recoverPassword(credential.getSecret())`
    — which XOR-decodes with the hardcoded key — and returns a JSON array containing each credential's `username`, `secret`
    (XOR ciphertext), and `recovered` (plaintext password). A single unauthenticated HTTP GET request extracts all stored
    credentials in plaintext.
  evidence_summary: CustomCryptoController.java:45 calls `customCryptoService.recoverPassword(credential.getSecret())` inside
    a public `@GetMapping("/credentials")` handler. The XOR cipher is fully reversible with the hardcoded key, so `recovered`
    contains the original plaintext for every record.
  impact_description: Every password stored in the vault_credentials table is returned in plaintext to any HTTP client, with
    no authentication, authorization, or rate limiting.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the endpoint is in the permitAll() block and returns the recoverPassword() output unconditionally.
  mitigation_title: Remove the plaintext password recovery from the API response and restrict /credentials to authenticated
    administrators
  remediation:
    effort: Medium
    steps:
    - Remove `"recovered", customCryptoService.recoverPassword(credential.getSecret())` from the response map in CustomCryptoController.java:45.
      Never return plaintext passwords via an API.
    - Add `@PreAuthorize("hasRole('ADMIN')")` to the `credentials()` method. Ensure `@EnableMethodSecurity` is active on SecurityConfig
      (it already is at line 11).
    - Remove `.requestMatchers("/api/legacy-crypto/**").permitAll()` from SecurityConfig or replace it with `.authenticated()`
      after confirming no legitimate public use case exists.
    - Replace the XOR cipher with a proper key-management solution (AWS Secrets Manager, HashiCorp Vault) so secrets are never
      stored as reversible ciphertext in the application database.
    code_example: "// Before — unauthenticated, returns plaintext\n@GetMapping(\"/credentials\")\npublic List<Map<String,\
      \ String>> credentials() {\n    return vaultCredentialRepository.findAll().stream()\n        .map(c -> Map.of(\"username\"\
      , c.getUsername(),\n                         \"secret\", c.getSecret(),\n                         \"recovered\", customCryptoService.recoverPassword(c.getSecret())))\n\
      \        .toList();\n}\n\n// After — admin-only, no plaintext recovery\n@GetMapping(\"/credentials\")\n@PreAuthorize(\"\
      hasRole('ADMIN')\")\npublic List<Map<String, String>> credentials() {\n    return vaultCredentialRepository.findAll().stream()\n\
      \        .map(c -> Map.of(\"username\", c.getUsername()))\n        .toList();\n}"
    verification: 'Call `GET /api/legacy-crypto/credentials` with no auth. Before fix: HTTP 200 with a JSON array containing
      `"recovered":"<plaintext>"` for every credential. After fix: HTTP 401 Unauthorized.'
    reference: CWE-312
