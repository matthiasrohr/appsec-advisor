  - src/main/java/com/example/appsecverificationtarget/accesscontrol/OrderAccessController.java
  notes: 'RBAC implemented via @PreAuthorize in clean paths. Broken in multiple places: /api/admin/report exposed to all (permitAll
    instead of ADMIN role), /api/orders/{id} allows IDOR, /api/users/{id} allows IDOR. Admin-only /admin/users panel correctly
    requires ADMIN.'
- domain: Authorization Controls
  control: Object-Level Authorization
  effectiveness: Weak
  evidence_files:
  - src/main/java/com/example/appsecverificationtarget/accesscontrol/OrderAccessController.java
  - src/main/java/com/example/appsecverificationtarget/accesscontrol/UserAccessController.java
  notes: OrderAccessController#getOwned correctly checks ownership via @PreAuthorize(@authz.isOrderOwner()). OrderAccessController#get
    allows reading any order by ID (BOLA/IDOR). UserAccessController#get allows reading any user by ID (IDOR). No centralized
    object-level authorization policy.
- domain: Query Construction and Data Access Controls
  control: SQL Query Parameterization
  effectiveness: Weak
  evidence_files:
  - src/main/java/com/example/appsecverificationtarget/inputvalidation/OrderLookupDao.java
  - src/main/java/com/example/appsecverificationtarget/inputvalidation/DocumentLookupDao.java
  - src/main/java/com/example/appsecverificationtarget/authentication/LegacySqliteUserStore.java
  notes: Spring Data JPA parameterized queries used in safe paths (domain.* repositories, clean.* package). Raw EntityManager.createNativeQuery()
    with string concatenation used in inputvalidation.* — confirmed SQL injection in OrderLookupDao#findByOwnerEmail, findByTag,
    and DocumentLookupDao#findByTag. LegacySqliteUserStore also uses string concatenation.
- domain: Input Boundary Validation Controls
  control: Centralized Input Validation
  effectiveness: Missing
  evidence_files:
