  cwe: CWE-321
  title: Forgeable Custom Authentication Tokens (HomegrownCipher.java:8)
  affected_parameter: token
  scenario: 'An attacker (or insider with source access) reads the hardcoded XOR key `"orderdesk-legacy-key"` from HomegrownCipher.java.
    They construct any desired token payload by XOR-ing `v1:<victim_subject>` with the key and base64url-encoding the result
    — locally, offline, with no server interaction needed. Calling `GET /api/legacy-crypto/whoami?token=<forged>` proves the
    forgery: the server decodes and returns the spoofed subject. Any downstream component that trusts tokens issued by this
    service is fully compromised.'
  evidence_summary: HomegrownCipher.java:8 embeds the XOR key as a public static final literal. CustomCryptoService.subjectFromToken()
    at line 24 only verifies the `v1:` prefix after XOR-decode, providing zero cryptographic integrity guarantee.
  impact_description: An attacker forges a token for any user identity in the system, gaining full authenticated access as
    that principal to any service that accepts these tokens.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — HomegrownCipher provides no HMAC, signature, or integrity check; the XOR key is hardcoded in source.
  mitigation_title: Replace XOR token issuance with HMAC-SHA256 or JWT RS256 signed with a rotatable secret
  remediation:
    effort: Medium
    steps:
    - Remove HomegrownCipher and CustomCryptoService.issueToken(). Replace with `io.jsonwebtoken:jjwt-api` (JJWT) or Spring
      Security OAuth2 JWT support.
    - Generate a 256-bit signing key via `Keys.secretKeyFor(SignatureAlgorithm.HS256)` and store it in a secrets manager (AWS
      Secrets Manager, HashiCorp Vault) — never in source.
    - Issue tokens with `Jwts.builder().subject(subject).expiration(Date).signWith(key, SIG.HS256).compact()` and verify with
      `Jwts.parser().verifyWith(key).build().parseSignedClaims(token).getPayload().getSubject()`.
    - Remove the `/api/legacy-crypto/token` and `/api/legacy-crypto/whoami` endpoints from the public surface, or gate them
      behind ADMIN authentication.
    code_example: "// Before — XOR with hardcoded key, trivially forgeable\nprivate static final byte[] KEY = \"orderdesk-legacy-key\"\
      .getBytes(UTF_8); // public literal\nreturn cipher.encode(\"v1:\" + subject); // attacker replicates offline\n\n// After\
      \ — HMAC-signed JWT, key from secrets manager\n@Value(\"${jwt.signing.secret}\")\nprivate String signingSecret;\n\n\
      public String issueToken(String subject) {\n    SecretKey key = Keys.hmacShaKeyFor(signingSecret.getBytes(UTF_8));\n\
      \    return Jwts.builder().subject(subject)\n        .expiration(new Date(System.currentTimeMillis() + 3_600_000L))\n\
      \        .signWith(key).compact();\n}"
    verification: 'Forge a token by XOR-encoding `v1:admin` with `orderdesk-legacy-key`, call `GET /api/legacy-crypto/whoami?token=<forged>`.
      Before fix: returns `{"subject":"admin"}`. After fix: returns HTTP 401 or signature-verification error.'
    reference: CWE-321
