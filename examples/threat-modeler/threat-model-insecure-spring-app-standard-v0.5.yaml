  title: Unauthenticated Endpoint Returns All Users With Cleartext Passwords
  affected_parameter: null
  scenario: 'LegacySqliteUserStore stores passwords in plaintext (see initialize() at line 37: save("legacy_alice", "password",
    "USER")). LegacySqliteAuthController.users() at line 50 returns legacySqliteUserStore.findAll() as a list of LegacyUserResponse
    records, where LegacyUserResponse (line 65) includes the password field verbatim. GET /api/legacy-sqlite/users is permitted
    for all callers by SecurityConfig line 40: requestMatchers("/api/legacy-sqlite/**").permitAll(). An anonymous attacker
    calls GET /api/legacy-sqlite/users and receives a JSON array containing the username, cleartext password, and role of
    every user in the SQLite store including legacy_admin. These credentials are immediately usable for account takeover on
    the SQLite login path and for credential-stuffing attacks on external services where users reuse passwords.'
  evidence_summary: LegacySqliteAuthController.java:50 exposes all users via an unauthenticated GET endpoint; LegacySqliteUserStore.java:37
    seeds the database with cleartext passwords.
