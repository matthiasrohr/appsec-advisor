      only the username and outcome — never the password field.
    - Audit and rotate all passwords for users who have logged in since the filter was introduced, as those credentials exist
      in historical log data.
    code_example: "// Safe alternative: log only username and outcome, never password\n@Override\npublic void onAuthenticationSuccess(HttpServletRequest\
