  stride: Denial of Service
  cwe: CWE-862
  title: Missing Authorization (LegacyAdminBoardController.java:37)
  affected_parameter: id
  scenario: '`SecurityConfig.java:41` places `/legacy/admin/**` under `permitAll()` and CSRF is disabled globally (`SecurityConfig.java:28`).
    `LegacyAdminBoardController.java:37-40` implements `POST /legacy/admin/users/{id}/delete` which calls `appUserRepository.delete(load(id))`
    — permanently removing the user record. An anonymous attacker with no credentials can delete every user account in the
    database by iterating numeric IDs (1, 2, 3 …). The board landing page at line 23 lists all user IDs to make enumeration
    trivial. After deleting all accounts, including the admin account, the application loses all operators and authenticated
    users, constituting a full denial of service on the identity layer.'
  evidence_summary: '`LegacyAdminBoardController.java:37` implements a `POST /legacy/admin/users/{id}/delete` handler that
    calls `appUserRepository.delete(load(id))` with no authentication guard, reachable because `SecurityConfig.java:41` permits
    all requests to `/legacy/admin/**`.'
  impact_description: Complete deletion of all user accounts from the database without authentication, permanently locking
    out all users and operators until accounts are restored from backup.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. Authentication is explicitly disabled for this path.
  actor_ids:
  - ACT-D-01
  - ACT-D-02
  - ACT-D-05
  primary_actor: ACT-D-05
  mitigation_title: Restrict POST /legacy/admin/users/{id}/delete to ROLE_ADMIN or remove the legacy admin board entirely
  remediation:
    effort: Low
    steps:
    - Replace the `permitAll()` rule for `/legacy/admin/**` in `SecurityConfig.java` with `.hasRole('ADMIN')`, as also required
      by access-control-005.
    - If the legacy board is deprecated, delete `LegacyAdminBoardController.java` to remove both the promote and delete endpoints
      from the attack surface.
