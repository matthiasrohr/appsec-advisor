  title: Actuator Endpoints Publicly Exposed with Full Secret Values
  affected_parameter: null
  scenario: An attacker sends GET /actuator/env to the publicly accessible actuator surface. Because management.endpoint.env.show-values
    is set to ALWAYS in application.yml and the /actuator/** path is permitted to all in SecurityConfig.java:33, the response
    includes the full plaintext values of every environment variable and application property — including app.integration-token
    (loca**** (28 chars)), the datasource password, and all four Dockerfile-baked secrets (DB_PASSWORD, JWT_SIGNING_KEY,
    AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY). The attacker then uses GET /actuator/heapdump to obtain a JVM heap dump containing
    decrypted in-memory secrets, and GET /actuator/logfile to review recent log entries containing cleartext passwords captured
    by CredentialLoggingFilter.
  evidence_summary: 'SecurityConfig.java line 33 grants permitAll on /actuator/**, and application.yml sets management.endpoints.web.exposure.include=*
    with show-values: ALWAYS, exposing every property value including secrets in plaintext to any caller.'
  impact_description: Any unauthenticated internet caller can retrieve all application secrets, the H2 datasource URL, the
    AWS key pair, and a JVM heap dump in a single unauthenticated HTTP session.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. No authentication is required for any actuator endpoint. Spring Boot's default actuator security
    is overridden by the global permitAll rule.
  mitigation_title: Restrict Actuator endpoints to internal network and require authentication; disable show-values in production
  remediation:
    effort: Low
    steps:
    - In SecurityConfig, remove /actuator/** from the permitAll list and replace it with .requestMatchers("/actuator/**").hasRole("ACTUATOR_ADMIN")
      restricted to an ops-only role.
    - 'In application.yml, set management.endpoint.env.show-values: NEVER and management.endpoint.configprops.show-values:
      NEVER to prevent secret value exposure even for authenticated callers.'
    - 'Limit the exposed endpoints to a minimal required set: management.endpoints.web.exposure.include: health,info,metrics
      — do not use * in production.'
    - Bind the management port to the loopback interface (management.server.port=8090, management.server.address=127.0.0.1)
      so actuator endpoints are never reachable from the public network.
    code_example: "# application.yml — production settings\nmanagement:\n  endpoints:\n    web:\n      exposure:\n       \
      \ include: health,info,metrics   # never * in prod\n  endpoint:\n    env:\n      show-values: NEVER              # never\
      \ ALWAYS in prod\n    configprops:\n      show-values: NEVER"
    verification: Send GET /actuator/env without credentials; the response must be HTTP 401 or HTTP 403. Property values in
      the env response for an authenticated admin must show [PROTECTED] or be omitted entirely.
    reference: CWE-200
