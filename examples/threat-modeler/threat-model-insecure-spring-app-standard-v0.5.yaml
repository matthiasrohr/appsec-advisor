  cwe: CWE-400
  title: Unbounded File Read Exhausts JVM Heap via Path Traversal
  affected_parameter: name
  scenario: FileReadController.read() calls Files.readString(path) at line 22, which reads the entire file into a Java String
    in JVM heap memory. The endpoint is unauthenticated (SecurityConfig.java:37 — permitAll()). By combining this with the
    path traversal, an attacker can direct the read to a very large file (e.g., a large log file at /var/log/syslog, a memory-mapped
    special file, or /proc/kmsg). Files.readString() on an unbounded source will block the request thread indefinitely or
    cause an OutOfMemoryError that crashes the JVM. With no rate limiting on the endpoint, an attacker can issue concurrent
    requests to multiply the impact, exhausting both heap memory and the HTTP thread pool.
  evidence_summary: FileReadController.java:22 calls Files.readString(path) with no size guard; the endpoint is permitAll()
    at SecurityConfig.java:37 with no rate-limiting middleware evident in the controller or its request mapping.
