    from application.yml:5), and connects without credentials (the H2 datasource password is blank per application.yml:8).
    The attacker executes `UPDATE app_users SET admin=true, role=''ADMIN'' WHERE username=''attacker''` to escalate their
    own account to administrator, or `SELECT * FROM app_users` to dump all user hashes. No authentication is required because
    SecurityConfig.java:32 explicitly lists `/h2-console/**` in `permitAll()` and `application.yml:11` sets `spring.h2.console.enabled:
    true`.'
  evidence_summary: 'SecurityConfig.java:32 contains `.requestMatchers("/h2-console/**").permitAll()` and application.yml:11
    sets `spring.h2.console.enabled: true` with a blank datasource password at application.yml:8.'
