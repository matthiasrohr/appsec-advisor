  title: Insecure JWT Verification
  affected_parameter: token (query param)
  scenario: LegacyJwtVerifier.readClaims() calls Jwts.parserBuilder().build().parseClaimsJwt(token), which parses an UNSIGNED
    JWT (JWS-without-signature form). LegacyAdminAuditController.audit() invokes this method and then checks only whether
    claims.get("role").equals("ADMIN") before granting access to the full user roster, order counts, and document counts.
    An anonymous internet attacker issues GET /api/legacy-admin/audit?token=<crafted-unsigned-jwt-with-role=ADMIN> where the
    token payload encodes {"sub":"attacker","role":"ADMIN"}. Because no signature is required, the crafted token passes verification
    and the endpoint returns all registered usernames, emails, roles, total order and document counts.
  evidence_summary: LegacyJwtVerifier.java:15 calls parseClaimsJwt() (unsigned-token parser) instead of parseClaimsJws();
    LegacyAdminAuditController.java:41 trusts the resulting role claim without any signature verification.
  impact_description: Unauthenticated read access to all user accounts, roles, and system-wide aggregate counts — sufficient
    for targeted phishing and privilege mapping.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Signed JWT path (SignedJwtService) correctly uses parseClaimsJws() and pins HS256. The unsigned path
    is a separate, intentionally retained legacy code path.
  mitigation_title: Replace parseClaimsJwt with parseClaimsJws and enforce a signed-token allowlist in LegacyAdminAuditController
  remediation:
    effort: Low
    steps:
    - In LegacyJwtVerifier, replace Jwts.parserBuilder().build().parseClaimsJwt(token) with Jwts.parserBuilder().setSigningKey(key).build().parseClaimsJws(token),
      supplying the same HMAC key used during issuance.
    - Remove or gate the /api/legacy-admin/audit endpoint behind Spring Security's .authenticated() rule in SecurityConfig
      rather than relying solely on a JWT claim for authorization.
    - Add an explicit algorithm allowlist (SignatureAlgorithm.HS256 or RS256) so alg:none tokens are rejected at the parser
      level.
    code_example: "// Before (LegacyJwtVerifier.java:15) — accepts unsigned tokens:\nJwts.parserBuilder().build().parseClaimsJwt(token);\n\
      \n// After — requires valid HS256 signature:\nJwts.parserBuilder()\n    .setSigningKey(signingKey)               //\
      \ same key used at issuance\n    .build()\n    .parseClaimsJws(token)                   // 's' = signed; rejects alg:none"
    verification: Issue GET /api/legacy-admin/audit?token=eyJh**** (JWT, alg:none PoC)
      with an unsigned JWT — the endpoint must return HTTP 401 or 403, never 200.
