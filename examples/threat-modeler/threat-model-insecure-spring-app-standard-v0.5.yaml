- id: auth-service
  name: Authentication Service
  description: Authentication mechanisms including Spring Security form-based login (BCrypt main path), signed JWT issuance/verification,
    unsigned JWT trust (LegacyJwtVerifier accepts role claim without signature), homegrown Base64 session token, homegrown
    XOR-cipher token, legacy SQLite auth backend with cleartext passwords, and CredentialLoggingFilter that logs credentials
    in cleartext.
  paths:
  - src/main/java/com/example/appsecverificationtarget/authentication/**
  - src/main/java/com/example/appsecverificationtarget/config/SecurityConfig.java
  tier: application
  complexity: complex
  framework: spring-security
  deployment_zones:
  - prod-env
  handles_sensitive_data: true
  threat_ids:
  - T-003
  - T-005
  - T-008
  - T-017
  - T-019
  - T-029
  - T-030
  - T-034
  - T-035
  - T-038
- id: access-control
  name: Authorization and Access Control Layer
  description: Access control controllers covering order access (IDOR on GET /api/orders/{id}), user access (IDOR on GET /api/users/{id}),
    admin report endpoint (exposed without ADMIN role), profile update (mass assignment via direct entity binding), document
    decision release, and admin user creation. Authorization checks are ad-hoc and not centralized.
  paths:
  - src/main/java/com/example/appsecverificationtarget/accesscontrol/**
  tier: application
  complexity: moderate
  framework: spring-security
  deployment_zones:
  - prod-env
  handles_sensitive_data: true
  threat_ids:
  - T-002
  - T-013
  - T-027
  - T-028
  - T-037
  - T-040
- id: input-validation
  name: Input Validation and Data Access Layer
  description: 'SQL injection vulnerable data access objects: OrderLookupDao (findByOwnerEmail, findByTag), DocumentLookupDao
    (findByTag), and LegacySqliteUserStore (SQL injection via username parameter). Uses raw EntityManager.createNativeQuery()
    with string concatenation. The clean.* package provides safe counterexamples using parameterized queries.'
  paths:
  - src/main/java/com/example/appsecverificationtarget/inputvalidation/**
  - src/main/java/com/example/appsecverificationtarget/clean/**
  tier: application
  complexity: moderate
  framework: spring-data-jpa
  deployment_zones:
  - prod-env
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-006
  - T-042
  - T-046
- id: crypto-service
  name: Cryptography and Token Service
  description: 'Homegrown cryptography implementations: XOR repeating-key cipher (HomegrownCipher with hardcoded key), MD5
    password hashing (LegacyPasswordService), java.util.Random OTP generation, AES/ECB without IV (LegacyCryptoService), and
    a forgeable custom token service. These are intentional weaknesses forming a design anti-pattern catalog.'
  paths:
  - src/main/java/com/example/appsecverificationtarget/crypto/**
  tier: application
  complexity: moderate
  framework: java
  deployment_zones:
  - prod-env
  handles_sensitive_data: true
  threat_ids:
  - T-004
  - T-009
  - T-014
  - T-020
  - T-022
  - T-032
  - T-033
  - T-044
- id: data-persistence
  name: Data Persistence Layer
  description: H2 in-memory database (create-drop on startup) accessed via Spring Data JPA repositories. Includes domain entities
    (AppUser, CustomerOrder, DocumentRecord) and both safe (parameterized) and unsafe (raw SQL) repository paths. Also encompasses
    the SQLite legacy auth backend (runtime/legacy-auth.sqlite) with cleartext password storage.
  paths:
  - src/main/java/com/example/appsecverificationtarget/domain/**
  - runtime/legacy-auth.sqlite
  tier: data
  complexity: simple
  framework: spring-data-jpa
  deployment_zones:
  - prod-write-db
  handles_sensitive_data: true
  threat_ids:
  - T-015
  - T-036
- id: file-storage
  name: File Storage
  description: Local filesystem storage for uploaded documents (runtime/documents) and user uploads (runtime/uploads). FileReadController
    exposes path traversal via unsanitized filename parameter. File upload endpoints accept arbitrary file types without validation.
    The COPY . in Dockerfile bakes these directories into the container image.
  paths:
  - src/main/java/com/example/appsecverificationtarget/serverside/FileReadController.java
  - runtime/documents
  - runtime/uploads
  tier: data
  complexity: simple
  framework: java
  deployment_zones:
  - prod-env
  handles_sensitive_data: true
  threat_ids:
  - T-010
  - T-024
  - T-039
assets:
- id: A-001
  name: User Credentials (Passwords)
  classification: Restricted
  description: User passwords stored in H2 (BCrypt in main path; cleartext in legacy SQLite runtime/legacy-auth.sqlite). Also
    logged in cleartext by CredentialLoggingFilter.
  linked_threats: []
- id: A-002
  name: JWT Signing Key
  classification: Restricted
  description: Hardcoded JWT signing key (JWT_SIGNING_KEY=hardcoded-legacy-jwt-secret) baked into Dockerfile ENV variables
    and application.yml. Controls authenticity of all JWT tokens.
  linked_threats: []
- id: A-003
  name: AWS API Credentials
  classification: Restricted
  description: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY hardcoded as Dockerfile ENV variables (AKIA**** (20 chars) / wJalrXUtnFEMI/K7MDENG/...).
    These are fixture values but follow the real credential format.
  linked_threats: []
- id: A-004
  name: Customer Order Records
  classification: Confidential
  description: CustomerOrder entity stored in H2 database. Includes owner email, line items, order status. Exposed via IDOR
    on GET /api/orders/{id} without ownership verification.
  linked_threats: []
- id: A-005
  name: User Profile and PII
  classification: Confidential
  description: AppUser entity containing username, email, role, and profile data. Exposed via IDOR on GET /api/users/{id}.
    Mass assignment vulnerability allows role field manipulation via PUT /profile.
  linked_threats: []
- id: A-006
  name: Document Records
  classification: Confidential
  description: DocumentRecord entities including owner, tags, and file attachments. Exposed via SQL injection in DocumentLookupDao#findByTag.
    Unauthorized document release possible via DocumentDecisionController.
  linked_threats: []
- id: A-007
  name: Uploaded Files
  classification: Confidential
  description: User-uploaded files stored in runtime/uploads and runtime/documents. Exposed via path traversal on GET /api/files/read?name=../../../../etc/passwd.
    No file type validation on upload.
  linked_threats: []
- id: A-008
  name: Application Environment Variables and Secrets
  classification: Restricted
  description: DB_PASSWORD, JWT_SIGNING_KEY, AWS credentials, and integration-token (loca**** (28 chars)) exposed
    via Spring Actuator /actuator/env endpoint which is publicly accessible without authentication.
  linked_threats: []
- id: A-009
  name: Spring Boot Application Runtime
  classification: Internal
  description: The Spring Boot application process including JVM heap, loaded classes, and runtime state. Spring Actuator
    /actuator/heapdump endpoint allows unauthenticated JVM heap dump extraction.
  linked_threats: []
- id: A-010
  name: Server Host Resources
  classification: Internal
  description: Underlying OS and server resources reachable via command injection (GET /api/tools/lookup?name=<cmd>), SSRF
    (GET /api/integration/fetch?url=<internal-url>), and world-writable container directories (chmod -R 777 /app).
  linked_threats: []
