- local_id: crypto-service-006
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Unsalted MD5 Password Hashing (LegacyPasswordService.java:15)
  affected_parameter: password
  scenario: A caller submits any password to `GET /api/crypto/password-digest?password=<value>`. LegacyPasswordService.java:15
    computes MD5 with no salt and returns the hex digest. MD5 is a broken collision-resistant hash with no work factor. Any
    returned digest is immediately reversible by lookup in publicly available precomputed rainbow tables (e.g., CrackStation),
    covering all common passwords and dictionary words. If password digests produced by this service are stored in a database,
    a breach of that database enables instant credential recovery for the majority of real-world passwords.
  evidence_summary: LegacyPasswordService.java:15 calls `MessageDigest.getInstance("MD5")` with no salt input. The resulting
    digest is deterministic per-password across all instances, enabling rainbow-table lookup.
  impact_description: Any password hashed by this service is effectively stored in the clear for any attacker with rainbow-table
    access, enabling mass credential recovery after a database breach.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: BCrypt is used in the main authentication path (SecurityConfig.java:88) but not in this legacy hashing
    path.
  mitigation_title: Replace MD5 with BCrypt in LegacyPasswordService.hashForAudit and remove the public hashing endpoint
  remediation:
    effort: Low
    steps:
    - Remove `MessageDigest.getInstance("MD5")` from LegacyPasswordService. Inject the existing `PasswordEncoder` bean (BCryptPasswordEncoder
      configured in SecurityConfig) and call `passwordEncoder.encode(password)` instead.
    - Remove or restrict the `/api/crypto/password-digest` endpoint — a public API that hashes arbitrary passwords on demand
      facilitates offline brute-force by exposing a consistent hashing oracle.
    - If a hash is required for audit purposes rather than verification, use HMAC-SHA-256 with a secret key (not a standalone
      hash) so the digest cannot be precomputed without the key.
    code_example: "// Before — MD5, no salt, rainbow-table vulnerable\nMessageDigest digest = MessageDigest.getInstance(\"\
      MD5\");\nbyte[] hash = digest.digest(password.getBytes(StandardCharsets.UTF_8));\n\n// After — BCrypt via the existing\
      \ PasswordEncoder bean\n// (BCryptPasswordEncoder already configured in SecurityConfig)\n@Autowired\nprivate PasswordEncoder\
      \ passwordEncoder;\n\npublic String hashForAudit(String password) {\n    return passwordEncoder.encode(password); //\
      \ salted, adaptive cost, no rainbow table\n}"
    verification: 'Call `GET /api/crypto/password-digest?password=password`. Before fix: returns `5f4dcc3b5aa765d61d8327deb882cf99`
      — look this up in any rainbow table to confirm instant reversal. After fix: endpoint returns HTTP 403 or a BCrypt hash
      beginning with `$2a$` that cannot be rainbow-tabled.'
    reference: CWE-916
