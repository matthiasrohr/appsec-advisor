  title: Deterministic AES/ECB Encryption without IV (LegacyCryptoService.java:17)
  affected_parameter: value
  scenario: 'An attacker who can observe multiple ciphertext outputs from `GET /api/crypto/export-token?value=<input>` exploits
    the deterministic ECB property: identical 16-byte plaintext blocks always produce identical ciphertext blocks. By submitting
    carefully chosen inputs, the attacker performs a chosen-plaintext attack to identify block boundaries, detect duplicate
    values across users, and partially reconstruct sensitive export payloads. AES/ECB also enables a cut-and-paste attack:
    the attacker rearranges ciphertext blocks to produce a semantically different but validly decryptable message, e.g., swapping
    the account-number block from one export token into another.'
  evidence_summary: LegacyCryptoService.java:17 instantiates `Cipher.getInstance("AES/ECB/PKCS5Padding")`. No IV is generated
    or stored; the same plaintext always produces the same ciphertext under the hardcoded key.
  impact_description: An attacker observing export tokens for related inputs recovers plaintext structure, detects duplicate
    values across records, and fabricates valid-decryptable export tokens by block rearrangement.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — ECB mode is the only cipher mode in use for export values.
  mitigation_title: Replace AES/ECB with AES/GCM and generate a random IV per encryption
  remediation:
    effort: Low
    steps:
    - Change `Cipher.getInstance("AES/ECB/PKCS5Padding")` to `Cipher.getInstance("AES/GCM/NoPadding")`.
    - Generate a fresh 12-byte IV with `new SecureRandom().nextBytes(iv)` before each encryption call.
    - 'Prepend the IV to the ciphertext output so decryption can recover it: `output = iv || ciphertext`.'
    - Replace the hardcoded EXPORT_KEY with a value injected from a secrets manager (see crypto-service-007).
    code_example: '// Before — ECB, no IV, deterministic

      Cipher cipher = Cipher.getInstance("AES/ECB/PKCS5Padding");

      cipher.init(Cipher.ENCRYPT_MODE, keySpec);


      // After — GCM with random IV, provides confidentiality + integrity

      byte[] iv = new byte[12];

      new SecureRandom().nextBytes(iv);

      Cipher cipher = Cipher.getInstance("AES/GCM/NoPadding");

      cipher.init(Cipher.ENCRYPT_MODE, keySpec, new GCMParameterSpec(128, iv));

      byte[] ct = cipher.doFinal(plaintext);

      byte[] out = new byte[12 + ct.length];

      System.arraycopy(iv, 0, out, 0, 12);

      System.arraycopy(ct, 0, out, 12, ct.length);

      return Base64.getEncoder().encodeToString(out);'
    verification: 'Call `GET /api/crypto/export-token?value=AAAAAAAAAAAAAAAA` twice. Before fix: both responses are identical.
      After fix: each response differs due to the random IV prepended to the output.'
    reference: CWE-327
