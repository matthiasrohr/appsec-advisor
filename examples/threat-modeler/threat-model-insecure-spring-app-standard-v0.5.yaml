    the file contents. The container runs as root (no USER directive in Dockerfile), so the process can read any file on the
    filesystem. High-value targets include /proc/self/environ (exposing the DB_PASSWORD, JWT_SIGNING_KEY, and AWS credentials
    baked into Dockerfile ENV statements), /app/target/*.jar (application bytecode), and ../legacy-auth.sqlite (the legacy
    credential database also in runtime/).'
