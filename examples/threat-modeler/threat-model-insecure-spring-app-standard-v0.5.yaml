components:
- id: spring-boot-app
  name: Spring Boot Web Application
  description: 'Main Spring Boot 3.2 MVC application exposing REST and form-based UI endpoints. Hosts the filter chain (CSRF
    disabled, permissive permitAll rules), CORS filter (origin reflection), actuator endpoints, and all server-side sinks:
    SSRF (IntegrationController), path traversal (FileReadController), command injection (ToolController), and XML preview
    (XmlPreviewController).'
