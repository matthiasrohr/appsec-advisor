tier_root_causes:
  server:
  - hardcoded secrets and credentials baked into source code and container image
  - missing authentication on management, database console, and crypto endpoints
  - 'broken cryptographic primitives: XOR cipher, ECB mode, MD5, non-CSPRNG for OTP'
  - raw SQL string concatenation enabling injection in multiple data access layers
  - missing authorization checks on admin report and sensitive resource endpoints
  data:
  - cleartext password storage in SQLite database used for legacy authentication
  - unauthenticated H2 database console exposed on public network interface
  - unrestricted file path traversal enabling arbitrary read and write of files
cross_repo_dependencies: []
weaknesses:
- id: W-001
  weakness_class: broken_auth
  kind: design
  title: Endpoints are reachable without enforced authentication
  statement: Route Authentication is not consistently enforced.
  severity: Critical
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Route Authentication Middleware
    - Server-Side Session Enforcement
  mechanism_id: missing-endpoint-authentication
  affected_components:
  - access-control
  - data-persistence
  instances:
  - id: T-002
    file: src/main/java/com/example/appsecverificationtarget/legacyadmin/LegacyAdminBoardController.java
    line: 29
    basis: confirmed-exploitable
  - id: T-015
    file: src/main/java/com/example/appsecverificationtarget/config/SecurityConfig.java
    line: 32
    basis: confirmed-exploitable
  description: Sensitive API routes and real-time channels are exposed without an enforced authentication check at the endpoint
    boundary. Access control depends on each handler (or the caller) remembering to require a session, so an unauthenticated
    client can reach privileged operations directly.
  structural_recommendation: enforce authentication centrally at the routing and channel boundary so every exposed endpoint
    requires a verified session unless explicitly marked public
- id: W-002
  weakness_class: injection
  kind: design
  title: Input handling lacks enforced boundary validation
  statement: Schema / Allowlist Input Validation is not consistently enforced.
  severity: Critical
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Schema Validation
    - Allowlist Validation
  mechanism_id: blacklist-only-input-validation
  affected_components:
  - file-storage
  instances:
  - id: T-010
    file: src/main/java/com/example/appsecverificationtarget/serverside/FileReadController.java
    line: 19
    basis: confirmed-exploitable
  - id: T-023
    file: src/main/java/com/example/appsecverificationtarget/web/BusinessFileStorage.java
    line: 23
    basis: confirmed-exploitable
  description: Request handlers do not validate input against one enforced server-side schema or allowlist at the boundary
    — validation is either absent on the vulnerable parameters or limited to rejecting selected bad patterns (a blacklist).
    New encodings and unanticipated input forms can therefore reach downstream parsers or interpreters.
  structural_recommendation: enforce server-side schemas and domain-specific allowlists before input reaches parsing, persistence,
    or command construction
- id: W-003
  weakness_class: missing_authz
  kind: design
  title: Authorization is implemented route by route
  statement: Centralised Authorization Policy is not consistently enforced.
  severity: Critical
  severity_basis: confirmed
  observable_backing:
    absent_control_signal:
    - Centralised AuthZ Policy
    - Role / Scope Enforcement
    - Ownership Check
  mechanism_id: route-by-route-authorization
  affected_components:
  - access-control
  - crypto-service
  - input-validation
  - spring-boot-app
  instances:
  - id: T-014
    file: src/main/java/com/example/appsecverificationtarget/config/SecurityConfig.java
    line: 45
    basis: confirmed-exploitable
  - id: T-016
    file: src/main/java/com/example/appsecverificationtarget/config/SecurityConfig.java
    line: 32
    basis: confirmed-exploitable
  - id: T-028
    file: src/main/java/com/example/appsecverificationtarget/accesscontrol/AdminReportController.java
    line: 35
    basis: confirmed-exploitable
  - id: T-037
    file: src/main/java/com/example/appsecverificationtarget/legacyadmin/LegacyAdminBoardController.java
    line: 37
    basis: confirmed-exploitable
  - id: T-040
    file: src/main/java/com/example/appsecverificationtarget/accesscontrol/OrderAccessController.java
    line: 24
    basis: confirmed-exploitable
  - id: T-042
    file: src/main/java/com/example/appsecverificationtarget/inputvalidation/OrderSearchController.java
    line: 24
    basis: confirmed-exploitable
  - id: T-043
    file: src/main/java/com/example/appsecverificationtarget/config/SecurityConfig.java
    line: 34
    basis: confirmed-exploitable
  description: Authorization depends on per-handler checks instead of a policy boundary that consistently enforces role, ownership,
    and tenant scope. New routes can bypass protection by omitting a local check.
  structural_recommendation: enforce authorization through a shared server-side policy layer and make ownership and tenant
    scope mandatory inputs to data access
- id: W-004
  weakness_class: weak_crypto
  kind: implementation
  title: Cryptographic security is implemented in application code
  statement: Hand-rolled XOR / repeating-key cipher — src/main/java/com/example/appsecverificationtarget/crypto/HomegrownCipher.java:14
  severity: Medium
  severity_basis: observed-practice
  observable_backing:
    practice_evidence:
    - file: src/main/java/com/example/appsecverificationtarget/crypto/HomegrownCipher.java
      line: 14
      id: T-020
  mechanism_id: application-owned-cryptography
  affected_components:
  - backend-api
  description: Application code owns cryptographic protocol, key, or primitive decisions that should be fixed by a vetted
    platform or library. Security then depends on every caller choosing compatible algorithms and parameters.
  structural_recommendation: replace application-owned cryptographic protocol and key handling with a vetted library or managed
    cryptographic service
- id: W-005
  weakness_class: weak_crypto
  kind: implementation
  title: Security-sensitive data uses weak cryptographic primitives
  statement: Predictable OTP from Non-Cryptographic PRNG (LegacyTokenService.java:10)
  severity: Medium
  severity_basis: observed-practice
  observable_backing:
    practice_evidence:
    - file: src/main/java/com/example/appsecverificationtarget/crypto/LegacyTokenService.java
      line: 10
      id: T-022
    - file: src/main/java/com/example/appsecverificationtarget/authentication/RegistrationController.java
      line: 55
      id: T-030
    - file: src/main/java/com/example/appsecverificationtarget/crypto/LegacyPasswordService.java
      line: 15
      id: T-033
    - file: src/main/java/com/example/appsecverificationtarget/crypto/LegacyCryptoService.java
      line: 17
      id: T-044
  mechanism_id: weak-cryptographic-primitives
  affected_components:
  - auth-service
  - crypto-service
  description: Password, token, or integrity protection uses a weak hash, predictable random source, or insufficient work
    factor. The application may use a standard library, but the selected primitive does not provide the required security
    property.
  structural_recommendation: standardise on a password KDF, a CSPRNG for secrets, and modern authenticated cryptographic primitives
    with centrally reviewed parameters
