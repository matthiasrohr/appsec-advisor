    ENV. integration-token in application.yml exposed via /actuator/env. XOR cipher hardcoded key in CustomCryptoService.
    No secrets management solution (Vault, AWS Secrets Manager, etc.).'
- domain: Cryptography Secrets and Data Protection
  control: Cryptographic Algorithm Selection
  effectiveness: Weak
