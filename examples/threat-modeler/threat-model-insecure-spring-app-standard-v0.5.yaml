- local_id: crypto-service-003
  threat_category_id: TH-03
  additional_categories: []
  stride: Tampering
  cwe: CWE-330
  title: Predictable OTP from Non-Cryptographic PRNG (LegacyTokenService.java:10)
  affected_parameter: null
  scenario: An attacker calls `GET /api/crypto/otp` multiple times to observe a sequence of OTP values. `java.util.Random`
    is a linear congruential generator seeded from the system clock at startup. By collecting two to three consecutive OTP
    values, an attacker can reconstruct the full internal state of the PRNG and predict all subsequent OTPs without server
    interaction. If these OTPs gate any authentication step or transaction confirmation, the attacker can pre-compute valid
    codes and bypass the second factor.
  evidence_summary: LegacyTokenService.java:10 declares `private final Random random = new Random()`. The LCG seed is deterministic
    from a single observed output sequence, enabling offline PRNG-state recovery.
  impact_description: An attacker predicts future OTP values offline, allowing bypass of any authentication or transaction-confirmation
    step protected by this PRNG.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — java.util.Random is used instead of java.security.SecureRandom.
  mitigation_title: Replace java.util.Random with java.security.SecureRandom in LegacyTokenService
  remediation:
    effort: Low
    steps:
    - Change `private final Random random = new Random()` to `private final SecureRandom random = new SecureRandom()` in LegacyTokenService.java.
    - Verify that SecureRandom is seeded by the JVM's entropy source (default on all modern JDKs) — no explicit seed call
      needed.
    - Consider using a 6-digit TOTP (RFC 6238) with time-bounded validity instead of a server-generated random code, to add
      expiry as a second protection.
    code_example: '// Before — predictable LCG

      private final Random random = new Random();

      int value = 100000 + random.nextInt(900000);


      // After — cryptographically secure PRNG

      private final SecureRandom random = new SecureRandom();

      int value = 100_000 + random.nextInt(900_000);'
    verification: 'Record three consecutive `GET /api/crypto/otp` responses. Before fix: seed the java.util.Random LCG from
      these values and predict the fourth response with > 99% accuracy. After fix: SecureRandom output must not be predictable
      from prior observations.'
    reference: CWE-330
