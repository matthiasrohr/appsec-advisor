- local_id: file-storage-003
  threat_category_id: TH-05
  additional_categories:
  - TH-06
  stride: Elevation of Privilege
  cwe: CWE-434
  title: Unrestricted File Type Upload with No Extension or MIME Validation
  affected_parameter: file (multipart content-type / filename…
  scenario: BusinessFileStorage.store() performs no validation of the file's content-type or filename extension before writing
    to disk. An authenticated attacker can upload a JSP web shell as attachment. While Spring Boot embedded Tomcat does not
    auto-serve JSP files from arbitrary directories by default, any subsequent misconfiguration that adds a static resource
    handler over runtime/uploads/, or any admin-level action that moves the file to a served path, would result in server-side
    code execution. More immediately, combined with the path-traversal-write vulnerability (file-storage-002), an attacker
    can upload a crafted JAR or script file to any writable path, replacing trusted application artifacts. The file.getContentType()
    value at line 26 is accepted from the caller without verification and stored as-is, which can mislead downstream consumers
    about the file's true nature.
  evidence_summary: BusinessFileStorage.java:13-26 contains no allowlist check on file.getContentType() or the filename extension
    extracted from getOriginalFilename() before writing the upload to disk.
  impact_description: An authenticated attacker can plant executable or malicious content in the server's filesystem, enabling
    remote code execution if the file reaches a served path, or poisoning file metadata for downstream processing.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — getOriginalFilename() is used as-is, getContentType() is stored but not validated.
  mitigation_title: Enforce an extension and MIME-type allowlist in BusinessFileStorage before writing uploads to disk
  remediation:
    effort: Low
    steps:
    - 'Define an allowlist of permitted extensions: private static final Set<String> ALLOWED_EXTENSIONS = Set.of(".pdf", ".png",
      ".jpg", ".docx", ".xlsx");'
    - 'Extract the extension from the sanitized filename and reject uploads not in the allowlist: String ext = fileName.substring(fileName.lastIndexOf(''.''));
      if (!ALLOWED_EXTENSIONS.contains(ext.toLowerCase())) throw new ResponseStatusException(HttpStatus.BAD_REQUEST, "File
      type not permitted");'
    - Use Apache Tika or a magic-bytes check to verify the actual file content matches the declared type — filename and Content-Type
      headers are attacker-controlled.
    - Store uploaded files in a directory that is not served as static content, and never serve them with execute permissions.
    code_example: "// After filename sanitization (BusinessFileStorage.java, before transferTo):\nprivate static final Set<String>\
      \ ALLOWED = Set.of(\".pdf\",\".png\",\".jpg\",\".docx\");\nint dot = fileName.lastIndexOf('.');\nif (dot < 0 || !ALLOWED.contains(fileName.substring(dot).toLowerCase()))\
      \ {\n    throw new ResponseStatusException(HttpStatus.BAD_REQUEST, \"File type not permitted\");\n}"
