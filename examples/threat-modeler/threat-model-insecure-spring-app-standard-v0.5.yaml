  title: SQL Injection in Legacy Auth Endpoint (LegacySqliteUserStore.java:64)
  affected_parameter: username, password (query params to GET…
  scenario: 'LegacySqliteUserStore.authenticateRaw() builds a SQL query by string-concatenating the caller-supplied username
    and password directly into the query text at line 64: "select ... where username = ''" + username + "'' and password =
    ''" + password + "''". LegacySqliteAuthController.loginRaw() (GET /api/legacy-sqlite/login-raw) routes unauthenticated
    requests here. An anonymous attacker sends GET /api/legacy-sqlite/login-raw?username=%27+OR+%271%27%3D%271%27--&password=x,
    causing the resulting SQL to evaluate to SELECT * WHERE 1=1 and returning the first user row — typically legacy_admin
    with role ADMIN — without knowing any valid credential. Because the endpoint returns the matched username and role in
    the response body, the attacker learns the admin account name and can proceed to exploit higher-privilege paths.'
  evidence_summary: LegacySqliteUserStore.java:64 concatenates username and password parameters directly into a SQL WHERE
    clause using string addition with no parameterization.
  impact_description: Authentication bypass for the SQLite-backed legacy auth path, granting the attacker a valid username/role
    pair without credentials — including the admin role.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: The primary authenticate() method (line 43) correctly uses PreparedStatement with positional parameters.
    The raw path is a separate, intentionally insecure endpoint.
  mitigation_title: Replace string-concatenated SQL in authenticateRaw with a PreparedStatement
  remediation:
    effort: Low
    steps:
    - Replace the String-concatenation query in LegacySqliteUserStore.authenticateRaw() with a PreparedStatement identical
      to the existing authenticate() method — use statement.setString(1, username) and statement.setString(2, password).
    - Remove the GET /api/legacy-sqlite/login-raw endpoint from LegacySqliteAuthController if the raw path serves no legitimate
      purpose, or gate it behind authentication in SecurityConfig.
    code_example: "// Before (LegacySqliteUserStore.java:64):\nString sql = \"select ... where username = '\" + username +\
      \ \"' and password = '\" + password + \"'\";\n\n// After — use parameterized query identical to authenticate():\ntry\
      \ (PreparedStatement stmt = conn.prepareStatement(\n        \"select id, username, password, role from legacy_users\
      \ where username = ? and password = ?\")) {\n    stmt.setString(1, username);\n    stmt.setString(2, password);\n  \
      \  // ...\n}"
    verification: Send GET /api/legacy-sqlite/login-raw?username=%27+OR+%271%27%3D%271%27--&password=x — the fixed endpoint
      must return HTTP 401 (no user matched) rather than 200 with a user record.
    reference: CWE-89
