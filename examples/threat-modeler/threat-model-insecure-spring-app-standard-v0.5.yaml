- local_id: data-persistence-004
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-256
  title: Cleartext Password Storage in SQLite Database
  scenario: 'When `LegacySqliteUserStore.initialize()` seeds the `legacy_users` table (lines 37–39), it stores passwords as
    plaintext strings: `save("legacy_alice", "password", "USER")`, `save("legacy_admin", "admin", "ADMIN")`. The `legacy_users`
    table schema (lines 27–34) defines `password text not null` with no hashing. An attacker who obtains the SQLite file `runtime/legacy-auth.sqlite`
    — via directory traversal, backup exposure, or the file-read endpoint — reads all credentials immediately with no cracking
    step. ACT-D-05 (malicious-insider-ops) with `prod-write-db` access can directly open the SQLite file and extract all plaintext
    passwords.'
  evidence_summary: '`LegacySqliteUserStore.java:27-34` defines `password text not null` in the table DDL; line 37 calls `save("legacy_alice",
    "password", "USER")` — writing the literal string `"password"` into the password column.'
  impact_description: All legacy user passwords are readable without decryption from the SQLite file. Password reuse by users
    means this exposure extends to other systems the same credentials protect.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: The H2-backed AppUser entity uses bcrypt via BCryptPasswordEncoder (SecurityConfig.java:87). The SQLite
    legacy store does not apply any hashing.
  mitigation_title: Hash all passwords with bcrypt before storing them in the SQLite legacy_users table
  remediation:
    effort: Medium
    steps:
    - 'In `LegacySqliteUserStore.save()` (line 99), apply BCrypt hashing before storing: replace `statement.setString(2, password)`
      with `statement.setString(2, BCrypt.hashpw(password, BCrypt.gensalt(12)))`.'
    - Update `authenticate()` (line 43) to compare using `BCrypt.checkpw(password, storedHash)` rather than a plaintext equality
      comparison in SQL.
    - Run a one-time migration to hash existing cleartext rows in `legacy_users` — include a migration script in the `@PostConstruct`
      that detects non-BCrypt values (they do not start with `$2a$`) and re-hashes them.
    - Delete the existing `runtime/legacy-auth.sqlite` file to remove the plaintext-password database; the `@PostConstruct`
      will recreate it with hashed seeds on next startup.
    code_example: "// Before (LegacySqliteUserStore.java:99-100):\nstatement.setString(2, password);  // stores plaintext\n\
      \n// After — bcrypt hashed:\nstatement.setString(2, BCrypt.hashpw(password, BCrypt.gensalt(12)));\n\n// In authenticate()\
      \ — compare with checkpw instead of SQL equality:\n// Remove password column from WHERE; fetch the row by username only,\
      \ then:\nif (resultSet.next() && BCrypt.checkpw(password, resultSet.getString(\"password\"))) {\n    return Optional.of(readUser(resultSet));\n\
      }"
    verification: Inspect `runtime/legacy-auth.sqlite` with `sqlite3 runtime/legacy-auth.sqlite 'SELECT password FROM legacy_users
      LIMIT 1'` — the value must begin with `$2a$` (BCrypt prefix), not `password` or `admin`.
    reference: CWE-256
