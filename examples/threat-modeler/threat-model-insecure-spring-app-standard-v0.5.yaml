trust_boundaries:
- id: tb-1
  name: Public Internet / Application Boundary
  description: 'Boundary between unauthenticated external users and the Spring Boot application. Enforced by Spring Security
    filter chain. Critically weakened: CSRF globally disabled, permissive permitAll rules on 89 of 90 routes, no rate limiting,
    no WAF.'
  from: external
  to: spring-boot-app
  crossing_data: HTTP requests (unauthenticated), form submissions, file uploads, JWT tokens in query params
  enforcement_mechanism: Spring Security filter chain (SecurityConfig.java)
  known_weaknesses:
  - CSRF disabled globally
  - Permissive permitAll rules on attack-surface endpoints
  - No rate limiting on authentication endpoints
- id: tb-2
  name: Authentication Enforcement Boundary
  description: 'Boundary that should separate authenticated sessions from unauthenticated access. Broken by multiple bypass
    mechanisms: unsigned JWT trust, Base64 token, XOR cipher token, and legacy SQLite auth with SQL injection.'
  from: spring-boot-app
  to: auth-service
  crossing_data: Session cookies, JWT tokens, HTTP Basic credentials, legacy tokens
  enforcement_mechanism: SignedJwtAuthenticationFilter, Spring Security UsernamePasswordAuthenticationFilter
  known_weaknesses:
  - LegacyJwtVerifier trusts unsigned JWT
  - Base64-encoded user ID accepted as auth token
  - XOR cipher tokens are forgeable
  - CredentialLoggingFilter logs cleartext credentials
- id: tb-3
  name: Application / Data Tier Boundary
  description: Boundary between application logic and the data persistence layer. Partially enforced by Spring Data JPA parameterized
    queries (safe paths) but bypassed by raw EntityManager.createNativeQuery() calls with string concatenation (SQL injection
    paths).
  from: spring-boot-app
  to: data-persistence
  crossing_data: JPA queries, native SQL queries, JDBC connections
  enforcement_mechanism: Spring Data JPA (parameterized), EntityManager (unsafe raw SQL paths)
  known_weaknesses:
  - OrderLookupDao uses string concatenation in SQL
  - DocumentLookupDao uses string concatenation in SQL
  - LegacySqliteUserStore uses string concatenation + SQLite JDBC
- id: tb-4
  name: Application / Filesystem Boundary
  description: Boundary between the application and the local filesystem. No path canonicalization or traversal prevention
    on FileReadController. Container runs as root with chmod -R 777 /app, so filesystem access is unrestricted.
  from: spring-boot-app
  to: file-storage
  crossing_data: File paths, file content
  enforcement_mechanism: None (no path validation)
  known_weaknesses:
  - FileReadController appends user input directly to base path
  - Container runs as root
  - World-writable /app directory
- id: tb-5
  name: Application / External Network Boundary
  description: Boundary between the application and external network resources reached via SSRF. IntegrationController uses
    RestTemplate.getForObject() with a user-supplied URL, allowing unrestricted outbound requests to internal or external
    hosts.
  from: spring-boot-app
  to: external
  crossing_data: HTTP requests to arbitrary URLs
  enforcement_mechanism: None (no URL validation or allowlist)
  known_weaknesses:
  - No URL validation on /api/integration/fetch
  - No network-level egress restrictions observable from source
- id: tb-6
  name: Container Build / Supply Chain Boundary
  description: Boundary between the build-time environment and the container runtime. Remote script execution (curl | bash)
    during build allows supply chain compromise. Secrets baked into image layers as ENV variables cross this boundary at build
    time.
  from: external
  to: spring-boot-app
  crossing_data: Container image layers, environment variables, installed packages
  enforcement_mechanism: None (no digest pinning, no COPY checksum, no secret injection at runtime)
  known_weaknesses:
  - openjdk:17-slim not digest-pinned
  - Remote curl | bash during build
  - Secrets in ENV instructions
