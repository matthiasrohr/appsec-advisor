  impact: Critical
  risk: Critical
  controls_in_place: None. The endpoint is public and the passwords are stored and returned in cleartext.
  mitigation_title: Remove the /api/legacy-sqlite/users endpoint and migrate SQLite passwords to bcrypt
  remediation:
    effort: Medium
    steps:
    - Delete or gate GET /api/legacy-sqlite/users behind an admin-only role — never expose raw user records including credentials
      to unauthenticated callers.
    - Migrate LegacySqliteUserStore to hash passwords with BCrypt (Spring Security's BCryptPasswordEncoder) instead of storing
      plaintext. Update authenticate() to use BCrypt.checkpw().
    - Remove the password field from LegacyUserResponse and from any API response shape — password material (even hashed)
      must never be returned in an API response.
    - If the admin metadata endpoint GET /api/legacy-sqlite/metadata (returns database file path) is retained, gate it behind
      authentication to prevent filesystem reconnaissance.
