  title: Missing Authentication for Critical Function
  affected_parameter: null
  scenario: '`SecurityConfig.java:41` adds `/legacy/admin` and `/legacy/admin/**` to `permitAll()`, removing all authentication
    requirements from the legacy admin board. `LegacyAdminBoardController.java:23` maps `GET /legacy/admin` which lists all
    user accounts. `POST /legacy/admin/users/{id}/promote` at line 29 sets `admin=true` and `role=''ADMIN''` on any user and
    persists the change. An anonymous attacker can enumerate all accounts by visiting the board, then promote any user (including
    a newly registered one or themselves after logging in) to admin status. The promote action requires no CSRF token because
    `SecurityConfig.java:28` disables CSRF globally (`AbstractHttpConfigurer::disable`). The attack path is: `GET /legacy/admin`
    → pick a user ID → `POST /legacy/admin/users/{id}/promote` — no credentials required.'
  evidence_summary: '`SecurityConfig.java:41` registers `/legacy/admin/**` under `permitAll()`, and `LegacyAdminBoardController.java:29-34`
    implements the promote action that persists `admin=true, role=ADMIN` for any user ID, with no authentication or CSRF check
    in scope.'
  impact_description: Anonymous attacker obtains admin authority over the entire application by promoting any user account,
    bypassing all authentication controls including the `@PreAuthorize` annotations protecting other admin endpoints.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. Authentication is explicitly disabled for this path in SecurityConfig.
  actor_ids:
  - ACT-D-01
  - ACT-D-02
  - ACT-D-05
  primary_actor: ACT-D-05
