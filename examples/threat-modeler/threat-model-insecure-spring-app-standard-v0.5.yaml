- local_id: auth-service-009
  threat_category_id: TH-02
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-307
  title: No Rate Limiting on Auth Endpoints Enables Credential Stuffing
  affected_parameter: username, password
  scenario: SecurityConfig configures no rate-limiting middleware anywhere in the filter chain. POST /login, POST /register,
    POST /api/legacy-sqlite/login, and GET /api/legacy-sqlite/login-raw are all reachable without authentication and without
    any per-IP or per-account request throttle. An anonymous internet attacker (ACT-D-01) can run a credential-stuffing campaign
    against POST /login using breach-derived password lists at the maximum throughput the server allows. The BCrypt path slows
    individual verifications but does not prevent parallelised attempts. The SQLite login-raw path (which uses plaintext comparison)
    can be hammered at far higher throughput. Additionally, the /register endpoint with no rate limit allows a mass account-creation
    attack that fills the user store, delaying legitimate registrations and saturating the In-Memory user detail store.
  evidence_summary: SecurityConfig.java configures no rate-limit filter before the authentication endpoints; grep for rateLimit|RateLimiter|throttle|Bucket4j
    across src/main/java/ returns zero hits.
  impact_description: Credential stuffing at scale against all login paths; account enumeration via timing differences; potential
    DoS on registration by bulk account creation.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. BCrypt's computational cost provides minor per-attempt friction only.
  mitigation_title: Add per-IP and per-account rate limiting on all authentication endpoints using Bucket4j or spring-cloud-gateway
  remediation:
    effort: Medium
    steps:
    - Add Bucket4j (io.github.bucket4j:bucket4j-core) to the Spring Security filter chain as a servlet filter that limits
      POST /login and POST /register to 5 requests per minute per source IP.
    - Implement progressive delay (exponential backoff) after 3 failed login attempts for a given username using a short-lived
      in-memory or Redis counter.
    - Configure Spring Boot Actuator metrics for auth_failure_total and alert when it exceeds threshold in a sliding 60-second
      window.
    - For the SQLite legacy paths (/api/legacy-sqlite/login and /api/legacy-sqlite/login-raw), apply the same rate-limit filter
      or remove the endpoints from production.
    code_example: "// Bucket4j filter example (in SecurityConfig, applied before UsernamePasswordAuthenticationFilter):\n\
      Bucket bucket = Bucket.builder()\n    .addLimit(Bandwidth.classic(5, Refill.intervally(5, Duration.ofMinutes(1))))\n\
      \    .build();\n// Apply per IP in a OncePerRequestFilter that checks the bucket before passing to the chain."
    verification: Submit 10 consecutive POST /login requests from the same IP within 60 seconds — requests 6–10 must receive
      HTTP 429 Too Many Requests.
