  effectiveness: Missing
  evidence_files:
  - src/main/java/com/example/appsecverificationtarget/config/SecurityConfig.java
  notes: CSRF protection globally disabled via csrf(AbstractHttpConfigurer::disable) in SecurityConfig. All state-changing
