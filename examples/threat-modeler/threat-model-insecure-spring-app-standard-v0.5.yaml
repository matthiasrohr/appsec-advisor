  cwe: CWE-942
  title: Permissive CORS Origin Reflection (CorsPolicyFilter.java:32)
  affected_parameter: Origin
  scenario: 'An attacker hosts a malicious page at http://evil.example.com and tricks a victim who holds an active application
    session into visiting it. The attacker''s JavaScript sends credentialed cross-origin requests (XMLHttpRequest with withCredentials:
    true) targeting the application API. Because CorsPolicyFilter.isTrustedOrigin() at line 32 accepts any string beginning
    with ''http'', the application echoes the attacker''s Origin back in Access-Control-Allow-Origin and also emits Access-Control-Allow-Credentials:
    true. The browser therefore exposes the full authenticated response body to the attacker''s script, which can then relay
    session data, order records, or any endpoint the victim can reach.'
  evidence_summary: CorsPolicyFilter.isTrustedOrigin() at line 32 returns true for any non-null String prefixed with 'http',
    making all HTTP and HTTPS origins trusted without any allowlist.
  impact_description: Any attacker-controlled HTTP/HTTPS origin can read credentialed API responses from a victim's active
    browser session, exposing all data the victim is authorised to access.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 'Vary: Origin header is emitted. X-Frame-Options: sameOrigin limits framing. No origin allowlist is enforced.'
  mitigation_title: Replace substring match in CorsPolicyFilter with an explicit origin allowlist
  remediation:
    effort: Low
    steps:
    - Define an explicit Set<String> of permitted origins loaded from application properties (e.g. app.cors.allowed-origins)
      — one entry per environment (dev, staging, prod).
    - Replace the isTrustedOrigin body with a strict Set.contains() check and return false for all other strings.
    - 'Add an integration test that sends Origin: http://evil.example.com and asserts the response does not contain Access-Control-Allow-Origin.'
    code_example: "// Before (CorsPolicyFilter.java:32): any HTTP origin is trusted\nprivate boolean isTrustedOrigin(String\
      \ origin) {\n    return origin != null && origin.startsWith(\"http\");\n}\n\n// After: explicit allowlist from config\n\
      private static final Set<String> ALLOWED_ORIGINS = Set.of(\n    \"https://app.example.com\",\n    \"https://admin.example.com\"\
      \n);\n\nprivate boolean isTrustedOrigin(String origin) {\n    return origin != null && ALLOWED_ORIGINS.contains(origin);\n\
      }"
    verification: 'Send OPTIONS /api/orders/search with Origin: http://evil.example.com; confirm the response body lacks Access-Control-Allow-Origin:
      http://evil.example.com and lacks Access-Control-Allow-Credentials: true.'
    reference: CWE-942
