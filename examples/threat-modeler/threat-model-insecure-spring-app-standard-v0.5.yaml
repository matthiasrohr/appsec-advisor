      present in SecurityConfig.java) and annotating service/DAO methods appropriately.
    code_example: "// Before (unsafe — string concatenation)\nString sql = \"select o.* from customer_orders o join app_users\
      \ u on o.owner_id = u.id where u.email = '\" + email + \"' order by o.id\";\nreturn entityManager.createNativeQuery(sql,\
      \ CustomerOrder.class).getResultList();\n\n// After (safe — named parameter)\nString sql = \"select o.* from customer_orders\
      \ o join app_users u on o.owner_id = u.id where u.email = :email order by o.id\";\nreturn entityManager.createNativeQuery(sql,\
      \ CustomerOrder.class)\n    .setParameter(\"email\", email)\n    .getResultList();"
