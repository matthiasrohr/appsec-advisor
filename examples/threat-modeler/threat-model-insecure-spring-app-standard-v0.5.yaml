    scenario: An attacker floods `GET /api/crypto/export-token?value=<large_input>` with a high request rate. Each call to
      `LegacyCryptoService.encryptExportValue()` allocates a JVM Cipher instance and performs AES block operations. Since
      the endpoints are entirely unauthenticated (SecurityConfig.java:45-46 — permitAll) and carry no rate limit or payload
