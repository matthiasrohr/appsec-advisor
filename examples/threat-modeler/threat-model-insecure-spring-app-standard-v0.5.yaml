- local_id: spring-boot-app-007
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-611
  title: XML External Entity Injection (XmlPreviewController.java:22)
  affected_parameter: request body (XML)
  scenario: 'An attacker posts a crafted XML document to POST /api/xml/preview that declares a DOCTYPE with an external entity:
    <!DOCTYPE x [<!ENTITY xxe SYSTEM ''file:///etc/passwd''>]><root>&xxe;</root>. XmlPreviewController.preview() at line 22
    creates a DocumentBuilderFactory with its default configuration, which leaves external entity processing enabled. The
    parser resolves the file:/// entity, embeds the file content in the document tree, and the attacker can extract it through
    subsequent XML references or error messages. The attacker can also declare an http:// entity to pivot SSRF through the
    parser, or submit a billion-laughs entity expansion to exhaust JVM heap.'
  evidence_summary: XmlPreviewController.preview() at line 22 calls DocumentBuilderFactory.newInstance() without disabling
    FEATURE_SECURE_PROCESSING, setFeature for external entities, or setExpandEntityReferences(false), leaving the parser in
    its default XXE-permissive state.
  impact_description: An unauthenticated attacker can read arbitrary local files via file:// entities, probe internal services
    via http:// entities (chained SSRF), or crash the JVM through entity-expansion bombs.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. The endpoint is publicly accessible and the XML parser is not hardened.
  mitigation_title: Harden DocumentBuilderFactory in XmlPreviewController to disable external entity processing
  remediation:
    effort: Low
    steps:
    - On the DocumentBuilderFactory instance, call setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true), setFeature("http://apache.org/xml/features/disallow-doctype-decl",
      true), and setExpandEntityReferences(false) before calling newDocumentBuilder().
    - Set factory.setXIncludeAware(false) and factory.setNamespaceAware(true) as additional hardening.
    - Add a maximum document size check (e.g. limit the request body to 64 KB via Spring's spring.servlet.multipart.max-request-size
      or a custom HandlerInterceptor) to prevent billion-laughs amplification.
    code_example: '// Before (XmlPreviewController.java:22): default factory — XXE enabled

      DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();

      DocumentBuilder builder = factory.newDocumentBuilder();


      // After: XXE hardened

      DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();

      factory.setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true);

      factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);

      factory.setExpandEntityReferences(false);

      factory.setXIncludeAware(false);

      DocumentBuilder builder = factory.newDocumentBuilder();'
    verification: POST /api/xml/preview with body <!DOCTYPE x [<!ENTITY e SYSTEM 'file:///etc/passwd'>]><root>&e;</root>;
      the server must return HTTP 400 or parse an empty root element — it must not embed the content of /etc/passwd in the
      response.
    reference: CWE-611
