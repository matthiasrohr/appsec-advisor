  scenario: Any authenticated user can read any other user's order by supplying an arbitrary `id` path variable in `GET /api/orders/{id}`.
    `OrderAccessController.java:24` calls `customerOrderRepository.findById(id)` and returns the result with no ownership
    verification. The endpoint `GET /api/orders/{id}/owned` at line 32 of the same controller performs the correct admin-or-owner
    check, but the unguarded path at line 24 is also registered and takes precedence for direct `/api/orders/{id}` requests.
    An attacker iterates numeric IDs (1, 2, 3 …) to harvest all orders without restriction.
  evidence_summary: The `@GetMapping("/{id}")` handler at OrderAccessController.java:24 carries no `Authentication` parameter
    and issues a bare `findById(id)` with no caller-identity constraint, while the sibling `@GetMapping("/{id}/owned")` at
    line 32 shows what the correct check looks like.
  impact_description: Full read access to every other user's order records, including order contents and metadata that should
    be visible only to the order owner or an administrator.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The sibling endpoint `GET /api/orders/{id}/owned` enforces ownership; `anyRequest().authenticated()`
    in SecurityConfig requires a valid session.
  actor_ids:
  - ACT-D-02
  - ACT-D-05
  primary_actor: ACT-D-02
  mitigation_title: Add ownership check to GET /api/orders/{id} handler or remove the unguarded path
  remediation:
    effort: Low
    steps:
    - Remove the unprotected `@GetMapping("/{id}")` handler from OrderAccessController and route all order lookups through
      the `/api/orders/{id}/owned` path which already enforces admin-or-owner checks.
    - If a separate unauthenticated path is needed (e.g. for order-status checks), introduce a limited projection DTO that
      omits PII and restrict it with a dedicated URL pattern.
    - Add a Spring Security method-level annotation `@PreAuthorize("@authz.isOrderOwner(#id) or hasRole('ADMIN')")` on the
      handler if the path must remain, mirroring the inline check at `getOwned()`.
    - Add integration tests asserting that `GET /api/orders/{id}` with a session belonging to a different user returns HTTP
      403.
    code_example: "// Before — no ownership check:\n@GetMapping(\"/{id}\")\npublic ResponseEntity<OrderSummary> get(@PathVariable\
      \ Long id) {\n    return customerOrderRepository.findById(id)\n            .map(OrderSummary::from).map(ResponseEntity::ok)\n\
      \            .orElseGet(() -> ResponseEntity.notFound().build());\n}\n\n// After — enforce owner-or-admin before returning:\n\
      @GetMapping(\"/{id}\")\n@PreAuthorize(\"@authz.isOrderOwner(#id) or hasRole('ADMIN')\")\npublic ResponseEntity<OrderSummary>\
      \ get(@PathVariable Long id) {\n    return customerOrderRepository.findById(id)\n            .map(OrderSummary::from).map(ResponseEntity::ok)\n\
      \            .orElseGet(() -> ResponseEntity.notFound().build());\n}"
    verification: Authenticate as user A, create order O1. Authenticate as user B and issue `GET /api/orders/O1`. Expect HTTP
      403. Authenticate as ADMIN and issue the same request; expect HTTP 200.
