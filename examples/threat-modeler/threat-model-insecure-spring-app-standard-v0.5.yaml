  - src/main/java/com/example/appsecverificationtarget/crypto/HomegrownCipher.java
  - src/main/java/com/example/appsecverificationtarget/crypto/LegacyCryptoService.java
  notes: 'Multiple intentionally weak algorithms: MD5 for password hashing, java.util.Random for OTP (not CSPRNG), AES/ECB
    without IV, XOR repeating-key cipher with hardcoded key. BCrypt used correctly in main user password path.'
