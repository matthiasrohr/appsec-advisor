- entry_point: Dockerfile ENV (hardcoded secrets in image layers)
  protocol: Container build
  notes: DB_PASSWORD, JWT_SIGNING_KEY, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY baked into container image as ENV instructions.
    Visible to anyone with image pull access.
  linked_threats: []
  auth_required: false
- entry_point: GET /actuator/** (Spring Actuator — all endpoints)
  protocol: HTTP
  notes: All Spring Actuator endpoints publicly exposed without authentication. /actuator/env exposes environment variables
    including secrets. /actuator/heapdump allows JVM memory extraction.
  linked_threats: []
  auth_required: false
- entry_point: GET /api/integration/fetch?url= (SSRF)
  protocol: HTTP
  notes: Server-Side Request Forgery via RestTemplate.getForObject() with user-supplied URL parameter. No URL validation or
    allowlist. Allows reaching internal services.
  linked_threats: []
  auth_required: false
- entry_point: GET /api/files/read?name= (path traversal)
  protocol: HTTP
  notes: Path traversal via unsanitized filename parameter appended to base directory. Allows reading arbitrary server-side
    files including /etc/passwd.
  linked_threats: []
  auth_required: false
- entry_point: GET /api/tools/lookup?name= (command injection)
  protocol: HTTP
  notes: OS command injection via Runtime.getRuntime().exec() with user-supplied tool name parameter. Allows arbitrary OS
    command execution.
  linked_threats: []
  auth_required: false
- entry_point: GET /h2-console/** (H2 database console)
  protocol: HTTP
  notes: H2 in-memory database web console publicly accessible. Allows direct SQL execution against the application database.
  linked_threats: []
  auth_required: false
