  mitigation_title: Add structured security-event logging to all authorization decision points in access control controllers
  remediation:
    effort: Medium
    steps:
    - Create a `SecurityEventLogger` Spring component that writes structured JSON log entries (actor username, action, resource
      type, resource id, outcome, timestamp) to a dedicated security log appender.
