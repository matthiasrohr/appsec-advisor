  title: Mass Assignment Privilege Escalation (ProfileController.java:44)
  affected_parameter: role
  scenario: '`PUT /api/profile/me` at `ProfileController.java:35` binds `@RequestBody AppUser incoming` directly to the JPA
    entity class `AppUser`. Lines 44-47 explicitly copy `incoming.getRole()` (line 44) and `incoming.isAdmin()` (line 47)
    onto the managed entity before saving it. Any authenticated user can send `{"role": "ADMIN", "admin": true}` in the request
    body and immediately obtain full administrative privileges with no additional authorization check. Line 41 also allows
    overwriting `passwordHash` directly with an arbitrary bcrypt hash, bypassing any password validation. Both the `role`
    field (String) and the `admin` boolean are declared directly on the `AppUser` JPA entity with no `@JsonIgnore` or separate
    DTO to exclude them from binding.'
  evidence_summary: '`ProfileController.java:44` explicitly checks `if (incoming.getRole() != null)` and calls `current.setRole(incoming.getRole())`,
    and line 47 unconditionally calls `current.setAdmin(incoming.isAdmin())`, with `AppUser` having no `@JsonIgnore` on these
    fields.'
  impact_description: Any authenticated user can grant themselves the ADMIN role and full admin privileges, taking over the
    entire application including all other user data and admin-only operations.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Endpoint requires authentication via `anyRequest().authenticated()`. No field-level protection exists.
  actor_ids:
  - ACT-D-02
  - ACT-D-05
  primary_actor: ACT-D-02
  mitigation_title: Replace direct JPA entity binding in PUT /api/profile/me with a restricted DTO that excludes role and
    admin fields
  remediation:
    effort: Low
    steps:
    - Introduce a `ProfileUpdateRequest` record/DTO containing only the fields a user may change (e.g. `email` and `newPassword`),
      and replace `@RequestBody AppUser incoming` with `@RequestBody ProfileUpdateRequest incoming`.
    - Remove the `setRole` and `setAdmin` copy blocks (lines 44-47) from the update handler entirely. Role changes must only
      be performed by admin endpoints with ADMIN role enforcement.
    - If password change is supported, validate strength, require current-password confirmation, and hash in the service layer
      — never accept a raw `passwordHash` from the client.
    - Add `@JsonIgnore` on `AppUser.role`, `AppUser.admin`, and `AppUser.passwordHash` as a defence-in-depth measure against
      future direct-binding paths.
    code_example: "// Before (unsafe direct entity binding):\n@PutMapping(\"/me\")\npublic ResponseEntity<ProfileResponse>\
      \ update(Authentication auth,\n                                              @RequestBody AppUser incoming) {\n    //\
      \ ... copies role, admin, passwordHash from incoming ...\n}\n\n// After — restricted DTO, no privilege fields:\npublic\
      \ record ProfileUpdateRequest(String email) {}\n\n@PutMapping(\"/me\")\npublic ResponseEntity<ProfileResponse> update(Authentication\
      \ auth,\n                                              @RequestBody ProfileUpdateRequest req) {\n    return appUserRepository.findByUsername(auth.getName())\n\
      \            .map(current -> {\n                if (req.email() != null) current.setEmail(req.email());\n          \
      \      // role and admin are never touched here\n                return ResponseEntity.ok(ProfileResponse.from(appUserRepository.save(current)));\n\
      \            })\n            .orElseGet(() -> ResponseEntity.notFound().build());\n}"
