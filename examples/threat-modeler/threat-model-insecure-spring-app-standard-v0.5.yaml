  title: Base64 Session Token Forgeable for Any User (HomegrownSessionService.java:21)
  affected_parameter: token (query param)
  scenario: HomegrownSessionService.issueToken() encodes a Long userId as Base64(userId.toString()). HomegrownSessionService.resolve()
    decodes the token, parses the result as a Long, and performs a database lookup — no HMAC, no signature, no nonce. Because
    Base64 is reversible by design, any attacker who knows or guesses a valid user ID can compute Base64.getEncoder().encodeToString("1".getBytes())
    and pass it to GET /api/legacy-session/orders?token=<forged> or GET /api/auth/legacy-session?token=<forged> to retrieve
    any user's orders and session data. User IDs are sequential integers starting at 1, making full enumeration trivial.
  evidence_summary: HomegrownSessionService.java:21 encodes userId as plain Base64 with no HMAC tag; the resolve() method
    at line 24 decodes and trusts it unconditionally.
  impact_description: Complete horizontal account takeover — any authenticated or unauthenticated caller can access any user's
    session and order history by enumerating integer user IDs.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. The token contains no cryptographic material.
  mitigation_title: Replace Base64 session token with a cryptographically random opaque token stored server-side
  remediation:
    effort: Medium
