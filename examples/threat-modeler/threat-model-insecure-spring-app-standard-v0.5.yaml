  mitigation_fingerprints:
  - adopt centralized secrets management to eliminate all hardcoded credentials
  - enforce spring security default-deny authentication policy across all endpoints
  - replace parseclaimsjwt with parseclaimsjws and enforce a signed-token allowlist in legacyadminauditcontroller
  - replace xor token issuance with hmac-sha256 or jwt rs256 signed with a rotatable secret
  - replace string-concatenated sql in authenticateraw with a preparedstatement
  - replace string-concatenated native queries with parameterized queries in orderlookupdao
  - eliminate shell interpolation in toolcontroller by passing arguments as discrete array elements
  - remove the /api/legacy-sqlite/users endpoint and migrate sqlite passwords to bcrypt
  - remove the plaintext password recovery from the api response and restrict /credentials to authenticated administrators
  - canonicalize and jail the resolved path inside runtime/documents/ before reading
  - restrict actuator endpoints to internal network and require authentication; disable show-values in production
  - remove hardcoded secrets from dockerfile and inject at runtime from a secrets manager
  - replace direct jpa entity binding in put /api/profile/me with a restricted dto that excludes role and admin fields
  - remove permitall for /api/crypto/** and /api/legacy-crypto/** and require authentication or restrict to admin role
  - disable h2 console in production and restrict it to localhost in development
  - disable the h2 console in production and remove its permitall securityconfig rule
  - replace base64 session token with a cryptographically random opaque token stored server-side
  - replace substring match in corspolicyfilter with an explicit origin allowlist
  - re-enable spring security csrf and configure samesite=strict on session cookies
  - use an authenticated cipher from a vetted library; never a hand-rolled xor.
  - replace java.util.random with java.security.securerandom in legacytokenservice
  - sanitize the upload filename and verify the resolved write path stays within the upload directory
  - remove world-writable permissions and run the jvm as a non-root user in the container
  - harden documentbuilderfactory in xmlpreviewcontroller to disable external entity processing
  - validate and allowlist target urls before issuing http requests in integrationcontroller
  - add structured security-event logging to all authorization decision points in access control controllers
  - restrict get /api/admin/report to role_admin with @preauthorize and remove the permitall rule
  - remove credentialloggingfilter entirely; if login tracing is needed, log only the username and outcome, never the password
  - remove the md5 hash from appuser storage; rely solely on spring security's bcrypt credential store
  - pin base image to @sha256:<digest>
  - move all symmetric keys to a secrets manager and inject via environment variables or @value properties
  - replace md5 with bcrypt in legacypasswordservice.hashforaudit and remove the public hashing endpoint
  - hash all passwords with bcrypt before storing them in the sqlite legacy_users table
  - remove the password field from the legacysqliteuser api response and require authentication on the /api/legacy-sqlite/users
    endpoint
  - exclude runtime/ credential stores from the docker build context and purge them from image layers
  - restrict post /legacy/admin/users/{id}/delete to role_admin or remove the legacy admin board entirely
  - add per-ip and per-account rate limiting on all authentication endpoints using bucket4j or spring-cloud-gateway
  - add a file size guard and rate limiting to the /api/files/read endpoint
  - add ownership check to get /api/orders/{id} handler or remove the unguarded path
  - enforce an extension and mime-type allowlist in businessfilestorage before writing uploads to disk
  - require authentication and enforce owner-only access on get /api/orders/search
  - restrict /api/admin/report to users with role_admin and require authentication
  - replace aes/ecb with aes/gcm and generate a random iv per encryption
  - add user <non-root-uid>
  - remove storagename and classification from the public-feed documentsummary response
  - pin accepted jwt verification algorithms
