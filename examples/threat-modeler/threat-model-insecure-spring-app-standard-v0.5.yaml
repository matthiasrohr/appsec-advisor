- local_id: file-storage-002
  threat_category_id: TH-06
  additional_categories: []
  stride: Tampering
  cwe: CWE-22
  title: Path Traversal Write via Unsanitized Upload Filename
  affected_parameter: file (multipart filename)
  scenario: 'BusinessFileStorage.store() at line 17 takes the upload filename directly from file.getOriginalFilename() without
    sanitization. At line 23, it resolves the target path via directory.resolve(fileName), where directory is under runtime/uploads/<area>/<recordId>/.
    Java''s Path.resolve() does not strip traversal sequences: a filename of ../../../../app/target/appsec-verification-target-0.0.1-SNAPSHOT.jar
    resolves (from /app/runtime/uploads/documents/1/) to /app/target/appsec-verification-target-0.0.1-SNAPSHOT.jar, overwriting
    the application JAR. Because the process runs as root, traversal can reach any file on the filesystem. An authenticated
    attacker can trigger this via POST /documents or POST /orders/{id} with a crafted multipart filename.'
  evidence_summary: BusinessFileStorage.java:23 calls directory.resolve(fileName) where fileName is the raw getOriginalFilename()
    result (line 17), with no normalize() call and no startsWith(directory) containment check before file.transferTo(target)
    at line 24.
  impact_description: An authenticated attacker can overwrite application binaries, configuration files, or credential stores,
    enabling persistent code modification or denial of service.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no filename sanitization, no path containment check.
  mitigation_title: Sanitize the upload filename and verify the resolved write path stays within the upload directory
  remediation:
    effort: Low
    steps:
    - 'Strip all path components from the filename: String safeName = Path.of(fileName).getFileName().toString();'
    - 'After resolving the target path, verify containment: Path target = directory.resolve(safeName).normalize(); if (!target.startsWith(directory.toAbsolutePath().normalize()))
      throw new IOException("Invalid filename");'
    - Additionally reject filenames with null bytes, overly long names (> 255 chars), and dangerous extensions (see TH-07
      remediation for extension allowlist).
    - Consider generating a UUID-based server-side filename and storing the original name only in the database record.
    code_example: '// Before (BusinessFileStorage.java:17,23):

      String fileName = file.getOriginalFilename();

      ...

      Path target = directory.resolve(fileName);


      // After:

      String rawName = file.getOriginalFilename();

      String fileName = (rawName != null) ? Path.of(rawName).getFileName().toString() : "upload.bin";

      Path base = directory.toAbsolutePath().normalize();

