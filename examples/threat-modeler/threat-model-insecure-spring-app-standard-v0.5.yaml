  stride: Elevation of Privilege
  cwe: CWE-862
  title: Unauthenticated cross-user order lookup via arbitrary email
  affected_parameter: email
  scenario: 'GET /api/orders/search?email= accepts any email address and returns that user''s orders without requiring the
    caller to be authenticated as the owner of that email address. SecurityConfig.java line 35 permits this endpoint to all
    callers. Any unauthenticated attacker who knows or enumerates a target user''s email (a low bar given that email is the
    search key exposed on the same endpoint) can retrieve all orders for that user, including customerComment, attachmentName,
    totalAmount, and region fields. Even without SQL injection, this constitutes a broken object-level authorization (BOLA/IDOR)
    defect: the email parameter functions as an unsecured identity selector.'
  evidence_summary: OrderSearchController.java:24 calls orderLookupDao.findByOwnerEmail(email) with the raw request parameter,
    with no authentication guard and no ownership check against the authenticated principal.
  impact_description: Any unauthenticated caller can read all orders for any registered user by supplying their email address.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. The clean.* controller (CleanProjectController) uses @PreAuthorize("hasRole('USER')") and Authentication
    injection as a reference pattern, but OrderSearchController applies no equivalent guard.
  mitigation_title: Require authentication and enforce owner-only access on GET /api/orders/search
  remediation:
    effort: Low
    steps:
    - Change the SecurityConfig entry from .requestMatchers(HttpMethod.GET, "/api/orders/search").permitAll() to .requestMatchers(HttpMethod.GET,
      "/api/orders/search").authenticated() so that callers must be logged in.
    - Add @PreAuthorize("hasRole('USER')") on OrderSearchController.search() and inject Authentication to obtain the caller's
      identity; replace the email request parameter with the caller's own email derived from authentication.getName() (matching
      the pattern in CleanProjectController.list()).
    - If cross-user lookup by admins is a required use case, add a separate admin-scoped endpoint with @PreAuthorize("hasRole('ADMIN')")
      rather than permitting unauthenticated access.
    code_example: "// Before — accepts any email, no auth required\n@GetMapping(\"/search\")\npublic List<OrderSummary> search(@RequestParam\
      \ String email) {\n    return orderLookupDao.findByOwnerEmail(email)...;\n}\n\n// After — derives email from authenticated\
      \ principal\n@GetMapping(\"/search\")\n@PreAuthorize(\"hasRole('USER')\")\npublic List<OrderSummary> search(Authentication\
      \ authentication) {\n    String email = resolveEmailFromPrincipal(authentication);\n    return orderLookupDao.findByOwnerEmail(email)...;\n\
      }"
