      check.
    - In ProfileController.update(), log role and admin field changes including the before/after values and the authenticated
      username.
    - In LegacyAdminBoardController, log every promote and delete action with the operator's remote IP and session identifier.
    - Route security events to an append-only sink (e.g. a separate log file with filesystem-level write protection, or a
      SIEM-forwarded channel) distinct from the application debug log.
    code_example: "// SecurityEventLogger.java (new component):\n@Component\npublic class SecurityEventLogger {\n    private\
      \ static final Logger SEC = LoggerFactory.getLogger(\"security\");\n\n    public void log(String actor, String action,\
      \ String resourceType,\n                    Object resourceId, String outcome) {\n        SEC.info(\"{{\\\"actor\\\"\
      :\\\"{}\\\",\\\"action\\\":\\\"{}\\\",\\\"resource\\\":\\\"{}/{}\\\",\\\"outcome\\\":\\\"{}\\\"}}\",\n             \
      \   actor, action, resourceType, resourceId, outcome);\n    }\n}\n\n// In OrderAccessController:\n// After fetching\
      \ order, before returning:\nsecurityEventLogger.log(auth.getName(), \"READ_ORDER\", \"Order\", id, \"GRANTED\");"
    verification: After each IDOR test call, grep the security log for an entry containing the actor's username, the resource
      ID, and the outcome. Confirm no entry exists today (baseline) and appears after instrumentation.
