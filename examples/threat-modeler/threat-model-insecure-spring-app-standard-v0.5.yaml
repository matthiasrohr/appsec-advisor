  stride: Information Disclosure
  cwe: CWE-200
  title: Unauthenticated public-feed exposes internal storageName and classification fie…
  affected_parameter: null
  scenario: GET /api/documents/public-feed is .permitAll() and returns DocumentSummary records for all documents with tag='public'.
    The DocumentSummary record (DocumentSearchController.java:48–56) includes storageName and classification fields. storageName
    is likely an internal storage key (e.g., an S3 object path, filesystem path, or internal identifier used to retrieve the
    file) and classification is an internal label applied by document owners. Exposing these fields to unauthenticated callers
    allows an attacker to enumerate internal storage paths for targeted object-storage attacks and understand the classification
    scheme used for internal documents, aiding further reconnaissance. Even if the tag='public' filter is not bypassed, the
    metadata fields go beyond what a truly public feed should expose.
  evidence_summary: DocumentSearchController.java:48-56 defines DocumentSummary to include storageName and classification,
    and these are returned by the unauthenticated /api/documents/public-feed endpoint at line 33.
  impact_description: Internal file storage paths and classification labels are disclosed to any unauthenticated internet
    client, enabling targeted storage enumeration and internal reconnaissance.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: The tag='public' filter limits the document rows returned to those explicitly tagged public, but does
    not limit which metadata fields are included in the response.
  mitigation_title: Remove storageName and classification from the public-feed DocumentSummary response
  remediation:
    effort: Low
    steps:
    - Define a separate PublicDocumentSummary DTO (or record) that excludes storageName and classification, exposing only
      id, title, and tag.
    - Update DocumentSearchController.publicFeed() to map through the new DTO instead of DocumentSummary.
    - If storageName must be accessible to authenticated callers, retain it in DocumentSummary but only use that DTO on authenticated
      endpoints.
    code_example: "// New minimal public DTO\npublic record PublicDocumentSummary(Long id, String title, String tag) {\n \
      \   public static PublicDocumentSummary from(DocumentRecord doc) {\n        return new PublicDocumentSummary(doc.getId(),\
      \ doc.getTitle(), doc.getTag());\n    }\n}\n\n// Updated endpoint\n@GetMapping(\"/public-feed\")\npublic List<PublicDocumentSummary>\
      \ publicFeed() {\n    return documentLookupDao.publicDocuments()\n        .stream().map(PublicDocumentSummary::from).toList();\n\
      }"
    verification: Call GET /api/documents/public-feed without authentication and confirm the JSON response does not contain
      storageName or classification fields.
    reference: CWE-200
