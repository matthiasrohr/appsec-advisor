  title: Plaintext Password Logged on Every Login (CredentialLoggingFilter.java:25)
  affected_parameter: password (form field)
  scenario: CredentialLoggingFilter.doFilterInternal() intercepts every POST /login request and logs the raw username and
    password via log.info("Processing sign-in for username={} password={}", username, password) at line 25. Slf4j writes this
    to the application log file or log aggregation system (e.g. ELK, Splunk) at INFO level. A malicious insider with read
    access to log infrastructure (ACT-D-05) can collect all user passwords from log history without touching the database.
    Any log exfiltration (via SSRF, misconfigured log shipper, or compromised monitoring host) exposes full credentials in
    plaintext. Users who reuse passwords across services are doubly impacted.
  evidence_summary: CredentialLoggingFilter.java:25 passes the password form parameter directly to log.info() as a positional
    argument alongside the username.
  impact_description: Every user's plaintext password is written to the application log on each login; log access is sufficient
    to credential-harvest all active accounts.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. The filter is a Spring @Component registered unconditionally.
  mitigation_title: Remove CredentialLoggingFilter entirely; if login tracing is needed, log only the username and outcome,
    never the password
  remediation:
    effort: Low
    steps:
