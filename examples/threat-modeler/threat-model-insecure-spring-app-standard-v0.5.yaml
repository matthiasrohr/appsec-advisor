  title: Missing Security Event Logging
  affected_parameter: null
  scenario: 'None of the access control controllers (OrderAccessController, UserAccessController, AdminReportController, ProfileController,
    DocumentDecisionController, LegacyAdminBoardController) write any security-relevant log entries. An attacker who exploits
    the IDOR paths, the mass assignment privilege escalation, or the unauthenticated legacy admin board leaves no forensic
    trail: no log of which orders or user profiles were accessed under which session, no record of role changes or admin promotions,
    and no record of admin report accesses. During a post-incident investigation, there is no evidence to reconstruct the
    scope or timeline of the breach. The `malicious-insider-ops` actor is particularly well-positioned to exploit this gap:
    they can issue IDOR reads and role modifications over months with no accountability record.'
  evidence_summary: A search across all six access-control controllers reveals no calls to any logger (`Logger`, `log.info`,
    `AuditLog`, `SecurityEvent`) on authorization-decision code paths; the controllers interact only with JPA repositories
    and Spring's `ResponseEntity`.
  impact_description: Inability to detect, scope, or attribute an active or historical breach involving IDOR exploitation
    or privilege escalation, violating the accountability principle required for incident response and compliance.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. Spring Security's default authentication logging does not cover authorization decisions or data
    access events.
  actor_ids:
