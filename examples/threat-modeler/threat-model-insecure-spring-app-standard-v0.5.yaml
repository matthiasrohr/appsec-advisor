  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-321
  title: Hardcoded Symmetric Encryption Keys
  affected_parameter: null
  scenario: 'Two symmetric keys are embedded as string literals in source code: `"orderdesk-legacy-key"` at HomegrownCipher.java:8
    and `"0123456789abcdef"` at LegacyCryptoService.java:13. Any developer, contractor, or attacker who obtains repository
    access (via source-code hosting breach, leaked credentials, or insider access) immediately possesses both keys. With the
    XOR key, they can decrypt every value protected by HomegrownCipher without touching the production API. With the AES key,
    they can decrypt every export token produced by LegacyCryptoService.encryptExportValue(). The keys cannot be rotated without
    a code change and redeployment, prolonging exposure windows after detection.'
  evidence_summary: HomegrownCipher.java:8 declares `private static final byte[] KEY = "orderdesk-legacy-key".getBytes(UTF_8)`
    and LegacyCryptoService.java:13 declares `private static final String EXPORT_KEY = "0123456789abcdef"`. Both keys are
    committed to version control.
  impact_description: Any party with repository read access can decrypt every protected credential and export value offline,
    without triggering any server-side log or rate limit.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — both keys are public constants in version-controlled source files.
  mitigation_title: Move all symmetric keys to a secrets manager and inject via environment variables or @Value properties
  remediation:
    effort: Medium
    steps:
    - Remove both key literals. Inject via `@Value("${crypto.xor.key}")` and `@Value("${crypto.export.key}")` into the respective
      Spring beans.
    - Store actual key values in AWS Secrets Manager, HashiCorp Vault, or Kubernetes Secrets — not in `application.properties`
      or `application.yml` committed to the repository.
    - Rotate both keys immediately after the source-control breach window closes. Plan for automated rotation every 90 days.
    - For the AES key, ensure the replacement key is at least 256 bits (32 bytes) generated from a CSPRNG, not a human-memorable
      ASCII string.
    code_example: "// Before — key literal in source\nprivate static final byte[] KEY = \"orderdesk-legacy-key\".getBytes(UTF_8);\n\
      \n// After — injected from environment / secrets manager\n@Value(\"${CRYPTO_XOR_KEY}\")\nprivate String xorKeyBase64;\n\
      \n@PostConstruct\nvoid init() {\n    this.key = Base64.getDecoder().decode(xorKeyBase64);\n    if (key.length < 32)\
      \ throw new IllegalStateException(\"XOR key too short\");\n}"
