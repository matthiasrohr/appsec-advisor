    endpoints accept arbitrary file types.
- domain: Output Encoding and Rendering Controls
  control: Server-Side Template Encoding
  effectiveness: Partial
  evidence_files:
  - src/main/resources/templates/
  notes: Thymeleaf server-side templates provide automatic HTML escaping for template variables by default. OutputPreviewController
    returns JSON with unencoded user input but this is not an HTML XSS vector in current configuration. No CSP header configured.
- domain: Browser and Cross-Origin Controls
