- local_id: realtime-channel-001
  threat_category_id: TH-13
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-306
  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:24
  affected_parameter: null
  scenario: The Socket.IO server at `registerWebsocketEvents.ts:20` configures an origin allowlist of `http://localhost:4200`, but this CORS check applies only to browser-initiated connections. Non-browser clients (curl, Python socket.io-client, Burp active-scan) skip the CORS preflight entirely and connect to `io.on('connection', ...)` at line 24 without any identity check. The server accepts the connection unconditionally — no JWT validation, no session cookie check, no handshake middleware. An attacker who connects anonymously immediately receives the full state of the `notifications` array replay (lines 30-32) and can emit any of the registered event handlers. The intended trust model — only authenticated users participate in real-time events — is violated at the transport level, before any application logic runs.
  evidence_summary: '`io.on(''connection'', ...)` at line 24 has no `io.use()` authentication middleware registered before it; any client that completes the TCP/WebSocket upgrade is treated as trusted.'
  impact_description: Unauthenticated clients gain full access to all WebSocket event handlers and receive live challenge-state broadcasts, allowing anonymus participants to interact with server state as if authenticated.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin restricted to `http://localhost:4200` (line 20), which prevents browser cross-origin connections but does not authenticate socket identities.
  mitigation_title: Add JWT authentication middleware to the Socket.IO server before accepting connections
  remediation:
    effort: Medium
    steps:
    - Add an `io.use()` middleware that reads the JWT from `socket.handshake.auth.token` or `socket.handshake.headers.authorization`, verifies it with the same `security.verify()` logic used by Express routes, and calls `next(new Error('Unauthorized'))` on failure.
    - In the `io.on('connection', ...)` handler, store the decoded user on `socket.data.user` so downstream event handlers can check ownership without re-reading the token.
    - 'Update the Angular frontend to pass the current auth token in the `socket.io-client` connect options: `io({ auth: { token: localStorage.getItem(''token'') } })`.'
    - Reject connections with a 401-equivalent socket error for unauthenticated sockets rather than emitting events to them.
    code_example: "// server-side middleware (registerWebsocketEvents.ts)\nio.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  if (!token) return next(new Error('Unauthorized'))\n  try {\n    socket.data.user = security.decode(token)\n    next()\n  } catch {\n    next(new Error('Unauthorized'))\n  }\n})"
    reference: CWE-306
  evidence:
  - file: lib/startup/registerWebsocketEvents.ts
    line: 24
  evidence_check: verified
