  stride: Tampering
  cwe: CWE-22
  title: Path Traversal — routes/fileUpload.ts:45
  affected_parameter: fileName (entry.path from ZIP archive)
  scenario: 'An attacker uploads a ZIP archive containing an entry with a path-traversal name such as ''../../ftp/legal.md''. At line 42, `absolutePath = path.resolve(''uploads/complaints/'' + fileName)` correctly resolves to `/repo/ftp/legal.md`. The guard at line 44 checks `absolutePath.includes(path.resolve(''.''))` — since the resolved CWD (e.g. ''/repo'') is a substring of ''/repo/ftp/legal.md'', this check passes (true). The write at line 45 then uses the unsanitized `fileName` directly: `fs.createWriteStream(''uploads/complaints/'' + fileName)`, which resolves to `uploads/complaints/../../ftp/legal.md` = `/repo/ftp/legal.md`. The application itself documents this as the `fileWriteChallenge` (line 43), confirming the traversal path is functional. An attacker can overwrite any file within the repository working directory that the process user has write permission to — including JavaScript source files, configuration, or the FTP served legal.md.'
  evidence_summary: The zip entry path is written verbatim at line 45 using `'uploads/complaints/' + fileName` after a guard that allows traversal within the CWD subtree (line 44 `includes(path.resolve('.'))` passes for any sub-path of cwd).
  impact_description: Attacker can overwrite arbitrary files within the application working directory, including source files and served static content, enabling persistent content injection or code execution on next process restart.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 'Partial guard: `absolutePath.includes(path.resolve(''.''))` prevents writes completely outside CWD. Challenge flag only active when `isChallengeEnabled(fileWriteChallenge)`.'
  mitigation_title: Sanitize zip entry paths to a safe subdirectory before writing
  remediation:
    effort: Low
    steps:
    - 'Replace the path guard with a strict prefix check: compute `const safePath = path.join(path.resolve(''uploads/complaints/''), path.basename(entry.path))` to strip all directory components from the entry name.'
    - Alternatively, validate that `absolutePath.startsWith(path.resolve('uploads/complaints/') + path.sep)` before writing — the current `includes()` check allows any CWD-rooted path.
    - 'Consider using a maintained library that handles zip-slip internally, such as `adm-zip` with the `allowParentTraversal: false` option (default), or `extract-zip`.'
    code_example: "// Safe extraction — strip directory components from entry path\nconst safeDir = path.resolve('uploads/complaints/')\nconst safeFile = path.join(safeDir, path.basename(entry.path))\nif (!safeFile.startsWith(safeDir + path.sep)) {\n  entry.autodrain()\n} else {\n  entry.pipe(fs.createWriteStream(safeFile))\n}"
    reference: CWE-22
  evidence:
  - file: routes/fileUpload.ts
    line: 45
