#### F-042 · Missing Authentication

**Severity:** 🟠 High  ·  **Component:** [C-08](#c-08) - Real-time WebSocket Channel  ·  **Location:** `lib/startup/registerWebsocketEvents.ts:30`

**Issue:** Any client - including an unauthenticated attacker - who opens a WebSocket connection to the Socket\.IO server receives the full current `notifications[]` array via repeated `socket.emit('challenge solved', notification)` calls at connect time. Each notification object contains a `flag` field generated by `utils.ctfFlag(challenge.name)`.

An attacker opens a raw WebSocket (or uses the Socket\.IO client library) without any credentials and immediately receives the CTF flags for every challenge that has been solved since server start. An attacker harvests all active CTF flag values without solving any challenges, undermining the integrity and competitive fairness of the platform.

**Evidence:** ✓ verified - `notifications.forEach((notification) => { socket.emit('challenge solved', notification) })` at line 30-32 runs for every connecting client before any identity check.

