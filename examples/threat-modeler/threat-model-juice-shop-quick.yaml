#### F-027 · Improper Authentication

**Severity:** 🟠 High  ·  **Component:** [C-06](#c-06) - Authentication & Session Surface  ·  **Location:** `lib/insecurity.ts:58`

**Issue:** `security.decode()` at `lib/insecurity.ts:58` calls `jws.decode(token)?.payload` - this decodes the Base64-encoded payload without verifying the HMAC or RSA signature. Multiple call sites use the pattern `security.verify(token) && security.decode(token)`.

The short-circuit evaluates correctly when `verify()` returns false, but `decode()` is always independently importable and is called in `routes/2fa.ts:26` in the same short-circuit pattern. Any code path that calls `decode()` without first calling `verify()` (or ignoring its return value) will trust attacker-controlled claims including user ID, role, and email.

**Root cause:** Authentication can be circumvented or forged because credentials, signing keys, or password hashes are weak, missing, or exposed.

**Evidence:** ✓ verified - `exports.decode = (token) => jws.decode(token)?.payload` at line 58 - no call to `jws.verify()` or `jwt.verify()` inside the function body.

```typescript
// lib/insecurity.ts:58
export const authorize = (user = {}) => jwt.sign(user, privateKey, { expiresIn: '6h', algorithm: 'RS256' })
export const verify = (token: string) => token ? (jws.verify as ((token: string, secret: string) => boolean))(token, publicKey) : false
export const decode = (token: string) => { return jws.decode(token)?.payload }

export const sanitizeHtml = (html: string) => sanitizeHtmlLib(html)
```

**Fix:** Strengthen authentication: enforce a vetted JWT verifier with explicit algorithm, MFA where appropriate → ❷ [M-048](#m-048) — Harden the authentication flow

**Classification:** Broken Authentication · [CWE-287](https://cwe.mitre.org/data/definitions/287.html) · [OWASP A07:2021](https://owasp.org/Top10/A07_2021/)

