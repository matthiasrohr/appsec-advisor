tier_root_causes:
  edge:
  - XSS via innerHTML and unsafe Angular bindings across multiple templates
  - localStorage used for credential and token storage
  - Missing Content-Security-Policy header allows script injection
  server:
  - Hardcoded RSA private key and cookie secret in source enables JWT forgery
  - Missing auth middleware on sensitive routes and management endpoints
  - Raw SQL string interpolation across search and login routes
  - No rate limiting on authentication or API endpoints
  - Unpinned supply chain dependencies across Docker and npm ecosystem
