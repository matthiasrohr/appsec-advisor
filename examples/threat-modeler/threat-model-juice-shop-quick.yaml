  title: Global Notification Broadcast to All Connecting — registerWebsocketEvents.ts:29
  affected_parameter: null
  scenario: '`notifications.forEach((notification: any) => { socket.emit(''challenge solved'', notification) })` at lines
    29–31 emits every pending challenge-completion notification to each newly connecting socket. The `notifications` array
    is global and accumulates entries for all users. A client connecting after other users have completed challenges receives
    all outstanding notifications, potentially including flags, challenge identifiers, or user-linked data for challenges
    completed by other players. In a multi-user deployment — even the intended demo environment — this leaks the challenge
    completion state of the entire server to each new connection.'
  evidence_summary: '`notifications.forEach(n => socket.emit(''challenge solved'', n))` at line 29 iterates the shared global
    array and sends every entry to the newly connected socket regardless of which user the notification belongs to.'
  impact_description: Any authenticated user who connects to the WebSocket service can enumerate the challenge-solve flags
    of all other users, aiding challenge spoofing and disclosing gamification state across trust boundaries.
  likelihood: High
  impact: Low
  risk: Medium
  controls_in_place: None — notifications array is global and unfiltered.
  mitigation_title: Filter challenge-completion notifications to the authenticated user's own entries before emitting
  remediation:
    effort: Low
    steps:
    - Tag each entry in `notifications` with the `userId` of the user who triggered the challenge solve.
