  mitigation_fingerprints:
  - migrate session token storage from localstorage to httponly secure samesite=strict cookies via a backend-for-frontend
  - enforce role authorization server-side on every admin api endpoint; treat client-side guards as ux-only in app.guard.ts
  - pin the jwt algorithm to rs256 in the verify call and switch to jsonwebtoken with an algorithms allowlist
  - replace derived-password oauth registration with server-side oauth-only account binding in oauth.component.ts
  - replace raw sql interpolation with sequelize orm parameterised where clause in routes/login.ts
  - replace raw sql string interpolation with sequelize parameterized query in searchproducts
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - remove bypasssecuritytrusthtml call for search query and render search term as text-only in search-result.component.ts
  - move rsa private key and hmac secret to environment variables or a secrets manager; rotate both immediately
  - replace md5 password hashing with bcrypt or argon2 and migrate existing hashes on next login
  - apply an allowlist filter before passing the body to any model, and strip privilege fields before persistence.
  - replace oauth implicit flow with authorization code flow and pkce in oauth.component.ts
  - emit structured security audit log entries on all authentication events in routes/login.ts, resetpassword.ts, and 2fa.ts
  - derive audit identity exclusively from the verified jwt payload in useremailfrom
  - enforce url allowlist or block private/loopback ip ranges before outbound fetch in profileimageurlupload
  - enforce server-side discount cap in generatecoupon tool and eliminate mongodb $where string concatenation in getproductreviews
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - commit package-lock.json; use `npm ci` in ci
  - remove hardcoded mnemonic from source and load it from an environment variable or secrets manager
  - apply express-rate-limit and account lockout middleware to the post /rest/user/login route
  - apply express-rate-limit to post /rest/user/login with per-ip and per-email throttling
  - apply express-rate-limit to all /rest/web3/ endpoints and cap set size
  - set maxhttpbuffersize and add per-connection event-rate limiting on the socket.io server
  - remove server-side eval of user-supplied orderlinesdata; replace with strict schema validation
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark
    the route intentionally public via app.get for read-only access only.
  - add security.isauthorized middleware to all /rest/web3/ route registrations
  - validate challenge-solve conditions server-side rather than trusting client-emitted payloads
  - require cryptographic proof-of-ownership for wallet address verification
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - 'add `permissions: { contents: read }` at root; per-job elevate to `contents: write` only where needed'
  - add npm ecosystem entry to .github/dependabot.yml
  - filter challenge-completion notifications to the authenticated user's own entries before emitting
