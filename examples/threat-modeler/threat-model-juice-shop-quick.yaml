  scenario: 'The `userEmailFrom()` function at lib/insecurity.ts:94 extracts the user identity for audit/logging purposes
    from the `X-User-Email` HTTP request header rather than from the verified JWT payload. Any HTTP client can set this header
    to an arbitrary value. An attacker who performs malicious actions (e.g., order manipulation, admin API calls) can set
    `X-User-Email: admin@juice-sh.op` so that any audit trail attributes the action to the administrator rather than the real
    actor. This effectively breaks non-repudiation for all security-relevant events that use this function for identity resolution.'
  evidence_summary: '`userEmailFrom()` returns `headers[''x-user-email'']` unconditionally at lib/insecurity.ts:94 — no cross-check
    against the JWT''s verified `data.email` field.'
  impact_description: An attacker can falsify audit log attribution, making malicious actions appear to originate from any
    user including administrators, preventing forensic attribution.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: JWT validation present for authenticated endpoints; morgan access logging in place
  mitigation_title: Derive audit identity exclusively from the verified JWT payload in userEmailFrom
  remediation:
    effort: Low
    steps:
    - 'Replace the `X-User-Email` header read in `userEmailFrom()` with extraction from the JWT: decode the `Authorization`
      bearer token and return `decoded?.data?.email`. The `X-User-Email` header must never be trusted as an identity source.'
    - Search the codebase for all callers of `userEmailFrom()` and confirm each now receives the cryptographically-verified
      identity.
