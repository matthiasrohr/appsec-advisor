<a id="m-039"></a>
#### M-039 — Store session tokens in HttpOnly, Secure cookies

**Addresses:**

- 🟠 [F-001](#f-001) — JWT Stored in localStorage SPA Without BFF Anti-Pattern (`oauth.component.ts:51`)

**Priority:** P3 - Next Quarter · **Effort:** High · **File:** `frontend/src/app/oauth/oauth.component.ts:51`

**How:** Implement a Backend-for-Frontend (BFF) endpoint (e.g. `/api/session/login`) that performs the OAuth token exchange server-side, sets the JWT in a `Set-Cookie: token=<jwt>; HttpOnly; Secure; SameSite=Strict` response header, and never returns the raw token to the browser JavaScript. Remove all `localStorage.setItem('token', ...)` calls from `oauth.component.ts` and the login component; replace token presence checks in guards with an authenticated session API call (`/rest/user/whoami`). Eliminate `bypassSecurityTrustHtml` usage throughout the SPA (see angular-spa-003/004/005) to close the XSS vectors that make `localStorage` token theft trivially exploitable.

1. Implement a Backend-for-Frontend (BFF) endpoint (e.g. `/api/session/login`) that performs the OAuth token exchange server-side, sets the JWT in a `Set-Cookie: token=<jwt>; HttpOnly; Secure; SameSite=Strict` response header, and never returns the raw token to the browser JavaScript.
2. Remove all `localStorage.setItem('token', ...)` calls from `oauth.component.ts` and the login component; replace token presence checks in guards with an authenticated session API call (`/rest/user/whoami`).
3. Eliminate `bypassSecurityTrustHtml` usage throughout the SPA (see angular-spa-003/004/005) to close the XSS vectors that make `localStorage` token theft trivially exploitable.

```typescript
// Move the JWT out of localStorage into an httpOnly cookie.
res.cookie('session', token, {
  httpOnly: true, secure: true, sameSite: 'lax', maxAge: 3600_000
})
```

**Verification:** Open browser DevTools, run `localStorage.getItem('token')` and confirm `null`.

