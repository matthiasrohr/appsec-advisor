  title: Deterministic Password Derived From Email Enables — oauth.component.ts:30
  affected_parameter: password
  scenario: When an OAuth login succeeds, `OAuthComponent.ngOnInit()` at line 30 computes `password = btoa(profile.email.split('').reverse().join(''))`.
    This derived password is then used to register the account (line 31) and to authenticate via the standard login endpoint
    at line 46. Because the derivation is deterministic — `base64(reverse(email))` — any attacker who knows a victim's email
    address can independently compute the same password and authenticate directly against `POST /api/Users/login` without
    touching OAuth at all. The OAuth flow becomes a decorative wrapper around a knowledge-based authentication bypass. Combined
    with the fact that email addresses are commonly enumerable (order confirmation emails, social profiles), this is effectively
    a universal credential-generation oracle.
  evidence_summary: '`oauth.component.ts:30` computes `const password = btoa(profile.email.split('''').reverse().join(''''))`,
    then passes it to `userService.login()` at line 46.'
  impact_description: Any attacker who knows a user's email can authenticate as that user via the standard login endpoint,
    achieving full account takeover without OAuth interaction.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derived password is used verbatim on the standard auth endpoint.
  mitigation_title: Replace derived-password OAuth registration with server-side OAuth-only account binding in oauth.component.ts
  remediation:
    effort: High
    steps:
    - Remove the `password = btoa(...)` derivation and the `userService.save()` call at `oauth.component.ts:30-35`. OAuth-authenticated
      users must not have a usable password credential on the standard login endpoint.
    - Implement a server-side endpoint (e.g. `POST /api/Users/oauth-link`) that accepts the OAuth access token, verifies it
