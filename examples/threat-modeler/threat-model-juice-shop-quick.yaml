  title: SQL Injection in Login Query — routes/login.ts:34
  affected_parameter: email
  scenario: The login handler at `routes/login.ts:34` constructs a SQL query using ES6 template literals with `req.body.email`
    and `security.hash(req.body.password)` directly interpolated. An attacker submits `email = \' OR 1=1 --` and any password,
    causing the query to return the first user (typically admin). The `hash()` function applies MD5 to the password, but since
    the email field is not hashed, the injection in email bypasses the password check entirely.
  evidence_summary: '`models.sequelize.query()` at login.ts:34 receives a raw string with `${req.body.email}` interpolated,
    with no parameterised binding — the ORM''s safe query path is bypassed.'
  impact_description: Authentication bypass enabling login as any user, including admin, without valid credentials; also enables
    blind data exfiltration via the same injection point.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the query uses direct string interpolation instead of parameterised queries.
  mitigation_title: Replace raw SQL interpolation with Sequelize ORM parameterised WHERE clause in routes/login.ts
  remediation:
    effort: Low
    steps:
    - 'Replace the raw `sequelize.query()` call at `routes/login.ts:34` with `UserModel.findOne({ where: { email: req.body.email,
      password: security.hash(req.body.password), deletedAt: null } })` using Sequelize''s parameterised ORM interface.'
    - Remove the import for `models.sequelize` in that file — use the model class directly so raw SQL is no longer possible
      for this path.
    - Add a server-side input validation step (e.g. `joi` or `zod` schema) asserting that `email` is a valid RFC 5321 email
      address before any query is issued.
