  cwe: CWE-778
  title: Missing Audit Log for B2B Order Execution — routes/b2bOrder.ts:16
  affected_parameter: null
  scenario: '`routes/b2bOrder.ts` processes `POST /b2b/v2/orders` with no structured logging of the authenticated caller (JWT `sub`/`email`), the `orderLinesData` payload, nor the outcome (success or exception). Because the JWT signing key is compromised and anyone can mint tokens with arbitrary `email` values, orders placed with forged identities leave zero forensic trace. An attacker can inject malicious order payloads, trigger the `safeEval` RCE path, and deny any involvement — there is no record of who sent what.'
  evidence_summary: No logging call appears anywhere in `routes/b2bOrder.ts` (lines 16–47); neither the try block (line 20) nor the catch handlers (lines 26–33) emit structured audit events.
  impact_description: Incident response cannot reconstruct which caller submitted a malicious order, what payload triggered a sandbox escape, or whether repeated exploitation occurred.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — no logging middleware or in-handler audit emission exists on this route.
  mitigation_title: Emit a structured audit log entry for every B2B order request including caller identity and payload hash
  remediation:
    effort: Low
    steps:
    - 'At the top of the `b2bOrder` handler, extract the authenticated JWT subject from `req.auth` (populated by `express-jwt`) and log: caller email/sub, request timestamp, SHA-256 of `orderLinesData`, and source IP.'
    - On exception (catch block), log the error class and any available stack digest alongside the same caller identity — do not log raw `orderLinesData` in exceptions (potential secret exfil in logs), only its hash.
    - Route audit events to a write-once sink (append-only table or a structured log collector like OpenTelemetry) separate from application debug logs.
    code_example: "// routes/b2bOrder.ts — minimal audit entry\nimport crypto from 'node:crypto'\nconst audit = (req: Request, outcome: string, err?: string) => {\n  console.log(JSON.stringify({\n    event: 'b2b_order', ts: new Date().toISOString(),\n    caller: (req as any).auth?.email ?? 'unknown',\n    ip: req.ip,\n    payloadHash: crypto.createHash('sha256').update(req.body.orderLinesData ?? '').digest('hex'),\n    outcome, err\n  }))\n}"
