  title: Remote Code Execution — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: The B2B order endpoint `POST /b2b/v2/orders` passes `req.body.orderLinesData` directly to `safeEval()` from `notevil@1.3.3`
    running inside a `vm.createContext()` sandbox at routes/b2bOrder.ts:22-23. The `notevil` library has documented prototype-pollution
    sandbox escapes — an attacker with a valid Bearer JWT can craft `orderLinesData` containing a prototype pollution payload
    that breaks out of the `safeEval` sandbox and executes arbitrary Node.js code in the application process context. This
    grants full server-side code execution with the privileges of the Node.js process (read/write filesystem, outbound network,
    OS command execution).
  evidence_summary: '`vm.runInContext(''safeEval(orderLinesData)'', sandbox, { timeout: 2000 })` at b2bOrder.ts:23 with `orderLinesData`
    sourced directly from `body.orderLinesData`; notevil@1.3.3 prototype-pollution escapes are documented in CVE advisories.'
