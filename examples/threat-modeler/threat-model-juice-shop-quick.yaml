    table through SQL injection (auth-002) or any DB compromise, an attacker can recover plaintext passwords for all accounts
    in minutes using precomputed rainbow tables or GPU cracking. Recovered credentials enable direct login, bypassing all
    session and 2FA controls if a user hasn't set up TOTP.
