  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:55
  affected_parameter: Authorization header / JWT alg claim
  scenario: 'The `verify()` function calls `jws.verify(token, publicKey)` without supplying an algorithm constraint. The `jws`
    v3 API signature is `verify(token, algorithm, secretOrKey)` — when called with only two arguments, the algorithm is read
    from the JWT header. An attacker forges a token with `{"alg":"none"}` in the header; the library skips signature verification
    and returns true. The attacker sets any claim they choose, including `role: "admin"`, and the application accepts the
    forged token as authentic.'
  evidence_summary: '`jws.verify` at insecurity.ts:55 is cast to a two-argument `(token: string, secret: string) => boolean`
    type, dropping the mandatory algorithm parameter; the algorithm is thus taken from the attacker-controlled token header.'
  impact_description: Complete authentication bypass — an unauthenticated attacker can impersonate any user including administrators
    without knowing credentials or the signing key.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the verify function omits the algorithm enforcement parameter.
  mitigation_title: Pin the JWT algorithm to RS256 in the verify call and switch to jsonwebtoken with an algorithms allowlist
  remediation:
    effort: Low
    steps:
    - 'Replace the `jws.verify()` call in `lib/insecurity.ts:55` with `jwt.verify(token, publicKey, { algorithms: [''RS256'']
      })` from the `jsonwebtoken` library already imported.'
    - Remove the `jws` import and all direct `jws.verify` / `jws.decode` usages — use `jwt.verify` (returns decoded payload
      on success, throws on failure) so the call pattern is type-safe and algorithm-pinned.
    - 'Update `express-jwt` options to include `algorithms: [''RS256'']` to enforce the same constraint on middleware-protected
      routes.'
    - Add an integration test asserting that a token with `alg:none` is rejected with HTTP 401.
    code_example: "```typescript\n// lib/insecurity.ts — replace jws.verify with:\nimport jwt from 'jsonwebtoken'\n\nexport\
      \ const verify = (token: string): boolean => {\n  try {\n    jwt.verify(token, publicKey, { algorithms: ['RS256'] })\n\
      \    return true\n  } catch {\n    return false\n  }\n}\nexport const decode = (token: string) => jwt.decode(token)\
      \ as any\n```"
    reference: CWE-347
