  stride: Elevation of Privilege
  cwe: CWE-94
  title: Process-Level Privilege Escalation — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: '`notevil@^1.3.3` is known to be bypassable via prototype pollution. A payload that writes to `__proto__` or `constructor.prototype` within the `safeEval` expression can break out of the evaluator''s restricted scope and obtain a reference to the underlying Node.js `process` object (e.g. via `constructor.constructor(''return process'')()`). Once `process` is accessible, the attacker executes `process.mainModule.require(''child_process'').execSync(''id'')` or equivalent, achieving OS-level command execution as the application user. Since the JWT private key is committed to the repository, any internet-facing attacker can obtain a valid bearer token and trigger this path without prior authentication.'
  evidence_summary: '`routes/b2bOrder.ts:9` imports `notevil` version `^1.3.3`; line 21 places `safeEval` itself into the sandbox context, creating a self-referential evaluator that `notevil`''s prototype-pollution bypass can leverage to reach the Node.js runtime.'
  impact_description: Full OS command execution in the application process, enabling exfiltration of all in-memory secrets, internal network pivoting, and persistent compromise of the host.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: '`vm.createContext` provides a V8-level context boundary; `timeout:2000` prevents infinite loops. Neither mitigates prototype pollution escape from `notevil`.'
  mitigation_title: Remove notevil safeEval from the user-data processing path and replace with strict schema validation
  remediation:
    effort: High
    steps:
    - Eliminate the `safeEval(orderLinesData)` execution path. Parse `orderLinesData` as JSON and validate against a strict schema (see b2b-api-002 for schema example) — no expression evaluation should occur on untrusted input.
    - If expression evaluation is unavoidable, use a separate sandboxed subprocess (e.g. `child_process.fork` with `--max-old-space-size=50 --max-semi-space-size=4` resource limits and no ambient `require`) rather than `vm.runInContext` with `notevil`.
    - Pin `notevil` to `0.0.0` or remove the dependency entirely (`package.json`). Its prototype pollution behaviour is by design for the Juice Shop RCE challenge but must not exist in production forks.
    - Apply `Object.freeze(Object.prototype)` and `Object.freeze(Function.prototype)` at process startup to harden against prototype pollution reaching production; note this may break some libraries and must be tested thoroughly.
    code_example: null
    reference: CWE-94
