  mitigation_fingerprints:
  - replace req.body.userid/userid/ownerid with req.user.id (or equivalent session-derived identity) in every where/filter clause.
  - move jwt storage to httponly secure samesite=strict cookies managed server-side
  - move rsa private key to an environment variable or secrets manager and remove it from source
  - replace derived password with a cryptographically random credential for oauth accounts
  - replace raw string-interpolated query with sequelize parameterized orm query in routes/login.ts
  - replace notevil safeeval execution of user input with a strict schema-validated order ingestion path
  - remove eval() from getuserprofile() and render username as escaped text only
  - upgrade express-jwt and pin algorithms to rs256-only in the isauthorized middleware
  - remove notevil safeeval from the user-data processing path and replace with strict schema validation
  - add jwt authentication middleware to the socket.io server before accepting connections
  - sanitize zip entry paths to a safe subdirectory before writing
  - remove bypasssecuritytrusthtml from lastloginip rendering and use text interpolation
  - emit structured audit log entries on login success, failure, and password reset in routes/login.ts
  - emit a structured audit log entry for every b2b order request including caller identity and payload hash
  - replace hardcoded hmac key with a per-answer salt and use bcrypt/argon2 for security answer storage
  - remove --unsafe-perm; use non-root user
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - commit package-lock.json; use `npm ci` in ci
  - disable external entity resolution in libxmljs2 xml parsing
  - filter challenge-solved broadcasts to the solving user's authenticated socket and exclude unauthenticated sockets from flag payloads
  - add express-rate-limit middleware to the login and password-reset routes with per-ip and per-account limits
  - add rate limiting to post /b2b/v2/orders and move safeeval execution to a worker thread
  - add url allowlist, abortcontroller timeout, and response size limit to profile image ssrf fetch
  - apply isauthorized() middleware globally and audit all 112 routes for explicit authorization
  - replace unsafe yaml load and node.js vm sandbox with safe schema parsing and no sandbox
  - require authenticated session and validate challenge-verify events against the solving user's active session context
  - emit structured security audit events for login success, failure, and token issuance
  - emit structured audit log entries for all file write operations
  - add user <non-root-uid>
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - add npm ecosystem entry to .github/dependabot.yml
  - add healthcheck cmd curl -f http://localhost:<port>/health
  - 'add renovate.json with a baseline preset (extends: ["config:base"]) or confirm renovate hosted-app is enabled at the repo / org level.'
