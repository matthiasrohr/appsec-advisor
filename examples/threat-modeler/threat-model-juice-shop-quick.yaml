  stride: Elevation of Privilege
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:54
  affected_parameter: null
  scenario: 'The `isAuthorized()` middleware at lib/insecurity.ts:54 calls `expressJwt({ secret: publicKey })` on express-jwt version 0.1.3, which does not enforce an `algorithms` allowlist. This allows two attack vectors: (1) `alg: none` — an attacker crafts a JWT with `{"alg":"none"}` in the header, removes the signature, and the library accepts it as valid; (2) algorithm confusion — using the RSA public key as the HMAC-SHA256 secret, the attacker signs a JWT with `alg: HS256` using the known public key, which the RS256 verifier misinterprets. Either path lets the attacker forge a token with `role: admin`, `role: accounting`, or any arbitrary claim.'
  evidence_summary: '`expressJwt({ secret: publicKey })` at insecurity.ts:54 specifies no `algorithms` field; express-jwt@0.1.3 does not default to RS256-only verification.'
  impact_description: An unauthenticated attacker can forge a JWT with admin role claims and gain full application control, access all user data, and perform any administrative action.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 signing enforced at issuance (line 56), but verification does not pin algorithm
  mitigation_title: Upgrade express-jwt and pin algorithms to RS256-only in the isAuthorized middleware
  remediation:
    effort: Low
    steps:
    - Upgrade express-jwt to ^8.x (current stable) which defaults to rejecting `alg:none` and requires explicit algorithm configuration.
    - 'Pass `{ secret: publicKey, algorithms: [''RS256''] }` to `expressJwt()` to reject tokens with any other algorithm.'
    - 'Upgrade jsonwebtoken to ^9.x for the `jwt.sign()` / `jwt.verify()` calls and use `jwt.verify(token, publicKey, { algorithms: [''RS256''] })` everywhere.'
    - Add a test that submits a forged `alg:none` token and asserts a 401 response.
    code_example: "// Before (INSECURE):\nexport const isAuthorized = () => expressJwt({ secret: publicKey } as any);\n\n// After:\nexport const isAuthorized = () => expressJwt({\n  secret: publicKey,\n  algorithms: ['RS256']\n});"
    reference: CWE-347
