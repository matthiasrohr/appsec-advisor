#### F-033 · Insecure Direct Object Reference (IDOR)

**Severity:** 🟠 High  ·  **Component:** [C-02](#c-02) - Express Backend API  ·  **Location:** `routes/basketItems.ts:68`

**Issue:** Any authenticated user can substitute another user's resource ID in the URL and read or modify the target record because the query filter has no ownership clause. Admin-only routes are excluded via the counter-pattern allowlist.

**Root cause:** Authorization checks are absent or bypassable, allowing horizontal and vertical privilege jumps from a self-registered or low-rights account. Includes mass-assignment of privileged attributes.

**Evidence:** ✓ verified - An object-identity parameter is trusted from the request without server-side ownership check.

```typescript
// routes/basketItems.ts:68
  return async (req: Request, res: Response, next: NextFunction) => {
    try {
      const item = await BasketItemModel.findOne({ where: { id: req.params.id } })
      const user = security.authenticatedUsers.from(req)
      challengeUtils.solveIf(challenges.basketManipulateChallenge, () => { return user && req.body.BasketId && user.bid != req.body.BasketId }) // eslint-disable-line eqeqeq
```

**Fix:** Tie every object lookup to the requesting user's identity and reject cross-tenant references → ❷ [M-053](#m-053) — Enforce object-level (ownership) authorization

**Classification:** Broken Access Control · [CWE-639](https://cwe.mitre.org/data/definitions/639.html) · [OWASP A01:2021](https://owasp.org/Top10/A01_2021/)

<a id="t-030"></a><a id="f-030"></a>
#### F-030 · Cross-Site Scripting

**Severity:** 🟠 High  ·  **Component:** [C-01](#c-01) - Angular SPA Frontend  ·  **Location:** `frontend/src/app/data-export/data-export.component.ts:71`

**Issue:** At `data-export.component.ts` line 71, the component opens a blank window and calls `document.write(this.userData)` where `this.userData` is the raw API response body. `document.write()` in a new window bypasses Angular's template engine entirely: any HTML or script returned by the server is executed in the new window's context with full DOM access.

A server-side injection or a compromised backend response can deliver `<script>` payloads that execute in the user's browser. Malicious HTML in the server's export response executes JavaScript in the victim's browser, enabling credential theft, session hijacking, or malicious redirects.

**Root cause:** Attacker-controlled content is rendered in the victim's browser without sanitization; combined with session tokens held in JavaScript-readable storage, any payload yields immediate account takeover.

**Evidence:** ✓ verified - `window.open('', '_blank', 'width=500')?.document.write(this.userData)` at line 71 writes raw server data directly into a new browser window using `document.write`, with no sanitization.

```typescript
// frontend/src/app/data-export/data-export.component.ts:71
        this.confirmation = data.confirmation
        this.userData = data.userData
        window.open('', '_blank', 'width=500')?.document.write(this.userData)
        this.lastSuccessfulTry = new Date()
        localStorage.setItem('lstdtxprt', JSON.stringify(this.lastSuccessfulTry))
```

**Fix:** Output-encode untrusted strings at every sink and remove all `bypassSecurityTrustHtml` calls → ❷ [M-050](#m-050) — Encode output instead of bypassing the framework sanitizer

**Classification:** Cross-Site Scripting (XSS) · [CWE-79](https://cwe.mitre.org/data/definitions/79.html) · [OWASP A03:2021](https://owasp.org/Top10/A03_2021/)

<a id="t-031"></a><a id="f-031"></a>
#### F-031 · Cross-Site Scripting

**Severity:** 🟠 High  ·  **Component:** [C-01](#c-01) - Angular SPA Frontend  ·  **Location:** `frontend/src/app/last-login-ip/last-login-ip.component.ts:39`

**Issue:** At `last-login-ip.component.ts` line 39, the `lastLoginIp` field from the decoded JWT payload is embedded in a `<small>` tag and passed to `bypassSecurityTrustHtml()`. If an attacker can forge a JWT (e.g. via the well-known `alg:none` bypass known to affect some Juice Shop configurations) or if the server stores a malicious IP string in the JWT payload, the `lastLoginIp` value renders as executable HTML in the Angular component.

Payload: `lastLoginIp: "<img src=x onerror=alert(1)>"` would execute on render. XSS executing in the authenticated user's session context; combined with localStorage JWT storage, leads to session token exfiltration.

**Root cause:** Attacker-controlled content is rendered in the victim's browser without sanitization; combined with session tokens held in JavaScript-readable storage, any payload yields immediate account takeover.

**Evidence:** ✓ verified - Line 39 interpolates `payload.data.lastLoginIp` directly into an HTML string and passes it to `bypassSecurityTrustHtml`, trusting JWT claim content as safe HTML.

```typescript
// frontend/src/app/last-login-ip/last-login-ip.component.ts:39
      if (payload.data.lastLoginIp) {

        this.lastLoginIp = this.sanitizer.bypassSecurityTrustHtml(`<small>${payload.data.lastLoginIp}</small>`)
      }
    }
```

**Fix:** Output-encode untrusted strings at every sink and remove all `bypassSecurityTrustHtml` calls → ❷ [M-051](#m-051) — Encode output instead of bypassing the framework sanitizer

**Classification:** Cross-Site Scripting (XSS) · [CWE-79](https://cwe.mitre.org/data/definitions/79.html) · [OWASP A03:2021](https://owasp.org/Top10/A03_2021/)

### 🟡 Medium (7)

<a id="t-065"></a><a id="f-065"></a>
#### F-065 · Improper Access Control

**Severity:** 🟡 Medium  ·  **Component:** [C-08](#c-08) - Real-time WebSocket Channel  ·  **Location:** `lib/startup/registerWebsocketEvents.ts:34`

**Issue:** The `notification received` event handler at line 34-38 accepts a `data` value from any connected WebSocket client and uses it to find and remove a matching entry from the shared in-memory `notifications[]` array via `splice`. Because the WebSocket connection requires no authentication, any attacker who knows (or guesses, or receives via threat realtime-channel-001) a valid flag string can send `socket.emit('notification received', flagValue)` and remove that notification from the global array.

An attacker suppresses challenge notifications for other users by draining the global notifications array, disrupting the intended game state for all participants.

**Root cause:** Authorization checks are absent or bypassable, allowing horizontal and vertical privilege jumps from a self-registered or low-rights account. Includes mass-assignment of privileged attributes.

**Evidence:** ✓ verified - `const i = notifications.findIndex(({ flag }) => flag === data); if (i > -1) { notifications.splice(i, 1) }` at line 35-38 modifies a shared array based on unauthenticated client input.

**Fix:** Add explicit server-side authorisation checks on every protected route → ❸ [M-061](#m-061) — Authenticate callers before allowing notification removal and scope removal to the caller's own notifications

**Classification:** Code Execution via Unsafe Deserialization or Eval · [CWE-284](https://cwe.mitre.org/data/definitions/284.html) · [OWASP A08:2021](https://owasp.org/Top10/A08_2021/)

