## 1. System Overview

Probably the most modern and sophisticated insecure web application

**Repository:** https://github.com/juice-shop/juice-shop
**Runtime:** Node\.js 20 - 24

### Scope

juice-shop comprises **8** modeled components. This threat model applied full STRIDE threat analysis to **3 of 8** - the components on the externally-reachable, authentication-bearing, and business-critical surface: **Angular SPA Frontend**, **Authentication & Session Surface**, **Real-time WebSocket Channel**. Selection criteria: frontend attack surface; auth; internet-exposed.

The remaining **5** component(s) were **not individually analyzed** at this assessment depth (lower-priority / internal surface): Express Backend API, Data Layer, B2B Order API, File Upload & Static Serving, CI/CD Pipeline. Re-run at a higher `--assessment-depth` to extend STRIDE coverage to them.

**Out of scope:** third-party hosted dependencies, browser runtime, operating-system kernel, and the underlying network infrastructure.

