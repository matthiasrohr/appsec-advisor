<a id="t-064"></a><a id="f-064"></a>
#### F-064 · Missing Authorization

**Severity:** 🟠 High  ·  **Component:** [C-08](#c-08) - Real-time WebSocket Channel  ·  **Location:** `lib/startup/registerWebsocketEvents.ts:41`

**Issue:** The `verifyLocalXssChallenge` and `verifySvgInjectionChallenge` handlers at lines 41-48 accept arbitrary data from any unauthenticated WebSocket connection and call `challengeUtils.solveIf()` which permanently marks the corresponding challenge as solved in the database (`challenge.save()`). An attacker who crafts the exact expected payload strings (e.g. `<iframe src="javascript:alert(`xss`)">` for localXssChallenge) can send them over a WebSocket without ever actually executing the XSS in a browser, or without having any legitimate session.

This grants challenge completion credit without performing the actual attack, and triggers notification broadcasts to all users as if the challenge were legitimately solved. Any unauthenticated client can mark server-side challenges as solved by sending known payload strings, bypassing the intended challenge completion requirements.

**Root cause:** Authorization checks are absent or bypassable, allowing horizontal and vertical privilege jumps from a self-registered or low-rights account. Includes mass-assignment of privileged attributes.

**Evidence:** ✓ verified - `challengeUtils.solveIf(challenges.localXssChallenge, () => { return utils.contains(data, '<iframe src="javascript:alert">')  })` at line 42 calls into persistent DB state based on unauthenticated socket data.

```typescript
// lib/startup/registerWebsocketEvents.ts:41
    })

    socket.on('verifyLocalXssChallenge', (data: any) => {
      challengeUtils.solveIf(challenges.localXssChallenge, () => { return utils.contains(data, '<iframe src="javascript:alert(`xss`)">') })
      challengeUtils.solveIf(challenges.xssBonusChallenge, () => { return utils.contains(data, config.get('challenges.xssBonusPayload')) })
```

**Fix:** ❷ [M-060](#m-060) — Enforce server-side authorization on every endpoint

**Classification:** Unauthenticated Management Plane · [CWE-862](https://cwe.mitre.org/data/definitions/862.html) · [OWASP A01:2021](https://owasp.org/Top10/A01_2021/)

