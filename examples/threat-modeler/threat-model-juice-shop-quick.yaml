  title: Remote Code Execution — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: '`routes/b2bOrder.ts:19` assigns `body.orderLinesData` without any schema validation or type coercion, then line 23 executes `vm.runInContext(''safeEval(orderLinesData)'', sandbox, {timeout:2000})`. `notevil@^1.3.3` implements an incomplete JavaScript subset evaluator with known prototype pollution escape vectors (e.g. `constructor.constructor(''return process'')()` style payloads). An attacker who holds a valid JWT (trivially obtained via the committed private key) sends a crafted `orderLinesData` string that escapes the `notevil` evaluator and runs arbitrary code in the Node.js process.'
  evidence_summary: '`body.orderLinesData` flows unvalidated into `vm.runInContext(''safeEval(orderLinesData)'', sandbox)` at `routes/b2bOrder.ts:23`; `notevil` is imported at line 9 with no additional sandbox hardening.'
  impact_description: Successful sandbox escape yields arbitrary OS command execution in the application process context, enabling data exfiltration, pivot to internal network, or persistent backdoor.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: '`vm.createContext(sandbox)` isolates the `safeEval` call; `timeout:2000` bounds CPU time. Neither prevents a prototype pollution escape from `notevil`.'
  mitigation_title: Replace notevil safeEval execution of user input with a strict schema-validated order ingestion path
  remediation:
    effort: High
    steps:
    - 'Remove the `vm.runInContext(''safeEval(orderLinesData)'', ...)` code path. Define a `zod` or `joi` schema for the expected order-line structure (e.g. `{productId: z.string().uuid(), quantity: z.number().int().min(1)}`) and validate `req.body.orderLinesData` against it before processing.'
    - If expression evaluation is required by a business requirement, replace `notevil` with a sandboxed worker process using Node.js `worker_threads` with a resource-limited context and an explicit safe-list of allowed expression forms — never pass raw strings to `eval`-adjacent APIs.
    - Upgrade or remove `notevil`; the package is unmaintained and has no patch for prototype pollution sandbox escape.
    - 'Add input-length and type guards before the processing block: reject `orderLinesData` values that are not valid JSON arrays, exceed 64 KB, or contain `__proto__`, `constructor`, or `prototype` tokens.'
    code_example: "// routes/b2bOrder.ts — schema-validated ingestion instead of safeEval\nimport { z } from 'zod'\nconst OrderLineSchema = z.array(z.object({\n  productId: z.string().uuid(),\n  quantity: z.number().int().min(1).max(100)\n}))\n\n// In the handler:\nconst parsed = OrderLineSchema.safeParse(body.orderLinesData)\nif (!parsed.success) return next(new Error('Invalid order data'))\n// process parsed.data"
