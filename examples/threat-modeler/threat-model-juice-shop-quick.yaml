#### M-040 — Replace email-derived password with a cryptographically random credential or use federated-only login without a local password fallback

**Addresses:**

- 🔴 [F-002](#f-002) — Derived Password from OAuth Email Claim (`oauth.component.ts:30`)

**Priority:** P1 - Immediate · **Effort:** Medium · **File:** `frontend/src/app/oauth/oauth.component.ts:30`

**How:** Remove the `btoa(email.reverse())` password derivation from `oauth.component.ts`. Instead, generate a random 32-byte secret server-side when creating a Google-OAuth-linked account, stored hashed in the DB and never returned to the client. Mark OAuth-linked accounts with a `federatedOnly` flag and reject direct password login for those accounts at the `/rest/user/login` handler. Rotate all existing Google-OAuth-linked accounts' passwords to random values as a one-time migration.

1. Remove the `btoa(email.reverse())` password derivation from `oauth.component.ts`. Instead, generate a random 32-byte secret server-side when creating a Google-OAuth-linked account, stored hashed in the DB and never returned to the client.
2. Mark OAuth-linked accounts with a `federatedOnly` flag and reject direct password login for those accounts at the `/rest/user/login` handler.
3. Rotate all existing Google-OAuth-linked accounts' passwords to random values as a one-time migration.

```javascript
// BEFORE (vulnerable)
const password = btoa(profile.email.split('').reverse().join(''))

// AFTER — generate server-side; client never sees it
// POST /api/oauth/link  { googleToken } → server validates, creates account with crypto.randomBytes(32)
```

**Reference:** CWE-522

