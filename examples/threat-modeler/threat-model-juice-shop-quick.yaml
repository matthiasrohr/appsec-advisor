  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:40
  affected_parameter: data
  scenario: '`socket.on(''verifyLocalXssChallenge'', (data: any) => { challengeUtils.solveIf(challenges.localXssChallenge,
    () => { return utils.contains(data, ''<iframe src="javascript:alert(`xss`)">'' }) })` at line 40 marks the `localXssChallenge`
    as solved for the current user when the supplied `data` string contains the expected XSS payload. Because the event handler
    trusts any string the client emits without verifying that the payload was delivered through the intended browser-XSS path,
    an authenticated attacker can emit the event directly via a WebSocket client (e.g. `socket.emit(''verifyLocalXssChallenge'',
    ''<iframe src="javascript:alert(`xss`)">'')`) and record the challenge as solved without triggering actual XSS execution.
    The same pattern applies to `verifySvgInjectionChallenge` (line 45) and `verifyCloseNotificationsChallenge` (line 49).
    This constitutes a privilege escalation in the gamification system: the attacker gains authenticated-solve status they
    have not earned.'
  evidence_summary: '`challengeUtils.solveIf(challenges.localXssChallenge, () => utils.contains(data, ...))` at line 41 trusts
    the client-supplied `data` string as proof of challenge completion without any server-side corroboration.'
  impact_description: Any authenticated user can fraudulently mark XSS, SVG injection, and notification challenges as solved
    by replaying known payload strings directly over the WebSocket, bypassing the intended browser-based execution requirement.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — no server-side corroboration of challenge conditions.
  mitigation_title: Validate challenge-solve conditions server-side rather than trusting client-emitted payloads
  remediation:
