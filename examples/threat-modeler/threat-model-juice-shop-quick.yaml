- local_id: websocket-service-005
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: No Message Size Limit or Rate Limiting on — registerWebsocketEvents.ts:20
  affected_parameter: null
  scenario: 'The Socket.IO server is instantiated at `registerWebsocketEvents.ts:20` with only a `cors` option — no `maxHttpBufferSize`,
    no per-event rate limit, and no connection throttle. An authenticated attacker can open multiple simultaneous WebSocket
    connections and flood `verifyLocalXssChallenge` events with megabyte-scale payloads; each call invokes `utils.contains(data,
    ...)` which performs a substring search over the full payload. Rapid event emission against `notification received` forces
    repeated linear scans of `notifications.findIndex()`. The in-process `notifications` array is also unbounded: if challenge
    completions accumulate and no client dismisses them, the array grows indefinitely. The outdated `socket.io@3.1.2` dependency
    (KNOWN_VULNS) includes additional unpatched DoS vectors in the 3.x series.'
  evidence_summary: '`new Server(server, { cors: { origin: ''http://localhost:4200'' } })` at line 20 sets no `maxHttpBufferSize`;
    `socket.on(''verifyLocalXssChallenge'', (data: any) => {...})` at line 40 passes unbounded `data` to `utils.contains()`.'
  impact_description: An authenticated attacker can exhaust server memory or event-loop capacity, causing the backend process
    to become unresponsive for all users.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no size limit, no connection rate limiting, no event-rate throttle.
  mitigation_title: Set maxHttpBufferSize and add per-connection event-rate limiting on the Socket.IO server
  remediation:
    effort: Low
    steps:
    - 'Set `maxHttpBufferSize` on the Socket.IO constructor: `new Server(server, { cors: {...}, maxHttpBufferSize: 1e4 })`
      to cap individual message size at 10 KB.'
    - Add a per-socket event counter and disconnect sockets that exceed a threshold (e.g. >100 events per second) using a
