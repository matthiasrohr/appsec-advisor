#### F-043 · Missing Rate Limiting (Brute-Force)

**Severity:** 🟠 High  ·  **Component:** [C-06](#c-06) - Authentication & Session Surface  ·  **Location:** `routes/login.ts:18`

**Issue:** The login handler (`routes/login.ts`) and password-reset handler (`routes/resetPassword.ts`) have no rate-limiting middleware, no CAPTCHA, and no account lockout logic. An attacker can send unlimited credential-guessing requests against `/rest/user/login` and `/rest/user/reset-password` at the speed the Express server can accept them.

Combined with MD5 hashing (cheap to compute), this makes brute-force of weak passwords near-instant and enables credential-stuffing campaigns at high velocity. Automated credential-guessing succeeds against weak or reused passwords; successful 2FA TOTP brute-force (6-digit code, 1M possibilities, no lockout) becomes feasible in under a minute.

**Evidence:** ✓ verified - No `rateLimit`, `throttle`, or `slowDown` import or middleware call found in `routes/login.ts`, `routes/resetPassword.ts`, or `routes/2fa.ts`.

