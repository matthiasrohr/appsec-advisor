  title: Client-Side-Only Role-Based Access Control — app.guard.ts:52
  affected_parameter: role
  scenario: '`AdminGuard.canActivate()` at `app.guard.ts:52-59` decodes the JWT from `localStorage` using `jwtDecode()` (a
    decode-without-verify library) and checks `payload.data.role === roles.admin`. An attacker can write an arbitrary JWT
    string to `localStorage` — e.g. `localStorage.setItem(''token'', craftedJwt)` from the browser console — with `role: ''admin''`,
    which passes the guard and grants access to all admin Angular routes. Even without forging a JWT, the guard can be bypassed
    by disabling JavaScript in Angular''s routing layer or accessing the underlying backend API directly. Because `request.interceptor.ts`
    also attaches this localStorage token as `Authorization: Bearer` on every API call, a forged token may also reach backend
    endpoints if they do not independently verify the signature. The `AccountingGuard` at line 68 is affected identically.'
  evidence_summary: '`AdminGuard.canActivate()` at `app.guard.ts:52` decodes the JWT with `jwtDecode()` (no signature verification)
    and checks `payload.data.role === roles.admin` to grant admin access.'
  impact_description: An attacker with browser console access (or XSS) can write a self-crafted JWT to localStorage and navigate
    all admin-gated Angular routes without a valid credential.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Client-side JWT decode check present but provides no cryptographic assurance.
  mitigation_title: Enforce role authorization server-side on every admin API endpoint; treat client-side guards as UX-only
    in app.guard.ts
  remediation:
