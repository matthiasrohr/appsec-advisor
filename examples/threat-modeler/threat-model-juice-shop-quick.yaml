  title: XXE File Disclosure — routes/fileUpload.ts:83
  affected_parameter: XML file upload body (data)
  scenario: 'At line 83 of `fileUpload.ts`, `libxml.parseXml(data, { noblanks: true, noent: true, nocdata: true })` parses attacker-controlled XML with `noent: true`, which enables resolution of XML external entities. An attacker uploads an XML file containing `<!DOCTYPE foo [<!ENTITY xxe SYSTEM ''file:///etc/passwd''>]><root>&xxe;</root>`. The parser resolves the entity and embeds the file contents into `xmlDoc`. Line 87 then includes `utils.trunc(xmlString, 400)` — the first 400 bytes of the resolved XML — directly in the HTTP 410 response body sent to the attacker. The application''s own challenge check at line 85 (`utils.matchesEtcPasswdFile(xmlString)`) confirms this is the intended exploitation path. The vm sandbox at line 83 does not prevent XXE because the entity expansion occurs within the libxmljs2 native C library (libxml2), not in JavaScript execution.'
  evidence_summary: 'Line 83 calls `libxml.parseXml()` with `noent: true`; line 87 echoes the resolved XML string (up to 400 chars) in the HTTP error response, exposing any file readable by the process user.'
  impact_description: Any file readable by the Node.js process user (e.g. `/etc/passwd`, application secrets, private keys) can be exfiltrated in a single HTTP request.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: vm.runInContext timeout 2000ms prevents CPU-exhaustion DoS from recursive entity expansion (XXE DoS challenge). Output truncated to 400 chars via utils.trunc().
  mitigation_title: Disable external entity resolution in libxmljs2 XML parsing
  remediation:
    effort: Low
    steps:
    - 'Change the `noent` option to `false` in the `libxml.parseXml()` call at fileUpload.ts:83: `libxml.parseXml(data, { noblanks: true, noent: false, nocdata: true })`.'
    - 'Additionally set `nonet: true` to prevent network-based XXE (DTD fetched from external URL).'
    - 'Consider replacing libxmljs2 entirely with a pure-JS parser that does not support external entities (e.g. `fast-xml-parser` with `processEntities: false`).'
    - Do not echo parsed XML content back in error responses — sanitize or omit the parsed content from the 410 response.
    code_example: '// Safe XML parse — disable external entity expansion

