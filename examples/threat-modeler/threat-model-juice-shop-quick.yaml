#### F-044 · Allocation of Resources without Limits

**Severity:** 🟠 High  ·  **Component:** [C-08](#c-08) - Real-time WebSocket Channel  ·  **Location:** `lib/startup/registerWebsocketEvents.ts:20`

**Issue:** The Socket\.IO server instantiated at line 19-20 accepts WebSocket connections with no per-IP connection limit, no per-connection event rate limit, and no maximum connections cap. An attacker can open thousands of concurrent WebSocket connections to the server, each consuming a socket file descriptor and memory.

Additionally, flooding `notification received` events per connection triggers repeated `notifications.findIndex` + conditional `splice` calls on the shared array, consuming CPU. A single attacker with modest resources can exhaust server file descriptors or saturate the `Node.js` event loop, making the application unavailable to all users.

**Evidence:** ✓ verified - `new Server(server, { cors: { origin: 'http://localhost:4200' } })` at line 20 has no `maxHttpBufferSize`, `connectTimeout`, or per-namespace connection limit configured.

