<a id="t-032"></a><a id="f-032"></a>
#### F-032 · Password Hash with Insufficient Effort

**Severity:** 🟠 High  ·  **Component:** [C-06](#c-06) - Authentication & Session Surface  ·  **Location:** `lib/insecurity.ts:43`

**Issue:** `security.hash()` at `lib/insecurity.ts:43` uses `crypto.createHash('md5')` to hash passwords before storage and comparison. MD5 produces 128-bit digests with no salt, is not iterative, and has precomputed rainbow-table coverage.

If the Users table is exfiltrated (e.g., via the SQLi in auth-003 or a direct DB breach), every password hash can be reversed in seconds using commodity GPU cracking. An attacker who obtains a dump of the Users table recovers all plaintext passwords instantly, enabling account takeover and credential stuffing against other services.

**Root cause:** Authentication can be circumvented or forged because credentials, signing keys, or password hashes are weak, missing, or exposed.

**Evidence:** ✓ verified - `exports.hash = (data) => crypto.createHash('md5').update(data).digest('hex')` at line 43 - no salt, no KDF, no iteration count.

**Fix:** Replace the broken hash with a salted password-hashing function (bcrypt/Argon2id) → ❷ [M-052](#m-052) — Hash passwords with a strong, salted algorithm

**Classification:** Cryptographic Failures · [CWE-916](https://cwe.mitre.org/data/definitions/916.html) · [OWASP A02:2021](https://owasp.org/Top10/A02_2021/)

