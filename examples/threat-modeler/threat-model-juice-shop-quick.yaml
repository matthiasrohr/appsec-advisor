<a id="m-057"></a>
#### M-057 — Rate-limit and lock out repeated authentication attempts

**Addresses:**

- 🟠 [F-044](#f-044) — No rate limiting or connection cap on Socket\.IO server allows WebSocket flood (`registerWebsocketEvents.ts:20`)

**Priority:** P2 - This Sprint · **Effort:** Low · **File:** `lib/startup/registerWebsocketEvents.ts:20`

**How:** Set `maxHttpBufferSize` (default 1MB) to a lower value in the Socket\.IO server constructor to limit payload size: `new Server(server, { maxHttpBufferSize: 1e4, cors: { origin: config.get('server.baseUrl') } })`. Add a per-IP connection throttle using a middleware that tracks open sockets per origin IP and rejects connections beyond a threshold (e.g. 10 concurrent sockets per IP). Apply `express-rate-limit` or a Socket\.IO-level rate limiter (e.g. `socket-rate-limiter`) to bound the `notification received` event rate per socket.

1. Set `maxHttpBufferSize` (default 1MB) to a lower value in the Socket\.IO server constructor to limit payload size: `new Server(server, { maxHttpBufferSize: 1e4, cors: { origin: config.get('server.baseUrl') } })`.
2. Add a per-IP connection throttle using a middleware that tracks open sockets per origin IP and rejects connections beyond a threshold (e.g. 10 concurrent sockets per IP).
3. Apply `express-rate-limit` or a Socket\.IO-level rate limiter (e.g. `socket-rate-limiter`) to bound the `notification received` event rate per socket.

```javascript
const io = new Server(server, {
  maxHttpBufferSize: 1e4,
  cors: { origin: config.get('server.baseUrl') }
})

// Per-socket event rate limiting
const socketConnections = new Map()
io.use((socket, next) => {
  const ip = socket.handshake.address
  const count = (socketConnections.get(ip) ?? 0) + 1
  if (count > 10) return next(new Error('Too many connections'))
  socketConnections.set(ip, count)
  socket.on('disconnect', () => socketConnections.set(ip, socketConnections.get(ip) - 1))
  next()
})
```

**Reference:** CWE-770

