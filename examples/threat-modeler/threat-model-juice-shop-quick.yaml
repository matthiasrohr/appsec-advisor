  title: Hardcoded RSA Private Key — lib/insecurity.ts:23
  affected_parameter: null
  scenario: 'The RSA private key used to sign all JWT tokens is hardcoded as a string literal at lib/insecurity.ts:23. Any developer, contractor, or attacker with read access to the source repository can extract this key and use it offline to forge arbitrary JWT tokens, signing them as any user including the admin account (`role: ''admin''`). Because the key is embedded in source, rotation requires a code change and redeployment — leaked copies persist in git history indefinitely. The `authorize()` function at line 56 uses this key for every token issuance.'
