components:
- id: frontend-spa
  name: Angular SPA Frontend
  description: Angular 20 single-page application serving the Juice Shop UI. Handles all user-facing interactions, client-side routing, JWT token storage in cookies (no httpOnly), and multiple bypassSecurityTrustHtml usages that create DOM XSS sinks.
  paths:
  - frontend/src/**
  - frontend/*.json
  tier: client
  complexity: moderate
  framework: angular
  deployment_zones:
  - client-device
  - internet
  handles_sensitive_data: true
  threat_ids:
  - T-002
  - T-004
  - T-012
- id: backend-api
  name: Express REST API Backend
  description: Node.js 24/Express 4 server handling all REST API routes at /rest/* and /api/*, authentication via JWT RS256, business logic, file serving, Socket.IO real-time events, and intentionally vulnerable code patterns (SQLi, eval, XXE, IDOR).
  paths:
  - server.ts
  - routes/**
  - lib/**
  - models/**
  - data/**
  - config/**
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - internet
  - prod-env
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-007
  - T-026
  - T-029
- id: data-persistence
  name: Data Persistence Layer
  description: SQLite database (default) accessed via Sequelize ORM. Stores users (credentials, PCI card data), orders, products, wallets, and all application state. Raw SQL queries in login and search routes bypass ORM protections.
  paths:
  - models/**
  - data/static/**
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - prod-write-db
  - prod-env
  handles_sensitive_data: true
  threat_ids: []
- id: file-upload-service
  name: File Upload & Processing Service
  description: Express route handlers processing multipart file uploads, ZIP extraction (zip-slip candidate), XML parsing with entity expansion (XXE), YAML deserialization, and profile image URL fetching (SSRF). All implemented in routes/fileUpload.ts and routes/profileImageUrlUpload.ts.
  paths:
  - routes/fileUpload.ts
  - routes/profileImageUrlUpload.ts
  tier: application
  complexity: moderate
  framework: express
  deployment_zones:
  - internet
  - prod-env
  handles_sensitive_data: false
  threat_ids:
  - T-011
  - T-021
  - T-025
  - T-027
  - T-030
- id: b2b-api
  name: B2B REST API
  description: Single-endpoint B2B API (POST /b2b/v2/orders) that accepts orderLinesData and executes it via notevil safeEval inside a Node.js vm.runInContext sandbox. JWT bearer authentication on the route is absent at the Express registration level per source-auth scan.
  paths:
  - routes/b2bOrder.ts
  - swagger.yml
  tier: application
  complexity: simple
  framework: express
