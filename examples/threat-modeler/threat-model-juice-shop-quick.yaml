- local_id: frontend-spa-001
  threat_category_id: TH-10
  additional_categories: []
  stride: Spoofing
  cwe: CWE-598
  title: OAuth Implicit Flow Exposes Access Token in URL Fragment — app.routing.ts:286
  affected_parameter: access_token
  scenario: The `oauthMatcher` function at `app.routing.ts:286` inspects `window.location.href` for the literal string `#access_token=`,
    confirming the app uses the OAuth 2.0 implicit grant. The access token arrives in the URL fragment and is processed by
    `oauth.component.ts:28` via `parseRedirectUrlParams()`. Because the fragment is part of the URL, it is recorded in browser
    history, may appear in Referer headers for any sub-resource loaded after redirect, and is visible in browser developer
    tools. Any script running in the same origin after redirect can read `window.location.href` and extract the token. The
    implicit flow has been deprecated in OAuth 2.0 Security Best Current Practice (RFC 9700) precisely because of this exposure
    surface. PKCE-protected authorization code flow is the correct replacement for public clients.
  evidence_summary: '`oauthMatcher` at `app.routing.ts:286` matches `window.location.href.includes(''#access_token='')`, routing
    the browser to `OAuthComponent` which calls `this.parseRedirectUrlParams().access_token` at line 28.'
  impact_description: An attacker who can observe browser history, HTTP Referer, or inject any script into the page can steal
    the OAuth access token and impersonate the victim.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no state parameter, no PKCE, token in URL fragment.
  mitigation_title: Replace OAuth implicit flow with authorization code flow and PKCE in oauth.component.ts
  remediation:
    effort: High
    steps:
    - Switch the OAuth authorization request to `response_type=code` with a PKCE code challenge (`code_challenge_method=S256`);
      remove all `#access_token=` handling from `oauthMatcher` and `OAuthComponent`.
    - Generate a cryptographically random `state` parameter per login initiation, store it in `sessionStorage` (not `localStorage`),
      and validate it on redirect before processing the code.
    - Exchange the authorization code for tokens server-side (backend proxy or BFF) so the access token never touches the
      browser URL.
    - Update `app.routing.ts:279-291` to remove the `oauthMatcher` implicit-flow route and replace with a code-exchange callback
      route.
    code_example: "// Generate PKCE verifier and challenge\nconst verifier = crypto.getRandomValues(new Uint8Array(32)).join('');\n\
      const encoder = new TextEncoder();\nconst data = encoder.encode(verifier);\nconst digest = await crypto.subtle.digest('SHA-256',\
      \ data);\nconst challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))\n  .replace(/\\+/g, '-').replace(/\\\
      //g, '_').replace(/=+$/, '');\nsessionStorage.setItem('pkce_verifier', verifier);\n// Redirect with response_type=code&code_challenge=...&code_challenge_method=S256"
    reference: CWE-598
  evidence:
