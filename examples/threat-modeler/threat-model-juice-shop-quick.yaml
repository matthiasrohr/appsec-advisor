trust_boundaries:
- id: tb-1
  name: Public Internet to Application
  from: external
  to: backend-api
  enforcement: JWT Bearer token via express-jwt@0.1.3; unauthenticated access to public routes permitted; no rate limiting;
    CORS wildcard for all origins
  weakness: express-jwt@0.1.3 is severely outdated; alg:none attacks possible; no brute-force protection on /rest/user/login
- id: tb-2
  name: Browser to Application (SPA)
  from: frontend-spa
  to: backend-api
  enforcement: 'Angular client-side route guards; JWT sent as Authorization: Bearer; no HttpOnly cookies'
  weakness: Client-side guards are not a security boundary; JWT in localStorage is XSS-accessible; any XSS on any page yields
    a valid token
- id: tb-3
  name: Application to Data Tier
  from: backend-api
  to: data-store
  enforcement: Sequelize ORM with parameterized queries (default); raw SQL used intentionally in training routes
  weakness: In-process SQLite; no additional credential or network authentication; raw query sinks bypass ORM protections
- id: tb-4
  name: Application to External LLM
  from: backend-api
  to: external
  enforcement: HTTPS with API key; outbound only
  weakness: User-controlled input passed to LLM prompts without sanitization; prompt injection enables jailbreak and data
    exfiltration via LLM response
- id: tb-5
  name: CI/CD Pipeline to Cloud Services
  from: ci-cd-pipeline
  to: external
  enforcement: GitHub Actions GITHUB_TOKEN with workflow permissions; repository secrets for Docker/npm publishing
  weakness: No permissions blocks on most workflows; GitHub Actions not pinned to commit SHAs; third-party actions run with
    elevated GITHUB_TOKEN
