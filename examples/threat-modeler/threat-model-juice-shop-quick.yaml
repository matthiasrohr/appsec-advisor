- local_id: auth-004
  threat_category_id: TH-02
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-547
  title: Hardcoded HMAC Key for Security Answer Hashing — lib/insecurity.ts:44
  affected_parameter: null
  scenario: The `hmac()` function at lib/insecurity.ts:44 uses the hardcoded static key `pa4qacea4VK9t9nGv7yZtwmj` for HMAC-SHA256 of security question answers stored in the database. Because the key is public (committed to source), an attacker who reads the SecurityAnswers table can precompute rainbow tables of common answers against this fixed key and recover security answers offline. The password-reset flow at routes/resetPassword.ts:41 compares `security.hmac(answer)` against the stored hash — answering any user's security question becomes offline cracking.
  evidence_summary: '`crypto.createHmac(''sha256'', ''pa4qacea4VK9t9nGv7yZtwmj'')` at insecurity.ts:44 uses a static, source-committed key for all security-answer hashes.'
  impact_description: Attacker with database read access can precompute HMAC values for a dictionary of common security answers (birth cities, pet names) and take over any account via the password-reset flow.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: HMAC-SHA256 applied (better than plain hash), but key is static and public
  mitigation_title: Replace hardcoded HMAC key with a per-answer salt and bcrypt/argon2 hashing
  remediation:
    effort: Medium
    steps:
    - Store security answers using `bcrypt` or `argon2` (same as passwords) rather than HMAC with a shared key — per-answer salt prevents precomputation.
    - Remove the hardcoded `'pa4qacea4VK9t9nGv7yZtwmj'` key from insecurity.ts:44.
    - If HMAC must be kept, load the key from `process.env.HMAC_SECRET` and rotate it; re-hash all existing security answers.
    - Consider moving away from security-question-based reset entirely in favor of email-token-based reset.
    code_example: null
    reference: CWE-547
  evidence:
  - file: lib/insecurity.ts
    line: 44
