- id: M-032
  title: Add security.isAuthorized middleware to all /rest/web3/ route registrations
  kind: fix
  priority: P2
  severity: High
  effort: Low
  threat_ids:
  - T-028
  how: Prepend `security.isAuthorized()` to each web3 route in `server.ts`, matching the pattern used for `/rest/basket` (line
    356) and `/api/BasketItems` (line 358). Verify by running the existing Juice Shop integration tests with an unauthenticated
    client — the web3 endpoints should return HTTP 401.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-306
  _title_source: Add security.isAuthorized() middleware to all /rest/web3/ route registrations
- id: M-033
  title: Enforce server-side authorization on every endpoint
  kind: fix
  priority: P3
  severity: High
  effort: High
  threat_ids:
  - T-029
  how: Move challenge-completion verification to the HTTP layer where the server can inspect the request context (headers,
    referer, CSP report) rather than relying on a client-emitted payload string. For challenges that are inherently browser-triggered
    (XSS), use a server-generated nonce embedded in the page and validate the nonce in the WebSocket event rather than matching
    a static payload string. Rate-limit challenge-solve events per user to prevent scripted replay attacks. Log all challenge-solve
    attempts with the user identity and payload to detect automated flag submission.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-862
  _title_source: Validate challenge-solve conditions server-side rather than trusting client-emitted payloads
- id: M-034
  title: Require cryptographic proof-of-ownership for wallet address verification
  kind: fix
  priority: P3
  severity: Medium
  effort: Medium
  threat_ids:
  - T-030
  how: Issue a server-side challenge nonce to the authenticated user's session before they submit their wallet. Require the
    user to sign the nonce with their wallet private key (e.g. via `ethers.Signer.signMessage()`) and submit the signature
    alongside the address. On the server, recover the signer address from the signature using `ethers.verifyMessage(nonce,
    signature)` and compare it to the submitted `walletAddress` before checking `addressesMinted`.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-306
  _title_source: Require cryptographic proof-of-ownership (signed message) for wallet address verification
- id: M-035
  title: Stop exposing internal information to clients
  kind: fix
  priority: P3
  severity: Medium
  effort: Low
  threat_ids:
  - T-035
  how: 'Tag each entry in `notifications` with the `userId` of the user who triggered the challenge solve. In the connection
    handler, filter: `notifications.filter(n => n.userId === socket.data.user.id).forEach(n => socket.emit(''challenge solved'',
    n))`. Remove the `firstConnectedSocket` special-case `server started` event or scope it to server-admin roles to avoid
    leaking server-start signals to arbitrary clients.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-200
  _title_source: Filter challenge-completion notifications to the authenticated user's own entries before emitting
