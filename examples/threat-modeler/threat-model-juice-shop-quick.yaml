tier_root_causes:
  edge:
  - Angular routes lack server-side access enforcement
  - Client-side validation only — no server-side input boundary controls
  - DOM-based XSS sinks in template interpolation without sanitization
  server:
  - Missing authentication middleware on sensitive REST endpoints
  - Attacker-controlled owner IDs accepted without session identity check (IDOR)
  - Raw SQL string interpolation without parameterized queries
  - Hardcoded RSA private key enables offline JWT forgery
  - eval() on user-controlled input allows arbitrary code execution
  data:
  - SQLite queries constructed via string concatenation expose injection surface
  - No field-level access control on data export and order history endpoints
