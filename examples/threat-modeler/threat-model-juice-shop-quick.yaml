  title: Unauthenticated Wallet Address Claim — routes/nftMint.ts:41
  affected_parameter: walletAddress
  scenario: '`routes/nftMint.ts:41-44` reads `req.body.walletAddress` and checks it against `addressesMinted` without verifying
    that the caller owns the submitted address. An attacker who observes a legitimate address in `addressesMinted` (via on-chain
    event data from the public Sepolia testnet) can POST that address to `POST /rest/web3/walletNFTVerify` and steal the NFT
    mint credit. Because the endpoint deletes the address from the Set on success (line 43), the legitimate minter then cannot
    claim their own reward.'
  evidence_summary: '`nftMint.ts:41-44` accepts `req.body.walletAddress` and calls `addressesMinted.has()` with no signature
    verification or proof-of-ownership check — any caller can supply any address string.'
  impact_description: An attacker can steal challenge completion credit from a legitimate NFT minter by replaying the wallet
    address, and can prevent the legitimate owner from ever claiming their credit since the Set entry is consumed on first
    match.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None
  mitigation_title: Require cryptographic proof-of-ownership (signed message) for wallet address verification
  remediation:
    effort: Medium
    steps:
    - Issue a server-side challenge nonce to the authenticated user's session before they submit their wallet.
    - Require the user to sign the nonce with their wallet private key (e.g. via `ethers.Signer.signMessage()`) and submit
      the signature alongside the address.
    - On the server, recover the signer address from the signature using `ethers.verifyMessage(nonce, signature)` and compare
      it to the submitted `walletAddress` before checking `addressesMinted`.
    code_example: "```typescript\nimport { verifyMessage } from 'ethers'\n// in walletNFTVerify handler:\nconst { walletAddress,\
      \ nonce, signature } = req.body\nconst recovered = verifyMessage(nonce, signature)\nif (recovered.toLowerCase() !==\
      \ walletAddress.toLowerCase()) {\n  return res.status(401).json({ success: false, message: 'Signature verification failed'\
      \ })\n}\n```"
