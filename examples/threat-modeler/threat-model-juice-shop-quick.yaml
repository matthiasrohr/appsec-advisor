  mitigation_fingerprints:
  - move session token to httponly secure samesite=strict cookie managed by a backend-for-frontend
  - move jwt signing key to environment-injected secret and rotate immediately
  - replace raw sql string concatenation with sequelize parameterized query in login handler
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - pin jwt validation to rs256 algorithm and upgrade express-jwt to >= 6.0.0
  - apply an allowlist filter before passing the body to any model, and strip privilege fields before persistence.
  - add jwt authentication middleware to the socket.io connection pipeline
  - bind walletnftverify to the authenticated user's session and verify wallet ownership
  - remove bypasssecuritytrusthtml and display search term as plain text
  - bind challenge-verification socket events to the authenticated session that originated the payload
  - authenticate and validate wallet address input before adding to walletsconnected
  - add structured audit log entries for all authentication outcomes in login and password-reset routes
  - replace md5 password hashing with bcrypt and load hmac key from environment variable
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - remove 'package-lock=false' from .npmrc; commit package-lock.json; use `npm ci` in ci
  - gate challenge-flag notification delivery behind authentication middleware and scope notifications to the owning user
  - remove hardcoded mnemonic from source and load wallet credentials from environment variables
  - apply express-rate-limit middleware to the /rest/user/login endpoint with ip-based throttling
  - enforce decompressed-size limit and per-entry size check before writing zip archive entries to disk
  - add connection rate limiting and per-socket event throttling to the socket.io server
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark
    the route intentionally public via app.get for read-only access only.
  - replace $where string concatenation with a parameterized equality filter in the marsdb query
  - apply security.isauthorized middleware to all /rest/web3/* route registrations
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - add npm ecosystem entry to .github/dependabot.yml
  - add rate limiting and exponential backoff to websocket reconnection logic in nftmintlistener
