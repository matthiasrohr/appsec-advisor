threats:
- title: Systemic IDOR Attacker-Controlled Owner ID Across Resource Endpoints — routes/address.ts:11
  scenario: Server-side authorization MUST derive the resource owner from the authenticated session (req.user / req.session / req.auth), never from attacker-controlled request data. Trusting req.body.UserId etc. enables horizontal privilege escalation across all authenticated tenants.
  stride: Tampering
  risk: Critical
  likelihood: Critical
  impact: Critical
  cwe: CWE-639
  evidence:
  - file: routes/address.ts
    line: 11
  source: stride
  architectural_violation: true
  component_name: Backend API
  source_scan_ref: SAF-004
  source_check_id: AUTHZ-001
  source_type: typescript_source
  breach_distance: 2
  mitigation_title: Replace req.body.UserId/userId/ownerId with req.user.id (or equivalent session-derived identity) in every WHERE/filter clause.
  finding_type_id: FT-040
  merged_from:
  - backend-api
  evidence_flags:
  - flag_id: EV-001
    verdict: verified
    reason: 'Line 11 shows UserId taken from req.body.UserId without authentication check: `findAll({ where: { UserId: req.body.UserId } })`'
    line_excerpt: '    const addresses = await AddressModel.findAll({ where: { UserId: req.body.Use'
    verified_at: '2026-06-16T00:00:00Z'
  evidence_check: verified
  mitigation_ids:
  - M-002
  id: T-001
  component: backend-api
  _title_source: Systemic IDOR Attacker-Controlled Owner ID Across Resource Endpoints
  vektor: internet-anon
- local_id: frontend-spa-003
  threat_category_id: TH-04
  additional_categories:
  - TH-10
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT Stored in localStorage Accessible to XSS — oauth.component.ts:51
  affected_parameter: localStorage['token']
  scenario: oauth.component.ts:51 calls localStorage.setItem('token', authentication.token) immediately after OAuth login. The JWT is also written to a non-httpOnly cookie (line 50). Because localStorage is accessible to any JavaScript executing on the same origin — including injected scripts via the bypassSecurityTrustHtml XSS sinks present in search-result, last-login-ip, and other components — any successful XSS attack results in complete session token exfiltration. An attacker who achieves XSS via a stored product description or the lastLoginIp sink can call localStorage.getItem('token') and send the token to an external endpoint, taking over the session persistently. The SPA-without-BFF architectural pattern (no Backend-for-Frontend holding tokens server-side) makes this the unavoidable consequence of XSS.
  evidence_summary: oauth.component.ts:51 stores the authentication JWT in localStorage — a browser-accessible store with no isolation from same-origin scripts — rather than an httpOnly cookie managed by a BFF.
  impact_description: Successful XSS on any page in the application results in permanent session hijacking via localStorage token exfiltration.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Token is also set in a cookie (line 50) but the cookie lacks httpOnly flag, providing no additional protection against JavaScript access.
  mitigation_title: Move JWT storage to httpOnly Secure SameSite=Strict cookies managed server-side
  remediation:
    effort: High
    steps:
    - Remove localStorage.setItem('token', ...) at oauth.component.ts:51 and localStorage-based token reads throughout the SPA (app.guard.ts:18, last-login-ip.component.ts:34).
    - 'Implement a Backend-for-Frontend (BFF) pattern: the backend sets the JWT in a Set-Cookie header with HttpOnly; Secure; SameSite=Strict attributes after authentication. The SPA never sees the raw token.'
    - Update all API calls to rely on cookie-based authentication (the browser sends the cookie automatically). Remove Authorization header injection from HTTP interceptors.
    - On the backend, update the /rest/user/login and OAuth callback endpoints to set httpOnly cookies rather than returning the token in the response body.
    code_example: "// backend: set-cookie after login (Express example)\nres.cookie('token', jwt, {\n  httpOnly: true,\n  secure: true,\n  sameSite: 'strict',\n  maxAge: 8 * 60 * 60 * 1000\n});\n// Do NOT return token in response body"
    reference: CWE-922
