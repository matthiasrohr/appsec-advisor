    key used to hash security answers is hardcoded at `lib/insecurity.ts:42` (`pa4qacea4VK9t9nGv7yZtwmj`). Since Juice Shop
    is an open-source project, both secrets are publicly readable in the repository. Any attacker can: (1) sign arbitrary
    JWT tokens with any claims (role: admin) offline; (2) precompute HMAC values for common security answers to bypass password
    reset without knowing the original answer. The secrets are also shipped in production Docker images.'
  evidence_summary: '`privateKey` is a 1024-bit RSA PEM literal at insecurity.ts:21; `hmac()` at insecurity.ts:42 uses the
    static string `pa4qacea4VK9t9nGv7yZtwmj` — both hardcoded, not sourced from environment variables or a secrets manager.'
  impact_description: 'Complete credential infrastructure compromise: all issued JWTs are forgeable offline; password reset
    can be bypassed for any account whose security answer HMAC can be precomputed.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — secrets are in-source literals committed to version control.
  mitigation_title: Move RSA private key and HMAC secret to environment variables or a secrets manager; rotate both immediately
  remediation:
