  mitigation_fingerprints:
  - move jwt storage from localstorage to httponly secure samesite=strict cookies via a backend-for-frontend
  - replace raw sequelize string-interpolation query with parameterized orm finder at routes/login.ts:34
  - remove hardcoded rsa key from source and load it from an environment variable or secrets manager at startup
  - upgrade express-jwt and pin allowed jwt algorithms to rs256 to close cve-2020-15084
  - replace derived password with a cryptographically random server-side credential for oauth-linked accounts
  - remove xml_parse_noent and xml_parse_dtdload flags and deny external entity resolution in lib/xml.ts
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - remove bypasssecuritytrusthtml from feedback comment rendering and use angular safe interpolation or a server-side sanitizer
  - move mnemonic to environment-variable or secrets-manager reference in checkkeys.ts
  - remove notevil eval of user input and replace with structural parsing of b2border body
  - add sequelize fields allowlist to usermodel.create to block role mass assignment
  - migrate to pkce-based authorization code flow and validate the state parameter on every callback
  - replace md5 password hashing with bcrypt or argon2 with appropriate cost factor in lib/insecurity.ts:41
  - parameterize product search query using sequelize op.like with bound replacement values
  - replace url.includes with exact-set membership check in isredirectallowed
  - add structured security audit log for login, role-change, and admin events
  - move hmac secret to environment variable and switch security-answer storage to bcrypt in lib/insecurity.ts:42
  - remove hardcoded credentials from routes/login.ts and replace challenge verification with token-comparison or environment-driven
    logic
  - validate imageurl scheme and hostname against an allowlist before fetching in routes/profileimageurlupload.ts
  - commit package-lock.json; use `npm ci` in ci
  - add express-rate-limit middleware to the post /rest/user/login route with per-ip and per-email throttling
  - disable xml_parse_dtdload and set entity expansion limits in lib/xml.ts
  - apply express-rate-limit to all web3 endpoints in server.ts
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark
    the route intentionally public via app.get for read-only access only.
  - enforce coupon discount cap server-side in generatecoupon tool execute handler and remove confidential system-prompt clause
  - enforce role-based access control on every admin api endpoint server-side, independent of the client-side angular guard
  - add security.isauthorized middleware to all web3 challenge endpoints in server.ts
  - add user <non-root-uid>
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
