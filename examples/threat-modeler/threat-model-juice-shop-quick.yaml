## Management Summary

### Verdict

🔴 Juice Shop exposes a broad attack surface with no meaningful server-side authorization boundary: 18 Critical broken-object-level authorization findings across resource routes allow any authenticated user to read, modify, or delete records belonging to other users. Compounding this, the JWT signing key is hardcoded in `lib/insecurity.ts`, the algorithms allowlist is absent, and the application accepts `alg:none` tokens - meaning an attacker who reads the public source repository can forge admin-level session tokens without possessing any credential.

**Risk distribution:** 🔴 Critical: 24 · 🟠 High: 40 · 🟡 Medium: 7 · 🟢 Low: 1 · **Total: 72**

**Scope:** 3 of 8 components received full STRIDE analysis - the externally-reachable, authentication-bearing, and business-critical surface. The other 5 (lower-priority / internal) were not individually assessed at this depth (see [§1 Scope](#scope)).

<br/>

**The three highest-consequence attack scenarios an unauthenticated or low-privilege attacker can reach:**

<blockquote style="border-left: 3px solid #dc2626; background: #fef2f2; padding: 16px 20px; margin: 0;">

- **Full admin takeover via forged JWT** — The RSA private key is committed at `lib/insecurity.ts:23`. Any attacker clones the repo, calls `jwt.sign({role:'admin'}, privateKey, {algorithm:'RS256'})`, and presents the token to unprotected admin routes — no password required. *(🔴 [F-004](#f-004), 🔴 [F-003](#f-003), 🔴 [F-005](#f-005))*
- **Cross-customer data exfiltration via IDOR** — Resource routes for addresses, orders, payments, wallet, and data-export accept a caller-supplied owner ID from the request body without verifying it matches the authenticated user. Any logged-in user can enumerate all other users' financial and personal records. *(🔴 [F-009](#f-009), 🔴 [F-012](#f-012), 🔴 [F-017](#f-017), 🔴 [F-020](#f-020))*
- **Account takeover via SQL injection in the login route** — `req.body.email` is concatenated directly into a Sequelize raw query at `routes/login.ts:34`. The payload `' OR 1=1--` returns the first row (the seeded admin account) and issues a valid session token for it. *(🔴 [F-008](#f-008))*

</blockquote>

<br/>

No single patch closes this exposure: the JWT key must be rotated and externalized, all resource routes require ownership-scoped queries, and the raw SQL login path must be replaced with parameterized queries before this application can be considered production-grade.

