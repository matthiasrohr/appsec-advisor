**How:** Generate a new RSA key pair (2048-bit minimum): `openssl genrsa -out jwt.pem 2048 && openssl rsa -in jwt.pem -pubout -out jwt.pub`. Remove the hardcoded private key literal from `lib/insecurity.ts`. Load via `process.env.JWT_PRIVATE_KEY` or a mounted secret file, never committed to source. Revoke and re-issue all existing sessions (change key means old tokens are invalid) - coordinate with a rolling deploy. Add a pre-commit hook (e.g. `git-secrets` or `trufflehog`) to block future private key commits.

1. Generate a new RSA key pair (2048-bit minimum): `openssl genrsa -out jwt.pem 2048 && openssl rsa -in jwt.pem -pubout -out jwt.pub`.
2. Remove the hardcoded private key literal from `lib/insecurity.ts`. Load via `process.env.JWT_PRIVATE_KEY` or a mounted secret file, never committed to source.
3. Revoke and re-issue all existing sessions (change key means old tokens are invalid) - coordinate with a rolling deploy.
4. Add a pre-commit hook (e.g. `git-secrets` or `trufflehog`) to block future private key commits.

```javascript
// lib/insecurity.ts
