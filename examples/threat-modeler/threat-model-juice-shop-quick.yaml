#### M-055 — Require authentication token on WebSocket connection before emitting notifications

**Addresses:**

- 🟠 [F-042](#f-042) — Unauthenticated WebSocket connection leaks all challenge flag notifications (`registerWebsocketEvents.ts:30`)

**Priority:** P2 - This Sprint · **Effort:** Medium · **File:** `lib/startup/registerWebsocketEvents.ts:30`

**How:** Add a Socket\.IO `auth` middleware using `io.use((socket, next) => { /* verify socket.handshake.auth.token */ })` to reject unauthenticated connections before any event handlers fire. Scope `challenge solved` notification emit to only the user whose challenge was solved - emit to `socket.join(userId)` rooms rather than broadcasting to all connections. Move flag values out of the notification payload sent to WebSocket clients; the frontend should query a REST endpoint for flag verification rather than receiving it over the broadcast channel.

1. Add a Socket\.IO `auth` middleware using `io.use((socket, next) => { /* verify socket.handshake.auth.token */ })` to reject unauthenticated connections before any event handlers fire.
2. Scope `challenge solved` notification emit to only the user whose challenge was solved - emit to `socket.join(userId)` rooms rather than broadcasting to all connections.
3. Move flag values out of the notification payload sent to WebSocket clients; the frontend should query a REST endpoint for flag verification rather than receiving it over the broadcast channel.

```javascript
// Socket.IO auth middleware
io.use((socket, next) => {
  const token = socket.handshake.auth?.token
  if (!token) return next(new Error('Authentication required'))
  try {
    const user = security.verify(token)
    socket.data.user = user
    next()
  } catch {
    next(new Error('Invalid token'))
  }
})
```

**Reference:** CWE-306

