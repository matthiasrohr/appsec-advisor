assets:
- id: A-001
  name: User Credentials (Email + Password Hash)
  classification: Restricted
  description: User email addresses and MD5-hashed passwords stored in Users table via Sequelize. MD5 makes all passwords trivially reversible via rainbow tables.
  linked_threats:
  - T-004
  - T-005
  - T-012
  - T-023
- id: A-002
  name: RSA Private Signing Key
  classification: Restricted
  description: 1024-bit RSA private key hardcoded in lib/insecurity.ts:23, used to sign all JWTs. Committed to public GitHub repo — permanently compromised.
  linked_threats:
  - T-003
  - T-008
  - T-011
  - T-015
  - T-022
  - T-026
- id: A-003
  name: Payment Card Data (PAN)
  classification: Restricted
  description: Full payment card numbers stored unencrypted in Card.cardNum field via Sequelize. PCI DSS scope — should be tokenized or encrypted at rest.
  linked_threats:
  - T-001
  - T-005
  - T-012
  - T-026
  - T-028
- id: A-004
  name: User PII (Address, Phone, Profile Data)
  classification: Confidential
  description: User addresses, phone numbers, names, and profile images stored in Address and User models. Linked to IDOR vulnerabilities via req.body.UserId pattern.
  linked_threats:
  - T-001
  - T-005
  - T-012
  - T-022
  - T-026
  - T-028
- id: A-005
  name: JWT Session Tokens
  classification: Restricted
  description: RS256 JWTs that authenticate all user sessions. Stored in cookies without httpOnly/secure flags, making them accessible to JavaScript and susceptible to XSS-based theft.
  linked_threats:
  - T-002
  - T-008
  - T-012
  - T-032
- id: A-006
  name: Application Source Code
  classification: Internal
  description: Publicly available on GitHub. Contains intentionally vulnerable code including hardcoded private key, MD5 hashing, SQL injection patterns. Public availability enables offline exploit development.
  linked_threats:
  - T-003
  - T-005
  - T-011
  - T-015
  - T-022
- id: A-007
  name: Security Answer Data
  classification: Confidential
  description: Answers to security questions used for account recovery, stored in SecurityAnswer model. Brute-forceable with no rate limiting on account recovery flows.
  linked_threats: []
- id: A-008
  name: User Wallet Balances
  classification: Confidential
  description: Wallet balances linked to user accounts via WalletModel. Susceptible to IDOR via req.body.UserId manipulation — an attacker can read or manipulate balances of other users.
  linked_threats:
  - T-001
  - T-005
  - T-012
  - T-026
  - T-028
- id: A-009
  name: Application Availability
  classification: Internal
  description: The Juice Shop service itself (port 3000). No rate limiting, DoS-capable endpoints include eval() execution, XML entity expansion, and unzipping of arbitrary archives.
  linked_threats: []
- id: A-010
  name: Uploaded Files and User Media
  classification: Internal
  description: User-uploaded files stored in local filesystem under uploads/ and ftp/. ZIP-slip and XXE vulnerabilities in file upload handler allow writes/reads outside intended directories.
  linked_threats:
  - T-011
  - T-021
  - T-022
  - T-026
  - T-028
