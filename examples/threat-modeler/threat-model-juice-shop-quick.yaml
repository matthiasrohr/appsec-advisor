  impact_description: An attacker with repo read access can sign JWTs for any user role, gaining full application control including admin access and order/payment data for all customers.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the key is in plaintext source
  mitigation_title: Move RSA private key to an environment variable or secrets manager and remove it from source
  remediation:
    effort: Medium
    steps:
    - Remove the hardcoded `privateKey` string from lib/insecurity.ts and load it via `process.env.JWT_PRIVATE_KEY` or a secrets manager (e.g. HashiCorp Vault, AWS Secrets Manager).
    - 'Rotate the key immediately: generate a new RSA-2048+ keypair, deploy the public key to all verification points, and invalidate all existing tokens by changing the key.'
    - Add `JWT_PRIVATE_KEY` to the `.gitignore`-protected secrets file and block future secret commits with `truffleHog` or `gitleaks` in CI.
    - Ensure the key is never logged — audit all `console.log` / error handlers for accidental key serialization.
