<a id="t-045"></a><a id="f-045"></a>
#### F-045 · Client-Side-Only Admin Route Guard Bypassable

**Severity:** 🟠 High  ·  **Component:** [C-01](#c-01) - Angular SPA Frontend  ·  **Location:** `frontend/src/app/app.guard.ts:54`

**Issue:** The `AdminGuard` at `app.guard.ts` line 54 reads the JWT from `localStorage`, decodes it client-side with `jwtDecode`, and checks `payload.data.role === roles.admin`. Because `jwtDecode` does not verify the JWT signature, any attacker who can write an arbitrary JWT to `localStorage` (e.g. via XSS, or by manually crafting a token with `alg:none`) can set `role: 'admin'` in the payload and bypass the Angular route guard, gaining access to the `/administration` panel rendered by `AdministrationComponent`.

Even without JWT forgery, an attacker with console access can call `localStorage.setItem('token', <crafted_token>)` and reload the page. Unauthenticated or low-privilege users can render the full administration panel, viewing all user emails and deleting or viewing all feedback without a valid admin session.

**Evidence:** ✓ verified - `AdminGuard.canActivate()` at line 54 trusts the `role` field in a client-decoded, signature-unverified JWT from localStorage to gate admin UI access.

**Fix:** ❷ [M-058](#m-058) — Enforce admin authorization server-side on every admin API call; treat the Angular route guard as UX-only

**Classification:** Broken Access Control · [CWE-602](https://cwe.mitre.org/data/definitions/602.html) · [OWASP A01:2021](https://owasp.org/Top10/A01_2021/)

