**How:** Replace `window.open(...).document.write(this.userData)` with a `Blob` + `URL.createObjectURL` download trigger that forces the browser to download the file rather than render it: `const blob = new Blob([this.userData], {type: 'text/plain'}); const url = URL.createObjectURL(blob); window.open(url)`. Set the export response `Content-Disposition: attachment; filename="export.json"` on the server side to prevent inline rendering.

