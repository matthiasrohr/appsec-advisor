trust_boundaries:
- id: tb-1
  name: Public Internet to Application
  description: no rate limiter, no authentication at the network level. deployment-time perimeter controls out of scope for source-tree review
  from: external
  to: backend-api
  crossing_protocol: HTTPS
  enforcement: none — the Express server is directly internet-exposed with no network-layer gate
- id: tb-2
  name: Browser SPA to Backend API
  description: Trust boundary between the Angular SPA running in the browser and the Express backend. JWT tokens are stored in cookies without httpOnly/secure flags — JavaScript-accessible and XSS-extractable.
  from: frontend-spa
  to: backend-api
  crossing_protocol: HTTPS + WSS
  enforcement: JWT bearer token (RS256) — but algorithm enforcement is absent and private key is public
- id: tb-3
  name: Application to Data Layer
  description: Trust boundary between Express application code and the SQLite database. Raw SQL queries in login.ts and search.ts bypass the ORM boundary.
  from: backend-api
  to: data-persistence
  crossing_protocol: Sequelize / SQLite file I/O
  enforcement: ORM parameterization (partial) — two routes use raw string-interpolated SQL
- id: tb-4
  name: Application to External Services
  description: Outbound HTTP from the Express backend to user-supplied URLs (SSRF attack surface) and to Google OAuth endpoints. No SSRF controls or URL allowlist.
  from: backend-api
  to: external
  crossing_protocol: HTTPS
  enforcement: none — user-supplied URLs are fetched without validation at routes/profileImageUrlUpload.ts:24
- id: tb-5
  name: File Upload to Filesystem
  description: Trust boundary between the file upload handler and the local filesystem. ZIP extraction uses unzipper without path sanitization (zip-slip). XML parsed with entity expansion enabled.
  from: file-upload-service
  to: external
  crossing_protocol: Node.js fs / stream
  enforcement: none — no path traversal validation, no file type allowlisting on server side
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Authentication
  kind: mechanism
  effectiveness: Unsafe
  assessment: Login at routes/login.ts:34 uses raw string-interpolated SQL — trivially bypassed. Password hashing uses MD5 (lib/insecurity.ts:43) — rainbow-table reversible. No rate limiting on login attempts.
  linked_threats: []
- domain: Identity and Authentication Controls
  control: Google OAuth Social Login
  kind: mechanism
  effectiveness: Weak
  assessment: Frontend-only OAuth adapter — access token is fetched client-side and passed to the backend which maps it to a local MD5-hashed credential. Not a full server-side authorization-code flow. Inherits all password-login weaknesses.
  linked_threats: []
- domain: Session and Token Controls
  control: JWT Session Token Lifecycle
  kind: mechanism
  effectiveness: Unsafe
  assessment: RSA private key hardcoded in lib/insecurity.ts:23. jws.verify() at lib/insecurity.ts:57 accepts alg:none (no algorithms option). insecurity.decode() at :58 decodes without verification. Tokens stored in cookies without httpOnly/secure/sameSite. No token revocation.
  linked_threats: []
- domain: Authorization Controls
  control: JWT Middleware Authorization
  kind: mechanism
  effectiveness: Weak
  assessment: 'expressJwt() isAuthorized() used on authenticated routes, but 21 state-changing routes lack the middleware. IDOR: 42 routes derive owner from req.body.UserId instead of req.user.id. Role check at routes/verify.ts:52 trusts req.body.role (attacker-controlled).'
  linked_threats: []
- domain: Query Construction and Data Access Controls
  control: SQL Query Construction
  kind: mechanism
  effectiveness: Unsafe
  assessment: 'Two critical raw SQL queries use string interpolation: login (routes/login.ts:34) and search (routes/search.ts:23). Remaining routes use Sequelize ORM with parameterized queries but pass attacker-controlled UserId in WHERE clauses.'
  linked_threats: []
- domain: Input Boundary Validation Controls
  control: Input Validation and Sanitization
  kind: mechanism
  effectiveness: Missing
  assessment: No centralized input validation middleware. sanitize-html@1.4.2 in use (severely outdated, multiple bypass CVEs). eval() used in two route handlers (userProfile.ts:62, captcha.ts:22). XML parsed with noent:true (entity expansion). No request schema validation.
  linked_threats: []
- domain: Output Encoding and Rendering Controls
  control: HTML Output Encoding
  kind: mechanism
  effectiveness: Unsafe
  assessment: Angular's DomSanitizer.bypassSecurityTrustHtml() called in 8+ components explicitly bypassing Angular's XSS protection (search-result, about, administration, last-login-ip, data-export, track-result). Product description, feedback, and user email rendered as trusted HTML.
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  kind: mechanism
  effectiveness: Missing
  assessment: No helmet(), no CORS middleware found in lib/. No Content-Security-Policy header. No X-Frame-Options. CSRF protection absent — csrfChallenge in codebase confirms intentional omission.
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Cryptographic Algorithms and Key Management
  kind: mechanism
  effectiveness: Unsafe
  assessment: Password hashing uses MD5 (lib/insecurity.ts:43). RSA private key (1024-bit) hardcoded at lib/insecurity.ts:23. HMAC key hardcoded literal at lib/insecurity.ts:44. Payment cards stored unencrypted. No bcrypt/argon2/PBKDF2 anywhere in codebase.
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: File Upload and Processing Security
  kind: mechanism
  effectiveness: Unsafe
  assessment: XML parsing with {noent:true} at routes/fileUpload.ts:83 enables XXE. ZIP extraction via unzipper without path sanitization (zip-slip). YAML deserialized inside vm sandbox. SSRF via fetch(url) at routes/profileImageUrlUpload.ts:24 with no URL allowlist.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Supply Chain and Dependency Management
  kind: mechanism
  effectiveness: Weak
  assessment: No CVE scanning in CI. No SCA tooling. No Dependabot. GitHub Actions tag-pinned not SHA-pinned (11/13 workflows lack permissions block). Container base images tag-pinned not digest-pinned. Postinstall hook runs nested npm install. package-lock.json NOT committed.
  linked_threats: []
- domain: Real-time and Not Applicable Controls
  control: WebSocket / Socket.IO Authentication
  kind: mechanism
  effectiveness: Missing
  assessment: Socket.IO connections are unauthenticated. lib/startup/registerWebsocketEvents.ts:24 accepts any connection. Challenge notifications broadcast to all connected clients. No per-socket auth token validation.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated dependency updates
  effectiveness: Missing
  kind: lifecycle
  assessment: Automated dependency updates not detected in the repository. Patch-management posture depends on this control being in place — the team is reactive rather than proactive without it.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Lockfile hygiene
  effectiveness: Missing
  kind: lifecycle
  assessment: Lockfile hygiene not detected in the repository. Patch-management posture depends on this control being in place — the team is reactive rather than proactive without it.
  linked_threats: []
