### 🔴 Critical (24)

<a id="t-004"></a><a id="f-004"></a>
#### F-004 · Hardcoded Credentials

**Severity:** 🔴 Critical - secret committed to the public source repo - extractable on clone, no prior access needed  ·  **Component:** [C-06](#c-06) - Authentication & Session Surface  ·  **Location:** `lib/insecurity.ts:23`

**Issue:** The RSA private key used to sign all application JWTs is a literal string in `lib/insecurity.ts:23`, committed to the public repository. Any actor with read access to the repo - including anonymous GitHub users - possesses the private key and can sign arbitrary JWT payloads with `{ role: 'admin', email: 'attacker@evil.com' }`.

The forged token passes `jwt.verify()` and `expressJwt()` because the key is correct. Full authentication bypass for any account, including admin.

An attacker who extracts the key from the public repo can impersonate any user or elevate to administrator without any credentials.

**Root cause:** Authentication can be circumvented or forged because credentials, signing keys, or password hashes are weak, missing, or exposed.

**Evidence:** ✓ verified - `privateKey` is a PEM-encoded RSA private key literal on line 23, immediately used by `security.authorize()` at line 56 to sign every session token issued by the application.

```typescript
// lib/insecurity.ts:23
import * as z85 from 'z85'

export const publicKey = fs ? fs.readFileSync('encryptionkeys/jwt.pub', 'utf8') : 'placeholder-public-key'
const privateKey = '[PEM PRIVATE KEY — REDACTED]

interface ResponseWithUser {
  status?: string
```

**Fix:** Move the credential out of source control into a secret store and rotate it → ❶ [M-042](#m-042) — Move secrets to a managed secret store

**Classification:** Cryptographic Failures · [CWE-798](https://cwe.mitre.org/data/definitions/798.html) · [OWASP A02:2021](https://owasp.org/Top10/A02_2021/)

<a id="t-002"></a><a id="f-002"></a>
#### F-002 · Derived Password OAuth Email Claim

**Severity:** 🔴 Critical  ·  **Component:** [C-01](#c-01) - Angular SPA Frontend  ·  **Location:** `frontend/src/app/oauth/oauth.component.ts:30`

**Issue:** The OAuth implicit flow callback derives the user's local Juice Shop password as `btoa(profile.email.split('').reverse().join(''))`. Because this derivation is deterministic and based solely on the publicly-known email address, any attacker who knows a victim's email can compute the password offline - without possessing a valid OAuth token - and authenticate directly against the `/rest/user/login` endpoint.

The OAuth integration effectively creates a parallel authentication bypass: the password endpoint becomes exploitable as a standalone credential for every Google-OAuth-registered user. Every user who has ever logged in via Google OAuth has a deterministically breakable local password, enabling account takeover without interacting with Google.

**Evidence:** ✓ verified - Line 30 calls `btoa(profile.email.split('').reverse().join(''))` to produce both the initial registration password and the login credential, making account takeover trivially computable from the victim's email.

