  stride: Elevation of Privilege
  cwe: CWE-502
  title: YAML Unsafe Load in Weak vm Sandbox Enables Sandbox Escape — routes/fileUpload.ts:117
  affected_parameter: YAML file upload body (data)
  scenario: 'At line 117 of `fileUpload.ts`, `vm.runInContext(''JSON.stringify(yaml.load(data))'', sandbox, { timeout: 2000 })` executes with a sandbox containing the `yaml` module reference (line 115). The Node.js `vm` module is explicitly documented as not a security sandbox — code within the vm context shares the same V8 heap and can escape via prototype chain traversal: `this.constructor.constructor(''return process'')()`. Additionally, `yaml.load()` (js-yaml v4 default) parses YAML without restrictions; an attacker can supply YAML with the `!!js/undefined` or `!!js/regexp` type constructors, and in js-yaml v3 the `!!js/function` type allows arbitrary JavaScript function execution. If the installed js-yaml version supports `!!js/function`, an attacker''s YAML payload is executed as JavaScript inside the vm context, from which process-level access is one prototype-chain jump away. The 2000ms timeout only limits CPU time, not the escape exploit path.'
  evidence_summary: Line 117 passes the `yaml` module into vm context (line 115) and calls `yaml.load()` (unsafe default schema) inside a Node.js vm — which is not an isolation boundary per Node.js documentation.
  impact_description: A successful vm sandbox escape grants arbitrary code execution as the Node.js process user, enabling full server compromise, credential theft, and lateral movement.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: vm.createContext + runInContext with 2000ms timeout. Partial isolation only — Node.js vm is not a security sandbox.
  mitigation_title: Replace unsafe YAML load and Node.js vm sandbox with safe schema parsing and no sandbox
  remediation:
    effort: Medium
    steps:
    - 'Replace `yaml.load(data)` with `yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })` or `yaml.load(data, { schema: yaml.JSON_SCHEMA })` to restrict parsing to safe YAML types without JavaScript-specific constructors.'
    - Remove the `vm.runInContext` wrapper entirely for YAML parsing — it provides no security isolation and increases attack surface. Call `yaml.load()` directly in the route handler.
    - Apply an input size limit on the YAML buffer before parsing (e.g. reject files > 1 MB) to prevent YAML bomb memory exhaustion.
    - Consider using `yaml.safeLoad()` (js-yaml v3) or the FAILSAFE_SCHEMA (js-yaml v4) which only allows string, sequence, and mapping types.
    code_example: '// Safe YAML parse — restrict schema, no vm wrapper

      import yaml from ''js-yaml''

      const MAX_SIZE = 1 * 1024 * 1024 // 1 MB

      if (data.length > MAX_SIZE) throw new Error(''YAML payload too large'')

      const parsed = yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })

      const yamlString = JSON.stringify(parsed)'
    reference: CWE-502
