            this.login(profile)
```

**Fix:** ❶ [M-040](#m-040) — Replace email-derived password with a cryptographically random credential or use federated-only login without a local password fallback

**Classification:** OAuth / OIDC Misconfiguration · [CWE-522](https://cwe.mitre.org/data/definitions/522.html) · [OWASP A07:2021](https://owasp.org/Top10/A07_2021/)

<a id="t-003"></a><a id="f-003"></a>
#### F-003 · Improper Verification of Cryptographic Signature

**Severity:** 🔴 Critical - elevated as an attack-chain keystone (individual baseline: High)  ·  **Component:** [C-06](#c-06) - Authentication & Session Surface  ·  **Location:** `lib/insecurity.ts:191`

**Issue:** `jwt.verify(token, publicKey, callback)` at `lib/insecurity.ts:191` is called without specifying `algorithms: ['RS256']`. In certain jsonwebtoken versions an attacker can present a token signed with the public key as an HMAC-SHA256 secret (`alg: 'HS256'`).

The library treats the RSA public key as the HMAC secret, verifies successfully, and the application grants the claims in the forged token. The same missing allowlist affects `expressJwt({ secret: publicKey })` at line 54.

An attacker can mint tokens for any user or role without the private key, using only the public key (which is stored in `encryptionkeys/jwt.pub` in the repo).

**Root cause:** Authentication can be circumvented or forged because credentials, signing keys, or password hashes are weak, missing, or exposed.

**Evidence:** ✓ verified - `jwt.verify()` at line 191 passes only two arguments (token, key, callback) - the options object with `algorithms` is absent, leaving the library free to accept any algorithm the token header declares.

```typescript
// lib/insecurity.ts:191
export const updateAuthenticatedUsers = () => (req: Request, res: Response, next: NextFunction) => {
  const token = req.cookies.token || utils.jwtFrom(req)
  if (token) {
    jwt.verify(token, publicKey, (err: Error | null, decoded: any) => {
      if (err === null) {
        if (authenticatedUsers.get(token) === undefined) {
          authenticatedUsers.put(token, decoded)
```

**Fix:** Pin the signature algorithm explicitly and reject `alg:none` and unknown algorithms → ❶ [M-041](#m-041) — Enforce JWT signature and algorithm verification

**Classification:** Broken Authentication · [CWE-347](https://cwe.mitre.org/data/definitions/347.html) · [OWASP A07:2021](https://owasp.org/Top10/A07_2021/)

<a id="t-008"></a><a id="f-008"></a>
#### F-008 · SQL Injection

**Severity:** 🔴 Critical  ·  **Component:** [C-06](#c-06) - Authentication & Session Surface  ·  **Location:** `routes/login.ts:34`

**Issue:** `models.sequelize.query()` at `routes/login.ts:34` interpolates `req.body.email` and `security.hash(req.body.password)` directly into a raw SQL string: `SELECT * FROM Users WHERE email = '${req.body.email || ''}' AND password = '${...}'`. Sending `email = "' OR '1'='1' --"` makes the WHERE clause always true and returns the first row (the seeded admin account).

No parameterized query or ORM-level escaping is applied. The vulnerability was preserved intentionally as a Juice Shop challenge but represents a real critical injection path on the internet-facing login endpoint.

Unauthenticated attacker logs in as any user including admin by injecting SQL that short-circuits the WHERE clause; can also exfiltrate the Users table via UNION SELECT.

**Root cause:** User input flows into a server-side interpreter (SQL, NoSQL, XML, YAML, LDAP, OS shell) without parameterization or schema validation.

**Evidence:** ✓ verified - Raw SQL template literal with direct `req.body.email` interpolation at `routes/login.ts:34` - no bind parameters, no ORM query builder, no sanitization.

```typescript
