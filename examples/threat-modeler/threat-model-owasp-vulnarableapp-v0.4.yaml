tier_root_causes:
  server:
  - deliberate absence of input validation on all injection-vector endpoints
  - hardcoded JWT signing keys and algorithm confusion vulnerabilities
  - unauthenticated H2 console and SMTP test endpoint exposed on Docker network
  - missing permissions blocks on CI workflows allowing full GITHUB_TOKEN scope
  - pull_request_target trigger with write secrets and unpinned actions
  data:
  - H2 web console unauthenticated with web-allow-others=true
  - hardcoded admin/hacker credentials committed in application-unsafe.properties
  - plaintext user pass**** (8 chars)s committed in SQL initialization scripts
