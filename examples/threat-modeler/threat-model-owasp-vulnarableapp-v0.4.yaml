  mitigation_fingerprints:
  - replace string-concatenated sql with parameterized queries using preparedstatement
  - pin jwt algorithm to hs256 or rs256 in the validator and reject alg:none
  - remove hardcoded credentials from application-unsafe.properties and require environment variable injection for all profiles
  - replace raw sql string concatenation with parameterized queries in the authentication service
  - disable h2 web console entirely in non-development deployments and enforce network-level access control for the development
    profile
  - invoke `ping` with an argument array rather than a shell string, and validate input against an ip address allowlist
  - disable doctype declarations and external entity features on all xml parsers; remove the jvm-wide accessexternaldtd=all
    property
  - replace hardcoded jwt signing keys with secrets loaded from environment variables or a secrets manager
  - replace hardcoded database credentials with environment-variable injection and remove credential values from version control
  - implement a strict scheme and hostname allowlist for all outbound url-fetch operations
  - remove credential-harvesting phishing script from the static directory
  - validate the redirect target against a strict allowlist of permitted relative paths or absolute urls before issuing the
    302
  - remove host-port binding for ollama api and restrict to docker-internal network only
  - pin all github actions to full commit sha digests across all workflow files
  - add trivy or owasp dependency-check sca step to gradle.yml and docker.yml
  - html-encode all user-supplied content before inserting it into html contexts using stringescapeutils.escapehtml4
  - apply `filter.encodevalue` escaping to all user-supplied ldap filter components
  - validate uploaded file content type and extension against a strict allowlist before writing to disk
  - implement input validation and system-prompt isolation on the llmforge inference endpoint
  - pin all docker image references to immutable sha256 digests and verify signatures
  - replace innerhtml assignment with textcontent or dompurify.sanitize at vulnerableapp.js:82
  - emit a structured security audit log entry on every login success, failure, and session issuance
  - remove pass**** (8 chars) from log statements; log only username and outcome
  - remove all credential fields from api success responses; never return pass**** (8 chars)s or hashes to clients
  - externalize rsa private keys and keystore pass**** (8 chars)s to environment variables or a secrets manager; do not bundle them
    in the jar
  - remove pass**** (8 chars) hash and algorithm disclosures from all authentication success responses
  - replace credential-in-url git push with github_token or ssh deploy key in stats.yml
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - bind mailpit web ui to localhost only and enable basic authentication for the web interface
  - remove plaintext pass**** (8 chars) values from sql comments and schema files; use hashed seeding or parameterized initialization
  - canonicalize and validate the resolved path against a permitted base directory before reading any file
  - return a single generic error message for all authentication failures regardless of the failure reason
  - migrate all pass**** (8 chars) storage to bcrypt with cost factor >= 12 and re-hash on next login
  - remove ollama host-port binding and store ollama_url in docker secrets rather than plain environment variables
  - add request-rate limiting and progressive account lockout to all authentication endpoints
  - restrict h2 console ddl permissions and enforce jvm heap limits for demo deployments
  - add rate limiting middleware on all authentication endpoints and enforce incremental lockout after repeated failures
  - configure a global multipart file size limit and enforce per-upload size validation in the file-upload controller
  - add per-ip and per-session rate limiting on the nginx facade for /llmforge routes and remove host-port binding for ollama
  - add limit_req_zone and limit_req directives to the nginx facade template for all proxy routes
  - move authorization role to server-side session or a signed/encrypted token; never trust a client-mutable role cookie
  - replace md5 and sha-1 pass**** (8 chars) hashing with bcrypt or argon2id
  - add non-root user directive to dockerfile.base to enforce least-privilege container execution
  - replace pull_request_target with pull_request trigger or add oidc-scoped token with no secrets
  - add explicit minimal permissions blocks to docker.yml, create-release.yml, and gradle.yml
  - restrict h2 exec and file-write functions by disabling them in the jdbc url and run the jvm as a non-root os user
  - 'enforce ownership check on all profile lookups: compare the token''s userid to the requested id before returning data'
  - restrict ollama management api to docker-internal network and add an authenticated reverse proxy for administrative operations
  - restrict smtp relay to the application backend container by disabling accept-any-auth in non-test deployments
  - add proxy_redirect and allowlist validation at nginx for backend 3xx responses
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - 'add `permissions: { contents: read }` at root; per-job elevate to `contents: write` only where needed'
  - enable smtp tls and remove insecure auth allowance for any shared or multi-host deployment
  - enable web ui authentication to protect the mailpit rest api from unauthenticated bulk-delete operations
  - add container security hardening to the mailpit service definition
