  stride: Elevation of Privilege
  cwe: CWE-250
  title: Container Runs as Root No USER Directive — Dockerfile.base:1
  scenario: 'Dockerfile.base (5 lines) contains no USER directive. Docker containers built from this base image run as root
    (uid=0) by default unless the application Dockerfile adds a USER directive later. If a vulnerability in the Java application
    (e.g. a path traversal, deserialization RCE, or SSTI) is exploited, the attacker''s code runs as the container root, maximizing
    the impact within the container: it can read all files, install tools, and in misconfigured environments (privileged containers,
    host-path mounts) escape to the host. The Dockerfile.base is also missing a HEALTHCHECK directive, which reduces the effectiveness
    of container orchestration to detect unhealthy instances — a secondary availability concern.'
  evidence_summary: Dockerfile.base has 5 lines; grep for 'USER' and 'HEALTHCHECK' returns no hits; the container therefore
    inherits the default root user from the eclipse-temurin:17-jre upstream base.
  impact_description: Application RCE within the container executes as root, enabling file system manipulation, credential
    extraction from the container environment, and potential container escape in non-default runtime configurations.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no USER directive in the base image layer.
  mitigation_title: Add non-root USER directive to Dockerfile.base to enforce least-privilege container execution
  remediation:
    effort: Low
    steps:
    - Add a non-root user creation and USER directive to Dockerfile.base before the application startup, e.g. `RUN useradd
      -r -u 1001 -g root appuser && USER appuser`.
    - Verify that the application Dockerfile (if separate from Dockerfile.base) also does not override back to root with a
      subsequent USER directive.
    - Add `HEALTHCHECK CMD curl -f http://localhost:9090/actuator/health || exit 1` (adjust port/path to match the Spring
      Boot actuator endpoint) to enable container orchestration health polling.
    - Test that the application starts successfully with the non-root user and that all required file paths (log directories,
      temp files) are writable by uid=1001.
    code_example: "FROM eclipse-temurin:17-jre@sha256:<digest>\n\nRUN apt-get update && \\\n    apt-get install -y iputils-ping\
      \ && \\\n    rm -rf /var/lib/apt/lists/* && \\\n    useradd -r -u 1001 -g root appuser\n\nHEALTHCHECK --interval=30s\
      \ --timeout=10s --retries=3 \\\n  CMD curl -f http://localhost:9090/actuator/health || exit 1\n\nUSER appuser"
    reference: CWE-250
