    zero sender verification.
  impact_description: Spoofed test emails stored in Mailpit may mislead developers or testers into believing the application
    backend correctly generates certain sender identities when it does not.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: SMTP port 1025 is not host-mapped (expose only); access limited to containers on app_net Docker bridge
    network.
  mitigation_title: Restrict SMTP relay to the application backend container by disabling accept-any-auth in non-test deployments
