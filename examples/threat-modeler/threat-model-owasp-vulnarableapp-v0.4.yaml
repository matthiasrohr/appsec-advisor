  impact_description: A compromised unpinned action (actions/github-script@v7) executing in the pull_request_target privileged
    context can read GH_TRAFFIC_TOKEN and use its scope (issues:write, pull-requests:write) to label issues, add comments,
    and interact with the repository as the bot identity — or pivot to further writes if the token has broader scope.
