  title: SMTP sender identity not verified any container can — docker-compose.yml:86
  affected_parameter: MAIL FROM / FROM header
  scenario: MP_SMTP_AUTH_ACCEPT_ANY=1 causes Mailpit to accept any SMTP AUTH credentials without verification. Any container
    on app_net can open a TCP connection to mailpit:1025 and submit a message with an arbitrary MAIL FROM address — impersonating
    the application backend, an admin user, or any external sender. Since no SPF/DKIM validation is performed on the inbound
    SMTP session, the captured email will reflect the spoofed sender identity exactly as supplied, potentially misleading
    developers reviewing test email output.
