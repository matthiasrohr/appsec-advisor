    as committed literals.
  impact_description: Full administrative access to the H2 database, enabling read/write/drop of all tables including user
    credentials and salary data.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: application-public.properties uses environment variable substitution (${DB_ADMIN_USERNAME}, ${DB_ADMIN_PASSWORD})
    — but the active profile in application.properties (line 15) includes `unsafe`, which loads application-unsafe.properties
    and overrides the public profile values with the hardcoded literals.
  mitigation_title: Remove hardcoded credentials from application-unsafe.properties and require environment variable injection
    for all profiles
