- local_id: java-backend-016
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-639
  title: Insecure Direct Object Reference — IDORVulnerability.java:71
  affected_parameter: id
  scenario: Level 1 of `IDORVulnerability` at lines 65–76 accepts an arbitrary `id` query parameter and returns the profile
    (`id`, `username`, `salary`, `role`) of the user with that ID, with no check that the authenticated token belongs to the
    requested user. An attacker who is logged in (possesses any valid `token_level1` cookie) can enumerate `id=1`, `id=2`,
    … to retrieve every user's salary and role data without any authorization check. Level 2 stores the `userId` in a `userId_level2`
    cookie that is not cryptographically protected, allowing direct manipulation to access other users' profiles.
  evidence_summary: Line 71 calls `fetchUserById(id)` where `id` comes from the request parameter; line 70 only checks that
    the token is decodable, not that `token.userId == id`.
  impact_description: Any authenticated user can retrieve the salary, role, and personal data of every other user in the system
    by iterating the integer `id` parameter.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Level 5 performs a server-side RBAC check using the database role for the authenticated user's ID; that
    level is secure.
  mitigation_title: 'Enforce ownership check on all profile lookups: compare the token''s userId to the requested id before
    returning data'
  remediation:
    effort: Low
    steps:
    - After decoding the token to obtain `tokenUserId`, reject requests where `id != tokenUserId` unless the caller has an
      `ADMIN` role verified server-side from the database (not from a cookie).
    - Remove the `userId_level2` cookie pattern; user identity must come from the signed JWT, not from a tamper-able cookie.
    - Apply the same server-side role lookup pattern used in Level 5 across all levels.
    code_example: "// Enforce ownership\nUser decoded = idorLoginService.decodeToken(cookieToken);\nif (decoded.getUserId()\
      \ != id && !isAdminFromDb(decoded.getUserId())) {\n    return response(\"Access Denied\", false, HttpStatus.FORBIDDEN);\n\
      }"
    reference: CWE-639
