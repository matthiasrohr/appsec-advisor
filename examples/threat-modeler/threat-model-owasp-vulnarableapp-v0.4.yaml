  cwe: CWE-284
  title: Unauthenticated H2 Web Console Allows — application-unsafe.properties:9
  affected_parameter: spring.h2.console.settings.web-allow-ot…
  scenario: 'An attacker on the same Docker network (or any network that can reach port 9090) navigates to http://<host>:9090/VulnerableApp/h2.
    The console presents a login form but imposes no credential check because web-allow-others=true and spring.h2.console.enabled=true
    in application-unsafe.properties (lines 8-9). The attacker connects with the JDBC URL `jdbc:h2:mem:testdb` and any credentials
    (or uses the admin/hacker pair from the properties file). Once connected, the attacker executes arbitrary SQL: SELECT
    on all tables to exfiltrate credentials and salary data, UPDATE to modify role columns, DROP TABLE to destroy demo data,
    or CALL EXEC() / SCRIPT TO to write files through H2''s administrative functions.'
  evidence_summary: application-unsafe.properties:8-9 sets `spring.h2.console.enabled=true` and `web-allow-others=true` with
    no authentication wrapper configured anywhere in the property files.
  impact_description: Arbitrary SQL execution under the admin DB user, enabling full data exfiltration, data destruction,
    schema modification, and potential host file writes via H2 system functions.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: application-public.properties:7-8 sets console.enabled=false and web-allow-others=false — but the `unsafe`
    profile (loaded per application.properties:15) overrides these.
  mitigation_title: Disable H2 web console entirely in non-development deployments and enforce network-level access control
    for the development profile
  remediation:
    effort: Low
    steps:
    - Set spring.h2.console.enabled=false and spring.h2.console.settings.web-allow-others=false in all profiles except explicit
      local-developer profiles; application-public.properties already does this correctly.
    - 'If the console is required for demo/educational purposes, restrict it with Spring Security''s HttpSecurity configuration:
      `http.authorizeHttpRequests().requestMatchers("/h2/**").hasRole("ADMIN")` and `http.headers().frameOptions().sameOrigin()`.'
    - Bind the service to localhost (server.address=127.0.0.1) when running in demo mode, preventing Docker-network lateral
      reach to the console.
    - Document the risk in the project README and add a startup warning log when the unsafe profile is active.
    code_example: "// In SecurityConfig.java — restrict H2 console access\nhttp.authorizeHttpRequests(auth -> auth\n    .requestMatchers(\"\
      /h2/**\").hasRole(\"ADMIN\")\n    .anyRequest().authenticated())\n  .headers(headers -> headers\n    .frameOptions(frame\
