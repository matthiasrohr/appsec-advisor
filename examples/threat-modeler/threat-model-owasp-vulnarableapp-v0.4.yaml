- local_id: nginx-facade-004
  threat_category_id: TH-18
  additional_categories: []
  stride: Spoofing
  cwe: CWE-601
  title: Open redirect pass-through Nginx — Http3xxStatusCodeBasedInjection.java:57
  affected_parameter: Location response header (backend-contr…
  scenario: The Nginx facade acts as a transparent reverse proxy (`proxy_pass`) for all routes to the Java backend (`/VulnerableApp`),
    JSP service (`/jsp`), and PHP service (`/php`). The Java backend deliberately implements open-redirect vulnerability endpoints
    (Http3xxStatusCodeBasedInjection.java) that issue 302 responses with attacker-controlled `Location` headers. Because Nginx
    forwards these 3xx responses unchanged, a victim clicking a link to `http://<facade>/VulnerableApp/openRedirect/LEVEL_1?url=https://evil.com`
    will be redirected to the attacker's domain, appearing to originate from the trusted facade hostname. This can be exploited
    for phishing, OAuth token exfiltration via `redirect_uri`, or credential harvesting.
  evidence_summary: '`Http3xxStatusCodeBasedInjection.java` at `src/main/java/org/sasanlabs/service/vulnerability/openRedirect/`
    implements deliberate open redirect levels; Nginx passes 3xx Location headers to clients without validation.'
  impact_description: Victims are transparently redirected from the trusted facade origin to attacker-controlled URLs, enabling
    phishing campaigns and OAuth token theft.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None at the Nginx layer — CONTROLS confirms no redirect validation; the Java backend implements secure
    versions at higher vulnerability levels (e.g. LEVEL_6+ with allowlist) but lower levels are intentionally open.
  mitigation_title: Add proxy_redirect and allowlist validation at Nginx for backend 3xx responses
  remediation:
    effort: Medium
    steps:
    - In the Nginx template, use `proxy_redirect` to rewrite or intercept backend Location headers before forwarding to clients.
    - For production deployments, implement server-side allowlist validation in the backend (LEVEL_6+ pattern) and disable
      or restrict access to LEVEL_1–5 open redirect endpoints.
    - Consider adding a warning interstitial page that informs users they are leaving the application before following external
      redirects.
    code_example: null
    reference: CWE-601
