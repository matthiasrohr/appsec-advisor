  title: Pull_request_target EoP Privileged CI Execution on — onboard_sasanlabs.yml:4
  affected_parameter: pull_request_target
  scenario: 'An attacker forks the repository and submits a pull request that modifies workflow files or scripts that run
    in the job context. Because onboard_sasanlabs.yml triggers on pull_request_target (line 4) and runs actions/github-script
    steps that use secrets.GH_TRAFFIC_TOKEN (lines 22, 53, 85, 98), the workflow executes in the privileged base-repo context
    with write scopes for issues and pull-requests. Although the current steps only call GitHub REST APIs rather than checking
    out and executing PR head code, any future addition of a checkout step referencing the PR head SHA would immediately become
    a Critical supply-chain code-execution primitive. Even without checkout, a compromised or untrusted actions/github-script@v7
    (unpinned tag, see threat -003) receives the GH_TRAFFIC_TOKEN secret in the privileged context. Additionally, the workflow
    body interpolates context.payload.pull_request.user.login into a comment body (lines 55–56, 73, 100–106) — a PR with a
