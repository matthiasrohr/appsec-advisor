    auth_users WHERE level=1 AND username=''<username>'' AND pass**** (8 chars)=''<pass**** (8 chars)>''`. An attacker supplies `username=admin''
    OR ''1''=''1'' --` and any pass**** (8 chars). The resulting SQL evaluates to always-true for the WHERE clause, returning a row
    and granting authentication as the first matching user without knowing their pass**** (8 chars).'
  evidence_summary: '`authenticateLevel1SQLi` at AuthLoginService.java:42-47 concatenates `username` and `pass**** (8 chars)` directly
    into a SQL string executed via `jdbcTemplate.query(sql, ...)` — no parameterization, no input escaping.'
  impact_description: An unauthenticated attacker bypasses credential verification entirely at LEVEL_1, logging in as any
    user or extracting all user rows from the `auth_users` table.
