    application crashes. Second, `DROP TABLE IF EXISTS auth_users; DROP TABLE IF EXISTS idor_users; DROP TABLE IF EXISTS USERS`
    destroys all demo data, rendering the application non-functional until restarted (in-memory DB means data cannot be recovered
    from disk). Because both datasources use `jdbc:h2:mem:testdb` (application.properties:4 and 9), the admin and application
    contexts share the same in-memory store — a single DROP or OOM attack disrupts all vulnerability modules simultaneously.
  evidence_summary: application.properties:4 and 9 point both datasources to `jdbc:h2:mem:testdb` (shared in-memory store);
    no query timeout or heap guard is configured in any properties file.
