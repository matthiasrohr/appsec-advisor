  title: Cross-Site Scripting — vulnerableApp.js:82
  affected_parameter: responseText (HTML template body)
  scenario: 'The callback at line 82 of vulnerableApp.js passes the raw HTTP response body from `/VulnerableApp/templates/<vulnerability>/<template>.html`
    directly into `detailTitle.innerHTML`. Because Nginx forwards all `Location: /VulnerableApp/...` traffic to the Java backend
    without sanitizing response bodies, any backend path that returns attacker-influenced HTML (e.g. a reflected XSS endpoint
    that also doubles as a template) will be rendered as executable markup in the victim''s browser. The UI loads templates
    dynamically at selection time, so a crafted URL shared with a victim will trigger the injection automatically on page
    interaction.'
  evidence_summary: '`doGetAjaxCall` callback at vulnerableApp.js:82 sets `detailTitle.innerHTML = responseText` with the
    raw server-returned HTML body, bypassing any DOM sanitization.'
  impact_description: Arbitrary JavaScript execution in the victim's browser session, enabling credential theft, session hijacking,
    or further CSRF.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no Content Security Policy is set at the Nginx layer or in the HTML meta tags; no DOMPurify or
    equivalent sanitization wraps the assignment.
  mitigation_title: Replace innerHTML assignment with textContent or DOMPurify.sanitize() at vulnerableApp.js:82
  remediation:
    effort: Low
    steps:
    - Replace `detailTitle.innerHTML = responseText` with `detailTitle.textContent = responseText` when the value is plain
      text, or with `detailTitle.innerHTML = DOMPurify.sanitize(responseText)` when HTML rendering is required.
    - Add a Content-Security-Policy response header at the Nginx layer (`add_header Content-Security-Policy "default-src 'self';
      script-src 'self'" always;`) to block inline script execution as a defence-in-depth measure.
    - Audit all other `innerHTML` assignments in the static JS bundle (60 additional sinks identified) and apply the same
      pattern.
    code_example: '```js

      // Before (vulnerable)

      detailTitle.innerHTML = responseText;


      // After (safe)

