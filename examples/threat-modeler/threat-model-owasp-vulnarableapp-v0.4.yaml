  title: User role stored in non-HttpOnly, client-mutable — IDORLoginController.java:141
  affected_parameter: role_level3 and role_level4 cookies
  scenario: At IDOR Levels 3 and 4, the login response sets a `role_level3` cookie containing the user's role string (e.g.
    `ADMIN`, `USER`) without the `HttpOnly` flag; at Level 4, the role is Base64-encoded but not signed. A browser-side script
    can read the cookie value and modify it. At Level 3, an attacker can directly write `document.cookie = 'role_level3=ADMIN'`
    to claim admin privileges. At Level 4, the Base64 encoding provides no security — the attacker simply re-encodes `ADMIN`
    and overwrites the cookie. The server-side IDOR endpoints then trust the role from this cookie for access decisions.
