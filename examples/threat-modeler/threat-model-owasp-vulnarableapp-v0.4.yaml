- local_id: auth-001
  threat_category_id: TH-02
  additional_categories: []
  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification — JWTValidator.java:104
  affected_parameter: JWT cookie / Authorization header
  scenario: 'Levels 6 and 7 of the JWT module invoke `customHMACNoneAlgorithmVulnerableValidator`. This method decodes the
    JWT header and, if the `alg` field equals the string `none` (case-insensitive), it unconditionally returns `true` without
    checking the signature. An attacker modifies any valid JWT by changing the header''s `alg` to `none`, replaces the payload
    with forged claims (e.g. `admin: true`, elevated `sub`), strips the signature segment, and submits the tampered token.
    The endpoint accepts it as valid.'
  evidence_summary: '`customHMACNoneAlgorithmVulnerableValidator` at JWTValidator.java:104 checks `if (JWTUtils.NONE_ALGORITHM.contentEquals(alg.toLowerCase()))
    { return true; }` — no signature computed, no key used.'
  impact_description: Any unauthenticated party can forge arbitrary JWT claims, including role escalation to admin, by presenting
    a zero-signature `alg:none` token at /VulnerableApp/JWT/LEVEL_6 and LEVEL_7.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the vulnerable validator is intentionally wired for levels 6 and 7.
  mitigation_title: Pin JWT algorithm to HS256 or RS256 in the validator and reject alg:none
  remediation:
    effort: Low
    steps:
    - Replace `customHMACNoneAlgorithmVulnerableValidator` with a parser that validates the `alg` header against a fixed allowlist
      (e.g. `["HS256"]`) before accepting the signature.
    - 'Use Nimbus JOSE+JWT''s `JWSVerifier` with a fixed `JWSAlgorithm` constant — never derive the algorithm from the token
      header: `new MACVerifier(secret)` enforces HS256; a caller-supplied algorithm is never consulted.'
    - Add a unit test asserting that a token with `{"alg":"none"}` is rejected with HTTP 401.
    code_example: "```java\n// Secure validator — algorithm is fixed, never read from header\npublic boolean validateHMACToken(String\
      \ token, byte[] secret) throws Exception {\n    SignedJWT jwt = SignedJWT.parse(token);\n    JWSAlgorithm expected =\
      \ JWSAlgorithm.HS256;\n    if (!jwt.getHeader().getAlgorithm().equals(expected)) {\n        return false;\n    }\n \
      \   JWSVerifier verifier = new MACVerifier(secret);\n    return jwt.verify(verifier);\n}\n```"
    reference: CWE-347
