  cwe: CWE-284
  title: Unauthenticated Mailpit REST API allows bulk message — docker-compose.yml:82
  affected_parameter: DELETE /api/v1/messages
  scenario: The Mailpit REST API is fully accessible on port 8025 with no authentication. The DELETE /api/v1/messages endpoint
    permanently purges all stored messages. Any host-reachable actor — including other developers, CI agents, or an attacker
    who can reach port 8025 — can destroy all captured test emails in a single HTTP request. This eliminates test evidence
    needed for debugging email flows and could allow a malicious insider to cover tracks by deleting emails that were captured
    before a security review.
  evidence_summary: docker-compose.yml line 82 exposes port 8025 on all interfaces with no auth env vars set; Mailpit's unauthenticated
    DELETE /api/v1/messages endpoint is reachable by any host-network client.
  impact_description: All captured test emails permanently deleted by any unauthenticated caller, destroying test evidence
    and potentially concealing security-relevant email transactions.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None.
  mitigation_title: Enable web UI authentication to protect the Mailpit REST API from unauthenticated bulk-delete operations
  remediation:
    effort: Low
    steps:
    - Enable Mailpit UI basic authentication via MP_UI_AUTH_BASIC_USER / MP_UI_AUTH_BASIC_PASS (same fix as email-service-002);
      this applies equally to the REST API.
    - Restrict port 8025 to loopback (127.0.0.1:8025:8025) to reduce the attack surface to local users only.
    code_example: null
    reference: CWE-284
