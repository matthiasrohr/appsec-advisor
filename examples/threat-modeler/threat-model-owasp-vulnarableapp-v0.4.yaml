  title: Mailpit container lacks user namespace restriction and — docker-compose.yml:76
  affected_parameter: container security context
  scenario: 'The mailpit service in docker-compose.yml defines no user: directive, no cap_drop:, no security_opt: [no-new-privileges:true],
    and no read_only: true rootfs. If the axllent/mailpit image runs the process as root (the Docker default when no USER
    is set in the Dockerfile), exploitation of a vulnerability in Mailpit''s HTTP request parsing or SMTP handling — particularly
    through the unauthenticated port-8025 surface — could yield a root shell inside the container. Combined with a Docker
    socket mount (not present here but common in dev environments) or a kernel exploit, this escalates to host root.'
  evidence_summary: 'docker-compose.yml lines 76–93 define the mailpit service with no user:, cap_drop:, security_opt:, or
    read_only: fields.'
  impact_description: A successful exploit of the Mailpit process grants root-level container access, increasing the blast
    radius of any vulnerability in the service.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: No Docker socket mount present; service is isolated on app_net bridge network.
  mitigation_title: Add container security hardening to the mailpit service definition
  remediation:
    effort: Low
    steps:
    - 'Add ''user: "1000:1000"'' to the mailpit service, or verify that the axllent/mailpit image already runs as a non-root
      user and document the UID.'
    - 'Add ''security_opt: [no-new-privileges:true]'' to prevent privilege escalation via setuid binaries.'
    - 'Add ''cap_drop: [ALL]'' to strip all Linux capabilities from the container.'
    - 'Consider adding ''read_only: true'' with a tmpfs mount for /tmp if Mailpit supports it.'
    code_example: "# docker-compose.yml — mailpit service hardening\nmailpit:\n  image: axllent/mailpit:v1.30.1\n  user: \"\
