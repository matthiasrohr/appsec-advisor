  title: Hardcoded H2 Admin Credentials — application-unsafe.properties:2
  affected_parameter: spring.datasource.admin.pass**** (8 chars)
  scenario: An attacker who can reach the H2 web console at /VulnerableApp/h2 (or any HTTP-accessible path on the Docker network)
    opens the console login form and enters the username `admin` and pass**** (8 chars) `hacker`, both committed in plaintext at application-unsafe.properties:1-2.
    Because web-allow-others=true and no authentication layer wraps the console, the attacker authenticates immediately as
    the H2 admin user — gaining full DDL/DML privileges over the shared in-memory database `testdb`. The same credentials
    work over direct JDBC for any process that can reach the JVM.
