  protocol: HTTP
  auth_required: false
  notes: Intentionally vulnerable JWT endpoints exposing algorithm confusion, missing signature verification, weak HMAC secrets,
    and null algorithm bypass.
- entry_point: GET/POST /VulnerableApp/SQLInjection/* — SQL Injection levels
  protocol: HTTP
  auth_required: false
  notes: Error-based, union-based, and blind SQL injection endpoints with direct string concatenation into JdbcTemplate queries.
- entry_point: GET/POST /VulnerableApp/CommandInjection/* — Command Injection levels
  protocol: HTTP
  auth_required: false
  notes: 'OS command injection via Runtime.exec() / ProcessBuilder with user-controlled ipaddress parameter. Profile: unsafe
    only.'
- entry_point: GET/POST /VulnerableApp/SSRF/* — SSRF levels 1-3
  protocol: HTTP
  auth_required: false
  notes: Server-side request forgery via user-controlled URL parameters; fetches arbitrary remote URLs without host allowlist.
- entry_point: POST /VulnerableApp/FileUpload/* — File Upload levels
  protocol: HTTP multipart
  auth_required: false
  notes: File upload endpoints without MIME type validation, filename sanitization, or file size limits.
- entry_point: GET /VulnerableApp/PathTraversal/* — Path Traversal levels
  protocol: HTTP
  auth_required: false
  notes: Path traversal endpoints accepting ../ sequences without normalization; can read arbitrary files.
- entry_point: Ollama HTTP API (port 11434, internal Docker network)
  protocol: HTTP
  auth_required: false
  notes: Unauthenticated Ollama API accessible within Docker bridge network; accepts model inference requests without rate
    limiting.
- entry_point: Mailpit SMTP (port 1025, internal Docker network)
  protocol: SMTP
  auth_required: false
  notes: SMTP service configured with MP_SMTP_AUTH_ACCEPT_ANY=1 and MP_SMTP_AUTH_ALLOW_INSECURE=1; accepts any SMTP submission
    without credential verification.
- entry_point: Mailpit Web UI (port 8025, Docker network)
  protocol: HTTP
  auth_required: false
  notes: Unauthenticated web interface showing all captured emails.
trust_boundaries:
- id: tb-1
  name: Public Internet / Untrusted Network
  description: External boundary separating anonymous internet users from the application. No authentication required on any
    endpoint by design.
  from: external
  to: nginx-facade
  enforcement: None — all endpoints are intentionally unauthenticated for scanner testing
- id: tb-2
  name: Docker Bridge Network (vulnerableapp-facade_net)
  description: Internal Docker network isolating service-to-service communication from direct external access. VulnerableApp
    services communicate on this network.
  from: nginx-facade
  to: java-backend
  enforcement: Docker bridge network isolation (Linux network namespace). No TLS, no mTLS, no authentication between services.
- id: tb-3
  name: Application to H2 In-Memory Database
  description: 'In-process boundary between Spring Boot application logic and the H2 embedded database. Two datasources: admin
    (DDL) and application (queries).'
  from: java-backend
  to: h2-database
  enforcement: JVM process boundary only. H2 console endpoint (port 9090/h2) also exposes the database externally via HTTP
    with web-allow-others=true.
- id: tb-4
  name: Application to LLM Services
  description: HTTP boundary between the Java backend and Ollama/LLMForge services. All communication is unauthenticated within
    the Docker network.
  from: java-backend
  to: llm-service
  enforcement: Docker network isolation only. No authentication, no TLS, no rate limiting.
- id: tb-5
  name: Application to Email Service
  description: SMTP boundary between Java backend and Mailpit. STARTTLS disabled, any authentication accepted.
  from: java-backend
  to: email-service
  enforcement: None — SMTP configured to accept any authentication (MP_SMTP_AUTH_ACCEPT_ANY=1, MP_SMTP_AUTH_ALLOW_INSECURE=1).
- id: tb-6
  name: GitHub Actions to Production Artifacts
  description: CI/CD pipeline trust boundary. Untrusted pull request code can execute with write permissions to GitHub issues
    and PRs via pull_request_target trigger.
  from: external
  to: ci-cd-pipeline
  enforcement: 'GitHub Actions permissions model — CRITICALLY misconfigured: onboard_sasanlabs.yml uses pull_request_target
    with issues:write and pull-requests:write without head-SHA checkout safeguard.'
security_controls:
- domain: IAM
  control: Password-Based Authentication
  effectiveness: Weak
  notes: Authentication via IDOR module (IDORLoginService.java) uses bcrypt for pass**** (8 chars) hashing but exposes authentication
    bypass at LEVEL_1-8. No central auth guard on vulnerability endpoints — all routes intentionally unauthenticated.
- domain: Session and Token Controls
  control: Session Token Validation (JWT Based)
  effectiveness: Weak
