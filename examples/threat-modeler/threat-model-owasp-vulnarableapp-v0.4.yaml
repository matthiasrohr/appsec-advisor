    Base64 encoding — trivially reversible — with no HMAC or digital signature.'
  impact_description: Any user on the same browser can escalate their role to ADMIN by writing the role cookie value, bypassing
    any role-based access control enforced by endpoints that read from this client-controlled cookie.
