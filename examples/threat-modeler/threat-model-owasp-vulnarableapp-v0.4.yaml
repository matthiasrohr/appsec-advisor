- local_id: ci-cd-pipeline-006
  threat_category_id: TH-14
  additional_categories:
  - TH-16
  stride: Information Disclosure
  cwe: CWE-532
  title: GH_TRAFFIC_TOKEN Embedded in Git Remote URL Credential Exposure — stats.yml:92
  affected_parameter: TOKEN
  scenario: 'stats.yml line 92 constructs a git push command that embeds the GH_TRAFFIC_TOKEN secret directly in the HTTPS
    remote URL: `git push "https://preetkaran20:${TOKEN}@github.com/SasanLabs/VulnerableApp.git" HEAD:master`. When GitHub
    Actions runner command output is logged — which it is by default unless `add-mask` is used — the expanded URL containing
    the token value appears in the workflow run log. Any user with read access to the repository (all public repository visitors)
    can view this log and extract the token. The token is also hardcoded to a specific username (`preetkaran20`), coupling
    the CI credential to an individual account rather than a machine identity.'
  evidence_summary: Line 92 of stats.yml uses `git push "https://preetkaran20:${TOKEN}@github.com/..."` in a `run:` step;
    the TOKEN env var is set from secrets.GH_TRAFFIC_TOKEN at line 85; no `::add-mask::` call precedes the push command.
  impact_description: 'The GH_TRAFFIC_TOKEN value appears in public workflow run logs, enabling any visitor to extract the
    token and gain whatever repository write scope it carries — at minimum `contents: write` (required for pushing to master).'
  likelihood: High
  impact: High
  risk: High
  controls_in_place: GitHub Actions automatically masks secrets.* values in logs when referenced via ${{ secrets.X }} syntax,
    but this token flows through a `run:` env var named TOKEN — it is not automatically masked by GitHub's redaction at the
    URL level when embedded in a git remote URL.
  mitigation_title: Replace credential-in-URL git push with GITHUB_TOKEN or SSH deploy key in stats.yml
  remediation:
    effort: Low
    steps:
    - 'Replace the `git push` with `git push origin HEAD:master` after configuring the checkout step to use the GITHUB_TOKEN:
      in the checkout step set `token: ${{ secrets.GITHUB_TOKEN }}` and `persist-credentials: true`, then remove the `token:
      ${{ secrets.GH_TRAFFIC_TOKEN }}` override.'
    - 'Add `permissions: contents: write` to the job so GITHUB_TOKEN has the required scope instead of using GH_TRAFFIC_TOKEN.'
    - If GH_TRAFFIC_TOKEN is needed for the GitHub API calls (cross-repo traffic fetching), keep it only in the `env:` blocks
      for those steps and never interpolate it into a git remote URL.
    - 'Add `run: echo ''::add-mask::${{ secrets.GH_TRAFFIC_TOKEN }}''` as the first step of the job to ensure the token is
      redacted from all log output even if it appears in command output.'
    - Rotate GH_TRAFFIC_TOKEN immediately given the high likelihood it has been exposed in historical workflow run logs for
      this public repository.
    code_example: '# Replace line 92:

      # BEFORE:

      git push "https://preetkaran20:${TOKEN}@github.com/SasanLabs/VulnerableApp.git" HEAD:master


      # AFTER: use the built-in GITHUB_TOKEN with a permissions block

      # In job:

      # permissions:

      #   contents: write

      # In checkout step:

      # token: ${{ secrets.GITHUB_TOKEN }}

      git push origin HEAD:master'
    reference: CWE-532
