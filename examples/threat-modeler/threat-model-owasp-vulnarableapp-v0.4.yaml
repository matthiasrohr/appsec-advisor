- local_id: ci-cd-pipeline-002
  threat_category_id: TH-06
  additional_categories:
  - TH-14
  stride: Elevation of Privilege
  cwe: CWE-862
  title: Missing Workflow Permissions Block Implicit Full GITHUB_TOKEN — docker.yml:12
  scenario: 'An attacker who achieves code execution in any step of docker.yml, create-release.yml, or gradle.yml — for example
    by poisoning one of the 19 unpinned GitHub Actions (see threat -003) — gains the full repository default GITHUB_TOKEN
    scope. Because none of these three workflow files contains a top-level or job-level permissions: block, GitHub applies
    the repository default (historically read-write on all scopes for legacy repos). A compromised step can push commits,
    create or delete releases, read and write packages, and invoke the GitHub REST API with write authority. The blast radius
    of any supply-chain compromise in these workflows is therefore maximal.'
  evidence_summary: grep for 'permissions' across docker.yml, create-release.yml, and gradle.yml returns zero hits; all three
    workflows use the full inherited default GITHUB_TOKEN scope.
  impact_description: A poisoned build step in any of these three high-privilege workflows can push malicious commits to master,
    overwrite Docker images, or delete GitHub releases — directly compromising production artifacts.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — no permissions block present in any of the three affected workflows.
  mitigation_title: Add explicit minimal permissions blocks to docker.yml, create-release.yml, and gradle.yml
  remediation:
    effort: Low
    steps:
    - 'Add a top-level `permissions: read-all` to each workflow file as a deny-by-default baseline, then add only the specific
      scopes required for each job (e.g. `contents: write` in docker.yml for the tagger step, `packages: write` for Docker
      push).'
    - 'For gradle.yml (CI only), set `permissions: contents: read` — it needs no write scope.'
    - 'For docker.yml, set `permissions: contents: write` (for tagging) and no other scopes.'
    - 'For create-release.yml, set `permissions: contents: write` for the GitHub release creation only.'
    - Audit the GH_TRAFFIC_TOKEN secret usage in stats.yml — it authenticates git push via URL at line 92, which is separate
      from GITHUB_TOKEN but is an additional long-lived credential with write access to the repo.
    code_example: "# Minimal permissions for a build-only workflow (gradle.yml)\npermissions:\n  contents: read\n\n# For docker.yml\
      \ with tagging + push:\npermissions:\n  contents: write   # for github-tagger action\n  packages: read    # Docker Hub\
      \ is external; GITHUB_TOKEN not needed for packages"
    reference: CWE-862
  evidence:
