  stride: Information Disclosure
  cwe: CWE-319
  title: SMTP cleartext transmission with insecure auth enabled — docker-compose.yml:87
  affected_parameter: MP_SMTP_AUTH_ALLOW_INSECURE
  scenario: MP_SMTP_AUTH_ALLOW_INSECURE=1 disables TLS requirements on the SMTP listener at port 1025. SMTP sessions — including
    AUTH LOGIN/PLAIN exchanges and full message bodies — are transmitted in cleartext over the Docker bridge network. On a
    single-host deployment this is low risk, but in multi-host Docker Swarm or overlay network deployments, or if a container
    on app_net is compromised, an attacker can capture all SMTP traffic with a simple network sniffer, harvesting both SMTP
    credentials and full email content (including pass**** (8 chars) reset tokens and OTPs).
  evidence_summary: docker-compose.yml line 87 sets MP_SMTP_AUTH_ALLOW_INSECURE=1, disabling TLS enforcement on the SMTP port.
  impact_description: SMTP AUTH credentials and complete email bodies (including sensitive tokens) exposed in cleartext to
    any observer on the Docker network.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: SMTP port is expose-only (not host-mapped); traffic confined to Docker bridge network on single-host
    deployments.
  mitigation_title: Enable SMTP TLS and remove insecure auth allowance for any shared or multi-host deployment
  remediation:
    effort: Medium
    steps:
    - Remove MP_SMTP_AUTH_ALLOW_INSECURE=1 from docker-compose.yml.
    - Configure a TLS certificate for Mailpit's SMTP listener using MP_SMTP_TLS_CERT and MP_SMTP_TLS_KEY environment variables,
      or generate a self-signed cert for local dev use.
    - Update the application backend's SMTP client configuration to require STARTTLS or SMTPS when connecting to the Mailpit
      relay.
    code_example: null
    reference: CWE-319
  evidence:
  - file: docker-compose.yml
    line: 87
  evidence_check: verified
