- id: T-026
  stride_category: Elevation of Privilege
  title: Administration route accessible via client side guard bypass app.routing.ts
  scenario: 'The administration route is protected only by `AdminGuard` on the client side. An attacker who forges a JWT with
    `role: admin` (using the hardcoded RSA key) and stores it in localStorage can navigate directly to `/#/administration`
    and view all users, delete feedback, and manage the application. No server-side admin check protects the admin API endpoints
    for user listing.'
  cwe: CWE-306
  likelihood: High
  impact: High
  risk: High
  component: angular-spa
  evidence:
  - file: frontend/src/app/app.routing.ts
    line: 1
    excerpt: 'canActivate: [AdminGuard] // client-side only check'
  source: stride
  mitigation_ids:
  - M-010
  remediation:
    steps:
    - Add server-side role validation middleware for all /api/Users GET and admin API calls
    code_example: app.get('/api/Users', security.isAuthorized(), security.isAdmin())
    reference: https://owasp.org/www-project-top-ten/2021/A01_2021-Broken_Access_Control
    effort: Medium
  component_name: Angular SPA Frontend
  stride: Elevation of Privilege
