  scenario: 'An authenticated user sends `POST /profile/image/url` with `{"imageUrl": "http://169.254.169.254/latest/meta-data/"}`.
    The handler at profileImageUrlUpload.ts:24 calls `fetch(url)` without any URL validation, allowlist, or DNS rebinding
    protection. The response (AWS metadata or internal service data) is written to the uploads directory. In cloud deployments,
    this exposes IAM credentials. The attacker can also target internal services on non-routable networks.'
