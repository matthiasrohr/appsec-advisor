trust_boundaries:
- id: tb-1
  name: Public Internet — untrusted
  description: All external users, attackers, and unauthenticated HTTP clients. No trust. CORS wildcard allows cross-origin
    requests from any origin.
  from: external
  to: express-backend
  enforcement: None (CORS wildcard; deployment-time perimeter controls out of scope for source-tree review
  crossing_controls:
  - Helmet minimal headers
  - Rate limit on 3 endpoints only
- id: tb-2
  name: Authentication Boundary
  description: Boundary enforced by JWT middleware (express-jwt 0.1.3). Bypassable via alg:none, hardcoded RSA key forgery,
    or CORS exploitation.
  from: angular-spa
  to: express-backend
  enforcement: express-jwt isAuthorized() on selected endpoints — not applied consistently
  crossing_controls:
  - JWT RS256 verification (bypassable)
  - express-jwt 0.1.3
- id: tb-3
  name: Application to Data Tier
  description: Express backend to SQLite and MarsDB. Raw SQL queries bypass Sequelize ORM parameterization. No connection-level
    encryption.
  from: express-backend
  to: data-layer
  enforcement: Local process-level isolation (SQLite file); MarsDB in-memory
  crossing_controls:
  - Sequelize ORM (partially bypassed by raw queries)
- id: tb-4
  name: Browser Security Boundary
  description: Angular SPA runs in browser. XSS attacks can exfiltrate localStorage tokens. bypassSecurityTrustHtml() calls
    disable Angular's DomSanitizer protections.
  from: external
  to: angular-spa
  enforcement: Angular DomSanitizer (deliberately bypassed in multiple components)
  crossing_controls:
  - Angular DomSanitizer (4 bypasses)
  - localStorage for JWT
- id: tb-5
  name: B2B API Auth Boundary
  description: B2B endpoint requires JWT. However JWT is forgeable. Authenticated B2B endpoint enables RCE via safeEval bypass.
  from: external
  to: b2b-api
  enforcement: express-jwt isAuthorized() — bypassable via JWT forgery
  crossing_controls:
  - JWT validation (bypassable)
- id: tb-6
  name: File System Boundary
  description: Application reads/writes local filesystem. SSRF writes arbitrary URLs to uploads directory. Directory listing
    exposes sensitive files in /ftp/ and /encryptionkeys/.
  from: express-backend
  to: file-upload-service
  enforcement: None — no sandboxing of filesystem operations
  crossing_controls:
  - File extension checks (bypassable via null byte)
