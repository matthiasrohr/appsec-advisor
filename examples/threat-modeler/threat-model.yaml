- id: T-028
  stride_category: Spoofing
  title: Open redirect routes/redirect.ts
  scenario: An attacker crafts a URL like `/redirect?to=https://evil.com%2F..%2Fjuice-shop.com` to bypass the allowlist check
    in `isRedirectAllowed()`. When a victim clicks a link from the Juice Shop domain, they are redirected to the attacker-controlled
    site. Used for phishing.
  cwe: CWE-601
  likelihood: Medium
  impact: Medium
  risk: Medium
  component: express-backend
  evidence:
  - file: routes/redirect.ts
    line: 17
    excerpt: res.redirect(toUrl)
  source: stride
  mitigation_ids:
  - M-002
  remediation:
    steps:
    - Enforce strict origin check before redirect
    - Use an indexed allowlist instead of substring match
    code_example: const allowlist = new Set(['https://www.owasp.org', ...]); if (!allowlist.has(toUrl)) return res.status(406).end();
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html
    effort: Low
  component_name: Express Backend API
