  verified_chain_ids: []
- id: T-022
  stride_category: Information Disclosure
  title: Log file and FTP directory public exposure server.ts
  scenario: The `/support/logs/` endpoint at server.ts:281 serves the logs directory with directory listing enabled. The `/ftp/`
    endpoint at server.ts:269 similarly exposes all FTP files. An attacker can browse and download access logs (exposing all
    user activities, email addresses, and auth attempts) and FTP files including acquisition documents.
  cwe: CWE-548
  likelihood: High
  impact: High
  risk: High
  component: express-backend
  evidence:
  - file: server.ts
    line: 281
    excerpt: 'app.use(''/support/logs'', serveIndexMiddleware, serveIndex(''logs'', { icons: true, view: ''details'' }))'
  source: stride
  mitigation_ids:
  - M-006
  remediation:
    steps:
    - Require authentication for /support/logs/
    - Remove public directory listing from /ftp/
    code_example: app.use('/support/logs', security.isAdmin(), serveIndexMiddleware, serveIndex('logs', ...))
    reference: https://owasp.org/www-project-top-ten/2021/A05_2021-Security_Misconfiguration
    effort: Low
  component_name: Express Backend API
  stride: Information Disclosure
  vektor: internet-anon
