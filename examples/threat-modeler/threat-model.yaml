tier_root_causes:
  edge:
  - Wildcard CORS allows cross-origin credential exfiltration from any domain
  - No Content Security Policy on main application responses
  - CSRF protection absent from state-changing endpoints
  server:
  - Raw SQL string interpolation in login and search routes enables injection
  - Hardcoded RSA private key enables JWT forgery by any source-code reader
  - Eval-based code execution in B2B order and user profile routes
  - Intentionally pinned vulnerable JWT/auth library versions
  - No rate limiting on authentication endpoints enables brute force
  data:
  - MD5 password hashing without salt enables instant offline cracking
  - NoSQL $where operator with unsanitized input exposes all order records
  - IDOR in data export allows any user to access any other user data
