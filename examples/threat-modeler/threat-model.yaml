- id: T-032
  stride_category: Information Disclosure
  title: Sensitive files accessible via null byte bypass routes/fileServer.ts
  scenario: The FTP file server at fileServer.ts checks `endsWithAllowlistedFileType()` for .md and .pdf. An attacker sends
    `GET /ftp/eastere.gg%00.md` — after `cutOffPoisonNullByte()`, the `.md` extension check passes but the null byte was already
    stripped, serving `eastere.gg`. Non-text secret files and backup archives become accessible.
  cwe: CWE-23
  likelihood: Medium
  impact: Medium
  risk: Medium
  component: express-backend
  evidence:
  - file: routes/fileServer.ts
    line: 19
    excerpt: file = security.cutOffPoisonNullByte(file)
  source: stride
  mitigation_ids:
  - M-007
  remediation:
    steps:
    - Validate file extension AFTER null byte stripping
    - Use a strict allowlist with exact filename validation
    code_example: const clean = security.cutOffPoisonNullByte(file); if (!endsWithAllowlistedFileType(clean)) return res.status(403).end();
    reference: https://cwe.mitre.org/data/definitions/23.html
    effort: Low
  component_name: Express Backend API
  stride: Information Disclosure
  vektor: internet-anon
  evidence_check: verified
  effective_severity: Medium
  breach_distance: 1
  chain_role: none
