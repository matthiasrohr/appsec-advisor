  stride_category: Information Disclosure
  title: Database schema disclosure via SQLite master table routes/search.ts
  scenario: The search SQL injection at search.ts:27 enables `UNION SELECT sql FROM sqlite_master` queries, returning the
    complete database schema including all table names, column names, and constraints. This reconnaissance step makes subsequent
    injection attacks more efficient and targeted.
