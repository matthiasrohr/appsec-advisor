  verified_chain_ids: []
- id: T-025
  stride_category: Denial of Service
  title: No rate limiting on login endpoint server.ts
  scenario: The `POST /rest/user/login` endpoint has no rate limiting (server.ts:343 only limits password reset). An attacker
    can run unlimited credential stuffing attacks against any user account. With MD5 password hashing (no salt, fast), brute-force
    via rainbow tables is feasible.
  cwe: CWE-307
  likelihood: High
  impact: High
  risk: High
  component: express-backend
  evidence:
  - file: server.ts
    line: 343
    excerpt: app.use('/rest/user/reset-password', rateLimit({...})) // only reset-password is rate limited
  source: stride
  mitigation_ids:
  - M-008
  remediation:
    steps:
    - Add rate limiting to POST /rest/user/login
    - Implement account lockout after N failed attempts
    code_example: 'app.use(''/rest/user/login'', rateLimit({ windowMs: 15*60*1000, max: 10 }))'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
    effort: Low
  component_name: Express Backend API
  stride: Denial of Service
  vektor: internet-anon
  evidence_check: verified
  effective_severity: High
