components:
- id: express-backend
  name: Express Backend API
  description: Node.js/Express REST API server handling authentication, business logic, file processing, and B2B integrations.
    Entry point for all API requests. Contains intentional vulnerabilities across all OWASP Top 10 categories.
  tier: application
  paths:
  - server.ts
  - app.ts
  - routes/
  - lib/
  - models/
  - data/
  - views/
  technology: Node.js 20-24, Express 4.22, TypeScript, Sequelize 6, MarsDB
  interfaces:
  - REST API on port 3000
  - WebSocket via Socket.IO
  - Static file serving
  threat_ids:
  - T-002
  - T-014
  - T-016
  - T-017
  - T-019
  - T-022
  - T-023
  - T-025
  - T-027
  - T-028
  - T-029
  - T-030
  - T-031
  - T-032
  - T-033
  - T-034
- id: angular-spa
  name: Angular SPA Frontend
  description: Angular 20 single-page application providing the user interface. Contains client-side only authorization guards
    that can be bypassed. Uses localStorage for JWT token storage.
  tier: client
  paths:
  - frontend/src/
  - frontend/dist/
  technology: Angular 20, TypeScript, Angular Material
  interfaces:
  - Browser HTTP/HTTPS
  - WebSocket
  - localStorage
  threat_ids:
  - T-011
  - T-012
  - T-013
  - T-018
  - T-026
- id: data-layer
  name: Data Persistence Layer
  description: SQLite database via Sequelize ORM and MarsDB in-memory NoSQL store. SQLite stores users, products, orders,
    and all relational data. MarsDB stores reviews and order history. Contains intentional SQL injection vulnerabilities via
    raw queries.
  tier: data
  paths:
  - models/
  - data/datacreator.ts
  - data/mongodb.ts
  - data/static/
  - routes/search.ts
  - routes/login.ts
  - routes/trackOrder.ts
  technology: SQLite, Sequelize 6, MarsDB
  interfaces:
  - Sequelize ORM queries
  - Raw SQL via sequelize.query()
  - MarsDB NoSQL $where operator
  threat_ids:
  - T-003
  - T-010
  - T-020
  - T-021
- id: file-upload-service
  name: File Upload Service
  description: Handles multi-format file uploads including ZIP, XML, YAML, and image files. XML upload uses libxmljs2 with
    noent:true enabling XXE. Profile image URL upload enables SSRF via unrestricted fetch(). All upload paths are intentionally
    vulnerable.
  tier: application
  paths:
  - routes/fileUpload.ts
  - routes/profileImageUrlUpload.ts
  - routes/profileImageFileUpload.ts
  - routes/memory.ts
  technology: Multer, libxmljs2, node:vm, js-yaml
  interfaces:
  - POST /file-upload (XML/ZIP/YAML)
  - POST /profile/image/url (SSRF)
  - POST /profile/image/file
  - POST /rest/memories
  threat_ids:
  - T-004
  - T-005
  - T-015
  - T-024
- id: b2b-api
  name: B2B API and Auth Layer
  description: B2B order processing endpoint with RCE via vm.runInContext/safeEval. JWT authentication infrastructure including
    hardcoded RSA private key, alg:none bypass via vulnerable jsonwebtoken 0.4.0, and SSTI via eval() in username rendering.
  tier: application
  paths:
