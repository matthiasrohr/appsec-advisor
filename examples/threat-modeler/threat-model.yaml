- id: T-024
  stride_category: Information Disclosure
  title: Unrestricted file upload overwrites application assets routes/profileImageFileU…
  scenario: The profile image file upload at `POST /profile/image/file` stores uploaded files as `<userId>.<ext>` in `frontend/dist/frontend/assets/public/images/uploads/`.
    If an attacker can control the file extension (via Content-Type manipulation), they can overwrite existing asset files.
    Combined with the SSRF vector (T-005), the attacker can replace legitimate JavaScript assets with malicious ones served
    to other users.
  cwe: CWE-434
  likelihood: Medium
  impact: High
  risk: High
  component: file-upload-service
  evidence:
  - file: routes/profileImageUrlUpload.ts
    line: 31
    excerpt: const ext = ['jpg', 'jpeg', 'png', 'svg', 'gif'].includes(url.split('.').slice(-1)[0])
  source: stride
  mitigation_ids:
  - M-018
  remediation:
    steps:
    - Validate file type using magic bytes, not extension
    - Store uploads outside the web root
    - Use random UUIDs as filenames
    code_example: import { fileTypeFromBuffer } from 'file-type'; const type = await fileTypeFromBuffer(buffer); if (!['image/jpeg','image/png'].includes(type?.mime))
      throw new Error('Invalid file type');
    reference: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
    effort: Medium
  component_name: File Upload Service
  stride: Information Disclosure
