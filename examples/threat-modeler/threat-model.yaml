- id: T-027
  stride_category: Elevation of Privilege
  title: CSRF on password change routes/changePassword.ts
  scenario: The `GET /rest/change-password?current=old&new=new&repeat=new` endpoint accepts passwords in query parameters
    and has no CSRF protection. An attacker can embed an img tag `<img src='/rest/change-password?current=&new=evil&repeat=evil'>`
    on any page the victim visits. Since the browser sends the `token` cookie automatically, the victim's password is changed.
  cwe: CWE-352
  likelihood: Medium
  impact: High
  risk: High
  component: express-backend
  evidence:
  - file: routes/changePassword.ts
    line: 14
    excerpt: const currentPassword = query.current as string
  source: stride
  mitigation_ids:
  - M-009
  remediation:
    steps:
    - Implement CSRF token validation
    - Move parameters from query string to request body
    - Require re-authentication for password changes
    code_example: app.put('/rest/change-password', csrf(), security.isAuthorized(), changePassword())
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Request_Forgery_Prevention_Cheat_Sheet.html
    effort: Medium
  component_name: Express Backend API
  stride: Elevation of Privilege
