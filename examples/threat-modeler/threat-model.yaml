- id: T-021
  stride_category: Information Disclosure
  title: NoSQL injection via $where operator routes/trackOrder.ts
  scenario: 'The order tracking endpoint constructs a MarsDB query `$where: \`this.orderId === ''${id}''\`` with unsanitized
    user input at trackOrder.ts:18. An attacker sends `GET /track-result/1'' || ''a'' == ''a` — the $where JavaScript expression
    evaluates to true for all documents, returning all orders from all users.'
  cwe: CWE-943
  likelihood: High
  impact: High
  risk: High
  component: data-layer
  evidence:
  - file: routes/trackOrder.ts
    line: 18
    excerpt: 'db.ordersCollection.find({ $where: `this.orderId === ''${id}''` })'
  source: stride
  mitigation_ids:
  - M-013
  remediation:
    steps:
    - 'Replace $where JavaScript operator with safe field comparison: `find({ orderId: id })`'
    - Validate orderId format with strict regex before use
    code_example: 'db.ordersCollection.find({ orderId: String(id).replace(/[^\w-]/g, '''') })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html
    effort: Low
  component_name: Data Persistence Layer
  stride: Information Disclosure
  vektor: internet-anon
  evidence_check: verified
  effective_severity: Critical
  breach_distance: 2
  chain_role: keystone
  compound_chain_ids:
