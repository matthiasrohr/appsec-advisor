- id: T-006
  stride_category: Information Disclosure
  title: MD5 password hashing enables offline cracking lib/insecurity.ts
  scenario: All passwords are stored as unsalted MD5 hashes (`crypto.createHash('md5').update(data).digest('hex')` at insecurity.ts:43).
    When an attacker obtains the Users table via SQL injection (T-003 or T-002), they can recover all passwords in minutes
    using rainbow tables (MD5 is fully broken, lookup tables exist for billions of common passwords) or GPU cracking at >10B
    hashes/second.
  cwe: CWE-916
  likelihood: High
  impact: Critical
  risk: Critical
  component: b2b-api
  evidence:
  - file: lib/insecurity.ts
    line: 43
    excerpt: 'export const hash = (data: string) => crypto.createHash(''md5'').update(data).digest(''hex'')'
  source: stride
  mitigation_ids:
  - M-014
  remediation:
    steps:
    - Replace MD5 with bcrypt (cost factor 12+) or Argon2id
    - Force password reset for all users after migration
    code_example: 'import bcrypt from ''bcrypt''; export const hash = async (p: string) => bcrypt.hash(p, 12);'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
    effort: Medium
