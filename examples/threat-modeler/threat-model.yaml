- id: T-023
  stride_category: Information Disclosure
  title: IDOR in data export routes/dataExport.ts
  scenario: 'An authenticated user sends `POST /rest/user/data-export` with `{"UserId": 2}` in the request body. The route
    at dataExport.ts:26 uses `req.body.UserId` directly without checking if it matches the authenticated user''s ID. The attacker
    exports any user''s memories and order history.'
  cwe: CWE-639
  likelihood: High
  impact: High
  risk: High
  component: express-backend
  evidence:
  - file: routes/dataExport.ts
    line: 26
    excerpt: 'memories = await MemoryModel.findAll({ where: { UserId: req.body.UserId } })'
  source: stride
  mitigation_ids:
  - M-005
  remediation:
    steps:
    - Replace req.body.UserId with the authenticated user's ID from the JWT
    code_example: 'const userId = loggedInUser.data.id; memories = await MemoryModel.findAll({ where: { UserId: userId } });'
    reference: https://owasp.org/www-project-top-ten/2021/A01_2021-Broken_Access_Control
    effort: Low
  component_name: Express Backend API
