- id: T-029
  stride_category: Tampering
  title: Basket manipulation via forged BasketId routes/basketItems.ts
  scenario: An attacker adds items to another user's basket by sending `POST /api/BasketItems` with a different `BasketId`
    than their own. The check in basketItems.ts uses loose equality (`!=`) and parses the raw JSON body via `parseJsonCustom()`
    — sending a duplicate `BasketId` key bypasses the ownership check because `basketIds[basketIds.length-1]` is used.
  cwe: CWE-639
  likelihood: Medium
  impact: Medium
  risk: Medium
  component: express-backend
  evidence:
  - file: routes/basketItems.ts
    line: 42
    excerpt: if (user && basketIds[0] && basketIds[0] !== 'undefined' && Number(user.bid) != Number(basketIds[0]))
  source: stride
  mitigation_ids:
  - M-004
  remediation:
    steps:
    - Use strict equality
    - Validate BasketId ownership server-side against the authenticated user's bid
    code_example: 'if (user.bid !== parseInt(req.body.BasketId)) return res.status(401).json({error: ''Unauthorized basket
      access''});'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Insecure_Direct_Object_Reference_Prevention_Cheat_Sheet.html
    effort: Low
  component_name: Express Backend API
  stride: Tampering
