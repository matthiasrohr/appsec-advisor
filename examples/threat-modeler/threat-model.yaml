threats:
- id: T-001
  stride_category: Spoofing
  title: JWT forgery via hardcoded RSA private key lib/insecurity.ts
  scenario: 'The RSA private key is hardcoded at lib/insecurity.ts:23 and committed to the public GitHub repository. Any attacker
    with access to the source code can use `jwt.sign({ data: { id: 1, email: ''admin@juice-sh.op'', role: ''admin'' } }, privateKey,
    { algorithm: ''RS256'' })` to create a valid administrative JWT. This gives full admin access to all API endpoints requiring
    authentication.'
  cwe: CWE-321
  likelihood: Critical
  impact: Critical
  risk: Critical
  component: b2b-api
  evidence:
  - file: lib/insecurity.ts
    line: 23
    excerpt: const privateKey = '[PEM PRIVATE KEY — REDACTED]\r\nMIICXAIBAAKBgQDNwqLEe9wgTXCbC7+RPdDbBbe...'
  source: stride
  mitigation_ids:
  - M-020
  remediation:
    steps:
    - Generate new RSA keypair and store private key in environment variable or secret manager
    - Rotate all existing JWTs by changing the key and forcing re-login
    - Remove committed key from git history via git-filter-branch or BFG Repo Cleaner
    code_example: const privateKey = process.env.JWT_PRIVATE_KEY; if (!privateKey) throw new Error('JWT_PRIVATE_KEY env var
      required');
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Key_Management_Cheat_Sheet.html
    effort: Medium
  component_name: B2B API and Auth Layer
  stride: Spoofing
  vektor: repo-read
  severity_rationale: secret committed to the public source repo — extractable on clone, no prior access needed
  evidence_check: verified
  effective_severity: Critical
  breach_distance: 3
  chain_role: keystone
  compound_chain_ids: []
  verified_chain_ids:
  - AC-T-005
  - AC-T-005
- id: T-002
  stride_category: Spoofing
  title: SQL injection login bypass routes/login.ts
  scenario: An unauthenticated attacker sends `' OR '1'='1'--` as email to `POST /rest/user/login`. The raw SQL query `SELECT
    * FROM Users WHERE email = '${req.body.email}'` in routes/login.ts:37 returns the first user record (typically the admin),
    bypassing password verification and issuing a valid admin JWT. The attacker gains full admin access without credentials.
  cwe: CWE-89
  likelihood: High
  impact: Critical
  risk: Critical
  component: express-backend
  evidence:
  - file: routes/login.ts
    line: 37
    excerpt: models.sequelize.query(`SELECT * FROM Users WHERE email = '${req.body.email || ''}' AND password = '${security.hash(req.body.password
      || '')}' AND deletedAt IS NULL`
  source: stride
  mitigation_ids:
  - M-001
  remediation:
    steps:
    - 'Replace raw SQL with Sequelize parameterized query: `UserModel.findOne({ where: { email: req.body.email, password:
      security.hash(req.body.password) } })`'
    code_example: 'const user = await UserModel.findOne({ where: { email: req.body.email, password: security.hash(req.body.password),
      deletedAt: null } });'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
    effort: Low
  component_name: Express Backend API
  stride: Spoofing
  vektor: internet-anon
  evidence_check: verified
  effective_severity: Critical
  breach_distance: 1
  chain_role: keystone
  compound_chain_ids:
  - CC-03
  verified_chain_ids: []
- id: T-003
  stride_category: Tampering
  title: SQL injection in product search routes/search.ts
  scenario: An unauthenticated attacker sends `GET /rest/products/search?q=')) UNION SELECT sql,2,3,4,5,6,7,8,9 FROM sqlite_master--`
    to the search endpoint. The raw query `SELECT * FROM Products WHERE name LIKE '%${criteria}%'` at search.ts:27 executes
    the UNION injection, returning the entire database schema. A subsequent injection `') UNION SELECT email,password,3,4,5,6,7,8,9
    FROM Users--` dumps all user credentials.
  cwe: CWE-89
  likelihood: High
  impact: Critical
  risk: Critical
  component: data-layer
  evidence:
  - file: routes/search.ts
    line: 27
    excerpt: models.sequelize.query(`SELECT * FROM Products WHERE ((name LIKE '%${criteria}%' OR description LIKE '%${criteria}%')
      AND deletedAt IS NULL) ORDER BY name`)
  source: stride
  mitigation_ids:
  - M-001
  remediation:
    steps:
    - Use Sequelize ORM with parameterized queries
    - Never use string interpolation in SQL queries
    code_example: 'const products = await ProductModel.findAll({ where: { [Op.or]: [{ name: { [Op.like]: `%${criteria}%` }
      }, { description: { [Op.like]: `%${criteria}%` } }], deletedAt: null } });'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
    effort: Low
  component_name: Data Persistence Layer
  stride: Tampering
  vektor: internet-anon
  evidence_check: verified
  effective_severity: Critical
  breach_distance: 1
  chain_role: keystone
  compound_chain_ids:
  - CC-03
  verified_chain_ids: []
- id: T-004
  stride_category: Tampering
  title: XXE via libxmljs2 XML file upload routes/fileUpload.ts
  scenario: 'An attacker uploads an XML file to `POST /file-upload` with an XXE payload: `<?xml version="1.0"?><!DOCTYPE replace
    [<!ENTITY xxe SYSTEM "file:///etc/passwd">]><root>&xxe;</root>`. The handler at fileUpload.ts:83 parses the XML using
    `libxml.parseXml(data, { noblanks: true, noent: true, nocdata: true })` — the `noent: true` flag resolves external entities.
    The server''s `/etc/passwd` or application secrets are included in the error message returned to the attacker.'
  cwe: CWE-611
  likelihood: High
  impact: Critical
  risk: Critical
  component: file-upload-service
  evidence:
  - file: routes/fileUpload.ts
    line: 83
    excerpt: 'const xmlDoc = vm.runInContext(''libxml.parseXml(data, { noblanks: true, noent: true, nocdata: true })'', sandbox,
      { timeout: 2000 })'
  source: stride
  mitigation_ids:
  - M-015
  remediation:
    steps:
    - 'Set `noent: false` to disable external entity resolution'
    - Alternatively reject XML uploads entirely and use JSON APIs
    code_example: 'libxml.parseXml(data, { noblanks: true, noent: false, nocdata: true })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
    effort: Low
  component_name: File Upload Service
