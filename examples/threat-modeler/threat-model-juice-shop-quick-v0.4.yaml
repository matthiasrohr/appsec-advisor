- local_id: sqlite-db-002
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-89
  title: SQL Injection UNION Exfiltration — routes/search.ts:23
  affected_parameter: q
  scenario: An attacker sends GET /rest/products/search?q=' UNION SELECT id,email,password,role,NULL,NULL,NULL,NULL,NULL FROM Users-- to the search endpoint. The query at routes/search.ts:23 interpolates req.query.q into `SELECT * FROM Products WHERE ((name LIKE '%${criteria}%' OR description LIKE '%${criteria}%')...)` without parameterization. The UNION clause appends all rows from the Users table — including email addresses, MD5 password hashes, and role values — to the product result set, which the response serializes as JSON. A second variant (`' UNION SELECT sql,NULL,... FROM sqlite_master--`) dumps the full database schema. The only length guard (truncation to 200 characters at line 22) can be bypassed by keeping the injection payload under 200 characters.
  evidence_summary: routes/search.ts:23 passes criteria (from req.query.q) into a backtick template literal for a Products SELECT — no Sequelize replacements or bind params are used; line 22 truncates to 200 chars but does not sanitize SQL metacharacters.
  impact_description: Full exfiltration of the Users table (emails, MD5-hashed passwords, roles) and the complete database schema through the public unauthenticated search endpoint.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input truncated to 200 characters (routes/search.ts:22); this prevents very long payloads but does not prevent short UNION injection strings.
  mitigation_title: Parameterize the Products search query at routes/search.ts using Sequelize replacements
  remediation:
    effort: Low
    steps:
    - 'Replace the raw template-literal query with: models.sequelize.query(''SELECT * FROM Products WHERE ((name LIKE :pattern OR description LIKE :pattern) AND deletedAt IS NULL) ORDER BY name'', { replacements: { pattern: `%${criteria}%` }, type: QueryTypes.SELECT })'
