  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:52
  affected_parameter: Authorization header / Bearer token
  scenario: An attacker crafts a JWT with the header `{"alg":"none"}` and any arbitrary payload (e.g., `{"data":{"id":1,"role":"admin"}}`), sets the signature segment to an empty string, and submits it to any endpoint protected by `security.isAuthorized()`. Because express-jwt@0.1.3 does not enforce an algorithm whitelist, it accepts the token and grants the attacker full access as the impersonated user without knowing the RSA private key.
  evidence_summary: '`isAuthorized()` at lib/insecurity.ts:52 calls `expressJwt({ secret: publicKey })` without an `algorithms` constraint; express-jwt@0.1.3 lacks algorithm whitelisting by default.'
  impact_description: 'Complete authentication bypass: any user role including admin can be impersonated without credential knowledge.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: express-jwt middleware is present but at version 0.1.3 which does not enforce algorithm restrictions
  mitigation_title: Upgrade express-jwt and pin JWT algorithm to RS256 in isAuthorized()
  remediation:
    effort: Low
    steps:
    - Upgrade express-jwt to >=6.0.0 which enforces algorithm whitelisting by default.
    - 'Update `isAuthorized()` in lib/insecurity.ts: `expressJwt({ secret: publicKey, algorithms: [''RS256''] })` to explicitly reject alg:none and HS256 tokens.'
    - Add integration test asserting that a token with `alg:none` returns HTTP 401.
    code_example: '// lib/insecurity.ts - fixed

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] })'
    reference: CWE-347
