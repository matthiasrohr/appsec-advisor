  title: Weak MD5 Password Hashing Without Salt — lib/insecurity.ts:41
  affected_parameter: password
  scenario: An attacker who obtains the Users table (through the UNION SQL injection at sqlite-db-002, or by reading the SQLite file directly) finds password values stored as unsalted MD5 hashes. The hash function at lib/insecurity.ts:41 is `crypto.createHash('md5').update(data).digest('hex')` — no salt, no iteration count, no key stretching. MD5 is available in all major rainbow-table databases (CrackStation, hashcat rule sets). An attacker with a table dump can recover plaintext passwords for the majority of accounts offline in minutes using a commodity GPU. Because users reuse passwords across services, recovered credentials enable account takeover on other platforms.
  evidence_summary: lib/insecurity.ts:41 exports `hash` as a single MD5 invocation with no salt; models/user.ts:76 calls this hash function as the sole transformation applied before storing the password column.
  impact_description: All user plaintext passwords become recoverable offline within minutes of a database exfiltration, including admin and accounting-role accounts.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: MD5 hash is applied before storage; plaintext passwords are not stored. However, MD5 is not a password-hashing function and provides negligible resistance to offline cracking.
  mitigation_title: Replace MD5 with bcrypt or argon2id for password storage in lib/insecurity.ts
  remediation:
    effort: Medium
    steps:
    - 'Replace the `hash` function in lib/insecurity.ts with bcrypt (`npm install bcrypt @types/bcrypt`): `export const hashPassword = async (password: string) => bcrypt.hash(password, 12)` and `export const verifyPassword = async (plain: string, hashed: string) => bcrypt.compare(plain, hashed)`.'
    - Update models/user.ts:76 to use the async `hashPassword` function in the `set` hook, and update routes/login.ts to use `verifyPassword` for comparison rather than rebuilding the hash inline.
    - 'Migrate existing password hashes: on next successful login with the old MD5 hash, re-hash using bcrypt and update the stored value.'
    - Set the bcrypt work factor to at least 12 (adjust upward as hardware allows, targeting ~100ms hash time on the deployment server).
    code_example: '// lib/insecurity.ts — replace MD5 hash

      import bcrypt from ''bcrypt''

      export const hashPassword = (plain: string) => bcrypt.hash(plain, 12)

      export const verifyPassword = (plain: string, hashed: string) => bcrypt.compare(plain, hashed)'
    reference: CWE-916
