- local_id: ci-cd-pipeline-004
  threat_category_id: TH-14
  additional_categories:
  - TH-02
  stride: Information Disclosure
  cwe: CWE-522
  title: ORG_ADMIN_TOKEN Exposed in pull_request_target Workflow — pr-compliance.yml:438
  affected_parameter: ORG_ADMIN_TOKEN
  scenario: The `pr-compliance.yml` workflow triggers on `pull_request_target` (line 4), which runs in the context of the base repository with full access to secrets. The `ORG_ADMIN_TOKEN` secret — a GitHub org-admin token with privileges to block users across the organization — is passed directly into the `Block Spammer` step's environment at line 438. While the workflow does not checkout the untrusted PR HEAD code (reducing the classic `pull_request_target` RCE vector), the `github-script` step at line 435 executes server-side JavaScript that reads `process.env.ORG_ADMIN_TOKEN`. If any of the three pinned `actions/github-script` calls were compromised (e.g., through a SHA-bypass vulnerability or a GitHub Actions runtime issue), or if a future workflow modification adds a PR HEAD checkout, the org-admin token becomes directly exfiltrable via the fork PR context. The broad-privilege token (org-level block, not repo-level) represents a disproportionate credential for a CI compliance check.
  evidence_summary: '`pr-compliance.yml:4` uses `pull_request_target`; line 438 injects `ORG_ADMIN_TOKEN` into a `github-script` environment accessible to runner code on every PR from a fork.'
  impact_description: Compromise of `ORG_ADMIN_TOKEN` allows an attacker to block/unblock arbitrary GitHub users from the juice-shop org, impersonate org admin actions, and potentially enumerate org membership.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: No checkout of PR HEAD code; `actions/github-script` is SHA-pinned (`ed597411d8f924073f98dfc5c65a23a2325f34cd`); org membership check gates subsequent steps.
  mitigation_title: Move ORG_ADMIN_TOKEN usage out of pull_request_target context into a separate privileged workflow triggered only on verified org-member actions
  remediation:
    effort: Medium
    steps:
    - Split the user-blocking action into a separate `workflow_run` workflow that triggers only after the `pull_request_target` compliance workflow completes — the blocking workflow receives the spam decision as an output artifact, not via shared secrets in the fork context.
    - Alternatively, replace the direct org-block REST call with a GitHub App installation token scoped to exactly the `members:write` permission, used only from a trusted workflow triggered by maintainer approval (not automatically from any fork PR).
    - 'Add `permissions: pull-requests: write` to the pr-compliance workflow job and explicitly exclude `contents: read` to reduce the blast radius of any token compromise.'
    - Add a required review step for the `Block Spammer` action so an org maintainer must approve the action before the privileged token is used.
    code_example: null
    reference: CWE-522
    blueprint: null
