  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client-side-only AdminGuard and AccountingGuard allow — app.guard.ts:52
  affected_parameter: role
  scenario: 'app.guard.ts:52-59 implements AdminGuard by decoding the JWT from localStorage client-side and checking `payload.data.role === roles.admin`. The guard runs exclusively in the browser — it can be bypassed by: (1) replacing the localStorage token with a forged JWT that has `"role":"admin"` in its data claim (if the backend does not enforce role checks on admin API routes); (2) navigating directly to `/administration` if Angular''s router can be manipulated; or (3) exploiting any XSS to read the existing admin JWT and replay it. The guard only prevents casual URL navigation — it provides no server-side authorization guarantee. app.routing.ts:81 and :86 confirm that `/administration` and `/accounting` rely solely on these client-side guards.'
  evidence_summary: 'app.guard.ts:52 reads `const payload = this.loginGuard.tokenDecode()` from localStorage and returns `true` when `payload.data.role === roles.admin` with no server-side validation call; app.routing.ts:81 uses `canActivate: [AdminGuard]` as the only access control for the administration route.'
  impact_description: An attacker who can forge or steal an admin JWT, or bypass the client-side guard via XSS, gains unrestricted access to the administration interface and all privileged API actions it exposes.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Angular route guards (AdminGuard, AccountingGuard, LoginGuard) check role from JWT claim client-side; HTTPS transport.
  mitigation_title: Add server-side role authorization middleware to all admin and accounting API routes to complement client-side guards
  remediation:
    effort: Medium
    steps:
    - Add an `isAdmin` middleware to every Express route handler called from the administration panel (user management, feedback deletion, coupon creation) that verifies `req.user.data.role === 'admin'` server-side after JWT verification.
    - Remove reliance on client-side role checks as a security gate; Angular guards are a UX convenience only — document this in the codebase with a comment at app.guard.ts.
    - Implement server-side authorization tests (integration tests that call admin endpoints with a non-admin JWT and assert 403 responses) to prevent regression.
    code_example: "// Express middleware — verify admin role server-side\nfunction requireAdmin (req, res, next) {\n  if (req.user?.data?.role !== 'admin') return res.status(403).json({ error: 'Forbidden' })\n  next()\n}\nrouter.get('/api/Users', security.isAuthorized(), requireAdmin, userController.getUsers)"
