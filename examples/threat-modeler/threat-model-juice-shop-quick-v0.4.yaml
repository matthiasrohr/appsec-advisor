- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1357
  title: Lockfile Disabled by .npmrc — .npmrc:1
  affected_parameter: package-lock
  scenario: 'The repository-level `.npmrc` file sets `package-lock=false`, which prevents npm from generating or reading a lockfile. Every call to `npm install` in CI (ci.yml lines 51, 71, 110, 147, 203, 238 and release.yml line 55) resolves the dependency graph fresh against the current npm registry state. An attacker who gains momentary control of any transitive dependency window — via typosquatting, maintainer account takeover, or registry cache poisoning — gets their malicious version installed silently across every developer checkout and every CI build with no diff signal. Because the lockfile is never generated, `npm ci` cannot be used as a later corrective measure: without a lockfile the switch is impossible. This anti-pattern was confirmed at `.npmrc:1`.'
  evidence_summary: '`.npmrc` line 1 sets `package-lock=false`; ci.yml runs bare `npm install` (not `npm ci`) at lines 51, 71, 110, 147, 203, 238 — no lockfile baseline exists.'
  impact_description: Malicious package code executes on CI runners with access to repository secrets (`DOCKERHUB_TOKEN`, `HEROKU_API_KEY`, `CYPRESS_RECORD_KEY`) and then ships inside published Docker images and release archives.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: CodeQL static analysis; `--ignore-scripts` flag used in the lint job only (ci.yml:36,38) — other jobs do not suppress postinstall hooks.
  mitigation_title: Remove package-lock=false from .npmrc and enable npm ci in all CI install steps
  remediation:
    effort: Medium
    steps:
    - Delete the `package-lock=false` line from `.npmrc` (or the entire file if that is its sole content).
    - Run `npm install` locally once to generate `package-lock.json`, then commit it to the repository.
    - Replace every bare `npm install` step in `.github/workflows/ci.yml` and `release.yml` with `npm ci` so CI always uses the frozen lockfile.
    - Add the `--ignore-scripts` flag to all `npm ci` invocations, or configure `ignore-scripts=true` in `.npmrc` and create allowlist exceptions only for trusted packages that require post-install.
    - Enable Dependabot or Renovate so the lockfile is kept current with security patches via automated PRs.
    code_example: '# .npmrc — remove the line below entirely

      # package-lock=false   <-- DELETE THIS


      # .github/workflows/ci.yml — replace:

      #   run: npm install

      # with:

      #   run: npm ci --ignore-scripts'
    reference: CWE-1357
    blueprint: null
