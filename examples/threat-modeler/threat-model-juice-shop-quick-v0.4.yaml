  stride: Spoofing
  cwe: CWE-829
  title: Floating Action Reference to — image_actions.yml:33
  affected_parameter: 'uses: calibreapp/image-actions@main'
  scenario: The `image_actions.yml` workflow references `calibreapp/image-actions` at the mutable `main` branch ref (line 33) rather than a SHA-pinned commit digest. Any commit pushed to `calibreapp/image-actions:main` — by the account owner, a compromised maintainer credential, or via a GitHub Actions supply-chain attack — immediately becomes the code that executes in the next workflow run. The workflow triggers on `push` to `master` and `develop` branches, running with `${{ secrets.GITHUB_TOKEN }}` which has repository write access to create pull requests (`peter-evans/create-pull-request` step at line 42). An attacker who controls the floating action can read all workflow environment variables, exfiltrate `GITHUB_TOKEN`, push commits to the repository, and create or merge PRs.
  evidence_summary: '`image_actions.yml:33` uses `calibreapp/image-actions@main`; no SHA digest is specified. The workflow runs on push to default branches with `GITHUB_TOKEN` that has PR creation rights.'
  impact_description: Attacker achieves arbitrary code execution in a trusted CI context with repository write access — can modify source code, inject malware into release artifacts, and exfiltrate repository secrets.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The workflow is gated to `github.repository == 'juice-shop/juice-shop'` and excludes fork PRs (line 27), limiting the trigger surface to repository pushes only.
  mitigation_title: Pin calibreapp/image-actions to a specific commit SHA in image_actions.yml
  remediation:
    effort: Low
    steps:
    - Identify the current HEAD commit SHA of `calibreapp/image-actions:main` via `gh api repos/calibreapp/image-actions/git/ref/heads/main`.
    - 'Replace `uses: calibreapp/image-actions@main` at `.github/workflows/image_actions.yml:33` with `uses: calibreapp/image-actions@<SHA> #<version-tag-or-date>` (e.g. `uses: calibreapp/image-actions@b06a4d71e6ba46e2e8bf16e9a36dfff5c50f8f40 #2024-06-01`).'
    - 'Add a `permissions: contents: read` block to the `image_actions.yml` workflow job to restrict GITHUB_TOKEN to the minimum required scope.'
    - Consider adopting a dependency-update tool (Renovate with `github-actions` manager) to automatically open PRs when new SHA-pinned versions are available.
    code_example: "# .github/workflows/image_actions.yml\n- name: Compress Images\n  id: calibre\n  uses: calibreapp/image-actions@b06a4d71e6ba46e2e8bf16e9a36dfff5c50f8f40 # pin to specific commit SHA"
    reference: CWE-829
    blueprint: null
