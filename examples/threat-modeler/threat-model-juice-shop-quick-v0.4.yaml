  mitigation_fingerprints:
  - move jwt session token to an httponly secure samesite=strict cookie managed by the backend
  - add server-side role authorization middleware to all admin and accounting api routes to complement client-side guards
  - upgrade express-jwt and pin jwt algorithm to rs256 in isauthorized
  - replace email-derived password with a randomly generated account secret for oauth-linked accounts
  - replace raw sql string interpolation with parameterized sequelize query in login route
  - replace req.body.userid/userid/ownerid with req.user.id in every where/filter clause.
  - parameterize the products search query at routes/search.ts using sequelize replacements
  - remove hardcoded private key from source and load from a secrets manager or environment variable at runtime
  - remove safeeval from the b2b order handler and validate orderlinesdata against a strict schema
  - apply an allowlist filter before passing the body to any model, and strip privilege fields before persistence.
  - replace bash wildcard permission with explicitly scoped command allowlist in .claude/settings.json
  - replace oauth implicit flow with authorization code flow using pkce and a cryptographically random state parameter
  - sanitize username before embedding in system prompt and add structural delimiters in buildsystemprompt
  - remove package-lock=false from .npmrc and enable npm ci in all ci install steps
  - remove bypasssecuritytrusthtml on the search query parameter and display it as plain text
  - enforce coupon eligibility server-side inside the generatecoupon tool execute handler independent of llm instructions
  - add structured append-only security event log for authentication and authorization actions
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin every third-party action to a full 40-char commit sha
  - pin base image to @sha256:<digest>
  - remove confidential business logic from the system prompt and enforce escalation discounts server-side via a claims-check tool
  - replace md5 with bcrypt or argon2id for password storage in lib/insecurity.ts
  - replace js-yaml yaml.load with yaml.safeload or upgrade to js-yaml >=4 and set alias depth limit
  - apply per-user rate limiting middleware to post /api/chat and set maxtokens on streamtext calls
  - set sqlite query timeout and result-row limit in sequelize dialectoptions at models/index.ts
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark the route intentionally public via app.get for read-only access only.
  - add .max zod constraint to generatecoupon discount field and add a guard in the execute handler
  - encrypt the sqlite database at rest using sqlcipher or field-level encryption for sensitive columns
  - pin calibreapp/image-actions to a specific commit sha in image_actions.yml
  - add user <non-root-uid>
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - move org_admin_token usage out of pull_request_target context into a separate privileged workflow triggered only on verified org-member actions
