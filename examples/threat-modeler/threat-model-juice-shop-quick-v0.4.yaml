  title: No Per-User Rate Limiting on POST /api/chat Enables LLM — routes/chat.ts:203
  affected_parameter: null
  scenario: 'LLM10 — Unbounded Consumption: Any caller can POST to `/api/chat` at an arbitrary rate. Each request initiates a `streamText()` call to the LLM provider. `stopWhen: stepCountIs(10)` at `routes/chat.ts:209` limits agentic tool-call loops but does not bound the number of requests per user or total token consumption per session. No `maxTokens` parameter is passed to `streamText()`, so a request containing `Write a 10,000-word essay` will stream the maximum output the model supports. An attacker issuing hundreds of concurrent requests can exhaust LLM API credit limits or saturate local Ollama inference capacity, making the chatbot unavailable for legitimate users.'
  evidence_summary: '`streamText()` at `routes/chat.ts:203` is invoked per request with no `maxTokens` cap and no per-user throttling visible in the route; `stopWhen: stepCountIs(10)` at line 209 limits tool-call steps only.'
  impact_description: Sustained abuse exhausts LLM API token budgets or saturates the inference server, making the chatbot unavailable and potentially incurring significant API costs.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Prometheus counters track aggregate token usage but enforce no limits and trigger no circuit breakers.
  mitigation_title: Apply per-user rate limiting middleware to POST /api/chat and set maxTokens on streamText() calls
  remediation:
    effort: Medium
    steps:
    - Add `express-rate-limit` middleware keyed on authenticated user ID (falling back to IP) on the `/api/chat` route, e.g., 10 requests per 60 seconds.
    - 'Pass `maxTokens: 1024` (or an application-appropriate value) to `streamText()` at `routes/chat.ts:203` to bound per-request LLM output cost.'
    - Implement a daily per-user token budget using the existing Prometheus `llm_input_tokens` / `llm_output_tokens` counters; return HTTP 429 with `Retry-After` when the budget is exhausted.
    code_example: "```typescript\nimport rateLimit from 'express-rate-limit'\n\nconst chatLimiter = rateLimit({\n  windowMs: 60 * 1000,\n  max: 10,\n  keyGenerator: (req) => String((req as any).user?.id ?? req.ip),\n  message: { error: 'Too many chat requests, please try again later.' }\n})\n\n// In route registration:\napp.post('/api/chat', chatLimiter, chat())\n\n// In chat():\nconst result = streamText({\n  model: provider(model),\n  system: systemPrompt,\n  messages,\n  tools: { ...chatTools },\n  maxTokens: 1024,         // add this\n  maxRetries: config.get<number>('application.chatBot.llmMaxRetries'),\n  stopWhen: stepCountIs(10)\n})\n```"
    reference: CWE-400
