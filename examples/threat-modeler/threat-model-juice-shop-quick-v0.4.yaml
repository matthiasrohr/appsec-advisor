trust_boundaries:
- id: tb-1
  name: Public Internet to Application Container
  description: HTTP/HTTPS boundary between unauthenticated external users and the Express server on port 3000.
  from: external
  to: backend-api
  enforcement: TCP port 3000 exposure; no application-level gateway or WAF configured in source
  crossing_data: HTTP requests including JWT Bearer tokens, file uploads, and user-controlled query parameters
- id: tb-2
  name: Browser SPA to Backend API
  description: Trust boundary between the browser execution context and the server-side API. JWT stored in localStorage crosses this boundary on every API call.
  from: frontend-spa
  to: backend-api
  enforcement: express-jwt middleware (version 0.1.3, accepts alg:none); Authorization header required on protected routes
  crossing_data: 'JWT Bearer tokens (unauthenticated: none; authenticated: all requests)'
- id: tb-3
  name: Application Logic to Data Tier
  description: In-process trust boundary between Express route handlers and the SQLite database via Sequelize ORM. No network hop; SQL injection in a route handler directly reaches the database.
  from: backend-api
  to: sqlite-db
  enforcement: Sequelize ORM (partial parameterization); some routes use raw SQL strings
  crossing_data: All user data, order records, credentials; some routes pass unparameterized user input
- id: tb-4
  name: Application to Local Filesystem
  description: In-process file I/O boundary. Uploaded files written to uploads/ and served from ftp/ and encryptionkeys/ via serve-index without type validation.
  from: backend-api
  to: external
  enforcement: OS file permissions (UID 65532 in container); no application-level file-type enforcement
  crossing_data: User-uploaded complaint attachments; training material files; RSA key files
- id: tb-5
  name: Authenticated User to Admin Zone
  description: Role-based access boundary between authenticated users and admin functionality. Client-side guards only — no server-side enforcement on admin API endpoints.
  from: frontend-spa
  to: backend-api
  enforcement: Angular AdminGuard (client-side JWT decode only); no server-side role check on admin API routes
  crossing_data: Admin operations (user management, challenge administration, product edits)
- id: tb-6
  name: Application to External OAuth Provider
  description: OAuth2 implicit flow boundary. Google OAuth token returned in URL fragment without state validation.
  from: frontend-spa
  to: external
  enforcement: OAuth2 implicit flow (deprecated RFC 9700); no PKCE; no state parameter
  crossing_data: OAuth access token in URL fragment; Google user info via HTTPS
- id: tb-7
  name: Application to LLM Backend
  description: Outbound HTTP boundary from the chatbot route to the Ollama or OpenAI-compatible LLM. User input injected into system prompt crosses this boundary unfiltered.
  from: llm-chatbot
  to: external
  enforcement: No input validation or output filtering; system prompt includes user-controlled data
  crossing_data: User chat messages (potentially malicious), system prompt with business rules, LLM responses
- id: tb-8
  name: CI/CD Pipeline to Repository and Registry
  description: Trust boundary between GitHub Actions runners and the npm registry / Docker Hub. Unpinned action versions and disabled lockfile allow supply-chain injection.
  from: ci-cd-pipeline
  to: external
  enforcement: Unpinned action versions (no SHA digest); no lockfile; no SCA scanning; pull_request_target with potential fork code execution
  crossing_data: npm packages (no lockfile), Docker base images (no digest), GitHub Actions code
security_controls:
- domain: identity_and_authentication
  control: Password-Based Authentication
  effectiveness: Weak
  evidence: 'routes/auth.ts: login handler present; jsonwebtoken@0.4.0 used for JWT issuance; password comparison in Sequelize User model'
  notes: JWT library is 8+ major versions behind current; no password complexity enforcement confirmed; intentional SQL injection in login route
- domain: Identity and Authentication Controls
  control: OAuth / OIDC
  effectiveness: Weak
  evidence: frontend/src/app/login/login.component.ts:148 - response_type=token (implicit flow); no state parameter
  notes: Deprecated implicit flow (RFC 9700); token in URL fragment without state = CSRF-vulnerable; should use Authorization Code + PKCE
  audit_flags:
  - control_domain_reclassified_from_identity_and_authentication
- domain: Identity and Authentication Controls
  control: TOTP / 2FA
  effectiveness: Partial
  evidence: frontend/src/app/Services/two-factor-auth-service.ts; otplib@13.4.0
  notes: 2FA mechanism exists but temporary TOTP token stored in localStorage during flow
  audit_flags:
  - control_domain_reclassified_from_identity_and_authentication
- domain: Session and Token Controls
  control: JWT Token Management
  effectiveness: Missing
  evidence: 'lib/insecurity.ts: hardcoded RSA key used for signing; express-jwt@0.1.3 accepts alg:none; frontend stores JWT in localStorage'
  notes: 'Three independent critical breaks: alg:none accepted, key hardcoded in source, stored in XSS-accessible localStorage'
  audit_flags:
  - control_domain_reclassified_from_session_and_token_controls
- domain: session_and_token_controls
  control: Session Fixation and Revocation
  effectiveness: Missing
  evidence: No session invalidation or token revocation mechanism observed
  notes: JWT-only sessions with no revocation; compromised tokens remain valid until expiry
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  evidence: 'frontend/src/app/app.guard.ts: AdminGuard/AccountingGuard (client-side only); lib/insecurity.ts: security.isAdmin() server middleware (inconsistent application)'
  notes: Client-side guards are the primary RBAC mechanism; server-side middleware present but not applied consistently to all admin API endpoints
  audit_flags:
  - control_domain_reclassified_from_authorization_controls
- domain: authorization_controls
  control: Object-Level Authorization
  effectiveness: Weak
  evidence: 'routes/order*.ts: order lookup by ID without consistent user-ownership check'
  notes: IDOR vulnerabilities present as training challenges
- domain: Query Construction and Data Access Controls
  control: SQL Parameterization / ORM
  effectiveness: Missing
  evidence: 'routes/auth.ts, routes/orderHistory.ts: raw SQL with string interpolation; js-yaml unsafe.load in server.ts:139'
  notes: Intentional SQL injection in multiple routes; Sequelize ORM partially used but bypassed with raw queries
  audit_flags:
  - control_domain_reclassified_from_query_construction_and_data_access
- domain: Input Boundary Validation Controls
  control: Server-Side Input Validation
  effectiveness: Missing
  evidence: body-parser present but no validation middleware (Joi, express-validator, Zod) detected globally; user input reaches sinks unvalidated
  notes: No global input validation layer; individual route handlers trust user input
