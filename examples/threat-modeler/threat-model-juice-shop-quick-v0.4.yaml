  cwe: CWE-352
  title: OAuth implicit flow with missing state parameter — login.component.ts:148
  affected_parameter: state
  scenario: login.component.ts:148 initiates the Google OAuth flow with `response_type=token` (implicit grant) and omits the `state` parameter entirely. The implicit flow returns the access_token directly in the URL fragment, where it is readable by any script on the redirect page and persists in browser history. Without a state parameter, an attacker can initiate a login flow on behalf of the victim (CSRF on the OAuth authorization endpoint), then substitute their own access_token in the callback — logging the victim into the attacker's Google account. This is the classic OAuth CSRF attack that the state parameter prevents.
  evidence_summary: login.component.ts:148 constructs the OAuth redirect URL as `${oauthProviderUrl}?client_id=${this.clientId}&response_type=token&scope=email&redirect_uri=${this.redirectUri}` — no `state` parameter is appended, and `response_type=token` selects the deprecated implicit grant.
  impact_description: Attacker can silently associate a victim's browser session with the attacker's Google identity, gaining access to any actions the victim performs while 'logged in'.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: HTTPS transport limits network-level eavesdropping; the redirect_uri allowlist in the configuration provides weak protection against arbitrary redirect injection.
  mitigation_title: Replace OAuth implicit flow with authorization code flow using PKCE and a cryptographically random state parameter
  remediation:
    effort: Medium
    steps:
    - Change `response_type=token` to `response_type=code` and add `code_challenge_method=S256` with a per-request PKCE `code_challenge` to the authorization URL.
    - Generate a `state` value using `crypto.getRandomValues()` or `window.crypto.subtle`, store it in `sessionStorage` keyed by the OAuth session, and verify it matches in `oauth.component.ts` before exchanging the code.
    - Move the code-exchange step (`/token` endpoint call with `code`, `code_verifier`, `client_id`, `redirect_uri`) to the backend-api to avoid exposing tokens in the fragment.
    code_example: '// Generate state + PKCE before redirect

      const state = crypto.randomUUID()

      sessionStorage.setItem(''oauth_state'', state)

      const url = `${oauthProviderUrl}?response_type=code&client_id=${clientId}&state=${state}&code_challenge=${challenge}&code_challenge_method=S256&redirect_uri=${redirectUri}`'
    reference: CWE-352
  evidence:
