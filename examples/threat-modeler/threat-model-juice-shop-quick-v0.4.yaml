- local_id: llm-chatbot-006
  threat_category_id: TH-06
  additional_categories:
  - TH-01
  stride: Elevation of Privilege
  cwe: CWE-862
  title: GenerateCoupon Discount Lacks Server-Side Maximum — routes/chat.ts:179
  affected_parameter: discount
  scenario: 'LLM06 — Excessive Agency: The `generateCoupon` tool''s `inputSchema` at `routes/chat.ts:179` defines `discount: z.number().describe(''The discount percentage for the coupon (maximum 10)'')`. The `.describe()` text is an LLM hint, not a runtime constraint — no `.max(10)` is present. Any numeric value the LLM passes, including values produced by successful prompt injection, reaches `security.generateCoupon(discount)` at line 184 unchecked. Instructing the LLM via prompt injection to call `generateCoupon` with `discount=99` results in a valid coupon for a 99% discount. The `chatbotGreedyInjectionChallenge` at line 183 (`discount >= 50`) confirms values far above the 10% policy maximum are achievable and produce working coupon codes. A normal authenticated user gains the economic privilege reserved for shop-approved loyalty programs by exploiting the missing server-side cap.'
  evidence_summary: '`discount: z.number().describe(''...(maximum 10)'')` at `routes/chat.ts:179` omits `.max(10)`, and `security.generateCoupon(discount)` at line 184 executes with whatever value the LLM provides.'
  impact_description: Attacker generates coupons with discounts up to 100%, bypassing the 10% business-rule cap and causing direct financial loss on any subsequent order redemption.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: System prompt states the 10% maximum as a text instruction to the LLM, but no code-level constraint prevents the LLM from calling the tool with a higher value.
  mitigation_title: Add .max(10) Zod constraint to generateCoupon discount field and add a guard in the execute handler
  remediation:
    effort: Low
    steps:
    - Change the `discount` field in `inputSchema` at `routes/chat.ts:179` from `z.number()` to `z.number().min(1).max(10)`. The Vercel AI SDK validates `inputSchema` before calling `execute`, rejecting out-of-range values before any business logic runs.
    - 'Add an explicit guard at the start of `execute`: `if (discount > 10) return { error: ''Discount exceeds the maximum allowed value of 10%'' }`. This defence-in-depth check catches any future schema relaxation or SDK validation bypasses.'
    - Apply the same server-side enforcement pattern to any future tools that act on business-rule-constrained numeric parameters, rather than relying on LLM instruction compliance alone.
    code_example: "```typescript\ngenerateCoupon: tool({\n  description: 'Generate a discount coupon. Only use when coupon policy conditions are fully met.',\n  inputSchema: z.object({\n    discount: z.number().min(1).max(10)\n      .describe('Discount percentage (1-10, maximum 10)')\n  }),\n  execute: async ({ discount }) => {\n    if (discount > 10) return { error: 'Discount exceeds policy maximum' }\n    const couponCode = security.generateCoupon(discount)\n    return { couponCode, discount }\n  }\n})\n```"
    reference: CWE-862
  evidence:
