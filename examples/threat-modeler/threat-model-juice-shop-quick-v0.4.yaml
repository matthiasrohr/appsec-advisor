- local_id: frontend-spa-001
  threat_category_id: TH-10
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-640
  title: Derived password from OAuth email claim enables — oauth.component.ts:30
  affected_parameter: profile.email
  scenario: When a user authenticates via Google OAuth, oauth.component.ts:30 computes their application password as `btoa(profile.email.split('').reverse().join(''))` — a deterministic, reversible transformation of the publicly observable email address. An attacker who knows a victim's email can precompute this password offline and authenticate directly through the `/rest/user/login` endpoint without ever triggering the OAuth flow. This bypasses the OAuth trust chain entirely and renders multi-factor controls on the OAuth path irrelevant. The derived credential is also predictable for any email obtained from a data breach, user enumeration, or public profile.
  evidence_summary: 'oauth.component.ts:30 calls `btoa(profile.email.split('''').reverse().join(''''))` to set both `password` and `passwordRepeat`, then at line 46 calls `userService.login({ email, password: btoa(…), oauth: true })` — the same derived password is the only credential used for application login.'
  impact_description: Any user who has ever signed in via Google OAuth can have their application account taken over by anyone who knows their email address.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Google OAuth flow is required to obtain the access_token used in the initial oauthLogin call; however, the derived password bypasses this requirement for subsequent direct logins.
  mitigation_title: Replace email-derived password with a randomly generated account secret for OAuth-linked accounts
  remediation:
    effort: Medium
    steps:
    - Generate a cryptographically random password (e.g., `crypto.randomBytes(32).toString('hex')`) server-side when creating OAuth-linked accounts, and never expose it to the client.
    - Remove the `btoa(email.split('').reverse().join(''))` derivation from `oauth.component.ts` lines 30 and 46; instead have the server issue a short-lived, one-time session token directly after validating the OAuth access_token.
    - 'Mark OAuth-linked accounts as `oauth_only: true` in the user table and reject direct password-login attempts for those accounts at the API layer.'
    code_example: '// Server-side: after verifying access_token with Google

      const sessionToken = jwt.sign({ userId: user.id }, JWT_SECRET, { expiresIn: ''8h'' })

      res.json({ token: sessionToken }) // never expose derived password'
    reference: CWE-640
  evidence:
