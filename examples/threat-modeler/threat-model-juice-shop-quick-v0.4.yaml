- local_id: sqlite-db-006
  threat_category_id: TH-03
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-312
  title: Unencrypted SQLite Database File Exposes All Credentials — models/index.ts:41
  affected_parameter: null
  scenario: 'Any process running as the same UID as the Node.js application, or any principal that achieves a container escape or path-traversal file read, can copy `data/juiceshop.sqlite` without any cryptographic barrier. The Sequelize initialization at models/index.ts:41 specifies `storage: ''data/juiceshop.sqlite''` with no SQLCipher or WAL-encryption option. The file contains all Users rows including email addresses, unsalted MD5 password hashes, TOTP secrets in cleartext, and the `role` column. Because the password hashes are MD5 (sqlite-db-004), cracking the admin account hash offline takes seconds. The attacker then authenticates as admin, gaining full application privilege.'
  evidence_summary: models/index.ts:41 stores the database at a relative file path with no encryption-at-rest option; models/user.ts declares a `totpSecret` column stored as a plain STRING with no application-level encryption applied before persistence.
  impact_description: An attacker who reads the SQLite file gains all user email addresses, crackable password hashes, TOTP secrets, and role assignments — sufficient to compromise any account including admin.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: SQLite file ownership is UID 65532; OS-level file permissions provide a partial barrier but do not protect against same-UID processes, container escapes, or backup exfiltration.
  mitigation_title: Encrypt the SQLite database at rest using SQLCipher or field-level encryption for sensitive columns
  remediation:
    effort: High
    steps:
    - 'Replace the `sqlite3` driver with `@journeyapps/sqlcipher` and configure a passphrase via `dialectOptions: { key: process.env.SQLITE_ENCRYPTION_KEY }` in the Sequelize constructor at models/index.ts:33. Store the key in a secrets manager (e.g., HashiCorp Vault, AWS Secrets Manager), not in an environment file committed to source.'
    - As a lower-effort partial mitigation, apply field-level encryption to the `totpSecret` column in models/user.ts using application-layer AES-256-GCM before setDataValue, so the most privileged column is not stored in cleartext.
    - Relocate the SQLite file to a directory outside the application working directory and apply restrictive file-system permissions (chmod 600, owned by the runtime UID) so sibling processes and volume mounts cannot read it.
    - Rotate and invalidate all existing sessions and force a password-reset notification to all users if a breach of the unencrypted file is suspected.
    code_example: null
    reference: CWE-312
  evidence:
  - file: models/index.ts
    line: 41
  evidence_check: verified
