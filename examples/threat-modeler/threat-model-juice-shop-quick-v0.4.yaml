- local_id: frontend-spa-004
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT session token stored in localStorage exposes — login.component.ts:101
  affected_parameter: token
  scenario: login.component.ts:101 stores the JWT session token in `localStorage` via `localStorage.setItem('token', authentication.token)`. localStorage is accessible to all JavaScript running on the same origin, including any code injected via XSS (e.g., the search-query XSS at finding frontend-spa-003). An attacker who achieves any XSS execution can exfiltrate the token with a single `fetch()` call, replay it from any origin, and hijack the session. The token is also readable from browser developer tools, browser extensions, and third-party scripts loaded on the page.
  evidence_summary: login.component.ts:101 calls `localStorage.setItem('token', authentication.token)`; app.guard.ts:18 confirms the token is always retrieved from localStorage for all subsequent authentication checks, establishing a systemic localStorage-as-session-store pattern.
  impact_description: Any XSS or malicious browser extension can exfiltrate the JWT and impersonate the authenticated user for the token's lifetime (8 hours per login.component.ts:103).
  likelihood: High
  impact: High
  risk: High
  controls_in_place: HTTPS transport; cookie copy of token is also set at login.component.ts:104 but without HttpOnly flag, so both storage locations are JavaScript-accessible.
  mitigation_title: Move JWT session token to an HttpOnly Secure SameSite=Strict cookie managed by the backend
  remediation:
    effort: High
    steps:
    - 'Remove `localStorage.setItem(''token'', …)` from login.component.ts:101 and app.guard.ts:18; instead have the backend set the JWT in a `Set-Cookie: token=…; HttpOnly; Secure; SameSite=Strict` response header.'
    - Update the Angular HTTP interceptor to send requests without an explicit Authorization header — the browser will automatically attach the HttpOnly cookie.
    - Implement a BFF (Backend-for-Frontend) session endpoint that the SPA polls for authentication status (`GET /api/me`) rather than reading the token from localStorage.
    code_example: '// Express backend — replace JSON token response with HttpOnly cookie

      res.cookie(''token'', jwt, { httpOnly: true, secure: true, sameSite: ''strict'', maxAge: 8 * 3600 * 1000 })

      res.json({ bid: basket.id }) // no token in body'
    reference: CWE-922
  evidence:
