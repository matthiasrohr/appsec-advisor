tier_root_causes:
  edge:
  - OAuth2 implicit flow returns token in URL fragment without state parameter
  - Angular route guards (client-side only) provide no server-side RBAC enforcement
  - JWT tokens stored in localStorage accessible to any XSS on the page
  server:
  - 'JWT algorithm enforcement absent: express-jwt@0.1.3 accepts alg:none'
  - Hardcoded RSA private key in lib/insecurity.ts committed to public repo
  - SQL injection in auth routes due to missing parameterized queries
  - Unsafe YAML deserialization via js-yaml yaml.load() in server.ts
  - No global input validation layer; per-route trust of user input
  data:
  - SQLite database unencrypted at rest; all user credentials in plaintext
  - ORM parameterization bypassed with raw SQL in multiple route handlers
  - No query timeout enabling resource exhaustion DoS
