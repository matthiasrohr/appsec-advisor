  cwe: CWE-400
  title: No Query Timeout on SQLite Sequelize Instance — models/index.ts:33
  affected_parameter: null
  scenario: An attacker with access to the search endpoint sends a series of requests with deeply nested SQL subqueries or extremely wide UNION injections (e.g., joining large tables repeatedly) against routes/search.ts:23. Because the Sequelize instance at models/index.ts:33 configures no `dialectOptions.timeout` or query-level timeout, SQLite executes each query to completion regardless of execution time. SQLite is single-writer; a long-running query blocks all subsequent writes for the duration. In a Node.js application where the DB operations are async but the underlying SQLite file I/O is synchronous, a series of expensive queries saturates the event loop and causes the application to become unresponsive for all users.
  evidence_summary: 'models/index.ts:33 passes only `dialect`, `retry`, `transactionType`, `storage`, and `logging` to the Sequelize constructor — no `dialectOptions: { timeout: N }` is present, leaving SQLite queries without an execution time bound.'
  impact_description: An authenticated or unauthenticated attacker (the search endpoint is publicly accessible) can render the application unresponsive by issuing expensive SQLite queries that exhaust the single-threaded I/O path.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: SQLITE_BUSY retry logic (max 5 retries) is configured, but this handles lock contention, not query execution duration.
  mitigation_title: Set SQLite query timeout and result-row limit in Sequelize dialectOptions at models/index.ts
  remediation:
    effort: Low
    steps:
    - 'Add `dialectOptions: { timeout: 5000 }` (5 000 ms) to the Sequelize constructor options at models/index.ts:33 to cap individual query execution time.'
    - 'Add a LIMIT clause to the search query at routes/search.ts:23 (or its parameterized replacement) to prevent full-table scans: e.g., `... ORDER BY name LIMIT 100`.'
    - Apply express-rate-limit middleware to the /rest/products/search route to cap the request rate per IP and reduce the amplification window.
    code_example: "// models/index.ts — add timeout\nreturn new Sequelize('database', 'username', 'password', {\n  dialect: 'sqlite',\n  storage: 'data/juiceshop.sqlite',\n  dialectOptions: { timeout: 5000 },\n  logging: false\n})"
    reference: CWE-400
