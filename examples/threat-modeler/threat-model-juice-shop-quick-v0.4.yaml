  title: Committed AI Assistant Wildcard Shell Permission — .claude/settings.json:14
  scenario: The `.claude/settings.json` file committed to the repository root at line 14 contains `"Bash(*)"` in the `permissions.allow` array. This is a Claude Code permission allowlist that pre-approves any shell command execution without requiring the developer to approve the action at runtime. Any developer who clones this repository and opens it in Claude Code inherits this permission configuration automatically. Combined with a prompt-injection payload embedded anywhere in a repository file that the AI assistant reads as context — including `CLAUDE.md`, `AGENTS.md`, dependency changelogs, or even a crafted PR body that the assistant summarizes — an attacker can construct a one-shot prompt that causes the assistant to execute arbitrary shell commands (exfiltrate secrets, install backdoors, modify source files, push commits) without a permission confirmation dialog. The `Bash(*)` permission explicitly covers the wildcard character class documented as the full-shell-RCE primitive in the Cat 28b supply-chain threat pattern.
  evidence_summary: '`.claude/settings.json:14` contains `"Bash(*)"` in the allow list; no command restrictions (path, argument prefix, or allowed-command set) scope the permission.'
  impact_description: An attacker who plants a prompt-injection payload in any tracked file achieves full shell execution on every developer workstation that opens the repo in Claude Code — including reading and exfiltrating `~/.npmrc` tokens, SSH keys, AWS credentials, and local Docker credentials.
  likelihood: Medium
  impact: Critical
  risk: Critical
  controls_in_place: Claude Code presents a permission UI for unapproved commands; `.gitignore` does not exclude `.claude/settings.json` (it remains in version control and is actively committed).
  mitigation_title: Replace Bash(*) wildcard permission with explicitly scoped command allowlist in .claude/settings.json
  remediation:
    effort: Medium
    steps:
    - Remove the `"Bash(*)"` entry from `.claude/settings.json`. Replace it with a constrained allowlist that names only the specific commands the AI assistant legitimately needs, e.g. `"Bash(npm run lint)"`, `"Bash(npm test)"`, `"Bash(git status)"`, `"Bash(git log)"` — never a wildcard.
    - Audit the current allowlist for any other overly broad entries (e.g. `Write(**)`); apply the principle of least privilege.
    - Add `.claude/settings.json` to `.gitignore` to prevent per-user assistant configurations from being committed to the shared repository. Document in `CONTRIBUTING.md` that contributors should configure their own assistant permissions locally.
    - Review all files that a Claude Code session reads as context (`CLAUDE.md`, `AGENTS.md`, dependency files) for embedded prompt-injection payloads that could trigger the shell permission.
    code_example: "// .claude/settings.json — BEFORE (dangerous)\n{ \"permissions\": { \"allow\": [\"Bash(*)\", ...] } }\n\n// AFTER (scoped)\n{\n  \"permissions\": {\n    \"allow\": [\n      \"Bash(npm run lint)\",\n      \"Bash(npm test)\",\n      \"Bash(git status)\",\n      \"Bash(git log --oneline -10)\"\n    ]\n  }\n}"
    reference: CWE-732
    blueprint: null
