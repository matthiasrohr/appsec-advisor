- id: A-007
  name: Encryption Key Files
  classification: Restricted
  description: RSA and other encryption keys in encryptionkeys/ directory, served via file listing. Intentionally exposed for training but represents a critical credential store.
  linked_threats:
  - T-005
  - T-007
  - T-008
  - T-015
  - T-022
  - T-033
- id: A-008
  name: LLM System Prompt
  classification: Internal
  description: System prompt injected into LLM context via buildSystemPrompt() in routes/chat.ts. Contains business rules (discount limits) that can be extracted or manipulated via prompt injection.
  linked_threats: []
- id: A-009
  name: Product Catalog and Descriptions
  classification: Public
  description: Product data including descriptions containing intentional XSS payloads for training. Publicly readable; seed data in data/
  linked_threats:
  - T-005
  - T-007
  - T-010
  - T-015
- id: A-010
  name: GitHub Actions Secrets
  classification: Restricted
  description: CI/CD secrets (npm tokens, Docker Hub credentials, Coveralls tokens) accessed in GitHub Actions workflows. At risk from unpinned actions and pull_request_target misuse.
  linked_threats:
  - T-005
  - T-007
  - T-015
  - T-018
  - T-019
  - T-022
  - T-033
- id: A-011
  name: Developer Workstation Shell Access
  classification: Restricted
  description: Full shell execution authority granted to Claude Code AI assistant via Bash(*) permission in .claude/settings.json. Exploitable via prompt injection in code comments or PR content.
  linked_threats: []
- id: A-012
  name: Application Configuration (YAML + env vars)
  classification: Internal
  description: Runtime configuration in config/*.yml including feature flags, challenge configs, and optional API keys (Alchemy). Loaded via js-yaml with unsafe load.
  linked_threats: []
