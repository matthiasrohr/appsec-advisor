  scenario: An anonymous attacker POSTs a .xml file to the unauthenticated /file-upload endpoint. handleXmlUpload (routes/fileUpload.ts:76)
    passes the raw buffer to parseXmlString, which parses with XML_PARSE_NOENT | XML_PARSE_DTDLOAD (lib/xml.ts:35) and registers
    host-filesystem input providers (xmlRegisterFsInputProviders, lib/xml.ts:21). A DOCTYPE declaring an external entity such
    as <!ENTITY xxe SYSTEM "file:///etc/passwd"> is resolved and the substituted content is reflected back in the error message
    at routes/fileUpload.ts:79 (utils.trunc(xmlString, 400)), giving direct out-of-band file disclosure. Because external
    entities also resolve http(s):// URLs, the same parser doubles as an SSRF primitive against internal services.
  evidence_summary: parseXmlString enables XML_PARSE_NOENT and XML_PARSE_DTDLOAD and registers filesystem input providers,
    so DOCTYPE external entities resolve against the container filesystem.
  impact_description: Anonymous disclosure of arbitrary host files (e.g. /etc/passwd, application secrets) and SSRF into the
    internal network.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Parse runs inside a vm context with a 2000ms timeout (lib/xml.ts:38) to surface entity-expansion bombs
    as a timeout; this caps DoS but does NOT block file/URL disclosure. The endpoint is gated only behind the deprecatedInterfaceChallenge
    toggle, not authentication.
  mitigation_title: Disable DTD loading and entity substitution in lib/xml.ts parseXmlString
  remediation:
    effort: Low
    steps:
    - Remove XML_PARSE_NOENT and XML_PARSE_DTDLOAD from the option mask in lib/xml.ts:35; parse with the default-safe option
      set so external/parameter entities are never resolved.
    - Stop calling xmlRegisterFsInputProviders() (lib/xml.ts:21) so the WASM parser cannot reach the host filesystem.
    - Reject any uploaded XML whose body contains a <!DOCTYPE ...> declaration before parsing, and never echo parsed XML content
      back in error responses (routes/fileUpload.ts:79).
    code_example: 'const option = libxml2.ParseOption.XML_PARSE_NOBLANKS | libxml2.ParseOption.XML_PARSE_NOCDATA

      // XML_PARSE_NOENT and XML_PARSE_DTDLOAD removed; no xmlRegisterFsInputProviders()'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
