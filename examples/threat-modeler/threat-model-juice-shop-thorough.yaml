  effort: Low
  threat_ids:
  - T-044
  how: 'Replace `yaml.load(data)` with `yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })` or use `js-yaml` v4 `load()` which
    is safe by default (no arbitrary JS execution); this does not prevent alias expansion but removes code execution. Use
