  scenario: '13 of 17 workflows declare no permissions: key at any level — including the highest-value ones: ci.yml (builds/pushes
    the Docker image, deploys to Heroku, holds DOCKERHUB_TOKEN, HEROKU_API_KEY, multiple webhooks), release.yml (creates GitHub
    releases and pushes images), lint-fixer.yml (auto-commits to branches), image_actions.yml (PR-triggered, runs a mutable-ref
    action), and rebase.yml (issue_comment-triggered). With no permissions block, GITHUB_TOKEN inherits the repository default
    scope. On repositories created before the read-only default rollout — or where the org default is still ''read and write''
    — that means write access across contents, packages, pull-requests, issues, and more. Any compromised step in these workflows
    (a hijacked action per ci-cd-pipeline-001/002, or a malicious dependency script per ci-cd-pipeline-003) then wields a
    write-capable token: it can push commits to protected branches, tamper with releases, or open/merge PRs. codeql-analysis.yml,
    lock.yml, and pr-compliance.yml show the correct pattern with scoped permissions blocks; the others should follow.'
  evidence_summary: 'ci.yml has no permissions: key (confirmed by grep -L ''permissions:'' across .github/workflows returning
    ci.yml among 13 files), so GITHUB_TOKEN defaults to the repository-wide scope.'
  impact_description: A compromised step in any of these token-bearing workflows can write repository contents, releases,
    and PRs rather than being confined to least privilege.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Three workflows (codeql-analysis.yml job-level, lock.yml, pr-compliance.yml) already declare least-privilege
