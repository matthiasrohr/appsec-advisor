  stride: Tampering
  cwe: CWE-916
  title: Unsalted MD5 Password Hashing — lib/insecurity.ts:43
  affected_parameter: null
  scenario: 'Passwords are hashed with bare MD5 and no salt: `crypto.createHash(''md5'').update(data).digest(''hex'')` at
    lib/insecurity.ts:43. This same hash() guards login (routes/login.ts:34) and the 2FA password confirmation (routes/2fa.ts:107,152).
    MD5 is fast and collision-prone, and unsalted digests are directly reversible via precomputed rainbow tables. An attacker
    who obtains the Users table (e.g. via the SQLi in auth-001) recovers plaintext passwords for the entire user base in minutes.'
  evidence_summary: hash() at lib/insecurity.ts:43 uses crypto MD5 with no salt and no key-stretching, and is the sole password-hashing
    primitive for the auth surface.
  impact_description: On any database disclosure, the full credential set is recoverable offline, enabling account takeover
    and credential reuse against other services.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None. MD5 is used with no salt, no pepper, and no work factor.
  mitigation_title: Replace MD5 password hashing with bcrypt/argon2id and migrate stored hashes at lib/insecurity.ts:43
  remediation:
    effort: Medium
    steps:
    - 'Replace hash() at lib/insecurity.ts:43 with a slow, salted KDF: bcrypt (`bcrypt.hash(password, 12)`) or argon2id.'
    - Verify with the matching compare function (`bcrypt.compare`) instead of comparing raw digests in routes/login.ts, routes/2fa.ts:107,
      and routes/2fa.ts:152.
    - Rehash on next successful login to migrate legacy MD5 hashes, or force a password reset.
    - Stop using MD5 for any security-relevant value.
    code_example: 'import bcrypt from ''bcryptjs''

      export const hashPassword = (pw: string) => bcrypt.hash(pw, 12)

      export const verifyPassword = (pw: string, stored: string) => bcrypt.compare(pw, stored)'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
