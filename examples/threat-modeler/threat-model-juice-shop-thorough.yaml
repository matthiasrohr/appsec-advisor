- local_id: auth-002
  threat_category_id: TH-02
  additional_categories:
  - TH-03
  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification
  scenario: verify() at lib/insecurity.ts:55 calls jws.verify(token, publicKey) with no algorithm allowlist, and updateAuthenticatedUsers()
    at lib/insecurity.ts:189 calls jwt.verify(token, publicKey, ...) without an algorithms option. Because no algorithm is
    pinned, an attacker can submit a token with the header alg set to 'none' (no signature required) or attempt RS256-to-HS256
    confusion where the public key in encryptionkeys/jwt.pub is treated as an HMAC secret. With jsonwebtoken@0.4.0 (an ancient
    version with known alg-confusion behaviour), a crafted unsigned token can be accepted, letting the attacker forge arbitrary
    identity claims without the private key.
  evidence_summary: Neither verify() (line 55) nor jwt.verify() (line 189) pins an algorithm, so the verifier honours the
    attacker-controlled header alg field.
  impact_description: Token forgery without the signing key, yielding authentication bypass and arbitrary-user impersonation.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The verify path accepts whatever algorithm the token header declares.
  mitigation_title: Pin RS256 as the only accepted algorithm in every JWT verification call
  remediation:
    effort: Low
    steps:
    - 'Pass algorithms: [''RS256''] to every jwt.verify() call, including the one at lib/insecurity.ts:189.'
    - 'Replace the bare jws.verify(token, publicKey) at lib/insecurity.ts:55 with jwt.verify(token, publicKey, { algorithms:
      [''RS256''] }) and reject the token on any thrown error.'
    - Upgrade jsonwebtoken from 0.4.0 to a current major version that defaults to rejecting alg:none and requires an explicit
      algorithm list.
    - 'Replace express-jwt@0.1.3 (lib/insecurity.ts:52) with a current release configured with algorithms: [''RS256''].'
    code_example: "export const verify = (token: string) => {\n  try {\n    return token ? jwt.verify(token, publicKey, {\
      \ algorithms: ['RS256'] }) : false\n  } catch {\n    return false\n  }\n}"
