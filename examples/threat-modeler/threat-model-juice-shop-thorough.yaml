  stride: Spoofing
  cwe: CWE-345
  title: Untrusted URL-Fragment Parsing of OAuth Token
  affected_parameter: access_token
  scenario: 'OAuthComponent re-parses the URL fragment that the router copied in from `window.location.href` (app.routing.ts:257)
    with no integrity or origin checks: `parseRedirectUrlParams()` (oauth.component.ts:70-79) string-splits the hash on `&`/`=`
    and the resulting `access_token` is sent verbatim to `userService.oauthLogin(...)` (oauth.component.ts:28). There is no
    `state` correlation, no token-signature/audience validation on the client, and no verification that the response came
    from the expected authorization server. An attacker who can influence the fragment (open redirect, crafted link, or a
    referrer-leaked token) can inject a token of their choosing, and the SPA will attempt to establish a session from it —
    classic OAuth response forgery / token-fixation against the implicit flow.'
  evidence_summary: oauth.component.ts:70-79 naively splits the fragment and oauth.component.ts:28 forwards the parsed access_token
    with no state/audience/issuer validation.
  impact_description: 'Session fixation / login-CSRF: an attacker-supplied token can be forced into the victim''s SPA session.'
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — fragment is split with no state, signature, audience, or issuer validation.
  mitigation_title: Validate OAuth state and token claims; perform the token exchange server-side
  remediation:
    effort: Medium
    steps:
    - Correlate a CSPRNG `state` value stored before redirect and reject the callback if it does not match (defeats response
      forgery / login-CSRF).
    - Validate `iss`, `aud`, `exp` and signature of any received token — ideally server-side as part of an authorization-code
      exchange (see frontend-spa-001) rather than trusting a fragment token in the browser.
    - Stop deriving the route `params` from `window.location.href`; pass the validated session from the backend instead.
    code_example: 'const returned = parseFragment(location.hash)

