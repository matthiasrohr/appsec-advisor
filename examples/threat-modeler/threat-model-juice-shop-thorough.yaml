    a hardcoded SHA-256 key, so digests are dictionary-attackable and identical answers collide across users.
  impact_description: Recoverable security answers let an attacker complete knowledge-based account recovery and take over
    targeted accounts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: HMAC-SHA256 is applied, but with a static hardcoded key and no per-record salt, providing no real secrecy.
  mitigation_title: Hash security answers with a salted KDF and remove the hardcoded HMAC key
  remediation:
    effort: Medium
    steps:
