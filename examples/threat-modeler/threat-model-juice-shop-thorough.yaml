threats:
- local_id: auth-service-011
  threat_category_id: TH-06
  additional_categories:
  - TH-02
  stride: Elevation of Privilege
  cwe: CWE-915
  title: Systemic Mass Assignment of Privileged Fields — server.ts:408
  affected_parameter: role
  scenario: 'Self-registration is POST /api/Users, handled by the auto-generated Sequelize/finale REST endpoint. The pre-processing
    middleware at server.ts:408-419 only trims email/password/passwordRepeat and never strips extra attributes, so the request
    body is passed through to model creation intact. The User model (models/user.ts:79-84) exposes a writable role attribute
    whose only guard is isIn [''customer'',''deluxe'',''accounting'',''admin''] — which permits ''admin''. An unauthenticated
    attacker POSTs { email, password, passwordRepeat, role: ''admin'' } and the created account is persisted with the admin
    role. Registration thus yields direct privilege escalation to administrator.'
  evidence_summary: The registration middleware at server.ts:408 forwards the raw body to finale's create; models/user.ts:79-84
    accepts a client-supplied role including 'admin' with no server-side authority check.
  impact_description: Any anonymous user can register a self-elevated administrator account, gaining full application control.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: role has an isIn validator that constrains values but does NOT prevent a client from choosing 'admin';
    no attribute allowlist is applied on create.
