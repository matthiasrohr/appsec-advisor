  stride: Spoofing
  cwe: CWE-598
  title: OAuth implicit flow leaks access_token in URL fragment — oauth.component.ts:71
  affected_parameter: access_token
  scenario: 'OAuthComponent.parseRedirectUrlParams() reads the OAuth response from the URL hash fragment (`route.snapshot.data.params`)
    and splits out an `access_token` (oauth.component.ts:71-78) — the implicit grant (response_type=token). There is no `state`
    parameter checked, no `nonce`, and no PKCE code_verifier. Two consequences follow. (1) Because the token lands in the
    URL fragment, it is exposed to browser history, referrer leakage, and any script running on the page; an anonymous attacker
    who lures a victim to a crafted `/oauth#access_token=...` callback can seed a session or read the value client-side. (2)
    With no `state` binding between the authorization request and the callback, an attacker can complete a login CSRF: forcing
    a victim''s browser to finish an OAuth callback the attacker initiated, logging the victim into an attacker-controlled
    identity.'
  evidence_summary: parseRedirectUrlParams() manually parses the hash for `access_token` with no `state`/`nonce`/PKCE validation
    before calling oauthLogin().
  impact_description: Attacker can bind a victim's session to an attacker identity (login CSRF) or capture the access token
    from the URL context.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None. The redirect params are parsed and consumed directly; no CSRF state token, nonce, or PKCE verifier
    is present anywhere in the OAuth flow.
  mitigation_title: Replace OAuth implicit grant with Authorization Code + PKCE and validate a CSRF state parameter server-side
  remediation:
    effort: High
    steps:
    - Move token acquisition to the Authorization Code flow with PKCE (response_type=code, code_challenge_method=S256); the
      browser never receives a raw access_token in the URL.
    - Generate a cryptographically random `state` before redirecting to the IdP, persist it, and reject the callback in parseRedirectUrlParams()
      when the returned `state` does not match.
    - Have the backend exchange the authorization code and set the resulting session as an httpOnly Secure SameSite=Strict
      cookie instead of returning a bearer token to JavaScript.
    - Validate the id_token `nonce`, `iss`, and `aud` claims before trusting the profile.
    code_example: "// reject callback without matching state\nconst params = this.parseRedirectUrlParams()\nif (params.state\
      \ !== sessionStorage.getItem('oauth_state')) {\n  throw new Error('OAuth state mismatch — possible login CSRF')\n}"
