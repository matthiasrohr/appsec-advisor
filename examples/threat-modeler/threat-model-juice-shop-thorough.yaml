- local_id: ci-cd-pipeline-006
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1104
  title: Legacy Dependabot v1 config is not processed — .dependabot/config.yml:1
  affected_parameter: 'version: 1'
  scenario: '`.dependabot/config.yml:1` uses the deprecated Dependabot v1 schema (`version: 1`, `update_configs:`, `update_schedule:
    live`) served by the retired dependabot.com integration. GitHub-native Dependabot reads only `.github/dependabot.yml`
