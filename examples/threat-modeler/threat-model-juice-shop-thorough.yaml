  - T-058
- id: sqlite-data-layer
  name: SQLite3/Sequelize Data Layer
  description: Embedded SQLite3 database accessed via Sequelize ORM v6.37.3. Stores users, products, orders, security challenges,
    feedback, and audit data. Contains intentional SQL injection vulnerabilities through raw query construction, unparameterized
    user input in Sequelize queries, and sensitive PII storage without encryption at rest.
  paths:
  - models/**
  - data/datacreator.ts
  - data/*.ts
  tier: data
  complexity: moderate
  framework: Sequelize
  deployment_zones:
  - prod-write-db
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-013
  - T-035
  - T-036
  - T-057
- id: socket-io-server
  name: Socket.IO Real-Time Server
  description: Socket.IO v3.1.2 WebSocket server embedded in the Express app. Provides real-time chat functionality, challenge
    notifications, and hacking instructor feedback. Authentication handled via JWT on socket connection events with weak validation.
    Intentional vulnerabilities include unauthenticated event handlers and chat message injection.
  paths:
  - lib/websocket.ts
  - routes/chat.ts
  - lib/chatbot.ts
  tier: application
  complexity: simple
  framework: Socket.IO
  deployment_zones:
  - internal-network
  - internet
  handles_sensitive_data: false
  threat_ids:
  - T-039
  - T-045
  - T-056
- id: file-storage
  name: File System / FTP Storage
  description: Local filesystem storage used for user file uploads (multer to /uploads/), FTP challenge files (/ftp/), and
    encryption keys (/encryptionkeys/). Contains intentional path traversal vulnerabilities, arbitrary file upload acceptance,
    and exposed sensitive files (private keys, configuration). No object storage or CDN — files served directly by Express.
  paths:
  - uploads/**
  - ftp/**
  - encryptionkeys/**
  - routes/fileUpload.ts
  - routes/fileServer.ts
  tier: data
  complexity: simple
  framework: null
  deployment_zones:
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-021
  - T-034
  - T-059
- id: ci-cd-pipeline
  name: GitHub Actions CI/CD Pipeline
  description: GitHub Actions workflows for build, lint, test, Docker image publication, and release automation. Package dependencies
    managed via npm without package-lock.json, and .npmrc disables lockfile. Dependabot configured. Intentional supply chain
    risks including unpinned action versions and missing lockfile.
  paths:
  - .github/workflows/**
  - .dependabot/**
  - .npmrc
  - Dockerfile
  - docker-compose*.yml
  - package.json
  tier: application
  complexity: simple
