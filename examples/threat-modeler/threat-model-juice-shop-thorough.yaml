  title: Unthrottled Socket Event Handlers with — registerWebsocketEvents.ts:47
  affected_parameter: data
  scenario: None of the socket event handlers are rate-limited — the REST `express-rate-limit` middleware in server.ts:343-471
    protects only specific HTTP routes and does not apply to the Socket.io transport. An unauthenticated client (ACT-D-01)
    can open a socket and emit `verifyLocalXssChallenge` / `verifySvgInjectionChallenge` / `notification received` in a tight
    loop. The `verifySvgInjectionChallenge` handler at registerWebsocketEvents.ts:47 runs `data?.match(/.*\.\.\/\.\.\/\.\.[\w/-]*?\/redirect\?to=https?:\/\/placecats.com\/(g\/)?[\d]+\/[\d]+.*/)`
    directly on attacker-controlled `data`; the leading/trailing `.*` combined with the nested optional quantifiers gives
    a regex that backtracks heavily on crafted long inputs, allowing a single large payload to consume CPU on the event loop.
    Flooding events or sending pathological strings degrades availability for all REST and WebSocket users sharing the single
    Node.js event loop.
  evidence_summary: The verifySvgInjectionChallenge handler at registerWebsocketEvents.ts:47 applies a backtracking-prone
    regex to unbounded client input with no per-socket rate limit.
  impact_description: A single anonymous client can saturate the shared event loop via event floods or pathological regex
    input, degrading availability.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None for the socket transport. express-rate-limit in server.ts applies only to selected HTTP routes.
  mitigation_title: Rate-limit socket events and bound/replace the backtracking redirect regex
  remediation:
    effort: Medium
    steps:
    - Add a per-socket rate limiter (e.g. a token-bucket counter on `socket.data`, or `socket.io`-compatible middleware) that
      caps events per second per connection and disconnects abusive sockets.
    - Cap the accepted payload size by rejecting `data` longer than a small bound before running any `.match()`.
    - Replace the anchored backtracking regex at registerWebsocketEvents.ts:47 with a linear-time check (e.g. parse the URL
      and compare host/path components) or anchor it with `^...$` and remove the leading/trailing `.*` to eliminate catastrophic
      backtracking.
    - Validate `data` is a string before calling `.match()` to avoid handler exceptions on unexpected types.
    code_example: "socket.use(([event], next) => {\n  const now = Date.now()\n  socket.data.win = socket.data.win?.filter(t\
      \ => now - t < 1000) ?? []\n  if (socket.data.win.push(now) > 20) return next(new Error('rate limit'))\n  next()\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
