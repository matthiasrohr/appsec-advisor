- local_id: b2b-api-004
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Unbounded blocking VM execution with no rate limit on /b2b/v2/orders
  affected_parameter: orderLinesData
  scenario: 'Each POST to /b2b/v2/orders runs orderLinesData inside vm.runInContext with a 2000ms timeout (routes/b2bOrder.ts:23).
    node:vm executes synchronously on the main event loop, so a payload crafted to spin until the timeout (e.g. while(true){}
    or a catastrophic-backtracking regex) blocks the single Node event loop for the full 2000ms per request. The route registration
    at server.ts:648 has no rate-limit middleware — express-rate-limit is applied only to specific REST routes (server.ts:343,
    459, 466, 472), never to the B2B path. An attacker holding (or forging) a JWT can fire concurrent slow requests, each
    pinning the event loop for 2 seconds, exhausting the server''s request-processing capacity. This is the documented rceOccupyChallenge:
    the timeout branch even sets res.status(503) ''temporarily not available'' (lines 26-29).'
  evidence_summary: The 2000ms synchronous vm execution at line 23 runs on the main event loop, and no rate limiter guards
    the route registered at server.ts:648 (express-rate-limit is scoped to other routes only).
  impact_description: Sustained concurrent slow-payload requests block the event loop and exhaust capacity, rendering the
    entire application unavailable to legitimate users (single-process DoS).
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: A 2000ms per-request execution timeout caps a single request's CPU time but does not prevent concurrent
    or repeated abuse. No rate limiting on the B2B route.
  mitigation_title: Rate-limit /b2b/v2/orders and offload VM execution off the event loop
  remediation:
    effort: Medium
    steps:
    - Apply express-rate-limit to app.post('/b2b/v2/orders', ...) at server.ts:648 (e.g. windowMs 5m, max 20 per principal)
      consistent with other sensitive routes.
    - Once the eval path is removed (see b2b-api-001) the blocking-VM DoS disappears; until then, move any required sandboxed
      evaluation to a worker thread / isolated-vm with a hard CPU budget so it never blocks the main event loop.
    - Lower the 2000ms timeout to the minimum needed and cap concurrent in-flight B2B evaluations.
    code_example: "app.post('/b2b/v2/orders',\n  rateLimit({ windowMs: 5 * 60 * 1000, max: 20, validate: false }),\n  security.isAuthorized(),\n\
      \  b2bOrder()\n)"
