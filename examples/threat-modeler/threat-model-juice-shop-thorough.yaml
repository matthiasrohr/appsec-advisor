- local_id: file-upload-handler-001
  threat_category_id: TH-01
  additional_categories:
  - TH-17
  stride: Information Disclosure
  cwe: CWE-611
  title: XML External Entity Injection
  affected_parameter: file
  scenario: POST /file-upload accepts a .xml part and routes it to handleXmlUpload (routes/fileUpload.ts:70), which calls
    parseXmlString (lib/xml.ts:33). The parser is configured with XML_PARSE_NOENT | XML_PARSE_DTDLOAD (lib/xml.ts:35) and
    explicitly registers host filesystem input providers via xmlRegisterFsInputProviders (lib/xml.ts:21), so a DOCTYPE declaring
    <!ENTITY xxe SYSTEM "file:///etc/passwd"> is resolved and the expanded entity is reflected back to the client in the 410
    error body (routes/fileUpload.ts:79, utils.trunc(xmlString, 400)). The route has no isAuthorized() guard (server.ts:309),
    so an anonymous attacker reads arbitrary server files and can pivot to internal URLs through SYSTEM entities.
  evidence_summary: parseXmlString enables NOENT and DTDLOAD and registers fs input providers, then echoes the parsed document
    into the response error message.
  impact_description: Anonymous attacker exfiltrates /etc/passwd, application config, and other readable files, and can reach
    internal network endpoints via SYSTEM/SSRF entities.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Parse runs inside vm.runInContext with a 2000ms timeout (lib/xml.ts:38) — this bounds entity-expansion
    DoS but does NOT disable external-entity resolution; it is in fact enabled on purpose.
  mitigation_title: Disable DTD loading and external-entity resolution in parseXmlString
  remediation:
    effort: Low
    steps:
    - Remove XML_PARSE_NOENT and XML_PARSE_DTDLOAD from the ParseOption bitmask at lib/xml.ts:35 — parse with entity substitution
      and DTD loading off so SYSTEM/file:// entities never resolve.
    - Delete the xmlRegisterFsInputProviders() call at lib/xml.ts:21 so the WASM parser has no host filesystem access.
    - 'Stop reflecting the parsed XML back to the caller: replace utils.trunc(xmlString, 400) in the routes/fileUpload.ts:79
      error with a static message so even residual entity content is not disclosed.'
    - Add security.isAuthorized() in front of POST /file-upload at server.ts:309 to remove the anonymous attack path.
    code_example: 'const option = libxml2.ParseOption.XML_PARSE_NOBLANKS | libxml2.ParseOption.XML_PARSE_NOCDATA

      // NOENT and DTDLOAD removed; do not call xmlRegisterFsInputProviders()'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
