- local_id: sqlite-data-layer-005
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-798
  title: Security answers keyed with a hardcoded static — models/securityAnswer.ts:45
  scenario: The SecurityAnswer model's `answer` setter stores `security.hmac(answer)`, where `security.hmac` (lib/insecurity.ts:42)
    is `crypto.createHmac('sha256', 'pa4qacea4VK9t9nGv7yZtwmj')` — a single application-wide key committed to the source tree.
    Because the key is public and the transform is deterministic and unsalted, an attacker who reads the SecurityAnswers table
    can precompute HMACs of a dictionary of common answers to recover secret-question responses offline, and can trivially
    see when two users share the same answer (identical digests). Recovered answers feed the account-recovery/reset-password
    flows for takeover.
  evidence_summary: The answer set() hook applies security.hmac, which keys HMAC-SHA256 with the literal string 'pa4qacea4VK9t9nGv7yZtwmj'
    hardcoded in insecurity.ts, giving a deterministic unsalted digest.
  impact_description: Offline dictionary recovery and cross-user correlation of security answers, enabling account-recovery
    abuse.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Answers are not stored in cleartext, but the static shared key and lack of per-record salt negate the
    protection.
  mitigation_title: Per-record salt security answers with a slow KDF and a secret managed key
  remediation:
    effort: Medium
    steps:
    - Hash security answers with a slow, salted algorithm (bcrypt/argon2id) using a unique per-row salt instead of a global
      static HMAC key.
    - Move any remaining keyed-hash secret out of source and into a secret manager, and rotate the exposed 'pa4qacea4VK9t9nGv7yZtwmj'
      value.
    - Re-hash existing SecurityAnswers rows on next successful use.
    code_example: "answer: {\n  type: DataTypes.STRING,\n  set (answer: string) {\n    this.setDataValue('answer', bcrypt.hashSync(answer.trim().toLowerCase(),\
      \ 12))\n  }\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
  evidence:
  - file: models/securityAnswer.ts
    line: 45
  evidence_check: verified
