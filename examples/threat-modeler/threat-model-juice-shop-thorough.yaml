  impact: High
  risk: High
  controls_in_place: None — no httpOnly cookies, no BFF pattern.
  mitigation_title: Store the JWT in an httpOnly Secure SameSite=Strict cookie managed by the backend instead of localStorage
  remediation:
    effort: High
    steps:
