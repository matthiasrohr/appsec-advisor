- local_id: ci-cd-pipeline-004
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Npm install Runs postinstall Build Hook on Untrusted PR Code
  scenario: 'package.json defines `postinstall: cd frontend && npm install && cd .. && npm run build:frontend && ...`. The
    ci.yml test jobs (coding-challenge-rsn line 51, frontend-test line 71, server-test line 110, api-test line 147, e2e-test
    line 238, custom-config-test line 203) run bare `npm install` — WITHOUT `--ignore-scripts`. Because ci.yml triggers on
    `pull_request` (ci.yml:14), a fork contributor can open a PR that modifies `package.json`''s postinstall script (or any
    file `build:frontend` executes) and have arbitrary code run on the CI runner the moment dependencies install. The lint
    and lint-fixer jobs correctly use `npm install --ignore-scripts` (ci.yml:36,38; lint-fixer.yml:17-19), proving the safer
    pattern is known to the project but not applied to the test jobs. While fork-PR runs receive a read-scoped GITHUB_TOKEN
    by default, the runner still executes attacker code and can poison the build cache, mine, or attempt token/secret access
    (api-test exposes ALCHEMY_API_KEY at line 153).'
  evidence_summary: ci.yml test jobs invoke `npm install` (lines 51, 71, 110, 147, 203, 238) with no `--ignore-scripts`, so
    package.json's postinstall hook executes on PR-submitted code, whereas the lint jobs use `npm install --ignore-scripts`.
  impact_description: A fork PR can achieve arbitrary code execution on the CI runner at dependency-install time, enabling
    build poisoning and attempts to read job-scoped secrets such as ALCHEMY_API_KEY.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Fork PRs run with a default read-only GITHUB_TOKEN and without access to repo secrets in most jobs; lint/lint-fixer
    jobs already use --ignore-scripts.
  mitigation_title: Add --ignore-scripts to npm install in all PR-triggered ci.yml test jobs
  remediation:
    effort: Medium
    steps:
    - Change `npm install` to `npm ci --ignore-scripts` (or `npm install --ignore-scripts`) in the coding-challenge-rsn, frontend-test,
      server-test, api-test, custom-config-test, and e2e-test jobs, then run the required build steps explicitly as separate,
      reviewed commands.
    - Where the postinstall build output is genuinely needed for tests, invoke `npm run build:frontend` / `build:server` as
      discrete steps after install so the build is visible and not a hidden install-time side effect.
    - Restrict secret-bearing jobs (api-test ALCHEMY_API_KEY, e2e-test webhooks) so they do not run on untrusted fork PRs,
