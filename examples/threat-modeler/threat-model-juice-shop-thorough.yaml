  cwe: CWE-359
  title: Global Broadcast of Challenge Flags to All Unauthent… (lib/challengeUtils.ts:71)
  affected_parameter: null
  scenario: When any user solves a challenge, `globalWithSocketIO.io.emit('challenge solved', notification)` at `lib/challengeUtils.ts:71`
    broadcasts to ALL currently connected sockets — not scoped to the solving user's socket. The `notification` object (challengeUtils.ts:58-66)
    includes `flag` (the raw CTF flag string from `utils.ctfFlag(challenge.name)`), `key`, `name`, and the decoded challenge
    description. Additionally, `registerWebsocketEvents.ts:30-32` replays the entire `notifications` array to every newly-connecting
    socket on initial connection, batching all historical solved-challenge flags. An attacker running a background socket
    listener collects every flag solved by any user in the shared deployment — requiring zero challenge solving on their own.
  evidence_summary: '`io.emit(''challenge solved'', notification)` at challengeUtils.ts:71 uses the namespace-wide broadcast
    method, not `socket.to(socketId).emit()`, meaning the `flag` field reaches every connected socket regardless of who solved
    the challenge.'
  impact_description: In a multi-user or CTF deployment, an unauthenticated observer harvests every CTF flag from other users'
    solves passively over a single persistent socket connection.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — broadcast is unconditional.
  mitigation_title: Scope challenge-solved notifications to the solving user's socket instead of broadcasting to all
  remediation:
