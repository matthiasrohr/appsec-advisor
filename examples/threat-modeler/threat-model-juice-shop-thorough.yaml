  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Unbounded Resource Consumption (No Rate Limiting)
  affected_parameter: orderLinesData
  scenario: Each POST /b2b/v2/orders evaluates orderLinesData for up to 2000ms (routes/b2bOrder.ts:23). The endpoint has no
    rate limit — express-rate-limit is applied only to /rest/user/reset-password (server.ts:343) and the three /rest/2fa/*
    routes (server.ts:459/466/472), never to /b2b/v2. An authenticated client submits a stream of expensive expressions (e.g.
    tight loops that each burn the full 2000ms of a worker), or many concurrent requests, to saturate the single Node event
    loop and starve all other endpoints. The catch at line 26-29 explicitly recognizes `Script execution timed out` and solves
    the rceOccupyChallenge, confirming the resource-exhaustion path is reachable by design.
  evidence_summary: No rateLimit middleware wraps app.post('/b2b/v2/orders', ...) (server.ts:648); each request can occupy
    a worker for the full 2000ms vm timeout.
  impact_description: Sustained CPU/event-loop exhaustion making the entire single-process application unresponsive to all
    users.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: vm timeout of 2000ms bounds a single evaluation's wall time but does not bound request frequency or concurrency;
    no rate limiting on /b2b/v2.
  mitigation_title: Add per-client rate limiting to /b2b/v2/orders and lower the evaluation timeout
  remediation:
    effort: Low
    steps:
    - Apply express-rate-limit to the /b2b/v2 mount (server.ts:424 area), keyed on the authenticated client id, e.g. max 20
      requests per minute.
    - Once orderLinesData is parsed as data rather than evaluated (b2b-api-001), the 2000ms CPU window disappears entirely;
      until then, reduce the vm timeout to the smallest workable value.
    - Cap the accepted orderLinesData payload size with an explicit body-size limit for this route.
    code_example: 'app.use(''/b2b/v2'', security.isAuthorized())

      app.use(''/b2b/v2'', rateLimit({ windowMs: 60_000, max: 20, keyGenerator: req => req.user?.id ?? req.ip }))'
