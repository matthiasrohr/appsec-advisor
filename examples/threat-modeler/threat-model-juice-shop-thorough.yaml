  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: YAML bomb alias expansion causes heap exhaustion routes/fileUpload.ts:117
  affected_parameter: uploaded YAML file body
  scenario: 'An unauthenticated attacker uploads a YAML file using YAML anchor/alias syntax to create exponential data expansion,
    for example a ''billion laughs'' pattern: `a: &a [lol, lol, ...]; b: &b [*a, *a, ...]` repeated 9 levels deep. The server
    passes the raw buffer to `yaml.load(data)` at line 117. The js-yaml `load()` function (not `safeLoad` or `loadAll` with
    options) resolves all aliases and materialises the full expanded structure in memory before `JSON.stringify()` is called.
    A 200-byte YAML input can expand to hundreds of megabytes, exhausting the V8 heap and causing a Node.js process crash.
    The `vm.createContext` sandbox timeout of 2000ms fires on the `JSON.stringify()` call but not during `yaml.load()` expansion,
    so the memory exhaustion occurs before the timeout can terminate execution.'
  evidence_summary: '`yaml.load(data)` at line 117 runs inside `vm.runInContext` with `{ timeout: 2000 }` but the alias expansion
    happens synchronously within `yaml.load()` before returning, so the heap grows unboundedly before the timeout fires.'
  impact_description: A single crafted upload request crashes the Node.js process or forces the garbage collector into a stall
    loop, causing complete service unavailability for all users.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 2-second VM execution timeout (applies to `JSON.stringify()` call, not to `yaml.load()` expansion); 200KB
    compressed file size limit (decompressed expansion is unlimited).
  mitigation_title: Replace yaml.load with yaml.safeLoad and enforce alias expansion depth/count limits
  remediation:
    effort: Low
    steps:
    - 'Replace `yaml.load(data)` with `yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })` or use `js-yaml` v4 `load()` which
      is safe by default (no arbitrary JS execution); this does not prevent alias expansion but removes code execution.'
    - Use a YAML parser that supports alias count limits, or pre-process the buffer to count `*` alias references and reject
      inputs exceeding a safe threshold (e.g. 100 aliases).
    - 'Add a decompressed-content size cap by truncating the buffer before parsing: `const data = file.buffer.slice(0, 50000).toString()`
      — reject files whose buffer exceeds 50KB after decompression.'
    - Ensure the `/file-upload` endpoint requires authentication to prevent unauthenticated DoS amplification.
    code_example: null
    reference: CWE-400
