- local_id: frontend-spa-011
  threat_category_id: TH-11
  additional_categories:
  - TH-12
  stride: Tampering
  cwe: CWE-1021
  title: Missing Content-Security-Policy in SPA Document
  affected_parameter: null
  scenario: index.html ships no Content-Security-Policy (no meta CSP tag in the document head, lines 8-29) and loads third-party
    resources (Google Fonts CSS/Gstatic) without Subresource Integrity. With multiple confirmed XSS sinks in this SPA (search-result.component.ts:143,
    data-export.component.ts:71, the bypassSecurityTrustHtml family) and the session token sitting in JavaScript-readable
    storage, the absence of a CSP means an injected script has no restriction on inline execution or on the origins it may
    exfiltrate the stolen token to. A CSP would not fix the XSS bugs but is the standard defense-in-depth that contains their
    impact; its absence raises the realized severity of every other XSS finding here.
  evidence_summary: index.html (head, lines 8-29) contains no Content-Security-Policy meta tag and loads remote font resources
    without integrity attributes.
  impact_description: 'No containment for injected scripts: token exfiltration to arbitrary origins and inline script execution
    proceed unimpeded once any XSS fires.'
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None — no CSP, no SRI on third-party resources.
  mitigation_title: Add a Content-Security-Policy (preferably via server header) and SRI for third-party scripts
  remediation:
    effort: Medium
    steps:
    - 'Set a Content-Security-Policy, preferably as an HTTP response header from the Express server: `default-src ''self'';
      script-src ''self''; style-src ''self'' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src
      ''self''`.'
    - Avoid `'unsafe-inline'`; move the inline cookie-consent bootstrap script (index.html:24-29) to an external file under
      'self' or guard it with a nonce.
    - Add Subresource Integrity (`integrity`/`crossorigin`) to the Google Fonts stylesheet link.
    code_example: "<!-- Express -->\napp.use(helmet.contentSecurityPolicy({\n  directives: { defaultSrc: [\"'self'\"], scriptSrc:\
      \ [\"'self'\"], connectSrc: [\"'self'\"] }\n}))"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Content_Security_Policy_Cheat_Sheet.html
