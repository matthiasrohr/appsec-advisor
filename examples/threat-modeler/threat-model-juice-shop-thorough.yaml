    pattern appears in `administration.component.ts:60,78` (user email, feedback comment) and `about.component.ts:119` (feedback
    comment) — any stored feedback containing `<script>` or an event-handler tag is rendered raw.'
  evidence_summary: '`bypassSecurityTrustHtml` at line 132 marks server-supplied product descriptions as trusted HTML without
    sanitisation before `[innerHTML]` binding.'
