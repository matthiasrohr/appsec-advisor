- local_id: backend-api-001
  threat_category_id: TH-03
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA Private Key Enables JWT Forgery (lib/insecurity.ts:23)
  affected_parameter: Authorization header / JWT token
  scenario: 'The RSA private key used to sign all JWT tokens is hardcoded verbatim in lib/insecurity.ts line 23. Any attacker
    who obtains the source code — via public GitHub, a directory traversal, or the intentionally exposed /ftp endpoint — can
    extract this key and use jwt.sign() to forge valid RS256 tokens for any user ID, including admin accounts. The authorize()
    function at line 56 uses this same private key, so all forged tokens pass the expressJwt({ secret: publicKey }) verification
    performed by isAuthorized() middleware. Because the key cannot be rotated without a code deployment, compromise is permanent
    until a code change ships.'
  evidence_summary: lib/insecurity.ts line 23 contains a literal PEM-encoded RSA private key assigned to the const privateKey
    variable, which line 56 passes to jwt.sign().
  impact_description: 'Full authentication bypass: an attacker forges admin-role JWT tokens, gaining unrestricted access to
    every authenticated endpoint including /rest/user/authentication-details and admin API routes.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 algorithm is used; public key verification via expressJwt. Controls are fully undermined by key
    exposure.
  mitigation_title: Remove hardcoded private key and load it from a secrets manager or environment variable at startup
  remediation:
    effort: Medium
    steps:
    - 'Delete the hardcoded PEM block from lib/insecurity.ts:23 and replace with: const privateKey = process.env.JWT_PRIVATE_KEY
      ?? fs.readFileSync(process.env.JWT_PRIVATE_KEY_PATH ?? ''keys/jwt.pem'', ''utf8'')'
    - Generate a fresh RSA-4096 keypair; invalidate the exposed keypair immediately by rotating it in all environments.
    - Store the private key in a secrets manager (AWS Secrets Manager, HashiCorp Vault) and inject via environment variable
      — never commit to VCS.
    - Add a startup assertion that fails fast if the env var is absent, preventing the application from starting with no key.
    - 'Pin express-jwt to a current version (>= 8.x) and pass algorithms: [''RS256''] to prevent algorithm confusion.'
    code_example: '```typescript

      // lib/insecurity.ts

      if (!process.env.JWT_PRIVATE_KEY) throw new Error(''JWT_PRIVATE_KEY env var must be set'');

      const privateKey = process.env.JWT_PRIVATE_KEY.replace(/\\n/g, ''\n'');

      export const authorize = (user = {}) => jwt.sign(user, privateKey, { expiresIn: ''6h'', algorithm: ''RS256'' });

      export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] });

      ```'
    reference: CWE-321
  evidence:
  - file: lib/insecurity.ts
    line: 23
  evidence_check: unchecked
