    - Alternatively, enforce that the redirect target's `pathname` starts with `/` and the origin equals `process.env.APP_ORIGIN`
      — reject any URL with a different origin.
    - Add test cases with `https://evil.com/?x=https://github.com/juice-shop/juice-shop` and `https://github.com.evil.com/`
      asserting they are rejected.
    code_example: "// lib/insecurity.ts — fixed isRedirectAllowed\nexport const isRedirectAllowed = (url: string) => {\n \
      \ try {\n    const target = new URL(url)\n    return [...redirectAllowlist].some(allowed =>\n      new URL(allowed).origin\
      \ === target.origin\n    )\n  } catch { return false }\n}"
