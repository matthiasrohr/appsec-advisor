    static string ''pa4qacea4VK9t9nGv7yZtwmj'' hardcoded at lib/insecurity.ts:42. Because the key is a fixed, source-visible
    constant and answers are unsalted, the protection collapses to a deterministic keyed hash known to anyone with repo access:
    an attacker can pre-compute HMACs for common security-question answers (mother''s maiden name, first pet, city of birth)
    and match them directly against the SecurityAnswers table to recover answers, then drive account recovery / password-reset
    flows to impersonate users.'
