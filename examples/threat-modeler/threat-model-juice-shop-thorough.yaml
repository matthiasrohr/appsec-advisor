- local_id: sqlite-db-005
  threat_category_id: TH-12
  additional_categories:
  - TH-11
  stride: Information Disclosure
  cwe: CWE-312
  title: Unencrypted SQLite File Exposes Entire Database at Rest — data/juiceshop.sqlite
  affected_parameter: null
  scenario: The SQLite database file at data/juiceshop.sqlite is stored unencrypted on the filesystem. Any process with read
    access to that path — a container escape, misconfigured file permissions, a compromised sidecar process, a stolen backup,
    or a directory-traversal vulnerability elsewhere in the application — can read the entire database directly using the
    sqlite3 CLI or any SQLite library. No DB-level authentication or encryption prevents this. The file contains all Users
    (email, MD5 password, totpSecret, lastLoginIp, profileImage), Orders, Feedback, and all other application data.
  evidence_summary: data/juiceshop.sqlite is an unencrypted SQLite file — its entire contents are accessible to any OS-level
    read, with no SQLite encryption extension (SQLCipher or equivalent) in use.
  impact_description: Full data breach of all application data including PII, credential hashes, TOTP secrets, and order history
    — no cryptographic barrier between filesystem access and data exfiltration.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — no encryption at rest, no SQLite encryption extension detected.
  mitigation_title: Encrypt the SQLite database file using SQLCipher or store sensitive fields with field-level encryption
  remediation:
    effort: High
    steps:
    - Migrate to SQLCipher (a SQLite extension that transparently encrypts the entire database file with AES-256) — requires
      recompiling the sqlite3 native module and setting a per-instance encryption key via PRAGMA key = '...' on connection
      open.
    - As an intermediate control, apply field-level encryption for the most sensitive columns (totpSecret, password) using
      a KMS-managed key before storing — even if the file is read, the sensitive values remain ciphertext.
    - Restrict OS-level file permissions on data/juiceshop.sqlite to the application's process user only (chmod 600) and ensure
      it is excluded from version control and backup systems that lack their own encryption.
    code_example: null
    reference: CWE-312
