  cwe: CWE-611
  title: XXE external entity file disclosure — routes/fileUpload.ts:76
  affected_parameter: uploaded .xml body
  scenario: handleXmlUpload() passes the raw buffer of any uploaded .xml file straight into parseXmlString(data) with no entity
    restriction. An attacker uploads XML with an external entity (`<!ENTITY xxe SYSTEM 'file:///etc/passwd'>`) referenced
    in the document body. The parsed string — including the resolved file contents — is echoed back inside the error response
    at line 79 (`utils.trunc(xmlString, 400)`), giving a direct exfiltration channel for local files such as /etc/passwd or
    application secrets. The same parser also enables entity-expansion DoS (the code comment at line 73 acknowledges these
    payloads cause container segfaults).
  evidence_summary: Line 76 calls `parseXmlString(data)` on attacker-supplied XML and line 79 reflects the parsed `xmlString`
    back to the client, so resolved external-entity content leaves the server in the response body.
  impact_description: Disclosure of arbitrary local files (credentials, /etc/passwd) and denial of service via entity expansion.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Feature is gated behind the deprecatedInterface challenge flag but is enabled by default; no entity/DTD
    hardening is applied at the parser.
  mitigation_title: Disable DTD and external-entity resolution in parseXmlString and stop reflecting parsed XML in error responses
  remediation:
    effort: Low
    steps:
    - 'Configure the underlying XML parser (lib/xml) to disable DOCTYPE/DTD processing and external general and parameter
      entities (`noent: false`, `nonet: true`, reject `<!DOCTYPE>`).'
    - Remove the parsed XML content from the error message at line 79 so file contents cannot be reflected to the caller.
    - Cap input size and parse time to bound entity-expansion resource use.
    code_example: '// lib/xml — libxmljs example

      const doc = libxmljs.parseXml(data, { noent: false, nonet: true, dtdload: false, dtdvalid: false })

      if (doc.getDtd()) throw new Error(''DOCTYPE not allowed'')'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
