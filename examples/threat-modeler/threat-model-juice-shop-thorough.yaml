- local_id: web3-nft-005
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-770
  title: Unbounded in-memory wallet sets, no rate limit
  affected_parameter: walletAddress
  scenario: contractExploitListener does walletsConnected.add(req.body.walletAddress) at routes/web3Wallet.ts:16 on every
    POST /rest/web3/walletExploitAddress, and walletNFTVerify / the NFT listener feed addressesMinted (routes/nftMint.ts:10,42).
    The web3 routes carry no rate-limit middleware (express-rate-limit is applied to other routes at server.ts:343,459-472
    but not to lines 641-645). An anonymous attacker scripts millions of POSTs with unique random walletAddress values; each
    unique value grows the unbounded Set, consuming process heap with no eviction or cap. addressesMinted entries are only
    removed on a successful verify, and walletsConnected only on a matching on-chain event, so attacker-seeded junk never
    evicts. Sustained flooding exhausts memory and degrades the single Node process.
  evidence_summary: Module-level Sets (walletsConnected, addressesMinted) grow per request with no size cap or TTL, and the
    web3 route block at server.ts:641-645 has no rate-limit middleware.
  impact_description: Unbounded memory growth from attacker-supplied addresses plus absent rate limiting enables a low-cost
    memory-exhaustion DoS of the Node process.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: express-rate-limit is configured for other endpoints (server.ts:343,459) but is not applied to any /rest/web3/*
    route; the Sets have no bound.
  mitigation_title: Add rate limiting and bounded/TTL eviction to web3 wallet tracking sets
  remediation:
    effort: Low
    steps:
    - 'Apply rateLimit({ windowMs: 5*60*1000, max: 100 }) (the pattern already used at server.ts:459) to the /rest/web3/walletExploitAddress
      and walletNFTVerify routes.'
    - Replace the unbounded Sets with a bounded LRU/TTL structure so attacker-seeded addresses self-evict; cap maximum entries.
    - Validate walletAddress against the EIP-55 address format before storing to reject junk early.
    code_example: 'import { rateLimit } from ''express-rate-limit''

      const web3Limiter = rateLimit({ windowMs: 5*60*1000, max: 100, validate: false })

      app.post(''/rest/web3/walletExploitAddress'', web3Limiter, utils.asyncHandler(contractExploitListener()))'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
  evidence:
