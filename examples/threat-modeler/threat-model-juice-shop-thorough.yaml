  - T-056
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Drive the CORS origin from configuration (config.get) rather than the hardcoded dev value so production origins are
    allowlisted explicitly. In the `io.use` handshake middleware, additionally check `socket.handshake.headers.origin` against
    the allowlist and reject mismatches, so the control is enforced for WebSocket transport and not only CORS-aware browsers.
    Treat origin validation as defence-in-depth on top of the JWT handshake auth from finding -001, not a substitute for it.
- id: M-057
  title: Derive entitlement tokens from a secret-managed key distinct from the JWT key
  threat_ids:
  - T-057
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Move the HMAC key for deluxeToken and the answer-hash key (insecurity.ts:42) to environment-provided secrets, separate
    from the JWT signing key. Bind entitlement to a server-side flag on the user record rather than a client-presentable derived
    token. Rotate both keys after removing them from the repository and git history.
- id: M-058
  title: Sign published images with cosign and emit SLSA provenance for releases
  threat_ids:
  - T-058
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Add a `sigstore/cosign-installer` + `cosign sign --yes` step (keyless OIDC) after the docker/build-push-action steps
    in ci.yml and release.yml to sign the pushed image digest. Enable build provenance via `actions/attest-build-provenance`
    (or docker/build-push-action `provenance: true` with a registry that supports attestations) so consumers can verify the
    build with `cosign verify-attestation`. Attach detached signatures (`.sig`/`.intoto.jsonl`) to the GitHub release tarballs
    and document the verification command in the release notes.'
- id: M-059
  title: SHA-pin coverallsapp/github-action and codeql-action references to match repo convention
  threat_ids:
  - T-059
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Replace `coverallsapp/github-action@v2` in ci.yml:188 with the full commit SHA of the desired release plus a `# v2.x.x`
    comment. Replace the three `github/codeql-action/*@v3` references in codeql-analysis.yml with commit SHAs, accepting that
    GitHub-owned actions are lower risk but standardizing the pin policy. Add a CI lint step (e.g. `zizmor` or a `grep` gate)
    that fails the build when any `uses:` line ends in a `@vN`/`@main`/`@master` ref instead of a 40-char SHA.
- id: M-060
  title: Add a Content-Security-Policy (preferably via server header) and SRI for third-party scripts
  threat_ids:
  - T-060
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Set a Content-Security-Policy, preferably as an HTTP response header from the Express server: `default-src ''self'';
    script-src ''self''; style-src ''self'' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src
    ''self''`. Avoid `''unsafe-inline''`; move the inline cookie-consent bootstrap script (index.html:24-29) to an external
    file under ''self'' or guard it with a nonce. Add Subresource Integrity (`integrity`/`crossorigin`) to the Google Fonts
    stylesheet link.'
- id: M-061
  title: Emit structured security audit events for auth and privileged operations
  threat_ids:
  - T-061
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Log login success/failure, token issuance, password/role/2FA changes, and B2B order processing as structured events
    with actor id, action, resource, source IP, and UTC timestamp. Write audit events to an append-only sink separate from
    application logs and protect them from tampering. Include a correlation id linking the audit event to the request and
    any resulting data change.
- id: M-062
  title: Authenticate or network-restrict the /metrics endpoint
  threat_ids:
  - T-062
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Require an authenticated scrape credential (bearer token or basic auth) on /metrics, or bind it to an internal-only
    interface/network not exposed to the internet. Avoid embedding business-identifying labels (e.g. customer-type user counts)
    in publicly reachable metrics. Front the endpoint with the express-rate-limit already imported to blunt scraping.
- id: M-063
  title: Suppress tool-call debug frames server-side unless the caller is an admin
  threat_ids:
  - T-063
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: In the `tool-call` case of the stream loop, decode the caller's JWT and emit the tool-call SSE frame only when `role
    === roles.admin`; otherwise skip writing the `tool_calls` payload. Do not rely on the `show_tool_calls` cookie for any
    authorization decision — treat it as a UI preference for admins only. Keep the metric increment (line 227) but move it
    before the role gate so observability is unaffected.
- id: M-064
  title: Add USER <non-root-uid>
  threat_ids:
  - T-064
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-065
  title: Add cosign signing step to release workflow; or use actions/attest-build-provenance
  threat_ids:
  - T-065
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-066
  title: Use `npm ci --ignore-scripts` and audit required postinstalls separately
  threat_ids:
  - T-066
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-067
  title: Hash security answers with a per-user salted adaptive function and a managed secret
  threat_ids:
  - T-067
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Replace the hardcoded-key HMAC in the SecurityAnswer setter with a per-user salted adaptive hash (bcrypt/argon2), the
    same way passwords should be treated. If a keyed MAC is required, source the key from a secrets manager rather than the
    lib/insecurity.ts:42 literal, and rotate it. Normalize answers (trim/lowercase) before hashing to keep comparison correct
    after the change. Consider deprecating knowledge-based security answers in favor of a stronger recovery factor.
- id: M-068
  title: Key the reset-password rate limiter on a trusted client identifier
  threat_ids:
  - T-068
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Configure Express trust proxy correctly and key the limiter on req.ip (which express-rate-limit derives from the trusted
    proxy chain), not the raw X-Forwarded-For header. Add a per-account counter (keyed on the target email) in addition to
    the per-IP counter so header rotation cannot widen the budget. Lower the max from 100 to a value appropriate for a recovery
    endpoint (e.g. 5 per window).
- id: M-069
  title: Disable DTD/entity expansion and rate-limit XML uploads
  threat_ids:
  - T-069
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Remove XML_PARSE_DTDLOAD and XML_PARSE_NOENT at lib/xml.ts:35 so entity-expansion bombs cannot inflate (same change
    that fixes the XXE finding). Lower the parse timeout and add a per-IP rate limit / concurrency cap on POST /file-upload
    to bound aggregate CPU spend. Require authentication on the route (server.ts:309) so the surface is attributable and throttleable
    per account.
- id: M-070
  title: Add rate limiting and bounded/TTL eviction to web3 wallet tracking sets
  threat_ids:
  - T-070
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Apply rateLimit({ windowMs: 5*60*1000, max: 100 }) (the pattern already used at server.ts:459) to the /rest/web3/walletExploitAddress
    and walletNFTVerify routes. Replace the unbounded Sets with a bounded LRU/TTL structure so attacker-seeded addresses self-evict;
    cap maximum entries. Validate walletAddress against the EIP-55 address format before storing to reject junk early.'
