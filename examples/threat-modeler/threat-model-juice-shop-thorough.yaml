  stride: Elevation of Privilege
  cwe: CWE-306
  title: Client-side-only role enforcement in AdminGuard allows — app.guard.ts:53
  affected_parameter: role
  scenario: AdminGuard.canActivate() at app.guard.ts:52-60 decodes the JWT from localStorage using jwtDecode() and checks
    payload.data.role === roles.admin. This is a client-side check only — no server call is made to verify the token signature
    or role claim. An attacker who can plant a crafted JWT string in localStorage (via XSS, or by directly writing to localStorage
    in the browser's developer console) can bypass the guard and navigate to /administration. If the /administration route
    also calls server APIs that do not validate authorization server-side, this yields full admin privilege. Additionally,
