- local_id: ci-cd-pipeline-007
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-250
  title: Pull_request_target grants write + org-admin token while — pr-compliance.yml:4
  affected_parameter: ORG_ADMIN_TOKEN
  scenario: 'pr-compliance.yml runs on `pull_request_target` (line 4) with `pull-requests: write` and `issues: write` (lines
    7-9), and exposes the privileged `ORG_ADMIN_TOKEN` to the Block Spammer step (line 438) which can block GitHub org users
    org-wide. pull_request_target runs in the trusted base-repo context with full secrets, and the workflow ingests attacker-controlled
    PR title/body/commit messages. The current implementation is comparatively safe because it never checks out the PR head
    and passes untrusted strings only via `env:` into github-script JS variables (e.g. PR_JSON at lines 88/101/117) rather
    than interpolating `${{ }}` into `run:` shell — so classic script injection is avoided. The residual risk is the standing
    combination of a highly-privileged secret (ORG_ADMIN_TOKEN) plus broad write permissions in a workflow whose entire trigger
    surface is attacker-initiated: any future edit that adds a PR-head checkout, or that interpolates PR data into a shell/run
    step, immediately becomes a critical pwn-request. The blast radius (org-wide user blocking, PR close/label/comment) is
    large for a metadata-only compliance check.'
  evidence_summary: A pull_request_target workflow holds pull-requests:write, issues:write and an org-admin token while processing
    untrusted PR metadata, though it currently avoids head checkout and shell interpolation.
  impact_description: Any regression that introduces PR-head checkout or shell interpolation turns this into org-admin-token
    theft and org-wide user blocking abuse.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The workflow does not check out PR head code and passes untrusted PR fields through `env:` into github-script
    variables instead of `${{ }}`-into-run interpolation, avoiding script injection. All actions are SHA-pinned. Member PRs
    short-circuit the checks (lines 62-78).
  mitigation_title: Minimize pull_request_target privileges and isolate the org-admin token to a separate hardened job
  remediation:
    effort: Medium
    steps:
    - 'Scope `permissions:` to the minimum each job needs and remove `issues: write` if only PR operations are required (pr-compliance.yml:7-9).'
    - Move the ORG_ADMIN_TOKEN Block Spammer step into a separate workflow triggered by `workflow_run` on the compliance result,
      so the admin token is never co-resident with the PR-input parsing (pr-compliance.yml:433-464).
    - Add a CI lint (e.g. zizmor / actionlint) that fails any pull_request_target workflow which checks out `github.event.pull_request.head`
      or interpolates PR data into run steps, preventing future regressions.
    - Document the no-head-checkout invariant as a CODEOWNERS-gated review requirement for this file.
    code_example: "# isolate the privileged action\non:\n  workflow_run:\n    workflows: [\"PR Compliance Check\"]\n    types:\
      \ [completed]\npermissions:\n  contents: read  # ORG_ADMIN_TOKEN supplied only here, no PR parsing"
    reference: https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
