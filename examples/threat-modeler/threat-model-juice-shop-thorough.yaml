- id: M-045
  title: Enforce decompressed entry size limit and total extracted size cap in ZIP handling
  kind: fix
  priority: P2
  severity: High
  effort: Medium
  threat_ids:
  - T-045
  how: 'Track cumulative decompressed bytes across all entries; reject the archive when the total exceeds a safe threshold
    (e.g. 5MB for complaint uploads): increment a counter on each `data` event from the entry stream and call `entry.autodrain()`
