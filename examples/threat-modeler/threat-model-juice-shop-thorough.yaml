- local_id: ci-cd-pipeline-007
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-345
  title: No Image Signing or Provenance Attestation on Published Artifacts
  scenario: The release.yml docker job (lines 73-85) and the ci.yml docker job (lines 337-349) build and push `bkimminich/juice-shop`
    images to Docker Hub without generating a signature or a provenance/SBOM attestation that consumers can verify. The Dockerfile
    does run `npm run sbom` (Dockerfile:20) to embed a CycloneDX SBOM inside the image, but the published image itself is
    neither cosign-signed nor accompanied by a SLSA provenance statement, and `softprops/action-gh-release` (release.yml:46)
    attaches the packaged tarballs to the GitHub release with no detached signature. A consumer pulling `bkimminich/juice-shop:latest`
    therefore has no cryptographic means to confirm the image was built by this pipeline from this source rather than substituted
    by an attacker who gained Docker Hub push access (DOCKERHUB_TOKEN, release.yml:65). Combined with the floating `:latest`/`:snapshot`
    tags (ci-cd-pipeline-003), there is no integrity anchor on the distribution channel.
  evidence_summary: release.yml:73-85 and ci.yml:337-349 push container images and release.yml:45-49 attaches release tarballs
    with no cosign signature or SLSA provenance attestation step anywhere in the publish path.
  impact_description: Downstream operators cannot verify image authenticity, so a Docker Hub push-credential compromise or
    registry substitution goes undetected and propagates to every consumer of the latest tag.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: A CycloneDX SBOM is generated and embedded inside the image (Dockerfile:18-20), but it is unsigned and
    not published as a verifiable attestation alongside the image.
  mitigation_title: Sign published images with cosign and emit SLSA provenance for releases
  remediation:
    effort: Medium
    steps:
    - Add a `sigstore/cosign-installer` + `cosign sign --yes` step (keyless OIDC) after the docker/build-push-action steps
      in ci.yml and release.yml to sign the pushed image digest.
    - 'Enable build provenance via `actions/attest-build-provenance` (or docker/build-push-action `provenance: true` with
      a registry that supports attestations) so consumers can verify the build with `cosign verify-attestation`.'
    - Attach detached signatures (`.sig`/`.intoto.jsonl`) to the GitHub release tarballs and document the verification command
      in the release notes.
    code_example: "- name: Sign image with cosign\n  run: cosign sign --yes bkimminich/juice-shop@${{ steps.build.outputs.digest\
      \ }}\n  env:\n    COSIGN_EXPERIMENTAL: \"1\""
    reference: https://slsa.dev/spec/v1.0/provenance
  evidence:
