- local_id: realtime-channel-006
  threat_category_id: TH-12
  additional_categories:
  - TH-13
  stride: Denial of Service
  cwe: CWE-770
  title: Socket.IO server has no connection or message rate limiting
  affected_parameter: null
  scenario: The Socket.IO `Server` (registerWebsocketEvents.ts:20) is created with no `maxHttpBufferSize` override, no `connectionStateRecovery`
    limits, no per-IP connection cap, and no message-rate throttling. The REST surface uses `express-rate-limit` (server.ts:343,459+),
    but that middleware never touches the WebSocket transport. An attacker — unauthenticated per realtime-channel-001 — can
    open a large number of concurrent WebSocket connections (each triggering the connection handler, the full notification
    backlog replay at lines 29-31, and registration of event listeners) and flood `verifyLocalXssChallenge` / `verifySvgInjectionChallenge`
    messages, each of which runs a regex match (`utils.contains`, a path-traversal regex at line 46) over attacker-supplied
    data on the single Node.js event loop. The combination of unbounded connections and unthrottled regex-bearing message
    handlers on one event loop allows resource exhaustion of the shared HTTP+WS port 3000.
  evidence_summary: registerWebsocketEvents.ts:20 constructs the Socket.IO server with default unbounded options; grep confirms
    `rateLimit`/`throttle`/`maxHttpBufferSize`/`pingTimeout` appear only on REST routes in server.ts, never on the socket
    server.
  impact_description: An unauthenticated client can exhaust connection slots and event-loop CPU on the shared port 3000, degrading
    or denying service to all users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None on the WebSocket transport. `express-rate-limit` protects specific REST routes only; the Socket.IO
    server uses framework defaults.
  mitigation_title: Apply per-IP connection caps, message throttling, and a bounded maxHttpBufferSize to the Socket.IO server
  remediation:
    effort: Medium
    steps:
    - Set a conservative `maxHttpBufferSize` on the `new Server(...)` options to bound per-message payload size.
    - Add per-IP connection accounting in `io.use()` (or via a Redis adapter / reverse-proxy limit) and reject new connections
      above a threshold.
    - Throttle inbound `verify*` and `notification received` events per socket (e.g. a token-bucket on `socket.data`) so a
      single client cannot flood regex-bearing handlers on the event loop.
    code_example: "const io = new Server(server, {\n  cors: { origin: allowed },\n  maxHttpBufferSize: 1e4,        // bound\
      \ message size\n  pingTimeout: 20000\n})\nio.use(perIpConnectionLimiter(20)) // reject > 20 conns / IP"
    reference: CWE-770
    blueprint: null
