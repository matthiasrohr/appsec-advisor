  title: XXE — routes/fileUpload.ts:83
  affected_parameter: file (XML body)
  scenario: 'POST /file-upload accepts any *.xml file from an unauthenticated caller (server.ts:309 registers the route with
    no auth middleware). handleXmlUpload parses the buffer with `libxml.parseXml(data, { noblanks: true, noent: true, nocdata:
    true })` at routes/fileUpload.ts:83. `noent: true` enables substitution of external entities, so an attacker uploads a
    DOCTYPE declaring a SYSTEM entity (e.g. `<!ENTITY x SYSTEM "file:///etc/passwd">`) and the resolved file contents are
    reflected back inside the error message at line 87 (`utils.trunc(xmlString, 400)`). The xxeFileDisclosureChallenge check
    at line 85 matching /etc/passwd and system.ini confirms file-read is the intended exploit class.'
  evidence_summary: parseXml is invoked with noent:true, which instructs libxml to resolve and expand external SYSTEM/PUBLIC
    entities during parsing.
  impact_description: An anonymous attacker reads arbitrary server-readable files (/etc/passwd, app secrets, .env) and can
    pivot to SSRF via external DTD URLs.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Parsing runs inside vm.createContext with a 2000ms execution timeout (mitigates DoS, not disclosure).
    Output is truncated to 400 chars via utils.trunc.
  mitigation_title: Disable external entity resolution by removing noent from parseXml options in handleXmlUpload
  remediation:
    effort: Low
    steps:
    - 'Remove `noent: true` from the libxml.parseXml options object at routes/fileUpload.ts:83 so external entities are never
      substituted (default libxmljs2 behaviour leaves entities unexpanded).'
    - Additionally reject any uploaded XML whose buffer contains a `<!DOCTYPE` or `<!ENTITY` token before parsing, returning
      HTTP 400.
    - Do not reflect parsed XML content back to the client in error messages (line 87); log server-side only.
    code_example: 'const xmlDoc = vm.runInContext(''libxml.parseXml(data, { noblanks: true, nocdata: true })'', sandbox, {
