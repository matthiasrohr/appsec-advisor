    - Ship logs to a tamper-evident store (WORM/SIEM) separate from the application database.
    - Retain auth logs per the PCI-DSS/SOC2 retention policy in COMPLIANCE_SCOPE.
    code_example: 'logger.info({ event: ''auth.login'', userId: user.data.id, ip: req.ip, result: ''success'', ts: new Date().toISOString()
