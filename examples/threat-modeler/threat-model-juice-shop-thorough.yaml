  cwe: CWE-829
  title: Non-Deterministic Dependency Install in CI — ci.yml:51
  affected_parameter: null
  scenario: Across ci.yml the build jobs run `npm install` rather than `npm ci` (e.g. `coding-challenge-rsn` ci.yml:51, `frontend-test`
    ci.yml:71, `server-test` ci.yml:110, `api-test` ci.yml:147, `e2e-test` ci.yml:238, `custom-config-test` ci.yml:203, `smoke-test`
    ci.yml:292 `npm install --production`). With no committed lockfile (see ci-cd-pipeline-001) and install scripts enabled,
    `npm install` resolves version ranges non-deterministically and executes lifecycle scripts. The repo's own `postinstall`
    hook (package.json:56) runs a nested `cd frontend && npm install` plus a build, so a malicious package's install script
    — or a newly-published in-range transitive version — executes arbitrary code on the runner with access to job secrets
    (DOCKERHUB_TOKEN, HEROKU_API_KEY, GITHUB_TOKEN, CYPRESS_RECORD_KEY). The `lint` job is the only one that uses `npm install
    --ignore-scripts` (ci.yml:36-38).
  evidence_summary: Build jobs invoke `npm install` (ci.yml:51,71,110,147,203,238,292) with lifecycle scripts enabled and
    no lockfile, while only the lint job passes `--ignore-scripts`.
  impact_description: A poisoned in-range dependency or install hook runs arbitrary code on a runner that holds Docker Hub,
    Heroku, and GitHub publish credentials.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The `lint` job uses `npm install --ignore-scripts` (ci.yml:36, ci.yml:38). All non-Docker secrets are
    scoped per-job via the `secrets.*` context.
  mitigation_title: Use npm ci with --ignore-scripts in secret-bearing CI jobs and gate trusted build steps
  remediation:
    effort: Medium
    steps:
    - After committing a lockfile (ci-cd-pipeline-001), replace `npm install` with `npm ci` in all ci.yml and release.yml
      jobs for reproducible resolution.
    - Add `--ignore-scripts` to install steps in jobs that do not require lifecycle scripts, and run the required build (`npm
      run build:frontend`) as an explicit, reviewed step rather than via the implicit `postinstall` hook (package.json:56).
    - Move publish/deploy steps (docker, heroku) into separate jobs that depend on tests but do not run untrusted `npm install`
      in the same job as the secret use.
    code_example: "- name: Install (no scripts)\n  run: npm ci --ignore-scripts\n- name: Build frontend explicitly\n  run:\
      \ npm run build:frontend\n"
