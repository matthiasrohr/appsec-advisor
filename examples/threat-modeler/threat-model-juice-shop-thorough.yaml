  scenario: '`socket-io.service.ts:21-25` creates the Socket.IO connection with no auth token: `io(window.location.origin,
    { path: ''...'' })`. The socket is connected on component construction, before any authentication check. From `search-result.component.ts:167`,
    the component emits `verifyLocalXssChallenge` with the raw `queryParam` URL value — no sanitisation before the emit. From
    `deluxe-user.component.ts:73`, it emits `verifySvgInjectionChallenge` with a decoded URL parameter. The server-side Socket.IO
    handler receives these events from any connected client regardless of authentication status, allowing unauthenticated
    clients to trigger server-side challenge-verification logic. An attacker can connect to Socket.IO without a token and
    send arbitrary `verifyLocalXssChallenge` events to trigger server-side state changes.'
  evidence_summary: '`socket-io.service.ts:21` connects to Socket.IO without an `auth` token or origin check; challenge verification
    events are emitted with user-controlled URL parameters.'
  impact_description: Unauthenticated clients can trigger server-side challenge-verification state changes; malicious Socket.IO
    messages with crafted payloads may exploit server-side event handlers.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None at the client level — the SPA does not attach any token to the Socket.IO handshake.
  mitigation_title: Attach JWT to Socket.IO handshake and validate origin on connection
