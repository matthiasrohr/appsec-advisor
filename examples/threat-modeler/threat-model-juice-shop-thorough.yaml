  title: SQL injection on login authentication bypass — routes/login.ts:34
  affected_parameter: email (request body)
  scenario: 'The login handler directly interpolates `req.body.email` into a SQL string: `SELECT * FROM Users WHERE email
    = ''${req.body.email}''`. Submitting `'' OR ''1''=''1'' --` as the email bypasses authentication and returns the first
    user row (typically admin). An attacker can also use UNION SELECT to extract any table. No prepared statements or parameterized
    queries are used anywhere in this call.'
  evidence_summary: models.sequelize.query() at login.ts:34 concatenates req.body.email and the MD5 hash of req.body.password
    directly into the SQL string without escaping or parameterization.
  impact_description: Attacker logs in as any user (including admin) without a password, gains a valid JWT, and achieves full
    account takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no input sanitization, no parameterized queries at this call site.
  mitigation_title: Replace raw SQL string concatenation with a Sequelize parameterized query or ORM findOne call
  remediation:
    effort: Low
    steps:
    - 'Replace the raw query with: `UserModel.findOne({ where: { email: req.body.email, password: security.hash(req.body.password),
      deletedAt: null } })`.'
    - 'If a raw query is required elsewhere, use Sequelize replacements: `sequelize.query(''SELECT * FROM Users WHERE email
      = :email AND password = :password'', { replacements: { email, password: hash }, model: UserModel, plain: true })`.'
    - Audit all other raw sequelize.query() calls in the codebase and apply the same fix.
    code_example: "// routes/login.ts\nconst authenticatedUser = await UserModel.findOne({\n  where: {\n    email: req.body.email\
      \ || '',\n    password: security.hash(req.body.password || ''),\n    deletedAt: null\n  }\n})"
    reference: CWE-89
