  scenario: 'On every new connection the handler replays the entire shared `notifications` array to the connecting socket:
    `notifications.forEach((notification) => socket.emit(''challenge solved'', notification))` at lines 29-31. Each notification
    object built in challengeUtils.ts:62-69 includes a `flag` field — the CTF flag produced by `utils.ctfFlag(challenge.name)`,
    the secret value that proves a challenge was solved. Combined with finding -001 (no connection auth), an anonymous attacker
    connects and immediately receives the flags of every challenge any user has solved this session, without solving the challenges.
    The same leak recurs at challengeUtils.ts:75, where `io.emit(''challenge solved'', notification)` broadcasts a freshly-solved
    flag to ALL connected sockets, not just the solver. Notification visibility is meant to be gated by `config challenges.showSolvedNotifications`
    (the `hidden` flag), but that field is sent in the payload rather than filtered server-side, so a client receives the
    flag regardless of the `hidden` value.'
  evidence_summary: registerWebsocketEvents.ts:30 emits each `notifications[]` entry — which carries a `flag` field (challengeUtils.ts:66)
    — to every connecting socket, and challengeUtils.ts:75 broadcasts the same flag-bearing object to all sockets.
  impact_description: Anonymous clients harvest CTF flags (the proof-of-solve secrets) for all solved challenges without authentication
    or solving them.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None server-side. The `hidden` flag in the payload is intended to suppress display, but it is computed
    from config and shipped to the client rather than used to withhold the `flag` field, so the secret still crosses the wire.
  mitigation_title: Strip the flag field from challenge-solved notifications before emitting and gate replay by authenticated
    principal
  remediation:
    effort: Low
    steps:
    - Build a wire-safe projection of the notification (key, name, challenge, hidden) and emit that instead of the full object;
      never include `flag` in any `io.emit`/`socket.emit` payload at registerWebsocketEvents.ts:30 and challengeUtils.ts:75.
    - When `hidden` is true, do not emit the notification at all rather than relying on the client to honour it.
    - After adding handshake auth (finding -001), scope the per-connection replay so a socket only receives notifications
      its authenticated principal is entitled to see.
    code_example: 'const { flag, ...safe } = notification

      if (!safe.hidden) socket.emit(''challenge solved'', safe)'
    reference: CWE-200
