- local_id: data-persistence-006
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-798
  title: Security answers HMAC'd with hardcoded key
  affected_parameter: answer
  scenario: The SecurityAnswer model setter stores answers as security.hmac(answer) (models/securityAnswer.ts:45), where hmac
    is HMAC-SHA256 keyed with the literal string 'pa4qacea4VK9t9nGv7yZtwmj' hardcoded in lib/insecurity.ts:42. Because the
    key is in source and the same for every install, and because the HMAC is unsalted and deterministic, an attacker who reads
    the SecurityAnswers table (via the same DB-read avenues as the other findings) can precompute HMACs for likely answers
    — security questions draw from small answer spaces (pet names, cities, maiden names) — and recover the cleartext answers
    offline. Recovered answers feed the forgot-password flow to take over accounts that rely on them.
  evidence_summary: models/securityAnswer.ts:45 transforms each answer with security.hmac(), which lib/insecurity.ts:42 keys
    with a hardcoded constant shared across all deployments.
  impact_description: Security answers are recoverable via offline precomputation against a known key, enabling password-reset
    account takeover.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Answers are HMAC'd rather than stored cleartext, but the key is hardcoded and shared and the transform
    is unsalted/deterministic, negating most of the benefit.
  mitigation_title: Hash security answers with a per-user salted adaptive function and a managed secret
  remediation:
    effort: Medium
    steps:
    - Replace the hardcoded-key HMAC in the SecurityAnswer setter with a per-user salted adaptive hash (bcrypt/argon2), the
      same way passwords should be treated.
    - If a keyed MAC is required, source the key from a secrets manager rather than the lib/insecurity.ts:42 literal, and
      rotate it.
    - Normalize answers (trim/lowercase) before hashing to keep comparison correct after the change.
    - Consider deprecating knowledge-based security answers in favor of a stronger recovery factor.
    code_example: "answer: {\n  type: DataTypes.STRING,\n  set (answer: string) {\n    this.setDataValue('answer', bcrypt.hashSync(answer.trim().toLowerCase(),\
      \ 12))\n  }\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Forgot_Password_Cheat_Sheet.html
    blueprint: null
