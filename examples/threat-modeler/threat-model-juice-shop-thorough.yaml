- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Mutable-Ref Action With Repo Token (.github/workflows/image_actions.yml:33)
  affected_parameter: githubToken
  scenario: 'image_actions.yml pins three third-party actions to mutable refs: actions/checkout@v6 (line 30), calibreapp/image-actions@main
    (line 33), and peter-evans/create-pull-request@v8 (line 42). The most dangerous is calibreapp/image-actions@main — a branch
    ref that GitHub resolves to whatever HEAD that branch points to at run time. The step hands this action secrets.GITHUB_TOKEN
    (line 35). If the calibreapp/image-actions repository is compromised, or the maintainer pushes a malicious commit to main,
    the next image-touching PR (the workflow''s pull_request trigger, line 3) runs attacker-controlled code with the workflow''s
    GITHUB_TOKEN. Because image_actions.yml has no top-level permissions block, that token inherits the repository default
    scope. The push-trigger path (line 10) additionally runs peter-evans/create-pull-request@v8 with the same token. Tag refs
    (@v6, @v8) are also mutable — a maintainer or attacker with push access can re-point the tag to a new commit.'
  evidence_summary: Line 33 resolves calibreapp/image-actions@main at run time and line 35 passes it secrets.GITHUB_TOKEN;
    the action ref is a branch, not a 40-char commit SHA.
  impact_description: A single malicious upstream commit executes in CI with a token that can read repo contents and, depending
    on default scope, write to the repository.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The job is gated to github.repository == 'juice-shop/juice-shop' and to PRs from the same repo (head.repo.full_name
    == github.repository), so forked-PR triggering is blocked. ci.yml, by contrast, correctly pins its own actions to commit
    SHAs.
  mitigation_title: Pin calibreapp/image-actions and create-pull-request to full commit SHAs in image_actions.yml
  remediation:
    effort: Low
    steps:
    - 'Replace calibreapp/image-actions@main with calibreapp/image-actions@<full-40-char-SHA> # vX.Y.Z, matching the SHA-pin
      style already used throughout ci.yml.'
    - Pin actions/checkout@v6 and peter-evans/create-pull-request@v8 to commit SHAs the same way.
    - Add a repository-level allowlist (Settings > Actions > 'Allow select actions' with 'pinned SHA' enforcement) so unpinned
      refs are rejected at admission.
    - Adopt Dependabot's github-actions ecosystem to receive PRs that bump the pinned SHAs safely.
    code_example: "- name: Compress Images\n  uses: calibreapp/image-actions@<40-char-sha> # v1.1.0\n  with:\n    githubToken:\
      \ ${{ secrets.GITHUB_TOKEN }}"
    reference: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
