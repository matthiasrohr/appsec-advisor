  title: Cross-Site Scripting — search-result.component.ts:143
  affected_parameter: q
  scenario: SearchResultComponent.filterTable() takes the `q` query-string parameter and passes it through `this.sanitizer.bypassSecurityTrustHtml(queryParam)`
    (search-result.component.ts:143), storing the result in `searchValue`, which the template renders with `<span id="searchValue"
