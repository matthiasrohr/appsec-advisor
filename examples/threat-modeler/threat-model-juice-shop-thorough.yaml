- local_id: frontend-spa-007
  threat_category_id: TH-15
  additional_categories: []
  stride: Tampering
  cwe: CWE-352
  title: Password Change via GET Request… (frontend/src/app/Services/user.service.ts:54)
  affected_parameter: current
  scenario: '`user.service.ts:54-55` issues a GET request to `/rest/user/change-password?current=${passwords.current}&new=${passwords.new}&repeat=${passwords.repeat}`.
    Using GET with credentials in query parameters violates REST semantics and creates two independent attack paths: (1) the
    query string appears in access logs, browser history, and Referer headers — any third-party resource loaded from the change-password
    page (analytics, fonts) receives the raw old and new passwords via the Referer header; (2) the state-changing action is
    submitted via GET, which is not excluded from CORS preflight by browsers, enabling a CSRF attack — an attacker embeds
    `<img src="https://juice-shop/#/change-password?current=oldPass&new=hacked&repeat=hacked">` on an attacker page and the
    browser''s auto-navigation (GET) executes the change if the victim has an active session cookie.'
  evidence_summary: '`user.service.ts:54` issues a GET request with `current`, `new`, and `repeat` passwords as query string
    parameters, exposing them in logs and Referer headers.'
  impact_description: Old and new passwords leak to any server that receives Referer headers; CSRF allows password takeover
    if the victim visits an attacker-controlled page while authenticated.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no CSRF token, no POST method, no SameSite cookie enforcement.
  mitigation_title: Convert change-password to POST with credentials in request body and add CSRF protection
  remediation:
    effort: Medium
    steps:
    - 'Change `user.service.ts:54` to `this.http.post(this.hostServer + ''/rest/user/change-password'', { current: passwords.current,
      new: passwords.new, repeat: passwords.repeat })` and update the backend route to accept POST.'
    - 'Implement CSRF protection: either require the `SameSite=Strict` cookie attribute on the session token (which blocks
      cross-site GET/POST) or add an Angular CSRF interceptor that reads the XSRF-TOKEN cookie and sends it as an `X-XSRF-Token`
      header (Angular''s `HttpClientXsrfModule` does this automatically).'
    - On the backend, reject GET requests to the change-password route.
    code_example: "// user.service.ts\nchangePassword (passwords: Passwords) {\n  return this.http.post(this.hostServer +\
      \ '/rest/user/change-password', {\n    current: passwords.current,\n    new: passwords.new,\n    repeat: passwords.repeat\n\
      \  }).pipe(map((response: any) => response.user), catchError((err) => { throw err.error }))\n}"
    reference: CWE-352
  evidence:
