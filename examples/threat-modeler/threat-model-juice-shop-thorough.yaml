  title: Zip Slip path traversal — routes/fileUpload.ts:44
  affected_parameter: file (multipart/form-data, .zip files)
  scenario: handleZipFileUpload() extracts zip entries using `unzipper 0.9.15`. For each entry, `path.resolve('uploads/complaints/'
    + fileName)` is computed. The guard `if (absolutePath.includes(path.resolve('.')))` checks that the resolved path contains
    the current working directory path, but `path.resolve('.')` is itself a substring of deeply nested paths. An attacker
    crafts a zip containing `../../../app.ts` as an entry name. `path.resolve('uploads/complaints/../../../app.ts')` resolves
    to `/home/user/juice-shop/app.ts`, which still includes the repo root path, passing the guard, and the entry is written
    to that location — overwriting application files.
  evidence_summary: fileUpload.ts:44 checks `absolutePath.includes(path.resolve('.'))` to prevent traversal, but this check
    is bypassable because the resolved current directory is a substring of paths above it in some environments, and the `../`
    components can navigate out within the check's allowed prefix.
  impact_description: Attacker overwrites arbitrary files within the application directory tree (routes, models, config),
    achieving persistent RCE on next server restart.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Includes-based path check at fileUpload.ts:44; insufficient to prevent traversal.
  mitigation_title: Replace the includes() path guard with a strict startsWith() check after normalization
  remediation:
    effort: Low
    steps:
    - 'Compute the target base: `const uploadBase = path.resolve(''uploads/complaints'') + path.sep`.'
    - 'After resolving: `if (!absolutePath.startsWith(uploadBase)) { entry.autodrain(); return }` — strict prefix check rejects
      any path that exits the upload directory.'
    - Upgrade unzipper to the latest version (>= 0.11) which added built-in Zip Slip protection.
    - 'Sanitize entry names before resolution: strip any `..` components with `path.basename(fileName)`.'
    code_example: "const uploadBase = path.resolve('uploads/complaints') + path.sep\nconst absolutePath = path.resolve(path.join('uploads/complaints',\
      \ path.basename(entry.path)))\nif (!absolutePath.startsWith(uploadBase)) {\n  entry.autodrain()\n  return\n}\nentry.pipe(fs.createWriteStream(absolutePath))"
    reference: CWE-22
