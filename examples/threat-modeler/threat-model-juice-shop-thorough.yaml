  stride: Spoofing
  cwe: CWE-287
  title: OAuth Password Derived From Email (routes/login.ts:64)
  scenario: 'The OAuth login path reuses the standard credential login: the client derives a password by base64-encoding the
    user''s email and submits it to POST /rest/user/login (the oauthUserPasswordChallenge predicate at routes/login.ts:64
    confirms password === base64(reversed email) for bjoern.kimminich@gmail.com). Because the password is a deterministic
    transform of a public identifier (the email), anyone who knows a victim''s email can compute their password and authenticate
    as them through the normal login route — there is no server-side validation of an OAuth provider assertion (id_token /
    access_token). The server treats the derived string as a real credential and issues a full session JWT via afterLogin()
    (routes/login.ts:48).'
  evidence_summary: login.ts:64 shows the OAuth account's password is a base64 transform of its email, accepted by the same
    credential login at routes/login.ts:34.
  impact_description: Account takeover of OAuth users by computing their password from their email, with no provider-token
    verification.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None server-side. The server never validates an OAuth provider token; the derived password is accepted
    as a normal credential.
  mitigation_title: Validate the OAuth provider token server-side instead of accepting an email-derived password
  remediation:
    effort: High
    steps:
    - Add a dedicated server-side OAuth callback that verifies the provider id_token signature, issuer (iss), audience (aud),
      expiry, and nonce before establishing a session.
    - Stop accepting an email-derived password through /rest/user/login (routes/login.ts) for OAuth accounts; do not store
      a guessable derived password for them.
    - Bind the local account to the verified provider subject (sub) claim rather than to a reversible function of the email.
    code_example: 'const payload = await oidcClient.verifyIdToken(idToken)

      if (payload.iss !== EXPECTED_ISS || payload.aud !== CLIENT_ID) throw new Error(''bad token'')

      const user = await UserModel.findOne({ where: { oauthSub: payload.sub } })'
    reference: CWE-287
