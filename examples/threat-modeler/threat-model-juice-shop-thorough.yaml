  title: Payment card PAN stored unencrypted in plaintext — models/card.ts:39
  affected_parameter: cardNum
  scenario: The Card model defines cardNum as a plain INTEGER column with only range validation (1e15..1e16, card.ts:39-46)
    and fullName as a plain STRING. There is no encryption, tokenization, or truncation/masking applied in the setter or anywhere
    in models/data. Full primary account numbers and cardholder names persist in cleartext in the SQLite file. Any read of
    the Cards table — via a DB-file leak, backup exposure, or the application-layer SQLi/IDOR paths — discloses complete payment
    instruments suitable for fraud. Under PCI-DSS, PAN at rest must be rendered unreadable (encryption, tokenization, or truncation).
  evidence_summary: models/card.ts:39 declares cardNum as DataTypes.INTEGER with no cryptographic transformation in any setter.
  impact_description: A single table dump exposes usable full card numbers and cardholder names, enabling direct payment fraud
    and a PCI-DSS reportable breach.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None — only numeric range validation; no encryption, tokenization, or masking.
  mitigation_title: Tokenize or encrypt card data and store only a masked PAN
  remediation:
