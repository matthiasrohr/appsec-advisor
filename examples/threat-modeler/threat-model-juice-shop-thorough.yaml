trust_boundaries:
- id: tb-1
  name: Public Internet to Application
  description: The boundary between untrusted internet users (trainees, attackers, CTF participants) and the Juice Shop application.
    HTTP traffic on port 3000 with wildcard CORS. No TLS in the application itself — assumed to be handled by an upstream
    proxy.
  from: external
  to: express-backend
  controls:
  - CORS (wildcard — no restriction)
  - helmet.noSniff()
  - helmet.frameguard()
  risk_level: Critical
- id: tb-2
  name: Browser SPA to REST API
  description: Angular frontend to Express backend communication via REST API and WebSocket. JWT bearer tokens used for authenticated
    routes. Cookie-based session for some flows (token cookie). Wildcard CORS allows any origin.
  from: angular-frontend
  to: express-backend
  controls:
  - JWT bearer (express-jwt 0.1.3 — outdated)
  - Cookie-parser (weak secret 'kekse')
  risk_level: High
- id: tb-3
  name: Application to SQLite Database
  description: Express backend to SQLite database via Sequelize ORM and raw SQL queries. In-process file I/O — no network
    boundary. Critical paths (login, product search) use raw string interpolation instead of parameterized queries.
  from: express-backend
  to: sqlite-db
  controls:
  - Sequelize ORM (partial — bypassed on login/search)
  - No database-level access controls
  risk_level: Critical
- id: tb-4
  name: Application to MarsDB NoSQL
  description: Express backend (via chatbot routes) to in-memory MarsDB. JavaScript $where queries used for product reviews.
    No input sanitization before query execution.
  from: express-backend
  to: nosql-store
  controls:
  - None — direct query construction with string concatenation
  risk_level: Critical
- id: tb-5
  name: Application to File Storage
  description: Express backend to local filesystem. Zip extraction writes to uploads/complaints/ without full path validation
    (zip slip possible). Profile image URL triggers outbound fetch (SSRF). FTP and log directories served publicly.
  from: express-backend
  to: file-storage
  controls:
  - path.resolve() check in zip handler (partial)
  - sanitize-filename (for some paths)
  - multer (upload size, not content type)
  risk_level: High
- id: tb-6
  name: Application to External LLM
  description: Express chatbot route to external OpenAI-compatible LLM via HTTPS. User messages forwarded without sanitization
    — prompt injection possible. LLM_API_KEY from environment (empty-string fallback).
  from: chatbot-llm
  to: external
  controls:
  - HTTPS transport
  - System prompt policy (insufficient — bypassable via prompt injection)
  risk_level: High
- id: tb-7
  name: GitHub Actions to Repository
  description: CI/CD pipeline workflows access the repository and deployment targets with GITHUB_TOKEN. Multiple workflows
    missing permissions blocks — default write-all. ORG_ADMIN_TOKEN exposed in pull_request_target workflow.
  from: cicd-pipeline
  to: external
  controls:
  - GITHUB_TOKEN (over-privileged — no workflow-level permissions)
  - CodeQL scanning (code SAST)
  risk_level: High
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Unsafe
  evidence: lib/insecurity.ts:43 — MD5 hash (no salt); models/user.ts:77; routes/login.ts:34 — raw SQL injection; express-jwt
    0.1.3 (ancient, CVE-vulnerable)
  gaps:
  - MD5 password hashing with no salt
  - SQL injection on login endpoint
  - Ancient JWT middleware with no algorithm allowlist
  - Hardcoded RSA private key enables token forgery
- domain: Session and Token Controls
  control: JWT Session Management
  effectiveness: Unsafe
  evidence: lib/insecurity.ts:22-23 — hardcoded RSA private key; lib/insecurity.ts:54 — express-jwt 0.1.3 no algorithms allowlist;
    lib/insecurity.ts:57-58 — jws.verify without algorithm enforcement; server.ts:289 — cookieParser('kekse')
  gaps:
  - Hardcoded private key (full JWT forgery possible)
  - No algorithm allowlist (alg:none bypass)
  - JWS decode without verification
  - Weak cookie secret
  - No token revocation mechanism
- domain: Authorization Controls
  control: Resource Ownership Enforcement
  effectiveness: Weak
  evidence: 41 findings in .source-auth-findings.json; routes/address.ts, payment.ts, wallet.ts, order.ts — attacker-controlled
    UserId in queries; server.ts:369 — /api/Products/:id PUT unprotected
  gaps:
  - No resource ownership validation — IDOR pervasive across 15+ endpoints
  - No RBAC — isAuthorized() checks JWT validity only
  - Admin routes (/rest/admin/*) unauthenticated
- domain: Query Construction and Data Access Controls
  control: SQL Injection Prevention
  effectiveness: Unsafe
  evidence: routes/login.ts:34 — template literal SQL; routes/search.ts:23 — template literal SQL; routes/chat.ts:147 — MarsDB
    $where string concatenation
  gaps:
  - Raw SQL on authentication endpoint (login)
  - Raw SQL on search endpoint (UNION injection)
  - MarsDB $where JavaScript injection in chatbot
  - ORM used correctly elsewhere — inconsistent
- domain: Input Boundary Validation Controls
  control: Server-Side Input Validation
  effectiveness: Missing
  evidence: 'No express-validator, Joi, or zod validation on most POST/PUT endpoints. server.ts:307-327 — custom JSON parser
    with no schema validation. B2B order: orderLinesData passed to eval.'
  gaps:
  - No schema validation on most endpoints
  - No content-type enforcement
  - No length/type constraints on user inputs
- domain: Output Encoding and Rendering Controls
  control: XSS Prevention
  effectiveness: Unsafe
  evidence: server.ts:188 — helmet.xssFilter() commented out; frontend/src/app/search-result/search-result.component.ts:110,143
    — bypassSecurityTrustHtml; frontend/src/app/about/about.component.ts:119; frontend/src/app/administration/administration.component.ts:73,91;
    routes/userProfile.ts:61 — eval(code) on username
  gaps:
  - Angular DomSanitizer bypassed in 5+ components
  - xssFilter disabled
  - Server-side eval() on user-controlled username
  - Persisted XSS via feedback comments, product descriptions
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  effectiveness: Weak
  evidence: server.ts:182-183 — app.options('*', cors()); app.use(cors()) — wildcard CORS, all origins allowed
  gaps:
  - Wildcard CORS (all origins)
  - No CSRF protection (no tokens, no SameSite cookies)
  - No global Content-Security-Policy
  - Feature-Policy only covers payment
- domain: Cryptography Secrets and Data Protection
  control: Secrets Management
  effectiveness: Unsafe
  evidence: lib/insecurity.ts:22-23 — RSA private key; lib/insecurity.ts:44 — HMAC key 'pa4qacea4VK9t9nGv7yZtwmj'; server.ts:289
    — cookie secret 'kekse'; lib/insecurity.ts:43 — MD5 hashing
  gaps:
  - All cryptographic keys hardcoded in source
  - MD5 password hashing (no salt)
  - No encryption at rest for PII or payment data
  - Secrets committed to public repository — permanently compromised
- domain: File Parser and Outbound Request Controls
  control: File Upload and SSRF Prevention
  effectiveness: Unsafe
  evidence: 'routes/fileUpload.ts:83 — libxml.parseXml(data, {noent: true}) — XXE; routes/fileUpload.ts:40-45 — zip slip;
    routes/profileImageUrlUpload.ts:24 — fetch(url) unrestricted — SSRF; routes/b2bOrder.ts:23 — vm.runInContext(safeEval)
    — RCE'
  gaps:
  - 'XXE enabled (noent: true)'
  - Zip slip via path traversal
  - Unrestricted SSRF (fetch any URL)
  - Code execution via B2B orderLinesData eval
  - YAML bomb via js-yaml load without limits
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Management and Build Security
  effectiveness: Missing
  evidence: '.npmrc: package-lock=false; .github/workflows — 8 workflows missing permissions; CFG-001/002 — unpinned Docker
    base images; no Dependabot; curl|sh Heroku install (ci.yml:372)'
  gaps:
  - No lockfile — reproducible builds impossible
  - Unpinned Docker base images (tag-only)
  - 8 GitHub Actions workflows missing permissions blocks
  - No Dependabot for npm/docker/actions
  - curl-pipe-sh install in CI
  - Unpinned third-party actions
- domain: Real-time and Not Applicable Controls
  control: WebSocket Security
  effectiveness: Partial
  evidence: lib/startup/registerWebsocketEvents.ts:24 — socket.io server; CORS restricted to localhost:4200 in registerWebsocketEvents;
    no authentication on socket events; notifications broadcast to all connected clients
  gaps:
  - No authentication on WebSocket events
  - Challenge verification events accept unvalidated data
  - Notifications broadcast without access control
- domain: Operations Runtime and Supply Chain Controls
  control: Logging and Monitoring
  effectiveness: Adequate
  evidence: morgan combined format + file-stream-rotator; winston logger; Prometheus metrics via prom-client; access logs
    at logs/
  gaps:
  - Access logs exposed publicly at /support/logs without authentication
  - No centralized log aggregation in default config
