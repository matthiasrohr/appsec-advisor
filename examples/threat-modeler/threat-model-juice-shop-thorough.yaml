  title: SQL injection in login — routes/login.ts:34
  affected_parameter: email
  scenario: 'The login handler at routes/login.ts:34 builds a raw Sequelize query by string-interpolating req.body.email directly:
    SELECT * FROM Users WHERE email = ''${req.body.email}'' AND password = ''${hash(password)}''. Sending email = '' OR 1=1
    -- closes the string, comments out the password clause, and returns the first user row (admin), logging the attacker in
    as admin without any credential. The password value is MD5-hashed before interpolation but email is not sanitized at all,
    so the injection is fully attacker-controlled. This is the canonical Juice Shop loginAdminChallenge primitive.'
  evidence_summary: routes/login.ts:34 concatenates req.body.email into a raw sequelize.query template literal with no parameterization.
  impact_description: Authentication bypass and arbitrary data exfiltration from the Users table via UNION-based injection.
  likelihood: High
