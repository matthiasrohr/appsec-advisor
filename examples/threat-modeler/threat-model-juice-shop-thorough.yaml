  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:55
  affected_parameter: null
  scenario: 'Token verification is split across two weak paths. verify() at insecurity.ts:55 calls jws.verify(token, publicKey)
    without passing an allowed-algorithm list, and isAuthorized() at insecurity.ts:52 builds express-jwt@0.1.3 with only {
    secret: publicKey } and no algorithms option. Neither pins RS256. An attacker crafts a token whose header sets the algorithm
    to ''none'' (empty signature) or to HS256 using the well-known RSA public key (encryptionkeys/jwt.pub) as the HMAC secret.
    The outdated express-jwt/jsonwebtoken stack accepts it, so the attacker authenticates as any user without possessing the
    private key. This is independent of the hardcoded-key issue: even with a rotated private key, the missing algorithm allowlist
    keeps token forgery viable.'
  evidence_summary: insecurity.ts:52 and :55 verify JWTs with no algorithms allowlist; the public key doubles as both the
    RS256 verify key and (via confusion) an HS256 secret.
  impact_description: Identity spoofing of arbitrary users via alg-confusion / none-algorithm tokens, bypassing signature
    verification entirely.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is specified on signing (authorize()) but not enforced on verification; the verifier accepts whatever
    the token header declares.
  mitigation_title: Pin the accepted JWT algorithm to RS256 on every verification path
  remediation:
    effort: Medium
    steps:
    - 'Replace jws.verify at insecurity.ts:55 with jwt.verify(token, publicKey, { algorithms: [''RS256''] }) so ''none'' and
      HS256 headers are rejected.'
    - 'Upgrade express-jwt and jsonwebtoken to current major versions and configure isAuthorized() with algorithms: [''RS256''].'
    - 'Add a unit test that submits a { alg: ''none'' } token and asserts a 401 response.'
    code_example: "export const verify = (token: string) =>\n  token ? Boolean(jwt.verify(token, publicKey, { algorithms:\
      \ ['RS256'] })) : false"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html
