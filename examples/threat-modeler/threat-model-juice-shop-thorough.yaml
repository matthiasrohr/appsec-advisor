  title: Open redirect — lib/insecurity.ts:138
  affected_parameter: to (query parameter, GET /redirect)
  scenario: 'isRedirectAllowed() iterates the allowlist and returns true if `url.includes(allowedUrl)`. An attacker bypasses
    this by constructing a URL that contains an allowlisted string as a subdomain or path fragment, e.g.: `https://evil.com/?r=https://github.com/juice-shop/juice-shop`.
    The check `url.includes(''https://github.com/juice-shop/juice-shop'')` returns true, but the actual redirect destination
    is `https://evil.com/`. The redirect is issued at redirect.ts:19 without further validation. This enables phishing campaigns
    using a trusted Juice Shop domain as the redirect hop.'
  evidence_summary: '`allowed = allowed || url.includes(allowedUrl)` at insecurity.ts:138 passes when the allowlisted URL
    appears anywhere in the target URL — not just at the start — enabling open redirect via payload embedding.'
  impact_description: Attacker uses Juice Shop's trusted domain to redirect victims to phishing pages that harvest credentials
    or OAuth tokens from URL fragments.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Allowlist of permitted redirect targets exists; the isRedirectAllowed function is the sole guard.
  mitigation_title: Replace URL.includes() allowlist check with exact URL equality or URL.startsWith() matching on scheme+host+path
  remediation:
    effort: Low
    steps:
    - Replace `url.includes(allowedUrl)` with `url === allowedUrl` for exact matching, or use `new URL(url).origin === new
      URL(allowedUrl).origin` to allow path-flexible redirects to the same origin.
    - Never use substring inclusion for security allowlists — use exact match or normalized prefix comparison.
    - Add a test case that submits `https://evil.com/?r=https://github.com/juice-shop/juice-shop` and asserts it is rejected.
    code_example: "export const isRedirectAllowed = (url: string) => {\n  for (const allowedUrl of redirectAllowlist) {\n\
      \    if (url === allowedUrl) return true\n  }\n  return false\n}"
    reference: CWE-601
