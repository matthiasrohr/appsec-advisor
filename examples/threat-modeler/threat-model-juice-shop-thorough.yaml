    - Tighten CORS (server.ts:183) to a specific origin allowlist with credentials, instead of cors() open-to-all.
    code_example: 'import { doubleCsrf } from ''csrf-csrf''

      const { doubleCsrfProtection } = doubleCsrf({ getSecret: () => process.env.CSRF_SECRET! })

