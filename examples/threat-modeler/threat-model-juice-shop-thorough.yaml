  cwe: CWE-602
  title: Client-Side-Only Access Control on Tool-Call Debug View
  affected_parameter: show_tool_calls
  scenario: 'Broken Access Control: the server unconditionally streams `tool-call` events — including internal tool names
    and serialized arguments — to every caller at `routes/chat.ts:220-238`, regardless of role. The only role logic in that
    branch (lines 221-226) merely solves the `aiDebuggingChallenge`; it does NOT gate emission of the data. Visibility is
    enforced solely client-side via the `show_tool_calls` cookie read in the Angular component (`chat-conversation.component.ts:68`).
    Any non-admin user who sets `show_tool_calls=true` sees the chatbot''s internal tool invocations and their arguments,
    exposing the agent''s internal function surface (e.g. `generateCoupon`, `getOrderById` and the IDs passed). This is the
    encoded `aiDebuggingChallenge`.'
  evidence_summary: The backend streams internal tool-call names and arguments to all clients; the admin-only restriction
    exists only as a client-side cookie check, not a server-side authorization gate.
  impact_description: Non-admin users enumerate the chatbot's internal tool surface and argument values intended for admin
    debugging only.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Client-side cookie gate only (`chat-conversation.component.ts:68`); the server-side role check at routes/chat.ts:221-226
    solves a challenge but does not suppress the tool-call SSE frame.
  mitigation_title: Suppress tool-call debug frames server-side unless the caller is an admin
  remediation:
    effort: Low
    steps:
    - In the `tool-call` case of the stream loop, decode the caller's JWT and emit the tool-call SSE frame only when `role
      === roles.admin`; otherwise skip writing the `tool_calls` payload.
    - Do not rely on the `show_tool_calls` cookie for any authorization decision — treat it as a UI preference for admins
      only.
    - Keep the metric increment (line 227) but move it before the role gate so observability is unaffected.
    code_example: "case 'tool-call': {\n  const decoded = security.decode(utils.jwtFrom(req) ?? '')\n  const isAdmin = decoded?.data?.role\
