  stride: Information Disclosure
  cwe: CWE-312
  title: TOTP Secret Stored in Plaintext Column (models/user.ts:113)
  affected_parameter: totpSecret
  scenario: '`models/user.ts:113` defines `totpSecret` as a plain `DataTypes.STRING` column with no encryption setter. The
    TOTP secret is the seed of the time-based one-time password algorithm; knowledge of it permanently breaks the second authentication
    factor for a user. An attacker with read access to the `Users` table — via the raw SQL queries in `routes/login.ts`, a
    SQLi exfiltration, or direct database file access — can extract TOTP secrets for every user who has 2FA enrolled. They
    then generate valid OTPs indefinitely without possessing the user''s authenticator device.'
  evidence_summary: '`models/user.ts:113-116` stores `totpSecret` as a plain string with `defaultValue: ''''` and no encryption
    or hashing applied before persistence, unlike the `answer` setter in `models/securityAnswer.ts:44-47` which applies HMAC.'
  impact_description: Permanent bypass of 2FA for all users with enrolled TOTP, allowing account takeover even after password
    rotation.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The finale-rest `/api/Users` endpoint excludes `totpSecret` from GET responses (server.ts:483), but the
    field is readable via raw SQL and direct DB access.
  mitigation_title: Encrypt totpSecret at the application layer before persisting in the User model
  remediation:
    effort: Medium
    steps:
    - Add an encryption setter on `totpSecret` in `models/user.ts` using AES-256-GCM with a key from `process.env.TOTP_ENCRYPTION_KEY`.
    - Add a corresponding getter that decrypts transparently so `routes/2fa.ts` reads the plaintext without code changes.
    - Rotate the encryption key via a key-wrapping scheme (envelope encryption) rather than re-encrypting all rows on key
      change.
    - Run a one-time migration to encrypt all existing plaintext `totpSecret` values.
    code_example: "// models/user.ts — encrypted setter/getter for totpSecret\ntotpSecret: {\n  type: DataTypes.STRING,\n\
      \  get() {\n    const encrypted = this.getDataValue('totpSecret')\n    return encrypted ? decrypt(encrypted, process.env.TOTP_KEY)\
      \ : ''\n  },\n  set(secret: string) {\n    this.setDataValue('totpSecret', secret ? encrypt(secret, process.env.TOTP_KEY)\
      \ : '')\n  }\n}"
    reference: CWE-312
