  title: Zip Slip Path Traversal — routes/fileUpload.ts:42
  affected_parameter: zip entry.path
  scenario: An unauthenticated attacker uploads a ZIP archive whose entries contain path-traversal sequences (e.g., '../../ftp/legal.md'
    or '../../routes/evil.js'). At fileUpload.ts:42, entry.path is appended directly to 'uploads/complaints/' before path.resolve().
    The guard on line 44 checks absolutePath.includes(path.resolve('.')) — on Linux this is the CWD string, e.g. '/app'. A
    path like '/app/../../../../etc/cron.d/backdoor' still contains '/app', so the guard passes. Line 45 then writes via fs.createWriteStream('uploads/complaints/'
    + fileName) using the raw, unresolved fileName — enabling arbitrary file writes under the web process UID.
  evidence_summary: entry.path from the zip archive is concatenated to 'uploads/complaints/' and written via fs.createWriteStream
    without canonical-path enforcement; the absolutePath.includes() guard is bypassable.
  impact_description: An attacker can overwrite application source files, FTP content, or OS configuration files, escalating
    to remote code execution under the Node.js process account.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: The absolutePath.includes(path.resolve('.')) check attempts path containment but is flawed as described.
  mitigation_title: Enforce canonical-path containment for every zip entry before extracting
  remediation:
    effort: Low
    steps:
    - After resolving the absolute path, assert it starts with path.resolve('uploads/complaints') + path.sep using a strict
      startsWith check, not includes().
    - Replace 'uploads/complaints/' + fileName with the already-resolved absolutePath so the write and the check reference
      the same value.
    - Consider using the 'unzipper' safe-extract helpers or a dedicated library like 'fflate' with an explicit destination
      guard.
    code_example: "const safeBase = path.resolve('uploads/complaints') + path.sep;\nconst absolutePath = path.resolve(safeBase,\
      \ fileName);\nif (!absolutePath.startsWith(safeBase)) {\n  entry.autodrain(); // discard traversal entry\n} else {\n\
      \  entry.pipe(fs.createWriteStream(absolutePath));\n}"
    reference: CWE-22
