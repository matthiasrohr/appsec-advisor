- local_id: angular-frontend-001
  threat_category_id: TH-10
  additional_categories: []
  stride: Spoofing
  cwe: CWE-601
  title: OAuth Implicit Flow exposes access token in URL — login.component.ts:152
  affected_parameter: response_type
  scenario: The Google OAuth login at googleLogin() uses response_type=token (implicit flow), delivering the access_token
    in the URL fragment (#access_token=...). The token appears in browser history, is accessible to all JavaScript on the
    page (including injected XSS), and may leak via Referer headers to third-party scripts. No `state` parameter is sent to
    prevent CSRF against the OAuth redirect, and no `nonce` is validated on the returned token. An attacker who can log network
    traffic, read browser history, or has achieved XSS on the page can harvest the Google access_token and impersonate the
    victim with Google APIs.
  evidence_summary: login.component.ts:152 constructs the OAuth authorization URL with response_type=token and no state or
    nonce parameter.
  impact_description: Attacker obtains a valid Google OAuth access token usable to query the userinfo endpoint and derive
    the victim's Juice Shop derived-password for full account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None
  mitigation_title: Replace OAuth Implicit Flow with Authorization Code Flow + PKCE in login.component.ts
  remediation:
    effort: Medium
    steps:
    - Change response_type=token to response_type=code in the authorization URL construction at login.component.ts:152.
    - Generate a cryptographically random state parameter per request, store in sessionStorage, and validate on redirect to
      prevent CSRF against the OAuth callback.
    - 'Implement PKCE: generate code_verifier and code_challenge (S256) before redirect; send code_challenge in the authorization
      request; exchange code for tokens server-side using code_verifier.'
    - Move token exchange to a backend endpoint so access_token and refresh_token are never exposed to the browser.
    - Validate the id_token aud and iss claims server-side before trusting the identity.
    code_example: "// Generate state + PKCE before redirect\nconst state = crypto.randomUUID();\nsessionStorage.setItem('oauth_state',\
      \ state);\nconst verifier = generateCodeVerifier(); // random 43-128 char string\nsessionStorage.setItem('pkce_verifier',\
      \ verifier);\nconst challenge = await generateCodeChallenge(verifier); // SHA-256 base64url\nconst url = `${oauthProviderUrl}?client_id=${clientId}&response_type=code`\n\
      \  + `&scope=email&redirect_uri=${redirectUri}&state=${state}&code_challenge=${challenge}&code_challenge_method=S256`;\n\
      location.replace(url);"
    reference: CWE-601
  evidence:
