components:
- id: angular-frontend
  name: Angular SPA Frontend
  description: Angular 20 single-page application that runs in the user's browser. Handles all UI rendering, routing, authentication
    token storage (localStorage), and API communication via Angular HttpClient. Contains intentional client-side security
    flaws including DOM XSS sinks, insecure localStorage usage for JWT tokens, and bypassable route guards.
  paths:
  - frontend/src/**
  - frontend/*.json
  - frontend/*.ts
  tier: client
  complexity: moderate
  framework: Angular
  deployment_zones:
  - internet
  - client-device
  handles_sensitive_data: true
  threat_ids:
  - T-002
  - T-003
  - T-009
  - T-015
  - T-023
  - T-064
- id: auth-service
  name: Authentication and Identity Service
  description: Authentication, JWT issuance, and identity management logic co-located in the Express backend. Covers login,
    registration, password reset, 2FA (TOTP), OAuth, and JWT token lifecycle. Uses express-jwt@0.1.3 (critically outdated)
    and jsonwebtoken@0.4.0 with a hardcoded RSA private key (lib/insecurity.ts:21). Token verification via jws allows algorithm
    confusion. Central to all authorization decisions.
  paths:
  - routes/login.ts
  - routes/register.ts
  - routes/changePassword.ts
  - routes/resetPassword.ts
  - routes/2fa.ts
  - lib/insecurity.ts
  - routes/currentUser.ts
  - routes/authenticatedUsers.ts
  - routes/oauth.ts
  tier: application
  complexity: moderate
  framework: Express
  deployment_zones:
  - internal-network
  - internet
  handles_sensitive_data: true
  threat_ids:
  - T-004
  - T-005
  - T-006
  - T-011
  - T-022
  - T-024
  - T-025
  - T-026
  - T-041
- id: express-backend
  name: Express.js REST API Backend
  description: Node.js/Express.js v4 application server implementing ~61 route modules (~247 routes). Handles business logic,
    file uploads, challenge tracking, admin endpoints, and API responses (excluding auth which is modeled separately). Contains
    intentional flaws spanning SQL injection via raw query concatenation, NoSQL injection, XXE in B2B endpoints, SSRF via
    complaint URL, path traversal in FTP, and mass assignment via PATCH /api/Users.
  paths:
  - routes/**
  - server.ts
  - app.ts
  - lib/**
  - middleware/**
  - views/**
  - data/**
  tier: application
  complexity: complex
  framework: Express
  deployment_zones:
  - internal-network
  - internet
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-007
  - T-008
  - T-010
  - T-012
  - T-018
  - T-019
  - T-020
  - T-029
  - T-030
