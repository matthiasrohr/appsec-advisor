  title: TOTP 2FA secret stored in plaintext — models/user.ts:112
  scenario: The User model declares `totpSecret` as a plain `DataTypes.STRING` (default '') with no encryption hook, and datacreator.ts:200
    seeds it directly. The shared TOTP seed is the single factor that makes 2FA meaningful; storing it in cleartext means
    any actor who reads the Users table — insider ACT-D-04 with local-fs, or an attacker who exfiltrates the unencrypted DB
    file — can regenerate valid time-based codes for every 2FA-enrolled account and silently defeat multi-factor authentication.
    This is the twoFactorAuthUnsafeSecretStorage weakness.
  evidence_summary: totpSecret is defined as an unencrypted STRING column with defaultValue '' and no set() encryption hook.
  impact_description: Attackers with DB read can mint valid 2FA codes, nullifying multi-factor authentication.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None. The TOTP secret is persisted verbatim.
  mitigation_title: Encrypt totpSecret at rest with an authenticated cipher and KMS-managed key
  remediation:
    effort: Medium
    steps:
    - Add `set()`/`get()` hooks on the totpSecret attribute that AES-256-GCM encrypt/decrypt using a key held outside the
      database (KMS/Vault), so a DB read alone cannot recover the seed.
