  title: Path Traversal — routes/fileUpload.ts:33
  affected_parameter: zip entry path
  scenario: A user POSTs a crafted .zip to /file-upload. extractZipBuffer() takes each archive entry's `entry.path` verbatim
    and streams it to `fs.createWriteStream('uploads/complaints/' + fileName)`. An entry named `../../ftp/legal.md` (or `../../routes/login.ts`)
    escapes the intended uploads/complaints/ directory. The only guard, `absolutePath.includes(path.resolve('.'))`, merely
    confirms the target stays anywhere under the project root — it does NOT confine writes to uploads/complaints/. An attacker
    overwrites any server-side file within the repo, including TypeScript route handlers or ftp/ content, leading to content
    tampering and, on the next process reload, remote code execution.
  evidence_summary: The containment check at line 33 tests `absolutePath.includes(path.resolve('.'))` (project root) instead
    of `path.resolve('uploads/complaints/')`, so `../` sequences in `entry.path` are honored by the write at line 34.
  impact_description: Attacker overwrites arbitrary in-repo files (route handlers, ftp/ documents), enabling code tampering
    and potential RCE.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Path containment is checked against the project root (path.resolve('.')) rather than the intended upload
    subdirectory, so it does not prevent traversal within the repo.
  mitigation_title: Confine Zip Slip extraction to uploads/complaints/ by validating each entry's resolved path against the
    destination prefix
  remediation:
    effort: Low
    steps:
    - 'Compute the destination root once: `const dest = path.resolve(''uploads/complaints/'')`.'
    - For each entry, resolve `path.resolve(dest, entry.path)` and reject unless the result is strictly prefixed by `dest
      + path.sep`.
    - Strip directory components from entry names (`path.basename(entry.path)`) before writing, and skip entries whose type
      is not a regular file.
    - Enforce a per-entry and total decompressed-size cap to also close zip-bomb exhaustion.
    code_example: "const dest = path.resolve('uploads/complaints/')\nfor (const entry of directory.files) {\n  const target\
      \ = path.resolve(dest, entry.path)\n  if (target !== dest && !target.startsWith(dest + path.sep)) continue // reject\
      \ traversal\n  await pipeline(entry.stream(), fs.createWriteStream(path.join(dest, path.basename(entry.path))))\n}"
