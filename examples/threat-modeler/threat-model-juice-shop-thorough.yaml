  cwe: CWE-602
  title: Admin authorization decided client-side from decoded JWT — app.guard.ts:54
  affected_parameter: token
  scenario: 'AdminGuard.canActivate() decodes the JWT in the browser with `jwtDecode` and grants access when `payload.data.role
    === roles.admin` (app.guard.ts:53-54). LoginGuard.canActivate() likewise only checks that a `token` string is present
    in localStorage (app.guard.ts:18). Section 7.10 reports `spa-client-side-role-trust` and 100 category-24 findings of routes
    relying on a client-side guard only. These guards are pure client-side trust boundaries: an attacker can navigate the
    SPA bundle, override the guard, hand-craft a token with `role: ''admin''`, or simply call the underlying `/rest/*` and
    `/api/*` endpoints directly — the browser guard never reaches the server. Any route protected solely by AdminGuard/AccountingGuard
    (e.g. /administration) is reachable without server authorization.'
  evidence_summary: app.guard.ts:54 reads the role from a client-decoded JWT and app.guard.ts:18 only checks for the presence
    of a localStorage token — both are enforced entirely in the browser.
  impact_description: Privileged routes and the data they fetch are reachable by any user who tampers with the client or calls
    the backing API directly, since no server-side authorization is guaranteed by the guard.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Client-side route guards exist (LoginGuard/AdminGuard/AccountingGuard) but are advisory UI gating only;
    they perform no server-enforced authorization.
  mitigation_title: Enforce role authorization on every privileged API endpoint server-side, treat guards as UX only
  remediation:
    effort: Medium
    steps:
    - Add server-side authorization middleware that verifies the JWT signature and role on every /rest/* and /api/* endpoint
      backing an admin/accounting route — do not rely on app.guard.ts.
    - Treat AdminGuard/AccountingGuard purely as UX hints; document that they provide no security guarantee.
    - Verify role from the signature-validated token server-side, never from a client-decoded payload.
    code_example: "// backend route\nrouter.use('/api/Users', requireRole('admin'))\nfunction requireRole(role) {\n  return\
      \ (req, res, next) => {\n    const p = jwt.verify(req.token, PUBLIC_KEY, { algorithms: ['RS256'] })\n    if (p?.data?.role\
      \ !== role) return res.sendStatus(403)\n    next()\n  }\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html
