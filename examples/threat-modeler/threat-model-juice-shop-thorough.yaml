  title: Remote Solidity Compiler Inclusion — web3-sandbox.component.ts:122
  affected_parameter: null
  scenario: Web3SandboxComponent.compileAndFetchContracts fetches the Solidity compiler binary at runtime from a hardcoded
    remote URL https://binaries.soliditylang.org/bin/${selectedVersion} (web3-sandbox.component.ts:122) and feeds attacker-editable
