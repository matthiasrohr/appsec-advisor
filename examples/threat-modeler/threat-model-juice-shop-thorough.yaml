- local_id: backend-api-013
  threat_category_id: TH-17
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-548
  title: Directory Listing and File Server Exposure — server.ts:269
  scenario: 'serve-index is mounted on multiple sensitive directories without authentication: /ftp (server.ts:269), /encryptionkeys
    (server.ts:277), /support/logs (server.ts:281), and /.well-known (server.ts:273). Combined with the per-file servers servePublicFiles()/serveKeyFiles()/serveLogFiles(),
    an anonymous user browses and downloads files from these folders. /ftp historically holds backup and confidential files,
    /encryptionkeys exposes the JWT public key (and any key material placed there), and /support/logs leaks access logs. The
    poison-null-byte cutoff (security.cutOffPoisonNullByte) hints these handlers parse path traversal sequences.'
  evidence_summary: serveIndex('ftp'|'encryptionkeys'|'logs') is registered unauthenticated at server.ts:269-283, enabling
    anonymous directory browsing and download.
  impact_description: Anonymous attackers enumerate and download FTP backups, key material, and server logs.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: robots.txt disallows /ftp (server.ts:226) and accessControlChallenges() observes /support/logs, but no
    authentication blocks access to the listings or files.
  mitigation_title: Remove unauthenticated directory listings or place behind admin auth
  remediation:
    effort: Medium
    steps:
    - Remove the serveIndex mounts at server.ts:269, 273, 277, 281 from production, or gate them behind security.isAuthorized()
      plus an admin-role check.
    - Stop serving /encryptionkeys and /support/logs over HTTP entirely; keep key material and logs off the web root.
    - For any retained file server, canonicalize and confine the resolved path under the intended base directory to block
      traversal.
    code_example: '// remove or protect:

      // app.use(''/encryptionkeys'', serveIndexMiddleware, serveIndex(''encryptionkeys'', ...))

      app.use(''/support/logs'', security.isAuthorized(), isAdmin(), serveIndex(''logs'', { icons: true }))'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Access_Control_Cheat_Sheet.html
