  title: No Audit Logging of Authentication Events — routes/login.ts:18
  affected_parameter: null
  scenario: None of the auth handlers (routes/login.ts login(), routes/2fa.ts verify/setup/disable, routes/resetPassword.ts)
    record an audit trail of who authenticated, from where, or when. login() at routes/login.ts:18 issues a token and returns
    without logging success or failure; failed logins go through next(error) with no actor/IP/outcome record. saveLoginIp.ts
    stores only a single lastLoginIp field on the user row, overwritten each login. With no append-only auth log, account
    takeover, brute-force attempts, and 2FA-disable actions cannot be reconstructed or attributed after the fact.
  evidence_summary: The login/2FA/reset handlers contain no structured audit-log calls; the only login-trace persistence is
    the single overwritable lastLoginIp field in saveLoginIp.ts.
  impact_description: Auth abuse (credential stuffing, takeover, 2FA tampering) is non-attributable and undetectable in retrospect,
    undermining incident response and PCI-DSS/SOC2 accountability requirements.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Only lastLoginIp (single, overwritten field) is persisted; no append-only auth event log exists.
  mitigation_title: Emit structured append-only audit events for login, 2FA, and reset outcomes (routes/login.ts, routes/2fa.ts,
    routes/resetPassword.ts)
  remediation:
