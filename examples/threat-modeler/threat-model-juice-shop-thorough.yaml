  stride: Elevation of Privilege
  cwe: CWE-94
  title: Server-Side Code Evaluation of Untrusted Input
  affected_parameter: orderLinesData
  scenario: 'POST /b2b/v2/orders reads body.orderLinesData (routes/b2bOrder.ts:19) and at line 23 runs `vm.runInContext(''safeEval(orderLinesData)'',
    sandbox, { timeout: 2000 })`. The string is evaluated as JavaScript by notevil''s `safeEval`. notevil ^1.3.3 (package.json:139)
    is an interpreter-based sandbox with known escape primitives: a payload that walks `constructor` / `__proto__` chains
    reaches the real `Function`/`process` and executes host code. An authenticated B2B client sends a crafted orderLinesData
    (e.g. an expression that reaches `this.constructor.constructor(''return process'')().mainModule.require(''child_process'').execSync(...)`)
    and obtains command execution on the Node process. This is the endpoint behind the documented rceChallenge.'
  evidence_summary: orderLinesData flows from body (line 19) into safeEval invoked by vm.runInContext at routes/b2bOrder.ts:23
    with no parse/validation of the expression.
  impact_description: Server-side remote code execution in the Node process, yielding full host compromise within the container
    trust zone.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: JWT bearerAuth via security.isAuthorized() on /b2b/v2 (server.ts:424); vm.runInContext timeout of 2000ms
    (caps wall time, not capability); notevil safeEval intended as a sandbox but escapable.
  mitigation_title: Replace safeEval/vm evaluation of orderLinesData with a declarative JSON parser and schema validation
  remediation:
    effort: Medium
    steps:
    - 'Stop evaluating orderLinesData as code. Treat it as structured data: parse with JSON.parse inside try/catch and reject
      non-conforming input.'
    - Validate the parsed object against an explicit schema (e.g. ajv or zod) describing the allowed order-line fields and
      types; reject anything else with HTTP 400.
    - If a sandbox is truly required, do not use notevil or a bare node:vm context — these are not security boundaries. Use
      a separate locked-down worker process with no module access, or remove the evaluation entirely.
    - Remove the notevil dependency (package.json:139) once the eval path is gone.
    code_example: "let lines\ntry {\n  lines = JSON.parse(body.orderLinesData)\n} catch {\n  return res.status(400).json({\
      \ error: 'invalid orderLinesData' })\n}\nif (!orderLinesSchema.safeParse(lines).success) {\n  return res.status(400).json({\
      \ error: 'schema violation' })\n}\n// proceed with `lines` as plain data — never evaluated as code"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html
