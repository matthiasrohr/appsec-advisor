  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-798
  title: Static hardcoded HMAC key for security answers — models/securityAnswer.ts:45
  affected_parameter: answer
  scenario: 'SecurityAnswer hashes each answer with `security.hmac(answer)` at models/securityAnswer.ts:45, where hmac is
    `createHmac(''sha256'', ''pa4qacea4VK9t9nGv7yZtwmj'')` (lib/insecurity.ts:42) — a single hardcoded key checked into source,
    with no per-record salt. Because the key is public (it ships in the repo) and constant, the HMAC is effectively a keyless
    deterministic hash: an attacker who reads the SecurityAnswers column can precompute HMACs of common answers (mother''s
    maiden name, pet, city) offline and recover the cleartext, then drive the password-reset / security-question flow to take
    over accounts. Identical answers also collide to identical digests, leaking shared answers.'
  evidence_summary: models/securityAnswer.ts:45 applies HMAC-SHA256 with the constant repo-committed key from lib/insecurity.ts:42
    and no per-record salt.
  impact_description: Security-question answers are recoverable offline once the column is read, enabling account-recovery-based
    takeover.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: HMAC-SHA256 is applied, but the key is hardcoded and identical for every record (no salt), so it provides
    no secrecy against anyone with repo access.
  mitigation_title: Salt security answers per-record and move the HMAC key out of source
  remediation:
    effort: Medium
    steps:
    - Generate a unique random salt per SecurityAnswer row and store it alongside the digest; feed salt+answer into a slow
      KDF (bcrypt/argon2) rather than a fast HMAC.
    - Move the HMAC/KDF key out of lib/insecurity.ts into an environment-injected secret (process.env) or a KMS, and rotate
      the leaked key.
    - 'Treat security-question answers as low-trust: require a second factor on the reset flow so a single recovered answer
      cannot complete account takeover.'
    code_example: "answer: {\n  type: DataTypes.STRING,\n  set (ans: string) {\n    const salt = crypto.randomBytes(16).toString('hex')\n\
      \    this.setDataValue('answer', salt + ':' + argon2Sync(ans + salt, process.env.ANSWER_KEY))\n  }\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
