  title: Race Condition in In-Memory NFT Mint State Allows — routes/nftMint.ts:22
  affected_parameter: walletAddress (concurrent POST requests)
  scenario: 'The `addressesMinted` Set in `nftMint.ts` is checked and mutated non-atomically: the `if (addressesMinted.has(metamaskAddress))`
    check and the subsequent `addressesMinted.delete(metamaskAddress)` call are two separate operations with no lock. Under
    Node.js''s single-threaded event loop this is safe only if no `await` occurs between them — but if any middleware or the
    `challengeUtils.solveIf` call is asynchronous, two concurrent requests for the same address can both pass the `has()`
    check before either executes `delete()`. Additionally, because `addressesMinted` is process-local memory, any server restart
    or horizontal scaling (multiple Node processes) resets or splits the state, allowing re-claiming a previously consumed
    mint slot.'
  evidence_summary: '`addressesMinted.has()` and `addressesMinted.delete()` are separated by a `solveIf` call with no atomic
    lock; the Set is in-process memory with no persistence.'
  impact_description: Attacker can double-claim the NFT mint challenge and corrupt the intended one-use semantics of the mint
    verification gate.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Comment notes single-use intent but no mutex or database transaction enforces it.
  mitigation_title: Replace in-memory Set with a database-backed atomic check-and-delete for NFT mint state
  remediation:
    effort: Medium
    steps:
    - Store mint state in the application's existing database (SQLite/Sequelize) with a unique constraint on `walletAddress`
      and a boolean `claimed` column.
    - 'Wrap the check-and-update in a database transaction with `SELECT ... FOR UPDATE` (or Sequelize''s `transaction` with
      `lock: true`) to prevent concurrent claims.'
    - On server restart, query the database rather than relying on process-local Set state.
    code_example: "await sequelize.transaction(async (t) => {\n  const mint = await NFTMint.findOne({ where: { address: walletAddress\
      \ }, lock: true, transaction: t });\n  if (!mint || mint.claimed) return res.status(400).json({ error: 'Not eligible'\
      \ });\n  await mint.update({ claimed: true }, { transaction: t });\n  challengeUtils.solveIf(challenges.nftMintChallenge,\
      \ () => true);\n});"
    reference: CWE-367
