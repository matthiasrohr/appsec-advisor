    — including 'svg' — and writes the fetched bytes into the publicly served directory frontend/dist/frontend/assets/public/images/uploads/<id>.<ext>
    (line 29) with no content-type or content inspection. An attacker hosts a malicious SVG (containing inline script) at
    a URL ending in .svg; the server fetches and stores it under the served path. When another user (or admin viewing profiles)
    loads that image, the SVG executes in the application origin. Unlike profileImageFileUpload.ts:24 which validates the
    magic bytes via file-type, the URL path performs no such check.
