  title: Unverified Wallet Ownership Claim — routes/nftMint.ts:41
  affected_parameter: walletAddress
  scenario: POST /rest/web3/walletNFTVerify and POST /rest/web3/walletExploitAddress accept req.body.walletAddress as the
    sole proof of wallet identity (nftMint.ts:41, web3Wallet.ts:15). No cryptographic signature challenge (no ethers verifyMessage
    / personal_sign nonce) is ever performed — confirmed absent across all three web3 routes. An attacker who learns or guesses
    any address present in the server-side addressesMinted / walletsConnected Set can POST that address and claim ownership
    / solve the challenge without controlling the corresponding private key. Because the address that minted is broadcast
    on-chain via the NFTMinted event, any observer can replay it. The same primitive lets one user act on behalf of another
    wallet (horizontal authorization gap).
  evidence_summary: walletNFTVerify trusts addressesMinted.has(req.body.walletAddress) (nftMint.ts:42) and contractExploitListener
    does walletsConnected.add(req.body.walletAddress) (web3Wallet.ts:16) with no signature/nonce ownership proof anywhere
    in the component.
  impact_description: 'Wallet identity is spoofable: any party can assert ownership of an address they do not control, defeating
    the ownership-verification trust boundary this component is supposed to enforce.'
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — ownership is inferred purely from a client-supplied address string compared against an in-memory
    Set.
  mitigation_title: Require signed-nonce wallet ownership proof before accepting walletAddress
  remediation:
    effort: Medium
    steps:
    - Issue a per-request random nonce, have the client sign it with the wallet (personal_sign), and verify with ethers verifyMessage(nonce,
      signature) === walletAddress before trusting the address in nftMint.ts and web3Wallet.ts.
    - Bind the nonce to the session and expire it after a single use to prevent replay of a captured signature.
    - Reject the request when the recovered address does not exactly match the submitted walletAddress.
