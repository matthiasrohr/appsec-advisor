  title: No Server-Side Discount Cap in generateCoupon Tool — routes/chat.ts:174
  affected_parameter: discount (generateCoupon tool parameter)
  scenario: 'The `generateCoupon` tool at line 174 accepts a `discount` parameter from the LLM (schema: `z.number()`) and
    passes it directly to coupon generation without enforcing the system-prompt policy that caps discounts at 10%. The comment
    `// No server-side enforcement of the 10% maximum!` confirms the absence of a guard. An attacker crafts a prompt injection
    (via username or product description) that convinces the LLM to call `generateCoupon` with `discount: 100`. The challenge
    guard (`solveIf ... discount >= 10`) confirms this is the intended exploitation path. The coupon is generated at the attacker''s
    requested discount level.'
  evidence_summary: '`generateCoupon` at line 174 receives `discount` from the LLM with only a schema description `''maximum
    10''` — no `z.number().max(10)` constraint and no server-side clamp before coupon emission.'
  impact_description: Attacker generates arbitrarily high (up to 100%) discount coupons, causing direct financial loss on
    orders that redeem them.
  likelihood: High
  impact: High
  risk: Critical
  controls_in_place: System prompt states 10% maximum; LLM `inputSchema` description says 'maximum 10' — neither is enforced
    server-side.
  mitigation_title: Enforce discount cap server-side in generateCoupon before coupon emission
  remediation:
    effort: Low
    steps:
    - Add `z.number().min(1).max(10)` to the Zod schema for the `discount` field so the tool rejects out-of-range values at
      schema validation time before `execute` is called.
    - 'Add an explicit runtime guard inside `execute`: `const safeDiscount = Math.min(Math.max(Math.round(discount), 1), 10)`
      and use `safeDiscount` for coupon generation.'
    - Log all coupon-generation attempts with the requested discount, the capped discount, and the session user ID for fraud
      detection.
    code_example: "generateCoupon: tool({\n  inputSchema: z.object({\n    discount: z.number().int().min(1).max(10)\n    \
      \  .describe('Discount percentage (1-10)')\n  }),\n  execute: async ({ discount }) => {\n    const safeDiscount = Math.min(discount,\
      \ 10) // belt-and-suspenders\n    // generate coupon with safeDiscount\n  }\n})"
    reference: CWE-20
  evidence:
  - file: routes/chat.ts
    line: 174
  evidence_check: verified
