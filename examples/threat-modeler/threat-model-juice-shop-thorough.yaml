  cwe: CWE-598
  title: OAuth implicit flow returns token in URL fragment — login.component.ts:148
  affected_parameter: access_token
  scenario: The Google sign-in button builds the authorization URL with `response_type=token` (login.component.ts:148), selecting
    the deprecated OAuth 2.0 implicit grant. The provider returns the `access_token` in the URL fragment, and OAuthComponent
    reads it back from `route.snapshot.data.params` (oauth.component.ts:71). Section 7.9 reports `oauth-implicit-flow` / `response_type=token`
    with no PKCE and no state. An attacker who can read the fragment — via browser history, Referer leakage on outbound assets,
    a malicious browser extension, a shared/kiosk machine, or a logged proxy — recovers a live bearer token and impersonates
    the victim. There is no `state` parameter in the request, so the callback is also open to OAuth CSRF / login-CSRF (forcing
    the victim into the attacker's account).
  evidence_summary: login.component.ts:148 constructs the authorize URL with `response_type=token` and no `state`/PKCE parameters;
    oauth.component.ts:71 parses the access_token straight out of the URL fragment.
  impact_description: A live access token is exposed in the URL where it can be harvested from history/Referer/proxy logs,
    enabling full account impersonation without the victim's password.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: An authorizedRedirects allowlist is consulted before enabling the button (login.component.ts:80), but
    it does not address fragment exposure, missing state, or the absence of PKCE.
  mitigation_title: Replace OAuth implicit flow with authorization-code + PKCE and add a state parameter
  remediation:
    effort: Medium
    steps:
    - Change `response_type=token` to `response_type=code` in login.component.ts:148 and add a cryptographically random `state`
      and a PKCE `code_challenge`/`code_challenge_method=S256`.
    - Exchange the authorization code for tokens on a server-side endpoint (Backend-for-Frontend), never in the browser, so
      the token never appears in a URL fragment.
    - Validate the returned `state` against the value persisted before redirect and reject mismatches in OAuthComponent before
      calling oauthLogin().
    - Remove the fragment-parsing path in oauth.component.ts:71 once the code flow is in place.
    code_example: "// login.component.ts\nconst state = crypto.randomUUID()\nsessionStorage.setItem('oauth_state', state)\n\
      const { challenge } = await pkceChallenge() // S256\nwindow.location.replace(\n  `${oauthProviderUrl}?client_id=${this.clientId}`\
      \ +\n  `&response_type=code&scope=email&state=${state}` +\n  `&code_challenge=${challenge}&code_challenge_method=S256`\
      \ +\n  `&redirect_uri=${this.redirectUri}`)"
