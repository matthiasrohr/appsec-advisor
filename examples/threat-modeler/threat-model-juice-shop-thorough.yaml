  stride: Information Disclosure
  cwe: CWE-116
  title: Uploaded Files Served Without Content-Disposition — routes/fileServer.ts:33
  affected_parameter: res.sendFile()
  scenario: 'fileServer.ts:33, quarantineServer.ts:14, and logfileServer.ts:14 all call res.sendFile() without first setting
    Content-Disposition: attachment. When the FTP or quarantine directory contains an HTML or SVG file (possible via Zip Slip
    or direct upload), a browser renders it inline under the juice-shop origin rather than prompting download. This enables
    stored XSS: an attacker writes an SVG file containing <script>...</script> via Zip Slip to ftp/ or uploads/complaints/,
    then shares the /ftp/<file>.svg URL. Victims who visit the link execute the attacker''s script under juice-shop''s origin,
    enabling session cookie theft.'
  evidence_summary: res.sendFile() is called in all three file-serving routes without res.setHeader('Content-Disposition',
    'attachment') or a Content-Type restriction on user-reachable paths.
  impact_description: Stored XSS under the application origin enabling session cookie theft, CSRF, or credential harvesting
    against any user who visits the crafted URL.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no Content-Disposition or Content-Type override is set before sendFile.
  mitigation_title: 'Set Content-Disposition: attachment and X-Content-Type-Options before serving user-reachable files'
  remediation:
    effort: Low
    steps:
    - Before res.sendFile(), set res.setHeader('Content-Disposition', 'attachment; filename="' + path.basename(file) + '"')
      in all three serving routes.
    - Set res.setHeader('X-Content-Type-Options', 'nosniff') to prevent MIME-type sniffing by browsers.
    - Add a strict Content-Security-Policy (script-src 'none') for the /ftp and /support/logs scopes.
    code_example: 'res.setHeader(''Content-Disposition'', `attachment; filename="${path.basename(file)}"`)

      res.setHeader(''X-Content-Type-Options'', ''nosniff'')

      res.sendFile(path.resolve(''ftp/'', file))'
