  stride: Information Disclosure
  cwe: CWE-798
  title: Hardcoded BIP-39 mnemonic in source — routes/checkKeys.ts:10
  affected_parameter: null
  scenario: checkKeys.ts:10 embeds a literal 12-word BIP-39 mnemonic ('purpose betray marriage blame crunch monitor spin slide
    donate sport lift clutch') that is loaded at request time and deterministically derived into a private key, public key
    and address via HDNodeWallet.fromPhrase(). Because the phrase ships in the public repository, any actor who reads the
    source recovers the full HD wallet seed and every private key derivable from it. The /rest/web3/submitKey handler even
    confirms a correct guess by returning success, so the secret is both disclosed in source and oracle-verifiable at runtime.
  evidence_summary: The mnemonic constant at checkKeys.ts:10 is passed to HDNodeWallet.fromPhrase() at line 11, deriving privateKey
    at line 12 — the seed material lives in committed source, not in an env var or vault.
  impact_description: Full compromise of the derived Ethereum wallet's private key; any funds or NFT ownership tied to that
    seed are controllable by anyone who reads the repo.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. The mnemonic is a plaintext literal; there is no vault, env-var indirection, or key-rotation path.
  mitigation_title: Remove the hardcoded BIP-39 mnemonic from source and rotate the derived wallet
  remediation:
    effort: Medium
    steps:
    - Delete the mnemonic literal from routes/checkKeys.ts:10 and treat the seed as permanently compromised — generate a fresh
      HD wallet.
    - For any non-CTF deployment, load key material from a secrets manager (e.g. process.env / AWS Secrets Manager / Vault)
      at boot, never from committed source.
    - Purge the phrase from git history (git filter-repo / BFG) since it remains recoverable from prior commits.
    - If this endpoint must stay as an intentional challenge, scope the derived wallet to a throwaway testnet address that
      never holds real value.
