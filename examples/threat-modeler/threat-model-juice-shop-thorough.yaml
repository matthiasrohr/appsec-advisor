  stride: Information Disclosure
  cwe: CWE-312
  title: Customer PII seeded in cleartext at rest — data/datacreator.ts:250
  affected_parameter: null
  scenario: createAddresses() (data/datacreator.ts:250-267) and the surrounding seed routines write full customer PII — streetAddress,
    zipCode, mobileNum, city, country, fullName — into the Addresses table as plain DataTypes.STRING columns, and wallet balances
    and orders are likewise plaintext. The backing store is a single unencrypted file `data/juiceshop.sqlite` (no encryption-at-rest,
    no database authentication beyond the dummy 'username'/'password' Sequelize constructor args). Anyone with read access
    to the application filesystem, a container volume, or a backup obtains the entire PII corpus with no cryptographic barrier
    — and the search.ts UNION SQLi reaches the same data over the network.
  evidence_summary: data/datacreator.ts:250 persists address PII as plaintext STRING columns into an unencrypted SQLite file
    with no at-rest encryption.
  impact_description: A file-level or backup compromise of juiceshop.sqlite exposes all customer addresses, phone numbers,
    and wallet balances with no decryption required.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None at the data tier. SQLite is file-based with no DB-level auth and no encryption at rest; the Sequelize
    credentials in models/index.ts are placeholder strings, not access control.
  mitigation_title: Encrypt PII columns at rest and protect the SQLite database file
  remediation:
    effort: High
    steps:
    - Apply field-level encryption (AES-256-GCM via a model getter/setter) to sensitive Address columns (streetAddress, zipCode,
      mobileNum) and to wallet/order amounts, keying from an env/KMS secret.
    - For production deployments, move off plain SQLite to an encrypted-at-rest engine (e.g. SQLCipher or a managed DB with
      TDE) and restrict filesystem permissions on the data directory.
    - Ensure backups of the data tier are encrypted and access-controlled, not just the live file.
    code_example: "streetAddress: {\n  type: DataTypes.STRING,\n  set (v) { this.setDataValue('streetAddress', encryptAesGcm(v,\
      \ process.env.PII_KEY)) },\n  get () { return decryptAesGcm(this.getDataValue('streetAddress')) }\n}"
