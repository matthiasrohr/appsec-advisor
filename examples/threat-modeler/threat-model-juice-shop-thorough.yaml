  stride: Spoofing
  cwe: CWE-347
  title: Weak 2FA Token Signing Key
  affected_parameter: tmpToken
  scenario: When a TOTP-enabled account logs in, login.ts:41 issues a tmpToken via security.authorize({userId, type:'password_valid_needs_second_factor_token'})
    signed with the same RS256 key as full session tokens. 2fa.ts:20 validates it with security.verify (the alg:none-vulnerable
    verify from auth-identity-002) and only checks the type field (2fa.ts:22). Because the signing key is public (auth-identity-001)
    and verify accepts alg:none, an attacker who only knows a victim's userId can forge a tmpToken of the correct type, skip
    the password step entirely, and proceed to the TOTP check — and the setupToken path (2fa.ts:115) trusts a self-supplied
    TOTP secret the same way. The single-key design means the second factor inherits every weakness of the first.
  evidence_summary: The 2FA tmpToken is signed and verified with the general auth key and only its type claim is checked at
    2fa.ts:20-22, so a forged token bypasses the password-validated precondition.
  impact_description: An attacker forges the intermediate 2FA token, collapsing the two-factor flow to a single guessable/forgeable
    factor.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: type-field check at 2fa.ts:22 and TOTP verification at 2fa.ts:31, but the token signature trust is broken
    upstream.
