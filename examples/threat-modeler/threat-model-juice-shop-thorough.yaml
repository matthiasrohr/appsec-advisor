  threat_category_id: TH-14
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-25
  title: Null Byte Allowlist Bypass in FTP File Server — routes/fileServer.ts:28
  affected_parameter: params.file
  scenario: In servePublicFiles() (fileServer.ts:26–33), the allowlist check endsWithAllowlistedFileType() (line 52) runs
    on the raw 'file' parameter before cutOffPoisonNullByte() is called on line 28. An attacker requests GET /ftp/acquisitions.md%00.pdf.
    The raw string ends with '.pdf' so the allowlist passes. Then cutOffPoisonNullByte() strips the %00 suffix, leaving 'acquisitions.md'.
    path.resolve('ftp/', 'acquisitions.md') is served. This bypass exposes any file in ftp/ regardless of extension, including
    coupons_2013.md.bak, package.json.bak, and incident-support.kdbx (by requesting them as <name>%00.pdf).
  evidence_summary: The allowlist extension check fires on the raw parameter string before null-byte sanitisation, inverting
    the correct order of operations.
  impact_description: Attackers bypass the .md/.pdf extension allowlist to download arbitrary files from the ftp/ directory,
    including backup files and the KeePass database.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: cutOffPoisonNullByte() is present but applied after the allowlist check, making it ineffective as a bypass
    prevention.
  mitigation_title: Apply null-byte sanitisation before the extension allowlist check in servePublicFiles()
  remediation:
    effort: Low
    steps:
    - Call security.cutOffPoisonNullByte(file) immediately upon receiving params.file, before any extension check.
    - 'Reorder: sanitise → allowlist-check → path.resolve → sendFile.'
    - Consider URL-decoding the full path parameter first (decodeURIComponent) before sanitisation to catch double-encoded
      variants.
    code_example: "function verify(file: string, res: Response, next: NextFunction) {\n  // 1. Sanitise first\n  file = security.cutOffPoisonNullByte(file);\n\
      \  // 2. Then check allowlist\n  if (file && endsWithAllowlistedFileType(file)) {\n    res.sendFile(path.resolve('ftp/',\
      \ file));\n  } else {\n    res.status(403);\n    next(new Error('Only .md and .pdf files are allowed!'));\n  }\n}"
    reference: CWE-25
    blueprint: null
