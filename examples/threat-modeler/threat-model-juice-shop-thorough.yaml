  title: JWT session token stored in localStorage readable — request.interceptor.ts:16
  affected_parameter: token
  scenario: 'The session JWT is written to localStorage on every login path (login.component.ts:101, oauth.component.ts:51,
    payment.component.ts:232) and read back to build the `Authorization: Bearer` header in request.interceptor.ts:16. localStorage
    is readable and writable by any JavaScript executing in the origin, so the token has no isolation from XSS: any of the
    injection sinks in this component (angular-frontend-003/004/005) can exfiltrate it with a single `localStorage.getItem(''token'')`.
    The user''s email is likewise stored (login.component.ts:135) and forwarded in an `X-User-Email` header (request.interceptor.ts:23).
    The same token is also placed in a non-httpOnly cookie via `cookieService.put(''token'', ...)` (login.component.ts:104,
    oauth.component.ts:50) with no Secure or SameSite attributes, giving it none of the browser protections a session cookie
    would normally carry. On a shared or lost device the persisted token survives until expiry (angular-frontend-008 covers
    the architectural design).'
  evidence_summary: The bearer JWT is persisted in localStorage and a flag-less cookie, both fully readable by page scripts,
    and re-read by the HTTP interceptor.
  impact_description: Any XSS or local-device access yields the full session token, enabling silent account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None protecting confidentiality of the token. HttpOnly is not applicable to localStorage, and the mirrored
    cookie is set without HttpOnly/Secure/SameSite.
  mitigation_title: Stop storing the session JWT in localStorage and deliver it as an httpOnly Secure SameSite cookie
  remediation:
    effort: High
    steps:
    - Remove `localStorage.setItem('token', ...)` from login.component.ts:101, oauth.component.ts:51, and payment.component.ts:232.
    - Have the backend set the session as an `httpOnly; Secure; SameSite=Strict` cookie so it is unreachable from JavaScript,
      and drop the manual Authorization interceptor.
    - If a bearer token must remain in the SPA, hold it only in an in-memory (non-persisted) variable scoped to the app instance,
      never in localStorage or a JS-readable cookie.
    - Remove the plaintext email from localStorage and the X-User-Email header; derive identity server-side from the session.
    code_example: "// backend (Express) sets the session cookie\nres.cookie('session', jwt, {\n  httpOnly: true, secure: true,\
      \ sameSite: 'strict', maxAge: 8*3600*1000\n})\n// frontend: no token in localStorage; browser sends the cookie automatically"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#local-storage
  evidence:
