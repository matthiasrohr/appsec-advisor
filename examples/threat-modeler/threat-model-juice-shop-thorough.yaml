  stride: Information Disclosure
  cwe: CWE-209
  title: Sandbox/eval error returned via dev errorhandler leaks internals
  affected_parameter: orderLinesData
  scenario: When orderLinesData triggers a non-timeout error during evaluation, the catch block at routes/b2bOrder.ts:25 calls
    next(err) at line 32, forwarding the raw error. The application's terminal error middleware is the development errorhandler()
    registered at server.ts:682, which renders full error details and stack traces in the HTTP response. An attacker can therefore
    probe the eval surface with malformed payloads and read back internal exception messages, file paths, line numbers, and
    the structure of the host runtime — valuable reconnaissance for refining a sandbox-escape RCE payload. Once RCE is achieved
    (b2b-api-001), the same channel enables direct exfiltration of file-system contents and environment variables (e.g. process.env
    secrets).
  evidence_summary: Line 32 forwards the raw evaluation error to next(), and the global errorhandler() at server.ts:682 is
    the verbose development handler that emits stack traces in responses.
  impact_description: Attackers gain internal error/stack-trace detail useful for crafting reliable sandbox-escape payloads,
    and post-exploit a read primitive for files and environment secrets.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Timeout errors are caught and replaced with a generic 503 message (lines 26-29). All other errors are
    passed raw to the verbose development errorhandler.
  mitigation_title: Replace dev errorhandler with sanitized error responses for the B2B path
  remediation:
    effort: Low
    steps:
    - Do not run the development errorhandler() (server.ts:682) in production; use a custom final error handler that logs
      full detail server-side but returns a generic message and correlation id to clients.
    - In routes/b2bOrder.ts catch block, normalize all non-timeout errors to a generic 400/500 response instead of forwarding
      raw err via next(err) at line 32.
    - Ensure no stack traces, file paths, or runtime internals appear in any B2B API response body.
    code_example: "} else {\n  logger.warn(`B2B eval error: ${utils.getErrorMessage(err)}`)\n  res.status(400).json({ error:\
      \ 'Could not process order data' })\n}"
    reference: CWE-209
