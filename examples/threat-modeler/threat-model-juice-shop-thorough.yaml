- local_id: websocket-realtime-004
  threat_category_id: TH-15
  additional_categories:
  - TH-13
  stride: Spoofing
  cwe: CWE-346
  title: Missing Socket.IO Origin Validation
  affected_parameter: null
  scenario: 'The server CORS config at line 20 pins `origin: ''http://localhost:4200''` — the local dev frontend. In the deployed
    container the real frontend is served same-origin on port 3000, so this hardcoded dev origin does not match production
    and the value provides no meaningful production allowlist. More importantly, Socket.IO CORS only constrains browser cross-origin
    XHR/polling reads; it does not authenticate the connection (finding -001) and is not enforced for WebSocket-upgrade transport
    or for non-browser clients. There is no server-side check of `socket.handshake.headers.origin` in any handler. A malicious
    web page in a victim''s browser, or any scripted client, can therefore open the channel and both read the broadcast streams
    and invoke handlers, because the channel relies on origin headers it never validates server-side.'
  evidence_summary: registerWebsocketEvents.ts:20 hardcodes a dev-only CORS origin and no handler validates `socket.handshake.headers.origin`;
    CORS is the only origin-related control present.
  impact_description: Cross-origin pages and non-browser clients reach the channel because origin is neither correctly configured
    for production nor validated server-side.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: A single hardcoded CORS origin (http://localhost:4200) at registerWebsocketEvents.ts:20, which targets
    the dev frontend and is browser-only, not a server-side origin check.
  mitigation_title: Configure the production CORS origin allowlist and validate handshake origin server-side
  remediation:
    effort: Low
    steps:
    - Drive the CORS origin from configuration (config.get) rather than the hardcoded dev value so production origins are
      allowlisted explicitly.
    - In the `io.use` handshake middleware, additionally check `socket.handshake.headers.origin` against the allowlist and
      reject mismatches, so the control is enforced for WebSocket transport and not only CORS-aware browsers.
