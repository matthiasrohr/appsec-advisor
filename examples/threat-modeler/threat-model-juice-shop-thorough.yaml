  title: Third-party Action pinned to mutable branch ref main — image_actions.yml:33
  affected_parameter: 'uses: calibreapp/image-actions@main'
  scenario: 'image_actions.yml pins `calibreapp/image-actions@main` (line 33) — a mutable branch reference rather than a commit
    SHA. The step receives `githubToken: ${{ secrets.GITHUB_TOKEN }}` (line 35). The same workflow also pins `actions/checkout@v6`
    (line 30) and `peter-evans/create-pull-request@v8` (line 42) to mutable major-version tags, and ci.yml pins `coverallsapp/github-action@v2`
    (ci.yml:202). If any of these upstream repositories is compromised — or the maintainer force-pushes a malicious commit
    to the `main` branch / re-points the `v2`/`v6`/`v8` tag — the next workflow run executes attacker code with the workflow''s
    `GITHUB_TOKEN`. This contradicts the otherwise-disciplined SHA pinning used throughout ci.yml and release.yml, so the
    protection is inconsistent and the weakest link (a branch ref) governs blast radius.'
  evidence_summary: image_actions.yml binds calibreapp/image-actions to the floating `@main` branch while handing it GITHUB_TOKEN,
    and three further actions across the workflow set use mutable major-version tags.
  impact_description: Compromise or malicious update of an unpinned upstream action runs arbitrary code in the pipeline with
    GITHUB_TOKEN, enabling repo tampering or token theft.
  likelihood: Low
  impact: High
