  scenario: 'The `heroku` job in ci.yml at line 372 installs the Heroku CLI by piping the output of a remote URL directly
    into `sh`: `curl https://cli-assets.heroku.com/install.sh | sh`. This pattern executes whatever code the remote server
    returns without any verification of content integrity (no checksum, no signature). If the Heroku CDN or DNS is compromised,
    or if a TLS interception attack succeeds (e.g., via a compromised CA in the runner''s trust store), the install script
    can be replaced with arbitrary code that runs as the CI user with access to all secrets including `HEROKU_API_KEY`. Unlike
    pinned actions (which are verified by SHA), the downloaded shell script has no equivalent integrity guarantee.'
  evidence_summary: '`curl https://cli-assets.heroku.com/install.sh | sh` executed unconditionally in the `heroku` deployment
    job with no content checksum verification.'
  impact_description: Arbitrary code execution in the CI runner with access to HEROKU_API_KEY (production deploy key), DOCKERHUB_TOKEN,
    and GITHUB_TOKEN, enabling malicious deployments to Heroku production.
