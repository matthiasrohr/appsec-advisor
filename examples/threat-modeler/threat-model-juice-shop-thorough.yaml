  title: Missing CSRF Protection on State-Changing Endpoints — server.ts:667
  scenario: No CSRF middleware is registered anywhere in the application (a grep for csurf/csrf across routes, lib, server.ts
    and app.ts returns no protective middleware), yet state-changing operations accept simple requests. POST /profile (updateUserProfile,
    server.ts:667) only inspects Origin/Referer for a challenge counter, not for enforcement, and GET /rest/user/change-password
    (server.ts:597) mutates the password via query parameters. Combined with open CORS (server.ts:183) and cookie-based session
    resumption (security.updateAuthenticatedUsers, lib/insecurity.ts:186), a malicious page can drive these requests in a
    victim's authenticated context.
  evidence_summary: No csurf/csrf middleware exists; updateUserProfile (server.ts:667) and the GET-based change-password route
    (server.ts:597) mutate state with no anti-CSRF token.
  impact_description: A malicious site can change a logged-in victim's profile or password without their interaction.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None enforced. updateUserProfile only reads Origin/Referer to award a challenge, not to block forged
    requests.
  mitigation_title: Add anti-CSRF tokens and convert mutating GETs to POST
  remediation:
    effort: Medium
    steps:
    - Introduce a CSRF defense (double-submit cookie or the csrf-csrf package) and require a valid token on all POST/PUT/PATCH/DELETE
      routes including /profile (server.ts:667).
    - Change /rest/user/change-password (server.ts:597) from app.get to app.post so credentials are not mutated via a GET
