- local_id: socket-io-server-007
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-770
  title: Unbounded LLM Consumption on Chat Endpoint — routes/chat.ts:114
  scenario: An attacker scripts repeated POSTs to /rest/chat, each carrying a large messages array. The route is registered
    at server.ts:638 without any rateLimit() middleware (unlike /rest/user/reset-password and other routes) and chat() at
    routes/chat.ts:114 never requires authentication, caps message count/length, or bounds output tokens. Each request forwards
    to the external LLM via streamText at line 203, so a single anonymous attacker drives unbounded LLM API spend and ties
    up server streaming resources — a financial and availability denial of service.
  evidence_summary: app.post('/rest/chat', ...) at server.ts:638 has no rate-limit or auth wrapper and routes/chat.ts imposes
    no message-length or token cap before calling the paid LLM API.
  impact_description: One anonymous client can exhaust the LLM API budget and streaming capacity, causing cost blowout and
    service degradation.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None on this route. express-rate-limit is imported and applied to other endpoints (server.ts:343,459,466,472)
    but not to /rest/chat.
  mitigation_title: Add per-user rate limiting, auth, and input/output caps to /rest/chat
  remediation:
    effort: Medium
    steps:
    - 'Wrap /rest/chat at server.ts:638 with rateLimit({ windowMs: 60_000, max: 20 }) keyed per user/IP, matching the pattern
      already used for other REST routes.'
