  title: Hardcoded Wallet Mnemonic and Private Key — routes/checkKeys.ts:10
  affected_parameter: null
  scenario: 'checkKeys.ts:10 embeds a 12-word BIP-39 mnemonic in source, then derives privateKey/publicKey/address via ethers
    HDNodeWallet.fromPhrase at runtime (lines 11-14). The derived private key is the secret the /rest/web3/submitKey endpoint
    compares against. Anyone with read access to the repository, a built bundle, or the container image recovers the mnemonic
    and reconstructs the full keypair offline. Although this address is a deliberate CTF artifact, the pattern is a textbook
    hardcoded-cryptographic-key exposure: a real deployment that copies this shape would leak control of an on-chain wallet
    to anyone reading the source (ACT-D-06 supply-chain attacker reading the build, ACT-D-01 reading a public repo).'
  evidence_summary: A literal BIP-39 mnemonic is stored at checkKeys.ts:10 and deterministically derives the private key compared
    at line 16/18.
