  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded Cryptographic Key
  affected_parameter: null
  scenario: 'The RSA private key used to sign every JWT is a string literal at lib/insecurity.ts:21, committed to the public
    OWASP Juice Shop repository. authorize() at insecurity.ts:54 signs tokens with this key via jwt.sign(user, privateKey,
    {algorithm: ''RS256''}). Anyone who clones the repo can mint a valid token offline: jwt.sign({data:{id:1,email:''admin@juice-sh.op'',role:''admin''}},
    privateKey, {algorithm:''RS256''}). The server accepts it at verify() (insecurity.ts:55) because the public key in encryptionkeys/jwt.pub
    is the matching half. No network interaction with the victim is required to forge an admin session.'
  evidence_summary: privateKey is an inline PEM literal at insecurity.ts:21 and the matching public key is committed at encryptionkeys/jwt.pub,
    so the signing secret is public.
  impact_description: Any party can forge a token the server accepts as role=admin, fully bypassing authentication and authorization.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The key is a static literal with no rotation, no KMS, no environment injection.
