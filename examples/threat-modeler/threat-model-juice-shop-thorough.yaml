threats:
- local_id: data-persistence-001
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Weak MD5 Password Hashing lib/insecurity.ts and models/user.ts
  affected_parameter: password
  scenario: 'Every user password is hashed with unsalted MD5 via `security.hash()` (`lib/insecurity.ts:43`). An attacker who
    obtains the `data/juiceshop.sqlite` database file — through SQLi exfiltration, SSRF, or OS file-read — can run the entire
    `Users` table through a precomputed rainbow table or a GPU-accelerated brute-force attack. MD5 is not a password-hashing
    function: it has no work factor, no salt, and can be computed at billions of hashes per second. The seeded admin password
    `admin123` would be reversed in milliseconds. All user accounts are compromised as soon as the hash column is read.'
  evidence_summary: The `password` column setter at `models/user.ts:77` calls `security.hash(clearTextPassword)`, which resolves
    to `crypto.createHash('md5').update(data).digest('hex')` at `lib/insecurity.ts:43` — no salt, no stretching.
  impact_description: Full offline password recovery for every registered user, enabling mass account takeover including admin.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no salt, no bcrypt/argon2/scrypt used anywhere in the password storage path.
  mitigation_title: Replace MD5 password hashing with bcrypt in the User model setter
  remediation:
    effort: Medium
    steps:
    - Install `bcrypt` or `argon2` (`npm install bcryptjs`). Remove the `hash()` export from `lib/insecurity.ts`.
    - Change the `password` setter in `models/user.ts:77` to `this.setDataValue('password', await bcrypt.hash(clearTextPassword,
      12))`.
    - Update all callers that compare passwords (e.g. `routes/login.ts`) to use `bcrypt.compare(input, stored)` instead of
      comparing MD5 strings.
    - Run a one-time migration that invalidates existing MD5 hashes and forces password reset on next login (set `isActive=false`
      or hash a random nonce over the stored hash so `bcrypt.compare` always fails).
    code_example: "// models/user.ts — new setter\nimport bcrypt from 'bcryptjs'\npassword: {\n  type: DataTypes.STRING,\n\
      \  async set(clearTextPassword: string) {\n    this.setDataValue('password', await bcrypt.hash(clearTextPassword, 12))\n\
      \  }\n}"
    reference: CWE-916
  evidence:
  - file: models/user.ts
    line: 77
  evidence_check: unchecked
  controls_absent_evidence: []
  prior_finding_ref: null
  component_name: Data Layer (SQLite + MarsDB)
