- local_id: backend-api-011
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-770
  title: Rate Limit Keyed on Spoofable Header — server.ts:346
  affected_parameter: X-Forwarded-For
  scenario: The reset-password rate limiter uses keyGenerator ({ headers, ip }) => headers['X-Forwarded-For'] ?? ip (server.ts:346).
    Because X-Forwarded-For is fully attacker-controlled and trust proxy is enabled, an attacker rotates the header on each
    request to receive a fresh rate-limit bucket, completely defeating the throttle. This permits unlimited password-reset
    / security-answer brute-forcing against /rest/user/reset-password, and most other state-changing endpoints (login, basket,
    orders) have no rate limiting at all.
  evidence_summary: server.ts:346 derives the limiter key from the client-supplied X-Forwarded-For header, which any client
    can set to a unique value per request.
  impact_description: Rate limiting bypass enabling brute-force of password reset and account-recovery flows.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: express-rate-limit is configured on reset-password and the 2FA endpoints, but the reset-password key
    generator is spoofable.
  mitigation_title: Key rate limiting on the real client IP, not a client-controlled header
  remediation:
    effort: Low
    steps:
    - Remove the custom keyGenerator so express-rate-limit uses req.ip resolved from a trusted proxy configuration (set 'trust
      proxy' to the specific number of proxy hops, not blanket true).
    - If X-Forwarded-For must be used, take only the left-most hop and validate it came from a known proxy.
    - Add rate limiting to login and other authentication/state-changing endpoints, keyed on IP plus account identifier.
    code_example: 'app.set(''trust proxy'', 1)

      app.use(''/rest/user/reset-password'', rateLimit({ windowMs: 5*60*1000, max: 100 }))

      // omit keyGenerator -> defaults to the trusted req.ip'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
