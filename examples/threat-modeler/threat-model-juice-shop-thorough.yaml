  cwe: CWE-321
  title: Hardcoded JWT Signing Key — lib/insecurity.ts:23
  affected_parameter: null
  scenario: The RSA private key used to sign all JWT session tokens is hardcoded as a string constant in lib/insecurity.ts
    and is also served from the /encryptionkeys directory (server.ts:277). Because the key is checked into the public source
    tree and downloadable at runtime, any attacker can mint a valid token with arbitrary claims, e.g. data.role = 'admin'
    or any victim's userId, and present it to security.isAuthorized(). This forges authentication and elevates to any role
    without credentials.
  evidence_summary: privateKey is a literal RSA key embedded at insecurity.ts:23 and the same key material is browsable via
    the serveIndex-mounted /encryptionkeys route.
  impact_description: 'Universal token forgery: full impersonation of any user and self-promotion to admin/accounting roles.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Tokens are signed RS256, but the signing key is public, defeating the asymmetric protection.
  mitigation_title: Move the JWT private key to a secret store and remove it from source and public routes
  remediation:
    effort: Medium
    steps:
    - Generate a fresh RSA keypair, load the private key at startup from an environment variable or secret manager (e.g. process.env.JWT_PRIVATE_KEY),
      and never commit it.
    - Remove the hardcoded constant at insecurity.ts:23 and rotate the leaked key immediately.
    - Remove the /encryptionkeys serveIndex mount (server.ts:277) or restrict it so private key material is never web-accessible.
    - Add the key file path to .gitignore and scan history with a secret scanner to confirm no other copies remain.
    code_example: 'const privateKey = process.env.JWT_PRIVATE_KEY ?? fs.readFileSync(process.env.JWT_KEY_PATH!, ''utf8'')

      // never inline the PEM; load from secret manager / env at boot'
    reference: CWE-321
