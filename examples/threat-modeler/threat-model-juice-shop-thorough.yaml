    to the production Heroku credential.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: The heroku job is gated to the canonical repo and protected branches (ci.yml:351). HTTPS provides transport
    authentication of the endpoint but not content integrity of the script.
