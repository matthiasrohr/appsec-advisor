  title: Zip-slip arbitrary file write on extract — routes/fileUpload.ts:34
  affected_parameter: file
  scenario: An attacker uploads a crafted .zip to /file-upload whose entries carry traversal paths (e.g. ../../ftp/legal.md
    or ../../../app/server.js). extractZipBuffer (routes/fileUpload.ts:27) builds the target as 'uploads/complaints/' + entry.path
    and writes it with fs.createWriteStream (line 34). The only guard is absolutePath.includes(path.resolve('.')) (line 33),
    which checks whether the resolved path contains the CWD prefix rather than confirming it stays *under* the intended uploads/complaints
    directory — a sibling like <cwd>/ftp/legal.md still passes. The solveIf at line 32 confirms the intended escape target
    is ftp/legal.md, demonstrating write outside the upload dir.
  evidence_summary: Zip entry paths are concatenated into the write target and the containment check uses includes(path.resolve('.'))
    instead of verifying the resolved path is prefixed by the uploads/complaints directory.
  impact_description: Authenticated-not-required arbitrary file write, allowing overwrite of application files or planting
    of web-served content, escalating to remote code execution.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Extraction only runs when fileWriteChallenge is enabled (routes/fileUpload.ts:44) and the includes(path.resolve('.'))
    check (line 33) blocks paths that leave the CWD entirely; neither constrains writes to uploads/complaints.
  mitigation_title: Constrain zip extraction targets to the uploads/complaints directory in extractZipBuffer
  remediation:
    effort: Low
    steps:
    - Compute the resolved base once (const base = path.resolve('uploads/complaints')) and reject any entry whose path.resolve(base,
      entry.path) does not start with base + path.sep.
    - Normalize and strip leading separators / '..' segments from entry.path before joining; skip entries that contain '..'
      after normalization.
    - Enforce a per-archive entry count and total-uncompressed-size cap to also bound zip-bomb resource use.
    code_example: 'const base = path.resolve(''uploads/complaints'')

      const dest = path.resolve(base, entry.path)

      if (!dest.startsWith(base + path.sep)) { continue }

      await pipeline(entry.stream(), fs.createWriteStream(dest))'
