  stride: Tampering
  cwe: CWE-22
  title: Zip-slip arbitrary file write via complaint zip extraction (fileUpload.ts:31)
  affected_parameter: file
  scenario: handleZipFileUpload extracts uploaded .zip archives in extractZipBuffer (fileUpload.ts:27). Each entry path is
    concatenated directly into 'uploads/complaints/' + fileName and resolved at line 31; the only guard is absolutePath.includes(path.resolve('.'))
    at line 33, which merely checks that the resolved path is under the project root, NOT under uploads/complaints/. An attacker
    crafts a zip containing an entry named ../../ftp/legal.md (the fileWriteChallenge target at line 32) or ../../<any project-relative
    path> and the stream is written there via fs.createWriteStream at line 34, overwriting application files inside the repo
    working directory. This is a classic zip-slip directory traversal write.
  evidence_summary: path.resolve('uploads/complaints/' + fileName) at fileUpload.ts:31 uses the unsanitized zip entry path,
    and the line 33 includes(path.resolve('.')) check confines writes to the project root rather than the intended uploads/complaints
    subdirectory.
  impact_description: An attacker overwrites arbitrary files within the application working directory by uploading a zip with
    ../-traversal entry names, enabling content tampering and potential code/path poisoning.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Gated behind isChallengeEnabled(fileWriteChallenge) (line 44); the includes(path.resolve('.')) check
    (line 33) confines writes to the project root but not to the intended subdirectory.
  mitigation_title: Confine zip extraction targets to the uploads/complaints directory and reject traversal entry names
  remediation:
    effort: Low
    steps:
    - Resolve each entry against the intended base (path.resolve('uploads/complaints')) and verify the resolved path startsWith
      that base + path.sep before opening a write stream; skip entries that escape it.
    - Strip directory components from entry names (use path.basename) so archive paths cannot influence the destination directory.
    - Reject entries whose normalized name contains '..' segments or is absolute.
    code_example: 'const base = path.resolve(''uploads/complaints'')

      const dest = path.resolve(base, path.basename(entry.path))

