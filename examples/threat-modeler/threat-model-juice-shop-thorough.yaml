  - T-055
  - T-070
assets:
- id: A-001
  name: User Credentials (Password Hashes)
  classification: Restricted
  description: User account passwords stored as unsalted MD5 hashes in the SQLite Users table (lib/insecurity.ts:41). Trivially
    crackable offline if the database is breached via SQL injection.
  linked_threats: []
- id: A-002
  name: JWT Signing Private Key
  classification: Restricted
  description: RSA private key used to sign all session JWTs, hardcoded as a string literal in lib/insecurity.ts:21 and committed
    to the public repository. Possession allows offline forgery of arbitrary admin tokens.
  linked_threats: []
- id: A-003
  name: Session JWT Tokens
  classification: Confidential
  description: Bearer JWTs carrying user id and role, issued on login and stored in browser localStorage and a cookie. XSS-extractable;
    not revocable until expiry.
  linked_threats: []
- id: A-004
  name: Payment Card & Wallet Data
  classification: Restricted
  description: Stored credit-card records (Card model) and wallet balances (Wallet model) associated with user accounts. Ownership
    enforcement relies on client-supplied UserId, creating IDOR exposure.
  linked_threats: []
- id: A-005
  name: User PII (Email, Profile, Addresses)
  classification: Confidential
  description: 'Personally identifiable information: email addresses (plaintext, enumerable via login), security answers,
    delivery addresses, and profile data across the User and Address models.'
  linked_threats: []
- id: A-006
  name: Order, Basket & Complaint Data
  classification: Confidential
  description: User-owned business objects — baskets, basket items, orders, deliveries, complaints, feedback — accessible
    through routes whose ownership checks are inconsistently applied (BOLA/IDOR).
  linked_threats: []
- id: A-007
  name: SQLite Database File
  classification: Restricted
  description: Embedded SQLite datastore co-located in-process with the application. Holds all persistent data; reachable
    in full via the intentional SQL injection paths in login and product search.
  linked_threats: []
- id: A-008
  name: Uploaded Files & FTP Directory
  classification: Internal
  description: User-uploaded complaint attachments and profile images written into served directories (uploads/, ftp/). Exposed
    via the /ftp and /file-serve directory-traversal surface and the file-parser sandbox.
  linked_threats: []
- id: A-009
  name: LLM Provider API Key
  classification: Restricted
  description: Credential for the OpenAI-compatible chatbot provider consumed by routes/chat.ts via @ai-sdk/openai-compatible.
    Compromise enables provider billing abuse and completion tampering.
  linked_threats: []
- id: A-010
  name: CI/CD Secrets & GitHub Token
  classification: Restricted
  description: GITHUB_TOKEN and workflow secrets used by GitHub Actions. Exposed to over-broad scopes by missing permissions
    blocks and unpinned third-party actions in .github/workflows.
  linked_threats: []
- id: A-011
  name: Application Source Code & Challenge Solutions
  classification: Internal
  description: TypeScript/Angular source, challenge metadata (data/static/challenges.yml), and code-fix snippets. Public repository
    — readable by anyone and accepting external pull requests into trunk.
  linked_threats: []
- id: A-012
  name: Public Product Catalog & Content
  classification: Public
  description: Product listings, challenge listings, languages, and static assets served without authentication. No confidentiality
    requirement; integrity matters for trust.
  linked_threats: []
