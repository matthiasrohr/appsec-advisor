  scenario: 'denyAll() at lib/insecurity.ts:53 constructs express-jwt with secret: '''' + Math.random() to act as a hard deny.
    Math.random() is not cryptographically secure and the value is regenerated per call, so the middleware''s verification
    key is non-deterministic and predictable in principle. More importantly, routes guarded by decode()-based logic (isAccounting
    line 156, isCustomer line 171) call decode() which uses jws.decode() — returning the payload with no signature check at
    all (line 56). Any place that relies on decode() rather than verify() trusts an unauthenticated, attacker-supplied payload.'
  evidence_summary: denyAll() at line 53 seeds the JWT secret from Math.random(); decode() at line 56 returns payload with
    no verification.
  impact_description: Weak/predictable deny-secret plus signature-free decode() paths enable trivial role-claim spoofing on
    decode-gated routes.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: isAccounting/isDeluxe/isCustomer call verify() before decode(), but the role decision itself reads from
    decode()'s unverified payload.
  mitigation_title: Replace Math.random() deny-secret and use verified claims for role checks
  remediation:
    effort: Low
    steps:
    - Replace denyAll()'s Math.random() secret with a middleware that unconditionally returns 401 (e.g. (req,res)=>res.sendStatus(401)).
    - In isAccounting/isCustomer/isDeluxe, read role from the verified jwt.verify() output rather than the separate decode()
      call, so claims used for authorization are signature-checked.
    - Use crypto.randomBytes for any place that genuinely needs an unpredictable secret.
