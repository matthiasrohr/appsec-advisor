- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Third-party Action Pinned to Mutable Branch
  scenario: 'image_actions.yml:33 runs `uses: calibreapp/image-actions@main` and image_actions.yml:42 runs `uses: peter-evans/create-pull-request@v8`.
    `@main` resolves to whatever commit currently sits at the head of the calibreapp/image-actions default branch — the workflow
    re-fetches HEAD on every run. If that upstream repository is compromised (maintainer-account takeover, malicious PR merged,
    or a typosquat-style force-push), the next image-compression run executes attacker-controlled JavaScript on a juice-shop
    runner that holds `secrets.GITHUB_TOKEN` (image_actions.yml:35). The 2025-class tj-actions/changed-files compromise followed
    exactly this pattern: a mutable-tag action was retagged to exfiltrate CI secrets across thousands of downstream repos.
    Because the step runs on push to master/develop (image_actions.yml:11-13), the malicious code executes in the trunk security
    context, not a fork sandbox.'
  evidence_summary: image_actions.yml:33 pins calibreapp/image-actions to the mutable `@main` branch ref rather than a commit
    SHA; the adjacent peter-evans/create-pull-request@v8 (line 42) and actions/checkout@v6 (line 30) use mutable major-version
    tags.
  impact_description: A compromise of the upstream action repository yields arbitrary code execution on a trunk-context runner
    with GITHUB_TOKEN, enabling repository tampering or secret exfiltration.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: The job is gated to the canonical repo and same-repo PRs (image_actions.yml:24-27), which prevents fork
    PRs from triggering it but does nothing to constrain a compromised upstream action.
  mitigation_title: Pin calibreapp/image-actions and peter-evans/create-pull-request to full commit SHAs in image_actions.yml
  remediation:
    effort: Low
    steps:
    - 'Replace `calibreapp/image-actions@main` with the full 40-character commit SHA of the intended release, appending the
      human tag as a trailing comment (e.g. `calibreapp/image-actions@<sha> # v1.1.0`).'
    - Apply the same SHA-pinning to peter-evans/create-pull-request@v8 (line 42) and actions/checkout@v6 (line 30), matching
      the convention already used in ci.yml and release.yml.
    - 'Add Dependabot `package-ecosystem: github-actions` (or a pin-checking job) so SHA pins are bumped through reviewed
      PRs rather than left to rot.'
    code_example: "- name: Compress Images\n  uses: calibreapp/image-actions@a17a3b8d0b1f1a2c3d4e5f6071829abcdef01234 # v1.1.0\n\
      \  with:\n    githubToken: ${{ secrets.GITHUB_TOKEN }}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/CI_CD_Security_Cheat_Sheet.html
