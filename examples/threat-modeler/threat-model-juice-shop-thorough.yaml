trust_boundaries:
- id: tb-1
  name: Public Internet
  description: Unauthenticated external actors and attacker-controlled clients. No authentication or authorization enforced
    at this boundary — all trust decisions happen inside the application.
  from: external
  to: backend-api
  enforcement: API gateway, or reverse proxy configured in the repository. deployment-time perimeter controls out of scope
    for source-tree review
  cross_boundary_threats:
  - SQLi on /rest/user/login and /rest/products/search
  - unauthenticated file upload and SSRF on /profile/image/url
  - JWT forgery using hardcoded private key
  - alg:none bypass via express-jwt@0.1.3
  data_flows:
  - HTTP/HTTPS REST API (port 3000)
  - WebSocket upgrade (Socket.IO)
  - B2B order submission
- id: tb-2
  name: Client SPA Trust Boundary
  description: Angular SPA running in user browser. Client-side auth guards are the only access control on many routes — bypassable
    by any user who modifies client-side JavaScript or directly calls REST APIs.
  from: frontend-spa
  to: backend-api
  enforcement: JWT Bearer token in Authorization header. express-jwt@0.1.3 middleware without algorithm allowlist — alg:none
    bypass possible.
  cross_boundary_threats:
  - Client-side auth guard bypass (direct API call)
  - JWT token stored in localStorage — XSS steals session
  - postMessage cross-origin message injection
  data_flows:
  - REST API calls (HTTPS)
  - WebSocket events (WSS)
- id: tb-3
  name: Application to Data Tier
  description: Express backend to in-process SQLite database. No network separation — SQLite runs in the same process via
    Sequelize ORM. Raw SQL queries in login and search routes bypass ORM parameterization.
  from: backend-api
  to: sqlite-db
  enforcement: In-process only — no network isolation, no database-level auth. Raw SQL in routes/login.ts:34 and routes/search.ts:23
    bypasses Sequelize parameterization entirely.
  cross_boundary_threats:
  - SQL injection via login email/password fields
  - SQL injection via search criteria parameter
  - IDOR via sequential integer IDs on orders/addresses/baskets
  data_flows:
  - Sequelize ORM queries
  - Raw SQL via sequelize.query()
- id: tb-4
  name: Authentication Service Internal Boundary
  description: Internal boundary around lib/insecurity.ts and auth routes. Cryptographic material (RSA private key, HMAC secret)
    lives here. Compromise of this boundary enables system-wide authentication bypass.
  from: backend-api
  to: auth-service
  enforcement: In-process function calls only. No isolation — any route handler importing lib/insecurity.ts has full access
    to sign arbitrary JWTs.
  cross_boundary_threats:
  - Hardcoded RSA private key enables offline JWT forgery
  - alg:none bypass — express-jwt@0.1.3 accepts unsigned tokens
  - MD5 password hash cracking from database dump
  data_flows:
  - JWT sign/verify calls
  - MD5 hash calls
  - In-memory session map reads/writes
- id: tb-5
  name: File System and External Network
  description: Boundary between application and external file system or external URLs. File upload and URL-fetch routes cross
    this boundary without allowlisting.
  from: file-upload-engine
  to: external
  enforcement: No allowlist. routes/profileImageUrlUpload.ts:24 performs fetch(url) with user-supplied URL. routes/fileUpload.ts:83
    parses XML with noent:true enabling external entity resolution.
  cross_boundary_threats:
  - SSRF via profile image URL to internal services
  - XXE via XML file upload to read local files
  - Path traversal via logfileServer/keyServer to read arbitrary files
  data_flows:
  - HTTP fetch to user-supplied URLs (SSRF)
  - XML file parsing with external entity resolution (XXE)
  - File system reads in log/key/quarantine servers
- id: tb-6
  name: CI/CD Pipeline Boundary
  description: GitHub Actions runners execute build, test, and deployment steps with GITHUB_TOKEN. Absence of explicit permissions
    blocks means all 14+ workflows inherit write-all access to the repository.
  from: ci-cd-pipeline
  to: external
  enforcement: GitHub Actions OIDC + GITHUB_TOKEN. No workflow-level permissions blocks on 14/14 workflows → write-all GITHUB_TOKEN
    inherited by all jobs.
  cross_boundary_threats:
  - Supply chain compromise via unpinned action refs (coverallsapp, calibreapp, peter-evans)
  - Workflow privilege escalation via write-all GITHUB_TOKEN
  - Postinstall script execution at build time (package.json)
  data_flows:
  - npm install (package downloads)
  - Docker image push
  - GitHub repository write operations
