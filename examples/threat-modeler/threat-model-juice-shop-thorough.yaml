  stride: Elevation of Privilege
  cwe: CWE-284
  title: In-process SQLite datastore gives injection full blast radius
  affected_parameter: null
  scenario: models/index.ts:33-43 instantiates a single Sequelize/SQLite connection backed by the file data/juiceshop.sqlite,
    co-located in-process with all application logic and using one undifferentiated DB principal ('username'/'password' placeholders,
    no row-level or schema-level privilege separation). There is no network boundary, no least-privilege DB user, and no separation
    between the Users/Cards tables and lower-sensitivity tables. Consequently any SQL-injection foothold reaching this connection
    — e.g. the raw template-string login and search queries that bypass the ORM — reads and writes every table, including
    password hashes and card data, with no further containment. The persistence design provides no defense-in-depth to limit
    an injection or in-process compromise to a subset of data.
  evidence_summary: models/index.ts:33-43 wires one in-process SQLite connection with a single all-powerful DB principal and
    a co-located file store, so any injected query reaches all tables.
  impact_description: A single injection or in-process compromise yields read/write over the entire datastore — credentials,
    cards, and orders alike — with no privilege boundary.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Sequelize parameterization on most ORM paths reduces injection entry points, but no datastore-level isolation,
    least-privilege account, or table-level access separation exists once a query executes.
  mitigation_title: Introduce least-privilege and isolation for the datastore to limit blast radius of injection
  remediation:
    effort: High
    steps:
    - Eliminate the raw template-string query paths so the ORM's parameterization is the only path to the store, removing
      the primary injection entry.
    - Move sensitive tables (Users, Cards) toward field-level encryption so an unconstrained read does not yield cleartext
      secrets even with full DB access.
