  title: Hardcoded HMAC Key Enables Deluxe-Token Forgery
  affected_parameter: null
  scenario: deluxeToken() at insecurity.ts:150 derives a membership token via crypto.createHmac('sha256', privateKey).update(email
    + 'deluxe'). The HMAC key is the same leaked RSA private-key literal from insecurity.ts:21, which is public. isDeluxe()
    (insecurity.ts:165) grants deluxe entitlements when the token claim equals deluxeToken(email). Because the key and algorithm
    are known, any user can compute the correct deluxe token for their own email offline and forge deluxe membership. The
    separate hmac() helper (insecurity.ts:42) also embeds a hardcoded key 'pa4qacea4VK9t9nGv7yZtwmj' used for password-reset
    answer hashing.
