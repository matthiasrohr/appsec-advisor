mitigations:
- id: M-001
  title: Move the session credential to an httpOnly Secure SameSite cookie instead of localStorage
  threat_ids:
  - T-001
  priority: P2
  severity: High
  effort: High
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Have the backend issue the session as an `httpOnly; Secure; SameSite=Strict` cookie and stop writing the JWT to localStorage
    at login.component.ts:101, two-factor-auth-enter.component.ts:53, payment.component.ts:232 and oauth.component.ts:51.
    Send the cookie automatically (`withCredentials: true`) and remove manual `Authorization` header construction from the
    localStorage token. Add a Content-Security-Policy (see finding -006) so that even residual XSS cannot trivially beacon
    out data.'
- id: M-002
  title: Treat route guards as UX-only and enforce role authorization on every backend endpoint
  threat_ids:
  - T-002
  priority: P2
  severity: High
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Keep AdminGuard/AccountingGuard for navigation UX only; document explicitly that they are not security controls. Verify
    (in the Express backend component) that every admin/accounting REST route applies server-side role authorization derived
    from the verified JWT signature — not from a client-supplied claim. Do not derive authorization from a client-decoded
    token; the SPA cannot validate the JWT signature.
- id: M-003
  title: Deliver a strict Content-Security-Policy disallowing unsafe-inline script
  threat_ids:
  - T-003
  priority: P2
  severity: High
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Serve a CSP header from the backend (e.g. helmet.contentSecurityPolicy) with `default-src 'self'`, a nonce-based `script-src
    'self' 'nonce-...'`, and `object-src 'none'`; avoid `unsafe-inline`. Set `connect-src` to the application's own origin
    so injected scripts cannot beacon tokens to attacker hosts. Roll out in report-only mode first (`Content-Security-Policy-Report-Only`)
    to find and fix violations before enforcing.
- id: M-004
  title: Add B2B-partner role authorization middleware to /b2b/v2/orders
  threat_ids:
  - T-004
  priority: P2
  severity: High
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Introduce a role/entitlement check (e.g. a security.hasRole(''b2b-partner'') middleware) and apply it to app.post(''/b2b/v2/orders'',
    ...) at server.ts:648 in addition to the JWT gate. Validate that the decoded token''s subject is authorized for the cid
    supplied in the request body to prevent one partner from acting on behalf of another. Default-deny: reject any token whose
    role claim is not explicitly the B2B-partner role.'
- id: M-005
  title: Replace the derived OAuth password with a server-generated secret and adopt code flow with PKCE
  threat_ids:
  - T-005
  priority: P1
  severity: Critical
  effort: High
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Stop deriving the password from the email at oauth.component.ts:30 and :46; let the backend create the federated account
    with a cryptographically random, non-retrievable secret (or no local password at all). Migrate from implicit flow to authorization-code
    flow with PKCE, and validate `state` (CSRF) and `nonce` (replay) on the redirect before consuming any token. Receive the
    OAuth result via a backend redirect/exchange so the access token never appears in the browser URL fragment or history.
- id: M-006
  title: Replace the raw login query with a parameterized Sequelize query
  threat_ids:
  - T-006
  priority: P1
  severity: Critical
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Use bind parameters in models.sequelize.query() at routes/login.ts:34 instead of template-literal interpolation, passing
    email and the hashed password via the replacements/bind option. Prefer the Sequelize model API (UserModel.findOne({ where:
    { email, password: hashedPassword } })) which parameterizes automatically. Add server-side validation that email matches
    an email format before it reaches the query.'
- id: M-007
  title: Move the JWT signing key out of source into a runtime secret store and rotate it
  threat_ids:
  - T-007
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Delete the inline privateKey literal at lib/insecurity.ts:21; load the key at startup from an environment variable
    or secrets manager (e.g. process.env.JWT_PRIVATE_KEY, AWS Secrets Manager, or HashiCorp Vault). Rotate the key pair so
    the committed key is no longer valid; regenerate encryptionkeys/jwt.pub from the new private key. Add the key file path
    to .gitignore and scrub the key from git history (git filter-repo) since it is already public. Stop reusing the signing
    key as the deluxeToken HMAC secret (lib/insecurity.ts:150); use a separate dedicated secret.
- id: M-008
  title: Pin RS256 as the only accepted algorithm in every JWT verification call
  threat_ids:
  - T-008
  priority: P1
  severity: Critical
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Pass algorithms: [''RS256''] to every jwt.verify() call, including the one at lib/insecurity.ts:189. Replace the bare
    jws.verify(token, publicKey) at lib/insecurity.ts:55 with jwt.verify(token, publicKey, { algorithms: [''RS256''] }) and
    reject the token on any thrown error. Upgrade jsonwebtoken from 0.4.0 to a current major version that defaults to rejecting
    alg:none and requires an explicit algorithm list. Replace express-jwt@0.1.3 (lib/insecurity.ts:52) with a current release
    configured with algorithms: [''RS256''].'
- id: M-009
  title: Remove bypassSecurityTrustHtml from the search reflection and render the query as text
  threat_ids:
  - T-009
  priority: P1
  severity: Critical
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Delete the `bypassSecurityTrustHtml(queryParam)` call at search-result.component.ts:143 and assign the plain string
    to `searchValue`. Change the template binding at search-result.component.html:11 from `[innerHTML]="searchValue"` to `{{
    searchValue }}` (text interpolation) so Angular contextually escapes it. If highlighted markup is genuinely required,
    sanitize with a strict allowlist (e.g. DOMPurify with no tags) instead of bypassing the sanitizer.
- id: M-010
  title: Replace req.body.UserId/userId/ownerId with req.user.id (or equivalent session-derived identity) in every WHERE/filter
    clause.
  threat_ids:
  - T-010
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-011
  title: Parameterize the product search query and restrict to product columns
  threat_ids:
  - T-011
  priority: P1
  severity: Critical
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Bind the criteria value: use :criteria with { replacements: { criteria } } so Sequelize escapes the LIKE pattern.
    Select only the columns needed for the product list rather than SELECT *. Remove or gate the SELECT sql FROM sqlite_master
    schema query at line 47 behind a non-production flag.'
- id: M-012
  title: Re-derive the user role from the database on each privileged request, not from the JWT claim
  threat_ids:
  - T-012
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: In isAccounting/isDeluxe/isCustomer, look up the user by id from the verified token and read role from UserModel, not
    from the token payload. Pin RS256 and rotate the signing key (see auth-001, auth-002) so token forgery is no longer trivial.
    Stop deriving the deluxeToken HMAC from privateKey (lib/insecurity.ts:150); use a dedicated server-only secret. Add a
    short token lifetime and a server-side allow-list (authenticatedUsers map already exists) checked on every privileged
    route.
- id: M-013
  title: Remove user-controlled eval from /b2b/v2/orders and parse orderLinesData as data, not code
  threat_ids:
  - T-013
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Eliminate the vm.runInContext(''safeEval(orderLinesData)'') call at routes/b2bOrder.ts:23 entirely — order line data
    is structured data and must never be evaluated as code. Replace with strict schema parsing: define the expected order-line
    shape (e.g. a zod or joi schema for an array of {productId:number, quantity:number}) and JSON.parse + validate the input,
    rejecting anything that does not match. If a computed/expression field is genuinely required, restrict it to a non-Turing-complete
    expression evaluator with an explicit allow-list of operators and no access to constructor/prototype, and run it in an
    isolated worker (e.g. isolated-vm) rather than node:vm, which is not a security boundary. Remove the notevil dependency
    once the eval path is gone.'
- id: M-014
  title: Apply an allowlist filter (Joi/Zod/yup schema, _.pick, or explicit field copy) before passing the body to any model,
    and strip privilege fields before persistence.
