  stride: Spoofing
  cwe: CWE-598
  title: OAuth Implicit Flow Without Sta… (frontend/src/app/login/login.component.ts:134)
  affected_parameter: response_type
  scenario: '`login.component.ts:134` initiates the Google OAuth flow with `response_type=token` (implicit grant) and no `state`
    parameter: `${oauthProviderUrl}?client_id=${this.clientId}&response_type=token&scope=email&redirect_uri=${this.redirectUri}`.
    The implicit flow delivers the `access_token` directly in the URL fragment (`#access_token=...`), where it is visible
    to the browser history, the Referer header on any subsequent navigation, and any JavaScript running on the page. The absent
    `state` parameter means the callback at `/oauth` cannot verify that the redirect was initiated by this application — an
    attacker can craft an authorization response pointing to the app''s callback with a valid token from a different session,
    performing a login CSRF that signs the victim into the attacker''s Google account.'
  evidence_summary: The OAuth authorization URL at line 134 uses `response_type=token` (implicit flow) with no `state` or
    PKCE parameters.
  impact_description: Access token leakage via URL history and Referer headers; missing `state` enables login CSRF where victim
    is authenticated as attacker.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no state parameter, no PKCE, implicit flow used.
  mitigation_title: Migrate OAuth flow to authorization code grant with PKCE and enforce state parameter validation
  remediation:
    effort: High
    steps:
    - Replace `response_type=token` with `response_type=code` to use the authorization code flow. The code is exchanged server-side,
      keeping the token out of the URL.
    - Generate a cryptographically random `state` value per login attempt, store it in `sessionStorage`, include it in the
      authorization URL, and validate it matches in `oauth.component.ts` before processing the callback.
    - 'Implement PKCE: generate a `code_verifier` (random 43–128 char string), compute `code_challenge = base64url(sha256(code_verifier))`,
      include `code_challenge_method=S256&code_challenge=${challenge}` in the authorization URL, and send `code_verifier`
      with the token exchange request.'
    code_example: '// login.component.ts — generate state

      const state = btoa(crypto.getRandomValues(new Uint8Array(16)).join('',''))

      sessionStorage.setItem(''oauth_state'', state)

      window.location.href = `${oauthProviderUrl}?client_id=${clientId}&response_type=code&scope=email&redirect_uri=${redirectUri}&state=${state}`'
    reference: CWE-598
