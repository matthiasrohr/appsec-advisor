    - 'Set res.cookie(''token'', token, { httpOnly: true, secure: true, sameSite: ''strict'' }) at line 195.'
    - Re-verify cached tokens (or store only a verified principal id) instead of trusting the authenticatedUsers map indefinitely.
    code_example: 'res.cookie(''token'', token, { httpOnly: true, secure: true, sameSite: ''strict'' })'
