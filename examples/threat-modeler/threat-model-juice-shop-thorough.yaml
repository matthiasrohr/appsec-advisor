    - 'Rewrite routes/login.ts:34 to use bound replacements: models.sequelize.query(''SELECT * FROM Users WHERE email = :email
      AND password = :hash AND deletedAt IS NULL'', { replacements: { email: req.body.email, hash: security.hash(req.body.password)
      }, model: UserModel, plain: true }).'
    - 'Prefer UserModel.findOne({ where: { email, password: hash } }) so Sequelize builds the parameterized WHERE clause automatically.'
