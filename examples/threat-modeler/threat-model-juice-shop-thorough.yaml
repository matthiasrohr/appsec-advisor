- local_id: ci-cd-pipeline-003
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Build Runs Dependency Install Scripts (Dockerfile:5)
  affected_parameter: null
  scenario: The Dockerfile installer stage runs npm install --omit=dev (Dockerfile:5) and npm install -g typescript@^6.0.3
    (line 4) WITHOUT --ignore-scripts. Every dependency and transitive dependency in the production tree therefore executes
    its preinstall/install/postinstall lifecycle scripts during the official image build. With 66+ direct dependencies and
    a far larger transitive closure, a single compromised package (typosquat, hijacked maintainer account, malicious version
    bump) achieves arbitrary code execution on the build runner — which holds the DockerHub push credentials (DOCKERHUB_TOKEN,
