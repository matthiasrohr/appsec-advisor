- local_id: b2b-api-003
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Event Loop Exhaustion via Unbounded Concurrent VM Evalu… (routes/b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: 'Node.js is single-threaded; `vm.runInContext` blocks the event loop while the evaluated expression runs. The
    2-second timeout at b2bOrder.ts:23 `{timeout: 2000}` prevents any single request from blocking indefinitely, but the endpoint
    has no rate limiting (confirmed: no `rateLimit` middleware registered on `/b2b/v2` in server.ts). An authenticated attacker
    — or a compromised B2B partner — can flood POST /b2b/v2/orders with infinite-loop payloads (e.g., `while(true){}`). Each
    request blocks the Node.js event loop for up to 2 seconds; sending 10 concurrent requests ensures the event loop is continuously
    occupied, rendering the entire application unresponsive for all other users.'
  evidence_summary: b2bOrder.ts:23 calls `vm.runInContext` with a 2-second timeout but no request-rate guard; server.ts shows
    `rateLimit` is not applied to `/b2b/v2`.
  impact_description: Complete application unavailability for all users for the duration of the attack, with minimal per-request
    resource cost to the attacker.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: 2-second VM execution timeout. JWT authentication required (reduces unauthenticated DoS risk).
  mitigation_title: Apply rate limiting to /b2b/v2/orders and enforce orderLinesData length cap
  remediation:
    effort: Low
    steps:
