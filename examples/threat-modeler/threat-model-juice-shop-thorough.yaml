  remediation:
    effort: Medium
    steps:
    - Remove `XML_PARSE_NOENT` and `XML_PARSE_DTDLOAD` from the ParseOption bitmask and do not register the FS input provider.
    - Set the parser to reject DOCTYPE declarations outright, or validate against a fixed schema before processing.
    - Stop echoing parsed XML content back in error responses (fileUpload.ts:79/90).
