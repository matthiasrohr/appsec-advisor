  title: Unauthenticated Wallet Address Spoofing in NFT Verify — routes/nftMint.ts:24
  affected_parameter: walletAddress
  scenario: The `walletNFTVerify` handler at `routes/nftMint.ts` accepts `req.body.walletAddress` with no JWT or session authentication.
    An attacker sends a POST request with any wallet address — including one belonging to a legitimate user who minted an
    NFT — and the server checks it against the in-memory `addressesMinted` Set. Because no cryptographic proof of wallet ownership
    is required (e.g. a signed message), the attacker can spoof any wallet address and claim the NFT mint challenge reward
    without ever owning the NFT or the wallet.
