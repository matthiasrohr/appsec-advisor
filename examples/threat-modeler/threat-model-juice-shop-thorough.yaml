  stride: Information Disclosure
  cwe: CWE-200
  title: Challenge-solved broadcast leaks CTF flags to every connected client
  affected_parameter: null
  scenario: '`sendNotification` in challengeUtils.ts builds a notification object that includes `flag: utils.ctfFlag(challenge.name)`
    (line 52, 64) and then broadcasts it with `globalWithSocketIO.io.emit(''challenge solved'', notification)` (line 75) —
    `io.emit` fans out to ALL connected sockets, not just the user who solved the challenge. Additionally, on every new connection
    registerWebsocketEvents.ts:29-31 replays the full `notifications` backlog (each carrying its `flag`) to the freshly connected
    socket. There is no per-recipient filtering and no authentication gate. An anonymous observer connecting to the channel
    harvests the CTF flags / solution markers of challenges solved by other users in real time, undermining the integrity
    of any scored / multi-tenant CTF deployment.'
  evidence_summary: challengeUtils.ts:75 uses `io.emit` (broadcast to all) on a notification whose `flag` field is populated
    at line 52/64; registerWebsocketEvents.ts:30 replays the backlog to each new socket.
  impact_description: Any connected client passively receives the CTF flags and solved-challenge state of all other users,
    defeating per-user scoring confidentiality.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: 'Partial: the `hidden` flag honors `challenges.showSolvedNotifications` for UI display, and `sanitizeHtml`
    strips tags from the description — but the `flag` value and solve event are still emitted in the payload to every socket.'
  mitigation_title: Scope challenge-solved events to the solving principal and strip flags from broadcast payloads
  remediation:
    effort: Medium
    steps:
    - Replace the global `io.emit('challenge solved', ...)` with a room/namespace emit targeting only the socket(s) belonging
      to the user who solved the challenge (`io.to(userRoom).emit(...)`).
    - Remove the `flag` field from any payload sent to clients other than the solver; deliver flags only to the authenticated
      owner.
    - Stop replaying the full global `notifications` backlog to every new connection; replay only the connecting principal's
      own notifications after authentication.
    code_example: '// emit only to the solver''s room, without the flag for others

      const { flag, ...publicNotification } = notification

      io.to(`user:${solverId}`).emit(''challenge solved'', notification)

      io.except(`user:${solverId}`).emit(''challenge solved'', publicNotification)'
