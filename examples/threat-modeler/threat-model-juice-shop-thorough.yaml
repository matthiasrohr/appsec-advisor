  cwe: CWE-1395
  title: 'Vulnerable JWT stack: jsonwebtoken 0.4.0 / express-jwt — lib/insecurity.ts:54'
  affected_parameter: Authorization header JWT
  scenario: 'The component pins jsonwebtoken@0.4.0 and express-jwt@0.1.3 (package.json) — releases that predate the 2015 algorithm-confusion
    fixes and CVE-2022-23529/CVE-2022-23540 class hardening. jsonwebtoken <4.2.2 does not constrain the verification algorithm,
    allowing an RS256-issued, RSA-public-key-protected app to accept an HS256 token signed with the public key as the HMAC
    secret (the public key is shipped in encryptionkeys/jwt.pub and loaded at line 22). isAuthorized() (line 54) wires express-jwt
    with only {secret: publicKey} and no algorithms allowlist, so the verifier accepts whatever alg the attacker declares.
    ACT-D-01 forges a valid token using the public key as an HMAC key, achieving full auth bypass without the private key.'
  evidence_summary: 'isAuthorized() constructs expressJwt({secret: publicKey}) with no algorithms option; pinned jsonwebtoken
    0.4.0 / express-jwt 0.1.3 lack algorithm pinning by default.'
  impact_description: 'Algorithm-confusion forgery: attacker signs HS256 tokens with the public key and is authenticated as
    any user/role.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is the intended algorithm for issuance, but no algorithms allowlist is enforced on verification.
  mitigation_title: Upgrade jsonwebtoken/express-jwt and enforce an RS256-only algorithms allowlist on verification
  remediation:
    effort: Medium
    steps:
    - Upgrade jsonwebtoken to >=9.x and express-jwt to >=8.x (or migrate to jose), which require an explicit algorithms allowlist.
    - 'Pass { algorithms: [''RS256''] } to every verification call: expressJwt({ secret: publicKey, algorithms: [''RS256'']
      }) at lib/insecurity.ts:54 and jwt.verify(..., { algorithms: [''RS256''] }) at line 191.'
    - Run npm audit / Snyk in CI to block reintroduction of the vulnerable versions.
    code_example: 'export const isAuthorized = () => expressJwt({ secret: publicKey, algorithms: [''RS256''] } as any)'
