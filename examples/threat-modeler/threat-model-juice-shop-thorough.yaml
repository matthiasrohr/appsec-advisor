tier_root_causes:
  edge:
  - Unsafe Angular HTML trust via bypassSecurityTrustHtml propagates attacker markup
  - Client-side authorization decided from decoded JWT without server enforcement
  - OAuth implicit flow exposes bearer tokens in URL fragments and localStorage
  - Deterministic OAuth password derivation from email enables pre-computation
  - Session logout clears only browser storage, leaving server-side tokens valid
  server:
  - Raw string interpolation into SQL and NoSQL queries across multiple routes
  - All JWTs signed with a committed RSA private key — attacker can forge any claim
  - Missing isAuthorized() on sensitive routes allows unauthenticated access
  - No rate limiting on authentication, reset, and B2B code-execution endpoints
  - Verbose error handlers and directory listings expose stack traces and paths
  data:
  - Payment card numbers and PII stored without encryption at rest
  - Passwords hashed with unsalted MD5 — trivially reversible via rainbow tables
  - Static hardcoded HMAC key for security-question answers eliminates isolation
