  title: Session map keyed and trusted from unverified token in — lib/insecurity.ts:191
  affected_parameter: req.cookies.token
  scenario: updateAuthenticatedUsers() at lines 188-201 reads the token from req.cookies.token OR the Authorization header
    (line 189) and, although it calls jwt.verify (line 191), it passes no algorithms allowlist — combined with the vulnerable
    jsonwebtoken@0.4.0 this is exposed to alg-confusion (see security-core-003). On err===null it stores the decoded payload
    in the in-memory authenticatedUsers map and reflects the token back as a cookie (line 195). authenticatedUsers.get() (line
    80) later returns this cached entry by token without re-verification, so a forged-but-once-accepted token grants a persistent
    session. The cookie set at line 195 has no HttpOnly/Secure/SameSite flags, exposing it to theft via XSS (see security-core-006).
  evidence_summary: jwt.verify at line 191 omits algorithms; on success the decoded payload is cached in authenticatedUsers
    and re-emitted as a flagless cookie at line 195.
  impact_description: Forged or alg-confused tokens, once accepted, are cached and trusted for the session; the reflected
    cookie lacks protective flags.
  likelihood: Medium
  impact: High
  risk: High
