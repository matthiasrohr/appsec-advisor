  title: Password change skips current-password check — routes/changePassword.ts:39
  affected_parameter: current
  scenario: 'changePassword() at routes/changePassword.ts:13 reads new/repeat/current from the query string and only validates
    the current password if currentPassword is truthy (line 39: ''if (currentPassword && ...)''). When the attacker simply
    omits the current parameter, the guard is skipped entirely and the new password is written at line 51 for whichever user
    owns the Bearer token. Combined with a forged or stolen token (auth-service-001/002) — or via CSRF since the endpoint
    is a GET at server.ts:597 with credentials in the URL — an attacker takes over the account by resetting its password without
    knowing the old one. The changePasswordBenderChallenge (line 54) codifies exactly this no-current-password bypass.'
  evidence_summary: routes/changePassword.ts:39 gates the current-password comparison behind 'if (currentPassword && ...)',
    so omitting it bypasses the check.
  impact_description: Account takeover by changing any token-holder's password with no knowledge of the existing password.
  likelihood: High
  impact: High
