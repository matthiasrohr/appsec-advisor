  title: Unbounded outbound fetch stream to disk in — routes/profileImageUrlUpload.ts:30
  affected_parameter: imageUrl
  scenario: After fetching the user-supplied URL, the response body is piped straight to a write stream at routes/profileImageUrlUpload.ts:30
    (`Readable.fromWeb(response.body).pipe(fileStream)`) with no Content-Length check, no byte cap, and no fetch timeout (grep
    for content-length/maxSize/limit/abort returned zero hits). An authenticated attacker points imageUrl at an endpoint that
    streams an arbitrarily large or slow (slowloris-style) body, filling the upload disk volume or holding the connection
    and a file descriptor open indefinitely. Because the filename is keyed only on the user id, the attacker repeatedly overwrites
    their own slot, so disk-fill via a single huge stream is the primary vector.
  evidence_summary: The fetched response stream is written to disk without any size limit or timeout guard on the pipe at
    line 30.
  impact_description: Authenticated attacker exhausts the upload disk volume or ties up server resources, degrading availability
    for all users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Requires authentication. multer's 200KB limit applies to the multipart body only, not to the server-initiated
    outbound fetch.
  mitigation_title: Enforce a download byte cap and request timeout on the outbound image fetch
  remediation:
    effort: Low
    steps:
    - Wrap fetch with `AbortSignal.timeout(5000)` and abort once a running byte counter on the piped stream exceeds a fixed
      maximum (e.g. 1MB).
