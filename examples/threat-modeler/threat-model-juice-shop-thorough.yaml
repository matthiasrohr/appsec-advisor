  title: Pipe-to-Shell Install of Heroku CLI — ci.yml:358
  affected_parameter: null
  scenario: 'The `heroku` job fetches and executes an installer in one unverified pipe: `curl https://cli-assets.heroku.com/install.sh
    | sh` (ci.yml:358). The downloaded script runs immediately with no checksum or signature verification, on a runner that
    in the very next step uses `secrets.HEROKU_API_KEY` to deploy to production Heroku (ci.yml:371). If `cli-assets.heroku.com`
    is compromised, its DNS is hijacked, or the connection is MITM''d, attacker-controlled shell code executes with full access
    to the job''s secrets and the deployment credential — turning a tooling-install step into remote code execution in the
    release pipeline.'
