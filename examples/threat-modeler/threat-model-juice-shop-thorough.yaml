- local_id: security-core-004
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-328
  title: MD5 used for password/data hashing — lib/insecurity.ts:43
  affected_parameter: data
  scenario: hash() at line 43 computes crypto.createHash('md5').update(data).digest('hex'). MD5 is an unsalted, fast, collision-broken
    digest. Where this is used for password storage, an attacker who obtains the user table (via SQLi elsewhere or a backup
    leak) cracks the entire credential set with off-the-shelf rainbow tables / hashcat at billions of guesses/sec. There is
    no salt and no work factor. ACT-D-01 who exfiltrates hashes recovers plaintext passwords and pivots to credential-stuffing
    other systems. This also fails PCI-DSS Req 8.3.1 (strong one-way cryptography for credentials).
  evidence_summary: hash() is a bare unsalted MD5 over the input with no key-stretching.
  impact_description: Stored credential hashes are trivially reversible, enabling mass account takeover after any database
    disclosure.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no salt, no work factor, no algorithm agility.
  mitigation_title: Replace MD5 hashing with a salted memory-hard KDF (bcrypt/argon2) for credentials
  remediation:
    effort: Medium
    steps:
    - Replace hash() usage for passwords with bcrypt (cost >=12) or argon2id; store per-user random salts.
    - 'Migrate existing MD5 hashes lazily: on next successful login, re-hash with the new KDF.'
    - Reserve fast hashes only for non-secret integrity checks, and document that hash() must never touch credentials.
    code_example: 'import bcrypt from ''bcryptjs''

      export const hashPassword = (pw: string) => bcrypt.hashSync(pw, 12)

      export const verifyPassword = (pw: string, h: string) => bcrypt.compareSync(pw, h)'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
