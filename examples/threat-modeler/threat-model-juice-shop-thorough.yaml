  stride: Information Disclosure
  cwe: CWE-922
  title: JWT session token stored in localStorage, XSS-exfiltrable
  affected_parameter: token
  scenario: 'The session JWT is persisted to `localStorage.setItem(''token'', ...)` in login.component.ts:101, two-factor-auth-enter.component.ts:53,
    payment.component.ts:232 and oauth.component.ts:51, and read back as the `Authorization: Bearer` credential across the
    app (122 localStorage token references). JavaScript-readable storage means any one of the bypassSecurityTrustHtml XSS
    sinks in this component (findings -001/-002/-003) can run `localStorage.getItem(''token'')` and exfiltrate a full, still-valid
    session credential. Unlike an httpOnly cookie, this storage choice grants no isolation from same-origin script. This is
    the systemic ''JWT in localStorage'' anti-pattern.'
  evidence_summary: Session JWT is written to and read from localStorage in 4 auth flows, making it readable by any same-origin
    script.
  impact_description: A single XSS yields the bearer token and complete account/admin takeover, including across page reloads.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Token also mirrored into a cookie (oauth.component.ts:50) but the cookie is not httpOnly and the app
    authenticates from the localStorage copy.
  mitigation_title: Move the session credential to an httpOnly Secure SameSite cookie instead of localStorage
  remediation:
    effort: High
    steps:
    - Have the backend issue the session as an `httpOnly; Secure; SameSite=Strict` cookie and stop writing the JWT to localStorage
      at login.component.ts:101, two-factor-auth-enter.component.ts:53, payment.component.ts:232 and oauth.component.ts:51.
    - 'Send the cookie automatically (`withCredentials: true`) and remove manual `Authorization` header construction from
      the localStorage token.'
    - Add a Content-Security-Policy (see finding -006) so that even residual XSS cannot trivially beacon out data.
    code_example: '// server: res.cookie(''token'', jwt, { httpOnly: true, secure: true, sameSite: ''strict'' })

      // client: this.http.get(''/rest/...'', { withCredentials: true })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#local-storage
