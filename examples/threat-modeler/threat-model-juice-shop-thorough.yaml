- local_id: frontend-spa-011
  threat_category_id: TH-04
  additional_categories: []
  stride: Repudiation
  cwe: CWE-922
  title: Client-side session logout only clears browser — navbar.component.ts:240
  affected_parameter: token
  scenario: 'Session state lives entirely in the browser: logout paths simply call `localStorage.removeItem(''token'')` (navbar.component.ts:240)
    and the only liveness check is presence of the token string in localStorage (app.guard.ts:18). Section 4 of recon confirms
    server-side session invalidation is missing (in-memory token map, no server-side logout). A user can therefore plausibly
    deny actions taken after a logout, and a token captured before logout (e.g. via the XSS/localStorage exposure above) remains
    valid for its full 8-hour lifetime regardless of client-side removal — there is no server event recording or revoking
    the session. This weakens non-repudiation: the client cannot prove a session was actually terminated.'
  evidence_summary: Logout clears only localStorage (navbar.component.ts:240) and the guard trusts mere token presence (app.guard.ts:18);
    no server-side revocation exists.
  impact_description: A captured token stays valid after the user believes they logged out, and there is no server-side record
    to attribute or revoke the session.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Client clears the token from localStorage/cookie on logout, but no server-side invalidation or audit
    event is generated.
