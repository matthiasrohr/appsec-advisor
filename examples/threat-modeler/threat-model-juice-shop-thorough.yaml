  title: Unbounded LLM-generated discount yields free orders (routes/chat.ts:179)
  affected_parameter: discount
  scenario: 'The generateCoupon tool''s zod schema only asserts discount is a number — the describe(''maximum 10'') is documentation,
    not validation (routes/chat.ts:178-179). execute() passes the model-chosen discount straight to security.generateCoupon(discount)
    (routes/chat.ts:184), which z85-encodes ''MMMYY-<discount>'' with no upper bound (lib/insecurity.ts:97-100). The returned
    coupon is redeemable: applyCoupon stores it (routes/coupon.ts:15), and at checkout calculateApplicableDiscount calls discountFromCoupon
    which parseInt()s the discount and returns it directly with no cap (routes/order.ts:191-193). A prompt-injected discount
    of 100 therefore produces a checkout coupon that zeroes the order total. The forgedCouponChallenge explicitly rewards
    discount>=80 (routes/order.ts:192), confirming the privilege-escalation impact is real, not theoretical.'
  evidence_summary: discount flows from LLM tool call (routes/chat.ts:184) through z85 encode (lib/insecurity.ts:98) to discountFromCoupon
    parseInt and calculateApplicableDiscount with no clamp on the redemption path (routes/order.ts:191-193).
  impact_description: An attacker mints a >100% coupon and checks out a basket for free, causing direct financial loss.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. zod accepts any number; neither generateCoupon, discountFromCoupon, nor calculateApplicableDiscount
    enforces an upper bound.
  mitigation_title: Clamp discount to the policy maximum at coupon issuance and at redemption
  remediation:
