- local_id: file-upload-handler-003
  threat_category_id: TH-07
  additional_categories:
  - TH-01
  stride: Tampering
  cwe: CWE-22
  title: Zip Slip Path Traversal on Archive Extraction
  affected_parameter: file
  scenario: extractZipBuffer iterates archive entries and writes each one with fs.createWriteStream('uploads/complaints/'
    + fileName) at routes/fileUpload.ts:34, where fileName is the attacker-controlled entry.path (line 30). A crafted entry
    path such as ../../ftp/legal.md escapes the intended uploads/complaints/ directory because the write target uses raw string
    concatenation, not the validated absolutePath. The preceding guard absolutePath.includes(path.resolve('.')) (line 33)
    checks a different, normalized path than the one actually written, so traversal within the project tree (e.g. overwriting
    served ftp/ or frontend assets) succeeds. The solveIf for fileWriteChallenge confirms ftp/legal.md is the intended target.
  evidence_summary: The write at fileUpload.ts:34 concatenates the raw zip entry path onto the upload directory, while the
    traversal guard at line 33 inspects a separately-resolved path.
  impact_description: Attacker writes/overwrites files outside uploads/complaints/ (e.g. ftp/legal.md, frontend assets), enabling
    content tampering and potential stored-payload delivery from served directories.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: extractZipBuffer only runs when fileWriteChallenge is enabled (line 44); the absolutePath.includes(path.resolve('.'))
    check (line 33) is bypassable because it guards a path that differs from the one passed to createWriteStream.
  mitigation_title: Resolve and confine each zip entry path under uploads/complaints/ before writing
  remediation:
    effort: Low
    steps:
    - Compute const dest = path.resolve('uploads/complaints', entry.path) and verify dest.startsWith(path.resolve('uploads/complaints')
      + path.sep) before any write; skip the entry otherwise.
    - Pass the validated dest to fs.createWriteStream instead of the raw 'uploads/complaints/' + fileName concatenation at
      routes/fileUpload.ts:34.
    - Reject absolute entry paths and entries containing '..' segments outright, and cap the number/size of extracted entries.
    code_example: 'const root = path.resolve(''uploads/complaints'')

      const dest = path.resolve(root, entry.path)

      if (!dest.startsWith(root + path.sep)) { entry.autodrain(); continue }

      await pipeline(entry.stream(), fs.createWriteStream(dest))'
