  mitigation_fingerprints:
  - parameterise all raw sql queries
  - add mass-assignment allowlist to user creation
  - rotate and externalize the rsa signing key
  - remove deterministic oauth password derivation
  - add ownership checks for basket and order resources
  - rate-limit the login endpoint with a reliable ip key
  - enforce server-side authorization for all admin routes
  - move jwt storage from localstorage to httponly cookie
  - add security event logging
  - enable xss filter and add content-security-policy header
  - replace unsalted md5 with bcrypt for password hashing
  - harden xml/yaml parsers to prevent xxe and deserialization
  - validate file upload types with magic-byte inspection
  - restrict outbound http requests to an allowlist
  - enforce jwt authentication on all websocket events
  - 'fix supply chain: add lockfile and pin ci action refs'
  - encrypt totp 2fa secrets at rest
  - fix open redirect — use path-only allowlist
  - restrict access to the /encryptionkeys/ directory
  - remove eval from b2b order processing
  - add llm prompt injection controls and output validation
  - tokenize payment card data — never store raw pans
  - require strong password reset via tokenised link
  - restrict ftp directory listing and sensitive file exposure
  - restrict cors to known origins
  - isolate bip-39 mnemonic from source code
  - 'add `permissions: { contents: read }` at workflow root; elevate per-job only where needed'
  - pin base image to @sha256:<digest>
  - validate the decoded filename after null-byte stripping and confine to ftp/
  - remove public key-file serving and directory browsing
  - validate and allowlist outbound image-fetch destinations
  - require authentication and an extension allowlist on /encryptionkeys, and remove directory browsing of key material
  - remove serveindex directory browsing for /ftp and store non-public files outside the web-served tree
  - disable dtd and external-entity resolution in parsexmlstring and stop reflecting parsed xml in error responses
  - tokenize or encrypt pan and store only a masked last-4 in the card model
  - encrypt the sqlite datastore at rest with sqlcipher and restrict file permissions
  - remove the hardcoded bip-39 mnemonic from source and rotate the derived wallet
  - key the rate limiter on a trusted client identifier, not a client-supplied header
  - add per-user rate limiting, auth, and input/output caps to /rest/chat
  - add rate limiting and bound the in-memory wallet sets on web3 endpoints
  - require and verify the current password unconditionally on password change
  - add an explicit auth middleware (isauthorized / passport.authenticate / requireauth) to the route registration, or mark
    the route intentionally public via app.get for read-only access only.
  - add least-privilege permissions blocks to all workflow files
  - eliminate runtime evaluation of b2b order data; parse as data
  - enforce coupon eligibility and discount cap in generatecoupon server-side
  - load the cookie secret from configuration/secret storage
  - pin dockerfile base images to sha256 digests
  - migrate dependabot config to .github/dependabot.yml v2
  - match redirect targets by exact parsed origin, not substring
  - restrict cors to known origins and add csp + hsts headers
  - verify uploaded image bytes with magic-byte detection on /rest/memories, not the content-type header
  - add cosign signing step to release workflow; or use actions/attest-build-provenance
  - use `npm ci --ignore-scripts` and audit required postinstalls separately
  - require admin authorization on /rest/admin/application-configuration
  - filter notification replay to the authenticated recipient on socket connection
  - remove confidential policy from the system prompt and enforce it in code
  - per-record salt security answers with a slow kdf and a secret managed key
  - apply global and per-route rate limiting plus upload size/complexity caps
  - bound yaml parsing with input-size limits and an alias-expansion-safe loader
  - require an authenticated session on state-changing web3 endpoints
  - enforce https and hsts at application layer
