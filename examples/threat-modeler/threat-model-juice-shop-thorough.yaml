- local_id: file-upload-engine-005
  threat_category_id: TH-12
  additional_categories:
  - TH-07
  stride: Denial of Service
  cwe: CWE-776
  title: XML/YAML entity-expansion bomb DoS — routes/fileUpload.ts:109
  affected_parameter: file
  scenario: An anonymous attacker uploads a YAML 'billion-laughs' / merge-key bomb or an XML entity-expansion bomb to /file-upload.
    handleYamlUpload (routes/fileUpload.ts:109) runs vm.runInContext('JSON.stringify(yaml.load(data))') and handleXmlUpload
    feeds the XXE-enabled parser; both expand nested entities/anchors that inflate a small payload into gigabytes of memory.
    The code wraps each parse in a vm timeout (2000ms, routes/fileUpload.ts:109 and lib/xml.ts:38) and the developers explicitly
    note XXE parses 'regularly cause segfault crashes' in containers (routes/fileUpload.ts:73). The timeout bounds CPU per
    request but not peak memory, and there is no rate limiting on the endpoint, so repeated uploads cause memory pressure
    and OOM restarts.
  evidence_summary: Untrusted XML/YAML is expanded with entity/anchor substitution enabled and only a per-request CPU timeout,
    with no memory cap and no rate limiting on the endpoint.
  impact_description: Repeated small malicious uploads exhaust container memory and crash the Node process, denying service
    to all users.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Per-parse vm timeout of 2000ms (lib/xml.ts:38, routes/fileUpload.ts:109) and multer fileSize limit of
    200000 bytes (server.ts:692) bound a single request's CPU and input size. The yamlBombChallenge / xxeDosChallenge branches
    (routes/fileUpload.ts:83,115) only score the attack; no concurrency or memory cap exists.
  mitigation_title: Add rate limiting and memory-bounded safe parsing to upload endpoints
  remediation:
    effort: Medium
    steps:
    - Apply express-rate-limit to /file-upload (server.ts:309) capping uploads per IP/session per minute.
    - Parse YAML with js-yaml's FAILSAFE_SCHEMA or a library that rejects merge-key/anchor amplification, and cap maximum
      expanded document size; do not run untrusted parsing inside vm as a security boundary (vm is not a sandbox).
    - Disable entity expansion in the XML parser (see XXE finding) which also removes the entity-bomb amplification vector,
      and run heavy parsing in a worker with a hard memory limit.
