      over it before any address is accepted in walletNFTVerify or contractExploitListener.
    - Recover the signer with ethers.verifyMessage(nonce, signature) and compare it to the on-chain minter/exploiter address
      instead of trusting req.body.walletAddress.
    - Invalidate the nonce after one use to prevent signature replay.
