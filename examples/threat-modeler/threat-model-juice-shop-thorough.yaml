  title: Insecure JWT Verification — lib/insecurity.ts:54
  affected_parameter: Authorization header (Bearer token)
  scenario: 'express-jwt 0.1.3 is initialised at lib/insecurity.ts:54 with only `{ secret: publicKey }` — no `algorithms`
    restriction. An attacker takes any valid JWT (or crafts one from scratch), changes the header to `{"alg":"none"}`, removes
    the signature, and presents `<header>.<payload>.` to any protected endpoint. express-jwt 0.1.3 accepts algorithm ''none''
    and validates the token against no key, so the attacker is authenticated as any user or role in the payload without possessing
    the private key.'
  evidence_summary: '`expressJwt({ secret: publicKey })` at line 54 omits the `algorithms` array, enabling the algorithm-confusion
    bypass accepted by express-jwt <=6.x without the option set.'
  impact_description: 'Complete authentication bypass: an unauthenticated attacker gains access to any account, including
    admin, by forging a JWT with arbitrary claims.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None
  mitigation_title: 'Pin express-jwt to algorithms: [''RS256''] and reject algorithm-none tokens'
  remediation:
    effort: Low
    steps:
    - Upgrade express-jwt to >=8.x (current stable) which requires `algorithms` to be explicit.
    - 'Change line 54 to: `expressJwt({ secret: publicKey, algorithms: [''RS256''] })` — this rejects ''none'' and any symmetric
      algorithm.'
    - Add an integration test that sends a JWT with `alg:none` and asserts HTTP 401.
    code_example: "// lib/insecurity.ts:54 — fixed\nexport const isAuthorized = () =>\n  expressJwt({ secret: publicKey, algorithms:\
      \ ['RS256'] })"
