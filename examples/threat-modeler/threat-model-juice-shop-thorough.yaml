  title: Password Change Without Current Password — routes/changePassword.ts:39
  affected_parameter: current
  scenario: 'changePassword.ts sets the new password after only a conditional current-password check: at line 39 the guard
    is if (currentPassword && security.hash(currentPassword) !== loggedInUser.data.password). When the attacker simply omits
    the current query parameter, currentPassword is falsy, the entire branch is skipped, and the update proceeds at line 51
    with no proof of knowing the existing password. Combined with the endpoint being an idempotent GET (server.ts:597, /rest/user/change-password)
    whose token is read from the Authorization header, an attacker who has hijacked a session (via any of the token-forgery
    findings above) or who leverages a leaked token can overwrite the victim''s password unconditionally and lock them out
    — the changePasswordBenderChallenge (line 54) exercises exactly this no-current-password path.'
  evidence_summary: changePassword.ts:39 makes the current-password check conditional on currentPassword being truthy, so
    omitting it bypasses verification entirely before the update at line 51.
  impact_description: Session-holding attacker changes a victim's password without knowing it, achieving persistent account
    takeover and lockout.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: A current-password comparison exists but is skipped whenever the current parameter is absent.
  mitigation_title: Require and verify the current password unconditionally on password change
  remediation:
    effort: Low
    steps:
    - 'Make current mandatory at changePassword.ts: reject the request with 401 when currentPassword is missing, before any
      update.'
    - Compare security.hash(currentPassword) to the stored hash unconditionally and abort on mismatch.
    - Move the operation to POST/PUT with CSRF protection instead of GET, so the password change is not triggerable via a
      simple URL.
    code_example: "if (!currentPassword || security.hash(currentPassword) !== loggedInUser.data.password) {\n  return res.status(401).send(res.__('Current\
      \ password is not correct.'))\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html
