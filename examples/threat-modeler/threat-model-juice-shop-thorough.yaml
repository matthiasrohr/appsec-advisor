- local_id: frontend-spa-010
  threat_category_id: TH-15
  additional_categories: []
  stride: Tampering
  cwe: CWE-352
  title: State-changing API calls rely on bearer token with — complaint.component.ts:44
  affected_parameter: authToken
  scenario: The SPA performs state-changing operations (basket checkout, profile/address changes, complaints) authenticated
    by a JWT that is duplicated into a non-HttpOnly cookie at login (oauth.component.ts:50, login.component.ts:104) in addition
    to the Authorization header (complaint.component.ts:44). A repository-wide grep for `X-CSRF`/`csrf`/`antiforgery` in the
    frontend returns zero hits. Where backend endpoints accept the cookie-borne token (rather than strictly the header), a
    cross-site request from an attacker page can ride the ambient cookie to perform actions as the victim, because no anti-CSRF
    token or SameSite protection is asserted from the client side. The mixed cookie+localStorage credential model widens the
    CSRF surface.
  evidence_summary: The token is placed in a cookie (oauth.component.ts:50, login.component.ts:104) and used for state-changing
    calls, with no CSRF token anywhere in the frontend (grep hit_count 0).
  impact_description: Cross-site requests may trigger authenticated state changes (purchases, profile edits) on behalf of
    a logged-in victim wherever the backend honours the cookie token.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: None client-side; the token cookie is set without an asserted SameSite attribute and there is no anti-CSRF
    token.
  mitigation_title: Add anti-CSRF protection and set SameSite=Strict on the session cookie
  remediation:
    effort: Medium
    steps:
    - Set the session cookie with SameSite=Strict; Secure (and HttpOnly per finding 005) when issued at oauth.component.ts:50
      / login.component.ts:104 server-side.
    - Require an anti-CSRF token (double-submit or synchronizer) on all state-changing /rest/* and /api/* endpoints and send
      it from the SPA.
    - Ensure backend endpoints accept the credential only from the Authorization header, not ambiently from the cookie, if
      a header-bearer model is kept.
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Request_Forgery_Prevention_Cheat_Sheet.html
  evidence:
