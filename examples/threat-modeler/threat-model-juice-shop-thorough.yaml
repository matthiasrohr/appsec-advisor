  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification
  affected_parameter: null
  scenario: 'verify() at insecurity.ts:55 calls jws.verify(token, publicKey) with no algorithm whitelist argument. jws.verify
    honours the alg header field supplied by the caller, so a token whose header declares alg of none (and an empty signature
    segment) is accepted as valid. An attacker base64-encodes a header of {"alg":"none","typ":"JWT"} plus a payload of {data:{role:''admin''}}
    with an empty third segment; verify() returns true and decode() (insecurity.ts:56) yields the forged claims. The jwtUnsignedChallenge
    in routes/verify.ts:86 confirms this path is reachable. This compounds with the leaked private key: even without the key,
    signature verification can be skipped entirely.'
  evidence_summary: jws.verify is invoked with only (token, publicKey) at insecurity.ts:55 — the optional algorithms allowlist
    is omitted, so the attacker-controlled alg header governs verification.
  impact_description: An attacker mints an unsigned token with arbitrary role claims that the server treats as authenticated.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None at verify(). updateAuthenticatedUsers() (insecurity.ts:189) uses jwt.verify which is stricter, but
    the primary verify()/decode() path used by isAccounting/isDeluxe/isCustomer and currentUser does not enforce an algorithm.
  mitigation_title: Pin JWT verification to RS256 and reject alg:none in lib/insecurity.ts
  remediation:
    effort: Low
    steps:
    - 'Replace the raw jws.verify call with jwt.verify(token, publicKey, { algorithms: [''RS256''] }) so the algorithm is
      server-controlled, not header-controlled.'
    - Explicitly reject tokens whose header alg is 'none' or any HMAC variant before decoding.
    - Audit all callers of decode() (isAccounting, isDeluxe, isCustomer, routes/currentUser.ts, routes/2fa.ts) to ensure they
      verify before trusting claims.
    code_example: "export const verify = (token: string) => {\n  if (!token) return false\n  try { jwt.verify(token, publicKey,\
      \ { algorithms: ['RS256'] }); return true }\n  catch { return false }\n}"
