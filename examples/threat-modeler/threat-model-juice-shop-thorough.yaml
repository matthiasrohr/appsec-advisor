  title: Server-side template injection — routes/userProfile.ts:61
  affected_parameter: username (UserModel)
  scenario: getUserProfile() reads the logged-in user's username from the database, then checks if it matches `#{(.*)}`. If
    so, it extracts the inner expression and calls `eval(code)` at line 61. An attacker who can set their username (via the
    profile update API) to `#{require('child_process').execSync('id')}` achieves arbitrary server-side code execution in the
    Node.js process context. The eval is only guarded by the `isChallengeEnabled` check, which is enabled in production by
    default.
  evidence_summary: '`eval(code)` is called at userProfile.ts:61 where `code` is extracted from the user-controlled `username`
    field after matching the `#{...}` pattern.'
  impact_description: Attacker executes arbitrary OS commands as the Node.js process user, achieves full server compromise
    including filesystem access, lateral movement, and data exfiltration.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Gated by `isChallengeEnabled(challenges.usernameXssChallenge)`, but challenges are enabled by default
    in standard deployments.
  mitigation_title: Remove eval() from username rendering; use a context-free template with HTML encoding only
  remediation:
    effort: Low
    steps:
    - Remove the entire `if (username?.match(/#{(.*)}/) !== null)` branch and the `eval(code)` call at userProfile.ts:56-64.
    - 'Replace with HTML-encoding only: `username = entities.encode(user.username ?? '''')`.'
    - Validate username at write time to reject `#{`, `<script>`, and other injection patterns.
    code_example: '// Instead of eval, encode directly:

      username = entities.encode(user.username ?? '''')'
    reference: CWE-94
