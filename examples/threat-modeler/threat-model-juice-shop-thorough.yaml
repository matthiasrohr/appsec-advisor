  cwe: CWE-434
  title: Content-Type-only upload filter on /rest/memories — server.ts:701
  affected_parameter: Content-Type header
  scenario: 'The uploadToDisk multer instance (server.ts:698-711) decides validity solely from `file.mimetype`, which is derived
    from the client-supplied Content-Type header, against mimeTypeMap (png/jpg/jpeg). Unlike profileImageFileUpload, this
    route (/rest/memories) performs NO magic-byte verification. An attacker sends arbitrary bytes with Content-Type: image/png;
    the file passes the check and is written to the public-served frontend/dist/frontend/assets/public/images/uploads/ directory
    under a predictable name. Because the extension is coerced to an image type the primary risk is storage of attacker-controlled
    content in a publicly reachable path and inconsistent enforcement versus the profile-image route.'
  evidence_summary: The destination callback at server.ts:701 validates only `mimeTypeMap[file.mimetype]` (the spoofable Content-Type
    header) with no fileType.fromBuffer magic-byte check on this route.
  impact_description: Storage of arbitrary attacker content in a public directory via a trivially spoofed header.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: MIME allowlist (png/jpg) based on the client Content-Type header only; extension is coerced to an image
    type.
  mitigation_title: Verify uploaded image bytes with magic-byte detection on /rest/memories, not the Content-Type header
  remediation:
    effort: Low
    steps:
    - Buffer the upload and call fileType.fromBuffer(buffer) (as profileImageFileUpload already does), rejecting anything
      whose detected mime does not start with 'image/'.
    - Do not trust file.mimetype from the multipart Content-Type for the storage decision.
    - 'Serve the uploads directory with a fixed Content-Type and Content-Disposition: attachment to prevent any inline interpretation.'
    code_example: "const detected = await fileType.fromBuffer(file.buffer)\nif (!detected || !detected.mime.startsWith('image/'))\
      \ {\n  return res.status(415).json({ error: 'Only image uploads allowed' })\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
