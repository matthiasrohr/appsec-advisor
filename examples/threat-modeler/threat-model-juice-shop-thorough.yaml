  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-922
  title: Insecure Token Storage in… (frontend/src/app/Services/request.interceptor.ts:13)
  affected_parameter: token
  scenario: '`request.interceptor.ts:13-16` reads the JWT from `localStorage.getItem(''token'')` and attaches it as an `Authorization:
    Bearer` header on every outbound HTTP request. The token is written to `localStorage` at `login.component.ts:101`, `oauth.component.ts:51`,
    `two-factor-auth-enter.component.ts:53`, and `chatbot/chatbot.component.ts:97`. `localStorage` is accessible to any JavaScript
    executing on the page origin — including injected scripts from the XSS vulnerabilities at `search-result.component.ts:170`
    and `:132`. Additionally, `totp_tmp_token` is stored at `login.component.ts:112` and read at `two-factor-auth-service.ts:38`,
    extending the attack surface to the 2FA pre-auth token.'
  evidence_summary: JWT written to `localStorage` at four call sites and read for every HTTP request at `request.interceptor.ts:13`;
    no `HttpOnly` cookie path exists.
  impact_description: Any successful XSS payload can read `localStorage.getItem('token')` and exfiltrate the full-session
    JWT, enabling account takeover without further interaction.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Token is also written to a cookie via `cookieService.put('token', ...)` but without `httpOnly` or `secure`
    flags — this provides no additional protection against JavaScript access.
  mitigation_title: Store session tokens in HttpOnly Secure SameSite=Strict cookies and remove localStorage token storage
  remediation:
    effort: High
    steps:
    - On the server, issue the JWT as an `HttpOnly; Secure; SameSite=Strict` `Set-Cookie` header instead of returning it in
      the JSON response body.
    - Remove all `localStorage.setItem('token', ...)` calls from the SPA (`login.component.ts:101`, `oauth.component.ts:51`,
      `two-factor-auth-enter.component.ts:53`, `chatbot.component.ts:97`).
    - Update `request.interceptor.ts` to omit the explicit `Authorization` header — the browser attaches `HttpOnly` cookies
      automatically; the backend middleware reads from `req.cookies.token` instead of `req.headers.authorization`.
    - Apply the same `HttpOnly; Secure; SameSite=Strict` flags to the `totp_tmp_token` cookie by moving it server-side.
