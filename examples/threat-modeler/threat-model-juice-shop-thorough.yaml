- local_id: realtime-websocket-001
  threat_category_id: TH-13
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-306
  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:20
  scenario: 'The Socket.io server is instantiated with `new Server(server, { cors: { origin: ''http://localhost:4200'' } })`
    at registerWebsocketEvents.ts:20 and registers handlers directly inside `io.on(''connection'', ...)` with no `io.use()`
    handshake middleware. There is no JWT verification, no `socket.handshake.auth` token check, and no namespace-level guard
    anywhere in lib/. The component''s declared control ''token-based socket auth'' does not exist in code. Any anonymous
    client (ACT-D-01) can open a socket with `io(''http://target'')` and immediately invoke every server event handler (`notification
    received`, `verifyLocalXssChallenge`, `verifySvgInjectionChallenge`, `verifyCloseNotificationsChallenge`). The channel
    is a parallel protocol surface that bypasses the entire `verify.jwtChallenges()` / `security.isAuthorized()` REST authorization
    chain configured in server.ts:353-451.'
  evidence_summary: The Server constructor at registerWebsocketEvents.ts:20 is followed immediately by event handler registration
    with no io.use() authentication middleware between them.
  impact_description: Any internet client reaches all server-side socket event handlers and the shared notification state
    without presenting a credential.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. CORS origin is set to http://localhost:4200 but CORS does not authenticate and is not enforced
    against non-browser WebSocket clients (see realtime-websocket-004).
  mitigation_title: Add a Socket.io io.use() handshake middleware that verifies the JWT before any event handler runs
  remediation:
    effort: Medium
    steps:
    - Add an `io.use((socket, next) => { ... })` middleware before `io.on('connection')` in registerWebsocketEvents.ts that
      reads the token from `socket.handshake.auth.token` and verifies it with the same `security.verify()` routine used by
      the REST `verify.jwtChallenges()` path.
    - Reject the handshake with `next(new Error('unauthorized'))` when the token is absent, expired, or fails signature verification,
      so the connection never reaches the event handlers.
    - Attach the resolved user identity to `socket.data.user` and use it inside each handler (e.g. scope notifications per
      user) instead of trusting client-supplied event payloads.
    - 'On the Angular client, pass the JWT via `io(url, { auth: { token } })` so the handshake carries the credential.'
    code_example: "const io = new Server(server, { cors: { origin: config.get('server.baseUrl') } })\nio.use((socket, next)\
      \ => {\n  const token = socket.handshake.auth?.token\n  const user = token && security.verify(token)\n  if (!user) return\
      \ next(new Error('unauthorized'))\n  socket.data.user = user\n  next()\n})\nio.on('connection', (socket) => { /* handlers\
      \ use socket.data.user */ })"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#websockets
  evidence:
