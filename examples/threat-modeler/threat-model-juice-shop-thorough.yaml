trust_boundaries:
- id: tb-1
  name: Public Internet / Application Tier
  description: All HTTP/HTTPS requests from unauthenticated users and attackers entering the Express server on port 3000.
  from: external
  to: express-backend
  enforcement: express-jwt@0.1.3 middleware on protected routes; wildcard CORS (app.options('*', cors())) removes origin enforcement
  weakness: 42 routes confirmed missing auth checks; wildcard CORS enables cross-origin requests from any domain
- id: tb-2
  name: Anonymous / Authenticated Zone
  description: Within the Express process, boundary between routes accessible without a JWT and those requiring valid JWT.
  from: express-backend
  to: express-backend
  enforcement: express-jwt middleware verifies JWT signature using publicKey; routes without middleware registration are unauthenticated
  weakness: JWT signed with committed RSA private key (lib/insecurity.ts:21) — any internet user can forge valid JWTs including
    admin-role tokens
- id: tb-3
  name: Authenticated User / Admin Zone
  description: Privilege boundary between regular authenticated users and admin-role operations.
  from: express-backend
  to: express-backend
  enforcement: JWT role claim checked in middleware (lib/insecurity.ts:156-171); admin routes check decodedToken.data.role
    === roles.admin
  weakness: Role elevation via JWT forgery with committed private key bypasses all role checks
- id: tb-4
  name: Application / Database
  description: Boundary between application route handlers and the SQLite database via Sequelize ORM.
  from: express-backend
  to: data-layer
  enforcement: Sequelize 6 ORM with parameterized queries for most operations; in-process SQLite connection
  weakness: Multiple routes use raw sequelize.query() with template literals (routes/login.ts:34, routes/search.ts:47) bypassing
    parameterization
- id: tb-5
  name: Application / File System (FTP and Uploads)
  description: Boundary between the Express application and the local file system directories served publicly.
  from: express-backend
  to: file-server
  enforcement: OS file permissions only (GID 0 writable directories in container)
  weakness: path.resolve('ftp/', file) at routes/fileServer.ts:33 allows directory traversal; uploads/ receives URL-fetched
    files from user-controlled URLs (SSRF)
- id: tb-6
  name: Application / VM Sandbox (B2B Code Execution)
  description: In-process boundary between the B2B API handler and the vm.createContext sandbox used to evaluate orderLinesData.
  from: b2b-api
  to: express-backend
  enforcement: Node.js vm module with 2000ms timeout; notevil safeEval intended to restrict expression evaluation
  weakness: notevil/safeEval sandbox is known to be bypassable via prototype pollution; vm.runInContext does not prevent host-process
    access when sandbox escapes
- id: tb-7
  name: Application / LLM (Chatbot Trust Boundary)
  description: Boundary between authenticated user input and the Ollama LLM system prompt / tool calls.
  from: chatbot
  to: express-backend
  enforcement: System prompt defines chatbot persona and tool policies; no input/output filtering layer
  weakness: No prompt injection protection; user input directly reaches LLM; tool calls (discount coupon generation) have
    no validation on discount percentage
- id: tb-8
  name: Browser / Application (Client-Server)
  description: HTTPS boundary between the Angular SPA running in the browser and the Express server.
  from: angular-frontend
  to: express-backend
  enforcement: HTTPS transport; JWT tokens in Authorization header for authenticated calls
  weakness: JWT stored in localStorage (36 occurrences) is XSS-exfiltrable; no CSRF protection; no Content Security Policy
- id: tb-9
  name: CI/CD Pipeline / Production Runtime
  description: Boundary between the GitHub Actions build pipeline and the production container image.
  from: ci-cd-pipeline
  to: express-backend
  enforcement: Docker image build with SBOM generation; distroless runtime base
  weakness: 6 workflows missing permissions blocks expose GITHUB_TOKEN to fork PRs; unpinned third-party actions can inject
    malicious build steps
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Authentication
  effectiveness: Unsafe
  kind: mechanism
  assessment: Login via POST /rest/user/login uses raw sequelize.query() with email and password template literals (routes/login.ts:34)
    — trivially bypassed via SQL injection. Passwords are hashed with MD5 (lib/insecurity.ts:41), which is trivially reversible.
    Hardcoded admin credentials (admin123) pass challenge checks. express-jwt@0.1.3 and jsonwebtoken@0.4.0 are pinned at ancient
    versions with multiple known CVEs.
  implementation: express-jwt@0.1.3, jsonwebtoken@0.4.0 (both pinned), MD5 password hashing (lib/insecurity.ts:41)
  linked_threats: []
- domain: Identity and Authentication Controls
  control: Google OAuth 2.0
  effectiveness: Partial
  kind: mechanism
  assessment: Google OAuth integration is configured with multiple authorized redirect URIs including Heroku and demo instances
    (config/default.yml). OAuth client ID is committed in default config. The wide redirect URI list increases phishing token
    interception risk. Core OAuth flow uses passport-google-oauth2.
  implementation: passport-google-oauth2, config/default.yml (clientId, authorizedRedirects)
  linked_threats: []
- domain: Identity and Authentication Controls
  control: Two-Factor Authentication (TOTP)
  effectiveness: Partial
  kind: mechanism
  assessment: TOTP-based 2FA exists at routes/2fa.ts. It is optional and not enforced for any account class. The 2FA flow
    can be bypassed via JWT forgery using the committed private key — once an attacker has a forged admin JWT, 2FA is irrelevant.
  implementation: routes/2fa.ts, speakeasy TOTP library
  linked_threats: []
- domain: Session and Token Controls
  control: JWT Session Tokens (RS256)
  effectiveness: Unsafe
  kind: primitive
  assessment: JWTs are signed using an RSA private key hardcoded at lib/insecurity.ts:21 and committed to the public GitHub
    repository. Any internet user with repository read access can extract the private key and forge arbitrary JWT tokens including
    admin-role tokens. Verification uses jws.verify (lib/insecurity.ts:55) rather than jsonwebtoken.verify, and the pinned
    jsonwebtoken@0.4.0 is vulnerable to alg:none bypass. Tokens are stored in browser localStorage (36 occurrences in Angular
    frontend), making them accessible to any XSS payload.
  implementation: lib/insecurity.ts:21,54,55; jsonwebtoken@0.4.0; jws library
  linked_threats: []
- domain: Session and Token Controls
  control: CSRF Protection
  effectiveness: Missing
  kind: cross-cutting
  assessment: No CSRF middleware (csurf or equivalent) is configured in server.ts. The application relies entirely on JWT
    bearer tokens in Authorization headers for API calls, which are not CSRF-vulnerable for XHR requests. However, cookie-based
    operations and form submissions lack CSRF tokens. The CSRF challenge (csrfChallenge) in models/challenge.ts confirms this
    is an intentional vulnerability.
  implementation: None
  linked_threats: []
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Unsafe
  kind: mechanism
  assessment: RBAC is implemented via JWT role claims checked in lib/insecurity.ts:156-171 (isAccounting, isDeluxe, isCustomer).
    All role checks are defeated by JWT forgery using the committed RSA private key. Additionally, 20 routes are flagged as
    missing authentication checks entirely (source-auth-findings.json, 42 total violations), and admin endpoints (R-061, R-062)
    return application version and configuration without authentication.
  implementation: lib/insecurity.ts:156-171; express-jwt middleware; JWT role claims
  linked_threats: []
- domain: Authorization Controls
  control: Object-Level Authorization (BOLA/IDOR)
  effectiveness: Weak
  kind: mechanism
  assessment: Multiple endpoints allow access to other users' resources without ownership validation. Basket items (routes/basketItems.ts:38),
    order history, and address endpoints do not consistently verify that the authenticated user owns the requested resource.
    This is confirmed by the source-auth-findings.json violations.
  implementation: Partial checks in some routes; no systematic BOLA framework
  linked_threats: []
- domain: Query Construction and Data Access Controls
  control: SQL Injection Prevention
  effectiveness: Unsafe
  kind: mechanism
  assessment: Critical SQL injection vulnerabilities exist in production routes. routes/login.ts:34 uses a raw Sequelize template
    literal query with direct email and password interpolation. routes/search.ts:47 executes 'SELECT sql FROM sqlite_master'
    directly. These are production code paths, not just challenge code. Sequelize ORM is used for most other queries with
    parameterized queries, but the critical authentication and search paths bypass it.
  implementation: Sequelize 6 ORM (partial); raw sequelize.query() calls in login.ts:34, search.ts:47
  linked_threats: []
- domain: Input Boundary Validation Controls
  control: Input Validation and Sanitization
  effectiveness: Weak
  kind: cross-cutting
  assessment: Limited input validation across the application. Zod schema validation is used in routes/chat.ts:10 for chatbot
    input. sanitize-html@1.4.2 (pinned ancient version) is used in limited contexts. express-validator is not used. The B2B
    orderLinesData field is passed directly to safeEval/vm.runInContext with no input validation. Most routes accept raw request
    body fields without schema validation.
  implementation: zod (routes/chat.ts), sanitize-html@1.4.2 (pinned), security.sanitizeSecure() (routes/saveLoginIp.ts:25)
  linked_threats: []
- domain: Output Encoding and Rendering Controls
  control: XSS Output Encoding
  effectiveness: Weak
  kind: mechanism
  assessment: Angular's default HTML escaping provides baseline protection in most components. However, bypassSecurityTrustHtml/bypassSecurityTrustUrl
    is used in at least 4 components (about.component.ts, administration.component.ts, last-login-ip.component.ts, track-result.component.ts).
    Helmet XSS filter is explicitly commented out in server.ts:187. No Content Security Policy is configured. JSON API responses
    use res.json() which provides output escaping for JSON context but not for HTML reflection.
  implementation: Angular default escaping (partial); DomSanitizer.bypassSecurityTrustHtml in 4+ components
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: CORS and Security Headers
  effectiveness: Weak
  kind: mechanism
  assessment: 'CORS is configured with wildcard origin acceptance: app.options(''*'', cors()) and app.use(cors()) in server.ts:182-183.
    This allows cross-origin requests from any domain. Helmet partial: noSniff() and frameguard() are active, but XSS filter
    is disabled and no Content Security Policy is set. Feature-policy header is configured via featurePolicy middleware (deprecated).
    No HSTS configuration found.'
  implementation: cors (wildcard), helmet.noSniff(), helmet.frameguard(), featurePolicy; NO helmet.contentSecurityPolicy,
    NO HSTS
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Cryptographic Primitives and Key Management
  effectiveness: Unsafe
  kind: primitive
  assessment: MD5 used for password hashing (lib/insecurity.ts:41) — trivially reversible. HMAC-SHA256 used for coupon signing
    with hardcoded key 'pa4qacea4VK9t9nGv7yZtwmj' committed to public repo (lib/insecurity.ts:42). SHA-1 HMAC for CTF keys
    (lib/utils.ts:86). RSA private key committed to public source (lib/insecurity.ts:21). Coupon codes use Z85 encoding (not
    encryption). No key management infrastructure — all secrets are in source code.
  implementation: lib/insecurity.ts:21,41,42; lib/utils.ts:86; Node.js crypto module
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: File Upload and Path Traversal Prevention
  effectiveness: Weak
  kind: mechanism
  assessment: Profile image uploads use file-type library for MIME checking (routes/profileImageFileUpload.ts:24-30), but
    the FTP file server at routes/fileServer.ts:33 uses path.resolve('ftp/', file) without directory traversal validation.
    URL-based profile image upload at routes/profileImageUrlUpload.ts fetches from user-controlled URLs — SSRF risk. PDF generation
    writes to ftp/ directory (routes/order.ts:45). Multer handles multipart uploads without file size limits configured.
  implementation: file-type library (profileImageFileUpload.ts); multer; path.resolve (no sanitization in fileServer.ts:33)
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Pipeline Security
  effectiveness: Weak
  kind: lifecycle
  assessment: 6 GitHub Actions workflows (ci.yml, codeql-analysis.yml, image_actions.yml, lint-fixer.yml, pr-compliance.yml,
    lock.yml) missing top-level permissions blocks — GITHUB_TOKEN exposed to fork PRs. Third-party actions not pinned to commit
    SHA in multiple workflows. Dockerfile base images (node:24, distroless) not digest-pinned. npm install without --ignore-scripts
    in Dockerfile. No Dependabot configuration for automated dependency updates. CodeQL analysis is present (codeql-analysis.yml).
    SBOM generation via @cyclonedx/cyclonedx-npm in Dockerfile.
  implementation: .github/workflows/ci.yml (unpinned), Dockerfile (npm without --ignore-scripts), .cyclonedx SBOM (present)
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Container and Runtime Hardening
  effectiveness: Partial
  kind: mechanism
  assessment: Distroless base image (gcr.io/distroless/nodejs24-debian13) with non-root UID 65532. Multi-stage Docker build
    separates builder from runtime. Writable directories (ftp/, frontend/dist/, logs/, data/, i18n/) are GID 0 group-writable.
    No HEALTHCHECK instruction. Base images not digest-pinned. Rate limiting configured for only the password reset endpoint.
  implementation: 'Dockerfile: distroless base, UID 65532, multi-stage build'
  linked_threats: []
