- local_id: security-core-006
  threat_category_id: TH-11
  additional_categories:
  - TH-01
  stride: Tampering
  cwe: CWE-80
  title: Broken sanitizeLegacy regex permits XSS payloads — lib/insecurity.ts:61
  affected_parameter: input
  scenario: sanitizeLegacy() at line 61 attempts to strip HTML with the single regex input.replace(/<(?:\w+)\W+?[\w]/gi, '').
    This only removes a tag-name followed by a non-word char and one word char — it does not neutralise event-handler injection,
    malformed tags, or payloads like <img src=x onerror=alert(1)> reliably, and never re-runs (no recursive pass). Any consumer
    relying on sanitizeLegacy() for output safety passes attacker markup through. ACT-D-01 submits a crafted string to any
    endpoint that sanitises via this function and achieves stored/reflected XSS in another user's browser. The pinned sanitize-html@1.4.2
    (line 13) is itself a years-old release with known bypasses, and sanitizeHtml() (line 60) is called with default options
    (no allowlist).
  evidence_summary: sanitizeLegacy is a one-shot incomplete regex replace; sanitizeHtml uses sanitize-html 1.4.2 with no explicit
    allowlist config.
  impact_description: Malicious HTML/JS survives sanitisation, enabling XSS against application users.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: sanitizeSecure() (line 63) recursively re-applies sanitizeHtml, but sanitizeLegacy() bypasses it entirely;
    sanitize-html version is outdated.
  mitigation_title: Remove regex-based sanitizeLegacy and use an allowlist-configured, current sanitizer
  remediation:
    effort: Medium
    steps:
    - Delete sanitizeLegacy() and migrate all callers to sanitizeSecure() / DOMPurify with an explicit tag/attribute allowlist.
    - Upgrade sanitize-html to the latest version and configure allowedTags/allowedAttributes explicitly rather than defaults.
    - Apply contextual output encoding at render time (Angular/template auto-escaping) as defence in depth.
    - Add an XSS regression test with payloads like <img src=x onerror=alert(1)> and <svg onload=...>.
    code_example: 'import DOMPurify from ''isomorphic-dompurify''

      export const sanitize = (html: string) => DOMPurify.sanitize(html, { ALLOWED_TAGS: [''b'',''i'',''a''], ALLOWED_ATTR:
      [''href''] })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
