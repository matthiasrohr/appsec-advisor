  stride: Tampering
  cwe: CWE-434
  title: Unauthenticated upload with no enforced type — routes/fileUpload.ts:62
  affected_parameter: file
  scenario: 'POST /file-upload (server.ts:309) accepts multipart uploads from any anonymous client. The middleware chain calls
    checkFileType (routes/fileUpload.ts:62) and checkUploadSize (line 55), but both only call challengeUtils.solveIf for scoring
    — neither returns a 4xx or aborts the request when the extension is disallowed or the file exceeds the size limit. The
    only real bound is multer''s fileSize: 200000 (server.ts:692). There is no MIME sniffing, no content validation, and no
    authentication, so an attacker can repeatedly push arbitrary buffers into the XML/YAML/ZIP processing paths.'
  evidence_summary: checkFileType and checkUploadSize invoke solveIf for challenge scoring but never reject the request, so
    type/size 'validation' is non-enforcing.
  impact_description: Anonymous attackers feed arbitrary content into XXE, YAML-bomb, and zip-slip processing paths and exhaust
    storage/CPU.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: multer memoryStorage with limits.fileSize = 200000 (server.ts:692) bounds individual upload size. checkFileType
    / checkUploadSize are scoring hooks only and do not reject.
  mitigation_title: Enforce authenticated access and reject disallowed file types at /file-upload
  remediation:
    effort: Medium
    steps:
    - Add an authentication guard (security.isAuthorized()) to the /file-upload route in server.ts:309 so only logged-in users
      can upload.
    - Convert checkFileType (routes/fileUpload.ts:62) into a rejecting guard that returns res.status(415) for any extension/MIME
      outside the allowlist, validating the sniffed content type (e.g. file-type library) rather than the client-supplied
      filename extension.
    - Have checkUploadSize return res.status(413) when file.size exceeds the limit instead of only calling solveIf.
    code_example: "function checkFileType ({ file }, res, next) {\n  const allowed = ['pdf','xml','zip','yml','yaml']\n  const\
      \ ext = file?.originalname.split('.').pop()?.toLowerCase()\n  if (!ext || !allowed.includes(ext)) return res.status(415).json({\
      \ error: 'type not allowed' })\n  next()\n}"
    reference: CWE-434
  evidence:
