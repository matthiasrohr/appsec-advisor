  stride: Information Disclosure
  cwe: CWE-522
  title: Non-Revocable Session Token (lib/insecurity.ts:54)
  scenario: 'authorize() (lib/insecurity.ts:54) issues a bearer JWT carrying the full user object in its payload (login.ts:23-24
    sets data: user). The token is returned in the JSON body (routes/login.ts:26) and stored client-side in localStorage (per
    the recon control note, 36 occurrences across the frontend), making it readable by any JavaScript and thus exfiltrable
    through any XSS in the app. The payload is base64url, so a stolen token discloses email, role, and other user fields.
    There is no revocation mechanism: the only server state is the in-memory authenticatedUsers map (lib/insecurity.ts:70),
    and updateAuthenticatedUsers() (line 189) re-admits any validly signed token even if it is absent from the map — so logout
    or compromise cannot invalidate an outstanding token before its 6h expiry.'
  evidence_summary: Tokens are signed with a 6h TTL at lib/insecurity.ts:54 and re-accepted purely on signature at line 189,
    with no server-side revocation list.
  impact_description: A stolen token grants full account access for up to six hours with no way to revoke it; the readable
    payload leaks user PII and role.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: In-memory authenticatedUsers map exists but is bypassed by updateAuthenticatedUsers(), which re-admits
    any signed token.
  mitigation_title: Add server-side token revocation and stop persisting the JWT in localStorage
  remediation:
    effort: High
    steps:
    - Issue the session token in an HttpOnly, Secure, SameSite=Strict cookie instead of returning it in the body for localStorage
      (routes/login.ts:26).
    - Maintain a server-side session/allow-list or short-lived access token plus refresh token, and check it in updateAuthenticatedUsers()
      (lib/insecurity.ts:189) so revoked tokens are rejected before expiry.
    - Add a logout endpoint that removes the token from the allow-list, and a jti claim to support targeted revocation.
    - Minimize the JWT payload to an opaque user id rather than the full user object.
    code_example: "res.cookie('token', token, {\n  httpOnly: true, secure: true, sameSite: 'strict', maxAge: 6 * 3600 * 1000\n\
      })\n// reject tokens absent from the server-side allow-list in updateAuthenticatedUsers"
