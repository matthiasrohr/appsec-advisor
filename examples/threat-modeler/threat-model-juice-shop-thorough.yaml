trust_boundaries:
- id: tb-1
  name: Public Internet → Express Monolith
  from: external
  to: backend-api
  controls:
  - TLS (deployment-dependent)
  - helmet headers
  - express-rate-limit (selective)
  - wildcard CORS
  description: All external HTTP/WS traffic enters on port 3000. CORS is wildcard and there is no application-side gateway;
    rate limiting is applied only to selected routes.
- id: tb-2
  name: Browser → Server (untrusted client)
  from: frontend-spa
  to: backend-api
  controls:
  - JWT bearer in Authorization header
  - client-side route guards (non-enforcing)
  description: The browser is an untrusted execution environment. URL fragments, localStorage JWTs, form data and Socket.IO
    messages all originate client-side and must be treated as attacker-controlled. Angular guards are UI-only and bypassable.
- id: tb-3
  name: Anonymous → Authenticated Zone
  from: external
  to: auth-identity
  controls:
  - insecurity.isAuthorized() middleware on /api/* routes
  - JWT verification (jws.verify)
  description: Transition from unauthenticated to authenticated context. Enforced by JWT-validation middleware, but jws.verify
    performs no algorithm enforcement (alg:none) and the signing key is public, so the boundary is forgeable.
- id: tb-4
  name: Authenticated → Admin Zone
  from: auth-identity
  to: backend-api
  controls:
  - role claim check on JWT-derived user
  - Angular AdminGuard (non-enforcing)
  description: Privilege transition to admin/deluxe/accounting roles within the same process. Server-side role checks exist
    on some routes but are inconsistent; client-side guards are not a control.
- id: tb-5
  name: Application → VM Sandbox (code evaluation)
  from: b2b-api
  to: b2b-api
  controls:
  - vm.runInContext with 2000ms timeout
  - notevil safeEval
  description: Untrusted orderLinesData (b2bOrder.ts:23) and YAML payloads (fileUpload.ts:109) are evaluated inside a vm sandbox.
    The sandbox is escapable via prototype pollution, crossing into full RCE in the host process.
- id: tb-6
  name: Application → SQLite Datastore
  from: backend-api
  to: data-persistence
  controls:
  - Sequelize ORM (parameterized) on most paths
  - raw template-string SQL on login/search (no control)
  description: In-process call from application logic to the embedded SQLite file. The ORM is the parameterization layer,
    but login and product-search bypass it with raw string interpolation, defeating the boundary entirely.
- id: tb-7
  name: Application → Local Filesystem (served directories)
  from: file-upload-handler
  to: data-persistence
  controls:
  - OS file permissions only
  - serve-index on ftp/
  description: File uploads and exports are written into directories served back to clients (uploads/, ftp/). The critical
    distinction is that write targets are publicly served, enabling stored-payload and traversal attacks.
- id: tb-8
  name: Application → External LLM Provider
  from: chat-llm
  to: external
  controls:
  - HTTPS to OpenAI-compatible endpoint
  - API key (env-configured)
  description: Outbound HTTPS from routes/chat.ts to a third-party LLM provider. User input crosses into the provider prompt
    unsanitized; provider responses re-enter the trust boundary unvalidated (prompt injection, completion tampering).
- id: tb-9
  name: External Contribution / CI → Trunk
  from: external
  to: ci-cd-pipeline
  controls:
  - GitHub PR review
  - GitHub Actions default permissions
  - unpinned third-party actions
  description: Public repository accepting external pull requests, with CI workflows that use mutable action tags, lack permissions
    blocks, and run undigested container images. Untrusted code and supply-chain artifacts cross into the build/release trunk.
security_controls:
- domain: Identity and Authentication Controls
  control: Password-Based Authentication
  kind: mechanism
  effectiveness: Unsafe
  assessment: Email/password login at POST /rest/user/login. Credential lookup uses raw template-string SQL (routes/login.ts)
    enabling authentication bypass via SQL injection; passwords stored as unsalted MD5 (lib/insecurity.ts:41). Registration
    (POST /api/Users) permits role tampering. Reset flow relies on knowledge-based security questions.
  linked_threats: []
  rule_id: ARCH-AUTH-001
- domain: Identity and Authentication Controls
  control: Multi-Factor Authentication
  kind: mechanism
  effectiveness: Partial
  assessment: TOTP-based 2FA implemented at /rest/2fa/setup|verify|disable using otplib. Optional and not enforced; enrollment
    tmpToken reuses the same hardcoded RSA signing key.
  linked_threats: []
- domain: Identity and Authentication Controls
  control: OAuth / Federated Login
  kind: mechanism
  effectiveness: Unsafe
  assessment: Frontend-only OAuth implicit flow (oauth.component / app.routing.ts) reads access token from URL fragment, with
    no state parameter (CSRF) and no PKCE; token leaks via referer (RFC 9700 deprecated). Resolves to a deterministic local-password
    login inheriting all password weaknesses.
  linked_threats: []
- domain: Identity and Authentication Controls
  control: Authentication Rate Limiting
  kind: primitive
  effectiveness: Partial
  assessment: express-rate-limit middleware imported (server.ts) and applied to selected routes (e.g. password reset) but
    not uniformly across login/2FA — brute-force surface remains on several auth endpoints.
  linked_threats: []
- domain: Session and Token Controls
  control: Session Token Signing (JWT Based)
  kind: primitive
  effectiveness: Unsafe
  assessment: JWTs signed RS256 (lib/insecurity.ts:54) using an RSA private key hardcoded in source and committed to the public
    repo (insecurity.ts:21) — anyone can forge admin tokens offline.
  linked_threats: []
  rule_id: ARCH-AUTH-001
- domain: Session and Token Controls
  control: Session Token Validation (JWT Based)
  kind: primitive
  effectiveness: Unsafe
  assessment: jws.verify (lib/insecurity.ts:55) performs signature verification without an algorithm whitelist, accepting
    alg:none forged tokens. Validation middleware applied selectively to /api/* routes.
  linked_threats: []
- domain: Session and Token Controls
  control: Session Token Storage (Browser localStorage)
  kind: primitive
  effectiveness: Unsafe
  assessment: JWT stored in browser localStorage (app.guard.ts, request.interceptor.ts) and a non-HttpOnly cookie — any XSS
    on any page extracts the session token.
  linked_threats: []
- domain: Session and Token Controls
  control: Session Token Revocation
  kind: primitive
  effectiveness: Missing
  assessment: No server-side token revocation or blocklist. Compromised or forged tokens remain valid until the 6h expiry.
  linked_threats: []
- domain: Authorization Controls
  control: Role-Based Access Control
  kind: mechanism
  effectiveness: Weak
  assessment: admin/customer/deluxe/accounting roles. Server-side role checks exist on some /api/Admin and /rest/deluxe routes
    but are inconsistent; Angular guards are UI-only and bypassable by direct API calls.
  linked_threats: []
  rule_id: ARCH-MGMT-001
- domain: Authorization Controls
  control: Object-Level Authorization (Ownership Checks)
  kind: mechanism
  effectiveness: Weak
  assessment: Many user-owned-object routes (basket, cards, addresses, orders, reviews) trust a client-supplied UserId or
    path id without verifying ownership against the authenticated principal — systemic BOLA/IDOR.
  linked_threats: []
- domain: Authorization Controls
  control: Management Endpoint Protection
  kind: surface
  effectiveness: Weak
  assessment: Management surfaces (/rest/admin/application-configuration, /rest/admin/application-version, /metrics) reachable
    with weak or no role gating; configuration disclosure.
  linked_threats: []
  rule_id: ARCH-MGMT-001
- domain: Query Construction and Data Access Controls
  control: Parameterized Query / ORM Usage
  kind: primitive
  effectiveness: Unsafe
  assessment: Sequelize ORM provides parameterization on most paths, but login (routes/login.ts) and product search (routes/search.ts)
    build SQL via raw template-string concatenation of user input — full SQL injection (auth bypass + UNION data exfiltration).
  linked_threats: []
- domain: Input Boundary Validation Controls
  control: Validation Approach
  kind: cross-cutting
  effectiveness: Weak
  assessment: No centralized schema-validation layer. Routes access req.body/req.params fields directly without type/allowlist
    checks, enabling parameter and mass-assignment tampering (quantity, price, UserId, role).
  linked_threats: []
  rule_id: ARCH-INPUT-001
- domain: Input Boundary Validation Controls
