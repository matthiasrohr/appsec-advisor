  stride: Information Disclosure
  cwe: CWE-200
  title: Webhook leaks host/OS/config metadata and CTF flag to — lib/webhook.ts:30
  affected_parameter: SOLUTIONS_WEBHOOK
  scenario: notify() in lib/webhook.ts posts to whatever URL is in process.env.SOLUTIONS_WEBHOOK (line 14) a JSON body containing
    os.hostname(), os.type()/release() (line 33), the NODE_ENV config name (line 35), the app version (line 36) and utils.ctfFlag(challenge.name)
    (line 30). The CTF flag is an HMAC-SHA1 of the challenge name keyed by the CTF_KEY. If the webhook URL is attacker-controlled
    or compromised (ACT-D-07, compromised-third-party-service), the receiver harvests internal hostnames, OS fingerprint,
    environment, and valid CTF flags. There is no allowlist or TLS-pinning on the webhook destination, and the request is
    fired with no signature on the payload.
  evidence_summary: notify() sends host/OS/env/version and a ctfFlag HMAC to an env-supplied webhook URL with no destination
    allowlist.
  impact_description: Internal fingerprint data and valid CTF flags are disclosed to whoever controls the webhook endpoint.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: Webhook only fires if SOLUTIONS_WEBHOOK is set; no allowlist, signing, or data minimisation.
  mitigation_title: Restrict webhook destinations to an allowlist and minimise the disclosed payload
  remediation:
    effort: Low
    steps:
    - Validate SOLUTIONS_WEBHOOK against an allowlist of trusted hosts before sending, and require https.
    - Remove or hash host/OS fingerprint fields; do not send ctfFlag to third-party endpoints unless required.
    - Sign the payload (HMAC) so the receiver can verify origin and the value cannot be replayed elsewhere.
    code_example: 'const allowed = new Set([''hooks.trusted.example''])

      if (!allowed.has(new URL(webhook).host)) return'
    reference: CWE-200
  evidence:
  - file: lib/webhook.ts
    line: 30
  evidence_check: verified
