- local_id: ci-cd-pipeline-004
  threat_category_id: TH-06
  additional_categories:
  - TH-14
  stride: Elevation of Privilege
  cwe: CWE-250
  title: No permissions block over-privileged GITHUB_TOKEN — ci.yml:24
  affected_parameter: GITHUB_TOKEN
  scenario: '`ci.yml`, `release.yml`, and `image_actions.yml` declare no top-level or job-level `permissions:` block (grep
    confirms only `lock.yml`, `codeql-analysis.yml`, and `pr-compliance.yml` scope the token). Absent an explicit block, the
    automatically-provisioned `GITHUB_TOKEN` inherits the repository/organisation default, which for many repos is read-write
    on `contents`, `packages`, and more. If any workflow step is compromised — e.g. via the mutable action ref (ci-cd-pipeline-002)
    or a malicious install hook (ci-cd-pipeline-003) — the attacker inherits a broad write token and can push commits/tags,
    create releases, or publish packages, converting build-time code execution into persistent repository and artifact tampering.
    `release.yml` uses the token to attach release assets (:51) and `ci.yml` uses it for Coveralls/Slack (:190,:253,:389),
    none behind a least-privilege scope.'
  evidence_summary: None of ci.yml/release.yml/image_actions.yml declare a `permissions:` block, so GITHUB_TOKEN defaults
    to the repo-wide (often write) scope.
  impact_description: A single compromised step wields a repo-write token to push code, tags, or releases, escalating build-time
    execution to persistent supply-chain tampering.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: lock.yml, codeql-analysis.yml, and pr-compliance.yml scope permissions explicitly (pattern exists but
    not applied to the main pipelines)
  mitigation_title: Add least-privilege permissions blocks to all workflow files
  remediation:
    effort: Low
    steps:
    - 'Add a top-level `permissions: { contents: read }` to `ci.yml`, `release.yml`, and `image_actions.yml`, then grant narrower
      write scopes per-job only where required (e.g. `contents: write` on release.yml `package`).'
    - Set the org/repo default GITHUB_TOKEN permissions to read-only in repository Settings → Actions.
    - Audit each job's actual token needs and pin them explicitly so future steps cannot silently inherit write access.
    code_example: "# top of ci.yml\npermissions:\n  contents: read\n"
    reference: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
