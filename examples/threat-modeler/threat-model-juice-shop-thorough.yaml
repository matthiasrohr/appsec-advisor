  stride: Tampering
  cwe: CWE-829
  title: Npm lifecycle scripts execute on CI/Docker install — Dockerfile:5
  affected_parameter: postinstall
  scenario: '`package.json:56` defines a `postinstall` hook (`cd frontend && npm install && ... npm run build:frontend ...`),
    and most install steps run plain `npm install` without `--ignore-scripts`: `ci.yml` lines 51, 71, 110, 146, 203, 238,
    292, and `Dockerfile:5` (`npm install --omit=dev`). Combined with the missing lockfile (ci-cd-pipeline-001), any direct
    or transitive dependency''s own `preinstall`/`install`/`postinstall` script executes arbitrary code — in CI runners that
    hold job secrets (`ALCHEMY_API_KEY`, `CYPRESS_RECORD_KEY`, `E2E_SOLUTIONS_WEBHOOK`, `GITHUB_TOKEN`) and, in the Dockerfile
    stage, with the result baked into the published image. Only the `lint` job (ci.yml:36,38) and the frontend-bundle/lint-fixer
    workflows use `--ignore-scripts`, so the hardening is inconsistent rather than systemic.'
  evidence_summary: '`Dockerfile:5` and seven `ci.yml` jobs run `npm install` without `--ignore-scripts`, allowing dependency
    lifecycle hooks to execute.'
  impact_description: A malicious dependency's install hook runs arbitrary code in CI (exposing job secrets) and inside the
    Docker build layer shipped to users.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: lint job, frontend-bundle-analysis.yml, and lint-fixer.yml use --ignore-scripts; final image is distroless
    and runs as non-root UID 65532
  mitigation_title: Add --ignore-scripts to all CI and Docker npm install steps
  remediation:
    effort: Medium
    steps:
    - Append `--ignore-scripts` to every `npm install`/`npm ci` invocation in `ci.yml`, `release.yml`, and `Dockerfile`, and
      run the project's own required build via explicit `npm run build:*` steps instead of the implicit `postinstall` hook.
    - Set `ignore-scripts=true` in `.npmrc` as a defence-in-depth default, then whitelist only the first-party build scripts
      that must run.
    - If the `postinstall` frontend build is required, invoke it as a dedicated, reviewed `run:` step after a scripts-disabled
      install.
    - Combine with `npm ci` (ci-cd-pipeline-001) so the executed tree is also integrity-pinned.
    code_example: "- name: Install application\n  run: |\n    npm ci --ignore-scripts\n    npm --prefix frontend ci --ignore-scripts\n\
      \    npm run build:frontend && npm run build:server"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html
