  cwe: CWE-918
  title: SSRF via unconstrained fetch in profileImageUrlUpload routes/profileImage… (url)
  affected_parameter: imageUrl (request body)
  scenario: An authenticated user (cookie-auth) submits a POST to `/profile/image/url` with `imageUrl` set to an internal
    URL such as `http://169.254.169.254/latest/meta-data/iam/security-credentials/role-name` (AWS IMDSv1) or `http://localhost:3000/rest/user/authentication-details`.
    The server at line 24 calls `await fetch(url)` without any scheme allowlist, host allowlist, or DNS-rebinding protection.
    The HTTP response body is written directly to disk at `frontend/dist/frontend/assets/public/images/uploads/<userId>.<ext>`
    and the `profileImage` DB column is updated. The attacker then retrieves the stored 'image' via `/assets/public/images/uploads/<userId>.jpg`,
    effectively exfiltrating the internal service response. On failure, the fallback at line 35-37 stores `url` directly as
    the `profileImage` column value and logs the error — effectively persisting an internal URL probe record.
  evidence_summary: '`fetch(url)` at line 24 receives the raw `req.body.imageUrl` value with no URL validation; the response
    body is piped to a publicly accessible file path without content-type verification.'
  impact_description: Authenticated attacker reads responses from internal services, cloud metadata endpoints, or localhost
    services; exfiltrated data is retrievable via a public image URL.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Endpoint requires cookie-based authentication; file extension is derived from URL suffix (not content-type);
    error fallback stores the URL directly rather than the fetched content.
  mitigation_title: Enforce URL scheme and host allowlist before fetch in profileImageUrlUpload
  remediation:
    effort: Medium
    steps:
    - Parse the submitted `imageUrl` with Node's `URL` constructor and reject any URL whose `protocol` is not `https:` and
      whose `hostname` resolves to a private/loopback IP range (RFC1918, 127.0.0.0/8, 169.254.0.0/16, ::1).
    - Use an allowlist of permitted external image CDN domains when the use case is limited (e.g. Gravatar, social OAuth providers)
      instead of accepting arbitrary hosts.
    - Add a `Content-Type` check on the fetch response before writing to disk — reject any response whose `content-type` header
      does not begin with `image/`.
    - Remove the fallback at lines 35-37 that stores the raw attacker-supplied URL in the `profileImage` DB column; instead
      return an error response.
    code_example: "```typescript\nconst parsedUrl = new URL(url)\nconst ALLOWED_PROTOCOLS = ['https:']\nconst BLOCKED_HOSTS\
      \ = /^(localhost|127\\.|10\\.|172\\.(1[6-9]|2\\d|3[01])\\.|192\\.168\\.|169\\.254\\.|::1)/i\nif (!ALLOWED_PROTOCOLS.includes(parsedUrl.protocol)\
      \ || BLOCKED_HOSTS.test(parsedUrl.hostname)) {\n  return next(new Error('URL not permitted'))\n}\n```"
