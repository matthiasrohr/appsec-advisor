  title: Unsalted MD5 password hashing — models/user.ts:76
  affected_parameter: password
  scenario: The User model's password setter persists credentials via `security.hash(clearTextPassword)` at models/user.ts:76,
    and security.hash is `crypto.createHash('md5').update(data).digest('hex')` (lib/insecurity.ts:41) — MD5, no per-user salt,
    no work factor. Every password column in the Users table is therefore a bare unsalted MD5. Once any attacker reads that
    column (via the search.ts UNION SQLi above, a stolen juiceshop.sqlite file, or a backup), the hashes fall instantly to
    rainbow tables and GPU cracking. Identical passwords across users produce identical hashes, leaking password reuse.
  evidence_summary: models/user.ts:76 stores the password column as the output of security.hash(), which is unsalted MD5 (lib/insecurity.ts:41).
  impact_description: Any disclosure of the Users table yields trivially crackable credentials, converting a read primitive
    into mass account takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. MD5 is used directly with no salt and no adaptive cost. The hash function is shared application-wide
    via lib/insecurity.ts.
  mitigation_title: Replace MD5 password hashing with bcrypt/argon2 in the User model setter
  remediation:
    effort: Medium
    steps:
    - Change the password setter at models/user.ts:73-78 to await a slow, salted KDF — e.g. bcrypt.hash(clearTextPassword,
      12) (the bcrypt dependency is already present) or argon2.hash(clearTextPassword).
    - 'Make verification async: in routes/login.ts compare with bcrypt.compare() rather than equality on a precomputed MD5,
      which also removes the raw-SQL password concatenation.'
    - Add a rehash-on-login migration so existing MD5 rows are upgraded to bcrypt the next time each user authenticates.
