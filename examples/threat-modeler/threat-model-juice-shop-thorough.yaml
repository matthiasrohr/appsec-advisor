  title: No audit trail for file uploads and sensitive — routes/fileUpload.ts:39
  affected_parameter: null
  scenario: None of the upload and file-serving handlers record a structured audit event tying an actor to an action. handleZipFileUpload,
    handleXmlUpload, and handleYamlUpload (routes/fileUpload.ts:39-131) perform file writes and parsing with no who/what/when
    logging; serveKeyFiles, serveLogFiles, and serveQuarantineFiles stream sensitive files without logging the requester.
    The only logging is a warn line on profile-image fetch failure (routes/profileImageUrlUpload.ts:37). After an attacker
    exploits the zip-slip write or downloads jwt.pub, there is no reliable record of the source IP, identity, or target, so
    the action can be denied and incident response cannot reconstruct it.
  evidence_summary: Upload-processing and file-serving handlers contain no structured audit logging of actor, action, resource,
    and outcome.
  impact_description: Successful file-write tampering or sensitive-file exfiltration leaves no attributable record, blocking
    detection, forensics, and accountability.
  likelihood: Medium
  impact: Low
  risk: Low
  controls_in_place: A single logger.warn on profile-image fetch failure (routes/profileImageUrlUpload.ts:37). No success/audit
    logging on uploads, extractions, or key/log/quarantine file serving.
  mitigation_title: Emit structured audit events for upload writes and sensitive file serving
  remediation:
