  title: Chatbot prompt injection and tool abuse via unbounded user messages
  affected_parameter: messages
  scenario: chat() at routes/chat.ts forwards req.body.messages (line 191) straight into streamText with tool access (searchProducts,
    getOrderById, generateCoupon). The system prompt (buildSystemPrompt, line 84) carries the coupon policy and a CONFIDENTIAL
    15% courtesy-discount instruction inline. An attacker uses prompt injection to override the policy and trigger generateCoupon
    at >=10% (chatbotPromptInjectionChallenge) or >=50% (greedy variant), obtaining unauthorized discount coupons, and can
    coax the model to disclose the confidential system-prompt instructions. User input is concatenated into the conversation
    with no instruction/data separation. (OWASP LLM01 Prompt Injection, LLM06 Sensitive Information Disclosure, LLM08 Excessive
    Agency.)
  evidence_summary: routes/chat.ts:191 passes raw client messages into the LLM call that exposes the generateCoupon tool,
    and the confidential discount rule lives in the same system prompt the model can be coerced to reveal.
