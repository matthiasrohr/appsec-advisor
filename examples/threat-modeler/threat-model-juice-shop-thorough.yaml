  scenario: '`isRedirectAllowed` at lib/insecurity.ts:70 checks `url.includes(allowedUrl)` — a substring match, not an exact
    origin or prefix match. An attacker crafts the redirect URL as `https://attacker.example.com/?x=https://github.com/juice-shop/juice-shop`
    which contains the allowlisted string. The check returns `true`, and the application redirects the browser to the attacker''s
    domain. This is used in phishing campaigns following OAuth flows where the victim expects to land back on the legitimate
    site.'
  evidence_summary: '`allowed = allowed || url.includes(allowedUrl)` at line 70 — substring containment is exploitable by
    embedding the allowlisted URL as a query parameter on an attacker-controlled domain.'
  impact_description: 'Phishing and credential theft: users are silently redirected to attacker-controlled sites that mimic
    the application after an OAuth or login redirect.'
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Allowlist exists but uses substring matching, not origin comparison.
  mitigation_title: Replace substring redirect allowlist with exact-origin or URL-prefix comparison
  remediation:
    effort: Low
    steps:
