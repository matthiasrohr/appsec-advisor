- local_id: file-upload-subsystem-004
  threat_category_id: TH-12
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: YAML bomb DoS in handleYamlUpload — routes/fileUpload.ts:117
  affected_parameter: file (YAML body)
  scenario: POST /file-upload accepts *.yml/*.yaml unauthenticated and runs `yaml.load(data)` at routes/fileUpload.ts:117.
    A billion-laughs-style YAML anchor/alias bomb expands exponentially during load, exhausting heap; the code's own catch
    arm at line 122 matches 'Invalid string length' and solves yamlBombChallenge, confirming the bomb path is reachable. The
    200KB multer limit (server.ts:688) is irrelevant because a few KB of nested anchors expands into gigabytes in memory.
    Repeated unauthenticated requests amplify the effect since no rate limiting exists on /file-upload.
  evidence_summary: yaml.load is called on attacker-controlled data with default schema and no node/anchor-count limit, and
    the handler explicitly recognises the resulting 'Invalid string length' OOM condition.
  impact_description: An anonymous attacker crashes or stalls the Node process (single-threaded heap exhaustion), causing
    service-wide denial of service.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: vm.runInContext applies a 2000ms timeout (line 117) which catches CPU-bound expansion but not synchronous
    heap allocation; no input rate limiting on the route.
  mitigation_title: Parse YAML with js-yaml FAILSAFE_SCHEMA and an explicit size/alias cap, and rate-limit /file-upload
  remediation:
