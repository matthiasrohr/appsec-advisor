  title: 'Missing permissions: block on 8 workflow jobs grants GITHUB_TOKEN — ci.yml:24'
  affected_parameter: 'permissions: (absent at workflow and jo…'
  scenario: 'GitHub Actions defaults to `permissions: write-all` for the GITHUB_TOKEN when no explicit `permissions:` block
    is declared at the workflow or job level. The ci.yml workflow (and lint-fixer.yml) declare no top-level `permissions:`
    block. This means all jobs — lint, coding-challenge-rsn, frontend-test, server-test, api-test, custom-config-test, e2e-test,
    smoke-test, docker-test — run with a GITHUB_TOKEN that has write access to repository contents, issues, pull-requests,
    packages, and deployments. A supply chain attack via a compromised action (or malicious PR code execution) can use this
    overprivileged token to push commits to the repository, approve PRs, modify releases, or exfiltrate secrets.'
  evidence_summary: No `permissions:` block at the workflow level or on the individual jobs in ci.yml; only the codeql-analysis.yml
    job explicitly declares least-privilege permissions.
  impact_description: A compromised step within any CI job can use the write-all GITHUB_TOKEN to push code to master, modify
    releases, or create/approve malicious PRs — bypassing code review entirely.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Actions/checkout and setup-node are SHA-pinned, reducing the most common injection vector. codeql-analysis.yml
    correctly declares minimal permissions.
  mitigation_title: 'Add `permissions: read-all` at workflow level and grant write permissions only to jobs that require them'
  remediation:
    effort: Low
    steps:
    - 'Add `permissions: read-all` (or `permissions: contents: read`) at the top level of ci.yml and all other workflow files
      lacking a permissions block'
    - 'For the `docker` job, add `packages: write` if pushing to GHCR, or rely on the DockerHub secret (no GITHUB_TOKEN write
      needed)'
    - 'For the `coverage-report` job using coverallsapp, add `statuses: write` at the job level only'
    - Enable the `GITHUB_TOKEN permissions` setting in repo Settings → Actions → General → Workflow permissions → 'Read repository
      contents and packages permissions'
    code_example: "# ci.yml — add at top level, after `env:` block\npermissions:\n  contents: read\n\n# Override per-job where\
      \ write access is genuinely needed:\njobs:\n  coverage-report:\n    permissions:\n      contents: read\n      statuses:\
      \ write  # for Coveralls\n    ..."
    reference: CWE-732
