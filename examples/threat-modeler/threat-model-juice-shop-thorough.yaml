- local_id: frontend-spa-004
  threat_category_id: TH-04
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-1004
  title: Session Token Stored in Non-HttpOnly Cookie
  affected_parameter: token
  scenario: 'OAuthComponent writes the session token into a cookie via the client-side `ngy-cookie` library: `this.cookieService.put(''token'',
    authentication.token, { expires })` (oauth.component.ts:50). A cookie set from JavaScript cannot carry the HttpOnly flag,
    and the call sets neither Secure nor SameSite. The token is therefore both JavaScript-readable (XSS-extractable, same
    blast radius as the localStorage copy) and, lacking Secure, transmissible over any cleartext request to the origin. Holding
    the same bearer token in two JavaScript-accessible stores (cookie + localStorage) doubles the exfiltration surface for
    the confirmed XSS sinks.'
  evidence_summary: oauth.component.ts:50 sets the `token` cookie through ngy-cookie with only `expires` — no HttpOnly (impossible
    from JS), no Secure, no SameSite.
  impact_description: Token theft via XSS and exposure on cleartext channels; cookie cannot be hardened while set client-side.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. Cookie is set from JavaScript with only an expiry; no Secure/SameSite/HttpOnly.
  mitigation_title: Set the session cookie server-side with HttpOnly, Secure and SameSite=Strict
  remediation:
    effort: Medium
    steps:
    - Remove the client-side `cookieService.put('token', ...)` call; the Express backend must own session-cookie issuance.
    - Issue the cookie server-side with `HttpOnly; Secure; SameSite=Strict` so JavaScript cannot read it and it is never sent
      over plaintext.
    - Eliminate the duplicate localStorage copy (see frontend-spa-003) so a single hardened cookie is the only session carrier.
    code_example: '// server-side (Express)

      res.cookie(''token'', jwt, { httpOnly: true, secure: true, sameSite: ''strict'' })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html#cookies
  evidence:
  - file: frontend/src/app/oauth/oauth.component.ts
    line: 50
