trust_boundaries:
- id: tb-1
  name: Public Internet / Browser Boundary
  description: API gateway, or TLS termination proxy documented in the source. deployment-time perimeter controls out of scope
    for source-tree review
  from: external
  to: express-backend
  controls:
  - CORS headers (weak configuration)
  - helmet.js (partial security headers)
  data_flows:
  - User authentication requests
  - API calls
  - File uploads
  - WebSocket connections
- id: tb-2
  name: Browser / Angular SPA Boundary
  description: Boundary between the browser runtime (untrusted DOM environment) and the Angular SPA. Tokens stored in localStorage
    cross this boundary on every page load. DOM XSS sinks in template bindings create attacker-controlled code execution paths
    within this tier.
  from: angular-frontend
  to: express-backend
  controls:
  - Angular interpolation escaping (partial)
  - HttpClient with JWT interceptor
  data_flows:
  - REST API calls with Bearer tokens
  - WebSocket connection
- id: tb-3
  name: Application / Data Tier Boundary
  description: Boundary between Express.js application logic and the SQLite data layer. All data queries cross this boundary.
    ORM parameterization is bypassed in multiple locations via raw query construction.
  from: express-backend
  to: sqlite-data-layer
  controls:
  - Sequelize ORM (partial — raw queries bypass parameterization)
  data_flows:
  - User data reads/writes
  - Product queries
  - Challenge state updates
- id: tb-4
  name: Application / File System Boundary
  description: Boundary between the Express.js application and the local filesystem. File uploads, FTP serving, and encryption
    key access all cross this boundary. Path traversal vulnerabilities allow attackers to escape the intended upload directories.
  from: express-backend
  to: file-storage
  controls:
  - multer file filter (bypassable MIME check)
  data_flows:
  - File uploads to /uploads/
  - FTP file serving
  - Encryption key reads
- id: tb-5
  name: CI/CD / Production Boundary
  description: Boundary between GitHub Actions build/deploy pipeline and the production runtime environment. Docker images
    built in CI are deployed to runtime. NPM package resolution without lockfile is the primary supply chain risk at this
    boundary.
  from: ci-cd-pipeline
  to: express-backend
  controls:
  - Dependabot (configured)
  - SBOM generation (cyclonedx-npm)
  data_flows:
  - Docker image publication
  - NPM package installation
  - GitHub token usage
- id: tb-6
  name: Application / External LLM API Boundary
  description: Boundary between the Juice Shop application and external OpenAI-compatible LLM APIs. Prompt input from users
    (chat messages, challenge descriptions) is forwarded to external AI APIs. Prompt injection risk. API key exposure if logged.
  from: express-backend
  to: external
  controls:
  - API key in environment variable (not hardcoded in source)
  data_flows:
  - Chat messages to LLM
  - LLM response streaming
security_controls:
- domain: Identity and Authentication
  control: Password-Based Authentication
  effectiveness: Weak
  assessment: 'Login endpoint at /rest/user/login accepts email+password. Passwords hashed with bcrypt via Sequelize. However,
    the actual login SQL query constructs raw interpolated SQL: WHERE email = ''${email}'' AND password = ''${hash}'' — the
    entire authentication query is injectable. Rate limiting exists only for password reset, not login. Two-factor TOTP via
    otplib is available but optional.'
  implementation: routes/login.ts:34 (raw SQL), lib/insecurity.ts:52 (JWT issuance), server.ts (2FA routes)
- domain: Identity and Authentication Controls
  control: Two-Factor Authentication (TOTP)
  effectiveness: Partial
  assessment: TOTP-based 2FA implemented via otplib v13.4.0. Available as an opt-in feature for users. TOTP seed stored in
    database per user. Temporary token issued after password validation, permanent JWT after OTP verification. Implementation
    appears structurally sound but is bypassable via direct API access (JWT manipulation).
  implementation: routes/2fa.ts, lib/insecurity.ts
  audit_flags:
  - control_domain_suffix_normalised
- domain: Session and Token Controls
  control: Session Token Issuance (JWT Based)
  effectiveness: Unsafe
  assessment: JWT signed with RS256 using a hardcoded RSA private key embedded in lib/insecurity.ts:21 (permanently compromised
    — committed to public repository). Token verification uses jws.verify() which does not enforce algorithm — algorithm confusion
    attacks (alg:none) are possible via the express-jwt@0.1.3 library. Tokens stored in localStorage (XSS-accessible). No
    refresh token rotation, no revocation mechanism. Token lifetime 6h with no sliding expiry.
  implementation: lib/insecurity.ts:20-55, server.ts (express-jwt middleware)
  audit_flags:
  - control_name_canonicalised
- domain: Session and Token Controls
  control: Cookie Configuration
  effectiveness: Unsafe
  assessment: Cookie parser uses hardcoded secret 'kekse' (server.ts:289). No HttpOnly cookies used for authentication — tokens
    are localStorage-based. Cookie secret is publicly known (committed to open source repository).
  implementation: server.ts:289 cookieParser('kekse')
- domain: Authorization Controls
  control: Role-Based Access Control
  effectiveness: Weak
  assessment: 'RBAC implemented at route level via isAuthorized() and role checks on req.user.data.role. Admin endpoints check
    for admin role. However: (1) mass assignment on PATCH /api/Users/:userId allows role escalation, (2) BOLA on /api/BasketItems/:id
    — no ownership check, (3) /rest/admin/application-configuration accessible to any authenticated user (missing admin check).
    Frontend guards are UX-only and bypassed via direct API calls.'
  implementation: lib/insecurity.ts (isAuthorized, isAccounting), routes/userProfile.ts, routes/basketItems.ts
  audit_flags:
  - control_domain_suffix_normalised
- domain: Query Construction and Data Access
  control: SQL Query Parameterization
  effectiveness: Unsafe
  assessment: 'Multiple endpoints use raw string-interpolated SQL via sequelize.query(). Login: WHERE email = ''${email}''
    AND password = ''${hash}''. Search: WHERE name LIKE ''%${criteria}%''. These are classic SQL injection points. The ORM
    is available but its parameterization is intentionally bypassed for training purposes.'
  implementation: routes/login.ts:34, routes/search.ts:23
- domain: Input Boundary Validation Controls
  control: Input Sanitization and Validation
  effectiveness: Weak
  assessment: sanitize-html@1.4.2 used for HTML input sanitization — extremely outdated version with known bypasses. Body-parser
    and express handle request parsing. No schema-level input validation (no Joi, Zod, or similar). User-controlled inputs
    flow into SQL queries, file paths, and template rendering without consistent validation.
  implementation: package.json (sanitize-html@1.4.2), routes/* (no consistent validation)
  audit_flags:
  - control_domain_suffix_normalised
- domain: Output Encoding and Rendering
  control: XSS Prevention
  effectiveness: Partial
  assessment: 'Angular template system provides interpolation escaping for most values. However: (1) helmet.xssFilter() is
    explicitly commented out in server.ts, (2) stored XSS via product reviews and feedback stored and re-rendered, (3) admin
    panel renders user-supplied HTML, (4) pug templates used for some server-side rendering without consistent escaping.'
  implementation: server.ts (commented-out xssFilter), routes/createProductReviews.ts, frontend/src/app
- domain: Browser and Cross-Origin Controls
  control: CORS Configuration
  effectiveness: Unsafe
  assessment: 'CORS applied as wildcard: app.use(cors()) with no origin restriction. This allows any origin to make cross-origin
    requests with full response access. Combined with credential-bearing requests, this enables CSRF-like cross-origin exfiltration.'
  implementation: 'server.ts: app.options(''*'', cors()) and app.use(cors())'
- domain: Browser and Cross-Origin Controls
  control: Security Headers (CSP, HSTS, X-Frame)
  effectiveness: Weak
  assessment: helmet.noSniff() and helmet.frameguard() applied. No Content-Security-Policy configured. No HSTS header. xssFilter
    explicitly disabled (commented out). Partial header coverage leaves XSS and clickjacking risks unmitigated.
  implementation: 'server.ts: helmet.noSniff(), helmet.frameguard() (no CSP)'
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  effectiveness: Unsafe
  assessment: RSA private key hardcoded directly in lib/insecurity.ts:21 (committed to public GitHub repository — permanently
    compromised). Cookie secret 'kekse' hardcoded in server.ts:289. Encryption keys directory /encryptionkeys/ served via
    static file route. No secrets management system (no Vault, AWS Secrets Manager, or env-var injection). OPENAI_API_KEY
    sourced from environment (acceptable).
  implementation: lib/insecurity.ts:21 (hardcoded RSA key), server.ts:289 (hardcoded cookie secret)
- domain: Cryptography Secrets and Data Protection
  control: Data Encryption at Rest
  effectiveness: Missing
  assessment: SQLite database file has no encryption at rest. File uploads and FTP files stored in plaintext. Encryption key
    directory is readable by the application process. No field-level encryption for PII.
  implementation: N/A (intentionally absent)
- domain: File Parser and Outbound Request Controls
  control: File Upload Validation
  effectiveness: Weak
  assessment: multer handles file uploads. MIME type checked but bypassable via crafted Content-Type headers. file-type@16.5.4
    available for magic-byte validation but not consistently applied. Uploaded files stored with original extension in /uploads/.
    No content scanning. Zip-slip and path traversal possible via filename manipulation.
  implementation: routes/fileUpload.ts, server.ts (multer configuration)
- domain: File Parser and Outbound Request Controls
  control: Server-Side Request Forgery (SSRF) Prevention
  effectiveness: Missing
  assessment: Complaint endpoint accepts URL in request body and makes outbound HTTP request to attacker-controlled URL. No
    allowlist for outbound destinations. No URL scheme restriction. Full SSRF enabling internal network scanning.
  implementation: routes/complaint.ts (URL field without validation)
- domain: File Parser and Outbound Request Controls
  control: XML/XXE Prevention
  effectiveness: Missing
  assessment: B2B order endpoint (/b2b/v2/orders) processes XML input. js-yaml v3.14.0 used for YAML parsing with known deserialization
    risks. No XML parser hardening (no DTD disabling, no external entity restriction).
  implementation: routes/b2bOrder.ts (XML processing)
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Management and Supply Chain
  effectiveness: Weak
  assessment: .npmrc explicitly sets package-lock=false, disabling lockfile generation. No package-lock.json or npm-shrinkwrap.json.
    This means npm install resolves latest compatible versions non-deterministically — supply chain attack surface. Dependabot
    configured (.dependabot/). SBOM generated via cyclonedx-npm in Docker build. GitHub Actions workflows use unpinned @v4
    action refs.
  implementation: .npmrc (package-lock=false), Dockerfile (cyclonedx-npm), .dependabot/
- domain: Operations Runtime and Supply Chain Controls
  control: Logging and Monitoring
  effectiveness: Partial
  assessment: Winston v3.16.0 provides structured logging to /logs/. morgan HTTP request logger configured. However, no security
    event logging (failed auth attempts, authorization failures, input validation errors). No centralized SIEM integration.
    Log files may contain sensitive data at debug level.
  implementation: lib/logger.ts (Winston), server.ts (morgan middleware)
- domain: Real-time and Not Applicable Controls
  control: WebSocket / Socket.IO Authentication
  effectiveness: Weak
  assessment: Socket.IO connection handler attempts JWT validation on the socket event. However, event-level authorization
    is inconsistent — some socket events accessible without valid authentication. No rate limiting on socket events. Room
    isolation not implemented.
  implementation: lib/websocket.ts, routes/chat.ts
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated dependency updates
  effectiveness: Missing
  kind: lifecycle
  assessment: Automated dependency updates not detected in the repository. Patch-management posture depends on this control
    being in place — the team is reactive rather than proactive without it.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Lockfile hygiene
  effectiveness: Missing
  kind: lifecycle
  assessment: Lockfile hygiene not detected in the repository. Patch-management posture depends on this control being in place
    — the team is reactive rather than proactive without it.
  linked_threats: []
