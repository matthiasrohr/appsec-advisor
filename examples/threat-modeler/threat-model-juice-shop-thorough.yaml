  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client Side Only Admin and Accounting Guards (frontend/src/app/app.guard.ts:48)
  affected_parameter: null
  scenario: '`app.guard.ts:48-61` implements `AdminGuard` purely in browser-side JavaScript: it decodes the JWT locally using
    `jwtDecode(token)` and checks `payload.data.role === roles.admin`. No network call is made to verify the role with the
    server. An attacker who holds a valid (non-admin) JWT can bypass the guard by navigating to `/administration` directly
    via the browser address bar or `window.location.href` assignment — Angular routing guards run only on in-app navigation
    events, not on hard page loads. Furthermore, `LoginGuard.canActivate()` at line 18 accepts any non-null string in `localStorage[''token'']`
    without signature verification — a manually crafted JWT payload (which `jwtDecode` decodes without verifying the signature)
    can trick the guard into believing the user is authenticated.'
