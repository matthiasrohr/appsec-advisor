    that lets an attacker publish a malicious `bkimminich/juice-shop` image under the project''s own name, trusted by every
    downstream consumer, or perform org-admin actions. None of the publish jobs use OIDC short-lived tokens (`id-token: write`
    / Docker Hub OIDC / Heroku OIDC), so a stolen token remains valid until manually rotated.'
