- local_id: frontend-spa-005
  threat_category_id: TH-06
  additional_categories:
  - TH-02
  stride: Elevation of Privilege
  cwe: CWE-602
  title: Client-Side-Only Access Control via Route Guards
  affected_parameter: payload.data.role
  scenario: Authorization for privileged routes is decided entirely in the browser. `AdminGuard.canActivate` decodes the JWT
    client-side with `jwtDecode` (app.guard.ts:53 -> tokenDecode at :33-44) and grants access if `payload.data.role === roles.admin`
    (app.guard.ts:54); AccountingGuard (:70) and DeluxeGuard (:86) follow the same pattern, and LoginGuard merely checks that
    a `token` string exists in localStorage (:18). `jwtDecode` does NOT verify the signature, and the entire decision runs
    in attacker-controlled JavaScript. An attacker bypasses these guards trivially — call the Angular component or, more directly,
    hit the underlying `/api/*` and `/rest/*` endpoints with curl. The guards are pure UI gating and provide no security boundary;
    this is the SPA-without-server-authority anti-pattern for authorization.
  evidence_summary: app.guard.ts:53-54 grants admin access from a client-decoded, signature-unverified JWT role claim; LoginGuard:18
    trusts mere presence of a localStorage token.
  impact_description: Privileged Angular views (administration, accounting, deluxe) are reachable by any user; real protection
    depends entirely on whether the backend re-checks authorization.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Client-side guards only (LoginGuard/AdminGuard/AccountingGuard/DeluxeGuard) — non-enforcing UI gating;
    JWT signature never verified client-side.
  mitigation_title: Enforce role authorization on every backend endpoint; treat client guards as UI hints only
  remediation:
    effort: Medium
    steps:
    - Implement server-side authorization middleware on every privileged `/api/*` and `/rest/*` route that verifies the JWT
      signature and checks the role claim — never rely on the Angular guard.
    - Keep the client guards for UX but document that they are not a trust boundary; verify the JWT signature server-side
      before honoring any role.
    - Add automated tests that call privileged endpoints directly (no UI) with non-admin and forged tokens and assert 401/403.
    code_example: "// backend guard, not the SPA\nfunction requireRole(role) {\n  return (req, res, next) => {\n    const\
      \ p = jwt.verify(req.token, PUBLIC_KEY) // signature verified\n    if (p?.data?.role !== role) return res.sendStatus(403)\n\
      \    next()\n  }\n}"
    reference: CWE-602
