  cwe: CWE-916
  title: MD5 unsalted password hashing in User model setter (models/user.ts:76)
  affected_parameter: password
  scenario: 'The User model''s password setter calls security.hash() (lib/insecurity.ts:41 → crypto.createHash(''md5'')),
    persisting every user password as an unsalted MD5 digest in the Users.password column. MD5 is a fast, broken hash: an
    attacker who obtains the SQLite file (file-level access, backup leak, or any SQLi-driven dump from the route tier) can
    recover plaintext passwords offline at billions of guesses/sec, and identical passwords across accounts produce identical
    digests because no per-user salt is applied. The seeded admin account ships as ''admin123'' (data/static/users.yml:3),
    so even a rainbow-table lookup of its MD5 yields immediate credential recovery.'
  evidence_summary: models/user.ts:76 sets the password column to security.hash(clearTextPassword), which resolves to an unsalted
    MD5 digest at lib/insecurity.ts:41.
  impact_description: Database compromise yields plaintext credentials for every account, enabling password reuse attacks
    and full account takeover including admin.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None for password storage. Sequelize STRING column only; no salt, no work factor, no algorithm agility.
  mitigation_title: Replace MD5 password hashing with bcrypt/argon2id in the User model setter
  remediation:
    effort: Medium
    steps:
    - Replace security.hash() in the models/user.ts password setter with a memory-hard adaptive KDF — bcrypt (cost >=12) or
      argon2id — using the already-present bcrypt dependency.
    - Make the setter async-safe or hash in a beforeSave hook so the synchronous setter does not block; store the full KDF
      output (algorithm + cost + salt + digest) in the password column.
    - Add a verification path that re-hashes legacy MD5 values to the new KDF on next successful login, then drop the MD5
      code path.
    - Re-seed data/static/users.yml-derived accounts through the new hashing path so no MD5 digests remain.
    code_example: "import bcrypt from 'bcryptjs'\n// in models/user.ts password field:\nset (clearTextPassword: string) {\n\
      \  // store full bcrypt hash (salt+cost embedded)\n  this.setDataValue('password', bcrypt.hashSync(clearTextPassword,\
      \ 12))\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
  evidence:
