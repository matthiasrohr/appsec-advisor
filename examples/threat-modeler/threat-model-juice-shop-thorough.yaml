- local_id: file-upload-handler-002
  threat_category_id: TH-08
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-918
  title: Server-Side Request Forgery
  affected_parameter: imageUrl
  scenario: POST /profile/image/url passes req.body.imageUrl directly into fetch(url) at routes/profileImageUrlUpload.ts:24
    with no scheme, host, or IP allowlist. An authenticated user submits imageUrl=http://169.254.169.254/latest/meta-data/
    or http://localhost:3000/internal to make the server issue the request from inside the trust boundary. The response body
    is streamed to disk under the user's profile-image path (line 29); on any fetch error the raw attacker URL is instead
    stored verbatim as profileImage (line 36), enabling a stored payload. Only file:// is implicitly excluded by fetch — http/https
    to cloud metadata, link-local, and internal services all succeed.
  evidence_summary: req.body.imageUrl reaches fetch() unfiltered at profileImageUrlUpload.ts:24; the only gate is that a session
    cookie maps to a logged-in user.
  impact_description: Authenticated attacker reads cloud-metadata credentials and probes/contacts internal-only services that
    trust the application's network origin.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Request requires an authenticated session (security.authenticatedUsers.get on req.cookies.token, line
    21); there is no URL validation, DNS-rebinding protection, or response-size cap.
  mitigation_title: Validate imageUrl against an allowlist and block internal/link-local targets before fetch
  remediation:
    effort: Medium
    steps:
    - Before fetch() at profileImageUrlUpload.ts:24, parse the URL with new URL() and reject any scheme other than https,
      then resolve the hostname and reject RFC1918, loopback, link-local (169.254.0.0/16), and IPv6 ULA/loopback addresses.
    - Re-validate the resolved IP at connection time (or use an SSRF-hardened agent) to defeat DNS rebinding between the check
      and the fetch.
    - Remove the fallback at line 36 that stores the raw attacker-supplied URL as profileImage on fetch failure; on error
      keep the previous image instead.
    - Cap the streamed response size and set a fetch timeout to bound resource use.
    code_example: 'const u = new URL(url)

      if (u.protocol !== ''https:'') throw new Error(''scheme not allowed'')

      const { address } = await dns.promises.lookup(u.hostname)

      if (ipaddr.parse(address).range() !== ''unicast'') throw new Error(''blocked target'')'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html
  evidence:
  - file: routes/profileImageUrlUpload.ts
    line: 24
