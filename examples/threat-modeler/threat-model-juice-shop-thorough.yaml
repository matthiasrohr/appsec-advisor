  cwe: CWE-311
  title: Full payment card number stored in cleartext — models/card.ts:38
  scenario: The Card model persists `cardNum` as a raw `DataTypes.INTEGER` validated only to be a 16-digit range (min 1000000000000000
    / max 9999999999999998) — the complete Primary Account Number, not a truncated last-4 as the component description implies.
    `createCards()` in datacreator.ts:274 seeds full numbers with `Number(card.cardNum)`. There is no tokenization, no PAN
    masking, and no field-level encryption, so anyone who reads the Cards table (via the unencrypted DB file, a SQLi union
    at the routes tier, or the `/rest/basket` card endpoints) obtains reusable cardholder data. This is a direct PCI-DSS Requirement
    3.4 violation.
  evidence_summary: Card.init defines cardNum as an unencrypted INTEGER holding the entire 16-digit PAN with only range validation;
    no masking or tokenization set() hook exists.
  impact_description: Cleartext PAN disclosure enabling card fraud and PCI-DSS scope failure.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None. Only numeric range validation, which does not protect confidentiality.
  mitigation_title: Tokenize or encrypt PAN and store only a masked last-4 in the Card model
  remediation:
    effort: Medium
    steps:
    - 'Stop persisting the full PAN: store only the last 4 digits (`cardNum` -> `last4`) plus a token reference returned by
      a PCI-compliant payment processor.'
    - If the full value must be retained, add a Sequelize `set()` hook that AES-256-GCM encrypts cardNum with a KMS-managed
      key before write and a `get()` hook that decrypts on demand for authorized flows only.
    - Add a DB migration to re-tokenize existing rows and purge cleartext PANs.
    code_example: "cardNum: {\n  type: DataTypes.STRING,\n  set (pan: string) {\n    this.setDataValue('cardNum', crypto.createCipheriv('aes-256-gcm',\
      \ key, iv)/* ...encrypt... */)\n    this.setDataValue('last4', pan.slice(-4))\n  }\n}"
