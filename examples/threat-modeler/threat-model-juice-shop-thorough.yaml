- local_id: angular-frontend-009
  threat_category_id: TH-10
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-598
  title: OAuth access token leaked in URL fragment — login.component.ts:152
  affected_parameter: access_token
  scenario: When a user clicks Google Login, googleLogin() at login.component.ts:152 redirects to Google's OAuth endpoint
    with response_type=token. Google redirects back with the access_token in the URL fragment (e.g. /#/oauth#access_token=ya29.xxx).
    The URL fragment is stored in browser history, logged in browser debugging tools, and readable by any JavaScript on the
    page via location.hash. Third-party scripts loaded by the Angular app (analytics, CDN-hosted libraries) can read the token.
    OAuthComponent.parseRedirectUrlParams() at oauth.component.ts:70 then extracts it from the URL.
  evidence_summary: login.component.ts:152 uses response_type=token; oauth.component.ts:70-78 parses the token from the URL
    fragment hash.
  impact_description: The Google OAuth access token is exposed to browser history, JavaScript on the page, and potentially
    third-party scripts, enabling impersonation of the user with Google APIs.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None.
  mitigation_title: Migrate to OAuth Authorization Code Flow so tokens are never placed in the URL (see finding angular-frontend-001)
  remediation:
    effort: Medium
    steps:
    - Use response_type=code instead of response_type=token (Authorization Code Flow with PKCE).
    - Exchange the code server-side so access_token is never returned to the browser URL.
    - Review and remove fragment-based token parsing in oauth.component.ts:70-78 once backend token exchange is implemented.
    - As an interim measure, after extracting the token at oauth.component.ts:70, immediately replace the browser history
      entry using history.replaceState(null, '', location.pathname) to remove the token from the URL.
    code_example: '// oauth.component.ts — clear token from URL immediately after extraction

      const params = this.parseRedirectUrlParams();

      history.replaceState(null, '''', location.pathname + location.search);

      this.userService.oauthLogin(params.access_token).subscribe(...);'
    reference: CWE-598
  evidence:
