  stride: Elevation of Privilege
  cwe: CWE-94
  title: JS Sandbox Escape via notevil Prototype Pollution (routes/b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: 'An authenticated attacker submits a POST /b2b/v2/orders request with a crafted `orderLinesData` payload targeting
    notevil v1.3.3''s prototype pollution vulnerability. The handler at b2bOrder.ts:19 assigns `body.orderLinesData` directly
    to the sandbox variable without sanitization, then passes it into `vm.runInContext(''safeEval(orderLinesData)'', sandbox,
    {timeout: 2000})` at line 23. Because notevil v1.3.3 does not defend against `__proto__` or `constructor.prototype` mutation,
    a payload such as `({}).__proto__.toString = function(){return require(''child_process'').execSync(''id'')}` can escape
    the restricted evaluation context and execute arbitrary OS commands under the Node.js process identity. The Node.js `vm.createContext`
    boundary provides no strong isolation — host objects (including `require`) are reachable via prototype chains once the
    sandbox prototype is polluted.'
  evidence_summary: '`body.orderLinesData` is passed unsanitized into `vm.runInContext(''safeEval(orderLinesData)'', sandbox,
    {timeout: 2000})` where notevil v1.3.3 provides the evaluator without prototype-pollution defenses.'
  impact_description: Full RCE as the Node.js process user — attacker can read secrets, exfiltrate the database, or pivot
    to internal services.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: JWT authentication (isAuthorized()) required — reduces attacker pool to authenticated users. 2-second
    VM timeout prevents unbounded execution. notevil intended as a safe evaluator.
  mitigation_title: Remove notevil/vm.runInContext and replace orderLinesData with a structured schema-validated format
  remediation:
    effort: High
    steps:
    - Remove the `vm.createContext` / `vm.runInContext` / notevil eval path entirely from routes/b2bOrder.ts. Dynamic code
      evaluation of user input has no safe implementation in this context.
    - 'Replace `orderLinesData` free-form expression with a typed JSON schema: `{lines: [{sku: string, qty: number, unitPrice:
      number}]}`. Validate with `zod` or `joi` before processing.'
    - If expression evaluation is a business requirement, use a purpose-built sandboxed worker (e.g., `isolated-vm` with no
      host object exposure) in a separate child process with `seccomp` / AppArmor restrictions.
    - Update notevil to the latest version as a short-term mitigation, but treat it as insufficient given the structural vm.createContext
      weakness.
    code_example: "```typescript\nimport { z } from 'zod'\n\nconst OrderLineSchema = z.object({\n  sku: z.string().max(64),\n\
      \  qty: z.number().int().positive().max(9999),\n  unitPrice: z.number().positive()\n})\nconst OrderBodySchema = z.object({\n\
      \  cid: z.string().max(64),\n  orderLines: z.array(OrderLineSchema).min(1).max(50)\n})\n\n// In handler — replaces vm.runInContext\
      \ block\nconst parsed = OrderBodySchema.safeParse(req.body)\nif (!parsed.success) return res.status(400).json({ error:\
      \ parsed.error.flatten() })\n```"
    reference: CWE-94
