  threat_category_id: TH-10
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-287
  title: Derived Password from OAuth Email Claim
  affected_parameter: profile.email
  scenario: 'After an OAuth login, OAuthComponent derives the local account password deterministically from the email claim:
    `const password = btoa(profile.email.split('''').reverse().join(''''))` (oauth.component.ts:30), then both creates the
    user (line 31) and logs in (line 46) with that same value. The password is therefore a pure function of a publicly-known
    identifier — base64 of the reversed email. Any attacker who knows a victim''s email can reproduce the exact password offline
    and authenticate through the normal password endpoint, turning the OAuth convenience feature into a parallel authentication
    bypass for every OAuth-provisioned account. No secret, no server-side entropy, and no rate-dependent factor protects the
    account.'
  evidence_summary: oauth.component.ts:30 and :46 both compute the credential as `btoa(profile.email.split('').reverse().join(''))`,
    making the password fully derivable from the email.
  impact_description: Full account takeover of any OAuth-provisioned user by anyone who knows their email address, via the
    standard password login endpoint.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The password is a deterministic, reversible transform of the email.
  mitigation_title: Stop deriving passwords from the email claim; provision OAuth accounts without a guessable password
  remediation:
    effort: Medium
    steps:
    - Do not set or compute a user-facing password during OAuth provisioning. Mark OAuth accounts as federated and disable
      password login for them on the backend.
    - If a credential placeholder is unavoidable, generate it server-side with a CSPRNG (e.g. 32 random bytes) and never echo
      it to the client or derive it from any claim.
    - Bind the local session strictly to a verified OAuth token exchange performed server-side, so possession of the email
      alone never yields authentication.
    code_example: '// remove the derivation entirely

      // BAD: const password = btoa(profile.email.split('''').reverse().join(''''))

      // GOOD: backend creates a federated account, no password login allowed

      this.userService.oauthLogin(token).subscribe(/* session set by server, httpOnly cookie */)'
    reference: CWE-287
