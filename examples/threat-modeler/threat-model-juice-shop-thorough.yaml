  title: Prototype Pollution via Sandbox Escape
  affected_parameter: orderLinesData
  scenario: The notevil interpreter (used at routes/b2bOrder.ts:23) walks JavaScript property chains while evaluating orderLinesData.
    notevil ^1.3.3 (package.json:139) does not block writes through `__proto__` / `constructor.prototype`, so an attacker-supplied
    expression can assign to `Object.prototype` from inside the sandbox. Polluting Object.prototype is the standard pivot
    used to escape notevil to host RCE, and independently corrupts every object created afterward in the same Node worker
    — later request handlers that read polluted keys (e.g. `isAdmin`, `toString` overrides) behave incorrectly. The root cause
    is the same line, but the prototype-write primitive is a distinct weakness class worth flagging because it both enables
    the escape in b2b-api-001 and persists process-wide.
  evidence_summary: orderLinesData is interpreted by notevil at routes/b2bOrder.ts:23 with no key filtering, permitting writes
    that reach Object.prototype during evaluation.
  impact_description: 'Process-wide prototype pollution: the escape primitive for the RCE plus corruption of all subsequently
    created objects until the process restarts.'
  likelihood: High
  impact: High
  risk: High
  controls_in_place: JWT bearerAuth on /b2b/v2 (server.ts:424); 2000ms vm timeout. No prototype-key filtering exists on the
    evaluated input.
  mitigation_title: Eliminate the evaluation path and parse orderLinesData with a prototype-safe JSON parser
  remediation:
    effort: Medium
    steps:
    - Remove the notevil/vm evaluation (see b2b-api-001); polluting writes are only reachable because the string is interpreted.
    - 'When parsing the now-data-only orderLinesData, strip dangerous keys before use: reject any object containing __proto__,
      constructor, or prototype keys.'
    - Create order-line objects with Object.create(null) or guard reads so a polluted prototype cannot influence business
      logic.
    code_example: "const FORBIDDEN = new Set(['__proto__', 'constructor', 'prototype'])\nfunction assertClean (obj) {\n  for\
      \ (const k of Object.keys(obj)) {\n    if (FORBIDDEN.has(k)) throw new Error('forbidden key')\n    if (obj[k] && typeof\
      \ obj[k] === 'object') assertClean(obj[k])\n  }\n}\nassertClean(JSON.parse(body.orderLinesData))"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Prototype_Pollution_Prevention_Cheat_Sheet.html
