  stride: Denial of Service
  cwe: CWE-400
  title: Socket.IO server has no message size limit or — registerWebsocketEvents.ts:20
  affected_parameter: null
  scenario: The `new Server(server, ...)` construction at registerWebsocketEvents.ts:20 passes only a `cors` option — it sets
    no `maxHttpBufferSize` (Socket.IO default 1 MB per message but no aggregate cap), no `connectTimeout`/`pingTimeout` hardening,
    and there is no connection or per-event rate limiting anywhere on the WebSocket path (the `express-rate-limit` instances
    in server.ts apply only to specific REST routes such as `/rest/user/reset-password`, never to `/socket.io/`). A repo-wide
    grep for `maxHttpBufferSize` returns zero hits. Combined with the unauthenticated upgrade (socket-io-001), an anonymous
    client can open large numbers of concurrent connections and flood event handlers (e.g. repeatedly emit `notification received`
    triggering `findIndex`/`splice` scans over the growing global array, or send near-max-size buffers) to exhaust event-loop
    CPU and heap, degrading the real-time channel and the host process for all users.
  evidence_summary: The Socket.IO `Server` is constructed with only a `cors` option; no `maxHttpBufferSize`, connection cap,
    or per-event rate limit is configured, and no rate-limit middleware covers the WebSocket path.
  impact_description: An unauthenticated attacker exhausts CPU/memory via connection floods and oversized/high-frequency events,
    denying real-time service to all clients.
  likelihood: Medium
  impact: Medium
  risk: Medium
