  title: MarsDB in-memory collections grow unbounded — data/mongodb.ts:9
  affected_parameter: null
  scenario: data/mongodb.ts instantiates two MarsDB in-memory collections, reviewsCollection ('posts') and ordersCollection
    ('orders'), held entirely in the Node process heap with no size cap, TTL, or eviction. Reviews and orders are written
    from user-facing routes. An attacker who can submit reviews or generate orders in a loop drives unbounded heap growth;
    because MarsDB keeps the full dataset resident in memory, sustained writes exhaust the process memory and crash the single
    Node instance, taking down the whole monolith (SQLite and all routes run in-process). There is no pagination/quota enforced
    at the collection layer.
  evidence_summary: data/mongodb.ts:9-10 creates resident MarsDB collections with no bound, TTL, or eviction policy.
  impact_description: Sustained review/order writes inflate the in-memory collections until the single Node process runs out
