components:
- id: frontend-spa
  name: Angular Single-Page Application
  description: Angular 21 single-page application bundled by Vite and served by the Express monolith. Holds the JWT in localStorage,
    performs client-side route guarding (LoginGuard/AdminGuard/DeluxeGuard/AccountingGuard), and contains DOM-based XSS sinks
    (document.write in data-export, window.location fragment parsing in app.routing.ts).
  paths:
  - frontend/src/**
  tier: client
  complexity: complex
  framework: angular
  deployment_zones:
  - browser
  - client-device
  handles_sensitive_data: true
  threat_ids:
  - T-006
  - T-009
  - T-019
  - T-020
  - T-035
  - T-046
  - T-047
  - T-060
- id: backend-api
  name: Express REST API Monolith
  description: Node.js 24 / Express monolith exposing the /rest/* and /api/* REST surface on port 3000. Mounts middleware
    (cors wildcard, helmet, rate-limit), routes business logic, serves the SPA, and registers the WebSocket and metrics endpoints.
    Contains intentional SQL injection in login/search.
  paths:
  - app.ts
  - server.ts
  - routes/**
  - lib/**
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - internet-facing
  - docker-container
  handles_sensitive_data: true
  threat_ids:
  - T-003
  - T-005
  - T-010
  - T-017
  - T-025
  - T-026
  - T-027
  - T-037
  - T-038
  - T-043
  - T-049
  - T-061
  - T-062
  - T-064
  - T-066
- id: auth-identity
  name: Authentication & Identity Subsystem
  description: Authentication, JWT issuance/verification, and role-based authorization logic centered on lib/insecurity.ts.
    Hardcoded RSA private key (insecurity.ts:21), MD5 password hashing (insecurity.ts:41), RS256 jwt.sign (insecurity.ts:54)
    and jws.verify with no algorithm enforcement (insecurity.ts:55) enabling alg:none. Covers login, registration, password
    reset/change, 2FA (TOTP), and OAuth frontend adapter.
  paths:
  - lib/insecurity.ts
  - routes/login.ts
  - routes/2fa.ts
  - routes/resetPassword.ts
  - routes/verify.ts
  - routes/authenticatedUsers.ts
  - routes/currentUser.ts
  - models/user.ts
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - internet-facing
  - docker-container
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-002
  - T-007
  - T-008
  - T-014
  - T-015
  - T-016
  - T-022
  - T-036
  - T-050
  - T-054
  - T-057
  - T-068
- id: data-persistence
  name: Data Persistence Layer
  description: Sequelize ORM over SQLite (default) plus MarsDB for some collections. Defines User/Product/Basket/Card/Wallet/Complaint/Feedback
    models. Co-located in-process with application logic; raw template-string SQL paths bypass the ORM in login and product
    search.
  paths:
  - models/**
  - data/**
  - lib/startup/**
  tier: data
  complexity: complex
  framework: sequelize
  deployment_zones:
  - docker-container
  handles_sensitive_data: true
  threat_ids:
  - T-011
  - T-044
  - T-053
  - T-067
- id: file-upload-handler
  name: File Upload & Parser Subsystem
  description: Multipart file-upload handler (multer) for complaints and profile images plus the YAML/XML parsing path in
    routes/fileUpload.ts. yaml.load executed inside a vm.runInContext sandbox (fileUpload.ts:109); XML parsing via libxmljs2
    (XXE), ZIP extraction, and SVG handling. Writes into served directories (ftp/, uploads/).
  paths:
  - routes/fileUpload.ts
  - routes/profileImageFileUpload.ts
  - routes/profileImageUrlUpload.ts
  - routes/dataExport.ts
  - uploads/**
  tier: application
  complexity: moderate
  framework: express
  deployment_zones:
  - internet-facing
  - docker-container
  handles_sensitive_data: false
  threat_ids:
  - T-012
  - T-033
  - T-034
  - T-045
  - T-069
- id: b2b-api
  name: B2B v2 Order API
  description: NextGen B2B v2 REST API (/b2b/v2/orders) using JWT bearerAuth. Evaluates client-supplied orderLinesData through
    notevil safeEval inside vm.runInContext (b2bOrder.ts:23) — a server-side code-evaluation / prototype-pollution RCE vector.
    Documented in swagger.yml.
  paths:
  - routes/b2bOrder.ts
  tier: application
  complexity: moderate
  framework: express
  deployment_zones:
  - internet-facing
  - docker-container
  handles_sensitive_data: false
  threat_ids:
  - T-004
  - T-013
  - T-024
- id: chat-llm
  name: AI Chatbot Service
  description: Conversational chatbot at /rest/chatbot backed by @ai-sdk/openai-compatible v2.0.35 (routes/chat.ts). User
    input is incorporated into the LLM prompt with no sanitization; challenge metadata explicitly encodes a prompt-injection
    / system-prompt-bypass attack. Outbound HTTPS calls to an OpenAI-compatible provider.
  paths:
  - routes/chat.ts
  - data/chatbot/**
  tier: application
  complexity: moderate
  framework: express
  deployment_zones:
  - internet-facing
  - docker-container
  - cloud-saas
  handles_sensitive_data: false
  known_llm_patterns: LLM chatbot via @ai-sdk/openai-compatible at routes/chat.ts; user input flows into prompt without sanitization;
    prompt-injection and system-prompt-bypass challenges encoded in data/static/challenges.yml
  threat_ids:
  - T-018
  - T-028
  - T-029
  - T-039
  - T-051
  - T-063
- id: websocket-realtime
  name: Socket.IO Real-Time Channel
  description: Socket.IO v3.1 real-time channel registered via lib/startup/registerWebsocketEvents, sharing origin and port
    3000 with the REST API. Pushes challenge-solved notifications and accepts client events; per-event authorization is not
    consistently enforced.
  paths:
  - lib/startup/registerWebsocketEvents.ts
  - frontend/src/app/Services/socket-io.service.ts
  tier: application
  complexity: moderate
  framework: socket.io
  deployment_zones:
