  stride: Elevation of Privilege
  cwe: CWE-306
  title: Web3 endpoints invoke on-chain listeners with no — routes/nftMint.ts:16
  affected_parameter: null
  scenario: All five Web3 routes (/rest/web3/submitKey, /nftUnlocked, /nftMintListen, /walletNFTVerify, /walletExploitAddress)
    are registered in server.ts:641-645 with no security middleware — no security.isAuthorized(), no appendUserId, no denyAll.
    An unauthenticated internet attacker can hit /rest/web3/nftMintListen (nftMint.ts:16), which opens an outbound WebSocketProvider
    connection to the paid Alchemy Sepolia endpoint and registers an on-chain event listener. Because there is no identity
    gate, any anonymous caller can drive server-side blockchain interactions and mutate challenge state that should require
    an authenticated session.
  evidence_summary: nftMint.ts:16 enters the listener-creation branch on any request; the route at server.ts:641-645 carries
    no security.* middleware, so req.body/req is never tied to an authenticated principal.
  impact_description: Anonymous callers trigger server-initiated blockchain/WebSocket activity and challenge-state changes
    without ever authenticating.
  likelihood: High
  impact: Low
  risk: Medium
  controls_in_place: None. No authentication or session middleware is attached to any /rest/web3/* route.
  mitigation_title: Require an authenticated session on state-changing Web3 endpoints
  remediation:
    effort: Low
    steps:
    - Attach security.isAuthorized() (JWT session guard) to /rest/web3/nftMintListen, /walletNFTVerify and /walletExploitAddress
      in server.ts so only authenticated users can trigger outbound listeners and challenge solves.
    - Bind the action to req.user (appendUserId) so verification and challenge attribution are per-account rather than global.
    - Keep read-only /nftUnlocked public if desired, but gate every handler that opens a provider connection or mutates shared
      state.
    code_example: 'app.get(''/rest/web3/nftMintListen'', security.isAuthorized(), utils.asyncHandler(nftMintListener()))

      app.post(''/rest/web3/walletExploitAddress'', security.isAuthorized(), utils.asyncHandler(contractExploitListener()))'
    reference: CWE-306
    blueprint: null
