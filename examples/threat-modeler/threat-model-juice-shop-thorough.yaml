  title: Open redirect — lib/insecurity.ts:133
  affected_parameter: to
  scenario: isRedirectAllowed() returns true when the target URL merely *contains* an allowlisted string (`url.includes(allowedUrl)`,
    lib/insecurity.ts:136). performRedirect() (routes/redirect.ts:16) then res.redirect()s to it. An attacker crafts GET /redirect?to=https://evil.example/?x=https://github.com/juice-shop/juice-shop
    so the substring check passes and the victim is redirected to the attacker origin -- usable for phishing and OAuth-token/referer
    theft.
  evidence_summary: The allowlist test at insecurity.ts:136 uses includes() rather than an origin/prefix comparison, so any
    URL embedding an allowlisted string is accepted.
  impact_description: Arbitrary external redirection enabling phishing and credential/token capture under a trusted domain.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: A redirect allowlist exists but is matched by substring containment, which is trivially bypassed.
  mitigation_title: Match redirect targets by exact parsed origin, not substring
