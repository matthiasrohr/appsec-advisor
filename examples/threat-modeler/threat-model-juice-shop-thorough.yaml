  - T-098
- id: sqlite-db
  name: SQLite Database
  description: File-based SQLite database accessed via Sequelize ORM. Stores all application data including user accounts
    (email, MD5-hashed passwords, TOTP secrets), payment cards, addresses, orders, product catalog, and challenge state. Database
    file lives inside the container filesystem.
  paths:
  - models/**
  - data/datacreator.ts
  - data/datacache.ts
  - data/static/**
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - container
  handles_sensitive_data: true
  threat_ids:
  - T-019
  - T-049
- id: nosql-store
  name: MarsDB NoSQL Store
  description: In-memory MongoDB-compatible database (MarsDB) used for product reviews and order data. Accessed via the data/mongodb.ts
    module. Supports $where JavaScript injection queries, which is an intentional vulnerability. Not persisted to disk.
  paths:
  - data/mongodb.ts
  - data/types.ts
  tier: data
  complexity: simple
  framework: marsdb
  deployment_zones:
  - container
  handles_sensitive_data: true
  threat_ids:
  - T-074
  - T-099
- id: file-storage
  name: File Storage (FTP + Uploads)
  description: 'Local filesystem directories serving as file storage: ftp/ (publicly accessible via /ftp with directory listing),
    uploads/complaints/ (zip extraction target), frontend/dist/frontend/assets/public/images/uploads/ (profile images from
    URL upload). The FTP directory serves sensitive files without authentication.'
  paths:
  - ftp/**
  - uploads/**
  - routes/fileServer.ts
  - routes/fileUpload.ts
  - routes/profileImageFileUpload.ts
  - routes/profileImageUrlUpload.ts
  - routes/quarantineServer.ts
  - routes/logfileServer.ts
  tier: data
  complexity: moderate
  framework: null
  deployment_zones:
  - container
  handles_sensitive_data: true
  threat_ids:
  - T-017
  - T-029
  - T-062
  - T-063
- id: chatbot-llm
  name: AI Chatbot (LLM Integration)
  description: 'LLM-powered customer service chatbot using Vercel AI SDK with OpenAI-compatible provider. Exposes tools: searchProducts,
    getProductReviews, getOrderById, generateCoupon. Vulnerable to prompt injection and MarsDB $where injection through getProductReviews
    tool.'
  paths:
  - routes/chat.ts
  tier: application
  complexity: moderate
  framework: ai-sdk
  deployment_zones:
  - container
