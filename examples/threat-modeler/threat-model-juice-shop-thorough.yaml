- local_id: file-upload-handler-005
  threat_category_id: TH-12
  additional_categories:
  - TH-01
  stride: Denial of Service
  cwe: CWE-776
  title: XML Entity Expansion Denial of Service
  affected_parameter: file
  scenario: 'Because parseXmlString enables DTD loading and entity substitution (lib/xml.ts:35), a billion-laughs DOCTYPE
    (nested entities &lol9; referencing &lol8; etc.) submitted to POST /file-upload as .xml expands exponentially during libxml2
    parsing. The application explicitly anticipates this: handleXmlUpload solves xxeDosChallenge when the error contains ''Script
    execution timed out'' (routes/fileUpload.ts:82-85). The 2000ms vm timeout (lib/xml.ts:38) caps a single request but each
    request still consumes a full CPU core for 2 seconds; an unauthenticated attacker (server.ts:309) sending these concurrently
    saturates the event loop and CPU.'
  evidence_summary: DTD/entity expansion is enabled in parseXmlString and the handler's catch block is purpose-built around
    the 'Script execution timed out' DoS outcome.
  impact_description: Concurrent crafted XML uploads pin CPU and stall the Node event loop, denying service to legitimate
    users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: 2000ms vm.runInContext timeout (lib/xml.ts:38) bounds a single parse; multer 200000-byte limit (server.ts:692)
    bounds raw input but not expanded size; no concurrency cap or rate limit on the route.
  mitigation_title: Disable DTD/entity expansion and rate-limit XML uploads
  remediation:
    effort: Low
    steps:
    - Remove XML_PARSE_DTDLOAD and XML_PARSE_NOENT at lib/xml.ts:35 so entity-expansion bombs cannot inflate (same change
      that fixes the XXE finding).
    - Lower the parse timeout and add a per-IP rate limit / concurrency cap on POST /file-upload to bound aggregate CPU spend.
    - Require authentication on the route (server.ts:309) so the surface is attributable and throttleable per account.
    code_example: '// lib/xml.ts:35 — drop NOENT and DTDLOAD

      const option = libxml2.ParseOption.XML_PARSE_NOBLANKS | libxml2.ParseOption.XML_PARSE_NOCDATA'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
