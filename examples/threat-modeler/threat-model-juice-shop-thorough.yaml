- local_id: data-persistence-002
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-311
  title: Payment card number stored in cleartext
  affected_parameter: cardNum
  scenario: The Card model declares cardNum as a plain DataTypes.INTEGER with only numeric range validators (models/card.ts:38-45)
    and fullName as a plain STRING (line 37); no setter encrypts either value before persistence. A grep of models/ and data/datacreator.ts
    for any encrypt/cipher/aes/crypto usage returns zero hits, so the declared 'encrypted Card field' control does not exist
    in code. Cardholder PAN and name are written to the Cards table in cleartext. Any read of the SQLite datastore — via the
    raw-SQL injection paths that reach the full DB, a leaked data/juiceshop.sqlite backup, or container disk access — exposes
    full payment card numbers tied to named users.
  evidence_summary: models/card.ts:38-45 defines cardNum as a bare INTEGER with no encrypting setter; no encryption primitive
    is referenced anywhere in models/ or data/datacreator.ts.
  impact_description: Stored PANs are recoverable in cleartext from a single database read, a direct PCI-DSS cardholder-data
    exposure.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: Numeric range validation only (16-digit length enforced via min/max). No encryption or tokenization despite
    the field being declared as encrypted in the component control set.
  mitigation_title: Encrypt or tokenize stored card numbers with an application-level AEAD setter on the Card model
  remediation:
    effort: Medium
    steps:
    - 'Stop storing the raw PAN: tokenize via the payment processor and persist only the token plus last-four, or apply application-level
      AES-256-GCM encryption in a Card model setter before setDataValue.'
    - Move the encryption key out of source into a secrets manager / env var; never co-locate it with the SQLite file.
    - Change the column type to a STRING/BLOB capable of holding ciphertext+IV+tag rather than INTEGER.
    - If retaining encrypted PANs, scope access and add field-level decrypt only at the payment route, keeping cardNum opaque
      elsewhere.
    code_example: "cardNum: {\n  type: DataTypes.STRING,\n  set (pan: string) {\n    const iv = crypto.randomBytes(12)\n \
      \   const c = crypto.createCipheriv('aes-256-gcm', KEY, iv)\n    const ct = Buffer.concat([c.update(String(pan), 'utf8'),\
      \ c.final()])\n    this.setDataValue('cardNum', Buffer.concat([iv, c.getAuthTag(), ct]).toString('base64'))\n  }\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
    blueprint: null
