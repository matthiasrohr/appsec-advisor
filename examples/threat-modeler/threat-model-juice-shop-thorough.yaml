  title: Notification Broadcast to Unauthorized Sockets — registerWebsocketEvents.ts:29
  scenario: An attacker connects a fresh Socket.IO client and, at connection time, the handler at lib/startup/registerWebsocketEvents.ts:29
    replays every entry of the global notifications array — each carrying a challenge flag — via socket.emit('challenge solved',
