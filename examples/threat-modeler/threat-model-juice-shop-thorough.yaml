tier_root_causes:
  edge:
  - client-side trust enforcement bypassed via server-side re-validation gap
  - missing CSP and XSS sinks in Angular innerHTML bindings
  - JWT and auth tokens stored in localStorage (XSS-accessible)
  server:
  - hardcoded cryptographic secrets (RSA private key, cookie secret) in source
  - missing input neutralization on raw SQL and NoSQL query paths
  - absent authorization middleware on sensitive REST and admin routes
  - no rate-limiting on authentication, brute-force, and DoS-prone endpoints
  - LLM prompt injection surface with no output sandboxing
  data:
  - unsalted MD5 for password hashing (CWE-916)
  - sensitive PII stored without column-level encryption
  - hardcoded credential in ORM config enables direct DB access
