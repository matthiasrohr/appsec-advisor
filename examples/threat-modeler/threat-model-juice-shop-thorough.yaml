  title: Wallet ownership accepted without signature verification (nftMint.ts:41)
  affected_parameter: walletAddress
  scenario: POST /rest/web3/walletNFTVerify (routes/nftMint.ts:38) reads `req.body.walletAddress` and checks membership in
    the in-memory `addressesMinted` Set with no proof that the caller controls that address — there is no ethers `verifyMessage`/`recoverAddress`
    challenge-response anywhere in the codebase (grep for verifyMessage/recoverAddress/hashMessage returns zero hits across
    routes/ and lib/). An attacker who learns or guesses any address that fired the on-chain `NFTMinted` event simply POSTs
    that address and is credited with the mint (challenge solved, Set entry consumed). The same pattern exists at routes/web3Wallet.ts:15
    where contractExploitListener trusts `req.body.walletAddress` to register a wallet. Address identity is being treated
    as a bearer credential.
