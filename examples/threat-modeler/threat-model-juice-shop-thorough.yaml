components:
- id: express-backend
  name: Express REST API Backend
  description: Core Node.js/Express 4 application server handling all REST API routes, authentication, business logic, session
    management, and middleware pipeline. Serves as the single deployable unit encompassing route handlers in routes/*.ts,
    security primitives in lib/insecurity.ts, and server bootstrap in server.ts.
  paths:
  - routes/**
  - lib/**
  - server.ts
  - app.ts
  - models/**
  - config/**
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - prod-env
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-011
  - T-027
  - T-028
  - T-029
  - T-042
  - T-043
  - T-053
  - T-058
  - T-062
  - T-071
  - T-072
- id: angular-frontend
  name: Angular SPA Frontend
  description: Angular 20 single-page application client running in the browser. Contains 72 components including shopping
    cart, user profile, administration, and challenge instructor. Stores JWT tokens in localStorage and handles client-side
    routing, DOM manipulation, and WebSocket connections.
  paths:
  - frontend/src/**
  - frontend/package.json
  tier: client
  complexity: complex
  framework: angular
  deployment_zones:
  - client-device
  - internet
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-002
  - T-003
  - T-005
  - T-009
- id: data-layer
  name: SQLite Data Layer (Sequelize ORM)
  description: Embedded SQLite 3 database accessed via Sequelize 6 ORM. Stores users, products, orders, baskets, feedback,
    challenges, and application state. The ORM models are defined in models/*.ts with direct SQL access also used for raw
    queries in several routes.
  paths:
  - models/**
  - data/**
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - prod-write-db
  - internal-network
  handles_sensitive_data: true
  threat_ids:
  - T-018
  - T-037
  - T-038
  - T-039
  - T-040
  - T-041
- id: b2b-api
  name: B2B Order Processing API
  description: B2B REST API endpoint at /b2b/v2/orders defined in routes/b2bOrder.ts, documented in swagger.yml. Accepts JWT
    bearer-authenticated order payloads with a free-form orderLinesData string field that is evaluated via vm.runInContext(safeEval(orderLinesData)).
    Critical code injection risk.
  paths:
  - routes/b2bOrder.ts
  - swagger.yml
  tier: application
  complexity: simple
  framework: express
  deployment_zones:
  - prod-env
  - internet
  handles_sensitive_data: false
  threat_ids:
  - T-004
  - T-013
  - T-051
  - T-064
- id: chatbot
  name: LLM Chatbot (Ollama Integration)
  description: AI-powered customer service chatbot at /rest/chatbot/* implemented in routes/chat.ts using @ai-sdk/openai-compatible
    with a local Ollama instance (localhost:11434). Implements discount coupon generation via LLM tool calls, with known prompt
    injection and greedy injection challenge vulnerabilities.
  paths:
  - routes/chat.ts
  - data/static/codefixes/chatbot*
  tier: application
  complexity: moderate
  framework: null
  deployment_zones:
  - prod-env
  - internal-network
  handles_sensitive_data: false
  threat_ids:
  - T-015
  - T-017
  - T-022
  - T-023
  - T-052
  - T-065
  - T-066
- id: file-server
  name: File Server and Upload Handler
  description: Serves the /ftp directory via express serve-index and handles file uploads for profile images (routes/profileImageFileUpload.ts,
    routes/profileImageUrlUpload.ts) and memory images (routes/memory.ts). The FTP route at routes/fileServer.ts uses path.resolve('ftp/',
    file) without directory traversal checks. URL-based image upload fetches from user-controlled URLs (SSRF risk).
  paths:
  - routes/fileServer.ts
  - routes/fileUpload.ts
  - routes/profileImageFileUpload.ts
  - routes/profileImageUrlUpload.ts
  - routes/memory.ts
  - ftp/**
  tier: application
  complexity: simple
  framework: express
  deployment_zones:
