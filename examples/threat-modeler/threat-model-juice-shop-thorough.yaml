- local_id: angular-frontend-006
  threat_category_id: TH-10
  additional_categories:
  - TH-04
  stride: Spoofing
  cwe: CWE-287
  title: OAuth implicit flow with deterministic derived password (oauth.component.ts:30)
  affected_parameter: access_token
  scenario: 'oauth.component.ts implements an OAuth implicit flow: `access_token` is parsed from the URL fragment (parseRedirectUrlParams,
    line 70-79, consumed at line 28) with no PKCE, no `state`/`nonce` validation, and no verification of the redirect parameters.
    Worse, line 30 and line 46 derive the account password deterministically as `btoa(profile.email reversed)`. Because that
    derivation is a pure function of the email, anyone who knows a victim''s email can reconstruct their password and authenticate
    through the normal `/rest/user/login` endpoint — the OAuth convenience flow silently creates a parallel, guessable credential
    that bypasses the OAuth provider entirely. The access token also rides in the URL fragment, exposing it to browser history,
    referrer leakage, and any XSS on the page.'
  evidence_summary: oauth.component.ts:30/46 set the user's password to btoa(reversed email); line 28/71 consume an implicit-flow
    access_token from the URL fragment without PKCE/state.
  impact_description: Any party knowing a target email can compute the password and fully impersonate the account, defeating
    OAuth.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — password is a reversible function of the public email; no PKCE, state, or nonce validation on
    the OAuth redirect.
  mitigation_title: Replace the derived OAuth password with a server-generated secret and adopt code flow with PKCE
  remediation:
    effort: High
    steps:
    - Stop deriving the password from the email at oauth.component.ts:30 and :46; let the backend create the federated account
      with a cryptographically random, non-retrievable secret (or no local password at all).
    - Migrate from implicit flow to authorization-code flow with PKCE, and validate `state` (CSRF) and `nonce` (replay) on
      the redirect before consuming any token.
    - Receive the OAuth result via a backend redirect/exchange so the access token never appears in the browser URL fragment
      or history.
    code_example: '// do NOT: const password = btoa(profile.email.split('''').reverse().join(''''))

      // backend creates the federated identity; client never sets a guessable password

      // use code flow: /authorize?response_type=code&code_challenge=...&state=<random>'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/OAuth2_Cheat_Sheet.html
