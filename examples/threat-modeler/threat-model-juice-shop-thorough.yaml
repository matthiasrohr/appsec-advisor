  stride: Tampering
  cwe: CWE-1104
  title: Unpinned Third-Party CI Actions (.github/workflows/ci.yml:188)
  affected_parameter: null
  scenario: 'Across the pipeline several third-party actions are referenced by mutable tags rather than commit SHAs, breaking
    the otherwise consistent SHA-pinning discipline of ci.yml. coverallsapp/github-action@v2 (ci.yml:188) receives secrets.GITHUB_TOKEN
    and runs on every push; a hijacked v2 tag executes in CI with that token. release.yml:80 uses dawidd6/action-get-tag@...
    which the maintainers'' own inline comment flags as ''Action is archived and should be replaced eventually'' — an unmaintained
    dependency that will never receive security fixes (CWE-1104). codeql-analysis.yml pins github/codeql-action/*@v3 by major
    tag; this is GitHub-first-party so risk is lower, but it is still a mutable ref. Each mutable tag is a substitution point:
    the upstream owner, or anyone who compromises the upstream repo, can re-point the tag to malicious code that then runs
    inside this pipeline.'
  evidence_summary: ci.yml:188 references coverallsapp/github-action@v2 (a moving tag) while the rest of the file pins to
    40-char SHAs; release.yml:80 uses an action its own comment marks as archived.
  impact_description: A compromised or re-pointed upstream tag runs in CI with whatever token the step is given, enabling
    code/artifact tampering in the build.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Most actions in ci.yml, lint-fixer.yml, lock.yml, pr-compliance.yml, rebase.yml, and release.yml ARE
    pinned to commit SHAs with a version comment — the discipline exists and is only inconsistently applied.
  mitigation_title: Pin Coveralls, codeql-action, and replace the archived action-get-tag with SHA-pinned equivalents
  remediation:
    effort: Low
    steps:
    - Pin coverallsapp/github-action to a commit SHA in ci.yml:188.
    - Replace dawidd6/action-get-tag (archived, release.yml:80) with a maintained tag-extraction step or GITHUB_REF_NAME,
      then SHA-pin it.
    - Pin github/codeql-action/init|autobuild|analyze to commit SHAs (codeql-analysis.yml:23,34,36).
    - 'Run a periodic check (e.g. ratchet, pinact, or zizmor) in CI that fails the build when any uses: line is not a 40-char
      SHA.'
    code_example: "- name: \"Publish coverage to Coveralls\"\n  uses: coverallsapp/github-action@<40-char-sha> # v2.3.4\n\
      \  with:\n    github-token: ${{ secrets.GITHUB_TOKEN }}"
