- local_id: auth-002
  threat_category_id: TH-03
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-798
  title: Hardcoded RSA Private Key — lib/insecurity.ts:23
  affected_parameter: null
  scenario: 'The RSA private key used to sign every session JWT is hardcoded as a string literal at lib/insecurity.ts:23,
    and authorize() signs tokens with it (lib/insecurity.ts:56). Because Juice Shop is open source, the key is in every clone.
    An attacker (ACT-D-01 needs only the public repo; ACT-D-06 sees it at build time) calls `jwt.sign({ data: { role: ''admin'',
    email: ''attacker@x'' } }, privateKey, { algorithm: ''RS256'' })` offline and presents the resulting token; updateAuthenticatedUsers()/isAuthorized()
    verify it against the matching public key and grant admin authority. No server interaction is needed to forge the token.'
  evidence_summary: The PEM private key is embedded as a literal const at lib/insecurity.ts:23 and consumed by authorize()
    at line 56.
  impact_description: Anyone can mint a token the server trusts as any user or role, defeating authentication entirely and
    bypassing every downstream isAuthorized/isAccounting/isDeluxe check.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The signing key is a checked-in constant; no KMS, env var, or secret store is used.
  mitigation_title: Move the JWT signing key out of source into a secret store and rotate it at lib/insecurity.ts:23
  remediation:
    effort: Medium
    steps:
    - Delete the literal at lib/insecurity.ts:23; load the private key from an environment variable or secret manager (e.g.
      `const privateKey = fs.readFileSync(process.env.JWT_PRIVATE_KEY_PATH, 'utf8')`).
    - Rotate the key pair so the published one is invalidated, and rotate the matching encryptionkeys/jwt.pub.
    - Add the key file path to .gitignore and inject it at deploy time; never commit signing material.
    - Restrict file permissions on the key (0400) and load it once at startup.
    code_example: "const privateKey = fs.readFileSync(process.env.JWT_PRIVATE_KEY_PATH!, 'utf8')\nexport const authorize =\
      \ (user = {}) =>\n  jwt.sign(user, privateKey, { expiresIn: '6h', algorithm: 'RS256' })"
    reference: CWE-798
