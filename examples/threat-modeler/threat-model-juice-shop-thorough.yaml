- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1357
  title: CI/CD Workflow Supply-Chain Risk — .npmrc:1
  affected_parameter: package-lock=false
  scenario: '`.npmrc:1` sets `package-lock=false`, and no `package-lock.json`/`npm-shrinkwrap.json` exists in the repo. Every
    CI job in `ci.yml` (coding-challenge-rsn, frontend/server/api-test, custom-config-test, e2e-test, smoke-test) and the
    Dockerfile installer stage run `npm install` (not `npm ci`), so npm re-resolves every semver range against the live public
    registry at build time. An attacker who publishes a malicious in-range version of any direct or transitive dependency
    (or wins a dependency-confusion race on an internal-looking name) gets their code pulled into the build without any integrity
    pin. The resolved tree also lands in the published `bkimminich/juice-shop` Docker image and GitHub Release archives, so
    the substitution reaches every downstream consumer. The cyclonedx SBOM generated at build time records whatever was resolved,
    but records it after the fact — it does not constrain resolution, so it provides visibility without integrity.'
  evidence_summary: '`.npmrc:1` disables lockfile generation and no lockfile is committed, so `npm install` in CI resolves
    version ranges non-deterministically.'
  impact_description: A malicious in-range dependency version executes in CI and is baked into the published Docker image
    and release artifacts consumed downstream.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: cyclonedx-npm SBOM generated during Docker build (post-resolution visibility only); Dependabot config
    present but legacy/ineffective (see ci-cd-pipeline-006)
  mitigation_title: Commit package-lock.json and switch CI/Docker installs to npm ci
  remediation:
    effort: Medium
    steps:
    - Remove `package-lock=false` from `.npmrc` (or set `package-lock=true`) and commit a generated `package-lock.json` for
      both root and `frontend/`.
    - Replace `npm install` with `npm ci` in every `ci.yml`, `release.yml`, and `Dockerfile` install step so builds fail on
      any lockfile drift.
    - Enforce registry integrity by keeping `--foreground-scripts` off and verifying the lockfile `integrity` (sha512) hashes
      are present for every dependency.
    - Gate the pipeline on `npm audit --audit-level=high` (or an SCA action) so newly-introduced vulnerable pins fail the
      build.
    code_example: "# ci.yml install step\n- name: Install application\n  run: npm ci --ignore-scripts\n"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Vulnerable_Dependency_Management_Cheat_Sheet.html
  evidence:
