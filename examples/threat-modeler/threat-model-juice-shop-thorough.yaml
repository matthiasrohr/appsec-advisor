  cwe: CWE-94
  title: Server-side code injection via orderLinesData eval (routes/b2bOrder.ts:23)
  affected_parameter: orderLinesData
  scenario: 'An authenticated caller POSTs to /b2b/v2/orders with a JSON body containing orderLinesData. The handler builds
    a sandbox object {safeEval, orderLinesData}, calls vm.createContext(sandbox), then vm.runInContext(''safeEval(orderLinesData)'',
    sandbox, {timeout: 2000}). The attacker-controlled string is passed straight to notevil''s safeEval with no validation,
    allow-list, or schema check (orderLinesData = body.orderLinesData || '''' at line 19). notevil 1.3.3 (package.json:139)
    is a known-bypassable JS interpreter: prototype-chain manipulation such as constructor.constructor escapes the interpreter
    and reaches the real Function/process object, yielding arbitrary JavaScript execution in the Node host process. This is
    the canonical Juice Shop rceChallenge / rceOccupyChallenge surface.'
  evidence_summary: Line 23 evaluates the user-supplied orderLinesData through notevil's safeEval inside vm.runInContext with
    no prior validation of the body field assigned at line 19.
  impact_description: Successful sandbox escape gives the attacker arbitrary code execution in the Node.js host process, equivalent
    to full server compromise (file read/write, env var theft, lateral movement).
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: A 2000ms execution timeout and notevil's safeEval are the only controls; notevil is intended to restrict
    expressions but version 1.3.3 is escapable via prototype-chain manipulation. The handler is gated behind the rceChallenge/rceOccupyChallenge
    enablement flag (line 18), not behind input validation.
  mitigation_title: Remove user-controlled eval from /b2b/v2/orders and parse orderLinesData as data, not code
  remediation:
    effort: Medium
    steps:
    - Eliminate the vm.runInContext('safeEval(orderLinesData)') call at routes/b2bOrder.ts:23 entirely — order line data is
      structured data and must never be evaluated as code.
    - 'Replace with strict schema parsing: define the expected order-line shape (e.g. a zod or joi schema for an array of
      {productId:number, quantity:number}) and JSON.parse + validate the input, rejecting anything that does not match.'
    - If a computed/expression field is genuinely required, restrict it to a non-Turing-complete expression evaluator with
      an explicit allow-list of operators and no access to constructor/prototype, and run it in an isolated worker (e.g. isolated-vm)
      rather than node:vm, which is not a security boundary.
    - Remove the notevil dependency once the eval path is gone.
    code_example: 'import { z } from ''zod''

      const OrderLine = z.object({ productId: z.number().int().positive(), quantity: z.number().int().positive() })

      const OrderLines = z.array(OrderLine).max(100)

      const parsed = OrderLines.safeParse(JSON.parse(body.orderLinesData ?? ''[]''))

      if (!parsed.success) return res.status(400).json({ error: ''invalid orderLinesData'' })

      // use parsed.data — never eval the string'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html
