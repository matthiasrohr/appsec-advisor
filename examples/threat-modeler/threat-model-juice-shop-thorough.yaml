  stride: Spoofing
  cwe: CWE-306
  title: Unauthenticated WebSocket Channel
  affected_parameter: null
  scenario: 'The Socket.IO server is created at registerWebsocketEvents.ts:20 with no authentication middleware — there is
    no `io.use(...)` handshake guard anywhere in the codebase (grep for `io.use` across lib/ returns zero hits). The `io.on(''connection'',
    ...)` callback at line 23 fires for any client that completes the WebSocket/long-poll handshake, regardless of session,
    JWT, or origin. An anonymous attacker opens `io(window.location.origin, {path:''/socket.io''})` from any page or a standalone
    script and is immediately treated as a fully-trusted client: it receives the `server started` and `challenge solved` streams
    (line 25, 30) and may invoke every registered event handler (lines 33-51). Because the channel shares port 3000 and origin
    with the REST API but enforces none of the REST API''s `insecurity.isAuthorized()` checks, it is a parallel, guard-free
    entry point into server-side state.'
  evidence_summary: registerWebsocketEvents.ts:20 constructs `new Server(server, {cors:{origin:'http://localhost:4200'}})`
    with no auth handshake, and no `io.use()` middleware exists anywhere in lib/.
  impact_description: Any unauthenticated network client gains full access to all Socket.IO events and the server-side handlers
    they drive, bypassing the REST tier's authorization.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. CORS origin is pinned to the dev frontend (http://localhost:4200) at registerWebsocketEvents.ts:20,
    but CORS is a browser-enforced read protection, not server-side authentication — non-browser clients ignore it entirely.
  mitigation_title: Add a Socket.IO handshake authentication middleware that validates the session JWT before accepting connections
  remediation:
    effort: Medium
    steps:
    - Register an `io.use((socket, next) => {...})` middleware in registerWebsocketEvents.ts before the `io.on('connection')`
      block. Read the JWT from `socket.handshake.auth.token` (set by the client) and verify it with the same `insecurity.verify()`
      used by the REST tier.
    - Reject the handshake with `next(new Error('unauthorized'))` when the token is absent or invalid, and attach the decoded
      principal to `socket.data.user` for downstream per-event authorization.
    - 'Update frontend Services/socket-io.service.ts to pass the bearer token via the `auth` option: `io(origin, { path, auth:
      { token } })`.'
    - Gate the per-connection notification replay (lines 29-31) and every `socket.on(...)` handler behind `socket.data.user`
      so unauthenticated sockets receive and trigger nothing.
    code_example: "io.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  const user = token && security.verify(token)\n\
      \  if (!user) return next(new Error('unauthorized'))\n  socket.data.user = user\n  next()\n})\nio.on('connection', (socket)\
      \ => { /* socket.data.user is now trusted */ })"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#websockets
