  stride: Spoofing
  cwe: CWE-290
  title: Wallet Ownership Spoofing on NFT verify
  affected_parameter: walletAddress
  scenario: POST /rest/web3/walletNFTVerify reads req.body.walletAddress at routes/nftMint.ts:41 and checks addressesMinted.has(metamaskAddress)
    with no signature or challenge proving the caller controls that address. addressesMinted is populated by an on-chain NFTMinted
    event listener (routes/nftMint.ts:24) keyed only by the minter address string. An anonymous attacker who observes any
    address that minted the NFT (public on-chain data) can replay that address to walletNFTVerify and have the server solve
    challenges.nftMintChallenge on their behalf, then the entry is deleted (line 43), denying the legitimate minter their
    solve. There is no binding between the HTTP caller's session/wallet and the asserted address.
  evidence_summary: walletNFTVerify trusts req.body.walletAddress as proof of mint without any signature challenge, while
    the verifying set is keyed only on a publicly observable on-chain address.
  impact_description: Any party can claim another wallet's mint by submitting its public address, spoofing ownership and griefing
    the real minter.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None on wallet-address ownership; the address is accepted from the request body verbatim with no signature
    verification.
  mitigation_title: Require signed nonce proving wallet control before honoring walletNFTVerify
  remediation:
    effort: Medium
    steps:
    - Issue a server-generated, single-use nonce bound to the user session; require the client to sign it with the wallet
      (personal_sign) and submit the signature alongside walletAddress.
    - Recover the signer with ethers verifyMessage(nonce, signature) and assert the recovered address === req.body.walletAddress
      before consulting addressesMinted.
    - Expire and invalidate the nonce on first use to prevent replay; bind the solved challenge to the authenticated user,
      not just the address string.
    code_example: "const { verifyMessage } = await import('ethers')\nconst signer = verifyMessage(req.session.web3Nonce, req.body.signature)\n\
      if (signer.toLowerCase() !== req.body.walletAddress.toLowerCase()) {\n  return res.status(401).json({ success: false\
      \ })\n}\n// nonce single-use\ndelete req.session.web3Nonce"
