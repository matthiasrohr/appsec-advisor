- local_id: auth-identity-010
  threat_category_id: TH-17
  additional_categories:
  - TH-03
  stride: Information Disclosure
  cwe: CWE-200
  title: Arbitrary Field Selection Leaks Sensitive User Data
  affected_parameter: fields
  scenario: retrieveLoggedInUser() at routes/currentUser.ts:11 lets the caller pick which user attributes are returned via
    req.query.fields (currentUser.ts:23). The loop at currentUser.ts:29-33 copies any requested field straight from user.data
    without an allowlist, so GET /rest/user/whoami?fields=password,totpSecret returns the caller's stored MD5 password hash
    and TOTP secret. The default branch (currentUser.ts:36) correctly omits these, but the fields parameter overrides that
    protection. The passwordHashLeakChallenge (currentUser.ts:52) confirms the password hash is reachable. Combined with the
    JSONP callback path (currentUser.ts:57), the data can also be exfiltrated cross-origin.
  evidence_summary: The fields query parameter is iterated with no allowlist at currentUser.ts:29-33, copying sensitive attributes
    (password hash, totpSecret) into the response.
  impact_description: An authenticated user retrieves their own MD5 password hash and TOTP secret, accelerating offline cracking
    and defeating 2FA.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: The no-fields default branch (currentUser.ts:36) restricts output, but is bypassed whenever fields is
    supplied.
  mitigation_title: Allowlist returnable fields in whoami and never expose password/totpSecret
  remediation:
    effort: Low
    steps:
    - Define an explicit allowlist of returnable fields (id, email, lastLoginIp, profileImage) and intersect requestedFields
      against it before copying.
    - Hard-exclude password and totpSecret from any response regardless of the fields parameter.
    - Disable the JSONP callback path (currentUser.ts:57) or restrict it, since it enables cross-origin exfiltration of the
      response.
    code_example: "const ALLOWED = new Set(['id','email','lastLoginIp','profileImage'])\nfor (const field of requestedFields)\
