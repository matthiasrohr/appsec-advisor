  title: SSRF — routes/profileImageUrlUpload.ts:24
  affected_parameter: imageUrl
  scenario: POST /profile/image/url passes the user-supplied `req.body.imageUrl` directly into `fetch(url)` at routes/profileImageUrlUpload.ts:24
    with no scheme restriction, no host allowlist, and no private-IP/link-local blocklist (grep for allowlist/isPrivateIP/169.254/metadata
    returned zero hits). An authenticated low-priv user submits `imageUrl=http://169.254.169.254/latest/meta-data/iam/security-credentials/`
    or `http://localhost:6379/` to reach the cloud metadata endpoint or internal services. The fetched body is streamed to
    disk (line 30) and, on the catch path, the raw URL is stored as the profileImage (line 36) leaking the response indirectly;
    internal service responses can also surface via timing/error differences.
  evidence_summary: fetch() is called on a raw user-controlled URL string with no destination validation between request parsing
    (line 19) and the network call (line 24).
  impact_description: Authenticated attacker reaches internal-only services and cloud metadata (IAM credentials), enabling
    lateral movement and privilege escalation into the hosting account.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Caller must have a valid session token (security.authenticatedUsers.get at line 21); otherwise request
    is rejected. No network-level egress restriction is applied in code.
  mitigation_title: Validate imageUrl against an https-only host allowlist and block private/link-local ranges before fetch
  remediation:
    effort: Medium
    steps:
    - Parse imageUrl with `new URL()` and reject any scheme other than https; reject if the resolved host is a literal IP
      in RFC1918, 127.0.0.0/8, 169.254.0.0/16, or ::1.
    - Resolve the hostname to its A/AAAA records and re-check the resolved address against the blocklist to defeat DNS-rebinding
      before issuing fetch.
    - Disable redirect following (fetch redirect:'error') so a permitted host cannot 302 the request to an internal target.
    - Cap the download with an AbortController + byte counter on the stream piped at line 30.
    code_example: 'const u = new URL(imageUrl)

