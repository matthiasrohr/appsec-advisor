- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Fork-PR npm lifecycle scripts execute with live secrets in CI — ci.yml:167
  affected_parameter: package.json postinstall
  scenario: The api-test and e2e-test jobs trigger on the pull_request event and, for fork PRs that match the ubuntu-latest
    + node-24 guard (ci.yml:152-163, :253-267), check out the fork's head commit and run `npm install` (ci.yml:160) followed
    by `npm start` (ci.yml:259) on attacker-controlled code. The root package.json defines `postinstall = cd frontend && npm
    install && cd .. && npm run build:frontend ...` (package.json), and `npm install` here is NOT invoked with `--ignore-scripts`
    (unlike the lint and bundle-analysis jobs which correctly use `--ignore-scripts` at ci.yml:36-38). A forked contributor
    can therefore replace the postinstall script in their PR branch to run arbitrary shell on the runner. The api-test job
    injects `ALCHEMY_API_KEY` (ci.yml:167) and e2e-test injects `SOLUTIONS_WEBHOOK`, `ALCHEMY_API_KEY`, `CYPRESS_RECORD_KEY`
    and `GITHUB_TOKEN` (ci.yml:264-267, :280-282) into the same step environment. If the repository's 'send secrets to fork
    PR workflows' setting is enabled (or the attacker is a prior contributor whose PR runs without fork restrictions), the
    malicious postinstall exfiltrates those secrets. Even without secrets, arbitrary code runs on a shared runner against
    the build environment.
  evidence_summary: api-test and e2e-test run `npm install` (no --ignore-scripts) on fork-checked-out code while passing repo
    secrets into the step env, and package.json defines an attacker-replaceable postinstall.
  impact_description: A fork pull request can execute arbitrary code on the CI runner and, depending on the fork-secret setting,
    exfiltrate ALCHEMY_API_KEY, CYPRESS_RECORD_KEY, SOLUTIONS_WEBHOOK and GITHUB_TOKEN.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 'Fork test jobs are gated to a single ubuntu-latest/node-24 matrix cell via the `if: github.repository
    != ''juice-shop/juice-shop'' && ...` guards. The lint, smoke-test-adjacent and bundle-analysis jobs do use `npm install
    --ignore-scripts`. GitHub''s default fork-PR secret policy withholds secrets unless explicitly enabled.'
  mitigation_title: Run fork-PR test jobs with --ignore-scripts and strip repo secrets from pull_request-triggered steps
  remediation:
    effort: Medium
    steps:
    - Change every `npm install` in the api-test, e2e-test, server-test, frontend-test and coding-challenge-rsn jobs to `npm
      install --ignore-scripts` so fork postinstall hooks never run (ci.yml:65, :85, :124, :161, :252).
    - 'Remove `ALCHEMY_API_KEY`, `CYPRESS_RECORD_KEY`, `SOLUTIONS_WEBHOOK` and `GITHUB_TOKEN` from steps that execute on the
      `pull_request` event; gate any secret-bearing integration test behind `if: github.event_name == ''push''` or a separate
      `pull_request_target` job that does not check out fork code.'
    - In repository Settings > Actions, confirm 'Run workflows from fork pull requests' does not forward secrets, and require
      approval for first-time contributors.
    - 'Add `permissions: contents: read` at the job level to drop the default write-scoped GITHUB_TOKEN on PR runs.'
    code_example: "- name: \"Install application\"\n  run: npm install --ignore-scripts\n# secret-bearing integration tests\
      \ only on trusted push events:\n- name: \"Execute integration tests\"\n  if: github.event_name == 'push'\n  env:\n \
      \   ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}"
    reference: https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
