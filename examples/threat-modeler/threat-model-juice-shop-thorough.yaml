  title: Wallet Ownership Spoofing — routes/nftMint.ts:41
  affected_parameter: walletAddress
  scenario: walletNFTVerify (routes/nftMint.ts:41) and contractExploitListener (routes/web3Wallet.ts:15) both read the Ethereum
    address from req.body.walletAddress and treat it as a proven identity — nftMint.ts:42 checks addressesMinted.has(metamaskAddress)
    and web3Wallet.ts:27 checks walletsConnected.has(exploiter) against the on-chain event emitter. No signature challenge
    (e.g. EIP-191 personal_sign / SIWE nonce) is ever requested, so the backend has no cryptographic proof the caller controls
    the address. An attacker who learns or guesses any address that legitimately minted the NFT or triggered the on-chain
    ContractExploited event simply POSTs that address to claim credit, spoofing wallet ownership without holding the private
    key.
  evidence_summary: nftMint.ts:41 and web3Wallet.ts:15 take walletAddress straight from req.body and use it as the trusted
    identity key for Set membership, with no nonce-signature verification anywhere in the handlers.
  impact_description: An attacker can impersonate any wallet address by replaying it in the request body, claiming challenge
    completion or exploit credit they never performed on-chain.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. Membership is keyed purely on the client-supplied address string.
