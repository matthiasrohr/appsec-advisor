components:
- id: backend-api
  name: Express REST API Backend
  description: Node.js/Express server (server.ts → app.ts) handling REST endpoints at /rest/* and /api/*, business logic,
    product catalog, baskets, orders, payments, and admin routes. Primary internet-facing attack surface.
  paths:
  - server.ts
  - app.ts
  - routes/**
  - config/**
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: true
  responsibilities:
  - REST API request handling for all features
  - Business-logic orchestration (orders, baskets, payments)
  - Admin and privileged route handling
  - Static file and FTP directory serving
  threat_ids:
  - T-004
  - T-005
  - T-007
  - T-008
  - T-030
  - T-045
  - T-047
  - T-048
  - T-051
  - T-052
  - T-058
  - T-062
  - T-063
  - T-076
- id: security-core
  name: Security Core (lib/insecurity.ts)
  description: Central security helper hub providing JWT issuance/verification, password hashing, HMAC, HTML sanitizers, redirect
    allowlist, and role-check middleware. Co-locates signing key with signing and verification code.
  paths:
  - lib/insecurity.ts
  - lib/utils.ts
  - lib/webhook.ts
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - internet
  - dmz
  handles_sensitive_data: true
  responsibilities:
  - JWT sign (RS256) and verify (jws)
  - Password hashing (MD5) and HMAC
  - Auth/role middleware (isAuthorized, isAccounting, isDeluxe)
  - HTML sanitization and redirect allowlist
  threat_ids:
  - T-010
  - T-020
  - T-021
  - T-022
  - T-029
  - T-043
  - T-056
  - T-061
  - T-080
- id: data-persistence
  name: Data Persistence Layer
  description: Sequelize 6 + SQLite relational models plus MarsDB in-memory NoSQL-style collections (orders, reviews). Includes
    raw SQL query construction and ORM model definitions.
