  title: Authorization Decisions on Unverified Decoded Claims
  affected_parameter: null
  scenario: isAccounting() (insecurity.ts:156), isDeluxe() (insecurity.ts:166), and isCustomer() (insecurity.ts:171) gate
    access using decode(jwtFrom(req)).data.role after the broken verify() (auth-identity-002). The pattern verify(token) &&
    decode(token) returns false-on-failure but, because verify accepts alg:none and the signing key is public, the decoded
    role claim is fully attacker-controlled. An attacker presents a forged token with data.role of 'accounting' to reach accounting-only
    endpoints (e.g. order management), or 'admin' elsewhere, escalating from any authenticated context to privileged roles.
    The role check is the only authorization gate; there is no second server-side check against a trusted user record.
