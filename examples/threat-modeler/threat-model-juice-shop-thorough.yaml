  - T-042
  - T-052
  - T-058
  - T-059
  - T-065
- id: web3-nft
  name: Web3 / Wallet / NFT Surface
  description: Blockchain/web3 endpoints handling wallet addresses, NFT minting, and on-chain key material (ethers). Internet-facing
    crypto-asset surface with its own key-handling and ownership-verification trust boundary.
  paths:
  - routes/checkKeys.ts
  - routes/nftMint.ts
  - routes/redirect.ts
  - routes/web3Wallet.ts
  tier: application
