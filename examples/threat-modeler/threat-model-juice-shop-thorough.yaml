  - docker-container
  handles_sensitive_data: false
  threat_ids:
  - T-023
  - T-048
  - T-056
- id: ci-cd-pipeline
  name: CI/CD & Source-Contribution Integrity
  description: GitHub Actions workflows (lint/test/build/release/CodeQL), GitLab CI reference, Dockerfile multi-stage build,
    and the public-repo pull-request contribution surface. Unpinned third-party actions, missing workflow permissions blocks,
