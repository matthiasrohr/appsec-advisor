mitigations:
- id: M-001
  title: Establish dependency-update SLA and automated scanning policy
  threat_ids:
  - T-001
  priority: P2
  severity: Critical
  effort: Low
  kind: review
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Use UserModel.findOne({ where: { email: req.body.email, password: security.hash(req.body.password) } }) instead of
    a hand-built SQL string so Sequelize binds parameters. If raw SQL is unavoidable, use replacements: models.sequelize.query(sql,
    { replacements: { email, pwd }, type: QueryTypes.SELECT }). Add server-side validation that email matches an RFC 5322
    pattern before the lookup.'
  remediation:
    effort: Medium
    steps:
    - Enable Dependabot or Renovate for automated dependency PRs
    - 'Define SLA: Critical CVE patches within 48h, High within 7d, Medium within 30d'
    - Add lockfile (package-lock.json or yarn.lock) and enforce --frozen-lockfile in CI
    - Configure weekly npm audit in CI pipeline with failure on Critical/High
    - Pin all direct dependencies to exact versions in package.json
- id: M-002
  title: Implement centralized input validation and output encoding middleware
  threat_ids:
  - T-002
  priority: P1
  severity: Critical
  effort: Low
  kind: investigate
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: In the POST /api/Users pre-handler (server.ts:408), delete req.body.role (and req.body.deluxeToken) before the finale
    resource processes it. Set role server-side to 'customer' on the created model regardless of input; promote to admin only
    through an authenticated admin-only endpoint. Add an integration test asserting that POST /api/Users with role:'admin'
    yields a customer account.
  remediation:
    effort: High
    steps:
    - Introduce express-validator or Joi middleware for all request bodies and query params
    - Enforce parameterized queries via Sequelize ORM — ban Sequelize.literal() with user input
    - Add helmet.js with strict CSP headers to all Express routes
    - 'Centralize output encoding: use DOMPurify on the Angular frontend for any innerHTML binding'
    - Add integration tests asserting SQL/NoSQL injection payloads return 400, not 200
- id: M-003
  title: Return sanitized errors and gate verbose handler to development
  threat_ids:
  - T-003
  priority: P2
  severity: High
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Only register errorhandler() when process.env.NODE_ENV === ''development''. Add a production error middleware that
    logs the full error server-side and returns a generic { error: ''Internal Server Error'' } with a correlation id. Ensure
    SQL and validation errors are mapped to non-revealing messages before the response.'
- id: M-004
  title: Add per-client rate limiting to /b2b/v2/orders and lower the evaluation timeout
  threat_ids:
  - T-004
  priority: P2
  severity: High
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Apply express-rate-limit to the /b2b/v2 mount (server.ts:424 area), keyed on the authenticated client id, e.g. max
    20 requests per minute. Once orderLinesData is parsed as data rather than evaluated (b2b-api-001), the 2000ms CPU window
    disappears entirely; until then, reduce the vm timeout to the smallest workable value. Cap the accepted orderLinesData
    payload size with an explicit body-size limit for this route.
- id: M-005
  title: Add an explicit auth middleware (isAuthorized() / passport.authenticate() / requireAuth) to the route registration,
    or mark the route intentionally public via app.get(...) for read-only access only.
  threat_ids:
  - T-005
  priority: P2
  severity: High
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-006
  title: Enforce role authorization on every backend endpoint; treat client guards as UI hints only
  threat_ids:
  - T-006
  priority: P2
  severity: High
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Implement server-side authorization middleware on every privileged `/api/*` and `/rest/*` route that verifies the JWT
    signature and checks the role claim — never rely on the Angular guard. Keep the client guards for UX but document that
    they are not a trust boundary; verify the JWT signature server-side before honoring any role. Add automated tests that
    call privileged endpoints directly (no UI) with non-admin and forged tokens and assert 401/403.
- id: M-007
  title: Load the JWT signing key from a secret manager and rotate the leaked key
  threat_ids:
  - T-007
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Remove the inline PEM at lib/insecurity.ts:21 and read the private key from an environment variable or secret manager
    (AWS KMS, HashiCorp Vault) at startup; never commit key material. Generate a fresh RSA keypair, replace encryptionkeys/jwt.pub,
    and invalidate all tokens signed with the old key (purge git history of the leaked key with git filter-repo). Add a CI
    secret-scanning gate (gitleaks/trufflehog) to block future committed keys.
- id: M-008
  title: Pin JWT verification to RS256 and reject alg:none in lib/insecurity.ts
  threat_ids:
  - T-008
  priority: P1
  severity: Critical
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Replace the raw jws.verify call with jwt.verify(token, publicKey, { algorithms: [''RS256''] }) so the algorithm is
    server-controlled, not header-controlled. Explicitly reject tokens whose header alg is ''none'' or any HMAC variant before
    decoding. Audit all callers of decode() (isAccounting, isDeluxe, isCustomer, routes/currentUser.ts, routes/2fa.ts) to
    ensure they verify before trusting claims.'
- id: M-009
  title: Stop deriving passwords from the email claim; provision OAuth accounts without a guessable password
  threat_ids:
  - T-009
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Do not set or compute a user-facing password during OAuth provisioning. Mark OAuth accounts as federated and disable
    password login for them on the backend. If a credential placeholder is unavoidable, generate it server-side with a CSPRNG
    (e.g. 32 random bytes) and never echo it to the client or derive it from any claim. Bind the local session strictly to
    a verified OAuth token exchange performed server-side, so possession of the email alone never yields authentication.
- id: M-010
  title: Replace req.body.UserId/userId/ownerId with req.user.id (or equivalent session-derived identity) in every WHERE/filter
    clause.
  threat_ids:
  - T-010
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-011
  title: Replace MD5 password hashing with per-user salted bcrypt/argon2 in the User model setter
  threat_ids:
  - T-011
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Replace security.hash() in the password setter (models/user.ts:76) with an adaptive password hash: bcrypt (cost >=
    12) via the existing bcryptjs dependency, or argon2id. Store the full algorithm-tagged hash string (e.g. $2b$12$...) so
    salt and cost travel with the value; drop the MD5 path in lib/insecurity.ts:41 for credential use. Add a transparent rehash-on-login
    migration: on successful authentication, if the stored hash is legacy MD5, recompute with bcrypt and update the row. Verify
    the login comparison path uses a constant-time verify (bcrypt.compare) rather than re-hashing and string-equality.'
- id: M-012
  title: Disable DTD loading and external-entity resolution in parseXmlString
  threat_ids:
  - T-012
  priority: P1
  severity: Critical
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Remove XML_PARSE_NOENT and XML_PARSE_DTDLOAD from the ParseOption bitmask at lib/xml.ts:35 — parse with entity substitution
    and DTD loading off so SYSTEM/file:// entities never resolve. Delete the xmlRegisterFsInputProviders() call at lib/xml.ts:21
    so the WASM parser has no host filesystem access. Stop reflecting the parsed XML back to the caller: replace utils.trunc(xmlString,
    400) in the routes/fileUpload.ts:79 error with a static message so even residual entity content is not disclosed. Add
    security.isAuthorized() in front of POST /file-upload at server.ts:309 to remove the anonymous attack path.'
- id: M-013
  title: Replace safeEval/vm evaluation of orderLinesData with a declarative JSON parser and schema validation
  threat_ids:
  - T-013
  priority: P1
  severity: Critical
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Stop evaluating orderLinesData as code. Treat it as structured data: parse with JSON.parse inside try/catch and reject
    non-conforming input. Validate the parsed object against an explicit schema (e.g. ajv or zod) describing the allowed order-line
    fields and types; reject anything else with HTTP 400. If a sandbox is truly required, do not use notevil or a bare node:vm
    context — these are not security boundaries. Use a separate locked-down worker process with no module access, or remove
    the evaluation entirely. Remove the notevil dependency (package.json:139) once the eval path is gone.'
- id: M-014
  title: Add per-account and per-IP rate limiting plus lockout to the login route
  threat_ids:
  - T-014
  priority: P2
  severity: High
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Add express-rate-limit middleware to /rest/user/login keyed on req.ip with a low max per window. Add a per-account
    failed-attempt counter that triggers temporary lockout or exponential backoff after N failures. Trigger CAPTCHA after
    a small number of failures to raise the cost of automated attacks.
- id: M-015
  title: Sign 2FA step-up tokens with a dedicated key and bind them to a server-side session
  threat_ids:
  - T-015
  priority: P2
  severity: High
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Sign tmpToken and setupToken with a separate, secret-managed key distinct from session tokens, and verify with an RS256-pinned
    verifier (see auth-identity-002). Bind the tmpToken to a server-side pending-login record (created only after password
    verification) and consume it single-use, so a forged token has no matching session. Persist and verify the TOTP setup
    secret server-side rather than trusting the client-presented setupToken payload (2fa.ts:115).
- id: M-016
  title: Require an emailed single-use reset token instead of a security-question answer
  threat_ids:
  - T-016
  priority: P2
  severity: High
  effort: Medium
