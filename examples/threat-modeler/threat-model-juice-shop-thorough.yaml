  title: OAuth password derived deterministically from email — oauth.component.ts:30
  affected_parameter: email
  scenario: 'After OAuth login, OAuthComponent computes a local account password as `btoa(profile.email.split('''').reverse().join(''''))`
    (oauth.component.ts:30, repeated at line 46) — base64 of the user''s email reversed. This value is saved as the account
    password via userService.save() and reused on the normal password login endpoint. The password is therefore a pure, public
    function of the email address: any attacker who knows a victim''s email can compute their exact password offline (`btoa(reverse(email))`)
    and authenticate through the standard /rest/user/login form without ever touching the OAuth provider. This turns the email
    — a non-secret identifier — into the sole authentication factor and creates a parallel-auth bypass around the OAuth trust
    boundary.'
  evidence_summary: The account password is `btoa(profile.email.split('').reverse().join(''))`, a reversible deterministic
    transform of the public email.
  impact_description: Full account takeover of any OAuth-provisioned user by anyone who knows the target email address.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The derived password is generated and stored client-side and accepted by the password login path.
  mitigation_title: Stop deriving passwords from email and provision OAuth accounts without a guessable password credential
  remediation:
    effort: Medium
    steps:
    - Remove the `btoa(reverse(email))` password derivation in oauth.component.ts entirely.
    - Provision OAuth-linked accounts server-side with no password credential, or generate a high-entropy random secret that
      is never derived from user-visible identifiers and never returned to the client.
    - Mark OAuth-provisioned accounts so the password login path rejects password authentication for them.
    - Rotate/invalidate any existing accounts whose password equals btoa(reverse(email)).
    code_example: '// server-side: create federated user with NO password login

      await User.create({ email, provider: ''oauth'', passwordHash: null })

      // password login guard

      if (user.provider === ''oauth'') return reject(''use OAuth to sign in'')'
