  stride: Information Disclosure
  cwe: CWE-311
  title: SQLite Database File Stored Without Encryption at Rest (models/index.ts:38)
  affected_parameter: null
  scenario: 'The Sequelize connection at `models/index.ts:38` stores the database to the plain file path `data/juiceshop.sqlite`
    with no encryption option (`cipher`, `key`). The file contains the full `Users` table including MD5-hashed passwords,
    plaintext `totpSecret` values, `deluxeToken` values, payment card numbers (`cardNum` stored as INTEGER in `Cards`), home
    addresses, and wallet balances. An attacker who achieves any of: container escape, SSRF targeting `file:///data/juiceshop.sqlite`,
    or host filesystem compromise can copy and read the entire database without any SQLite-level authentication challenge.'
  evidence_summary: '`models/index.ts:38` specifies `storage: ''data/juiceshop.sqlite''` with no `dialectOptions.encrypt`
    or SQLCipher configuration, leaving the file readable by any OS process with filesystem access.'
  impact_description: Complete exfiltration of all PII, credentials, TOTP secrets, and payment card numbers stored in the
    application database.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: OS file permissions are the only barrier; no database-level encryption or at-rest key management.
  mitigation_title: Enable SQLCipher encryption on the SQLite database file and restrict filesystem permissions
  remediation:
    effort: High
    steps:
    - 'Replace `sqlite3` with `@journeyapps/sqlcipher` (SQLCipher fork) and pass `dialectOptions: { key: process.env.SQLITE_KEY
      }` to the Sequelize constructor.'
    - Set `SQLITE_KEY` as a deployment secret (e.g. Kubernetes Secret, AWS Secrets Manager) — never hardcode.
    - Restrict the `data/` directory to `chmod 700` owned by the Node.js process UID; ensure the container runs as a non-root
      user.
    - Move `totpSecret` to a separate table or encrypt at the application layer using AES-256-GCM before storage.
    code_example: "// models/index.ts — SQLCipher config\nconst sequelize = new Sequelize('database', 'username', 'password',\
      \ {\n  dialect: 'sqlite',\n  storage: 'data/juiceshop.sqlite',\n  dialectOptions: { key: process.env.SQLITE_KEY }\n\
      })"
