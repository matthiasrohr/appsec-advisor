- local_id: auth-service-010
  threat_category_id: TH-02
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-290
  title: Rate Limiter Keyed on Spoofable Forwarded Header — server.ts:346
  affected_parameter: X-Forwarded-For
  scenario: 'The only brute-force control on password reset uses a rate-limit keyGenerator that trusts the client-supplied
    X-Forwarded-For header: keyGenerator returns headers[''X-Forwarded-For''] ?? ip at server.ts:346, and app.enable(''trust
    proxy'') at server.ts:342 makes Express honor it. An attacker rotates a fresh X-Forwarded-For value on every request,
    so each request lands in its own rate-limit bucket and the windowMs/max ceiling never trips. This nullifies the throttle
    protecting the guessable security-question reset (auth-service-005), enabling unbounded answer-guessing, and lets a single
    host exhaust the reset pipeline for denial of service.'
  evidence_summary: server.ts:346 keys the reset-password limiter on the attacker-controlled X-Forwarded-For header (with
    trust proxy enabled at :342), so per-attacker limits are trivially evaded.
  impact_description: Complete bypass of the reset-password rate limit, enabling unthrottled security-answer brute force and
    reset-endpoint flooding.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: A rate limiter exists (windowMs 5min, max 100) but its key is attacker-controlled, rendering it ineffective.
  mitigation_title: Key the rate limiter on a trusted client identifier, not a client-supplied header
  remediation:
    effort: Low
    steps:
    - Change the keyGenerator at server.ts:346 to use the connecting socket IP (req.ip resolved from a fixed number of trusted
      proxy hops), not raw X-Forwarded-For.
    - Configure app.set('trust proxy', <n>) to the exact known proxy hop count so Express derives req.ip from only the trusted
      segment of the forwarded chain.
    - Add a per-account reset attempt counter as a second, header-independent throttle.
    code_example: 'app.set(''trust proxy'', 1)

      rateLimit({ windowMs: 5*60_000, max: 100, keyGenerator: (req) => req.ip })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
