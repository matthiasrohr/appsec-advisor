  title: XXE — routes/fileUpload.ts:83
  affected_parameter: file (multipart/form-data, .xml files)
  scenario: 'handleXmlUpload() passes uploaded XML to `libxml.parseXml(data, { noent: true, ... })` with external entity expansion
    enabled. An attacker uploads an XML file containing `<!DOCTYPE foo [<!ENTITY xxe SYSTEM ''file:///etc/passwd''>]><foo>&xxe;</foo>`.
    The libxmljs2 parser resolves the entity, inserting the file content. The error handler at line 87 returns the parsed
    XML content directly in the response body (utils.trunc(xmlString, 400)), leaking up to 400 characters of the target file.
    The same mechanism works for SSRF to internal HTTP endpoints.'
  evidence_summary: 'libxml.parseXml() at fileUpload.ts:83 is called with `{ noent: true }`, and the resulting xmlString (up
    to 400 chars) is concatenated into the error response at line 87.'
  impact_description: Attacker reads arbitrary server-side files (e.g., /etc/passwd, application source, private keys) via
    the error message response, or probes internal network services.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Output is truncated to 400 characters; a vm sandbox wraps the parse call but does not restrict libxml
    entity resolution.
  mitigation_title: Set noent:false in libxmljs2 parse options and remove file content from error responses
  remediation:
    effort: Low
    steps:
    - 'Change `{ noent: true }` to `{ noent: false }` at fileUpload.ts:83. This disables external entity resolution.'
    - Remove `xmlString` from the error response at line 87 — return only a static deprecation message without parsed content.
    - 'Consider replacing libxmljs2 with a JavaScript-native XML parser that does not support external entities by default
      (e.g., fast-xml-parser with `processEntities: false`).'
    code_example: '// fileUpload.ts

      const xmlDoc = vm.runInContext(''libxml.parseXml(data, { noblanks: true, noent: false, nocdata: true })'', sandbox,
      { timeout: 2000 })

      // Error response: omit xmlString

      next(new Error(''B2B customer complaints via file upload have been deprecated for security reasons ('' + file.originalname
      + '')''))'
    reference: CWE-611
