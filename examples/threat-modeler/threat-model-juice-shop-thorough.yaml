- local_id: ci-cd-pipeline-003
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-494
  title: Heroku CLI Installed via curl pipe sh Without In… (.github/workflows/ci.yml:326)
  affected_parameter: null
  scenario: 'The `heroku` deployment job in `.github/workflows/ci.yml` (line 326) installs the Heroku CLI by downloading and
    executing a remote shell script: `curl https://cli-assets.heroku.com/install.sh | sh`. This pattern downloads content
    over HTTPS from Heroku''s CDN at pipeline runtime and pipes it directly to a shell interpreter without verifying any checksum
    or cryptographic signature. If Heroku''s CDN is compromised, the domain is hijacked, or the TLS certificate is mis-issued,
    an attacker can serve a modified `install.sh` that executes arbitrary commands on the runner with access to all secrets
    in scope for the `heroku` job: `HEROKU_API_KEY`, `DOCKERHUB_USERNAME`, `DOCKERHUB_TOKEN`, and `GITHUB_TOKEN`. This job
    runs on pushes to `develop` and `master` branches, meaning it executes after code merges to production-destined branches.'
  evidence_summary: Line 326 of `ci.yml` executes `curl https://cli-assets.heroku.com/install.sh | sh` with no `--sha256`
    or signature verification, embedding a runtime remote-code-execution point in the deployment path.
  impact_description: A compromised Heroku CDN response delivers a backdoored installer that exfiltrates `HEROKU_API_KEY`,
    `DOCKERHUB_TOKEN`, and `GITHUB_TOKEN`, enabling an attacker to deploy arbitrary Docker images to production and push to
    DockerHub.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: The `heroku` job is gated on successful completion of `test`, `api-test`, `e2e`, and `custom-config-test`
    jobs, limiting execution to code that passed all tests. HTTPS is used for the download.
  mitigation_title: Replace curl-pipe-sh Heroku install with a SHA-pinned pre-built binary download in ci.yml
  remediation:
    effort: Medium
    steps:
    - Replace the `curl https://cli-assets.heroku.com/install.sh | sh` step with a direct download of the Heroku CLI tarball
      at a pinned version, then verify the SHA-256 checksum published in Heroku's release manifest before extracting.
    - Alternatively, use the official `heroku/deploy-to-heroku` GitHub Action pinned to a SHA instead of the `akhileshns/heroku-deploy`
      action and remove the CLI install step entirely. The `akhileshns/heroku-deploy@581dd286c962b6972d427fcf8980f60755c15520`
      action is already SHA-pinned.
    - 'Scope the `heroku` job''s permissions explicitly with `permissions: contents: read` to prevent the GITHUB_TOKEN from
      being used for repository writes even if the job is compromised.'
    code_example: "# Pinned binary download with checksum verification\n- name: \"Install Heroku CLI\"\n  run: |\n    HEROKU_VERSION=9.5.0\n\
      \    HEROKU_SHA256=<sha256_from_release_manifest>\n    curl -sL https://cli-assets.heroku.com/heroku-linux-x64.tar.gz\
      \ -o heroku.tar.gz\n    echo \"${HEROKU_SHA256}  heroku.tar.gz\" | sha256sum -c -\n    tar -xzf heroku.tar.gz"
    reference: CWE-494
  evidence:
