  stride: Information Disclosure
  cwe: CWE-22
  title: Poison-null-byte path read bypass in FTP file server (routes/fileServer.ts:33)
  affected_parameter: file
  scenario: 'GET /ftp/:file resolves the requested name with path.resolve(''ftp/'', file) at fileServer.ts:33 and serves it
    via res.sendFile. The forward-slash block (line 18) and the .md/.pdf allowlist (line 53) are the only guards, but cutOffPoisonNullByte
    (line 28) truncates the filename at the first %00 BEFORE the file is read. An attacker requests /ftp/package.json.bak%2500.md
    or /ftp/encrypt.pyc%2500.md: the allowlist passes because the string ends in .md, then the null byte strips the suffix
    and sendFile returns the real backup/source/key file inside ftp/ (e.g. coupons_2013.md.bak, suspicious_errors.yml, the
    kdbx keystore). This exposes non-allowlisted sensitive files staged in the ftp/ directory, including credential and backup
    artifacts.'
  evidence_summary: cutOffPoisonNullByte at fileServer.ts:28 truncates the name at %00 after the extension allowlist check,
    so path.resolve('ftp/', file) at line 33 serves the pre-truncation arbitrary-extension file.
  impact_description: Anonymous users download non-allowlisted sensitive files (source backups, key stores, config dumps)
    staged in ftp/, leaking credentials and intellectual property.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Forward-slash rejection (line 18) blocks classic ../ traversal; .md/.pdf allowlist (line 53). Both are
    defeated by the null-byte truncation that runs after the allowlist check.
  mitigation_title: Remove poison-null-byte truncation and enforce extension allowlist on the post-decode filename
  remediation:
    effort: Low
    steps:
    - Delete the cutOffPoisonNullByte call so the filename is never silently truncated after validation; reject any name containing
      a NUL or %00 sequence outright with a 400.
    - Re-derive and re-check the extension on the exact byte string passed to res.sendFile, after URL-decoding, so the allowlist
      and the served path can never diverge.
    - 'Constrain the resolved path to the ftp/ root: compute path.resolve(''ftp'', file) and verify it startsWith path.resolve(''ftp'')
      + path.sep before sendFile.'
    code_example: 'const decoded = decodeURIComponent(file)

      if (decoded.includes(''\u0000'')) return res.sendStatus(400)

      if (!/\.(md|pdf)$/i.test(decoded)) return res.sendStatus(403)

      const abs = path.resolve(''ftp'', decoded)

