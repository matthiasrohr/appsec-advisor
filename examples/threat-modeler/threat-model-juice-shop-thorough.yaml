threats:
- local_id: frontend-spa-004
  threat_category_id: TH-11
  additional_categories:
  - TH-01
  stride: Tampering
  cwe: CWE-79
  title: DOM and Stored XSS — search-result.component.ts:143
  affected_parameter: q
  scenario: filterTable() reads the `q` query parameter from the route and passes it through `this.sanitizer.bypassSecurityTrustHtml(queryParam)`
    into `this.searchValue` (search-result.component.ts:143), which is rendered with `[innerHTML]="searchValue"` (search-result.component.html:11).
    Section 7.10 reports `frontend-unsafe-html-sink` and Section 9 lists 35 category-19 XSS findings. `bypassSecurityTrustHtml`
    disables Angular's built-in sanitizer, so an attacker who lures a victim to `/#/search?q=<img src=x onerror=...>` executes
    arbitrary script in the victim's origin — and because the JWT lives in localStorage (see frontend-spa-005), that script
    can exfiltrate the session token. The same unsafe sink also taints product descriptions (search-result.component.ts:110),
    enabling stored XSS from server-supplied review/description content.
  evidence_summary: search-result.component.ts:143 wraps the attacker-controlled `q` param in bypassSecurityTrustHtml and
    binds it to [innerHTML] at search-result.component.html:11.
  impact_description: Arbitrary script executes in the victim's session, enabling localStorage JWT theft, account takeover,
    and actions performed as the victim.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Angular's default DomSanitizer would neutralise this, but it is explicitly disabled here via bypassSecurityTrustHtml.
  mitigation_title: Remove bypassSecurityTrustHtml on user/content-derived values; render search term as text
  remediation:
    effort: Low
    steps:
    - Delete the bypassSecurityTrustHtml call at search-result.component.ts:143 and bind the raw search term with text interpolation
      `{{ searchValue }}` instead of [innerHTML].
    - For product descriptions (search-result.component.ts:110), drop bypass and rely on Angular's default sanitizer, or sanitize
      server-side with a maintained allowlist library.
    - Audit all other bypassSecurityTrustHtml sinks (about, administration, last-login-ip, track-result, data-export, score-board)
      and remove those operating on untrusted data.
    code_example: '// search-result.component.ts

      this.searchValue = queryParam // plain string

      // search-result.component.html

      <span id="searchValue">{{ searchValue }}</span>'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
  evidence:
  - file: frontend/src/app/search-result/search-result.component.ts
    line: 143
  evidence_check: verified
  prior_finding_ref: null
  architectural_violation: true
  component_name: frontend-spa
  source: stride
  merged_from:
  - frontend-spa
  evidence_flags:
  - flag_id: EV-011
    verdict: verified
    reason: 'Found pattern: bypassSecurityTrustHtml'
    line_excerpt: '      this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam) // v'
    verified_at: '2026-06-25T10:35:43.343699+00:00'
  id: T-001
  component: frontend-spa
  effective_severity: Critical
  breach_distance: 2
  chain_role: keystone
  compound_chain_ids:
  - CC-01
  verified_chain_ids: []
  poc_hint: 'POST /search-result.component with {q: "<svg onload=alert(1)>"}  (XSS payload)'
  mitigation_ids:
  - M-017
