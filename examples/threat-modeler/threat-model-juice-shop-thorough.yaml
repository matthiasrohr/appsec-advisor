  impact: Medium
  risk: High
  controls_in_place: None on the login route. 2FA limiters (server.ts:459-472) cover the 2FA endpoints, not initial login.
  mitigation_title: Add per-account and per-IP rate limiting plus lockout to the login route
  remediation:
    effort: Low
    steps:
    - Add express-rate-limit middleware to /rest/user/login keyed on req.ip with a low max per window.
    - Add a per-account failed-attempt counter that triggers temporary lockout or exponential backoff after N failures.
    - Trigger CAPTCHA after a small number of failures to raise the cost of automated attacks.
    code_example: "app.post('/rest/user/login',\n  rateLimit({ windowMs: 15*60*1000, max: 10 }),\n  login())"
