  stride: Information Disclosure
  cwe: CWE-522
  title: Privileged PR Trigger Exposes Org-Admin Token (pr-compliance.yml:4)
  affected_parameter: ORG_ADMIN_TOKEN
  scenario: 'pr-compliance.yml triggers on pull_request_target (line 4), which runs in the context of the base repository
    with access to secrets and a write-capable token, and is fired by PRs from untrusted forks. The ''Block Spammer'' step
    exposes secrets.ORG_ADMIN_TOKEN (line 438) — a personal/organization admin PAT powerful enough to block users org-wide
    via the GitHub API. The workflow''s saving grace is that it does NOT check out or execute PR head code, and it passes
    all untrusted PR fields (title, body, author) through env: variables rather than interpolating ${{ github.event.* }} directly
    into run:/script: bodies, which correctly avoids the classic pull_request_target script-injection sink. The residual risk
    is the blast radius of the secret itself: any future edit that adds a checkout of the PR head, or that interpolates an
    untrusted field into a script, would immediately expose ORG_ADMIN_TOKEN to forker-controlled code. Because the trigger
    and the high-value secret coexist in one workflow, the margin for error is thin.'
  evidence_summary: pull_request_target (pr-compliance.yml:4) runs forker-initiated events with base-repo secrets, and line
    438 injects secrets.ORG_ADMIN_TOKEN into a step of that same workflow.
  impact_description: An org-admin PAT lives in a forker-triggered workflow context; one unsafe future change (head checkout
    or field interpolation) leaks a token that can block users and act org-wide.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: 'No PR head checkout occurs; untrusted PR fields are passed via env: not inline interpolation (avoids
    script injection); the privileged steps are gated behind is_member == ''false'' and a spam-score threshold; permissions
    are scoped to pull-requests/issues write.'
  mitigation_title: Isolate ORG_ADMIN_TOKEN out of the pull_request_target workflow
  remediation:
    effort: Medium
    steps:
    - Split the privileged 'Block Spammer' action into a separate workflow triggered by workflow_run (after the untrusted-data
      job completes) so ORG_ADMIN_TOKEN is never present in the same job that processes untrusted PR metadata.
    - Scope ORG_ADMIN_TOKEN to the minimum (a fine-grained token limited to org-block, not full admin) and rotate it.
    - Add a CI guard (e.g. zizmor) that fails the build if pull_request_target is ever combined with a checkout of github.event.pull_request.head.*
      or with ${{ github.event.pull_request.* }} interpolated into a run/script body.
    code_example: '# pull_request_target job: read-only, untrusted-data handling only

      # separate workflow_run job: holds ORG_ADMIN_TOKEN, no untrusted input'
    reference: https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
