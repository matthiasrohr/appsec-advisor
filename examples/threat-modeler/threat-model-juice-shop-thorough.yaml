      internet-reachable.
    - If it must stay on the app, require a bearer token or basic-auth credential shared only with the Prometheus scraper.
    - Remove high-cardinality user/order labels that leak business volume.
    code_example: 'app.get(''/metrics'', metricsAuth, utils.asyncHandler(metrics.serveMetrics()))

