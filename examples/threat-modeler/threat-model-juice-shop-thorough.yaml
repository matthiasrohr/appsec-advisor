  name: Angular SPA Frontend
  description: Compiled Angular single-page application served from frontend/dist/frontend/. Handles all UI rendering, client-side
    routing, auth guard enforcement, and REST/WebSocket API calls to the backend. Contains intentional XSS, DOM-based XSS,
    client-side auth bypass, and postMessage vulnerabilities.
