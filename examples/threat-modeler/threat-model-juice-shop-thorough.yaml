- local_id: ci-cd-pipeline-005
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: Docker base image on floating tag, not digest — Dockerfile:1
  affected_parameter: FROM node:24
  scenario: '`Dockerfile:1` builds the installer stage from `FROM node:24` and the runtime stage from `gcr.io/distroless/nodejs24-debian13`
    (:22) — both mutable tags with no `@sha256:` digest pin. The content behind these tags changes over time and could be
    repointed or poisoned upstream, so two builds of the same commit are not guaranteed to produce byte-identical layers,
    and a compromised registry entry would flow straight into the published `bkimminich/juice-shop` image. Because the pipeline
    also lacks a lockfile, nothing in the build is reproducibly pinned end-to-end.'
  evidence_summary: '`Dockerfile:1` and `:22` reference base images by mutable tag with no digest, breaking build reproducibility
    and provenance.'
  impact_description: A repointed or compromised base-image tag introduces unreviewed content into every published Juice Shop
    image.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: Runtime stage uses a distroless image and non-root USER 65532 (reduces blast radius but does not pin
    content)
  mitigation_title: Pin Dockerfile base images to sha256 digests
  remediation:
    effort: Low
    steps:
    - Replace `FROM node:24` and `FROM gcr.io/distroless/nodejs24-debian13` with digest-pinned forms `image:tag@sha256:<digest>`.
    - Enable Dependabot `docker` ecosystem updates so digest pins are bumped through reviewed PRs.
    - Optionally verify base-image provenance with cosign/SLSA attestation in the build job.
    code_example: 'FROM node:24@sha256:<digest> AS installer

      # ...

      FROM gcr.io/distroless/nodejs24-debian13@sha256:<digest>'
    reference: https://docs.docker.com/build/building/best-practices/#pin-base-image-versions
  evidence:
