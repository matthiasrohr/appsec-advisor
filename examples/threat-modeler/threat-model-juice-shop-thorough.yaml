- local_id: ci-cd-pipeline-005
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1357
  title: Lockfile Generation Disabled via .npmrc
  scenario: .npmrc:1 sets `package-lock=false`, which tells npm not to write or respect a package-lock.json. Every `npm install`
    across the pipeline — Dockerfile:5 (`npm install --omit=dev`), ci.yml test jobs, release.yml:43 (`npm install --production`)
    — therefore resolves the full transitive dependency tree fresh against the registry at build time using semver ranges
    from package.json. There is no pinned, integrity-hashed manifest gating what gets installed, so a malicious version published
    into an allowed semver range (dependency-confusion or a compromised transitive package) is silently pulled into builds
    and published images. Two installs of the same git commit can produce different dependency closures, and CI cannot detect
    drift because there is no lockfile to diff. This is the deterministic-build foundation the rest of the supply-chain controls
    depend on.
  evidence_summary: .npmrc:1 contains `package-lock=false`, disabling the integrity-hashed lockfile so every npm install in
    the Dockerfile and workflows resolves transitive dependencies non-deterministically from semver ranges.
  impact_description: Builds are non-reproducible and a newly published malicious version within an allowed semver range is
    installed without review, undermining every downstream supply-chain control.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no lockfile is committed or honored; npm install --omit=dev/--production only narrows scope, not
    version determinism.
  mitigation_title: Remove package-lock=false from .npmrc, commit package-lock.json, and switch installs to npm ci
  remediation:
    effort: Medium
    steps:
    - Delete the `package-lock=false` line from .npmrc so npm generates package-lock.json with integrity hashes.
    - Generate and commit package-lock.json (and frontend/package-lock.json) once, then switch CI and Dockerfile installs
      from `npm install` to `npm ci`, which fails if the lockfile and package.json disagree.
    - Enable Dependabot/registry audit so lockfile updates are reviewed, and consider `npm config set audit-level=high` in
      CI.
    code_example: '# .npmrc (remove the disabling line)

      # package-lock=false   <-- delete


      # Dockerfile

      RUN npm ci --omit=dev --ignore-scripts'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html
