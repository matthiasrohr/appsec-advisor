  stride: Information Disclosure
  cwe: CWE-311
  title: SQLite store persisted unencrypted — models/index.ts:41
  scenario: 'The Sequelize connection is opened against a plain on-disk SQLite file (`storage: ''data/juiceshop.sqlite''`)
    with no SQLCipher key, no `PRAGMA key`, and no filesystem-level encryption. The single file holds every sensitive column
    in the system: user emails, MD5 password hashes, TOTP 2FA secrets, full payment card numbers, delivery addresses and HMAC''d
    security answers. A malicious insider developer (ACT-D-04) with local-fs or CI/CD-runtime access, or any process that
    can read the working directory, copies `data/juiceshop.sqlite` and exfiltrates the entire customer dataset offline with
    a stock `sqlite3` client — no application credentials required.'
  evidence_summary: createSequelize() sets storage to the plaintext file 'data/juiceshop.sqlite' with no encryption dialectOption;
    a grep for encrypt/cipher/sqlcipher/pragma-key across models/ returns zero hits.
  impact_description: Full offline disclosure of all PII, credential material and payment data from a single copied file.
  likelihood: Medium
  impact: Critical
  risk: High
  controls_in_place: None. Sequelize `paranoid` soft-delete is present on some models but provides no confidentiality; the
    DB file itself is cleartext.
  mitigation_title: Encrypt the SQLite datastore at rest with SQLCipher and restrict file permissions
  remediation:
    effort: Medium
    steps:
    - Swap the sqlite3 driver for `@journeyapps/sqlcipher` and pass the key via `dialectOptions` in createSequelize(), sourcing
      the key from an environment secret (KMS/Vault), never a literal.
    - Set restrictive OS permissions (0600, dedicated service user) on `data/juiceshop.sqlite` and mount its directory on
      an encrypted volume in production.
    - For the highest-sensitivity columns (totpSecret, cardNum), add application-layer field encryption so a key compromise
      of one layer is not sufficient.
    code_example: "// models/index.ts\nnew Sequelize('database', 'username', 'password', {\n  dialect: 'sqlite',\n  dialectModulePath:\
      \ '@journeyapps/sqlcipher',\n  storage: 'data/juiceshop.sqlite',\n  dialectOptions: { key: process.env.DB_ENCRYPTION_KEY\
      \ }, // 32-byte key from KMS\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html
