assets:
- id: A-001
  name: RSA Private Key (JWT Signing)
  classification: Restricted
  description: 2048-bit RSA private key hardcoded at lib/insecurity.ts:21, used to sign all JWTs. Committed to the public
    GitHub repository — permanently compromised.
  linked_threats: []
- id: A-002
  name: User Credentials Database
  classification: Restricted
  description: SQLite table storing user email addresses, MD5-hashed passwords, and roles. Contains approximately 20 pre-loaded
    users including admin accounts.
  linked_threats: []
- id: A-003
  name: Session JWT Tokens
  classification: Confidential
  description: JWT tokens signed with RS256 (committed RSA key), stored in browser localStorage. Tokens carry user role, email,
    and deluxe membership status with 6-hour expiry.
  linked_threats: []
- id: A-004
  name: User Personal Data (PII)
  classification: Confidential
  description: User profiles containing email addresses, delivery addresses, credit card numbers (CardModel), order history.
    Subject to GDPR erasure challenges.
  linked_threats: []
- id: A-005
  name: Payment Card Data
  classification: Restricted
  description: Credit/debit card records stored in CardModel (models/card.ts). Includes card number, expiry, and CVV — stored
    in plaintext SQLite.
  linked_threats: []
- id: A-006
  name: FTP Directory Contents
  classification: Internal
  description: The ftp/ directory served publicly via serve-index without authentication. Contains PDF files, backup files,
    and sensitive documents accessible to anonymous users.
  linked_threats: []
- id: A-007
  name: Application Source Code
  classification: Public
  description: Full application source hosted publicly on GitHub (github.com/juice-shop/juice-shop), including all security
    libraries, hardcoded secrets, and vulnerability patterns.
  linked_threats: []
- id: A-008
  name: SQLite Database File
  classification: Restricted
  description: In-process SQLite database file containing all application data — users, products, orders, feedback, challenges.
    Writable by the application process.
  linked_threats: []
- id: A-009
  name: Admin User Accounts
  classification: Restricted
  description: Administrator accounts (admin@juice-sh.op, acc0unt4nt@juice-sh.op) with elevated JWT role claims granting access
    to all admin API endpoints.
  linked_threats: []
- id: A-010
  name: Google OAuth Client ID and Redirect URIs
  classification: Internal
  description: Google OAuth 2.0 client ID and list of authorized redirect URIs configured in config/default.yml, including
    multiple Heroku and demo instance URLs.
  linked_threats: []
- id: A-011
  name: Challenge Completion State
  classification: Internal
  description: Challenge progress tracking in SQLite (ChallengeModel) and in-memory notification state. Integrity is security-relevant
    as bypass or manipulation constitutes cheating/fraud in CTF contexts.
  linked_threats: []
- id: A-012
  name: User-Uploaded Files
  classification: Internal
  description: Profile images and memory images uploaded to frontend/dist/frontend/assets/public/images/uploads/. URL-fetched
    files from user-controlled URLs also stored here (SSRF delivery point).
  linked_threats: []
- id: A-013
  name: HMAC Secret (Coupon Signing)
  classification: Restricted
  description: Hardcoded HMAC-SHA256 key 'pa4qacea4VK9t9nGv7yZtwmj' at lib/insecurity.ts:42, used to sign discount coupons.
    Committed to public repository.
  linked_threats: []
- id: A-014
  name: LLM Chatbot System Prompt
  classification: Internal
  description: System prompt and tool definitions for the LLM chatbot (routes/chat.ts:82-108). Includes discount coupon generation
    tool with no validation on discount percentage (chatbotGreedyInjectionChallenge).
  linked_threats: []
- id: A-015
  name: GitHub Actions Secrets
  classification: Restricted
  description: CI/CD secrets (GITHUB_TOKEN, registry credentials, signing keys) accessible to GitHub Actions workflows. 6
    workflows missing permissions restrictions expose secrets to fork PRs.
  linked_threats: []
- id: A-016
  name: Ollama LLM Endpoint
  classification: Internal
  description: Local Ollama instance at localhost:11434 running the Gemma model. No authentication required; accessible to
    any process on the host.
  linked_threats: []
- id: A-017
  name: Backup Files (localBackupEnabled)
  classification: Confidential
  description: Application backup files created when localBackupEnabled=true in config/default.yml. Backup restoration is
    a known challenge; backup files may contain sensitive application state.
  linked_threats: []
- id: A-018
  name: Application Configuration (config/default.yml)
  classification: Internal
  description: Runtime configuration including OAuth client IDs, chatbot LLM URL, domain settings, backup flags, and security
    policy. Loaded at startup; changes require restart.
  linked_threats: []
