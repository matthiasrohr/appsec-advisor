  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded Cryptographic Key (lib/insecurity.ts:21)
  scenario: 'The 2048-bit RSA private key used to sign every session JWT is a string literal at lib/insecurity.ts:21, committed
    to the public OWASP Juice Shop repository. authorize() at lib/insecurity.ts:54 signs tokens with this key (jwt.sign(user,
    privateKey, {algorithm: ''RS256''})). Anyone who clones the repo can mint a token the server accepts for any user: set
    data.id and data.role=''admin'', sign with the committed key, and present it as a Bearer token. The server''s verify()
    at lib/insecurity.ts:55 checks the signature against encryptionkeys/jwt.pub, which is the matching public key — so the
    forged token validates.'
  evidence_summary: privateKey is a literal RSA key at lib/insecurity.ts:21 and is the only signing secret, consumed by authorize()
    at line 54.
  impact_description: Full authentication bypass and impersonation of any account, including the seeded admin, with no credential
    knowledge.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The same key is also reused as an HMAC secret in deluxeToken() (lib/insecurity.ts:150), widening
    the blast radius.
  mitigation_title: Move the JWT signing key out of source into a runtime secret store and rotate it
  remediation:
    effort: Medium
    steps:
    - Delete the inline privateKey literal at lib/insecurity.ts:21; load the key at startup from an environment variable or
      secrets manager (e.g. process.env.JWT_PRIVATE_KEY, AWS Secrets Manager, or HashiCorp Vault).
    - Rotate the key pair so the committed key is no longer valid; regenerate encryptionkeys/jwt.pub from the new private
      key.
    - Add the key file path to .gitignore and scrub the key from git history (git filter-repo) since it is already public.
    - Stop reusing the signing key as the deluxeToken HMAC secret (lib/insecurity.ts:150); use a separate dedicated secret.
    code_example: "const privateKey = process.env.JWT_PRIVATE_KEY\nif (!privateKey) throw new Error('JWT_PRIVATE_KEY not configured')\n\
      export const authorize = (user = {}) =>\n  jwt.sign(user, privateKey, { expiresIn: '6h', algorithm: 'RS256' })"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
