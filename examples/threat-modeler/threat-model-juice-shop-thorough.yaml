- local_id: web3-nft-001
  threat_category_id: TH-18
  additional_categories: []
  stride: Spoofing
  cwe: CWE-601
  title: Open Redirect via substring allowlist
  affected_parameter: to
  scenario: 'GET /redirect?to=<url> calls security.isRedirectAllowed(toUrl), which at lib/insecurity.ts:136 evaluates url.includes(allowedUrl)
    for each entry. A substring match is not an origin check: http://attacker.test/phish#https://github.com/juice-shop/juice-shop
    and https://attacker.test/?r=https://github.com/juice-shop/juice-shop both satisfy includes() and reach res.redirect(toUrl)
    at routes/redirect.ts:19. An anonymous attacker emails a victim a juice-shop /redirect link whose embedded allowlisted
    substring makes it look legitimate, then bounces the browser to a wallet-drainer or credential-phishing page styled as
    MetaMask. On the crypto surface this is especially damaging: victims are primed to approve wallet transactions.'
  evidence_summary: isRedirectAllowed builds its allow decision with url.includes(allowedUrl) rather than a parsed-origin
    equality check, so any URL merely containing an allowlisted string passes.
  impact_description: Attacker-controlled destinations pass the allowlist, enabling phishing and wallet-drainer redirection
    from a trusted juice-shop link.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: An allowlist of 8 URLs exists (lib/insecurity.ts:122) but is matched by substring inclusion, not origin
    equality, so it is bypassable by design.
  mitigation_title: Replace substring redirect allowlist with parsed-origin exact match in isRedirectAllowed
  remediation:
    effort: Low
    steps:
    - In lib/insecurity.ts:133, parse toUrl with new URL(toUrl) and compare the normalized href (or origin+pathname) against
      allowlist entries with strict ===, not String.includes().
    - Reject non-http(s) schemes and any URL that fails to parse; return the existing 406 path in routes/redirect.ts.
    - 'Prefer indirection: accept a short opaque key (e.g. ?to=github) and map server-side to the canonical URL, removing
      attacker-supplied URLs from the redirect entirely.'
    code_example: "export const isRedirectAllowed = (url: string) => {\n  let target: URL\n  try { target = new URL(url) }\
      \ catch { return false }\n  return [...redirectAllowlist].some(a => {\n    const allowed = new URL(a)\n    return target.origin\
      \ === allowed.origin && target.pathname === allowed.pathname\n  })\n}"
