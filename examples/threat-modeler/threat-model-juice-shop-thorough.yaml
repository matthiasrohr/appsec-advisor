- local_id: file-upload-service-001
  threat_category_id: TH-01
  additional_categories: []
  stride: Tampering
  cwe: CWE-611
  title: XXE via external entity resolution in libxmljs2 routes/fileUpload.ts:83
  affected_parameter: uploaded XML file body
  scenario: 'An unauthenticated attacker uploads an XML file containing an external entity declaration such as `<!ENTITY xxe
    SYSTEM "file:///etc/passwd">`. The server parses it at line 83 with `{ noent: true }`, which instructs libxmljs2 to resolve
    all external entities. The resulting document contains the file contents. At line 87 the parsed XML string is truncated
    to 400 characters and embedded verbatim in the HTTP error response body (`''B2B customer complaints via file upload have
    been deprecated for security reasons: '' + utils.trunc(xmlString, 400)`). The attacker reads sensitive OS files without
    any authentication — the endpoint `/file-upload` has no auth middleware. The SSRF variant uses a URL entity (`SYSTEM "http://169.254.169.254/latest/meta-data/"`)
    to probe cloud metadata services, returning the response in the same error message.'
  evidence_summary: '`libxml.parseXml(data, { noblanks: true, noent: true, nocdata: true })` runs inside a `vm.createContext`
    sandbox with `timeout: 2000` but no restriction on entity resolution; resolved content is concatenated into the error
    string returned to the caller.'
  impact_description: Attacker reads arbitrary server-side files (e.g. `/etc/passwd`, application source, private keys) or
    probes internal network services; file contents are exfiltrated in the HTTP response.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: 2-second VM execution timeout limits billion-laughs expansion time; 400-character truncation limits the
    data returned per request.
  mitigation_title: Disable external entity resolution in libxmljs2 by setting noent:false
  remediation:
    effort: Low
    steps:
    - 'Change the `parseXml` options at `routes/fileUpload.ts:83` from `{ noblanks: true, noent: true, nocdata: true }` to
      `{ noblanks: true, noent: false, nocdata: true }` — this disables external entity and parameter entity resolution while
      keeping whitespace and CDATA behavior unchanged.'
    - 'Add an explicit DOCTYPE ban using libxmljs2''s `nonet: true` and `dtdload: false` flags to block DTD-based entity tricks:
      `{ noblanks: true, noent: false, nocdata: true, nonet: true, dtdload: false }`.'
    - Strip the parsed XML content from error messages — return a generic message such as 'Invalid XML' rather than reflecting
      `xmlString` in the response.
    - Add authentication middleware to the `/file-upload` route so only logged-in users can trigger parsing (see file-upload-service-007).
    code_example: "```typescript\n// routes/fileUpload.ts:83 — before\nconst xmlDoc = vm.runInContext(\n  'libxml.parseXml(data,\
      \ { noblanks: true, noent: true, nocdata: true })',\n  sandbox, { timeout: 2000 }\n)\n\n// after — external entities\
      \ disabled\nconst xmlDoc = vm.runInContext(\n  'libxml.parseXml(data, { noblanks: true, noent: false, nocdata: true,\
      \ nonet: true, dtdload: false })',\n  sandbox, { timeout: 2000 }\n)\n```"
    reference: CWE-611
  evidence:
  - file: routes/fileUpload.ts
    line: 83
  evidence_check: unchecked
