  stride: Denial of Service
  cwe: CWE-400
  title: YAML-bomb resource exhaustion on upload — routes/fileUpload.ts:109
  affected_parameter: uploaded .yml/.yaml body
  scenario: handleYamlUpload() loads any uploaded .yml/.yaml file with `yaml.load(data)` inside a vm context (fileUpload.ts:107-109).
    A YAML bomb (billion-laughs style with nested anchor/alias expansion) causes exponential in-memory expansion during load.
    The 2000ms vm timeout bounds CPU wall-time but does NOT bound the memory allocated before the timeout fires, so a small
    payload can drive the Node process toward heap exhaustion and OOM. The code itself anticipates this via the yamlBombChallenge/'Invalid
    string length' handling, confirming the expansion path is reachable.
  evidence_summary: Line 109 runs `yaml.load(data)` on attacker-supplied YAML with only a 2000ms vm timeout and no anchor/alias-expansion
    or output-size limit.
  impact_description: A small crafted YAML upload exhausts heap memory and can crash or stall the single-process server.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: A 2000ms vm execution timeout bounds CPU time but not peak memory allocation during parsing.
  mitigation_title: Bound YAML parsing with input-size limits and an alias-expansion-safe loader
  remediation:
    effort: Low
    steps:
    - Reject uploads above a small byte threshold before parsing (YAML documents for this feature are tiny).
    - Use js-yaml's FAILSAFE_SCHEMA or a loader configured to cap/reject alias expansion, and run parsing in a memory-limited
      worker rather than only a CPU-timed vm context.
    - Return 413/400 on oversized or overly-nested documents instead of attempting to load them.
    code_example: 'if (data.length > 50_000) { res.status(413); return next(new Error(''YAML too large'')) }

      const parsed = yaml.load(data, { schema: yaml.FAILSAFE_SCHEMA })'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
  evidence:
  - file: routes/fileUpload.ts
    line: 109
  evidence_check: verified
