  stride: Information Disclosure
  cwe: CWE-22
  title: Poison-null-byte extension-filter bypass — routes/fileServer.ts:28
  affected_parameter: file
  scenario: servePublicFiles (routes/fileServer.ts) restricts /ftp/:file downloads to .md and .pdf via endsWithAllowlistedFileType
    (line 52). An attacker requests a forbidden file with an appended poison null byte and benign extension (e.g. package.json.bak%2500.md).
    The allowlist check passes on the .md suffix, then security.cutOffPoisonNullByte (routes/fileServer.ts:28) truncates the
    string at %00, so res.sendFile(path.resolve('ftp/', file)) at line 33 serves the underlying package.json.bak / .pyc /
    backup file. The verifySuccessfulPoisonNullByteExploit hooks (lines 40-49) confirm targets like package.json.bak and encrypt.pyc
    are reachable.
  evidence_summary: The extension allowlist is checked before cutOffPoisonNullByte truncates the filename, so a %00-poisoned
    name bypasses the .md/.pdf restriction and serves arbitrary ftp/ files.
  impact_description: Anonymous download of non-allowlisted FTP files (backups, source, compiled artifacts) leaking source
    code, credentials, and configuration.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Forward slashes are rejected (routes/fileServer.ts:18) and an .md/.pdf allowlist (line 52) is applied
    — but the allowlist runs before null-byte truncation, defeating it.
  mitigation_title: Validate filename after null-byte stripping in servePublicFiles
  remediation:
    effort: Low
    steps:
    - Strip the poison null byte (cutOffPoisonNullByte) and reject any '..' or '/' BEFORE evaluating endsWithAllowlistedFileType,
      so the extension check applies to the actual filename served.
    - Resolve the final path and confirm it is prefixed by path.resolve('ftp') + path.sep before calling res.sendFile.
    - Reject any request whose raw filename contains an encoded null byte (%00) outright rather than silently truncating it.
    code_example: 'let name = security.cutOffPoisonNullByte(file)

      if (name.includes(''/'') || name.includes(''\u0000'') || !endsWithAllowlistedFileType(name)) return res.sendStatus(403)

      const dest = path.resolve(''ftp'', name)

      if (!dest.startsWith(path.resolve(''ftp'') + path.sep)) return res.sendStatus(403)

      res.sendFile(dest)'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
