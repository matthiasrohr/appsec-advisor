  scenario: GET /redirect?to=<url> calls security.isRedirectAllowed(toUrl) which, at lib/insecurity.ts:136, evaluates `url.includes(allowedUrl)`
    rather than verifying the URL's origin or prefix. Any attacker-supplied URL that merely *contains* an allowlisted string
    anywhere in it passes. An attacker crafts `https://attacker.example/phish?x=https://github.com/juice-shop/juice-shop`
    (or `https://github.com/juice-shop/juice-shop.attacker.example/`), the substring check returns true, and routes/redirect.ts:19
    issues res.redirect(toUrl) to the attacker domain. Because the endpoint is unauthenticated and reflected, it is a ready-made
    phishing and credential-harvesting primitive that abuses the trust of the juice-shop origin in links sent to victims.
  evidence_summary: isRedirectAllowed at lib/insecurity.ts:136 uses `url.includes(allowedUrl)` instead of an origin/prefix
    check, so any URL embedding an allowlisted substring is accepted.
  impact_description: Attacker redirects victims from the trusted juice-shop origin to an arbitrary phishing site, enabling
    credential and wallet-seed theft under the guise of the legitimate domain.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: An allowlist exists (redirectAllowlist in lib/insecurity.ts:122) but is enforced with a substring `includes()`
    test, which is bypassable.
  mitigation_title: Replace substring redirect check with exact-origin URL parsing in isRedirectAllowed
  remediation:
    effort: Low
    steps:
    - In lib/insecurity.ts:133, parse toUrl with `new URL(toUrl)` and compare the parsed `.origin` (or full normalized href)
      against entries in redirectAllowlist using strict equality — never `String.includes`.
    - Reject any URL that fails to parse, uses a non-https scheme, or whose origin is not an exact member of the allowlist;
      return 406 as routes/redirect.ts:21 already does for the disallowed branch.
    - Add a unit test asserting that `https://attacker.test/?x=https://github.com/juice-shop/juice-shop` is rejected.
    code_example: "export const isRedirectAllowed = (url: string) => {\n  let target: URL\n  try { target = new URL(url) }\
