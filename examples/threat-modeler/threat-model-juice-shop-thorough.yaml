  scenario: 'Multiple CI jobs in `.github/workflows/ci.yml` invoke `npm install` without the `--ignore-scripts` flag: the
    `coding-challenge-rsn` job (line 65), the `test` job (line 85), the `api-test` job (line 125), and the `e2e` job (line
    211). Without `--ignore-scripts`, npm executes `postinstall`, `preinstall`, and `install` lifecycle scripts declared by
    any dependency or transitive dependency in `node_modules`. A malicious or compromised package anywhere in the dependency
    tree (e.g., via a typosquatting attack or a legitimate package takeover) can run arbitrary shell commands on the GitHub
    Actions runner with access to all CI secrets exposed as environment variables: `CYPRESS_RECORD_KEY`, `SOLUTIONS_WEBHOOK`,
    `GITHUB_TOKEN`. Because `.npmrc` sets `package-lock=false` (no lockfile), each `npm install` resolves fresh semver ranges,
    enlarging the attack window.'
  evidence_summary: '`ci.yml` line 65 runs `npm install` in the `coding-challenge-rsn` job without `--ignore-scripts`; the
    same pattern is repeated at lines 85, 125, and 211 across three other jobs.'
