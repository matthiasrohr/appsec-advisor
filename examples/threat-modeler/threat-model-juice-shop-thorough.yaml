  - data/**
  - lib/startup/**
  tier: data
  complexity: moderate
  framework: sequelize
  deployment_zones:
  - internal
  handles_sensitive_data: true
  responsibilities:
  - Sequelize model definitions and relations
  - SQLite relational storage (in-process)
  - MarsDB NoSQL collections for orders/reviews
  - Seed-data loading
