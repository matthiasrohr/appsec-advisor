    truncated to 40 chars (not numeric-coerced), so an attacker sends GET /rest/products/:id/reviews with id=`0;while(true){}`
    to hang the JS engine (NoSQL DoS) or id=`0;return true` to return every review document regardless of product.'
  evidence_summary: req.params.id is concatenated into a Mongo $where JavaScript predicate at showProductReviews.ts:36 without
    coercion when the challenge path is active.
  impact_description: Server-side JS evaluation in the Mongo engine enabling data-wide reads and query-thread stalls.
  likelihood: Medium
  impact: High
