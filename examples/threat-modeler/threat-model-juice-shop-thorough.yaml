  how: 'Wrap /rest/web3/* with `rateLimit({ windowMs: 5*60*1000, max: 100 })` middleware as already used at server.ts:459.
    Replace the unbounded module-level Sets in nftMint.ts:10 and web3Wallet.ts:16 with a size-capped LRU or TTL cache so attacker-supplied
    addresses cannot grow memory without bound. Validate walletAddress with an EIP-55 address regex before storing it, and
    store only after ownership is proven (see web3-nft-002).'
- id: M-055
  title: Add least-privilege top-level permissions blocks to the 13 workflows that lack one
  threat_ids:
  - T-055
  priority: P2
  severity: High
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Add permissions: contents: read at the top of every workflow as a default-deny baseline, then grant the minimum each
    job needs (e.g. ci.yml''s coverage/docker jobs need nothing beyond contents: read; lint-fixer.yml needs contents: write
    for the auto-commit). Set the repository/organization default GITHUB_TOKEN permissions to ''read'' (Settings > Actions
    > Workflow permissions) so unscoped workflows fail safe. Audit with a linter (zizmor / actionlint) that flags any workflow
    missing an explicit permissions key.'
- id: M-056
  title: Validate and contextually encode WebSocket message data before any rendering or redirect handling
  threat_ids:
  - T-056
  priority: P2
  severity: High
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Treat all inbound socket `data` as untrusted: validate type/shape and reject non-string or oversized payloads before
    any regex or redirect logic. Ensure every sink that renders or redirects on values derived from socket input applies context-appropriate
    output encoding (HTML/attribute/URL) and a strict redirect allowlist via `security.isRedirectAllowed`. Apply a Content-Security-Policy
    that blocks inline scripts and `javascript:` URIs so an iframe/SVG payload that slips through cannot execute in victim
    browsers.'
- id: M-057
  title: Apply security.isAuthorized() to all /rest/web3/* state-changing endpoints
  threat_ids:
  - T-057
  priority: P2
  severity: High
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Mount `app.use('/rest/web3', security.isAuthorized())` before the route definitions at server.ts:641, or add `security.isAuthorized()`
    as the first handler on each POST/GET in that block. Confirm the front-end attaches the JWT to these calls and that nftMintListen/walletExploitAddress
    reject anonymous requests so the upstream Alchemy WebSocket is only opened for authenticated sessions.
- id: M-058
  title: Restrict CORS to an explicit trusted-origin allowlist
  threat_ids:
  - T-058
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Configure cors({ origin: [config.get(''server.baseUrl'')], credentials: true }) instead of the default open policy.
    Remove the app.options(''*'', cors()) catch-all preflight handler. Reject requests whose Origin is not in the allowlist
    rather than reflecting it.'
- id: M-059
  title: Reject active image formats and re-encode uploaded profile images server-side
  threat_ids:
  - T-059
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Restrict accepted types to a strict raster allowlist (png, jpeg) and explicitly reject svg and any format that can
    carry script. Re-encode every accepted upload through an image library (e.g. sharp) to strip embedded payloads before
    persisting. Serve uploaded images from a distinct sandbox origin (or with Content-Disposition: attachment and a restrictive
    Content-Security-Policy) so a polyglot cannot execute in the app origin.'
- id: M-060
  title: Validate the Origin handshake header and bind sessions to handshake tokens (not ambient cookies)
  threat_ids:
  - T-060
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Drive the allowed origin list from configuration per environment instead of the hardcoded `http://localhost:4200`,
    and validate `socket.handshake.headers.origin` against that allowlist inside `io.use()`, rejecting mismatches. Authenticate
    the channel with an explicit handshake token (`socket.handshake.auth.token`) rather than relying on ambient cookies, so
    a cross-origin page cannot ride the victim's session. Set the Socket.IO server `transports`/`allowRequest` callback to
    reject upgrades whose Origin is absent or not in the allowlist.
- id: M-061
  title: Add anti-CSRF tokens and SameSite cookies to state-changing auth endpoints
  threat_ids:
  - T-061
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Set SameSite=Strict (and HttpOnly, Secure) on the token cookie issued in updateAuthenticatedUsers() (lib/insecurity.ts:192).
    Require a synchronizer or double-submit CSRF token on 2FA setup/disable (routes/2fa.ts:97, 142) and password reset (routes/resetPassword.ts).
    Prefer the Authorization: Bearer header for the SPA and reject cookie-based token admission for state-changing routes
    so cross-site cookie auth cannot occur.'
- id: M-062
  title: Enforce coupon eligibility server-side and remove secrets from the system prompt
  threat_ids:
  - T-062
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Validate coupon eligibility and the 10% cap in the generateCoupon execute() handler in code, not via prompt instructions
    — reject discount > 10 regardless of model output. Remove the CONFIDENTIAL discount instruction from the system prompt;
    keep business rules server-side. Add input/output guardrails (content filtering) and never expose privileged tools to
    unauthenticated chat sessions.
- id: M-063
  title: Emit structured append-only audit events for all authentication state changes
  threat_ids:
  - T-063
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Log a structured event (actor id/email, source IP, user-agent, outcome, UTC timestamp, event type) on each login success
    and failure in routes/login.ts. Add the same logging to 2FA verify/setup/disable (routes/2fa.ts) and password reset (routes/resetPassword.ts).
    Write events to an append-only sink (e.g. a write-once log table or external SIEM) so they cannot be edited by an application-level
    compromise. Do not log the password, the JWT, or the TOTP secret.
- id: M-064
  title: Replace dev errorhandler with sanitized error responses for the B2B path
  threat_ids:
  - T-064
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Do not run the development errorhandler() (server.ts:682) in production; use a custom final error handler that logs
    full detail server-side but returns a generic message and correlation id to clients. In routes/b2bOrder.ts catch block,
    normalize all non-timeout errors to a generic 400/500 response instead of forwarding raw err via next(err) at line 32.
    Ensure no stack traces, file paths, or runtime internals appear in any B2B API response body.
- id: M-065
  title: Remove confidential business rules from the LLM context and enforce them server-side
  threat_ids:
  - T-065
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Delete the 'CONFIDENTIAL - INTERNAL ONLY' escalation-discount text and the numeric coupon limits from buildSystemPrompt;
    the model never needs secret values it cannot be trusted to keep. Implement escalation/courtesy-discount decisions in
    a backend function gated by verified order state, returning only an opaque result to the model. Add an output guardrail
    that refuses to echo the system prompt and redacts known internal markers before streaming to the client.
- id: M-066
  title: Validate and allowlist the LLM endpoint and authenticate the upstream
  threat_ids:
  - T-066
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Validate application.chatBot.llmApiUrl at startup against an allowlist of permitted hosts/schemes; refuse to start
    if it resolves to an unexpected or non-loopback address in production. Require LLM_API_KEY (or mTLS) for the upstream
    provider instead of defaulting to an empty key, so a redirected endpoint cannot silently impersonate the model. Restrict
    who can read/write the live application configuration so the URL cannot be altered at runtime by lower-privileged actors.
- id: M-067
  title: Add cosign signing step to release workflow; or use actions/attest-build-provenance
  threat_ids:
  - T-067
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-068
  title: Use `npm ci --ignore-scripts` and audit required postinstalls separately
  threat_ids:
  - T-068
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-069
  title: Isolate ORG_ADMIN_TOKEN out of the pull_request_target workflow
  threat_ids:
  - T-069
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Split the privileged 'Block Spammer' action into a separate workflow triggered by workflow_run (after the untrusted-data
    job completes) so ORG_ADMIN_TOKEN is never present in the same job that processes untrusted PR metadata. Scope ORG_ADMIN_TOKEN
    to the minimum (a fine-grained token limited to org-block, not full admin) and rotate it. Add a CI guard (e.g. zizmor)
    that fails the build if pull_request_target is ever combined with a checkout of github.event.pull_request.head.* or with
    ${{ github.event.pull_request.* }} interpolated into a run/script body.
- id: M-070
  title: Add npm ecosystem entry to .github/dependabot.yml
  threat_ids:
  - T-070
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
- id: M-071
  title: Use a production-safe error handler that hides internals
  threat_ids:
  - T-071
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Only mount errorhandler() when NODE_ENV !== ''production''; otherwise use a handler that returns a generic message
    and a correlation id. Log the full error server-side, return only { error: ''Internal Server Error'', id } to the client.
    Ensure x-powered-by and version banners are suppressed (x-powered-by is already disabled at server.ts:189).'
- id: M-072
  title: Load HMAC/token secrets from configuration and rotate the exposed keys
  threat_ids:
  - T-072
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Source the HMAC key from process.env / secrets manager, not an inline literal, and rotate the exposed value. Use a
    dedicated entitlement secret for deluxeToken rather than reusing the JWT private key. Bind deluxe entitlement to a server-side
    record rather than a client-presented HMAC token.
- id: M-073
  title: Redact query strings from access logs and remove public log directory browsing
  threat_ids:
  - T-073
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Define a custom morgan token that logs only the path (req.path) and omits the query string, or strip sensitive params
    before logging at server.ts:338. Remove or authenticate the /support/logs and /support/logs/:file handlers (server.ts:281-283)
    so access logs are not world-readable. Ensure the /redirect handler never receives credential-bearing parameters; keep
    sensitive values out of GET query strings entirely.
- id: M-074
  title: Gate /rebase on author_association and add concurrency cancellation
  threat_ids:
  - T-074
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Add an author check to the rebase job condition: require github.event.comment.author_association to be OWNER/MEMBER/COLLABORATOR
    before running. Add a concurrency: { group: rebase-${{ github.event.issue.number }}, cancel-in-progress: true } block
    so repeated comments do not stack jobs. Add concurrency cancel-in-progress to ci.yml keyed on the ref so rapid pushes/PR
    updates cancel superseded runs.'
- id: M-075
  title: Add a fileSize limit to the uploadToDisk multer instance and rate-limit memory uploads
  threat_ids:
  - T-075
  priority: P3
  severity: Medium
  effort: Low
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: 'Add limits: { fileSize: <maxBytes> } to the uploadToDisk multer config at server.ts:698 so oversized images are rejected
    before hitting disk. Apply express-rate-limit to POST /rest/memories to bound upload frequency per user/IP. Enforce a
    disk-usage quota or write to an object store with quota rather than the local frontend dist directory.'
- id: M-076
  title: Add rate limiting and bounded deserialization to the /file-upload endpoint
  threat_ids:
  - T-076
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Apply express-rate-limit to POST /file-upload to cap requests per IP and blunt volumetric deserialization-bomb attacks.
    Use a YAML loader configured with anchor/alias limits (or js-yaml FAILSAFE_SCHEMA) and a hard node count cap so anchor
    expansion cannot blow up before the timeout. Run untrusted XML/YAML parsing in a resource-limited worker thread rather
    than vm.runInContext, which does not bound memory.
- id: M-077
  title: Apply per-IP connection caps, message throttling, and a bounded maxHttpBufferSize to the Socket.IO server
  threat_ids:
  - T-077
  priority: P3
  severity: Medium
  effort: Medium
  kind: fix
  auto_emitted: true
  auto_source: build-mitigations-fallback
  how: Set a conservative `maxHttpBufferSize` on the `new Server(...)` options to bound per-message payload size. Add per-IP
    connection accounting in `io.use()` (or via a Redis adapter / reverse-proxy limit) and reject new connections above a
    threshold. Throttle inbound `verify*` and `notification received` events per socket (e.g. a token-bucket on `socket.data`)
    so a single client cannot flood regex-bearing handlers on the event loop.
