  stride: Tampering
  cwe: CWE-352
  title: Missing CSRF Protection (server.ts:596)
  scenario: No CSRF defense exists anywhere in the server (grep for csrf/csurf/CSRF across server.ts and lib/ returned zero
    hits). State-changing authenticated endpoints — 2FA setup (routes/2fa.ts:97), 2FA disable (routes/2fa.ts:142), and password
    reset (routes/resetPassword.ts) — accept requests without an anti-CSRF token. Because the application also supports cookie-based
    token admission (updateAuthenticatedUsers() reads req.cookies.token at lib/insecurity.ts:187), a victim with an active
    session who visits an attacker page can be forced to issue a cross-site POST that disables their 2FA or changes account
    state, since the browser attaches the session cookie automatically.
  evidence_summary: No CSRF middleware is registered and the server admits session tokens from cookies (lib/insecurity.ts:187),
    so cross-site state-changing requests are honoured.
  impact_description: Forced 2FA disable or account-state changes against an authenticated victim via a cross-site request.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None. No csurf or double-submit token; SameSite is not set on the token cookie (see auth-010).
  mitigation_title: Add anti-CSRF tokens and SameSite cookies to state-changing auth endpoints
  remediation:
    effort: Medium
    steps:
    - Set SameSite=Strict (and HttpOnly, Secure) on the token cookie issued in updateAuthenticatedUsers() (lib/insecurity.ts:192).
    - Require a synchronizer or double-submit CSRF token on 2FA setup/disable (routes/2fa.ts:97, 142) and password reset (routes/resetPassword.ts).
    - 'Prefer the Authorization: Bearer header for the SPA and reject cookie-based token admission for state-changing routes
      so cross-site cookie auth cannot occur.'
    code_example: 'import csrf from ''csurf''

      const csrfProtection = csrf({ cookie: { httpOnly: true, sameSite: ''strict'' } })

      app.post(''/rest/2fa/disable'', csrfProtection, twoFactorDisable)'
