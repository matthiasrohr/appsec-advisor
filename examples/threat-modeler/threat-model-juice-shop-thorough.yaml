- local_id: b2b-api-003
  threat_category_id: TH-06
  additional_categories:
  - TH-09
  stride: Elevation of Privilege
  cwe: CWE-862
  title: Missing Authorization on Sensitive Express Routes (server.ts)
  affected_parameter: null
  scenario: 'The B2B Order API is intended for B2B partners, but the only gate is security.isAuthorized() at the /b2b/v2 prefix
    (server.ts:424) and the route registration app.post(''/b2b/v2/orders'', b2bOrder()) at server.ts:648 adds no further check.
    There is no verification that the caller belongs to a B2B-partner role, a specific customer tenant, or owns the cid in
    the body. Any holder of a valid JWT — including an ordinary self-registered retail customer, or an outsider with a forged
    token (see b2b-api-002) — can submit B2B orders and, critically, reach the orderLinesData code-execution path. This is
    a broken-function-level-authorization (BFLA) gap: the high-privilege B2B function is exposed to all authenticated principals.'
  evidence_summary: Route registration at server.ts:648 attaches no role/partner authorization middleware; the upstream /b2b/v2
    gate (server.ts:424) checks only for a valid signature, not for B2B entitlement.
  impact_description: Every authenticated retail account becomes a viable launch point for the B2B code-injection and DoS
    attacks, dramatically widening the attack surface beyond intended B2B partners.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: JWT authentication via security.isAuthorized() on /b2b/v2 (server.ts:424). No role-based or tenant-based
    authorization is applied to the B2B function.
  mitigation_title: Add B2B-partner role authorization middleware to /b2b/v2/orders
  remediation:
    effort: Low
    steps:
    - Introduce a role/entitlement check (e.g. a security.hasRole('b2b-partner') middleware) and apply it to app.post('/b2b/v2/orders',
      ...) at server.ts:648 in addition to the JWT gate.
    - Validate that the decoded token's subject is authorized for the cid supplied in the request body to prevent one partner
      from acting on behalf of another.
    - 'Default-deny: reject any token whose role claim is not explicitly the B2B-partner role.'
    code_example: "app.post('/b2b/v2/orders',\n  security.isAuthorized(),\n  security.hasRole('b2b-partner'),   // new: function-level\
      \ authorization\n  b2bOrder()\n)"
