- local_id: auth-010
  threat_category_id: TH-18
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-798
  title: DeluxeToken HMAC Uses Hardcoded Key Predictable — lib/insecurity.ts:93
  affected_parameter: deluxeToken (premium membership token)
  scenario: '`deluxeToken` at lib/insecurity.ts:93 computes `HMAC-SHA256(email + roles.deluxe, privateKey)`. Both the HMAC
    secret (`privateKey`, a string literal in source) and the input format (`email + ''deluxe''`) are known to anyone with
    repo access. An attacker who knows any user''s email address computes that user''s exact deluxeToken offline without any
    server interaction, then uses it to claim deluxe membership or access deluxe-gated features as that user.'
  evidence_summary: '`crypto.createHmac(''sha256'', privateKey)` at line 93 uses the hardcoded private key as the HMAC secret
    with the email as input — both are known to an attacker with repo access.'
  impact_description: Any attacker with repository access can generate valid deluxeTokens for arbitrary user emails, bypassing
    the premium membership paywall.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None beyond knowing a target user's email (publicly findable on many applications).
  mitigation_title: Replace hardcoded HMAC secret with a runtime environment secret and add server-side token issuance with
    DB validation
  remediation:
    effort: Low
    steps:
    - Move the HMAC secret to an environment variable `DELUXE_TOKEN_SECRET` (independent of the JWT private key).
    - Issue deluxe tokens server-side only upon verified payment/membership status and store a hash in the DB.
    - Validate the token on each request by looking it up in the DB rather than recomputing the HMAC — eliminates offline
      forgery entirely.
    code_example: "// lib/insecurity.ts — after fix\nconst deluxeSecret = process.env.DELUXE_TOKEN_SECRET\nexport const deluxeToken\
      \ = (email: string) => {\n  const hmac = crypto.createHmac('sha256', deluxeSecret)\n  return hmac.update(email + roles.deluxe).digest('hex')\n\
      }"
    reference: CWE-798
  evidence:
  - file: lib/insecurity.ts
    line: 93
  evidence_check: verified
