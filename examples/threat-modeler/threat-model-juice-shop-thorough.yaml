  title: Missing Authorization on Wallet Balance Endpoint — server.ts:627
  scenario: The wallet routes are registered with only security.appendUserId() and not security.isAuthorized() (server.ts:626-627).
    appendUserId() merely copies an id from the in-memory authenticatedUsers map into req.body.UserId and 401s on failure,
    but it is not the express-jwt verification middleware. Because the wallet UserId is taken from req.body.UserId, and several
    adjacent endpoints (cards, addresses, deluxe) share the same appendUserId-only pattern, a request that supplies its own
    session can read or mutate wallet state without the route enforcing JWT validity the way isAuthorized()-mounted paths
    do.
  evidence_summary: server.ts:626-627 mounts GET/PUT /rest/wallet/balance behind appendUserId() only, omitting the isAuthorized()
    express-jwt guard used on /rest/basket and /b2b/v2.
  impact_description: Wallet read/write is gated by a weaker token-map lookup rather than verified JWT authorization, widening
    the access-control surface.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: appendUserId() resolves a UserId from the in-memory token map; no express-jwt isAuthorized() check is
    applied to the wallet routes.
  mitigation_title: Add isAuthorized() JWT enforcement to wallet and payment routes
  remediation:
    effort: Low
    steps:
    - Prepend security.isAuthorized() before security.appendUserId() on the wallet routes at server.ts:626-627 so the JWT
      signature and expiry are verified.
    - Apply the same isAuthorized() guard to the other appendUserId()-only routes (/api/Cards, /api/Addresss) that handle
      sensitive per-user data.
    - Derive UserId from the verified token claims, never from req.body.
