- local_id: b2b-api-001
  threat_category_id: TH-05
  additional_categories:
  - TH-01
  stride: Tampering
  cwe: CWE-94
  title: Server-Side Code Injection — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData
  scenario: 'The handler passes the attacker-controlled string body.orderLinesData straight into safeEval (notevil) executed
    inside vm.runInContext at routes/b2bOrder.ts:23. notevil is an AST-walking pseudo-sandbox, not a security boundary: published
    escapes recover the host Function/process objects (e.g. via constructor-chain traversal such as ([]).constructor.constructor(''return
    process'')()) and Node''s vm module explicitly documents that vm.runInContext is not a sandbox against hostile code. A
    B2B caller submits a crafted orderLinesData payload to POST /b2b/v2/orders and executes arbitrary JavaScript in the server
    process, leading to remote command execution, file read/write, and reverse-shell. The only constraint is a 2000ms timeout,
    which bounds the rceOccupy DoS variant but does not stop a fast escape. This is the seeded rceChallenge / rceOccupyChallenge.'
  evidence_summary: orderLinesData is read from the request body at routes/b2bOrder.ts:19 and evaluated by safeEval inside
    vm.runInContext at line 23 with no allowlist, type check, or AST restriction.
  impact_description: An authenticated B2B caller achieves arbitrary code execution in the Node.js process, fully compromising
    the server and all data it can reach.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: notevil acts as the intended sandbox and a 2000ms vm timeout bounds runaway loops; JWT bearer auth is
    required on /b2b/v2 (server.ts:424). None of these prevent a sandbox escape.
  mitigation_title: Replace notevil/vm eval of orderLinesData with a declarative JSON parser in routes/b2bOrder.ts
  remediation:
    effort: Medium
    steps:
    - Remove the safeEval/vm.runInContext call at routes/b2bOrder.ts:23 entirely; order line data must never be evaluated
      as code.
    - 'Parse orderLinesData as data with JSON.parse inside a try/catch and validate the parsed object against a strict schema
      (e.g. zod z.array(z.object({productId: z.number(), quantity: z.number().int().positive()}))).'
    - Reject any payload that fails schema validation with HTTP 400; never fall through to an interpreter.
    - If dynamic expression evaluation is a genuine business requirement, move it to an isolated worker with isolated-vm and
      a hardened, frozen context plus a strict CPU/memory budget — but prefer eliminating eval outright.
    code_example: 'const OrderLines = z.array(z.object({ productId: z.number().int(), quantity: z.number().int().positive()
      }))

      const parsed = OrderLines.parse(JSON.parse(body.orderLinesData))

      // use parsed as data only — never eval'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html
