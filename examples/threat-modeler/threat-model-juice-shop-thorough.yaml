  title: Hardcoded HMAC secret for token derivation — lib/insecurity.ts:44
  affected_parameter: hmac secret
  scenario: hmac() at line 44 uses the static literal key 'pa4qacea4VK9t9nGv7yZtwmj' for HMAC-SHA256. Separately, deluxeToken()
    at line 152 derives a per-user entitlement token via crypto.createHmac('sha256', privateKey) keyed on the RSA private
    key. Both secrets are committed to source. isDeluxe() (line 169) trusts a token whose deluxeToken claim equals deluxeToken(email).
    Because the keying material is public, ACT-D-02 computes a valid deluxeToken for their own email offline and forges the
    deluxe entitlement, and any data protected by hmac() can be forged. Static HMAC keys cannot be rotated without a code
    change and apply identically across every deployment.
  evidence_summary: hmac() hardcodes a 24-char literal key; deluxeToken() keys HMAC with the hardcoded RSA privateKey — both
    attacker-derivable.
  impact_description: Any HMAC-protected value (including the deluxe entitlement) can be forged offline, bypassing paid-feature/role
    gating.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: HMAC-SHA256 is a sound primitive, but the keys are public, voiding integrity guarantees.
  mitigation_title: Load HMAC keys from a secret store and decouple deluxeToken from the JWT signing key
  remediation:
    effort: Medium
    steps:
    - Remove the literal HMAC key at line 44 and the privateKey reuse at line 152; load distinct per-purpose secrets from
      env/secret manager at startup.
    - Use separate keys for JWT signing vs. HMAC derivation (key separation) so a leak of one does not compromise the other.
    - Rotate the compromised keys and document rotation cadence for PCI-DSS Req 3.6.
    code_example: 'const HMAC_KEY = process.env.HMAC_KEY!

      export const hmac = (data: string) => crypto.createHmac(''sha256'', HMAC_KEY).update(data).digest(''hex'')'
    reference: CWE-798
