  title: Missing rate limiting and parser-bomb guards on public endpoints — server.ts:343
  affected_parameter: null
  scenario: Rate limiting is applied only to /rest/user/reset-password and the metrics/erasure routes (server.ts:343, 459-472).
    High-cost unauthenticated/authenticated endpoints -- /rest/products/search (raw SQL), /rest/products/:id/reviews ($where
    JS), POST /file-upload (YAML/XML parsing) -- have no per-client limit. The YAML upload path evaluates `yaml.load` in a
    vm (fileUpload.ts:109) and the XML path expands entities, so a billion-laughs or yaml-bomb payload combined with unlimited
    request rate lets a single actor exhaust CPU and event-loop capacity.
  evidence_summary: The only rateLimit() guards in server.ts are on reset-password/metrics/erasure; search, reviews and file-upload
    parsing are unbounded.
