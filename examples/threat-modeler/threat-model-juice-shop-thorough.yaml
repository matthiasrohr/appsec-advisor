- local_id: web3-nft-002
  threat_category_id: TH-18
  additional_categories: []
  stride: Spoofing
  cwe: CWE-601
  title: Open redirect — routes/redirect.ts:19
  affected_parameter: to
  scenario: 'performRedirect() takes the attacker-controlled `to` query parameter and passes it to security.isRedirectAllowed(),
    which validates with url.includes(allowedUrl) — a substring test, not a prefix/host test. An anonymous attacker crafts
    /redirect?to=https://evil.example/#https://github.com/juice-shop/juice-shop: the URL contains an allowlisted string so
    isRedirectAllowed returns true, and res.redirect(toUrl) at line 19 sends the victim''s browser to the attacker-controlled
    host. This enables phishing and OAuth/token-forwarding chains under the trusted application origin.'
  evidence_summary: redirect.ts:19 calls res.redirect(toUrl) with the raw `to` value after only the includes()-based check,
    so any URL that embeds an allowlisted substring passes.
  impact_description: Victims are redirected to attacker-chosen sites while trusting the Juice Shop origin, enabling credential
    phishing and malware delivery.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: Allowlist exists (security.redirectAllowlist) but is enforced with a substring includes() match, which
    is trivially bypassable.
  mitigation_title: Enforce redirect allowlist by exact origin/prefix match, not substring includes()
  remediation:
    effort: Low
    steps:
    - Replace the includes() check so the target is validated by parsed URL origin equality (new URL(toUrl).origin against
      an allowlisted origin set), or by a strict startsWith() on the full allowlisted URL.
    - Reject any `to` value that is not an absolute URL whose origin is explicitly allowlisted; default-deny.
    - Prefer relative-path-only redirects, or map a short opaque key to the destination server-side instead of accepting a
      full URL from the client.
    code_example: "const allowedOrigins = new Set(['https://github.com', 'https://etherscan.io'])\ntry {\n  const u = new\
      \ URL(toUrl)\n  if (!allowedOrigins.has(u.origin)) return res.status(406).end()\n} catch { return res.status(406).end()\
      \ }\nres.redirect(toUrl)"
