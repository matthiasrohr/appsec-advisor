  stride: Elevation of Privilege
  cwe: CWE-862
  title: Missing Explicit Workflow Permissions Block — ci.yml:1
  affected_parameter: permissions
  scenario: Of the 16 workflows, only `codeql-analysis.yml:11`, `lock.yml:8`, and `pr-compliance.yml:7` declare a `permissions:`
    block. The remaining workflows — including `ci.yml` (which builds, pushes Docker images, deploys to Heroku, and uploads
    artifacts), `release.yml`, `image_actions.yml`, `lint-fixer.yml`, `rebase.yml`, `stale.yml`, and the five `update-*` auto-commit
    workflows — declare no `permissions:` key. They therefore inherit the repository default `GITHUB_TOKEN` scope, which on
    repositories created before the 2023 default change is read-write across all scopes (contents, packages, pull-requests,
    issues). A compromised step in any of these workflows (a poisoned dependency from the unpinned-install path, a re-tagged
    action, or `calibreapp/image-actions@main`) then has write access to repository contents and releases — a direct path
    to tamper with the source trunk or publish artifacts.
  evidence_summary: Only 3 of 16 workflows set `permissions:`; ci.yml and the auto-commit `update-*`/`lint-fixer` workflows
    have no `permissions:` key and inherit the default GITHUB_TOKEN scope.
  impact_description: A compromised step in a permission-unscoped workflow can write repository contents, push commits, and
    create releases via the default-scope GITHUB_TOKEN.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 'codeql-analysis.yml correctly scopes `actions: read / contents: read / security-events: write` (codeql-analysis.yml:11-14);
    pr-compliance.yml scopes `pull-requests: write / issues: write` (pr-compliance.yml:7-9).'
  mitigation_title: Add least-privilege permissions blocks to every workflow and set a read-only repo default
  remediation:
    effort: Low
    steps:
    - Set the repository/organization default workflow permissions to read-only (Settings → Actions → Workflow permissions),
      so no workflow silently inherits write-all.
    - 'Add an explicit top-level `permissions:` block to each workflow granting only the scopes that workflow needs — e.g.
      `contents: read` for ci.yml''s test jobs, `contents: write` only for the auto-commit `update-*` jobs, `packages: write`
      only for the docker push step.'
    - Where a single job needs elevated scope (docker push, git-auto-commit), set `permissions:` at the job level rather than
      the workflow level.
    code_example: "# top of ci.yml\npermissions:\n  contents: read\n# docker job overrides:\n#   permissions:\n#     contents:\
      \ read\n#     packages: write"
    reference: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
