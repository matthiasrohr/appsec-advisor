  stride: Denial of Service
  cwe: CWE-770
  title: Rate Limit Bypass via Spoofable Header
  affected_parameter: X-Forwarded-For
  scenario: The reset-password rate limiter at server.ts:343 keys requests on headers['X-Forwarded-For'] ?? ip (server.ts:346).
    Because X-Forwarded-For is an attacker-controlled request header when the app is not strictly behind a trusted proxy that
    overwrites it, an attacker rotates the header value on each request to receive a fresh 100-request budget per value. This
    neutralizes the limiter and enables unbounded brute-forcing of the security-question answer (auth-identity-006), turning
    a guessing attack into a feasible one.
  evidence_summary: The limiter's keyGenerator at server.ts:346 trusts the client-supplied X-Forwarded-For header, so a new
    header value resets the per-key counter.
  impact_description: An attacker defeats the reset-password throttle by rotating a spoofed header, enabling high-volume security-answer
    brute force.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Rate limiter present (server.ts:343) but keyed on a spoofable header.
  mitigation_title: Key the reset-password rate limiter on a trusted client identifier
  remediation:
    effort: Low
    steps:
    - Configure Express trust proxy correctly and key the limiter on req.ip (which express-rate-limit derives from the trusted
      proxy chain), not the raw X-Forwarded-For header.
    - Add a per-account counter (keyed on the target email) in addition to the per-IP counter so header rotation cannot widen
      the budget.
    - Lower the max from 100 to a value appropriate for a recovery endpoint (e.g. 5 per window).
    code_example: 'app.set(''trust proxy'', 1)

      rateLimit({ windowMs: 5*60*1000, max: 5 }) // default keyGenerator uses req.ip'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html
