  cwe: CWE-613
  title: JWT Not Revoked on Logout Stateless Token Without — lib/insecurity.ts:56
  affected_parameter: JWT token (Authorization header)
  scenario: 'JWTs are issued with a 6-hour expiry (`expiresIn: ''6h''` at lib/insecurity.ts:56) and there is no server-side
    revocation list. When a user logs out, the client discards the token but the server continues to accept it for up to 6
    hours. If the token was captured (via XSS, network interception, log leakage), the attacker continues to act as the user
    after the user believes they are logged out. The user cannot deny the attacker''s actions were not theirs — repudiation
    risk is compounded by the missing audit log (auth-007).'
  evidence_summary: '`jwt.sign(user, privateKey, { expiresIn: ''6h'' })` at lib/insecurity.ts:56 — no revocation mechanism
    or token-denylist exists.'
  impact_description: Session tokens remain valid for 6 hours after logout, enabling continued access by anyone who captured
    the token.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 6-hour token expiry provides partial mitigation.
  mitigation_title: Implement a server-side JWT denylist or short-lived tokens with refresh for immediate logout revocation
  remediation:
    effort: Medium
    steps:
    - On logout, record the token's `jti` (JWT ID) in a Redis or in-memory denylist with TTL equal to the token's remaining
      lifetime.
    - In the `isAuthorized` middleware, check the `jti` against the denylist before proceeding. Return 401 if found.
    - Alternatively, shorten access token lifetime to 15 minutes and issue an httpOnly `Secure SameSite=Strict` refresh token
      cookie for silent renewal.
    - 'Add `jti: uuid()` to every `jwt.sign` call to make tokens individually revocable.'
    code_example: "// lib/insecurity.ts — add jti to sign\nimport { v4 as uuid } from 'uuid'\nexport const authorize = (user\
      \ = {}) =>\n  jwt.sign({ ...user, jti: uuid() }, privateKey,\n    { expiresIn: '15m', algorithm: 'RS256' })\n\n// middleware\
      \ — check denylist\nconst decoded = jwt.decode(token) as any\nif (await denylist.has(decoded.jti)) return res.sendStatus(401)"
    reference: CWE-613
  evidence:
  - file: lib/insecurity.ts
    line: 56
