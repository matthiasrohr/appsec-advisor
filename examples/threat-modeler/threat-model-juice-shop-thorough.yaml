- local_id: auth-service-002
  threat_category_id: TH-02
  additional_categories:
  - TH-03
  stride: Spoofing
  cwe: CWE-347
  title: Insecure JWT Verification — lib/insecurity.ts:52
  affected_parameter: Authorization (Bearer JWT alg header)
  scenario: 'isAuthorized() at lib/insecurity.ts:52 builds express-jwt with only { secret: publicKey } and never sets an algorithms
    property; verify() at line 55 calls jws.verify(token, publicKey) and also passes no algorithm constraint. With the RSA
    public key (which is, by definition, public) usable as a symmetric HMAC secret, an attacker can craft a token with header
    alg:HS256 and sign it using the PEM public-key text as the HMAC key. Because no allowlist forces RS256, the verifier treats
    the public key as the HS256 secret and accepts the forged token — the classic RS256-to-HS256 key-confusion bypass, independent
    of the leaked private key in auth-service-001.'
  evidence_summary: Neither isAuthorized() at line 52 nor verify() at line 55 supplies an algorithms property to express-jwt
    / jws.verify.
  impact_description: Authentication bypass / token forgery using the public key alone, granting impersonation of any role.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — express-jwt@0.1.3 with no algorithms property; jws.verify called with no algorithm argument.
  mitigation_title: 'Pin algorithms: [''RS256''] in every JWT verification call'
  remediation:
    effort: Low
    steps:
    - 'Pass algorithms: [''RS256''] to express-jwt in isAuthorized() so HS256-signed tokens are rejected outright.'
    - 'Replace jws.verify() in verify() with jwt.verify(token, publicKey, { algorithms: [''RS256''] }), which enforces both
      the algorithm and standard claim checks.'
    - Upgrade express-jwt from the deprecated 0.1.3 to a current major that defaults to an explicit algorithm allowlist.
    code_example: "export const isAuthorized = () =>\n  expressJwt({ secret: publicKey, algorithms: ['RS256'] })\nexport const\
      \ verify = (token) =>\n  token ? jwt.verify(token, publicKey, { algorithms: ['RS256'] }) : false"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html
