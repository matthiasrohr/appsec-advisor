  stride: Denial of Service
  cwe: CWE-770
  title: Unbounded In-Memory Set Growth — routes/web3Wallet.ts:16
  affected_parameter: walletAddress
  scenario: 'contractExploitListener (routes/web3Wallet.ts:16) executes walletsConnected.add(metamaskAddress) on every request,
    before any validation, and the endpoint has no rate limiting (confirmed: server.ts applies express-rate-limit only to
    /rest/user/reset-password and three other routes, none of them /rest/web3/*). The same pattern exists for addressesMinted
    in nftMint.ts. Because the Set is a process-global singleton that is only emptied when a matching on-chain event fires
    for an already-present address, an unauthenticated attacker can loop POSTs with unique random address strings to grow
    the Set without bound, consuming heap until the Node process OOMs. Each call also re-enters the WebSocketProvider construction
    path, so a burst can exhaust the upstream Alchemy WSS connection budget.'
  evidence_summary: web3Wallet.ts:16 unconditionally inserts attacker-controlled req.body.walletAddress into a module-level
    Set that is never bounded or evicted on the request path, and no rate-limit middleware guards the route.
  impact_description: A scripted flood of unique addresses grows server heap without limit and can exhaust the backend's Alchemy
    WebSocket capacity, degrading or crashing the API for all users.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: None. No rate limiting, no input cap, no Set size bound, no TTL eviction.
  mitigation_title: Rate-limit web3 endpoints and bound the in-memory address Sets
  remediation:
    effort: Medium
    steps:
    - Apply express-rate-limit (already imported at server.ts:31) to the /rest/web3/* route group, mirroring the windowMs/max
      config used at server.ts:459.
    - Validate req.body.walletAddress with ethers.isAddress() and reject malformed input before adding to walletsConnected
      / addressesMinted.
    - Replace the unbounded Set with a bounded LRU/TTL cache so stale or flooded entries are evicted, and only insert after
      wallet-ownership is proven.
    code_example: 'app.use(''/rest/web3'', rateLimit({ windowMs: 5 * 60 * 1000, max: 100, validate: false }))

      if (!ethers.isAddress(metamaskAddress)) { return res.status(400).json({ status: ''error'' }) }'
