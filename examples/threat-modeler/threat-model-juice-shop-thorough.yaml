- local_id: sqlite-db-007
  threat_category_id: TH-05
  additional_categories: []
  stride: Denial of Service
  cwe: CWE-400
  title: Injected Recursive or Cartesian SQL Query Holds SQLite — routes/search.ts:23
  affected_parameter: q
  scenario: SQLite uses a single-writer, file-level exclusive lock. An attacker crafting a long-running query via the injectable
    search parameter at routes/search.ts:23 — for example a cartesian join `') UNION SELECT a.name,b.name,1,1 FROM Products
    a, Products b, Products c--` or a recursive CTE — can cause the Sequelize query to run for an extended period. Because
    SQLite blocks all other writes (and in WAL mode all reads from a checkpoint perspective) while this query holds the connection,
    the entire application effectively hangs. No query timeout is set on the raw sequelize.query() call. The attack requires
    no authentication and can be repeated to maintain a persistent DoS.
  evidence_summary: routes/search.ts:23 issues a raw sequelize.query() with no timeout option; SQLite's single-file exclusive
    locking model means a computationally expensive injected query stalls the entire database for all concurrent requests.
  impact_description: Full application availability loss — all requests requiring DB access queue behind the blocking query
    with no timeout, causing HTTP request timeouts and service unavailability.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None — no query timeout, no complexity limit, no rate limiting on the search endpoint.
  mitigation_title: Add query timeout to raw Sequelize calls and rate-limit the product search endpoint
  remediation:
    effort: Low
    steps:
    - 'Pass a timeout option to sequelize.query(): sequelize.query(sql, { timeout: 5000 }) — this aborts queries running longer
      than 5 seconds and releases the SQLite lock.'
    - 'Apply express-rate-limit middleware to the /rest/products/search endpoint: rateLimit({ windowMs: 60*1000, max: 60,
      standardHeaders: true }) — limits unauthenticated search abuse.'
    - As a structural fix, replacing the raw query with a parameterized ORM query (see sqlite-db-002) also eliminates the
      injection surface that enables computationally expensive payloads.
    code_example: "// Add timeout to raw query calls\nsequelize.query(sql, {\n  replacements: { term: searchTerm },\n  timeout:\
      \ 5000,  // 5 second hard limit\n  type: QueryTypes.SELECT\n})"
    reference: CWE-400
