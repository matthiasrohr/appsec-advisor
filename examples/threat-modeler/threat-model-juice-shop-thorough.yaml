trust_boundaries:
- id: tb-1
  name: Public Internet to Express Monolith
  from: external
  to: backend-api
  controls:
  - TLS (deployment-dependent)
  - wildcard CORS
  description: All anonymous and authenticated client requests cross here over HTTPS to port 3000. CORS is wildcard (server.ts:183);
    no CSP. The single network ingress to the application.
- id: tb-2
  name: Browser to Server (untrusted client)
  from: frontend-spa
  to: backend-api
  controls:
  - JWT in Authorization header / cookie
  description: The browser is an untrusted execution environment. URL params, form data, localStorage-held JWT, and WebSocket
    messages all originate client-side and must be treated as attacker-controlled.
- id: tb-3
  name: Anonymous to Authenticated zone
  from: backend-api
  to: backend-api
  controls:
  - express-jwt isAuthorized() middleware
  description: In-process boundary between unauthenticated and authenticated routes, enforced by express-jwt 0.1.3 middleware
    which itself accepts forged/alg-confused tokens.
- id: tb-4
  name: Authenticated to Admin zone
  from: backend-api
  to: backend-api
  controls:
  - role claim check on decoded JWT
  description: Admin and accounting routes gated by role claims read from the JWT (lib/insecurity.ts:156-175). Because the
    signing key is hardcoded, role claims are attacker-forgeable.
- id: tb-5
  name: Application to Database (in-process)
  from: backend-api
  to: data-persistence
  controls:
  - Sequelize ORM (bypassed by raw SQL)
  description: SQLite and MarsDB run in-process; the ORM is the enforcement layer but raw sequelize.query() interpolation
    (login.ts, search.ts) bypasses it entirely.
- id: tb-6
  name: Untrusted input to VM/sandbox
  from: backend-api
  to: file-upload-subsystem
  controls:
  - vm.runInContext timeout
  - notevil sandbox
  description: User-controlled XML/YAML/order data evaluated inside vm/notevil sandboxes (fileUpload.ts:82, b2bOrder.ts).
    Sandbox config (noent:true, prototype reachability) makes the boundary porous — XXE and sandbox-escape RCE.
- id: tb-7
  name: Application to Local Filesystem
  from: backend-api
  to: file-upload-subsystem
  controls:
  - OS file permissions only
  description: Writes uploads and serves /ftp via serve-index (server.ts:269). Files written into publicly served directories
    cross from app trust to public read.
- id: tb-8
  name: Application to External Services (outbound)
  from: backend-api
  to: external
  controls:
  - none observed
  description: Outbound fetch() to user-supplied image URLs (profileImageUrlUpload.ts:24) with no host allowlist — SSRF to
    internal services and metadata endpoints.
- id: tb-9
  name: Public Source Repository to Trunk
  from: external
  to: ci-cd-pipeline
  controls:
  - maintainer PR review (partial)
  description: 'Public GitHub repo: any internet user can fork and open a PR. Unpinned third-party Actions and missing workflow
    permissions widen the build-time supply-chain boundary.'
security_controls:
- domain: Identity and Authentication Controls
  control: Password Authentication
  kind: mechanism
  effectiveness: Weak
  assessment: Login uses raw SQL string interpolation of email/password (routes/login.ts:34) enabling SQLi auth bypass; passwords
    hashed with unsalted MD5 (lib/insecurity.ts:43). No rate limiting on the login route.
  linked_threats: []
- domain: Identity and Authentication Controls
  control: OAuth Frontend Adapter
  kind: mechanism
  effectiveness: Weak
  assessment: OAuth is a frontend identity adapter (Angular reads token from redirect URL) not a server-side authorization-code
    flow; inherits all password-login weaknesses.
  linked_threats: []
- domain: Session and Token Controls
  control: JWT Session Tokens
  kind: mechanism
  effectiveness: Weak
  assessment: RS256 JWT signed with an RSA private key hardcoded in source (lib/insecurity.ts:23) — offline forgery of any
    token. Verification via jws.verify / unverified jws.decode (lib/insecurity.ts:57-58); express-jwt 0.1.3 (CVE-2020-15084)
    accepts algorithm confusion. No revocation; tokens held in browser storage.
  linked_threats: []
- domain: Authorization Controls
  control: Role-Based Access Control
  kind: mechanism
  effectiveness: Weak
  assessment: Role checks read role claims from forgeable JWTs (lib/insecurity.ts:156-175). 41 authorization findings detected
    (.source-auth-findings.json); ownership checks rely on body-supplied UserId (lib/insecurity.ts:180) enabling BOLA/IDOR.
  linked_threats: []
- domain: Query Construction and Data Access Controls
  control: Parameterized Queries
  kind: mechanism
  effectiveness: Unsafe
  assessment: Sequelize ORM available but bypassed by raw sequelize.query() string interpolation in login.ts:34 and search.ts:23
    (SQLi). MarsDB collections accept $where object queries (NoSQL injection).
  linked_threats: []
- domain: Input Boundary Validation Controls
  control: Input Validation
  kind: mechanism
  effectiveness: Weak
  assessment: No centralized validation layer. User input flows into eval() (userProfile.ts:61, captcha.ts:22), vm/notevil
    sandboxes (b2bOrder.ts), XML parser (fileUpload.ts), and raw SQL. Validation is per-route and largely absent.
  linked_threats: []
- domain: Output Encoding and Rendering Controls
  control: HTML Sanitization
  kind: mechanism
  effectiveness: Weak
  assessment: sanitize-html 1.4.2 (outdated, known mutation-XSS bypasses) and a broken regex sanitizer sanitizeLegacy (lib/insecurity.ts:61).
    helmet.xssFilter explicitly disabled (server.ts:188).
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: CORS Policy
  kind: mechanism
  effectiveness: Unsafe
  assessment: Wildcard CORS — app.use(cors()) with app.options('*', cors()) (server.ts:182-183) allows all origins.
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: Content Security Policy
  kind: mechanism
  effectiveness: Missing
  assessment: No contentSecurityPolicy configured in helmet setup; only noSniff and frameguard applied. No defense against
    injected scripts.
  linked_threats: []
- domain: Browser and Cross-Origin Controls
  control: CSRF Protection
  kind: mechanism
  effectiveness: Missing
  assessment: No CSRF middleware (csurf or equivalent) detected; state-changing routes rely on bearer tokens but cookie token
    is also honored (lib/insecurity.ts:189).
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Secret Management
  kind: mechanism
  effectiveness: Unsafe
  assessment: RSA private key and HMAC secret hardcoded in lib/insecurity.ts (lines 23, 44) in a public repository — permanently
    compromised. No env-var or vault backing; no rotation capability.
  linked_threats: []
- domain: Cryptography Secrets and Data Protection
  control: Password Hashing
  kind: mechanism
  effectiveness: Unsafe
  assessment: Unsalted MD5 (lib/insecurity.ts:43) for password storage — trivially crackable via rainbow tables.
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: XML Parser Hardening
  kind: mechanism
  effectiveness: Unsafe
  assessment: libxmljs2 parses uploaded XML with noent:true (fileUpload.ts:83) enabling external entity expansion (XXE) —
    file disclosure and SSRF.
  linked_threats: []
- domain: File Parser and Outbound Request Controls
  control: Outbound Request Allowlist
  kind: mechanism
  effectiveness: Missing
  assessment: fetch() on user-supplied imageUrl (profileImageUrlUpload.ts:24) with no host/scheme allowlist — SSRF to internal
    services and cloud metadata.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: CVE scanning
  kind: lifecycle
  effectiveness: Missing
  assessment: No SCA tool in CI; outdated known-vulnerable dependencies (jsonwebtoken 0.4.0, express-jwt 0.1.3, sanitize-html
    1.4.2).
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: CI/CD Action Pinning
  kind: lifecycle
  effectiveness: Partial
  assessment: Mix of SHA-pinned and tag-only third-party Actions; 12 workflows lack top-level permissions blocks (config-scan
    IAC-010). Dockerfile uses --unsafe-perm and tag-only base images.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Dependency Management Tooling
  kind: lifecycle
  effectiveness: Partial
  assessment: No Dependabot/Renovate config detected (config-scan IAC-030/033). Lockfile pinning present per supply-chain
    assessor.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Security Headers (HSTS)
  kind: mechanism
  effectiveness: Partial
  assessment: helmet noSniff + frameguard + feature-policy present (server.ts:186-190); HSTS and CSP absent; xssFilter disabled.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Rate Limiting
  kind: mechanism
  effectiveness: Partial
  assessment: express-rate-limit imported (server.ts:31) and applied to select routes only; auth/login endpoint has no rate
    limit, permitting brute-force.
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated SCA scanning
  effectiveness: Adequate
  kind: lifecycle
  assessment: 'Automated SCA scanning present: .github/workflows/codeql-analysis.yml:23, .github/workflows/pr-compliance.yml:168'
  linked_threats: []
- domain: Operations Runtime and Supply Chain Controls
  control: Automated dependency updates
  effectiveness: Missing
  kind: lifecycle
  assessment: Automated dependency updates not detected in the repository. Patch-management posture depends on this control
