  cwe: CWE-916
  title: MD5 Without Salt for Password Storage Enables Rainbow Table — models/user.ts
  affected_parameter: password
  scenario: The User model's password setter at models/user.ts calls security.hash() which resolves to crypto.createHash('md5').update(data).digest('hex')
    (insecurity.ts:43). MD5 without a per-user salt means all users with the same password share the same hash. When an attacker
    exfiltrates the Users table (e.g. via SQLi, DB file access, or a backup leak), all password hashes can be reversed against
    precomputed rainbow tables or cracked using hashcat at ~100 billion MD5/s on commodity hardware. The totpSecret field
    stored alongside provides a path to bypassing 2FA for accounts where it is enabled.
  evidence_summary: models/user.ts password setter delegates to security.hash (insecurity.ts:43) which is MD5 with no salt
    — single-iteration, no key derivation, no work factor.
  impact_description: A database dump (trivially obtained via SQLi) yields recoverable plaintext passwords for all users,
    enabling account takeover across any service where users reuse those credentials.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — MD5 without salt provides no meaningful password protection.
  mitigation_title: Replace MD5 password hashing in models/user.ts with bcrypt or argon2 with per-user salt
  remediation:
    effort: Medium
    steps:
    - 'Replace security.hash() with bcrypt: const bcrypt = require(''bcrypt''); const SALT_ROUNDS = 12; this.setDataValue(''password'',
      await bcrypt.hash(clearTextPassword, SALT_ROUNDS)) — bcrypt automatically generates and stores a per-user salt in the
      hash string.'
    - Update the login query to use bcrypt.compare(req.body.password, user.password) instead of comparing MD5 hashes — this
      also eliminates the need for the raw SQL password comparison entirely.
    - Run a one-time migration that marks all existing MD5-hashed passwords as expired and forces users to reset on next login
      — existing MD5 hashes cannot be safely upgraded in-place without knowing the plaintext.
    code_example: "// models/user.ts — safe password storage\nimport bcrypt from 'bcrypt'\nconst SALT_ROUNDS = 12\nset(clearTextPassword:\
      \ string) {\n  bcrypt.hash(clearTextPassword, SALT_ROUNDS)\n    .then(hash => this.setDataValue('password', hash))\n\
      }"
    reference: CWE-916
