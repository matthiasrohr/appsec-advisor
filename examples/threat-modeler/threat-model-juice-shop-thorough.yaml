- local_id: realtime-channel-006
  threat_category_id: TH-07
  additional_categories:
  - TH-01
  stride: Elevation of Privilege
  cwe: CWE-285
  title: Client-Controlled Challenge Solver Allows — registerWebsocketEvents.ts:41
  affected_parameter: verifyLocalXssChallenge (data), verifyS…
  scenario: The `verifyLocalXssChallenge` handler at lines 41-43 calls `challengeUtils.solveIf()` based entirely on whether
    the client-supplied `data` string contains the expected XSS payload. An unauthenticated attacker who knows the payload
    string (e.g., `<iframe src="javascript:alert(\`xss\`)">`) can emit this event directly via the WebSocket connection without
    ever executing the XSS attack in a browser. The server marks the challenge solved on behalf of the attacker's session
    (or globally if the challenge state is shared). The same applies to `verifySvgInjectionChallenge` at lines 46-48.
  evidence_summary: '`challengeUtils.solveIf(challenges.localXssChallenge, () => utils.contains(data, ''<iframe src="javascript:alert(\`xss\`)">'')`
    at line 42 uses client-provided `data` as the sole ground truth for challenge completion.'
  impact_description: Any attacker can mark XSS and SVG injection challenges as solved without performing the actual exploit,
    bypassing the security training objective and corrupting scoreboard integrity.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None
  mitigation_title: Verify challenge completion server-side using server-generated nonces, not client-echoed payloads
  remediation:
    effort: High
    steps:
    - Instead of trusting the client's echo of the XSS payload, generate a server-side nonce and embed it in the challenge.
      Verify the nonce appears in the DOM via a headless evaluation or compare it against the stored value before calling
      `solveIf`.
    - At minimum, require the socket to be authenticated (realtime-channel-001) so that rogue completions are tied to a specific
      account and can be audited or invalidated.
    - For production deployments, move challenge verification entirely to the server-side HTTP request flow rather than relying
      on client-emitted WebSocket events.
    code_example: null
