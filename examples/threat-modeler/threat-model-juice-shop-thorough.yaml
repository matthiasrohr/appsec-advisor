  title: Unpinned GitHub Action References — image_actions.yml:33
  affected_parameter: null
  scenario: 'Most actions in this repo are SHA-pinned, but five references resolve to mutable tags or branches: `calibreapp/image-actions@main`
    (image_actions.yml:33) tracks a moving branch HEAD — the worst case, since the action owner or a repo compromise can change
    `main` at any moment; `actions/checkout@v6` (image_actions.yml:30), `peter-evans/create-pull-request@v8` (image_actions.yml:42),
    `coverallsapp/github-action@v2` (ci.yml:188), and `github/codeql-action/{init,autobuild,analyze}@v3` (codeql-analysis.yml:23,34,36)
    track mutable major-version tags that the maintainer can re-point. If any of these action repositories is compromised
    or a tag is force-moved, attacker code runs inside CI with the job''s `GITHUB_TOKEN`. `calibreapp/image-actions@main`
    runs with `githubToken: secrets.GITHUB_TOKEN` (image_actions.yml:35) and `coverallsapp/github-action@v2` receives `secrets.GITHUB_TOKEN`
    (ci.yml:190).'
