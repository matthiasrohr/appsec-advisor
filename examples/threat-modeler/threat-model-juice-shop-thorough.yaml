  threat_category_id: TH-06
  additional_categories:
  - TH-17
  stride: Information Disclosure
  cwe: CWE-200
  title: Masked Secrets Returned in User List — routes/authenticatedUsers.ts:25
  affected_parameter: null
  scenario: 'retrieveUserList() at routes/authenticatedUsers.ts:10 spreads the full user dataValues into the response (`...user.dataValues`)
    and only afterward overwrites password and totpSecret with masked strings (lines 26-27). Any column not explicitly masked
    — and the masking depends on the field existing in dataValues — is returned verbatim to the caller. The masking is presentation-only:
    the real password hash and TOTP secret are read into memory and the response also exposes derived lastLoginTime. An over-broad
    select like this on an authenticated-user endpoint leaks more user attributes than the client needs and is fragile to
    new sensitive columns being added unmasked.'
  evidence_summary: routes/authenticatedUsers.ts:25 spreads all user.dataValues into the response and masks only password/totpSecret
    (lines 26-27), so any other sensitive column is returned unredacted.
  impact_description: Excessive user-attribute disclosure to API callers and a maintenance trap where newly added sensitive
    fields leak by default.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: password and totpSecret are masked to asterisks, but the response is built by spreading the entire row
    rather than an explicit allow-list.
  mitigation_title: Return an explicit field allow-list instead of spreading user.dataValues (routes/authenticatedUsers.ts:25)
  remediation:
    effort: Low
    steps:
    - Replace the `...user.dataValues` spread at routes/authenticatedUsers.ts:25 with an explicit object listing only the
      fields the client needs (id, username, email, role, lastLoginTime).
    - Use a Sequelize `attributes` projection on findAll so sensitive columns are never loaded.
    - Confirm this endpoint is gated behind an admin/authorization check at the route registration.
    code_example: 'const users = await UserModel.findAll({ attributes: [''id'',''username'',''email'',''role''] })

      // then map to { id, username, email, role, lastLoginTime }'
    reference: CWE-200
  evidence:
  - file: routes/authenticatedUsers.ts
    line: 25
  evidence_check: verified
