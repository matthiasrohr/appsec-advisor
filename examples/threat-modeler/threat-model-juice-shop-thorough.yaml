tier_root_causes:
  edge:
  - JWT stored in localStorage, readable by any XSS
  - No Content-Security-Policy or SRI on the SPA
  - DOM XSS via trustHtml on unsanitized search input
  - Admin route guard trusts client-decoded JWT role
  - OAuth token leaked in URL fragment, deterministic password
  server:
  - Hardcoded crypto keys and broken JWT verification (alg:none)
  - Missing/forgeable auth on sensitive REST, WS and Web3 routes
  - 'Unneutralized input: SQLi, XXE, SSRF, zip-slip, IDOR'
  - 'CI/CD supply chain: unpinned actions, fork-PR secrets, curl|sh'
  - No audit logging of auth, authz and privileged actions
  data:
  - Passwords stored as unsalted MD5
  - Payment card PAN stored in plaintext
  - SQLite database file unencrypted at rest
  - Hardcoded admin credentials and TOTP secret in seed data
  - Security answers HMAC'd with a hardcoded static key
