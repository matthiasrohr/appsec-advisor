  stride: Spoofing
  cwe: CWE-306
  title: Missing Authentication on WebSocket… (lib/startup/registerWebsocketEvents.ts:24)
  affected_parameter: null
  scenario: The Socket.IO server accepts any incoming connection at `io.on('connection')` without verifying a JWT or session
    token. A CORS origin restriction is set to `http://localhost:4200` (line 20), but this is a browser-only control — non-browser
    clients (curl, Node.js ws client, Python `python-socketio`) never transmit an `Origin` header during the WebSocket upgrade,
    so the CORS check is silently skipped. An unauthenticated attacker connects from a script, immediately receives a replay
    of all pending challenge-solved notifications via the line-30 loop, and can impersonate a legitimate user by emitting
    challenge-verification events without the corresponding browser-level evidence.
  evidence_summary: '`io.on(''connection'', (socket: any) => { ... })` at line 24 has no JWT extraction, no `socket.handshake.auth`
    check, and no `socket.disconnect()` guard — the handler proceeds unconditionally for every connecting client.'
  impact_description: Any unauthenticated actor can attach to the real-time channel, receive all challenge notifications (including
    CTF flags), and submit fabricated challenge-verification events as though they were a legitimate authenticated session.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: CORS origin restricted to `http://localhost:4200` — enforced by browsers only; no effect on non-browser
    clients.
  mitigation_title: Require JWT verification in the Socket.IO connection handshake
  remediation:
    effort: Low
    steps:
    - 'Read the JWT from `socket.handshake.auth.token` (passed by the Angular client at connect time via `io({ auth: { token:
      localStorage.getItem(''token'') } })`).'
    - Call `security.verify(token)` (already imported from `lib/insecurity`) in the `connection` handler; call `socket.disconnect(true)`
      and return if verification fails.
    - Remove the per-user-socket event handlers (`verifyLocalXssChallenge`, etc.) from unauthenticated sockets — re-attach
      only after the token is validated.
    - As a defense-in-depth measure, add a Socket.IO middleware via `io.use((socket, next) => { ... })` so authentication
      is enforced before any event handler fires.
    code_example: "```typescript\nio.use((socket: any, next: any) => {\n  const token = socket.handshake.auth?.token\n  try\
      \ {\n    socket.data.user = security.verify(token)\n    next()\n  } catch {\n    next(new Error('Unauthorized'))\n \
      \ }\n})\n```"
    reference: CWE-306
    blueprint: null
