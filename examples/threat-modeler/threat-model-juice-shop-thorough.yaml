  title: MD5 Password Hashing Without Salt — lib/insecurity.ts:43
  affected_parameter: password field
  scenario: '`hash` at lib/insecurity.ts:43 applies MD5 without a salt to every user password before storage. MD5 is a general-purpose
    hash function: it runs at ~10 billion hashes/second on commodity GPU hardware. An attacker who obtains the database credential
    table (via SQL injection, backup leak, or insider access) cracks all common passwords within minutes using pre-computed
    rainbow tables or hashcat with a wordlist. Because there is no per-user salt, duplicate passwords hash to identical values
    — cracking one reveals all others sharing the same hash.'
  evidence_summary: '`crypto.createHash(''md5'').update(data).digest(''hex'')` at line 43 — no salt parameter, no key-derivation
    function.'
  impact_description: 'Full offline password recovery from a DB dump: attacker gains plaintext credentials for all users and
    can reuse them on other services (credential stuffing).'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — unsalted MD5 is the only transformation applied.
  mitigation_title: Replace MD5 with bcrypt (cost 12+) or Argon2id for all stored passwords
  remediation:
    effort: Medium
    steps:
    - 'Add the `bcrypt` package: `npm install bcrypt @types/bcrypt`.'
    - Replace the `hash` function with `bcrypt.hash(password, 12)` for storage and `bcrypt.compare(password, stored)` for
      verification.
    - Write a migration that re-hashes existing MD5 hashes on next user login (compare MD5 first, then re-hash with bcrypt
      and update).
    - Enforce a minimum password length of 8 characters to limit trivial brute-force at the application layer.
    code_example: "import bcrypt from 'bcrypt'\n\n// store\nexport const hashPassword = (plain: string) => bcrypt.hash(plain,\
      \ 12)\n\n// verify\nexport const verifyPassword = (plain: string, stored: string) =>\n  bcrypt.compare(plain, stored)"
    reference: CWE-916
