- local_id: socket-io-001
  threat_category_id: TH-13
  additional_categories:
  - TH-02
  stride: Spoofing
  cwe: CWE-306
  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:23
  affected_parameter: null
  scenario: The Socket.IO server registers its `connection` handler at registerWebsocketEvents.ts:23 with no `io.use()` handshake
    middleware and no JWT check on `socket.handshake`. A repo-wide grep for `io.use` and `handshake` auth returns zero hits.
    Any anonymous client that completes `GET /socket.io/?EIO=4&transport=websocket` is accepted as a peer, immediately receives
    the `server started` and replayed `challenge solved` events, and may emit any of the registered event names. There is
    no notion of a socket identity, so the channel cannot distinguish an authenticated shopper from an arbitrary internet
    client — every real-time action is performed by an unverifiable principal.
  evidence_summary: '`io.on(''connection'', ...)` is wired with no preceding `io.use()` authentication middleware and no token
    validation inside the handler.'
  impact_description: Any unauthenticated party can establish a trusted real-time session and exercise every server-side event
    handler without proving identity.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: 'Socket.IO CORS is pinned to `origin: ''http://localhost:4200''` (registerWebsocketEvents.ts:20), which
    constrains browser-based cross-origin script access but does NOT authenticate the connecting client — non-browser clients
    (curl, ws CLI, native socket.io-client) ignore CORS entirely.'
  mitigation_title: Add a Socket.IO handshake authentication middleware that verifies the session JWT before accepting connections
  remediation:
    effort: Medium
    steps:
    - Register an `io.use((socket, next) => { ... })` middleware in registerWebsocketEvents.ts that reads the JWT from `socket.handshake.auth.token`
      (or the `Authorization` header) and validates it with the same `security.verify`/`security.decode` routine used by the
      REST layer.
    - Reject the handshake with `next(new Error('unauthorized'))` when the token is missing, expired, or fails signature verification;
      attach the decoded user id to `socket.data.user` for downstream event handlers.
    - Update the Angular `socket-io.service.ts` client to pass the stored JWT in the `auth` option when constructing the socket
      so authenticated flows continue to work.
    code_example: "io.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  const decoded = token ? security.decode(token)\
