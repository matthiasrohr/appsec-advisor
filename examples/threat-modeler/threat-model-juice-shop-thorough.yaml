- local_id: frontend-spa-001
  threat_category_id: TH-10
  additional_categories:
  - TH-04
  stride: Spoofing
  cwe: CWE-598
  title: OAuth Implicit Flow / Token in URL Fragment
  affected_parameter: access_token
  scenario: 'The SPA registers an OAuth route matcher that reads the raw URL fragment directly from the browser: route data
    is set to `(window.location.href).substr(window.location.href.indexOf(''#''))` (app.routing.ts:257) and `oauthMatcher`
    activates whenever `path.includes(''#access_token='')` (app.routing.ts:286). This is OAuth 2.0 implicit grant — the access
    token rides in the URL fragment with no PKCE, no `state`, and no `nonce`. An attacker who can plant a link or control
    a redirect lands the victim on `/#access_token=<attacker-influenced>`; because there is no `state` parameter the SPA cannot
    detect a forged or replayed authorization response, enabling login-CSRF / token-fixation. Tokens in the fragment also
    leak via browser history, the Referer header on any subsequent outbound request, and any third-party script on the page
    (the Google/Gstatic font preconnects in index.html are loaded with no CSP restraining script origins).'
  evidence_summary: app.routing.ts:257 builds the OAuth route's `params` from `window.location.href` after the `#`, and oauthMatcher
    (line 286) keys solely on the literal `#access_token=` with no state/nonce check.
  impact_description: Account takeover via forged/replayed OAuth responses and token exfiltration through history, Referer,
    and injected scripts on a CSP-less page.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. No state parameter, no nonce, no PKCE; the matcher only string-checks for the access_token fragment.
  mitigation_title: Replace OAuth implicit flow with authorization-code + PKCE and validate state/nonce server-side
  remediation:
    effort: High
    steps:
    - 'Migrate to OAuth 2.0 Authorization Code flow with PKCE (RFC 7636): request `response_type=code` and a `code_challenge`
      (S256), never `response_type=token`.'
    - Generate a cryptographically random `state` before redirect, persist it in sessionStorage, and reject the callback in
      oauthMatcher/OAuthComponent if the returned `state` does not match.
    - Exchange the authorization code for tokens on the Express backend so the access/refresh tokens never enter the browser
      URL or JavaScript scope; return only a short-lived session via an HttpOnly Secure SameSite=Strict cookie.
    - Stop sourcing route data from `window.location.href`; once code flow is in place the fragment-parsing matcher can be
      deleted.
    code_example: '// authorization-code + PKCE (conceptual)

      const verifier = base64url(crypto.getRandomValues(new Uint8Array(32)))

      const challenge = base64url(await sha256(verifier))

      const state = base64url(crypto.getRandomValues(new Uint8Array(16)))

      sessionStorage.setItem(''oauth_state'', state)

      location.href = `${authz}?response_type=code&code_challenge=${challenge}&code_challenge_method=S256&state=${state}&...`'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/OAuth2_Cheat_Sheet.html
