    the build pipeline ships dependencies with no automated CVE gate, and the legacy config even pins known-vulnerable packages
    into permanent ignore (express-jwt 0.1.3, jsonwebtoken 0.4.0, sanitize-html 1.4.2, unzipper 0.9.15 at .dependabot/config.yml:11-23).
    The github-actions ecosystem is not monitored at all, leaving the mutable action refs in finding ci-cd-pipeline-002 without
    an update path.'
  evidence_summary: The repository's sole dependency config is a dead Dependabot v1 file, no v2 config exists, and no workflow
    performs SCA/CVE scanning.
  impact_description: Vulnerable npm and Action dependencies enter builds undetected and unpatched, with no automated alerting
    or upgrade pull requests.
