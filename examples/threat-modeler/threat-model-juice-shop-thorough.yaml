      (routes/fileUpload.ts:34) and on every file served by keyServer/logfileServer/quarantineServer.
    - Send these audit events to an append-only / tamper-evident log sink separate from application logs.
    - Include the original filename and resolved target path so zip-slip and traversal attempts are reconstructable.
