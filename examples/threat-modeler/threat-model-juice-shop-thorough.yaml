    WHERE clause with no parameterization; the 200-char truncation is insufficient to prevent UNION injection.
  impact_description: 'Unauthenticated attacker dumps the entire database: all user accounts (email + MD5 password hash +
    TOTP secret), all orders, all payment method data stored in the DB.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Input is truncated to 200 characters (search.ts:22); insufficient to prevent SQL injection.
  mitigation_title: Parameterize the search query using Sequelize Op.like with named replacements
  remediation:
    effort: Low
    steps:
    - 'Replace the raw query with ORM operators: `ProductModel.findAll({ where: { [Op.or]: [{ name: { [Op.like]: ''%'' + criteria
      + ''%'' } }, { description: { [Op.like]: ''%'' + criteria + ''%'' } }], deletedAt: null }, order: [[''name'', ''ASC'']]
      })`.'
    - Sequelize automatically parameterizes Op.like values, preventing injection.
    - If performance requires a raw query, use named replacements with the `replacements` option.
    code_example: "import { Op } from 'sequelize'\nconst products = await ProductModel.findAll({\n  where: {\n    [Op.or]:\
      \ [\n      { name: { [Op.like]: `%${criteria}%` } },\n      { description: { [Op.like]: `%${criteria}%` } }\n    ],\n\
      \    deletedAt: null\n  },\n  order: [['name', 'ASC']]\n})"
