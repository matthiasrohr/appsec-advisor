  stride: Elevation of Privilege
  cwe: CWE-346
  title: CORS Origin Hardcoded to Developmen… (lib/startup/registerWebsocketEvents.ts:20)
  affected_parameter: null
  scenario: 'The Socket.IO CORS origin is hardcoded to `http://localhost:4200` at line 20. In production deployments the frontend
    is served from a different origin (e.g. the container hostname or a public domain). The hardcoded value means: (1) in
    production the CORS restriction is misconfigured — either the real frontend cannot connect (breaking the app) or operators
    override it with a wildcard; (2) on a shared server, any local process listening on port 4200 can originate WebSocket
    upgrades from a browser that is tricked into loading content from `localhost:4200`. When an admin user''s browser visits
    an attacker page that opens an iframe or WebSocket to `localhost:4200` and then connects to the Socket.IO endpoint, the
    Origin check passes. This enables cross-site WebSocket hijacking (CSWSH) from the admin user''s session without a CSRF
    token on the socket channel.'
  evidence_summary: '`new Server(server, { cors: { origin: ''http://localhost:4200'' } })` at line 20 hardcodes a development
    origin with no mechanism to read the configured `server.frontendUrl` at startup.'
  impact_description: A production deployment that broadens the CORS origin to fix the hardcoded mismatch may inadvertently
    allow cross-origin socket connections; alternatively the admin-session CSWSH path becomes viable when the target host
    runs a service on localhost:4200.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: Socket.IO enforces the CORS origin header check for browser-initiated connections.
  mitigation_title: Read Socket.IO CORS origin from application configuration rather than a hardcoded literal
  remediation:
    effort: Low
    steps:
    - Replace the string literal with `config.get<string>('server.frontendUrl')` so the origin tracks the deployed frontend
      address across environments.
    - Add `server.frontendUrl` to `config/default.yml` with value `http://localhost:4200` (preserving current dev behaviour)
      and override in `config/production.yml`.
    - Do NOT set the CORS origin to `*` as a quick fix — this removes the only browser-level origin guard on the socket channel.
    - Combine with socket-level JWT authentication (socket-io-001) so CORS is a defence-in-depth layer, not the sole access
      control.
    code_example: "```typescript\nconst io = new Server(server, {\n  cors: { origin: config.get<string>('server.frontendUrl')\
      \ }\n})\n```"
    reference: CWE-346
    blueprint: null
