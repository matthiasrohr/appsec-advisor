- local_id: ci-cd-pipeline-005
  threat_category_id: TH-14
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-250
  title: Dockerfile Installer Stage Runs npm install as Root with unsafe… (Dockerfile:5)
  affected_parameter: null
  scenario: 'The `installer` stage of the multi-stage `Dockerfile` runs `npm install --omit=dev --unsafe-perm` at line 5 while
    no `USER` directive has been set, meaning the process runs as root (UID 0). The `--unsafe-perm` flag explicitly disables
    npm''s protection that downgrades script privileges when running as root. Any `postinstall`, `preinstall`, or `install`
    lifecycle script in any npm dependency executes as root within the container build context. A compromised or malicious
    dependency could: (1) write files to `/etc/`, `/usr/`, or other system paths; (2) install a backdoor into the final distroless
    image by placing files in the `/juice-shop/` tree that is later `COPY`-ed to the production stage; (3) exfiltrate build-time
    secrets (Docker build args `VCS_REF`, `BUILD_DATE`, `CYCLONEDX_NPM_VERSION`) via network calls during build. The final
    image correctly switches to UID 65532 and uses distroless, but the installer stage compromise point precedes this hardening.'
  evidence_summary: '`Dockerfile:5` executes `npm install --unsafe-perm` with no preceding `USER` directive, so npm lifecycle
    scripts run as root in the build stage.'
  impact_description: A postinstall script in a compromised npm dependency runs as root during `docker build`, allowing it
    to backdoor the resulting image before it is pushed to DockerHub and deployed by Juice Shop users worldwide.
  likelihood: Low
  impact: Critical
  risk: High
  controls_in_place: The production image stage uses distroless base (`gcr.io/distroless/nodejs24-debian13`) and non-root
    UID 65532. Multi-stage build limits blast radius if the installer stage is compromised but does not prevent backdoored
    files from being copied to the final image via `COPY --from=installer`.
  mitigation_title: Remove --unsafe-perm from Dockerfile npm install and add a non-root USER before the install step
  remediation:
    effort: Low
    steps:
    - Add `RUN useradd -u 1001 -m juiceshop` and `USER 1001` before the `npm install` step in the `installer` stage of `Dockerfile`.
      This removes the need for `--unsafe-perm` since npm will not downgrade-check when already running as non-root.
    - Remove `--unsafe-perm` from the `npm install --omit=dev --unsafe-perm` command on line 5. If any legitimate package
      requires root during install, evaluate whether it can be replaced or whether the specific step requiring root can be
      isolated.
    - Add `--ignore-scripts` to the `npm install` invocation in the Dockerfile's installer stage, then explicitly run only
      the first-party `npm run build` step to compile TypeScript. This eliminates all third-party postinstall execution during
      the Docker build.
    code_example: 'FROM node:24 AS installer

      COPY . /juice-shop

      WORKDIR /juice-shop

      # Add non-root user before install

      RUN useradd -u 1001 -m juiceshop && chown -R 1001:0 /juice-shop

      USER 1001

      RUN npm i -g typescript ts-node --ignore-scripts

      RUN npm install --omit=dev --ignore-scripts

      # ... remaining build steps'
    reference: CWE-250
