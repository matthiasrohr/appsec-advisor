  title: Open Redirect Allowlist Bypass via URL Substring Match (lib/insecurity.ts:138)
  affected_parameter: query.to
  scenario: 'The isRedirectAllowed() function at lib/insecurity.ts:138 uses url.includes(allowedUrl) to check whether a redirect
    target is safe. Because includes() performs substring matching rather than prefix or exact matching, an attacker can craft
    a URL that embeds an allowlisted domain as a query parameter: /redirect?to=https://evil.com/?bypass=https://github.com/juice-shop/juice-shop.
    The includes() check succeeds (the allowlisted URL appears as a substring), the server issues a 302 to evil.com, and the
    victim''s browser is redirected to an attacker-controlled page. This enables credential phishing campaigns using a trusted
    Juice Shop domain as the initial hop.'
  evidence_summary: insecurity.ts:138 uses url.includes(allowedUrl) which passes for any URL containing the allowlisted string
    as a substring, not only as a prefix.
  impact_description: Phishing attacks using the trusted application domain as a redirect launchpad; OAuth token interception
    via redirect_uri manipulation.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: An allowlist of permitted redirect targets exists — the bypass is in the matching implementation.
  mitigation_title: Replace includes() with exact URL matching or prefix matching against the allowlist in isRedirectAllowed()
  remediation:
    effort: Low
    steps:
    - Replace url.includes(allowedUrl) with url === allowedUrl (exact match) in isRedirectAllowed()
    - If prefix matching is needed, use url.startsWith(allowedUrl) after normalizing trailing slashes.
    - Parse the redirect target with new URL(toUrl) and validate only scheme + host + path, not the full query string.
    code_example: "```typescript\nexport const isRedirectAllowed = (url: string) => {\n  for (const allowedUrl of redirectAllowlist)\
      \ {\n    if (url === allowedUrl) return true; // exact match only\n  }\n  return false;\n};\n```"
