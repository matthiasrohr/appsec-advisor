  stride: Spoofing
  cwe: CWE-306
  title: Unauthenticated WebSocket Channel — registerWebsocketEvents.ts:23
  scenario: An attacker opens a Socket.IO connection to wss://<host>/socket.io with no token in the handshake. The io.on('connection')
    handler at lib/startup/registerWebsocketEvents.ts:23 runs no JWT check before wiring up event listeners, so the attacker
    immediately receives the 'server started' and 'challenge solved' events and can emit 'notification received', 'verifyLocalXssChallenge',
    and 'verifySvgInjectionChallenge' as any other client. The component description claims 'JWT validation attempted on socket
    connection' but no such code exists in the file.
  evidence_summary: The connection handler at registerWebsocketEvents.ts:23 imports lib/insecurity but never calls a verify/authenticate
    function before registering socket event listeners.
  impact_description: Any anonymous internet client gains full, identity-less access to every server-side socket event handler
    and broadcast stream.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. The socket namespace has no connection-time authentication middleware; CORS is pinned to http://localhost:4200
    but origin is not an authentication control.
  mitigation_title: Authenticate Socket.IO handshakes with io.use() JWT middleware before registering event handlers
  remediation:
    effort: Medium
    steps:
    - Register an io.use((socket, next) => {...}) middleware that reads the token from socket.handshake.auth.token, verifies
      it with the same RS256 key allowlist used by lib/insecurity, and calls next(new Error('unauthorized')) on failure.
    - Attach the decoded user identity to socket.data.user and reference it inside every socket.on() handler instead of trusting
      client-supplied data.
    - Reject connections whose Origin header is not in an explicit allowlist rather than relying on the hardcoded CORS value.
    code_example: "io.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  const decoded = token ? security.verify(token)\
      \ : null\n  if (!decoded) return next(new Error('unauthorized'))\n  socket.data.user = decoded.data\n  next()\n})"
