  scenario: 'The login handler at routes/login.ts:34 constructs a raw SQLite query by string-interpolating req.body.email
    and a hashed password directly: SELECT * FROM Users WHERE email = ''${req.body.email}'' ... A classic tautology payload
    — email: '' OR 1=1-- — causes the WHERE clause to always evaluate true, returning the first user (typically admin). More
    destructively, a UNION-based payload can extract all user records including MD5 password hashes. Because req.body.email
    is not sanitized, null bytes, comments, and stacked queries (SQLite supports them) are also possible attack vectors.'
  evidence_summary: login.ts:34 interpolates req.body.email directly into a models.sequelize.query() string with no parameterization.
  impact_description: Authentication bypass for any account; full Users table dump including hashed passwords enabling offline
    cracking.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. No input validation, no parameterized query, no WAF.
  mitigation_title: Replace raw query interpolation with Sequelize parameterized query or ORM findOne()
  remediation:
    effort: Low
    steps:
    - 'Replace the raw query with: UserModel.findOne({ where: { email: req.body.email, password: security.hash(req.body.password),
      deletedAt: null } })'
    - Remove models.sequelize.query() usage entirely from the login path.
    - Add input length and format validation on email (must match RFC 5321 format) before the DB call.
    - Add a test that verifies ' OR 1=1-- returns 401 (not 200).
    code_example: "```typescript\nconst authenticatedUser = await UserModel.findOne({\n  where: {\n    email: req.body.email\
      \ ?? '',\n    password: security.hash(req.body.password ?? ''),\n    deletedAt: null\n  }\n});\n```"
