  title: Excessive LLM Agency in Coupon Generation — routes/chat.ts:176
  scenario: An attacker uses prompt injection through /rest/chat to make the model call the generateCoupon tool with a large
    discount. The tool at routes/chat.ts:176 accepts whatever discount value the model supplies and calls security.generateCoupon(discount)
    at line 184 with no server-side check of eligibility, damaged-order verification, or the documented 10% cap. The greedy-injection
    path (discount >= 50) succeeds, yielding an arbitrarily large valid coupon code that the attacker redeems at checkout.
