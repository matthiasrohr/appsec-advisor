  title: Arbitrary Solidity Code Execution — web3-sandbox.component.ts:142
  affected_parameter: solidityCode (user input)
  scenario: The Web3 sandbox component (lines 142-175) accepts arbitrary Solidity source from a text input field, compiles
    it client-side via `solidityCompiler`, and deploys the resulting bytecode to Ethereum Sepolia testnet using the connected
    MetaMask signer. There are no content restrictions, no bytecode analysis, and no allowlist of safe contract patterns.
    An attacker can submit a reentrancy contract targeting the Juice Shop's NFT contract (`0x41427790...`), a honeypot that
    tricks other users who interact with it, a phishing proxy contract, or any contract that manipulates on-chain state. The
    deployment is signed by the user's wallet — but the code being deployed is fully attacker-controlled.
  evidence_summary: Lines 142-175 of `web3-sandbox.component.ts` pipe raw user-supplied Solidity text through `solidityCompiler`
    and deploy to Sepolia with no content gate or bytecode filter.
  impact_description: Attacker can deploy malicious on-chain contracts (reentrancy, phishing, drain attacks) attributable
    to the Juice Shop's frontend, potentially affecting other users who interact with the deployed contracts.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no Solidity AST analysis, no opcode blocklist, no size limits.
  mitigation_title: Restrict Web3 sandbox to a curated allowlist of safe Solidity patterns or add bytecode-level opcode filtering
    before deployment
  remediation:
    effort: High
    steps:
    - 'Perform static analysis on the compiled ABI and bytecode before allowing deployment: reject contracts containing `CALL`,
      `DELEGATECALL`, or `SELFDESTRUCT` opcodes unless the sandbox is explicitly intended as a CTF challenge surface.'
