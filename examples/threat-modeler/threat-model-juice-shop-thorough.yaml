  kind: fix
  priority: P3
  severity: Medium
  effort: Medium
  threat_ids:
  - T-070
  how: Apply express-rate-limit (already imported at server.ts:31) to the /rest/web3/* route group, mirroring the windowMs/max
    config used at server.ts:459. Validate req.body.walletAddress with ethers.isAddress() and reject malformed input before
    adding to walletsConnected / addressesMinted. Replace the unbounded Set with a bounded LRU/TTL cache so stale or flooded
    entries are evicted, and only insert after wallet-ownership is proven.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-770
  _title_source: Rate-limit web3 endpoints and bound the in-memory address Sets
- id: M-077
  title: Restrict CORS to an explicit trusted-origin allowlist
  kind: fix
  priority: P3
  severity: Medium
  effort: Low
  threat_ids:
  - T-071
  how: 'Replace cors() at server.ts:183 with cors({ origin: <allowlist>, credentials: true }) naming only the application''s
    own front-end origin(s). Do not reflect arbitrary origins; reject requests from unknown origins. Pair the tightened CORS
    with the CSRF and cookie-flag fixes for defense in depth.'
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-942
  _title_source: Restrict CORS to an explicit trusted-origin allowlist
- id: M-078
  title: Pin third-party dependencies to immutable versions
  kind: fix
  priority: P4
  severity: Low
  effort: Low
  threat_ids:
  - T-072
  how: Set a cooldown so brand-new versions are not installable immediately — e.g. configure `minimumReleaseAge` in a Renovate
    config, or pass `--exclude-newer=<date>` to a hash-locked resolver, or adopt npm's release-age gate once available. Pair
    the cooldown with the committed lockfile (ci-cd-pipeline-001) so routine builds use pinned versions and only cooldown-cleared
    updates enter the lockfile.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-829
  _title_source: Enforce a minimum-release-age cooldown on dependency installs
- id: M-079
  title: Add anti-CSRF protection to state-changing requests
  kind: fix
  priority: P4
  severity: Low
  effort: Medium
  threat_ids:
  - T-073
  how: Set the session cookie with SameSite=Strict; Secure (and HttpOnly per finding 005) when issued at oauth.component.ts:50
    / login.component.ts:104 server-side. Require an anti-CSRF token (double-submit or synchronizer) on all state-changing
    /rest/* and /api/* endpoints and send it from the SPA. Ensure backend endpoints accept the credential only from the Authorization
    header, not ambiently from the cookie, if a header-bearer model is kept.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-352
  _title_source: Add anti-CSRF protection and set SameSite=Strict on the session cookie
- id: M-080
  title: Add security audit logging
  kind: fix
  priority: P4
  severity: Low
  effort: Medium
  threat_ids:
  - T-074
  how: Log a structured event (actor id or remote IP, action, resource path, outcome, timestamp) on every upload write in
    extractZipBuffer (routes/fileUpload.ts:34) and on every file served by keyServer/logfileServer/quarantineServer. Send
    these audit events to an append-only / tamper-evident log sink separate from application logs. Include the original filename
    and resolved target path so zip-slip and traversal attempts are reconstructable.
  auto_emitted: true
  auto_source: finding-fix
  prevents:
  - CWE-778
  _title_source: Emit structured audit events for upload writes and sensitive file serving
- id: M-081
  title: Add security audit logging
  kind: fix
  priority: P4
