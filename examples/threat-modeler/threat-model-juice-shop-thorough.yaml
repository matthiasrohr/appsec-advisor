  cwe: CWE-778
  title: No Audit Logging of Wallet/Key Actions — routes/web3Wallet.ts:15
  affected_parameter: null
  scenario: The web3 endpoints mutate ownership-relevant state (walletsConnected.add at web3Wallet.ts:16, addressesMinted.delete
    at nftMint.ts:43, challenge-solved transitions) and accept private-key submissions (checkKeys.ts:16) without writing any
    actor/action/resource audit record. Only opportunistic logger.error calls exist, and they fire only on websocket failure
    (web3Wallet.ts:22). Because there is no authenticated identity (web3-nft-004) and no log of which address was submitted
    or claimed, a user who fraudulently claims a wallet or submits a key cannot be attributed after the fact, and abuse of
    the key-submission endpoint leaves no trail for incident response.
  evidence_summary: Across checkKeys.ts, nftMint.ts and web3Wallet.ts the only logging is logger.error on websocket onerror
    (web3Wallet.ts:22); no success-path audit entry records the submitted/claimed walletAddress or the solving actor.
  impact_description: Wallet-ownership claims and key submissions are non-attributable and non-repudiable, preventing detection
    and forensic reconstruction of crypto-surface abuse.
  likelihood: Medium
  impact: Low
  risk: Low
  controls_in_place: Error-only logging on websocket failure; no structured success/abuse audit trail.
  mitigation_title: Add structured audit logging for web3 key and wallet actions
  remediation:
    effort: Low
    steps:
    - Emit a structured audit event (timestamp, session/user id, route, submitted walletAddress, outcome) on each call to
      checkKeys, walletNFTVerify and contractExploitListener.
    - Log key-submission attempts as security events (without logging the key value itself) so brute-force patterns are detectable.
    - Ship these events to the same immutable/append-only sink used for the rest of the application's security logging.
    code_example: 'logger.info(JSON.stringify({ evt: ''web3.walletVerify'', actor: req.user?.id ?? ''anon'', wallet: metamaskAddress,
      result, ts: new Date().toISOString() }))'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html
  evidence:
