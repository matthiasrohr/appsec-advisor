- local_id: angular-frontend-007
  threat_category_id: TH-11
  additional_categories:
  - TH-04
  stride: Elevation of Privilege
  cwe: CWE-1021
  title: Missing Content-Security-Policy escalates any XSS to full takeover (index.html)
  affected_parameter: null
  scenario: 'There is no Content-Security-Policy delivered with the SPA (no CSP meta tag in frontend/src/index.html and no
    CSP header observable from this component). Combined with the nine bypassSecurityTrustHtml sinks and JWT-in-localStorage,
    this means any successful injection (findings -001/-002/-003) has an unrestricted execution and exfiltration surface:
    inline script runs, and a script can connect to an arbitrary attacker origin to beacon out `localStorage.getItem(''token'')`.
    A CSP with `script-src` restrictions and no `unsafe-inline` would block inline-injection execution and constrain exfiltration
    endpoints, turning several Critical XSS into contained failures.'
  evidence_summary: No CSP meta tag or header is present (grep for Content-Security-Policy in frontend/src returns nothing),
    so injected scripts run and exfiltrate without restriction.
  impact_description: Removes the last containment layer, allowing any XSS to execute inline and beacon the session token
    off-origin.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None — no CSP configured anywhere in the frontend.
  mitigation_title: Deliver a strict Content-Security-Policy disallowing unsafe-inline script
  remediation:
    effort: Medium
    steps:
    - Serve a CSP header from the backend (e.g. helmet.contentSecurityPolicy) with `default-src 'self'`, a nonce-based `script-src
      'self' 'nonce-...'`, and `object-src 'none'`; avoid `unsafe-inline`.
    - Set `connect-src` to the application's own origin so injected scripts cannot beacon tokens to attacker hosts.
    - Roll out in report-only mode first (`Content-Security-Policy-Report-Only`) to find and fix violations before enforcing.
    code_example: "app.use(helmet.contentSecurityPolicy({\n  directives: { defaultSrc: [\"'self'\"], scriptSrc: [\"'self'\"\
      ], objectSrc: [\"'none'\"], connectSrc: [\"'self'\"] }\n}))"
