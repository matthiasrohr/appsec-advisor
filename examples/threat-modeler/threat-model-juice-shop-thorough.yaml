components:
- id: angular-frontend
  name: Angular SPA Frontend
  description: Single-page application built with Angular, served as static files from frontend/dist/frontend/. Handles all
    user-facing UI including product search, authentication flows, user profile, shopping basket, admin panel, and challenge
    score board. Communicates with the backend via REST API and WebSocket.
  paths:
  - frontend/src/**
  - frontend/dist/**
  - frontend/*.json
  - frontend/*.ts
  tier: client
  complexity: complex
  framework: angular
  deployment_zones:
  - browser
  handles_sensitive_data: true
  threat_ids:
  - T-001
  - T-003
  - T-007
  - T-008
  - T-025
  - T-033
  - T-042
  - T-043
  - T-051
  - T-067
  - T-077
  - T-078
  - T-094
- id: express-backend
  name: Express REST API Backend
  description: 'Node.js/TypeScript Express application serving as the REST API backend. Implements 111 routes covering authentication,
    user management, product catalog, shopping basket, orders, file upload, B2B ordering, payment, and challenge verification.
    Entry point: build/app.js / server.ts. Contains intentional vulnerabilities as OWASP training challenges.'
  paths:
  - server.ts
  - routes/**
  - lib/**
  - models/**
  - data/**
  - build/**
  - app.ts
  tier: application
  complexity: complex
  framework: express
  deployment_zones:
  - container
  handles_sensitive_data: true
  threat_ids:
  - T-010
