    steps:
    - Replace the hardcoded HMAC key in lib/insecurity.ts:44 with a value loaded from an environment variable / secrets manager
      at startup, validated by lib/startup/validateConfig.ts.
    - 'Treat security answers like passwords: store a per-record salted hash (bcrypt/argon2id) rather than a deterministic
      HMAC, so identical answers across users do not collide and dictionary attacks are slowed.'
    - Rotate the key out of git history and invalidate existing answers (force re-enrollment).
