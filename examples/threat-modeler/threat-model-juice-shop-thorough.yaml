  stride: Denial of Service
  cwe: CWE-400
  title: Unbounded In Memory Token Map Growth (lib/insecurity.ts:72)
  affected_parameter: null
  scenario: Every successful login appends a new entry to `authenticatedUsers.tokenMap` (a plain JavaScript object) at `lib/insecurity.ts:76`.
    There is no entry eviction, no TTL enforcement, and no size cap. A script that logs in repeatedly (bypassing rate limiting,
    which is absent on `/rest/user/login`) can inflate `tokenMap` and `idMap` indefinitely. Because each entry holds a full
    user-data object including all model fields, memory growth is non-trivial. When heap usage exceeds the Node.js limit (~1.5
    GB default), the process crashes with OOM, denying service to all users.
  evidence_summary: '`lib/insecurity.ts:75-78` adds to `tokenMap` and `idMap` on every `put()` call with no corresponding
    removal or capacity check.'
