  stride: Spoofing
  cwe: CWE-522
  title: Derived Password from OAuth Emai… (frontend/src/app/oauth/oauth.component.ts:30)
  affected_parameter: profile.email
  scenario: '`oauth.component.ts:30` constructs each OAuth user''s local password as `btoa(profile.email.split('''').reverse().join(''''))`
    — the base64 encoding of the reversed email address. Any attacker who knows (or guesses) a victim''s email address can
    compute this password deterministically without OAuth involvement, then authenticate directly to `/rest/user/login` with
    those credentials. The OAuth flow thus creates a parallel credential pair that never changes, ignores OAuth token expiry,
    and bypasses all IdP-level session controls. For the email `user@juice-sh.op`, the password is `btoa(''po.hs-eciuj@resu'')`
    = `cG8uaHMtZWNpdWpAcmVzdQ==`, computable offline.'
  evidence_summary: '`btoa(profile.email.split('''').reverse().join(''''))` at line 30 derives a static, predictable local
    password from the OAuth email claim, persisting it via `userService.save()` at line 31.'
  impact_description: Any account linked via Google OAuth can be taken over by an attacker who knows the victim's email, without
    requiring OAuth tokens, IdP access, or phishing.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derivation is the only mechanism that creates the local credential for OAuth users.
  mitigation_title: Replace derived password with a cryptographically random secret for OAuth-linked accounts
  remediation:
    effort: Medium
    steps:
    - Replace the `btoa(email.reversed)` derivation with `crypto.getRandomValues(new Uint8Array(32))` encoded as base64 to
      generate a random, non-predictable password for each OAuth registration.
    - 'Alternatively, mark OAuth-only accounts in the backend with a flag (e.g. `isOAuthAccount: true`) and reject direct
      password login for those accounts at `/rest/user/login`.'
    - Rotate all existing OAuth-derived passwords on next login — force re-registration flow rather than reusing the predictable
      credential.
    code_example: '// Replace at oauth.component.ts:30

      const randomBytes = new Uint8Array(32)

      crypto.getRandomValues(randomBytes)

      const password = btoa(String.fromCharCode(...randomBytes))'
    reference: CWE-522
