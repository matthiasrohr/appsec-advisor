  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-321
  title: Security answers HMAC'd with hardcoded static key — models/securityAnswer.ts:46
  affected_parameter: answer
  scenario: 'The SecurityAnswer model setter stores answers as security.hmac(answer). lib/insecurity.ts:44 defines hmac with
    a hardcoded key literal ''pa4qacea4VK9t9nGv7yZtwmj'' baked into the source. Because the key is public (it ships in the
    repo and the bundle), the HMAC provides no secrecy: an attacker who reads the SecurityAnswers table can offline-compute
    HMAC(''pa4qacea4VK9t9nGv7yZtwmj'', guess) over a dictionary of common security-answer values (mother''s maiden name, pet
    name, city) and match the stored digests. Security answers gate the password-reset flow, so recovering them enables account
    takeover via the legitimate reset path.'
  evidence_summary: models/securityAnswer.ts:46 wraps the answer in security.hmac(), whose key is the hardcoded constant at
    lib/insecurity.ts:44.
  impact_description: Security answers become recoverable from a table dump, defeating the password-reset second factor and
    enabling account takeover.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: HMAC-SHA256 is applied, but with a static, source-embedded key that nullifies its protection.
  mitigation_title: Move the security-answer key to a secret store and salt per-record
  remediation:
