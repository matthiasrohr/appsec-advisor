  title: TOTP 2FA secret stored as plaintext column on User model (models/user.ts:112)
  affected_parameter: totpSecret
  scenario: The User model declares totpSecret as a plain DataTypes.STRING column (models/user.ts:112-115) with no encryption
    setter, and the seed data confirms it is stored as a readable base32 string (data/static/users.yml:151). The TOTP secret
    is the shared seed used to generate one-time codes; whoever reads it can generate valid 2FA codes for that account at
    will. Combined with the unencrypted database file (data-layer-003) and MD5 passwords (data-layer-001), a single database
    read both recovers the password AND defeats the second factor, fully neutralizing 2FA for every enrolled user.
  evidence_summary: models/user.ts:112 defines totpSecret as a plain STRING column with no cryptographic setter, and data/static/users.yml:151
    shows the value persisted as cleartext base32.
  impact_description: An attacker reading the database can mint valid TOTP codes, eliminating the second authentication factor
    for all enrolled accounts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: None. The 2FA seed is stored in the clear alongside the password hash.
  mitigation_title: Encrypt the TOTP secret at rest with a KMS-managed key
