    output encoding, so an attacker who sends a victim a link such as `/#/search?q=<img src=x onerror=alert(document.cookie)>`
    executes arbitrary JavaScript in the victim's origin. Because the session JWT lives in localStorage (see angular-frontend-006),
    the payload can read and exfiltrate the token. No server CSP header is present to blunt the payload.
  evidence_summary: The reflected `q` parameter is wrapped in bypassSecurityTrustHtml and rendered through [innerHTML], disabling
    Angular's default escaping.
  impact_description: Arbitrary script execution in the victim's session, enabling JWT theft from localStorage and full account
    takeover.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None on this path. Angular interpolation would normally encode output, but bypassSecurityTrustHtml deliberately
    opts out, and the server sends no Content-Security-Policy.
  mitigation_title: Remove bypassSecurityTrustHtml on the search term and render it as escaped text
  remediation:
    effort: Low
    steps:
    - Delete the `this.searchValue = this.sanitizer.bypassSecurityTrustHtml(queryParam)` call and bind the raw string via
      interpolation `{{ searchValue }}` so Angular auto-encodes it.
    - If highlighted HTML is genuinely required, sanitize with `DomSanitizer.sanitize(SecurityContext.HTML, value)` (which
