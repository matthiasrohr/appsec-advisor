  - internal-network
  handles_sensitive_data: false
  threat_ids:
  - T-019
  - T-030
  - T-044
  - T-045
  - T-046
  - T-059
  - T-075
  - T-076
- id: ci-cd-pipeline
  name: GitHub Actions CI/CD Pipeline
  description: GitHub Actions workflows in .github/workflows/ covering CI (ci.yml), CodeQL analysis (codeql-analysis.yml),
    Docker image builds (image_actions.yml), lint fixing (lint-fixer.yml), PR compliance (pr-compliance.yml), and issue locking
