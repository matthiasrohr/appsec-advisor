  title: Cross-Site Scripting (XSS)
  affected_parameter: q
  scenario: search-result.component.ts:143 takes the raw `q` query parameter (`this.route.snapshot.queryParams.q`) and passes
    it directly through `DomSanitizer.bypassSecurityTrustHtml`, then binds the result to `[innerHTML]="searchValue"` at search-result.component.html:11.
    Angular's built-in contextual escaping is explicitly turned off by the bypass call, so a link such as `/#/search?q=<img
    src=x onerror=alert(document.cookie)>` executes attacker JavaScript in the victim's session. Because the JWT lives in
    `localStorage` (read by the same origin) and there is no Content-Security-Policy, the injected script can read `localStorage.getItem('token')`
    and POST it to an attacker host — full account takeover from a single crafted URL.
  evidence_summary: search-result.component.ts:143 wraps the attacker-controlled `q` param in bypassSecurityTrustHtml and
    renders it via [innerHTML].
  impact_description: Arbitrary script execution in the victim origin, leading to JWT theft from localStorage and account
    takeover.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: Angular escapes interpolation by default, but that protection is explicitly disabled here by bypassSecurityTrustHtml.
    No CSP is configured to contain the blast radius.
  mitigation_title: Remove bypassSecurityTrustHtml from the search reflection and render the query as text
  remediation:
    effort: Low
    steps:
    - Delete the `bypassSecurityTrustHtml(queryParam)` call at search-result.component.ts:143 and assign the plain string
      to `searchValue`.
    - Change the template binding at search-result.component.html:11 from `[innerHTML]="searchValue"` to `{{ searchValue }}`
      (text interpolation) so Angular contextually escapes it.
    - If highlighted markup is genuinely required, sanitize with a strict allowlist (e.g. DOMPurify with no tags) instead
      of bypassing the sanitizer.
