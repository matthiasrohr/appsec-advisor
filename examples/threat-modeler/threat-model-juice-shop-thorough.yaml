trust_boundaries:
- id: tb-1
  name: Public Internet / Untrusted
  description: Any unauthenticated HTTP client reaching port 3000. Includes anonymous users, attackers, and crawlers. No authentication
    required to reach many endpoints.
  from: external
  to: backend-api
  crossing_controls:
  - none — direct HTTP, no WAF or API gateway in-repo
  threats:
  - SQL injection via login/search
  - XXE via file upload
  - User registration abuse
- id: tb-2
  name: Authenticated User Boundary
  description: JWT Bearer token boundary enforced by express-jwt isAuthorized() middleware. Token is RS256-signed but private
    key is committed — any attacker with repo access can forge tokens.
  from: external
  to: backend-api
  crossing_controls:
  - JWT RS256 (express-jwt 0.1.3 — ancient, alg:none susceptible)
  - In-memory token map (authenticatedUsers)
  threats:
  - JWT forgery with hardcoded key
  - IDOR on authenticated endpoints
  - RCE via B2B API
- id: tb-3
  name: Browser / SPA Client
  description: Angular SPA running in browser. JWT stored in localStorage — accessible to any JavaScript on the page. Client-side
    route guards are bypassable by direct API calls.
  from: frontend-spa
  to: backend-api
  crossing_controls:
  - JWT Bearer token in Authorization header
  - CORS wildcard (no restriction)
  threats:
  - XSS token theft from localStorage
  - Client-side auth guard bypass
- id: tb-4
  name: Application to Data Layer
  description: Express route handlers directly access SQLite (via Sequelize) and MarsDB without parameterization in key queries.
    No ORM abstraction on raw SQL queries.
  from: backend-api
  to: data-persistence
  crossing_controls:
  - Sequelize ORM (partially bypassed by sequelize.query())
  - MarsDB in-process (no auth)
  threats:
  - SQL injection via raw queries
  - NoSQL injection via untyped operators
- id: tb-5
  name: File System Boundary
  description: Route handlers read/write to ftp/, encryptionkeys/, logs/, frontend/dist/frontend/assets/public/images/uploads/.
    Some directories are publicly served with no authentication.
  from: backend-api
  to: external
  crossing_controls:
  - File type allowlist (bypassable via null byte)
  - sanitize-filename (1.4.2 — ancient)
  threats:
  - Path traversal via null byte
  - Sensitive file disclosure via /ftp and /encryptionkeys
- id: tb-6
  name: Server-Side Outbound (SSRF)
  description: Profile image URL upload causes the server to fetch arbitrary URLs. No allowlist or SSRF protection in place.
  from: backend-api
  to: external
  crossing_controls:
  - None — unconstrained fetch()
  threats:
  - SSRF to internal services or cloud metadata
- id: tb-7
  name: Admin Role Boundary
  description: Accounting and admin role enforcement via isAccounting() middleware and client-side AdminGuard. Backend role
    check reads JWT payload role field — forgeable.
  from: backend-api
  to: backend-api
  crossing_controls:
  - JWT role claim (forgeable with committed private key)
  - Client-side AdminGuard (bypassable)
  threats:
  - Privilege escalation via JWT forgery
  - Admin function access via direct API calls
