- local_id: frontend-spa-003
  threat_category_id: TH-04
  additional_categories:
  - TH-10
  stride: Information Disclosure
  cwe: CWE-922
  title: Insecure Client-Side Storage of JWT in localStorage
  affected_parameter: token
  scenario: The session JWT is persisted in `localStorage` (oauth.component.ts:51 `localStorage.setItem('token', authentication.token)`;
    read back by the guards at app.guard.ts:18 and :35). localStorage is readable by any JavaScript executing in the origin,
    so any of the confirmed XSS sinks in this SPA (search-result.component.ts:143 DOM XSS, data-export.component.ts:71 document.write,
    the bypassSecurityTrustHtml sinks) can exfiltrate the bearer token in a single line, granting full session hijack. The
    token is also long-lived (the OAuth flow copies it into an 8-hour cookie at oauth.component.ts:48-50) and survives tab/window
    close. There is no CSP in index.html to constrain where an injected script could POST the stolen token.
  evidence_summary: oauth.component.ts:51 writes the JWT to localStorage and app.guard.ts:18/:35 reads it back; no HttpOnly/CSP
    boundary protects it from JavaScript.
  impact_description: Any XSS in the origin yields immediate session-token theft and account takeover with no additional user
    interaction.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. Token sits in JavaScript-readable localStorage; no CSP present in index.html.
  mitigation_title: Move the session token out of localStorage into an HttpOnly Secure SameSite cookie via a BFF
  remediation:
    effort: High
    steps:
    - Stop calling `localStorage.setItem('token', ...)`; hold the session server-side and issue an HttpOnly Secure SameSite=Strict
      cookie the SPA cannot read.
    - Have the guards rely on a lightweight `/whoami`/session endpoint rather than decoding a client-readable JWT.
    - Add a Content-Security-Policy (script-src 'self' plus the explicit font origins) to blunt token exfiltration if an XSS
      slips through.
    code_example: null
    reference: https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#local-storage
    blueprint: null
