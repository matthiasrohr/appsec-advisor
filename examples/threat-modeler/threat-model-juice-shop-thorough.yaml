tier_root_causes:
  edge:
  - Session token in localStorage turns any XSS into account takeover
  - Authorization decided client-side and from mutable browser state
  - Missing CSP leaves injected JS unconstrained
  - Unauthenticated real-time and OAuth flows trust client identity
  server:
  - Sensitive routes registered without authentication or authz middleware
  - Untrusted input reaches SQL, NoSQL and command sinks unneutralized
  - Hardcoded crypto secrets enable JWT forgery and signature bypass
  - Mass-assignment lets request bodies set privileged fields
  - No rate limiting or resource caps on expensive endpoints
  data:
  - PII, PANs and TOTP seeds stored in plaintext with no encryption at rest
  - Weak/hardcoded key derivation (MD5, hardcoded HMAC key) for secrets
  - Cleartext credentials and card data committed in seed fixtures
  - Single-file SQLite write serialization is a process-wide DoS point
