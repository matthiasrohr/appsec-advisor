- local_id: data-persistence-001
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Unsalted MD5 password storage
  affected_parameter: password
  scenario: The User model's password setter calls security.hash() (models/user.ts:76), which is defined as crypto.createHash('md5').update(data).digest('hex')
    with no salt and no work factor (lib/insecurity.ts:41). Every account password — including the seeded admin — lands in
    the Users table as a bare 32-hex MD5 digest. An attacker who reads the SQLite file via the SQL-injection paths in login/search,
    a stolen backup, or container filesystem access recovers the cleartext for common and even moderately complex passwords
    in seconds using GPU rainbow tables or hashcat mode 0. Because identical passwords produce identical digests, the absence
    of a per-user salt also reveals password reuse across accounts directly from the column.
  evidence_summary: models/user.ts:76 stores the password column as the return of security.hash(), which lib/insecurity.ts:41
    implements as unsalted MD5 (createHash('md5')).
  impact_description: Database read of the Users table yields all account passwords in cleartext within seconds, enabling
    full account takeover including admin.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None for password storage. MD5 is the only transform applied; no salt, no adaptive hash.
  mitigation_title: Replace MD5 password hashing with per-user salted bcrypt/argon2 in the User model setter
  remediation:
    effort: Medium
    steps:
    - 'Replace security.hash() in the password setter (models/user.ts:76) with an adaptive password hash: bcrypt (cost >=
      12) via the existing bcryptjs dependency, or argon2id.'
    - Store the full algorithm-tagged hash string (e.g. $2b$12$...) so salt and cost travel with the value; drop the MD5 path
      in lib/insecurity.ts:41 for credential use.
    - 'Add a transparent rehash-on-login migration: on successful authentication, if the stored hash is legacy MD5, recompute
      with bcrypt and update the row.'
    - Verify the login comparison path uses a constant-time verify (bcrypt.compare) rather than re-hashing and string-equality.
    code_example: "import bcrypt from 'bcryptjs'\n// User model password setter\npassword: {\n  type: DataTypes.STRING,\n\
      \  set (clearTextPassword: string) {\n    this.setDataValue('password', bcrypt.hashSync(clearTextPassword, 12))\n  }\n\
      }"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
    blueprint: null
