- local_id: chat-llm-008
  threat_category_id: TH-01
  additional_categories:
  - TH-05
  stride: Tampering
  cwe: CWE-94
  title: Insecure Handling of LLM Tool-Call Output
  affected_parameter: discount
  scenario: 'LLM05 — Improper Output Handling: tool `execute` handlers consume the model''s structured output as trusted commands.
    `generateCoupon` (line 181) calls `security.generateCoupon(discount)` with whatever number the model emits; `getProductReviews`
    (line 149) builds a MongoDB `$where` clause `''this.product == '' + productId` from the model-supplied `id` (coerced via
    `Number(id)` at line 148, which blunts injection but still drives a server-side JS `$where` evaluation from model-controlled
    data). A compromised or malicious LLM provider (actor ACT-X-2, on the Application → External LLM Provider trust boundary)
    — or any successful prompt injection steering the model — controls these tool arguments. The application performs no post-model
    validation of tool inputs against business rules before acting on them, so adversarial model output becomes adversarial
    server action.'
  evidence_summary: Model-produced tool arguments flow into a coupon-generation call and a MongoDB $where evaluation with
    no server-side validation of the values against policy.
  impact_description: A compromised provider or injected prompt turns model output into unauthorized financial actions and
    model-driven NoSQL $where evaluation.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: zod validates the type/shape of tool inputs (e.g. `discount` is a number, line 179) and `Number(id)`
    coerces the review id (line 148), but no value-range or business-rule validation occurs before the side effect.
  mitigation_title: Validate and constrain LLM tool output before executing side effects
  remediation:
    effort: Medium
    steps:
    - 'Treat all tool-call arguments as untrusted: range-check `discount` (clamp to the server max) and verify preconditions
      in code before calling `security.generateCoupon`.'
    - 'Replace the `$where: ''this.product == '' + productId` string evaluation in `getProductReviews` with a structured equality
      query (`{ product: productId }`) so model-controlled data never drives JavaScript evaluation.'
    - Pin and monitor the provider; treat provider responses (text and tool calls) as untrusted input crossing a trust boundary,
      never as authoritative commands.
    code_example: '// getProductReviews — avoid $where JS evaluation

      return await db.reviewsCollection.find({ product: Number(id) }) as Review[]'
