  cwe: CWE-916
  title: Unsalted MD5 Password Hashing — lib/insecurity.ts:41
  affected_parameter: null
  scenario: 'Passwords are hashed with unsalted MD5: hash() at lib/insecurity.ts:41 is crypto.createHash(''md5'').update(data).digest(''hex''),
    and the User model password setter (models/user.ts:76) applies it on every write. MD5 is fast and collision-broken, and
    the absence of a per-user salt means identical passwords produce identical digests and enable precomputed rainbow-table
    lookups. If an attacker obtains the Users table (e.g. via the login SQLi in auth-service-001), essentially every password
    is recoverable in minutes on commodity hardware. This contradicts the ''bcrypt'' control claimed for this component —
    the actual runtime hash is MD5.'
  evidence_summary: lib/insecurity.ts:41 defines the password hash as unsalted MD5; models/user.ts:76 applies it to every
    stored password.
  impact_description: Mass offline recovery of all user passwords once the Users table is exposed; credential reuse amplifies
    blast radius across other systems.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. No salt, no work factor; MD5 is unsuitable for password storage.
  mitigation_title: Migrate password storage to bcrypt/argon2 with per-user salt
  remediation:
    effort: Medium
    steps:
    - Replace the MD5 hash() at lib/insecurity.ts:41 with bcrypt (cost >= 12) or argon2id, which apply a per-user salt automatically.
    - 'Rehash on next successful login: verify the legacy MD5, then store a bcrypt/argon2 hash, phasing out MD5 without a
      mass reset.'
    - Update the User model password setter (models/user.ts:76) and the login comparison to use the new async verify function.
    code_example: 'import bcrypt from ''bcrypt''

      const hashPassword = (pw: string) => bcrypt.hash(pw, 12)

      const checkPassword = (pw: string, stored: string) => bcrypt.compare(pw, stored)'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
