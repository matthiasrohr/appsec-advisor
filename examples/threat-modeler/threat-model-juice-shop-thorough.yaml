  stride: Tampering
  cwe: CWE-1357
  title: Package lock=false in .npmrc Disables Lockfile Integrity for All CI… (.npmrc:1)
  affected_parameter: null
  scenario: The `.npmrc` file at the repository root sets `package-lock=false` (line 1), which disables npm lockfile generation
    globally. Every `npm install` executed in CI (across `coding-challenge-rsn`, `test`, `api-test`, `e2e`, `custom-config-test`,
    `smoke-test`, `docker` build jobs, and the `Dockerfile` installer stage) resolves dependencies fresh against the npm registry
    using only semver range constraints from `package.json`. There is no `package-lock.json` to verify package integrity against
    known-good resolved versions and their SHA-512 integrity hashes. This means a maliciously published new version of any
    transitive dependency that satisfies the semver range will be silently picked up on the next CI run. Combined with the
    absence of `--ignore-scripts` in most CI install steps (see ci-cd-pipeline-002) and no `npm audit` gate, this creates
    an undetected supply-chain substitution path.
  evidence_summary: '`.npmrc:1` sets `package-lock=false`, disabling lockfile-based integrity verification for every `npm
    install` invocation across all CI jobs and the Docker build.'
  impact_description: Resolving dependencies without a lockfile means a semver-compatible malicious package version injected
    into the npm registry installs silently on the next CI run without any integrity check or reviewer awareness.
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: None specifically for lockfile integrity. CycloneDX SBOM is generated but only captures what was installed,
    not what was expected.
  mitigation_title: Remove package-lock=false from .npmrc and commit a package-lock.json for CI integrity verification
  remediation:
    effort: Medium
    steps:
    - Remove `package-lock=false` from `.npmrc`. Run `npm install` locally to generate a `package-lock.json` and commit it
      to the repository.
    - Change all CI `npm install` steps to `npm ci` (which uses the lockfile exclusively and fails if `package.json` and `package-lock.json`
      are out of sync), replacing `npm install` in `ci.yml` and `release.yml`.
    - Add `npm audit --audit-level=high` as a required CI step in the `lint` job to detect known CVEs in the resolved dependency
      tree on every PR.
    code_example: "# .npmrc — remove package-lock=false\n# (delete the line or set to default)\nlegacy-peer-deps=true\n\n\
      # ci.yml — use npm ci for reproducible installs\n- name: \"Install application\"\n  run: npm ci --ignore-scripts"
    reference: CWE-1357
  evidence:
  - file: .npmrc
    line: 1
