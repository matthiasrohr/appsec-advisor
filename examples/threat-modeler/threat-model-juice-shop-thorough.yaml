- local_id: ci-cd-pipeline-009
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-829
  title: No Minimum Release-Age Cooldown on Installs — .npmrc:1
  affected_parameter: null
  scenario: Neither `.npmrc` nor `package.json` nor any CI step sets a dependency install cooldown (`minimumReleaseAge`, `npmMinimalAgeGate`,
    or `--exclude-newer`). Combined with the missing lockfile (ci-cd-pipeline-001) and `npm install` resolution (ci-cd-pipeline-002),
    any version published to npm is installable into a CI build the instant it goes live — before the community detects and
    yanks a malicious release. The 2025 chalk/debug compromise (~2.5h live) and the self-replicating Shai-Hulud worm (796
    packages) both propagated faster than manual yanking; a 24-hour cooldown would have blocked installs of those brand-new
    poisoned versions. SHA-pinning and lockfiles pin *existing* versions and do nothing against a freshly-poisoned new release
    that resolution then picks up.
  evidence_summary: No `minimumReleaseAge` / `--exclude-newer` cooldown is configured in `.npmrc`, `package.json`, or any
    workflow, so newly-published versions are installable immediately.
  impact_description: A maliciously-published new package version is pulled into a build during the live-malicious window
    before it is detected and yanked.
  likelihood: Low
  impact: Medium
  risk: Low
  controls_in_place: None for release-age; CycloneDX SBOM provides post-build version visibility only.
  mitigation_title: Enforce a minimum-release-age cooldown on dependency installs
  remediation:
    effort: Low
    steps:
    - Set a cooldown so brand-new versions are not installable immediately — e.g. configure `minimumReleaseAge` in a Renovate
      config, or pass `--exclude-newer=<date>` to a hash-locked resolver, or adopt npm's release-age gate once available.
    - Pair the cooldown with the committed lockfile (ci-cd-pipeline-001) so routine builds use pinned versions and only cooldown-cleared
      updates enter the lockfile.
    code_example: "// renovate.json\n{\n  \"minimumReleaseAge\": \"1 day\"\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html
  evidence:
  - file: .npmrc
    line: 1
  evidence_check: verified
  controls_absent_evidence:
  - pattern: minimumReleaseAge|exclude-newer|npmMinimalAge
    search_paths:
    - .npmrc
    - package.json
    - .github/
