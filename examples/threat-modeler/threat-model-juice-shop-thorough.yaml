  title: NoSQL $where Injection in getProductReviews Tool — routes/chat.ts:147
  affected_parameter: id (product ID parameter to getProductR…
  scenario: 'The `getProductReviews` tool at line 147 constructs a MongoDB `$where` query by string-concatenating the LLM-supplied
    `productId` value: `{ $where: ''this.product == '' + productId }`. If an attacker uses prompt injection to convince the
