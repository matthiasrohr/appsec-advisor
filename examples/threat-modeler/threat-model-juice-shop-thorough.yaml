  title: SQL Injection in login query — routes/login.ts:34
  affected_parameter: email
  scenario: An attacker submits the login form with the email field set to ' OR 1=1--. Because req.body.email is concatenated
    directly into the query string at routes/login.ts:34 (SELECT * FROM Users WHERE email = '<email>' AND password = '<md5hash>'
    AND deletedAt IS NULL), the injected clause short-circuits the WHERE predicate. The query returns the first Users row
    — the seeded admin account — and login.ts:47 issues a valid RS256 JWT for that user. The attacker is authenticated as
    admin without knowing any password. The password branch is equally injectable, and UNION-style payloads let the attacker
    exfiltrate arbitrary Users columns via the login response.
  evidence_summary: req.body.email and the md5 hash are interpolated into models.sequelize.query at routes/login.ts:34 with
    no parameterization.
  impact_description: Full authentication bypass to any account (admin included) plus blind/UNION read of the Users table.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The value is passed to sequelize.query as a template literal; no bind parameters, no escaping.
  mitigation_title: Replace interpolated login query with parameterized Sequelize replacements
  remediation:
