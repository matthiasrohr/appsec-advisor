  stride: Spoofing
  cwe: CWE-321
  title: Hardcoded RSA Signing Key — lib/insecurity.ts:21
  affected_parameter: null
  scenario: 'The 1024-bit RSA private key used to sign every session JWT is embedded verbatim at lib/insecurity.ts:21 and
    committed to the public OWASP Juice Shop GitHub repository. An attacker clones the repo, copies the PEM block, and signs
    a JWT offline with { data: { id: 1, email: ''admin@juice-sh.op'', role: ''admin'' }, algorithm: ''RS256'' }. Because authorize()
    at insecurity.ts:54 and the express-jwt middleware at insecurity.ts:52 both trust this key pair, the forged token is accepted
    as a fully authenticated admin session — no login, no SQLi, no interaction with the server needed. The same key also signs
    the 2FA tmpToken and the totp_setup_secret, so the attacker can mint tokens of any type. deluxeToken() at insecurity.ts:150
    reuses this same key as an HMAC secret, so paid ''deluxe'' role entitlements are forgeable too.'
  evidence_summary: A complete RSA PRIVATE KEY PEM literal is assigned to privateKey at lib/insecurity.ts:21 and consumed
    by authorize() and deluxeToken().
  impact_description: Offline forgery of a valid session token for any user and role; the key cannot be trusted and must be
    rotated out of source control.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The key is a source-code constant; rotation requires a code change and the current key is permanently
    compromised.
  mitigation_title: Move the JWT signing key out of source and rotate the compromised key pair
  remediation:
    effort: Medium
    steps:
    - Generate a fresh 2048-bit (minimum) RSA key pair and store the private key in a secret manager (AWS Secrets Manager
      / Vault) or an injected environment variable, never in the repository.
    - Load the key at startup via process.env or the secret-manager SDK; delete the literal at lib/insecurity.ts:21 and purge
      it from git history.
    - Rotate the key immediately and invalidate all outstanding tokens; treat every token ever signed with the old key as
      forged.
    - Stop reusing the signing key as the deluxeToken HMAC secret at lib/insecurity.ts:150 — use a separate, secret-managed
      HMAC key.
    code_example: 'const privateKey = process.env.JWT_PRIVATE_KEY

      if (!privateKey) throw new Error(''JWT_PRIVATE_KEY not configured'')'
    reference: CWE-321
