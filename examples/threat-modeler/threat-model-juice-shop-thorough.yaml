  cwe: CWE-400
  title: No Rate Limiting or Connection Cap… (lib/startup/registerWebsocketEvents.ts:20)
  affected_parameter: null
  scenario: 'The Socket.IO server is created at line 20 with no `maxHttpBufferSize` restriction beyond the default 1 MB, no
    per-IP connection limit, and no per-socket event-rate throttle. Any unauthenticated client can: (a) open an unbounded
    number of parallel connections, (b) flood any of the four event handlers at arbitrary rate. The `notification received`
    handler (line 34) calls `notifications.findIndex()` and `notifications.splice()` in the main event loop — flooding with
    non-matching flag values causes repeated O(n) scans degrading throughput. The `verifyLocalXssChallenge` handler (line
    41) calls `challengeUtils.solveIf` which invokes `challenge.save()` (Sequelize DB write) — event flooding translates to
    unbounded DB write load.'
  evidence_summary: 'The `Server` constructor at line 20 specifies only `{ cors: { origin: ... } }` — no `connectionStateRecovery`,
    `maxHttpBufferSize` override, or transports limit. No rate-limit middleware wraps `socket.on(...)` handlers.'
  impact_description: An attacker flooding the socket channel with connection requests or event spam can exhaust Node.js event-loop
    capacity and Sequelize connection pool, causing application-wide latency or crash.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: express-rate-limit is configured on `/rest/user/reset-password` and 2FA HTTP endpoints but does not cover
    the WebSocket upgrade path.
  mitigation_title: Add per-IP connection limits and event-rate throttling to the Socket.IO server
  remediation:
    effort: Low
    steps:
    - 'Set `maxHttpBufferSize: 1e4` (10 KB) on the `Server` constructor to prevent large-payload attacks.'
    - Implement a connection counter per IP using `socket.handshake.address`; disconnect when a single IP exceeds a configurable
      threshold (e.g. 10 concurrent sockets).
    - Use the `socket.io-rate-limiter` package or a manual per-socket counter to throttle event emissions — e.g. allow no
      more than 20 events per second per socket before disconnecting.
    - Require authentication on connection (socket-io-001) — this alone reduces the attack surface to authenticated users
      only.
    code_example: "```typescript\nconst io = new Server(server, {\n  cors: { origin: config.get('server.frontendUrl') },\n\
      \  maxHttpBufferSize: 1e4\n})\n```"
