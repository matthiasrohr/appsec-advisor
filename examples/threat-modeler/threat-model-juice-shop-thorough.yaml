components:
- id: backend-api
  name: Express REST API Backend
  type: process
  tier: application
  description: Node.js/Express monolith serving all REST endpoints at /rest/* and /api/*, authentication via JWT, session
    management via in-memory token map, business logic orchestration, file serving (/ftp, /encryptionkeys, /support/logs),
    Prometheus metrics.
  paths:
  - server.ts
  - routes/**
  - lib/**
  - app.ts
  responsibilities:
  - User authentication (JWT RS256 sign/verify)
  - Authorization enforcement (isAuthorized middleware)
  - REST API business logic for all domain operations
  - File upload handling delegation
  - Static file and directory serving
  threat_ids:
  - T-002
  - T-003
  - T-004
  - T-007
  - T-008
  - T-015
  - T-016
  - T-022
  - T-023
  - T-028
  - T-030
  - T-031
  - T-032
  - T-042
  - T-046
  - T-061
  - T-062
  complexity: complex
- id: frontend-spa
  name: Angular SPA Frontend
  type: process
  tier: client
  description: Angular 20 single-page application built to frontend/dist/frontend/, served as static assets by the backend.
    Manages client-side routing with guards (LoginGuard, AdminGuard), stores JWT in localStorage, communicates via REST and
    Socket.IO.
  paths:
  - frontend/src/**
  responsibilities:
  - Client-side routing with auth guards
  - JWT token storage in localStorage
  - User interaction forms (login, register, checkout)
  - Challenge solve notification via Socket.IO
  threat_ids:
  - T-006
  - T-010
  - T-011
  - T-020
  - T-025
  - T-026
  - T-039
  - T-050
  - T-054
  - T-058
  complexity: complex
- id: data-persistence
  name: Data Layer (SQLite + MarsDB)
  type: datastore
  tier: data
  description: SQLite database (via Sequelize ORM) storing users, products, orders, complaints; MarsDB in-process NoSQL collection
    storing product reviews and B2B orders. Both are accessed directly from route handlers.
  paths:
  - models/**
  - data/mongodb.ts
  - data/datacreator.ts
  responsibilities:
  - User credential storage (MD5-hashed passwords)
  - Product and basket data persistence
  - Review and order data in MarsDB collections
  threat_ids:
  - T-001
  - T-005
  - T-035
  - T-036
  - T-043
  - T-056
  complexity: moderate
- id: file-upload-service
  name: File Upload & Parsing Service
  type: process
  tier: application
  description: Multer-backed upload handling in routes/fileUpload.ts and related routes. Processes XML (via libxmljs2 with
    noent:true), ZIP, YAML files. Also handles profile image URL fetching and profile image file uploads.
  paths:
  - routes/fileUpload.ts
  - routes/profileImageFileUpload.ts
  - routes/profileImageUrlUpload.ts
  responsibilities:
  - File type validation and size limiting
  - XML parsing with XXE enabled (intentional)
  - ZIP extraction (potential zip bomb)
  - SSRF via URL-based profile image fetch
  threat_ids:
  - T-009
  - T-014
  - T-019
  - T-029
  - T-037
  - T-038
  - T-044
  - T-045
  - T-049
  complexity: moderate
- id: b2b-api
  name: B2B Order API
  type: gateway
  tier: application
  description: B2B order submission endpoint at POST /b2b/v2/orders requiring authentication. Uses vm.createContext + notevil.safeEval
    to evaluate orderLinesData — intentional RCE vulnerability. Requires JWT auth.
  paths:
  - routes/b2bOrder.ts
  responsibilities:
  - B2B order ingestion
  - Sandbox-based eval of order expressions (intentionally vulnerable)
  threat_ids:
  - T-012
  - T-013
  - T-041
  - T-057
  - T-064
  complexity: moderate
- id: data-layer
  name: Authentication & Session Store
  type: process
  tier: application
  description: 'In-memory authentication state management in lib/insecurity.ts: token map (tokenMap), user ID map (idMap).
    JWT signing with hardcoded RSA private key. MD5 password hashing. Also includes the 2FA TOTP implementation.'
  paths:
  - lib/insecurity.ts
  - routes/login.ts
  - routes/2fa.ts
  - routes/changePassword.ts
  - routes/resetPassword.ts
  responsibilities:
  - JWT issuance (RS256 with hardcoded private key)
  - Token validation and user lookup
  - Password hashing (MD5)
  - 2FA TOTP setup and verification
  threat_ids:
  - T-017
  - T-018
  - T-034
  - T-048
  - T-055
  - T-059
  complexity: complex
- id: ci-cd-pipeline
  name: CI/CD Pipeline
  type: external
  tier: application
  description: GitHub Actions workflows for lint, unit tests, coding challenge RSN, and packaging. Uses pinned SHA hashes
    for actions. Produces SBOM via CycloneDX. No SAST or dependency audit in pipeline.
  paths:
  - .github/workflows/**
  - Dockerfile
  - .npmrc
  responsibilities:
  - Automated build, test, lint
  - Container image build (distroless)
  - SBOM generation
  threat_ids:
  - T-024
  - T-033
  - T-047
  - T-051
  - T-052
  - T-053
  - T-065
  - T-066
  - T-067
  - T-068
  complexity: simple
- id: socket-io
  name: Socket.IO Real-time Channel
  type: queue
  tier: application
  description: Socket.IO server registered on HTTP server in lib/startup/registerWebsocketEvents.ts. Emits challenge-solved
    notifications and verifies XSS challenge solutions. CORS configured for localhost:4200. Processes untrusted socket event
    payloads.
  paths:
  - lib/startup/registerWebsocketEvents.ts
  responsibilities:
  - Real-time challenge solve notifications
  - Client-side XSS challenge verification (verifyLocalXssChallenge)
  - SVG injection challenge verification
  threat_ids:
  - T-021
  - T-027
  - T-040
  - T-060
  - T-063
  complexity: simple
assets:
- id: A-001
  name: User Credential Store
  classification: Restricted
  description: SQLite Users table storing email addresses and MD5-hashed passwords. Compromise enables account takeover for
    all users.
  linked_threats: []
- id: A-002
  name: JWT RSA Private Key
  classification: Restricted
  description: Hardcoded RSA private key in lib/insecurity.ts:23. Used to sign all JWT tokens. Full key committed to source
    repository — permanently compromised.
  linked_threats: []
- id: A-003
  name: Payment Card Data
  classification: Restricted
  description: Credit/debit card records stored in SQLite Cards table (CardModel). Includes card number, expiry, and CVV fields
    accessible via /api/Cards endpoints.
  linked_threats: []
- id: A-004
  name: User Orders and Purchase History
  classification: Confidential
  description: Order records in MarsDB ordersCollection and Sequelize tables. Contains purchase history, delivery addresses,
    and pricing data per user.
  linked_threats: []
- id: A-005
  name: Product Review Data
  classification: Internal
  description: Product reviews in MarsDB reviewsCollection. NoSQL injection can enable mass modification or enumeration of
    all reviews.
  linked_threats: []
- id: A-006
  name: Application Access Logs
  classification: Confidential
  description: Morgan HTTP access logs stored in logs/access.log.YYYY-MM-DD. Served publicly at /support/logs/:file. Contain
    IP addresses, user agents, and request paths.
  linked_threats: []
- id: A-007
  name: FTP Sensitive Files
  classification: Confidential
  description: 'Files in the ftp/ directory: acquisitions.md (business intel), incident-support.kdbx (KeePass password database),
    package.json.bak, coupons_2013.md.bak. Directory listing enabled.'
  linked_threats: []
- id: A-008
  name: User Profile Images and Memories
  classification: Internal
  description: User-uploaded profile images stored in frontend/dist/frontend/assets/public/images/uploads/. Accessible publicly.
    SSRF allows fetching attacker-controlled content.
  linked_threats: []
- id: A-009
  name: Challenge Progress Data
  classification: Internal
  description: In-memory challenge state (datacache) and continue-code progress. Tracks which security challenges users have
    solved.
  linked_threats: []
- id: A-010
  name: Wallet Balance and Deluxe Membership
  classification: Confidential
  description: User wallet balances in Wallet model and deluxe membership status stored in Users table (deluxeToken). Financial
    data requiring integrity protection.
  linked_threats: []
- id: A-011
  name: Encryption Keys Directory
  classification: Restricted
  description: encryptionkeys/ directory served at /encryptionkeys/:file. Contains jwt.pub (JWT public key) and premium.key.
    Public serving enables offline key analysis.
  linked_threats: []
- id: A-012
  name: Web3 NFT Contract Keys
  classification: Confidential
  description: Alchemy API key hardcoded in routes/web3Wallet.ts and routes/nftMint.ts for Ethereum Sepolia testnet access.
    Web3 contract addresses embedded in source.
  linked_threats: []
