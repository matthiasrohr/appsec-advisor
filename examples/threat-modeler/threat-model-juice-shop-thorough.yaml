  stride: Elevation of Privilege
  cwe: CWE-22
  title: Zip slip path traversal via unvalidated entry.path in archive extraction routes…
  affected_parameter: ZIP archive entry filenames
  scenario: 'An unauthenticated attacker uploads a crafted ZIP file containing an entry with a path such as `../../server.ts`
    or `../../lib/insecurity.ts`. In `handleZipFileUpload`, `entry.path` at line 41 is used directly to construct both `absolutePath`
    (line 42: `path.resolve(''uploads/complaints/'' + fileName)`) and the write target (line 45: `fs.createWriteStream(''uploads/complaints/''
    + fileName)`). The guard at line 44 checks `absolutePath.includes(path.resolve(''.''))` — `String.includes()` tests substring
    presence, not prefix anchoring. The guard also passes when the attacker uses a deeply nested relative path that happens
    to contain the cwd string. Critically, line 45 uses the raw `fileName` string for the `createWriteStream` call — even
    if the `absolutePath` check passes, the stream is opened against the unresolved relative path, allowing writes to `../../`
    directories. An attacker can overwrite application files (e.g. route handlers, configuration) and achieve code execution
    on the next request that loads the overwritten file.'
  evidence_summary: '`fs.createWriteStream(''uploads/complaints/'' + fileName)` at line 45 uses the raw unsanitized ZIP entry
    path without ensuring it is contained within the target directory; the guard at line 44 uses `String.includes()` which
    does not anchor the path prefix.'
