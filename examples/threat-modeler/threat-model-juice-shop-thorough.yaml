  cwe: CWE-778
  title: Bot auto-commits to contributor branches and master without — lint-fixer.yml:22
  affected_parameter: stefanzweifel/git-auto-commit-action
  scenario: 'lint-fixer.yml triggers on every `push` (line 3) and, after running `npm run lint:fix`, uses git-auto-commit-action
    to push a commit to `${{ github.head_ref }}` authored as JuiceShopBot (lines 22-29). frontend-bundle-analysis.yml similarly
    commits a screenshot directly to `master` with a generic ''GitHub Action'' identity and `continue-on-error: true` swallowing
    failures (frontend-bundle-analysis.yml:59-67). These automated writes mutate branch contents under a bot identity that
    is not gated by code review, and because no append-only audit record ties the bot''s action back to the triggering actor/run,
    a later dispute over ''who introduced this change'' cannot be resolved from an authoritative log — the commit metadata
    is the only trail and it is bot-attributed. On a public repo the lint-fixer push to a fork''s head branch also means the
    bot writes into contributor-controlled refs automatically.'
  evidence_summary: Two workflows perform unreviewed automated git commits (to contributor head branches and to master) under
    bot identities, with one suppressing its own failures via continue-on-error.
  impact_description: Automated branch mutations are attributed only to a bot with no append-only accountability log, weakening
    forensic reconstruction of who caused a change.
  likelihood: Low
  impact: Low
  risk: Low
  controls_in_place: Commits carry a DCO sign-off (--signoff / -s) and a fixed bot author identity, and the git-auto-commit
    action is SHA-pinned (lint-fixer.yml:22).
  mitigation_title: Record automated-commit provenance and remove silent failure on master pushes
  remediation:
    effort: Low
    steps:
    - Include the triggering run URL and actor in the auto-commit message body (e.g. via `${{ github.run_id }}` / `${{ github.actor
      }}`) so each bot commit links back to its workflow run (lint-fixer.yml:24).
    - 'Remove `continue-on-error: true` from the master push step or surface its failure to a monitored channel so silent
      drift is not possible (frontend-bundle-analysis.yml:67).'
    - Forward CI mutation events (bot commits, deploys) to an append-only audit sink keyed by actor + action + ref + timestamp.
    - Restrict the lint-fixer auto-commit to same-repo branches rather than arbitrary contributor head refs.
    code_example: "with:\n  commit_message: |\n    Auto-fix linting issues\n    Run: ${{ github.server_url }}/${{ github.repository\
