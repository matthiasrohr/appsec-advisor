  scenario: 'The only dependency-update configuration is `.dependabot/config.yml` declaring `version: 1` (line 1) — the legacy
    Dependabot format GitHub deprecated and shut down years ago; this file is inert and no `.github/dependabot.yml` v2 config
    exists. No CI job runs `npm audit`, Snyk, Trivy, Grype, OSV-Scanner, or dependency-check (confirmed by grep across .github/workflows
