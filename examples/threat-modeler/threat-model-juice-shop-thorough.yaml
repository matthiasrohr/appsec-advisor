    WHERE ((name LIKE ''%${criteria}%'' ...)`. The only guard is truncating input to 200 characters. An attacker submits `q=''))UNION
    SELECT sql,2,3,4,5,6,7,8,9 FROM sqlite_master--` to dump the full schema, then separately selects from any table. The
    Users table, including email, MD5 password hashes, and TOTP secrets, is fully readable by any unauthenticated visitor.'
