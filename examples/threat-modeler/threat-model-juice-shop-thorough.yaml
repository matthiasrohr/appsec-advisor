  stride: Information Disclosure
  cwe: CWE-916
  title: Weak Password Hash (lib/insecurity.ts:41)
  scenario: 'hash() at lib/insecurity.ts:41 stores passwords as unsalted MD5 (crypto.createHash(''md5'')). This is the hash
    written on password reset (routes/resetPassword.ts:44 via user.update) and compared on 2FA setup/disable (routes/2fa.ts:107,
    152). MD5 is a fast, unsalted digest: an attacker who reads the Users table (e.g. via auth-003 SQLi) recovers plaintext
    passwords using precomputed rainbow tables or GPU brute force at billions of guesses per second, and identical passwords
    produce identical hashes, exposing password reuse across accounts.'
  evidence_summary: Password hashing is unsalted MD5 at lib/insecurity.ts:41, used as the credential-at-rest representation.
  impact_description: Mass plaintext password recovery from any database read, enabling credential stuffing against other
    sites.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: None. No salt, no work factor, no per-user uniqueness.
  mitigation_title: Replace MD5 password hashing with bcrypt/argon2id and a per-user salt
  remediation:
    effort: Medium
    steps:
    - 'Replace crypto.createHash(''md5'') at lib/insecurity.ts:41 with a memory-hard KDF: bcrypt (cost >= 12) or argon2id.'
    - 'Migrate existing hashes lazily: on next successful login, re-hash the supplied password with the new algorithm and
      persist it.'
    - Ensure 2FA setup/disable (routes/2fa.ts:107, 152) and login (routes/login.ts:34) compare via the new verify function,
      not by hash equality on MD5.
    code_example: 'import bcrypt from ''bcryptjs''

      export const hashPassword = (pw: string) => bcrypt.hashSync(pw, 12)

      export const verifyPassword = (pw: string, stored: string) => bcrypt.compareSync(pw, stored)'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
