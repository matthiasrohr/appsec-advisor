  cwe: CWE-613
  title: Token verify ignores expiry and standard claims — lib/insecurity.ts:55
  affected_parameter: Authorization (Bearer JWT exp claim)
  scenario: 'verify() at lib/insecurity.ts:55 uses jws.verify(token, publicKey) — a low-level signature-only check — instead
    of jwt.verify(). jws.verify validates the RSA signature but performs no claim validation: the exp set by authorize() (expiresIn:
    ''6h'', line 54) is never enforced, nor are nbf, iss, or aud. Any role middleware built on verify()+decode() (isAccounting
    line 156, isDeluxe 167, isCustomer 171) therefore accepts indefinitely-valid tokens. A token captured once (e.g. from
    a log, referrer, or the localStorage of a victim) grants permanent access; revocation is impossible because the in-memory
    authenticatedUsers map (lines 70-91) is the only session state and is never consulted by verify().'
  evidence_summary: verify() at line 55 calls jws.verify (signature-only), so the 6h exp from authorize() at line 54 is never
    checked.
  impact_description: Stolen or forged tokens remain valid forever, defeating session expiry and revocation for all role-gated
    routes.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: authorize() sets a 6h expiresIn, but verify() never enforces it; no server-side token revocation list.
  mitigation_title: Use jwt.verify with claim enforcement and a revocation check
  remediation:
    effort: Low
    steps:
    - 'Replace jws.verify() in verify() with jwt.verify(token, publicKey, { algorithms: [''RS256''] }) so exp/nbf are enforced
      and signature+claims are checked together.'
    - Maintain a server-side token denylist (or short-lived access tokens + refresh) so individual sessions can be revoked.
    - Reject tokens older than the issued expiry even if presented from the in-memory cache.
    code_example: "export const verify = (token) => {\n  try { return token ? jwt.verify(token, publicKey, { algorithms: ['RS256']\
      \ }) : false }\n  catch { return false }\n}"
