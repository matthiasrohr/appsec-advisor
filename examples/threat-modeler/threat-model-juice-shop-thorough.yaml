    interface intended only for partner integrations; its RCE surface should be gated behind a strong authorization check,
    not mere authentication.
  evidence_summary: server.ts:423 registers `security.isAuthorized()` as the only guard for the entire `/b2b/v2` prefix; no
    role or scope check appears on the route registration at server.ts:645 or in the handler at b2bOrder.ts.
