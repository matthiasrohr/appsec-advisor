  stride: Denial of Service
  cwe: CWE-409
  title: ZIP bomb via unzipper with no decompressed size limit routes/fileUpload.ts:38
  affected_parameter: uploaded ZIP file
  scenario: An unauthenticated attacker uploads a valid ZIP file that is within the 200KB compressed size limit but decompresses
    to gigabytes (a ZIP bomb). The server at line 38 creates a read stream from the temp file and pipes it through `unzipper.Parse()`
    which decompresses entries on demand. Each decompressed `entry` is piped directly to `fs.createWriteStream` at line 45
    with no size check on the decompressed output. The `checkUploadSize` function at line 62 only checks `file.size` (the
    compressed multer buffer) — it does not check the decompressed entry sizes. The unzipper library version 0.9.15 does not
    enforce decompressed size limits internally. The result is disk exhaustion (filling `uploads/complaints/`) and/or memory
    exhaustion during the streaming decompression, causing the Node.js process to become unresponsive.
  evidence_summary: '`checkUploadSize` at line 62 checks only `file.size` (compressed size); `unzipper.Parse()` at line 39
    decompresses without any per-entry or total decompressed-size limit.'
  impact_description: A single 200KB upload fills the server disk or exhausts memory during decompression, causing denial
    of service for all application users.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 200KB multer compressed size limit; `checkUploadSize` logs the challenge event but does not block large
    files.
  mitigation_title: Enforce decompressed entry size limit and total extracted size cap in ZIP handling
  remediation:
    effort: Medium
    steps:
    - 'Track cumulative decompressed bytes across all entries; reject the archive when the total exceeds a safe threshold
      (e.g. 5MB for complaint uploads): increment a counter on each `data` event from the entry stream and call `entry.autodrain()`
      if the limit is exceeded.'
    - 'Check each entry''s `uncompressedSize` from the ZIP local file header before piping: `if (entry.extra.uncompressedSize
      > MAX_ENTRY_BYTES) { entry.autodrain(); return; }`.'
    - Set a maximum number of entries per archive (e.g. 100) to prevent directory explosion attacks.
    - Consider switching to a ZIP library with built-in bomb protection (e.g. `yauzl` with `autoClose` and size tracking).
    code_example: null
    reference: CWE-409
