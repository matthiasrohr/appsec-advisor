- local_id: backend-api-002
  threat_category_id: TH-02
  additional_categories: []
  stride: Spoofing
  cwe: CWE-347
  title: JWT Algorithm Confusion via expressJwt Without algorithm… (lib/insecurity.ts:54)
  affected_parameter: Authorization header / JWT alg header
  scenario: 'The isAuthorized() middleware at lib/insecurity.ts:54 calls expressJwt({ secret: publicKey }) using express-jwt
    version 0.1.3 (circa 2013) without specifying an algorithms allowlist. This version accepts tokens whose header declares
    alg:HS256 in addition to RS256. An attacker can take the RSA public key (exposed at /encryptionkeys/jwt.pub), use it as
    the HMAC secret to craft a token signed with HS256, and the server will verify it successfully — because it checks HMAC(payload,
    publicKey) against the signature. This is the classic RS256-to-HS256 confusion attack. Combined with the already-exposed
    private key (backend-api-001), an attacker has two independent paths to forge tokens.'
  evidence_summary: lib/insecurity.ts:54 calls expressJwt without an algorithms parameter; express-jwt 0.1.3 does not enforce
    algorithm restriction by default.
  impact_description: 'Authentication bypass: attacker mints arbitrary-claims tokens accepted by all isAuthorized()-protected
    routes.'
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: RS256 is used for legitimate token issuance; expressJwt validates signatures. The missing algorithms
    pin removes the protection.
  mitigation_title: 'Upgrade express-jwt to >= 8.x and add algorithms: [''RS256''] to isAuthorized()'
  remediation:
    effort: Low
    steps:
    - 'Upgrade express-jwt from 0.1.3 to >= 8.4.1: npm install express-jwt@latest'
    - 'Change isAuthorized() to: expressJwt({ secret: publicKey, algorithms: [''RS256''] })'
    - Rotate the public/private keypair after upgrading (the existing keypair is already compromised per backend-api-001).
    - Add an integration test that rejects a token signed with HS256 using the public key as secret.
    code_example: "```typescript\nexport const isAuthorized = () =>\n  expressJwt({ secret: publicKey, algorithms: ['RS256']\
      \ });\n```"
    reference: CWE-347
