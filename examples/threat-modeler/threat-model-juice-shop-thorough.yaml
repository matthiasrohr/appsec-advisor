- local_id: backend-api-015
  threat_category_id: TH-06
  additional_categories: []
  stride: Elevation of Privilege
  cwe: CWE-915
  title: Mass Assignment via Sequelize Model Allows Role Escalation
  affected_parameter: body.role
  scenario: 'The Finale-REST auto-route for User creation at server.ts:499 auto-generates POST /api/Users from the UserModel.
    The autoModels configuration at line 483 excludes only password and totpSecret — the role field is not excluded. The UserModel
    setter at models/user.ts:86 accepts ''admin'' as a valid role value. An unauthenticated attacker can register an account
    with: POST /api/Users { email: ''evil@x.com'', password: ''P@ss1'', passwordRepeat: ''P@ss1'', role: ''admin'' } and immediately
    receive a user record with admin role, bypassing all access controls on admin-protected endpoints.'
  evidence_summary: server.ts:483 excludes only ['password','totpSecret'] from the User auto-route; models/user.ts:84 shows
    role accepts 'admin' via isIn validation.
  impact_description: Unauthenticated privilege escalation to admin role; full administrative control over all API endpoints.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. UserModel.role defaults to 'customer' but the setter accepts any valid enum value from the request
    body.
  mitigation_title: Exclude the role field from Finale-REST User resource and enforce default-customer in UserModel
  remediation:
    effort: Low
    steps:
    - 'Add ''role'' to the excludeAttributes list for the User resource in server.ts: { name: ''User'', exclude: [''password'',
      ''totpSecret'', ''role''], model: UserModel }'
    - Set role as a non-mass-assignable field in Sequelize using a protected field guard or a separate internal-only setter.
    - 'Add a test that POSTs { role: ''admin'' } to /api/Users and asserts the returned role is ''customer''.'
    code_example: '```typescript

      // server.ts autoModels

      { name: ''User'', exclude: [''password'', ''totpSecret'', ''role''], model: UserModel },

      ```'
    reference: CWE-915
