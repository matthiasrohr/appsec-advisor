  title: Remote code execution — routes/b2bOrder.ts:23
  affected_parameter: orderLinesData (request body)
  scenario: The b2bOrder() handler reads `body.orderLinesData` and passes it to `safeEval(orderLinesData)` inside a Node.js
    vm context. The dependency `notevil` version 1.3.3 (package.json) is known to be bypassable via prototype pollution (npm
    advisory). An attacker who authenticates via the B2B API sends `orderLinesData` containing a prototype pollution payload
    or a known notevil sandbox escape, achieving RCE in the server process. Even without a known bypass, `vm.runInContext`
    in Node.js is not a security boundary against a determined attacker.
  evidence_summary: vm.runInContext('safeEval(orderLinesData)', sandbox) at b2bOrder.ts:23 evaluates the attacker-controlled
    string `body.orderLinesData` using notevil 1.3.3.
  impact_description: Attacker executes arbitrary JavaScript in the server context, leading to full server compromise.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: A vm sandbox context is used; safeEval (notevil) is intended to be a safer eval; 2-second timeout is
    applied.
  mitigation_title: Remove eval-based B2B order processing; replace with a strict JSON schema parser
  remediation:
    effort: Medium
    steps:
    - Remove the `vm.runInContext('safeEval(orderLinesData)', ...)` call entirely.
    - Parse `orderLinesData` as JSON with `JSON.parse(orderLinesData)` and validate the resulting object against a strict
      JSON schema (e.g., using `ajv`) that allows only expected fields.
    - If arithmetic expressions in order data are required, use a whitelist-based AST evaluator (e.g., `expr-eval`) with only
      arithmetic operators permitted.
    - Remove the `notevil` dependency entirely.
    code_example: 'import Ajv from ''ajv''

      const ajv = new Ajv()

      const schema = { type: ''array'', items: { type: ''object'', properties: { productId: { type: ''number'' }, quantity:
      { type: ''number'' } }, required: [''productId'', ''quantity''], additionalProperties: false } }

      const valid = ajv.validate(schema, JSON.parse(body.orderLinesData))

      if (!valid) return res.status(400).json({ error: ''Invalid order data'' })'
    reference: CWE-502
