- local_id: ci-cd-pipeline-006
  threat_category_id: TH-06
  additional_categories:
  - TH-14
  stride: Elevation of Privilege
  cwe: CWE-285
  title: Workflows Missing permissions Block Grant Over-broad GITHUB_TOKEN
  scenario: 'Of the 16 workflows, only lock.yml and pr-compliance.yml declare a top-level `permissions:` block; the other
    14 (ci.yml, release.yml, image_actions.yml, zap_scan.yml, lint-fixer.yml, the update-* family, stale.yml, rebase.yml,
    frontend-bundle-analysis.yml) declare none at the workflow level. Without an explicit block the job inherits the repository
    default GITHUB_TOKEN scope, which for many older repo settings is read/write across contents, packages, pull-requests,
    issues, and more. Every step in those workflows — including the unpinned/third-party actions in image_actions.yml and
    ci.yml, and any postinstall code that runs on PRs (see ci-cd-pipeline-004) — then operates with a far broader token than
    its task needs. A single compromised step (malicious dependency, retagged action, injected postinstall) can use the ambient
    write token to push commits, publish packages, or alter PRs. codeql-analysis.yml shows the correct least-privilege pattern
    (job-level `actions: read / contents: read / security-events: write`, lines 11-14) that the others omit.'
  evidence_summary: 14 of 16 workflow files (e.g. ci.yml, release.yml, image_actions.yml) declare no top-level permissions
    block, so GITHUB_TOKEN defaults to the repository-wide scope instead of the least-privilege model codeql-analysis.yml:11-14
    demonstrates.
  impact_description: Any compromised step inside a permission-unscoped workflow wields a broad read/write GITHUB_TOKEN, enabling
    repository tampering, package publication, or PR manipulation well beyond the step's legitimate need.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: pr-compliance.yml and lock.yml scope their tokens explicitly, and codeql-analysis.yml uses a job-level
    least-privilege block, but these are the exception rather than the default.
  mitigation_title: 'Add least-privilege permissions blocks to all 14 unscoped workflows (default contents: read)'
  remediation:
    effort: Medium
    steps:
    - Set the organization/repository default workflow permission to read-only (Settings > Actions > Workflow permissions),
      then add an explicit top-level `permissions:` block to every workflow.
    - 'Default each workflow to `permissions: { contents: read }` and elevate only the specific scopes a job needs (e.g. `packages:
      write` for the docker push jobs, `contents: write` only for the auto-commit/update workflows).'
    - Add a CI policy check (e.g. `zizmor` or `actionlint` with a custom rule) that fails when a workflow omits a top-level
      permissions block.
    code_example: "name: \"CI/CD Pipeline\"\non: [push, pull_request]\npermissions:\n  contents: read\njobs:\n  docker:\n\
      \    permissions:\n      contents: read\n      packages: write"
