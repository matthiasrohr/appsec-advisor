  stride: Spoofing
  cwe: CWE-346
  title: WebSocket Origin Not Enforced Against — registerWebsocketEvents.ts:20
  scenario: 'The only access restriction on the channel is the Socket.io CORS option `cors: { origin: ''http://localhost:4200''
    }` at registerWebsocketEvents.ts:20. CORS origin checks are enforced by browsers via the `Origin` header during the XHR/handshake;
    they are advisory and do not stop non-browser clients (curl, a raw `ws`/`socket.io-client` script, Burp) that simply omit
    or forge the `Origin` header. Combined with the absence of handshake authentication (realtime-websocket-001), an off-the-shelf
    script from any host on the internet (ACT-D-01) connects successfully and reaches every event handler, defeating the apparent
    localhost-only restriction. The hardcoded `http://localhost:4200` value also does not reflect the deployed `server.baseUrl`,
    so the origin allowlist is wrong for any non-local deployment.'
  evidence_summary: Channel access at registerWebsocketEvents.ts:20 relies solely on a Socket.io CORS origin string, which
    non-browser WebSocket clients ignore.
  impact_description: A scripted client from any origin connects and drives all handlers despite the localhost CORS restriction.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: CORS origin set to http://localhost:4200 — ineffective against non-browser clients and incorrect for
    non-local deployments.
  mitigation_title: Authenticate the handshake and validate Origin server-side instead of relying on CORS alone
  remediation:
    effort: Medium
    steps:
    - Treat the CORS origin as a browser-defense-in-depth layer only; enforce real access control with the JWT handshake middleware
      from realtime-websocket-001.
    - Derive the allowed origin from `config.get('server.baseUrl')` rather than hardcoding `http://localhost:4200`, so the
      allowlist matches the deployment.
    - In the handshake middleware, additionally reject connections whose `socket.handshake.headers.origin` is not in the configured
      allowlist, rather than depending on the Socket.io CORS layer alone.
    code_example: "io.use((socket, next) => {\n  const origin = socket.handshake.headers.origin\n  if (origin !== config.get('server.baseUrl'))\
      \ return next(new Error('bad origin'))\n  // ...then verify JWT as in realtime-websocket-001\n})"
    reference: CWE-346
