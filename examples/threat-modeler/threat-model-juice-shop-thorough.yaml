tier_root_causes:
  edge:
  - no output encoding for user-controlled HTML in Angular templates (XSS)
  - JWT lastLoginIp claim rendered as trusted HTML without sanitization
  - reflected XSS via unsanitized search query parameter in Angular router
  - test credentials hardcoded in production JavaScript bundle
  server:
  - hardcoded RSA private key and HMAC key in source enables offline token forgery
  - raw string interpolation in SQL and NoSQL queries without parameterization
  - eval() on user-controlled username input enables remote code execution
  - missing authentication and authorization middleware on sensitive REST routes
  - absent input validation, rate limiting, and request-size caps across REST API
  data:
  - Sequelize SQL logging disabled — no database-layer audit trail
  - MarsDB $where JS injection via string concatenation in query predicates
  - hardcoded HMAC key for security-answer hashing exposed in source
  - no auth enforcement on file-upload and file-serving endpoints
