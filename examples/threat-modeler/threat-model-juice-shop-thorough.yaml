  title: All Web3 Transaction Metadata Routed — wallet-web3.component.ts:152
  affected_parameter: RPC endpoint
  scenario: Both `wallet-web3.component.ts:152` and `web3-sandbox.component.ts` hardcode `https://ethereum-sepolia.blockpi.network/v1/rpc/public`
    as the JSON-RPC provider. Every `eth_sendTransaction`, `eth_call`, and `eth_getBalance` request sent through this endpoint
    discloses the user's wallet address, transaction value, contract bytecode, and function call data to BlockPI's infrastructure.
    BlockPI is a commercial third-party with no documented data processing agreement in the Juice Shop repository. Users connecting
    their MetaMask wallets have no visibility that their transaction data transits a third party. Additionally, the `public`
    RPC path implies no authentication — request metadata (including source IP and wallet address) is observable by BlockPI.
  evidence_summary: The hardcoded `blockpi.network/v1/rpc/public` URL appears in both wallet and sandbox components; all on-chain
    interactions use this single third-party endpoint without user disclosure.
  impact_description: User wallet addresses, transaction data, and compiled contract bytecode are disclosed to a third-party
    RPC provider whose privacy and retention practices are undocumented.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — RPC endpoint is hardcoded with no alternative or user configuration.
  mitigation_title: Make the RPC endpoint configurable; document third-party data flows; prefer self-hosted or privacy-preserving
    RPC for sensitive interactions
  remediation:
    effort: Medium
    steps:
    - 'Load the RPC URL from `environment.ts` (`rpcUrl: process.env[''RPC_URL''] || ''https://...''`) so operators can substitute
      a self-hosted node or privacy-preserving provider.'
    - Add a user-facing notice in the wallet connect UI that transactions are sent to a third-party RPC provider.
    - Evaluate running a self-hosted Sepolia node or using a privacy-preserving RPC (e.g. Infura with TLS and API key) for
      production deployments.
