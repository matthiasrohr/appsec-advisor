- local_id: ci-cd-pipeline-002
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1357
  title: Mutable Major-Version Action Tags in CI Workflows
  scenario: 'While most actions in ci.yml and release.yml are SHA-pinned, several remain on mutable major-version tags that
    GitHub allows the publisher to retag at will: `coverallsapp/github-action@v2` (ci.yml:188), `github/codeql-action/init@v3`
    / `autobuild@v3` / `analyze@v3` (codeql-analysis.yml:23,34,36), and `actions/checkout@v6` (image_actions.yml:30). A publisher
    (or an attacker who takes over the publisher account) can move the `v2`/`v3` tag to a malicious commit; the next workflow
    run silently consumes it. coverallsapp/github-action@v2 receives `secrets.GITHUB_TOKEN` (ci.yml:190), so a retag there
    exposes the trunk token. The codeql tags are GitHub-owned (lower likelihood) but still violate the SHA-pin standard applied
    elsewhere in the same repo, creating an inconsistent and auditable gap.'
  evidence_summary: ci.yml:188 consumes coverallsapp/github-action@v2 on a mutable major tag and passes GITHUB_TOKEN to it
    (line 190), diverging from the SHA-pinning convention used for actions/checkout and setup-node in the same file.
  impact_description: A retag of any mutable-tag action executes attacker code in CI with whatever token the step is handed,
    ranging from coverage-token leakage to GITHUB_TOKEN compromise.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: Core actions (actions/checkout, actions/setup-node, docker/* , nick-invision/retry) are already SHA-pinned
    in ci.yml and release.yml, limiting the blast radius to the few remaining mutable tags.
  mitigation_title: SHA-pin coverallsapp/github-action and codeql-action references to match repo convention
  remediation:
    effort: Low
    steps:
    - Replace `coverallsapp/github-action@v2` in ci.yml:188 with the full commit SHA of the desired release plus a `# v2.x.x`
      comment.
    - Replace the three `github/codeql-action/*@v3` references in codeql-analysis.yml with commit SHAs, accepting that GitHub-owned
      actions are lower risk but standardizing the pin policy.
    - Add a CI lint step (e.g. `zizmor` or a `grep` gate) that fails the build when any `uses:` line ends in a `@vN`/`@main`/`@master`
      ref instead of a 40-char SHA.
    code_example: "- name: \"Publish coverage to Coveralls\"\n  uses: coverallsapp/github-action@4cdef0b2d7d0d6e3d4f5a6b7c8d9e0f1a2b3c4d5\
      \ # v2.3.4\n  with:\n    github-token: ${{ secrets.GITHUB_TOKEN }}"
    reference: CWE-1357
