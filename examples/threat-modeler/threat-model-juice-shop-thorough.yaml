  title: Path Traversal — routes/fileServer.ts:28
  affected_parameter: file
  scenario: 'servePublicFiles() allows only .md/.pdf names, then calls `security.cutOffPoisonNullByte(file)` before `res.sendFile(path.resolve(''ftp/'',
    file))`. An unauthenticated caller requests GET /ftp/package.json.bak%2500.md: the extension check passes on the .md suffix,
    the null-byte cutoff strips everything from %00 onward, and sendFile serves ftp/package.json.bak. The bundled solveIf
    hooks (lines 42-48) enumerate the sensitive backup/key files this exposes.'
  evidence_summary: The null-byte truncation at fileServer.ts:28 defeats the extension allowlist immediately above it, so
    non-.md/.pdf files under ftp/ are served.
  impact_description: Unauthenticated disclosure of backup files, key material and other restricted artefacts in the ftp/
    directory.
  likelihood: High
  impact: High
  risk: High
  controls_in_place: Forward-slash rejection and .md/.pdf allowlist; both bypassed by the trailing-suffix + null-byte technique.
  mitigation_title: Validate the decoded filename after null-byte stripping and confine to ftp/
  remediation:
    effort: Low
    steps:
    - Strip the poison null byte first, then re-validate the resulting extension against the .md/.pdf allowlist before serving.
    - Resolve the final path and assert it stays within path.resolve('ftp/') using path.relative and a `..` check.
    - Reject any request whose raw parameter contains %00 / \u0000 outright.
    code_example: 'const clean = security.cutOffPoisonNullByte(file)

      if (!endsWithAllowlistedFileType(clean)) return res.sendStatus(403)

      const target = path.resolve(''ftp'', clean)

      if (!target.startsWith(path.resolve(''ftp'') + path.sep)) return res.sendStatus(403)

      res.sendFile(target)'
    reference: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
