  cwe: CWE-863
  title: Forgeable Authorization Role Claim (lib/insecurity.ts:157)
  scenario: 'Authorization decisions are made by reading the role claim straight out of the JWT: isAccounting() (lib/insecurity.ts:157),
    isCustomer() (line 172), and isDeluxe() (line 167) all branch on decodedToken.data.role. Combined with auth-001 (committed
    signing key) or auth-002 (no algorithm pinning), an attacker mints a token whose data.role is ''admin'' or ''accounting''
    and is granted the corresponding privileges. No server-side check ties the role to a persisted user record at authorization
    time, so a self-issued claim is authoritative. The deluxe path additionally validates a deluxeToken HMAC, but that HMAC
    uses the same committed private key (line 150), so it too is forgeable.'
  evidence_summary: isAccounting/isDeluxe/isCustomer trust decodedToken.data.role without revalidating it against the database
    (lib/insecurity.ts:157-172).
  impact_description: Self-elevation to admin or accounting privileges, exposing administrative and financial endpoints.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None for admin/accounting/customer; the deluxe HMAC at line 150 is weak because it reuses the committed
    signing key.
  mitigation_title: Re-derive the user role from the database on each privileged request, not from the JWT claim
  remediation:
    effort: Medium
    steps:
    - In isAccounting/isDeluxe/isCustomer, look up the user by id from the verified token and read role from UserModel, not
      from the token payload.
    - Pin RS256 and rotate the signing key (see auth-001, auth-002) so token forgery is no longer trivial.
    - Stop deriving the deluxeToken HMAC from privateKey (lib/insecurity.ts:150); use a dedicated server-only secret.
    - Add a short token lifetime and a server-side allow-list (authenticatedUsers map already exists) checked on every privileged
      route.
    code_example: "export const isAccounting = () => async (req, res, next) => {\n  const decoded = verify(utils.jwtFrom(req))\
      \ && decode(utils.jwtFrom(req))\n  const user = decoded?.data?.id && await UserModel.findByPk(decoded.data.id)\n  if\
      \ (user?.role === roles.accounting) return next()\n  res.status(403).json({ error: 'Forbidden' })\n}"
    reference: CWE-863
