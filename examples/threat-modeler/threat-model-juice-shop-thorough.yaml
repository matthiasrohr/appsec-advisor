  stride: Tampering
  cwe: CWE-602
  title: Client Side Challenge Verification… (lib/startup/registerWebsocketEvents.ts:41)
  affected_parameter: data
  scenario: The `verifyLocalXssChallenge` handler (line 41) and `verifySvgInjectionChallenge` handler (line 46) call `challengeUtils.solveIf()`
    based entirely on the content of the `data` argument sent by the socket client. There is no cross-check against the HTTP
    session that triggered the original XSS, no IP binding, and no evidence that the submitting socket belongs to the user
    who actually executed the payload in a browser. An attacker connects directly to the Socket.IO port (bypassing CORS via
    a non-browser client) and emits `socket.emit('verifyLocalXssChallenge', '<iframe src="javascript:alert(\`xss\`)">')`.
    The server side of `challengeUtils.solveIf` marks the challenge as solved and triggers `sendNotification`, broadcasting
    the solved flag to all sockets. The attacker's browser never executed any XSS.
  evidence_summary: '`challengeUtils.solveIf(challenges.localXssChallenge, () => { return utils.contains(data, ''<iframe src="javascript:alert(\`xss\`)">''))
    })` at line 42 evaluates purely against attacker-controlled `data` with no session binding.'
  impact_description: Any unauthenticated actor can mark arbitrary challenges as solved — undermining the integrity of challenge-progress
    tracking and leaking flags to colluding sockets.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None — no session correlation, no IP check, no token requirement on the socket event.
  mitigation_title: Bind challenge-verification events to an authenticated HTTP session or server-side XSS evidence
  remediation:
    effort: Medium
    steps:
    - After implementing socket-level JWT validation (see socket-io-001), extract `socket.data.user.id` and only allow the
      solve if the challenge is not already solved AND the submitting user matches the session that should have executed the
      payload.
    - For XSS challenges specifically, consider verifying the payload was executed in a real browser by correlating with a
      server-side flag set by the CSP-report or a dedicated verification endpoint — not solely relying on a socket event payload.
    - 'As a minimum, add `socket.data.user` guard: `if (!socket.data.user) { socket.disconnect(true); return; }` at the top
      of each verify handler.'
    - Add server-side logging of the socket ID, user ID, and submitted `data` value for each challenge-verification event
      to enable forensic audit.
    code_example: "```typescript\nsocket.on('verifyLocalXssChallenge', (data: any) => {\n  if (!socket.data?.user) { socket.disconnect(true);\
      \ return }\n  challengeUtils.solveIf(challenges.localXssChallenge,\n    () => utils.contains(data, '<iframe src=\"javascript:alert(`xss`)\"\
      >'))\n})\n```"
    reference: CWE-602
    blueprint: null
