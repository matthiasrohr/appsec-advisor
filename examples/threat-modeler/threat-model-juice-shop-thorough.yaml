- local_id: data-persistence-001
  threat_category_id: TH-03
  additional_categories: []
  stride: Information Disclosure
  cwe: CWE-916
  title: Passwords persisted with unsalted MD5 — models/user.ts:77
  affected_parameter: password
  scenario: 'The User model''s password setter calls security.hash(clearTextPassword), which is defined in lib/insecurity.ts:43
    as crypto.createHash(''md5'').update(data).digest(''hex'') — unsalted, single-round MD5. Every credential in the Users
    table is therefore stored as a raw MD5 digest. An attacker who obtains the SQLite file (data/juiceshop.sqlite) or dumps
    the Users table via the SQLi sink in the search/login routes recovers all passwords near-instantly: MD5 is GPU-crackable
    at billions of hashes/sec and unsalted digests fall to precomputed rainbow tables. Identical passwords across users produce
    identical digests, leaking password reuse. The admin and other privileged accounts are seeded into this table.'
  evidence_summary: The password column setter at models/user.ts:77 routes the cleartext through security.hash(), the unsalted
    MD5 helper at lib/insecurity.ts:43.
  impact_description: Disclosure of the password database yields immediate full-account-takeover of every user, including
    admins, because unsalted MD5 offers no meaningful resistance.
