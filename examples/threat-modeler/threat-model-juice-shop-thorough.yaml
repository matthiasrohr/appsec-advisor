  title: Weak Security-Question Password Reset — routes/resetPassword.ts:41
  affected_parameter: answer
  scenario: resetPassword() lets any caller change a user's password by supplying the account email plus the answer to a security
    question (routes/resetPassword.ts:35-46). The check is `security.hmac(answer) === data.answer` at line 41 — no possession
    proof (no emailed reset token), no current-password requirement, and no per-account attempt limit in the handler. Security-question
    answers (mother's maiden name, first pet, the geo-stalking answers in verifySecurityAnswerChallenges) are guessable or
    OSINT-discoverable. The route-level rate limit at server.ts:343 keys on the client-controlled X-Forwarded-For header,
    so an attacker rotates that header to bypass throttling and brute-force answers (ACT-D-01).
  evidence_summary: Password reset is gated solely on an HMAC of a security-question answer at routes/resetPassword.ts:41
    with no token-based possession proof, and the only rate limit is keyed on attacker-controlled X-Forwarded-For (server.ts:346).
  impact_description: Account takeover of any user whose security-question answer can be guessed, OSINT-derived, or brute-forced
    through the header-bypassable rate limit.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: HMAC comparison of the answer (constant secret) and a route-level rate limit keyed on X-Forwarded-For
    — bypassable by spoofing that header.
  mitigation_title: Switch password reset to emailed single-use tokens and fix the X-Forwarded-For rate-limit key (routes/resetPassword.ts,
    server.ts:346)
