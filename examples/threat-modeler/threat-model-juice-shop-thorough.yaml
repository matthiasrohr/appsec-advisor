  cwe: CWE-321
  title: Hardcoded RSA private key signs all JWTs — lib/insecurity.ts:21
  affected_parameter: Authorization (Bearer JWT)
  scenario: The RSA-1024 private key used to sign every session JWT is hardcoded as a string literal at lib/insecurity.ts:21
    and committed to the public OWASP Juice Shop git history. authorize() at line 54 signs tokens with this exact key. Any
    attacker who clones the repo holds the signing key, so they can mint a valid token for {"data":{"id":1,"role":"admin","email":"admin@juice-sh.op"}},
    present it to isAuthorized() (line 52, which verifies against the matching encryptionkeys/jwt.pub), and be authenticated
    as any user including admin. No credential, OTP, or server interaction is needed — token forgery is fully offline.
  evidence_summary: privateKey at lib/insecurity.ts:21 is an inline 1024-bit RSA PEM literal consumed by authorize() at line
    54.
  impact_description: Full account takeover of any user (including admin) via offline JWT forgery, with no rate-limited surface
    to slow the attack.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None. The key is the only signing secret and it is public; no key rotation, KMS, or env-injection is
    present.
  mitigation_title: Move the JWT signing key to a KMS/secret store and rotate the compromised key
  remediation:
    effort: High
    steps:
    - Remove the inline privateKey literal from lib/insecurity.ts:21 and load the signing key at startup from a secret manager
      (AWS KMS / Vault / env var injected by the orchestrator), never from source.
    - Rotate to a freshly generated RSA-2048+ key pair; treat the published 1024-bit key as permanently burned and reject
      any token signed by it.
    - Pin RS256 explicitly in jwt.sign() and enforce a matching algorithms allowlist in verification (see auth-service-002).
    - Add a git pre-commit secret scanner (e.g. gitleaks) to block future private-key commits.
    code_example: "const privateKey = await kms.getSigningKey('juiceshop-jwt')\nexport const authorize = (user = {}) =>\n\
      \  jwt.sign(user, privateKey, { expiresIn: '6h', algorithm: 'RS256' })"
