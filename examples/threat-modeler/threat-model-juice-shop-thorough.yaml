  title: Missing Brute-Force Protection on Login
  affected_parameter: null
  scenario: POST /rest/user/login is registered at server.ts:596 with no rate-limit middleware (the reset-password limiter
    at server.ts:343 is path-scoped to /rest/user/reset-password and does not cover login). login() (routes/login.ts:32) imposes
