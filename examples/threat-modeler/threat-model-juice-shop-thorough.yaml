tier_root_causes:
  edge:
  - Wildcard CORS allows any origin to make credentialed requests
  - No CSRF protection — cookie flows vulnerable to cross-origin attacks
  server:
  - Raw SQL interpolation in Sequelize bypasses ORM parameterisation
  - RSA private key hardcoded and committed to public repository
  - 'Mass assignment: user creation accepts arbitrary fields including role'
  - JWT algorithm unpinned — alg:none exploitable via express-jwt@0.1.3
  - eval() in B2B order route enables RCE from user input
  data:
  - Unsalted MD5 for passwords — trivially reversed with rainbow tables
  - Payment card numbers stored as plaintext in models/card.ts
  - TOTP 2FA secrets stored unencrypted in User model
  - SQLite database stored without encryption at rest
