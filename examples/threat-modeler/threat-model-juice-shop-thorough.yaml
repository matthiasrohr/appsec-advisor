  cwe: CWE-598
  title: OAuth implicit flow returns access_token in URL — login.component.ts:152
  affected_parameter: access_token
  scenario: googleLogin() builds the authorization request with `response_type=token` (the deprecated implicit flow) at login.component.ts:152
    — no PKCE code_challenge and no `state` parameter. The provider returns the access_token in the URL fragment, which OAuthComponent
    harvests via string-splitting of `location.hash` (oauth.component.ts:70-79). Tokens in URL fragments leak through browser
    history, referrer headers, and any XSS reading location.hash; the missing `state` parameter removes CSRF protection on
    the callback, letting an attacker fixate a victim onto the attacker's account (login CSRF).
  evidence_summary: Authorization URL uses response_type=token with no PKCE and no state; callback parses the token out of
    the URL fragment by hand.
  impact_description: OAuth access token exposure via URL and login-CSRF account fixation against authenticating users.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: redirect_uri is checked against an authorizedRedirects allowlist by exact match (login.component.ts:82),
    which limits redirect abuse but does not address token-in-URL or missing state/PKCE.
  mitigation_title: Migrate Google OAuth to Authorization Code flow with PKCE and a validated state parameter
  remediation:
    effort: Medium
    steps:
    - Change response_type from 'token' to 'code' and add code_challenge/code_challenge_method=S256 (PKCE) in the authorization
      request at login.component.ts:152.
    - Generate a cryptographically random `state`, store it, and verify it on the callback in oauth.component.ts before consuming
      the response.
    - Exchange the authorization code for tokens server-side so the access_token never appears in the browser URL or history.
