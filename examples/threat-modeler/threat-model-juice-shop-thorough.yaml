- local_id: realtime-channel-002
  threat_category_id: TH-13
  additional_categories:
  - TH-15
  stride: Spoofing
  cwe: CWE-346
  title: WebSocket upgrade has no Origin enforcement enabling cross-site hijacking
  affected_parameter: Origin
  scenario: 'The Socket.IO server is created with `cors: { origin: ''http://localhost:4200'' }`. Socket.IO CORS only restricts
    the HTTP long-polling fallback and browser preflight; the native WebSocket transport ignores CORS and the server performs
    no explicit check of the `Origin` handshake header. Because the channel is intended to ride ambient session context (cookies/JWT)
    rather than an explicit handshake token, an attacker page on a different origin can open a WebSocket to the victim''s
    running Juice Shop and the browser will attach the victim''s cookies (Cross-Site WebSocket Hijacking). The hardcoded `localhost:4200`
    dev origin is also wrong for any non-dev deployment, signalling the boundary was never designed for production origins.'
  evidence_summary: registerWebsocketEvents.ts:20 hardcodes a single dev CORS origin and registers no Origin-header validation
    in the connection handler — origin is never re-checked on the WebSocket transport.
  impact_description: A malicious cross-origin page can drive the victim's authenticated real-time channel, reading broadcast
    notifications (including CTF flags) and triggering state-changing events.
  likelihood: Medium
  impact: Medium
  risk: Medium
  controls_in_place: A single hardcoded CORS origin (`http://localhost:4200`) constrains the polling transport only; no Origin
    enforcement on the WebSocket transport and no per-message authentication.
  mitigation_title: Validate the Origin handshake header and bind sessions to handshake tokens (not ambient cookies)
  remediation:
    effort: Medium
    steps:
    - Drive the allowed origin list from configuration per environment instead of the hardcoded `http://localhost:4200`, and
      validate `socket.handshake.headers.origin` against that allowlist inside `io.use()`, rejecting mismatches.
    - Authenticate the channel with an explicit handshake token (`socket.handshake.auth.token`) rather than relying on ambient
      cookies, so a cross-origin page cannot ride the victim's session.
    - Set the Socket.IO server `transports`/`allowRequest` callback to reject upgrades whose Origin is absent or not in the
      allowlist.
    code_example: "const allowed = config.get('app.allowedOrigins') // per-env\nconst io = new Server(server, {\n  cors: {\
      \ origin: allowed },\n  allowRequest: (req, cb) => cb(allowed.includes(req.headers.origin) ? null : 'forbidden', allowed.includes(req.headers.origin))\n\
      })"
    reference: CWE-346
    blueprint: null
  evidence:
