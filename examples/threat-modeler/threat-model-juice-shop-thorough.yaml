  cwe: CWE-602
  title: Client-side-only route guards decide admin access in the — app.guard.ts:52
  affected_parameter: role
  scenario: 'AdminGuard and AccountingGuard make authorization decisions entirely in the browser: LoginGuard.tokenDecode()
    calls `jwtDecode(token)` (app.guard.ts:38) — which decodes but does NOT verify the JWT signature — and the guards then
    check `payload.data.role === roles.admin` (app.guard.ts:54) / `roles.accounting` (:70). Two weaknesses stem from this.
    (1) The gate is client-enforced: an attacker who calls the underlying REST endpoints directly bypasses the guard entirely,
    so the guard provides only UX, not security — safe only if every backend route independently enforces authorization. (2)
    Because tokenDecode uses jwtDecode with no signature check, a locally tampered token with `role: ''admin''` unlocks the
    admin UI client-side, exposing admin views and workflows even though the server should reject the forged token. The guard
    trusts unverified, client-held claims for a privilege decision.'
  evidence_summary: AdminGuard reads a role claim from an unverified jwtDecode() result and grants the admin route on a pure
    client-side comparison.
  impact_description: Low-privilege or anonymous users reach privileged UI and any endpoint lacking independent server-side
    authorization is exploitable.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: Route guards exist (AdminGuard/AccountingGuard) but are UX-only and rely on an unverified client-side
    JWT decode. Real enforcement depends entirely on the server, which is out of this component's control.
  mitigation_title: Treat route guards as UX-only and enforce role authorization on every server endpoint
  remediation:
    effort: Medium
    steps:
    - Ensure every privileged REST endpoint independently verifies the JWT signature and role server-side; never rely on the
      Angular guard for access control.
    - Do not branch security-relevant UI on an unverified jwtDecode() result — the client cannot validate the token's authenticity.
    - Have privileged views fetch their data through endpoints that return 401/403 for insufficient role, and render nothing
      on failure.
    - Document the guards explicitly as cosmetic navigation aids to prevent future reliance on them for authorization.
    code_example: "// server middleware, applied to every admin route\nfunction requireAdmin(req, res, next) {\n  const p\
      \ = jwt.verify(req.token, PUBLIC_KEY, { algorithms: ['RS256'] })\n  if (p.data.role !== 'admin') return res.sendStatus(403)\n\
      \  next()\n}"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html
