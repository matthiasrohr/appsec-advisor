  threat_category_id: TH-03
  additional_categories: []
  stride: Spoofing
  cwe: CWE-798
  title: Seeded Default Admin Credentials in Every Database In… (data/datacreator.ts:135)
  affected_parameter: email
  scenario: The `createUsers()` function in `data/datacreator.ts:128-156` seeds a static admin account (`admin@juice-sh.op`
    / `admin123`) on every application startup. The credentials are public knowledge (documented in the project README and
    widely published). Any attacker who reaches the login endpoint can authenticate as admin with these credentials, bypassing
    all access controls. In a misconfigured or freshly deployed instance where the admin password has not been changed, the
    attacker immediately gains full admin role including order management, user listing, and challenge resolution.
  evidence_summary: '`data/datacreator.ts:135` calls `UserModel.create({ ..., password, role })` using credentials loaded
    from static user data, which includes the admin account with password `admin123` and role `admin`.'
  impact_description: Immediate full admin access to the application without any exploitation sophistication required.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — no forced password change on first login, no credential rotation mechanism.
  mitigation_title: Replace static seed credentials with environment-variable-driven admin password generation
  remediation:
    effort: Medium
    steps:
    - 'Remove the hardcoded admin password from `data/static/users.yml` (or equivalent static data). Replace with an environment
      variable: `ADMIN_PASSWORD=${ADMIN_PASSWORD:-$(openssl rand -base64 24)}`.'
    - Modify `data/datacreator.ts:createUsers()` to read admin password from `process.env.ADMIN_PASSWORD` when seeding.
    - Add a startup log entry (not printed to stdout in production) that warns if `ADMIN_PASSWORD` is not set.
    - Document required environment variables in deployment guides and block container builds if `ADMIN_PASSWORD=admin123`
      is detected.
    code_example: null
