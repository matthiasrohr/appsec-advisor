  stride: Elevation of Privilege
  cwe: CWE-79
  title: Attacker-controlled SVG/XSS payload trusted from WebSocket message
  affected_parameter: data
  scenario: The `verifySvgInjectionChallenge` (registerWebsocketEvents.ts:45-47) and `verifyLocalXssChallenge` (lines 40-43)
    handlers accept raw client-supplied `data` over the unauthenticated WebSocket and feed it into challenge-verification
    logic. `verifyLocalXssChallenge` matches `data` against a literal `<iframe src="javascript:alert(...)">` XSS payload and
    a configurable `xssBonusPayload`; `verifySvgInjectionChallenge` matches a path-traversal `../../../...redirect?to=https://cataas.com/cat`
    pattern then calls `security.isRedirectAllowed(data)`. The message handler is the server-side acceptance point for active-content
    payloads that the application later renders, making the WebSocket a delivery vector for stored/DOM XSS and open-redirect
    chained through SVG injection. Combined with the missing connection auth (realtime-channel-001), an anonymous attacker
    can submit these payloads at will to drive injected active content into other users' contexts (including admin views that
    consume the same notification feed).
  evidence_summary: registerWebsocketEvents.ts:41 and :46 pattern-match attacker `data` for XSS/SVG-injection payloads and
    pass it through challenge-solve logic, with the SVG regex feeding `security.isRedirectAllowed(data)` as the only check.
  impact_description: The WebSocket becomes an injection delivery channel for SVG/iframe-based XSS and open-redirect payloads
    reaching other users' browsers, including privileged admin contexts.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: 'Partial: `security.isRedirectAllowed(data)` constrains the redirect target for the SVG path, and downstream
    notification descriptions are run through `sanitizeHtml` (challengeUtils.ts:65) — but the inbound `data` itself is not
    validated/encoded at the socket boundary and the XSS payload matchers operate on raw input.'
  mitigation_title: Validate and contextually encode WebSocket message data before any rendering or redirect handling
  remediation:
    effort: Medium
    steps:
    - 'Treat all inbound socket `data` as untrusted: validate type/shape and reject non-string or oversized payloads before
      any regex or redirect logic.'
    - Ensure every sink that renders or redirects on values derived from socket input applies context-appropriate output encoding
      (HTML/attribute/URL) and a strict redirect allowlist via `security.isRedirectAllowed`.
    - Apply a Content-Security-Policy that blocks inline scripts and `javascript:` URIs so an iframe/SVG payload that slips
      through cannot execute in victim browsers.
    code_example: "socket.on('verifySvgInjectionChallenge', (data) => {\n  if (typeof data !== 'string' || data.length > 2048)\
