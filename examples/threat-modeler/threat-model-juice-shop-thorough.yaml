- local_id: frontend-spa-002
  threat_category_id: TH-02
  additional_categories:
  - TH-10
  stride: Spoofing
  cwe: CWE-522
  title: OAuth login derives password deterministically from — oauth.component.ts:30
  affected_parameter: password
  scenario: After a successful OAuth profile fetch, OAuthComponent creates a local account whose password is `btoa(profile.email.split('').reverse().join(''))`
    — base64 of the reversed email (oauth.component.ts:30) — and immediately logs in with that same derived value (oauth.component.ts:46).
    Section 7.9 flags this `derived password from claim` pattern. Because the algorithm is public and the input (the victim's
    email) is low-entropy and often known, any attacker who knows a target's email can reconstruct the exact password and
    authenticate through the normal `/rest/user/login` endpoint — no OAuth, no provider involvement. This turns the password
    login endpoint into a parallel authentication bypass for every OAuth-provisioned account.
  evidence_summary: oauth.component.ts:30 and :46 set and reuse `btoa(reverse(email))` as the account password, a fully attacker-reproducible
    value.
  impact_description: Any OAuth-created account can be taken over by computing its predictable password from the (public)
    email address, fully bypassing OAuth.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derivation is deterministic and uses no secret or salt.
  mitigation_title: Stop deriving passwords from email; issue server-side OAuth sessions without a shadow password
  remediation:
    effort: Medium
    steps:
    - Remove the `btoa(reverse(email))` password derivation in oauth.component.ts:30 and :46.
    - Provision OAuth accounts server-side with a federated identity record and no password, or set a cryptographically random
      unguessable password the client never sees.
    - Ensure the password-login endpoint cannot authenticate federated-only accounts (reject password auth when the account
      is OAuth-linked).
    code_example: '// server-side, on OAuth callback

      const user = await findOrCreateFederatedUser(profile.email, ''google'')

      // no password set; issue a session/JWT bound to the federated identity

      return issueSession(user)'
    reference: CWE-522
