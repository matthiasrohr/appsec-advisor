- local_id: ci-cd-pipeline-001
  threat_category_id: TH-14
  additional_categories: []
  stride: Tampering
  cwe: CWE-1357
  title: Dependency Lockfile Disabled — .npmrc:1
  affected_parameter: package-lock
  scenario: '`.npmrc:1` sets `package-lock=false` and `.gitignore:10` lists `package-lock.json`, so a committed, integrity-pinned
    lockfile never exists in this repo. Every `npm install` in CI (ci.yml jobs lint/coding-challenge-rsn/frontend-test/server-test/api-test/custom-config-test/e2e-test/smoke-test)
    and in the Dockerfile (`RUN npm install --omit=dev` at Dockerfile:5) re-resolves the entire dependency graph fresh against
    the live npm registry. An attacker who briefly controls a transitive version window — via typosquatting, maintainer-account
    takeover, or registry cache poisoning — gets their malicious version pulled into every build with no lockfile diff to
    review. Crucially, the missing lockfile cannot be `npm ci`-fixed later because there is no baseline to validate against.'
  evidence_summary: '`.npmrc:1` contains `package-lock=false` and `.gitignore:10` excludes package-lock.json, so npm never
    generates or commits an integrity-pinned dependency tree.'
  impact_description: Non-deterministic builds with no integrity baseline; a poisoned registry version is installed across
    all CI jobs and the published Docker image without any diff signal.
  likelihood: Medium
  impact: High
  risk: High
  controls_in_place: CycloneDX SBOM is generated at build time (Dockerfile:20 `npm run sbom`), which records resolved versions
    after the fact but does not gate or pin the install.
  mitigation_title: Commit an integrity-pinned package-lock.json and switch CI/Docker installs to npm ci
  remediation:
    effort: Medium
    steps:
    - Remove `package-lock=false` from `.npmrc` and delete the `package-lock.json` line from `.gitignore`, then run `npm install`
      once and commit the generated `package-lock.json` (and `frontend/package-lock.json`).
    - Replace `npm install` with `npm ci` in every ci.yml/release.yml job and in `Dockerfile:5` so installs are reproducible
      and fail when the lockfile and manifest disagree.
    - Once lockfiles are committed, enable `npm install --require-hashes`-equivalent enforcement via `npm ci` (which already
      validates the integrity hashes recorded in the lockfile).
    code_example: '# Dockerfile (installer stage)

      COPY package.json package-lock.json ./

      RUN npm ci --omit=dev

      '
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Vulnerable_Dependency_Management_Cheat_Sheet.html
  evidence:
  - file: .npmrc
    line: 1
  evidence_check: verified
  controls_absent_evidence:
  - pattern: npm ci
    search_paths:
    - .github/workflows/
    - Dockerfile
