    to the mutable tag `@v3` (lines 23, 25, 27 for `init`, `autobuild`, and `analyze` respectively). Mutable tags can be silently
    repointed to different commits by the action owner or through a supply-chain compromise of the `github/codeql-action`
    repository. If the tag is redirected to malicious code, it executes in the context of the GitHub Actions runner with `permissions:
    security-events: write` and `contents: read`. A compromised autobuild step could modify source files before analysis,
    suppress CodeQL findings (defeating the SAST gate), or exfiltrate repository code. Because the CodeQL workflow runs on
    every `push` and `pull_request`, this executes on every contribution.'
