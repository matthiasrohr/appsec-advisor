  title: OAuth password derived deterministically from email — oauth.component.ts:30
  affected_parameter: email
  scenario: 'After OAuth login the SPA derives a local account password as `btoa(profile.email.split('''').reverse().join(''''))`
    (oauth.component.ts:30 and :46) and silently registers/logs-in the user with it. The password is a pure deterministic
    function of the publicly-known email, so any attacker who knows a victim''s email can reconstruct the exact password (reverse
    the email, base64-encode) and authenticate to the victim''s account through the normal password login endpoint — completely
    bypassing Google OAuth. This is a Critical credential-design flaw: every OAuth user has a guessable static password.'
  evidence_summary: The account password is computed client-side as base64 of the reversed email at oauth.component.ts:30/46,
    making it derivable by anyone who knows the email.
  impact_description: Full account takeover of every OAuth-onboarded user via a trivially reconstructable password, bypassing
    the OAuth provider entirely.
  likelihood: High
  impact: Critical
  risk: Critical
  controls_in_place: None — the derivation is deterministic and uses no secret.
  mitigation_title: Stop deriving passwords from email; use a server-side random secret or tokenless OAuth session linkage
  remediation:
    effort: Medium
    steps:
    - Remove the btoa(reversed email) password derivation at oauth.component.ts:30 and :46.
    - Link OAuth identities to accounts server-side without a shareable password (store the provider subject id), or generate
      a high-entropy random password server-side that is never reconstructable from public data.
    - Disable classic password login for accounts created via OAuth so no guessable parallel credential exists.
    code_example: '// server-side, on OAuth callback

      const password = crypto.randomBytes(32).toString(''base64'') // never derived from email

      // persist provider subject id; do not expose this password to the client'
