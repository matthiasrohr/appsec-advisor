- id: backend-api
  name: Express REST API Backend
  description: Node.js/Express server (server.ts) handling REST API at /rest/* and /api/*, authentication, session management,
    file serving, and all backend business logic. Deliberately contains SQL injection, SSRF, path traversal, eval-based code
    injection, and authorization flaws.
