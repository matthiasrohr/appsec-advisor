  cwe: CWE-306
  title: Socket.IO connection accepted without authentication
  affected_parameter: null
  scenario: 'registerWebsocketEvents.ts builds the Socket.IO server with `new Server(server, { cors: { origin: ''http://localhost:4200''
    } })` and immediately registers `io.on(''connection'', ...)` with no `io.use()` authentication middleware and no inspection
    of `socket.handshake` for a session cookie or JWT. Any unauthenticated party that completes a WebSocket upgrade to port
    3000 obtains a fully privileged channel: it can emit `verifyLocalXssChallenge`, `verifySvgInjectionChallenge`, `verifyCloseNotificationsChallenge`,
    and `notification received` — all of which mutate shared server-side challenge/notification state — without ever proving
    an identity. The channel relies on ambient session context that is never actually read or enforced.'
  evidence_summary: The `connection` handler at registerWebsocketEvents.ts:23 runs no identity check; grep for `io.use`, `socket.handshake`,
    `authenticate`, and token verification in this file returns zero hits.
  impact_description: Any anonymous network client can drive the real-time event surface and trigger server-side challenge-solve
    and notification-mutation logic with no credential.
  likelihood: High
  impact: Medium
  risk: High
  controls_in_place: None. REST routes use express-rate-limit and JWT/session middleware, but none of that is wired into the
    Socket.IO server; the connection handler trusts every socket.
  mitigation_title: Authenticate the Socket.IO handshake with io.use() before registering event handlers
  remediation:
    effort: Medium
    steps:
    - Add an `io.use((socket, next) => { ... })` middleware that reads the JWT from `socket.handshake.auth.token` (or the
      session cookie) and verifies it with the same `lib/insecurity` verification used by REST routes; reject with `next(new
      Error('unauthorized'))` on failure.
    - Inside `io.on('connection')`, attach the verified principal to `socket.data.user` and gate the state-changing `notification
      received` / `verify*` handlers on it.
    - For genuinely public broadcast traffic, split the namespace so privileged events live on an authenticated namespace
      and only read-only event delivery stays anonymous.
    code_example: "io.use((socket, next) => {\n  const token = socket.handshake.auth?.token\n  try {\n    socket.data.user\
      \ = security.verify(token) // same verifier as REST\n    next()\n  } catch {\n    next(new Error('unauthorized'))\n\
      \  }\n})"
    reference: https://cheatsheetseries.owasp.org/cheatsheets/Web_Service_Security_Cheat_Sheet.html
    blueprint: null
