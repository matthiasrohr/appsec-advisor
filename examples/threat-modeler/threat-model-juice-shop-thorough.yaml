  cwe: CWE-918
  title: LLM base URL sourced from writable config enables SSRF on startup (chat.ts:111)
  affected_parameter: application.chatBot.llmApiUrl
  scenario: 'The OpenAI-compatible provider''s baseURL is read from config at module load: `baseURL: config.get<string>(''application.chatBot.llmApiUrl'')`
    (routes/chat.ts:111), defaulting to http://localhost:11434/v1 (config/default.yml:22). The provider is also configured
    with an empty API key by default (process.env.LLM_API_KEY ?? '''', routes/chat.ts:110), so the local Ollama target is
    unauthenticated. If an attacker can influence the active configuration — via the application-configuration surface, an
    env override, or a writable config in a deployment — they redirect every chat request (and the bearer/identity context)
    to an attacker-controlled endpoint, or point it at internal metadata/services reachable from the server. This turns the
    chat backend into an SSRF pivot and exposes prompt/token data to a third party.'
  evidence_summary: routes/chat.ts:111 takes the LLM endpoint URL directly from config with no allowlist; routes/chat.ts:110
    sends an empty API key by default, so the destination is both attacker-influenceable and unauthenticated.
  impact_description: A modifiable LLM URL lets an attacker exfiltrate all chat traffic to an external host or reach internal-only
    services via the server (SSRF).
  likelihood: Low
  impact: High
  risk: Medium
  controls_in_place: Default points to localhost; however no allowlist or scheme/host validation constrains the configured
    URL, and no API key authenticates the upstream by default.
  mitigation_title: Validate and allowlist the LLM endpoint and authenticate the upstream
  remediation:
    effort: Medium
    steps:
    - Validate application.chatBot.llmApiUrl at startup against an allowlist of permitted hosts/schemes; refuse to start if
      it resolves to an unexpected or non-loopback address in production.
    - Require LLM_API_KEY (or mTLS) for the upstream provider instead of defaulting to an empty key, so a redirected endpoint
      cannot silently impersonate the model.
    - Restrict who can read/write the live application configuration so the URL cannot be altered at runtime by lower-privileged
      actors.
    code_example: 'const url = new URL(config.get(''application.chatBot.llmApiUrl''))

      if (!ALLOWED_LLM_HOSTS.has(url.host)) throw new Error(''LLM endpoint not allowlisted'')'
    reference: https://genai.owasp.org/llmrisk/llm05-supply-chain-vulnerabilities/
